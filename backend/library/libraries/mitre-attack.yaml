          https://attack.mitre.org/techniques/T1592/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1593
    ref_id: T1593
    name: Search Open Websites/Domains
    description: 'Adversaries may search freely available websites and/or domains
      for information about victims that can be used during targeting. Information
      about victims may be available in various online sites, such as social media,
      new sites, or those hosting information about business operations such as hiring
      or requested/rewarded contracts.(Citation: Cyware Social Media)(Citation: SecurityTrails
      Google Hacking)(Citation: ExploitDB GoogleHacking)


      Adversaries may search in different online sites depending on what information
      they seek to gather. Information from these sources may reveal opportunities
      for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Phishing](https://attack.mitre.org/techniques/T1566)).

      https://attack.mitre.org/techniques/T1593'
    translations:
      fr:
        name: Rechercher des sites web/domaines ouverts
        description: "Les adversaires peuvent rechercher sur des sites web et/ou des\
          \ domaines librement accessibles pour obtenir des informations sur les victimes\
          \ pouvant \xEAtre utilis\xE9es lors du ciblage. Des informations sur les\
          \ victimes peuvent \xEAtre disponibles sur divers sites en ligne, tels que\
          \ les r\xE9seaux sociaux, de nouveaux sites ou ceux qui h\xE9bergent des\
          \ informations sur les op\xE9rations commerciales, telles que les contrats\
          \ d\u2019embauche ou de contrats demand\xE9s/r\xE9compens\xE9s. (Citation\
          \ : Cyware R\xE9seaux sociaux)(Citation : SecurityTrails Google Hacking)(Citation\
          \ : ExploitDB GoogleHacking)\n\nLes adversaires peuvent rechercher sur diff\xE9\
          rents sites en ligne selon les informations qu\u2019ils cherchent \xE0 recueillir.\
          \ Les informations provenant de ces sources peuvent r\xE9v\xE9ler d\u2019\
          autres formes de reconnaissance (ex : [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585) ou [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566)).\nhttps://attack.mitre.org/techniques/T1593"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1593.001
    ref_id: T1593.001
    name: Social Media
    description: "Adversaries may search social media for information about victims\
      \ that can be used during targeting. Social media sites may contain various\
      \ information about a victim organization, such as business announcements as\
      \ well as information about the roles, locations, and interests of staff.\n\n\
      Adversaries may search in different social media sites depending on what information\
      \ they seek to gather. Threat actors may passively harvest data from these sites,\
      \ as well as use information gathered to create fake profiles/groups to elicit\
      \ victim\u2019s into revealing specific information (i.e. [Spearphishing Service](https://attack.mitre.org/techniques/T1598/001)).(Citation:\
      \ Cyware Social Media) Information from these sources may reveal opportunities\
      \ for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
      \ or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),\
      \ establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)\
      \ or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or\
      \ initial access (ex: [Spearphishing via Service](https://attack.mitre.org/techniques/T1566/003)).\n\
      https://attack.mitre.org/techniques/T1593/001"
    translations:
      fr:
        name: "R\xE9seaux sociaux"
        description: "Les adversaires peuvent rechercher sur les r\xE9seaux sociaux\
          \ des informations sur les victimes pouvant \xEAtre utilis\xE9es lors du\
          \ ciblage. Les r\xE9seaux sociaux peuvent contenir diverses informations\
          \ sur une organisation victime, telles que des annonces professionnelles\
          \ ainsi que des informations sur les r\xF4les, les lieux et les centres\
          \ d\u2019int\xE9r\xEAt du personnel.\n\nLes adversaires peuvent chercher\
          \ sur diff\xE9rents r\xE9seaux sociaux selon les informations qu\u2019ils\
          \ cherchent \xE0 recueillir. Les acteurs malveillants peuvent collecter\
          \ passivement des donn\xE9es sur ces sites, ainsi que les informations recueillies\
          \ pour cr\xE9er de faux profils/groupes afin d\u2019inciter les victimes\
          \ \xE0 r\xE9v\xE9ler des informations sp\xE9cifiques (par exemple [Spearphishing\
          \ Service](https://attack.mitre.org/techniques/T1598/001)). (Citation :\
          \ Cyware R\xE9seaux sociaux) Les informations issues de ces sources peuvent\
          \ r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Phishing for\
          \ Information](https://attack.mitre.org/techniques/T1598) ou [Recherche\
          \ dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585) ou [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Spearphishing via Service](https://attack.mitre.org/techniques/T1566/003)).\n\
          https://attack.mitre.org/techniques/T1593/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1593.002
    ref_id: T1593.002
    name: Search Engines
    description: 'Adversaries may use search engines to collect information about
      victims that can be used during targeting. Search engine services typical crawl
      online sites to index context and may provide users with specialized syntax
      to search for specific keywords or specific types of content (i.e. filetypes).(Citation:
      SecurityTrails Google Hacking)(Citation: ExploitDB GoogleHacking)


      Adversaries may craft various search engine queries depending on what information
      they seek to gather. Threat actors may use search engines to harvest general
      information about victims, as well as use specialized queries to look for spillages/leaks
      of sensitive information such as network details or credentials. Information
      from these sources may reveal opportunities for other forms of reconnaissance
      (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598) or
      [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or
      initial access (ex: [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      or [Phishing](https://attack.mitre.org/techniques/T1566)).

      https://attack.mitre.org/techniques/T1593/002'
    translations:
      fr:
        name: Moteurs de recherche
        description: "Les adversaires peuvent utiliser les moteurs de recherche pour\
          \ collecter des informations sur les victimes qui peuvent \xEAtre utilis\xE9\
          es lors du ciblage. Les services de moteurs de recherche explorent g\xE9\
          n\xE9ralement les sites en ligne pour indexer le contexte et peuvent fournir\
          \ aux utilisateurs une syntaxe sp\xE9cialis\xE9e pour rechercher des mots-cl\xE9\
          s sp\xE9cifiques ou des types de contenus sp\xE9cifiques (c\u2019est-\xE0\
          -dire des types de fichiers). (Citation : SecurityTrails Google Hacking)(Citation\
          \ : ExploitDB GoogleHacking)\n\nLes adversaires peuvent \xE9laborer diverses\
          \ requ\xEAtes sur les moteurs de recherche en fonction des informations\
          \ qu\u2019ils cherchent \xE0 recueillir. Les acteurs malveillants peuvent\
          \ utiliser les moteurs de recherche pour collecter des informations g\xE9\
          n\xE9rales sur les victimes, ainsi que des requ\xEAtes sp\xE9cialis\xE9\
          es pour rechercher des fuites ou des fuites d\u2019informations sensibles\
          \ telles que des informations r\xE9seau ou des identifiants. Les informations\
          \ issues de ces sources peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Recherche dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585) ou [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Valide Comptes](https://attack.mitre.org/techniques/T1078)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566)).\nhttps://attack.mitre.org/techniques/T1593/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1593.003
    ref_id: T1593.003
    name: Code Repositories
    description: "Adversaries may search public code repositories for information\
      \ about victims that can be used during targeting. Victims may store code in\
      \ repositories on various third-party websites such as GitHub, GitLab, SourceForge,\
      \ and BitBucket. Users typically interact with code repositories through a web\
      \ application or command-line utilities such as git.  \n\nAdversaries may search\
      \ various public code repositories for various information about a victim. Public\
      \ code repositories can often be a source of various general information about\
      \ victims, such as commonly used programming languages and libraries as well\
      \ as the names of employees. Adversaries may also identify more sensitive data,\
      \ including accidentally leaked credentials or API keys.(Citation: GitHub Cloud\
      \ Service Credentials) Information from these sources may reveal opportunities\
      \ for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)),\
      \ establishing operational resources (ex: [Compromise Accounts](https://attack.mitre.org/techniques/T1586)\
      \ or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),\
      \ and/or initial access (ex: [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ or [Phishing](https://attack.mitre.org/techniques/T1566)). \n\n**Note:** This\
      \ is distinct from [Code Repositories](https://attack.mitre.org/techniques/T1213/003),\
      \ which focuses on [Collection](https://attack.mitre.org/tactics/TA0009) from\
      \ private and internally hosted code repositories.\nhttps://attack.mitre.org/techniques/T1593/003"
    translations:
      fr:
        name: "D\xE9p\xF4ts de code"
        description: "Les adversaires peuvent consulter les d\xE9p\xF4ts publics de\
          \ code pour obtenir des informations sur les victimes pouvant \xEAtre utilis\xE9\
          es lors du ciblage. Les victimes peuvent stocker du code dans des d\xE9\
          p\xF4ts sur divers sites tiers tels que GitHub, GitLab, SourceForge et BitBucket.\
          \ Les utilisateurs interagissent g\xE9n\xE9ralement avec des d\xE9p\xF4\
          ts de code via une application web ou des utilitaires en ligne de commande\
          \ tels que git.  \n\nLes adversaires peuvent fouiller dans divers d\xE9\
          p\xF4ts publics de code pour obtenir diverses informations sur une victime.\
          \ Les d\xE9p\xF4ts publics de code peuvent souvent \xEAtre une source d\u2019\
          informations g\xE9n\xE9rales sur les victimes, comme les langages de programmation\
          \ et biblioth\xE8ques couramment utilis\xE9s ainsi que les noms des employ\xE9\
          s. Les adversaires peuvent \xE9galement identifier des donn\xE9es plus sensibles,\
          \ y compris des identifiants ou des cl\xE9s API fuit\xE9s accidentellement.\
          \ (Citation : Identifiants du service GitHub Cloud) Les informations provenant\
          \ de ces sources peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Phishing pour information](https://attack.mitre.org/techniques/T1598)),\
          \ la mise en place de ressources op\xE9rationnelles (ex : [Comptes de compromis](https://attack.mitre.org/techniques/T1586)\
          \ ou [Infrastructure de compromis](https://attack.mitre.org/techniques/T1584)),\
          \ et/ou un acc\xE8s initial (ex : [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ ou [Phishing]( https://attack.mitre.org/techniques/T1566)). \n\n**Note\
          \ :** Cela se distingue des [D\xE9p\xF4ts de Code](https://attack.mitre.org/techniques/T1213/003),\
          \ qui se concentrent sur la [Collection](https://attack.mitre.org/tactics/TA0009)\
          \ provenant de d\xE9p\xF4ts de code priv\xE9s et h\xE9berg\xE9s en interne.\n\
          https://attack.mitre.org/techniques/T1593/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1594
    ref_id: T1594
    name: Search Victim-Owned Websites
    description: 'Adversaries may search websites owned by the victim for information
      that can be used during targeting. Victim-owned websites may contain a variety
      of details, including names of departments/divisions, physical locations, and
      data about key employees such as names, roles, and contact info (ex: [Email
      Addresses](https://attack.mitre.org/techniques/T1589/002)). These sites may
      also have details highlighting business operations and relationships.(Citation:
      Comparitech Leak)


      Adversaries may search victim-owned websites to gather actionable information.
      Information from these sources may reveal opportunities for other forms of reconnaissance
      (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598) or
      [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or
      initial access (ex: [Trusted Relationship](https://attack.mitre.org/techniques/T1199)
      or [Phishing](https://attack.mitre.org/techniques/T1566)).


      In addition to manually browsing the website, adversaries may attempt to identify
      hidden directories or files that could contain additional sensitive information
      or vulnerable functionality. They may do this through automated activities such
      as [Wordlist Scanning](https://attack.mitre.org/techniques/T1595/003), as well
      as by leveraging files such as sitemap.xml and robots.txt.(Citation: Perez Sitemap
      XML 2023)(Citation: Register Robots TXT 2015)

      https://attack.mitre.org/techniques/T1594'
    translations:
      fr:
        name: Recherchez des sites web appartenant aux victimes
        description: "Les adversaires peuvent rechercher des informations sur les\
          \ sites appartenant \xE0 la victime lors du ciblage. Les sites web d\xE9\
          tenus par les victimes peuvent contenir une vari\xE9t\xE9 de d\xE9tails,\
          \ notamment les noms des d\xE9partements/divisions, les lieux physiques\
          \ et des donn\xE9es sur les employ\xE9s cl\xE9s tels que les noms, les r\xF4\
          les et les coordonn\xE9es (ex : [Adresses Email](https://attack.mitre.org/techniques/T1589/002)).\
          \ Ces sites peuvent \xE9galement contenir des d\xE9tails mettant en avant\
          \ les op\xE9rations et relations commerciales. (Citation : Fuite Comparitech)\n\
          \nLes adversaires peuvent consulter des sites web d\xE9tenus par les victimes\
          \ pour recueillir des informations exploitables. Les informations provenant\
          \ de ces sources peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ d\u2019\xE9tablir des ressources op\xE9rationnelles (ex : [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585) ou [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou d\u2019\
          un acc\xE8s initial (ex : [Fiable Relation](https://attack.mitre.org/techniques/T1199)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566)).\n\nEn plus\
          \ de naviguer manuellement sur le site, les adversaires peuvent tenter d\u2019\
          identifier des r\xE9pertoires ou des fichiers cach\xE9s qui pourraient contenir\
          \ des informations sensibles suppl\xE9mentaires ou des fonctionnalit\xE9\
          s vuln\xE9rables. Ils peuvent le faire via des activit\xE9s automatis\xE9\
          es telles que [Wordlist Scanning](https://attack.mitre.org/techniques/T1595/003),\
          \ ainsi qu\u2019en exploitant des fichiers tels que sitemap.xml et robots.txt.\
          \ (Citation : Perez Sitemap XML 2023)(Citation : Register Robots TXT 2015)\n\
          https://attack.mitre.org/techniques/T1594"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1595
    ref_id: T1595
    name: Active Scanning
    description: 'Adversaries may execute active reconnaissance scans to gather information
      that can be used during targeting. Active scans are those where the adversary
      probes victim infrastructure via network traffic, as opposed to other forms
      of reconnaissance that do not involve direct interaction.


      Adversaries may perform different forms of active scanning depending on what
      information they seek to gather. These scans can also be performed in various
      ways, including using native features of network protocols such as ICMP.(Citation:
      Botnet Scan)(Citation: OWASP Fingerprinting) Information from these scans may
      reveal opportunities for other forms of reconnaissance (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)).

      https://attack.mitre.org/techniques/T1595'
    translations:
      fr:
        name: Balayage actif
        description: "Les adversaires peuvent effectuer des scans de reconnaissance\
          \ actifs pour recueillir des informations pouvant \xEAtre utilis\xE9es lors\
          \ du ciblage. Les scans actifs sont ceux o\xF9 l\u2019adversaire sonde l\u2019\
          infrastructure de la victime via le trafic r\xE9seau, contrairement \xE0\
          \ d\u2019autres formes de reconnaissance qui n\u2019impliquent pas d\u2019\
          interaction directe.\n\nLes adversaires peuvent effectuer diff\xE9rentes\
          \ formes de balayage actif selon les informations qu\u2019ils cherchent\
          \ \xE0 recueillir. Ces scans peuvent \xE9galement \xEAtre effectu\xE9s de\
          \ diff\xE9rentes mani\xE8res, notamment en utilisant des fonctionnalit\xE9\
          s natives de protocoles r\xE9seau tels que l\u2019ICMP. (Citation : Scan\
          \ Botnet)(Citation : Empreintes digitales OWASP) Les informations issues\
          \ de ces scans peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex. : [Rechercher dans des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [exploiter une application publique](https://attack.mitre.org/techniques/T1190)).\n\
          https://attack.mitre.org/techniques/T1595"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1595.001
    ref_id: T1595.001
    name: Scanning IP Blocks
    description: 'Adversaries may scan victim IP blocks to gather information that
      can be used during targeting. Public IP addresses may be allocated to organizations
      by block, or a range of sequential addresses.


      Adversaries may scan IP blocks in order to [Gather Victim Network Information](https://attack.mitre.org/techniques/T1590),
      such as which IP addresses are actively in use as well as more detailed information
      about hosts assigned these addresses. Scans may range from simple pings (ICMP
      requests and responses) to more nuanced scans that may reveal host software/versions
      via server banners or other network artifacts.(Citation: Botnet Scan) Information
      from these scans may reveal opportunities for other forms of reconnaissance
      (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1595/001'
    translations:
      fr:
        name: "Num\xE9risation des blocs IP"
        description: "Les adversaires peuvent scanner les blocs IP des victimes pour\
          \ recueillir des informations pouvant \xEAtre utilis\xE9es lors du ciblage.\
          \ Les adresses IP publiques peuvent \xEAtre attribu\xE9es aux organisations\
          \ par bloc, ou par une gamme d\u2019adresses s\xE9quentielles.\n\nLes adversaires\
          \ peuvent scanner des blocs IP afin de [recueillir des informations r\xE9\
          seau des victimes](https://attack.mitre.org/techniques/T1590), telles que\
          \ les adresses IP activement utilis\xE9es ainsi que des informations plus\
          \ d\xE9taill\xE9es sur les h\xF4tes \xE0 qui ces adresses sont attribu\xE9\
          es. Les analyses peuvent aller de simples pings (requ\xEAtes et r\xE9ponses\
          \ ICMP) \xE0 des analyses plus nuanc\xE9es qui peuvent r\xE9v\xE9ler des\
          \ logiciels/versions h\xF4tes via des banni\xE8res serveur ou d\u2019autres\
          \ artefacts r\xE9seau. (Citation : Scan Botnet) Les informations issues\
          \ de ces scans peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex. : [Rechercher dans des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1595/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1595.002
    ref_id: T1595.002
    name: Vulnerability Scanning
    description: 'Adversaries may scan victims for vulnerabilities that can be used
      during targeting. Vulnerability scans typically check if the configuration of
      a target host/application (ex: software and version) potentially aligns with
      the target of a specific exploit the adversary may seek to use.


      These scans may also include more broad attempts to [Gather Victim Host Information](https://attack.mitre.org/techniques/T1592)
      that can be used to identify more commonly known, exploitable vulnerabilities.
      Vulnerability scans typically harvest running software and version numbers via
      server banners, listening ports, or other network artifacts.(Citation: OWASP
      Vuln Scanning) Information from these scans may reveal opportunities for other
      forms of reconnaissance (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)).

      https://attack.mitre.org/techniques/T1595/002'
    translations:
      fr:
        name: "Analyse des vuln\xE9rabilit\xE9s"
        description: "Les adversaires peuvent scanner les victimes \xE0 la recherche\
          \ de vuln\xE9rabilit\xE9s pouvant \xEAtre utilis\xE9es lors du ciblage.\
          \ Les analyses de vuln\xE9rabilit\xE9s v\xE9rifient g\xE9n\xE9ralement si\
          \ la configuration d\u2019un h\xF4te/application cible (ex. : logiciel et\
          \ version) correspond potentiellement \xE0 la cible d\u2019une faille sp\xE9\
          cifique que l\u2019adversaire pourrait chercher \xE0 utiliser.\n\nCes analyses\
          \ peuvent \xE9galement inclure des tentatives plus larges de [collecte d\u2019\
          informations sur l\u2019h\xF4te victime](https://attack.mitre.org/techniques/T1592)\
          \ permettant d\u2019identifier des vuln\xE9rabilit\xE9s plus couramment\
          \ connues et exploitables. Les analyses de vuln\xE9rabilit\xE9s collectent\
          \ g\xE9n\xE9ralement les logiciels en cours d\u2019ex\xE9cution et les num\xE9\
          ros de version via des banni\xE8res serveur, des ports d\u2019\xE9coute\
          \ ou d\u2019autres artefacts r\xE9seau. (Citation : Scan VULN OWASP) Les\
          \ informations issues de ces scans peuvent r\xE9v\xE9ler d\u2019autres formes\
          \ de reconnaissance (ex : [Rechercher dans des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Exploiter les Relations Publiques Application](https://attack.mitre.org/techniques/T1190)).\n\
          https://attack.mitre.org/techniques/T1595/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1595.003
    ref_id: T1595.003
    name: Wordlist Scanning
    description: "Adversaries may iteratively probe infrastructure using brute-forcing\
      \ and crawling techniques. While this technique employs similar methods to [Brute\
      \ Force](https://attack.mitre.org/techniques/T1110), its goal is the identification\
      \ of content and infrastructure rather than the discovery of valid credentials.\
      \ Wordlists used in these scans may contain generic, commonly used names and\
      \ file extensions or terms specific to a particular software. Adversaries may\
      \ also create custom, target-specific wordlists using data gathered from other\
      \ Reconnaissance techniques (ex: [Gather Victim Org Information](https://attack.mitre.org/techniques/T1591),\
      \ or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).\n\
      \nFor example, adversaries may use web content discovery tools such as Dirb,\
      \ DirBuster, and GoBuster and generic or custom wordlists to enumerate a website\u2019\
      s pages and directories.(Citation: ClearSky Lebanese Cedar Jan 2021) This can\
      \ help them to discover old, vulnerable pages or hidden administrative portals\
      \ that could become the target of further operations (ex: [Exploit Public-Facing\
      \ Application](https://attack.mitre.org/techniques/T1190) or [Brute Force](https://attack.mitre.org/techniques/T1110)).\
      \  \n\nAs cloud storage solutions typically use globally unique names, adversaries\
      \ may also use target-specific wordlists and tools such as s3recon and GCPBucketBrute\
      \ to enumerate public and private buckets on cloud infrastructure.(Citation:\
      \ S3Recon GitHub)(Citation: GCPBucketBrute) Once storage objects are discovered,\
      \ adversaries may leverage [Data from Cloud Storage](https://attack.mitre.org/techniques/T1530)\
      \ to access valuable information that can be exfiltrated or used to escalate\
      \ privileges and move laterally.\nhttps://attack.mitre.org/techniques/T1595/003"
    translations:
      fr:
        name: "Num\xE9risation de la liste de mots"
        description: "Les adversaires peuvent sonder de mani\xE8re it\xE9rative l\u2019\
          infrastructure en utilisant des techniques de force brute et de crawling.\
          \ Bien que cette technique utilise des m\xE9thodes similaires \xE0 la [Brute\
          \ Force](https://attack.mitre.org/techniques/T1110), son objectif est l\u2019\
          identification du contenu et de l\u2019infrastructure plut\xF4t que la d\xE9\
          couverte de r\xE9f\xE9rences valides. Les listes de mots utilis\xE9es dans\
          \ ces scans peuvent contenir des noms g\xE9n\xE9riques, couramment utilis\xE9\
          s ainsi que des extensions de fichiers ou des termes sp\xE9cifiques \xE0\
          \ un logiciel particulier. Les adversaires peuvent \xE9galement cr\xE9er\
          \ des listes de mots personnalis\xE9es et sp\xE9cifiques \xE0 la cible en\
          \ utilisant des donn\xE9es recueillies dans d\u2019autres techniques de\
          \ reconnaissance (ex : [Collecte d\u2019informations sur l\u2019organisation\
          \ des victimes](https://attack.mitre.org/techniques/T1591), ou [Recherche\
          \ sur des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\n\
          \nPar exemple, les adversaires peuvent utiliser des outils de d\xE9couverte\
          \ de contenu web tels que Dirb, DirBuster et GoBuster ainsi que des listes\
          \ de mots g\xE9n\xE9riques ou personnalis\xE9es pour \xE9num\xE9rer les\
          \ pages et annuaires d\u2019un site web. (Citation : ClearSky C\xE8dre libanais\
          \ janvier 2021) Cela peut les aider \xE0 d\xE9couvrir d\u2019anciennes pages\
          \ vuln\xE9rables ou des portails administratifs cach\xE9s qui pourraient\
          \ devenir la cible d\u2019op\xE9rations ult\xE9rieures (ex : [Exploiter\
          \ une application publique](https://attack.mitre.org/techniques/T1190) ou\
          \ [Brute Force](https://attack.mitre.org/techniques/T1110)).  \n\nComme\
          \ les solutions de stockage cloud utilisent g\xE9n\xE9ralement des noms\
          \ uniques \xE0 l\u2019\xE9chelle mondiale, les adversaires peuvent aussi\
          \ utiliser des listes de mots sp\xE9cifiques \xE0 la cible et des outils\
          \ tels que s3recon et GCPBucketBrute pour \xE9num\xE9rer les buckets publics\
          \ et priv\xE9s sur l\u2019infrastructure cloud. (Citation : S3Recon GitHub)(Citation\
          \ : GCPBucketBrute) Une fois les objets de stockage d\xE9couverts, les adversaires\
          \ peuvent exploiter [Donn\xE9es provenant du stockage cloud](https://attack.mitre.org/techniques/T1530)\
          \ pour acc\xE9der \xE0 des informations pr\xE9cieuses pouvant \xEAtre exfiltr\xE9\
          es ou utilis\xE9es pour augmenter les privil\xE8ges et se d\xE9placer lat\xE9\
          ralement.\nhttps://attack.mitre.org/techniques/T1595/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1596
    ref_id: T1596
    name: Search Open Technical Databases
    description: 'Adversaries may search freely available technical databases for
      information about victims that can be used during targeting. Information about
      victims may be available in online databases and repositories, such as registrations
      of domains/certificates as well as public collections of network data/artifacts
      gathered from traffic and/or scans.(Citation: WHOIS)(Citation: DNS Dumpster)(Citation:
      Circl Passive DNS)(Citation: Medium SSL Cert)(Citation: SSLShopper Lookup)(Citation:
      DigitalShadows CDN)(Citation: Shodan)


      Adversaries may search in different open databases depending on what information
      they seek to gather. Information from these sources may reveal opportunities
      for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).

      https://attack.mitre.org/techniques/T1596'
    translations:
      fr:
        name: "Recherche dans les bases de donn\xE9es techniques ouvertes"
        description: "Les adversaires peuvent consulter des bases de donn\xE9es techniques\
          \ libres pour obtenir des informations sur les victimes pouvant \xEAtre\
          \ utilis\xE9es lors du ciblage. Des informations sur les victimes peuvent\
          \ \xEAtre disponibles dans des bases de donn\xE9es et d\xE9p\xF4ts en ligne,\
          \ tels que les enregistrements de domaines/certificats ainsi que des collections\
          \ publiques de donn\xE9es r\xE9seau ou d\u2019artefacts collect\xE9s \xE0\
          \ partir du trafic et/ou des scans. (Citation : WHOIS)(Citation : Conteneur\
          \ DNS)(Citation : DNS passif circulaire)(Citation : Certificat SSL moyen)(Citation\
          \ : Recherche SSLShopper)(Citation : DigitalShadows CDN)(Citation : Shodan)\n\
          \nLes adversaires peuvent rechercher dans diff\xE9rentes bases de donn\xE9\
          es ouvertes selon les informations qu\u2019ils cherchent \xE0 recueillir.\
          \ Les informations provenant de ces sources peuvent r\xE9v\xE9ler d\u2019\
          autres formes de reconnaissance (ex : [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ de l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Acquisition\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1583) ou [Infrastructure\
          \ compromise](https://attack.mitre.org/techniques/T1584)), et/ou d\u2019\
          un acc\xE8s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Relation de confiance](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1596"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1596.001
    ref_id: T1596.001
    name: DNS/Passive DNS
    description: "Adversaries may search DNS data for information about victims that\
      \ can be used during targeting. DNS information may include a variety of details,\
      \ including registered name servers as well as records that outline addressing\
      \ for a target\u2019s subdomains, mail servers, and other hosts.\n\nAdversaries\
      \ may search DNS data to gather actionable information. Threat actors can query\
      \ nameservers for a target organization directly, or search through centralized\
      \ repositories of logged DNS query responses (known as passive DNS).(Citation:\
      \ DNS Dumpster)(Citation: Circl Passive DNS) Adversaries may also seek and target\
      \ DNS misconfigurations/leaks that reveal information about internal networks.\
      \ Information from these sources may reveal opportunities for other forms of\
      \ reconnaissance (ex: [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)\
      \ or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),\
      \ establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)\
      \ or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),\
      \ and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)\
      \ or [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).\nhttps://attack.mitre.org/techniques/T1596/001"
    translations:
      fr:
        name: DNS/DNS passif
        description: "Les adversaires peuvent rechercher dans les donn\xE9es DNS des\
          \ informations sur les victimes pouvant \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations DNS peuvent inclure une vari\xE9t\xE9 de d\xE9tails,\
          \ notamment des serveurs de noms enregistr\xE9s ainsi que des enregistrements\
          \ qui d\xE9taillent l\u2019adressage des sous-domaines, serveurs de messagerie\
          \ et autres h\xF4tes d\u2019une cible.\n\nLes adversaires peuvent rechercher\
          \ les donn\xE9es DNS pour recueillir des informations exploitables. Les\
          \ acteurs malveillants peuvent interroger directement des serveurs de noms\
          \ pour une organisation cible, ou rechercher dans des d\xE9p\xF4ts centralis\xE9\
          s de r\xE9ponses DNS enregistr\xE9es (appel\xE9s DNS passif). (Citation\
          \ : Conteneur DNS)(Citation : DNS passif circulaire) Les adversaires peuvent\
          \ \xE9galement rechercher et cibler des erreurs de configuration/fuites\
          \ DNS qui r\xE9v\xE8lent des informations sur les r\xE9seaux internes. Les\
          \ informations provenant de ces sources peuvent r\xE9v\xE9ler d\u2019autres\
          \ formes de reconnaissance (ex : [Rechercher des sites web appartenant aux\
          \ victimes](https://attack.mitre.org/techniques/T1594) ou [Rechercher des\
          \ sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [Acquisition\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1583) ou [Compromission\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1584)), et/ou\
          \ un acc\xE8s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Relation de confiance](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1596/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1596.002
    ref_id: T1596.002
    name: WHOIS
    description: 'Adversaries may search public WHOIS data for information about victims
      that can be used during targeting. WHOIS data is stored by regional Internet
      registries (RIR) responsible for allocating and assigning Internet resources
      such as domain names. Anyone can query WHOIS servers for information about a
      registered domain, such as assigned IP blocks, contact information, and DNS
      nameservers.(Citation: WHOIS)


      Adversaries may search WHOIS data to gather actionable information. Threat actors
      can use online resources or command-line utilities to pillage through WHOIS
      data for information about potential victims. Information from these sources
      may reveal opportunities for other forms of reconnaissance (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).

      https://attack.mitre.org/techniques/T1596/002'
    translations:
      fr:
        name: WHOIS
        description: "Les adversaires peuvent consulter les donn\xE9es publiques WHOIS\
          \ pour obtenir des informations sur les victimes pouvant \xEAtre utilis\xE9\
          es lors du ciblage. Les donn\xE9es WHOIS sont stock\xE9es par des registres\
          \ r\xE9gionaux Internet (RIR) responsables de l\u2019allocation et de l\u2019\
          attribution des ressources Internet telles que les noms de domaine. Toute\
          \ personne peut interroger les serveurs WHOIS pour obtenir des informations\
          \ sur un domaine enregistr\xE9, telles que les blocs IP attribu\xE9s, les\
          \ coordonn\xE9es et les serveurs de noms DNS. (Citation : WHOIS)\n\nLes\
          \ adversaires peuvent rechercher les donn\xE9es WHOIS pour recueillir des\
          \ informations exploitables. Les acteurs malveillants peuvent utiliser des\
          \ ressources en ligne ou des utilitaires en ligne de commande pour piler\
          \ les donn\xE9es WHOIS \xE0 la recherche d\u2019informations sur les victimes\
          \ potentielles. Les informations provenant de ces sources peuvent r\xE9\
          v\xE9ler d\u2019autres formes de reconnaissance (ex : [Scan actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Acquisition\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1583) ou [Infrastructure\
          \ de compromis](https://attack.mitre.org/techniques/T1584)), et/ou un acc\xE8\
          s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Relation de confiance](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1596/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1596.003
    ref_id: T1596.003
    name: Digital Certificates
    description: 'Adversaries may search public digital certificate data for information
      about victims that can be used during targeting. Digital certificates are issued
      by a certificate authority (CA) in order to cryptographically verify the origin
      of signed content. These certificates, such as those used for encrypted web
      traffic (HTTPS SSL/TLS communications), contain information about the registered
      organization such as name and location.


      Adversaries may search digital certificate data to gather actionable information.
      Threat actors can use online resources and lookup tools to harvest information
      about certificates.(Citation: SSLShopper Lookup) Digital certificate data may
      also be available from artifacts signed by the organization (ex: certificates
      used from encrypted web traffic are served with content).(Citation: Medium SSL
      Cert) Information from these sources may reveal opportunities for other forms
      of reconnaissance (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).

      https://attack.mitre.org/techniques/T1596/003'
    translations:
      fr:
        name: "Certificats num\xE9riques"
        description: "Les adversaires peuvent rechercher dans les donn\xE9es des certificats\
          \ num\xE9riques publics pour obtenir des informations sur les victimes pouvant\
          \ \xEAtre utilis\xE9es lors du ciblage. Les certificats num\xE9riques sont\
          \ d\xE9livr\xE9s par une autorit\xE9 de certification (AC) afin de v\xE9\
          rifier cryptographiquement l\u2019origine du contenu sign\xE9. Ces certificats,\
          \ tels que ceux utilis\xE9s pour le trafic web chiffr\xE9 (communications\
          \ HTTPS SSL/TLS), contiennent des informations sur l\u2019organisation enregistr\xE9\
          e telles que le nom et la localisation.\n\nLes adversaires peuvent rechercher\
          \ des donn\xE9es de certificats num\xE9riques pour recueillir des informations\
          \ exploitables. Les acteurs malveillants peuvent utiliser des ressources\
          \ en ligne et des outils de recherche pour collecter des informations sur\
          \ les certificats. (Citation : Recherche SSLShopper) Les donn\xE9es de certificats\
          \ num\xE9riques peuvent \xE9galement \xEAtre disponibles \xE0 partir d\u2019\
          artefacts sign\xE9s par l\u2019organisation (ex : les certificats utilis\xE9\
          s \xE0 partir de trafic web chiffr\xE9 sont servis avec du contenu). (Citation\
          \ : Certificat SSL moyen) Les informations provenant de ces sources peuvent\
          \ r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Analyse active](https://attack.mitre.org/techniques/T1595)\
          \ ou [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [T\xE9l\xE9commande externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Relation de confiance](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1596/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1596.004
    ref_id: T1596.004
    name: CDNs
    description: "Adversaries may search content delivery network (CDN) data about\
      \ victims that can be used during targeting. CDNs allow an organization to host\
      \ content from a distributed, load balanced array of servers. CDNs may also\
      \ allow organizations to customize content delivery based on the requestor\u2019\
      s geographical region.\n\nAdversaries may search CDN data to gather actionable\
      \ information. Threat actors can use online resources and lookup tools to harvest\
      \ information about content servers within a CDN. Adversaries may also seek\
      \ and target CDN misconfigurations that leak sensitive information not intended\
      \ to be hosted and/or do not have the same protection mechanisms (ex: login\
      \ portals) as the content hosted on the organization\u2019s website.(Citation:\
      \ DigitalShadows CDN) Information from these sources may reveal opportunities\
      \ for other forms of reconnaissance (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595)\
      \ or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),\
      \ establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)\
      \ or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),\
      \ and/or initial access (ex: [Drive-by Compromise](https://attack.mitre.org/techniques/T1189)).\n\
      https://attack.mitre.org/techniques/T1596/004"
    translations:
      fr:
        name: CDN
        description: "Les adversaires peuvent rechercher des donn\xE9es sur les r\xE9\
          seaux de diffusion de contenu (CDN) concernant les victimes qui peuvent\
          \ \xEAtre utilis\xE9es lors du ciblage. Les CDN permettent \xE0 une organisation\
          \ d\u2019h\xE9berger du contenu depuis un r\xE9seau distribu\xE9 et \xE9\
          quilibr\xE9 en charge de serveurs. Les CDN peuvent \xE9galement permettre\
          \ aux organisations de personnaliser la diffusion du contenu en fonction\
          \ de la r\xE9gion g\xE9ographique du demandeur.\n\nLes adversaires peuvent\
          \ rechercher les donn\xE9es CDN pour recueillir des informations exploitables.\
          \ Les acteurs malveillants peuvent utiliser des ressources en ligne et des\
          \ outils de recherche pour collecter des informations sur les serveurs de\
          \ contenu au sein d\u2019un CDN. Les adversaires peuvent \xE9galement rechercher\
          \ et cibler les mauvaises configurations des CDN qui divulguent des informations\
          \ sensibles non destin\xE9es \xE0 \xEAtre h\xE9berg\xE9es et/ou qui ne disposent\
          \ pas des m\xEAmes m\xE9canismes de protection (par exemple : portails de\
          \ connexion) que le contenu h\xE9berg\xE9 sur le site web de l\u2019organisation.\
          \ (Citation : DigitalShadows CDN) Les informations provenant de ces sources\
          \ peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Scan\
          \ actif](https://attack.mitre.org/techniques/T1595) ou [Rechercher des sites\
          \ web/domaines ouverts](https://attack.mitre.org/techniques/T1593)), l\u2019\
          \xE9tablissement de ressources op\xE9rationnelles (ex : [Acquisition d\u2019\
          infrastructure](https://attack.mitre.org/techniques/T1583) ou [Infrastructure\
          \ compromise](https://attack.mitre.org/techniques/T1584)), et/ou un acc\xE8\
          s initial (ex : [Drive-by Compromis](https://attack.mitre.org/techniques/T1189)).\n\
          https://attack.mitre.org/techniques/T1596/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1596.005
    ref_id: T1596.005
    name: Scan Databases
    description: 'Adversaries may search within public scan databases for information
      about victims that can be used during targeting. Various online services continuously
      publish the results of Internet scans/surveys, often harvesting information
      such as active IP addresses, hostnames, open ports, certificates, and even server
      banners.(Citation: Shodan)


      Adversaries may search scan databases to gather actionable information. Threat
      actors can use online resources and lookup tools to harvest information from
      these services. Adversaries may seek information about their already identified
      targets, or use these datasets to discover opportunities for successful breaches.
      Information from these sources may reveal opportunities for other forms of reconnaissance
      (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595) or [Search
      Open Websites/Domains](https://attack.mitre.org/techniques/T1593)), establishing
      operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)).

      https://attack.mitre.org/techniques/T1596/005'
    translations:
      fr:
        name: "Bases de donn\xE9es de balayage"
        description: "Les adversaires peuvent rechercher dans les bases de donn\xE9\
          es publiques des informations sur les victimes pouvant \xEAtre utilis\xE9\
          es lors du ciblage. Divers services en ligne publient en continu les r\xE9\
          sultats des scans/enqu\xEAtes Internet, collectant souvent des informations\
          \ telles que des adresses IP actives, des noms d\u2019h\xF4tes, des ports\
          \ ouverts, des certificats et m\xEAme des banni\xE8res serveur. (Citation\
          \ : Shodan)\n\nLes adversaires peuvent consulter les bases de donn\xE9es\
          \ de balayage pour recueillir des informations exploitables. Les acteurs\
          \ malveillants peuvent utiliser des ressources en ligne et des outils de\
          \ recherche pour r\xE9colter des informations de ces services. Les adversaires\
          \ peuvent chercher des informations sur leurs cibles d\xE9j\xE0 identifi\xE9\
          es, ou utiliser ces ensembles de donn\xE9es pour d\xE9couvrir des opportunit\xE9\
          s de violations r\xE9ussies. Les informations issues de ces sources peuvent\
          \ r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Scan actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [T\xE9l\xE9commande externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [exploiter une application publique](https://attack.mitre.org/techniques/T1190)).\n\
          https://attack.mitre.org/techniques/T1596/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1597
    ref_id: T1597
    name: Search Closed Sources
    description: 'Adversaries may search and gather information about victims from
      closed (e.g., paid, private, or otherwise not freely available) sources that
      can be used during targeting. Information about victims may be available for
      purchase from reputable private sources and databases, such as paid subscriptions
      to feeds of technical/threat intelligence data. Adversaries may also purchase
      information from less-reputable sources such as dark web or cybercrime blackmarkets.(Citation:
      ZDNET Selling Data)


      Adversaries may search in different closed databases depending on what information
      they seek to gather. Information from these sources may reveal opportunities
      for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Valid Accounts](https://attack.mitre.org/techniques/T1078)).

      https://attack.mitre.org/techniques/T1597'
    translations:
      fr:
        name: "Rechercher dans les sources ferm\xE9es"
        description: "Les adversaires peuvent rechercher et recueillir des informations\
          \ sur les victimes \xE0 partir de sources ferm\xE9es (par exemple, payantes,\
          \ priv\xE9es ou autrement non librement accessibles) qui peuvent \xEAtre\
          \ utilis\xE9es lors du ciblage. Des informations sur les victimes peuvent\
          \ \xEAtre disponibles \xE0 l\u2019achat aupr\xE8s de sources priv\xE9es\
          \ r\xE9put\xE9es et de bases de donn\xE9es, telles que des abonnements payants\
          \ \xE0 des flux de donn\xE9es techniques ou de renseignement sur les menaces.\
          \ Les adversaires peuvent \xE9galement acheter des informations aupr\xE8\
          s de sources moins fiables telles que le dark web ou les march\xE9s noirs\
          \ de la cybercriminalit\xE9. (Citation : Donn\xE9es de vente ZDNET)\n\n\
          Les adversaires peuvent rechercher dans diff\xE9rentes bases de donn\xE9\
          es ferm\xE9es selon les informations qu\u2019ils cherchent \xE0 recueillir.\
          \ Les informations provenant de ces sources peuvent r\xE9v\xE9ler d\u2019\
          autres formes de reconnaissance (ex : [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Distance externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Comptes valides](https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1597"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1597.001
    ref_id: T1597.001
    name: Threat Intel Vendors
    description: 'Adversaries may search private data from threat intelligence vendors
      for information that can be used during targeting. Threat intelligence vendors
      may offer paid feeds or portals that offer more data than what is publicly reported.
      Although sensitive details (such as customer names and other identifiers) may
      be redacted, this information may contain trends regarding breaches such as
      target industries, attribution claims, and successful TTPs/countermeasures.(Citation:
      D3Secutrity CTI Feeds)


      Adversaries may search in private threat intelligence vendor data to gather
      actionable information. If a threat actor is searching for information on their
      own activities, that falls under [Search Threat Vendor Data](https://attack.mitre.org/techniques/T1681).
      Information reported by vendors may also reveal opportunities other forms of
      reconnaissance (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)
      or [External Remote Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1597/001'
    translations:
      fr:
        name: Fournisseurs de renseignements sur les menaces
        description: "Les adversaires peuvent rechercher des donn\xE9es priv\xE9es\
          \ aupr\xE8s de fournisseurs de renseignements sur les menaces pour obtenir\
          \ des informations pouvant \xEAtre utilis\xE9es lors du ciblage. Les fournisseurs\
          \ de renseignements sur les menaces peuvent proposer des flux payants ou\
          \ des portails qui fournissent plus de donn\xE9es que ce qui est publi\xE9\
          \ publiquement. Bien que des d\xE9tails sensibles (tels que les noms des\
          \ clients et autres identifiants) puissent \xEAtre expurg\xE9s, ces informations\
          \ peuvent contenir des tendances concernant des violations telles que les\
          \ industries cibles, les r\xE9clamations d\u2019attribution et les TTP/contre-mesures\
          \ r\xE9ussies. (Citation : flux CTI de D3Security)\n\nLes adversaires peuvent\
          \ rechercher dans des donn\xE9es priv\xE9es de fournisseurs de renseignements\
          \ sur les menaces pour recueillir des informations exploitables. Si un acteur\
          \ malveillant recherche des informations sur ses propres activit\xE9s, cela\
          \ rel\xE8ve de [Donn\xE9es de fournisseur de menaces de recherche](https://attack.mitre.org/techniques/T1681).\
          \ Les informations rapport\xE9es par les fournisseurs peuvent \xE9galement\
          \ r\xE9v\xE9ler des opportunit\xE9s : d\u2019autres formes de reconnaissance\
          \ (ex : [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Exploiter une application face au public](https://attack.mitre.org/techniques/T1190)\
          \ ou [Remote externe Services](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1597/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1597.002
    ref_id: T1597.002
    name: Purchase Technical Data
    description: "Adversaries may purchase technical information about victims that\
      \ can be used during targeting. Information about victims may be available for\
      \ purchase within reputable private sources and databases, such as paid subscriptions\
      \ to feeds of scan databases or other data aggregation services. Adversaries\
      \ may also purchase information from less-reputable sources such as dark web\
      \ or cybercrime blackmarkets.\n\nAdversaries may purchase information about\
      \ their already identified targets, or use purchased data to discover opportunities\
      \ for successful breaches. Threat actors may gather various technical details\
      \ from purchased data, including but not limited to employee contact information,\
      \ credentials, or specifics regarding a victim\u2019s infrastructure.(Citation:\
      \ ZDNET Selling Data) Information from these sources may reveal opportunities\
      \ for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
      \ or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),\
      \ establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)\
      \ or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or\
      \ initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)\
      \ or [Valid Accounts](https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1597/002"
    translations:
      fr:
        name: "Donn\xE9es techniques d\u2019achat"
        description: "Les adversaires peuvent acheter des informations techniques\
          \ sur les victimes qui peuvent \xEAtre utilis\xE9es lors du ciblage. Des\
          \ informations sur les victimes peuvent \xEAtre disponibles \xE0 l\u2019\
          achat dans des sources priv\xE9es et bases de donn\xE9es r\xE9put\xE9es,\
          \ telles que des abonnements payants \xE0 des flux de donn\xE9es de scan\
          \ ou d\u2019autres services d\u2019agr\xE9gation de donn\xE9es. Les adversaires\
          \ peuvent \xE9galement acheter des informations aupr\xE8s de sources moins\
          \ fiables telles que le dark web ou les march\xE9s noirs de la cybercriminalit\xE9\
          .\n\nLes adversaires peuvent acheter des informations sur leurs cibles d\xE9\
          j\xE0 identifi\xE9es, ou utiliser ces donn\xE9es pour d\xE9couvrir des opportunit\xE9\
          s de r\xE9ussite dans les br\xE8ches. Les acteurs malveillants peuvent recueillir\
          \ divers d\xE9tails techniques \xE0 partir de donn\xE9es achet\xE9es, y\
          \ compris, mais sans s\u2019y limiter, les coordonn\xE9es des employ\xE9\
          s, les identifiants ou des d\xE9tails concernant l\u2019infrastructure de\
          \ la victime. (Citation : Donn\xE9es de vente ZDNET) Les informations provenant\
          \ de ces sources peuvent r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Distance externe Services](https://attack.mitre.org/techniques/T1133)\
          \ ou [Comptes valides](https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1597/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1598
    ref_id: T1598
    name: Phishing for Information
    description: "Adversaries may send phishing messages to elicit sensitive information\
      \ that can be used during targeting. Phishing for information is an attempt\
      \ to trick targets into divulging information, frequently credentials or other\
      \ actionable information. Phishing for information is different from [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ in that the objective is gathering data from the victim rather than executing\
      \ malicious code.\n\nAll forms of phishing are electronically delivered social\
      \ engineering. Phishing can be targeted, known as spearphishing. In spearphishing,\
      \ a specific individual, company, or industry will be targeted by the adversary.\
      \ More generally, adversaries can conduct non-targeted phishing, such as in\
      \ mass credential harvesting campaigns.\n\nAdversaries may also try to obtain\
      \ information directly through the exchange of emails, instant messages, or\
      \ other electronic conversation means.(Citation: ThreatPost Social Media Phishing)(Citation:\
      \ TrendMictro Phishing)(Citation: PCMag FakeLogin)(Citation: Sophos Attachment)(Citation:\
      \ GitHub Phishery) Victims may also receive phishing messages that direct them\
      \ to call a phone number where the adversary attempts to collect confidential\
      \ information.(Citation: Avertium callback phishing)\n\nPhishing for information\
      \ frequently involves social engineering techniques, such as posing as a source\
      \ with a reason to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)\
      \ or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or\
      \ sending multiple, seemingly urgent messages. Another way to accomplish this\
      \ is by [Email Spoofing](https://attack.mitre.org/techniques/T1684/002)(Citation:\
      \ Proofpoint-spoof) the identity of the sender, which can be used to fool both\
      \ the human recipient as well as automated security tools.(Citation: cyberproof-double-bounce)\
      \ \n\nPhishing for information may also involve evasive techniques, such as\
      \ removing or manipulating emails or metadata/headers from compromised accounts\
      \ being abused to send messages (e.g., [Email Hiding Rules](https://attack.mitre.org/techniques/T1564/008)).(Citation:\
      \ Microsoft OAuth Spam 2022)(Citation: Palo Alto Unit 42 VBA Infostealer 2014)\n\
      https://attack.mitre.org/techniques/T1598"
    translations:
      fr:
        name: "Hame\xE7onnage pour obtenir de l\u2019information"
        description: "Les adversaires peuvent envoyer des messages de phishing pour\
          \ obtenir des informations sensibles pouvant \xEAtre utilis\xE9es lors du\
          \ ciblage. Le phishing pour obtenir des informations est une tentative de\
          \ tromper les cibles pour qu\u2019elles divulguent des informations, souvent\
          \ des identifiants ou d\u2019autres informations exploitables. Le phishing\
          \ pour obtenir des informations diff\xE8re du [phishing](https://attack.mitre.org/techniques/T1566)\
          \ en ce que l\u2019objectif est de collecter des donn\xE9es aupr\xE8s de\
          \ la victime plut\xF4t que d\u2019ex\xE9cuter du code malveillant.\n\nToutes\
          \ les formes de phishing sont livr\xE9es \xE9lectroniquement par ing\xE9\
          nierie sociale. Le phishing peut \xEAtre cibl\xE9, appel\xE9 spearphishing.\
          \ Dans le spearphishing, une personne, une entreprise ou un secteur sp\xE9\
          cifique sera cibl\xE9 par l\u2019adversaire. Plus g\xE9n\xE9ralement, les\
          \ adversaires peuvent mener des campagnes de phishing non cibl\xE9es, comme\
          \ lors de campagnes de collecte massive d\u2019identifiants.\n\nLes adversaires\
          \ peuvent \xE9galement tenter d\u2019obtenir des informations directement\
          \ par l\u2019\xE9change d\u2019e-mails, de messages instantan\xE9s ou d\u2019\
          autres moyens de conversation \xE9lectronique. (Citation : Phishing sur\
          \ les r\xE9seaux sociaux de ThreatPost)(Citation : Phishing de TrendMictro)(Citation\
          \ : PCMag FakeLogin)(Citation : Annexe Sophos)(Citation : GitHub Phishery)\
          \ Les victimes peuvent \xE9galement recevoir des messages de phishing les\
          \ incitant \xE0 appeler un num\xE9ro de t\xE9l\xE9phone o\xF9 l\u2019adversaire\
          \ tente de recueillir des informations confidentielles. (Citation : Avertium\
          \ callback phishing)\n\nLe phishing pour obtenir des informations implique\
          \ fr\xE9quemment des techniques d\u2019ing\xE9nierie sociale, comme se faire\
          \ passer pour une source ayant une raison de collecter des informations\
          \ (ex : [\xC9tablir des comptes](https://attack.mitre.org/techniques/T1585)\
          \ ou [Compromis des comptes](https://attack.mitre.org/techniques/T1586))\
          \ et/ou envoyer plusieurs messages apparemment urgents. Une autre fa\xE7\
          on d\u2019y parvenir est de [Spoofing par email](https://attack.mitre.org/techniques/T1684/002)(Citation\
          \ : Proofpoint-spoof) l\u2019identit\xE9 de l\u2019exp\xE9diteur, qui peut\
          \ \xEAtre utilis\xE9e pour tromper \xE0 la fois le destinataire humain et\
          \ les outils de s\xE9curit\xE9 automatis\xE9s. (Citation : cyberproof-double-bounce)\
          \ \n\nLe phishing pour obtenir des informations peut \xE9galement impliquer\
          \ des techniques d\u2019\xE9vasion, telles que supprimer ou manipuler des\
          \ emails ou des m\xE9tadonn\xE9es/en-t\xEAtes provenant de comptes compromis\
          \ abus\xE9s pour envoyer des messages (par exemple, [R\xE8gles de masquage\
          \ des e-mails](https://attack.mitre.org/techniques/T1564/008)). (Citation\
          \ : Microsoft OAuth Spam 2022)(Citation : Palo Alto Unit 42 VBA Infostealer\
          \ 2014)\nhttps://attack.mitre.org/techniques/T1598"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1598.001
    ref_id: T1598.001
    name: Spearphishing Service
    description: 'Adversaries may send spearphishing messages via third-party services
      to elicit sensitive information that can be used during targeting. Spearphishing
      for information is an attempt to trick targets into divulging information, frequently
      credentials or other actionable information. Spearphishing for information frequently
      involves social engineering techniques, such as posing as a source with a reason
      to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or
      sending multiple, seemingly urgent messages.


      All forms of spearphishing are electronically delivered social engineering targeted
      at a specific individual, company, or industry. In this scenario, adversaries
      send messages through various social media services, personal webmail, and other
      non-enterprise controlled services.(Citation: ThreatPost Social Media Phishing)
      These services are more likely to have a less-strict security policy than an
      enterprise. As with most kinds of spearphishing, the goal is to generate rapport
      with the target or get the target''s interest in some way. Adversaries may create
      fake social media accounts and message employees for potential job opportunities.
      Doing so allows a plausible reason for asking about services, policies, and
      information about their environment. Adversaries may also use information from
      previous reconnaissance efforts (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594))
      to craft persuasive and believable lures.

      https://attack.mitre.org/techniques/T1598/001'
    translations:
      fr:
        name: Spearphishing Service
        description: "Les adversaires peuvent envoyer des messages de spearphishing\
          \ via des services tiers pour obtenir des informations sensibles pouvant\
          \ \xEAtre utilis\xE9es lors du ciblage. Le spearphishing pour obtenir des\
          \ informations est une tentative de tromper les cibles pour qu\u2019elles\
          \ divulguent des informations, souvent des identifiants ou d\u2019autres\
          \ informations exploitables. Le spearphishing pour obtenir des informations\
          \ implique fr\xE9quemment des techniques d\u2019ing\xE9nierie sociale, comme\
          \ se faire passer pour une source ayant une raison de collecter des informations\
          \ (ex : [\xC9tablir des comptes](https://attack.mitre.org/techniques/T1585)\
          \ ou [Compromis des comptes](https://attack.mitre.org/techniques/T1586))\
          \ et/ou envoyer plusieurs messages apparemment urgents.\n\nToutes les formes\
          \ de spearphishing sont des ing\xE9nieries sociales \xE9lectroniques ciblant\
          \ un individu, une entreprise ou un secteur sp\xE9cifique. Dans ce cas,\
          \ les adversaires envoient des messages via divers services de r\xE9seaux\
          \ sociaux, des webmails personnels et d\u2019autres services non contr\xF4\
          l\xE9s par les entreprises. (Citation : Phishing sur les r\xE9seaux sociaux\
          \ de ThreatPost) Ces services ont plus souvent une politique de s\xE9curit\xE9\
          \ moins stricte qu\u2019une entreprise. Comme pour la plupart des types\
          \ de spearphishing, l\u2019objectif est de cr\xE9er un lien avec la cible\
          \ ou d\u2019attirer son int\xE9r\xEAt d\u2019une mani\xE8re ou d\u2019une\
          \ autre. Les adversaires peuvent cr\xE9er de faux comptes sur les r\xE9\
          seaux sociaux et envoyer des messages aux employ\xE9s pour des opportunit\xE9\
          s d\u2019emploi potentielles. Cela donne une raison plausible de s\u2019\
          interroger sur les services, les politiques et les informations concernant\
          \ leur environnement. Les adversaires peuvent \xE9galement utiliser des\
          \ informations issues d\u2019efforts de reconnaissance pr\xE9c\xE9dents\
          \ (ex : [Social Media](https://attack.mitre.org/techniques/T1593/001) ou\
          \ [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594))\
          \ pour concevoir des app\xE2ts convaincants et cr\xE9dibles.\nhttps://attack.mitre.org/techniques/T1598/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1598.002
    ref_id: T1598.002
    name: Spearphishing Attachment
    description: 'Adversaries may send spearphishing messages with a malicious attachment
      to elicit sensitive information that can be used during targeting. Spearphishing
      for information is an attempt to trick targets into divulging information, frequently
      credentials or other actionable information. Spearphishing for information frequently
      involves social engineering techniques, such as posing as a source with a reason
      to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or
      sending multiple, seemingly urgent messages.


      All forms of spearphishing are electronically delivered social engineering targeted
      at a specific individual, company, or industry. In this scenario, adversaries
      attach a file to the spearphishing email. In some cases, they may rely upon
      the recipient populating information, then returning the file.(Citation: Sophos
      Attachment)(Citation: GitHub Phishery) The text of the spearphishing email usually
      tries to give a plausible reason why the file should be filled-in, such as a
      request for information from a business associate. In other cases, adversaries
      may leverage techniques such as [HTML Smuggling](https://attack.mitre.org/techniques/T1027/006)
      to harvest user credentials via fake login portals.(Citation: Huntress HTML
      Smuggling 2024)


      Adversaries may also use information from previous reconnaissance efforts (ex:
      [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593) or
      [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)) to
      craft persuasive and believable lures.

      https://attack.mitre.org/techniques/T1598/002'
    translations:
      fr:
        name: "Pi\xE8ce jointe Spearphishing"
        description: "Les adversaires peuvent envoyer des messages de spearphishing\
          \ avec une pi\xE8ce jointe malveillante afin d\u2019obtenir des informations\
          \ sensibles pouvant \xEAtre utilis\xE9es lors du ciblage. Le spearphishing\
          \ pour obtenir des informations est une tentative de tromper les cibles\
          \ pour qu\u2019elles divulguent des informations, souvent des identifiants\
          \ ou d\u2019autres informations exploitables. Le spearphishing pour obtenir\
          \ des informations implique fr\xE9quemment des techniques d\u2019ing\xE9\
          nierie sociale, comme se faire passer pour une source ayant une raison de\
          \ collecter des informations (ex : [\xC9tablir des comptes](https://attack.mitre.org/techniques/T1585)\
          \ ou [Compromis des comptes](https://attack.mitre.org/techniques/T1586))\
          \ et/ou envoyer plusieurs messages apparemment urgents.\n\nToutes les formes\
          \ de spearphishing sont des ing\xE9nieries sociales \xE9lectroniques ciblant\
          \ un individu, une entreprise ou un secteur sp\xE9cifique. Dans ce cas,\
          \ les adversaires joignent un fichier \xE0 l\u2019email de spearphishing.\
          \ Dans certains cas, ils peuvent s\u2019appuyer sur le fait que le destinataire\
          \ remplit les informations, puis retourne le fichier. (Citation : Annexe\
          \ Sophos)(Citation : GitHub Phishery) Le texte de l\u2019email de spearphishing\
          \ tente g\xE9n\xE9ralement de donner une raison plausible pour laquelle\
          \ le fichier devrait \xEAtre rempli, comme une demande d\u2019informations\
          \ \xE0 un associ\xE9 commercial. Dans d\u2019autres cas, les adversaires\
          \ peuvent utiliser des techniques telles que [HTML Smuggling](https://attack.mitre.org/techniques/T1027/006)\
          \ pour r\xE9colter des identifiants utilisateurs via de faux portails de\
          \ connexion. (Citation : Contrebande HTML de Huntress 2024)\n\nLes adversaires\
          \ peuvent \xE9galement utiliser des informations issues d\u2019efforts de\
          \ reconnaissance ant\xE9rieurs (ex : [Rechercher des sites web/domaines\
          \ ouverts](https://attack.mitre.org/techniques/T1593) ou [Rechercher des\
          \ sites web appartenant \xE0 des victimes](https://attack.mitre.org/techniques/T1594))\
          \ pour concevoir des app\xE2ts convaincants et cr\xE9dibles.\nhttps://attack.mitre.org/techniques/T1598/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1598.003
    ref_id: T1598.003
    name: Spearphishing Link
    description: "Adversaries may send spearphishing messages with a malicious link\
      \ to elicit sensitive information that can be used during targeting. Spearphishing\
      \ for information is an attempt to trick targets into divulging information,\
      \ frequently credentials or other actionable information. Spearphishing for\
      \ information frequently involves social engineering techniques, such as posing\
      \ as a source with a reason to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)\
      \ or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or\
      \ sending multiple, seemingly urgent messages.\n\nAll forms of spearphishing\
      \ are electronically delivered social engineering targeted at a specific individual,\
      \ company, or industry. In this scenario, the malicious emails contain links\
      \ generally accompanied by social engineering text to coax the user to actively\
      \ click or copy and paste a URL into a browser.(Citation: TrendMictro Phishing)(Citation:\
      \ PCMag FakeLogin) The given website may be a clone of a legitimate site (such\
      \ as an online or corporate login portal) or may closely resemble a legitimate\
      \ site in appearance and have a URL containing elements from the real site.\
      \ URLs may also be obfuscated by taking advantage of quirks in the URL schema,\
      \ such as the acceptance of integer- or hexadecimal-based hostname formats and\
      \ the automatic discarding of text before an \u201C@\u201D symbol: for example,\
      \ `hxxp://google.com@1157586937`.(Citation: Mandiant URL Obfuscation 2023)\n\
      \nAdversaries may also embed \u201Ctracking pixels,\u201D \"web bugs,\" or \"\
      web beacons\" within phishing messages to verify the receipt of an email, while\
      \ also potentially profiling and tracking victim information such as IP address.(Citation:\
      \ NIST Web Bug)(Citation: Ryte Wiki) These mechanisms often appear as small\
      \ images (typically one pixel in size) or otherwise obfuscated objects and are\
      \ typically delivered as HTML code containing a link to a remote server.(Citation:\
      \ Ryte Wiki)(Citation: IAPP)\n\nAdversaries may also be able to spoof a complete\
      \ website using what is known as a \"browser-in-the-browser\" (BitB) attack.\
      \ By generating a fake browser popup window with an HTML-based address bar that\
      \ appears to contain a legitimate URL (such as an authentication portal), they\
      \ may be able to prompt users to enter their credentials while bypassing typical\
      \ URL verification methods.(Citation: ZScaler BitB 2020)(Citation: Mr. D0x BitB\
      \ 2022)\n\nAdversaries can use phishing kits such as `EvilProxy` and `Evilginx2`\
      \ to perform adversary-in-the-middle phishing by proxying the connection between\
      \ the victim and the legitimate website. On a successful login, the victim is\
      \ redirected to the legitimate website, while the adversary captures their session\
      \ cookie (i.e., [Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539))\
      \ in addition to their username and password. This may enable the adversary\
      \ to then bypass MFA via [Web Session Cookie](https://attack.mitre.org/techniques/T1550/004).(Citation:\
      \ Proofpoint Human Factor)\n\nAdversaries may also send a malicious link in\
      \ the form of Quick Response (QR) Codes (also known as \u201Cquishing\u201D\
      ). These links may direct a victim to a credential phishing page.(Citation:\
      \ QR-campaign-energy-firm) By using a QR code, the URL may not be exposed in\
      \ the email and may thus go undetected by most automated email security scans.(Citation:\
      \ qr-phish-agriculture) These QR codes may be scanned by or delivered directly\
      \  to a user\u2019s mobile device (i.e., [Phishing](https://attack.mitre.org/techniques/T1660)),\
      \ which may be less secure in several relevant ways.(Citation: qr-phish-agriculture)\
      \ For example, mobile users may not be able to notice minor differences between\
      \ genuine and credential harvesting websites due to mobile\u2019s smaller form\
      \ factor.\n\nFrom the fake website, information is gathered in web forms and\
      \ sent to the adversary. Adversaries may also use information from previous\
      \ reconnaissance efforts (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)\
      \ or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594))\
      \ to craft persuasive and believable lures.\nhttps://attack.mitre.org/techniques/T1598/003"
    translations:
      fr:
        name: Lien Spearphishing
        description: "Les attaquants peuvent envoyer des messages de spearphishing\
          \ contenant un lien malveillant afin d\u2019obtenir des informations sensibles\
          \ pouvant \xEAtre utilis\xE9es lors d\u2019une attaque cibl\xE9e. Le spearphishing\
          \ visant \xE0 obtenir des informations consiste \xE0 tenter de pi\xE9ger\
          \ les cibles pour qu\u2019elles divulguent des informations, souvent des\
          \ identifiants ou d\u2019autres donn\xE9es exploitables. Le spearphishing\
          \ visant \xE0 obtenir des informations fait souvent appel \xE0 des techniques\
          \ d\u2019ing\xE9nierie sociale, telles que se faire passer pour une source\
          \ ayant une raison l\xE9gitime de collecter des informations (par exemple\
          \ : [Cr\xE9er des comptes](https://attack.mitre.org/techniques/T1585) ou\
          \ [Compromettre des comptes](https://attack.mitre.org/techniques/T1586))\
          \ et/ou envoyer plusieurs messages apparemment urgents.\n\nToutes les formes\
          \ de spearphishing constituent des techniques d\u2019ing\xE9nierie sociale\
          \ transmises par voie \xE9lectronique et ciblant une personne, une entreprise\
          \ ou un secteur d\u2019activit\xE9 sp\xE9cifique. Dans ce sc\xE9nario, les\
          \ e-mails malveillants contiennent des liens g\xE9n\xE9ralement accompagn\xE9\
          s d\u2019un texte d\u2019ing\xE9nierie sociale visant \xE0 inciter l\u2019\
          utilisateur \xE0 cliquer activement ou \xE0 copier-coller une URL dans un\
          \ navigateur. (R\xE9f\xE9rence : TrendMicro Phishing) (R\xE9f\xE9rence :\
          \ PCMag FakeLogin) Le site web en question peut \xEAtre un clone d\u2019\
          un site l\xE9gitime (tel qu\u2019un portail de connexion en ligne ou d\u2019\
          entreprise) ou peut ressembler \xE9troitement \xE0 un site l\xE9gitime en\
          \ apparence et comporter une URL contenant des \xE9l\xE9ments du site r\xE9\
          el. Les URL peuvent \xE9galement \xEAtre dissimul\xE9es en exploitant certaines\
          \ particularit\xE9s du sch\xE9ma des URL, telles que l\u2019acceptation\
          \ de formats de noms d\u2019h\xF4te bas\xE9s sur des nombres entiers ou\
          \ hexad\xE9cimaux et la suppression automatique du texte pr\xE9c\xE9dant\
          \ le symbole \xAB @ \xBB : par exemple, `hxxp://google.com@1157586937`.\
          \ (R\xE9f\xE9rence : Mandiant URL Obfuscation 2023)\n\nLes cybercriminels\
          \ peuvent \xE9galement int\xE9grer des \xAB pixels de suivi \xBB, des \xAB\
          \ web bugs \xBB ou des \xAB balises web \xBB dans les messages de hame\xE7\
          onnage afin de v\xE9rifier la r\xE9ception d\u2019un e-mail, tout en \xE9\
          tablissant potentiellement le profil de la victime et en suivant certaines\
          \ de ses informations, telles que son adresse IP. (R\xE9f\xE9rence : NIST\
          \ Web Bug) (R\xE9f\xE9rence : Ryte Wiki) Ces m\xE9canismes se pr\xE9sentent\
          \ souvent sous la forme de petites images (g\xE9n\xE9ralement d\u2019un\
          \ pixel) ou d\u2019objets dissimul\xE9s d\u2019une autre mani\xE8re, et\
          \ sont g\xE9n\xE9ralement transmis sous forme de code HTML contenant un\
          \ lien vers un serveur distant. (R\xE9f\xE9rence : Ryte Wiki) (R\xE9f\xE9\
          rence : IAPP)\n\nLes attaquants peuvent \xE9galement parvenir \xE0 usurper\
          \ l\u2019identit\xE9 d\u2019un site web entier \xE0 l\u2019aide d\u2019\
          une attaque dite \xAB navigateur dans le navigateur \xBB (BitB). En g\xE9\
          n\xE9rant une fausse fen\xEAtre contextuelle de navigateur dot\xE9e d\u2019\
          une barre d\u2019adresse HTML semblant contenir une URL l\xE9gitime (telle\
          \ que celle d\u2019un portail d\u2019authentification), ils peuvent inciter\
          \ les utilisateurs \xE0 saisir leurs identifiants tout en contournant les\
          \ m\xE9thodes habituelles de v\xE9rification des URL. (Source : ZScaler\
          \ BitB 2020) (Source : Mr. D0x BitB 2022)\n\nLes attaquants peuvent utiliser\
          \ des kits de phishing tels que `EvilProxy` et `Evilginx2` pour mener des\
          \ attaques de phishing de type \xAB man-in-the-middle \xBB en interposant\
          \ un proxy entre la victime et le site web l\xE9gitime. Une fois la connexion\
          \ \xE9tablie, la victime est redirig\xE9e vers le site web l\xE9gitime,\
          \ tandis que l\u2019attaquant capture son cookie de session (c\u2019est-\xE0\
          -dire [Vol de cookie de session web](https://attack.mitre.org/techniques/T1539))\
          \ en plus de son nom d\u2019utilisateur et de son mot de passe. Cela peut\
          \ permettre \xE0 l\u2019attaquant de contourner ensuite l\u2019authentification\
          \ multifactorielle (MFA) via le [cookie de session Web](https://attack.mitre.org/techniques/T1550/004).\
          \ (R\xE9f\xE9rence : Proofpoint Human Factor)\n\nLes cybercriminels peuvent\
          \ \xE9galement envoyer un lien malveillant sous la forme de codes QR (Quick\
          \ Response), une technique \xE9galement appel\xE9e \xAB quishing \xBB. Ces\
          \ liens peuvent rediriger la victime vers une page de hame\xE7onnage visant\
          \ \xE0 lui soutirer ses identifiants. (R\xE9f\xE9rence : QR-campaign-energy-firm)\
          \ L\u2019utilisation d\u2019un code QR permet de dissimuler l\u2019URL dans\
          \ l\u2019e-mail, ce qui peut l\u2019emp\xEAcher d\u2019\xEAtre d\xE9tect\xE9\
          e par la plupart des outils automatis\xE9s de s\xE9curit\xE9 des e-mails.\
          \ (R\xE9f\xE9rence : qr-phish-agriculture) Ces codes QR peuvent \xEAtre\
          \ scann\xE9s ou transmis directement sur l\u2019appareil mobile d\u2019\
          un utilisateur (c\u2019est-\xE0-dire [hame\xE7onnage](https://attack.mitre.org/techniques/T1660)),\
          \ ce qui peut pr\xE9senter plusieurs risques de s\xE9curit\xE9. (R\xE9f\xE9\
          rence : qr-phish-agriculture) Par exemple, les utilisateurs mobiles peuvent\
          \ ne pas \xEAtre en mesure de remarquer des diff\xE9rences mineures entre\
          \ un site web authentique et un site destin\xE9 \xE0 la collecte d\u2019\
          identifiants, en raison de la taille r\xE9duite des \xE9crans mobiles.\n\
          \n\xC0 partir du faux site web, les informations sont recueillies via des\
          \ formulaires web puis envoy\xE9es \xE0 l\u2019attaquant. Les attaquants\
          \ peuvent \xE9galement utiliser des informations issues d\u2019op\xE9rations\
          \ de reconnaissance ant\xE9rieures (par exemple : [Recherche de sites web/domaines\
          \ ouverts](https://attack.mitre.org/techniques/T1593) ou [Recherche de sites\
          \ web appartenant aux victimes](https://attack.mitre.org/techniques/T1594))\
          \ pour cr\xE9er des leurres convaincants et cr\xE9dibles.\nhttps://attack.mitre.org/techniques/T1598/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1598.004
    ref_id: T1598.004
    name: Spearphishing Voice
    description: 'Adversaries may use voice communications to elicit sensitive information
      that can be used during targeting. Spearphishing for information is an attempt
      to trick targets into divulging information, frequently credentials or other
      actionable information. Spearphishing for information frequently involves social
      engineering techniques, such as posing as a source with a reason to collect
      information (ex: [Impersonation](https://attack.mitre.org/techniques/T1684/001))
      and/or creating a sense of urgency or alarm for the recipient.


      All forms of phishing are electronically delivered social engineering. In this
      scenario, adversaries use phone calls to elicit sensitive information from victims.
      Known as voice phishing (or "vishing"), these communications can be manually
      executed by adversaries, hired call centers, or even automated via robocalls.
      Voice phishers may spoof their phone number while also posing as a trusted entity,
      such as a business partner or technical support staff.(Citation: BOA Telephone
      Scams)


      Victims may also receive phishing messages that direct them to call a phone
      number ("callback phishing") where the adversary attempts to collect confidential
      information.(Citation: Avertium callback phishing)


      Adversaries may also use information from previous reconnaissance efforts (ex:
      [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593) or
      [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)) to
      tailor pretexts to be even more persuasive and believable for the victim.

      https://attack.mitre.org/techniques/T1598/004'
    translations:
      fr:
        name: Voix de spearphishing
        description: "Les adversaires peuvent utiliser des communications vocales\
          \ pour obtenir des informations sensibles qui peuvent \xEAtre utilis\xE9\
          es lors du ciblage. Le spearphishing pour obtenir des informations est une\
          \ tentative de tromper les cibles pour qu\u2019elles divulguent des informations,\
          \ souvent des identifiants ou d\u2019autres informations exploitables. Le\
          \ spearphishing pour obtenir des informations implique fr\xE9quemment des\
          \ techniques d\u2019ing\xE9nierie sociale, comme se faire passer pour une\
          \ source ayant une raison de collecter des informations (ex : [Usurpation\
          \ d\u2019identit\xE9](https://attack.mitre.org/techniques/T1684/001)) et/ou\
          \ cr\xE9er un sentiment d\u2019urgence ou d\u2019alarme chez le destinataire.\n\
          \nToutes les formes de phishing sont livr\xE9es \xE9lectroniquement par\
          \ ing\xE9nierie sociale. Dans ce sc\xE9nario, les adversaires utilisent\
          \ des appels t\xE9l\xE9phoniques pour obtenir des informations sensibles\
          \ aupr\xE8s des victimes. Appel\xE9es phishing vocal (ou \xAB vishing \xBB\
          ), ces communications peuvent \xEAtre ex\xE9cut\xE9es manuellement par des\
          \ adversaires, des centres d\u2019appels engag\xE9s, voire automatis\xE9\
          s via des appels automatis\xE9s. Les phishers vocaux peuvent usurper leur\
          \ num\xE9ro de t\xE9l\xE9phone tout en se faisant passer pour une entit\xE9\
          \ de confiance, comme un partenaire commercial ou un personnel de support\
          \ technique. (Citation : Arnaques t\xE9l\xE9phoniques BOA)\n\nLes victimes\
          \ peuvent \xE9galement recevoir des messages de phishing qui les incitent\
          \ \xE0 appeler un num\xE9ro de t\xE9l\xE9phone (\xAB phishing de rappel\
          \ \xBB) o\xF9 l\u2019adversaire tente de recueillir des informations confidentielles.\
          \ (Citation : Avertium callback phishing)\n\nLes adversaires peuvent \xE9\
          galement utiliser des informations issues d\u2019efforts de reconnaissance\
          \ ant\xE9rieurs (ex : [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Rechercher des sites web appartenant \xE0 des victimes](https://attack.mitre.org/techniques/T1594))\
          \ pour adapter les pr\xE9textes et les rendre encore plus cr\xE9dibles et\
          \ convaincants pour la victime.\nhttps://attack.mitre.org/techniques/T1598/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1599
    ref_id: T1599
    name: Network Boundary Bridging
    description: 'Adversaries may bridge network boundaries by compromising perimeter
      network devices or internal devices responsible for network segmentation. Breaching
      these devices may enable an adversary to bypass restrictions on traffic routing
      that otherwise separate trusted and untrusted networks.


      Devices such as routers and firewalls can be used to create boundaries between
      trusted and untrusted networks.  They achieve this by restricting traffic types
      to enforce organizational policy in an attempt to reduce the risk inherent in
      such connections.  Restriction of traffic can be achieved by prohibiting IP
      addresses, layer 4 protocol ports, or through deep packet inspection to identify
      applications.  To participate with the rest of the network, these devices can
      be directly addressable or transparent, but their mode of operation has no bearing
      on how the adversary can bypass them when compromised.


      When an adversary takes control of such a boundary device, they can bypass its
      policy enforcement to pass normally prohibited traffic across the trust boundary
      between the two separated networks without hinderance.  By achieving sufficient
      rights on the device, an adversary can reconfigure the device to allow the traffic
      they want, allowing them to then further achieve goals such as command and control
      via [Multi-hop Proxy](https://attack.mitre.org/techniques/T1090/003) or exfiltration
      of data via [Traffic Duplication](https://attack.mitre.org/techniques/T1020/001).
      Adversaries may also target internal devices responsible for network segmentation
      and abuse these in conjunction with [Internal Proxy](https://attack.mitre.org/techniques/T1090/001)
      to achieve the same goals.(Citation: Kaspersky ThreatNeedle Feb 2021)  In the
      cases where a border device separates two separate organizations, the adversary
      can also facilitate lateral movement into new victim environments.

      https://attack.mitre.org/techniques/T1599'
    translations:
      fr:
        name: "Pontage de la fronti\xE8re du r\xE9seau"
        description: "Les adversaires peuvent franchir les fronti\xE8res du r\xE9\
          seau en compromettant les dispositifs p\xE9rim\xE9triques ou les dispositifs\
          \ internes responsables de la segmentation du r\xE9seau. Pirater ces dispositifs\
          \ peut permettre \xE0 un adversaire de contourner les restrictions sur le\
          \ routage du trafic qui s\xE9pareraient autrement les r\xE9seaux fiables\
          \ et non fiables.\n\nDes dispositifs tels que les routeurs et les pare-feux\
          \ peuvent \xEAtre utilis\xE9s pour cr\xE9er des fronti\xE8res entre des\
          \ r\xE9seaux de confiance et des r\xE9seaux non fiables.  Ils y parviennent\
          \ en restreignant les types de trafic afin de faire respecter la politique\
          \ organisationnelle afin de r\xE9duire le risque inh\xE9rent \xE0 de telles\
          \ connexions.  La restriction du trafic peut \xEAtre obtenue en interdisant\
          \ les adresses IP, les ports protocolaires de couche 4, ou par une inspection\
          \ approfondie des paquets pour identifier les applications.  Pour participer\
          \ au reste du r\xE9seau, ces appareils peuvent \xEAtre directement adressables\
          \ ou transparents, mais leur mode de fonctionnement n\u2019a aucune incidence\
          \ sur la mani\xE8re dont l\u2019adversaire peut les contourner lorsqu\u2019\
          ils sont compromis.\n\nLorsqu\u2019un adversaire prend le contr\xF4le d\u2019\
          un tel dispositif de fronti\xE8re, il peut contourner son application de\
          \ politique pour faire passer le trafic normalement interdit \xE0 travers\
          \ la fronti\xE8re de confiance entre les deux r\xE9seaux s\xE9par\xE9s sans\
          \ entrave.  En obtenant des droits suffisants sur l\u2019appareil, un adversaire\
          \ peut reconfigurer l\u2019appareil pour permettre le trafic souhait\xE9\
          , ce qui lui permet d\u2019atteindre des objectifs tels que le commandement\
          \ et le contr\xF4le via [Proxy multi-saut](https://attack.mitre.org/techniques/T1090/003)\
          \ ou l\u2019exfiltration des donn\xE9es via [Duplication du trafic](https://attack.mitre.org/techniques/T1020/001).\
          \ Les adversaires peuvent \xE9galement cibler les dispositifs internes responsables\
          \ de la segmentation du r\xE9seau et en abuser en conjonction avec [Proxy\
          \ interne](https://attack.mitre.org/techniques/T1090/001) pour atteindre\
          \ les m\xEAmes objectifs. (Citation : Kaspersky ThreatNeedle f\xE9vr. 2021)\
          \  Dans les cas o\xF9 un dispositif frontalier s\xE9pare deux organisations\
          \ distinctes, l\u2019adversaire peut \xE9galement faciliter un d\xE9placement\
          \ lat\xE9ral vers de nouveaux environnements de victimes.\nhttps://attack.mitre.org/techniques/T1599"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1599.001
    ref_id: T1599.001
    name: Network Address Translation Traversal
    description: "Adversaries may bridge network boundaries by modifying a network\
      \ device\u2019s Network Address Translation (NAT) configuration. Malicious modifications\
      \ to NAT may enable an adversary to bypass restrictions on traffic routing that\
      \ otherwise separate trusted and untrusted networks.\n\nNetwork devices such\
      \ as routers and firewalls that connect multiple networks together may implement\
      \ NAT during the process of passing packets between networks. When performing\
      \ NAT, the network device will rewrite the source and/or destination addresses\
      \ of the IP address header. Some network designs require NAT for the packets\
      \ to cross the border device.  A typical example of this is environments where\
      \ internal networks make use of non-Internet routable addresses.(Citation: RFC1918)\n\
      \nWhen an adversary gains control of a network boundary device, they may modify\
      \ NAT configurations to send traffic between two separated networks, or to obscure\
      \ their activities.  In network designs that require NAT to function, such modifications\
      \ enable the adversary to overcome inherent routing limitations that would normally\
      \ prevent them from accessing protected systems behind the border device.  In\
      \ network designs that do not require NAT, adversaries may use address translation\
      \ to further obscure their activities, as changing the addresses of packets\
      \ that traverse a network boundary device can make monitoring data transmissions\
      \ more challenging for defenders.  \n\nAdversaries may use [Patch System Image](https://attack.mitre.org/techniques/T1601/001)\
      \ to change the operating system of a network device, implementing their own\
      \ custom NAT mechanisms to further obscure their activities.\nhttps://attack.mitre.org/techniques/T1599/001"
    translations:
      fr:
        name: "Travers\xE9e de traduction d\u2019adresses r\xE9seau"
        description: "Les adversaires peuvent franchir les fronti\xE8res du r\xE9\
          seau en modifiant la configuration de traduction d\u2019adresses r\xE9seau\
          \ (NAT) d\u2019un appareil r\xE9seau. Des modifications malveillantes du\
          \ NAT peuvent permettre \xE0 un adversaire de contourner les restrictions\
          \ sur le routage du trafic qui s\xE9pareraient autrement les r\xE9seaux\
          \ de confiance et non fiables.\n\nLes dispositifs r\xE9seau tels que les\
          \ routeurs et les pare-feux qui relient plusieurs r\xE9seaux peuvent impl\xE9\
          menter le NAT lors du transfert de paquets entre r\xE9seaux. Lors de l\u2019\
          ex\xE9cution du NAT, le dispositif r\xE9seau r\xE9\xE9crit les adresses\
          \ source et/ou destination de l\u2019en-t\xEAte d\u2019adresse IP. Certains\
          \ r\xE9seaux n\xE9cessitent un NAT pour que les paquets traversent le p\xE9\
          riph\xE9rique frontalier.  Un exemple typique de cela est celui des environnements\
          \ o\xF9 les r\xE9seaux internes utilisent des adresses routables non Internet.\
          \ (Citation : RFC1918)\n\nLorsqu\u2019un adversaire prend le contr\xF4le\
          \ d\u2019un dispositif de fronti\xE8re r\xE9seau, il peut modifier les configurations\
          \ NAT pour envoyer du trafic entre deux r\xE9seaux s\xE9par\xE9s, ou pour\
          \ masquer ses activit\xE9s.  Dans les conceptions de r\xE9seau n\xE9cessitant\
          \ un NAT pour fonctionner, de telles modifications permettent \xE0 l\u2019\
          adversaire de surmonter des limitations de routage inh\xE9rentes qui l\u2019\
          emp\xEAcheraient normalement d\u2019acc\xE9der aux syst\xE8mes prot\xE9\
          g\xE9s derri\xE8re le dispositif frontalier.  Dans les conceptions de r\xE9\
          seaux ne n\xE9cessitant pas de NAT, les adversaires peuvent utiliser la\
          \ traduction d\u2019adresses pour masquer davantage leurs activit\xE9s,\
          \ car modifier les adresses des paquets traversant un dispositif de fronti\xE8\
          re r\xE9seau peut rendre la surveillance des transmissions de donn\xE9es\
          \ plus difficile pour les d\xE9fenseurs.  \n\nLes adversaires peuvent utiliser\
          \ [Patch System Image](https://attack.mitre.org/techniques/T1601/001) pour\
          \ modifier le syst\xE8me d\u2019exploitation d\u2019un appareil r\xE9seau,\
          \ en impl\xE9mentant leurs propres m\xE9canismes NAT personnalis\xE9s pour\
          \ masquer davantage leurs activit\xE9s.\nhttps://attack.mitre.org/techniques/T1599/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1600
    ref_id: T1600
    name: Weaken Encryption
    description: "Adversaries may compromise a network device\u2019s encryption capability\
      \ in order to bypass encryption that would otherwise protect data communications.(Citation:\
      \ Cisco Synful Knock Evolution)\n\nEncryption can be used to protect transmitted\
      \ network traffic to maintain its confidentiality (protect against unauthorized\
      \ disclosure) and integrity (protect against unauthorized changes). Encryption\
      \ ciphers are used to convert a plaintext message to ciphertext and can be computationally\
      \ intensive to decipher without the associated decryption key. Typically, longer\
      \ keys increase the cost of cryptanalysis, or decryption without the key.\n\n\
      Adversaries can compromise and manipulate devices that perform encryption of\
      \ network traffic. For example, through behaviors such as [Modify System Image](https://attack.mitre.org/techniques/T1601),\
      \ [Reduce Key Space](https://attack.mitre.org/techniques/T1600/001), and [Disable\
      \ Crypto Hardware](https://attack.mitre.org/techniques/T1600/002), an adversary\
      \ can negatively effect and/or eliminate a device\u2019s ability to securely\
      \ encrypt network traffic. This poses a greater risk of unauthorized disclosure\
      \ and may help facilitate data manipulation, Credential Access, or Collection\
      \ efforts.(Citation: Cisco Blog Legacy Device Attacks)"
    translations:
      fr:
        name: Affaiblir le chiffrement
        description: "Les adversaires peuvent compromettre la capacit\xE9 de chiffrement\
          \ d\u2019un dispositif r\xE9seau afin de contourner un chiffrement qui prot\xE9\
          gerait autrement les communications de donn\xE9es. (Citation : Cisco Synful\
          \ Knock Evolution)\n\nLe chiffrement peut \xEAtre utilis\xE9 pour prot\xE9\
          ger le trafic r\xE9seau transmis afin de pr\xE9server sa confidentialit\xE9\
          \ (protection contre la divulgation non autoris\xE9e) et son int\xE9grit\xE9\
          \ (protection contre les modifications non autoris\xE9es). Les chiffres\
          \ de chiffrement sont utilis\xE9s pour convertir un message en texte clair\
          \ en texte chiffr\xE9 et peuvent \xEAtre tr\xE8s gourmands en calcul \xE0\
          \ d\xE9chiffrer sans la cl\xE9 de d\xE9chiffrement associ\xE9e. En g\xE9\
          n\xE9ral, des cl\xE9s plus longues augmentent le co\xFBt de la cryptanalyse,\
          \ ou du d\xE9chiffrement sans la cl\xE9.\n\nLes adversaires peuvent compromettre\
          \ et manipuler les appareils qui r\xE9alisent le chiffrement du trafic r\xE9\
          seau. Par exemple, par des comportements tels que [Modifier l\u2019image\
          \ syst\xE8me](https://attack.mitre.org/techniques/T1601), [R\xE9duire l\u2019\
          espace de cl\xE9s](https://attack.mitre.org/techniques/T1600/001) et [D\xE9\
          sactiver le mat\xE9riel crypto](https://attack.mitre.org/techniques/T1600/002),\
          \ un adversaire peut affecter n\xE9gativement et/ou \xE9liminer la capacit\xE9\
          \ d\u2019un appareil \xE0 chiffrer le trafic r\xE9seau en toute s\xE9curit\xE9\
          . Cela pr\xE9sente un risque accru de divulgation non autoris\xE9e et peut\
          \ faciliter la manipulation des donn\xE9es, l\u2019acc\xE8s aux accr\xE9\
          ditations ou les efforts de collecte. (Citation : Attaques d\u2019appareils\
          \ h\xE9rit\xE9s du blog Cisco)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1600.001
    ref_id: T1600.001
    name: Reduce Key Space
    description: 'Adversaries may reduce the level of effort required to decrypt data
      transmitted over the network by reducing the cipher strength of encrypted communications.(Citation:
      Cisco Synful Knock Evolution)


      Adversaries can weaken the encryption software on a compromised network device
      by reducing the key size used by the software to convert plaintext to ciphertext
      (e.g., from hundreds or thousands of bytes to just a couple of bytes). As a
      result, adversaries dramatically reduce the amount of effort needed to decrypt
      the protected information without the key.


      Adversaries may modify the key size used and other encryption parameters using
      specialized commands in a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      introduced to the system through [Modify System Image](https://attack.mitre.org/techniques/T1601)
      to change the configuration of the device. (Citation: Cisco Blog Legacy Device
      Attacks)

      https://attack.mitre.org/techniques/T1600/001'
    translations:
      fr:
        name: "R\xE9duire l\u2019espace de touche"
        description: "Les adversaires peuvent r\xE9duire le niveau d\u2019effort n\xE9\
          cessaire pour d\xE9chiffrer les donn\xE9es transmises sur le r\xE9seau en\
          \ diminuant la puissance du chiffrement des communications chiffr\xE9es.\
          \ (Citation : Cisco Synful Knock Evolution)\n\nLes adversaires peuvent affaiblir\
          \ le logiciel de chiffrement sur un appareil r\xE9seau compromis en r\xE9\
          duisant la taille de la cl\xE9 utilis\xE9e par le logiciel pour convertir\
          \ le texte clair en texte chiffr\xE9 (par exemple, de centaines ou milliers\
          \ d\u2019octets \xE0 seulement quelques octets). En cons\xE9quence, les\
          \ adversaires r\xE9duisent consid\xE9rablement l\u2019effort n\xE9cessaire\
          \ pour d\xE9chiffrer les informations prot\xE9g\xE9es sans la cl\xE9.\n\n\
          Les adversaires peuvent modifier la taille de la cl\xE9 utilis\xE9e et d\u2019\
          autres param\xE8tres de chiffrement \xE0 l\u2019aide de commandes sp\xE9\
          cialis\xE9es dans une [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ introduite au syst\xE8me via [Modifier image syst\xE8me](https://attack.mitre.org/techniques/T1601)\
          \ pour modifier la configuration de l\u2019appareil. (Citation : Attaques\
          \ d\u2019appareils h\xE9rit\xE9s du blog Cisco)\nhttps://attack.mitre.org/techniques/T1600/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1600.002
    ref_id: T1600.002
    name: Disable Crypto Hardware
    description: "Adversaries disable a network device\u2019s dedicated hardware encryption,\
      \ which may enable them to leverage weaknesses in software encryption in order\
      \ to reduce the effort involved in collecting, manipulating, and exfiltrating\
      \ transmitted data.\n\nMany network devices such as routers, switches, and firewalls,\
      \ perform encryption on network traffic to secure transmission across networks.\
      \ Often, these devices are equipped with special, dedicated encryption hardware\
      \ to greatly increase the speed of the encryption process as well as to prevent\
      \ malicious tampering. When an adversary takes control of such a device, they\
      \ may disable the dedicated hardware, for example, through use of [Modify System\
      \ Image](https://attack.mitre.org/techniques/T1601), forcing the use of software\
      \ to perform encryption on general processors. This is typically used in conjunction\
      \ with attacks to weaken the strength of the cipher in software (e.g., [Reduce\
      \ Key Space](https://attack.mitre.org/techniques/T1600/001)). (Citation: Cisco\
      \ Blog Legacy Device Attacks)\nhttps://attack.mitre.org/techniques/T1600/002"
    translations:
      fr:
        name: "D\xE9sactiver le mat\xE9riel crypto"
        description: "Les adversaires d\xE9sactivent le chiffrement mat\xE9riel d\xE9\
          di\xE9 d\u2019un appareil r\xE9seau, ce qui peut leur permettre de tirer\
          \ parti des faiblesses du chiffrement logiciel afin de r\xE9duire l\u2019\
          effort n\xE9cessaire \xE0 la collecte, la manipulation et l\u2019exfiltration\
          \ des donn\xE9es transmises.\n\nDe nombreux dispositifs r\xE9seau, tels\
          \ que routeurs, commutateurs et pare-feux, r\xE9alisent un chiffrement du\
          \ trafic r\xE9seau pour s\xE9curiser la transmission entre r\xE9seaux. Souvent,\
          \ ces dispositifs sont \xE9quip\xE9s d\u2019un mat\xE9riel de chiffrement\
          \ sp\xE9cial et d\xE9di\xE9 pour augmenter consid\xE9rablement la vitesse\
          \ du processus de chiffrement ainsi que pour pr\xE9venir toute falsification\
          \ malveillante. Lorsqu\u2019un adversaire prend le contr\xF4le d\u2019un\
          \ tel dispositif, il peut d\xE9sactiver le mat\xE9riel d\xE9di\xE9, par\
          \ exemple en utilisant [Modifier l\u2019image syst\xE8me](https://attack.mitre.org/techniques/T1601),\
          \ for\xE7ant l\u2019utilisation de logiciels pour effectuer le chiffrement\
          \ des processeurs g\xE9n\xE9raux. Cela est g\xE9n\xE9ralement utilis\xE9\
          \ en conjonction avec des attaques visant \xE0 affaiblir la puissance du\
          \ chiffre dans le logiciel (par exemple, [R\xE9duire l\u2019espace de cl\xE9\
          s](https://attack.mitre.org/techniques/T1600/001)). (Citation : Attaques\
          \ d\u2019appareils h\xE9rit\xE9s du blog Cisco)\nhttps://attack.mitre.org/techniques/T1600/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1601
    ref_id: T1601
    name: Modify System Image
    description: 'Adversaries may make changes to the operating system of embedded
      network devices to weaken defenses and provide new capabilities for themselves.  On
      such devices, the operating systems are typically monolithic and most of the
      device functionality and capabilities are contained within a single file.


      To change the operating system, the adversary typically only needs to affect
      this one file, replacing or modifying it.  This can either be done live in memory
      during system runtime for immediate effect, or in storage to implement the change
      on the next boot of the network device.

      https://attack.mitre.org/techniques/T1601'
    translations:
      fr:
        name: "Modifier l\u2019image du syst\xE8me"
        description: "Les adversaires peuvent modifier le syst\xE8me d\u2019exploitation\
          \ des dispositifs r\xE9seau embarqu\xE9s pour affaiblir les d\xE9fenses\
          \ et s\u2019offrir de nouvelles capacit\xE9s.  Sur ces appareils, les syst\xE8\
          mes d\u2019exploitation sont g\xE9n\xE9ralement monolithiques et la plupart\
          \ des fonctionnalit\xE9s et capacit\xE9s des dispositifs sont contenues\
          \ dans un seul fichier.\n\nPour changer le syst\xE8me d\u2019exploitation,\
          \ l\u2019adversaire n\u2019a g\xE9n\xE9ralement qu\u2019\xE0 affecter ce\
          \ seul fichier, en le rempla\xE7ant ou en le modifiant.  Cela peut \xEA\
          tre fait en temps r\xE9el en m\xE9moire pendant l\u2019ex\xE9cution du syst\xE8\
          me pour un effet imm\xE9diat, ou en stockage pour impl\xE9menter le changement\
          \ au d\xE9marrage suivant du p\xE9riph\xE9rique r\xE9seau.\nhttps://attack.mitre.org/techniques/T1601"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1601.001
    ref_id: T1601.001
    name: Patch System Image
    description: "Adversaries may modify the operating system of a network device\
      \ to introduce new capabilities or weaken existing defenses.(Citation: Killing\
      \ the myth of Cisco IOS rootkits) (Citation: Killing IOS diversity myth) (Citation:\
      \ Cisco IOS Shellcode) (Citation: Cisco IOS Forensics Developments) (Citation:\
      \ Juniper Netscreen of the Dead) Some network devices are built with a monolithic\
      \ architecture, where the entire operating system and most of the functionality\
      \ of the device is contained within a single file.  Adversaries may change this\
      \ file in storage, to be loaded in a future boot, or in memory during runtime.\n\
      \nTo change the operating system in storage, the adversary will typically use\
      \ the standard procedures available to device operators. This may involve downloading\
      \ a new file via typical protocols used on network devices, such as TFTP, FTP,\
      \ SCP, or a console connection.  The original file may be overwritten, or a\
      \ new file may be written alongside of it and the device reconfigured to boot\
      \ to the compromised image.\n\nTo change the operating system in memory, the\
      \ adversary typically can use one of two methods. In the first, the adversary\
      \ would make use of native debug commands in the original, unaltered running\
      \ operating system that allow them to directly modify the relevant memory addresses\
      \ containing the running operating system.  This method typically requires administrative\
      \ level access to the device.\n\nIn the second method for changing the operating\
      \ system in memory, the adversary would make use of the boot loader. The boot\
      \ loader is the first piece of software that loads when the device starts that,\
      \ in turn, will launch the operating system.  Adversaries may use malicious\
      \ code previously implanted in the boot loader, such as through the [ROMMONkit](https://attack.mitre.org/techniques/T1542/004)\
      \ method, to directly manipulate running operating system code in memory.  This\
      \ malicious code in the bootloader provides the capability of direct memory\
      \ manipulation to the adversary, allowing them to patch the live operating system\
      \ during runtime.\n\nBy modifying the instructions stored in the system image\
      \ file, adversaries may either weaken existing defenses or provision new capabilities\
      \ that the device did not have before. Examples of existing defenses that can\
      \ be impeded include encryption, via [Weaken Encryption](https://attack.mitre.org/techniques/T1600),\
      \ authentication, via [Network Device Authentication](https://attack.mitre.org/techniques/T1556/004),\
      \ and perimeter defenses, via [Network Boundary Bridging](https://attack.mitre.org/techniques/T1599).\
      \  Adding new capabilities for the adversary\u2019s purpose include [Keylogging](https://attack.mitre.org/techniques/T1056/001),\
      \ [Multi-hop Proxy](https://attack.mitre.org/techniques/T1090/003), and [Port\
      \ Knocking](https://attack.mitre.org/techniques/T1205/001).\n\nAdversaries may\
      \ also compromise existing commands in the operating system to produce false\
      \ output to mislead defenders.   When this method is used in conjunction with\
      \ [Downgrade System Image](https://attack.mitre.org/techniques/T1601/002), one\
      \ example of a compromised system command may include changing the output of\
      \ the command that shows the version of the currently running operating system.\
      \  By patching the operating system, the adversary can change this command to\
      \ instead display the original, higher revision number that they replaced through\
      \ the system downgrade. \n\nWhen the operating system is patched in storage,\
      \ this can be achieved in either the resident storage (typically a form of flash\
      \ memory, which is non-volatile) or via [TFTP Boot](https://attack.mitre.org/techniques/T1542/005).\
      \ \n\nWhen the technique is performed on the running operating system in memory\
      \ and not on the stored copy, this technique will not survive across reboots.\
      \  However, live memory modification of the operating system can be combined\
      \ with [ROMMONkit](https://attack.mitre.org/techniques/T1542/004) to achieve\
      \ persistence.\nhttps://attack.mitre.org/techniques/T1601/001"
    translations:
      fr:
        name: "Image du syst\xE8me de patchs"
        description: "Les attaquants peuvent modifier le syst\xE8me d'exploitation\
          \ d'un p\xE9riph\xE9rique r\xE9seau afin d'y introduire de nouvelles fonctionnalit\xE9\
          s ou d'affaiblir les d\xE9fenses existantes. (R\xE9f\xE9rence : \xAB Killing\
          \ the myth of Cisco IOS rootkits \xBB) (R\xE9f\xE9rence : \xAB Killing IOS\
          \ diversity myth \xBB) (R\xE9f\xE9rence : \xAB Cisco IOS Shellcode \xBB\
          ) (R\xE9f\xE9rence : \xAB Cisco IOS Forensics Developments \xBB) (R\xE9\
          f\xE9rence : \xAB Juniper Netscreen of the Dead \xBB) Certains p\xE9riph\xE9\
          riques r\xE9seau sont con\xE7us selon une architecture monolithique, dans\
          \ laquelle l\u2019ensemble du syst\xE8me d\u2019exploitation et la plupart\
          \ des fonctionnalit\xE9s du p\xE9riph\xE9rique sont contenus dans un seul\
          \ fichier. Les attaquants peuvent modifier ce fichier soit sur le support\
          \ de stockage, pour qu\u2019il soit charg\xE9 lors d\u2019un prochain d\xE9\
          marrage, soit en m\xE9moire pendant l\u2019ex\xE9cution.\n\nPour modifier\
          \ le syst\xE8me d\u2019exploitation stock\xE9, l\u2019attaquant utilise\
          \ g\xE9n\xE9ralement les proc\xE9dures standard mises \xE0 la disposition\
          \ des op\xE9rateurs du p\xE9riph\xE9rique. Cela peut impliquer le t\xE9\
          l\xE9chargement d\u2019un nouveau fichier via les protocoles couramment\
          \ utilis\xE9s sur les p\xE9riph\xE9riques r\xE9seau, tels que TFTP, FTP,\
          \ SCP, ou via une connexion console. Le fichier d\u2019origine peut \xEA\
          tre \xE9cras\xE9, ou un nouveau fichier peut \xEAtre enregistr\xE9 \xE0\
          \ c\xF4t\xE9 de celui-ci, puis le p\xE9riph\xE9rique reconfigur\xE9 pour\
          \ d\xE9marrer \xE0 partir de l\u2019image compromise.\n\nPour modifier le\
          \ syst\xE8me d\u2019exploitation en m\xE9moire, l\u2019attaquant peut g\xE9\
          n\xE9ralement recourir \xE0 l\u2019une des deux m\xE9thodes suivantes. Dans\
          \ la premi\xE8re, l\u2019attaquant utilise les commandes de d\xE9bogage\
          \ natives du syst\xE8me d\u2019exploitation d\u2019origine, en cours d\u2019\
          ex\xE9cution et non alt\xE9r\xE9, qui lui permettent de modifier directement\
          \ les adresses m\xE9moire concern\xE9es contenant le syst\xE8me d\u2019\
          exploitation en cours d\u2019ex\xE9cution.  Cette m\xE9thode n\xE9cessite\
          \ g\xE9n\xE9ralement un acc\xE8s de niveau administrateur au dispositif.\n\
          \nDans la deuxi\xE8me m\xE9thode permettant de modifier le syst\xE8me d'exploitation\
          \ en m\xE9moire, l'attaquant exploiterait le chargeur d'amor\xE7age. Le\
          \ chargeur d'amor\xE7age est le premier logiciel charg\xE9 au d\xE9marrage\
          \ de l'appareil ; c'est lui qui, \xE0 son tour, lance le syst\xE8me d'exploitation.\
          \  Les attaquants peuvent utiliser du code malveillant pr\xE9alablement\
          \ implant\xE9 dans le chargeur d\u2019amor\xE7age, par exemple via la m\xE9\
          thode [ROMMONkit](https://attack.mitre.org/techniques/T1542/004), pour manipuler\
          \ directement le code du syst\xE8me d\u2019exploitation en cours d\u2019\
          ex\xE9cution en m\xE9moire. Ce code malveillant pr\xE9sent dans le chargeur\
          \ d\u2019amor\xE7age offre \xE0 l\u2019attaquant la possibilit\xE9 de manipuler\
          \ directement la m\xE9moire, ce qui lui permet de modifier le syst\xE8me\
          \ d\u2019exploitation en cours d\u2019ex\xE9cution.\n\nEn modifiant les\
          \ instructions stock\xE9es dans le fichier d\u2019image syst\xE8me, les\
          \ attaquants peuvent soit affaiblir les d\xE9fenses existantes, soit doter\
          \ l\u2019appareil de nouvelles capacit\xE9s dont il ne disposait pas auparavant.\
          \ Parmi les d\xE9fenses existantes susceptibles d\u2019\xEAtre contourn\xE9\
          es, on peut citer le chiffrement, via [Weaken Encryption](https://attack.mitre.org/techniques/T1600),\
          \ l\u2019authentification, via [l\u2019authentification des p\xE9riph\xE9\
          riques r\xE9seau](https://attack.mitre.org/techniques/T1556/004), et les\
          \ d\xE9fenses p\xE9rim\xE9triques, via [le contournement des fronti\xE8\
          res r\xE9seau](https://attack.mitre.org/techniques/T1599).  Parmi les nouvelles\
          \ capacit\xE9s mises au service de l\u2019attaquant, on trouve l\u2019[enregistrement\
          \ de frappe](https://attack.mitre.org/techniques/T1056/001), [proxy multi-sauts](https://attack.mitre.org/techniques/T1090/003)\
          \ et [le \xAB port knocking \xBB](https://attack.mitre.org/techniques/T1205/001).\n\
          \nLes attaquants peuvent \xE9galement compromettre des commandes existantes\
          \ du syst\xE8me d\u2019exploitation afin de g\xE9n\xE9rer des r\xE9sultats\
          \ erron\xE9s destin\xE9s \xE0 induire les d\xE9fenseurs en erreur. Lorsque\
          \ cette m\xE9thode est utilis\xE9e en conjonction avec [Downgrade System\
          \ Image](https://attack.mitre.org/techniques/T1601/002), un exemple de commande\
          \ syst\xE8me compromise pourrait consister \xE0 modifier le r\xE9sultat\
          \ de la commande affichant la version du syst\xE8me d\u2019exploitation\
          \ actuellement en cours d\u2019ex\xE9cution.  En appliquant un correctif\
          \ au syst\xE8me d\u2019exploitation, l\u2019attaquant peut modifier cette\
          \ commande afin qu\u2019elle affiche \xE0 la place le num\xE9ro de r\xE9\
          vision d\u2019origine, plus \xE9lev\xE9, qu\u2019il a remplac\xE9 lors de\
          \ la r\xE9trogradation du syst\xE8me. \n\nLorsque le syst\xE8me d\u2019\
          exploitation est modifi\xE9 en m\xE9moire, cela peut se faire soit dans\
          \ la m\xE9moire r\xE9sidente (g\xE9n\xE9ralement une forme de m\xE9moire\
          \ flash, qui est non volatile), soit via [le d\xE9marrage TFTP](https://attack.mitre.org/techniques/T1542/005).\
          \ \n\nLorsque cette technique est appliqu\xE9e au syst\xE8me d\u2019exploitation\
          \ en cours d\u2019ex\xE9cution en m\xE9moire et non \xE0 la copie stock\xE9\
          e, elle ne survit pas aux red\xE9marrages.  Cependant, la modification en\
          \ temps r\xE9el de la m\xE9moire du syst\xE8me d\u2019exploitation peut\
          \ \xEAtre combin\xE9e avec [ROMMONkit](https://attack.mitre.org/techniques/T1542/004)\
          \ pour assurer la persistance.\nhttps://attack.mitre.org/techniques/T1601/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1601.002
    ref_id: T1601.002
    name: Downgrade System Image
    description: 'Adversaries may install an older version of the operating system
      of a network device to weaken security.  Older operating system versions on
      network devices often have weaker encryption ciphers and, in general, fewer/less
      updated defensive features. (Citation: Cisco Synful Knock Evolution)


      On embedded devices, downgrading the version typically only requires replacing
      the operating system file in storage.  With most embedded devices, this can
      be achieved by downloading a copy of the desired version of the operating system
      file and reconfiguring the device to boot from that file on next system restart.  The
      adversary could then restart the device to implement the change immediately
      or they could wait until the next time the system restarts.


      Downgrading the system image to an older versions may allow an adversary to
      evade defenses by enabling behaviors such as [Weaken Encryption](https://attack.mitre.org/techniques/T1600).  Downgrading
      of a system image can be done on its own, or it can be used in conjunction with
      [Patch System Image](https://attack.mitre.org/techniques/T1601/001).

      https://attack.mitre.org/techniques/T1601/002'
    translations:
      fr:
        name: "Image syst\xE8me r\xE9trograd\xE9e"
        description: "Les adversaires peuvent installer une version plus ancienne\
          \ du syst\xE8me d\u2019exploitation d\u2019un appareil r\xE9seau pour affaiblir\
          \ la s\xE9curit\xE9.  Les anciennes versions des syst\xE8mes d\u2019exploitation\
          \ sur les appareils r\xE9seau ont souvent des chiffrements de chiffrement\
          \ plus faibles et, en g\xE9n\xE9ral, moins ou moins de fonctionnalit\xE9\
          s d\xE9fensives mises \xE0 jour. (Citation : Cisco Synful Knock Evolution)\n\
          \nSur les appareils embarqu\xE9s, r\xE9trograder la version n\xE9cessite\
          \ g\xE9n\xE9ralement seulement de remplacer le fichier du syst\xE8me d\u2019\
          exploitation dans le stockage.  Avec la plupart des p\xE9riph\xE9riques\
          \ embarqu\xE9s, cela peut \xEAtre r\xE9alis\xE9 en t\xE9l\xE9chargeant une\
          \ copie de la version souhait\xE9e du fichier du syst\xE8me d\u2019exploitation\
          \ et en reconfigurant l\u2019appareil pour qu\u2019il d\xE9marre \xE0 partir\
          \ de ce fichier lors du red\xE9marrage du syst\xE8me suivant.  L\u2019adversaire\
          \ pouvait alors red\xE9marrer l\u2019appareil pour mettre en \u0153uvre\
          \ le changement imm\xE9diatement ou attendre la prochaine reprise du syst\xE8\
          me.\n\nR\xE9trograder l\u2019image syst\xE8me vers des versions plus anciennes\
          \ peut permettre \xE0 un adversaire d\u2019\xE9chapper aux d\xE9fenses en\
          \ activant des comportements tels que [Affaiblir le chiffrement](https://attack.mitre.org/techniques/T1600).\
          \  La r\xE9trogradation d\u2019une image syst\xE8me peut \xEAtre effectu\xE9\
          e seule, ou peut \xEAtre utilis\xE9e conjointement avec [Patch System Image](https://attack.mitre.org/techniques/T1601/001).\n\
          https://attack.mitre.org/techniques/T1601/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1602
    ref_id: T1602
    name: Data from Configuration Repository
    description: 'Adversaries may collect data related to managed devices from configuration
      repositories. Configuration repositories are used by management systems in order
      to configure, manage, and control data on remote systems. Configuration repositories
      may also facilitate remote access and administration of devices.


      Adversaries may target these repositories in order to collect large quantities
      of sensitive system administration data. Data from configuration repositories
      may be exposed by various protocols and software and can store a wide variety
      of data, much of which may align with adversary Discovery objectives.(Citation:
      US-CERT-TA18-106A)(Citation: US-CERT TA17-156A SNMP Abuse 2017)

      https://attack.mitre.org/techniques/T1602'
    translations:
      fr:
        name: "Donn\xE9es du d\xE9p\xF4t de configuration"
        description: "Les adversaires peuvent collecter des donn\xE9es li\xE9es aux\
          \ dispositifs g\xE9r\xE9s \xE0 partir de d\xE9p\xF4ts de configuration.\
          \ Les d\xE9p\xF4ts de configuration sont utilis\xE9s par les syst\xE8mes\
          \ de gestion afin de configurer, g\xE9rer et contr\xF4ler les donn\xE9es\
          \ sur les syst\xE8mes distants. Les d\xE9p\xF4ts de configuration peuvent\
          \ \xE9galement faciliter l\u2019acc\xE8s et l\u2019administration \xE0 distance\
          \ des appareils.\n\nLes adversaires peuvent cibler ces d\xE9p\xF4ts afin\
          \ de collecter de grandes quantit\xE9s de donn\xE9es sensibles d\u2019administration\
          \ syst\xE8me. Les donn\xE9es provenant de d\xE9p\xF4ts de configuration\
          \ peuvent \xEAtre expos\xE9es par divers protocoles et logiciels et peuvent\
          \ stocker une grande vari\xE9t\xE9 de donn\xE9es, dont beaucoup peuvent\
          \ correspondre aux objectifs de Discovery adverses. (Citation : US-CERT-TA18-106A)(Citation\
          \ : US-CERT TA17-156A Abus SNMP 2017)\nhttps://attack.mitre.org/techniques/T1602"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1602.001
    ref_id: T1602.001
    name: SNMP (MIB Dump)
    description: 'Adversaries may target the Management Information Base (MIB) to
      collect and/or mine valuable information in a network managed using Simple Network
      Management Protocol (SNMP).


      The MIB is a configuration repository that stores variable information accessible
      via SNMP in the form of object identifiers (OID). Each OID identifies a variable
      that can be read or set and permits active management tasks, such as configuration
      changes, through remote modification of these variables. SNMP can give administrators
      great insight in their systems, such as, system information, description of
      hardware, physical location, and software packages(Citation: SANS Information
      Security Reading Room Securing SNMP Securing SNMP). The MIB may also contain
      device operational information, including running configuration, routing table,
      and interface details.


      Adversaries may use SNMP queries to collect MIB content directly from SNMP-managed
      devices in order to collect network information that allows the adversary to
      build network maps and facilitate future targeted exploitation.(Citation: US-CERT-TA18-106A)(Citation:
      Cisco Blog Legacy Device Attacks)

      https://attack.mitre.org/techniques/T1602/001'
    translations:
      fr:
        name: SNMP (Dump MIB)
        description: "Les adversaires peuvent cibler la Base d\u2019Information de\
          \ Gestion (MIB) pour collecter et/ou exploiter des informations pr\xE9cieuses\
          \ dans un r\xE9seau g\xE9r\xE9 selon le protocole simple de gestion r\xE9\
          seau (SNMP).\n\nLe MIB est un d\xE9p\xF4t de configuration qui stocke des\
          \ informations variables accessibles via SNMP sous forme d\u2019identifiants\
          \ d\u2019objet (OID). Chaque OID identifie une variable pouvant \xEAtre\
          \ lue ou d\xE9finie et permet des t\xE2ches de gestion active, telles que\
          \ des modifications de configuration, par modification \xE0 distance de\
          \ ces variables. Le SNMP peut offrir aux administrateurs une grande connaissance\
          \ de leurs syst\xE8mes, telles que les informations syst\xE8me, la description\
          \ du mat\xE9riel, l\u2019emplacement physique et les logiciels (Citation\
          \ : SANS Information Security Reading Room Securing SNMP Securing SNMP).\
          \ Le MIB peut \xE9galement contenir des informations op\xE9rationnelles\
          \ sur les appareils, y compris la configuration en cours, la table de routage\
          \ et les d\xE9tails de l\u2019interface.\n\nLes adversaires peuvent utiliser\
          \ des requ\xEAtes SNMP pour collecter directement du contenu MIB \xE0 partir\
          \ d\u2019appareils g\xE9r\xE9s par SNMP afin de collecter des informations\
          \ r\xE9seau permettant \xE0 l\u2019adversaire de construire des cartes r\xE9\
          seau et de faciliter une exploitation cibl\xE9e future. (Citation : US-CERT-TA18-106A)(Citation\
          \ : Attaques d\u2019appareils h\xE9rit\xE9s du blog Cisco)\nhttps://attack.mitre.org/techniques/T1602/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1602.002
    ref_id: T1602.002
    name: Network Device Configuration Dump
    description: 'Adversaries may access network configuration files to collect sensitive
      data about the device and the network. The network configuration is a file containing
      parameters that determine the operation of the device. The device typically
      stores an in-memory copy of the configuration while operating, and a separate
      configuration on non-volatile storage to load after device reset. Adversaries
      can inspect the configuration files to reveal information about the target network
      and its layout, the network device and its software, or identifying legitimate
      accounts and credentials for later use.


      Adversaries can use common management tools and protocols, such as Simple Network
      Management Protocol (SNMP) and Smart Install (SMI), to access network configuration
      files.(Citation: US-CERT TA18-106A Network Infrastructure Devices 2018)(Citation:
      Cisco Blog Legacy Device Attacks) These tools may be used to query specific
      data from a configuration repository or configure the device to export the configuration
      for later analysis.

      https://attack.mitre.org/techniques/T1602/002'
    translations:
      fr:
        name: "Vidage de configuration des p\xE9riph\xE9riques r\xE9seau"
        description: "Les adversaires peuvent acc\xE9der aux fichiers de configuration\
          \ r\xE9seau pour collecter des donn\xE9es sensibles sur l\u2019appareil\
          \ et le r\xE9seau. La configuration r\xE9seau est un fichier contenant des\
          \ param\xE8tres qui d\xE9terminent le fonctionnement de l\u2019appareil.\
          \ L\u2019appareil stocke g\xE9n\xE9ralement une copie en m\xE9moire de la\
          \ configuration pendant le fonctionnement, et une configuration s\xE9par\xE9\
          e sur un stockage non volatil pour charger apr\xE8s la r\xE9initialisation\
          \ de l\u2019appareil. Les adversaires peuvent inspecter les fichiers de\
          \ configuration pour r\xE9v\xE9ler des informations sur le r\xE9seau cible\
          \ et sa configuration, le dispositif r\xE9seau et son logiciel, ou identifier\
          \ des comptes et identifiants l\xE9gitimes pour une utilisation ult\xE9\
          rieure.\n\nLes adversaires peuvent utiliser des outils et protocoles de\
          \ gestion courants, tels que le protocole de gestion r\xE9seau simple (SNMP)\
          \ et l\u2019installation intelligente (SMI), pour acc\xE9der aux fichiers\
          \ de configuration r\xE9seau. (Citation : US-CERT TA18-106A Dispositifs\
          \ d\u2019infrastructure r\xE9seau 2018)(Citation : Attaques d\u2019appareils\
          \ h\xE9rit\xE9s du blog Cisco) Ces outils peuvent \xEAtre utilis\xE9s pour\
          \ interroger des donn\xE9es sp\xE9cifiques d\u2019un d\xE9p\xF4t de configuration\
          \ ou configurer l\u2019appareil pour exporter la configuration en vue d\u2019\
          une analyse ult\xE9rieure.\nhttps://attack.mitre.org/techniques/T1602/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1606
    ref_id: T1606
    name: Forge Web Credentials
    description: 'Adversaries may forge credential materials that can be used to gain
      access to web applications or Internet services. Web applications and services
      (hosted in cloud SaaS environments or on-premise servers) often use session
      cookies, tokens, or other materials to authenticate and authorize user access.


      Adversaries may generate these credential materials in order to gain access
      to web resources. This differs from [Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539),
      [Steal Application Access Token](https://attack.mitre.org/techniques/T1528),
      and other similar behaviors in that the credentials are new and forged by the
      adversary, rather than stolen or intercepted from legitimate users.


      The generation of web credentials often requires secret values, such as passwords,
      [Private Keys](https://attack.mitre.org/techniques/T1552/004), or other cryptographic
      seed values.(Citation: GitHub AWS-ADFS-Credential-Generator) Adversaries may
      also forge tokens by taking advantage of features such as the `AssumeRole` and
      `GetFederationToken` APIs in AWS, which allow users to request temporary security
      credentials (i.e., [Temporary Elevated Cloud Access](https://attack.mitre.org/techniques/T1548/005)),
      or the `zmprov gdpak` command in Zimbra, which generates a pre-authentication
      key that can be used to generate tokens for any user in the domain.(Citation:
      AWS Temporary Security Credentials)(Citation: Zimbra Preauth)


      Once forged, adversaries may use these web credentials to access resources (ex:
      [Use Alternate Authentication Material](https://attack.mitre.org/techniques/T1550)),
      which may bypass multi-factor and other authentication protection mechanisms.(Citation:
      Pass The Cookie)(Citation: Unit 42 Mac Crypto Cookies January 2019)(Citation:
      Microsoft SolarWinds Customer Guidance)

      https://attack.mitre.org/techniques/T1606'
    translations:
      fr:
        name: Identifiants web Forge
        description: "Les adversaires peuvent falsifier des documents d\u2019accr\xE9\
          ditation qui peuvent \xEAtre utilis\xE9s pour acc\xE9der \xE0 des applications\
          \ web ou des services Internet. Les applications et services web (h\xE9\
          berg\xE9s dans des environnements SaaS cloud ou des serveurs sur site) utilisent\
          \ souvent des cookies de session, des jetons ou d\u2019autres supports pour\
          \ authentifier et autoriser l\u2019acc\xE8s des utilisateurs.\n\nLes adversaires\
          \ peuvent g\xE9n\xE9rer ces documents d\u2019accr\xE9ditation afin d\u2019\
          acc\xE9der \xE0 des ressources web. Cela diff\xE8re de [Steal Web Session\
          \ Cookie](https://attack.mitre.org/techniques/T1539), [Steal Application\
          \ Access Token](https://attack.mitre.org/techniques/T1528) et d\u2019autres\
          \ comportements similaires en ce que les identifiants sont nouveaux et falsifi\xE9\
          s par l\u2019adversaire, plut\xF4t que vol\xE9s ou intercept\xE9s par des\
          \ utilisateurs l\xE9gitimes.\n\nLa g\xE9n\xE9ration des identifiants web\
          \ n\xE9cessite souvent des valeurs secr\xE8tes, telles que des mots de passe,\
          \ des [cl\xE9s priv\xE9es](https://attack.mitre.org/techniques/T1552/004)\
          \ ou d\u2019autres valeurs de graine cryptographiques. (Citation : GitHub\
          \ AWS-ADFS-Credential-Generator) Les adversaires peuvent \xE9galement falsifier\
          \ des jetons en profitant de fonctionnalit\xE9s telles que les API \xAB\
          \ AssumeRole \xBB et \xAB GetFederationToken \xBB dans AWS, qui permettent\
          \ aux utilisateurs de demander des identifiants de s\xE9curit\xE9 temporaires\
          \ (par exemple, [Temporary Elevated Cloud Access](https://attack.mitre.org/techniques/T1548/005)),\
          \ ou la commande \xAB zmprov gdpak \xBB dans Zimbra, qui g\xE9n\xE8re une\
          \ cl\xE9 de pr\xE9-authentification pouvant \xEAtre utilis\xE9e pour g\xE9\
          n\xE9rer des jetons pour n\u2019importe quel utilisateur du domaine. (Citation\
          \ : Identifiants de s\xE9curit\xE9 temporaires AWS)(Citation : Zimbra Preauth)\n\
          \nUne fois falsifi\xE9s, les adversaires peuvent utiliser ces identifiants\
          \ web pour acc\xE9der \xE0 des ressources (ex : [Utiliser du mat\xE9riel\
          \ d\u2019authentification alternatif](https://attack.mitre.org/techniques/T1550)),\
          \ ce qui peut contourner les m\xE9canismes de protection multifactoriels\
          \ et autres. (Citation : Passe le biscuit)(Citation : Cookies crypto Mac\
          \ Unit 42 janvier 2019)(Citation : Guide client Microsoft SolarWinds)\n\
          https://attack.mitre.org/techniques/T1606"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1606.001
    ref_id: T1606.001
    name: Web Cookies
    description: 'Adversaries may forge web cookies that can be used to gain access
      to web applications or Internet services. Web applications and services (hosted
      in cloud SaaS environments or on-premise servers) often use session cookies
      to authenticate and authorize user access.


      Adversaries may generate these cookies in order to gain access to web resources.
      This differs from [Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)
      and other similar behaviors in that the cookies are new and forged by the adversary,
      rather than stolen or intercepted from legitimate users. Most common web applications
      have standardized and documented cookie values that can be generated using provided
      tools or interfaces.(Citation: Pass The Cookie) The generation of web cookies
      often requires secret values, such as passwords, [Private Keys](https://attack.mitre.org/techniques/T1552/004),
      or other cryptographic seed values.


      Once forged, adversaries may use these web cookies to access resources ([Web
      Session Cookie](https://attack.mitre.org/techniques/T1550/004)), which may bypass
      multi-factor and other authentication protection mechanisms.(Citation: Volexity
      SolarWinds)(Citation: Pass The Cookie)(Citation: Unit 42 Mac Crypto Cookies
      January 2019)

      https://attack.mitre.org/techniques/T1606/001'
    translations:
      fr:
        name: Web Cookies
        description: "Les adversaires peuvent falsifier des cookies web qui peuvent\
          \ \xEAtre utilis\xE9s pour acc\xE9der \xE0 des applications web ou \xE0\
          \ des services Internet. Les applications et services web (h\xE9berg\xE9\
          s dans des environnements SaaS cloud ou des serveurs sur site) utilisent\
          \ souvent des cookies de session pour authentifier et autoriser l\u2019\
          acc\xE8s des utilisateurs.\n\nLes adversaires peuvent g\xE9n\xE9rer ces\
          \ cookies afin d\u2019acc\xE9der aux ressources web. Cela diff\xE8re de\
          \ [Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)\
          \ et d\u2019autres comportements similaires en ce que les cookies sont nouveaux\
          \ et falsifi\xE9s par l\u2019adversaire, plut\xF4t que vol\xE9s ou intercept\xE9\
          s aupr\xE8s d\u2019utilisateurs l\xE9gitimes. La plupart des applications\
          \ web courantes disposent de valeurs de cookies standardis\xE9es et document\xE9\
          es qui peuvent \xEAtre g\xE9n\xE9r\xE9es \xE0 l\u2019aide des outils ou\
          \ interfaces fournis. (Citation : Passe le biscuit) La g\xE9n\xE9ration\
          \ de cookies web n\xE9cessite souvent des valeurs secr\xE8tes, telles que\
          \ des mots de passe, des [Cl\xE9s Priv\xE9es](https://attack.mitre.org/techniques/T1552/004)\
          \ ou d\u2019autres valeurs de d\xE9part cryptographiques.\n\nUne fois forg\xE9\
          s, les adversaires peuvent utiliser ces cookies web pour acc\xE9der \xE0\
          \ des ressources ([Web Session Cookie](https://attack.mitre.org/techniques/T1550/004)),\
          \ ce qui peut contourner les m\xE9canismes de protection multifactorielle\
          \ et autres m\xE9canismes d\u2019authentification. (Citation : Volexity\
          \ SolarWinds)(Citation : Passe le biscuit)(Citation : Cookies crypto Mac\
          \ Unit 42 janvier 2019)\nhttps://attack.mitre.org/techniques/T1606/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1606.002
    ref_id: T1606.002
    name: SAML Tokens
    description: 'An adversary may forge SAML tokens with any permissions claims and
      lifetimes if they possess a valid SAML token-signing certificate.(Citation:
      Microsoft SolarWinds Steps) The default lifetime of a SAML token is one hour,
      but the validity period can be specified in the <code>NotOnOrAfter</code> value
      of the <code>conditions ...</code> element in a token. This value can be changed
      using the <code>AccessTokenLifetime</code> in a <code>LifetimeTokenPolicy</code>.(Citation:
      Microsoft SAML Token Lifetimes) Forged SAML tokens enable adversaries to authenticate
      across services that use SAML 2.0 as an SSO (single sign-on) mechanism.(Citation:
      Cyberark Golden SAML)


      An adversary may utilize [Private Keys](https://attack.mitre.org/techniques/T1552/004)
      to compromise an organization''s token-signing certificate to create forged
      SAML tokens. If the adversary has sufficient permissions to establish a new
      federation trust with their own Active Directory Federation Services (AD FS)
      server, they may instead generate their own trusted token-signing certificate.(Citation:
      Microsoft SolarWinds Customer Guidance) This differs from [Steal Application
      Access Token](https://attack.mitre.org/techniques/T1528) and other similar behaviors
      in that the tokens are new and forged by the adversary, rather than stolen or
      intercepted from legitimate users.


      An adversary may gain administrative Entra ID privileges if a SAML token is
      forged which claims to represent a highly privileged account. This may lead
      to [Use Alternate Authentication Material](https://attack.mitre.org/techniques/T1550),
      which may bypass multi-factor and other authentication protection mechanisms.(Citation:
      Microsoft SolarWinds Customer Guidance)

      https://attack.mitre.org/techniques/T1606/002'
    translations:
      fr:
        name: Jetons SAML
        description: "Un adversaire peut falsifier des jetons SAML avec toutes les\
          \ permissions, revendications et dur\xE9es de vie s\u2019il poss\xE8de un\
          \ certificat de signature de jeton SAML valide. (Citation : \xC9tapes Microsoft\
          \ SolarWinds) La dur\xE9e de vie par d\xE9faut d\u2019un jeton SAML est\
          \ d\u2019une heure, mais la p\xE9riode de validit\xE9 peut \xEAtre sp\xE9\
          cifi\xE9e dans la valeur <code>NotOnOrAfter</code> de <code>l\u2019\xE9\
          l\xE9ment de conditions ...</code> dans un jeton. Cette valeur peut \xEA\
          tre modifi\xE9e en utilisant <code>l\u2019AccessTokenLifetime</code> dans\
          \ une <code>LifetimeTokenPolicy</code>. (Citation : Dur\xE9e de vie des\
          \ jetons Microsoft SAML) Les jetons SAML falsifi\xE9s permettent aux adversaires\
          \ de s\u2019authentifier entre des services utilisant SAML 2.0 comme m\xE9\
          canisme SSO (connexion unique). (Citation : Cyberark Golden SAML)\n\nUn\
          \ adversaire peut utiliser [Cl\xE9s priv\xE9es](https://attack.mitre.org/techniques/T1552/004)\
          \ pour compromettre le certificat de signature de jeton d\u2019une organisation\
          \ afin de cr\xE9er des jetons SAML falsifi\xE9s. Si l\u2019adversaire dispose\
          \ de suffisamment d\u2019autorisations pour \xE9tablir un nouveau trust\
          \ de f\xE9d\xE9ration avec son propre serveur Active Directory Federation\
          \ Services (AD FS), il peut alors g\xE9n\xE9rer son propre certificat de\
          \ signature de jeton de confiance. (Citation : Guide client Microsoft SolarWinds)\
          \ Cela diff\xE8re de [Steal Application Access Token](https://attack.mitre.org/techniques/T1528)\
          \ et d\u2019autres comportements similaires en ce que les jetons sont nouveaux\
          \ et falsifi\xE9s par l\u2019adversaire, plut\xF4t que vol\xE9s ou intercept\xE9\
          s aupr\xE8s d\u2019utilisateurs l\xE9gitimes.\n\nUn adversaire peut obtenir\
          \ des privil\xE8ges administratifs d\u2019Entra ID si un jeton SAML est\
          \ falsifi\xE9 et pr\xE9tend repr\xE9senter un compte hautement privil\xE9\
          gi\xE9. Cela peut conduire \xE0 [Utiliser Mat\xE9riel d\u2019Authentification\
          \ Alternatif](https://attack.mitre.org/techniques/T1550), qui peut contourner\
          \ les m\xE9canismes de protection multifactoriels et autres. (Citation :\
          \ Guide client Microsoft SolarWinds)\nhttps://attack.mitre.org/techniques/T1606/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608
    ref_id: T1608
    name: Stage Capabilities
    description: 'Adversaries may upload, install, or otherwise set up capabilities
      that can be used during targeting. To support their operations, an adversary
      may need to take capabilities they developed ([Develop Capabilities](https://attack.mitre.org/techniques/T1587))
      or obtained ([Obtain Capabilities](https://attack.mitre.org/techniques/T1588))
      and stage them on infrastructure under their control. These capabilities may
      be staged on infrastructure that was previously purchased/rented by the adversary
      ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)) or was
      otherwise compromised by them ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).
      Capabilities may also be staged on web services, such as GitHub or Pastebin,
      or on Platform-as-a-Service (PaaS) offerings that enable users to easily provision
      applications.(Citation: Volexity Ocean Lotus November 2020)(Citation: Dragos
      Heroku Watering Hole)(Citation: Malwarebytes Heroku Skimmers)(Citation: Netskope
      GCP Redirection)(Citation: Netskope Cloud Phishing)


      Staging of capabilities can aid the adversary in a number of initial access
      and post-compromise behaviors, including (but not limited to):


      * Staging web resources necessary to conduct [Drive-by Compromise](https://attack.mitre.org/techniques/T1189)
      when a user browses to a site.(Citation: FireEye CFR Watering Hole 2012)(Citation:
      Gallagher 2015)(Citation: ATT ScanBox)

      * Staging web resources for a link target to be used with spearphishing.(Citation:
      Malwarebytes Silent Librarian October 2020)(Citation: Proofpoint TA407 September
      2019)

      * Uploading malware or tools to a location accessible to a victim network to
      enable [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105).(Citation:
      Volexity Ocean Lotus November 2020)

      * Installing a previously acquired SSL/TLS certificate to use to encrypt command
      and control traffic (ex: [Asymmetric Cryptography](https://attack.mitre.org/techniques/T1573/002)
      with [Web Protocols](https://attack.mitre.org/techniques/T1071/001)).(Citation:
      DigiCert Install SSL Cert)

      https://attack.mitre.org/techniques/T1608'
    translations:
      fr:
        name: "Capacit\xE9s des \xE9tages"
        description: "Les adversaires peuvent t\xE9l\xE9charger, installer ou configurer\
          \ autrement des capacit\xE9s qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Pour soutenir leurs op\xE9rations, un adversaire peut devoir prendre des\
          \ capacit\xE9s qu\u2019il a d\xE9velopp\xE9es ([D\xE9velopper des capacit\xE9\
          s](https://attack.mitre.org/techniques/T1587)) ou obtenues ([Obtenir des\
          \ capacit\xE9s](https://attack.mitre.org/techniques/T1588)) et les placer\
          \ sur une infrastructure sous son contr\xF4le. Ces capacit\xE9s peuvent\
          \ \xEAtre mises en place sur des infrastructures qui ont \xE9t\xE9 pr\xE9\
          c\xE9demment achet\xE9es/lou\xE9es par l\u2019adversaire ([Acqu\xE9rir des\
          \ infrastructures](https://attack.mitre.org/techniques/T1583)) ou qui ont\
          \ \xE9t\xE9 autrement compromises par ce dernier ([Infrastructure de compromis](https://attack.mitre.org/techniques/T1584)).\
          \ Les capacit\xE9s peuvent \xE9galement \xEAtre mises en place sur des services\
          \ web, tels que GitHub ou Pastebin, ou sur des offres Platform-as-a-Service\
          \ (PaaS) qui permettent aux utilisateurs de provisionner facilement des\
          \ applications. (Citation : Volexity Ocean Lotus novembre 2020)(Citation\
          \ : Repaire Dragos Heroku)(Citation : Skimmers Heroku de Malwarebytes)(Citation\
          \ : Redirection Netskope GCP)(Citation : Phishing dans le cloud Netskope)\n\
          \nLa mise en phase des capacit\xE9s peut aider l\u2019adversaire dans un\
          \ certain nombre de comportements d\u2019acc\xE8s initial et post-compromis,\
          \ notamment (mais sans s\u2019y limiter) :\n\n* Mise en sc\xE8ne des ressources\
          \ web n\xE9cessaires pour effectuer une [Compromettre en voiture](https://attack.mitre.org/techniques/T1189)\
          \ lorsqu\u2019un utilisateur navigue sur un site. (Citation : FireEye CFR\
          \ Watering Hole 2012)(Citation : Gallagher 2015)(Citation : ATT ScanBox)\n\
          * Mise en sc\xE8ne de ressources web pour une cible de lien \xE0 utiliser\
          \ avec le spearphishing. (Citation : Malwarebytes Silent Librarian octobre\
          \ 2020)(Citation : Proofpoint TA407 septembre 2019)\n* T\xE9l\xE9verser\
          \ des logiciels malveillants ou des outils vers un lieu accessible \xE0\
          \ un r\xE9seau victime pour permettre [Transfert d\u2019outil d\u2019entr\xE9\
          e](https://attack.mitre.org/techniques/T1105). (Citation : Volexity Ocean\
          \ Lotus novembre 2020)\n* Installation d\u2019un certificat SSL/TLS acquis\
          \ pr\xE9c\xE9demment pour chiffrer le trafic de commande et de contr\xF4\
          le (ex : [Cryptographie asym\xE9trique](https://attack.mitre.org/techniques/T1573/002)\
          \ avec [Protocoles Web](https://attack.mitre.org/techniques/T1071/001)).\
          \ (Citation : Certificat SSL d\u2019installation DigiCert)\nhttps://attack.mitre.org/techniques/T1608"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608.001
    ref_id: T1608.001
    name: Upload Malware
    description: 'Adversaries may upload malware to third-party or adversary controlled
      infrastructure to make it accessible during targeting. Malicious software can
      include payloads, droppers, post-compromise tools, backdoors, and a variety
      of other malicious content. Adversaries may upload malware to support their
      operations, such as making a payload available to a victim network to enable
      [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105) by placing
      it on an Internet accessible web server.


      Malware may be placed on infrastructure that was previously purchased/rented
      by the adversary ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583))
      or was otherwise compromised by them ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).
      Malware can also be staged on web services, such as GitHub or Pastebin; hosted
      on the InterPlanetary File System (IPFS), where decentralized content storage
      makes the removal of malicious files difficult; or saved on the blockchain as
      smart contracts, which are resilient against takedowns that would affect traditional
      infrastructure.(Citation: Volexity Ocean Lotus November 2020)(Citation: Talos
      IPFS 2022)(Citation: Guardio Etherhiding 2023)(Citation: Bleeping Computer Binance
      Smart Chain 2023)


      Adversaries may upload backdoored files, such as software packages, application
      binaries, virtual machine images, or container images, to third-party software
      stores, package libraries, extension marketplaces, or repositories (ex: GitHub,
      CNET, AWS Community AMIs, Docker Hub, PyPi, NPM).(Citation: Datadog Security
      Labs Malicious PyPi Packages 2024) By chance encounter, victims may directly
      download/install these backdoored files via [User Execution](https://attack.mitre.org/techniques/T1204).
      Masquerading, including typosquatting legitimate software, may increase the
      chance of users mistakenly executing these files.

      https://attack.mitre.org/techniques/T1608/001'
    translations:
      fr:
        name: "T\xE9l\xE9verser un malware"
        description: "Les adversaires peuvent t\xE9l\xE9charger des malwares sur des\
          \ infrastructures contr\xF4l\xE9es par des tiers ou des adversaires pour\
          \ les rendre accessibles lors du ciblage. Les logiciels malveillants peuvent\
          \ inclure des charges utiles, des droppers, des outils post-compromis, des\
          \ portes d\xE9rob\xE9es et une vari\xE9t\xE9 d\u2019autres contenus malveillants.\
          \ Les adversaires peuvent t\xE9l\xE9charger des logiciels malveillants pour\
          \ soutenir leurs op\xE9rations, par exemple en mettant \xE0 disposition\
          \ une charge utile d\u2019un r\xE9seau victime pour permettre [Ingress Tool\
          \ Transfer](https://attack.mitre.org/techniques/T1105) en la pla\xE7ant\
          \ sur un serveur web accessible sur Internet.\n\nDes logiciels malveillants\
          \ peuvent \xEAtre plac\xE9s sur des infrastructures pr\xE9c\xE9demment achet\xE9\
          es/lou\xE9es par l\u2019adversaire ([Acqu\xE9rir l\u2019infrastructure](https://attack.mitre.org/techniques/T1583))\
          \ ou autrement compromises par ce dernier ([Compromettre l\u2019infrastructure](https://attack.mitre.org/techniques/T1584)).\
          \ Les malwares peuvent \xE9galement \xEAtre mis en sc\xE8ne sur des services\
          \ web, tels que GitHub ou Pastebin ; h\xE9berg\xE9 sur l\u2019InterPlanetary\
          \ File System (IPFS), o\xF9 le stockage d\xE9centralis\xE9 du contenu rend\
          \ difficile la suppression des fichiers malveillants ; Ou sauvegard\xE9\
          s sur la blockchain sous forme de contrats intelligents, qui sont r\xE9\
          silients face aux retraits qui affecteraient les infrastructures traditionnelles.\
          \ (Citation : Volexity Ocean Lotus novembre 2020)(Citation : Talos IPFS\
          \ 2022)(Citation : Guardio Etherhiding 2023)(Citation : Cha\xEEne intelligente\
          \ Binance 2023 de l\u2019ordinateur bip)\n\nLes adversaires peuvent t\xE9\
          l\xE9charger des fichiers \xE0 porte d\xE9rob\xE9e, tels que des logiciels\
          \ ou des binaires d\u2019applications, des images de machines virtuelles\
          \ ou des images de conteneurs, vers des magasins de logiciels tiers, des\
          \ biblioth\xE8ques de paquets, des places de march\xE9 d\u2019extensions\
          \ ou des d\xE9p\xF4ts (ex : GitHub, CNET, AWS Community AMIs, Docker Hub,\
          \ PyPi, NPM). (Citation : Datadog Security Labs Packages PyPi malveillants\
          \ 2024) Par rencontre fortuite, les victimes peuvent t\xE9l\xE9charger ou\
          \ installer directement ces fichiers en backdoor via [User Execution](https://attack.mitre.org/techniques/T1204).\
          \ Le masquerading, y compris le typosquatting de logiciels l\xE9gitimes,\
          \ peut augmenter les risques que les utilisateurs ex\xE9cutent ces fichiers\
          \ par erreur.\nhttps://attack.mitre.org/techniques/T1608/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608.002
    ref_id: T1608.002
    name: Upload Tool
    description: 'Adversaries may upload tools to third-party or adversary controlled
      infrastructure to make it accessible during targeting. Tools can be open or
      closed source, free or commercial. Tools can be used for malicious purposes
      by an adversary, but (unlike malware) were not intended to be used for those
      purposes (ex: [PsExec](https://attack.mitre.org/software/S0029)). Adversaries
      may upload tools to support their operations, such as making a tool available
      to a victim network to enable [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)
      by placing it on an Internet accessible web server.


      Tools may be placed on infrastructure that was previously purchased/rented by
      the adversary ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583))
      or was otherwise compromised by them ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).(Citation:
      Dell TG-3390) Tools can also be staged on web services, such as an adversary
      controlled GitHub repo, or on Platform-as-a-Service offerings that enable users
      to easily provision applications.(Citation: Dragos Heroku Watering Hole)(Citation:
      Malwarebytes Heroku Skimmers)(Citation: Intezer App Service Phishing)


      Adversaries can avoid the need to upload a tool by having compromised victim
      machines download the tool directly from a third-party hosting location (ex:
      a non-adversary controlled GitHub repo), including the original hosting site
      of the tool.

      https://attack.mitre.org/techniques/T1608/002'
    translations:
      fr:
        name: "Outil de t\xE9l\xE9versement"
        description: "Les adversaires peuvent t\xE9l\xE9charger des outils sur des\
          \ infrastructures contr\xF4l\xE9es par un tiers ou un adversaire pour les\
          \ rendre accessibles lors du ciblage. Les outils peuvent \xEAtre open source\
          \ ou ferm\xE9, gratuits ou commerciaux. Les outils peuvent \xEAtre utilis\xE9\
          s \xE0 des fins malveillantes par un adversaire, mais (contrairement aux\
          \ logiciels malveillants) n\u2019\xE9taient pas destin\xE9s \xE0 \xEAtre\
          \ utilis\xE9s \xE0 ces fins (ex : [PsExec](https://attack.mitre.org/software/S0029)).\
          \ Les adversaires peuvent t\xE9l\xE9charger des outils pour soutenir leurs\
          \ op\xE9rations, comme mettre un outil \xE0 disposition d\u2019un r\xE9\
          seau victime permettant de permettre [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)\
          \ en le pla\xE7ant sur un serveur web accessible sur Internet.\n\nLes outils\
          \ peuvent \xEAtre plac\xE9s sur des infrastructures qui ont \xE9t\xE9 pr\xE9\
          c\xE9demment achet\xE9es/lou\xE9es par l\u2019adversaire ([Acqu\xE9rir des\
          \ infrastructures](https://attack.mitre.org/techniques/T1583)) ou qui ont\
          \ \xE9t\xE9 autrement compromises par ce dernier ([Compromission des infrastructures](https://attack.mitre.org/techniques/T1584)).\
          \ (Citation : Dell TG-3390) Les outils peuvent \xE9galement \xEAtre d\xE9\
          ploy\xE9s sur des services web, tels qu\u2019un d\xE9p\xF4t GitHub contr\xF4\
          l\xE9 par un adversaire, ou sur des offres Platform-as-a-Service permettant\
          \ aux utilisateurs de provisionner facilement des applications. (Citation\
          \ : Repaire Dragos Heroku)(Citation : Skimmers Heroku de Malwarebytes)(Citation\
          \ : Phishing du service d\u2019applications Intezer)\n\nLes adversaires\
          \ peuvent \xE9viter de t\xE9l\xE9charger un outil en faisant t\xE9l\xE9\
          charger l\u2019outil directement par des machines victimes \xE0 partir d\u2019\
          un lieu d\u2019h\xE9bergement tiers (ex : un d\xE9p\xF4t GitHub non contr\xF4\
          l\xE9 par un adversaire), y compris le site d\u2019h\xE9bergement original\
          \ de l\u2019outil.\nhttps://attack.mitre.org/techniques/T1608/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608.003
    ref_id: T1608.003
    name: Install Digital Certificate
    description: "Adversaries may install SSL/TLS certificates that can be used during\
      \ targeting. SSL/TLS certificates are files that can be installed on servers\
      \ to enable secure communications between systems. Digital certificates include\
      \ information about the key, information about its owner's identity, and the\
      \ digital signature of an entity that has verified the certificate's contents\
      \ are correct. If the signature is valid, and the person examining the certificate\
      \ trusts the signer, then they know they can use that key to communicate securely\
      \ with its owner. Certificates can be uploaded to a server, then the server\
      \ can be configured to use the certificate to enable encrypted communication\
      \ with it.(Citation: DigiCert Install SSL Cert)\n\nAdversaries may install SSL/TLS\
      \ certificates that can be used to further their operations, such as encrypting\
      \ C2 traffic (ex: [Asymmetric Cryptography](https://attack.mitre.org/techniques/T1573/002)\
      \ with [Web Protocols](https://attack.mitre.org/techniques/T1071/001)) or lending\
      \ credibility to a credential harvesting site. Installation of digital certificates\
      \ may take place for a number of server types, including web servers and email\
      \ servers. \n\nAdversaries can obtain digital certificates (see [Digital Certificates](https://attack.mitre.org/techniques/T1588/004))\
      \ or create self-signed certificates (see [Digital Certificates](https://attack.mitre.org/techniques/T1587/003)).\
      \ Digital certificates can then be installed on adversary controlled infrastructure\
      \ that may have been acquired ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583))\
      \ or previously compromised ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).\n\
      https://attack.mitre.org/techniques/T1608/003"
    translations:
      fr:
        name: "Installer le certificat num\xE9rique"
        description: "Les adversaires peuvent installer des certificats SSL/TLS qui\
          \ peuvent \xEAtre utilis\xE9s lors du ciblage. Les certificats SSL/TLS sont\
          \ des fichiers pouvant \xEAtre install\xE9s sur des serveurs pour permettre\
          \ des communications s\xE9curis\xE9es entre syst\xE8mes. Les certificats\
          \ num\xE9riques incluent des informations sur la cl\xE9, des informations\
          \ sur l\u2019identit\xE9 de son propri\xE9taire, ainsi que la signature\
          \ num\xE9rique d\u2019une entit\xE9 ayant v\xE9rifi\xE9 que le contenu du\
          \ certificat est correct. Si la signature est valide et que la personne\
          \ qui examine le certificat fait confiance au signataire, elle sait alors\
          \ qu\u2019elle peut utiliser cette cl\xE9 pour communiquer en toute s\xE9\
          curit\xE9 avec son propri\xE9taire. Les certificats peuvent \xEAtre t\xE9\
          l\xE9charg\xE9s sur un serveur, puis le serveur peut \xEAtre configur\xE9\
          \ pour utiliser le certificat afin d\u2019autoriser une communication chiffr\xE9\
          e avec celui-ci. (Citation : Certificat SSL d\u2019installation DigiCert)\n\
          \nLes adversaires peuvent installer des certificats SSL/TLS qui peuvent\
          \ \xEAtre utilis\xE9s pour faire avancer leurs op\xE9rations, comme le chiffrement\
          \ du trafic C2 (ex : [Cryptographie asym\xE9trique](https://attack.mitre.org/techniques/T1573/002)\
          \ avec [Protocoles Web](https://attack.mitre.org/techniques/T1071/001))\
          \ ou la cr\xE9dibilit\xE9 d\u2019un site de collecte d\u2019identifiants.\
          \ L\u2019installation de certificats num\xE9riques peut avoir lieu pour\
          \ plusieurs types de serveurs, y compris les serveurs web et les serveurs\
          \ de messagerie. \n\nLes adversaires peuvent obtenir des certificats num\xE9\
          riques (voir [Certificats num\xE9riques](https://attack.mitre.org/techniques/T1588/004))\
          \ ou cr\xE9er des certificats auto-sign\xE9s (voir [Certificats num\xE9\
          riques](https://attack.mitre.org/techniques/T1587/003)). Les certificats\
          \ num\xE9riques peuvent alors \xEAtre install\xE9s sur des infrastructures\
          \ contr\xF4l\xE9es par l\u2019adversaire qui peuvent avoir \xE9t\xE9 acquises\
          \ ([Acqu\xE9rir des infrastructures](https://attack.mitre.org/techniques/T1583))\
          \ ou d\xE9j\xE0 compromises ([Infrastructure de compromis](https://attack.mitre.org/techniques/T1584)).\n\
          https://attack.mitre.org/techniques/T1608/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608.004
    ref_id: T1608.004
    name: Drive-by Target
    description: 'Adversaries may prepare an operational environment to infect systems
      that visit a website over the normal course of browsing. Endpoint systems may
      be compromised through browsing to adversary controlled sites, as in [Drive-by
      Compromise](https://attack.mitre.org/techniques/T1189). In such cases, the user''s
      web browser is typically targeted for exploitation (often not requiring any
      extra user interaction once landing on the site), but adversaries may also set
      up websites for non-exploitation behavior such as [Application Access Token](https://attack.mitre.org/techniques/T1550/001).
      Prior to [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), adversaries
      must stage resources needed to deliver that exploit to users who browse to an
      adversary controlled site. Drive-by content can be staged on adversary controlled
      infrastructure that has been acquired ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583))
      or previously compromised ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).


      Adversaries may upload or inject malicious web content, such as [JavaScript](https://attack.mitre.org/techniques/T1059/007),
      into websites.(Citation: FireEye CFR Watering Hole 2012)(Citation: Gallagher
      2015) This may be done in a number of ways, including:


      * Inserting malicious scripts into web pages or other user controllable web
      content such as forum posts

      * Modifying script files served to websites from publicly writeable cloud storage
      buckets

      * Crafting malicious web advertisements and purchasing ad space on a website
      through legitimate ad providers (i.e., [Malvertising](https://attack.mitre.org/techniques/T1583/008))


      In addition to staging content to exploit a user''s web browser, adversaries
      may also stage scripting content to profile the user''s browser (as in [Gather
      Victim Host Information](https://attack.mitre.org/techniques/T1592)) to ensure
      it is vulnerable prior to attempting exploitation.(Citation: ATT ScanBox)


      Websites compromised by an adversary and used to stage a drive-by may be ones
      visited by a specific community, such as government, a particular industry,
      or region, where the goal is to compromise a specific user or set of users based
      on a shared interest. This kind of targeted campaign is referred to a strategic
      web compromise or watering hole attack.


      Adversaries may purchase domains similar to legitimate domains (ex: homoglyphs,
      typosquatting, different top-level domain, etc.) during acquisition of infrastructure
      ([Domains](https://attack.mitre.org/techniques/T1583/001)) to help facilitate
      [Drive-by Compromise](https://attack.mitre.org/techniques/T1189).

      https://attack.mitre.org/techniques/T1608/004'
    translations:
      fr:
        name: Cible en voiture
        description: "Les adversaires peuvent pr\xE9parer un environnement op\xE9\
          rationnel pour infecter les syst\xE8mes qui visitent un site web au cours\
          \ du processus normal de navigation. Les syst\xE8mes de terminaison peuvent\
          \ \xEAtre compromis en naviguant vers des sites contr\xF4l\xE9s par l\u2019\
          adversaire, comme dans [Compromission en voiture](https://attack.mitre.org/techniques/T1189).\
          \ Dans de tels cas, le navigateur web de l\u2019utilisateur est g\xE9n\xE9\
          ralement cibl\xE9 pour exploitation (souvent sans n\xE9cessiter d\u2019\
          interaction suppl\xE9mentaire une fois arriv\xE9 sur le site), mais les\
          \ adversaires peuvent aussi configurer des sites web pour des comportements\
          \ non li\xE9s \xE0 l\u2019exploitation, tels que [Application Access Token](https://attack.mitre.org/techniques/T1550/001).\
          \ Avant le [Compromis en voiture](https://attack.mitre.org/techniques/T1189),\
          \ les adversaires doivent mettre en place les ressources n\xE9cessaires\
          \ pour livrer cet exploit aux utilisateurs qui naviguent sur un site contr\xF4\
          l\xE9 par l\u2019adversaire. Le contenu en voiture peut \xEAtre mis en sc\xE8\
          ne sur une infrastructure contr\xF4l\xE9e par l\u2019adversaire qui a \xE9\
          t\xE9 acquise ([Acquisition d\u2019infrastructure](https://attack.mitre.org/techniques/T1583))\
          \ ou pr\xE9c\xE9demment compromise ([Infrastructure de compromis](https://attack.mitre.org/techniques/T1584)).\n\
          \nLes adversaires peuvent t\xE9l\xE9charger ou injecter du contenu web malveillant,\
          \ tel que [JavaScript](https://attack.mitre.org/techniques/T1059/007), sur\
          \ des sites web. (Citation : FireEye CFR Watering Hole 2012)(Citation :\
          \ Gallagher 2015) Cela peut se faire de plusieurs mani\xE8res, notamment\
          \ :\n\n* Insertion de scripts malveillants dans des pages web ou d\u2019\
          autres contenus web contr\xF4lables par l\u2019utilisateur, tels que les\
          \ publications sur des forums\n* Modification des fichiers scripts servis\
          \ aux sites web depuis des seuils de stockage cloud publiquement \xE9crivables\n\
          * Cr\xE9er des publicit\xE9s web malveillantes et acheter de l\u2019espace\
          \ publicitaire sur un site via des fournisseurs publicitaires l\xE9gitimes\
          \ (c\u2019est-\xE0-dire [Malvertising](https://attack.mitre.org/techniques/T1583/008))\n\
          \nEn plus de mettre en sc\xE8ne du contenu pour exploiter le navigateur\
          \ web d\u2019un utilisateur, les adversaires peuvent \xE9galement mettre\
          \ en sc\xE8ne le script du contenu pour profiler le navigateur de l\u2019\
          utilisateur (comme dans [Collecter les informations de l\u2019h\xF4te de\
          \ la victime](https://attack.mitre.org/techniques/T1592)) afin de garantir\
          \ sa vuln\xE9rabilit\xE9 avant de tenter l\u2019exploitation. (Citation\
          \ : ATT ScanBox)\n\nLes sites web compromis par un adversaire et utilis\xE9\
          s pour organiser une fusillade en voiture peuvent \xEAtre visit\xE9s par\
          \ une communaut\xE9 sp\xE9cifique, telle que le gouvernement, une industrie\
          \ ou une r\xE9gion particuli\xE8re, dont l\u2019objectif est de compromettre\
          \ un utilisateur ou un ensemble d\u2019utilisateurs en raison d\u2019un\
          \ int\xE9r\xEAt commun. Ce type de campagne cibl\xE9e est appel\xE9 une\
          \ attaque strat\xE9gique de cybercriminalisation ou une attaque de points\
          \ d\u2019eau.\n\nLes adversaires peuvent acheter des domaines similaires\
          \ \xE0 des domaines l\xE9gitimes (ex : homoglyphes, typosquatting, diff\xE9\
          rents domaines de premier niveau, etc.) lors de l\u2019acquisition d\u2019\
          infrastructures ([Domaines](https://attack.mitre.org/techniques/T1583/001))\
          \ afin de faciliter la [Transaction Drive-by](https://attack.mitre.org/techniques/T1189).\n\
          https://attack.mitre.org/techniques/T1608/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608.005
    ref_id: T1608.005
    name: Link Target
    description: "Adversaries may put in place resources that are referenced by a\
      \ link that can be used during targeting. An adversary may rely upon a user\
      \ clicking a malicious link in order to divulge information (including credentials)\
      \ or to gain execution, as in [Malicious Link](https://attack.mitre.org/techniques/T1204/001).\
      \ Links can be used for spearphishing, such as sending an email accompanied\
      \ by social engineering text to coax the user to actively click or copy and\
      \ paste a URL into a browser. Prior to a phish for information (as in [Spearphishing\
      \ Link](https://attack.mitre.org/techniques/T1598/003)) or a phish to gain initial\
      \ access to a system (as in [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002)),\
      \ an adversary must set up the resources for a link target for the spearphishing\
      \ link. \n\nTypically, the resources for a link target will be an HTML page\
      \ that may include some client-side script such as [JavaScript](https://attack.mitre.org/techniques/T1059/007)\
      \ to decide what content to serve to the user. Adversaries may clone legitimate\
      \ sites to serve as the link target, this can include cloning of login pages\
      \ of legitimate web services or organization login pages in an effort to harvest\
      \ credentials during [Spearphishing Link](https://attack.mitre.org/techniques/T1598/003).(Citation:\
      \ Malwarebytes Silent Librarian October 2020)(Citation: Proofpoint TA407 September\
      \ 2019) Adversaries may also [Upload Malware](https://attack.mitre.org/techniques/T1608/001)\
      \ and have the link target point to malware for download/execution by the user.\n\
      \nAdversaries may purchase domains similar to legitimate domains (ex: homoglyphs,\
      \ typosquatting, different top-level domain, etc.) during acquisition of infrastructure\
      \ ([Domains](https://attack.mitre.org/techniques/T1583/001)) to help facilitate\
      \ [Malicious Link](https://attack.mitre.org/techniques/T1204/001).\n\nLinks\
      \ can be written by adversaries to mask the true destination in order to deceive\
      \ victims by abusing the URL schema and increasing the effectiveness of phishing.(Citation:\
      \ Kaspersky-masking)(Citation: mandiant-masking)\n\nAdversaries may also use\
      \ free or paid accounts on link shortening services and Platform-as-a-Service\
      \ providers to host link targets while taking advantage of the widely trusted\
      \ domains of those providers to avoid being blocked while redirecting victims\
      \ to malicious pages.(Citation: Netskope GCP Redirection)(Citation: Netskope\
      \ Cloud Phishing)(Citation: Intezer App Service Phishing)(Citation: Cofense-redirect)\
      \ In addition, adversaries may serve a variety of malicious links through uniquely\
      \ generated URIs/URLs (including one-time, single use links).(Citation: iOS\
      \ URL Scheme)(Citation: URI)(Citation: URI Use)(Citation: URI Unique) Finally,\
      \ adversaries may take advantage of the decentralized nature of the InterPlanetary\
      \ File System (IPFS) to host link targets that are difficult to remove.(Citation:\
      \ Talos IPFS 2022)\nhttps://attack.mitre.org/techniques/T1608/005"
    translations:
      fr:
        name: Cible de lien
        description: "Les adversaires peuvent mettre en place des ressources r\xE9\
          f\xE9renc\xE9es par un lien pouvant \xEAtre utilis\xE9es lors du ciblage.\
          \ Un adversaire peut compter sur un utilisateur cliquant sur un lien malveillant\
          \ afin de divulguer des informations (y compris les identifiants) ou pour\
          \ obtenir une ex\xE9cution, comme dans [Lien malveillant](https://attack.mitre.org/techniques/T1204/001).\
          \ Les liens peuvent \xEAtre utilis\xE9s pour le spearphishing, comme envoyer\
          \ un e-mail accompagn\xE9 d\u2019un texte d\u2019ing\xE9nierie sociale pour\
          \ inciter l\u2019utilisateur \xE0 cliquer ou copier-coller activement une\
          \ URL dans un navigateur. Avant un phish pour obtenir des informations (comme\
          \ dans [Spearphishing Link](https://attack.mitre.org/techniques/T1598/003))\
          \ ou un phish pour obtenir un acc\xE8s initial \xE0 un syst\xE8me (comme\
          \ dans [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002)),\
          \ un adversaire doit configurer les ressources pour une cible de lien pour\
          \ le lien spearphishing. \n\nTypiquement, les ressources pour une cible\
          \ de lien seront une page HTML pouvant inclure un script c\xF4t\xE9 client\
          \ tel que [JavaScript](https://attack.mitre.org/techniques/T1059/007) pour\
          \ d\xE9cider quel contenu servir \xE0 l\u2019utilisateur. Les adversaires\
          \ peuvent cloner des sites l\xE9gitimes pour servir de cible de liens, cela\
          \ peut inclure le clonage de pages de connexion de services web l\xE9gitimes\
          \ ou de pages de connexion d\u2019organisations afin de r\xE9colter des\
          \ identifiants lors de [Spearphishing Link](https://attack.mitre.org/techniques/T1598/003).\
          \ (Citation : Malwarebytes Silent Librarian octobre 2020)(Citation : Proofpoint\
          \ TA407 septembre 2019) Les adversaires peuvent \xE9galement [T\xE9l\xE9\
          charger un logiciel malveillant](https://attack.mitre.org/techniques/T1608/001)\
          \ et faire en sorte que le lien cible pointe vers un malware pour t\xE9\
          l\xE9chargement/ex\xE9cution par l\u2019utilisateur.\n\nLes adversaires\
          \ peuvent acheter des domaines similaires \xE0 des domaines l\xE9gitimes\
          \ (ex : homoglyphes, typosquatting, diff\xE9rents domaines de premier niveau,\
          \ etc.) lors de l\u2019acquisition d\u2019infrastructures ([Domaines](https://attack.mitre.org/techniques/T1583/001))\
          \ afin de faciliter [Lien malveillant](https://attack.mitre.org/techniques/T1204/001).\n\
          \nLes liens peuvent \xEAtre \xE9crits par des adversaires pour masquer la\
          \ v\xE9ritable destination afin de tromper les victimes en abusant du sch\xE9\
          ma des URL et en augmentant l\u2019efficacit\xE9 du phishing. (Citation\
          \ : Masquage de Kaspersky)(Citation : masquage de mandiant)\n\nLes adversaires\
          \ peuvent \xE9galement utiliser des comptes gratuits ou payants sur des\
          \ services de raccourcissement de liens et des fournisseurs de plateformes\
          \ en tant que service pour h\xE9berger des cibles de liens tout en profitant\
          \ des domaines largement fiables de ces fournisseurs afin d\u2019\xE9viter\
          \ d\u2019\xEAtre bloqu\xE9s tout en redirigeant les victimes vers des pages\
          \ malveillantes. (Citation : Redirection Netskope GCP)(Citation : Phishing\
          \ dans le cloud Netskope)(Citation : Phishing du service d\u2019applications\
          \ Intezer)(Citation : Cofense-redirect) De plus, les adversaires peuvent\
          \ servir une vari\xE9t\xE9 de liens malveillants via des URI/URLs g\xE9\
          n\xE9r\xE9es de mani\xE8re unique (y compris des liens \xE0 usage unique).\
          \ (Citation : syst\xE8me d\u2019URL iOS)(Citation : URI)(Citation : Utilisation\
          \ de l\u2019URI)(Citation : URI Unique) Enfin, les adversaires peuvent tirer\
          \ parti de la nature d\xE9centralis\xE9e du Syst\xE8me de Fichiers InterPlan\xE9\
          taire (IPFS) pour h\xE9berger des cibles de liaison difficiles \xE0 \xE9\
          liminer. (Citation : Talos IPFS 2022)\nhttps://attack.mitre.org/techniques/T1608/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1608.006
    ref_id: T1608.006
    name: SEO Poisoning
    description: "Adversaries may poison mechanisms that influence search engine optimization\
      \ (SEO) to further lure staged capabilities towards potential victims. Search\
      \ engines typically display results to users based on purchased ads as well\
      \ as the site\u2019s ranking/score/reputation calculated by their web crawlers\
      \ and algorithms.(Citation: Atlas SEO)(Citation: MalwareBytes SEO)\n\nTo help\
      \ facilitate [Drive-by Compromise](https://attack.mitre.org/techniques/T1189),\
      \ adversaries may stage content that explicitly manipulates SEO rankings in\
      \ order to promote sites hosting their malicious payloads (such as [Drive-by\
      \ Target](https://attack.mitre.org/techniques/T1608/004)) within search engines.\
      \ Poisoning SEO rankings may involve various tricks, such as stuffing keywords\
      \ (including in the form of hidden text) into compromised sites. These keywords\
      \ could be related to the interests/browsing habits of the intended victim(s)\
      \ as well as more broad, seasonably popular topics (e.g. elections, trending\
      \ news).(Citation: ZScaler SEO)(Citation: Atlas SEO)\n\nIn addition to internet\
      \ search engines (such as Google), adversaries may also aim to manipulate specific\
      \ in-site searches for developer platforms (such as GitHub) to deceive users\
      \ towards [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)\
      \ lures. In-site searches will rank search results according to their own algorithms\
      \ and metrics such as popularity(Citation: Chexmarx-seo) which may be targeted\
      \ and gamed by malicious actors.(Citation: Checkmarx-oss-seo)\n\nAdversaries\
      \ may also purchase or plant incoming links to staged capabilities in order\
      \ to boost the site\u2019s calculated relevance and reputation.(Citation: MalwareBytes\
      \ SEO)(Citation: DFIR Report Gootloader)\n\nSEO poisoning may also be combined\
      \ with evasive redirects and other cloaking mechanisms (such as measuring mouse\
      \ movements or serving content based on browser user agents, user language/localization\
      \ settings, or HTTP headers) in order to feed SEO inputs while avoiding scrutiny\
      \ from defenders.(Citation: ZScaler SEO)(Citation: Sophos Gootloader)\nhttps://attack.mitre.org/techniques/T1608/006"
    translations:
      fr:
        name: Empoisonnement SEO
        description: "Les adversaires peuvent empoisonner les m\xE9canismes qui influencent\
          \ l\u2019optimisation pour les moteurs de recherche (SEO) afin d\u2019attirer\
          \ davantage les capacit\xE9s mises en sc\xE8ne vers des victimes potentielles.\
          \ Les moteurs de recherche affichent g\xE9n\xE9ralement les r\xE9sultats\
          \ aux utilisateurs en fonction des publicit\xE9s achet\xE9es ainsi que du\
          \ classement/score/r\xE9putation du site calcul\xE9 par leurs robots d\u2019\
          exploration et algorithmes. (Citation : Atlas SEO)(Citation : SEO de MalwareBytes)\n\
          \nPour faciliter la [Transaction en voiture](https://attack.mitre.org/techniques/T1189),\
          \ les adversaires peuvent mettre en sc\xE8ne du contenu qui manipule explicitement\
          \ les classements SEO afin de promouvoir des sites h\xE9bergeant leurs charges\
          \ malveillantes (telles que [Cible en voiture](https://attack.mitre.org/techniques/T1608/004))\
          \ dans les moteurs de recherche. Empoisonner les classements SEO peut impliquer\
          \ diverses astuces, comme l\u2019insertion de mots-cl\xE9s (y compris sous\
          \ forme de texte cach\xE9) dans des sites compromis. Ces mots-cl\xE9s peuvent\
          \ \xEAtre li\xE9s aux centres d\u2019int\xE9r\xEAt/habitudes de navigation\
          \ des victimes vis\xE9es ainsi qu\u2019\xE0 des sujets plus larges et populaires\
          \ selon la saison (par exemple, \xE9lections, actualit\xE9s tendance). (Citation\
          \ : ZScaler SEO)(Citation : Atlas SEO)\n\nEn plus des moteurs de recherche\
          \ internet (comme Google), les adversaires peuvent aussi viser \xE0 manipuler\
          \ des recherches sp\xE9cifiques sur les plateformes de d\xE9veloppement\
          \ (comme GitHub) afin de tromper les utilisateurs vers des app\xE2ts de\
          \ [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195).\
          \ Les recherches sur site classent les r\xE9sultats selon leurs propres\
          \ algorithmes et m\xE9triques telles que la popularit\xE9 (Citation : Chexmarx-seo),\
          \ qui peuvent \xEAtre cibl\xE9es et manipul\xE9es par des acteurs malveillants.\
          \ (Citation : Checkmarx-oss-seo)\n\nLes adversaires peuvent \xE9galement\
          \ acheter ou placer des liens entrants vers des capacit\xE9s mises en sc\xE8\
          ne afin d\u2019augmenter la pertinence et la r\xE9putation calcul\xE9es\
          \ du site. (Citation : SEO de MalwareBytes)(Citation : Rapport DFIR Gootloader)\n\
          \nL\u2019empoisonnement SEO peut \xE9galement \xEAtre combin\xE9 \xE0 des\
          \ redirections \xE9vasives et d\u2019autres m\xE9canismes de camouflage\
          \ (comme mesurer les mouvements de la souris ou servir du contenu \xE0 partir\
          \ des agents utilisateurs du navigateur, des param\xE8tres de langage/localisation\
          \ ou des en-t\xEAtes HTTP) afin d\u2019alimenter les entr\xE9es SEO tout\
          \ en \xE9vitant la surveillance des d\xE9fenseurs. (Citation : ZScaler SEO)(Citation\
          \ : Sophos Gootloader)\nhttps://attack.mitre.org/techniques/T1608/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1609
    ref_id: T1609
    name: Container Administration Command
    description: 'Adversaries may abuse a container administration service to execute
      commands within a container. A container administration service such as the
      Docker daemon, the Kubernetes API server, or the kubelet may allow remote management
      of containers within an environment.(Citation: Docker Daemon CLI)(Citation:
      Kubernetes API)(Citation: Kubernetes Kubelet)


      In Docker, adversaries may specify an entrypoint during container deployment
      that executes a script or command, or they may use a command such as <code>docker
      exec</code> to execute a command within a running container.(Citation: Docker
      Entrypoint)(Citation: Docker Exec) In Kubernetes, if an adversary has sufficient
      permissions, they may gain remote execution in a container in the cluster via
      interaction with the Kubernetes API server, the kubelet, or by running a command
      such as <code>kubectl exec</code>.(Citation: Kubectl Exec Get Shell)

      https://attack.mitre.org/techniques/T1609'
    translations:
      fr:
        name: "Commandement de l\u2019administration des conteneurs"
        description: "Les adversaires peuvent abuser d\u2019un service d\u2019administration\
          \ de conteneur pour ex\xE9cuter des commandes \xE0 l\u2019int\xE9rieur d\u2019\
          un conteneur. Un service d\u2019administration de conteneurs tel que le\
          \ d\xE9mon Docker, le serveur API Kubernetes ou le kubelet peut permettre\
          \ la gestion \xE0 distance des conteneurs dans un environnement. (Citation\
          \ : CLI du d\xE9mon Docker)(Citation : API Kubernetes)(Citation : Kubernetes\
          \ Kubelet)\n\nDans Docker, les adversaires peuvent sp\xE9cifier un point\
          \ d\u2019entr\xE9e lors du d\xE9ploiement du conteneur qui ex\xE9cute un\
          \ script ou une commande, ou utiliser une commande comme <code>docker exec</code>\
          \ pour ex\xE9cuter une commande dans un conteneur en cours d\u2019ex\xE9\
          cution. (Citation : Point d\u2019entr\xE9e Docker)(Citation : Docker Exec)\
          \ Dans Kubernetes, si un adversaire dispose d\u2019autorisations suffisantes,\
          \ il peut obtenir une ex\xE9cution \xE0 distance dans un conteneur du cluster\
          \ via une interaction avec le serveur API Kubernetes, le kubelet, ou en\
          \ ex\xE9cutant une commande telle que <code>kubectl exec</code>. (Citation\
          \ : Kubectl Cadre Get Shell)\nhttps://attack.mitre.org/techniques/T1609"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1610
    ref_id: T1610
    name: Deploy Container
    description: 'Adversaries may deploy a container into an environment to facilitate
      execution or evade defenses. In some cases, adversaries may deploy a new container
      to execute processes associated with a particular image or deployment, such
      as processes that execute or download malware. In others, an adversary may deploy
      a new container configured without network rules, user limitations, etc. to
      bypass existing defenses within the environment. In Kubernetes environments,
      an adversary may attempt to deploy a privileged or vulnerable container into
      a specific node in order to [Escape to Host](https://attack.mitre.org/techniques/T1611)
      and access other containers running on the node. (Citation: AppSecco Kubernetes
      Namespace Breakout 2020)


      Containers can be deployed by various means, such as via Docker''s <code>create</code>
      and <code>start</code> APIs or via a web application such as the Kubernetes
      dashboard or Kubeflow. (Citation: Docker Container)(Citation: Kubernetes Dashboard)(Citation:
      Kubeflow Pipelines) In Kubernetes environments, containers may be deployed through
      workloads such as ReplicaSets or DaemonSets, which can allow containers to be
      deployed across multiple nodes.(Citation: Kubernetes Workload Management) Adversaries
      may deploy containers based on retrieved or built malicious images or from benign
      images that download and execute malicious payloads at runtime.(Citation: Aqua
      Build Images on Hosts)

      https://attack.mitre.org/techniques/T1610'
    translations:
      fr:
        name: "Conteneur de d\xE9ploiement"
        description: "Les adversaires peuvent d\xE9ployer un conteneur dans un environnement\
          \ pour faciliter l\u2019ex\xE9cution ou \xE9viter les d\xE9fenses. Dans\
          \ certains cas, les adversaires peuvent d\xE9ployer un nouveau conteneur\
          \ pour ex\xE9cuter des processus associ\xE9s \xE0 une image ou un d\xE9\
          ploiement particulier, comme les processus qui ex\xE9cutent ou t\xE9l\xE9\
          chargent des logiciels malveillants. Dans d\u2019autres, un adversaire peut\
          \ d\xE9ployer un nouveau conteneur configur\xE9 sans r\xE8gles r\xE9seau,\
          \ limitations utilisateur, etc., pour contourner les d\xE9fenses existantes\
          \ dans l\u2019environnement. Dans les environnements Kubernetes, un adversaire\
          \ peut tenter de d\xE9ployer un conteneur privil\xE9gi\xE9 ou vuln\xE9rable\
          \ dans un n\u0153ud sp\xE9cifique afin de [S\u2019\xE9chapper vers l\u2019\
          h\xF4te](https://attack.mitre.org/techniques/T1611) et d\u2019acc\xE9der\
          \ \xE0 d\u2019autres conteneurs fonctionnant sur le n\u0153ud. (Citation\
          \ : Breakout de l\u2019espace de noms AppSecco Kubernetes 2020)\n\nLes conteneurs\
          \ peuvent \xEAtre d\xE9ploy\xE9s par divers moyens, comme via les API <code>de\
          \ cr\xE9ation</code> et <code>de d\xE9marrage</code> de Docker ou via une\
          \ application web telle que le tableau de bord Kubernetes ou Kubeflow. (Citation\
          \ : Docker Container)(Citation : tableau de bord Kubernetes)(Citation :\
          \ Pipelines Kubeflow) Dans les environnements Kubernetes, les conteneurs\
          \ peuvent \xEAtre d\xE9ploy\xE9s via des charges de travail telles que ReplicaSets\
          \ ou DaemonSets, qui permettent de d\xE9ployer des conteneurs sur plusieurs\
          \ n\u0153uds. (Citation : Gestion de la charge de travail Kubernetes) Les\
          \ adversaires peuvent d\xE9ployer des conteneurs bas\xE9s sur des images\
          \ malveillantes r\xE9cup\xE9r\xE9es ou construites, ou \xE0 partir d\u2019\
          images b\xE9nignes qui t\xE9l\xE9chargent et ex\xE9cutent des charges utiles\
          \ malveillantes \xE0 l\u2019ex\xE9cution. (Citation : Images de construction\
          \ aqua sur les h\xF4tes)\nhttps://attack.mitre.org/techniques/T1610"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1611
    ref_id: T1611
    name: Escape to Host
    description: "Adversaries may break out of a container or virtualized environment\
      \ to gain access to the underlying host. This can allow an adversary access\
      \ to other containerized or virtualized resources from the host level or to\
      \ the host itself. In principle, containerized / virtualized resources should\
      \ provide a clear separation of application functionality and be isolated from\
      \ the host environment.(Citation: Docker Overview)\n\nThere are multiple ways\
      \ an adversary may escape from a container to a host environment. Examples include\
      \ creating a container configured to mount the host\u2019s filesystem using\
      \ the bind parameter, which allows the adversary to drop payloads and execute\
      \ control utilities such as cron on the host; utilizing a privileged container\
      \ to run commands or load a malicious kernel module on the underlying host;\
      \ or abusing system calls such as `unshare` and `keyctl` to escalate privileges\
      \ and steal secrets.(Citation: Docker Bind Mounts)(Citation: Trend Micro Privileged\
      \ Container)(Citation: Intezer Doki July 20)(Citation: Container Escape)(Citation:\
      \ Crowdstrike Kubernetes Container Escape)(Citation: Keyctl-unmask)\n\nAdditionally,\
      \ an adversary may be able to exploit a compromised container with a mounted\
      \ container management socket, such as `docker.sock`, to break out of the container\
      \ via a [Container Administration Command](https://attack.mitre.org/techniques/T1609).(Citation:\
      \ Container Escape) Adversaries may also escape via [Exploitation for Privilege\
      \ Escalation](https://attack.mitre.org/techniques/T1068), such as exploiting\
      \ vulnerabilities in global symbolic links in order to access the root directory\
      \ of a host machine.(Citation: Windows Server Containers Are Open)\n\nIn ESXi\
      \ environments, an adversary may exploit a vulnerability in order to escape\
      \ from a virtual machine into the hypervisor.(Citation: Broadcom VMSA-2025-004)\n\
      \nGaining access to the host may provide the adversary with the opportunity\
      \ to achieve follow-on objectives, such as establishing persistence, moving\
      \ laterally within the environment, accessing other containers or virtual machines\
      \ running on the host, or setting up a command and control channel on the host.\n\
      https://attack.mitre.org/techniques/T1611"
    translations:
      fr:
        name: "\xC9vasion vers l\u2019h\xF4te"
        description: "Les adversaires peuvent sortir d\u2019un conteneur ou d\u2019\
          un environnement virtualis\xE9 pour acc\xE9der \xE0 l\u2019h\xF4te sous-jacent.\
          \ Cela peut permettre \xE0 un adversaire d\u2019acc\xE9der \xE0 d\u2019\
          autres ressources conteneuris\xE9es ou virtualis\xE9es depuis le niveau\
          \ h\xF4te ou vers l\u2019h\xF4te lui-m\xEAme. En principe, les ressources\
          \ conteneuris\xE9es / virtualis\xE9es doivent offrir une s\xE9paration claire\
          \ des fonctionnalit\xE9s de l\u2019application et \xEAtre isol\xE9es de\
          \ l\u2019environnement h\xF4te. (Citation : Aper\xE7u Docker)\n\nIl existe\
          \ plusieurs fa\xE7ons pour un adversaire de s\u2019\xE9chapper d\u2019un\
          \ conteneur vers un environnement h\xF4te. Parmi les exemples, on trouve\
          \ la cr\xE9ation d\u2019un conteneur configur\xE9 pour monter le syst\xE8\
          me de fichiers de l\u2019h\xF4te en utilisant le param\xE8tre binding, qui\
          \ permet \xE0 l\u2019adversaire de d\xE9poser des charges utilitaires et\
          \ d\u2019ex\xE9cuter des utilitaires de contr\xF4le tels que cron sur l\u2019\
          h\xF4te ; utilisant un conteneur privil\xE9gi\xE9 pour ex\xE9cuter des commandes\
          \ ou charger un module noyau malveillant sur l\u2019h\xF4te sous-jacent\
          \ ; ou abuser des appels syst\xE8me tels que \xAB unshare \xBB et \xAB keyctl\
          \ \xBB pour escalader des privil\xE8ges et voler des secrets. (Citation\
          \ : Montures de liaison docker)(Citation : Conteneur Privil\xE9gi\xE9 Trend\
          \ Micro)(Citation : Intezer Doki 20 juillet)(Citation : \xC9vasion du conteneur)(Citation\
          \ : Foulstrike de la fuite du conteneur Kubernetes)(Citation : Keyctl-unmask)\n\
          \nDe plus, un adversaire peut exploiter un conteneur compromis avec un socket\
          \ de gestion du conteneur mont\xE9, tel que 'docker.sock', pour sortir du\
          \ conteneur via une [Commande d\u2019administration du conteneur](https://attack.mitre.org/techniques/T1609).\
          \ (Citation : \xC9vasion du conteneur) Les adversaires peuvent \xE9galement\
          \ s\u2019\xE9chapper via [Exploitation pour l\u2019escalade des privil\xE8\
          ges](https://attack.mitre.org/techniques/T1068), comme exploiter des vuln\xE9\
          rabilit\xE9s dans des liens symboliques globaux afin d\u2019acc\xE9der au\
          \ r\xE9pertoire racine d\u2019une machine h\xF4te. (Citation : Les conteneurs\
          \ Windows Server sont ouverts)\n\nDans les environnements ESXi, un adversaire\
          \ peut exploiter une vuln\xE9rabilit\xE9 afin de s\u2019\xE9chapper d\u2019\
          une machine virtuelle vers l\u2019hyperviseur. (Citation : Broadcom VMSA-2025-004)\n\
          \nAcc\xE9der \xE0 l\u2019h\xF4te peut offrir \xE0 l\u2019adversaire la possibilit\xE9\
          \ d\u2019atteindre des objectifs ult\xE9rieurs, tels que l\u2019\xE9tablissement\
          \ de la persistance, le d\xE9placement lat\xE9ral dans l\u2019environnement,\
          \ l\u2019acc\xE8s \xE0 d\u2019autres conteneurs ou machines virtuelles fonctionnant\
          \ sur l\u2019h\xF4te, ou la mise en place d\u2019un canal de commande et\
          \ de contr\xF4le sur l\u2019h\xF4te.\nhttps://attack.mitre.org/techniques/T1611"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1612
    ref_id: T1612
    name: Build Image on Host
    description: "Adversaries may build a container image directly on a host to bypass\
      \ defenses that monitor for the retrieval of malicious images from a public\
      \ registry. A remote <code>build</code> request may be sent to the Docker API\
      \ that includes a Dockerfile that pulls a vanilla base image, such as alpine,\
      \ from a public or local registry and then builds a custom image upon it.(Citation:\
      \ Docker Build Image)\n\nAn adversary may take advantage of that <code>build</code>\
      \ API to build a custom image on the host that includes malware downloaded from\
      \ their C2 server, and then they may utilize [Deploy Container](https://attack.mitre.org/techniques/T1610)\
      \ using that custom image.(Citation: Aqua Build Images on Hosts)(Citation: Aqua\
      \ Security Cloud Native Threat Report June 2021) If the base image is pulled\
      \ from a public registry, defenses will likely not detect the image as malicious\
      \ since it\u2019s a vanilla image. If the base image already resides in a local\
      \ registry, the pull may be considered even less suspicious since the image\
      \ is already in the environment.\nhttps://attack.mitre.org/techniques/T1612"
    translations:
      fr:
        name: "Cr\xE9er une image sur l\u2019h\xF4te"
        description: "Les adversaires peuvent construire une image conteneur directement\
          \ sur un h\xF4te pour contourner les d\xE9fenses qui surveillent la r\xE9\
          cup\xE9ration d\u2019images malveillantes \xE0 partir d\u2019un registre\
          \ public. Une requ\xEAte <code>de compilation</code> distante peut \xEA\
          tre envoy\xE9e \xE0 l\u2019API Docker qui inclut un fichier Docker qui extrait\
          \ une image de base classique, comme alpine, depuis un registre public ou\
          \ local, puis construit une image personnalis\xE9e dessus. (Citation : Image\
          \ de compilation Docker)\n\nUn adversaire peut profiter de cette <code>API\
          \ de compilation</code> pour cr\xE9er une image personnalis\xE9e sur l\u2019\
          h\xF4te incluant des malwares t\xE9l\xE9charg\xE9s depuis son serveur C2,\
          \ puis utiliser [Deploy Container](https://attack.mitre.org/techniques/T1610)\
          \ en utilisant cette image personnalis\xE9e. (Citation : Images de construction\
          \ aqua sur les h\xF4tes)(Citation : Rapport de menace natif Aqua Security\
          \ Cloud juin 2021) Si l\u2019image de base est extraite d\u2019un registre\
          \ public, les d\xE9fenses ne d\xE9tecteront probablement pas l\u2019image\
          \ comme malveillante puisqu\u2019il s\u2019agit d\u2019une image vanilla.\
          \ Si l\u2019image de base est d\xE9j\xE0 dans un registre local, l\u2019\
          attraction peut \xEAtre consid\xE9r\xE9e comme encore moins suspecte puisque\
          \ l\u2019image est d\xE9j\xE0 dans l\u2019environnement.\nhttps://attack.mitre.org/techniques/T1612"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1613
    ref_id: T1613
    name: Container and Resource Discovery
    description: "Adversaries may attempt to discover containers and other resources\
      \ that are available within a containers environment. Other resources may include\
      \ images, deployments, pods, nodes, and other information such as the status\
      \ of a cluster.\n\nThese resources can be viewed within web applications such\
      \ as the Kubernetes dashboard or can be queried via the Docker and Kubernetes\
      \ APIs.(Citation: Docker API)(Citation: Kubernetes API) In Docker, logs may\
      \ leak information about the environment, such as the environment\u2019s configuration,\
      \ which services are available, and what cloud provider the victim may be utilizing.\
      \ The discovery of these resources may inform an adversary\u2019s next steps\
      \ in the environment, such as how to perform lateral movement and which methods\
      \ to utilize for execution.\nhttps://attack.mitre.org/techniques/T1613"
    translations:
      fr:
        name: "D\xE9couverte de conteneurs et de ressources"
        description: "Les adversaires peuvent tenter de d\xE9couvrir des conteneurs\
          \ et d\u2019autres ressources disponibles dans un environnement de conteneurs.\
          \ D\u2019autres ressources peuvent inclure des images, des d\xE9ploiements,\
          \ des pods, des n\u0153uds et d\u2019autres informations telles que l\u2019\
          \xE9tat d\u2019un cluster.\n\nCes ressources peuvent \xEAtre consult\xE9\
          es dans des applications web telles que le tableau de bord Kubernetes ou\
          \ interrog\xE9es via les API Docker et Kubernetes. (Citation : API Docker)(Citation\
          \ : API Kubernetes) Dans Docker, les journaux peuvent divulguer des informations\
          \ sur l\u2019environnement, telles que la configuration de l\u2019environnement,\
          \ les services disponibles et le fournisseur cloud que la victime peut utiliser.\
          \ La d\xE9couverte de ces ressources peut orienter les prochaines \xE9tapes\
          \ de l\u2019adversaire dans l\u2019environnement, telles que la mani\xE8\
          re d\u2019effectuer un mouvement lat\xE9ral et les m\xE9thodes \xE0 utiliser.\n\
          https://attack.mitre.org/techniques/T1613"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1614
    ref_id: T1614
    name: System Location Discovery
    description: 'Adversaries may gather information in an attempt to calculate the
      geographical location of a victim host. Adversaries may use the information
      from [System Location Discovery](https://attack.mitre.org/techniques/T1614)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.


      Adversaries may attempt to infer the location of a system using various system
      checks, such as time zone, keyboard layout, and/or language settings.(Citation:
      FBI Ragnar Locker 2020)(Citation: Sophos Geolocation 2016)(Citation: Bleepingcomputer
      RAT malware 2020) Windows API functions such as <code>GetLocaleInfoW</code>
      can also be used to determine the locale of the host.(Citation: FBI Ragnar Locker
      2020) In cloud environments, an instance''s availability zone may also be discovered
      by accessing the instance metadata service from the instance.(Citation: AWS
      Instance Identity Documents)(Citation: Microsoft Azure Instance Metadata 2021)


      Adversaries may also attempt to infer the location of a victim host using IP
      addressing, such as via online geolocation IP-lookup services.(Citation: Securelist
      Trasparent Tribe 2020)(Citation: Sophos Geolocation 2016)'
    translations:
      fr:
        name: "D\xE9couverte de la localisation du syst\xE8me"
        description: "Les adversaires peuvent recueillir des informations dans le\
          \ but de calculer la localisation g\xE9ographique d\u2019un h\xF4te victime.\
          \ Les adversaires peuvent utiliser les informations issues de [D\xE9couverte\
          \ de localisation syst\xE8me](https://attack.mitre.org/techniques/T1614)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques.\n\nLes adversaires peuvent tenter\
          \ d\u2019inf\xE9rer l\u2019emplacement d\u2019un syst\xE8me en utilisant\
          \ divers contr\xF4les syst\xE8me, tels que le fuseau horaire, la disposition\
          \ du clavier et/ou les r\xE9glages de langue. (Citation : FBI Ragnar Locker\
          \ 2020)(Citation : Sophos Geolocation 2016)(Citation : Malware RAT Bleepingcomputer\
          \ 2020) Des fonctions API Windows telles que <code>GetLocaleInfoW</code>\
          \ peuvent \xE9galement \xEAtre utilis\xE9es pour d\xE9terminer la localisation\
          \ de l\u2019h\xF4te. (Citation : FBI Ragnar Locker 2020) Dans les environnements\
          \ cloud, la zone de disponibilit\xE9 d\u2019une instance peut \xE9galement\
          \ \xEAtre d\xE9couverte en acc\xE9dant au service de m\xE9tadonn\xE9es de\
          \ l\u2019instance depuis l\u2019instance. (Citation : Documents d\u2019\
          identit\xE9 d\u2019instance AWS)(Citation : Microsoft Azure Instance Metadata\
          \ 2021)\n\nLes adversaires peuvent \xE9galement tenter d\u2019inf\xE9rer\
          \ la localisation d\u2019un h\xF4te victime en utilisant l\u2019adressage\
          \ IP, par exemple via des services de recherche d\u2019IP en ligne pour\
          \ la g\xE9olocalisation. (Citation : Securelist Trasparent Tribe 2020)(Citation\
          \ : Sophos Geolocation 2016)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1614.001
    ref_id: T1614.001
    name: System Language Discovery
    description: "Adversaries may attempt to gather information about the system language\
      \ of a victim in order to infer the geographical location of that host. This\
      \ information may be used to shape follow-on behaviors, including whether the\
      \ adversary infects the target and/or attempts specific actions. This decision\
      \ may be employed by malware developers and operators to reduce their risk of\
      \ attracting the attention of specific law enforcement agencies or prosecution/scrutiny\
      \ from other entities.(Citation: Malware System Language Check)\n\nThere are\
      \ various sources of data an adversary could use to infer system language, such\
      \ as system defaults and keyboard layouts. Specific checks will vary based on\
      \ the target and/or adversary, but may involve behaviors such as [Query Registry](https://attack.mitre.org/techniques/T1012)\
      \ and calls to [Native API](https://attack.mitre.org/techniques/T1106) functions.(Citation:\
      \ CrowdStrike Ryuk January 2019) \n\nFor example, on a Windows system adversaries\
      \ may attempt to infer the language of a system by querying the registry key\
      \ <code>HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Nls\\Language</code>\
      \ or parsing the outputs of Windows API functions <code>GetUserDefaultUILanguage</code>,\
      \ <code>GetSystemDefaultUILanguage</code>, <code>GetKeyboardLayoutList</code>\
      \ and <code>GetUserDefaultLangID</code>.(Citation: Darkside Ransomware Cybereason)(Citation:\
      \ Securelist JSWorm)(Citation: SecureList SynAck Doppelg\xE4nging May 2018)\n\
      \nOn a macOS or Linux system, adversaries may query <code>locale</code> to retrieve\
      \ the value of the <code>$LANG</code> environment variable.\nhttps://attack.mitre.org/techniques/T1614/001"
    translations:
      fr:
        name: "D\xE9couverte des langages syst\xE8me"
        description: "Les adversaires peuvent tenter de recueillir des informations\
          \ sur le langage syst\xE8me d\u2019une victime afin d\u2019en d\xE9duire\
          \ la localisation g\xE9ographique de cet h\xF4te. Ces informations peuvent\
          \ \xEAtre utilis\xE9es pour fa\xE7onner les comportements suivants, notamment\
          \ si l\u2019adversaire infecte la cible et/ou tente des actions sp\xE9cifiques.\
          \ Cette d\xE9cision peut \xEAtre utilis\xE9e par les d\xE9veloppeurs et\
          \ les op\xE9rateurs de logiciels malveillants pour r\xE9duire leur risque\
          \ d\u2019attirer l\u2019attention de certaines agences de maintien de l\u2019\
          ordre ou de faire l\u2019objet de poursuites ou de surveillance par d\u2019\
          autres entit\xE9s. (Citation : Contr\xF4le du langage du syst\xE8me de malware)\n\
          \nIl existe diverses sources de donn\xE9es qu\u2019un adversaire peut utiliser\
          \ pour d\xE9duire le langage syst\xE8me, telles que les param\xE8tres par\
          \ d\xE9faut et la disposition des claviers. Les v\xE9rifications sp\xE9\
          cifiques varient selon la cible et/ou l\u2019adversaire, mais peuvent impliquer\
          \ des comportements tels que [Query Registry](https://attack.mitre.org/techniques/T1012)\
          \ et des appels vers des fonctions [API native](https://attack.mitre.org/techniques/T1106).\
          \ (Citation : CrowdStrike Ryuk janvier 2019) \n\nPar exemple, sur un syst\xE8\
          me Windows, les adversaires peuvent tenter d\u2019inf\xE9rer le langage\
          \ d\u2019un syst\xE8me en interrogeant la cl\xE9 du registre <code>HKEY_LOCAL_MACHINE\\\
          SYSTEM\\CurrentControlSet\\Control\\Nls\\Language</code> ou en analysant\
          \ les sorties des fonctions API <code>Windows GetUserDefaultUILanguage</code>,\
          \ <code>GetSystemDefaultUILanguage</code>, <code>GetKeyboardLayoutList</code>\
          \ et <code>GetUserDefaultLangID</code>. (Citation : Cyber Ransomware du\
          \ c\xF4t\xE9 obscur)(Citation : Securelist JSWorm)(Citation : SecureList\
          \ SynAck Doppelg\xE4nging mai 2018)\n\nSur un syst\xE8me macOS ou Linux,\
          \ les adversaires peuvent interroger <code>le local</code> pour obtenir\
          \ la valeur de la <code>variable d\u2019environnement $LANG</code>.\nhttps://attack.mitre.org/techniques/T1614/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1615
    ref_id: T1615
    name: Group Policy Discovery
    description: 'Adversaries may gather information on Group Policy settings to identify
      paths for privilege escalation, security measures applied within a domain, and
      to discover patterns in domain objects that can be manipulated or used to blend
      in the environment. Group Policy allows for centralized management of user and
      computer settings in Active Directory (AD). Group policy objects (GPOs) are
      containers for group policy settings made up of files stored within a predictable
      network path `\<DOMAIN>\SYSVOL\<DOMAIN>\Policies\`.(Citation: TechNet Group
      Policy Basics)(Citation: ADSecurity GPO Persistence 2016)


      Adversaries may use commands such as <code>gpresult</code> or various publicly
      available PowerShell functions, such as <code>Get-DomainGPO</code> and <code>Get-DomainGPOLocalGroup</code>,
      to gather information on Group Policy settings.(Citation: Microsoft gpresult)(Citation:
      Github PowerShell Empire) Adversaries may use this information to shape follow-on
      behaviors, including determining potential attack paths within the target network
      as well as opportunities to manipulate Group Policy settings (i.e. [Domain or
      Tenant Policy Modification](https://attack.mitre.org/techniques/T1484)) for
      their benefit.

      https://attack.mitre.org/techniques/T1615'
    translations:
      fr:
        name: "D\xE9couverte de la police de groupe"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ param\xE8tres de la Politique de Groupe afin d\u2019identifier les chemins\
          \ d\u2019escalade des privil\xE8ges, les mesures de s\xE9curit\xE9 appliqu\xE9\
          es dans un domaine, et pour d\xE9couvrir des motifs dans les objets de domaine\
          \ pouvant \xEAtre manipul\xE9s ou utilis\xE9s pour se fondre dans l\u2019\
          environnement. La Strat\xE9gie de Groupe permet une gestion centralis\xE9\
          e des param\xE8tres utilisateur et informatique dans Active Directory (AD).\
          \ Les objets de politique de groupe (GPO) sont des conteneurs pour les param\xE8\
          tres de la politique de groupe compos\xE9s de fichiers stock\xE9s dans un\
          \ chemin r\xE9seau pr\xE9visible '\\<DOMAIN>\\<DOMAIN>SYSVOL\\\\Policies'.(\
          \ Citation : Bases de la politique de groupe TechNet)(Citation : ADSecurity\
          \ GPO Persistence 2016)\n\nLes adversaires peuvent utiliser des commandes\
          \ telles que <code>gpresult</code> ou diverses fonctions PowerShell publiques,\
          \ telles que <code>Get-DomainGPO</code> et <code>Get-DomainGPOLocalGroup</code>,\
          \ pour recueillir des informations sur les param\xE8tres de la Strat\xE9\
          gie de Groupe. (Citation : Microsoft gpresult)(Citation : Github PowerShell\
          \ Empire) Les adversaires peuvent utiliser ces informations pour fa\xE7\
          onner les comportements suivants, notamment pour d\xE9terminer les chemins\
          \ d\u2019attaque potentiels au sein du r\xE9seau cible ainsi que des opportunit\xE9\
          s de manipuler les param\xE8tres de la politique de groupe (par exemple\
          \ [Modification de la politique de domaine ou de locataire](https://attack.mitre.org/techniques/T1484))\
          \ \xE0 leur avantage.\nhttps://attack.mitre.org/techniques/T1615"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1619
    ref_id: T1619
    name: Cloud Storage Object Discovery
    description: 'Adversaries may enumerate objects in cloud storage infrastructure.
      Adversaries may use this information during automated discovery to shape follow-on
      behaviors, including requesting all or specific objects from cloud storage.  Similar
      to [File and Directory Discovery](https://attack.mitre.org/techniques/T1083)
      on a local host, after identifying available storage services (i.e. [Cloud Infrastructure
      Discovery](https://attack.mitre.org/techniques/T1580)) adversaries may access
      the contents/objects stored in cloud infrastructure.


      Cloud service providers offer APIs allowing users to enumerate objects stored
      within cloud storage. Examples include ListObjectsV2 in AWS (Citation: ListObjectsV2)
      and List Blobs in Azure(Citation: List Blobs) .

      https://attack.mitre.org/techniques/T1619'
    translations:
      fr:
        name: "D\xE9couverte d\u2019objets de stockage cloud"
        description: "Les adversaires peuvent \xE9num\xE9rer des objets dans l\u2019\
          infrastructure de stockage cloud. Les adversaires peuvent utiliser ces informations\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris en demandant tout ou certains objets \xE0 partir du\
          \ stockage cloud.  \xC0 l\u2019instar de [D\xE9couverte de fichiers et d\u2019\
          annuaires](https://attack.mitre.org/techniques/T1083) sur un h\xF4te local,\
          \ apr\xE8s avoir identifi\xE9 les services de stockage disponibles (c\u2019\
          est-\xE0-dire [D\xE9couverte d\u2019infrastructure cloud](https://attack.mitre.org/techniques/T1580)),\
          \ les adversaires peuvent acc\xE9der au contenu/objets stock\xE9s dans l\u2019\
          infrastructure cloud.\n\nLes fournisseurs de services cloud proposent des\
          \ API permettant aux utilisateurs d\u2019\xE9num\xE9rer les objets stock\xE9\
          s dans le stockage cloud. Parmi les exemples figurent ListObjectsV2 dans\
          \ AWS (citation : ListObjectsV2) et List Blobs in Azure (citation : List\
          \ Blobs).\nhttps://attack.mitre.org/techniques/T1619"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1620
    ref_id: T1620
    name: Reflective Code Loading
    description: "Adversaries may reflectively load code into a process in order to\
      \ conceal the execution of malicious payloads. Reflective loading involves allocating\
      \ then executing payloads directly within the memory of the process, vice creating\
      \ a thread or process backed by a file path on disk (e.g., [Shared Modules](https://attack.mitre.org/techniques/T1129)).\n\
      \nReflectively loaded payloads may be compiled binaries, anonymous files (only\
      \ present in RAM), or just snubs of fileless executable code (ex: position-independent\
      \ shellcode).(Citation: Introducing Donut)(Citation: S1 Custom Shellcode Tool)(Citation:\
      \ Stuart ELF Memory)(Citation: 00sec Droppers)(Citation: Mandiant BYOL) For\
      \ example, the `Assembly.Load()` method executed by [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ may be abused to load raw code into the running process.(Citation: Microsoft\
      \ AssemblyLoad)\n\nReflective code injection is very similar to [Process Injection](https://attack.mitre.org/techniques/T1055)\
      \ except that the \u201Cinjection\u201D loads code into the processes\u2019\
      \ own memory instead of that of a separate process. Reflective loading may evade\
      \ process-based detections since the execution of the arbitrary code may be\
      \ masked within a legitimate or otherwise benign process. Reflectively loading\
      \ payloads directly into memory may also avoid creating files or other artifacts\
      \ on disk, while also enabling malware to keep these payloads encrypted (or\
      \ otherwise obfuscated) until execution.(Citation: Stuart ELF Memory)(Citation:\
      \ 00sec Droppers)(Citation: Intezer ACBackdoor)(Citation: S1 Old Rat New Tricks)\n\
      https://attack.mitre.org/techniques/T1620"
    translations:
      fr:
        name: "Chargement du code r\xE9fl\xE9chissant"
        description: "Les adversaires peuvent charger du code de mani\xE8re r\xE9\
          fl\xE9chie dans un processus afin de dissimuler l\u2019ex\xE9cution de charges\
          \ utiles malveillantes. Le chargement r\xE9fl\xE9chissant consiste \xE0\
          \ allouer puis ex\xE9cuter des charges utiles directement dans la m\xE9\
          moire du processus, au lieu de cr\xE9er un thread ou un processus soutenu\
          \ par un chemin de fichier sur le disque (par exemple, [Shared Modules](https://attack.mitre.org/techniques/T1129)).\n\
          \nLes charges utiles charg\xE9es de fa\xE7on r\xE9fl\xE9chie peuvent \xEA\
          tre des binaires compil\xE9s, des fichiers anonymes (pr\xE9sents uniquement\
          \ en RAM), ou simplement des oublis de code ex\xE9cutable sans fichier (ex\
          \ : code-shell ind\xE9pendant de la position). (Citation : Pr\xE9sentation\
          \ de Donut)(Citation : Outil Shellcode personnalis\xE9 S1)(Citation : M\xE9\
          moire ELF de Stuart)(Citation : 00sec Droppers)(Citation : Mandiant BYOL)\
          \ Par exemple, la m\xE9thode \xAB Assembly.Load()\_\xBB ex\xE9cut\xE9e par\
          \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) peut \xEA\
          tre abus\xE9e pour charger du code brut dans le processus en cours. (Citation\
          \ : Microsoft AssemblyLoad)\n\nL\u2019injection de code r\xE9fl\xE9chissante\
          \ est tr\xE8s similaire \xE0 [injection de proc\xE9d\xE9](https://attack.mitre.org/techniques/T1055),\
          \ sauf que \xAB l\u2019injection \xBB charge le code dans la m\xE9moire\
          \ propre au processus au lieu de celle d\u2019un processus s\xE9par\xE9\
          . Le chargement r\xE9fl\xE9chissant peut \xE9chapper aux d\xE9tections bas\xE9\
          es sur le processus, car l\u2019ex\xE9cution du code arbitraire peut \xEA\
          tre masqu\xE9e dans un processus l\xE9gitime ou autrement b\xE9nin. Le chargement\
          \ r\xE9flexif des charges utiles directement en m\xE9moire peut \xE9galement\
          \ \xE9viter de cr\xE9er des fichiers ou d\u2019autres artefacts sur le disque,\
          \ tout en permettant aux logiciels malveillants de garder ces charges utiles\
          \ chiffr\xE9es (ou autrement obscurcies) jusqu\u2019\xE0 leur ex\xE9cution.\
          \ (Citation : M\xE9moire ELF de Stuart)(Citation : 00sec Droppers)(Citation\
          \ : Intezer ACBackdoor)(Citation : S1 Old Rat Nouvelles Astuces)\nhttps://attack.mitre.org/techniques/T1620"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1621
    ref_id: T1621
    name: Multi-Factor Authentication Request Generation
    description: "Adversaries may attempt to bypass multi-factor authentication (MFA)\
      \ mechanisms and gain access to accounts by generating MFA requests sent to\
      \ users.\n\nAdversaries in possession of credentials to [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ may be unable to complete the login process if they lack access to the 2FA\
      \ or MFA mechanisms required as an additional credential and security control.\
      \ To circumvent this, adversaries may abuse the automatic generation of push\
      \ notifications to MFA services such as Duo Push, Microsoft Authenticator, Okta,\
      \ or similar services to have the user grant access to their account. If adversaries\
      \ lack credentials to victim accounts, they may also abuse automatic push notification\
      \ generation when this option is configured for self-service password reset\
      \ (SSPR).(Citation: Obsidian SSPR Abuse 2023)\n\nIn some cases, adversaries\
      \ may continuously repeat login attempts in order to bombard users with MFA\
      \ push notifications, SMS messages, and phone calls, potentially resulting in\
      \ the user finally accepting the authentication request in response to \u201C\
      MFA fatigue.\u201D(Citation: Russian 2FA Push Annoyance - Cimpanu)(Citation:\
      \ MFA Fatigue Attacks - PortSwigger)(Citation: Suspected Russian Activity Targeting\
      \ Government and Business Entities Around the Globe)\nhttps://attack.mitre.org/techniques/T1621"
    translations:
      fr:
        name: "G\xE9n\xE9ration de demandes d\u2019authentification multifactorielles"
        description: "Les adversaires peuvent tenter de contourner les m\xE9canismes\
          \ d\u2019authentification multifacteur (MFA) et d\u2019acc\xE9der aux comptes\
          \ en g\xE9n\xE9rant des requ\xEAtes MFA envoy\xE9es aux utilisateurs.\n\n\
          Les adversaires d\xE9tenant des identifiants pour [Comptes Valides](https://attack.mitre.org/techniques/T1078)\
          \ peuvent ne pas pouvoir terminer le processus de connexion s\u2019ils n\u2019\
          ont pas acc\xE8s aux m\xE9canismes 2FA ou MFA n\xE9cessaires en tant que\
          \ contr\xF4le suppl\xE9mentaire de la certification et de la s\xE9curit\xE9\
          . Pour contourner cela, les adversaires peuvent abuser de la g\xE9n\xE9\
          ration automatique de notifications push sur des services MFA tels que Duo\
          \ Push, Microsoft Authenticator, Okta ou des services similaires afin que\
          \ l\u2019utilisateur accorde l\u2019acc\xE8s \xE0 son compte. Si les adversaires\
          \ ne poss\xE8dent pas d\u2019identifiants pour les comptes victimes, ils\
          \ peuvent \xE9galement abuser de la g\xE9n\xE9ration automatique de notifications\
          \ push lorsque cette option est configur\xE9e pour la r\xE9initialisation\
          \ de mot de passe en libre-service (SSPR). (Citation : Abus SSPR d\u2019\
          Obsidian 2023)\n\nDans certains cas, les adversaires peuvent r\xE9p\xE9\
          ter continuellement les tentatives de connexion afin d\u2019inonder les\
          \ utilisateurs de notifications push MFA, de messages SMS et d\u2019appels\
          \ t\xE9l\xE9phoniques, ce qui pourrait finalement amener l\u2019utilisateur\
          \ \xE0 accepter la demande d\u2019authentification en r\xE9ponse \xE0 la\
          \ \xAB fatigue MFA \xBB. (Citation : G\xEAne de pouss\xE9e russe en 2FA\
          \ - Cimpanu)(Citation : Attaques de fatigue MFA - PortSwigger)(Citation\
          \ : Activit\xE9 russe pr\xE9sum\xE9e visant des entit\xE9s gouvernementales\
          \ et commerciales \xE0 travers le monde)\nhttps://attack.mitre.org/techniques/T1621"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1622
    ref_id: T1622
    name: Debugger Evasion
    description: "Adversaries may employ various means to detect and avoid debuggers.\
      \ Debuggers are typically used by defenders to trace and/or analyze the execution\
      \ of potential malware payloads.(Citation: ProcessHacker Github)\n\nDebugger\
      \ evasion may include changing behaviors based on the results of the checks\
      \ for the presence of artifacts indicative of a debugged environment. Similar\
      \ to [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497),\
      \ if the adversary detects a debugger, they may alter their malware to disengage\
      \ from the victim or conceal the core functions of the implant. They may also\
      \ search for debugger artifacts before dropping secondary or additional payloads.\n\
      \nSpecific checks will vary based on the target and/or adversary. On Windows,\
      \ this may involve [Native API](https://attack.mitre.org/techniques/T1106) function\
      \ calls such as <code>IsDebuggerPresent()</code> and <code> NtQueryInformationProcess()</code>,\
      \ or manually checking the <code>BeingDebugged</code> flag of the Process Environment\
      \ Block (PEB). On Linux, this may involve querying `/proc/self/status` for the\
      \ `TracerPID` field, which indicates whether or not the process is being traced\
      \ by dynamic analysis tools.(Citation: Cado Security P2PInfect 2023)(Citation:\
      \ Positive Technologies Hellhounds 2023) Other checks for debugging artifacts\
      \ may also seek to enumerate hardware breakpoints, interrupt assembly opcodes,\
      \ time checks, or measurements if exceptions are raised in the current process\
      \ (assuming a present debugger would \u201Cswallow\u201D or handle the potential\
      \ error).(Citation: hasherezade debug)(Citation: AlKhaser Debug)(Citation: vxunderground\
      \ debug)\n\nMalware may also leverage Structured Exception Handling (SEH) to\
      \ detect debuggers by throwing an exception and detecting whether the process\
      \ is suspended. SEH handles both hardware and software expectations, providing\
      \ control over the exceptions including support for debugging. If a debugger\
      \ is present, the program\u2019s control will be transferred to the debugger,\
      \ and the execution of the code will be suspended. If the debugger is not present,\
      \ control will be transferred to the SEH handler, which will automatically handle\
      \ the exception and allow the program\u2019s execution to continue.(Citation:\
      \ Apriorit)\n\nAdversaries may use the information learned from these debugger\
      \ checks during automated discovery to shape follow-on behaviors. Debuggers\
      \ can also be evaded by detaching the process or flooding debug logs with meaningless\
      \ data via messages produced by looping [Native API](https://attack.mitre.org/techniques/T1106)\
      \ function calls such as <code>OutputDebugStringW()</code>.(Citation: wardle\
      \ evilquest partii)(Citation: Checkpoint Dridex Jan 2021)\nhttps://attack.mitre.org/techniques/T1622"
    translations:
      fr:
        name: "\xC9vasion du d\xE9bogueur"
        description: "Les adversaires peuvent employer divers moyens pour d\xE9tecter\
          \ et \xE9viter les d\xE9bogueurs. Les d\xE9bogueurs sont g\xE9n\xE9ralement\
          \ utilis\xE9s par les d\xE9fenseurs pour retracer et/ou analyser l\u2019\
          ex\xE9cution de charges utiles potentielles de malwares. (Citation : ProcessHacker\
          \ Github)\n\nL\u2019\xE9vasion du d\xE9bogueur peut inclure des changements\
          \ de comportements en fonction des r\xE9sultats des v\xE9rifications pour\
          \ la pr\xE9sence d\u2019artefacts indiquant un environnement d\xE9bogu\xE9\
          . \xC0 l\u2019instar de [Virtualisation/\xC9vasion bac \xE0 sable](https://attack.mitre.org/techniques/T1497),\
          \ si l\u2019adversaire d\xE9tecte un d\xE9bogueur, il peut modifier son\
          \ malware pour se d\xE9sengager de la victime ou dissimuler les fonctions\
          \ principales de l\u2019implant. Ils peuvent \xE9galement rechercher des\
          \ artefacts de d\xE9boguage avant de larguer des charges utiles secondaires\
          \ ou suppl\xE9mentaires.\n\nLes tests sp\xE9cifiques varient selon la cible\
          \ et/ou l\u2019adversaire. Sous Windows, cela peut impliquer des appels\
          \ de fonctions [API native](https://attack.mitre.org/techniques/T1106) tels\
          \ que <code>IsDebuggerPresent()</code> et <code> NtQueryInformationProcess(),</code>\
          \ ou la v\xE9rification manuelle du <code>drapeau BeingDebugged</code> du\
          \ bloc d\u2019environnement de processus (PEB). Sous Linux, cela peut impliquer\
          \ de rechercher \xAB /proc/self/status \xBB pour le champ \xAB TracerPID\
          \ \xBB, qui indique si le processus est trac\xE9 par des outils d\u2019\
          analyse dynamique. (Citation : Cado Security P2PInfect 2023)(Citation :\
          \ Positive Technologies Hellhounds 2023) D\u2019autres v\xE9rifications\
          \ des artefacts de d\xE9bogage peuvent \xE9galement viser \xE0 \xE9num\xE9\
          rer des points d\u2019arr\xEAt mat\xE9riels, des codes d\u2019op\xE9ration\
          \ d\u2019assemblage d\u2019interruption, des v\xE9rifications temporelles\
          \ ou des mesures si des exceptions sont lev\xE9es dans le processus en cours\
          \ (en supposant qu\u2019un d\xE9bogueur actuel \xAB avalerait \xBB ou g\xE8\
          re l\u2019erreur potentielle). (Citation : d\xE9bogage hasherezade)(Citation\
          \ : AlKhaser Debug)(Citation : d\xE9bogage vxunderground)\n\nLes logiciels\
          \ malveillants peuvent \xE9galement utiliser la gestion structur\xE9e des\
          \ exceptions (SEH) pour d\xE9tecter les d\xE9bogueurs en lan\xE7ant une\
          \ exception et en d\xE9tectant si le processus est suspendu. SEH g\xE8re\
          \ \xE0 la fois les attentes mat\xE9rielles et logicielles, assurant le contr\xF4\
          le des exceptions, y compris le support du d\xE9bogage. Si un d\xE9bogueur\
          \ est pr\xE9sent, le contr\xF4le du programme sera transf\xE9r\xE9 au d\xE9\
          bogueur et l\u2019ex\xE9cution du code sera suspendue. Si le d\xE9bogueur\
          \ n\u2019est pas pr\xE9sent, le contr\xF4le sera transf\xE9r\xE9 au gestionnaire\
          \ SEI, qui g\xE9rera automatiquement l\u2019exception et permettra \xE0\
          \ l\u2019ex\xE9cution du programme de se poursuivre. (Citation : Apriorit)\n\
          \nLes adversaires peuvent utiliser les informations acquises lors de ces\
          \ v\xE9rifications de d\xE9boguage lors de la d\xE9couverte automatis\xE9\
          e pour fa\xE7onner les comportements suivants. Les d\xE9bogueurs peuvent\
          \ \xE9galement \xEAtre contourn\xE9s en d\xE9tachant le processus ou en\
          \ inondant les journaux de d\xE9bogage avec des donn\xE9es d\xE9nu\xE9es\
          \ de sens via des messages produits par la boucle d\u2019appels de fonctions\
          \ [Native API](https://attack.mitre.org/techniques/T1106) tels que <code>OutputDebugStringW()</code>.\
          \ (Citation : wardle evilquest partii)(Citation : Checkpoint Dridex jan\
          \ 2021)\nhttps://attack.mitre.org/techniques/T1622"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1647
    ref_id: T1647
    name: Plist File Modification
    description: "Adversaries may modify property list files (plist files) to enable\
      \ other malicious activity, while also potentially evading and bypassing system\
      \ defenses. macOS applications use plist files, such as the <code>info.plist</code>\
      \ file, to store properties and configuration settings that inform the operating\
      \ system how to handle the application at runtime. Plist files are structured\
      \ metadata in key-value pairs formatted in XML based on Apple's Core Foundation\
      \ DTD. Plist files can be saved in text or binary format.(Citation: fileinfo\
      \ plist file description) \n\nAdversaries can modify key-value pairs in plist\
      \ files to influence system behaviors, such as hiding the execution of an application\
      \ (i.e. [Hidden Window](https://attack.mitre.org/techniques/T1564/003)) or running\
      \ additional commands for persistence (ex: [Launch Agent](https://attack.mitre.org/techniques/T1543/001)/[Launch\
      \ Daemon](https://attack.mitre.org/techniques/T1543/004) or [Re-opened Applications](https://attack.mitre.org/techniques/T1547/007)).\n\
      \nFor example, adversaries can add a malicious application path to the `~/Library/Preferences/com.apple.dock.plist`\
      \ file, which controls apps that appear in the Dock. Adversaries can also modify\
      \ the <code>LSUIElement</code> key in an application\u2019s <code>info.plist</code>\
      \ file  to run the app in the background. Adversaries can also insert key-value\
      \ pairs to insert environment variables, such as <code>LSEnvironment</code>,\
      \ to enable persistence via [Dynamic Linker Hijacking](https://attack.mitre.org/techniques/T1574/006).(Citation:\
      \ wardle chp2 persistence)(Citation: eset_osx_flashback)\nhttps://attack.mitre.org/techniques/T1647"
    translations:
      fr:
        name: Modification du fichier Plist
        description: "Les adversaires peuvent modifier les fichiers de liste de propri\xE9\
          t\xE9s (fichiers plist) pour permettre d\u2019autres activit\xE9s malveillantes,\
          \ tout en \xE9vitant et contournant potentiellement les d\xE9fenses du syst\xE8\
          me. Les applications macOS utilisent des fichiers plist, tels que le <code>fichier\
          \ info.plist</code>, pour stocker les propri\xE9t\xE9s et les param\xE8\
          tres de configuration qui indiquent au syst\xE8me d\u2019exploitation comment\
          \ g\xE9rer l\u2019application \xE0 l\u2019ex\xE9cution. Les fichiers Plist\
          \ sont des m\xE9tadonn\xE9es structur\xE9es en paires cl\xE9-valeur format\xE9\
          es en XML bas\xE9es sur le DTD Core Foundation d\u2019Apple. Les fichiers\
          \ Plist peuvent \xEAtre enregistr\xE9s en format texte ou binaire. (Citation\
          \ : infoinfo, description du fichier) \n\nLes adversaires peuvent modifier\
          \ les paires cl\xE9-valeur dans les fichiers plist pour influencer les comportements\
          \ du syst\xE8me, comme masquer l\u2019ex\xE9cution d\u2019une application\
          \ (c\u2019est-\xE0-dire [Fen\xEAtre cach\xE9e](https://attack.mitre.org/techniques/T1564/003))\
          \ ou ex\xE9cuter des commandes suppl\xE9mentaires pour la persistance (ex\
          \ : [Agent de lancement](https://attack.mitre.org/techniques/T1543/001)/[D\xE9\
          mon de lancement](https://attack.mitre.org/techniques/T1543/004) ou [Applications\
          \ rouvertes](https://attack.mitre.org/techniques/T1547/007)).\n\nPar exemple,\
          \ les adversaires peuvent ajouter un chemin d\u2019application malveillant\
          \ au fichier '~/Library/Preferences/com.apple.dock.plist', qui contr\xF4\
          le les applications apparaissant dans le Dock. Les adversaires peuvent \xE9\
          galement modifier la cl\xE9 <code>LSUIElement</code> dans le fichier <code>info.plist</code>\
          \ d\u2019une application pour faire tourner l\u2019application en arri\xE8\
          re-plan. Les adversaires peuvent \xE9galement ins\xE9rer des paires cl\xE9\
          -valeur pour ins\xE9rer des variables d\u2019environnement, telles que <code>LSEnvironment</code>,\
          \ afin de permettre la persistance via [Dynamic Linker Hijacking](https://attack.mitre.org/techniques/T1574/006).\
          \ (Citation : persistance de Wardle chp2)(Citation : eset_osx_flashback)\n\
          https://attack.mitre.org/techniques/T1647"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1648
    ref_id: T1648
    name: Serverless Execution
    description: "Adversaries may abuse serverless computing, integration, and automation\
      \ services to execute arbitrary code in cloud environments. Many cloud providers\
      \ offer a variety of serverless resources, including compute engines, application\
      \ integration services, and web servers. \n\nAdversaries may abuse these resources\
      \ in various ways as a means of executing arbitrary commands. For example, adversaries\
      \ may use serverless functions to execute malicious code, such as crypto-mining\
      \ malware (i.e. [Resource Hijacking](https://attack.mitre.org/techniques/T1496)).(Citation:\
      \ Cado Security Denonia) Adversaries may also create functions that enable further\
      \ compromise of the cloud environment. For example, an adversary may use the\
      \ `IAM:PassRole` permission in AWS or the `iam.serviceAccounts.actAs` permission\
      \ in Google Cloud to add [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003)\
      \ to a serverless cloud function, which may then be able to perform actions\
      \ the original user cannot.(Citation: Rhino Security Labs AWS Privilege Escalation)(Citation:\
      \ Rhingo Security Labs GCP Privilege Escalation)\n\nServerless functions can\
      \ also be invoked in response to cloud events (i.e. [Event Triggered Execution](https://attack.mitre.org/techniques/T1546)),\
      \ potentially enabling persistent execution over time. For example, in AWS environments,\
      \ an adversary may create a Lambda function that automatically adds [Additional\
      \ Cloud Credentials](https://attack.mitre.org/techniques/T1098/001) to a user\
      \ and a corresponding CloudWatch events rule that invokes that function whenever\
      \ a new user is created.(Citation: Backdooring an AWS account) This is also\
      \ possible in many cloud-based office application suites. For example, in Microsoft\
      \ 365 environments, an adversary may create a Power Automate workflow that forwards\
      \ all emails a user receives or creates anonymous sharing links whenever a user\
      \ is granted access to a document in SharePoint.(Citation: Varonis Power Automate\
      \ Data Exfiltration)(Citation: Microsoft DART Case Report 001) In Google Workspace\
      \ environments, they may instead create an Apps Script that exfiltrates a user's\
      \ data when they open a file.(Citation: Cloud Hack Tricks GWS Apps Script)(Citation:\
      \ OWN-CERT Google App Script 2024)\nhttps://attack.mitre.org/techniques/T1648"
    translations:
      fr:
        name: "Ex\xE9cution sans serveur"
        description: "Les adversaires peuvent utiliser des services d\u2019informatique\
          \ serverless, d\u2019int\xE9gration et d\u2019automatisation pour ex\xE9\
          cuter un code arbitraire dans des environnements cloud. De nombreux fournisseurs\
          \ cloud proposent une vari\xE9t\xE9 de ressources serverless, notamment\
          \ des moteurs de calcul, des services d\u2019int\xE9gration d\u2019applications\
          \ et des serveurs web. \n\nLes adversaires peuvent abuser de ces ressources\
          \ de diverses mani\xE8res pour ex\xE9cuter des ordres arbitraires. Par exemple,\
          \ les adversaires peuvent utiliser des fonctions serverless pour ex\xE9\
          cuter du code malveillant, comme des malwares de cryptominage (par exemple\
          \ [Resource Hijacking](https://attack.mitre.org/techniques/T1496)). (Citation\
          \ : Cado Security Denonia) Les adversaires peuvent \xE9galement cr\xE9er\
          \ des fonctions qui permettent de compromettre davantage l\u2019environnement\
          \ cloud. Par exemple, un adversaire peut utiliser la permission \xAB IAM\_\
          :PassRole \xBB dans AWS ou la permission \xAB iam.serviceAccounts.actAs\
          \ \xBB dans Google Cloud pour ajouter [R\xF4les Cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/003)\
          \ \xE0 une fonction cloud serverless, qui peut alors effectuer des actions\
          \ que l\u2019utilisateur original ne peut pas. (Citation : Escalade des\
          \ privil\xE8ges AWS de Rhino Security Labs)(Citation : Escalade des privil\xE8\
          ges GCP de Rhingo Security Labs)\n\nLes fonctions serverless peuvent \xE9\
          galement \xEAtre invoqu\xE9es en r\xE9ponse \xE0 des \xE9v\xE9nements cloud\
          \ (par exemple [Event Triggered Execution](https://attack.mitre.org/techniques/T1546)),\
          \ permettant potentiellement une ex\xE9cution persistante dans le temps.\
          \ Par exemple, dans les environnements AWS, un adversaire peut cr\xE9er\
          \ une fonction Lambda qui ajoute automatiquement [Additional Cloud Credentials](https://attack.mitre.org/techniques/T1098/001)\
          \ \xE0 un utilisateur ainsi qu\u2019une r\xE8gle d\u2019\xE9v\xE9nements\
          \ CloudWatch correspondante qui invoque cette fonction chaque fois qu\u2019\
          un nouvel utilisateur est cr\xE9\xE9. (Citation : Backdoor d\u2019un compte\
          \ AWS) Cela est \xE9galement possible dans de nombreuses suites d\u2019\
          applications bureautiques bas\xE9es sur le cloud. Par exemple, dans les\
          \ environnements Microsoft 365, un adversaire peut cr\xE9er un flux de travail\
          \ Power Automate qui transmet tous les emails re\xE7us par un utilisateur\
          \ ou cr\xE9e des liens de partage anonymes chaque fois qu\u2019un utilisateur\
          \ obtient l\u2019acc\xE8s \xE0 un document dans SharePoint. (Citation :\
          \ Exfiltration de donn\xE9es Varonis Power Automate)(Citation : Rapport\
          \ de cas Microsoft DART 001) Dans les environnements Google Workspace, ils\
          \ peuvent plut\xF4t cr\xE9er un script Apps qui exfiltre les donn\xE9es\
          \ de l\u2019utilisateur lors de l\u2019ouverture d\u2019un fichier. (Citation\
          \ : Le piratage du cloud trompe le script GWS Apps)(Citation : OWN-CERT\
          \ Google App Script 2024)\nhttps://attack.mitre.org/techniques/T1648"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1649
    ref_id: T1649
    name: Steal or Forge Authentication Certificates
    description: "Adversaries may steal or forge certificates used for authentication\
      \ to access remote systems or resources. Digital certificates are often used\
      \ to sign and encrypt messages and/or files. Certificates are also used as authentication\
      \ material. For example, Entra ID device certificates and Active Directory Certificate\
      \ Services (AD CS) certificates bind to an identity and can be used as credentials\
      \ for domain accounts.(Citation: O365 Blog Azure AD Device IDs)(Citation: Microsoft\
      \ AD CS Overview)\n\nAuthentication certificates can be both stolen and forged.\
      \ For example, AD CS certificates can be stolen from encrypted storage (in the\
      \ Registry or files)(Citation: APT29 Deep Look at Credential Roaming), misplaced\
      \ certificate files (i.e. [Unsecured Credentials](https://attack.mitre.org/techniques/T1552)),\
      \ or directly from the Windows certificate store via various crypto APIs.(Citation:\
      \ SpecterOps Certified Pre Owned)(Citation: GitHub CertStealer)(Citation: GitHub\
      \ GhostPack Certificates) With appropriate enrollment rights, users and/or machines\
      \ within a domain can also request and/or manually renew certificates from enterprise\
      \ certificate authorities (CA). This enrollment process defines various settings\
      \ and permissions associated with the certificate. Of note, the certificate\u2019\
      s extended key usage (EKU) values define signing, encryption, and authentication\
      \ use cases, while the certificate\u2019s subject alternative name (SAN) values\
      \ define the certificate owner\u2019s alternate names.(Citation: Medium Certified\
      \ Pre Owned)\n\nAbusing certificates for authentication credentials may enable\
      \ other behaviors such as [Lateral Movement](https://attack.mitre.org/tactics/TA0008).\
      \ Certificate-related misconfigurations may also enable opportunities for [Privilege\
      \ Escalation](https://attack.mitre.org/tactics/TA0004), by way of allowing users\
      \ to impersonate or assume privileged accounts or permissions via the identities\
      \ (SANs) associated with a certificate. These abuses may also enable [Persistence](https://attack.mitre.org/tactics/TA0003)\
      \ via stealing or forging certificates that can be used as [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ for the duration of the certificate's validity, despite user password resets.\
      \ Authentication certificates can also be stolen and forged for machine accounts.\n\
      \nAdversaries who have access to root (or subordinate) CA certificate private\
      \ keys (or mechanisms protecting/managing these keys) may also establish [Persistence](https://attack.mitre.org/tactics/TA0003)\
      \ by forging arbitrary authentication certificates for the victim domain (known\
      \ as \u201Cgolden\u201D certificates).(Citation: Medium Certified Pre Owned)\
      \ Adversaries may also target certificates and related services in order to\
      \ access other forms of credentials, such as [Golden Ticket](https://attack.mitre.org/techniques/T1558/001)\
      \ ticket-granting tickets (TGT) or NTLM plaintext.(Citation: Medium Certified\
      \ Pre Owned)\nhttps://attack.mitre.org/techniques/T1649"
    translations:
      fr:
        name: "Voler ou falsifier des certificats d\u2019authentification"
        description: "Les adversaires peuvent voler ou falsifier des certificats utilis\xE9\
          s pour l\u2019authentification afin d\u2019acc\xE9der \xE0 des syst\xE8\
          mes ou ressources distants. Les certificats num\xE9riques sont souvent utilis\xE9\
          s pour signer et chiffrer des messages et/ou des fichiers. Les certificats\
          \ sont \xE9galement utilis\xE9s comme mat\xE9riel d\u2019authentification.\
          \ Par exemple, les certificats de p\xE9riph\xE9riques Entra ID et les certificats\
          \ Active Directory Certificate Services (AD CS) se lient \xE0 une identit\xE9\
          \ et peuvent \xEAtre utilis\xE9s comme identifiants pour des comptes de\
          \ domaine. (Citation : O365 Blog Azure AD Device IDs)(Citation : Aper\xE7\
          u informatique Microsoft AD)\n\nLes certificats d\u2019authentification\
          \ peuvent \xEAtre vol\xE9s ou falsifi\xE9s. Par exemple, les certificats\
          \ AD CS peuvent \xEAtre vol\xE9s depuis un stockage chiffr\xE9 (dans le\
          \ registre ou les fichiers) (Citation : APT29 Deep Look at Credential Roaming),\
          \ des fichiers de certificats \xE9gar\xE9s (c\u2019est-\xE0-dire [identifiants\
          \ non s\xE9curis\xE9s](https://attack.mitre.org/techniques/T1552)), ou directement\
          \ depuis le magasin de certificats Windows via diverses API cryptographiques.\
          \ (Citation : SpecterOps certifi\xE9 d\u2019occasion certifi\xE9)(Citation\
          \ : GitHub CertStealer)(Citation : Certificats GitHub GhostPack) Avec des\
          \ droits d\u2019inscription appropri\xE9s, les utilisateurs et/ou machines\
          \ d\u2019un domaine peuvent \xE9galement demander et/ou renouveler manuellement\
          \ les certificats aupr\xE8s des autorit\xE9s de certification (CA) d\u2019\
          entreprise. Ce processus d\u2019inscription d\xE9finit divers param\xE8\
          tres et permissions associ\xE9s au certificat. \xC0 noter, les valeurs d\u2019\
          utilisation \xE9tendue de la cl\xE9 (EKU) du certificat d\xE9finissent les\
          \ cas d\u2019utilisation de signature, de chiffrement et d\u2019authentification,\
          \ tandis que les valeurs de nom alternatif (SAN) du certificat d\xE9finissent\
          \ les noms alternatifs du propri\xE9taire du certificat. (Citation : Moyen\
          \ certifi\xE9 d\u2019occasion)\n\nL\u2019abus des certificats pour obtenir\
          \ des identifiants d\u2019authentification peut permettre d\u2019autres\
          \ comportements tels que [Mouvement lat\xE9ral](https://attack.mitre.org/tactics/TA0008).\
          \ Les mauvaises configurations li\xE9es aux certificats peuvent \xE9galement\
          \ permettre des opportunit\xE9s d'[Escalade de privil\xE8ges](https://attack.mitre.org/tactics/TA0004),\
          \ en permettant aux utilisateurs d\u2019usurper l\u2019identit\xE9 ou d\u2019\
          assumer des comptes ou permissions privil\xE9gi\xE9s via les identit\xE9\
          s (SAN) associ\xE9es \xE0 un certificat. Ces abus peuvent \xE9galement permettre\
          \ la [Persistance](https://attack.mitre.org/tactics/TA0003) via le vol ou\
          \ la falsification de certificats pouvant \xEAtre utilis\xE9s comme [Comptes\
          \ valides](https://attack.mitre.org/techniques/T1078) pendant toute la dur\xE9\
          e de la validit\xE9 du certificat, malgr\xE9 les r\xE9initialisations du\
          \ mot de passe utilisateur. Les certificats d\u2019authentification peuvent\
          \ \xE9galement \xEAtre vol\xE9s et falsifi\xE9s pour les comptes machines.\n\
          \nLes adversaires ayant acc\xE8s aux cl\xE9s priv\xE9es de certificats racine\
          \ (ou subordonn\xE9s) (ou aux m\xE9canismes prot\xE9geant/g\xE9rant ces\
          \ cl\xE9s) peuvent \xE9galement \xE9tablir la [Persistance](https://attack.mitre.org/tactics/TA0003)\
          \ en falsifiant des certificats d\u2019authentification arbitraires pour\
          \ le domaine victime (appel\xE9s certificats \xAB dor\xE9s \xBB). (Citation\
          \ : Moyen certifi\xE9 d\u2019occasion) Les adversaires peuvent \xE9galement\
          \ cibler les certificats et services associ\xE9s afin d\u2019acc\xE9der\
          \ \xE0 d\u2019autres formes d\u2019identifiants, telles que les tickets\
          \ d\u2019octroi de billets [Golden Ticket](https://attack.mitre.org/techniques/T1558/001),\
          \ les tickets d\u2019attribution de billets (TGT) ou le texte en clair NTLM.\
          \ (Citation : Moyen certifi\xE9 d\u2019occasion)\nhttps://attack.mitre.org/techniques/T1649"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1650
    ref_id: T1650
    name: Acquire Access
    description: "Adversaries may purchase or otherwise acquire an existing access\
      \ to a target system or network. A variety of online services and initial access\
      \ broker networks are available to sell access to previously compromised systems.(Citation:\
      \ Microsoft Ransomware as a Service)(Citation: CrowdStrike Access Brokers)(Citation:\
      \ Krebs Access Brokers Fortune 500) In some cases, adversary groups may form\
      \ partnerships to share compromised systems with each other.(Citation: CISA\
      \ Karakurt 2022)\n\nFootholds to compromised systems may take a variety of forms,\
      \ such as access to planted backdoors (e.g., [Web Shell](https://attack.mitre.org/techniques/T1505/003))\
      \ or established access via [External Remote Services](https://attack.mitre.org/techniques/T1133).\
      \ In some cases, access brokers will implant compromised systems with a \u201C\
      load\u201D that can be used to install additional malware for paying customers.(Citation:\
      \ Microsoft Ransomware as a Service)\n\nBy leveraging existing access broker\
      \ networks rather than developing or obtaining their own initial access capabilities,\
      \ an adversary can potentially reduce the resources required to gain a foothold\
      \ on a target network and focus their efforts on later stages of compromise.\
      \ Adversaries may prioritize acquiring access to systems that have been determined\
      \ to lack security monitoring or that have high privileges, or systems that\
      \ belong to organizations in a particular sector.(Citation: Microsoft Ransomware\
      \ as a Service)(Citation: CrowdStrike Access Brokers)\n\nIn some cases, purchasing\
      \ access to an organization in sectors such as IT contracting, software development,\
      \ or telecommunications may allow an adversary to compromise additional victims\
      \ via a [Trusted Relationship](https://attack.mitre.org/techniques/T1199), [Multi-Factor\
      \ Authentication Interception](https://attack.mitre.org/techniques/T1111), or\
      \ even [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195).\n\
      \n**Note:** while this technique is distinct from other behaviors such as [Purchase\
      \ Technical Data](https://attack.mitre.org/techniques/T1597/002) and [Credentials](https://attack.mitre.org/techniques/T1589/001),\
      \ they may often be used in conjunction (especially where the acquired foothold\
      \ requires [Valid Accounts](https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1650"
    translations:
      fr:
        name: "Acquisition d\u2019acc\xE8s"
        description: "Les adversaires peuvent acheter ou acqu\xE9rir un acc\xE8s existant\
          \ \xE0 un syst\xE8me ou r\xE9seau cible. Une vari\xE9t\xE9 de services en\
          \ ligne et de r\xE9seaux de courtiers \xE0 acc\xE8s initial sont disponibles\
          \ pour vendre l\u2019acc\xE8s \xE0 des syst\xE8mes pr\xE9c\xE9demment compromis.\
          \ (Citation : Microsoft Ransomware en tant que service)(Citation : Courtiers\
          \ d\u2019acc\xE8s CrowdStrike)(Citation : Krebs Access Brokers, Fortune\
          \ 500) Dans certains cas, des groupes adverses peuvent former des partenariats\
          \ pour partager des syst\xE8mes compromis entre eux. (Citation : CISA Karakurt\
          \ 2022)\n\nLes prises de pied vers des syst\xE8mes compromis peuvent prendre\
          \ diverses formes, comme l\u2019acc\xE8s \xE0 des portes d\xE9rob\xE9es\
          \ plant\xE9es (par exemple, [Web Shell](https://attack.mitre.org/techniques/T1505/003))\
          \ ou un acc\xE8s \xE9tabli via [Services externes \xE0 distance](https://attack.mitre.org/techniques/T1133).\
          \ Dans certains cas, les courtiers d\u2019acc\xE8s implantent des syst\xE8\
          mes compromis avec une \xAB charge \xBB qui peut \xEAtre utilis\xE9e pour\
          \ installer des malwares suppl\xE9mentaires pour les clients payants. (Citation\
          \ : Microsoft Ransomware en tant que service)\n\nEn exploitant les r\xE9\
          seaux d\u2019interm\xE9diaires d\u2019acc\xE8s existants plut\xF4t que de\
          \ d\xE9velopper ou d\u2019obtenir ses propres capacit\xE9s d\u2019acc\xE8\
          s initiales, un adversaire peut potentiellement r\xE9duire les ressources\
          \ n\xE9cessaires pour s\u2019implanter sur un r\xE9seau cible et concentrer\
          \ ses efforts sur les \xE9tapes ult\xE9rieures de compromis. Les adversaires\
          \ peuvent privil\xE9gier l\u2019acc\xE8s \xE0 des syst\xE8mes qui ont \xE9\
          t\xE9 jug\xE9s d\xE9pourvus de surveillance de s\xE9curit\xE9 ou disposant\
          \ de privil\xE8ges \xE9lev\xE9s, ou \xE0 des syst\xE8mes appartenant \xE0\
          \ des organisations d\u2019un secteur particulier. (Citation : Microsoft\
          \ Ransomware en tant que service)(Citation : Courtiers d\u2019acc\xE8s CrowdStrike)\n\
          \nDans certains cas, l\u2019achat d\u2019acc\xE8s \xE0 une organisation\
          \ dans des secteurs tels que la contractation informatique, le d\xE9veloppement\
          \ logiciel ou les t\xE9l\xE9communications peut permettre \xE0 un adversaire\
          \ de compromettre d\u2019autres victimes via une [Relation de Confiance](https://attack.mitre.org/techniques/T1199),\
          \ une [Interception d\u2019Authentification Multi-Facteur](https://attack.mitre.org/techniques/T1111),\
          \ voire une [Compromission de la Cha\xEEne d\u2019Approvisionnement](https://attack.mitre.org/techniques/T1195).\n\
          \n**Note :** Bien que cette technique se distingue d\u2019autres comportements\
          \ tels que [Acheter des donn\xE9es techniques](https://attack.mitre.org/techniques/T1597/002)\
          \ et [Identifiants](https://attack.mitre.org/techniques/T1589/001), elles\
          \ peuvent souvent \xEAtre utilis\xE9es conjointement (surtout lorsque la\
          \ pr\xE9sence acquise n\xE9cessite [Comptes valides](https://attack.mitre.org/techniques/T1078)).\n\
          https://attack.mitre.org/techniques/T1650"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1651
    ref_id: T1651
    name: Cloud Administration Command
    description: "Adversaries may abuse cloud management services to execute commands\
      \ within virtual machines. Resources such as AWS Systems Manager, Azure RunCommand,\
      \ and Runbooks allow users to remotely run scripts in virtual machines by leveraging\
      \ installed virtual machine agents. (Citation: AWS Systems Manager Run Command)(Citation:\
      \ Microsoft Run Command)\n\nIf an adversary gains administrative access to a\
      \ cloud environment, they may be able to abuse cloud management services to\
      \ execute commands in the environment\u2019s virtual machines. Additionally,\
      \ an adversary that compromises a service provider or delegated administrator\
      \ account may similarly be able to leverage a [Trusted Relationship](https://attack.mitre.org/techniques/T1199)\
      \ to execute commands in connected virtual machines.(Citation: MSTIC Nobelium\
      \ Oct 2021)\nhttps://attack.mitre.org/techniques/T1651"
    translations:
      fr:
        name: "Commandement d\u2019administration cloud"
        description: "Les adversaires peuvent abuser des services de gestion cloud\
          \ pour ex\xE9cuter des commandes au sein de machines virtuelles. Des ressources\
          \ telles qu\u2019AWS Systems Manager, Azure RunCommand et Runbooks permettent\
          \ aux utilisateurs d\u2019ex\xE9cuter \xE0 distance des scripts dans des\
          \ machines virtuelles en exploitant des agents de machines virtuelles install\xE9\
          s. (Citation : AWS Systems Manager Run Command)(Citation : Microsoft Run\
          \ Command)\n\nSi un adversaire obtient un acc\xE8s administratif \xE0 un\
          \ environnement cloud, il peut \xEAtre capable d\u2019abuser des services\
          \ de gestion cloud pour ex\xE9cuter des commandes dans les machines virtuelles\
          \ de l\u2019environnement. De plus, un adversaire qui compromet un compte\
          \ fournisseur de services ou administrateur d\xE9l\xE9gu\xE9 peut \xE9galement\
          \ \xEAtre capable d\u2019exploiter une [Relation de Confiance](https://attack.mitre.org/techniques/T1199)\
          \ pour ex\xE9cuter des commandes dans des machines virtuelles connect\xE9\
          es. (Citation : MSTIC Nobelium oct. 2021)\nhttps://attack.mitre.org/techniques/T1651"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1652
    ref_id: T1652
    name: Device Driver Discovery
    description: 'Adversaries may attempt to enumerate local device drivers on a victim
      host. Information about device drivers may highlight various insights that shape
      follow-on behaviors, such as the function/purpose of the host, present security
      tools (i.e. [Security Software Discovery](https://attack.mitre.org/techniques/T1518/001))
      or other defenses (e.g., [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)),
      as well as potential exploitable vulnerabilities (e.g., [Exploitation for Privilege
      Escalation](https://attack.mitre.org/techniques/T1068)).


      Many OS utilities may provide information about local device drivers, such as
      `driverquery.exe` and the `EnumDeviceDrivers()` API function on Windows.(Citation:
      Microsoft Driverquery)(Citation: Microsoft EnumDeviceDrivers) Information about
      device drivers (as well as associated services, i.e., [System Service Discovery](https://attack.mitre.org/techniques/T1007))
      may also be available in the Registry.(Citation: Microsoft Registry Drivers)


      On Linux/macOS, device drivers (in the form of kernel modules) may be visible
      within `/dev` or using utilities such as `lsmod` and `modinfo`.(Citation: Linux
      Kernel Programming)(Citation: lsmod man)(Citation: modinfo man)

      https://attack.mitre.org/techniques/T1652'
    translations:
      fr:
        name: "D\xE9couverte des pilotes de p\xE9riph\xE9rique"
        description: "Les adversaires peuvent tenter d\u2019\xE9num\xE9rer les pilotes\
          \ de p\xE9riph\xE9riques locaux sur un h\xF4te victime. Les informations\
          \ sur les pilotes de p\xE9riph\xE9riques peuvent mettre en lumi\xE8re diverses\
          \ informations qui fa\xE7onnent les comportements ult\xE9rieurs, tels que\
          \ la fonction/la finalit\xE9 de l\u2019h\xF4te, les outils de s\xE9curit\xE9\
          \ actuels (par exemple [D\xE9couverte de logiciels de s\xE9curit\xE9](https://attack.mitre.org/techniques/T1518/001))\
          \ ou d\u2019autres d\xE9fenses (par exemple, [Virtualisation/\xC9vasion\
          \ bac \xE0 sable](https://attack.mitre.org/techniques/T1497)), ainsi que\
          \ des vuln\xE9rabilit\xE9s potentielles exploitables (par exemple, [Exploitation\
          \ pour l\u2019escalade de privil\xE8ges](https://attack.mitre.org/techniques/T1068)).\n\
          \nDe nombreux utilitaires d\u2019OS peuvent fournir des informations sur\
          \ les pilotes locaux, tels que \xAB driverquery.exe \xBB et la fonction\
          \ API \xAB EnumDeviceDrivers()\_\xBB sous Windows. (Citation : Microsoft\
          \ Driverquery)(Citation : Microsoft EnumDeviceDrivers) Des informations\
          \ sur les pilotes de p\xE9riph\xE9riques (ainsi que les services associ\xE9\
          s, c\u2019est-\xE0-dire [D\xE9couverte de Service Syst\xE8me](https://attack.mitre.org/techniques/T1007))\
          \ peuvent \xE9galement \xEAtre disponibles dans le Registre. (Citation :\
          \ Pilotes du registre Microsoft)\n\nSous Linux/macOS, les pilotes de p\xE9\
          riph\xE9riques (sous forme de modules du noyau) peuvent \xEAtre visibles\
          \ dans \xAB /dev \xBB ou en utilisant des utilitaires tels que \xAB lsmod\
          \ \xBB et \xAB modinfo \xBB. (Citation : Programmation du noyau Linux)(Citation\
          \ : lsmod man)(Citation : modinfo man)\nhttps://attack.mitre.org/techniques/T1652"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1653
    ref_id: T1653
    name: Power Settings
    description: 'Adversaries may impair a system''s ability to hibernate, reboot,
      or shut down in order to extend access to infected machines. When a computer
      enters a dormant state, some or all software and hardware may cease to operate
      which can disrupt malicious activity.(Citation: Sleep, shut down, hibernate)


      Adversaries may abuse system utilities and configuration settings to maintain
      access by preventing machines from entering a state, such as standby, that can
      terminate malicious activity.(Citation: Microsoft: Powercfg command-line options)(Citation:
      systemdsleep Linux)


      For example, `powercfg` controls all configurable power system settings on a
      Windows system and can be abused to prevent an infected host from locking or
      shutting down.(Citation: Two New Monero Malware Attacks Target Windows and Android
      Users) Adversaries may also extend system lock screen timeout settings.(Citation:
      BATLOADER: The Evasive Downloader Malware) Other relevant settings, such as
      disk and hibernate timeout, can be similarly abused to keep the infected machine
      running even if no user is active.(Citation: CoinLoader: A Sophisticated Malware
      Loader Campaign)


      Aware that some malware cannot survive system reboots, adversaries may entirely
      delete files used to invoke system shut down or reboot.(Citation: Condi-Botnet-binaries)

      https://attack.mitre.org/techniques/T1653'
    translations:
      fr:
        name: "R\xE9glages de puissance"
        description: "Les adversaires peuvent entraver la capacit\xE9 d\u2019un syst\xE8\
          me \xE0 hiberner, red\xE9marrer ou s\u2019\xE9teindre afin d\u2019\xE9tendre\
          \ l\u2019acc\xE8s aux machines infect\xE9es. Lorsqu\u2019un ordinateur entre\
          \ en dormance, certains ou tous les logiciels et mat\xE9riels peuvent cesser\
          \ de fonctionner, ce qui peut perturber une activit\xE9 malveillante. (Citation\
          \ : Dormir, s\u2019\xE9teindre, hiberner)\n\nLes adversaires peuvent abuser\
          \ des utilitaires syst\xE8me et des param\xE8tres de configuration pour\
          \ maintenir l\u2019acc\xE8s en emp\xEAchant les machines d\u2019entrer dans\
          \ un \xE9tat, comme en veille, qui peut mettre fin \xE0 une activit\xE9\
          \ malveillante. (Citation : Microsoft : options Powercfg en ligne de commande)(Citation\
          \ : systemdsleep Linux)\n\nPar exemple, \xAB powercfg \xBB contr\xF4le tous\
          \ les param\xE8tres configurables du syst\xE8me d\u2019alimentation sur\
          \ un syst\xE8me Windows et peut \xEAtre abus\xE9 pour emp\xEAcher un h\xF4\
          te infect\xE9 de se bloquer ou de s\u2019\xE9teindre. (Citation : Deux nouvelles\
          \ attaques de logiciels malveillants Monero ciblent les utilisateurs Windows\
          \ et Android) Les adversaires peuvent \xE9galement \xE9tendre les param\xE8\
          tres de temps d\u2019expiration de l\u2019\xE9cran de verrouillage du syst\xE8\
          me. (Citation : BATLOADER : Le logiciel malveillant t\xE9l\xE9chargeur d\u2019\
          \xE9vasion) D\u2019autres param\xE8tres pertinents, comme le temps d\u2019\
          attente du disque et de l\u2019hibernation, peuvent \xEAtre \xE9galement\
          \ abus\xE9s pour maintenir la machine infect\xE9e en fonctionnement m\xEA\
          me si aucun utilisateur n\u2019est actif. (Citation : CoinLoader : une campagne\
          \ sophistiqu\xE9e de chargeur de malwares)\n\nConscients que certains malwares\
          \ ne peuvent pas survivre aux red\xE9marrages syst\xE8me, les adversaires\
          \ peuvent supprimer enti\xE8rement les fichiers utilis\xE9s pour d\xE9clencher\
          \ l\u2019arr\xEAt ou le red\xE9marrage du syst\xE8me. (Citation : Condi-Botnet-binaires)\n\
          https://attack.mitre.org/techniques/T1653"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1654
    ref_id: T1654
    name: Log Enumeration
    description: "Adversaries may enumerate system and service logs to find useful\
      \ data. These logs may highlight various types of valuable insights for an adversary,\
      \ such as user authentication records ([Account Discovery](https://attack.mitre.org/techniques/T1087)),\
      \ security or vulnerable software ([Software Discovery](https://attack.mitre.org/techniques/T1518)),\
      \ or hosts within a compromised network ([Remote System Discovery](https://attack.mitre.org/techniques/T1018)).\n\
      \nHost binaries may be leveraged to collect system logs. Examples include using\
      \ `wevtutil.exe` or [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ on Windows to access and/or export security event information.(Citation: WithSecure\
      \ Lazarus-NoPineapple Threat Intel Report 2023)(Citation: Cadet Blizzard emerges\
      \ as novel threat actor) In cloud environments, adversaries may leverage utilities\
      \ such as the Azure VM Agent\u2019s `CollectGuestLogs.exe` to collect security\
      \ logs from cloud hosted infrastructure.(Citation: SIM Swapping and Abuse of\
      \ the Microsoft Azure Serial Console)\n\nAdversaries may also target centralized\
      \ logging infrastructure such as SIEMs. Logs may also be bulk exported and sent\
      \ to adversary-controlled infrastructure for offline analysis.\n\nIn addition\
      \ to gaining a better understanding of the environment, adversaries may also\
      \ monitor logs in real time to track incident response procedures. This may\
      \ allow them to adjust their techniques in order to maintain persistence or\
      \ evade defenses.(Citation: Permiso GUI-Vil 2023)\nhttps://attack.mitre.org/techniques/T1654"
    translations:
      fr:
        name: "\xC9num\xE9ration des logarthiques"
        description: "Les adversaires peuvent \xE9num\xE9rer des journaux syst\xE8\
          me et de service pour trouver des donn\xE9es utiles. Ces journaux peuvent\
          \ mettre en \xE9vidence divers types d\u2019informations pr\xE9cieuses pour\
          \ un adversaire, telles que les enregistrements d\u2019authentification\
          \ utilisateur ([D\xE9couverte de compte](https://attack.mitre.org/techniques/T1087)),\
          \ la s\xE9curit\xE9 ou un logiciel vuln\xE9rable ([D\xE9couverte de logiciel](https://attack.mitre.org/techniques/T1518)),\
          \ ou des h\xF4tes au sein d\u2019un r\xE9seau compromis ([D\xE9couverte\
          \ de syst\xE8me \xE0 distance](https://attack.mitre.org/techniques/T1018)).\n\
          \nLes binaires h\xF4tes peuvent \xEAtre exploit\xE9s pour collecter les\
          \ journaux syst\xE8me. Parmi les exemples, on trouve l\u2019utilisation\
          \ de \xAB wevtutil.exe \xBB ou [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ sous Windows pour acc\xE9der et/ou exporter des informations sur les \xE9\
          v\xE9nements de s\xE9curit\xE9. (Citation : Rapport de renseignement sur\
          \ la menace WithSecure Lazarus-NoPineapple 2023)(Citation : Cadet Blizzard\
          \ \xE9merge comme un acteur de menace in\xE9dit) Dans les environnements\
          \ cloud, les adversaires peuvent exploiter des utilitaires tels que le \xAB\
          \ CollectGuestLogs.exe \xBB de l\u2019Agent VM Azure pour collecter les\
          \ journaux de s\xE9curit\xE9 depuis l\u2019infrastructure h\xE9berg\xE9\
          e dans le cloud. (Citation : \xC9change de SIM et abus de la console s\xE9\
          rie Microsoft Azure)\n\nLes adversaires peuvent \xE9galement viser des infrastructures\
          \ centralis\xE9es de journalisation telles que les SIEM. Les journaux peuvent\
          \ \xE9galement \xEAtre export\xE9s en masse et envoy\xE9s \xE0 une infrastructure\
          \ contr\xF4l\xE9e par l\u2019adversaire pour une analyse hors ligne.\n\n\
          En plus d\u2019acqu\xE9rir une meilleure compr\xE9hension de l\u2019environnement,\
          \ les adversaires peuvent \xE9galement surveiller les journaux en temps\
          \ r\xE9el pour suivre les proc\xE9dures de r\xE9ponse aux incidents. Cela\
          \ peut leur permettre d\u2019ajuster leurs techniques afin de maintenir\
          \ leur pers\xE9v\xE9rance ou d\u2019\xE9chapper aux d\xE9fenses. (Citation\
          \ : Permiso GUI-Vil 2023)\nhttps://attack.mitre.org/techniques/T1654"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1657
    ref_id: T1657
    name: Financial Theft
    description: "Adversaries may steal monetary resources from targets through extortion,\
      \ social engineering, technical theft, or other methods aimed at their own financial\
      \ gain at the expense of the availability of these resources for victims. Financial\
      \ theft is the ultimate objective of several popular campaign types including\
      \ extortion by ransomware,(Citation: FBI-ransomware) business email compromise\
      \ (BEC) and fraud,(Citation: FBI-BEC) \"pig butchering,\"(Citation: wired-pig\
      \ butchering) bank hacking,(Citation: DOJ-DPRK Heist) and exploiting cryptocurrency\
      \ networks.(Citation: BBC-Ronin) \n\nAdversaries may [Compromise Accounts](https://attack.mitre.org/techniques/T1586)\
      \ to conduct unauthorized transfers of funds.(Citation: Internet crime report\
      \ 2022) In the case of business email compromise or email fraud, an adversary\
      \ may utilize [Impersonation](https://attack.mitre.org/techniques/T1684/001)\
      \ of a trusted entity. Once the social engineering is successful, victims can\
      \ be deceived into sending money to financial accounts controlled by an adversary.(Citation:\
      \ FBI-BEC) This creates the potential for multiple victims (i.e., compromised\
      \ accounts as well as the ultimate monetary loss) in incidents involving financial\
      \ theft.(Citation: VEC)\n\nExtortion by ransomware may occur, for example, when\
      \ an adversary demands payment from a victim after [Data Encrypted for Impact](https://attack.mitre.org/techniques/T1486)\
      \ (Citation: NYT-Colonial) and [Exfiltration](https://attack.mitre.org/tactics/TA0010)\
      \ of data, followed by threatening to leak sensitive data to the public unless\
      \ payment is made to the adversary.(Citation: Mandiant-leaks) Adversaries may\
      \ use dedicated leak sites to distribute victim data.(Citation: Crowdstrike-leaks)\n\
      \nDue to the potentially immense business impact of financial theft, an adversary\
      \ may abuse the possibility of financial theft and seeking monetary gain to\
      \ divert attention from their true goals such as [Data Destruction](https://attack.mitre.org/techniques/T1485)\
      \ and business disruption.(Citation: AP-NotPetya)\nhttps://attack.mitre.org/techniques/T1657"
    translations:
      fr:
        name: Vol financier
        description: "Les adversaires peuvent voler des ressources mon\xE9taires \xE0\
          \ des cibles par extorsion, ing\xE9nierie sociale, vol technique ou d\u2019\
          autres moyens visant \xE0 leur propre profit financier au d\xE9triment de\
          \ la disponibilit\xE9 de ces ressources pour les victimes. Le vol financier\
          \ est l\u2019objectif ultime de plusieurs types de campagnes populaires,\
          \ notamment l\u2019extorsion par ransomware (Citation : FBI-ransomware),\
          \ la compromission des emails commerciaux (BEC) et la fraude (Citation :\
          \ FBI-BEC), le \xAB massacre de cochons \xBB (Citation : \xAB Wired-pig\
          \ bitchering \xBB), le piratage bancaire (Citation : CAQ DOJ-RPDC) et l\u2019\
          exploitation de r\xE9seaux de cryptomonnaies. (Citation : BBC-Ronin) \n\n\
          Les adversaires peuvent [compromettre les comptes](https://attack.mitre.org/techniques/T1586)\
          \ pour effectuer des transferts non autoris\xE9s de fonds. (Citation : Rapport\
          \ de criminalit\xE9 sur Internet 2022) Dans le cas de compromission ou de\
          \ fraude par email professionnel, un adversaire peut utiliser [Usurpation\
          \ d\u2019identit\xE9](https://attack.mitre.org/techniques/T1684/001) d\u2019\
          une entit\xE9 de confiance. Une fois l\u2019ing\xE9nierie sociale r\xE9\
          ussie, les victimes peuvent \xEAtre tromp\xE9es et envoyer de l\u2019argent\
          \ sur des comptes financiers contr\xF4l\xE9s par un adversaire. (Citation\
          \ : FBI-BEC) Cela cr\xE9e le risque de multiples victimes (c\u2019est-\xE0\
          -dire des comptes compromis ainsi que la perte financi\xE8re ultime) dans\
          \ des incidents impliquant des vols financiers. (Citation : VEC)\n\nL\u2019\
          extorsion par ransomware peut survenir, par exemple, lorsqu\u2019un adversaire\
          \ exige un paiement \xE0 une victime apr\xE8s [Donn\xE9es chiffr\xE9es pour\
          \ impact](https://attack.mitre.org/techniques/T1486) (Citation : NYT-Colonial)\
          \ et [Exfiltration](https://attack.mitre.org/tactics/TA0010) de donn\xE9\
          es, suivies de menaces de divulguer des donn\xE9es sensibles au public \xE0\
          \ moins qu\u2019un paiement ne soit effectu\xE9 \xE0 l\u2019adversaire.\
          \ (Citation : Mandiant-fuites) Les adversaires peuvent utiliser des sites\
          \ d\xE9di\xE9s aux fuites pour distribuer les donn\xE9es des victimes. (Citation\
          \ : Fuites de la foule)\n\nEn raison de l\u2019impact potentiel \xE9norme\
          \ sur les affaires du vol financier, un adversaire peut abuser de la possibilit\xE9\
          \ de ce vol financier et de chercher un gain financier pour d\xE9tourner\
          \ l\u2019attention de ses v\xE9ritables objectifs tels que la [destruction\
          \ des donn\xE9es](https://attack.mitre.org/techniques/T1485) et la perturbation\
          \ des activit\xE9s. (Citation : AP-NotPetya)\nhttps://attack.mitre.org/techniques/T1657"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1659
    ref_id: T1659
    name: Content Injection
    description: 'Adversaries may gain access and continuously communicate with victims
      by injecting malicious content into systems through online network traffic.
      Rather than luring victims to malicious payloads hosted on a compromised website
      (i.e., [Drive-by Target](https://attack.mitre.org/techniques/T1608/004) followed
      by [Drive-by Compromise](https://attack.mitre.org/techniques/T1189)), adversaries
      may initially access victims through compromised data-transfer channels where
      they can manipulate traffic and/or inject their own content. These compromised
      online network channels may also be used to deliver additional payloads (i.e.,
      [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)) and other
      data to already compromised systems.(Citation: ESET MoustachedBouncer)


      Adversaries may inject content to victim systems in various ways, including:


      * From the middle, where the adversary is in-between legitimate online client-server
      communications (**Note:** this is similar but distinct from [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557),
      which describes AiTM activity solely within an enterprise environment) (Citation:
      Kaspersky Encyclopedia MiTM)

      * From the side, where malicious content is injected and races to the client
      as a fake response to requests of a legitimate online server (Citation: Kaspersky
      ManOnTheSide)


      Content injection is often the result of compromised upstream communication
      channels, for example at the level of an internet service provider (ISP) as
      is the case with "lawful interception."(Citation: Kaspersky ManOnTheSide)(Citation:
      ESET MoustachedBouncer)(Citation: EFF China GitHub Attack)

      https://attack.mitre.org/techniques/T1659'
    translations:
      fr:
        name: Injection de contenu
        description: "Les adversaires peuvent acc\xE9der et communiquer continuellement\
          \ avec les victimes en injectant du contenu malveillant dans les syst\xE8\
          mes via le trafic r\xE9seau en ligne. Plut\xF4t que d\u2019attirer les victimes\
          \ vers des charges utiles malveillantes h\xE9berg\xE9es sur un site web\
          \ compromis (c\u2019est-\xE0-dire [Cible en voiture](https://attack.mitre.org/techniques/T1608/004)\
          \ suivie de [Compromission en voiture](https://attack.mitre.org/techniques/T1189)),\
          \ les adversaires peuvent initialement acc\xE9der aux victimes via des canaux\
          \ de transfert de donn\xE9es compromis o\xF9 elles peuvent manipuler le\
          \ trafic et/ou injecter leur propre contenu. Ces canaux r\xE9seau en ligne\
          \ compromis peuvent \xE9galement \xEAtre utilis\xE9s pour livrer des charges\
          \ utiles suppl\xE9mentaires (par exemple, [Transfer d\u2019outil d\u2019\
          entr\xE9e](https://attack.mitre.org/techniques/T1105)) et d\u2019autres\
          \ donn\xE9es \xE0 des syst\xE8mes d\xE9j\xE0 compromis. (Citation : Bouncer\
          \ de moustache ESET)\n\nLes adversaires peuvent injecter du contenu dans\
          \ les syst\xE8mes victimes de diverses mani\xE8res, notamment :\n\n* Au\
          \ centre, o\xF9 l\u2019adversaire se trouve entre des communications l\xE9\
          gitimes en ligne client-serveur (**Note :** ceci est similaire mais distinct\
          \ de [Adversaire-in-the-Middle](https://attack.mitre.org/techniques/T1557),\
          \ qui d\xE9crit l\u2019activit\xE9 IaTM uniquement dans un environnement\
          \ d\u2019entreprise) (Citation : Kaspersky Encyclopedia MiTM)\n* Depuis\
          \ le c\xF4t\xE9, o\xF9 du contenu malveillant est inject\xE9 et se dirige\
          \ vers le client comme une fausse r\xE9ponse aux demandes d\u2019un serveur\
          \ en ligne l\xE9gitime (Citation : Kaspersky ManOnTheSide)\n\nL\u2019injection\
          \ de contenu r\xE9sulte souvent de canaux de communication en amont compromis,\
          \ par exemple au niveau d\u2019un fournisseur d\u2019acc\xE8s Internet (FAI),\
          \ comme c\u2019est le cas pour \xAB interception l\xE9gale \xBB. (Citation\
          \ : Kaspersky ManOnTheSide)(Citation : Bouncer de moustache ESET)(Citation\
          \ : Attaque EFF China sur GitHub)\nhttps://attack.mitre.org/techniques/T1659"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1665
    ref_id: T1665
    name: Hide Infrastructure
    description: 'Adversaries may manipulate network traffic in order to hide and
      evade detection of their C2 infrastructure. This can be accomplished by identifying
      and filtering traffic from defensive tools,(Citation: TA571) masking malicious
      domains to obfuscate the true destination from both automated scanning tools
      and security researchers,(Citation: Schema-abuse)(Citation: Facad1ng)(Citation:
      Browser-updates) and otherwise hiding malicious artifacts to delay discovery
      and prolong the effectiveness of adversary infrastructure that could otherwise
      be identified, blocked, or taken down entirely.


      C2 networks may include the use of [Proxy](https://attack.mitre.org/techniques/T1090)
      or VPNs to disguise IP addresses, which can allow adversaries to blend in with
      normal network traffic and bypass conditional access policies or anti-abuse
      protections. For example, an adversary may use a virtual private cloud to spoof
      their IP address to closer align with a victim''s IP address ranges. This may
      also bypass security measures relying on geolocation of the source IP address.(Citation:
      sysdig)(Citation: Orange Residential Proxies)


      Adversaries may also attempt to filter network traffic in order to evade defensive
      tools in numerous ways, including blocking/redirecting common incident responder
      or security appliance user agents.(Citation: mod_rewrite)(Citation: SocGholish-update)
      Filtering traffic based on IP and geo-fencing may also avoid automated sandboxing
      or researcher activity (i.e., [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)).(Citation:
      TA571)(Citation: mod_rewrite)


      Hiding C2 infrastructure may also be supported by [Resource Development](https://attack.mitre.org/tactics/TA0042)
      activities such as [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      and [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584).
      For example, using widely trusted hosting services or domains such as prominent
      URL shortening providers or marketing services for C2 networks may enable adversaries
      to present benign content that later redirects victims to malicious web pages
      or infrastructure once specific conditions are met.(Citation: StarBlizzard)(Citation:
      QR-cofense)

      https://attack.mitre.org/techniques/T1665'
    translations:
      fr:
        name: "Infrastructure cach\xE9e"
        description: "Les adversaires peuvent manipuler le trafic r\xE9seau afin de\
          \ dissimuler et d\u2019\xE9viter la d\xE9tection de leur infrastructure\
          \ C2. Cela peut \xEAtre r\xE9alis\xE9 en identifiant et filtrant le trafic\
          \ provenant d\u2019outils d\xE9fensifs, (Citation : TA571), en masquant\
          \ les domaines malveillants pour brouiller la v\xE9ritable destination \xE0\
          \ la fois des outils de balayage automatis\xE9 et des chercheurs en s\xE9\
          curit\xE9, (Citation : Abus de sch\xE9ma) (Citation : Facad1ng)(Citation\
          \ : mises \xE0 jour du navigateur) et en masquant autrement des artefacts\
          \ malveillants pour retarder la d\xE9couverte et prolonger l\u2019efficacit\xE9\
          \ de l\u2019infrastructure adverse qui pourrait autrement \xEAtre identifi\xE9\
          e,  bloqu\xE9, ou compl\xE8tement supprim\xE9.\n\nLes r\xE9seaux C2 peuvent\
          \ inclure l\u2019utilisation de [Proxi](https://attack.mitre.org/techniques/T1090)\
          \ ou de VPN pour dissimuler les adresses IP, ce qui permet aux adversaires\
          \ de se fondre dans le trafic r\xE9seau normal et de contourner les politiques\
          \ d\u2019acc\xE8s conditionnels ou les protections anti-abus. Par exemple,\
          \ un adversaire peut utiliser un cloud priv\xE9 virtuel pour usurper son\
          \ adresse IP afin de l\u2019aligner davantage avec les plages d\u2019adresses\
          \ IP d\u2019une victime. Cela peut \xE9galement contourner les mesures de\
          \ s\xE9curit\xE9 bas\xE9es sur la g\xE9olocalisation de l\u2019adresse IP\
          \ source. (Citation : sysdig)(Citation : Proxies r\xE9sidentiels orange)\n\
          \nLes adversaires peuvent \xE9galement tenter de filtrer le trafic r\xE9\
          seau afin d\u2019\xE9chapper aux outils d\xE9fensifs de multiples fa\xE7\
          ons, notamment en bloquant/redirigeant les intervenants courants ou les\
          \ agents utilisateurs des appareils de s\xE9curit\xE9. (Citation : mod_rewrite)(Citation\
          \ : mise \xE0 jour SocGholish) Le filtrage du trafic bas\xE9 sur l\u2019\
          IP et le g\xE9o-rep\xE9rage peut \xE9galement \xE9viter le sandboxing automatis\xE9\
          \ ou l\u2019activit\xE9 des chercheurs (c\u2019est-\xE0-dire [Virtualisation/\xC9\
          vasion du bac \xE0 sable](https://attack.mitre.org/techniques/T1497)). (Citation\
          \ : TA571)(Citation : mod_rewrite)\n\nLa dissimulation de l\u2019infrastructure\
          \ C2 peut \xE9galement \xEAtre support\xE9e par des activit\xE9s de [D\xE9\
          veloppement des ressources](https://attack.mitre.org/tactics/TA0042) telles\
          \ que [Acqu\xE9rir des infrastructures](https://attack.mitre.org/techniques/T1583)\
          \ et [Compromis infrastructure](https://attack.mitre.org/techniques/T1584).\
          \ Par exemple, l\u2019utilisation de services d\u2019h\xE9bergement ou de\
          \ domaines largement fiables tels que des fournisseurs de raccourcissement\
          \ d\u2019URL importants ou des services marketing pour les r\xE9seaux C2\
          \ peut permettre aux adversaires de pr\xE9senter un contenu inoffensif qui\
          \ redirige ensuite les victimes vers des pages web ou des infrastructures\
          \ malveillantes une fois que certaines conditions sont remplies. (Citation\
          \ : StarBlizzard)(Citation : QR-cofense)\nhttps://attack.mitre.org/techniques/T1665"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1666
    ref_id: T1666
    name: Modify Cloud Resource Hierarchy
    description: "Adversaries may attempt to modify hierarchical structures in infrastructure-as-a-service\
      \ (IaaS) environments in order to evade defenses.  \n\nIaaS environments often\
      \ group resources into a hierarchy, enabling improved resource management and\
      \ application of policies to relevant groups. Hierarchical structures differ\
      \ among cloud providers. For example, in AWS environments, multiple accounts\
      \ can be grouped under a single organization, while in Azure environments, multiple\
      \ subscriptions can be grouped under a single management group.(Citation: AWS\
      \ Organizations)(Citation: Microsoft Azure Resources)\n\nAdversaries may add,\
      \ delete, or otherwise modify resource groups within an IaaS hierarchy. For\
      \ example, in Azure environments, an adversary who has gained access to a Global\
      \ Administrator account may create new subscriptions in which to deploy resources.\
      \ They may also engage in subscription hijacking by transferring an existing\
      \ pay-as-you-go subscription from a victim tenant to an adversary-controlled\
      \ tenant. This will allow the adversary to use the victim\u2019s compute resources\
      \ without generating logs on the victim tenant.(Citation: Microsoft Peach Sandstorm\
      \ 2023)(Citation: Microsoft Subscription Hijacking 2022)\n\nIn AWS environments,\
      \ adversaries with appropriate permissions in a given account may call the `LeaveOrganization`\
      \ API, causing the account to be severed from the AWS Organization to which\
      \ it was tied and removing any Service Control Policies, guardrails, or restrictions\
      \ imposed upon it by its former Organization. Alternatively, adversaries may\
      \ call the `CreateAccount` API in order to create a new account within an AWS\
      \ Organization. This account will use the same payment methods registered to\
      \ the payment account but may not be subject to existing detections or Service\
      \ Control Policies.(Citation: AWS re Inforce Trust Mod)\nhttps://attack.mitre.org/techniques/T1666"
    translations:
      fr:
        name: "Modifier la hi\xE9rarchie des ressources cloud"
        description: "Les adversaires peuvent tenter de modifier les structures hi\xE9\
          rarchiques dans les environnements d\u2019infrastructure en tant que service\
          \ (IaaS) afin d\u2019\xE9chapper aux d\xE9fenses.  \n\nLes environnements\
          \ IaaS regroupent souvent les ressources en une hi\xE9rarchie, permettant\
          \ une meilleure gestion des ressources et une meilleure application des\
          \ politiques aux groupes concern\xE9s. Les structures hi\xE9rarchiques diff\xE8\
          rent selon les fournisseurs cloud. Par exemple, dans les environnements\
          \ AWS, plusieurs comptes peuvent \xEAtre regroup\xE9s sous une m\xEAme organisation,\
          \ tandis que dans les environnements Azure, plusieurs abonnements peuvent\
          \ \xEAtre regroup\xE9s dans un seul groupe de gestion. (Citation : AWS Organizations)(Citation\
          \ : Microsoft Azure Resources)\n\nLes adversaires peuvent ajouter, supprimer\
          \ ou modifier autrement des groupes de ressources au sein d\u2019une hi\xE9\
          rarchie IaaS. Par exemple, dans les environnements Azure, un adversaire\
          \ ayant obtenu acc\xE8s \xE0 un compte Administrateur Global peut cr\xE9\
          er de nouveaux abonnements pour d\xE9ployer des ressources. Ils peuvent\
          \ \xE9galement s\u2019engager dans un d\xE9tournement d\u2019abonnement\
          \ en transf\xE9rant un abonnement pay-as-you-go existant d\u2019un locataire\
          \ victime vers un locataire contr\xF4l\xE9 par l\u2019adversaire. Cela permettra\
          \ \xE0 l\u2019adversaire d\u2019utiliser les ressources de calcul de la\
          \ victime sans g\xE9n\xE9rer de journaux sur le locataire de la victime.\
          \ (Citation : Microsoft Peach Sandstorm 2023)(Citation : D\xE9tournement\
          \ d\u2019abonnement Microsoft 2022)\n\nDans les environnements AWS, les\
          \ adversaires disposant des autorisations appropri\xE9es sur un compte donn\xE9\
          \ peuvent appeler l\u2019API \xAB LeaveOrganisation \xBB, ce qui entra\xEE\
          ne la coupure du compte de l\u2019organisation AWS \xE0 laquelle il \xE9\
          tait li\xE9 et supprime toute politique de contr\xF4le de service, garde-fouet\
          \ ou restriction impos\xE9e par son ancienne organisation. Sinon, les adversaires\
          \ peuvent appeler l\u2019API \xAB CreateAccount \xBB afin de cr\xE9er un\
          \ nouveau compte au sein d\u2019une organisation AWS. Ce compte utilisera\
          \ les m\xEAmes m\xE9thodes de paiement enregistr\xE9es sur le compte de\
          \ paiement mais ne sera pas soumis aux d\xE9tections existantes ni aux politiques\
          \ de contr\xF4le de service. (Citation : AWS re Inforce Trust Mod)\nhttps://attack.mitre.org/techniques/T1666"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1667
    ref_id: T1667
    name: Email Bombing
    description: "Adversaries may flood targeted email addresses with an overwhelming\
      \ volume of messages. This may bury legitimate emails in a flood of spam and\
      \ disrupt business operations.(Citation: sophos-bombing)(Citation: krebs-email-bombing)\n\
      \nAn adversary may accomplish email bombing by leveraging an automated bot to\
      \ register a targeted address for e-mail lists that do not validate new signups,\
      \ such as online newsletters. The result can be a wave of thousands of e-mails\
      \ that effectively overloads the victim\u2019s inbox.(Citation: krebs-email-bombing)(Citation:\
      \ hhs-email-bombing)\n\nBy sending hundreds or thousands of e-mails in quick\
      \ succession, adversaries may successfully divert attention away from and bury\
      \ legitimate messages including security alerts, daily business processes like\
      \ help desk tickets and client correspondence, or ongoing scams.(Citation: hhs-email-bombing)\
      \ This behavior can also be used as a tool of harassment.(Citation: krebs-email-bombing)\n\
      \nThis behavior may be a precursor for [Spearphishing Voice](https://attack.mitre.org/techniques/T1566/004).\
      \ For example, an adversary may email bomb a target and then follow up with\
      \ a phone call to fraudulently offer assistance. This social engineering may\
      \ lead to the use of [Remote Access Software](https://attack.mitre.org/techniques/T1663)\
      \ to steal credentials, deploy ransomware, conduct [Financial Theft](https://attack.mitre.org/techniques/T1657)(Citation:\
      \ sophos-bombing), or engage in other malicious activity.(Citation: rapid7-email-bombing)\n\
      https://attack.mitre.org/techniques/T1667"
    translations:
      fr:
        name: Bombardement par e-mails
        description: "Les adversaires peuvent inonder les adresses e-mail cibl\xE9\
          es d\u2019un volume \xE9crasant de messages. Cela pourrait submerger des\
          \ emails l\xE9gitimes sous un flot de spam et perturber les op\xE9rations\
          \ de l\u2019entreprise. (Citation : bombardement sophos)(Citation : krebs-email-bombing)\n\
          \nUn adversaire peut r\xE9aliser un bombardement d\u2019e-mails en utilisant\
          \ un bot automatis\xE9 pour enregistrer une adresse cibl\xE9e sur des listes\
          \ de diffusion qui ne valident pas les nouvelles inscriptions, comme les\
          \ newsletters en ligne. Le r\xE9sultat peut \xEAtre une vague de milliers\
          \ d\u2019e-mails qui surcharge effectivement la bo\xEEte de r\xE9ception\
          \ de la victime. (Citation : krebs-email-bombing)(Citation : hhs-email-bombing)\n\
          \nEn envoyant des centaines voire des milliers d\u2019e-mails en succession\
          \ rapide, les adversaires peuvent d\xE9tourner l\u2019attention et cacher\
          \ des messages l\xE9gitimes, y compris les alertes de s\xE9curit\xE9, les\
          \ processus quotidiens comme les tickets de support et la correspondance\
          \ avec les clients, ou les arnaques en cours. (Citation : hhs-email-bombing)\
          \ Ce comportement peut aussi servir d\u2019outil de harc\xE8lement. (Citation\
          \ : krebs-email-bombing)\n\nCe comportement pourrait \xEAtre un pr\xE9curseur\
          \ de [Spearphishing Voice](https://attack.mitre.org/techniques/T1566/004).\
          \ Par exemple, un adversaire peut envoyer un e-mail \xE0 une cible puis\
          \ faire un suivi t\xE9l\xE9phonique pour offrir frauduleusement son aide.\
          \ Cette ing\xE9nierie sociale peut conduire \xE0 l\u2019utilisation de [logiciel\
          \ d\u2019acc\xE8s \xE0 distance](https://attack.mitre.org/techniques/T1663)\
          \ pour voler des identifiants, d\xE9ployer des ransomwares, commettre un\
          \ [vol financier](https://attack.mitre.org/techniques/T1657)(Citation :\
          \ sophos-bombing), ou se livrer \xE0 d\u2019autres activit\xE9s malveillantes.\
          \ (Citation : bombardement rapide d\u2019emails)\nhttps://attack.mitre.org/techniques/T1667"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1668
    ref_id: T1668
    name: Exclusive Control
    description: "Adversaries who successfully compromise a system may attempt to\
      \ maintain persistence by \u201Cclosing the door\u201D behind them  \u2013 in\
      \ other words, by preventing other threat actors from initially accessing or\
      \ maintaining a foothold on the same system. \n\nFor example, adversaries may\
      \ patch a vulnerable, compromised system(Citation: Mandiant-iab-control)(Citation:\
      \ CERT AT Fortinent Ransomware 2025) to prevent other threat actors from leveraging\
      \ that vulnerability in the future. They may \u201Cclose the door\u201D in other\
      \ ways, such as disabling vulnerable services(Citation: sophos-multiple-attackers),\
      \ stripping privileges from accounts(Citation: aquasec-postgres-processes),\
      \ or removing other malware already on the compromised device.(Citation: fsecure-netsky)\n\
      \nHindering other threat actors may allow an adversary to maintain sole access\
      \ to a compromised system or network. This prevents the threat actor from needing\
      \ to compete with or even being removed themselves by other threat actors. It\
      \ also reduces the \u201Cnoise\u201D in the environment, lowering the possibility\
      \ of being caught and evicted by defenders. Finally, in the case of [Resource\
      \ Hijacking](https://attack.mitre.org/techniques/T1496), leveraging a compromised\
      \ device\u2019s full power allows the threat actor to maximize profit.(Citation:\
      \ sophos-multiple-attackers)\nhttps://attack.mitre.org/techniques/T1668"
    translations:
      fr:
        name: "Contr\xF4le exclusif"
        description: "Les adversaires qui r\xE9ussissent \xE0 compromettre un syst\xE8\
          me peuvent tenter de maintenir la persistance en \xAB refermant la porte\
          \ \xBB derri\xE8re eux \u2013 en d\u2019autres termes, en emp\xEAchant d\u2019\
          autres acteurs malveillants d\u2019acc\xE9der ou de maintenir une pr\xE9\
          sence initiale sur le m\xEAme syst\xE8me. \n\nPar exemple, les adversaires\
          \ peuvent corriger un syst\xE8me vuln\xE9rable et compromis (Citation :\
          \ Mandiant-iab-control)(Citation : CERT AT Fortinent Ransomware 2025) pour\
          \ emp\xEAcher d\u2019autres acteurs malveillants d\u2019exploiter cette\
          \ vuln\xE9rabilit\xE9 \xE0 l\u2019avenir. Ils peuvent \xAB fermer la porte\
          \ \xBB d\u2019autres mani\xE8res, comme d\xE9sactiver des services vuln\xE9\
          rables (Citation : sophos-multiple-attackers), retirer des privil\xE8ges\
          \ des comptes (Citation : aquasec-postgres-processes), ou supprimer d\u2019\
          autres logiciels malveillants d\xE9j\xE0 pr\xE9sents sur l\u2019appareil\
          \ compromis. (Citation : fsecure-netsky)\n\nEntraver d\u2019autres acteurs\
          \ malveillants peut permettre \xE0 un adversaire de conserver un acc\xE8\
          s exclusif \xE0 un syst\xE8me ou r\xE9seau compromis. Cela emp\xEAche l\u2019\
          acteur de menace d\u2019avoir \xE0 concurrencer, voire d\u2019\xEAtre lui-m\xEA\
          me \xE9limin\xE9 par d\u2019autres acteurs malveillants. Cela r\xE9duit\
          \ \xE9galement le \xAB bruit \xBB dans l\u2019environnement, diminuant ainsi\
          \ la possibilit\xE9 d\u2019\xEAtre pris et expuls\xE9 par les d\xE9fenseurs.\
          \ Enfin, dans le cas du [d\xE9tournement de ressources](https://attack.mitre.org/techniques/T1496),\
          \ exploiter toute la puissance d\u2019un appareil compromis permet \xE0\
          \ l\u2019acteur de la menace de maximiser le profit. (Citation : sophos-attaquants\
          \ multiples)\nhttps://attack.mitre.org/techniques/T1668"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1669
    ref_id: T1669
    name: Wi-Fi Networks
    description: "Adversaries may gain initial access to target systems by connecting\
      \ to wireless networks. They may accomplish this by exploiting open Wi-Fi networks\
      \ used by target devices or by accessing secured Wi-Fi networks \u2014 requiring\
      \ [Valid Accounts](https://attack.mitre.org/techniques/T1078) \u2014 belonging\
      \ to a target organization.(Citation: DOJ GRU Charges 2018)(Citation: Nearest\
      \ Neighbor Volexity) Establishing a connection to a Wi-Fi access point requires\
      \ a certain level of proximity to both discover and maintain a stable network\
      \ connection. \n\nAdversaries may establish a wireless connection through various\
      \ methods, such as by physically positioning themselves near a Wi-Fi network\
      \ to conduct close access operations. To bypass the need for physical proximity,\
      \ adversaries may attempt to remotely compromise nearby third-party systems\
      \ that have both wired and wireless network connections available (i.e., dual-homed\
      \ systems). These third-party compromised devices can then serve as a bridge\
      \ to connect to a target\u2019s Wi-Fi network.(Citation: Nearest Neighbor Volexity)\n\
      \nOnce an initial wireless connection is achieved, adversaries may leverage\
      \ this access for follow-on activities in the victim network or further targeting\
      \ of specific devices on the network. Adversaries may perform [Network Sniffing](https://attack.mitre.org/techniques/T1040)\
      \ or [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557) activities\
      \ for [Credential Access](https://attack.mitre.org/tactics/TA0006) or [Discovery](https://attack.mitre.org/tactics/TA0007).\n\
      https://attack.mitre.org/techniques/T1669"
    translations:
      fr:
        name: "R\xE9seaux Wi-Fi"
        description: "Les adversaires peuvent obtenir un acc\xE8s initial aux syst\xE8\
          mes cibl\xE9s en se connectant \xE0 des r\xE9seaux sans fil. Ils peuvent\
          \ y parvenir en exploitant les r\xE9seaux Wi-Fi ouverts utilis\xE9s par\
          \ les appareils cibles ou en acc\xE9dant \xE0 des r\xE9seaux Wi-Fi s\xE9\
          curis\xE9s \u2014 n\xE9cessitant des [Comptes Valides](https://attack.mitre.org/techniques/T1078)\
          \ \u2014 appartenant \xE0 une organisation cible. (Citation : Accusations\
          \ du DOJ GRU 2018)(Citation : Voisine le plus proche Volexity) \xC9tablir\
          \ une connexion \xE0 un point d\u2019acc\xE8s Wi-Fi n\xE9cessite un certain\
          \ niveau de proximit\xE9 pour \xE0 la fois pour d\xE9couvrir et maintenir\
          \ une connexion r\xE9seau stable. \n\nLes adversaires peuvent \xE9tablir\
          \ une connexion sans fil par divers moyens, par exemple en se positionnant\
          \ physiquement pr\xE8s d\u2019un r\xE9seau Wi-Fi pour effectuer des op\xE9\
          rations d\u2019acc\xE8s rapproch\xE9. Pour contourner le besoin de proximit\xE9\
          \ physique, les adversaires peuvent tenter de compromettre \xE0 distance\
          \ des syst\xE8mes tiers voisins disposant de connexions r\xE9seau filaire\
          \ et sans fil (c\u2019est-\xE0-dire des syst\xE8mes \xE0 double homed).\
          \ Ces appareils compromis par des tiers peuvent alors servir de pont pour\
          \ se connecter au r\xE9seau Wi-Fi de la cible. (Citation : Voisine le plus\
          \ proche Volexity)\n\nUne fois la connexion sans fil initiale \xE9tablie,\
          \ les adversaires peuvent utiliser cet acc\xE8s pour des activit\xE9s ult\xE9\
          rieures dans le r\xE9seau victime ou pour cibler davantage des appareils\
          \ sp\xE9cifiques sur le r\xE9seau. Les adversaires peuvent effectuer des\
          \ activit\xE9s de [Reniflement du r\xE9seau](https://attack.mitre.org/techniques/T1040)\
          \ ou de [Adversaire-en-le-milieu](https://attack.mitre.org/techniques/T1557)\
          \ pour [Acc\xE8s aux Accr\xE9ditations](https://attack.mitre.org/tactics/TA0006)\
          \ ou [D\xE9couverte](https://attack.mitre.org/tactics/TA0007).\nhttps://attack.mitre.org/techniques/T1669"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1671
    ref_id: T1671
    name: Cloud Application Integration
    description: "Adversaries may achieve persistence by leveraging OAuth application\
      \ integrations in a software-as-a-service environment. Adversaries may create\
      \ a custom application, add a legitimate application into the environment, or\
      \ even co-opt an existing integration to achieve malicious ends.(Citation: Push\
      \ Security SaaS Persistence 2022)(Citation: SaaS Attacks GitHub Evil Twin Integrations)\n\
      \nOAuth is an open standard that allows users to authorize applications to access\
      \ their information on their behalf. In a SaaS environment such as Microsoft\
      \ 365 or Google Workspace, users may integrate applications to improve their\
      \ workflow and achieve tasks.  \n\nLeveraging application integrations may allow\
      \ adversaries to persist in an environment \u2013 for example, by granting consent\
      \ to an application from a high-privileged adversary-controlled account in order\
      \ to maintain access to its data, even in the event of losing access to the\
      \ account.(Citation: Wiz Midnight Blizzard 2024)(Citation: Microsoft Malicious\
      \ OAuth Applications 2022)(Citation: Huntress Persistence Microsoft 365 Compromise\
      \ 2024) In some cases, integrations may remain valid even after the original\
      \ consenting user account is disabled.(Citation: Push Security Slack Persistence\
      \ 2023) Application integrations may also allow adversaries to bypass multi-factor\
      \ authentication requirements through the use of [Application Access Token](https://attack.mitre.org/techniques/T1550/001)s.\
      \ Finally, they may enable persistent [Automated Exfiltration](https://attack.mitre.org/techniques/T1020)\
      \ over time.(Citation: Synes Cyber Corner Malicious Azure Application 2023)\n\
      \nCreating or adding a new application may require the adversary to create a\
      \ dedicated [Cloud Account](https://attack.mitre.org/techniques/T1136/003) for\
      \ the application and assign it [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003)\
      \ \u2013 for example, in Microsoft 365 environments, an application can only\
      \ access resources via an associated service principal.(Citation: Microsoft\
      \ Entra ID Service Principals)\nhttps://attack.mitre.org/techniques/T1671"
    translations:
      fr:
        name: "Int\xE9gration des applications cloud"
        description: "Les adversaires peuvent atteindre la persistance en exploitant\
          \ les int\xE9grations d\u2019applications OAuth dans un environnement logiciel\
          \ en tant que service. Les adversaires peuvent cr\xE9er une application\
          \ personnalis\xE9e, ajouter une application l\xE9gitime \xE0 l\u2019environnement,\
          \ voire r\xE9cup\xE9rer une int\xE9gration existante pour atteindre des\
          \ fins malveillantes. (Citation : Push Security SaaS Persistance 2022)(Citation\
          \ : SaaS attaque les int\xE9grations GitHub Evil Twin)\n\nOAuth est une\
          \ norme ouverte qui permet aux utilisateurs d\u2019autoriser les applications\
          \ \xE0 acc\xE9der \xE0 leurs informations en leur nom. Dans un environnement\
          \ SaaS tel que Microsoft 365 ou Google Workspace, les utilisateurs peuvent\
          \ int\xE9grer des applications pour am\xE9liorer leur flux de travail et\
          \ accomplir des t\xE2ches.  \n\nL\u2019utilisation des int\xE9grations d\u2019\
          applications peut permettre aux adversaires de persister dans un environnement\
          \ \u2013 par exemple, en accordant le consentement \xE0 une demande provenant\
          \ d\u2019un compte contr\xF4l\xE9 par un adversaire \xE0 haut privil\xE8\
          ge afin de maintenir l\u2019acc\xE8s \xE0 ses donn\xE9es, m\xEAme en cas\
          \ de perte d\u2019acc\xE8s au compte. (Citation : Wiz Midnight Blizzard\
          \ 2024)(Citation : Microsoft Applications OAuth malveillantes 2022)(Citation\
          \ : Huntress Persistence Microsoft 365 Compromise 2024) Dans certains cas,\
          \ les int\xE9grations peuvent rester valides m\xEAme apr\xE8s la d\xE9sactivation\
          \ du compte utilisateur consentant d\u2019origine. (Citation : Push Security\
          \ Slack Persistance 2023) Les int\xE9grations d\u2019applications peuvent\
          \ \xE9galement permettre aux adversaires de contourner les exigences d\u2019\
          authentification multifactorielle gr\xE2ce \xE0 l\u2019utilisation de [Application\
          \ Access Token](https://attack.mitre.org/techniques/T1550/001)s. Enfin,\
          \ ils peuvent activer l'[Exfiltration Automatis\xE9e](https://attack.mitre.org/techniques/T1020)\
          \ persistante au fil du temps. (Citation : Application Azure malveillante\
          \ Synes Cyber Corner 2023)\n\nCr\xE9er ou ajouter une nouvelle application\
          \ peut n\xE9cessiter que l\u2019adversaire cr\xE9e un [Compte Cloud](https://attack.mitre.org/techniques/T1136/003)\
          \ d\xE9di\xE9 pour l\u2019application et lui attribue des [R\xF4les Cloud\
          \ Additionnels](https://attack.mitre.org/techniques/T1098/003) \u2013 par\
          \ exemple, dans les environnements Microsoft 365, une application ne peut\
          \ acc\xE9der qu\u2019aux ressources via un principal de service associ\xE9\
          . (Citation : Microsoft Entra ID Service Principals)\nhttps://attack.mitre.org/techniques/T1671"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1673
    ref_id: T1673
    name: Virtual Machine Discovery
    description: "An adversary may attempt to enumerate running virtual machines (VMs)\
      \ after gaining access to a host or hypervisor. For example, adversaries may\
      \ enumerate a list of VMs on an ESXi hypervisor using a [Hypervisor CLI](https://attack.mitre.org/techniques/T1059/012)\
      \ such as `esxcli` or `vim-cmd` (e.g. `esxcli vm process list or vim-cmd vmsvc/getallvms`).(Citation:\
      \ Crowdstrike Hypervisor Jackpotting Pt 2 2021)(Citation: TrendMicro Play) Adversaries\
      \ may also directly leverage a graphical user interface, such as VMware vCenter,\
      \ in order to view virtual machines on a host. \n\nAdversaries may use the information\
      \ from [Virtual Machine Discovery](https://attack.mitre.org/techniques/T1673)\
      \ during discovery to shape follow-on behaviors. Subsequently discovered VMs\
      \ may be leveraged for follow-on activities such as [Service Stop](https://attack.mitre.org/techniques/T1489)\
      \ or [Data Encrypted for Impact](https://attack.mitre.org/techniques/T1486).(Citation:\
      \ Crowdstrike Hypervisor Jackpotting Pt 2 2021)"
    translations:
      fr:
        name: "D\xE9couverte de machines virtuelles"
        description: "Un adversaire peut tenter d\u2019\xE9num\xE9rer les machines\
          \ virtuelles (VM) en cours de marche apr\xE8s avoir acc\xE9d\xE9 \xE0 un\
          \ h\xF4te ou \xE0 un hyperviseur. Par exemple, les adversaires peuvent \xE9\
          num\xE9rer une liste de VM sur un hyperviseur ESXi \xE0 l\u2019aide d\u2019\
          une [Hypervisor CLI](https://attack.mitre.org/techniques/T1059/012) telle\
          \ que \xAB esxcli \xBB ou \xAB vim-cmd \xBB (par exemple \xAB esxcli vm\
          \ process list \xBB ou vim-cmd vmsvc/getallvms'). (Citation : Crowdstrike\
          \ Hyperviseur Jackpotting Partie 2 2021)(Citation : TrendMicro Play) Les\
          \ adversaires peuvent \xE9galement utiliser directement une interface graphique,\
          \ comme VMware vCenter, afin de visualiser les machines virtuelles sur un\
          \ h\xF4te. \n\nLes adversaires peuvent utiliser les informations issues\
          \ de [D\xE9couverte de la Machine Virtuelle](https://attack.mitre.org/techniques/T1673)\
          \ lors de la d\xE9couverte pour fa\xE7onner les comportements ult\xE9rieurs.\
          \ Les machines virtuelles d\xE9couvertes par la suite peuvent \xEAtre utilis\xE9\
          es pour des activit\xE9s ult\xE9rieures telles que [Service Stop](https://attack.mitre.org/techniques/T1489)\
          \ ou [Data Encrypted for Impact](https://attack.mitre.org/techniques/T1486).\
          \ (Citation : Crowdstrike Hyperviseur Jackpotting Partie 2 2021)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1674
    ref_id: T1674
    name: Input Injection
    description: "Adversaries may simulate keystrokes on a victim\u2019s computer\
      \ by various means to perform any type of action on behalf of the user, such\
      \ as launching the command interpreter using keyboard shortcuts,  typing an\
      \ inline script to be executed, or interacting directly with a GUI-based application.\
      \  These actions can be preprogrammed into adversary tooling or executed through\
      \ physical devices such as Human Interface Devices (HIDs).\n\nFor example, adversaries\
      \ have used tooling that monitors the Windows message loop to detect when a\
      \ user visits bank-specific URLs. If detected, the tool then simulates keystrokes\
      \ to open the developer console or select the address bar, pastes malicious\
      \ JavaScript from the clipboard, and executes it - enabling manipulation of\
      \ content within the browser, such as replacing bank account numbers during\
      \ transactions.(Citation: BleepingComputer BackSwap)(Citation: welivesecurity\
      \ BackSwap)\n\nAdversaries have also used malicious USB devices to emulate keystrokes\
      \ that launch PowerShell, leading to the download and execution of malware from\
      \ adversary-controlled servers.(Citation: BleepingComputer USB)\nhttps://attack.mitre.org/techniques/T1674"
    translations:
      fr:
        name: "Injection d\u2019entr\xE9e"
        description: "Les adversaires peuvent simuler des frappes de touche sur l\u2019\
          ordinateur d\u2019une victime par divers moyens pour effectuer n\u2019importe\
          \ quelle action au nom de l\u2019utilisateur, comme lancer l\u2019interpr\xE9\
          teur de commandes via des raccourcis clavier, taper un script en ligne \xE0\
          \ ex\xE9cuter, ou interagir directement avec une application bas\xE9e sur\
          \ une interface graphique.  Ces actions peuvent \xEAtre pr\xE9programm\xE9\
          es dans des outils adverses ou ex\xE9cut\xE9es via des dispositifs physiques\
          \ tels que les dispositifs d\u2019interface humaine (HID).\n\nPar exemple,\
          \ les adversaires ont utilis\xE9 des outils qui surveillent la boucle de\
          \ messages Windows pour d\xE9tecter lorsqu\u2019un utilisateur visite des\
          \ URL sp\xE9cifiques \xE0 la banque. S\u2019il est d\xE9tect\xE9, l\u2019\
          outil simule alors des frappes pour ouvrir la console d\xE9veloppeur ou\
          \ s\xE9lectionner la barre d\u2019adresse, colle du JavaScript malveillant\
          \ depuis le clipboard, puis l\u2019ex\xE9cute \u2013 permettant la manipulation\
          \ du contenu dans le navigateur, comme remplacer les num\xE9ros de compte\
          \ bancaire lors des transactions. (Citation : Retour \xE0 l\u2019ordinateur\
          \ bipp\xE9)(Citation : welivesecurity BackSwap)\n\nLes adversaires ont \xE9\
          galement utilis\xE9 des dispositifs USB malveillants pour \xE9muler des\
          \ frappes au clavier qui lancent PowerShell, conduisant au t\xE9l\xE9chargement\
          \ et \xE0 l\u2019ex\xE9cution de logiciels malveillants depuis des serveurs\
          \ contr\xF4l\xE9s par l\u2019adversaire. (Citation : USB d\u2019ordinateur\
          \ bipp\xE9)\nhttps://attack.mitre.org/techniques/T1674"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1675
    ref_id: T1675
    name: ESXi Administration Command
    description: "Adversaries may abuse ESXi administration services to execute commands\
      \ on guest machines hosted within an ESXi virtual environment. Persistent background\
      \ services on ESXi-hosted VMs, such as the VMware Tools Daemon Service, allow\
      \ for remote management from the ESXi server. The tools daemon service runs\
      \ as `vmtoolsd.exe` on Windows guest operating systems, `vmware-tools-daemon`\
      \ on macOS, and `vmtoolsd ` on Linux.(Citation: Broadcom VMware Tools Services)\
      \ \n\nAdversaries may leverage a variety of tools to execute commands on ESXi-hosted\
      \ VMs \u2013 for example, by using the vSphere Web Services SDK to programmatically\
      \ execute commands and scripts via APIs such as `StartProgramInGuest`, `ListProcessesInGuest`,\
      \  `ListFileInGuest`, and `InitiateFileTransferFromGuest`.(Citation: Google\
      \ Cloud Threat Intelligence VMWare ESXi Zero-Day 2023)(Citation: Broadcom Running\
      \ Guest OS Operations) This may enable follow-on behaviors on the guest VMs,\
      \ such as [File and Directory Discovery](https://attack.mitre.org/techniques/T1083),\
      \ [Data from Local System](https://attack.mitre.org/techniques/T1005), or [OS\
      \ Credential Dumping](https://attack.mitre.org/techniques/T1003).\nhttps://attack.mitre.org/techniques/T1675"
    translations:
      fr:
        name: "Commandement d\u2019administration ESXi"
        description: "Les adversaires peuvent abuser des services d\u2019administration\
          \ ESXi pour ex\xE9cuter des commandes sur des machines invit\xE9es h\xE9\
          berg\xE9es dans un environnement virtuel ESXi. Les services persistants\
          \ en arri\xE8re-plan sur les machines virtuelles h\xE9berg\xE9es par ESXi,\
          \ tels que le VMware Tools Daemon Service, permettent une gestion \xE0 distance\
          \ depuis le serveur ESXi. Le service daemon tools fonctionne sous le nom\
          \ \xAB vmtoolsd.exe \xBB sur les syst\xE8mes d\u2019exploitation invit\xE9\
          s Windows, \xAB vmware-tools-daemon \xBB sur macOS, et \xAB vmtoolsd \xBB\
          \ sous Linux. (Citation : Services d\u2019outils Broadcom VMware) \n\nLes\
          \ adversaires peuvent utiliser divers outils pour ex\xE9cuter des commandes\
          \ sur des machines virtuelles h\xE9berg\xE9es par ESXi \u2013 par exemple,\
          \ en utilisant le SDK vSphere Web Services pour ex\xE9cuter programmatiquement\
          \ des commandes et des scripts via des API telles que \xAB StartProgramInGuest\
          \ \xBB, \xAB ListProcessesInGuest \xBB, \xAB ListFileInGuest \xBB et \xAB\
          \ InitiateFileTransferFromGuest \xBB. (Citation : Google Cloud Threat Intelligence\
          \ VMWare ESXi Zero-Day 2023)(Citation : Broadcom ex\xE9cutant les op\xE9\
          rations du syst\xE8me d\u2019exploitation invit\xE9) Cela peut permettre\
          \ des comportements compl\xE9mentaires sur les machines virtuelles invit\xE9\
          es, tels que [D\xE9couverte de fichiers et d\u2019annuaires](https://attack.mitre.org/techniques/T1083),\
          \ [Donn\xE9es du syst\xE8me local](https://attack.mitre.org/techniques/T1005)\
          \ ou [Dumping des cr\xE9dents du syst\xE8me d\u2019exploitation](https://attack.mitre.org/techniques/T1003).\n\
          https://attack.mitre.org/techniques/T1675"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1677
    ref_id: T1677
    name: Poisoned Pipeline Execution
    description: "Adversaries may manipulate continuous integration / continuous development\
      \ (CI/CD) processes by injecting malicious code into the build process. There\
      \ are several mechanisms for poisoning pipelines: \n\n* In a <b>Direct Pipeline\
      \ Execution</b> scenario, the threat actor directly modifies the CI configuration\
      \ file (e.g., `gitlab-ci.yml` in GitLab). They may include a command to exfiltrate\
      \ credentials leveraged in the build process to a remote server, or to export\
      \ them as a workflow artifact.(Citation: Unit 42 Palo Alto GitHub Actions Supply\
      \ Chain Attack 2025)(Citation: OWASP CICD-SEC-4)\n* In an <b>Indirect Pipeline\
      \ Execution</b> scenario, the threat actor injects malicious code into files\
      \ referenced by the CI configuration file. These may include makefiles, scripts,\
      \ unit tests, and linters.(Citation: OWASP CICD-SEC-4)\n* In a <b>Public Pipeline\
      \ Execution</b> scenario, the threat actor does not have direct access to the\
      \ repository but instead creates a malicious pull request from a fork that triggers\
      \ a part of the CI/CD pipeline. For example, in GitHub Actions, the `pull_request_target`\
      \ trigger allows workflows running from forked repositories to access secrets.\
      \  If this trigger is combined with an explicit pull request checkout and a\
      \ location for a threat actor to insert malicious code (e.g., an `npm build`\
      \ command), a threat actor may be able to leak pipeline credentials.(Citation:\
      \ Unit 42 Palo Alto GitHub Actions Supply Chain Attack 2025)(Citation: GitHub\
      \ Security Lab GitHub Actions Security 2021) Similarly, threat actors may craft\
      \ pull requests with malicious inputs (such as branch names) if the build pipeline\
      \ treats those inputs as trusted.(Citation: Wiz Ultralytics AI Library Hijack\
      \ 2024)(Citation: Synactiv Hijacking GitHub Runners)(Citation: GitHub Security\
      \ Labs GitHub Actions Security Part 2 2021) Finally, if a pipeline leverages\
      \ a self-hosted runner, a threat actor may be able to execute arbitrary code\
      \ on a host inside the organization\u2019s network.(Citation: John Stawinski\
      \ PyTorch Supply Chain Attack 2024)\n\nBy poisoning CI/CD pipelines, threat\
      \ actors may be able to gain access to credentials, laterally move to additional\
      \ hosts, or input malicious components to be shipped further down the pipeline\
      \ (i.e., [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)).\n\
      https://attack.mitre.org/techniques/T1677"
    translations:
      fr:
        name: "Ex\xE9cution de pipeline empoisonn\xE9e"
        description: "Les adversaires peuvent manipuler les processus d\u2019int\xE9\
          gration continue / d\xE9veloppement continu (CI/CD) en injectant du code\
          \ malveillant dans le processus de compilation. Il existe plusieurs m\xE9\
          canismes pour empoisonner les pipelines : \n\n* Dans un sc\xE9nario <b>d\u2019\
          ex\xE9cution directe de pipeline</b>, l\u2019acteur de menace modifie directement\
          \ le fichier de configuration de l\u2019IC (par exemple, \xAB gitlab-ci.yml\
          \ \xBB sur GitLab). Ils peuvent inclure une commande pour exfiltrer les\
          \ identifiants exploit\xE9s lors du processus de compilation vers un serveur\
          \ distant, ou pour les exporter sous forme d\u2019artefact de workflow.\
          \ (Citation : Attaque de la cha\xEEne d\u2019approvisionnement 2025 des\
          \ actions GitHub de l\u2019unit\xE9 42 Palo Alto)(Citation : OWASP CICD-SEC-4)\n\
          * Dans un <b>sc\xE9nario d\u2019ex\xE9cution indirecte de pipeline</b>,\
          \ l\u2019acteur de menace injecte du code malveillant dans les fichiers\
          \ r\xE9f\xE9renc\xE9s par le fichier de configuration CI. Cela peut inclure\
          \ des fichiers make, des scripts, des tests unitaires et des linters. (Citation\
          \ : OWASP CICD-SEC-4)\n* Dans un sc\xE9nario <b>d\u2019ex\xE9cution de pipeline\
          \ public</b>, l\u2019acteur de menace n\u2019a pas d\u2019acc\xE8s direct\
          \ au d\xE9p\xF4t mais cr\xE9e \xE0 la place une requ\xEAte de tir malveillante\
          \ depuis un fork qui d\xE9clenche une partie du pipeline CI/CD. Par exemple,\
          \ dans GitHub Actions, le d\xE9clencheur \xAB pull_request_target \xBB permet\
          \ aux workflows s\u2019ex\xE9cutant depuis des d\xE9p\xF4ts fork\xE9s d\u2019\
          acc\xE9der \xE0 des secrets.  Si ce d\xE9clencheur est combin\xE9 \xE0 une\
          \ v\xE9rification explicite de pull request et \xE0 un emplacement o\xF9\
          \ un acteur de menace peut ins\xE9rer du code malveillant (par exemple,\
          \ une commande 'npm build'), un acteur de menace peut \xEAtre capable de\
          \ divulguer les identifiants du pipeline. (Citation : Attaque de la cha\xEE\
          ne d\u2019approvisionnement 2025 des actions GitHub de l\u2019unit\xE9 42\
          \ Palo Alto)(Citation : GitHub Security Lab GitHub Actions Security 2021)\
          \ De m\xEAme, les acteurs malveillants peuvent cr\xE9er des pull requests\
          \ avec des entr\xE9es malveillantes (comme les noms de branches) si le pipeline\
          \ de construction consid\xE8re ces entr\xE9es comme de confiance. (Citation\
          \ : D\xE9tournement de la biblioth\xE8que d\u2019IA Wiz Ultralytics 2024)(Citation\
          \ : Synactiv d\xE9tournant les runners de GitHub)(Citation : GitHub Security\
          \ Labs GitHub Actions Security Partie 2 2021) Enfin, si un pipeline exploite\
          \ un coureur auto-h\xE9berg\xE9, un acteur de menace peut \xEAtre capable\
          \ d\u2019ex\xE9cuter un code arbitraire sur un h\xF4te \xE0 l\u2019int\xE9\
          rieur du r\xE9seau de l\u2019organisation. (Citation : Attaque de la cha\xEE\
          ne d\u2019approvisionnement John Stawinski PyTorch 2024)\n\nEn empoisonnant\
          \ les pipelines CI/CD, les acteurs malveillants peuvent acc\xE9der aux identifiants,\
          \ se d\xE9placer lat\xE9ralement vers d\u2019autres h\xF4tes ou entrer des\
          \ composants malveillants \xE0 exp\xE9dier plus bas dans le pipeline (c\u2019\
          est-\xE0-dire [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)).\n\
          https://attack.mitre.org/techniques/T1677"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1678
    ref_id: T1678
    name: Delay Execution
    description: "Adversaries may employ various time-based methods to evade detection\
      \ and analysis. These techniques often exploit system clocks, delays, or timing\
      \ mechanisms to obscure malicious activity, blend in with benign activity, and\
      \ avoid scrutiny. Adversaries can perform this behavior within virtualization/sandbox\
      \ environments or natively on host systems. \n\nAdversaries may utilize programmatic\
      \ `sleep` commands or native system scheduling functionality, for example [Scheduled\
      \ Task/Job](https://attack.mitre.org/techniques/T1053). Benign commands or other\
      \ operations may also be used to delay malware execution or ensure prior commands\
      \ have had time to execute properly. Loops or otherwise needless repetitions\
      \ of commands, such as `ping`, may be used to delay malware execution and potentially\
      \ exceed time thresholds of automated analysis environments.(Citation: Revil\
      \ Independence Day)(Citation: Netskope Nitol) Another variation, commonly referred\
      \ to as API hammering, involves making various calls to Native API functions\
      \ in order to delay execution (while also potentially overloading analysis environments\
      \ with junk data).(Citation: Joe Sec Nymaim)(Citation: Joe Sec Trickbot)\nhttps://attack.mitre.org/techniques/T1678"
    translations:
      fr:
        name: "Ex\xE9cution par retard"
        description: "Les adversaires peuvent employer diverses m\xE9thodes bas\xE9\
          es sur le temps pour \xE9chapper \xE0 la d\xE9tection et \xE0 l\u2019analyse.\
          \ Ces techniques exploitent souvent les horloges syst\xE8me, les d\xE9lais\
          \ ou les m\xE9canismes de synchronisation pour masquer les activit\xE9s\
          \ malveillantes, se fondre dans les activit\xE9s b\xE9nignes et \xE9viter\
          \ la surveillance. Les adversaires peuvent exercer ce comportement dans\
          \ des environnements de virtualisation/bac \xE0 sable ou nativement sur\
          \ des syst\xE8mes h\xF4tes. \n\nLes adversaires peuvent utiliser des commandes\
          \ programmatiques de \xAB veille \xBB ou des fonctionnalit\xE9s natives\
          \ de planification syst\xE8me, par exemple [T\xE2che/T\xE2che planifi\xE9\
          e](https://attack.mitre.org/techniques/T1053). Des commandes b\xE9nignes\
          \ ou d\u2019autres op\xE9rations peuvent \xE9galement \xEAtre utilis\xE9\
          es pour retarder l\u2019ex\xE9cution de malwares ou s\u2019assurer que les\
          \ commandes pr\xE9c\xE9dentes ont eu le temps d\u2019\xEAtre correctement\
          \ ex\xE9cut\xE9es. Des boucles ou des r\xE9p\xE9titions inutiles de commandes,\
          \ telles que \xAB ping \xBB, peuvent \xEAtre utilis\xE9es pour retarder\
          \ l\u2019ex\xE9cution de malwares et potentiellement d\xE9passer les seuils\
          \ de temps des environnements d\u2019analyse automatis\xE9e. (Citation :\
          \ Jour de l\u2019Ind\xE9pendance de Revil)(Citation : Netskope Nitol) Une\
          \ autre variante, commun\xE9ment appel\xE9e API hammering, consiste \xE0\
          \ effectuer divers appels vers des fonctions API natives afin de retarder\
          \ l\u2019ex\xE9cution (tout en surchargeant potentiellement les environnements\
          \ d\u2019analyse avec des donn\xE9es inutilisables). (Citation : Joe Sec\
          \ Nymaim)(Citation : Joe Sec Trickbot)\nhttps://attack.mitre.org/techniques/T1678"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1679
    ref_id: T1679
    name: Selective Exclusion
    description: "Adversaries may intentionally exclude certain files, folders, directories,\
      \ file types, or system components from encryption or tampering during a ransomware\
      \ or malicious payload execution. Some file extensions that adversaries may\
      \ avoid encrypting include `.dll`, `.exe`, and `.lnk`.(Citation: Palo Alto Unit\
      \ 42 Medusa Group Medusa Ransomware January 2024)  \n\nAdversaries may perform\
      \ this behavior to avoid alerting users, to evade detection by security tools\
      \ and analysts, or, in the case of ransomware, to ensure that the system remains\
      \ operational enough to deliver the ransom notice. \n\nExclusions may target\
      \ files and components whose corruption would cause instability, break core\
      \ services, or immediately expose the attack. By carefully avoiding these areas,\
      \ adversaries maintain system responsiveness while minimizing indicators that\
      \ could trigger alarms or otherwise inhibit achieving their goals.\nhttps://attack.mitre.org/techniques/T1679"
    translations:
      fr:
        name: "Exclusion s\xE9lective"
        description: "Les adversaires peuvent volontairement exclure certains fichiers,\
          \ dossiers, r\xE9pertoires, types de fichiers ou composants syst\xE8me du\
          \ chiffrement ou de la falsification lors d\u2019une ex\xE9cution de ransomware\
          \ ou de charge utile malveillante. Certaines extensions de fichiers que\
          \ les adversaires peuvent \xE9viter de chiffrer incluent \xAB .dll \xBB\
          , \xAB .exe \xBB et \xAB .lnk \xBB. (Citation : Palo Alto Unit 42 Medusa\
          \ Group Medusa Ransomware janvier 2024)  \n\nLes adversaires peuvent adopter\
          \ ce comportement pour \xE9viter d\u2019alerter les utilisateurs, pour \xE9\
          chapper \xE0 la d\xE9tection par les outils de s\xE9curit\xE9 et les analystes,\
          \ ou, dans le cas d\u2019un ransomware, pour s\u2019assurer que le syst\xE8\
          me reste suffisamment op\xE9rationnel pour remettre l\u2019avis de ran\xE7\
          on. \n\nLes exclusions peuvent cibler des fichiers et composants dont la\
          \ corruption causerait de l\u2019instabilit\xE9, briserait les services\
          \ de c\u0153ur ou exposerait imm\xE9diatement l\u2019attaque. En \xE9vitant\
          \ soigneusement ces zones, les adversaires maintiennent la r\xE9activit\xE9\
          \ du syst\xE8me tout en minimisant les indicateurs susceptibles de d\xE9\
          clencher des alarmes ou d\u2019entraver l\u2019atteinte de leurs objectifs.\n\
          https://attack.mitre.org/techniques/T1679"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1680
    ref_id: T1680
    name: Local Storage Discovery
    description: "Adversaries may enumerate local drives, disks, and/or volumes and\
      \ their attributes like total or free space and volume serial number. This can\
      \ be done to prepare for ransomware-related encryption, to perform [Lateral\
      \ Movement](https://attack.mitre.org/tactics/TA0109), or as a precursor to [Direct\
      \ Volume Access](https://attack.mitre.org/techniques/T1006). \n\nOn ESXi systems,\
      \ adversaries may use [Hypervisor CLI](https://attack.mitre.org/techniques/T1059/012)\
      \ commands such as `esxcli` to list storage connected to the host as well as\
      \ `.vmdk` files.(Citation: TrendMicro)(Citation: TrendMicro ESXI Ransomware)\n\
      \nOn Windows systems, adversaries can use `wmic logicaldisk get` to find information\
      \ about local network drives. They can also use `Get-PSDrive` in PowerShell\
      \ to retrieve drives and may additionally use Windows API functions such as\
      \ `GetDriveType`.(Citation: Trend Micro MUSTANG PANDA PUBLOAD HIUPAN SEPTEMBER\
      \ 2024)(Citation: Volexity)\n\nLinux has commands such as `parted`, `lsblk`,\
      \ `fdisk`, `lshw`, and `df` that can list information about disk partitions\
      \ such as size, type, file system types, and free space. The command `diskutil`\
      \ on MacOS can be used to list disks while `system_profiler SPStorageDataType`\
      \ can additionally show information such as a volume\u2019s mount path, file\
      \ system, and the type of drive in the system. \n\nInfrastructure as a Service\
      \ (IaaS) cloud providers also have commands for storage discovery such as `describe\
      \ volume` in AWS, `gcloud compute disks list` in GCP, and `az disk list` in\
      \ Azure.(Citation: AWS docs describe volumes)(Citation: GCP gcloud compute disks\
      \ list)(Citation: azure az disk)\nhttps://attack.mitre.org/techniques/T1680"
    translations:
      fr:
        name: "D\xE9couverte de stockage local"
        description: "Les adversaires peuvent \xE9num\xE9rer les disques locaux, les\
          \ disques et/ou les volumes ainsi que leurs attributs tels que l\u2019espace\
          \ total ou libre et le num\xE9ro de s\xE9rie du volume. Cela peut \xEAtre\
          \ fait pour se pr\xE9parer au chiffrement li\xE9 aux ransomwares, pour effectuer\
          \ un [Mouvement Lat\xE9ral](https://attack.mitre.org/tactics/TA0109), ou\
          \ comme pr\xE9curseur de [Direct Volume Access](https://attack.mitre.org/techniques/T1006).\
          \ \n\nSur les syst\xE8mes ESXi, les adversaires peuvent utiliser des commandes\
          \ [Hypervisor CLI](https://attack.mitre.org/techniques/T1059/012) telles\
          \ que \xAB esxcli \xBB pour lister le stockage connect\xE9 \xE0 l\u2019\
          h\xF4te ainsi que les fichiers \xAB .vmdk \xBB. (Citation : TrendMicro)(Citation\
          \ : Ransomware TrendMicro ESXI)\n\nSur les syst\xE8mes Windows, les adversaires\
          \ peuvent utiliser \xAB wmic logicaldisk get \xBB pour trouver des informations\
          \ sur les disques r\xE9seau locaux. Ils peuvent \xE9galement utiliser \xAB\
          \ Get-PSDrive \xBB dans PowerShell pour r\xE9cup\xE9rer des disques et peuvent\
          \ \xE9galement utiliser des fonctions API Windows telles que \xAB GetDriveType\
          \ \xBB. (Citation : Trend Micro MUSTANG PANDA PUBLOAD HIUPAN SEPTEMBRE 2024)(Citation\
          \ : Volexit\xE9)\n\nLinux propose des commandes telles que \xAB part \xBB\
          , \xAB lsblk \xBB, \xAB fdisk \xBB, \xAB lshw \xBB et \xAB df \xBB qui peuvent\
          \ lister des informations sur les partitions disques telles que la taille,\
          \ le type, les types de syst\xE8me de fichiers et l\u2019espace libre. La\
          \ commande 'diskutil' sur MacOS peut \xEAtre utilis\xE9e pour lister les\
          \ disques, tandis que 'system_profiler SPStorageDataType' peut \xE9galement\
          \ afficher des informations telles que le chemin de montage d\u2019un volume,\
          \ le syst\xE8me de fichiers et le type de lecteur dans le syst\xE8me. \n\
          \nLes fournisseurs cloud Infrastructure as a Service (IaaS) disposent \xE9\
          galement de commandes pour la d\xE9couverte de stockage telles que \xAB\
          \ d\xE9crire un volume \xBB dans AWS, \xAB gcloud compute disks list \xBB\
          \ dans GCP, et \xAB az disk list \xBB dans Azure. (Citation : AWS docs d\xE9\
          crit des volumes)(Citation : liste des disques de calcul GCP gcloud)(Citation\
          \ : azure az disk)\nhttps://attack.mitre.org/techniques/T1680"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1681
    ref_id: T1681
    name: Search Threat Vendor Data
    description: "Threat actors may seek information/indicators from closed or open\
      \ threat intelligence sources gathered about their own campaigns, as well as\
      \ those conducted by other adversaries that may align with their target industries,\
      \ capabilities/objectives, or other operational concerns. These reports may\
      \ include descriptions of behavior, detailed breakdowns of attacks, atomic indicators\
      \ such as malware hashes or IP addresses, timelines of a group\u2019s activity,\
      \ and more. Adversaries may change their behavior when planning their future\
      \ operations. \n\nAdversaries have been observed replacing atomic indicators\
      \ mentioned in blog posts in under a week.(Citation: Google Cloud Threat Intelligence\
      \ VMWare ESXi Zero-Day 2023) Adversaries have also been seen searching for their\
      \ own domain names in threat vendor data and then taking them down, likely to\
      \ avoid seizure or further investigation.(Citation: Sentinel One Contagious\
      \ Interview ClickFix September 2025)\n\nThis technique is distinct from [Threat\
      \ Intel Vendors](https://attack.mitre.org/techniques/T1597/001) in that it describes\
      \ threat actors performing reconnaissance on their own activity, not in search\
      \ of victim information.\nhttps://attack.mitre.org/techniques/T1681"
    translations:
      fr:
        name: "Donn\xE9es de recherche sur les fournisseurs de menaces"
        description: "Les acteurs de la menace peuvent solliciter des informations\
          \ ou des indicateurs aupr\xE8s de sources de renseignement sur les menaces\
          \ ferm\xE9es ou ouvertes, recueillies sur leurs propres campagnes, ainsi\
          \ que celles men\xE9es par d\u2019autres adversaires qui pourraient correspondre\
          \ \xE0 leurs industries cibles, leurs capacit\xE9s/objectifs ou d\u2019\
          autres pr\xE9occupations op\xE9rationnelles. Ces rapports peuvent inclure\
          \ des descriptions de comportements, des analyses d\xE9taill\xE9es des attaques,\
          \ des indicateurs atomiques tels que des hachages de malwares ou des adresses\
          \ IP, des chronologies d\u2019activit\xE9 d\u2019un groupe, et plus encore.\
          \ Les adversaires peuvent changer leur comportement lors de la planification\
          \ de leurs op\xE9rations futures. \n\nDes adversaires ont \xE9t\xE9 observ\xE9\
          s rempla\xE7ant les indicateurs atomiques mentionn\xE9s dans des articles\
          \ de blog en moins d\u2019une semaine. (Citation : Google Cloud Threat Intelligence\
          \ VMWare ESXi Zero-Day 2023) Des adversaires ont \xE9galement \xE9t\xE9\
          \ vus en train de rechercher leurs propres noms de domaine dans les donn\xE9\
          es des fournisseurs de menaces puis de les retirer, probablement pour \xE9\
          viter une saisie ou une enqu\xEAte plus approfondie. (Citation : Entretien\
          \ contagieux de Sentinel One ClickFix septembre 2025)\n\nCette technique\
          \ se distingue des [fournisseurs de renseignements sur les menaces](https://attack.mitre.org/techniques/T1597/001)\
          \ en ce qu\u2019elle d\xE9crit les acteurs de menaces effectuant une reconnaissance\
          \ de leur propre activit\xE9, et non \xE0 la recherche d\u2019informations\
          \ sur les victimes.\nhttps://attack.mitre.org/techniques/T1681"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1682
    ref_id: T1682
    name: Query Public AI Services
    description: 'Adversaries may query publicly accessible artificial intelligence
      (AI) services, such as large language models (LLMs), to support targeting and
      operations. In addition to searching websites or databases directly (i.e., [Search
      Open Websites/Domains](https://attack.mitre.org/techniques/T1593)), adversaries
      may use AI services to synthesize, aggregate, and analyze publicly available
      information at scale. This may include identifying individuals or organizations
      to target, researching organizational structures and personnel, identifying
      technologies used by target organizations, researching business relationships
      to develop plausible pretexts for [Social Engineering](https://attack.mitre.org/techniques/T1684)
      approaches, identifying contact information for use in [Phishing](https://attack.mitre.org/techniques/T1566)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598), or
      gathering derogatory or sensitive information about individuals that may be
      used for extortion or coercion.(Citation: MSFT-AI)(Citation: GTIG AI Threat
      Tracker)


      Information gathered through AI services may be leveraged for other behaviors,
      such as establishing operational resources (i.e., [Generate Content](https://attack.mitre.org/techniques/T1683)
      or [Establish Accounts](https://attack.mitre.org/techniques/T1585). For obtaining
      access to AI tools and services, see [Artificial Intelligence](https://attack.mitre.org/techniques/T1588/007).

      https://attack.mitre.org/techniques/T1682'
    translations:
      fr:
        name: "Interroger les services d\u2019IA publics"
        description: "Les adversaires peuvent interroger des services d\u2019intelligence\
          \ artificielle (IA) accessibles au public, tels que les grands mod\xE8les\
          \ de langage (LLM), pour soutenir le ciblage et les op\xE9rations. En plus\
          \ de rechercher directement sur des sites web ou des bases de donn\xE9es\
          \ (c\u2019est-\xE0-dire [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),\
          \ les adversaires peuvent utiliser des services d\u2019IA pour synth\xE9\
          tiser, agr\xE9ger et analyser \xE0 grande \xE9chelle des informations publiques\
          \ disponibles. Cela peut inclure l\u2019identification d\u2019individus\
          \ ou d\u2019organisations \xE0 cibler, la recherche sur les structures organisationnelles\
          \ et le personnel, l\u2019identification des technologies utilis\xE9es par\
          \ les organisations cibl\xE9es, la recherche de relations commerciales pour\
          \ d\xE9velopper des pr\xE9textes plausibles pour les approches de [G\xE9\
          nie Social](https://attack.mitre.org/techniques/T1684), l\u2019identification\
          \ d\u2019informations de contact pour une utilisation dans le [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ ou le [Phishing pour l\u2019information](https://attack.mitre.org/techniques/T1598),\
          \ ou la collecte d\u2019informations d\xE9favorables ou sensibles sur des\
          \ individus pouvant \xEAtre utilis\xE9es pour extorsion ou coercition. (Citation\
          \ : MSFT-AI)(Citation : Suivi de menaces IA GTIG)\n\nLes informations recueillies\
          \ via les services d\u2019IA peuvent \xEAtre utilis\xE9es pour d\u2019autres\
          \ comportements, tels que l\u2019\xE9tablissement de ressources op\xE9rationnelles\
          \ (par exemple, [G\xE9n\xE9rer du contenu](https://attack.mitre.org/techniques/T1683)\
          \ ou [\xC9tablir des comptes](https://attack.mitre.org/techniques/T1585).\
          \ Pour acc\xE9der aux outils et services d\u2019IA, voir [Intelligence artificielle](https://attack.mitre.org/techniques/T1588/007).\n\
          https://attack.mitre.org/techniques/T1682"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1683
    ref_id: T1683
    name: Generate Content
    description: "Adversaries may create or generate content to support targeting\
      \ and operations. This content may be used to establish personas, impersonate\
      \ known individuals or organizations, and support [Social Engineering](https://attack.mitre.org/techniques/T1684),\
      \ fraud, or influence activities. Written materials, audio, images, video, or\
      \ other media may be developed and tailored to the target and objective.(Citation:\
      \ IBM AI-Generated Content)\n\nContent development may occur prior to or during\
      \ an operation. Adversaries may develop or generate content in-house, source\
      \ it through third parties, or produce it using AI-assisted tools. Adversaries\
      \ may use AI to research targets, develop pretexts, and better understand the\
      \ organizations and individuals they intend to target or deceive prior to generating\
      \ content (i.e., [Query Public AI Services](https://attack.mitre.org/techniques/T1682));\
      \ for obtaining access to AI tools used in content generation, see [Artificial\
      \ Intelligence](https://attack.mitre.org/techniques/T1588/007). \n\nContent\
      \ may be leveraged in support of techniques such as [Phishing](https://attack.mitre.org/techniques/T1566),\
      \ [Phishing for Information](https://attack.mitre.org/techniques/T1598), [Social\
      \ Engineering](https://attack.mitre.org/techniques/T1684), [Financial Theft](https://attack.mitre.org/techniques/T1657),\
      \ or [Establish Accounts](https://attack.mitre.org/techniques/T1585). Generated\
      \ or developed content does not include malicious code or scripts (i.e., [Develop\
      \ Capabilities](https://attack.mitre.org/techniques/T1587) and [Artificial Intelligence](https://attack.mitre.org/techniques/T1588/007)).\n\
      https://attack.mitre.org/techniques/T1683"
    translations:
      fr:
        name: "G\xE9n\xE9rer du contenu"
        description: "Les adversaires peuvent cr\xE9er ou g\xE9n\xE9rer du contenu\
          \ pour soutenir le ciblage et les op\xE9rations. Ce contenu peut \xEAtre\
          \ utilis\xE9 pour \xE9tablir des personas, usurper l\u2019identit\xE9 d\u2019\
          individus ou organisations connus, et soutenir des activit\xE9s d\u2019\
          ing\xE9nierie [sociale](https://attack.mitre.org/techniques/T1684), de fraude\
          \ ou d\u2019influence. Des supports \xE9crits, audio, images, vid\xE9os\
          \ ou autres supports peuvent \xEAtre d\xE9velopp\xE9s et adapt\xE9s \xE0\
          \ l\u2019objectif et \xE0 l\u2019objectif. (Citation : Contenu g\xE9n\xE9\
          r\xE9 par l\u2019IA par IBM)\n\nLe d\xE9veloppement de contenu peut avoir\
          \ lieu avant ou pendant une op\xE9ration. Les adversaires peuvent d\xE9\
          velopper ou g\xE9n\xE9rer du contenu en interne, le fournir via des tiers,\
          \ ou le produire en utilisant des outils assist\xE9s par l\u2019IA. Les\
          \ adversaires peuvent utiliser l\u2019IA pour rechercher des cibles, d\xE9\
          velopper des pr\xE9textes et mieux comprendre les organisations et individus\
          \ qu\u2019ils souhaitent cibler ou tromper avant de g\xE9n\xE9rer du contenu\
          \ (c\u2019est-\xE0-dire [Interroger les services publics d\u2019IA](https://attack.mitre.org/techniques/T1682))\
          \ ; pour acc\xE9der aux outils d\u2019IA utilis\xE9s dans la g\xE9n\xE9\
          ration de contenu, voir [Intelligence artificielle](https://attack.mitre.org/techniques/T1588/007).\
          \ \n\nLe contenu peut \xEAtre utilis\xE9 pour soutenir des techniques telles\
          \ que [Hame\xE7onnage](https://attack.mitre.org/techniques/T1566), [Hame\xE7\
          onnage pour information](https://attack.mitre.org/techniques/T1598), [Ing\xE9\
          nierie sociale](https://attack.mitre.org/techniques/T1684), [Vol financier](https://attack.mitre.org/techniques/T1657)\
          \ ou [Cr\xE9ation de comptes](https://attack.mitre.org/techniques/T1585).\
          \ Le contenu g\xE9n\xE9r\xE9 ou d\xE9velopp\xE9 n\u2019inclut pas de code\
          \ ou de scripts malveillants (c\u2019est-\xE0-dire [Capacit\xE9s de d\xE9\
          veloppement](https://attack.mitre.org/techniques/T1587) et [Intelligence\
          \ artificielle](https://attack.mitre.org/techniques/T1588/007)).\nhttps://attack.mitre.org/techniques/T1683"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1683.001
    ref_id: T1683.001
    name: Written Content
    description: 'Adversaries may create or tailor written materials to support targeting
      and malicious operations. Content may include phishing lures, fraudulent financial
      communications, fabricated job postings, fabricated employment credentials and
      documentation, decoy documents, social media persona content, and supporting
      narratives used to sustain fabricated personas over time.(Citation: GenAI Phishing)(Citation:
      GTIG AI Threat Tracker) Content may be authored manually, commissioned through
      third parties, or produced using AI-assisted tools.


      Written materials may impersonate legitimate government correspondence, diplomatic
      communications, or internal organizational documents to support targeting efforts.
      AI-assisted tools may also be used to tailor content to specific targets, industries,
      or regions. For example, adversaries may leverage AI to translate content into
      a target''s native language or mimic the communication style of trusted senders.


      Written content produced through these methods may be used in support of other
      techniques, such as [Phishing](https://attack.mitre.org/techniques/T1660), [Spearphishing
      via Service](https://attack.mitre.org/techniques/T1566/003), [Phishing for Information](https://attack.mitre.org/techniques/T1598),
      [Internal Spearphishing](https://attack.mitre.org/techniques/T1534), [Social
      Engineering](https://attack.mitre.org/techniques/T1684), [Financial Theft](https://attack.mitre.org/techniques/T1657),
      or [Establish Accounts](https://attack.mitre.org/techniques/T1585).


      Written content does not include malicious code or scripts; for development
      of malicious code and scripts, see [Develop Capabilities](https://attack.mitre.org/techniques/T1587).

      https://attack.mitre.org/techniques/T1683/001'
    translations:
      fr:
        name: "Contenu \xE9crit"
        description: "Les adversaires peuvent cr\xE9er ou adapter des documents \xE9\
          crits pour soutenir le ciblage et les op\xE9rations malveillantes. Le contenu\
          \ peut inclure des app\xE2ts de phishing, des communications financi\xE8\
          res frauduleuses, des offres d\u2019emploi fabriqu\xE9es, des dipl\xF4mes\
          \ et documents d\u2019emploi fabriqu\xE9s, des documents leurres, du contenu\
          \ de personas sur les r\xE9seaux sociaux et des r\xE9cits de soutien utilis\xE9\
          s pour soutenir des personas fabriqu\xE9s au fil du temps. (Citation : Phishing\
          \ GenAI)(Citation : Suivi de menaces IA GTIG) Le contenu peut \xEAtre r\xE9\
          dig\xE9 manuellement, command\xE9 par des tiers ou produit \xE0 l\u2019\
          aide d\u2019outils assist\xE9s par l\u2019IA.\n\nLes documents \xE9crits\
          \ peuvent se faire passer pour des correspondances gouvernementales l\xE9\
          gitimes, des communications diplomatiques ou des documents organisationnels\
          \ internes pour soutenir les efforts de ciblage. Les outils assist\xE9s\
          \ par l\u2019IA peuvent \xE9galement \xEAtre utilis\xE9s pour adapter le\
          \ contenu \xE0 des cibles, industries ou r\xE9gions sp\xE9cifiques. Par\
          \ exemple, les adversaires peuvent utiliser l\u2019IA pour traduire le contenu\
          \ dans la langue maternelle d\u2019une cible ou imiter le style de communication\
          \ des exp\xE9diteurs de confiance.\n\nLe contenu \xE9crit produit par ces\
          \ m\xE9thodes peut \xEAtre utilis\xE9 pour soutenir d\u2019autres techniques,\
          \ telles que [Phishing](https://attack.mitre.org/techniques/T1660), [Spearphishing\
          \ via Service](https://attack.mitre.org/techniques/T1566/003), [Phishing\
          \ pour information](https://attack.mitre.org/techniques/T1598), [Spearphishing\
          \ interne](https://attack.mitre.org/techniques/T1534), [Ing\xE9nierie sociale](https://attack.mitre.org/techniques/T1684),\
          \ [Vol financier]( https://attack.mitre.org/techniques/T1657), ou [\xC9\
          tablir des comptes](https://attack.mitre.org/techniques/T1585).\n\nLe contenu\
          \ \xE9crit n\u2019inclut pas de code malveillant ni de scripts ; pour le\
          \ d\xE9veloppement de code et de scripts malveillants, voir [D\xE9velopper\
          \ des capacit\xE9s](https://attack.mitre.org/techniques/T1587).\nhttps://attack.mitre.org/techniques/T1683/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1683.002
    ref_id: T1683.002
    name: Audio-Visual Content
    description: "Adversaries may create or manipulate audio, image, and video content\
      \ to support targeting and malicious operations. Adversaries may also use synthetic\
      \ voice recordings, real-time altered audio or video during live interactions,\
      \ fabricated profile photos and identity documents, or video content depicting\
      \ fabricated or impersonated individuals.(Citation: Nov AI Threat Tracker)\n\
      \nContent may be produced manually through editing tools, generated using AI-assisted\
      \ tools, or produced using third-party synthetic services.(Citation: FBI 2025\
      \ AI Generate Content)(Citation: Europol Deepfakes) AI-assisted tools have enabled\
      \ adversaries to produce synthetic media at scale and generate content that\
      \ is more difficult to identify as inauthentic. \n\nAudio-visual content produced\
      \ through these methods may be used in support of other techniques, such as\
      \ [Phishing](https://attack.mitre.org/techniques/T1660), [Spearphishing via\
      \ Service](https://attack.mitre.org/techniques/T1566/003), [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
      \ [Internal Spearphishing](https://attack.mitre.org/techniques/T1534), [Social\
      \ Engineering](https://attack.mitre.org/techniques/T1684), [Financial Theft](https://attack.mitre.org/techniques/T1657),\
      \ or [Establish Accounts](https://attack.mitre.org/techniques/T1585).\nhttps://attack.mitre.org/techniques/T1683/002"
    translations:
      fr:
        name: Contenu audiovisuel
        description: "Les adversaires peuvent cr\xE9er ou manipuler du contenu audio,\
          \ image et vid\xE9o pour soutenir le ciblage et les op\xE9rations malveillantes.\
          \ Les adversaires peuvent \xE9galement utiliser des enregistrements vocaux\
          \ synth\xE9tiques, des enregistrements audio ou vid\xE9o modifi\xE9s en\
          \ temps r\xE9el lors d\u2019interactions en direct, des photos de profil\
          \ et des documents d\u2019identit\xE9 fabriqu\xE9s, ou du contenu vid\xE9\
          o repr\xE9sentant des individus fabriqu\xE9s ou usurp\xE9s. (Citation :\
          \ D\xE9tecteur de menaces IA de Nov)\n\nLe contenu peut \xEAtre produit\
          \ manuellement via des outils d\u2019\xE9dition, g\xE9n\xE9r\xE9 \xE0 l\u2019\
          aide d\u2019outils assist\xE9s par IA, ou produit via des services synth\xE9\
          tiques tiers. (Citation : FBI 2025 IA G\xE9n\xE8re du contenu)(Citation\
          \ : Europol Deepfakes) Les outils assist\xE9s par l\u2019IA ont permis aux\
          \ adversaires de produire des m\xE9dias synth\xE9tiques \xE0 grande \xE9\
          chelle et de g\xE9n\xE9rer un contenu plus difficile \xE0 identifier comme\
          \ inauthentique. \n\nLe contenu audiovisuel produit par ces m\xE9thodes\
          \ peut \xEAtre utilis\xE9 pour soutenir d\u2019autres techniques, telles\
          \ que [Phishing](https://attack.mitre.org/techniques/T1660), [Spearphishing\
          \ via Service](https://attack.mitre.org/techniques/T1566/003), [Phishing\
          \ pour l\u2019information](https://attack.mitre.org/techniques/T1598), [Spearphishing\
          \ interne](https://attack.mitre.org/techniques/T1534), [Ing\xE9nierie sociale](https://attack.mitre.org/techniques/T1684),\
          \ [Financier Vol](https://attack.mitre.org/techniques/T1657), ou [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585).\nhttps://attack.mitre.org/techniques/T1683/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1684
    ref_id: T1684
    name: Social Engineering
    description: "Adversaries may use social engineering techniques to influence users\
      \ to take actions that result in unauthorized access, approval of changes, disclosure\
      \ of sensitive information, or execution of adversary-supplied instructions\
      \ (i.e., introduction of malicious payloads or software), while minimizing technical\
      \ indicators. \n\nAdversaries may leverage trust-building methods across multiple\
      \ channels (e.g., executive, vendor, or help desk scenarios, including AI-enabled\
      \ voice interactions) to prompt user-authorized actions such as password resets,\
      \ MFA changes, financial approvals, or the disclosure of sensitive information.\
      \ Adversaries may also leverage common business communications and workflows\
      \ such as email, collaboration platforms, voice communications, recruiting processes,\
      \ help desk interactions, and SaaS consent mechanisms to make malicious requests\
      \ appear routine and legitimate.(Citation: Proofpoint TA427 April 2024)(Citation:\
      \ SE SentinelOne 2)(Citation: SE - Hackers Target Workday)\n\nAdditionally,\
      \ adversaries have persuaded victims to take actions through references of current\
      \ events, harnessing relevant themes to the work role or the organizations mission.\
      \ For example, adversaries may use scare tactics (i.e., threaten repercussions\
      \ for non-compliance) or otherwise incite victims\u2019 emotions in order to\
      \ generate a sense of urgency to take action.(Citation: SE Proofpoint)(Citation:\
      \ SE SentinelOne)\n\nThis technique may include common social engineering patterns\
      \ such as [Phishing](https://attack.mitre.org/techniques/T1566) and [Spearphishing\
      \ Voice](https://attack.mitre.org/techniques/T1566/004), often supported by\
      \ convincing and targeted narratives.(Citation: SE SentinelOne 2)(Citation:\
      \ Fortinet Trends 25-26)\nhttps://attack.mitre.org/techniques/T1684"
    translations:
      fr:
        name: "Ing\xE9nierie sociale"
        description: "Les adversaires peuvent utiliser des techniques d\u2019ing\xE9\
          nierie sociale pour influencer les utilisateurs \xE0 prendre des mesures\
          \ qui entra\xEEnent un acc\xE8s non autoris\xE9, l\u2019approbation de modifications,\
          \ la divulgation d\u2019informations sensibles ou l\u2019ex\xE9cution d\u2019\
          instructions fournies par l\u2019adversaire (c\u2019est-\xE0-dire l\u2019\
          introduction de charges utiles ou de logiciels malveillants), tout en minimisant\
          \ les indicateurs techniques. \n\nLes adversaires peuvent exploiter des\
          \ m\xE9thodes de confiance sur plusieurs canaux (par exemple, sc\xE9narios\
          \ de cadre, de fournisseur ou de support technique, y compris des interactions\
          \ vocales activ\xE9es par l\u2019IA) pour inciter les utilisateurs \xE0\
          \ des actions autoris\xE9es telles que la r\xE9initialisation du mot de\
          \ passe, les modifications de la MFA, les approbations financi\xE8res ou\
          \ la divulgation d\u2019informations sensibles. Les adversaires peuvent\
          \ \xE9galement exploiter les communications et flux de travail courants\
          \ tels que les e-mails, les plateformes de collaboration, les communications\
          \ vocales, les processus de recrutement, les interactions au support technique\
          \ et les m\xE9canismes de consentement SaaS pour faire para\xEEtre les requ\xEA\
          tes malveillantes routini\xE8res et l\xE9gitimes. (Citation : Proofpoint\
          \ TA427 avril 2024)(Citation : SE SentinelOne 2)(Citation : SE - Hackers\
          \ ciblent Workday)\n\nDe plus, les adversaires ont persuad\xE9 les victimes\
          \ d\u2019agir en faisant r\xE9f\xE9rence \xE0 l\u2019actualit\xE9, en exploitant\
          \ des th\xE8mes pertinents pour le r\xF4le de travail ou la mission de l\u2019\
          organisation. Par exemple, les adversaires peuvent utiliser des tactiques\
          \ de peur (c\u2019est-\xE0-dire menacer de repr\xE9sailles en cas de non-respect)\
          \ ou inciter les \xE9motions des victimes afin de susciter un sentiment\
          \ d\u2019urgence \xE0 agir. (Citation : SE Proofpoint)(Citation : SE SentinelOne)\n\
          \nCette technique peut inclure des sch\xE9mas courants d\u2019ing\xE9nierie\
          \ sociale tels que [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ et [Spearphishing Voice](https://attack.mitre.org/techniques/T1566/004),\
          \ souvent soutenus par des r\xE9cits convaincants et cibl\xE9s. (Citation\
          \ : SE SentinelOne 2)(Citation : Tendances Fortinet 25-26)\nhttps://attack.mitre.org/techniques/T1684"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1684.001
    ref_id: T1684.001
    name: Impersonation
    description: "Adversaries may impersonate a trusted person or organization in\
      \ order to persuade and trick a target into performing some action on their\
      \ behalf. For example, adversaries may communicate with victims (via [Phishing\
      \ for Information](https://attack.mitre.org/techniques/T1598), [Phishing](https://attack.mitre.org/techniques/T1566),\
      \ or [Internal Spearphishing](https://attack.mitre.org/techniques/T1534)) while\
      \ impersonating a known sender such as an executive, colleague, or third-party\
      \ vendor. Established trust can then be leveraged to accomplish an adversary\u2019\
      s ultimate goals, possibly against multiple victims.\n\nIn many cases of business\
      \ email compromise or email fraud campaigns, adversaries use impersonation to\
      \ defraud victims -- deceiving them into sending money or divulging information\
      \ that ultimately enables [Financial Theft](https://attack.mitre.org/techniques/T1657).\n\
      \nAdversaries will often also use social engineering techniques such as manipulative\
      \ and persuasive language in email subject lines and body text such as `payment`,\
      \ `request`, or `urgent` to push the victim to act quickly before malicious\
      \ activity is detected. These campaigns are often specifically targeted against\
      \ people who, due to job roles and/or accesses, can carry out the adversary\u2019\
      s goal.\u202F\u202F\n\nImpersonation is typically preceded by reconnaissance\
      \ techniques such as [Gather Victim Identity Information](https://attack.mitre.org/techniques/T1589)\
      \ and [Gather Victim Org Information](https://attack.mitre.org/techniques/T1591)\
      \ as well as acquiring infrastructure such as email domains (i.e. [Domains](https://attack.mitre.org/techniques/T1583/001))\
      \ to substantiate their false identity.(Citation: Crowdstrike BEC)\n\nThere\
      \ is the potential for multiple victims in campaigns involving impersonation.\
      \ For example, an adversary may Compromise Accounts targeting one organization\
      \ which can then be used to support impersonation against other entities.(Citation:\
      \ VEC)\nhttps://attack.mitre.org/techniques/T1684/001"
    translations:
      fr:
        name: "Usurpation d\u2019identit\xE9"
        description: "Les adversaires peuvent se faire passer pour une personne ou\
          \ une organisation de confiance afin de persuader et tromper une cible afin\
          \ qu\u2019elle accomplisse une action en leur nom. Par exemple, les adversaires\
          \ peuvent communiquer avec les victimes (via [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
          \ [Phishing](https://attack.mitre.org/techniques/T1566) ou [Spearphishing\
          \ interne](https://attack.mitre.org/techniques/T1534)) en se faisant passer\
          \ pour un exp\xE9diteur connu tel qu\u2019un dirigeant, un coll\xE8gue ou\
          \ un fournisseur tiers. La confiance \xE9tablie peut alors \xEAtre exploit\xE9\
          e pour atteindre les objectifs ultimes d\u2019un adversaire, \xE9ventuellement\
          \ contre plusieurs victimes.\n\nDans de nombreux cas de compromission des\
          \ courriels professionnels ou de campagnes de fraude par email, les adversaires\
          \ utilisent l\u2019usurpation d\u2019identit\xE9 pour escroquer les victimes\
          \ \u2014 les trompant pour qu\u2019elles envoient de l\u2019argent ou divulguent\
          \ des informations qui permettent finalement le [vol financier](https://attack.mitre.org/techniques/T1657).\n\
          \nLes adversaires utilisent souvent aussi des techniques d\u2019ing\xE9\
          nierie sociale telles que des langages manipulateurs et persuasifs dans\
          \ les sujets des emails et le corps du texte comme \xAB paiement \xBB, \xAB\
          \ demande \xBB ou \xAB urgent \xBB pour inciter la victime \xE0 agir rapidement\
          \ avant qu\u2019une activit\xE9 malveillante ne soit d\xE9tect\xE9e. Ces\
          \ campagnes visent souvent sp\xE9cifiquement des personnes qui, en raison\
          \ de leurs r\xF4les et/ou acc\xE8s, peuvent atteindre l\u2019objectif de\
          \ l\u2019adversaire.\u202F\u202F\n\nL\u2019usurpation d\u2019identit\xE9\
          \ est g\xE9n\xE9ralement pr\xE9c\xE9d\xE9e de techniques de reconnaissance\
          \ telles que [Collecte d\u2019informations sur l\u2019identit\xE9 de la\
          \ victime](https://attack.mitre.org/techniques/T1589) et [Collecte d\u2019\
          informations sur l\u2019organisation des victimes](https://attack.mitre.org/techniques/T1591),\
          \ ainsi que par l\u2019acquisition d\u2019infrastructures telles que des\
          \ domaines de messagerie (c\u2019est-\xE0-dire [Domaines](https://attack.mitre.org/techniques/T1583/001))\
          \ pour \xE9tayer leur fausse identit\xE9. (Citation : Crowdstrike BEC)\n\
          \nIl existe un potentiel de multiples victimes dans des campagnes impliquant\
          \ l\u2019usurpation d\u2019identit\xE9. Par exemple, un adversaire peut\
          \ compromettre les comptes ciblant une organisation, qui peut ensuite servir\
          \ \xE0 soutenir l\u2019usurpation d\u2019identit\xE9 contre d\u2019autres\
          \ entit\xE9s. (Citation : VEC)\nhttps://attack.mitre.org/techniques/T1684/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1684.002
    ref_id: T1684.002
    name: Email Spoofing
    description: "Adversaries may fake, or spoof, a sender\u2019s identity by modifying\
      \ the value of relevant email headers in order to establish contact with victims\
      \ under false pretenses.(Citation: Proofpoint TA427 April 2024)\_In addition\
      \ to actual email content, email headers (such as the FROM header, which contains\
      \ the email address of the sender) may also be modified. Email clients display\
      \ these headers when emails appear in a victim's inbox, which may cause modified\
      \ emails to appear as if they were from the spoofed entity.\n\nEnterprise environments\
      \ can use Domain-based Message Authentication, Reporting, and Conformance (DMARC)\
      \ as an email authentication protocol that references results of the Sender\
      \ Policy Framework (SPF) and DomainKeys Identified Mail (DKIM) configurations.\
      \ SPF and DKIM are configured separately in DNS: SPF verifies that the sending\
      \ server is authorized for the domain, while DKIM uses a digital signature to\
      \ verify email integrity and domain authentication. Together, they validate\
      \ email authenticity and specify how receiving servers should handle authentication\
      \ failures. Without enforced identity authentication, adversaries may compromise\
      \ the integrity of an authentication check with altered headers that would not\
      \ have otherwise passed.(Citation: Cloudflare DMARC, DKIM, and SPF)(Citation:\
      \ DMARC-overview)(Citation: Proofpoint-DMARC)\n\nAn example of a weak or absent\
      \ DMARC policy is `v=DMARC1; p=none; fo=1;`. The `p=none`. The `p=none` indicates\
      \ no action should be taken, and therefore no filtering action will take place,\
      \ even if an email fails authentication checks (i.e., SPF and/or DKIM fail).\
      \ When a DMARC policy indicates no action, the email will still be delivered\
      \ to the victim\u2019s inbox.(Citation: ic3-dprk) \n\nAdversaries have abused\
      \ weak or absent DMARC policies to circumvent authentication checks and conceal\
      \ social engineering attempts. Adversaries can alter email headers to include\
      \ legitimate domain names with fake usernames or impersonate legitimate users\
      \ via [Impersonation](https://attack.mitre.org/techniques/T1684/001) for [Phishing](https://attack.mitre.org/techniques/T1566).\
      \ Additionally, adversaries may abuse Microsoft 365\u2019s Direct Send functionality\
      \ to spoof internal users by using internal devices like printers to send emails\
      \ without authentication.(Citation: Barnea DirectSend)\nhttps://attack.mitre.org/techniques/T1684/002"
    translations:
      fr:
        name: "Usurpation d\u2019e-mails"
        description: "Les adversaires peuvent falsifier, ou usurer, l\u2019identit\xE9\
          \ d\u2019un exp\xE9diteur en modifiant la valeur des en-t\xEAtes d\u2019\
          e-mail pertinents afin d\u2019\xE9tablir un contact avec les victimes sous\
          \ de faux pr\xE9textes. (Citation : Proofpoint TA427 avril 2024)\_En plus\
          \ du contenu r\xE9el des emails, les en-t\xEAtes des emails (comme l\u2019\
          en-t\xEAte FROM, qui contient l\u2019adresse email de l\u2019exp\xE9diteur)\
          \ peuvent \xE9galement \xEAtre modifi\xE9s. Les clients de messagerie affichent\
          \ ces en-t\xEAtes lorsque les emails apparaissent dans la bo\xEEte de r\xE9\
          ception d\u2019une victime, ce qui peut faire appara\xEEtre des emails modifi\xE9\
          s comme s\u2019ils provenaient de l\u2019entit\xE9 usurp\xE9e.\n\nLes environnements\
          \ d\u2019entreprise peuvent utiliser l\u2019authentification des messages\
          \ bas\xE9e sur le domaine (DMARC) comme protocole d\u2019authentification\
          \ par e-mail qui fait r\xE9f\xE9rence aux r\xE9sultats du Cadre de politique\
          \ de l\u2019envoi (SPF) et des configurations DomainKeys Identified Mail\
          \ (DKIM). Le SPF et le DKIM sont configur\xE9s s\xE9par\xE9ment dans le\
          \ DNS : le SPF v\xE9rifie que le serveur \xE9metteur est autoris\xE9 pour\
          \ le domaine, tandis que le DKIM utilise une signature num\xE9rique pour\
          \ v\xE9rifier l\u2019int\xE9grit\xE9 des e-mails et l\u2019authentification\
          \ du domaine. Ensemble, ils valident l\u2019authenticit\xE9 des emails et\
          \ pr\xE9cisent comment les serveurs r\xE9cepteurs doivent g\xE9rer les \xE9\
          checs d\u2019authentification. Sans authentification d\u2019identit\xE9\
          \ forc\xE9e, les adversaires peuvent compromettre l\u2019int\xE9grit\xE9\
          \ d\u2019un contr\xF4le d\u2019authentification avec des en-t\xEAtes modifi\xE9\
          s qui n\u2019auraient pas \xE9t\xE9 d\xE9pass\xE9es autrement. (Citation\
          \ : Cloudflare DMARC, DKIM et SPF)(Citation : Aper\xE7u DMARC)(Citation\
          \ : Proofpoint-DMARC)\n\nUn exemple de politique DMARC faible ou absente\
          \ est 'v=DMARC1 ; p=aucun\_; fo=1\_;'. Le \xAB p = aucun \xBB. Le \xAB p=none\
          \ \xBB indique qu\u2019aucune action ne doit \xEAtre entreprise, et donc\
          \ aucune action de filtrage ne sera effectu\xE9e, m\xEAme si un e-mail \xE9\
          choue aux v\xE9rifications d\u2019authentification (c\u2019est-\xE0-dire\
          \ que SPF et/ou DKIM \xE9chouent). Lorsqu\u2019une politique DMARC indique\
          \ qu\u2019aucune action n\u2019est n\xE9cessaire, l\u2019e-mail sera quand\
          \ m\xEAme envoy\xE9 dans la bo\xEEte mail de la victime. (Citation : ic3-RPDC)\
          \ \n\nLes adversaires ont abus\xE9 de politiques DMARC faibles ou absentes\
          \ pour contourner les contr\xF4les d\u2019authentification et dissimuler\
          \ des tentatives d\u2019ing\xE9nierie sociale. Les adversaires peuvent modifier\
          \ les en-t\xEAtes d\u2019e-mail pour inclure des noms de domaine l\xE9gitimes\
          \ avec de faux noms d\u2019utilisateur ou usurper l\u2019identit\xE9 d\u2019\
          utilisateurs l\xE9gitimes via [Usurpation d\u2019usurpation](https://attack.mitre.org/techniques/T1684/001)\
          \ pour [Phishing](https://attack.mitre.org/techniques/T1566). De plus, les\
          \ adversaires peuvent abuser de la fonctionnalit\xE9 Direct Send de Microsoft\
          \ 365 pour usurper les utilisateurs internes en utilisant des appareils\
          \ internes comme des imprimantes pour envoyer des e-mails sans authentification.\
          \ (Citation : Barnea DirectSend)\nhttps://attack.mitre.org/techniques/T1684/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685
    ref_id: T1685
    name: Disable or Modify Tools
    description: "Adversaries may disable, degrade, or tamper with security tools\
      \ or applications (e.g., endpoint detection and response (EDR) tools, intrusion\
      \ detection systems (IDS), antivirus, logging agents, sensors, etc.) to impair\
      \ or reduce visibility of defensive capabilities. This may include stopping\
      \ specific services, killing processes, modifying or deleting tool configuration\
      \ files and Registry keys, or preventing tools from updating. This may also\
      \ include impairing defenses more broadly by disrupting preventative, detection,\
      \ and response mechanisms across host, network, and cloud environments.(Citation:\
      \ SCADAfence_ransomware) \n\nIn addition to directly targeting tools, adversaries\
      \ may block or manipulate indicators and telemetry used for detection. This\
      \ includes maliciously disabling or redirecting sensors such as Event Tracing\
      \ for Windows (ETW), modifying event log configurations (e.g., redirecting Security\
      \ logs), or interfering with logging pipelines and forwarding mechanisms (e.g.,\
      \ SIEM ingestion).(Citation: Microsoft Lamin Sept 2017)(Citation: ETW Palantir)\n\
      \nMore advanced techniques include leveraging legitimate drivers or debugging\
      \ mechanisms to render tools non-functional, bypassing anti-tampering protections,\
      \ and targeting specific defenses such as Sysmon or cloud monitoring agents.\
      \ Adversaries may also disrupt broader defensive operations, including update\
      \ mechanisms, logging infrastructure (e.g., syslog), or event aggregation, further\
      \ degrading an organization\u2019s ability to detect and respond to malicious\
      \ activity.(Citation: Cocomazzi FIN7 Reboot)\nhttps://attack.mitre.org/techniques/T1685"
    translations:
      fr:
        name: "D\xE9sactiver ou modifier les outils"
        description: "Les adversaires peuvent d\xE9sactiver, d\xE9grader ou manipuler\
          \ des outils ou applications de s\xE9curit\xE9 (par exemple, outils de d\xE9\
          tection et de r\xE9ponse de points d\u2019acc\xE8s (EDR), syst\xE8mes de\
          \ d\xE9tection d\u2019intrusion (IDS), antivirus, agents de journalisation,\
          \ capteurs, etc.) afin d\u2019alt\xE9rer ou de r\xE9duire la visibilit\xE9\
          \ des capacit\xE9s d\xE9fensives. Cela peut inclure l\u2019arr\xEAt de services\
          \ sp\xE9cifiques, la suppression de processus, la modification ou la suppression\
          \ de fichiers de configuration d\u2019outils et de cl\xE9s du Registre,\
          \ ou l\u2019emp\xEAchement de la mise \xE0 jour des outils. Cela peut \xE9\
          galement inclure l\u2019alt\xE9ration des d\xE9fenses plus larges en perturbant\
          \ les m\xE9canismes pr\xE9ventifs, de d\xE9tection et de r\xE9ponse dans\
          \ les environnements h\xF4te, r\xE9seau et cloud. (Citation : SCADAfence_ransomware)\
          \ \n\nEn plus de cibler directement les outils, les adversaires peuvent\
          \ bloquer ou manipuler les indicateurs et la t\xE9l\xE9m\xE9trie utilis\xE9\
          s pour la d\xE9tection. Cela inclut la d\xE9sactivation ou la redirection\
          \ malveillante de capteurs tels que le tra\xE7age d\u2019\xE9v\xE9nements\
          \ pour Windows (ETW), la modification des configurations des journaux d\u2019\
          \xE9v\xE9nements (par exemple, la redirection des journaux de s\xE9curit\xE9\
          ), ou l\u2019interf\xE9rence avec les pipelines de journalisation et les\
          \ m\xE9canismes de transfert (par exemple, l\u2019ingestion SIEM). (Citation\
          \ : Microsoft Lamin septembre 2017)(Citation : ETW Palantir)\n\nDes techniques\
          \ plus avanc\xE9es incluent l\u2019utilisation de pilotes l\xE9gitimes ou\
          \ de m\xE9canismes de d\xE9bogage pour rendre les outils non fonctionnels,\
          \ contourner les protections anti-manipulation, et cibler des d\xE9fenses\
          \ sp\xE9cifiques telles que Sysmon ou des agents de surveillance cloud.\
          \ Les adversaires peuvent \xE9galement perturber des op\xE9rations d\xE9\
          fensives plus larges, notamment les m\xE9canismes de mise \xE0 jour, l\u2019\
          infrastructure de journalisation (par exemple, syslog) ou l\u2019agr\xE9\
          gation d\u2019\xE9v\xE9nements, d\xE9gradant encore la capacit\xE9 d\u2019\
          une organisation \xE0 d\xE9tecter et \xE0 r\xE9agir \xE0 des activit\xE9\
          s malveillantes. (Citation : Reboot COCOMAZZI FIN7)\nhttps://attack.mitre.org/techniques/T1685"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685.001
    ref_id: T1685.001
    name: Disable or Modify Windows Event Log
    description: "Adversaries may disable or modify the Windows Event Log to limit\
      \ data that can be leveraged for detections and audits. Windows Event Log records\
      \ user and system activity such as login attempts and process creation.(Citation:\
      \ EventLog_Core_Technologies) This data is used by security tools and analysts\
      \ to generate detections. \n\nThe EventLog service maintains event logs from\
      \ various system components and applications. By default, the service automatically\
      \ starts when a system powers on. An audit policy, maintained by the Local Security\
      \ Policy (secpol.msc), defines which system events the EventLog service logs.\
      \ Security audit policy settings can be changed by running secpol.msc, then\
      \ navigating to `Security Settings\\Local Policies\\Audit Policy` for basic\
      \ audit policy settings or `Security Settings\\Advanced Audit Policy Configuration`\
      \ for advanced audit policy settings.(Citation: Microsoft Audit Policy)(Citation:\
      \ Microsoft Adv Security Settings) `auditpol.exe` may also be used to set audit\
      \ policies.(Citation: Microsoft auditpol)\n\nAdversaries may target system-wide\
      \ logging or just that of a particular application. For example, the Windows\
      \ EventLog service may be disabled using the `Set-Service -Name EventLog -Status\
      \ Stopped` or `sc config eventlog start=disabled` commands (followed by manually\
      \ stopping the service using `Stop-Service -Name EventLog`). Additionally, the\
      \ service may be disabled by modifying the \"Start\" value in `HKEY_LOCAL_MACHINE\\\
      SYSTEM\\CurrentControlSet\\Services\\EventLog` then restarting the system for\
      \ the change to take effect.(Citation: Disable_Win_Event_Logging)(Citation:\
      \ disable_win_evt_logging)\n\nThere are several ways to disable the EventLog\
      \ service via registry key modification. Without Administrator privileges, adversaries\
      \ may modify the \"Start\" value in the key `HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\\
      Control\\WMI\\Autologger\\EventLog-Security`, then reboot the system to disable\
      \ the Security EventLog.(Citation: winser19_file_overwrite_bug_twitter) With\
      \ Administrator privilege, adversaries may modify the same values in `HKEY_LOCAL_MACHINE\\\
      SYSTEM\\CurrentControlSet\\Control\\WMI\\Autologger\\EventLog-System` and `HKEY_LOCAL_MACHINE\\\
      SYSTEM\\CurrentControlSet\\Control\\WMI\\Autologger\\EventLog-Application` to\
      \ disable the entire EventLog.\n\nAdditionally, adversaries may use `auditpol`\
      \ and its sub-commands in a command prompt to disable auditing or clear the\
      \ audit policy. To enable or disable a specified setting or audit category,\
      \ adversaries may use the `/success` or `/failure` parameters. For example,\
      \ `auditpol /set /category:\"Account Logon\" /success:disable /failure:disable`\
      \ turns off auditing for the Account Logon category.(Citation: auditpol.exe_STRONTIC)\
      \ To clear the audit policy, adversaries may run the following lines: `auditpol\
      \ /clear /y` or `auditpol /remove /allusers`.(Citation: T1562.002_redcanaryco)\n\
      https://attack.mitre.org/techniques/T1685/001"
    translations:
      fr:
        name: "D\xE9sactiver ou modifier le journal des \xE9v\xE9nements Windows"
        description: "Les adversaires peuvent d\xE9sactiver ou modifier le journal\
          \ d\u2019\xE9v\xE9nements Windows pour limiter les donn\xE9es pouvant \xEA\
          tre exploit\xE9es pour les d\xE9tections et audits. Le journal des \xE9\
          v\xE9nements Windows enregistre les activit\xE9s des utilisateurs et du\
          \ syst\xE8me, telles que les tentatives de connexion et la cr\xE9ation de\
          \ processus. (Citation : EventLog_Core_Technologies) Ces donn\xE9es sont\
          \ utilis\xE9es par les outils de s\xE9curit\xE9 et les analystes pour g\xE9\
          n\xE9rer des d\xE9tections. \n\nLe service EventLog maintient des journaux\
          \ d\u2019\xE9v\xE9nements provenant de divers composants et applications\
          \ syst\xE8me. Par d\xE9faut, le service d\xE9marre automatiquement lorsqu\u2019\
          un syst\xE8me s\u2019allume. Une politique d\u2019audit, maintenue par la\
          \ Politique de S\xE9curit\xE9 Locale (secpol.msc), d\xE9finit quels \xE9\
          v\xE9nements syst\xE8me le service EventLog enregistre. Les param\xE8tres\
          \ de politique d\u2019audit de s\xE9curit\xE9 peuvent \xEAtre modifi\xE9\
          s en ex\xE9cutant secpol.msc, puis en naviguant dans \xAB Param\xE8tres\
          \ de s\xE9curit\xE9\\Politiques locales\\Politique d\u2019audit \xBB pour\
          \ les param\xE8tres de base de la politique d\u2019audit ou \xAB Param\xE8\
          tres de s\xE9curit\xE9\\Configuration avanc\xE9e de la politique d\u2019\
          audit \xBB pour les param\xE8tres avanc\xE9s de la politique d\u2019audit.\
          \ (Citation : Politique d\u2019audit Microsoft)(Citation : Param\xE8tres\
          \ de s\xE9curit\xE9 Microsoft Adv) \xAB auditpol.exe \xBB peut \xE9galement\
          \ \xEAtre utilis\xE9 pour d\xE9finir des politiques d\u2019audit. (Citation\
          \ : Microsoft auditpol)\n\nLes adversaires peuvent cibler la journalisation\
          \ \xE0 l\u2019\xE9chelle du syst\xE8me ou simplement celle d\u2019une application\
          \ particuli\xE8re. Par exemple, le service Windows EventLog peut \xEAtre\
          \ d\xE9sactiv\xE9 en utilisant les commandes \xAB Set-Service -Name EventLog\
          \ -Status Stopped \xBB ou \xAB sc config eventlog start=disabled \xBB (suivi\
          \ d\u2019un arr\xEAt manuel du service via \xAB Stop-Service -Name EventLog\
          \ \xBB). De plus, le service peut \xEAtre d\xE9sactiv\xE9 en modifiant la\
          \ valeur \xAB Start \xBB dans \xAB HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\\
          Services\\EventLog \xBB puis en red\xE9marrant le syst\xE8me pour que le\
          \ changement prenne effet. (Citation : Disable_Win_Event_Logging)(Citation\
          \ : disable_win_evt_logging)\n\nIl existe plusieurs fa\xE7ons de d\xE9sactiver\
          \ le service EventLog via la modification de la cl\xE9 de registre. Sans\
          \ privil\xE8ges d\u2019Administrateur, les adversaires peuvent modifier\
          \ la valeur \xAB Start \xBB dans la cl\xE9 \xAB HKEY_LOCAL_MACHINE\\SYSTEM\\\
          CurrentControlSet\\Control\\WMI\\Autologger\\EventLog-Security \xBB, puis\
          \ red\xE9marrer le syst\xE8me pour d\xE9sactiver le journal d\u2019\xE9\
          v\xE9nements de s\xE9curit\xE9. (Citation : winser19_file_overwrite_bug_twitter)\
          \ Avec le privil\xE8ge Administrateur, les adversaires peuvent modifier\
          \ les m\xEAmes valeurs dans 'HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\\
          Control\\WMI\\Autologger\\EventLog-System' et 'HKEY_LOCAL_MACHINE\\SYSTEM\\\
          CurrentControlSet\\Control\\WMI\\Autologger\\EventLog-Application' pour\
          \ d\xE9sactiver l\u2019int\xE9gralit\xE9 du journal d\u2019\xE9v\xE9nements.\n\
          \nDe plus, les adversaires peuvent utiliser \xAB auditpol \xBB et ses sous-commandes\
          \ dans une invite de commande pour d\xE9sactiver l\u2019audit ou effacer\
          \ la politique d\u2019audit. Pour activer ou d\xE9sactiver un param\xE8\
          tre ou une cat\xE9gorie d\u2019audit sp\xE9cifi\xE9e, les adversaires peuvent\
          \ utiliser les param\xE8tres \xAB /succ\xE8s \xBB ou \xAB /\xE9chec \xBB\
          . Par exemple, \xAB auditpol /set /category\_:\"Account Logon\_\xBB /success\_\
          :disable /failure\_:disable \xBB d\xE9sactive l\u2019audit pour la cat\xE9\
          gorie Connexion du compte. (Citation : auditpol.exe_STRONTIC) Pour valider\
          \ la politique d\u2019audit, les adversaires peuvent utiliser les lignes\
          \ suivantes : \xAB auditpol /clear /y \xBB ou \xAB auditpol /remove /allusers\
          \ \xBB. (Citation : T1562.002_redcanaryco)\nhttps://attack.mitre.org/techniques/T1685/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685.002
    ref_id: T1685.002
    name: Disable or Modify Cloud Log
    description: "An adversary may disable or modify cloud logging capabilities and\
      \ integrations to limit what data is collected on their activities and avoid\
      \ detection. Cloud environments allow for collection and analysis of audit and\
      \ application logs that provide insight into what activities a user does within\
      \ the environment. If an adversary has sufficient permissions, they can disable\
      \ or modify logging to avoid detection of their activities. \n\nFor example,\
      \ in AWS an adversary may disable CloudWatch/CloudTrail integrations prior to\
      \ conducting further malicious activity. They may alternatively tamper with\
      \ logging functionality, for example, by removing any associated SNS topics,\
      \ disabling multi-region logging, or disabling settings that validate and/or\
      \ encrypt log files.(Citation: AWS Cloud Trail)(Citation: Pacu Detection Disruption\
      \ Module) In Office 365, an adversary may disable logging on mail collection\
      \ activities for specific users by using the Set-MailboxAuditBypassAssociation\
      \ cmdlet, by disabling M365 Advanced Auditing for the user, or by downgrading\
      \ the user\u2019s license from an Enterprise E5 to an Enterprise E3 license.(Citation:\
      \ Dark Reading)\nhttps://attack.mitre.org/techniques/T1685/002"
    translations:
      fr:
        name: "D\xE9sactiver ou modifier le journal cloud"
        description: "Un adversaire peut d\xE9sactiver ou modifier les capacit\xE9\
          s et int\xE9grations de journalisation cloud pour limiter les donn\xE9es\
          \ collect\xE9es sur ses activit\xE9s et \xE9viter la d\xE9tection. Les environnements\
          \ cloud permettent la collecte et l\u2019analyse des journaux d\u2019audit\
          \ et d\u2019application qui fournissent un aper\xE7u des activit\xE9s effectu\xE9\
          es par un utilisateur dans l\u2019environnement. Si un adversaire dispose\
          \ d\u2019autorisations suffisantes, il peut d\xE9sactiver ou modifier la\
          \ journalisation pour \xE9viter la d\xE9tection de ses activit\xE9s. \n\n\
          Par exemple, dans AWS, un adversaire peut d\xE9sactiver les int\xE9grations\
          \ CloudWatch/CloudTrail avant d\u2019effectuer d\u2019autres activit\xE9\
          s malveillantes. Ils peuvent alternativement modifier la fonctionnalit\xE9\
          \ de journalisation, par exemple en supprimant tout sujet SNS associ\xE9\
          , en d\xE9sactivant la journalisation multi-r\xE9gion, ou en d\xE9sactivant\
          \ les param\xE8tres qui valident et/ou chiffrent les fichiers journaux.\
          \ (Citation : AWS Cloud Trail)(Citation : Module de d\xE9tection de perturbation\
          \ de la PACU) Dans Office 365, un adversaire peut d\xE9sactiver la journalisation\
          \ des activit\xE9s de collecte de courrier pour des utilisateurs sp\xE9\
          cifiques en utilisant le cmdlet Set-MailboxAuditBypassAssociation, en d\xE9\
          sactivant M365 Advanced Auditing pour l\u2019utilisateur, ou en r\xE9trogradant\
          \ la licence de l\u2019utilisateur d\u2019une licence Enterprise E5 \xE0\
          \ une licence Enterprise E3. (Citation : Lecture sombre)\nhttps://attack.mitre.org/techniques/T1685/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685.003
    ref_id: T1685.003
    name: Modify or Spoof Tool UI
    description: "Adversaries may spoof or manipulate security tool user interfaces\
      \ (UIs) to falsely indicate tools are functioning normally and delay detection\
      \ and response. \n\nAdversaries may present misleading or falsified security\
      \ tool interfaces (UIs) that display normal or healthy status indicators, even\
      \ when underlying security tools have been disabled, degraded, or otherwise\
      \ tampered with. Security tools typically provide visibility into system health,\
      \ alerting, and operational status; by misrepresenting this information, adversaries\
      \ can undermine defender trust in these signals and obscure the true security\
      \ posture of the system. \n\nThis behavior is often used in conjunction with\
      \ efforts to disable or modify tools, where adversaries first impair the functionality\
      \ of defenses (e.g., EDR, logging agents) and then replace or mimic their interfaces\
      \ to conceal the loss of visibility. By maintaining the appearance of normal\
      \ operations, such as showing active protection, successful updates, or absence\
      \ of threats, adversaries can delay investigation and response, enabling continued\
      \ malicious activity. \n\nFor example, adversaries may display a fake Windows\
      \ Security interface or system tray icon indicating a \u201Cprotected\u201D\
      \ or \u201Chealthy\u201D state after disabling Windows Defender or related services.(Citation:\
      \ BlackBasta)\nhttps://attack.mitre.org/techniques/T1685/003"
    translations:
      fr:
        name: "Modifier ou usurper l\u2019interface utilisateur de l\u2019outil"
        description: "Les adversaires peuvent usurper ou manipuler les interfaces\
          \ utilisateur (UI) des outils de s\xE9curit\xE9 pour indiquer faussement\
          \ que les outils fonctionnent normalement et retarder la d\xE9tection et\
          \ la r\xE9ponse. \n\nLes adversaires peuvent pr\xE9senter des interfaces\
          \ d\u2019outils de s\xE9curit\xE9 (UI) trompeuses ou falsifi\xE9es qui affichent\
          \ des indicateurs de statut normal ou sain, m\xEAme lorsque les outils de\
          \ s\xE9curit\xE9 sous-jacents ont \xE9t\xE9 d\xE9sactiv\xE9s, d\xE9grad\xE9\
          s ou autrement modifi\xE9s. Les outils de s\xE9curit\xE9 offrent g\xE9n\xE9\
          ralement une visibilit\xE9 sur l\u2019\xE9tat de sant\xE9 du syst\xE8me,\
          \ les alertes et l\u2019\xE9tat op\xE9rationnel ; En d\xE9formant ces informations,\
          \ les adversaires peuvent saper la confiance des d\xE9fenseurs dans ces\
          \ signaux et masquer la v\xE9ritable posture de s\xE9curit\xE9 du syst\xE8\
          me. \n\nCe comportement est souvent utilis\xE9 en conjonction avec des tentatives\
          \ de d\xE9sactivation ou de modification des outils, o\xF9 les adversaires\
          \ compromettent d\u2019abord la fonctionnalit\xE9 des d\xE9fenses (par exemple,\
          \ EDR, agents de journalisation) puis remplacent ou imitent leurs interfaces\
          \ pour dissimuler la perte de visibilit\xE9. En maintenant l\u2019apparence\
          \ d\u2019op\xE9rations normales, telles que la protection active, des mises\
          \ \xE0 jour r\xE9ussies ou l\u2019absence de menaces, les adversaires peuvent\
          \ retarder l\u2019enqu\xEAte et la r\xE9ponse, permettant ainsi la poursuite\
          \ d\u2019activit\xE9s malveillantes. \n\nPar exemple, des adversaires peuvent\
          \ afficher une fausse ic\xF4ne d\u2019interface de s\xE9curit\xE9 de Windows\
          \ ou de la banque syst\xE8me indiquant un \xE9tat \xAB prot\xE9g\xE9 \xBB\
          \ ou \xAB sain \xBB apr\xE8s avoir d\xE9sactiv\xE9 Windows Defender ou les\
          \ services associ\xE9s. (Citation : BlackBasta)\nhttps://attack.mitre.org/techniques/T1685/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685.004
    ref_id: T1685.004
    name: Disable or Modify Linux Audit System Log
    description: "Adversaries may disable or modify the Linux Audit system to hide\
      \ malicious activity and avoid detection. Linux admins use the Linux Audit system\
      \ to track security-relevant information on a system. The Linux Audit system\
      \ operates at the kernel-level and maintains event logs on application and system\
      \ activity such as process, network, file, and login events based on pre-configured\
      \ rules. \n\nOften referred to as `auditd`, this is the name of the daemon used\
      \ to write events to disk and is governed by the parameters set in the `audit.conf`\
      \ configuration file. Two primary ways to configure the log generation rules\
      \ are through the command line `auditctl` utility and the file `/etc/audit/audit.rules`,\
      \ containing a sequence of `auditctl` commands loaded at boot time.(Citation:\
      \ IzyKnows auditd threat detection 2022)(Citation: Red Hat Linux Disable or\
      \ Mod)\n\nWith root privileges, adversaries may be able to ensure their activity\
      \ is not logged through disabling the Audit system service, editing the configuration/rule\
      \ files, or by hooking the Audit system library functions. Using the command\
      \ line, adversaries can disable the Audit system service through killing processes\
      \ associated with `auditd` daemon or use `systemctl` to stop the Audit service.\
      \ Adversaries can also hook Audit system functions to disable logging or modify\
      \ the rules contained in the `/etc/audit/audit.rules` or `audit.conf` files\
      \ to ignore malicious activity.(Citation: ESET Ebury Feb 2014)\nhttps://attack.mitre.org/techniques/T1685/004"
    translations:
      fr:
        name: "D\xE9sactiver ou modifier le journal syst\xE8me d\u2019audit Linux"
        description: "Les adversaires peuvent d\xE9sactiver ou modifier le syst\xE8\
          me d\u2019audit Linux pour masquer les activit\xE9s malveillantes et \xE9\
          viter la d\xE9tection. Les administrateurs Linux utilisent le syst\xE8me\
          \ d\u2019audit Linux pour suivre les informations pertinentes en mati\xE8\
          re de s\xE9curit\xE9 sur un syst\xE8me. Le syst\xE8me d\u2019audit Linux\
          \ fonctionne au niveau du noyau et maintient des journaux d\u2019\xE9v\xE9\
          nements sur les activit\xE9s des applications et du syst\xE8me, telles que\
          \ les \xE9v\xE9nements de processus, r\xE9seau, fichiers et connexion, bas\xE9\
          s sur des r\xE8gles pr\xE9configur\xE9es. \n\nSouvent appel\xE9 \xAB auditd\
          \ \xBB, c\u2019est le nom du d\xE9mon utilis\xE9 pour \xE9crire les \xE9\
          v\xE9nements sur le disque et il est r\xE9gi par les param\xE8tres d\xE9\
          finis dans le fichier de configuration \xAB audit.conf \xBB. Deux principales\
          \ fa\xE7ons de configurer les r\xE8gles de g\xE9n\xE9ration de journaux\
          \ sont via l\u2019utilitaire en ligne de commande 'auditctl' et le fichier\
          \ '/etc/audit/audit.rules', contenant une s\xE9quence de commandes 'auditctl'\
          \ charg\xE9es au d\xE9marrage. (Citation : IzyKnows d\xE9tection des menaces\
          \ audit\xE9es 2022)(Citation : Red Hat Linux d\xE9sactiv\xE9 ou mod)\n\n\
          Avec les privil\xE8ges root, les adversaires peuvent s\u2019assurer que\
          \ leur activit\xE9 n\u2019est pas enregistr\xE9e en d\xE9sactivant le service\
          \ syst\xE8me d\u2019audit, en modifiant les fichiers de configuration/r\xE8\
          gles, ou en accrochant les fonctions de la biblioth\xE8que syst\xE8me d\u2019\
          audit. En utilisant la ligne de commande, les adversaires peuvent d\xE9\
          sactiver le service syst\xE8me d\u2019audit en coupant les processus associ\xE9\
          s au d\xE9mon \xAB auditd \xBB ou utiliser le \xAB systemctl \xBB pour arr\xEA\
          ter le service d\u2019audit. Les adversaires peuvent \xE9galement activer\
          \ les fonctions syst\xE8me d\u2019audit pour d\xE9sactiver la journalisation\
          \ ou modifier les r\xE8gles contenues dans les fichiers '/etc/audit/audit.rules'\
          \ ou 'audit.conf' pour ignorer les activit\xE9s malveillantes. (Citation\
          \ : ESET Ebury f\xE9vr. 2014)\nhttps://attack.mitre.org/techniques/T1685/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685.005
    ref_id: T1685.005
    name: Clear Windows Event Logs
    description: 'Adversaries may clear Windows Event Logs to hide the activity of
      an intrusion. Windows Event Logs are a record of a computer''s alerts and notifications.
      There are three system-defined sources of events: System, Application, and Security,
      with five event types: Error, Warning, Information, Success Audit, and Failure
      Audit.


      With administrator privileges, the event logs can be cleared with the following
      utility commands:


      * `wevtutil cl system`

      * `wevtutil cl application`

      * `wevtutil cl security`


      These logs may also be cleared through other mechanisms, such as the event viewer
      GUI or [PowerShell](https://attack.mitre.org/techniques/T1059/001). For example,
      adversaries may use the PowerShell command `Remove-EventLog -LogName Security`
      to delete the Security EventLog and after reboot, disable future logging. Note:
      events may still be generated and logged in the .evtx file between the time
      the command is run and the reboot.(Citation: disable_win_evt_logging)


      Adversaries may also attempt to clear logs by directly deleting the stored log
      files within `C:\Windows\System32\winevt\logs\`.

      https://attack.mitre.org/techniques/T1685/005'
    translations:
      fr:
        name: "Effacer les journaux d\u2019\xE9v\xE9nements Windows"
        description: "Les adversaires peuvent effacer les journaux d\u2019\xE9v\xE9\
          nements Windows pour masquer l\u2019activit\xE9 d\u2019une intrusion. Les\
          \ journaux d\u2019\xE9v\xE9nements Windows sont un enregistrement des alertes\
          \ et notifications d\u2019un ordinateur. Il existe trois sources d\u2019\
          \xE9v\xE9nements d\xE9finies par le syst\xE8me : Syst\xE8me, Application\
          \ et S\xE9curit\xE9, avec cinq types d\u2019\xE9v\xE9nements : Erreur, Avertissement,\
          \ Information, Audit de r\xE9ussite et Audit de d\xE9faillance.\n\nAvec\
          \ les privil\xE8ges administrateurs, les journaux d\u2019\xE9v\xE9nements\
          \ peuvent \xEAtre effac\xE9s avec les commandes utilitaires suivantes :\n\
          \n* \xAB syst\xE8me cl wevtutil \xBB\n* 'wevtutil cl application'\n* \xAB\
          \ Wevtutil CL Security \xBB\n\nCes journaux peuvent \xE9galement \xEAtre\
          \ effac\xE9s via d\u2019autres m\xE9canismes, tels que l\u2019interface\
          \ graphique de l\u2019observateur d\u2019\xE9v\xE9nements ou [PowerShell](https://attack.mitre.org/techniques/T1059/001).\
          \ Par exemple, les adversaires peuvent utiliser la commande PowerShell \xAB\
          \ Remove-EventLog -LogName Security \xBB pour supprimer le Security EventLog\
          \ et, apr\xE8s red\xE9marrage, d\xE9sactiver la journalisation future. Note\
          \ : les \xE9v\xE9nements peuvent toujours \xEAtre g\xE9n\xE9r\xE9s et enregistr\xE9\
          s dans le fichier .evtx entre l\u2019ex\xE9cution de la commande et le red\xE9\
          marrage. (Citation : disable_win_evt_logging)\n\nLes adversaires peuvent\
          \ aussi tenter d\u2019effacer les journaux en supprimant directement les\
          \ fichiers journaux stock\xE9s dans 'C\_:\\Windows\\System32\\winevt\\logs'.\n\
          https://attack.mitre.org/techniques/T1685/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1685.006
    ref_id: T1685.006
    name: Clear Linux or Mac System Logs
    description: 'Adversaries may clear system logs to hide evidence of an intrusion.
      macOS and Linux both keep track of system or user-initiated actions via system
      logs. The majority of native system logging is stored under the `/var/log/`
      directory. Subfolders in this directory categorize logs by their related functions,
      such as:(Citation: Linux Logs)


      * `/var/log/messages:`: General and system-related messages

      * `/var/log/secure or /var/log/auth.log`: Authentication logs

      * `/var/log/utmp or /var/log/wtmp`: Login records

      * `/var/log/kern.log`: Kernel logs

      * `/var/log/cron.log`: Crond logs

      * `/var/log/maillog`: Mail server logs

      * `/var/log/httpd/`: Web server access and error logs

      https://attack.mitre.org/techniques/T1685/006'
    translations:
      fr:
        name: "Effacer les journaux syst\xE8me Linux ou Mac"
        description: "Les adversaires peuvent effacer les journaux syst\xE8me pour\
          \ dissimuler des preuves d\u2019intrusion. macOS et Linux suivent tous deux\
          \ les actions initi\xE9es par le syst\xE8me ou par l\u2019utilisateur via\
          \ des journaux syst\xE8me. La majorit\xE9 des journaux du syst\xE8me sont\
          \ stock\xE9s dans le r\xE9pertoire '/var/log/'. Les sous-dossiers de ce\
          \ r\xE9pertoire cat\xE9gorisent les journaux selon leurs fonctions associ\xE9\
          es, telles que : (Citation : Linux Logs)\n\n* '/var/log/messages\_:' : messages\
          \ g\xE9n\xE9raux et li\xE9s au syst\xE8me\n* '/var/log/secure ou /var/log/auth.log'\
          \ : journaux d\u2019authentification\n* '/var/log/utmp ou /var/log/wtmp'\
          \ : Enregistrements de connexion\n* '/var/log/kern.log' : journaux du noyau\n\
          * '/var/log/cron.log' : journaux de cround\n* '/var/log/maillog' : journaux\
          \ du serveur de messagerie\n* '/var/log/httpd/ : journaux d\u2019acc\xE8\
          s au serveur web et d\u2019erreurs\nhttps://attack.mitre.org/techniques/T1685/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1686
    ref_id: T1686
    name: Disable or Modify System Firewall
    description: 'Adversaries may disable or modify host-based or network firewalls
      to impair defensive mechanisms and enable further action. Once an adversary
      has gathered sufficient privileges, they can tamper with firewall services,
      policies, or rule sets to remove restrictions on inbound or outbound traffic.
      For example, this may include turning off firewall profiles, altering existing
      rules to permit previously blocked ports or protocols, or adding new rules that
      create covert communication paths (e.g., adding a new firewall rule for a well-known
      protocol (such as RDP) using a non-traditional and potentially less securitized
      port.(Citation: change_rdp_port_conti)


      Adversaries may disable or modify firewalls using different behaviors, depending
      on the platform. For example, in ESXi, firewall rules may be modified directly
      via the esxcli (e.g., via esxcli network firewall set) or via the vCenter user
      interface.(Citation: Broadcom ESXi Firewall)(Citation: Trellix Rnasomhouse 2024)

      https://attack.mitre.org/techniques/T1686'
    translations:
      fr:
        name: "D\xE9sactiver ou modifier le pare-feu syst\xE8me"
        description: "Les adversaires peuvent d\xE9sactiver ou modifier les pare-feux\
          \ h\xF4tes ou r\xE9seau afin de compromettre les m\xE9canismes d\xE9fensifs\
          \ et permettre d\u2019autres actions. Une fois qu\u2019un adversaire a obtenu\
          \ suffisamment de privil\xE8ges, il peut modifier les services de pare-feu,\
          \ les politiques ou les ensembles de r\xE8gles pour supprimer les restrictions\
          \ sur le trafic entrant ou sortant. Par exemple, cela peut inclure la d\xE9\
          sactivation des profils de pare-feu, la modification des r\xE8gles existantes\
          \ pour permettre des ports ou protocoles pr\xE9c\xE9demment bloqu\xE9s,\
          \ ou l\u2019ajout de nouvelles r\xE8gles cr\xE9ant des chemins de communication\
          \ secr\xE8tes (par exemple, l\u2019ajout d\u2019une nouvelle r\xE8gle de\
          \ pare-feu pour un protocole bien connu (comme RDP) en utilisant un port\
          \ non traditionnel et potentiellement moins s\xE9curis\xE9). Citation :\
          \ change_rdp_port_conti)\n\nLes adversaires peuvent d\xE9sactiver ou modifier\
          \ les pare-feux selon diff\xE9rents comportements, selon la plateforme.\
          \ Par exemple, dans ESXi, les r\xE8gles de pare-feu peuvent \xEAtre modifi\xE9\
          es directement via l\u2019esxcli (par exemple, via le pare-feu r\xE9seau\
          \ esxcli) ou via l\u2019interface utilisateur vCenter. (Citation : Broadcom\
          \ ESXi Firewall)(Citation : Trellix Rnasomhouse 2024)\nhttps://attack.mitre.org/techniques/T1686"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1686.001
    ref_id: T1686.001
    name: Cloud Firewall
    description: 'Adversaries may disable or modify a firewall within a cloud environment
      to bypass controls that limit access to cloud resources.


      Cloud environments typically utilize restrictive security groups and firewall
      rules that only allow network activity from trusted IP addresses via expected
      ports and protocols. An adversary with appropriate permissions may introduce
      new firewall rules or policies to allow access into a victim cloud environment
      and/or move laterally from the cloud control plane to the data plane.


      For example, an adversary may use a script or utility that creates new ingress
      rules in existing security groups (or creates new security groups entirely)
      to allow any TCP/IP connectivity to a cloud-hosted instance. They may also remove
      networking limitations to support traffic associated with malicious activity
      (such as cryptomining).(Citation: Palo Alto Unit 42 Compromised Cloud Compute
      Credentials 2022)(Citation: Expel AWS)

      https://attack.mitre.org/techniques/T1686/001'
    translations:
      fr:
        name: Pare-feu cloud
        description: "Les adversaires peuvent d\xE9sactiver ou modifier un pare-feu\
          \ dans un environnement cloud pour contourner les contr\xF4les qui limitent\
          \ l\u2019acc\xE8s aux ressources cloud.\n\nLes environnements cloud utilisent\
          \ g\xE9n\xE9ralement des groupes de s\xE9curit\xE9 restrictifs et des r\xE8\
          gles de pare-feu qui n\u2019autorisent l\u2019activit\xE9 r\xE9seau que\
          \ depuis des adresses IP de confiance via des ports et protocoles attendus.\
          \ Un adversaire disposant des permissions appropri\xE9es peut introduire\
          \ de nouvelles r\xE8gles ou politiques de pare-feu pour permettre l\u2019\
          acc\xE8s \xE0 un environnement cloud victime et/ou se d\xE9placer lat\xE9\
          ralement du plan de contr\xF4le cloud vers le plan de donn\xE9es.\n\nPar\
          \ exemple, un adversaire peut utiliser un script ou un utilitaire qui cr\xE9\
          e de nouvelles r\xE8gles d\u2019entr\xE9e dans les groupes de s\xE9curit\xE9\
          \ existants (ou cr\xE9e de nouveaux groupes de s\xE9curit\xE9 en entier)\
          \ pour permettre toute connectivit\xE9 TCP/IP \xE0 une instance h\xE9berg\xE9\
          e dans le cloud. Ils peuvent \xE9galement supprimer les limitations r\xE9\
          seau pour supporter le trafic associ\xE9 \xE0 des activit\xE9s malveillantes\
          \ (comme le cryptominage). (Citation : Identifiants Cloud Compute compromis\
          \ de Palo Alto Unit 42 2022)(Citation : Expulser AWS)\nhttps://attack.mitre.org/techniques/T1686/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1686.002
    ref_id: T1686.002
    name: Network Device Firewall
    description: "Adversaries may disable network device-based firewall mechanisms\
      \ entirely or add, delete, or modify particular rules in order to bypass controls\
      \ limiting network usage.  \n\nAdversaries may obtain access to devices such\
      \ as routers, switches, or other perimeter/network devices and change access\
      \ control lists (ACLs), security zones, or policy rules to permit otherwise\
      \ blocked traffic. For example, adversaries may add new network firewall rules\
      \ to allow access to all internal network subnets without restrictions. Allowing\
      \ access to internal network subsets may enable unrestricted inbound/outbound\
      \ connectivity or open paths for command and control and lateral movement.\n\
      \nAdversaries may obtain access to network device management interfaces via\
      \ [Valid Accounts](https://attack.mitre.org/techniques/T1078) or by exploiting\
      \ vulnerabilities. In some cases, threat actors may target firewalls and other\
      \ network infrastructure that are exposed to the internet by leveraging weaknesses\
      \ in public-facing applications ([Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)).(Citation:\
      \ CVE-2024-55591 Detail)\n\nAdversaries may also modify host networking configurations\
      \ that indirectly manipulate system firewalls, such as adjusting interface bandwidth\
      \ or network connection request thresholds.\nhttps://attack.mitre.org/techniques/T1686/002"
    translations:
      fr:
        name: "Pare-feu de p\xE9riph\xE9riques r\xE9seau"
        description: "Les adversaires peuvent d\xE9sactiver compl\xE8tement les m\xE9\
          canismes de pare-feu bas\xE9s sur les p\xE9riph\xE9riques r\xE9seau ou ajouter,\
          \ supprimer ou modifier certaines r\xE8gles afin de contourner les contr\xF4\
          les limitant l\u2019utilisation du r\xE9seau.  \n\nLes adversaires peuvent\
          \ acc\xE9der \xE0 des appareils tels que routeurs, commutateurs ou autres\
          \ p\xE9rim\xE8tres/r\xE9seaux et modifier les listes de contr\xF4le d\u2019\
          acc\xE8s (ACL), les zones de s\xE9curit\xE9 ou les r\xE8gles de politique\
          \ pour permettre un trafic autrement bloqu\xE9. Par exemple, les adversaires\
          \ peuvent ajouter de nouvelles r\xE8gles de pare-feu r\xE9seau pour permettre\
          \ l\u2019acc\xE8s \xE0 tous les sous-r\xE9seaux internes sans restrictions.\
          \ Permettre l\u2019acc\xE8s aux sous-ensembles internes du r\xE9seau peut\
          \ permettre une connectivit\xE9 entrante/sortante sans restriction ou ouvrir\
          \ des voies pour le commandement, le contr\xF4le et les d\xE9placements\
          \ lat\xE9raux.\n\nLes adversaires peuvent acc\xE9der aux interfaces de gestion\
          \ des p\xE9riph\xE9riques r\xE9seau via [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ ou en exploitant des vuln\xE9rabilit\xE9s. Dans certains cas, des acteurs\
          \ malveillants peuvent cibler les pare-feux et autres infrastructures r\xE9\
          seau expos\xE9es \xE0 Internet en exploitant les faiblesses des applications\
          \ publiques ([Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)).\
          \ (Citation : CVE-2024-55591 D\xE9tail)\n\nLes adversaires peuvent \xE9\
          galement modifier les configurations r\xE9seau h\xF4tes qui manipulent indirectement\
          \ les pare-feux syst\xE8me, comme ajuster la bande passante de l\u2019interface\
          \ ou les seuils de demande de connexion r\xE9seau.\nhttps://attack.mitre.org/techniques/T1686/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1686.003
    ref_id: T1686.003
    name: Windows Host Firewall
    description: 'Adversaries may disable or modify the Windows host firewall to bypass
      controls limiting network usage. This can include disabling the Windows host
      firewall entirely, suppressing specific profiles (domain, private, public),
      or adding, deleting, and modifying firewall rules to allow or restrict traffic.(Citation:
      Nearest Neighbor Volexity)


      Adversaries may perform these modifications through multiple mechanisms depending
      on the Windows operating system and access level. For example, adversaries may
      use command-line utilities (e.g., `netsh advfirewall` or PowerShell cmdlets
      like `Set-NetFirewallProfile`, `New-NetFirewallRule`), Windows Registry modifications
      (e.g., altering firewall states and rule configurations via registry keys),
      or the Windows Control Panel to modify firewall settings through the Windows
      Security interface.


      By disabling or modifying Windows firewall services, adversaries may enable
      access to remote services, open ports for command and control traffic, or configure
      rules for further actions.

      https://attack.mitre.org/techniques/T1686/003'
    translations:
      fr:
        name: "Pare-feu h\xF4te Windows"
        description: "Les adversaires peuvent d\xE9sactiver ou modifier le pare-feu\
          \ h\xF4te Windows pour contourner les contr\xF4les limitant l\u2019utilisation\
          \ du r\xE9seau. Cela peut inclure la d\xE9sactivation compl\xE8te du pare-feu\
          \ h\xF4te Windows, la suppression de profils sp\xE9cifiques (domaine, priv\xE9\
          , public), ou l\u2019addition, la suppression et la modification des r\xE8\
          gles du pare-feu pour autoriser ou restreindre le trafic. (Citation : Voisine\
          \ le plus proche Volexity)\n\nLes adversaires peuvent effectuer ces modifications\
          \ par plusieurs m\xE9canismes selon le syst\xE8me d\u2019exploitation Windows\
          \ et le niveau d\u2019acc\xE8s. Par exemple, les adversaires peuvent utiliser\
          \ des utilitaires en ligne de commande (par exemple, 'netsh advfirewall'\
          \ ou des commandets PowerShell comme 'Set-NetFirewallProfile', 'New-NetFirewallRule'),\
          \ des modifications du registre Windows (par exemple, modifier les \xE9\
          tats et configurations des r\xE8gles du pare-feu via des cl\xE9s de registre),\
          \ ou le panneau de configuration Windows pour modifier les param\xE8tres\
          \ du pare-feu via l\u2019interface de s\xE9curit\xE9 de Windows.\n\nEn d\xE9\
          sactivant ou en modifiant les services de pare-feu Windows, les adversaires\
          \ peuvent permettre l\u2019acc\xE8s \xE0 des services distants, ouvrir des\
          \ ports pour le trafic de commande et de contr\xF4le, ou configurer des\
          \ r\xE8gles pour les actions ult\xE9rieures.\nhttps://attack.mitre.org/techniques/T1686/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1687
    ref_id: T1687
    name: Exploitation for Defense Impairment
    description: "Adversaries may exploit vulnerabilities in security software, infrastructure,\
      \ or defensive components to degrade, disable, or otherwise continue to impair\
      \ their ability to prevent, detect, or respond to malicious activity. \n \n\
      Adversaries may exploit a system or application vulnerability to directly interfere\
      \ with defensive mechanisms. Exploitation occurs when an adversary takes advantage\
      \ of a programming error in software, services, or the operating system to execute\
      \ adversary-controlled code, often with the goal of weakening or disabling protections.\
      \ \n\nVulnerabilities may exist in security tools such as antivirus, endpoint\
      \ detection and response (EDR), firewalls, or other monitoring solutions. Adversaries\
      \ may use prior reconnaissance or perform discovery activities (e.g., [Software\
      \ Discovery](https://attack.mitre.org/techniques/T1518)) to identify defensive\
      \ tools present in an environment and target them for exploitation. \n\nSuccessful\
      \ exploitation may allow adversaries to terminate security processes, disable\
      \ protections, bypass enforcement mechanisms, or reduce the effectiveness of\
      \ defensive controls. In some cases, vulnerabilities in cloud-based or SaaS\
      \ infrastructure may also be leveraged to bypass built-in security boundaries\
      \ or disrupt visibility and enforcement across environments.(Citation: Salesforce\
      \ zero-day in facebook phishing attack)\nhttps://attack.mitre.org/techniques/T1687"
    translations:
      fr:
        name: "Exploitation pour l\u2019atteinte \xE0 la d\xE9fense"
        description: "Les adversaires peuvent exploiter des vuln\xE9rabilit\xE9s dans\
          \ les logiciels de s\xE9curit\xE9, les infrastructures ou les composants\
          \ d\xE9fensifs pour d\xE9grader, d\xE9sactiver ou continuer \xE0 affaiblir\
          \ leur capacit\xE9 \xE0 pr\xE9venir, d\xE9tecter ou r\xE9agir \xE0 des activit\xE9\
          s malveillantes. \n \nLes adversaires peuvent exploiter une vuln\xE9rabilit\xE9\
          \ d\u2019un syst\xE8me ou d\u2019une application pour interf\xE9rer directement\
          \ avec les m\xE9canismes de d\xE9fense. L\u2019exploitation se produit lorsqu\u2019\
          un adversaire profite d\u2019une erreur de programmation dans un logiciel,\
          \ des services ou du syst\xE8me d\u2019exploitation pour ex\xE9cuter du\
          \ code contr\xF4l\xE9 par l\u2019adversaire, souvent dans le but d\u2019\
          affaiblir ou de d\xE9sactiver les protections. \n\nDes vuln\xE9rabilit\xE9\
          s peuvent exister dans des outils de s\xE9curit\xE9 tels que les antivirus,\
          \ la d\xE9tection et la r\xE9ponse des points de terminaison (EDR), les\
          \ pare-feux ou d\u2019autres solutions de surveillance. Les adversaires\
          \ peuvent utiliser la reconnaissance pr\xE9alable ou effectuer des activit\xE9\
          s de d\xE9couverte (par exemple, [D\xE9couverte de logiciel](https://attack.mitre.org/techniques/T1518))\
          \ pour identifier les outils d\xE9fensifs pr\xE9sents dans un environnement\
          \ et les cibler pour exploitation. \n\nUne exploitation r\xE9ussie peut\
          \ permettre aux adversaires de mettre fin aux processus de s\xE9curit\xE9\
          , de d\xE9sactiver les protections, de contourner les m\xE9canismes d\u2019\
          application ou de r\xE9duire l\u2019efficacit\xE9 des contr\xF4les d\xE9\
          fensifs. Dans certains cas, des vuln\xE9rabilit\xE9s dans les infrastructures\
          \ cloud ou SaaS peuvent \xE9galement \xEAtre exploit\xE9es pour contourner\
          \ les limites de s\xE9curit\xE9 int\xE9gr\xE9es ou perturber la visibilit\xE9\
          \ et l\u2019application des r\xE8gles dans tous les environnements. (Citation\
          \ : Zero-day de Salesforce dans une attaque de phishing Facebook)\nhttps://attack.mitre.org/techniques/T1687"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1688
    ref_id: T1688
    name: Safe Mode Boot
    description: 'Adversaries may abuse Windows safe mode to disable endpoint defenses.
      Safe mode starts up the Windows operating system with a limited set of drivers
      and services. Third-party security software such as endpoint detection and response
      (EDR) tools may not start after booting Windows in safe mode. There are two
      versions of safe mode: Safe Mode and Safe Mode with Networking. It is possible
      to start additional services after a safe mode boot.(Citation: Microsoft Windows
      Startup Settings)(Citation: Sophos Safe Mode Boot)


      Adversaries may abuse safe mode to disable endpoint defenses that may not start
      with a limited boot. Hosts can be forced into safe mode after the next reboot
      via modifications to Boot Configuration Data (BCD) stores, which are files that
      manage boot application settings.(Citation: Microsoft bcdedit)


      Adversaries may also add their malicious applications to the list of minimal
      services that start in safe mode by modifying relevant Registry values (i.e.
      [Modify Registry](https://attack.mitre.org/techniques/T1112)). Malicious [Component
      Object Model](https://attack.mitre.org/techniques/T1559/001) (COM) objects may
      also be registered and loaded in safe mode.(Citation: CyberArk Labs Safe Mode
      2016)(Citation: Cybereason safe mode boot)(Citation: BleepingComputer REvil
      2021)

      https://attack.mitre.org/techniques/T1688'
    translations:
      fr:
        name: "D\xE9marrage en mode sans \xE9chec"
        description: "Les adversaires peuvent abuser du mode sans \xE9chec de Windows\
          \ pour d\xE9sactiver les d\xE9fenses des points de terminaison. Le mode\
          \ sans \xE9chec lance le syst\xE8me d\u2019exploitation Windows avec un\
          \ ensemble limit\xE9 de pilotes et de services. Les logiciels de s\xE9curit\xE9\
          \ tiers, tels que les outils de d\xE9tection et de r\xE9ponse de terminaux\
          \ (EDR), peuvent ne pas d\xE9marrer apr\xE8s le d\xE9marrage de Windows\
          \ en mode sans \xE9chec. Il existe deux versions du mode sans \xE9chec :\
          \ le mode sans \xE9chec et le mode sans \xE9chec avec r\xE9seau. Il est\
          \ possible de lancer des services suppl\xE9mentaires apr\xE8s un d\xE9marrage\
          \ en mode sans \xE9chec. (Citation : Param\xE8tres de d\xE9marrage de Microsoft\
          \ Windows)(Citation : D\xE9marrage en mode sans \xE9chec de Sophos)\n\n\
          Les adversaires peuvent abuser du mode sans \xE9chec pour d\xE9sactiver\
          \ les d\xE9fenses de points de terminaison qui ne d\xE9marrent pas par un\
          \ d\xE9marrage limit\xE9. Les h\xF4tes peuvent \xEAtre forc\xE9s en mode\
          \ sans \xE9chec apr\xE8s le prochain red\xE9marrage via des modifications\
          \ des m\xE9moires de donn\xE9es de configuration de d\xE9marrage (BCD),\
          \ qui sont des fichiers g\xE9rant les param\xE8tres de l\u2019application\
          \ de d\xE9marrage. (Citation : Microsoft bcdedit)\n\nLes adversaires peuvent\
          \ \xE9galement ajouter leurs applications malveillantes \xE0 la liste des\
          \ services minimaux qui commencent en mode sans \xE9chec en modifiant les\
          \ valeurs pertinentes du Registre (c\u2019est-\xE0-dire [Modifier le Registre](https://attack.mitre.org/techniques/T1112)).\
          \ Les objets malveillants [Component Object Model](https://attack.mitre.org/techniques/T1559/001)\
          \ (COM) peuvent \xE9galement \xEAtre enregistr\xE9s et charg\xE9s en mode\
          \ sans \xE9chec. (Citation : CyberArk Labs Mode Sans \xC9chec 2016)(Citation\
          \ : d\xE9marrage en mode sans \xE9chec de Cybereason)(Citation : BleepingComputer\
          \ REvil 2021)\nhttps://attack.mitre.org/techniques/T1688"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1689
    ref_id: T1689
    name: Downgrade Attack
    description: "Adversaries may downgrade or use a version of system features that\
      \ may be outdated, vulnerable, and/or does not support updated security controls.\
      \ Downgrade attacks typically take advantage of a system\u2019s backward compatibility\
      \ to force it into less secure modes of operation.\n\nAdversaries may downgrade\
      \ and use various less-secure versions of features of a system, such as [Command\
      \ and Scripting Interpreter](https://attack.mitre.org/techniques/T1059) or even\
      \ network protocols that can be abused to enable [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)\
      \ or [Network Sniffing](https://attack.mitre.org/techniques/T1040).(Citation:\
      \ Praetorian TLS Downgrade Attack 2014) For example, [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ versions 5+ includes Script Block Logging (SBL), which can record executed\
      \ script content. However, adversaries may attempt to execute a previous version\
      \ of PowerShell that does not support SBL with the intent to impair defenses\
      \ while running malicious scripts that may have otherwise been detected.(Citation:\
      \ CrowdStrike downgrade attack)(Citation: Google Cloud downgrade attack)(Citation:\
      \ att_def_ps_logging)\n\nAdversaries may similarly target network traffic to\
      \ downgrade from an encrypted HTTPS connection to an unsecured HTTP connection\
      \ that exposes network data in clear text.(Citation: Targeted SSL Stripping\
      \ Attacks Are Real)(Citation: CrowdStrike Downgrade attack 2) On Windows systems,\
      \ adversaries may downgrade the boot manager to a vulnerable version that bypasses\
      \ Secure Boot, granting the ability to disable various operating system security\
      \ mechanisms.(Citation: SafeBreach)\nhttps://attack.mitre.org/techniques/T1689"
    translations:
      fr:
        name: "Attaque de r\xE9trogradation"
        description: "Les adversaires peuvent r\xE9trograder ou utiliser une version\
          \ de fonctionnalit\xE9s syst\xE8me qui peut \xEAtre obsol\xE8te, vuln\xE9\
          rable et/ou ne supporte pas de nouveaux contr\xF4les de s\xE9curit\xE9.\
          \ Les attaques de r\xE9trogradation tirent g\xE9n\xE9ralement parti de la\
          \ compatibilit\xE9 r\xE9troactive d\u2019un syst\xE8me pour le forcer \xE0\
          \ passer \xE0 des modes d\u2019op\xE9ration moins s\xE9curis\xE9s.\n\nLes\
          \ adversaires peuvent r\xE9trograder et utiliser diverses versions moins\
          \ s\xE9curis\xE9es de fonctionnalit\xE9s d\u2019un syst\xE8me, telles que\
          \ [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)\
          \ ou m\xEAme des protocoles r\xE9seau pouvant \xEAtre abus\xE9s pour activer\
          \ [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557) ou\
          \ [Network Sniffing](https://attack.mitre.org/techniques/T1040). (Citation\
          \ : Attaque de r\xE9trogradation TLS Praetorian 2014) Par exemple, [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ versions 5+ inclut la journalisation des blocs de script (SBL), qui peut\
          \ enregistrer le contenu des scripts ex\xE9cut\xE9s. Cependant, les adversaires\
          \ peuvent tenter d\u2019ex\xE9cuter une version ant\xE9rieure de PowerShell\
          \ qui ne prend pas en charge SBL dans le but d\u2019alt\xE9rer les d\xE9\
          fenses tout en ex\xE9cutant des scripts malveillants qui auraient pu \xEA\
          tre d\xE9tect\xE9s. (Citation : Attaque r\xE9trograd\xE9e par CrowdStrike)(Citation\
          \ : attaque de r\xE9trogradation de Google Cloud)(Citation : att_def_ps_logging)\n\
          \nLes adversaires peuvent \xE9galement cibler le trafic r\xE9seau pour r\xE9\
          trograder une connexion HTTPS chiffr\xE9e vers une connexion HTTP non s\xE9\
          curis\xE9e qui expose les donn\xE9es r\xE9seau en texte clair. (Citation\
          \ : Les attaques cibl\xE9es de suppression SSL sont r\xE9elles)(Citation\
          \ : Attaque de r\xE9trogradation 2 de CrowdStrike) Sur les syst\xE8mes Windows,\
          \ les adversaires peuvent r\xE9trograder le gestionnaire de d\xE9marrage\
          \ vers une version vuln\xE9rable qui contourne le Secure Boot, permettant\
          \ ainsi de d\xE9sactiver divers m\xE9canismes de s\xE9curit\xE9 du syst\xE8\
          me d\u2019exploitation. (Citation : SafeBreach)\nhttps://attack.mitre.org/techniques/T1689"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1690
    ref_id: T1690
    name: Prevent Command History Logging
    description: 'Adversaries may impair command history logging to hide commands
      they run on a compromised system. Various command interpreters keep track of
      the commands users type in their terminal so that users can retrace what they
      have done.


      On Linux and macOS, command history is tracked in a file pointed to by the environment
      variable `HISTFILE`. When a user logs off a system, this information is flushed
      to a file in the user''s home directory called `~/.bash_history`. The `HISTCONTROL`
      environment variable keeps track of what should be saved by the history command
      and eventually into the `~/.bash_history` file when a user logs out. `HISTCONTROL`
      does not exist by default on macOS, but can be set by the user and will be respected.
      The `HISTFILE` environment variable is also used in some ESXi systems.(Citation:
      Google Cloud Threat Intelligence ESXi VIBs 2022)


      Adversaries may clear the history environment variable (`unset HISTFILE`) or
      set the command history size to zero (`export HISTFILESIZE=0`) to prevent logging
      of commands. Additionally, `HISTCONTROL` can be configured to ignore commands
      that start with a space by simply setting it to "ignorespace". `HISTCONTROL`
      can also be set to ignore duplicate commands by setting it to "ignoredups".
      In some Linux systems, this is set by default to "ignoreboth" which covers both
      of the previous examples. This means that " ls" will not be saved, but "ls"
      would be saved by history. Adversaries can abuse this to operate without leaving
      traces by simply prepending a space to all of their terminal commands.


      On Windows systems, the `PSReadLine` module tracks commands used in all PowerShell
      sessions and writes them to a file (`$env:APPDATA\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt`
      by default). Adversaries may change where these logs are saved using `Set-PSReadLineOption
      -HistorySavePath {File Path}`. This will cause `ConsoleHost_history.txt` to
      stop receiving logs. Additionally, it is possible to turn off logging to this
      file using the PowerShell command `Set-PSReadlineOption -HistorySaveStyle SaveNothing`.(Citation:
      Microsoft about_History prevent command history)(Citation: Sophos PowerShell
      Command History Forensics)


      Adversaries may also leverage a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      on network devices to disable historical command logging (e.g. `no logging`).

      https://attack.mitre.org/techniques/T1690'
    translations:
      fr:
        name: "Emp\xEAcher la journalisation de l\u2019historique des commandes"
        description: "Les adversaires peuvent alt\xE9rer la journalisation de l\u2019\
          historique des commandes pour masquer les commandes qu\u2019ils ex\xE9cutent\
          \ sur un syst\xE8me compromis. Divers interpr\xE9teurs de commandes suivent\
          \ les commandes saisies par les utilisateurs dans leur terminal afin que\
          \ les utilisateurs puissent retracer ce qu\u2019ils ont fait.\n\nSous Linux\
          \ et macOS, l\u2019historique des commandes est suivi dans un fichier point\xE9\
          \ par la variable d\u2019environnement 'HISTFILE'. Lorsqu\u2019un utilisateur\
          \ se d\xE9connecte d\u2019un syst\xE8me, cette information est vid\xE9e\
          \ dans un fichier du r\xE9pertoire personnel appel\xE9 '~/.bash_history'.\
          \ La variable d\u2019environnement 'HISTCONTROL' garde une trace de ce qui\
          \ doit \xEAtre sauvegard\xE9 par la commande historique et finalement dans\
          \ le fichier '~/.bash_history' lorsqu\u2019un utilisateur se d\xE9connecte.\
          \ \xAB HISTCONTROL \xBB n\u2019existe pas par d\xE9faut sur macOS, mais\
          \ peut \xEAtre d\xE9fini par l\u2019utilisateur et sera respect\xE9. La\
          \ variable d\u2019environnement \xAB HISTFILE \xBB est \xE9galement utilis\xE9\
          e dans certains syst\xE8mes ESXi. (Citation : Google Cloud Threat Intelligence\
          \ ESXi VIBs 2022)\n\nLes adversaires peuvent effacer la variable d\u2019\
          historique de l\u2019environnement (\xAB unset HISTFILE \xBB) ou r\xE9gler\
          \ la taille de l\u2019historique des commandes \xE0 z\xE9ro (\xAB export\
          \ HISTFILESIZE=0 \xBB) pour \xE9viter la journalisation des commandes. De\
          \ plus, \xAB HISTCONTROL \xBB peut \xEAtre configur\xE9 pour ignorer les\
          \ commandes commen\xE7ant par un espace simplement en le mettant sur \xAB\
          \ ignorespace \xBB. \xAB HISTCONTROL \xBB peut aussi \xEAtre configur\xE9\
          \ pour ignorer les commandes dupliqu\xE9es en le mettant sur \xAB ignoredups\
          \ \xBB. Dans certains syst\xE8mes Linux, ce syst\xE8me est d\xE9fini par\
          \ d\xE9faut sur \xAB ignoreboth \xBB, ce qui couvre les deux exemples pr\xE9\
          c\xE9dents. Cela signifie que \xAB ls \xBB ne sera pas sauv\xE9, mais que\
          \ \xAB ls \xBB sera sauv\xE9 par l\u2019histoire. Les adversaires peuvent\
          \ abuser de cela pour fonctionner sans laisser de traces en pr\xE9posant\
          \ simplement un espace \xE0 toutes leurs commandes terminales.\n\nSur les\
          \ syst\xE8mes Windows, le module 'PSReadLine' suit les commandes utilis\xE9\
          es dans toutes les sessions PowerShell et les \xE9crit dans un fichier (par\
          \ d\xE9faut '$env\_:APPDATA\\Microsoft\\Windows\\PowerShell\\PSReadLine\\\
          ConsoleHost_history.txt'). Les adversaires peuvent modifier l\u2019endroit\
          \ o\xF9 ces journaux sont enregistr\xE9s en utilisant 'Set-PSReadLineOption\
          \ -HistorySavePath {File Path}'. Cela fera que \xAB ConsoleHost_history.txt\
          \ \xBB cessera de recevoir les journaux. De plus, il est possible de d\xE9\
          sactiver la connexion de ce fichier en utilisant la commande PowerShell\
          \ 'Set-PSReadlineOption -HistorySaveStyle SaveNothing'. (Citation : Microsoft\
          \ about_History emp\xEAcher l\u2019historique des commandes)(Citation :\
          \ Historique des commandes PowerShell Sophos Forensics)\n\nLes adversaires\
          \ peuvent \xE9galement utiliser une [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ sur les appareils r\xE9seau pour d\xE9sactiver la journalisation historique\
          \ des commandes (par exemple, \xAB pas de journalisation \xBB).\nhttps://attack.mitre.org/techniques/T1690"
