  - urn: urn:intuitem:risk:function:mitre-attack:m1013
    ref_id: M1013
    name: Application Developer Guidance
    category: technical
    csf_function: govern
    description: "Application Developer Guidance focuses on providing developers with\
      \ the knowledge, tools, and best practices needed to write secure code, reduce\
      \ vulnerabilities, and implement secure design principles. By integrating security\
      \ throughout the software development lifecycle (SDLC), this mitigation aims\
      \ to prevent the introduction of exploitable weaknesses in applications, systems,\
      \ and APIs. This mitigation can be implemented through the following measures:\n\
      \ \nPreventing SQL Injection (Secure Coding Practice):\n\n- Implementation:\
      \ Train developers to use parameterized queries or prepared statements instead\
      \ of directly embedding user input into SQL queries.\n- Use Case: A web application\
      \ accepts user input to search a database. By sanitizing and validating user\
      \ inputs, developers can prevent attackers from injecting malicious SQL commands.\n\
      \nCross-Site Scripting (XSS) Mitigation:\n\n- Implementation: Require developers\
      \ to implement output encoding for all user-generated content displayed on a\
      \ web page.\n- Use Case: An e-commerce site allows users to leave product reviews.\
      \ Properly encoding and escaping user inputs prevents malicious scripts from\
      \ being executed in other users\u2019 browsers.\n\nSecure API Design:\n\n- Implementation:\
      \ Train developers to authenticate all API endpoints and avoid exposing sensitive\
      \ information in API responses.\n- Use Case: A mobile banking application uses\
      \ APIs for account management. By enforcing token-based authentication for every\
      \ API call, developers reduce the risk of unauthorized access.\n\nStatic Code\
      \ Analysis in the Build Pipeline:\n\n- Implementation: Incorporate tools into\
      \ CI/CD pipelines to automatically scan for vulnerabilities during the build\
      \ process.\n- Use Case: A fintech company integrates static analysis tools to\
      \ detect hardcoded credentials in their source code before deployment.\n\nThreat\
      \ Modeling in the Design Phase:\n\n- Implementation: Use frameworks like STRIDE\
      \ (Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service,\
      \ Elevation of Privilege) to assess threats during application design.\n- Use\
      \ Case: Before launching a customer portal, a SaaS company identifies potential\
      \ abuse cases, such as session hijacking, and designs mitigations like secure\
      \ session management.\n\n**Tools for Implementation**:\n\n- Static Code Analysis\
      \ Tools: Use tools that can scan for known vulnerabilities in source code.\n\
      - Dynamic Application Security Testing (DAST): Use tools like Burp Suite or\
      \ OWASP ZAP to simulate runtime attacks and identify vulnerabilities.\n- Secure\
      \ Frameworks: Recommend secure-by-default frameworks (e.g., Django for Python,\
      \ Spring Security for Java) that enforce security best practices.\nhttps://attack.mitre.org/mitigations/M1013"
    translations:
      fr:
        name: "Guide pour le d\xE9veloppeur d\u2019applications"
        description: "Application Developer Guidance se concentre sur la fourniture\
          \ des connaissances, des outils et des bonnes pratiques n\xE9cessaires pour\
          \ \xE9crire du code s\xE9curis\xE9, r\xE9duire les vuln\xE9rabilit\xE9s\
          \ et mettre en \u0153uvre des principes de conception s\xE9curis\xE9e. En\
          \ int\xE9grant la s\xE9curit\xE9 tout au long du cycle de vie du d\xE9veloppement\
          \ logiciel (SDLC), cette att\xE9nuation vise \xE0 pr\xE9venir l\u2019introduction\
          \ de faiblesses exploitables dans les applications, syst\xE8mes et API.\
          \ Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ :\n \nPr\xE9venir l\u2019injection SQL (Pratique de codage s\xE9curis\xE9\
          ) :\n\n- Impl\xE9mentation : Former les d\xE9veloppeurs \xE0 utiliser des\
          \ requ\xEAtes param\xE9tr\xE9es ou des instructions pr\xE9par\xE9es au lieu\
          \ d\u2019int\xE9grer directement les entr\xE9es utilisateur dans les requ\xEA\
          tes SQL.\n- Cas d\u2019utilisation : Une application web accepte les entr\xE9\
          es de l\u2019utilisateur pour rechercher dans une base de donn\xE9es. En\
          \ aseptifiant et en validant les entr\xE9es utilisateurs, les d\xE9veloppeurs\
          \ peuvent emp\xEAcher les attaquants d\u2019injecter des commandes SQL malveillantes.\n\
          \nAtt\xE9nuation du scripting inter-site (XSS) :\n\n- Impl\xE9mentation\
          \ : Exigent que les d\xE9veloppeurs impl\xE9mentent un encodage de sortie\
          \ pour tout le contenu g\xE9n\xE9r\xE9 par l\u2019utilisateur affich\xE9\
          \ sur une page web.\n- Cas d\u2019utilisation : Un site de commerce \xE9\
          lectronique permet aux utilisateurs de laisser des avis sur les produits.\
          \ Un codage et une fuite corrects des entr\xE9es utilisateur emp\xEAchent\
          \ l\u2019ex\xE9cution de scripts malveillants dans les navigateurs d\u2019\
          autres utilisateurs.\n\nConception s\xE9curis\xE9e d\u2019API :\n\n- Impl\xE9\
          mentation : former les d\xE9veloppeurs \xE0 authentifier tous les points\
          \ de terminaison de l\u2019API et \xE0 \xE9viter d\u2019exposer des informations\
          \ sensibles dans les r\xE9ponses de l\u2019API.\n- Cas d\u2019utilisation\
          \ : Une application bancaire mobile utilise des API pour la gestion des\
          \ comptes. En imposant une authentification bas\xE9e sur un jeton pour chaque\
          \ appel API, les d\xE9veloppeurs r\xE9duisent le risque d\u2019acc\xE8s\
          \ non autoris\xE9.\n\nAnalyse statique du code dans le pipeline de construction\
          \ :\n\n- Impl\xE9mentation : Int\xE9grer des outils dans les pipelines CI/CD\
          \ pour scanner automatiquement les vuln\xE9rabilit\xE9s lors du processus\
          \ de compilation.\n- Cas d\u2019utilisation : Une entreprise fintech int\xE8\
          gre des outils d\u2019analyse statique pour d\xE9tecter les identifiants\
          \ cod\xE9s en dur dans son code source avant leur d\xE9ploiement.\n\nMod\xE9\
          lisation des menaces en phase de conception :\n\n- Mise en \u0153uvre :\
          \ Utiliser des cadres comme STRIDE (Spoofing, Tampering, Repudiation, Information\
          \ Disclosure, Denial of Service, Elevation of Privilege) pour \xE9valuer\
          \ les menaces lors de la conception de l\u2019application.\n- Cas d\u2019\
          utilisation : Avant de lancer un portail client, une entreprise SaaS identifie\
          \ les cas potentiels d\u2019abus, tels que le d\xE9tournement de session,\
          \ et con\xE7oit des mesures d\u2019att\xE9nuation telles que la gestion\
          \ s\xE9curis\xE9e des sessions.\n\n**Outils pour la mise en \u0153uvre**\
          \ :\n\n- Outils d\u2019analyse statique du code : Utilisez des outils capables\
          \ de scanner les vuln\xE9rabilit\xE9s connues dans le code source.\n- Tests\
          \ dynamiques de s\xE9curit\xE9 des applications (DAST) : Utilisez des outils\
          \ comme Burp Suite ou OWASP ZAP pour simuler des attaques \xE0 l\u2019ex\xE9\
          cution et identifier les vuln\xE9rabilit\xE9s.\n- Cadres s\xE9curis\xE9\
          s : Recommander des frameworks s\xE9curis\xE9s par d\xE9faut (par exemple,\
          \ Django pour Python, Spring Security pour Java) qui appliquent les meilleures\
          \ pratiques de s\xE9curit\xE9.\nhttps://attack.mitre.org/mitigations/M1013"
  - urn: urn:intuitem:risk:function:mitre-attack:m1015
    ref_id: M1015
    name: Active Directory Configuration
    category: technical
    csf_function: protect
    description: "Implement robust Active Directory (AD) configurations using group\
      \ policies to secure user accounts, control access, and minimize the attack\
      \ surface. AD configurations enable centralized control over account settings,\
      \ logon policies, and permissions, reducing the risk of unauthorized access\
      \ and lateral movement within the network. This mitigation can be implemented\
      \ through the following measures:\n\nAccount Configuration:\n\n- Implementation:\
      \ Use domain accounts instead of local accounts to leverage AD\u2019s centralized\
      \ management, including group policies, auditing, and access control.\n- Use\
      \ Case: For IT staff managing shared resources, provision domain accounts that\
      \ allow IT teams to log in centrally, reducing the risk of unmanaged, rogue\
      \ local accounts on individual machines.\n\nInteractive Logon Restrictions:\n\
      \n- Implementation: Configure group policies to restrict interactive logons\
      \ (e.g., direct physical or RDP logons) for service accounts or privileged accounts\
      \ that do not require such access.\n- Use Case: Prevent service accounts, such\
      \ as SQL Server accounts, from having interactive logon privileges. This reduces\
      \ the risk of these accounts being leveraged for lateral movement if compromised.\n\
      \nRemote Desktop Settings:\n\n- Implementation: Limit Remote Desktop Protocol\
      \ (RDP) access to specific, authorized accounts. Use group policies to enforce\
      \ this, allowing only necessary users to establish RDP sessions.\n- Use Case:\
      \ On sensitive servers (e.g., domain controllers or financial databases), restrict\
      \ RDP access to administrative accounts only, while all other users are denied\
      \ access.\n\nDedicated Administrative Accounts:\n\n- Implementation: Create\
      \ domain-wide administrative accounts that are restricted from interactive logons,\
      \ designed solely for high-level tasks (e.g., software installation, patching).\n\
      - Use Case: Create separate administrative accounts for different purposes,\
      \ such as one set of accounts for installations and another for managing repository\
      \ access. This limits exposure and helps reduce attack vectors.\n\nAuthentication\
      \ Silos:\n\n- Implementation: Configure Authentication Silos in AD, using group\
      \ policies to create access zones with restrictions based on membership, such\
      \ as the Protected Users security group. This restricts access to critical accounts\
      \ and minimizes exposure to potential threats.\n- Use Case: Place high-risk\
      \ or high-value accounts, such as executive or administrative accounts, in an\
      \ Authentication Silo with extra controls, limiting their exposure to only necessary\
      \ systems. This reduces the risk of credential misuse or abuse if these accounts\
      \ are compromised.\n\n**Tools for Implementation**:\n\n- Active Directory Group\
      \ Policies: Use Group Policy Management Console (GPMC) to configure, deploy,\
      \ and enforce policies across AD environments.\n- PowerShell: Automate account\
      \ configuration, logon restrictions, and policy application using PowerShell\
      \ scripts.\n- AD Administrative Center: Manage Authentication Silos and configure\
      \ high-level policies for critical user groups within AD.\nhttps://attack.mitre.org/mitigations/M1015"
    translations:
      fr:
        name: "Configuration d\u2019Active Directory"
        description: "Mettez en place des configurations robustes d\u2019Active Directory\
          \ (AD) \xE0 l\u2019aide de strat\xE9gies de groupe afin de s\xE9curiser\
          \ les comptes utilisateurs, de contr\xF4ler les acc\xE8s et de r\xE9duire\
          \ au minimum la surface d\u2019attaque. Les configurations AD permettent\
          \ un contr\xF4le centralis\xE9 des param\xE8tres de compte, des strat\xE9\
          gies de connexion et des autorisations, r\xE9duisant ainsi le risque d\u2019\
          acc\xE8s non autoris\xE9s et de mouvements lat\xE9raux au sein du r\xE9\
          seau. Cette mesure d\u2019att\xE9nuation peut \xEAtre mise en \u0153uvre\
          \ gr\xE2ce aux mesures suivantes :\n\nConfiguration des comptes :\n\n- Mise\
          \ en \u0153uvre : utilisez des comptes de domaine plut\xF4t que des comptes\
          \ locaux afin de tirer parti de la gestion centralis\xE9e d\u2019AD, notamment\
          \ les strat\xE9gies de groupe, l\u2019audit et le contr\xF4le d\u2019acc\xE8\
          s.\n- Cas d\u2019utilisation : pour le personnel informatique charg\xE9\
          \ de g\xE9rer des ressources partag\xE9es, cr\xE9ez des comptes de domaine\
          \ permettant aux \xE9quipes informatiques de se connecter de mani\xE8re\
          \ centralis\xE9e, ce qui r\xE9duit le risque de comptes locaux non g\xE9\
          r\xE9s et non autoris\xE9s sur les machines individuelles.\n\nRestrictions\
          \ d\u2019authentification interactive :\n\n- Mise en \u0153uvre : configurez\
          \ les strat\xE9gies de groupe pour restreindre les authentifications interactives\
          \ (par exemple, les connexions physiques directes ou via RDP) pour les comptes\
          \ de service ou les comptes privil\xE9gi\xE9s qui ne n\xE9cessitent pas\
          \ un tel acc\xE8s.\n- Cas d\u2019utilisation : emp\xEAchez les comptes de\
          \ service, tels que les comptes SQL Server, de disposer de privil\xE8ges\
          \ d\u2019authentification interactive. Cela r\xE9duit le risque que ces\
          \ comptes soient exploit\xE9s \xE0 des fins de d\xE9placement lat\xE9ral\
          \ s\u2019ils venaient \xE0 \xEAtre compromis.\n\nParam\xE8tres du Bureau\
          \ \xE0 distance :\n\n- Mise en \u0153uvre : limiter l\u2019acc\xE8s au protocole\
          \ Bureau \xE0 distance (RDP) \xE0 des comptes sp\xE9cifiques et autoris\xE9\
          s. Utiliser des strat\xE9gies de groupe pour appliquer cette restriction,\
          \ en autorisant uniquement les utilisateurs n\xE9cessaires \xE0 \xE9tablir\
          \ des sessions RDP.\n- Cas d\u2019utilisation : sur les serveurs sensibles\
          \ (par exemple, les contr\xF4leurs de domaine ou les bases de donn\xE9es\
          \ financi\xE8res), restreindre l\u2019acc\xE8s RDP aux seuls comptes administratifs,\
          \ tandis que l\u2019acc\xE8s est refus\xE9 \xE0 tous les autres utilisateurs.\n\
          \nComptes administratifs d\xE9di\xE9s :\n\n- Mise en \u0153uvre : cr\xE9\
          ez des comptes administratifs \xE0 l\u2019\xE9chelle du domaine qui ne permettent\
          \ pas de connexions interactives, destin\xE9s exclusivement \xE0 des t\xE2\
          ches de haut niveau (par exemple, installation de logiciels, application\
          \ de correctifs).\n- Cas d\u2019utilisation : cr\xE9ez des comptes administratifs\
          \ distincts pour diff\xE9rents usages, par exemple un ensemble de comptes\
          \ pour les installations et un autre pour la gestion de l\u2019acc\xE8s\
          \ au r\xE9f\xE9rentiel. Cela limite l\u2019exposition et contribue \xE0\
          \ r\xE9duire les vecteurs d\u2019attaque.\n\nSilos d\u2019authentification\
          \ :\n\n- Mise en \u0153uvre : configurez des silos d\u2019authentification\
          \ dans Active Directory (AD), en utilisant des strat\xE9gies de groupe pour\
          \ cr\xE9er des zones d\u2019acc\xE8s avec des restrictions bas\xE9es sur\
          \ l\u2019appartenance \xE0 un groupe, comme le groupe de s\xE9curit\xE9\
          \ \xAB Utilisateurs prot\xE9g\xE9s \xBB. Cela restreint l\u2019acc\xE8s\
          \ aux comptes critiques et minimise l\u2019exposition aux menaces potentielles.\n\
          - Cas d\u2019utilisation : placez les comptes \xE0 haut risque ou de grande\
          \ valeur, tels que les comptes de direction ou d\u2019administration, dans\
          \ un silo d\u2019authentification dot\xE9 de contr\xF4les suppl\xE9mentaires,\
          \ en limitant leur acc\xE8s aux seuls syst\xE8mes n\xE9cessaires. Cela r\xE9\
          duit le risque d\u2019utilisation abusive ou d\xE9tourn\xE9e des identifiants\
          \ si ces comptes venaient \xE0 \xEAtre compromis.\n\n**Outils de mise en\
          \ \u0153uvre** :\n\n- Strat\xE9gies de groupe Active Directory : utilisez\
          \ la console de gestion des strat\xE9gies de groupe (GPMC) pour configurer,\
          \ d\xE9ployer et appliquer des strat\xE9gies dans les environnements AD.\n\
          - PowerShell : automatisez la configuration des comptes, les restrictions\
          \ de connexion et l'application des strat\xE9gies \xE0 l'aide de scripts\
          \ PowerShell.\n- Centre d'administration AD : g\xE9rez les silos d'authentification\
          \ et configurez des strat\xE9gies de haut niveau pour les groupes d'utilisateurs\
          \ critiques au sein d'AD.\nhttps://attack.mitre.org/mitigations/M1015"
  - urn: urn:intuitem:risk:function:mitre-attack:m1016
    ref_id: M1016
    name: Vulnerability Scanning
    category: technical
    csf_function: detect
    description: "Vulnerability scanning involves the automated or manual assessment\
      \ of systems, applications, and networks to identify misconfigurations, unpatched\
      \ software, or other security weaknesses. The process helps prioritize remediation\
      \ efforts by classifying vulnerabilities based on risk and impact, reducing\
      \ the likelihood of exploitation by adversaries. This mitigation can be implemented\
      \ through the following measures: \n\nProactive Identification of Vulnerabilities\n\
      \n- Implementation: Use tools like Nessus or OpenVAS to scan endpoints, servers,\
      \ and applications for missing patches and configuration issues. Schedule regular\
      \ scans to ensure timely identification of vulnerabilities introduced by new\
      \ deployments or updates.\n- Use Case: A scan identifies unpatched software,\
      \ such as outdated Apache servers, which could be exploited via CVE-XXXX-XXXX.\
      \ The server is promptly patched, mitigating the risk.\n\nCloud Environment\
      \ Scanning\n\n- Implementation: Use cloud-specific vulnerability management\
      \ tools like AWS Inspector, Azure Security Center, or GCP Security Command Center\
      \ to identify issues like open S3 buckets or overly permissive IAM roles.\n\
      - Use Case: The scan detects a misconfigured S3 bucket with public read access,\
      \ which is remediated to prevent potential data leakage.\n\nNetwork Device Scanning\n\
      \n- Implementation: Use tools to scan network devices for vulnerabilities, such\
      \ as weak SNMP strings or outdated firmware. Correlate scan results with vendor\
      \ advisories to prioritize updates.\n- Use Case: Scanning detects a router running\
      \ outdated firmware vulnerable to CVE-XXXX-YYYY. The firmware is updated to\
      \ a secure version.\n\nWeb Application Scanning\n\n- Implementation: Use dynamic\
      \ application security testing (DAST) tools such as OWASP ZAP or Burp Suite\
      \ to scan for common vulnerabilities like SQL injection or cross-site scripting\
      \ (XSS). Perform regular scans post-deployment to identify newly introduced\
      \ vulnerabilities.\n- Use Case: A scan identifies a cross-site scripting vulnerability\
      \ in a form input field, which is promptly remediated by developers.\n\nPrioritizing\
      \ Vulnerabilities\n\n- Implementation: Use vulnerability scoring frameworks\
      \ like CVSS to assess severity.\nIntegrate vulnerability scanning tools with\
      \ ticketing systems to assign remediation tasks based on criticality.\n- Use\
      \ Case: A critical vulnerability with a CVSS score of 9.8 affecting remote access\
      \ servers is prioritized and patched first.\n\n*Tools for Implementation*\n\n\
      Open Source Tools:\n\n- OpenVAS: Comprehensive network and system vulnerability\
      \ scanning.\n- OWASP ZAP: Dynamic scanning of web applications for vulnerabilities.\n\
      - Nmap with NSE Scripts: Network scanning with scripts to detect vulnerabilities.\n\
      https://attack.mitre.org/mitigations/M1016"
    translations:
      fr:
        name: "Analyse des vuln\xE9rabilit\xE9s"
        description: "L\u2019analyse des vuln\xE9rabilit\xE9s consiste \xE0 \xE9valuer\
          \ automatis\xE9 ou manuellement les syst\xE8mes, applications et r\xE9seaux\
          \ afin d\u2019identifier les mauvaises configurations, les logiciels non\
          \ corrig\xE9s ou d\u2019autres faiblesses de s\xE9curit\xE9. Ce processus\
          \ aide \xE0 prioriser les efforts de rem\xE9diation en classant les vuln\xE9\
          rabilit\xE9s selon le risque et l\u2019impact, r\xE9duisant ainsi la probabilit\xE9\
          \ d\u2019exploitation par les adversaires. Cette att\xE9nuation peut \xEA\
          tre mise en \u0153uvre par les mesures suivantes : \n\nIdentification proactive\
          \ des vuln\xE9rabilit\xE9s\n\n- Impl\xE9mentation : Utiliser des outils\
          \ comme Nessus ou OpenVAS pour scanner les points de terminaison, serveurs\
          \ et applications \xE0 la recherche de correctifs manquants et de probl\xE8\
          mes de configuration. Planifiez des analyses r\xE9guli\xE8res pour garantir\
          \ l\u2019identification rapide des vuln\xE9rabilit\xE9s introduites par\
          \ de nouveaux d\xE9ploiements ou mises \xE0 jour.\n- Cas d\u2019utilisation\
          \ : Un scan identifie les logiciels non corrig\xE9s, tels que les serveurs\
          \ Apache obsol\xE8tes, qui pourraient \xEAtre exploit\xE9s via CVE-XXXX-XXXX.\
          \ Le serveur est rapidement corrig\xE9, ce qui r\xE9duit le risque.\n\n\
          Analyse des environnements cloud\n\n- Impl\xE9mentation : Utilisez des outils\
          \ de gestion des vuln\xE9rabilit\xE9s sp\xE9cifiques au cloud comme AWS\
          \ Inspector, Azure Security Center ou GCP Security Command Center pour identifier\
          \ des probl\xE8mes comme les buckets S3 ouverts ou les r\xF4les IAM trop\
          \ permissifs.\n- Cas d\u2019utilisation : Le balayage d\xE9tecte un seau\
          \ S3 mal configur\xE9 avec un acc\xE8s public \xE0 la lecture, ce qui est\
          \ corrig\xE9 pour \xE9viter une fuite potentielle de donn\xE9es.\n\nBalayage\
          \ des p\xE9riph\xE9riques r\xE9seau\n\n- Impl\xE9mentation : Utiliser des\
          \ outils pour scanner les dispositifs r\xE9seau \xE0 la recherche de vuln\xE9\
          rabilit\xE9s, telles que des cha\xEEnes SNMP faibles ou des firmwares obsol\xE8\
          tes. Corr\xE9lez les r\xE9sultats des analyses avec les avis fournisseurs\
          \ pour prioriser les mises \xE0 jour.\n- Cas d\u2019utilisation : Le balayage\
          \ d\xE9tecte un routeur ex\xE9cutant un firmware obsol\xE8te et vuln\xE9\
          rable \xE0 CVE-XXXX-YYYY. Le firmware est mis \xE0 jour avec une version\
          \ s\xE9curis\xE9e.\n\nNum\xE9risation des applications Web\n\n- Impl\xE9\
          mentation : Utiliser des outils de test dynamique de s\xE9curit\xE9 des\
          \ applications (DAST) tels qu\u2019OWASP ZAP ou Burp Suite pour analyser\
          \ des vuln\xE9rabilit\xE9s courantes telles que l\u2019injection SQL ou\
          \ le cross-site scripting (XSS). Effectuer des analyses r\xE9guli\xE8res\
          \ apr\xE8s le d\xE9ploiement pour identifier les vuln\xE9rabilit\xE9s nouvellement\
          \ introduites.\n- Cas d\u2019utilisation : Un scan identifie une vuln\xE9\
          rabilit\xE9 de scripting inter-site dans un champ d\u2019entr\xE9e de formulaire,\
          \ qui est rapidement corrig\xE9e par les d\xE9veloppeurs.\n\nPriorisation\
          \ des vuln\xE9rabilit\xE9s\n\n- Mise en \u0153uvre : Utiliser des cadres\
          \ de notation des vuln\xE9rabilit\xE9s comme CVSS pour \xE9valuer la gravit\xE9\
          .\nInt\xE9grez des outils de d\xE9tection de vuln\xE9rabilit\xE9s avec les\
          \ syst\xE8mes de tickets pour attribuer les t\xE2ches de rem\xE9diation\
          \ selon la criticit\xE9.\n- Cas d\u2019utilisation : Une vuln\xE9rabilit\xE9\
          \ critique avec un score CVSS de 9,8 affectant les serveurs d\u2019acc\xE8\
          s distant est prioris\xE9e et corrig\xE9e en premier.\n\n*Outils pour la\
          \ mise en \u0153uvre*\n\nOutils open source :\n\n- OpenVAS : Analyse compl\xE8\
          te des vuln\xE9rabilit\xE9s r\xE9seau et syst\xE8me.\n- OWASP ZAP : Analyse\
          \ dynamique des applications web \xE0 la recherche de vuln\xE9rabilit\xE9\
          s.\n- Nmap avec scripts NSE : Balayage r\xE9seau avec scripts pour d\xE9\
          tecter les vuln\xE9rabilit\xE9s.\nhttps://attack.mitre.org/mitigations/M1016"
  - urn: urn:intuitem:risk:function:mitre-attack:m1017
    ref_id: M1017
    name: User Training
    category: technical
    csf_function: govern
    description: 'User Training involves educating employees and contractors on recognizing,
      reporting, and preventing cyber threats that rely on human interaction, such
      as phishing, social engineering, and other manipulative techniques. Comprehensive
      training programs create a human firewall by empowering users to be an active
      component of the organization''s cybersecurity defenses. This mitigation can
      be implemented through the following measures:


      Create Comprehensive Training Programs:


      - Design training modules tailored to the organization''s risk profile, covering
      topics such as phishing, password management, and incident reporting.

      - Provide role-specific training for high-risk employees, such as helpdesk staff
      or executives.


      Use Simulated Exercises:


      - Conduct phishing simulations to measure user susceptibility and provide targeted
      follow-up training.

      - Run social engineering drills to evaluate employee responses and reinforce
      protocols.


      Leverage Gamification and Engagement:


      - Introduce interactive learning methods such as quizzes, gamified challenges,
      and rewards for successful detection and reporting of threats.


      Incorporate Security Policies into Onboarding:


      - Include cybersecurity training as part of the onboarding process for new employees.

      - Provide easy-to-understand materials outlining acceptable use policies and
      reporting procedures.


      Regular Refresher Courses:


      - Update training materials to include emerging threats and techniques used
      by adversaries.

      - Ensure all employees complete periodic refresher courses to stay informed.


      Emphasize Real-World Scenarios:


      - Use case studies of recent attacks to demonstrate the consequences of successful
      phishing or social engineering.

      - Discuss how specific employee actions can prevent or mitigate such attacks.

      https://attack.mitre.org/mitigations/M1017'
    translations:
      fr:
        name: Formation des utilisateurs
        description: "La formation des utilisateurs consiste \xE0 former les employ\xE9\
          s et les sous-traitants \xE0 la reconnaissance, au signalement et \xE0 la\
          \ pr\xE9vention des cybermenaces qui reposent sur l\u2019interaction humaine,\
          \ telles que le phishing, l\u2019ing\xE9nierie sociale et d\u2019autres\
          \ techniques de manipulation. Des programmes de formation complets cr\xE9\
          ent un pare-feu humain en permettant aux utilisateurs d\u2019\xEAtre un\
          \ \xE9l\xE9ment actif des d\xE9fenses en cybers\xE9curit\xE9 de l\u2019\
          organisation. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les\
          \ mesures suivantes :\n\nCr\xE9ez des programmes de formation complets :\n\
          \n- Concevoir des modules de formation adapt\xE9s au profil de risque de\
          \ l\u2019organisation, couvrant des sujets tels que le phishing, la gestion\
          \ des mots de passe et le signalement d\u2019incidents.\n- Fournir des formations\
          \ sp\xE9cifiques \xE0 chaque poste pour les employ\xE9s \xE0 haut risque,\
          \ tels que le personnel du support technique ou les cadres.\n\nUtilisez\
          \ des exercices simul\xE9s :\n\n- R\xE9aliser des simulations de phishing\
          \ pour mesurer la vuln\xE9rabilit\xE9 des utilisateurs et fournir une formation\
          \ cibl\xE9e de suivi.\n- Mener des exercices d\u2019ing\xE9nierie sociale\
          \ pour \xE9valuer les r\xE9ponses des employ\xE9s et renforcer les protocoles.\n\
          \nExploitez la ludification et l\u2019engagement :\n\n- Introduire des m\xE9\
          thodes d\u2019apprentissage interactives telles que des quiz, des d\xE9\
          fis ludiques et des r\xE9compenses pour la d\xE9tection et le signalement\
          \ r\xE9ussis des menaces.\n\nInt\xE9grez les politiques de s\xE9curit\xE9\
          \ lors de l\u2019int\xE9gration :\n\n- Inclure la formation \xE0 la cybers\xE9\
          curit\xE9 dans le cadre du processus d\u2019int\xE9gration des nouveaux\
          \ employ\xE9s.\n- Fournir des documents faciles \xE0 comprendre d\xE9crivant\
          \ les politiques d\u2019utilisation acceptable et les proc\xE9dures de rapport.\n\
          \nCours de remise \xE0 niveau r\xE9guliers :\n\n- Mettre \xE0 jour les supports\
          \ de formation pour inclure les menaces \xE9mergentes et les techniques\
          \ utilis\xE9es par les adversaires.\n- Veiller \xE0 ce que tous les employ\xE9\
          s suivent des cours de remise \xE0 niveau p\xE9riodiques pour rester inform\xE9\
          s.\n\nMettez en avant les sc\xE9narios r\xE9els :\n\n- Utiliser des \xE9\
          tudes de cas d\u2019attaques r\xE9centes pour d\xE9montrer les cons\xE9\
          quences d\u2019un phishing ou d\u2019une ing\xE9nierie sociale r\xE9ussie.\n\
          - Discuter de la mani\xE8re dont des actions sp\xE9cifiques des employ\xE9\
          s peuvent pr\xE9venir ou att\xE9nuer de telles attaques.\nhttps://attack.mitre.org/mitigations/M1017"
  - urn: urn:intuitem:risk:function:mitre-attack:m1018
    ref_id: M1018
    name: User Account Management
    category: technical
    csf_function: protect
    description: 'User Account Management involves implementing and enforcing policies
      for the lifecycle of user accounts, including creation, modification, and deactivation.
      Proper account management reduces the attack surface by limiting unauthorized
      access, managing account privileges, and ensuring accounts are used according
      to organizational policies. This mitigation can be implemented through the following
      measures:


      Enforcing the Principle of Least Privilege


      - Implementation: Assign users only the minimum permissions required to perform
      their job functions. Regularly audit accounts to ensure no excess permissions
      are granted.

      - Use Case: Reduces the risk of privilege escalation by ensuring accounts cannot
      perform unauthorized actions.


      Implementing Strong Password Policies


      - Implementation: Enforce password complexity requirements (e.g., length, character
      types). Require password expiration every 90 days and disallow password reuse.

      - Use Case: Prevents adversaries from gaining unauthorized access through password
      guessing or brute force attacks.


      Managing Dormant and Orphaned Accounts


      - Implementation: Implement automated workflows to disable accounts after a
      set period of inactivity (e.g., 30 days). Remove orphaned accounts (e.g., accounts
      without an assigned owner) during regular account audits.

      - Use Case: Eliminates dormant accounts that could be exploited by attackers.


      Account Lockout Policies


      - Implementation: Configure account lockout thresholds (e.g., lock accounts
      after five failed login attempts). Set lockout durations to a minimum of 15
      minutes.

      - Use Case: Mitigates automated attack techniques that rely on repeated login
      attempts.


      Multi-Factor Authentication (MFA) for High-Risk Accounts


      - Implementation: Require MFA for all administrative accounts and high-risk
      users. Use MFA mechanisms like hardware tokens, authenticator apps, or biometrics.

      - Use Case: Prevents unauthorized access, even if credentials are stolen.


      Restricting Interactive Logins


      - Implementation: Restrict interactive logins for privileged accounts to specific
      secure systems or management consoles. Use group policies to enforce logon restrictions.

      - Use Case: Protects sensitive accounts from misuse or exploitation.


      *Tools for Implementation*


      Built-in Tools:


      - Microsoft Active Directory (AD): Centralized account management and RBAC enforcement.

      - Group Policy Object (GPO): Enforce password policies, logon restrictions,
      and account lockout policies.


      Identity and Access Management (IAM) Tools:


      - Okta: Centralized user provisioning, MFA, and SSO integration.

      - Microsoft Azure Active Directory: Provides advanced account lifecycle management,
      role-based access, and conditional access policies.


      Privileged Account Management (PAM):

      - CyberArk, BeyondTrust, Thycotic: Manage and monitor privileged account usage,
      enforce session recording, and JIT access.

      https://attack.mitre.org/mitigations/M1018'
    translations:
      fr:
        name: Gestion des comptes utilisateurs
        description: "La gestion des comptes utilisateurs implique la mise en place\
          \ et l\u2019application de politiques pour le cycle de vie des comptes utilisateurs,\
          \ y compris la cr\xE9ation, la modification et la d\xE9sactivation. Une\
          \ gestion ad\xE9quate des comptes r\xE9duit la surface d\u2019attaque en\
          \ limitant les acc\xE8s non autoris\xE9s, en g\xE9rant les privil\xE8ges\
          \ des comptes et en garantissant que les comptes sont utilis\xE9s conform\xE9\
          ment aux politiques organisationnelles. Cette att\xE9nuation peut \xEAtre\
          \ mise en \u0153uvre par les mesures suivantes :\n\nFaire respecter le principe\
          \ du moindre privil\xE8ge\n\n- Impl\xE9mentation : Attribuer aux utilisateurs\
          \ uniquement les permissions minimales requises pour accomplir leurs fonctions\
          \ de travail. Auditez r\xE9guli\xE8rement les comptes pour vous assurer\
          \ qu\u2019aucune autorisation suppl\xE9mentaire n\u2019est accord\xE9e.\n\
          - Cas d\u2019utilisation : R\xE9duit le risque d\u2019escalade de privil\xE8\
          ges en garantissant que les comptes ne peuvent pas effectuer d\u2019actions\
          \ non autoris\xE9es.\n\nMise en \u0153uvre de politiques de mots de passe\
          \ forts\n\n- Impl\xE9mentation : Faire respecter les exigences de complexit\xE9\
          \ du mot de passe (par exemple, longueur, types de caract\xE8res). Exigez\
          \ l\u2019expiration du mot de passe tous les 90 jours et interdisez la r\xE9\
          utilisation du mot de passe.\n- Cas d\u2019utilisation : Emp\xEAche les\
          \ adversaires d\u2019obtenir un acc\xE8s non autoris\xE9 par devinette de\
          \ mot de passe ou attaques par force brute.\n\nGestion des comptes inactifs\
          \ et orphelins\n\n- Mise en \u0153uvre : mettre en \u0153uvre des flux de\
          \ travail automatis\xE9s pour d\xE9sactiver les comptes apr\xE8s une p\xE9\
          riode d\u2019inactivit\xE9 d\xE9finie (par exemple, 30 jours). Supprimez\
          \ les comptes orphelins (par exemple, les comptes sans propri\xE9taire assign\xE9\
          ) lors des audits r\xE9guliers des comptes.\n- Cas d\u2019utilisation :\
          \ \xC9limine les comptes inactifs qui pourraient \xEAtre exploit\xE9s par\
          \ les attaquants.\n\nPolitiques de verrouillage des comptes\n\n- Impl\xE9\
          mentation : Configurez les seuils de verrouillage des comptes (par exemple,\
          \ verrouillez les comptes apr\xE8s cinq tentatives de connexion rat\xE9\
          es). Fixez la dur\xE9e du verrouillage \xE0 un minimum de 15 minutes.\n\
          - Cas d\u2019utilisation : Att\xE9nue les techniques d\u2019attaque automatis\xE9\
          es qui reposent sur des tentatives r\xE9p\xE9t\xE9es de connexion.\n\nAuthentification\
          \ multifactorielle (MFA) pour les comptes \xE0 haut risque\n\n- Mise en\
          \ \u0153uvre : Exiger la MFA pour tous les comptes administratifs et les\
          \ utilisateurs \xE0 haut risque. Utilisez des m\xE9canismes MFA comme les\
          \ jetons mat\xE9riels, les applications d\u2019authentification ou la biom\xE9\
          trie.\n- Cas d\u2019utilisation : Emp\xEAche l\u2019acc\xE8s non autoris\xE9\
          , m\xEAme si les identifiants sont vol\xE9s.\n\nRestriction des connexions\
          \ interactives\n\n- Impl\xE9mentation : Restreindre les connexions interactives\
          \ des comptes privil\xE9gi\xE9s \xE0 des syst\xE8mes s\xE9curis\xE9s sp\xE9\
          cifiques ou \xE0 des consoles de gestion. Utilisez des politiques de groupe\
          \ pour faire respecter les restrictions de connexion.\n- Cas d\u2019utilisation\
          \ : Prot\xE8ge les comptes sensibles contre toute mauvaise utilisation ou\
          \ exploitation.\n\n*Outils pour la mise en \u0153uvre*\n\nOutils int\xE9\
          gr\xE9s :\n\n- Microsoft Active Directory (AD) : Gestion centralis\xE9e\
          \ des comptes et application des r\xE8gles RBAC.\n- Objet de politique de\
          \ groupe (GPO) : Appliquer les politiques de mot de passe, les restrictions\
          \ de connexion et les politiques de verrouillage des comptes.\n\nOutils\
          \ de gestion de l\u2019identit\xE9 et des acc\xE8s (IAM) :\n\n- Okta : Provisionnement\
          \ centralis\xE9 des utilisateurs, MFA et int\xE9gration SSO.\n- Microsoft\
          \ Azure Active Directory : Fournit une gestion avanc\xE9e du cycle de vie\
          \ des comptes, un acc\xE8s bas\xE9 sur des r\xF4les et des politiques d\u2019\
          acc\xE8s conditionnel.\n\nGestion des comptes privil\xE9gi\xE9s (PAM) :\n\
          - CyberArk, BeyondTrust, Thycotic : G\xE9rer et surveiller l\u2019utilisation\
          \ des comptes privil\xE9gi\xE9s, faire respecter l\u2019enregistrement des\
          \ sessions et l\u2019acc\xE8s JIT.\nhttps://attack.mitre.org/mitigations/M1018"
  - urn: urn:intuitem:risk:function:mitre-attack:m1019
    ref_id: M1019
    name: Threat Intelligence Program
    category: technical
    csf_function: protect
    description: "A Threat Intelligence Program enables organizations to proactively\
      \ identify, analyze, and act on cyber threats by leveraging internal and external\
      \ data sources. The program supports decision-making processes, prioritizes\
      \ defenses, and improves incident response by delivering actionable intelligence\
      \ tailored to the organization's risk profile and operational environment. This\
      \ mitigation can be implemented through the following measures:\n\nEstablish\
      \ a Threat Intelligence Team:\n\n- Form a dedicated team or assign responsibility\
      \ to existing security personnel to collect, analyze, and act on threat intelligence.\n\
      \nDefine Intelligence Requirements:\n\n- Identify the organization\u2019s critical\
      \ assets and focus intelligence gathering efforts on threats targeting these\
      \ assets.\n\nLeverage Internal and External Data Sources:\n\n- Collect intelligence\
      \ from internal sources such as logs, incidents, and alerts.\nSubscribe to external\
      \ threat intelligence feeds, participate in ISACs, and monitor open-source intelligence\
      \ (OSINT).\n\nImplement Tools for Automation:\n\n- Use threat intelligence platforms\
      \ (TIPs) to automate the collection, enrichment, and dissemination of threat\
      \ data.\n- Integrate threat intelligence with SIEMs to correlate IOCs with internal\
      \ events.\n\nAnalyze and Act on Intelligence:\n\n- Use frameworks like MITRE\
      \ ATT&CK to map intelligence to adversary TTPs.\n- Prioritize defensive measures,\
      \ such as patching vulnerabilities or deploying IOCs, based on analyzed threats.\n\
      \nShare and Collaborate:\n\n- Share intelligence with industry peers through\
      \ ISACs or threat-sharing platforms to enhance collective defense.\n\nEvaluate\
      \ and Update the Program:\n\n- Regularly assess the effectiveness of the threat\
      \ intelligence program.\n- Update intelligence priorities and capabilities as\
      \ new threats emerge.\n\n*Tools for Implementation*\n\nThreat Intelligence Platforms\
      \ (TIPs):\n\n- OpenCTI: An open-source platform for structuring and sharing\
      \ threat intelligence.\n- MISP: A threat intelligence sharing platform for sharing\
      \ structured threat data.\n\nThreat Intelligence Feeds:\n\n- Open Threat Exchange\
      \ (OTX): Provides free access to a large repository of threat intelligence.\n\
      - CIRCL OSINT Feed: A free source for IOCs and threat information.\n\nAutomation\
      \ and Enrichment Tools:\n\n- TheHive: An open-source incident response platform\
      \ with threat intelligence integration.\n- Yeti: A platform for managing and\
      \ structuring knowledge about threats.\n\nAnalysis Frameworks:\n\n- MITRE ATT&CK\
      \ Navigator: A tool for mapping threat intelligence to adversary behaviors.\n\
      - Cuckoo Sandbox: Analyzes malware to extract behavioral indicators.\n\nCommunity\
      \ and Collaboration Tools:\n\n- ISAC Memberships: Join industry-specific ISACs\
      \ for intelligence sharing.\n- Slack/Discord Channels: Participate in threat\
      \ intelligence communities for real-time collaboration.\nhttps://attack.mitre.org/mitigations/M1019"
    translations:
      fr:
        name: Programme de renseignement sur les menaces
        description: "Un programme de renseignement sur les menaces permet aux organisations\
          \ d\u2019identifier, d\u2019analyser et d\u2019agir de mani\xE8re proactive\
          \ sur les cybermenaces en tirant parti de sources de donn\xE9es internes\
          \ et externes. Le programme soutient les processus d\xE9cisionnels, priorise\
          \ les d\xE9fenses et am\xE9liore la r\xE9ponse aux incidents en fournissant\
          \ des renseignements exploitables adapt\xE9s au profil de risque et \xE0\
          \ l\u2019environnement op\xE9rationnel de l\u2019organisation. Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\n\
          Constituez une \xE9quipe de renseignement sur les menaces :\n\n- Former\
          \ une \xE9quipe d\xE9di\xE9e ou confier la responsabilit\xE9 au personnel\
          \ de s\xE9curit\xE9 existant pour collecter, analyser et agir sur le renseignement\
          \ sur les menaces.\n\nD\xE9finir les exigences en mati\xE8re de renseignement\
          \ :\n\n- Identifier les atouts critiques de l\u2019organisation et concentrer\
          \ les efforts de collecte de renseignements sur les menaces ciblant ces\
          \ actifs.\n\nExploitez les sources de donn\xE9es internes et externes :\n\
          \n- Collecter des renseignements aupr\xE8s de sources internes telles que\
          \ des journaux, incidents et alertes.\nAbonnez-vous \xE0 des flux externes\
          \ de renseignement sur les menaces, participez aux ISAC et surveillez le\
          \ renseignement open source (OSINT).\n\nMettre en place des outils d\u2019\
          automatisation :\n\n- Utiliser des plateformes de renseignement sur les\
          \ menaces (TIP) pour automatiser la collecte, l\u2019enrichissement et la\
          \ diffusion des donn\xE9es sur les menaces.\n- Int\xE9grer le renseignement\
          \ sur les menaces avec les SIEM afin de corr\xE9ler les IOC avec les \xE9\
          v\xE9nements internes.\n\nAnalysez et agissez sur le renseignement :\n\n\
          - Utiliser des cadres comme MITRE ATT&CK pour associer l\u2019intelligence\
          \ aux TTP adverses.\n- Prioriser les mesures d\xE9fensives, telles que corriger\
          \ les vuln\xE9rabilit\xE9s ou d\xE9ployer des IOC, en fonction des menaces\
          \ analys\xE9es.\n\nPartagez et collaborez :\n\n- Partager du renseignement\
          \ avec des pairs du secteur via des ISAC ou des plateformes de partage de\
          \ menaces pour renforcer la d\xE9fense collective.\n\n\xC9valuer et mettre\
          \ \xE0 jour le programme :\n\n- \xC9valuer r\xE9guli\xE8rement l\u2019efficacit\xE9\
          \ du programme de renseignement sur les menaces.\n- Mettre \xE0 jour les\
          \ priorit\xE9s et capacit\xE9s du renseignement \xE0 mesure que de nouvelles\
          \ menaces apparaissent.\n\n*Outils pour la mise en \u0153uvre*\n\nPlateformes\
          \ de renseignement sur les menaces (TIP) :\n\n- OpenCTI : Une plateforme\
          \ open source pour structurer et partager des renseignements sur les menaces.\n\
          - MISP : Une plateforme de partage de renseignements sur les menaces pour\
          \ le partage de donn\xE9es structur\xE9es sur les menaces.\n\nFlux de renseignements\
          \ sur les menaces :\n\n- Open Threat Exchange (OTX) : Offre un acc\xE8s\
          \ gratuit \xE0 un vaste d\xE9p\xF4t de renseignements sur les menaces.\n\
          - CIRCL OSINT Feed : Une source gratuite pour les IOC et les informations\
          \ sur les menaces.\n\nOutils d\u2019automatisation et d\u2019enrichissement\
          \ :\n\n- TheHive : Une plateforme open source de r\xE9ponse aux incidents\
          \ avec int\xE9gration de l\u2019intelligence sur les menaces.\n- Yetis :\
          \ Une plateforme pour g\xE9rer et structurer les connaissances sur les menaces.\n\
          \nCadres de recherche :\n\n- MITRE ATT&CK Navigator : Un outil pour cartographier\
          \ le renseignement de menace sur les comportements des adversaires.\n- Cuckoo\
          \ Sandbox : Analyse les malwares pour extraire des indicateurs comportementaux.\n\
          \nOutils communautaires et de collaboration :\n\n- Adh\xE9sions ISAC : Rejoignez\
          \ des ISAC sp\xE9cifiques \xE0 l\u2019industrie pour le partage de renseignements.\n\
          - Canaux Slack/Discord : Participer aux communaut\xE9s de renseignement\
          \ sur les menaces pour une collaboration en temps r\xE9el.\nhttps://attack.mitre.org/mitigations/M1019"
  - urn: urn:intuitem:risk:function:mitre-attack:m1020
    ref_id: M1020
    name: SSL/TLS Inspection
    category: technical
    csf_function: protect
    description: 'SSL/TLS inspection involves decrypting encrypted network traffic
      to examine its content for signs of malicious activity. This capability is crucial
      for detecting threats that use encryption to evade detection, such as phishing,
      malware, or data exfiltration. After inspection, the traffic is re-encrypted
      and forwarded to its destination. This mitigation can be implemented through
      the following measures:


      Deploy SSL/TLS Inspection Appliances:


      - Implement SSL/TLS inspection solutions to decrypt and inspect encrypted traffic.

      - Ensure appliances are placed at critical network choke points for maximum
      coverage.


      Configure Decryption Policies:


      - Define rules to decrypt traffic for specific applications, ports, or domains.

      - Avoid decrypting sensitive or privacy-related traffic, such as financial or
      healthcare websites, to comply with regulations.


      Integrate Threat Intelligence:


      - Use threat intelligence feeds to correlate inspected traffic with known indicators
      of compromise (IOCs).


      Integrate with Security Tools:


      - Combine SSL/TLS inspection with SIEM and NDR tools to analyze decrypted traffic
      and generate alerts for suspicious activity.

      - Example Tools: Splunk, Darktrace


      Implement Certificate Management:


      - Use trusted internal or third-party certificates for traffic re-encryption
      after inspection.

      - Regularly update certificate authorities (CAs) to ensure secure re-encryption.


      Monitor and Tune:


      - Continuously monitor SSL/TLS inspection logs for anomalies and fine-tune policies
      to reduce false positives.

      https://attack.mitre.org/mitigations/M1020'
    translations:
      fr:
        name: SSL/TLS Inspection
        description: "L\u2019inspection SSL/TLS consiste \xE0 d\xE9chiffrer le trafic\
          \ r\xE9seau chiffr\xE9 pour examiner son contenu \xE0 la recherche de signes\
          \ d\u2019activit\xE9s malveillantes. Cette capacit\xE9 est cruciale pour\
          \ d\xE9tecter les menaces utilisant le chiffrement pour \xE9chapper \xE0\
          \ la d\xE9tection, telles que le phishing, les logiciels malveillants ou\
          \ l\u2019exfiltration de donn\xE9es. Apr\xE8s inspection, le trafic est\
          \ re-chiffr\xE9 et transf\xE9r\xE9 vers sa destination. Cette att\xE9nuation\
          \ peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\nD\xE9ployez\
          \ des appareils d\u2019inspection SSL/TLS :\n\n- Mettre en \u0153uvre des\
          \ solutions d\u2019inspection SSL/TLS pour d\xE9chiffrer et inspecter le\
          \ trafic chiffr\xE9.\n- S\u2019assurer que les appareils sont plac\xE9s\
          \ aux points d\u2019\xE9tranglement critiques du r\xE9seau pour une couverture\
          \ maximale.\n\nConfigurez les politiques de d\xE9chiffrement :\n\n- D\xE9\
          finir des r\xE8gles pour d\xE9chiffrer le trafic pour des applications,\
          \ ports ou domaines sp\xE9cifiques.\n- \xC9viter de d\xE9chiffrer le trafic\
          \ sensible ou li\xE9 \xE0 la vie priv\xE9e, comme les sites financiers ou\
          \ de sant\xE9, afin de se conformer \xE0 la r\xE9glementation.\n\nInt\xE9\
          grer le renseignement sur les menaces :\n\n- Utiliser des flux de renseignement\
          \ sur les menaces pour corr\xE9ler le trafic inspect\xE9 avec les indicateurs\
          \ connus de compromission (IOC).\n\nInt\xE9grez avec des outils de s\xE9\
          curit\xE9 :\n\n- Combiner l\u2019inspection SSL/TLS avec des outils SIEM\
          \ et NDR pour analyser le trafic d\xE9chiffr\xE9 et g\xE9n\xE9rer des alertes\
          \ en cas d\u2019activit\xE9 suspecte.\n- Exemples d\u2019outils : Splunk,\
          \ Darktrace\n\nImpl\xE9menter la gestion des certificats :\n\n- Utiliser\
          \ des certificats internes ou tiers fiables pour le rechiffrement du trafic\
          \ apr\xE8s inspection.\n- Mettre r\xE9guli\xE8rement \xE0 jour les autorit\xE9\
          s de certification (CA) afin d\u2019assurer un rechiffrement s\xE9curis\xE9\
          .\n\nSurveillez et accordez :\n\n- Surveiller en continu les journaux d\u2019\
          inspection SSL/TLS pour d\xE9tecter les anomalies et ajuster les politiques\
          \ afin de r\xE9duire les faux positifs.\nhttps://attack.mitre.org/mitigations/M1020"
  - urn: urn:intuitem:risk:function:mitre-attack:m1021
    ref_id: M1021
    name: Restrict Web-Based Content
    category: technical
    csf_function: protect
    description: 'Restricting web-based content involves enforcing policies and technologies
      that limit access to potentially malicious websites, unsafe downloads, and unauthorized
      browser behaviors. This can include URL filtering, download restrictions, script
      blocking, and extension control to protect against exploitation, phishing, and
      malware delivery. This mitigation can be implemented through the following measures:


      Deploy Web Proxy Filtering:


      - Use solutions to filter web traffic based on categories, reputation, and content
      types.

      - Enforce policies that block unsafe websites or file types at the gateway level.


      Enable DNS-Based Filtering:


      - Implement tools to restrict access to domains associated with malware or phishing
      campaigns.

      - Use public DNS filtering services to enhance protection.


      Enforce Content Security Policies (CSP):


      - Configure CSP headers on internal and external web applications to restrict
      script execution, iframe embedding, and cross-origin requests.


      Control Browser Features:


      - Disable unapproved browser features like automatic downloads, developer tools,
      or unsafe scripting.

      - Enforce policies through tools like Group Policy Management to control browser
      settings.


      Monitor and Alert on Web-Based Threats:


      - Use SIEM tools to collect and analyze web proxy logs for signs of anomalous
      or malicious activity.

      - Configure alerts for access attempts to blocked domains or repeated file download
      failures.

      https://attack.mitre.org/mitigations/M1021'
    translations:
      fr:
        name: Restreindre le contenu Web
        description: "Restreindre le contenu web implique d\u2019appliquer des politiques\
          \ et des technologies qui limitent l\u2019acc\xE8s \xE0 des sites potentiellement\
          \ malveillants, des t\xE9l\xE9chargements dangereux et des comportements\
          \ de navigateurs non autoris\xE9s. Cela peut inclure le filtrage des URL,\
          \ les restrictions de t\xE9l\xE9chargement, le blocage de scripts et le\
          \ contr\xF4le des extensions pour se prot\xE9ger contre l\u2019exploitation,\
          \ le phishing et la diffusion de malwares. Cette att\xE9nuation peut \xEA\
          tre mise en \u0153uvre par les mesures suivantes :\n\nD\xE9ploiement du\
          \ filtrage des proxy Web :\n\n- Utiliser des solutions pour filtrer le trafic\
          \ web en fonction des cat\xE9gories, de la r\xE9putation et des types de\
          \ contenu.\n- Appliquer des politiques qui bloquent les sites web ou types\
          \ de fichiers dangereux au niveau de la passerelle.\n\nActivez le filtrage\
          \ bas\xE9 sur DNS :\n\n- Mettre en \u0153uvre des outils pour restreindre\
          \ l\u2019acc\xE8s aux domaines associ\xE9s \xE0 des campagnes de logiciels\
          \ malveillants ou de phishing.\n- Utiliser des services publics de filtrage\
          \ DNS pour renforcer la protection.\n\nFaire respecter les politiques de\
          \ s\xE9curit\xE9 du contenu (CSP) :\n\n- Configurer les en-t\xEAtes CSP\
          \ sur les applications web internes et externes pour restreindre l\u2019\
          ex\xE9cution de scripts, l\u2019int\xE9gration d\u2019i-frames et les requ\xEA\
          tes cross-origin.\n\nFonctionnalit\xE9s de contr\xF4le du navigateur :\n\
          \n- D\xE9sactiver les fonctionnalit\xE9s non approuv\xE9es du navigateur\
          \ comme les t\xE9l\xE9chargements automatiques, les outils de d\xE9veloppement\
          \ ou les scripts non s\xE9curis\xE9s.\n- Faire respecter les politiques\
          \ via des outils comme la gestion des strat\xE9gies de groupe pour contr\xF4\
          ler les param\xE8tres du navigateur.\n\nSurveillez et alertez les menaces\
          \ en ligne :\n\n- Utiliser les outils SIEM pour collecter et analyser les\
          \ journaux proxy web \xE0 la recherche de signes d\u2019activit\xE9s anormales\
          \ ou malveillantes.\n- Configurer des alertes pour les tentatives d\u2019\
          acc\xE8s aux domaines bloqu\xE9s ou les \xE9checs r\xE9p\xE9t\xE9s de t\xE9\
          l\xE9chargement de fichiers.\nhttps://attack.mitre.org/mitigations/M1021"
  - urn: urn:intuitem:risk:function:mitre-attack:m1022
    ref_id: M1022
    name: Restrict File and Directory Permissions
    category: technical
    csf_function: protect
    description: "Restricting file and directory permissions involves setting access\
      \ controls at the file system level to limit which users, groups, or processes\
      \ can read, write, or execute files. By configuring permissions appropriately,\
      \ organizations can reduce the attack surface for adversaries seeking to access\
      \ sensitive data, plant malicious code, or tamper with system files.\n\nEnforce\
      \ Least Privilege Permissions:\n\n- Remove unnecessary write permissions on\
      \ sensitive files and directories.\n- Use file ownership and groups to control\
      \ access for specific roles.\n\nExample (Windows): Right-click the shared folder\
      \ \u2192 Properties \u2192 Security tab \u2192 Adjust permissions for NTFS ACLs.\n\
      \nHarden File Shares:\n\n- Disable anonymous access to shared folders.\n- Enforce\
      \ NTFS permissions for shared folders on Windows.\n\nExample: Set permissions\
      \ to restrict write access to critical files, such as system executables (e.g.,\
      \ `/bin` or `/sbin` on Linux). Use tools like `chown` and `chmod` to assign\
      \ file ownership and limit access.\n\nOn Linux, apply:\n`chmod 750 /etc/sensitive.conf`\n\
      `chown root:admin /etc/sensitive.conf`\n\nFile Integrity Monitoring (FIM):\n\
      \n- Use tools like Tripwire, Wazuh, or OSSEC to monitor changes to critical\
      \ file permissions.\n\nAudit File System Access:\n\n- Enable auditing to track\
      \ permission changes or unauthorized access attempts.\n- Use auditd (Linux)\
      \ or Event Viewer (Windows) to log activities.\n\nRestrict Startup Directories:\n\
      \n- Configure permissions to prevent unauthorized writes to directories like\
      \ `C:\\ProgramData\\Microsoft\\Windows\\Start Menu`.\n\nExample: Restrict write\
      \ access to critical directories like `/etc/`, `/usr/local/`, and Windows directories\
      \ such as `C:\\Windows\\System32`.\n\n- On Windows, use icacls to modify permissions:\
      \ `icacls \"C:\\Windows\\System32\" /inheritance:r /grant:r SYSTEM:(OI)(CI)F`\n\
      - On Linux, monitor permissions using tools like `lsattr` or `auditd`.\nhttps://attack.mitre.org/mitigations/M1022"
    translations:
      fr:
        name: "Restreindre les permissions de fichiers et de r\xE9pertoires"
        description: "Restreindre les permissions de fichiers et de r\xE9pertoires\
          \ implique de d\xE9finir des contr\xF4les d\u2019acc\xE8s au niveau du syst\xE8\
          me de fichiers pour limiter quels utilisateurs, groupes ou processus peuvent\
          \ lire, \xE9crire ou ex\xE9cuter des fichiers. En configurant correctement\
          \ les permissions, les organisations peuvent r\xE9duire la surface d\u2019\
          attaque pour les adversaires cherchant \xE0 acc\xE9der \xE0 des donn\xE9\
          es sensibles, \xE0 implanter du code malveillant ou \xE0 manipuler des fichiers\
          \ syst\xE8me.\n\nFaire respecter les permissions de privil\xE8ge minimum\
          \ :\n\n- Supprimer les permissions d\u2019\xE9criture inutiles sur les fichiers\
          \ sensibles et les r\xE9pertoires.\n- Utiliser la propri\xE9t\xE9 des fichiers\
          \ et les groupes pour contr\xF4ler l\u2019acc\xE8s \xE0 des r\xF4les sp\xE9\
          cifiques.\n\nExemple (Windows) : Faites un clic droit sur le dossier partag\xE9\
          \ \u2192 Propri\xE9t\xE9s \u2192 onglet S\xE9curit\xE9 \u2192 Ajustez les\
          \ permissions pour les ACL NTFS.\n\nRenforcez les partages de fichiers :\n\
          \n- D\xE9sactiver l\u2019acc\xE8s anonyme aux dossiers partag\xE9s.\n- Appliquer\
          \ les permissions NTFS pour les dossiers partag\xE9s sous Windows.\n\nExemple\
          \ : D\xE9finir des permissions pour restreindre l\u2019acc\xE8s \xE0 l\u2019\
          \xE9criture de fichiers critiques, comme les ex\xE9cutables syst\xE8me (par\
          \ exemple, '/bin' ou '/sbin' sous Linux). Utilisez des outils comme \xAB\
          \ chown \xBB et \xAB chmod \xBB pour attribuer la propri\xE9t\xE9 des fichiers\
          \ et limiter l\u2019acc\xE8s.\n\nSous Linux, postulez :\n'chmod 750 /etc/sensitive.conf'\n\
          'chown root\_:admin /etc/sensitive.conf'\n\nSurveillance de l\u2019int\xE9\
          grit\xE9 des fichiers (FIM) :\n\n- Utiliser des outils comme Tripwire, Wazuh\
          \ ou OSSEC pour surveiller les modifications des permissions critiques des\
          \ fichiers.\n\nAcc\xE8s au syst\xE8me de fichiers d\u2019audit :\n\n- Permettre\
          \ l\u2019audit pour suivre les changements de permissions ou les tentatives\
          \ d\u2019acc\xE8s non autoris\xE9es.\n- Utiliser auditd (Linux) ou Event\
          \ Viewer (Windows) pour enregistrer les activit\xE9s.\n\nRestreignez les\
          \ annuaires de d\xE9marrage :\n\n- Configurer les permissions pour emp\xEA\
          cher les \xE9critures non autoris\xE9es dans des r\xE9pertoires comme \xAB\
          \ C\_:\\ProgramData\\Microsoft\\Windows\\Start Menu \xBB.\n\nExemple : Restreignez\
          \ l\u2019acc\xE8s en \xE9criture \xE0 des r\xE9pertoires critiques comme\
          \ '/etc/', '/usr/local/', et \xE0 des r\xE9pertoires Windows comme 'C\_\
          :\\Windows\\System32'.\n\n- Sous Windows, utiliser icacls pour modifier\
          \ les permissions : 'icacls \xAB\_C\_:\\Windows\\System32\_\xBB /inheritance\_\
          :r /grant\_:r SYSTEM\_:(OI)(CI)F'\n- Sous Linux, surveiller les permissions\
          \ \xE0 l\u2019aide d\u2019outils comme \xAB lsattr \xBB ou \xAB auditd \xBB\
          .\nhttps://attack.mitre.org/mitigations/M1022"
  - urn: urn:intuitem:risk:function:mitre-attack:m1024
    ref_id: M1024
    name: Restrict Registry Permissions
    category: technical
    csf_function: protect
    description: "Restricting registry permissions involves configuring access control\
      \ settings for sensitive registry keys and hives to ensure that only authorized\
      \ users or processes can make modifications. By limiting access, organizations\
      \ can prevent unauthorized changes that adversaries might use for persistence,\
      \ privilege escalation, or defense evasion. This mitigation can be implemented\
      \ through the following measures:\n\nReview and Adjust Permissions on Critical\
      \ Keys\n\n- Regularly review permissions on keys such as `Run`, `RunOnce`, and\
      \ `Services` to ensure only authorized users have write access.\n- Use tools\
      \ like `icacls` or `PowerShell` to automate permission adjustments.\n\nEnable\
      \ Registry Auditing\n\n- Enable auditing on sensitive keys to log access attempts.\n\
      - Use Event Viewer or SIEM solutions to analyze logs and detect suspicious activity.\n\
      - Example Audit Policy: `auditpol /set /subcategory:\"Registry\" /success:enable\
      \ /failure:enable`\n\nProtect Credential-Related Hives\n\n- Limit access to\
      \ hives like `SAM`,`SECURITY`, and `SYSTEM` to prevent credential dumping or\
      \ other unauthorized access.\n- Use LSA Protection to add an additional security\
      \ layer for credential storage.\n\nRestrict Registry Editor Usage\n\n- Use Group\
      \ Policy to restrict access to regedit.exe for non-administrative users.\n-\
      \ Block execution of registry editing tools on endpoints where they are unnecessary.\n\
      \nDeploy Baseline Configuration Tools\n\n- Use tools like Microsoft Security\
      \ Compliance Toolkit or CIS Benchmarks to apply and maintain secure registry\
      \ configurations.\n\n*Tools for Implementation* \n\nRegistry Permission Tools:\n\
      \n- Registry Editor (regedit): Built-in tool to manage registry permissions.\n\
      - PowerShell: Automate permissions and manage keys. `Set-ItemProperty -Path\
      \ \"HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\" -Name \"KeyName\"\
      \ -Value \"Value\"`\n- icacls: Command-line tool to modify ACLs.\n\nMonitoring\
      \ Tools:\n\n- Sysmon: Monitor and log registry events.\n- Event Viewer: View\
      \ registry access logs.\n\nPolicy Management Tools:\n\n- Group Policy Management\
      \ Console (GPMC): Enforce registry permissions via GPOs.\n- Microsoft Endpoint\
      \ Manager: Deploy configuration baselines for registry permissions.\nhttps://attack.mitre.org/mitigations/M1024"
    translations:
      fr:
        name: Restreindre les autorisations du registre
        description: "Restreindre les autorisations du registre implique de configurer\
          \ les param\xE8tres de contr\xF4le d\u2019acc\xE8s pour les cl\xE9s sensibles\
          \ du registre et les ruches afin de garantir que seuls les utilisateurs\
          \ ou processus autoris\xE9s puissent effectuer des modifications. En limitant\
          \ l\u2019acc\xE8s, les organisations peuvent emp\xEAcher les changements\
          \ non autoris\xE9s que les adversaires pourraient utiliser pour la persistance,\
          \ l\u2019escalade de privil\xE8ges ou l\u2019\xE9vasion de la d\xE9fense.\
          \ Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ :\n\nExaminer et ajuster les autorisations sur les cl\xE9s critiques\n\
          \n- V\xE9rifier r\xE9guli\xE8rement les autorisations sur des cl\xE9s telles\
          \ que \xAB Ex\xE9cuter \xBB, \xAB RunOnce \xBB et \xAB Services \xBB afin\
          \ de s\u2019assurer que seuls les utilisateurs autoris\xE9s ont acc\xE8\
          s en \xE9criture.\n- Utiliser des outils comme \xAB icacls \xBB ou \xAB\
          \ PowerShell \xBB pour automatiser les ajustements des permissions.\n\n\
          Activer l\u2019audit du registre\n\n- Permettre l\u2019audit des cl\xE9\
          s sensibles pour enregistrer les tentatives d\u2019acc\xE8s.\n- Utiliser\
          \ des solutions Event Viewer ou SIEM pour analyser les journaux et d\xE9\
          tecter toute activit\xE9 suspecte.\n- Exemple de politique d\u2019audit\
          \ : \xAB auditpol /set /sous-cat\xE9gorie : \xAB Registre \xBB /success\_\
          :enable /failure\_:enable \xBB\n\nProt\xE9ger les ruches li\xE9es aux accr\xE9\
          ditations\n\n- Limiter l\u2019acc\xE8s aux ruches telles que \xAB SAM \xBB\
          , \xAB SECURITY \xBB et \xAB SYSTEM \xBB afin d\u2019\xE9viter le dumping\
          \ de cr\xE9dants ou tout autre acc\xE8s non autoris\xE9.\n- Utiliser la\
          \ protection LSA pour ajouter une couche de s\xE9curit\xE9 suppl\xE9mentaire\
          \ pour le stockage des identifiants.\n\nRestreindre l\u2019utilisation de\
          \ l\u2019\xE9diteur de registre\n\n- Utiliser la Politique de Groupe pour\
          \ restreindre l\u2019acc\xE8s \xE0 regedit.exe pour les utilisateurs non\
          \ administratifs.\n- Ex\xE9cution par blocs d\u2019outils d\u2019\xE9dition\
          \ de registre sur les points de terminaison o\xF9 ils ne sont pas n\xE9\
          cessaires.\n\nD\xE9ploiement des outils de configuration de base\n\n- Utiliser\
          \ des outils comme Microsoft Security Compliance Toolkit ou CIS Benchmarks\
          \ pour appliquer et maintenir des configurations s\xE9curis\xE9es de registre.\n\
          \n*Outils pour la mise en \u0153uvre* \n\nOutils d\u2019autorisation du\
          \ registre :\n\n- \xC9diteur de registre (regedit) : Outil int\xE9gr\xE9\
          \ pour g\xE9rer les autorisations du registre.\n- PowerShell : Automatisation\
          \ des permissions et gestion des cl\xE9s. 'Set-ItemProperty -Path \xAB\_\
          HKLM\_:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\_\xBB -Name \xAB\
          \_KeyName\_\xBB -Value \xAB\_Value\"'\n- icacls : Outil en ligne de commande\
          \ pour modifier les ACL.\n\nOutils de surveillance :\n\n- Sysmon : Surveiller\
          \ et enregistrer les \xE9v\xE9nements du registre.\n- Visualiseur d\u2019\
          \xE9v\xE9nements : Consultez les journaux d\u2019acc\xE8s au registre.\n\
          \nOutils de gestion des politiques :\n\n- Console de gestion de la strat\xE9\
          gie de groupe (GPMC) : Faire respecter les autorisations du registre via\
          \ les GPO.\n- Microsoft Endpoint Manager : D\xE9ploie des lignes de base\
          \ de configuration pour les autorisations du registre.\nhttps://attack.mitre.org/mitigations/M1024"
  - urn: urn:intuitem:risk:function:mitre-attack:m1025
    ref_id: M1025
    name: Privileged Process Integrity
    category: technical
    csf_function: protect
    description: 'Privileged Process Integrity focuses on defending highly privileged
      processes (e.g., system services, antivirus, or authentication processes) from
      tampering, injection, or compromise by adversaries. These processes often interact
      with critical components, making them prime targets for techniques like code
      injection, privilege escalation, and process manipulation. This mitigation can
      be implemented through the following measures:


      Protected Process Mechanisms:


      - Enable RunAsPPL on Windows systems to protect LSASS and other critical processes.

      - Use registry modifications to enforce protected process settings: `HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Lsa\RunAsPPL`


      Anti-Injection and Memory Protection:


      - Enable Control Flow Guard (CFG), DEP, and ASLR to protect against process
      memory tampering.

      - Deploy endpoint protection tools that actively block process injection attempts.


      Code Signing Validation:


      - Implement policies for Windows Defender Application Control (WDAC) or AppLocker
      to enforce execution of signed binaries.

      - Ensure critical processes are signed with valid certificates.


      Access Controls:


      - Use DACLs and MIC to limit which users and processes can interact with privileged
      processes.

      - Disable unnecessary debugging capabilities for high-privileged processes.


      Kernel-Level Protections:


      - Ensure Kernel Patch Protection (PatchGuard) is enabled on Windows systems.

      - Leverage SELinux or AppArmor on Linux to enforce kernel-level security policies.


      *Tools for Implementation*


      Protected Process Light (PPL):


      - RunAsPPL (Windows)

      - Windows Defender Credential Guard


      Code Integrity and Signing:


      - Windows Defender Application Control (WDAC)

      - AppLocker

      - SELinux/AppArmor (Linux)


      Memory Protection:


      - Control Flow Guard (CFG), Data Execution Prevention (DEP), ASLR


      Process Isolation/Sandboxing:


      - Firejail (Linux Sandbox)

      - Windows Sandbox

      - QEMU/KVM-based isolation


      Kernel Protection:


      - PatchGuard (Windows Kernel Patch Protection)

      - SELinux (Mandatory Access Control for Linux)

      - AppArmor

      https://attack.mitre.org/mitigations/M1025'
    translations:
      fr:
        name: "Int\xE9grit\xE9 des processus privil\xE9gi\xE9s"
        description: "L\u2019int\xE9grit\xE9 privil\xE9gi\xE9e des processus se concentre\
          \ sur la d\xE9fense des processus hautement privil\xE9gi\xE9s (par exemple,\
          \ les services syst\xE8me, les antivirus ou les processus d\u2019authentification)\
          \ contre toute manipulation, injection ou compromission par les adversaires.\
          \ Ces processus interagissent souvent avec des composants critiques, ce\
          \ qui en fait des cibles privil\xE9gi\xE9es pour des techniques telles que\
          \ l\u2019injection de code, l\u2019escalade de privil\xE8ges et la manipulation\
          \ des processus. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par\
          \ les mesures suivantes :\n\nM\xE9canismes de processus prot\xE9g\xE9s :\n\
          \n- Activer RunAsPPL sur les syst\xE8mes Windows pour prot\xE9ger LSASS\
          \ et d\u2019autres processus critiques.\n- Utiliser des modifications du\
          \ registre pour faire respecter les param\xE8tres prot\xE9g\xE9s du processus\
          \ : 'HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Lsa\\RunAsPPL'\n\
          \nAnti-injection et protection de la m\xE9moire :\n\n- Activer Control Flow\
          \ Guard (CFG), DEP et ASLR pour prot\xE9ger contre la falsification de la\
          \ m\xE9moire du processus.\n- D\xE9ployer des outils de protection des points\
          \ d\u2019extr\xE9mit\xE9 qui bloquent activement les tentatives d\u2019\
          injection de proc\xE9d\xE9s.\n\nValidation de la signature de code :\n\n\
          - Mettre en \u0153uvre des politiques pour Windows Defender Application\
          \ Control (WDAC) ou AppLocker afin d\u2019imposer l\u2019ex\xE9cution de\
          \ binaires sign\xE9s.\n- S\u2019assurer que les processus critiques sont\
          \ sign\xE9s avec des certificats valides.\n\nContr\xF4les d\u2019acc\xE8\
          s :\n\n- Utiliser les DACL et les MIC pour limiter les utilisateurs et processus\
          \ pouvant interagir avec les processus privil\xE9gi\xE9s.\n- D\xE9sactiver\
          \ les capacit\xE9s de d\xE9bogage inutiles pour les processus \xE0 haut\
          \ privil\xE8ge.\n\nProtections au niveau du noyau :\n\n- S\u2019assurer\
          \ que la protection contre les correctifs du noyau (PatchGuard) est activ\xE9\
          e sur les syst\xE8mes Windows.\n- Exploiter SELinux ou AppArmor sur Linux\
          \ pour appliquer des politiques de s\xE9curit\xE9 au niveau du noyau.\n\n\
          *Outils pour la mise en \u0153uvre*\n\nLumi\xE8re de proc\xE9d\xE9 prot\xE9\
          g\xE9e (PPL) :\n\n- RunAsPPL (Windows)\n- Garde de cr\xE9dentials Windows\
          \ Defender\n\nInt\xE9grit\xE9 du code et signature :\n\n- Contr\xF4le d\u2019\
          application Windows Defender (WDAC)\n- AppLocker\n- SELinux/AppArmor (Linux)\n\
          \nProtection de la m\xE9moire :\n\n- Contr\xF4le de la Garde de Flux (CFG),\
          \ Pr\xE9vention de l\u2019ex\xE9cution des donn\xE9es (DEP), ASLR\n\nIsolation\
          \ des proc\xE9d\xE9s/Sandboxing :\n\n- Firejail (bac \xE0 sable Linux)\n\
          - Bac \xE0 sable Windows\n- Isolation bas\xE9e sur QEMU/KVM\n\nProtection\
          \ du noyau :\n\n- PatchGuard (Protection contre les correctifs du noyau\
          \ Windows)\n- SELinux (Contr\xF4le d\u2019acc\xE8s obligatoire pour Linux)\n\
          - AppArmor\nhttps://attack.mitre.org/mitigations/M1025"
  - urn: urn:intuitem:risk:function:mitre-attack:m1026
    ref_id: M1026
    name: Privileged Account Management
    category: technical
    csf_function: protect
    description: 'Privileged Account Management focuses on implementing policies,
      controls, and tools to securely manage privileged accounts (e.g., SYSTEM, root,
      or administrative accounts). This includes restricting access, limiting the
      scope of permissions, monitoring privileged account usage, and ensuring accountability
      through logging and auditing.This mitigation can be implemented through the
      following measures:


      Account Permissions and Roles:


      - Implement RBAC and least privilege principles to allocate permissions securely.

      - Use tools like Active Directory Group Policies to enforce access restrictions.


      Credential Security:


      - Deploy password vaulting tools like CyberArk, HashiCorp Vault, or KeePass
      for secure storage and rotation of credentials.

      - Enforce password policies for complexity, uniqueness, and expiration using
      tools like Microsoft Group Policy Objects (GPO).


      Multi-Factor Authentication (MFA):


      - Enforce MFA for all privileged accounts using Duo Security, Okta, or Microsoft
      Azure AD MFA.


      Privileged Access Management (PAM):


      - Use PAM solutions like CyberArk, BeyondTrust, or Thycotic to manage, monitor,
      and audit privileged access.


      Auditing and Monitoring:


      - Integrate activity monitoring into your SIEM (e.g., Splunk or QRadar) to detect
      and alert on anomalous privileged account usage.


      Just-In-Time Access:


      - Deploy JIT solutions like Azure Privileged Identity Management (PIM) or configure
      ephemeral roles in AWS and GCP to grant time-limited elevated permissions.


      *Tools for Implementation*


      Privileged Access Management (PAM):


      - CyberArk, BeyondTrust, Thycotic, HashiCorp Vault.


      Credential Management:


      - Microsoft LAPS (Local Admin Password Solution), Password Safe, HashiCorp Vault,
      KeePass.


      Multi-Factor Authentication:


      - Duo Security, Okta, Microsoft Azure MFA, Google Authenticator.


      Linux Privilege Management:


      - sudo configuration, SELinux, AppArmor.


      Just-In-Time Access:


      - Azure Privileged Identity Management (PIM), AWS IAM Roles with session constraints,
      GCP Identity-Aware Proxy.

      https://attack.mitre.org/mitigations/M1026'
    translations:
      fr:
        name: "Gestion de comptes privil\xE9gi\xE9s"
        description: "La gestion des comptes privil\xE9gi\xE9s se concentre sur la\
          \ mise en \u0153uvre de politiques, de contr\xF4les et d\u2019outils pour\
          \ g\xE9rer de mani\xE8re s\xE9curis\xE9e les comptes privil\xE9gi\xE9s (par\
          \ exemple, SYSTEM, root ou comptes administratifs). Cela inclut la restriction\
          \ de l\u2019acc\xE8s, la limitation de la port\xE9e des permissions, la\
          \ surveillance de l\u2019utilisation des comptes privil\xE9gi\xE9s, et la\
          \ garantie de la responsabilit\xE9 via la journalisation et l\u2019audit.\
          \ Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ :\n\nAutorisations et r\xF4les du compte :\n\n- Impl\xE9menter les principes\
          \ RBAC et de privil\xE8ge minimum pour allouer les permissions de mani\xE8\
          re s\xE9curis\xE9e.\n- Utiliser des outils comme Active Directory Group\
          \ Policies pour imposer des restrictions d\u2019acc\xE8s.\n\nS\xE9curit\xE9\
          \ des accr\xE9ditations :\n\n- D\xE9ployer des outils de sauvegarde par\
          \ mot de passe tels que CyberArk, HashiCorp Vault ou KeePass pour un stockage\
          \ s\xE9curis\xE9 et une rotation des identifiants.\n- Appliquer des politiques\
          \ de mot de passe pour la complexit\xE9, l\u2019unicit\xE9 et l\u2019expiration\
          \ \xE0 l\u2019aide d\u2019outils comme Microsoft Group Policy Objects (GPO).\n\
          \nAuthentification multi-facteurs (MFA) :\n\n- Appliquer la MFA pour tous\
          \ les comptes privil\xE9gi\xE9s en utilisant Duo Security, Okta ou Microsoft\
          \ Azure AD MFA.\n\nGestion des acc\xE8s privil\xE9gi\xE9s (PAM) :\n\n- Utiliser\
          \ des solutions PAM telles que CyberArk, BeyondTrust ou Thycotic pour g\xE9\
          rer, surveiller et auditer l\u2019acc\xE8s privil\xE9gi\xE9.\n\nAudit et\
          \ suivi :\n\n- Int\xE9grer la surveillance d\u2019activit\xE9 dans votre\
          \ SIEM (par exemple, Splunk ou QRadar) pour d\xE9tecter et alerter en cas\
          \ d\u2019utilisation anormale de compte privil\xE9gi\xE9.\n\nAcc\xE8s juste-\xE0\
          -temps :\n\n- D\xE9ploiement de solutions JIT comme Azure Privileged Identity\
          \ Management (PIM) ou configuration de r\xF4les \xE9ph\xE9m\xE8res dans\
          \ AWS et GCP pour accorder des permissions \xE9lev\xE9es limit\xE9es dans\
          \ le temps.\n\n*Outils pour la mise en \u0153uvre*\n\nGestion des acc\xE8\
          s privil\xE9gi\xE9s (PAM) :\n\n- CyberArk, BeyondTrust, Thycotic, HashiCorp\
          \ Vault.\n\nGestion des dipl\xF4mes :\n\n- Microsoft LAPS (Local Admin Password\
          \ Solution), Password Safe, HashiCorp Vault, KeePass.\n\nAuthentification\
          \ multifactorielle :\n\n- Duo Security, Okta, Microsoft Azure MFA, Google\
          \ Authenticator.\n\nGestion des privil\xE8ges Linux :\n\n- configuration\
          \ sudo, SELinux, AppArmor.\n\nAcc\xE8s juste-\xE0-temps :\n\n- Azure Privileged\
          \ Identity Management (PIM), r\xF4les AWS IAM avec contraintes de session,\
          \ GCP Identity-Aware Proxy.\nhttps://attack.mitre.org/mitigations/M1026"
  - urn: urn:intuitem:risk:function:mitre-attack:m1027
    ref_id: M1027
    name: Password Policies
    category: technical
    csf_function: protect
    description: "Set and enforce secure password policies for accounts to reduce\
      \ the likelihood of unauthorized access. Strong password policies include enforcing\
      \ password complexity, requiring regular password changes, and preventing password\
      \ reuse. This mitigation can be implemented through the following measures:\n\
      \nWindows Systems:\n\n- Use Group Policy Management Console (GPMC) to configure:\n\
      \    - Minimum password length (e.g., 12+ characters).\n    - Password complexity\
      \ requirements.\n    - Password history (e.g., disallow last 24 passwords).\n\
      \    - Account lockout duration and thresholds.\n\nLinux Systems:\n\n- Configure\
      \ Pluggable Authentication Modules (PAM):\n- Use `pam_pwquality` to enforce\
      \ complexity and length requirements.\n- Implement `pam_tally2` or `pam_faillock`\
      \ for account lockouts.\n- Use `pwunconv` to disable password reuse.\n\nPassword\
      \ Managers:\n\n- Enforce usage of enterprise password managers (e.g., Bitwarden,\
      \ 1Password, LastPass) to generate and store strong passwords.\n\nPassword Blacklisting:\n\
      \n- Use tools like Have I Been Pwned password checks or NIST-based blacklist\
      \ solutions to prevent users from setting compromised passwords.\n\nRegular\
      \ Auditing:\n\n- Periodically audit password policies and account configurations\
      \ to ensure compliance using tools like LAPS (Local Admin Password Solution)\
      \ and vulnerability scanners.\n\n*Tools for Implementation*\n\nWindows:\n\n\
      - Group Policy Management Console (GPMC): Enforce password policies.\n- Microsoft\
      \ Local Administrator Password Solution (LAPS): Enforce random, unique admin\
      \ passwords.\n\nLinux/macOS:\n\n- PAM Modules (pam_pwquality, pam_tally2, pam_faillock):\
      \ Enforce password rules.\n- Lynis: Audit password policies and system configurations.\n\
      \nCross-Platform:\n\n- Password Managers (Bitwarden, 1Password, KeePass): Manage\
      \ and enforce strong passwords.\n- Have I Been Pwned API: Prevent the use of\
      \ breached passwords.\n- NIST SP 800-63B compliant tools: Enforce password guidelines\
      \ and blacklisting.\nhttps://attack.mitre.org/mitigations/M1027"
    translations:
      fr:
        name: Politiques de mot de passe
        description: "D\xE9finissez et appliquez des politiques de mots de passe s\xE9\
          curis\xE9s pour les comptes afin de r\xE9duire le risque d\u2019acc\xE8\
          s non autoris\xE9. Les politiques de mot de passe fortes incluent l\u2019\
          imposition de la complexit\xE9 du mot de passe, l\u2019obligation de changements\
          \ r\xE9guliers de mot de passe et l\u2019interdiction de la r\xE9utilisation\
          \ du mot de passe. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre\
          \ par les mesures suivantes :\n\nSyst\xE8mes Windows :\n\n- Utiliser la\
          \ console de gestion des politiques de groupe (GPMC) pour configurer :\n\
          \    - Longueur minimale du mot de passe (par exemple, 12+ caract\xE8res).\n\
          \    - Exigences de complexit\xE9 des mots de passe.\n    - Historique des\
          \ mots de passe (par exemple, refuser les 24 derniers mots de passe).\n\
          \    - Dur\xE9e et seuils de verrouillage du compte.\n\nSyst\xE8mes Linux\
          \ :\n\n- Configurer les modules d\u2019authentification pluggables (PAM)\
          \ :\n- Utiliser \xAB pam_pwquality \xBB pour imposer des exigences de complexit\xE9\
          \ et de longueur.\n- Impl\xE9menter \xAB pam_tally2 \xBB ou \xAB pam_faillock\
          \ \xBB pour les blocages de compte.\n- Utiliser 'pwunconv' pour d\xE9sactiver\
          \ la r\xE9utilisation du mot de passe.\n\nGestionnaires de mots de passe\
          \ :\n\n- Faire respecter l\u2019utilisation des gestionnaires de mots de\
          \ passe d\u2019entreprise (par exemple, Bitwarden, 1Password, LastPass)\
          \ pour g\xE9n\xE9rer et stocker des mots de passe forts.\n\nListe noire\
          \ de mots de passe :\n\n- Utiliser des outils comme les v\xE9rifications\
          \ de mots de passe Have I Been Pwned ou des solutions de liste noire bas\xE9\
          es sur le NIST pour emp\xEAcher les utilisateurs de d\xE9finir des mots\
          \ de passe compromis.\n\nAudits r\xE9guliers :\n\n- Auditer p\xE9riodiquement\
          \ les politiques de mot de passe et les configurations de comptes pour garantir\
          \ la conformit\xE9 \xE0 l\u2019aide d\u2019outils tels que LAPS (Local Admin\
          \ Password Solution) et des scanners de vuln\xE9rabilit\xE9s.\n\n*Outils\
          \ pour la mise en \u0153uvre*\n\nFen\xEAtres :\n\n- Console de gestion des\
          \ strat\xE9gies de groupe (GPMC) : Appliquer les politiques de mot de passe.\n\
          - Microsoft Local Administrator Password Solution (LAPS) : Imposer des mots\
          \ de passe administrateur uniques et al\xE9atoires.\n\nLinux/macOS :\n\n\
          - Modules PAM (pam_pwquality, pam_tally2, pam_faillock) : Appliquer les\
          \ r\xE8gles de mot de passe.\n- Lynis : Auditer les politiques de mot de\
          \ passe et les configurations syst\xE8me.\n\nMultiplateforme :\n\n- Gestionnaires\
          \ de mots de passe (Bitwarden, 1Password, KeePass) : G\xE9rer et faire respecter\
          \ les mots de passe forts.\n- API Have I Been Pwned : Emp\xEAcher l\u2019\
          utilisation de mots de passe viol\xE9s.\n- Outils conformes NIST SP 800-63B\
          \ : Appliquer les directives de mot de passe et la mise sur liste noire.\n\
          https://attack.mitre.org/mitigations/M1027"
  - urn: urn:intuitem:risk:function:mitre-attack:m1028
    ref_id: M1028
    name: Operating System Configuration
    category: technical
    csf_function: protect
    description: "Operating System Configuration involves adjusting system settings\
      \ and hardening the default configurations of an operating system (OS) to mitigate\
      \ adversary exploitation and prevent abuse of system functionality. Proper OS\
      \ configurations address security vulnerabilities, limit attack surfaces, and\
      \ ensure robust defense against a wide range of techniques. This mitigation\
      \ can be implemented through the following measures: \n\nDisable Unused Features:\n\
      \n- Turn off SMBv1, LLMNR, and NetBIOS where not needed.\n- Disable remote registry\
      \ and unnecessary services.\n\nEnforce OS-level Protections:\n\n- Enable Data\
      \ Execution Prevention (DEP), Address Space Layout Randomization (ASLR), and\
      \ Control Flow Guard (CFG) on Windows.\n- Use AppArmor or SELinux on Linux for\
      \ mandatory access controls.\n\nSecure Access Settings:\n\n- Enable User Account\
      \ Control (UAC) for Windows.\n- Restrict root/sudo access on Linux/macOS and\
      \ enforce strong permissions using sudoers files.\n\nFile System Hardening:\n\
      \n- Implement least-privilege access for critical files and system directories.\n\
      - Audit permissions regularly using tools like icacls (Windows) or getfacl/chmod\
      \ (Linux/macOS).\n\nSecure Remote Access:\n\n- Restrict RDP, SSH, and VNC to\
      \ authorized IPs using firewall rules.\n- Enable NLA for RDP and enforce strong\
      \ password/lockout policies.\n\nHarden Boot Configurations:\n\n- Enable Secure\
      \ Boot and enforce UEFI/BIOS password protection.\n- Use BitLocker or LUKS to\
      \ encrypt boot drives.\n\nRegular Audits:\n\n- Periodically audit OS configurations\
      \ using tools like CIS Benchmarks or SCAP tools.\n\n*Tools for Implementation*\n\
      \nWindows:\n\n- Microsoft Group Policy Objects (GPO): Centrally enforce OS security\
      \ settings.\n- Windows Defender Exploit Guard: Built-in OS protection against\
      \ exploits.\n- CIS-CAT Pro: Audit Windows security configurations based on CIS\
      \ Benchmarks.\n\nLinux/macOS:\n\n- AppArmor/SELinux: Enforce mandatory access\
      \ controls.\n- Lynis: Perform comprehensive security audits.\n- SCAP Security\
      \ Guide: Automate configuration hardening using Security Content Automation\
      \ Protocol.\n\nCross-Platform:\n\n- Ansible or Chef/Puppet: Automate configuration\
      \ hardening at scale.\n- OpenSCAP: Perform compliance and configuration checks.\n\
      https://attack.mitre.org/mitigations/M1028"
    translations:
      fr:
        name: "Configuration du syst\xE8me d\u2019exploitation"
        description: "La configuration du syst\xE8me d\u2019exploitation consiste\
          \ \xE0 ajuster les param\xE8tres du syst\xE8me et \xE0 renforcer les configurations\
          \ par d\xE9faut d\u2019un syst\xE8me d\u2019exploitation (OS) afin de r\xE9\
          duire l\u2019exploitation des adversaires et d\u2019\xE9viter tout abus\
          \ de la fonctionnalit\xE9 syst\xE8me. Des configurations appropri\xE9es\
          \ du syst\xE8me d\u2019exploitation r\xE9pondent aux vuln\xE9rabilit\xE9\
          s de s\xE9curit\xE9, limitent les surfaces d\u2019attaque et garantissent\
          \ une d\xE9fense robuste contre un large \xE9ventail de techniques. Cette\
          \ att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ : \n\nD\xE9sactivez les fonctionnalit\xE9s inutilis\xE9es :\n\n- D\xE9\
          sactiver SMBv1, LLMNR et NetBIOS lorsque cela n\u2019est pas n\xE9cessaire.\n\
          - D\xE9sactiver le registre \xE0 distance et les services inutiles.\n\n\
          Faire respecter les protections au niveau du syst\xE8me d\u2019exploitation\
          \ :\n\n- Activer la pr\xE9vention de l\u2019ex\xE9cution des donn\xE9es\
          \ (DEP), la randomisation de disposition de l\u2019espace d\u2019adressage\
          \ (ASLR) et la garde de flux de contr\xF4le (CFG) sur Windows.\n- Utiliser\
          \ AppArmor ou SELinux sous Linux pour les contr\xF4les d\u2019acc\xE8s obligatoires.\n\
          \nParam\xE8tres d\u2019acc\xE8s s\xE9curis\xE9 :\n\n- Activer le contr\xF4\
          le du compte utilisateur (UAC) pour Windows.\n- Restreindre l\u2019acc\xE8\
          s root/sudo sur Linux/macOS et imposer des permissions fortes \xE0 l\u2019\
          aide de fichiers sudoers.\n\nDurcissement du syst\xE8me de fichiers :\n\n\
          - Impl\xE9menter un acc\xE8s \xE0 privil\xE8ges minimes pour les fichiers\
          \ critiques et les r\xE9pertoires syst\xE8me.\n- Auditer r\xE9guli\xE8rement\
          \ les permissions en utilisant des outils comme icacls (Windows) ou getfacl/chmod\
          \ (Linux/macOS).\n\nAcc\xE8s \xE0 distance s\xE9curis\xE9 :\n\n- Restreindre\
          \ le RDP, SSH et VNC aux IP autoris\xE9es en utilisant les r\xE8gles de\
          \ pare-feu.\n- Activer NLA pour RDP et appliquer des politiques de mot de\
          \ passe et de verrouillage fortes.\n\nConfigurations de Harden Boot :\n\n\
          - Activer le Secure Boot et appliquer la protection par mot de passe UEFI/BIOS.\n\
          - Utiliser BitLocker ou LUKS pour chiffrer les disques de d\xE9marrage.\n\
          \nAudits r\xE9guliers :\n\n- Auditer p\xE9riodiquement les configurations\
          \ du syst\xE8me d\u2019exploitation \xE0 l\u2019aide d\u2019outils tels\
          \ que CIS Benchmarks ou SCAP.\n\n*Outils pour la mise en \u0153uvre*\n\n\
          Fen\xEAtres :\n\n- Microsoft Group Policy Objects (GPO) : Applique centralis\xE9\
          ment les param\xE8tres de s\xE9curit\xE9 du syst\xE8me d\u2019exploitation.\n\
          - Windows Defender Exploit Guard : Protection du syst\xE8me d\u2019exploitation\
          \ int\xE9gr\xE9e contre les exploits.\n- CIS-CAT Pro : Audit des configurations\
          \ de s\xE9curit\xE9 Windows bas\xE9es sur les benchmarks CIS.\n\nLinux/macOS\
          \ :\n\n- AppArmor/SELinux : Faire respecter les contr\xF4les d\u2019acc\xE8\
          s obligatoires.\n- Lynis : R\xE9aliser des audits de s\xE9curit\xE9 complets.\n\
          - SCAP Security Guide : Automatiser le renforcement de la configuration\
          \ \xE0 l\u2019aide du protocole d\u2019automatisation du contenu de s\xE9\
          curit\xE9.\n\nMultiplateforme :\n\n- Ansible ou Chef/Puppet : Automatiser\
          \ le durcissement de configuration \xE0 grande \xE9chelle.\n- OpenSCAP :\
          \ effectuer des v\xE9rifications de conformit\xE9 et de configuration.\n\
          https://attack.mitre.org/mitigations/M1028"
  - urn: urn:intuitem:risk:function:mitre-attack:m1029
    ref_id: M1029
    name: Remote Data Storage
    category: technical
    csf_function: protect
    description: "Remote Data Storage focuses on moving critical data, such as security\
      \ logs and sensitive files, to secure, off-host locations to minimize unauthorized\
      \ access, tampering, or destruction by adversaries. By leveraging remote storage\
      \ solutions, organizations enhance the protection of forensic evidence, sensitive\
      \ information, and monitoring data. This mitigation can be implemented through\
      \ the following measures:\n\nCentralized Log Management:\n\n- Configure endpoints\
      \ to forward security logs to a centralized log collector or SIEM.\n- Use tools\
      \ like Splunk Graylog, or Security Onion to aggregate and store logs.\n- Example\
      \ command (Linux): `sudo auditd | tee /var/log/audit/audit.log | nc <remote-log-server>\
      \ 514`\n\nRemote File Storage Solutions:\n\n- Utilize cloud storage solutions\
      \ like AWS S3, Google Cloud Storage, or Azure Blob Storage for sensitive data.\n\
      - Ensure proper encryption at rest and access control policies (IAM roles, ACLs).\n\
      \nIntrusion Detection Log Forwarding:\n\n- Forward logs from IDS/IPS systems\
      \ (e.g., Zeek/Suricata) to a remote security information system.\n- Example\
      \ for Suricata log forwarding:\n`outputs:\n  - type: syslog\n    protocol: tls\n\
      \    address: <remote-syslog-server>`\n\nImmutable Backup Configurations:\n\n\
      - Enable immutable storage settings for backups to prevent adversaries from\
      \ modifying or deleting data.\n- Example: AWS S3 Object Lock.\n\nData Encryption:\n\
      \n- Ensure encryption for sensitive data using AES-256 at rest and TLS 1.2+\
      \ for data in transit.\nTools: OpenSSL, BitLocker, LUKS for Linux.\nhttps://attack.mitre.org/mitigations/M1029"
    translations:
      fr:
        name: "Stockage de donn\xE9es \xE0 distance"
        description: "Le stockage de donn\xE9es \xE0 distance vise \xE0 d\xE9placer\
          \ des donn\xE9es critiques, telles que les journaux de s\xE9curit\xE9 et\
          \ les fichiers sensibles, vers des lieux s\xE9curis\xE9s hors h\xF4te afin\
          \ de minimiser les acc\xE8s non autoris\xE9s, les falsifications ou les\
          \ destructions par les adversaires. En tirant parti des solutions de stockage\
          \ \xE0 distance, les organisations renforcent la protection des preuves\
          \ m\xE9dico-l\xE9gales, des informations sensibles et des donn\xE9es de\
          \ surveillance. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par\
          \ les mesures suivantes :\n\nGestion centralis\xE9e des journaux :\n\n-\
          \ Configurer les terminaux pour transmettre les journaux de s\xE9curit\xE9\
          \ vers un collecteur de journaux centralis\xE9 ou SIEM.\n- Utiliser des\
          \ outils comme Splunk Graylog ou Security Onion pour agr\xE9ger et stocker\
          \ les journaux.\n- Exemple de commande (Linux) : 'sudo auditd | tee /var/log/audit/audit.log\
          \ | NC <remote-log-server> 514'\n\nSolutions de stockage de fichiers \xE0\
          \ distance :\n\n- Utiliser des solutions de stockage cloud telles qu\u2019\
          AWS S3, Google Cloud Storage ou Azure Blob Storage pour les donn\xE9es sensibles.\n\
          - Garantir des politiques de chiffrement au repos et de contr\xF4le d\u2019\
          acc\xE8s appropri\xE9es (r\xF4les IAM, ACL).\n\nRedirection des journaux\
          \ de d\xE9tection d\u2019intrusion :\n\n- Transf\xE9rer les journaux des\
          \ syst\xE8mes IDS/IPS (par exemple, Zeek/Suricata) vers un syst\xE8me d\u2019\
          information de s\xE9curit\xE9 distant.\n- Exemple pour le transfert de journal\
          \ Suricata :\n\xAB sorties :\n  - Type : syslog\n    Protocole : TLS\n \
          \   Adresse : <remote-syslog-server>'\n\nConfigurations de sauvegarde immuables\
          \ :\n\n- Activer les param\xE8tres de stockage immuables pour les sauvegardes\
          \ afin d\u2019emp\xEAcher les adversaires de modifier ou supprimer des donn\xE9\
          es.\n- Exemple : verrouillage d\u2019objet AWS S3.\n\nChiffrement des donn\xE9\
          es :\n\n- Garantir le chiffrement des donn\xE9es sensibles en utilisant\
          \ AES-256 au repos et TLS 1.2+ pour les donn\xE9es en transit.\nOutils :\
          \ OpenSSL, BitLocker, LUKS pour Linux.\nhttps://attack.mitre.org/mitigations/M1029"
  - urn: urn:intuitem:risk:function:mitre-attack:m1030
    ref_id: M1030
    name: Network Segmentation
    category: technical
    csf_function: protect
    description: 'Network segmentation involves dividing a network into smaller, isolated
      segments to control and limit the flow of traffic between devices, systems,
      and applications. By segmenting networks, organizations can reduce the attack
      surface, restrict lateral movement by adversaries, and protect critical assets
      from compromise.


      Effective network segmentation leverages a combination of physical boundaries,
      logical separation through VLANs, and access control policies enforced by network
      appliances like firewalls, routers, and cloud-based configurations. This mitigation
      can be implemented through the following measures:


      Segment Critical Systems:


      - Identify and group systems based on their function, sensitivity, and risk.
      Examples include payment systems, HR databases, production systems, and internet-facing
      servers.

      - Use VLANs, firewalls, or routers to enforce logical separation.


      Implement DMZ for Public-Facing Services:


      - Host web servers, DNS servers, and email servers in a DMZ to limit their access
      to internal systems.

      - Apply strict firewall rules to filter traffic between the DMZ and internal
      networks.


      Use Cloud-Based Segmentation:


      - In cloud environments, use VPCs, subnets, and security groups to isolate applications
      and enforce traffic rules.

      - Apply AWS Transit Gateway or Azure VNet peering for controlled connectivity
      between cloud segments.


      Apply Microsegmentation for Workloads:


      - Use software-defined networking (SDN) tools to implement workload-level segmentation
      and prevent lateral movement.


      Restrict Traffic with ACLs and Firewalls:


      - Apply Access Control Lists (ACLs) to network devices to enforce "deny by default"
      policies.

      - Use firewalls to restrict both north-south (external-internal) and east-west
      (internal-internal) traffic.


      Monitor and Audit Segmented Networks:


      - Regularly review firewall rules, ACLs, and segmentation policies.

      - Monitor network flows for anomalies to ensure segmentation is effective.


      Test Segmentation Effectiveness:


      - Perform periodic penetration tests to verify that unauthorized access is blocked
      between network segments.

      https://attack.mitre.org/mitigations/M1030'
    translations:
      fr:
        name: "Segmentation du r\xE9seau"
        description: "La segmentation r\xE9seau consiste \xE0 diviser un r\xE9seau\
          \ en segments plus petits et isol\xE9s afin de contr\xF4ler et limiter le\
          \ flux de trafic entre appareils, syst\xE8mes et applications. En segmentant\
          \ les r\xE9seaux, les organisations peuvent r\xE9duire la surface d\u2019\
          attaque, restreindre les d\xE9placements lat\xE9raux des adversaires et\
          \ prot\xE9ger les actifs critiques contre toute compromission.\n\nLa segmentation\
          \ efficace du r\xE9seau exploite une combinaison de fronti\xE8res physiques,\
          \ de s\xE9paration logique via VLANs et de politiques de contr\xF4le d\u2019\
          acc\xE8s appliqu\xE9es par des appliances r\xE9seau telles que les pare-feux,\
          \ routeurs et configurations cloud. Cette att\xE9nuation peut \xEAtre mise\
          \ en \u0153uvre par les mesures suivantes :\n\nSyst\xE8mes critiques de\
          \ segment :\n\n- Identifier et regrouper les syst\xE8mes en fonction de\
          \ leur fonction, de leur sensibilit\xE9 et de leur risque. Parmi les exemples\
          \ figurent les syst\xE8mes de paiement, les bases de donn\xE9es RH, les\
          \ syst\xE8mes de production et les serveurs connect\xE9s \xE0 Internet.\n\
          - Utiliser des VLAN, des pare-feux ou des routeurs pour imposer une s\xE9\
          paration logique.\n\nMettre en place la DMZ pour les services en contact\
          \ avec le public :\n\n- H\xE9berger des serveurs web, DNS et e-mails dans\
          \ une DMZ afin de limiter leur acc\xE8s aux syst\xE8mes internes.\n- Appliquer\
          \ des r\xE8gles strictes de pare-feu pour filtrer le trafic entre la DMZ\
          \ et les r\xE9seaux internes.\n\nUtilisez la segmentation bas\xE9e sur le\
          \ cloud :\n\n- Dans les environnements cloud, utilisez des VPC, des sous-r\xE9\
          seaux et des groupes de s\xE9curit\xE9 pour isoler les applications et appliquer\
          \ les r\xE8gles de circulation.\n- Appliquer AWS Transit Gateway ou Azure\
          \ VNet peering pour une connectivit\xE9 contr\xF4l\xE9e entre segments cloud.\n\
          \nAppliquer la microsegmentation pour les charges de travail :\n\n- Utiliser\
          \ des outils de r\xE9seautage d\xE9fini par logiciel (SDN) pour mettre en\
          \ \u0153uvre la segmentation au niveau de la charge de travail et pr\xE9\
          venir les mouvements lat\xE9raux.\n\nRestreindre le trafic avec des ACL\
          \ et des pare-feux :\n\n- Appliquer des listes de contr\xF4le d\u2019acc\xE8\
          s (ACL) aux dispositifs r\xE9seau pour appliquer des politiques de \xAB\
          \ refus par d\xE9faut \xBB.\n- Utiliser des pare-feux pour restreindre \xE0\
          \ la fois le trafic nord-sud (externe-interne) et est-ouest (interne-interne).\n\
          \nSurveiller et auditer les r\xE9seaux segment\xE9s :\n\n- R\xE9viser r\xE9\
          guli\xE8rement les r\xE8gles de pare-feu, les ACL et les politiques de segmentation.\n\
          - Surveiller les flux r\xE9seau pour d\xE9tecter des anomalies afin de garantir\
          \ l\u2019efficacit\xE9 de la segmentation.\n\nEfficacit\xE9 de la segmentation\
          \ des tests :\n\n- Effectuer des tests d\u2019intrusion p\xE9riodiques pour\
          \ v\xE9rifier que l\u2019acc\xE8s non autoris\xE9 est bloqu\xE9 entre les\
          \ segments du r\xE9seau.\nhttps://attack.mitre.org/mitigations/M1030"
  - urn: urn:intuitem:risk:function:mitre-attack:m1031
