    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      assessable: false
      depth: 1
      ref_id: ANNEX
      name: "INFORMATION SECURITY \u2013 ORGANISATION REQUIREMENTS"
      translations:
        fr:
          name: "S\xC9CURIT\xC9 DE L\u2019INFORMATION \u2014 EXIGENCES APPLICABLES\
            \ \xC0 L\u2019ORGANISME"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.100
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.100
      name: Scope
      translations:
        fr:
          name: "Champ d\u2019application"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.100
      description: This Part establishes the requirements to be met by the organisations
        referred to in Article 2 of this Regulation.
      translations:
        fr:
          description: "La pr\xE9sente partie \xE9tablit les exigences auxquelles\
            \ doivent satisfaire les organismes vis\xE9s \xE0 l\u2019article 2 du\
            \ pr\xE9sent r\xE8glement."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.200
      name: Information security management system (ISMS)
      translations:
        fr:
          name: "Syst\xE8me de gestion de la s\xE9curit\xE9 de l\u2019information\
            \ (SGSI)"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      ref_id: IS.D.OR.200-a
      description: 'In order to achieve the objectives set out in Article 1, the organisation
        shall set up, implement and maintain an information security management system
        (ISMS) which ensures that the organisation:'
      translations:
        fr:
          description: "Afin d\u2019atteindre les objectifs \xE9nonc\xE9s \xE0 l\u2019\
            article 1er, l\u2019organisme doit \xE9tablir, mettre en \u0153uvre et\
            \ tenir \xE0 jour un syst\xE8me de gestion de la s\xE9curit\xE9 de l\u2019\
            information (SGSI) qui garantit que l\u2019organisme:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.1
      description: establishes a policy on information security setting out the overall
        principles of the organisation with regard to the potential impact of information
        security risks on aviation safety;
      translations:
        fr:
          description: "met en place une politique en mati\xE8re de s\xE9curit\xE9\
            \ de l\u2019information d\xE9finissant les principes g\xE9n\xE9raux de\
            \ l\u2019organisme en ce qui concerne l\u2019incidence potentielle des\
            \ risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information sur la\
            \ s\xE9curit\xE9 a\xE9rienne;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.2
      description: identifies and reviews information security risks in accordance
        with point IS.D.OR.205;
      translations:
        fr:
          description: "recense et analyse les risques li\xE9s \xE0 la s\xE9curit\xE9\
            \ de l\u2019information conform\xE9ment au point IS.D.OR.205;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.3
      description: defines and implements information security risk treatment measures
        in accordance with point IS.D.OR.210;
      translations:
        fr:
          description: "d\xE9finit et met en \u0153uvre des mesures de traitement\
            \ des risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information conform\xE9\
            ment au point IS.D.OR.210;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.4
      description: implements an information security internal reporting scheme in
        accordance with point IS.D.OR.215;
      translations:
        fr:
          description: "met en \u0153uvre un syst\xE8me de comptes rendus interne\
            \ en mati\xE8re de s\xE9curit\xE9 de l\u2019information conform\xE9ment\
            \ au point IS.D.OR.215;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.5
      description: defines and implements, in accordance with point IS.D.OR.220, the
        measures required to detect information security events, identifies those
        events which are considered incidents with a potential impact on aviation
        safety, and responds to, and recovers from, those information security incidents;
      translations:
        fr:
          description: "d\xE9finit et met en \u0153uvre, conform\xE9ment au point\
            \ IS.D.OR.220, les mesures requises pour d\xE9tecter les \xE9v\xE9nements\
            \ li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information, recense les \xE9\
            v\xE9nements qui sont consid\xE9r\xE9s comme des incidents susceptibles\
            \ d\u2019avoir des r\xE9percussions sur la s\xE9curit\xE9 a\xE9rienne,\
            \ r\xE9agit \xE0 ces incidents de s\xE9curit\xE9 de l\u2019information\
            \ et garantit le r\xE9tablissement apr\xE8s incident;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.6
      description: implements the measures that have been notified by the competent
        authority as an immediate reaction to an information security incident or
        vulnerability with an impact on aviation safety;
      translations:
        fr:
          description: "met en \u0153uvre les mesures qui ont \xE9t\xE9 notifi\xE9\
            es par l\u2019autorit\xE9 comp\xE9tente en r\xE9action imm\xE9diate \xE0\
            \ un incident de s\xE9curit\xE9 de l\u2019information ou \xE0 une vuln\xE9\
            rabilit\xE9 ayant une incidence sur la s\xE9curit\xE9 a\xE9rienne;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.7
      description: takes appropriate action, in accordance with point IS.D.OR.225,
        to address findings notified by the competent authority;
      translations:
        fr:
          description: "prend les mesures qui s\u2019imposent, conform\xE9ment au\
            \ point IS.D.OR.225, pour rem\xE9dier aux constatations notifi\xE9es par\
            \ l\u2019autorit\xE9 comp\xE9tente;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.8
      description: implements an external reporting scheme in accordance with point
        IS.D.OR.230 in order to enable the competent authority to take appropriate
        actions;
      translations:
        fr:
          description: "met en \u0153uvre un syst\xE8me de comptes rendus externe\
            \ conform\xE9ment au point IS.D.OR.230 pour permettre \xE0 l\u2019autorit\xE9\
            \ comp\xE9tente de prendre les mesures qui s\u2019imposent;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.9
      description: complies with the requirements contained in point IS.D.OR.235 when
        contracting any part of the activities referred to in point IS.D.OR.200 to
        other organisations;
      translations:
        fr:
          description: "satisfait aux exigences \xE9nonc\xE9es au point IS.D.OR.235\
            \ lorsqu\u2019il sous-traite une partie des activit\xE9s vis\xE9es au\
            \ point IS.D.OR.200 \xE0 d\u2019autres organismes;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.10
      description: complies with the personnel requirements laid down in point IS.D.OR.240;
      translations:
        fr:
          description: "satisfait aux exigences en mati\xE8re de personnel \xE9nonc\xE9\
            es au point IS.D.OR.240;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.11
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.11
      description: complies with the record-keeping requirements laid down in point
        IS.D.OR.245;
      translations:
        fr:
          description: "satisfait aux exigences en mati\xE8re d\u2019archivage \xE9\
            nonc\xE9es au point IS.D.OR.245;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.12
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.12
      description: monitors compliance of the organisation with the requirements of
        this Regulation and provides feedback on findings to the accountable manager
        or, in the case of design organisations, to the head of the design organisation,
        in order to ensure effective implementation of corrective actions;
      translations:
        fr:
          description: "v\xE9rifie que l\u2019organisme respecte les exigences du\
            \ pr\xE9sent r\xE8glement et fournit un retour d\u2019information sur\
            \ les constatations au dirigeant responsable ou, dans le cas des organismes\
            \ de conception, au responsable de l\u2019organisme de conception, afin\
            \ de garantir la mise en \u0153uvre effective des mesures correctives;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a.13
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-a
      ref_id: IS.D.OR.200-a.13
      description: protects, without prejudice to applicable incident reporting requirements,
        the confidentiality of any information that the organisation may have received
        from other organisations, according to its level of sensitivity.
      translations:
        fr:
          description: "prot\xE8ge, sans pr\xE9judice des exigences applicables en\
            \ mati\xE8re de comptes rendus des incidents, la confidentialit\xE9 de\
            \ toute information que l\u2019organisme aurait re\xE7ue d\u2019autres\
            \ organismes, en fonction de son niveau de sensibilit\xE9."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      ref_id: IS.D.OR.200-b
      description: In order to continuously meet the requirements referred to in Article
        1, the organisation shall implement a continuous improvement process in accordance
        with point IS.D.OR.260.
      translations:
        fr:
          description: "Afin de satisfaire en permanence aux exigences vis\xE9es \xE0\
            \ l\u2019article 1er, l\u2019organisme doit mettre en \u0153uvre un processus\
            \ d\u2019am\xE9lioration constante conform\xE9ment au point IS.D.OR.260."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      ref_id: IS.D.OR.200-c
      description: The organisation shall document, in accordance with point IS.D.OR.250,
        all key processes, procedures, roles and responsibilities required to comply
        with point IS.D.OR.200(a) and establish a process for amending that documentation.
        Changes to those processes, procedures, roles and responsibilities shall be
        managed in accordance with point IS.D.OR.255.
      translations:
        fr:
          description: "L\u2019organisme doit documenter, conform\xE9ment au point\
            \ IS.D.OR.250, tous les processus, proc\xE9dures, r\xF4les et responsabilit\xE9\
            s cl\xE9s requis pour se conformer au point IS.D.OR.200 a) et \xE9tablir\
            \ un processus de modification de cette documentation. Les modifications\
            \ apport\xE9es \xE0 ces processus, proc\xE9dures, r\xF4les et responsabilit\xE9\
            s doivent \xEAtre g\xE9r\xE9es conform\xE9ment au point IS.D.OR.255."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-d
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      ref_id: IS.D.OR.200-d
      description: The processes, procedures, roles and responsibilities established
        by the organisation in order to comply with point IS.D.OR.200(a) shall correspond
        to the nature and complexity of its activities, based on an assessment of
        the information security risks inherent to those activities, and may be integrated
        within other existing management systems already implemented by the organisation.
      translations:
        fr:
          description: "Les processus, proc\xE9dures, r\xF4les et responsabilit\xE9\
            s \xE9tablis par l\u2019organisme pour se conformer au point IS.D.OR.200\
            \ a) doivent correspondre \xE0 la nature et \xE0 la complexit\xE9 de ses\
            \ activit\xE9s, sur la base d\u2019une \xE9valuation des risques li\xE9\
            s \xE0 la s\xE9curit\xE9 de l\u2019information inh\xE9rents \xE0 ces activit\xE9\
            s, et peuvent \xEAtre int\xE9gr\xE9s dans d\u2019autres syst\xE8mes de\
            \ gestion existants d\xE9j\xE0 mis en \u0153uvre par l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200-e
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      ref_id: IS.D.OR.200-e
      description: Without prejudice to the obligation to comply with the reporting
        requirements contained in Regulation (EU) No 376/2014 of the European Parliament
        and of the Council ( 2 ) and the requirements of point IS.D.OR.200 (a) (13),
        the organisation may be granted approval by the competent authority not to
        implement the requirements referred to in points (a) to (d)) and the related
        requirements contained in points IS.D.OR.205 through IS.D.OR.260, if it demonstrates
        to the satisfaction of that authority that its activities, facilities and
        resources, as well as the services it operates, provides, receives and maintains,
        do not pose any information security risks with a potential impact on aviation
        safety neither to itself nor to other organisations. The approval shall be
        based on a documented information security risk assessment carried out by
        the organisation or a third party in accordance with point IS.D.OR.205 and
        reviewed and approved by its competent authority.
      translations:
        fr:
          description: "Sans pr\xE9judice de l\u2019obligation de se conformer aux\
            \ exigences en mati\xE8re de comptes rendus \xE9nonc\xE9es dans le r\xE8\
            glement (UE) no 376/2014 du Parlement europ\xE9en et du Conseil ( 2 )\
            \ et aux exigences du point IS.D.OR.200 a), point 13), l\u2019organisme\
            \ peut recevoir l\u2019autorisation de l\u2019autorit\xE9 comp\xE9tente\
            \ de ne pas mettre en \u0153uvre les exigences vis\xE9es aux points a)\
            \ \xE0 d) et les exigences connexes \xE9nonc\xE9es aux points IS.D.OR.205\
            \ \xE0 IS.D.OR.260 s\u2019il d\xE9montre \xE0 la satisfaction de cette\
            \ autorit\xE9 que ses activit\xE9s, ses installations et ses ressources,\
            \ ainsi que les services qu\u2019il exploite, fournit, re\xE7oit et g\xE8\
            re ne pr\xE9sentent aucun risque en mati\xE8re de s\xE9curit\xE9 de l\u2019\
            information susceptible d\u2019avoir une incidence sur la s\xE9curit\xE9\
            \ a\xE9rienne, ni pour lui-m\xEAme ni pour d\u2019autres organismes. L\u2019\
            autorisation doit reposer sur une \xE9valuation document\xE9e des risques\
            \ li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information effectu\xE9e par\
            \ l\u2019organisme ou un tiers conform\xE9ment au point IS.D.OR.205 et\
            \ examin\xE9e et approuv\xE9e par son autorit\xE9 comp\xE9tente."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.200
      description: The continued validity of that approval will be reviewed by the
        competent authority following the applicable oversight audit cycle and whenever
        changes are implemented in the scope of work of the organisation.
      translations:
        fr:
          description: "L\u2019autorit\xE9 comp\xE9tente examinera le maintien de\
            \ la validit\xE9 de cette autorisation \xE0 l\u2019issue du cycle d\u2019\
            audit de supervision applicable et chaque fois que des modifications sont\
            \ mises en \u0153uvre dans le cadre des travaux de l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.205
      name: Information security risk assessment
      translations:
        fr:
          name: "\xC9valuation des risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019\
            information"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-a
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      ref_id: IS.D.OR.205-a
      description: 'The organisation shall identify all of its elements, which could
        be exposed to information security risks. That shall include:'
      translations:
        fr:
          description: "L\u2019organisme doit recenser tous ceux de ses \xE9l\xE9\
            ments qui sont susceptibles d\u2019\xEAtre expos\xE9s \xE0 des risques\
            \ li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information. Il s\u2019agit\
            \ notamment des \xE9l\xE9ments suivants:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-a
      ref_id: IS.D.OR.205-a.1
      description: "the organisation\u2019s activities, facilities and resources,\
        \ as well as the services the organisation operates, provides, receives or\
        \ maintains;"
      translations:
        fr:
          description: "les activit\xE9s, installations et ressources de l\u2019organisme,\
            \ ainsi que les services qu\u2019il exploite, fournit, re\xE7oit ou g\xE8\
            re;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-a
      ref_id: IS.D.OR.205-a.2
      description: the equipment, systems, data and information that contribute to
        the functioning of the elements listed in point (1).
      translations:
        fr:
          description: "les \xE9quipements, syst\xE8mes, donn\xE9es et informations\
            \ qui contribuent au fonctionnement des \xE9l\xE9ments \xE9num\xE9r\xE9\
            s au point 1)."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      ref_id: IS.D.OR.205-b
      description: The organisation shall identify the interfaces that it has with
        other organisations, and which could result in the mutual exposure to information
        security risks.
      translations:
        fr:
          description: "L\u2019organisme doit d\xE9terminer les interfaces qu\u2019\
            il partage avec d\u2019autres organismes et qui pourraient entra\xEEner\
            \ une exposition mutuelle \xE0 des risques li\xE9s \xE0 la s\xE9curit\xE9\
            \ de l\u2019information."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      ref_id: IS.D.OR.205-c
      description: 'With regard to the elements and interfaces referred to in points
        (a) and (b), the organisation shall identify the information security risks
        which may have a potential impact on aviation safety. For each identified
        risk, the organisation shall:'
      translations:
        fr:
          description: "En ce qui concerne les \xE9l\xE9ments et interfaces vis\xE9\
            s aux points a) et b), l\u2019organisme doit recenser les risques li\xE9\
            s \xE0 la s\xE9curit\xE9 de l\u2019information qui pourraient avoir une\
            \ incidence sur la s\xE9curit\xE9 a\xE9rienne. Pour chaque risque recens\xE9\
            , l\u2019organisme doit:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-c.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-c
      ref_id: IS.D.OR.205-c.1
      description: assign a risk level according to a predefined classification established
        by the organisation;
      translations:
        fr:
          description: "attribuer un niveau de risque selon une classification pr\xE9\
            d\xE9finie qu\u2019il a \xE9tablie;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-c.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-c
      ref_id: IS.D.OR.205-c.2
      description: associate each risk and its level with the corresponding element
        or interface identified in accordance with points (a) and (b).
      translations:
        fr:
          description: "associer chaque risque et son niveau \xE0 l\u2019\xE9l\xE9\
            ment ou \xE0 l\u2019interface correspondant(e) d\xE9termin\xE9(e) conform\xE9\
            ment aux points a) et b)."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node33
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      description: The predefined classification referred to in point (1) shall take
        into account the potential of occurrence of the threat scenario and the severity
        of its safety consequences. Based on that classification, and taking into
        account whether the organisation has a structured and repeatable risk management
        process for operations, the organisation shall be able to establish whether
        the risk is acceptable or needs to be treated in accordance with point IS.D.OR.210.
      translations:
        fr:
          description: "La classification pr\xE9d\xE9finie vis\xE9e au point 1) doit\
            \ tenir compte du risque de r\xE9alisation du sc\xE9nario de menace et\
            \ de la gravit\xE9 de ses cons\xE9quences pour la s\xE9curit\xE9. Sur\
            \ la base de cette classification, et compte tenu du fait que l\u2019\
            organisme dispose ou non d\u2019un processus de gestion des risques structur\xE9\
            \ et reproductible pour les op\xE9rations, l\u2019organisme doit \xEA\
            tre en mesure d\u2019\xE9tablir si le risque est acceptable ou s\u2019\
            il doit \xEAtre trait\xE9 conform\xE9ment au point IS.D.OR.210."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node34
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      description: In order to facilitate the mutual comparability of risks assessments,
        the assignment of the risk level pursuant to point (1) shall take into account
        relevant information acquired in coordination with the organisations referred
        to in point (b).
      translations:
        fr:
          description: "Afin de faciliter la comparabilit\xE9 des \xE9valuations des\
            \ risques, l\u2019attribution du niveau de risque conform\xE9ment au point\
            \ 1) doit tenir compte des informations pertinentes obtenues en coordination\
            \ avec les organismes vis\xE9s au point b)."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205
      ref_id: IS.D.OR.205-d
      description: 'The organisation shall review and update the risk assessment carried
        out in accordance with points (a), (b) and (c) in any of the following situations:'
      translations:
        fr:
          description: "L\u2019organisme examine et met \xE0 jour l\u2019\xE9valuation\
            \ des risques effectu\xE9e conform\xE9ment aux points a), b) et c) dans\
            \ l\u2019une des situations suivantes:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d
      ref_id: IS.D.OR.205-d.1
      description: there is a change in the elements subject to information security
        risks;
      translations:
        fr:
          description: "il y a un changement dans les \xE9l\xE9ments expos\xE9s \xE0\
            \ des risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d
      ref_id: IS.D.OR.205-d.2
      description: there is a change in the interfaces between the organisation and
        other organisations, or in the risks communicated by the other organisations;
      translations:
        fr:
          description: "il y a un changement dans les interfaces entre l\u2019organisme\
            \ et d\u2019autres organismes, ou dans les risques communiqu\xE9s par\
            \ les autres organismes;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d
      ref_id: IS.D.OR.205-d.3
      description: there is a change in the information or knowledge used for the
        identification, analysis and classification of risks;
      translations:
        fr:
          description: "il y a un changement dans les informations ou connaissances\
            \ utilis\xE9es pour le recensement, l\u2019analyse et la classification\
            \ des risques;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.205-d
      ref_id: IS.D.OR.205-d.4
      description: there are lessons learnt from the analysis of information security
        incidents.
      translations:
        fr:
          description: "l\u2019analyse des incidents de s\xE9curit\xE9 de l\u2019\
            information a permis de tirer des enseignements."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.210
      name: Information security risk treatment
      translations:
        fr:
          name: "Traitement des risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019\
            information"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210
      ref_id: IS.D.OR.210-a
      description: 'The organisation shall develop measures to address unacceptable
        risks identified in accordance with point IS.D.OR.205, implement them in a
        timely manner and check their continued effectiveness. Those measures shall
        enable the organisation to:'
      translations:
        fr:
          description: "L\u2019organisme doit \xE9laborer des mesures pour faire face\
            \ aux risques inacceptables recens\xE9s conform\xE9ment au point IS.D.OR.205,\
            \ les mettre en \u0153uvre en temps utile et v\xE9rifier le maintien de\
            \ leur efficacit\xE9. Ces mesures doivent permettre \xE0 l\u2019organisme:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a
      ref_id: IS.D.OR.210-a.1
      description: control the circumstances that contribute to the effective occurrence
        of the threat scenario;
      translations:
        fr:
          description: "de contr\xF4ler les circonstances qui contribuent \xE0 la\
            \ r\xE9alisation effective du sc\xE9nario de menace;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a
      ref_id: IS.D.OR.210-a.2
      description: reduce the consequences on aviation safety associated with the
        materialisation of the threat scenario;
      translations:
        fr:
          description: "de diminuer les cons\xE9quences sur la s\xE9curit\xE9 a\xE9\
            rienne li\xE9es \xE0 la concr\xE9tisation du sc\xE9nario de menace;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a
      ref_id: IS.D.OR.210-a.3
      description: avoid the risks.
      translations:
        fr:
          description: "d\u2019\xE9viter les risques."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node45
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-a
      description: Those measures shall not introduce any new potential unacceptable
        risks to aviation safety.
      translations:
        fr:
          description: "Ces mesures ne doivent pas introduire de nouveaux risques\
            \ potentiels inacceptables pour la s\xE9curit\xE9 a\xE9rienne."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210
      ref_id: IS.D.OR.210-b
      description: The person referred to in point IS.D.OR.240 (a) and (b) and other
        affected personnel of the organisation shall be informed of the outcome of
        the risk assessment carried out in accordance with point IS.D.OR.205, the
        corresponding threat scenarios and the measures to be implemented.
      translations:
        fr:
          description: "La personne vis\xE9e aux points IS.D.OR.240 a) et b), et les\
            \ autres membres du personnel de l\u2019organisme concern\xE9s doivent\
            \ \xEAtre inform\xE9s des r\xE9sultats de l\u2019\xE9valuation des risques\
            \ effectu\xE9e conform\xE9ment au point IS.D.OR.205, des sc\xE9narios\
            \ de menace correspondants et des mesures \xE0 mettre en \u0153uvre."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node47
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.210
      description: The organisation shall also inform organisations with which it
        has an interface in accordance with point IS.D.OR.205(b) of any risk shared
        between both organisations.
      translations:
        fr:
          description: "L\u2019organisme doit \xE9galement informer les organismes\
            \ avec lesquels il partage une interface conform\xE9ment au point IS.D.OR.205\
            \ b) de tout risque commun \xE0 tous les organismes."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.215
      name: Information security internal reporting scheme
      translations:
        fr:
          name: "Syst\xE8me de comptes rendus interne en mati\xE8re de s\xE9curit\xE9\
            \ de l\u2019information"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215
      ref_id: IS.D.OR.215-a
      description: The organisation shall establish an internal reporting scheme to
        enable the collection and evaluation of information security events, including
        those to be reported pursuant to point IS.D.OR.230.
      translations:
        fr:
          description: "L\u2019organisme \xE9tablit un syst\xE8me de comptes rendus\
            \ interne permettant le recensement et l\u2019\xE9valuation des \xE9v\xE9\
            nements li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information, y compris\
            \ ceux qui doivent \xEAtre signal\xE9s conform\xE9ment au point IS.D.OR.230."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215
      ref_id: IS.D.OR.215-b
      description: 'That scheme and the process referred to in point IS.D.OR.220 shall
        enable the organisation to:'
      translations:
        fr:
          description: "Ce syst\xE8me et la proc\xE9dure vis\xE9e au point IS.D.OR.220\
            \ doivent permettre \xE0 l\u2019organisme:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b
      ref_id: IS.D.OR.215-b.1
      description: identify which of the events reported pursuant to point (a) are
        considered information security incidents or vulnerabilities with a potential
        impact on aviation safety;
      translations:
        fr:
          description: "de recenser les \xE9v\xE9nements signal\xE9s conform\xE9ment\
            \ au point a) qui sont consid\xE9r\xE9s comme des incidents de s\xE9curit\xE9\
            \ de l\u2019information ou des vuln\xE9rabilit\xE9s susceptibles d\u2019\
            avoir une incidence sur la s\xE9curit\xE9 a\xE9rienne;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b
      ref_id: IS.D.OR.215-b.2
      description: identify the causes of, and contributing factors to, the information
        security incidents and vulnerabilities identified in accordance with point
        (1), and address them as part of the information security risk management
        process in accordance with points IS.D.OR.205 and IS.D.OR.220;
      translations:
        fr:
          description: "de d\xE9terminer les causes des incidents de s\xE9curit\xE9\
            \ de l\u2019information et des vuln\xE9rabilit\xE9s recens\xE9s conform\xE9\
            ment au point 1) et les facteurs qui y contribuent, et de les traiter\
            \ dans le cadre du processus de gestion des risques li\xE9s \xE0 la s\xE9\
            curit\xE9 de l\u2019information conform\xE9ment aux points IS.D.OR.205\
            \ et IS.D.OR.220;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b
      ref_id: IS.D.OR.215-b.3
      description: ensure an evaluation of all known, relevant information relating
        to the information security incidents and vulnerabilities identified in accordance
        with point (1);
      translations:
        fr:
          description: "de proc\xE9der \xE0 une \xE9valuation de toutes les informations\
            \ connues et pertinentes relatives aux incidents de s\xE9curit\xE9 de\
            \ l\u2019information et aux vuln\xE9rabilit\xE9s recens\xE9s conform\xE9\
            ment au point 1);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-b
      ref_id: IS.D.OR.215-b.4
      description: ensure the implementation of a method to distribute internally
        the information as necessary.
      translations:
        fr:
          description: "de veiller \xE0 la mise en \u0153uvre d\u2019une m\xE9thode\
            \ de diffusion des informations en interne, en tant que de besoin."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215
      ref_id: IS.D.OR.215-c
      description: Any contracted organisation which may expose the organisation to
        information security risks with a potential impact on aviation safety shall
        be required to report information security events to the organisation. Those
        reports shall be submitted using the procedures established in the specific
        contractual arrangements and shall be evaluated in accordance with point (b).
      translations:
        fr:
          description: "Tout organisme sous-traitant susceptible d\u2019exposer l\u2019\
            organisme \xE0 des risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information\
            \ pouvant avoir une incidence sur la s\xE9curit\xE9 a\xE9rienne est tenu\
            \ de lui rendre compte des \xE9v\xE9nements li\xE9s \xE0 la s\xE9curit\xE9\
            \ de l\u2019information. Ces comptes rendus doivent \xEAtre soumis selon\
            \ les proc\xE9dures \xE9tablies dans les arrangements contractuels sp\xE9\
            cifiques et \xEAtre \xE9valu\xE9s conform\xE9ment au point b)."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-d
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215
      ref_id: IS.D.OR.215-d
      description: The organisation shall cooperate on investigations with any other
        organisation that has a significant contribution to the information security
        of its own activities.
      translations:
        fr:
          description: "L\u2019organisme doit coop\xE9rer dans le cadre des enqu\xEA\
            tes avec tout autre organisme qui a contribu\xE9 de mani\xE8re significative\
            \ \xE0 la s\xE9curit\xE9 de l\u2019information dans le cadre de ses propres\
            \ activit\xE9s."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215-e
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.215
      ref_id: IS.D.OR.215-e
      description: The organisation may integrate that reporting scheme with other
        reporting schemes it has already implemented.
      translations:
        fr:
          description: "L\u2019organisme peut int\xE9grer ce syst\xE8me de comptes\
            \ rendus \xE0 d\u2019autres syst\xE8mes de comptes rendus qu\u2019il a\
            \ d\xE9j\xE0 mis en \u0153uvre."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.220
      name: "Information security incidents \u2013 detection, response and recovery"
      translations:
        fr:
          name: "Incidents de s\xE9curit\xE9 de l\u2019information \u2014 d\xE9tection,\
            \ r\xE9action et r\xE9tablissement"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220
      ref_id: IS.D.OR.220-a
      description: 'Based on the outcome of the risk assessment carried out in accordance
        with point IS.D.OR.205 and the outcome of the risk treatment performed in
        accordance with point IS.D.OR.210, the organisation shall implement measures
        to detect incidents and vulnerabilities that indicate the potential materialisation
        of unacceptable risks and which may have a potential impact on aviation safety.
        Those detection measures shall enable the organisation to:'
      translations:
        fr:
          description: "Sur la base des r\xE9sultats de l\u2019\xE9valuation des risques\
            \ effectu\xE9e conform\xE9ment au point IS.D.OR.205 et des r\xE9sultats\
            \ du traitement des risques effectu\xE9 conform\xE9ment au point IS.D.OR.210,\
            \ l\u2019organisme doit mettre en \u0153uvre des mesures pour d\xE9tecter\
            \ les incidents et les vuln\xE9rabilit\xE9s qui indiquent une possible\
            \ concr\xE9tisation de risques inacceptables et qui peuvent avoir une\
            \ incidence potentielle sur la s\xE9curit\xE9 a\xE9rienne. Ces mesures\
            \ de d\xE9tection doivent permettre \xE0 l\u2019organisme:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-a
      ref_id: IS.D.OR.220-a.1
      description: identify deviations from predetermined functional performance baselines;
      translations:
        fr:
          description: "de recenser les \xE9carts par rapport aux valeurs de base\
            \ pr\xE9d\xE9termin\xE9es en mati\xE8re de performances fonctionnelles;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-a
      ref_id: IS.D.OR.220-a.2
      description: trigger warnings to activate proper response measures, in case
        of any deviation.
      translations:
        fr:
          description: "de d\xE9clencher des signaux d\u2019avertissement pour activer\
            \ les mesures de r\xE9action appropri\xE9es, en cas d\u2019\xE9cart."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220
      ref_id: IS.D.OR.220-b
      description: 'The organisation shall implement measures to respond to any event
        conditions identified in accordance with point (a) that may develop or have
        developed into an information security incident. Those response measures shall
        enable the organisation to:'
      translations:
        fr:
          description: "L\u2019organisme doit mettre en \u0153uvre des mesures pour\
            \ r\xE9agir \xE0 tout \xE9v\xE9nement recens\xE9 conform\xE9ment au point\
            \ a) qui peut se transformer ou s\u2019est transform\xE9 en incident de\
            \ s\xE9curit\xE9 de l\u2019information. Ces mesures de r\xE9action doivent\
            \ permettre \xE0 l\u2019organisme:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b
      ref_id: IS.D.OR.220-b.1
      description: initiate the reaction to the warnings referred to in point (a)(2)
        by activating predefined resources and course of actions;
      translations:
        fr:
          description: "de d\xE9clencher la r\xE9action aux signaux d\u2019avertissement\
            \ vis\xE9s au point a) 2) en activant des ressources et des actions pr\xE9\
            d\xE9finies;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b
      ref_id: IS.D.OR.220-b.2
      description: contain the spread of an attack and avoid the full materialisation
        of a threat scenario;
      translations:
        fr:
          description: "de contenir la propagation d\u2019une attaque et d\u2019\xE9\
            viter la pleine concr\xE9tisation d\u2019un sc\xE9nario de menace;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-b
      ref_id: IS.D.OR.220-b.3
      description: control the failure mode of the affected elements defined in point
        IS.D.OR.205(a).
      translations:
        fr:
          description: "de contr\xF4ler le mode de d\xE9faillance des \xE9l\xE9ments\
            \ affect\xE9s d\xE9finis au point IS.D.OR.205 a)."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220
      ref_id: IS.D.OR.220-c
      description: 'The organisation shall implement measures aimed at recovering
        from information security incidents, including emergency measures, if needed.
        Those recovery measures shall enable the organisation to:'
      translations:
        fr:
          description: "L\u2019organisme doit mettre en \u0153uvre des mesures visant\
            \ au r\xE9tablissement \xE0 la suite d\u2019incidents de s\xE9curit\xE9\
            \ de l\u2019information, y compris, le cas \xE9ch\xE9ant, des mesures\
            \ d\u2019urgence. Ces mesures de r\xE9tablissement doivent permettre \xE0\
            \ l\u2019organisme:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-c.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-c
      ref_id: IS.D.OR.220-c.1
      description: remove the condition that caused the incident, or constrain it
        to a tolerable level;
      translations:
        fr:
          description: "de supprimer la situation qui est \xE0 l\u2019origine de l\u2019\
            incident ou de la limiter \xE0 un niveau tol\xE9rable;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-c.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.220-c
      ref_id: IS.D.OR.220-c.2
      description: reach a safe state of the affected elements defined in point IS.D.OR.205(a)
        within a recovery time previously defined by the organisation.
      translations:
        fr:
          description: "d\u2019assurer que les \xE9l\xE9ments affect\xE9s d\xE9finis\
            \ au point IS.D.OR.205 a) retrouvent un \xE9tat garantissant la s\xE9\
            curit\xE9 dans un d\xE9lai de r\xE9tablissement d\xE9fini pr\xE9c\xE9\
            demment par l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.225
      name: Response to findings notified by the competent authority
      translations:
        fr:
          name: "R\xE9ponse aux constatations notifi\xE9es par l\u2019autorit\xE9\
            \ comp\xE9tente"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225
      ref_id: IS.D.OR.225-a
      description: 'After receipt of the notification of findings submitted by the
        competent authority, the organisation shall:'
      translations:
        fr:
          description: "Apr\xE8s r\xE9ception de la notification des constatations\
            \ pr\xE9sent\xE9e par l\u2019autorit\xE9 comp\xE9tente, l\u2019organisme\
            \ doit:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a
      ref_id: IS.D.OR.225-a.1
      description: identify the root cause or causes of, and contributing factors
        to, the non-compliance;
      translations:
        fr:
          description: "d\xE9terminer la cause ou les causes profondes des cas de\
            \ non-conformit\xE9 ainsi que les facteurs qui y contribuent;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a
      ref_id: IS.D.OR.225-a.2
      description: define a corrective action plan;
      translations:
        fr:
          description: "d\xE9finir un plan d\u2019actions correctives;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-a
      ref_id: IS.D.OR.225-a.3
      description: demonstrate the correction of the non-compliance to the satisfaction
        of the competent authority.
      translations:
        fr:
          description: "d\xE9montrer la correction du d\xE9faut de conformit\xE9 \xE0\
            \ la satisfaction de l\u2019autorit\xE9 comp\xE9tente."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.225
      ref_id: IS.D.OR.225-b
      description: The actions referred to in point (a) shall be carried out within
        the period agreed with the competent authority.
      translations:
        fr:
          description: "Les actions vis\xE9es au point a) doivent \xEAtre mises en\
            \ \u0153uvre dans le d\xE9lai convenu avec l\u2019autorit\xE9 comp\xE9\
            tente."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.230
      name: Information security external reporting scheme
      translations:
        fr:
          name: "Syst\xE8me de comptes rendus externe en mati\xE8re de s\xE9curit\xE9\
            \ de l\u2019information"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230
      ref_id: IS.D.OR.230-a
      description: The organisation shall implement an information security reporting
        system that complies with the requirements laid down in Regulation (EU) No
        376/2014 and its delegated and implementing acts if that Regulation is applicable
        to the organisation.
      translations:
        fr:
          description: "L\u2019organisme doit mettre en \u0153uvre un syst\xE8me de\
            \ comptes rendus en mati\xE8re de s\xE9curit\xE9 de l\u2019information\
            \ qui satisfait aux exigences du r\xE8glement (UE) no 376/2014 et de ses\
            \ actes d\xE9l\xE9gu\xE9s et d\u2019ex\xE9cution si ce r\xE8glement lui\
            \ est applicable."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230
      ref_id: IS.D.OR.230-b
      description: 'Without prejudice to the obligations of Regulation (EU) No 376/2014,
        the organisation shall ensure that any information security incident or vulnerability,
        which may represent a significant risk to aviation safety, is reported to
        their competent authority. Furthermore:'
      translations:
        fr:
          description: "Sans pr\xE9judice des obligations du r\xE8glement (UE) no\
            \ 376/2014, l\u2019organisme doit veiller \xE0 ce que tout incident ou\
            \ vuln\xE9rabilit\xE9 en mati\xE8re de s\xE9curit\xE9 de l\u2019information\
            \ susceptible de repr\xE9senter un risque important pour la s\xE9curit\xE9\
            \ a\xE9rienne soit signal\xE9 \xE0 son autorit\xE9 comp\xE9tente. En outre:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-b.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-b
      ref_id: IS.D.OR.230-b.1
      description: where such an incident or vulnerability affects an aircraft or
        associated system or component, the organisation shall also report it to the
        design approval holder;
      translations:
        fr:
          description: "lorsqu\u2019un tel incident ou une telle vuln\xE9rabilit\xE9\
            \ affecte un a\xE9ronef ou un syst\xE8me ou \xE9l\xE9ment associ\xE9,\
            \ l\u2019organisme doit \xE9galement en rendre compte au titulaire de\
            \ l\u2019agr\xE9ment de conception;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-b.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-b
      ref_id: IS.D.OR.230-b.2
      description: where such an incident or vulnerability affects a system or constituent
        used by the organisation, the organisation shall report it to the organisation
        responsible for the design of the system or constituent.
      translations:
        fr:
          description: "lorsqu\u2019un tel incident ou une telle vuln\xE9rabilit\xE9\
            \ affecte un syst\xE8me ou un composant utilis\xE9 par l\u2019organisme,\
            \ celui-ci doit en rendre compte \xE0 l\u2019organisme responsable de\
            \ la conception du syst\xE8me ou du composant."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230
      ref_id: IS.D.OR.230-c
      description: 'The organisation shall report the conditions referred to in point
        (b) as follows:'
      translations:
        fr:
          description: "L\u2019organisme doit rendre compte de la situation vis\xE9\
            e au point b) comme suit:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c
      ref_id: IS.D.OR.230-c.1
      description: a notification shall be submitted to the competent authority and,
        if applicable, to the design approval holder or to the organisation responsible
        for the design of the system or constituent, as soon as the condition has
        been known to the organisation;
      translations:
        fr:
          description: "une notification doit \xEAtre soumise \xE0 l\u2019autorit\xE9\
            \ comp\xE9tente et, le cas \xE9ch\xE9ant, au titulaire de l\u2019agr\xE9\
            ment de conception ou \xE0 l\u2019organisme responsable de la conception\
            \ du syst\xE8me ou du composant, d\xE8s que l\u2019organisme a connaissance\
            \ de la situation;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c
      ref_id: IS.D.OR.230-c.2
      description: a report shall be submitted to the competent authority and, if
        applicable, to the design approval holder or to the organisation responsible
        for the design of the system or constituent, as soon as possible, but not
        exceeding 72 hours from the time the condition has been known to the organisation,
        unless exceptional circumstances prevent this.
      translations:
        fr:
          description: "un compte rendu doit \xEAtre soumis \xE0 l\u2019autorit\xE9\
            \ comp\xE9tente et, le cas \xE9ch\xE9ant, au titulaire de l\u2019agr\xE9\
            ment de conception ou \xE0 l\u2019organisme responsable de la conception\
            \ du syst\xE8me ou du composant, d\xE8s que possible, mais sans d\xE9\
            passer 72 heures \xE0 compter du moment o\xF9 l\u2019organisme a eu connaissance\
            \ de la situation, sauf si des circonstances exceptionnelles l\u2019emp\xEA\
            chent."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node83
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c
      description: The report shall be made in the form defined by the competent authority
        and shall contain all relevant information about the condition known to the
        organisation;
      translations:
        fr:
          description: "Le compte rendu est \xE9tabli sous la forme d\xE9finie par\
            \ l\u2019autorit\xE9 comp\xE9tente et contient toutes les informations\
            \ pertinentes sur la situation dont l\u2019organisme a connaissance;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c
      ref_id: IS.D.OR.230-c.3
      description: a follow-up report shall be submitted to the competent authority
        and, if applicable, to the design approval holder or to the organisation responsible
        for the design of the system or constituent, providing details of the actions
        the organisation has taken or intends to take to recover from the incident
        and the actions it intends to take to prevent similar information security
        incidents in the future.
      translations:
        fr:
          description: "un rapport de suivi pr\xE9cisant les mesures que l\u2019organisme\
            \ a prises ou a l\u2019intention de prendre pour le r\xE9tablissement\
            \ apr\xE8s l\u2019incident et les mesures qu\u2019il a l\u2019intention\
            \ de prendre pour pr\xE9venir de tels incidents de s\xE9curit\xE9 de l\u2019\
            information \xE0 l\u2019avenir doit \xEAtre pr\xE9sent\xE9 \xE0 l\u2019\
            autorit\xE9 comp\xE9tente et, le cas \xE9ch\xE9ant, au titulaire de l\u2019\
            agr\xE9ment de conception ou \xE0 l\u2019organisme responsable de la conception\
            \ du syst\xE8me ou du composant."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node85
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.230-c
      description: The follow-up report shall be submitted as soon as those actions
        have been identified, and shall be produced in the form defined by the competent
        authority.
      translations:
        fr:
          description: "Le rapport de suivi doit \xEAtre pr\xE9sent\xE9 d\xE8s que\
            \ ces mesures ont \xE9t\xE9 d\xE9finies et \xEAtre \xE9tabli selon la\
            \ forme pr\xE9vue par l\u2019autorit\xE9 comp\xE9tente."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.235
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.235
      name: Contracting of information security management activities
      translations:
        fr:
          name: "Sous-traitance des activit\xE9s de gestion de la s\xE9curit\xE9 de\
            \ l\u2019information"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.235-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.235
      ref_id: IS.D.OR.235-a
      description: The organisation shall ensure that when contracting any part of
        the activities referred to in point IS.D.OR.200 to other organisations, the
        contracted activities comply with the requirements of this Regulation and
        the contracted organisation works under its oversight. The organisation shall
        ensure that the risks associated with the contracted activities are appropriately
        managed.
      translations:
        fr:
          description: "Lorsqu\u2019il sous-traite une partie des activit\xE9s vis\xE9\
            es au point IS.D.OR.200 \xE0 d\u2019autres organismes, l\u2019organisme\
            \ veille \xE0 ce que les activit\xE9s sous-trait\xE9es soient conformes\
            \ aux exigences du pr\xE9sent r\xE8glement et que l\u2019organisme sous-traitant\
            \ travaille sous sa supervision. L\u2019organisme doit faire en sorte\
            \ que les risques associ\xE9s aux activit\xE9s sous-trait\xE9es soient\
            \ g\xE9r\xE9s de mani\xE8re appropri\xE9e."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.235-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.235
      ref_id: IS.D.OR.235-b
      description: The organisation shall ensure that the competent authority can
        have access upon request to the contracted organisation to determine continued
        compliance with the applicable requirements laid down in this Regulation.
      translations:
        fr:
          description: "L\u2019organisme doit veiller \xE0 ce que l\u2019autorit\xE9\
            \ comp\xE9tente puisse, sur demande, avoir acc\xE8s \xE0 l\u2019organisme\
            \ sous-traitant afin de d\xE9terminer le respect constant des exigences\
            \ applicables \xE9nonc\xE9es dans le pr\xE9sent r\xE8glement."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.240
      name: Personnel requirements
      translations:
        fr:
          name: "Exigences en mati\xE8re de personnel"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-a
      description: 'The accountable manager of the organisation or, in the case of
        design organisations, the head of the design organisation, designated in accordance
        with Regulation (EU) No 748/2012 and Regulation (EU) No 139/2014 as referred
        to in points 1(a) and (b) of Article 2 of this Regulation, shall have corporate
        authority to ensure that all activities required by this Regulation can be
        financed and carried out. That person shall:'
      translations:
        fr:
          description: "Le dirigeant responsable de l\u2019organisme ou, dans le cas\
            \ des organismes de conception, le responsable de l\u2019organisme de\
            \ conception d\xE9sign\xE9 conform\xE9ment au r\xE8glement (UE) no 748/2012\
            \ et au r\xE8glement (UE) no 139/2014 pour les organismes vis\xE9s \xE0\
            \ l\u2019article 2, paragraphe 1, points a) et b), du pr\xE9sent r\xE8\
            glement, d\xE9tient les droits statutaires pour assurer que toutes les\
            \ activit\xE9s requises par le pr\xE9sent r\xE8glement peuvent \xEAtre\
            \ financ\xE9es et ex\xE9cut\xE9es. Cette personne doit:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a
      ref_id: IS.D.OR.240-a.1
      description: ensure that all necessary resources are available to comply with
        the requirements of this Regulation;
      translations:
        fr:
          description: "veiller \xE0 ce que toutes les ressources n\xE9cessaires soient\
            \ disponibles pour se conformer aux exigences du pr\xE9sent r\xE8glement;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a
      ref_id: IS.D.OR.240-a.2
      description: establish and promote the information security policy referred
        to in point IS.D.OR.200(a)(1);
      translations:
        fr:
          description: "\xE9tablir et promouvoir la politique en mati\xE8re de s\xE9\
            curit\xE9 de l\u2019information vis\xE9e au point IS.D.OR.200 a), point\
            \ 1);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-a
      ref_id: IS.D.OR.240-a.3
      description: demonstrate a basic understanding of this Regulation.
      translations:
        fr:
          description: "d\xE9montrer qu\u2019il a une vision d\u2019ensemble du pr\xE9\
            sent r\xE8glement."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-b
      description: The accountable manager or, in the case of design organisations,
        the head of the design organisation, shall appoint a person or group of persons
        to ensure that the organisation is in compliance with the requirements of
        this Regulation, and shall define the extent of their authority. That person
        or group of persons shall report directly to the accountable manager or, in
        the case of design organisations, to the head of the design organisation,
        and shall have the appropriate knowledge, background and experience to discharge
        their responsibilities. It shall be determined in the procedures who deputises
        for a particular person in the case of lengthy absence of that person.
      translations:
        fr:
          description: "Le dirigeant responsable ou, dans le cas des organismes de\
            \ conception, le responsable de l\u2019organisme de conception, doit d\xE9\
            signer une personne ou un groupe de personnes charg\xE9es de s\u2019assurer\
            \ que l\u2019organisme respecte les exigences du pr\xE9sent r\xE8glement,\
            \ et doit d\xE9finir l\u2019\xE9tendue de leurs comp\xE9tences. Cette\
            \ personne ou ce groupe de personnes doit rendre compte directement au\
            \ dirigeant responsable ou, dans le cas des organismes de conception,\
            \ au responsable de l\u2019organisme de conception, et doit poss\xE9der\
            \ les connaissances, les qualifications et l\u2019exp\xE9rience appropri\xE9\
            es pour s\u2019acquitter de ses responsabilit\xE9s. Les proc\xE9dures\
            \ doivent \xE9tablir qui suppl\xE9e une personne particuli\xE8re dans\
            \ le cas d\u2019une absence de longue dur\xE9e de cette personne."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-c
      description: The accountable manager or, in the case of design organisations,
        the head of the design organisation shall appoint a person or group of persons
        with the responsibility to manage the compliance monitoring function referred
        to in point IS.D.OR.200(a)(12).
      translations:
        fr:
          description: "Le dirigeant responsable ou, dans le cas des organismes de\
            \ conception, le responsable de l\u2019organisme de conception, doit d\xE9\
            signer une personne ou un groupe de personnes charg\xE9es de g\xE9rer\
            \ la fonction de contr\xF4le de la conformit\xE9 vis\xE9e au point IS.D.OR.200\
            \ a), point 12)."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-d
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-d
      description: Where the organisation shares information security organisational
        structures, policies, processes and procedures, with other organisations or
        with areas of their own organisation which are not part of the approval or
        declaration, the accountable manager or, in the case of design organisations,
        the head of the design organisation, may delegate its activities to a common
        responsible person.
      translations:
        fr:
          description: "Lorsque l\u2019organisme partage des structures organisationnelles,\
            \ des politiques, des processus et des proc\xE9dures en mati\xE8re de\
            \ s\xE9curit\xE9 de l\u2019information avec d\u2019autres organismes ou\
            \ avec des domaines de sa propre organisation qui ne font pas partie de\
            \ l\u2019agr\xE9ment ou de la d\xE9claration, le dirigeant responsable\
            \ ou, dans le cas des organismes de conception, le responsable de l\u2019\
            organisme de conception, peut d\xE9l\xE9guer ses activit\xE9s \xE0 une\
            \ personne responsable commune."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node97
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      description: In such a case, coordination measures shall be established between
        the accountable manager of the organisation or, in the case of design organisations,
        the head of the design organisation, and the common responsible person to
        ensure adequate integration of the information security management within
        the organisation.
      translations:
        fr:
          description: "Dans ce cas, des mesures de coordination doivent \xEAtre \xE9\
            tablies entre le dirigeant responsable de l\u2019organisme ou, dans le\
            \ cas des organismes de conception, le responsable de l\u2019organisme\
            \ de conception, et la personne responsable commune afin de garantir une\
            \ int\xE9gration ad\xE9quate de la gestion de la s\xE9curit\xE9 de l\u2019\
            information au sein de l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-e
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-e
      description: The accountable manager or the head of the design organisation,
        or the common responsible person referred to in point (d), shall have corporate
        authority to establish and maintain the organisational structures, policies,
        processes and procedures necessary to implement point IS.D.OR.200.
      translations:
        fr:
          description: "Le dirigeant responsable ou le responsable de l\u2019organisme\
            \ de conception, ou la personne responsable commune vis\xE9e au point\
            \ d), doit d\xE9tenir les droits statutaires pour \xE9tablir et maintenir\
            \ les structures organisationnelles, les politiques, les processus et\
            \ les proc\xE9dures n\xE9cessaires \xE0 la mise en \u0153uvre du point\
            \ IS.D.OR.200."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-f
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-f
      description: The organisation shall have a process in place to ensure that they
        have sufficient personnel on duty to carry out the activities covered by this
        Annex.
      translations:
        fr:
          description: "L\u2019organisme doit avoir mis en place un processus garantissant\
            \ qu\u2019il dispose d\u2019un personnel suffisant pour mener \xE0 bien\
            \ les activit\xE9s couvertes par la pr\xE9sente annexe."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-g
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-g
      description: The organisation shall have a process in place to ensure that the
        personnel referred to in point (f) have the necessary competence to perform
        their tasks.
      translations:
        fr:
          description: "L\u2019organisme doit mettre en place un processus garantissant\
            \ que le personnel vis\xE9 au point f) poss\xE8de les comp\xE9tences n\xE9\
            cessaires pour accomplir ses t\xE2ches."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-h
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-h
      description: The organisation shall have a process in place to ensure that personnel
        acknowledge the responsibilities associated with the assigned roles and tasks.
      translations:
        fr:
          description: "L\u2019organisme doit avoir mis en place un processus permettant\
            \ de garantir que le personnel est inform\xE9 des responsabilit\xE9s li\xE9\
            es aux r\xF4les et t\xE2ches assign\xE9s."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240-i
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.240
      ref_id: IS.D.OR.240-i
      description: The organisation shall ensure that the identity and trustworthiness
        of the personnel who have access to information systems and data subject to
        the requirements of this Regulation are appropriately established.
      translations:
        fr:
          description: "L\u2019organisme doit veiller \xE0 ce que l\u2019identit\xE9\
            \ et la fiabilit\xE9 du personnel ayant acc\xE8s aux syst\xE8mes d\u2019\
            information et aux donn\xE9es soumises aux exigences du pr\xE9sent r\xE8\
            glement soient \xE9tablies de mani\xE8re appropri\xE9e."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.245
      name: Record-keeping
      translations:
        fr:
          name: Archivage
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245
      ref_id: IS.D.OR.245-a
      description: The organisation shall keep records of its information security
        management activities
      translations:
        fr:
          description: "L\u2019organisme doit conserver des archives sur ses activit\xE9\
            s de gestion de la s\xE9curit\xE9 de l\u2019information."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a
      ref_id: IS.D.OR.245-a.1
      description: 'The organisation shall ensure that the following records are archived
        and traceable:'
      translations:
        fr:
          description: "L\u2019organisme doit veiller \xE0 ce que les documents suivants\
            \ soient archiv\xE9s et tra\xE7ables:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1.i
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      ref_id: IS.D.OR.245-a.1.i
      description: any approval received and any associated information security risk
        assessment in accordance with point IS.D.OR.200(e);
      translations:
        fr:
          description: "tout agr\xE9ment re\xE7u et toute \xE9valuation connexe des\
            \ risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information conform\xE9\
            ment au point IS.D.OR.200 e);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1.ii
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      ref_id: IS.D.OR.245-a.1.ii
      description: contracts for activities referred to in point IS.D.OR.200(a)(9);
      translations:
        fr:
          description: "les contrats portant sur les activit\xE9s vis\xE9es au point\
            \ IS.D.OR.200 a), point 9);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1.iii
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      ref_id: IS.D.OR.245-a.1.iii
      description: records of the key processes referred to in point IS.D.OR.200(d);
      translations:
        fr:
          description: "les documents relatifs aux processus cl\xE9s vis\xE9s au point\
            \ IS.D.OR.200 d);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1.iv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      ref_id: IS.D.OR.245-a.1.iv
      description: records of the risks identified in the risk assessment referred
        to in point IS.D.OR.205 along with the associated risk treatment measures
        referred to in point IS.D.OR.210;
      translations:
        fr:
          description: "les documents relatifs aux risques recens\xE9s dans l\u2019\
            \xE9valuation des risques vis\xE9e au point IS.D.OR.205 ainsi que les\
            \ mesures connexes de traitement des risques vis\xE9es au point IS.D.OR.210;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1.v
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      ref_id: IS.D.OR.245-a.1.v
      description: records of information security incidents and vulnerabilities reported
        in accordance with the reporting schemes referred to in points IS.D.OR.215
        and IS.D.OR.230;
      translations:
        fr:
          description: "les documents relatifs aux incidents et vuln\xE9rabilit\xE9\
            s li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information signal\xE9s conform\xE9\
            ment aux syst\xE8mes de comptes rendus vis\xE9s aux points IS.D.OR.215\
            \ et IS.D.OR.230;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1.vi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.1
      ref_id: IS.D.OR.245-a.1.vi
      description: records of those information security events which may need to
        be reassessed to reveal undetected information security incidents or vulnerabilities.
      translations:
        fr:
          description: "les documents relatifs aux \xE9v\xE9nements li\xE9s \xE0 la\
            \ s\xE9curit\xE9 de l\u2019information qui pourraient devoir \xEAtre r\xE9\
            \xE9valu\xE9s pour r\xE9v\xE9ler des incidents ou des vuln\xE9rabilit\xE9\
            s en mati\xE8re de s\xE9curit\xE9 de l\u2019information non d\xE9tect\xE9\
            s."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a
      ref_id: IS.D.OR.245-a.2
      description: The records referred to in point (1)(i) shall be retained at least
        until 5 years after the approval has lost its validity.
      translations:
        fr:
          description: "Les documents vis\xE9s au point 1) i) doivent \xEAtre conserv\xE9\
            s au moins 5 ans apr\xE8s que l\u2019agr\xE9ment a perdu sa validit\xE9\
            ."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a
      ref_id: IS.D.OR.245-a.3
      description: The records referred to in point (1)(ii) shall be retained at least
        until 5 years after the contract has been amended or terminated.
      translations:
        fr:
          description: "Les documents vis\xE9s au point 1) ii) doivent \xEAtre conserv\xE9\
            s au moins 5 ans apr\xE8s la modification ou la r\xE9siliation du contrat."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a
      ref_id: IS.D.OR.245-a.4
      description: The records referred to in point (1)(iii), (iv) and (v) shall be
        retained at least for a period of 5 years.
      translations:
        fr:
          description: "Les documents vis\xE9s aux points 1) iii), iv) et v), doivent\
            \ \xEAtre conserv\xE9s pendant une p\xE9riode d\u2019au moins 5 ans."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-a
      ref_id: IS.D.OR.245-a.5
      description: The records referred to in point (1)(vi) shall be retained until
        those information security events have been reassessed in accordance with
        a periodicity defined in a procedure established by the organisation.
      translations:
        fr:
          description: "Les documents vis\xE9s au point 1) vi) doivent \xEAtre conserv\xE9\
            s jusqu\u2019\xE0 ce que ces \xE9v\xE9nements li\xE9s \xE0 la s\xE9curit\xE9\
            \ de l\u2019information aient \xE9t\xE9 r\xE9\xE9valu\xE9s selon une p\xE9\
            riodicit\xE9 d\xE9finie dans une proc\xE9dure \xE9tablie par l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245
      ref_id: IS.D.OR.245-b
      description: The organisation shall keep records of qualification and experience
        of its own staff involved in information security management activities
      translations:
        fr:
          description: "L\u2019organisme doit conserver les documents relatifs aux\
            \ qualifications et \xE0 l\u2019exp\xE9rience de son propre personnel\
            \ participant aux activit\xE9s de gestion de la s\xE9curit\xE9 de l\u2019\
            information."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-b.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-b
      ref_id: IS.D.OR.245-b.1
      description: "The personnel\u2019s qualification and experience records be retained\
        \ for as long as the person works for the organisation, and for at least 3\
        \ years after the person has left the organisation."
      translations:
        fr:
          description: "Les documents relatifs aux qualifications et \xE0 l\u2019\
            exp\xE9rience du personnel doivent \xEAtre conserv\xE9s aussi longtemps\
            \ que la personne travaille pour l\u2019organisme et pendant au moins\
            \ 3 ans apr\xE8s que la personne a quitt\xE9 l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-b.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-b
      ref_id: IS.D.OR.245-b.2
      description: Members of the staff shall, upon their request, be given access
        to their individual records. In addition, upon their request, the organisation
        shall provide them with a copy of their individual records on leaving the
        organisation.
      translations:
        fr:
          description: "\xC0 leur demande, les membres du personnel doivent avoir\
            \ acc\xE8s \xE0 leurs dossiers individuels. En outre, \xE0 leur demande,\
            \ l\u2019organisme doit leur fournir une copie de leurs dossiers individuels\
            \ lorsqu\u2019ils quittent l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245
      ref_id: IS.D.OR.245-c
      description: "The format of the records shall be specified in the organisation\u2019\
        s procedures."
      translations:
        fr:
          description: "Le format des dossiers doit \xEAtre d\xE9fini dans les proc\xE9\
            dures de l\u2019organisme."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245-d
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.245
      ref_id: IS.D.OR.245-d
      description: Records shall be stored in a manner that ensures protection from
        damage, alteration and theft, with information being identified, when required,
        according to its security classification level. The organisation shall ensure
        that the records are stored using means to ensure integrity, authenticity
        and authorised access.
      translations:
        fr:
          description: "Les documents doivent \xEAtre stock\xE9s de mani\xE8re \xE0\
            \ ne pas \xEAtre endommag\xE9s, alt\xE9r\xE9s ou d\xE9rob\xE9s, les informations\
            \ \xE9tant signal\xE9es, le cas \xE9ch\xE9ant, en fonction de leur niveau\
            \ de classification de s\xE9curit\xE9. L\u2019organisme doit veiller \xE0\
            \ ce que les documents soient stock\xE9s de mani\xE8re \xE0 garantir l\u2019\
            int\xE9grit\xE9, l\u2019authenticit\xE9 et l\u2019acc\xE8s autoris\xE9\
            ."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.250
      name: Information security management manual (ISMM)
      translations:
        fr:
          name: "Manuel de gestion de la s\xE9curit\xE9 de l\u2019information (MGSI)"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250
      ref_id: IS.D.OR.250-a
      description: 'The organisation shall make available to the competent authority
        an information security management manual (ISMM) and, where applicable, any
        referenced associated manuals and procedures, containing:'
      translations:
        fr:
          description: "L\u2019organisme doit mettre \xE0 la disposition de l\u2019\
            autorit\xE9 comp\xE9tente un manuel de gestion de la s\xE9curit\xE9 de\
            \ l\u2019information (MGSI) et, le cas \xE9ch\xE9ant, tous manuels et\
            \ proc\xE9dures associ\xE9s auxquels il renvoie, contenant:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a
      ref_id: IS.D.OR.250-a.1
      description: a statement signed by the accountable manager or, in the case of
        design organisations, by the head of the design organisation, confirming that
        the organisation will at all times work in accordance with this Annex and
        with the ISMM. If the accountable manager or, in the case of design organisations,
        the head of the design organisation, is not the chief executive officer (CEO)
        of the organisation, then such CEO shall countersign the statement;
      translations:
        fr:
          description: "une d\xE9claration sign\xE9e par le dirigeant responsable\
            \ ou, dans le cas des organismes de conception, par le responsable de\
            \ l\u2019organisme de conception, confirmant que l\u2019organisme travaillera\
            \ \xE0 tout moment conform\xE9ment \xE0 la pr\xE9sente annexe et au MGSI.\
            \ Si le dirigeant responsable ou, dans le cas des organismes de conception,\
            \ le responsable de l\u2019organisme de conception, n\u2019est pas le\
            \ directeur g\xE9n\xE9ral de l\u2019organisme, alors le directeur g\xE9\
            n\xE9ral doit contresigner la d\xE9claration;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a
