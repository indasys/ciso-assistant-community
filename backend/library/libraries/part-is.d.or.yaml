      translations:
        fr:
          description: "la proc\xE9dure de modification du MGSI d\xE9finie au point\
            \ c);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a
      ref_id: IS.D.OR.250-a.10
      description: the details of currently approved alternative means of compliance.
      translations:
        fr:
          description: "des informations d\xE9taill\xE9es sur les autres moyens de\
            \ mise en conformit\xE9 actuellement approuv\xE9s."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250
      ref_id: IS.D.OR.250-b
      description: The initial issue of the ISMM shall be approved and a copy shall
        be retained by the competent authority. An approval shall not be required
        for declaring organisations. The ISMM shall be amended as necessary to remain
        an up-to-date description of the ISMS of the organisation. A copy of any amendments
        to the ISMM shall be provided to the competent authority.
      translations:
        fr:
          description: "La premi\xE8re \xE9dition du MGSI doit \xEAtre approuv\xE9\
            e et une copie doit \xEAtre conserv\xE9e par l\u2019autorit\xE9 comp\xE9\
            tente. Aucune approbation n\u2019est requise pour les organismes d\xE9\
            clarants. Le MGSI doit \xEAtre modifi\xE9 en tant que de besoin pour conserver\
            \ une description \xE0 jour du SGSI de l\u2019organisme. Une copie de\
            \ toute modification du MGSI doit \xEAtre fournie \xE0 l\u2019autorit\xE9\
            \ comp\xE9tente."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-c
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250
      ref_id: IS.D.OR.250-c
      description: Amendments to the ISMM shall be managed in a procedure established
        by the organisation. Any amendments that are not included within the scope
        of this procedure and any amendments related to the changes referred to in
        point IS.D. OR.255(b), shall be approved by the competent authority. An approval
        shall not be required for declaring organisations.
      translations:
        fr:
          description: "Les modifications apport\xE9es au MGSI doivent \xEAtre g\xE9\
            r\xE9es selon une proc\xE9dure \xE9tablie par l\u2019organisme. Toute\
            \ modification qui n\u2019entre pas dans le champ d\u2019application de\
            \ cette proc\xE9dure et toute modification li\xE9e aux modifications vis\xE9\
            es au point IS.D.OR.255 b) doivent \xEAtre approuv\xE9es par l\u2019autorit\xE9\
            \ comp\xE9tente. Aucune approbation n\u2019est requise pour les organismes\
            \ d\xE9clarants."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-d
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250
      ref_id: IS.D.OR.250-d
      description: The organisation may integrate the ISMM with other management expositions
        or manuals it holds, provided there is a clear cross reference that indicates
        which portions of the management exposition or manual correspond to the different
        requirements contained in this Annex.
      translations:
        fr:
          description: "L\u2019organisme peut int\xE9grer le MGSI \xE0 d\u2019autres\
            \ sp\xE9cifications de gestion ou manuels qu\u2019il d\xE9tient, \xE0\
            \ condition qu\u2019il existe une r\xE9f\xE9rence crois\xE9e claire indiquant\
            \ quelles parties des sp\xE9cifications de gestion ou du manuel correspondent\
            \ aux diff\xE9rentes exigences \xE9nonc\xE9es dans la pr\xE9sente annexe."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.255
      name: Changes to the information security management system
      translations:
        fr:
          name: "Modification du syst\xE8me de gestion de la s\xE9curit\xE9 de l\u2019\
            information"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255
      ref_id: IS.D.OR.255-a
      description: Changes to the ISMS may be managed and notified to the competent
        authority in a procedure developed by the organisation. This procedure shall
        be approved by the competent authority, except for declaring organisations.
      translations:
        fr:
          description: "Les modifications apport\xE9es au SGSI peuvent \xEAtre g\xE9\
            r\xE9es et notifi\xE9es \xE0 l\u2019autorit\xE9 comp\xE9tente dans le\
            \ cadre d\u2019une proc\xE9dure \xE9labor\xE9e par l\u2019organisme. Cette\
            \ proc\xE9dure doit \xEAtre approuv\xE9e par l\u2019autorit\xE9 comp\xE9\
            tente, sauf pour les organismes d\xE9clarants."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255
      ref_id: IS.D.OR.255-b
      description: With regard to changes to the ISMS not covered by the procedure
        referred to in point (a), the organisation shall apply for and obtain an approval
        issued by the competent authority, except for declaring organisations, for
        which an approval is not required.
      translations:
        fr:
          description: "En ce qui concerne les modifications du SGSI non couvertes\
            \ par la proc\xE9dure vis\xE9e au point a), l\u2019organisme doit demander\
            \ et obtenir une approbation d\xE9livr\xE9e par l\u2019autorit\xE9 comp\xE9\
            tente, sauf pour les organismes d\xE9clarants, pour lesquels aucune approbation\
            \ n\u2019est requise."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:node142
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255
      description: 'With regard to these changes:'
      translations:
        fr:
          description: 'En ce qui concerne ces modifications:'
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255-b.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:node142
      ref_id: IS.D.OR.255-b.1
      description: the application shall be submitted before any such change takes
        place, in order to enable the competent authority to determine continued compliance
        with this Regulation and to amend, if necessary, the organisation certificate
        and related terms of approval attached to it;
      translations:
        fr:
          description: "la demande doit \xEAtre soumise avant que ne soient apport\xE9\
            es de telles modifications, afin de permettre \xE0 l\u2019autorit\xE9\
            \ comp\xE9tente de d\xE9terminer le respect constant du pr\xE9sent r\xE8\
            glement et de modifier, au besoin, le certificat d\u2019organisme ainsi\
            \ que les termes de l\u2019agr\xE9ment correspondants qui y sont joints;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255-b.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:node142
      ref_id: IS.D.OR.255-b.2
      description: the organisation shall make available to the competent authority
        any information it requests to evaluate the change;
      translations:
        fr:
          description: "l\u2019organisme doit mettre \xE0 la disposition de l\u2019\
            autorit\xE9 comp\xE9tente toute information qu\u2019elle demande pour\
            \ \xE9valuer la modification;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255-b.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:node142
      ref_id: IS.D.OR.255-b.3
      description: the change shall be implemented only upon receipt of a formal approval
        by the competent authority, except for declaring organisations, which may
        implement the change immediately;
      translations:
        fr:
          description: "la modification ne doit \xEAtre mise en \u0153uvre qu\u2019\
            apr\xE8s r\xE9ception de l\u2019approbation formelle de l\u2019autorit\xE9\
            \ comp\xE9tente, sauf pour les organismes d\xE9clarants, qui peuvent mettre\
            \ en \u0153uvre la modification imm\xE9diatement;"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.255-b.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:node142
      ref_id: IS.D.OR.255-b.4
      description: the organisation shall operate under the conditions prescribed
        by the competent authority during the implementation of such changes.
      translations:
        fr:
          description: "l\u2019organisme doit exercer ses activit\xE9s dans les conditions\
            \ prescrites par l\u2019autorit\xE9 comp\xE9tente pendant la mise en \u0153\
            uvre de ces modifications."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.260
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:annex
      ref_id: IS.D.OR.260
      name: Continuous improvement
      translations:
        fr:
          name: "Am\xE9lioration constante"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.260-a
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.260
      ref_id: IS.D.OR.260-a
      description: The organisation shall assess, using adequate performance indicators,
        the effectiveness and maturity of the ISMS. That assessment shall be carried
        out on a calendar basis predefined by the organisation or following an information
        security incident.
      translations:
        fr:
          description: "L\u2019organisme doit \xE9valuer, \xE0 l\u2019aide d\u2019\
            indicateurs de performance ad\xE9quats, l\u2019efficacit\xE9 et la maturit\xE9\
            \ du SGSI. Cette \xE9valuation doit \xEAtre effectu\xE9e selon un calendrier\
            \ pr\xE9d\xE9fini par l\u2019organisme ou \xE0 la suite d\u2019un incident\
            \ de s\xE9curit\xE9 de l\u2019information."
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.260-b
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.260
      ref_id: IS.D.OR.260-b
      description: If deficiencies are found following the assessment carried out
        in accordance with point (a), the organisation shall take the necessary improvement
        measures to ensure that the ISMS continues to comply with the applicable requirements
        and maintains the information security risks at an acceptable level. In addition,
        the organisation shall reassess those elements of the ISMS affected by the
        adopted measures.
      translations:
        fr:
          description: "Si des manquements sont constat\xE9s \xE0 la suite de l\u2019\
            \xE9valuation effectu\xE9e conform\xE9ment au point a), l\u2019organisme\
            \ doit prendre les mesures d\u2019am\xE9lioration n\xE9cessaires pour\
            \ garantir que le SGSI continue de respecter les exigences applicables\
            \ et maintient les risques li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information\
            \ \xE0 un niveau acceptable. En outre, l\u2019organisme r\xE9\xE9value\
            \ les \xE9l\xE9ments du SGSI concern\xE9s par les mesures adopt\xE9es."
