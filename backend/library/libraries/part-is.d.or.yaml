        name: "PART-IS.D.OR (R\xE8glement D\xE9l\xE9gu\xE9 (UE) 2022/1645 - Consolid\xE9\
          \ au 16/10/2025)"
        description: "Texte consolid\xE9: R\xE8glement d\xE9l\xE9gu\xE9 (UE) 2022/1645\
          \ de la Commission du 14 juillet 2022 portant modalit\xE9s d\u2019application\
          \ du r\xE8glement (UE) 2018/1139 du Parlement europ\xE9en et du Conseil\
          \ en ce qui concerne les exigences relatives \xE0 la gestion des risques\
          \ li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information susceptibles d\u2019\
          avoir une incidence sur la s\xE9curit\xE9 a\xE9rienne impos\xE9es aux organismes\
          \ relevant des r\xE8glements (UE) no 748/2012 et (UE) no 139/2014 de la\
          \ Commission et modifiant les r\xE8glements (UE) no 748/2012 et (UE) no\
          \ 139/2014 de la Commission\n\nTexte consolid\xE9 au 16 octobre 2025.\n\
