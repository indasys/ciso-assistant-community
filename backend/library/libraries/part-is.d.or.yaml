      description: the procedures that define how the organisation controls any contracted
        activities referred to in point IS.D.OR.200(a)(9);
      translations:
        fr:
          description: "les proc\xE9dures qui d\xE9finissent la mani\xE8re dont l\u2019\
            organisme contr\xF4le les activit\xE9s sous-trait\xE9es vis\xE9es au point\
            \ IS.D.OR.200 a), point 9);"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a.9.iii
      assessable: true
