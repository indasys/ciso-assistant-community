      description: 'the procedures that specify how the organisation ensures compliance
        with this Part, and in particular:'
      translations:
        fr:
          description: "les proc\xE9dures qui pr\xE9cisent comment l\u2019organisme\
            \ garantit le respect de la pr\xE9sente partie, et notamment:"
    - urn: urn:intuitem:risk:req_node:part-is.d.or:is.d.or.250-a.9.i
